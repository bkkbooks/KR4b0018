body:
  text: 庾子山集巻十三周庾信撰錢塘倪璠纂註碑文陜州𢎞農郡五張寺經藏碑隋書地理志云河南郡陜縣後魏置陜州𢎞農郡周明帝紀云二年春於𢎞農置陜州庾信本傳云出為𢎞農守此篇及下温湯碑皆為𢎞農太守時作也五張者張元高子兄弟五人捨宅為寺故以為名寺者寺本華題釋名曰寺嗣也謂治事者相嗣續於其内也故天子有九寺僧史略云鴻臚寺本禮四夷逺國之邸舎尋令别擇洛陽西雍門外蓋一精舎以白馬䭾經來故用白馬為題本是司名西僧乍來權止公司移入别居不忘其本還標寺號經者梵音素怛囕或蘇怛囉者華言線蓋取貫穿攝持義也又梵云脩多羅或脩妬路者秦言契謂上契理下契根故言經者具三義謂久通由也肇云經常也謝靈運云經者由也律也通也謂言由理生理由言顯學者神悟從理教而通矣藏者梵云俱舎或云比咤或云摘迦此翻為藏經律論謂之三藏又辟攴佛藏菩薩藏聲聞藏名三藏又阿含毗尼阿毗曇為三藏四教義稱阿含即定藏毗尼即戒藏阿毗曇即慧藏藏者攝也謂攝人攝法故包含攝持之義時寺主法映及洛州刺史張隆等於寺中造一切法輪子山出守此邦逢兹佛㑹遂相請託有此碑文也蓋聞如来說法萬萬恒沙如来佛號佛有十種名稱功徳如来十號之一也梵云多陀阿伽陀亦云怛闥阿竭後秦翻為如来恒沙喻多也維摩經曰名為多陀阿伽度肇曰秦言如来亦云如去如法而来如法而去古今不改千聖同轍故名如来亦名如去什曰多陀阿伽度秦言如来亦言如去如法知如法説故名如也諸佛以安隱道来此佛亦如是来彼佛安隱去此佛亦如此去也竺道生注曰如者謂無復有如之理從此中来故曰如来謝靈運金剛般若經注曰諸法性空理無乖異謂之為如會如解故名如来維摩經曰佛以一音演説法衆生隨類各得解法華經曰佛以恒河沙等三千大千世界為一佛土又曰其數如恒沙又曰爾時他方國土諸来菩薩過八恒河沙數於大衆中合掌作禮而白佛言我等於佛滅後在此娑婆世界䕶持經典當於此土而廣説之佛言不須汝等䕶持此經我娑婆世界自有六萬恒河沙菩薩一一菩薩多有六萬恒河沙眷屬能於我滅後䕶持誦讀廣說此經佛說是時娑婆世界三千大千國土地皆振裂而於其中有無量千萬億菩薩同時涌出身皆金色三十二相無量光明先盡在此娑婆世界之下虚空中住聞佛所説音聲從下發来一一菩薩皆大衆唱導之首各將六萬恒河沙眷屬如是等比無量無邉算數譬喻所不能知又曰我説是如来夀命長逺時六百八十萬億那由他恒河沙衆生得無生法忍四四天下微塵數菩薩四生當得阿耨多羅三藐三菩提按恒沙喻如一佛國恒河沙數乃至如四四天下微塵數言如来説法菩薩四衆䕶持經典如萬萬佛國恒河沙數之多也菩薩轉輪生生世界菩薩梵語具足云菩提薩埵此云覺有情從行立稱梵云斫訖羅此土翻輪凡佛有所說皆名轉法輪生生猶言衆生之類楞嚴稱世為遷流界為方位過去未来現在名世東西南北四維上下名界僧肇維摩經注曰菩薩正音云菩提薩埵菩提佛道名也薩埵秦言大心衆生有大心入佛道名菩提薩埵無正名譯也大毘婆沙論云何名法輪答是法所成故法為自性故名法輪如世間呼金輪等輪是動轉不住義捨此離彼義能伏怨敵義又圓滿義為轂輻輞三事具足故輪體法即入聖道支也初名小乗法輪者以戒為先次大乗法輪者以智為先華手經曰爾許芥子所墮世界合成一器中滿細沙尚可數知而此菩薩所可勸請諸佛轉於法輪脫度衆生是不可數又以珠輪衆寳華輪香輪金銀綵畫木輪上佛請轉法輪遊於十萬無量世界勸請諸佛轉於法輪度脫衆生者豈異人乎今此發心即轉輪菩薩是也維摩經曰三轉法輪於大千其輪本来常清淨天人得道此為證三寳於是現世間佛國記曰凡佛有四處一者成道處二者轉法輪處三者説法論議伏外道處四者上忉利天為母説法處餘則隨時可現焉思益經曰當知是人轉法輪如轉輪王按思益經此文及大毘婆沙論言如世間呼金輪等輪者俱舍云轉輪王有四種金銀銅鐵輪領一二三四洲諸佛轉於法輪若此等輪矣魏收釋老志序曰其經㫖大抵言生生之類皆因行業而起有過去當今未来歴三世識神常不滅凡為善惡必有報應漸積勝業陶冶粗鄙經無數形藻練神明乃致無生而得佛道文殊問經曰有二世一衆生世即一切衆生也二行世即衆生住處大論明三種世間一者五衆二者衆生三者國土間之與界名異義同間是隔别間差界是界畔分齊界有二種一者十界二者三界十界者地獄餓鬼畜生修羅人天此名六凡聲聞縁覺菩薩佛此名四聖二三界者一欲界飲食睡眠婬慾於此三事希須名欲若有情界從他化自在天至無間獄若器世界乃至風輪皆欲界攝二色界者形質清淨身相殊勝未出色籠故名色界三無色界者於彼界中色非有故此云生生世界者按諸經皆序衆所知識以為㑹證一佛土有百億四天下一四天下各有釋梵并諸天龍神夜叉乾闥婆阿修羅迦樓羅𦂳那羅摩睺羅伽等在座聽法此於諸經皆然難可徧指言佛轉法輪時世界生生之類皆来聽法也豈直優波提舍祗夜脩多而已哉優波提舍此云逐分别所説義翻論義祗夜此云重頌亦曰應頌即伽陀伽陀此云孤起亦曰諷頌舊曰偈從正音言頌脩多羅此云契經或云脩單蘭或云脩妬路或名素怛覧或以經字翻脩多羅脩多羅即長文散説也法華經曰或説脩多羅伽陀及本事譬喻并祗夜優波提舍經按十二分教亦云十二部經一脩多羅契經二祗夜應頌三和伽羅受記四伽陀諷頌五陀羅因縁六優陀耶自説七伊目多本事八闍陀伽本生九毘佛略方廣十阿浮達磨未有十一婆陀譬喻十二優波提舍論義若小乗只有九部無自説授記方廣等言二乗經文非止論義應頌契經三種而巳也是以熈連禪河質多羅樹長阿含經曰世尊入拘尸城雙樹間敷置牀座佛取滅度舍利出城北門渡熈連禪河到天冠寺而闍維之釋法顯佛國記曰拘那竭城北雙樹間希連河邊世尊於此北首而般泥洹水經注引此作希連禪河大經云三十三天有波利質多羅樹其根入地深五由旬高百由旬枝葉四布五十由旬其香開敷香氣周徧五十由旬又翻間錯莊嚴衆雜色華周帀莊嚴法華文句指此為天王樹也七處八會三清疑作請四説七處八會見華嚴經按華嚴經有二本初晋譯二唐譯晉義熈十四年北天竺三藏佛度跋陀羅此云覺賢於揚州謝司空寺翻梵本三萬六千頌成晉經六十巻三十四品八會至唐證聖元年于闐三藏實又難陀此云喜學於東都佛授記寺再譯舊文兼補諸闕計益九千頌通舊總四萬五千頌合成唐本八十巻三十九品九㑹子山後周時人在唐以前所見晋譯故云七處八㑹若唐譯則有九會矣云七處八㑹者按經文初㑹菩提場説經為一處二會普光明殿為一處三會忉利天為一處四㑹夜摩天為一處五㑹兠率天為一處六㑹他化天為一處八會逝多林為一處凡七處其八㑹之中第七重會普光明殿與第二會同處是七處八會也三清疑作三請按法華經舍利弗三請而佛三止之至四乃説故云三請四説法華經曰爾時世尊從三昩安祥而起告舍利弗諸佛智慧甚深無量其智慧門難解難入舍利弗取要言之無量無邊未曾有法佛悉成就止舍利弗不須復説爾時舍利弗白佛言世尊何因何緣慇勤稱歎諸佛第一方便甚深微妙難解之法我自昔来未曽從佛聞如是説今者四衆咸皆有疑惟願世尊敷演斯事爾時佛告舍利弗止止不須復説若説是事一切世間諸天及人皆當驚疑舍利弗重白佛言世尊惟願説之佛復止舍利弗若説是事一切世間天人阿修羅皆當驚疑增上慢比丘將墜於大坑爾時舍利弗重白佛言世尊惟願説之今此會中如我等比百千萬億世尊已曾從佛變化必能敬信長夜安隱多所饒益爾時世尊告舍利弗汝巳慇懃三請豈得不説汝今諦聽善思念之説此説時㑹中有比丘比丘尼優婆塞優婆夷五千人等即從座起禮佛而退所以者何此軰罪根深重及增上慢未得謂得未證謂證有如此失是以不住世尊黙然而不制止佛告舍利弗諸佛如来時乃説之如優曇鉢華時一現耳諸世尊惟以一大事因緣故出現於世惟以佛之見知示悟衆生但以一佛乘故為衆生説法無有餘乗若二若三一切十方諸佛法亦如是又按法華經如来夀量品彌勒菩薩亦三請不止而告之言皮紙骨筆木葉山花楊衒之洛陽伽藍記曰王城東南行八日如来投身餓虎之處山頂有收骨寺三百餘僧王城南一百餘里有如来昔作摩休國剝皮為紙折骨為筆處阿育王起墖籠之舉高十丈折骨之處髓流著石觀其脂色肥膩若新酉陽雜俎曰貝多出摩伽陀國長六七丈經冬不凋此樹有三種一者多羅娑力叉貝多二者多梨婆力叉貝多三者部婆力叉多羅梨並書其葉部闍一色取其皮書之貝多是梵語漢翻為葉貝多婆力叉者漢言葉樹也西域經書用此三種皮葉若能保護亦得五六百年嵩山記稱嵩高等中有思惟樹即貝多也雜俎又曰西域書六十四種有樹葉書西域記曰多羅樹林三十餘里其葉長廣其色光潤諸國書寫莫不采用翻譯云多羅舊云貝多此翻岸刑如此方㯶櫚直而且高長八九十尺花如黄米子象貝之所未勝龍藏之所不盡言經籍之多也大智度論云那珈或名龍或名象是五千阿羅漢諸羅漢中最大力以是故言如龍如象水行龍力大陸行象力大故負荷大法者比之龍象别行疏云龍有四種一守天宫殿持令不落二興雲致雨三地龍決江開瀆四伏藏守轉輪王大福人藏也此云龍藏者是伏藏龍如龍樹菩薩入龍宫看藏見華嚴三本矣雖復銀函東度金㲲南翻神仙傳曰隂長生裂黄表冩用經一通黄金之簡刻而書之封以白銀之函此云銀函者亦謂佛經封以白銀之函也長阿含經曰爾時福貴被二黄金㲲價值百千即從座起長跪又手而白佛言今如此㲲奉上世尊願垂受納佛告福貴汝以一㲲施我一施阿難爾時福貴承佛教㫖一奉如来一施阿難佛愍彼故即為納受爾時世尊為福貴説法示教利喜巳即從座起頭面禮足歡喜而去其去未乆阿難尋以黄金㲲奉上如来如来哀愍即為受之被於身上云東度者佛居西域謂中國為東言佛教入中國也樓炭經曰蔥河以東名為震旦以日初出耀於東隅故得名也翻譯云震旦或云真丹或云旃丹華嚴音義翻為漢地琳法師云東方屬震是日出之方也云南翻者按天下有四樓炭經説須彌山北天下名鬱單越東名弗於逮西名俱耶尼南名閻浮利閻浮利樹名西域記云北拘盧洲東毗提訶洲西瞿尼洲南贍部洲瑞應經云迦維羅衛者三千日月萬二千天地之中央也按佛生迦維在南方閻浮利世界地居天中自稱中國此云南翻蓋翻以彼土之言謂東度則譯以華言南来則翻以梵語也秦景遥傳竺蘭私記高僧傳曰漢明帝夜夢金人飛空而至乃遣博士弟子秦景等徃天竺尋訪佛法又曰竺法蘭中天竺人也自言誦經論數萬章為中天竺學者之師時蔡暗既至彼國相隨間行而至既達洛陽便善漢言暗於西域獲經即為翻譯所謂十地斷結佛本僧法海藏佛本行四十二章等五部會移都冦亂四部失本不傳江左惟四十二章經今見在可二千餘言漢地見存諸經惟此為始也按佛説四十二章經後漢迦葉摩騰竺法蘭同譯魏收釋老志序曰孝明帝遣郎中蔡暗博士弟子秦景等使於天竺寫浮屠遺範暗仍與沙門攝摩騰竺法蘭東還洛陽中國有沙門及拜跪之法自此始也譬猶海水之一珠不下崑山之片玉言佛法廣大秦景竺蘭諸篇未盡其萬一也曹子建贈丁翼詩曰譬海出明珠潘正叔贈王元貺詩曰崑山積瓊玉呂氏春秋曰人不愛崑山之玉江漢之珠高誘曰崑山之玉燔以爐炭三日三夜色澤不變玉之美者也史記龜策傳曰王獨不聞玉犢隻雉出於崑山明月之珠出於四海若夫法雲深藏師子雷音法雲彌布徧覆之義深藏所謂法海藏也師子梵云僧伽彼或云􅀈多又僧伽梁云小師子即狻猊也佛稱人中師子雷音者如来具五種聲之一也華嚴經曰不壊法雲徧覆一切劉蚪法華經注曰雲譬應身菩薩處胎經曰金翅鳥從龍子到海宫殿彼有七寳墖諸佛所説諸法深藏維摩經曰諸佛威神之所建立為䕶法城受持正法能師子吼名聞十方又曰演法無畏猶師子吼其所講説乃如雷震肇曰師子吼無畏音也凡所言説不畏羣邪異學喻師子吼衆獸下之師子吼曰美演法也又曰師子吼菩薩雷音菩薩如是等三萬二千人從餘四天下来詣佛所而為聽法彼時佛師子之座蔽於一切諸来大衆師子智度論云佛為人中師子凡佛所坐若牀若地皆名師子座夫師子獸中獨歩無畏能伏一切佛亦如是於十六種外道一切人天中一切降伏得無所畏故稱人中師子爾雅郭注云師子出西域法華經曰震實法雷音梵志徃生聲聞説戒梵志者謂淨行志道梵是西音清淨之謂梵志此云淨裔即婆羅門聲聞猶言弟子下乗名也普門疏云婆羅門此云淨行初種族山野自閑故人以淨行稱之肇曰秦言外意其種别有經書世世相承以道學為業或在家或出家多恃巳道術我慢人也應法師云此訛略也具云婆羅賀磨拏義云承習梵天法者其人種類自云從梵天口中生四姓中勝獨取梵名惟五天竺有餘國即無諸經中梵志即同此名正云淨裔稱是梵天苖裔也瑞應經曰迦葉二弟問迦葉曰今乃捨梵志道學沙門法按瑞應稱迦葉初為事火外道嘗稱佛是大沙門神則神矣然未得道故不如我已得羅漢也佛語迦葉汝非羅漢亦不知真道胡為妄自稱貴乎按此知梵志與沙門為二雖有清淨之名然恃巳道術自我慢人未得謂得猶為外道未許度脫生死惟阿羅漢於後世更不生不受生死果報此梵志未得羅漢道猶徃生也云往生者修行本起經曰精神受形周徧五道一身死壊復受一身是也阿闍世王經曰何謂三藏聲聞藏辟支藏菩薩藏聲聞藏者從他人聞故聞其音故又云有三藏學聲聞學者用有度故但自明故戒因縁經曰目犍連者於聲聞中大神足第一阿難者世尊亦説於聲聞中多聞第一瑜伽論云諸佛聖教聲為上首從師友所聞此聲教展轉修證永出世間小行小果故名聲聞攝大乗論云如来制戒有二意一為聲聞自度故二為菩薩自度度他故僧肇曰下乗道非獨覺要師而後成故名聲聞乗亦名弟子乗也法華論四種聲聞一决定聲聞定入無餘故二增上慢聲聞未證謂證故三退菩提聲聞退大取小故四應化聲聞内袐外現故釋道安戒因縁經序曰世尊制戒必有所因六羣比丘生於貴族攀龍附鳳雖出家而豪心不盡鄙悖之行以斯成戒按三藏中菩薩乗為大乗辟支聲聞為小乗聲聞最下大乗先智小乗先戒佛為諸弟子結戒故云聲聞説戒也此梵志聲聞一為外道一為小乗未臻至極下文羅漢菩提始稱真人得道矣雪山羅漢之論佛生迦維國在雪山北故云雪山羅漢羅漢者真人也長阿含經曰昔有輪王姓甘蔗氏聽次妃之譖擯四子至雪山北自立城居以徳歸人不數年間鬱為强國父王悔憶遣使往召四子辭過不還父王三歎我子釋迦因此命氏按釋迦此云能仁故瑞應稱佛為太子自言國名迦維在雪山北矣佛國記曰蔥嶺冬夏有雪彼土人人即名為雪山人也度嶺巳到北天竺四十二章經曰佛言辭親出家識心達本解無為法名曰沙門常行二百五十戒進止清淨為四真道行成阿羅漢阿羅漢者能飛行變化曠劫夀命住動天地修行本起經曰葢聞沙門之為道也捨家妻子捐棄愛欲斷絶六情守戒無為得一心者萬邪滅矣一心之道謂之羅漢羅漢者真人也聲色不能汙榮位不能屈難動如地已免憂苦存亡自在太子曰善哉惟是為快亦見瑞應經及佛國記大論云阿羅名賊漢名破一切煩惱賊破復次阿羅漢一切漏盡故應得一切世間諸天人供養又阿名不羅漢名生後世中更不生是名阿羅漢法華疏云阿颰經云應真瑞應云真人悉是無生釋阿羅漢也或言無翻名含三義無明穅脫後世田中不受生死果報故云不生九十八使煩惱盡故名殺賊具知斷功徳堪為人天福田故言應供含此三義故存梵名鷲嶺菩提之法鷲嶺在王舍城梵云耆闍崛山是也梵云菩提華言道也佛國記曰入谷搏山東南上十五里到耆闍崛山未至頭三里有石窟南向佛本於此坐禪西北三十步復有一石窟阿難於中坐禪天魔波旬化作雕鷲住窟前恐阿難佛以神足力隔石舒手摩阿難肩佈即得止鳥跡手孔今悉存故曰雕鷲窟山其山峰秀端嚴是五山之最高也大論云耆闍名鷲崛名頭是山頂似鷲增一佛告諸比丘此山久逺同名靈鷲觀經疏云諸聖仙靈依之而住釋氏西域記曰耆闍崛山在阿耨達山王舍城東北望其山有兩峰雙立相去二三里中道鷲鳥常居其嶺土人號曰耆闍崛山山名耆闍鷲也應法師云按梵本無靈義此鳥有靈知人死活故號靈鷲婆沙云其山三峰如仰雞足似狼之迹亦名狼迹又名普賢山白墡山仙人山負重山四十二章經曰觀靈覺即菩提西域記曰在摩竭國尼連河西南十里有樹名菩提長阿含經曰何等時佛生何等時出家何等時成道又云八日如来生八日佛出家八日成菩提按此知菩提言道也僧肇維摩經注曰佛於樹下成道樹名菩提又曰道之極者稱曰菩提秦無言以譯之菩提者葢是正覺無相之真智乎本無極際何可勝言言佛乗不可思議非世間語言文字所能窮究也𢎞農五張寺者南陽張元高寓居此地漢書地志云南陽郡秦置屬荆州昔者千金之族見徙五陵大姓之民移家六郡蓋其流也言張元高本南陽人寓居𢎞農如五陵豪族六郡良家也三輔黄圖曰高祖都長安徙諸齊田楚屈昭景及諸功臣於長陵後世世徙吏二千石高貲富人及豪傑兼并之家於諸陵强本弱末以制天下西都賦曰北眺五陵謂長安陽茂平此五陵也漢書曰漢興六郡良家子選給羽林期門師古曰六郡謂隴西天水安定北地上郡西河也元高五子負荷遺訓言張元高子兄弟五人也左氏傳曰其父析薪其子弗克負荷離經辨志並是成名入室生光咸能顯徳禮記曰十年視離經辨志搜神記曰中興初有應樞者生四子而盡見神光照社初探試之乃得黄金自是諸子官學並有芳名至瑒七世顯加以尊承慧業敬受法門維摩經曰知一切不取不捨入一相門起於慧業僧肇注云决衆生念定諸法相然後説法故繫之以智造心分别法相令入一門故繫之以慧也别本云智業慧業又肇云言為世則謂之法衆聖所由謂之門兄弟同居共捨為寺伽藍肇建即以五張為名梵云僧伽藍摩或云僧伽羅摩此云衆園五分律云瓶沙王施伽蘭陀竹園為始也園者生植之所佛弟子居之取住植道本之義也或云毘阿羅此云遊止處知是城居趙信仍名趙信之城殿入蕭何即號蕭何之殿漢書匈奴傳曰前将軍翕侯趙信兵不利降匈奴趙信者故胡小王降漢者也衞青霍去病撃匈奴北至寘顔山趙信城而還孟康曰趙信所作因以名城漢宫閣銘曰蕭何韓信曹參並有殿見藝文類聚加以象馬無恡衣裘是捨報恩經曰如来為一切父母故當修難行苦行難捨能捨頭目髓腦國城妻子象馬七寳輦轝車乗衣服飲食臥具醫藥一切給與春園栁路變入禪林蠶月桑一作霜津廻成定水言本住宅改為佛寺也六度有禪定謂布施持戒忍辱精進禪定智慧也修行經曰王問太子何如對曰在閻浮樹下一心禪定又曰念道清淨不宜在家當處山林研精行禪毘婆沙論云禪者此云普智謂可得道亦能棄結阿毘曇論云謂以斷結正觀名禪三千威儀經曰坐禪有十事四閑處謂山間林下也詩云蠶月條桑郡國志云平陽有采桑津維摩經曰八解之浴池定水湛然滿什曰水之為用除垢去熱解脫之性亦除熱去礙既定意足湛然滿矣平輿雖盛豈可獨擅二龍扶風最良不得專稱五馬汝南先賢傳曰謝子微見許子將兄弟弱冠時則曰平輿之淵有二龍焉許䖍字子政平輿人䖍弟劭字子将襄陽耆舊傳曰蜀馬良字季常宜城人也兄弟五人並有才名鄉里為之諺曰馬氏五常白眉最良良眉中有白毛故以稱之以喻五張兄弟矣寺主三藏大法師法映寺主者梵云摩摩帝或云毗呵羅莎弭此云寺主僧史略云詳其寺主起於東漢白馬寺也寺既爰處人必主之於時雖無寺主之名而有知事之職東晋以来此職方盛故梁武造光宅寺召法雲為寺主創立僧制三藏經律論又菩薩辟支聲聞為三藏又阿含毗尼阿毗曇為三藏注並見前釋道安戒因縁經序曰阿難出經分為十二部又抄十二部為四阿含阿毘曇鼻奈耶三藏備也天竺學士罔弗尊焉諷之詠之未墜於地其大高座沙門則兼該三藏中下高座則通一通二而已耳雜阿含經云何名法師佛言若於色言猶生厭離欲滅盡寂静法者名法師若於受想行識説是生厭離欲滅盡寂靜法者名法師三藏大法師者言學通三藏也法映僧名如古法蘭法顯皆取佛法以為名也邑主洛州刺史張隆等隋書地理志云河南郡舊置洛州又云洛陽漢已来舊都後魏置司州東魏改曰洛州後周置東京六府洛州總管按刺史治總管府控督諸州郡守所治惟一郡之地時子山為𢎞農守張隆為洛州刺史陕州𢎞農並𨽻洛州也財行法檀一作財法行檀身心罄竭財行謂財施法檀謂法施也法界次第云檀那秦言布施布施有二種一者財施二者法施財施者所謂飲食衣服田宅六畜奴婢珍寳一切已之所有資身之具及妻子乃至身命屬他為他財物故云捨身猶屬財施有所須者皆能施與皆名財施也法施者若從諸佛及善知識聞説世間出世間善法若從經論中聞若自以觀行故知以清淨心為人演説皆名法施一作財法行壇者亦謂財法二施也又維摩經什曰施有三種一財施二心施三法施以財施人名為財施慈悲等心與人樂名為心施説法利人名為法施此云身心罄竭兼心施也兼化鄉邑道俗數千敬造一切徳輪見成三百餘部琅笈一作雷篆雲書金䋲玉檢削蒸栗之簡裝酸棗之珠禹貢云球琳琅玕孔傳云琅玕石而似玉山海經曰崑崙山有琅玕樹爾雅云西北之美者有崑崙虚之璆琳琅玕焉笈書箱也史記云蘇秦負笈從師謝承後漢書曰袁宏負笈尋師高𢎞負笈單歩郎余負笈賣卜徐穉負笈赴弔又蘇章李固包咸並有負笈之事此云琅笈猶玉箱矣晋書衞恒四體書勢曰勢似凌雲法華經曰黄金為䋲以界入道白虎通曰封禪金泥銀繩或石泥金繩封以印璽漢書孟康注曰有金䇿石函金繩玉檢之封焉魏文帝與鍾大理書曰竊見玉書稱美玉白如截肪黑譬純漆赤擬雞冠黄侔蒸栗按此知蒸栗之簡謂黄玉簡也魏志東彞傳曰夫餘國出美珠珠大者如酸棗言此經藏皆七寳莊嚴也並入香城咸封禪閣維摩經曰上方界分過四十二恒河沙佛有國名衆香佛號香積其國香氣比於十方諸佛世界人天之香最為第一其界一切皆以香作樓閣經行香地苑園皆香其食香氣周流十方無量世界禪閣注見下文僧徒雲集不逺燉煌之城句坐堂伏檻羌非湘水之神緑房紫的足擬恭王之殿宋玉招䰟曰坐堂伏檻臨曲池羗非疑作差非又按楚人語辭有稱羗者離騷曰羗内恕已以量人兮王逸注曰羗楚人語詞也猶言鄉何為也楚詞稱羗者非一王逸魯靈光殿賦曰緑房紫的序云魯靈光殿者景帝程姬之子恭王之所立也初恭王始都下國好治宫室遂因魯僖基兆而營焉高掌西望長河北臨張衡西京賦曰巨靈贔屭髙掌逺蹠以流河曲薛綜曰巨靈河神也古語云此本一山當河水過之而曲行河神以手擘開其上足蹋離其下中分為二以通河流手足之跡於今尚在鼎氣常浮爐煙咸起言河水上蒸如浮鼎氣華山出雲若起爐煙也戸牖寥廓吹萬龍門之風梁棟崢嶸落實一作客河源之樹甘泉賦曰閌閬閬其寥廓兮似紫宫之崢嶸師古曰寥廓宏逺也崢嶸深邃也莊子曰夫吹萬不同而使其自巳也三秦記曰龍門一名河津去長安九百里水懸絶龜魚莫能上上則化為龍矣世説曰李元禮有升其堂者皆以為登龍門又按釋氏亦有稱龍門者高僧慧持逺法師之弟性格清峻解行並髙領徒千人凡有升堂入室者皆號登龍門漢書西域傳曰河有兩源一出蔥嶺云河源之樹者即所謂閻浮提樹也大論云閻浮樹名提名為洲此洲上有此樹林林中有河底有金沙名閻浮檀金以閻浮樹故名閻浮洲長水云或云閻浮果汁㸃物成金因流入河染石為金左氏傳曰我落其實而取其材僧徒雲集不逺燉煌之城學侣相奔更合華隂之市後漢郡國志曰涼州燉煌郡古𤓰州也燉煌龍勒有玉門關説文曰僧西域道人也言僧徒之多不異西域也典録云罽賔禪師法秀初至燉煌立禪閣於閒曠地植奈千株趨者如雲徒衆濟濟按法秀梵云曇摩密多宋文元嘉時人後漢書曰張楷隱於𢎞農山中學者隨之所居成市後華隂山南遂有公超市言寺門如市也按此法會合鄉邑道俗故兼稱僧徒學侶也兩陜昔分實基王化二陵今阻翻馳羽檄公羊傳曰自陜以東周公主之自陜以西召公主之左氏傳曰崤有二陵焉其南陵夏后臯之墓其北陵文王之所避風雨也漢書高祖曰吾以羽檄馳天下兵言陜州𢎞農郡有陜縣即周召分陜之地又有二崤即左傳所謂二陵風雨之處也實基王化者謂後周之澤翻馳羽檄者謂周齊方交兵也按陜州魏置後周又置崤郡置兵於此備齊虞公屈産交亂風塵召伯甘棠凋零霜露左氏傳曰晋以屈産之乗與垂棘之璧假道於虞以伐虢詩召南云蔽芾甘棠勿剪勿伐召伯所茇言兵革之後州郡故多荒殘也雖復兼疑作亷能共治未遣渡河之獸烽柝是警實擾移關之民後漢書曰劉昆為𢎞農太守先是崤黽驛道多虎災行旅不通昆為政三年仁風大行虎皆負子渡河帝聞而異之烽説文作熢燧候表也邉有警則舉火易繫辭云重門撃柝以禦暴客鄭康成云手持兩木以相敲是為撃柝守備警戒也漢書武帝紀注應劭曰樓船將軍數有大功恥為關外民上書乞徙東關以家財給其用度武帝意亦好廣濶於是徙關於新安去𢎞農三百里後漢郡國志曰𢎞農故秦函谷關新安屬𢎞農郡言雖亷能之吏不能施恩澤於民也是以法王御世天人論道汲引四流周圓五怖故能調伏怨憎消除結縛維摩經曰法王法力超羣生常以法財施一切巳於諸法得自在是故稽首此法王僧肇曰俗玉以俗力勝民故能澤及一國法王以法力超衆故能道濟無疆又曰世王自在於民法王自在於法修行經曰佛念昔定光佛别我為佛名釋迦文如来至真等正覺明行足為善逝世間解無上士道法御天人師號佛世尊菩薩地持經曰如来有十種名稱功徳為一切法道師故名天人師大智度論曰欲流有流無明流有見流王巾頭陀寺碑文云引之於有則高謝四流是也佛地論云一不活畏二惡名畏三死畏四趣畏五怯畏畏亦怖也四十二章經曰佛言人從愛欲生憂從憂生怖若離於愛何憂何怖注云五種怖畏所謂不活怖惡名怖大衆威徳怖死怖墮惡道怖也維摩經曰隨所調伏衆生而取佛土什曰梵本云毘尼毘尼秦言善治善治衆生令棄惡行善也調伏旨同而語隱故存其本瑜伽論云善知識具十功徳一調伏初調伏者謂與戒相應由根調故律云世尊謂調伏貪嗔癡令盡故制増上戒學維摩經曰稽首能斷諸結縛又云離衆結縛肇曰無漏之體體絶結縛言必藉法王乃能治此亂世也法水津梁得無砥柱之難香山轍迹非復終南之險維摩經曰當禮法海徳無邊肇曰法輪淵廣難測法海流潤無涯故徳無邊矣世説曰庾公嘗入佛圖見臥佛曰此子疲於津梁於時以為名言漢書師古注曰底柱在陜縣東北在河中形若柱也修行本起經曰太子報言吾出香山之東雪山之北國名迦維又按維摩經須彌等十寳山香山居其一也郡國志曰右扶風武功有太一山本終南括地志曰終南山在雍州萬年縣南五十里言州郡得藉佛力故無險難也天子命我試守此邦墨竈未黔孔席無暖言己除𢎞農郡守棲遑不定也天子謂周明帝也閔帝即位未乆信由司水下大夫出為𢎞農守疑在明帝初年是作當在明帝二年春於𢎞農置陜州之後故題標陜州𢎞農矣班固答賔戱曰聖哲之治棲棲遑遑孔席不暖墨突不黔淮南子曰孔子無黔突墨子無暖席高誘曰黔言其突竈不至於黒坐席不至於温歴行諸國汲汲於行道也纔臨都尉之境即有樓船之役後漢書靈帝中平元年以何進為大将軍将兵屯都亭置入關都尉官注云謂函谷廣城伊關大谷轘轅小平津孟津也函谷去𢎞農三百里都尉之境謂函谷也樓船之役楊僕事漢書曰楊僕為樓船將軍以僕本移關之人故引用之言纔臨此境即有兵事也既而南風不競北道言旋幕府既開邦君且止左氏傳曰南風不競漢書音義曰帝就拜大將軍於幕中因曰幕府晋書何曾上疏曰郡守之權雖輕猶專任千里比之於古則列國之君也論語云邦君之妻按邦君古諸侯之稱後世郡守亦似之矣鄉俗耆老依然此别屬兹法事須余制文以上言伐齊之師時方振旅故信止宿此寺遇兹法事屬制碑文也云鄉俗耆老依然此别者按信出守𢎞農未乆入為司憲疑即以是時徵明帝武成元年亊也故明年有正旦上司憲府之詩至二月雙鶴飛集上林信奏事堦墀立使為讚鶴讚記其年月可考也聊以課虚為銘云爾陸機文賦曰課虚無以為有舍衞之國衹洹之園浮屠經曰臨兒國王隱屠太子父曰屠頭邪母曰莫邪屠生處名袛洹精舍在舍衞國南四里是長者須達所起又有阿輸伽樹是太子所攀樹也括地志云沙袛大國即舍衞國也在月氐南萬里即波斯匿王浚處其九十種知身後亊城有袛樹給孤園佛國記云到拘薩羅國舍衞城城内人民稀曠都有二百餘家即波斯匿王所治城也大愛道故精舍處出城南門千二百步道西長者須達起精舍即所謂袛洹精舍也袛洹精舍本有七層諸國王人民競興供養懸繒幡葢散花燒香燃燈續明日日不絶三明極地八會窮源佛十號有明行足梵云鞞侈遮羅那三般那秦言明行足大論云宿命天眼漏盡名為三明三乗雖得三明明不滿足佛悉滿足是為異也具足三明生六神通智論云一如意二天眼三天耳四他心五識宿命通六無漏通也維摩經曰佛身即法身也從六通生從三明生僧肇曰天眼宿命漏盡為三明也世説曰汰法師云六通三明同歸正異名耳注經云三明者解脫在心朗照三世者也王巾頭陀寺碑文云氣茂三明八會注見本序連河競説勝辯爭論連河具足云希連禪河注見本序維摩經曰念定總持辯才不斷肇曰辯才七辯也波提東度祗夜南翻波提具足云優波提舍波提祗夜俱注見本序非空即色離有無言維摩經曰喜見菩薩曰色色空為二色即是空非色滅空色性自空如是受想行識識空為二識即是空識性自空於其中通而達者為入不二法門支道林集妙觀章云夫色之性也不自有色色不自有雖色而空故曰色即是空色復異空僧肇維摩經注曰不可得而有不可得而無者其惟大乗乎何則欲言其有無相無名欲言其無萬徳斯行萬徳斯行故雖無而有無相無名故雖有而無然則言有不乖無言無不乖有也達人止是疑作足獨悟重昏鶡冠子曰達人大觀張協詠史詩曰達人知止足王巾頭陀寺碑文云重昏夜曉李善注云頭陀經心王菩薩曰我見覆蔽飲雜毒酒重昏長寢云何得悟慈心是語使得開解身雖繫馬一作鳥心避騰猿維摩經曰難化之人譬如象馬􅙸悷不調加諸楚毒乃可調伏什曰馬有五種第一見鞭影即調伏第二得鞭乃伏第三以利錐刺皮乃伏第四穿肌乃伏第五徹骨乃伏衆生利鈍亦有五品第一但見他無常其心乃悟第二見知識無常其心乃悟第三見兄弟親戚無常其心乃悟第四見父母無常其心乃悟第五自身無常極受苦惱復加以苦言其心乃悟也又維摩經曰以難化之人心如猿猴故以若干種法制御其心乃可調伏禪樓却月義殿翔鵾長阿含經曰月宫殿四方逺見故圓禪樓却月者取其圓也若荆州記云沔口水北却月城矣張茂先鷦鷯賦云彼鷲鶚鵾鴻孔雀翡翠或陵赤霄之際或託絶垠之外李善曰鵾状如鶴而大義殿翔鵾言殿之高也廻風香葢反露珠幡維摩經曰寳積與五百長者子俱持七寳葢来共供養佛律有二種葢一竹葢二葉葢西域僧有持竹葢有持傘者此云香葢如古華葢芝葢之類供佛寳葢也翻譯云梵語剌瑟胝此云竿即幡柱也長阿含經曰若沙門於此法中勤苦得一法者便當竪幡以告四逺今有少欲知足人居此西臨砥柱東背轘轅砥柱注見本序隋志河南陕縣有砥柱左傳襄二十一年云欒盈過周王使候出諸轘轅杜注云關在緱氏縣東南後漢書郡國志曰河南緱氏縣有轘轅關臣瓚曰險道名在縣東南河鳴陽硤山響蘇門顔延年侍遊蒜山詩曰入河起陽硖李周翰曰秦築長城渡河據陽山峽山側也魏氏春秋曰阮籍少時嘗遊蘇門山蘇門山有隱者莫知姓名有竹實數斛而已籍從之與談太古無為之道及論五帝三王之義蘇門生蕭然曾不經聽籍乃對之長嘯清韻響亮蘇門生逌爾而笑籍既降蘇門生亦嘯若鸞鳯之音焉至是籍乃作蘇門先生之論以寄所懐翔禽歌囀流澗絃喧渡河餘獸移關舊村注見本序昔為畿服今成塞垣説文曰畿天子千里地服如禹貢甸服秸服侯服綏服要服荒服是也地理郡國二志稱𢎞農郡武帝元鼎四年置故秦函谷關建武十五年屬雒陽西南四百五十里是𢎞農東西京皆畿内之地言魏都洛陽𢎞農本畿服内地今周齊交兵翻成塞垣也城疑廣武地似樓煩郡國志曰河南滎陽有廣武城注云漢祖與項籍語處漢書項籍傳曰羽軍漢軍至廣武相守羽令壮士出挑戰漢有善騎射曰樓煩楚挑戰三合樓煩輒射殺之羽大怒自披甲持㦸挑戰樓煩欲射羽瞋目叱之樓煩目不能視手不能發走還入壁不敢復出漢王使間問之乃羽也漢王大驚於是羽與漢王相與臨廣武間而語按上句城疑廣武樓煩即是廣武相守之事云地似樓煩者當謂樓煩縣也史記趙世家曰主父行新地出代西遇樓煩王於西河而致其兵地理志云樓煩屬雁門應劭曰故樓煩胡也故城在代州崞縣東北言此𢎞農東西周齊相守如楚漢相語之城趙胡致兵之地也爟烽並照象馬單奔張宴曰爟火烽火也方言曰烽虞望也郭璞云今烽火是也後漢書光武紀昆陽之戰云又驅諸猛獸虎豹犀象之屬以助威又左傳有象燧又云不介馬而馳又云恃險而多馬按象馬所以驅戰故云象馬單奔無鐘襲莒有雨圍原莒已姓國隱二年始見春秋杜云莒國城陽莒縣是文八年穆伯奔莒從已氏是莒國已姓也云無鐘襲莒者按左傳莊二十九年例云有鐘鼔曰伐無曰侵輕曰襲正義曰釋例曰侵伐襲者師旅討罪之名也鳴鐘鼔以聲其過曰伐寢鐘鼓以入其境曰侵掩其不備曰襲此所以别興師用兵之狀也其襲莒之事按春秋昭元年三月取鄆傳曰季武子伐莒取鄆杜預曰兵未加莒而鄆服故書取而不言伐又襄十三年傳例云凡書取言易也按此傳例夫伐則有鐘鼓矣襲既曰輕取亦言易取襲義同類無鐘鼓其即武子争鄆取不書伐之謂矣左傳僖二十五年云晉侯圍原按傳無遇雨之文有雨圍原是所未詳又左傳襄十八年云楚師伐鄭涉於魚齒之下甚雨及之楚師多凍役徒幾盡按左傳弦高云鄭國之有原圃杜云在滎陽中牟縣又按魚齒山亦在滎陽疑鄭有原圃之名楚師伐鄭甚雨及之得稱有雨圍原矣注詳賀婁公碑文不資十方誰釋三一作二怨律有四方僧物鈔言十方常住謂於一寺中供僧成熟飲食等以體通十方惟局本處名十方僧以此物十方有分故裕師寺誥云寺是攝十方一切衆僧修道境界法為待一切僧經遊來往受供處所無彼無此無主無客僧理平等同䕶佛法故其中飲食衆具悉是供十方凡聖同有鳴鐘作法普集僧衆同時共受與檀越作生福之田如法及時者皆無遮礙是宜開廓遠意除蕩鄙懐不吝身財䕶持正法左傳僖二十八年城濮之戰先軫曰楚有三施我有三怨怨讎已多将何以戰已上言周齊數有疆埸之事怨讎衆多不藉十方佛力焉能釋其衆怨是此寺可以濟世也風傾地柱火及天元樓炭經曰佛語比丘天地有三災變一者火災變二者水災變三者風災變天地共遭大風災變時天下施行積善喜好道徳皆復上十七天上為天人然後天下人乃盡索後乃乆乆大風起名曰來柯沙上行至故十六天上下至阿須倫天破壊消滅悉盡天下日月所照中萬物四天下及八萬城諸大山及須彌山盡竟鐵圍大山皆靡消滅亡悉盡索無餘譬如大風吹微麫隨漂消散微盡無餘矣遭火變者天下人民皆行非法奉邪見不見正行行十􅁖故天雨不時節天不雨以後是天下所有樹木草藥萬物皆枯死不復生世間有七日出四天下及八萬城諸大山須彌山王四天王忉利天燄摩天兠術天尼摩羅天波羅尼蜜天梵迦夷天宮皆簸峩動揺也風高諸天上著阿衛貨羅天彼諸初生天子見火皆恐怖先生諸天子語初生天子汝莫怖恐我昔更見燒時火齊此不過爾時四大天下及八萬城諸大山須彌山皆簸峩動揺須彌山王四千里一崩墮至二萬八千里而崩墮譬如脂膏濕著大火中即無煙亦無餘矣須彌山王盡破壊無復有焦土山處諸沈犁一切皆破壊滅盡已後畜生禽獸餓鬼阿須倫皆復無盡已後人皆死盡及四天王忉利天燄摩天兠術天無貢高天他化自轉天梵迦夷天人皆滅盡是謂天地燒之皆會一處天地共遭大風災變時竟一劫後復更始生之法復如遭火災變後復更始生一劫乃成竟第十五天上人其薄禄者来下悉填滿十一重天人所居及阿須倫天在須彌山四面本故所居處悉皆充滿風傾地柱火及天元者謂風災火災也博物志曰地下有四柱四柱廣十萬里黄帝内經鬼臾區曰臣積考太始天元冊文云云著之玉版藏之金匱署曰天元紀銀鉤永固金牒長存索靖草書狀曰宛若銀鉤衞夫人筆陣圖曰六藝之奥莫匪乎銀鉤劉義恭詩云金牒封梁甫説文曰牒札也封君馬首方事南蕃左氏傳荀偃令曰雞鳴而駕塞井夷竈惟余馬首是瞻欒黶曰余馬首欲東南蕃謂𢎞農郡為國蕃屏在西京之南也言從楊僕請謝劉昆楊僕劉昆注見本序温湯碑温湯碑者𢎞農温湯子山除郡守時作也温湯所在下有流黄或有丹砂白礬此三種在下蒸為暖氣後周王褒温湯碑云地伏流黄又云白礬上散丹砂下沈知温湯有此三物也天下所有温湯之處非一子山羇旅長安足跡所及不越周秦之地按隋志稱京兆郡盩厔後周置周南郡有倉城温湯新豐有温湯𢎞農有温湯舊傳京兆驪縣有温湯𢎞農京兆接界自漢以後多有析置開山圖曰麗山西北有温池王褒温湯碑云挺此温谷驪岳之隂是驪山温湯也隋書地志曰河南陜縣後魏置陜州𢎞農郡有温湯有砥柱疑即驪山西北温池庾信王褒並有碑文是碑子山除𢎞農郡守所立故作此文也咸池浴日先應緑甲之圖淮南子曰日浴於咸池又樂動聲儀曰黄帝樂曰咸池淮南子曰河出丹書洛出緑圖黄帝夢見兩龍挺白圖即帝以授於河之都天老曰天其授帝圖乎黄帝乃齋於河洛之間遊於翠媯大盧魚折漝而至汎白圖蘭采朱文以授黄帝帝舒受之故曰緑圖砥柱浮天始受𤣥夷之命尚書大傳曰河水分流包山而過山見水中如柱然故曰砥柱海賦曰浮天無岸吳越春秋曰禹傷父功不成乃巡衡嶽血馬以祭仰天而嘯因夢赤繡衣男子自稱𤣥夷蒼水使者謂禹曰欲得我山神書者齋焉禹乃退齋三日登宛委發金簡之書得通水之理仁則滌蕩埃氛義則激揚清濁勇則負山餘力弱則鴻毛不勝尸子曰水有四徳沐浴羣生流通萬物仁也揚清激濁蕩出滓穢義也柔而難犯弱而難勝勇也道江疏河惡盈流謙智也抱朴子曰重物宜沈而南海有浮石之山莊子曰藏山於澤謂之固矣然而夜半有力者負之而走列仙傳曰巨鰲負蓬萊山而抃之於滄海之中史記大宛傳曰安息國長老傳聞條枝有弱水西王母而未嘗見索隱曰魏略云弱水在大秦西𤣥中記曰天下之弱者有崑崙之弱水鴻毛不能勝也後漢書曰桓帝時大秦國王安敦遣使自日南徼外来獻或云西有弱水水近西王母處幾於日所入也大荒西經云弱水有二源俱出女國北阿耨達山南流會於女國東去國一里深丈餘闊六十步非毛舟不可濟南流入海阿耨達山即崑崙山也仲春則榆莢同流三月則桃花共下春秋元命苞云三月榆莢落韓詩傳云三月桃花水漢書溝洫志云來春桃花水盛必羨溢有填淤反壤之害其色變者流一作通為五雲之漿其味美者結為三危之露東方朔别傳朔謂武帝曰臣至東極過吉雲之澤其國常以雲氣占凶吉若有喜慶之事則滿室雲氣五色照人著於草樹皆成五色露露味皆甘帝曰吉雲五露可得否曰臣負吉雲草以備此馬此立可得日可二三往可東走至夕而還得𤣥白青黄露盛以青琉璃各受五合授帝帝徧賜羣臣其得之者老者皆少疾者皆除也見别國洞冥記又按五雲者抱樸子曰雲母有五種向日看其色五色並具而多青者名雲英宜以春服之五色並具而多赤者名雲珠宜以夏服之五色並具而多白者名雲液宜以秋服之五色並具而多黒者名雲母宜以冬服之但有青黄二色者名雲沙宜以季夏服之皛晶純白名磷石可以四時長服之也五雲之法或以桂蔥水玉化之以為水或以露於鐵器中以𤣥水熬之為水或以硝石合於筒中埋之以為水或以蜜搜為酪或以秋露漬之百日韋囊挺以為粉或以無巔草樗血合餌之令人長生也呂氏春秋伊尹説湯曰水之美者有三危之露高誘曰三危西極山名煙青於銅浦色白於鉛溪任豫益州記葭萌縣十里有刀鐶山赤銅水出焉地鏡圖曰錢銅之氣望之如青雲吳越春秋若耶之溪涸而出銅鉛溪未詳非神鼎而長沸異龍池而獨湧王子年拾遺記曰禹鑄九鼎五者以應陽法四者以象隂數使工師以雌金為隂鼎以雄金為陽鼎鼎中常滿以占氣象之休否當夏桀之時鼎水忽沸又周禮挈壺氏云及冬則以火爨鼎水而沸之左思蜀都賦曰龍池􅘝瀑濆其隈劉逵注云龍池在朱提南十里地周四十七里公羊傳曰濆泉者湧泉也洒胃湔腸興羸起瘠秦皇餘石仍為雁齒之階漢武舊陶即用魚鱗之瓦博物志曰始皇陵在驪山之北高數十丈周廻六七里運取大石於渭北渚故歌曰運石甘泉口渭水為不流千人唱萬人鉤金陵餘石大如甌按雁齒階級也白帖橋有雁齒續漢書董卓曰杜陵南山下有孝武舊陶處作磚瓦一朝可辨後漢書楊彪傳曰杜陵南山下有武帝故瓦陶竈數千所九歌曰魚鱗屋兮龍堂王逸注云河伯以魚鱗葢屋山間湧水實表忠誠室内江流彌彰純孝後漢書耿恭曰貳師将軍李廣利拔佩刀刺山飛泉湧出又曰廣漢姜詩妻同郡龎盛之女也詩亊母至孝妻奉順尤篤母好飲江水妻嘗泝流而汲子因逺汲溺死妻恐姑哀傷託以行學不在姑嗜魚鱠夫婦力作供鱠舍側忽有湧泉味如江水毎旦輒出雙鯉魚焉豈若醴泉消疾聞乎建武之朝神水蠲疴在乎咸康之世尚書中候曰俊乂在官則醴泉出也後漢書曰光武中元元年夏京師醴泉湧出飲者固疾皆愈惟眇蹇者不瘳三秦記曰驪山湯舊説以牲祭乃得入可以去病俗云秦始皇與神女遊而忤其旨神女唾之則生瘡始皇怖謝神女為出温泉而洗除後人以為驗建武光武即位年號也咸康疑作咸陽秦都也嵩岳一作山三仙之舘不孤擅於天池華隂百丈之泉豈獨高於蓮井爾雅曰嵩高為中岳山海經曰半石山東五十里曰少室山又三十里曰太室山郭注云即中岳嵩高山也今在陽城縣西戴延之西征記曰其山東謂之太室西謂之少室相去十七里嵩其總名也以其下各有室焉故謂之室是也劉義慶云嵩高山北有大穴晋時有人誤墮穴中見二人圍棋下有一杯白飲與墮者飲氣力十倍棋者曰汝欲停此否墮者曰不願停棋者曰從此西行有天井其中蛟龍但投身此井自當出若餓井中物食之墮者如其言可半年乃出蜀中因洛下問張華曰此仙舘夫所飲者玉漿所食者龍穴石髓嵩高山記曰山有玉女臺云漢武帝見三仙玉女因以名臺事見藝文類聚楚辭曰沐盥浴兮天池王逸曰天池則滄海也又莊子曰北溟者天池也此云天池即嵩高天井也山海經曰華首之山西六十里曰太華之山又云太華之西少華之山張衡西京賦云綴以二華是也漢書地理志云京兆華隂縣太華山在南有祠豫州山集靈宮武帝起爾雅曰河南華郭璞注云華隂山正義曰禹貢導河積石至於龍門南至於華隂東至於底柱然則此山在河之南故曰河南華在華隂縣界故曰華隂山也華山記曰天井纔容人上可長六丈餘出井東南二里至峻坂斗上又東上百丈崖皆須攀繩挽葛而後行又曰華山頂生千葉蓮花言此𢎞農温湯足與嵩高華隂二山之泉並峙也周上柱國齊王憲神道碑昔者軒皇受姓十有四人周室先封十有五國軒皇黄帝也黄帝姓軒轅氏以繼女媧伏羲神農故云軒皇國語曰黄帝之子二十五宗其得姓者十四人左傳昭二十八年成鱄曰昔武王克商先有天下其兄弟之國者十有五人自爾承基纂胄保受姓氏左氏傳曰保姓受氏以守宗祊雖復千年一聖終是百世同宗王子年拾遺記曰黄河千年一清至聖之君以為大瑞詩曰本支百世言宇文氏崛起雖非周之子孫而國號曰周亦如承基纂胄同為姬姓也故知昔之東京既稱炎一作大漢再受今之周厯即是酆都中興言昔光武都洛乃炎漢再受今宇文號周即酆都中興也漢以火徳王故曰炎漢周都酆鄗故云酆都東觀漢記序曰漢以炎精布曜或幽而光王融曲水詩序曰韜軼炎漢又按炎漢再受非謂光武葢子山之微詞也光武乃是景帝子孫於漢猶為近屬與姬周宇文似為不類當謂劉淵劉聰諸人也前趙録曰初漢高祖以宗女為公主以妻冐頓約為兄弟故其子孫遂冒姓劉氏淵僭即漢王位追尊劉禪為孝懐皇帝立高祖以下三祖五宗神位而祭之又僭即帝位晋懐帝永嘉五年劉聰攻陷洛陽遷帝於平陽大赦改元嘉平洛陽即漢之東京疑謂此為再受矣公諱憲字毗賀突恒州武川人也周書列傳曰齊煬王憲太祖第五子也晋太康之世據有黄龍序宇文氏之先也周書文帝紀曰其先出自炎帝神農氏為黄帝所滅子孫遯居朔野有葛烏菟者雄武多算略鮮卑慕之奉以為主遂總十二部落世為大人其後曰普回因狩得玉璽三紐有文曰皇帝璽普回心異之以為天授其俗謂天曰宇謂君曰文因號宇文國并以氏焉黄龍即黄龍鎮也十三州志曰遼東屬國都尉治昌黎道有黄龍亭魏營州刺史治水經注曰白狼水北逕黄龍城東隋志云後魏置營州於和龍城是也太康晋武帝年號也魏孝昌之初奄荒𤣥莬周書曰普回子莫􅄼自隂山南徙始居遼西是曰獻侯為魏舅甥之國九世至侯豆歸為慕容所滅其子陵仕燕拜駙馬都尉封𤣥莬公後魏明帝九年改元孝昌言宇文陵於魏孝昌中仕燕封𤣥莬公也漢書地理志曰𤣥莬郡武帝元封四年開高句驪屬幽州應劭曰故真番朝鮮國太祖以百二諸侯三分天下太祖憲父安定公宇文泰也孝閔踐阼追尊為文王廟號太祖周書本紀云南清江漢西舉巴蜀北控沙漠東據伊瀍漢書曰持㦸百萬秦得百二焉三分天下比周文王也函谷先登鴻溝大定函谷先登謂奉魏武帝都關中也鴻溝大定謂分東西魏也功業如此人臣以終周書云億兆之望有歸揖讓之期允集功業若此人臣以終公含章天挺命世誕生周易曰含章可貞李陵書曰命世之才李善注引孟子云其中有命世者降太一之神下文昌之宿漢書曰武帝定郊祀之事祠太一於甘泉又天文志曰中宫天極其一明者太一之常居也楚辭曰後文昌使掌行兮顧命中宫勑百官王逸曰天有三宫謂紫宫太微文昌也故云中宫按文昌六星有上将貴相言齊王本天之貴神列宿降生於世也珠角擅奇山庭表徳任昉王文憲集序曰况乃淵角殊祥山庭異表李善曰論語撰考讖曰顔淵有角額似月形摘輔像曰子貢山庭斗繞口謂面有山庭言山在中鼻高有異相也故子貢至孝顔囘至仁也儀範清泠風神軒舉聳動廊廟光華城闕未逾髫齓已議論天下事本傳云性通敏有度量雖在童齓而神采嶷然少與高祖俱受詩傅咸綜機要得其指歸太祖嘗賜諸子良馬惟其所擇憲獨取駮馬太祖問之對曰此馬色類既殊或多駿逸若從軍征伐牧圉易分太祖喜曰此兒智識不凡當成重器後從獵隴上經官馬牧太祖每見駮馬輒曰此我兒馬也命左右取以賜之埤蒼曰髫髦也大戴禮曰男八嵗而齓女七嵗而齓鄭康成周禮注曰齓毁齒也人或曰是謂若木一作弱水一枝旁䕃數國長河一直自然千里楚辭曰折若木以拂日淮南子曰建木在廣都若木在建木西木有十日其華照地爾雅釋水曰河百里一小曲千里一曲一直風颷欲逺光景將昇爾雅曰扶揺謂之颷郭璞云暴風從下上也楚辭曰借光景以往來兮後魏二年封涪城縣開國公時年五嵗也隋書地志云金山郡涪城縣舊置始平郡西魏改郡為涪城虹蜺滿野是廢當途之高鸑鷟鳴岐實始維新之命孟子曰民望之若大旱之望雲霓趙注曰霓虹也淮南子曰虹蜺彗星者天之忌也高誘曰雄曰虹雌曰蜺忌禁也晋書天文志曰妖氣一曰虹蜺日旁氣也斗之亂精主臣謀君天子詘漢獻帝紀曰太史丞許芝奏故白馬令李雲曰許昌氣見於當途當道而高大者魏也當代漢廢當途之高者謂魏祚衰也國語曰周之興也鸑鷟鳴於岐山師曠禽經曰鳯雄凰雌亦曰鸑鷟詩曰周雖舊邦其命維新始維新之命者謂周将興也國家光宅受圖欽明秉厯大風初巻長沙始封尚書中候曰堯登壇受圖書曰欽明文思安安漢高祖歌曰大風起兮雲飛颺漢書曰吳汭封長沙王言周受命之始齊王乃得晋封也周元年周書作魏恭帝元年進爵安城郡公食邑二千戸安城郡即前涪城縣是隋書地志曰金山郡涪城縣西魏改郡為涪城後周又改為安城仍授使持節驃騎大将軍開府儀同三司按周書孝閔帝踐阼授此官也開府同於馬駿秩擬六卿驃騎等於劉蒼位高三事晋書曰宣帝九男扶風武王駿字子臧太康初進拜驃騎将軍開府持節都督晋姓司馬氏故稱馬駿後漢書曰東平憲王蒼顯宗甚愛重之及即位拜為驃騎将軍置長史掾史員四十三人位在三公上周禮云天子六卿尚書曰敬爾三事宗子維城彼多慙色言憲在宗室雖馬駿劉蒼不足比也詩曰宗子維城武成二年周明帝即位之第三年也授使持節大将軍周書云世宗即位授大将軍世宗明帝也都督益壽寧周書作益寜巴瀘等二十四州諸軍事益州刺史改封齊國公食邑萬户周書武成初除授及進封隋書地志云蜀郡舊置益州後周置總管府周書明帝紀云武成元年以大将軍安城公憲為益州總管九月安城公憲為齊國公隋志北地郡西魏為寜州本傳作巴瀘者隋志清化郡舊置巴州瀘川梁置瀘州公時年十有六周書云初平蜀之後太祖以其形勝之地不欲使宿將居之諸子之中欲有推擇徧問高祖已下誰能此行並未及對而憲先請太祖曰刺史當撫衆治民非爾所及以年授者當歸爾兄憲曰才用有殊不關大小試而無效甘受面欺太祖大悦以憲年尚幼未之遣也世宗追遵先旨故有此授憲時年十六王武子以上將開府未滿立年荀中郎為十州都督才踰弱冠方之於公已為老矣晋書曰王濟字武子年二十起家拜中書郎為驍騎将軍累遷侍中晋陽秋曰荀羡字全則潁川人光禄大夫崧之子也清和有識鑒少以主壻為駙馬都尉是時殷浩叅謀百揆引羡為援頻蒞義興吳郡超授北中郎將徐州刺史以蕃屏焉中興書曰羨年二十八出為徐兗二州中興方伯之少未有若羨者也論語曰三十而立何晏注云有所成也禮記曰人生二十曰弱冠世説曰王敦謂摰瞻曰卿年未三十已為萬石亦太蚤瞻曰方於将軍少為太蚤比之甘羅已為太老言憲年僅十六少於王荀二君矣加復營丘負海齊桓公受脤之城謂齊國也漢書地理志曰臨淄師尚父所封臣瓚曰即營丘也禮記曰太公封於營丘晁錯新書曰齊地僻逺負海地大人衆禮記鄭注曰負之言背也左傳僖九年曰王使宰孔賜齊侯胙正義曰周禮大宗伯以脤膰之禮親兄弟之國鄭注云脤膰社稷宗廟之肉即胙肉也異姓不食賜今賜齊侯是尊之如二王後矣憲封齊國公故云岷山導江漢武帝求仙之地謂益州也山海經曰岷山江水出焉史記封禪書曰江水祠蜀索隱曰風俗通云江出岷山岷山廟在江都地理志曰江都有江水祠葢漢初祠之於源後祠之於委也括地志曰江瀆祠在益州成都縣八里郡國志曰岷山在西徼外是也謂憲拜益州刺史也自非名陵孤竹聲振沈黎豈得南至穆陵西登積石地理志曰遼西令支有孤竹城應劭曰故伯夷國漢書曰沈黎郡武帝置本笮都也穆陵齊竟左氏傳曰南至於穆陵北至於無棣禹貢曰浮於積石至於龍門孔安國曰積石在金城西南河所經也地理志曰在金城河關縣西南𦍑中言非夙有聲名不能受此疆界也幸無白虎之患寜待黄龍之盟後漢書南蠻傳曰秦昭襄王時有一白虎常從羣虎數遊秦蜀巴漢之境傷害千餘人有巴郡閬中人作白竹之弩射殺白虎昭王嘉之而以其彝人不欲加封乃刻石盟要復􅂜人盟曰秦犯彞輸黄龍一雙􅂜犯秦輸清酒一鍾彞人安之卭笮畏威微盧仰徳漢書地理志曰越巂郡有卭都定笮笮秦大笮諸縣孟康曰巂音髓本卭都服䖍曰今蜀郡都尉所治本笮都也臣瓚曰茂陵書沈黎治笮都微盧西南􅂜國名尚書泰誓曰髳微盧彭孔安國曰國名蠻􅂜屬文王者髳微在巴蜀盧彭在西北疏云髳微在巴蜀者巴在蜀之東偏漢之巴郡所治江州縣也盧彭在西北者在東蜀之西北也言益州諸郡感其威徳也生為立廟刻石頌功周書云憲善於撫綏留心政術辭訟輻輳聽受不疲蜀人懐之共立碑頌成都有文翁之祠非謂生前漢陽有諸葛之碑止論身後比之今日豈可同年而語哉漢書曰文翁終於蜀吏民為立祠堂嵗時祭祀不絶師古曰文翁學堂於今猶在益州城内蜀志曰諸葛亮卒景曜六年春詔為亮立廟於沔陽注云襄陽記曰亮初亡所在各求為立廟朝議以禮秩不聽百姓遂因時節私祭之於道陌上習隆等上表以為宜因近其墓立之於沔陽使所親屬以時賜祭凡其臣故吏欲奉祠者皆限至廟斷其私祀以崇正禮於是始從之地理志漢中沔陽縣注如淳曰此方人謂漢水為沔水是以沔陽稱漢陽矣又梁州記曰武侯壘東南有定軍山入山十餘里有諸葛武侯墓鍾會征蜀至漢川祭亮之廟令軍士不得於墓蒭牧樵採今松柏碑銘儼然言憲生前得立碑廟功徳及人逾於二公也保定四年與大司馬蜀國公圍金墉城周書武帝紀云保定四年十一月柱國蜀國公尉遲迥率師圍洛陽齊國公憲營於邙山陸機洛陽記曰金墉城在宫之西北魏故宮人皆在中師臨洛浦則廣武營奔兵上邙山則河橋路斷師臨洛浦謂圍洛陽也兵上邙山謂憲營於邙山也周書武帝紀云保定四年齊國公憲營於邙山史記曰楚與漢臨廣武而軍又曰秦昭襄王五十年初作河橋正義曰此橋在臨晋縣東渡河至蒲州今蒲津橋也按周太祖與齊神武有河橋之戰魏大統四年東魏將侯景等北據河橋南屬邙山為陣是西京洛陽路所必由者也邙山在洛陽北十里八川風俗五方名利潘岳關中記曰涇渭灞滻酆鄗潦潏凡八川八川謂關中之八川也此謂洛陽如東京賦泝洛背河左伊右瀍之屬貨殖傳曰洛陽東賈齊魯南賈梁楚如淳曰遊子樂其俗不復歸故有五方之民鐵市銅街風飛塵起鐵市即金市銅街銅駝街也俱在洛陽陸機洛陽記曰洛陽凡三市大市曰金市又曰銅駝街在洛陽宮南金馬門外人物繁盛俗語云金馬門外集羣賢銅駝街上集少年又漢書百官公卿表曰幹官鐵市兩長丞風飛塵起言洛陽震動也天和元年徵還行雍州牧保定至雍州牧按本傳云保定中徵還京拜雍州牧及晋公䕶東伐以尉遲迴為先鋒圍洛陽憲與達奚武軍於邙山自餘諸軍各分守險要齊兵數萬奄至軍後諸軍惶駭並各退散惟憲與王雄達奚武率衆拒之而雄為齊人所斃三軍震懼憲親自督勵衆心乃安晋公護執政雅相親委賞罰之際皆得預焉傳稱保定中此作天和元年稍異周書明帝紀云二年改雍州刺史為雍州牧公以日月之明威神其政漆沮既從荆岐即乂禹貢曰漆沮既從荆岐既旅漢書師古曰漆沮即馮翊之洛水也荆岐二山名荆在岐東憲為雍州牧故云少陽用事路不喘牛仲秋以殷民無驚水漢書丙吉傳曰吉嘗出逢清道羣鬬者死傷横道吉過之不問吉前行逢人逐牛牛喘吐舌吉止駐使騎吏問逐牛行幾里矣掾吏謂丞相前後失問或譏吉吉曰民鬬相殺傷長安令京大兆尹職所當禁備逐捕非所問也方春少陽用事未可熱恐牛近行用暑故喘此時氣失節恐有傷害也三公典調和隂陽職所當憂是以問之尚書曰宵中星虛以殷仲秋孔傳殷正也月令曰仲秋水始涸天根見乃盡絶二本傳作三年拜大司馬仍理小冢宰營室殿軍器太監本傳雍州牧如故天官以邦國開基是司六典夏官以兵戈為主專謀七徳天官謂冢宰也周禮太宰之職掌建邦之六典以佐王治邦國夏官大司馬也左氏傳曰武有七徳按周書盧辯傳云初太祖欲行周官命蘇綽專掌其事未幾而綽卒乃令辯成之於是依周禮建六官置公卿士天官府管冢宰等衆職地官府領司徒等衆職秋官府領司寇等衆職冬官府領司空等衆職以魏恭帝三年始命行之今憲拜大司馬仍理小冢宰是以夏官兼天官故兩稱也是以器械填委既包吳漢之功宫殿崢嶸彌壯蕭何之法後漢書吴漢傳曰更始幽州牧苗曾隂勒兵勅諸部不肯應調漢馳至無終撝兵收曾斬之而奪其軍南與光武會清陽士馬甚盛漢至莫府上兵簿漢書曰高祖七年蕭何造未央宫立東闕北闕前殿武庫太倉上見其壮麗甚怒曰天下匈匈勞苦數嵗成敗未可知是何治宮室過度也何對曰以天下未定故可因治宫室且天子以四海為家非令壮麗無以重威無令後世有以加也上恱時以白露涼風務閑農隙月令曰七月涼風至白露降左氏傳曰春蒐夏苗秋獮冬狩皆於農隙以講事者也督兵三萬出自宜陽拔伏龍之城平姚萇集誤當作襄之壘本傳云天和四年齊將獨孤永業來寇盜殺孔城防主能奔達以城應之詔憲與柱國李穆將兵出宜陽築崇徳等五城絶其糧道齊將斛律明月率衆四萬築壘洛南五年憲渉洛邀之明月遁走憲追之及於安業屢戰而還六年憲帥衆二萬出自龍門齊将新蔡王康徳以憲兵至潛軍宵遁憲乃西歸仍掘移汾水水南堡壁復入於齊齊人謂略不及逺遂弛邊備憲乃渡河攻其伏龍等四城一日盡拔又進攻張壁克之獲其軍實夷其城壘斛律明月時在華容弗能救也北攻姚㐮城䧟之按姚襄城本姚襄所築其城西臨黄河控帶龍門孟門之險周齊交爭之地城高二丈周廻五里武成二年斛律光破周兵於此城遂立碑表其功又於此城置鎮今憲平之集作姚萇知誤文者按姚萇都咸陽秦地周宇文氏所都不得云憲平之與史傳異盖轉冩之誤也馬陵削樹魏將路窮平隂聽烏齊師其遁史記曰孫臏龎涓戰於馬陵削樹曰龎涓死此下左氏傳曰平隂之役有烏烏之聲齊師其遁天子冢弟禮絶羣公仁義所往事資道徳建徳元年進爵為王仍拜大冢宰本傳云晋公䕶誅高祖召憲入憲免冠拜謝帝謂之曰天下者太祖之天下吾嗣守鴻基常恐失墜冢宰無君上将圖不軌吾所以誅之以安社稷女親則同氣休戚共之事不相涉何煩致謝乃詔憲往䕶第收兵符及諸簿等尋以憲為大冢宰又開府裴文舉憲之侍讀高祖常御内殿引見之謂曰昔魏末不綱太祖匡輔元氏有周受命晋公復執威權積習生常便謂法須應爾豈有三十嵗天子而為人所制乎且近代以來又有一弊暫經𨽻屬即便禮若君臣此乃亂代之權宜非經國之治術詩云夙夜匪懈以事一人一人者止據天子耳雖陪侍齊公不得即同臣主且太祖十兒豈可悉為天子卿宜規以正道勸以義方輯睦我君臣協和我骨肉無令兄弟自致嫌疑文舉拜謝而出歸以白憲憲指心撫几曰吾之夙心公寜不悉但當盡忠竭節耳知復何言建徳二年進爵為王姬旦封於曲阜不廢居中劉交國於彭陽無妨常從周公長子伯禽封於曲阜為魯侯詩魯頌說封魯之事云王曰叔父建爾元子俾侯於魯鄭康成禮記注曰周公次子君陳别封於周世為卿士周公相王室以尹天下復封魯國身死之後伯禽就魯君陳相周也史記曰楚元王劉交者高祖之同母弟也高祖六年以弟交為楚王都彭城豈直周召二南並居師傅晋鄭兩國俱為卿士而已哉詩譜曰文王受命作邑於豐乃分岐邦周召之地為周公旦召公奭之采地其得聖人之化者謂之周南得賢人之化者謂之召南成王時周公為太師召公為太傅左傳周桓公言於王曰我周之東遷晋鄭焉依杜預曰平王東徙晋文侯鄭武公左右王室故曰晋鄭焉依匈奴突於武川爟火通於灞上武川疑作武州漢屬雁門郡武帝誘匈奴入武州塞是也漢書匈奴傳曰置三将軍軍長安西細栁渭北棘門霸上胡騎入代句注邊烽火通於長安甘泉爟火史記作權火索隠曰權如字一音爟周禮有司爟爟火宫張宴曰爟火㷭火也狀若井契臯矣蓋指稽胡劉没鐸之亂也公述職巡御治兵朔方馬邑星飛龍城月動地理志有朔方郡雁門郡有馬邑晋太康地記曰秦時建此城輒崩有馬周旋馳走反覆父老異之因依以築城遂名為馬邑漢書曰漢兵約單于入馬邑而縱兵單于不至遂絶和親又曰将軍衛青出上谷至龍城星飛月動謂弓矢之象也撓留犂之酒經略不前失燕支之山下馬而去漢書匈奴傳曰匈奴以徑路刀金留犂撓酒與張猛韓昌共飲血盟應劭曰留犂飯匕也撓和也契金著酒中撓攪飲之也又漢書曰漢使驃騎将軍去病将萬騎出隴西過焉支山史記正義曰焉音煙括地志曰焉支山亦名刪丹山在甘州刪丹縣東南五十里西河舊事曰匈奴失二山歌云失我焉支山令我婦女無顔色失我祁連山使我六畜不蕃息又曰白山冬夏有雪故曰白山匈奴謂之天山過之皆下馬拜焉按匈奴謂天為祁連祁連山天山也與燕支為二山矣本傳稽胡劉没鐸稱皇帝詔憲督趙王招等討平之東鄰逆命反道敗徳東鄰謂齊也初為東西魏其後並膺當璧周在於西齊在於東子山以周比武王以齊比殷紂矣囚箕子於塞庫羈文王於玉門殷本紀曰箕子佯狂為奴紂又囚之竹書紀年沈約注云王嘉季歴之功錫之圭瓚秬鬯九命為伯既而執諸塞庫季歴困而死因謂文丁殺歴又曰執王季於塞庫羈文王於玉門鬱怩之情辭以作歌按塞庫囚季歴處殷紂或以其地囚箕子所未詳矣呂氏春秋曰王季歴困而死文王苦之有不忘羑里之醜時未可也武王事之夙夜不懈亦不忘玉門之辱立十三年而成甲子之事戰國策希寫曰昔者文王拘於羑里而武王羈於玉門史記項羽紀曰成臯北門注云玉門也天子将有盟津之師召公獨議公報以誕膺天命克成厥勲本傳云四年高祖將欲東討獨與内史王誼謀之餘人莫得知也後以諸弟才略無出憲右遂告之憲即賛成其事及大軍將出憲表上私財以助軍費曰臣聞撫機適運理藉時来兼弱攻昧事資權道伏惟陛下繼明出聖闡業𢎞風思順天心用恢武略方使長蛇外翦宇宙大同軍民内向車書混一竊以龍旗雷動天網雲布芻粟糧餼或須周給昔邊隅未靖卜式願上家財江海不澄衛兹請獻私粟臣雖不敏敢忘景行謹上金寳等十六件少助軍資詔不納而以憲表示公卿曰人臣當如此朕貴其心耳寜須物乎乃詔憲率衆二萬為前軍趣黎陽髙祖親圍河隂未克憲攻拔武濟進圍洛口收其東西二城以高祖疾班師盟津周武王與八百諸侯會處亦曰孟津亦曰富平津昔者秦昭起師於蜀直問張儀晋武用兵於吳惟謀羊祐戰國策曰秦昭王将伐蜀謀於司馬錯張儀司馬錯不可張儀勸伐之遂西舉巴蜀晋書曰武帝密有滅吳之計而朝議多違惟羊祐杜預張華與帝意合祐病舉預自代於是中軍無帥僉曰有歸五年拜上柱國本傳云四年初置上柱國以憲為之元戎東討給王鐵騎二萬先襲太原一作并州按本傳云五年大舉東討憲率精兵二萬復為前鋒守雀䑕谷高祖親圍晋州憲進兵克洪同永安二城斬其驍將賀蘭豹子山褥瓌等百餘人渡汾而及髙祖於玉壁隋書地志云冀州太原郡後齊并州置省立别宮後周置并州六府後置總管府廢六府斗建麾兵天離轉戰虎嘯風騰雲飛電掩天官書曰平旦建者魁魁海岱以東北也孟康曰傳曰斗第一星法於日主齊也魁斗之首首陽也又其用在明陽與明徳在東方故主東北齊分正義曰隨三時所指有前三建也天離轉戰者按天官書曰離宮閣道又云王良策馬車騎滿野索隠注云閣道王良旗也有六星策一星在王良前主天子僕也占以動揺移易在王良前或居馬後則為策馬䇿馬而兵動也謂其時高祖親征憲從駕也易曰雲從龍風從虎劉峻絶交論曰雕虎嘯而清風起林胡棗栗詎得充饑晋陽荻蒿何能拒防史記蘇秦說燕文侯曰燕北有林胡樓煩北有棗栗之利民雖不佃作而足於棗栗矣此所謂天府也漢書曰趙武靈王北破林胡樓煩而置雲中雁門代郡春秋後語曰張孟談謂趙襄子曰董安于之在晋陽公宫之垣皆荻蒿言齊國糧仗俱竭漸有欲平之勢也又加王精兵六萬長圍晋州然後六軍星陳萬騎雷動中權始及前茅已戰自爾即為前鋒横行入鄴本傳云高祖又令憲率兵六萬還援晋州憲遂進軍營於涑水齊主攻圍晋州晝夜不息既而諸軍俱進應時大潰齊主走鄴獲其從兄安徳王延宗明年進剋鄴城破之俘斬三萬人擒任城王湝及廣寧王孝珩隋書地志臨汾郡後魏置唐州改曰晋州後周置總管府左傳杜注曰六軍天子之軍也東都賦曰千乗雷動萬騎紛紜左傳宣十二年曰前茅慮無中權後勁杜預注曰中軍制謀後以精兵為殿茅明也或曰時楚以茅為旌幟隋志云魏郡鄴縣東魏都也觀彼車絓槐本馬驚旋濘謂齊主高氏之敗也左氏傳曰范鞅遇欒樂射之不中又注則乗槐本而覆又左傳曰驂絓而止又云驂絓於木而止絓戸卦反顧野王曰絓者所礙又左傳僖十五年云晋恵公乗小駟戰於韓原晋戎馬還濘而止秦獲晋侯以歸杜元凱注云濘泥也小駟不調故墮泥中濘乃定反積甲高昆陽之城封尸塞富平之水後漢書曰赤眉降積兵甲宜陽城西與熊耳山等又昆陽之戰云光武以三千人破尋邑百萬之衆盡獲其輜重車甲珍寳不可勝算舉之連月不盡或燔燒其餘左傳宣十二年邲之戰云潘黨曰君盍築武軍而収晋尸以為京觀楚子曰古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲滛慝杜預注曰積尸封土其上謂之京觀括地志云周武王伐紂與八百諸侯㑹孟津亦曰盟津又曰富平津水經注曰小平津今河陽津是也此云封尸塞富平之水者疑引武成師逾孟津之事以孟津有富平之名故云是矣言周師克齊如光武之破尋邑武王之勝商紂也莫不如彼建瓴同斯破竹漢書高帝紀曰田肯賀上曰陛下治秦中秦形勝之國也帶河阻山持㦸百萬秦得百二焉地勢利便其以兵下諸侯猶居高屋之上建瓴水也如淳曰瓴盛水瓶也居髙屋之上而幡瓴水言其向下之勢易也建音蹇蘇林曰瓴讀曰鈴師古曰建居偃反晋書杜預傳曰今兵威巳振譬如破竹數節之後迎刃而解一朝指揮六合大定阮嗣宗為鄭冲勸晋王牋曰一朝指麾乃封營丘高誘淮南注曰四方上下為六合是用光昭下武翼亮中都足以攄祖宗之宿憤解生民之怨黷按北史魏武帝脩永熈三年高歡入洛周太祖宇文泰迎帝入長安以雍州公廨為宫是為西魏高歡推清河王亶子善見為主徙都鄴是為東魏及東魏静帝遜位於齊文宣歡第二子也西魏恭帝遜位於周孝閔帝泰第三子也歴明帝武帝至宣政元年鄴始平是周齊兩國宿有怨讎自今誅之乃得舒解也詩序曰下武嗣文也云中都者洛陽天下之中本後魏所都自高歡入洛孝武西遷至今始定故云翼亮中都又按後齊有地名中都者隋書地志云冀州太原郡榆次縣後齊曰中都按隋志太原郡後齊并州置省立别宫後周置并州六府後置總管府或此中都亦得稱之燕然山銘曰將上以攄高文之宿憤廣雅曰攄舒也按攄讀曰舒左氏傳曰君無怨黷方當待彼石閭部斯玉鼓經緯天地光華日月史記封禪書曰令公玉帶奉祠候神物還泰山修五年之祀如前而加以禪祠石閭石閭者在泰山下阯南方方士多言此仙人之閭也今云葢指齊地也玉鼓疑即石鼔郭璞山海經注曰鄴西北有鼓山下有石鼔葢指鄴地也左氏傳曰經天緯地曰文呂氏春秋虞舜卿雲歌曰日月光華旦復旦兮言平鄴之日深頼於王方當待彼齊國石閭之靈部斯鄴都玉鼓之鄉然後經天緯地其功徳所至當與日月爭華也既而赤鳥夾日黄熊入寢實沈無祀桑林不祭本傳云憲自以威名日重潛思屏退及高祖征北蕃乃辭以疾尋而高祖崩宣帝忌憲威望遂至加戮此言疾薨諱之也左傳哀六年曰有雲如衆赤鳥夾日以飛三日楚昭王卒又昭七年傳曰晋侯有疾夢黄熊入於寢門子産曰昔堯殛鯀於羽山其神化為黄熊以入於羽淵實為夏郊三代祀之晋為盟主其或者未之祀也乎韓子祀夏郊晋侯有間又昭元年傳曰晋侯有疾卜人曰實沈臺駘為􅑂史莫之知也子産曰昔高辛氏有二子伯曰閼伯季曰實沈帝遷實沈於大夏主參參為晋星由是觀之則實沈參神也又襄十年傳曰宋公享晋侯於楚丘請以桑林舞師題以旌夏晋侯懼而入於房去旌卒享而還及著雍疾卜桑林見茍偃士匄欲奔請禱焉荀罃不可曰我辭禮彼則以之猶有鬼神於彼加之宣政元年六月二十八日薨春秋三十有四本傳云高祖崩宣帝嗣位以憲屬尊望重深忌憚之令開府于智察其動静智就宅候憲因是告憲有謀詔王晚共諸王俱至殿門憲獨被引進帝先伏壯士於别室至即執之憲辭色不撓固自陳説帝使于智對憲憲目光如炬與智相質或謂憲曰以王今日事勢何用多言憲曰我位重屬尊一旦至此死生有命寜復圖存但以老母在堂恐留兹恨耳因擲笏於地乃縊之時年三十五季友之亡魯可知矣齊䘮子雅姜其危哉周書史臣曰齊王奇姿傑出獨牢籠於前載以介弟之地居上將之重智勇冠世攻戰若神敵國繫以存亡鼎命由其輕重比之異姓則方召韓白何以加兹挾震主之威屬道消之日斯人而嬰斯戮君子是以知周祚之不永也左傳閔二年曰季氏亡則魯不昌又曰成季生而有文在其手曰友遂以命之昭三年傳曰齊公孫竈卒司馬竈見晏子曰又䘮子雅矣晏子曰惜也子旗不免殆哉姜族弱矣而媯將始昌二惠競爽猶可又弱一个焉姜其危哉公器宇淹曠風神透逺璣鏡照林山河容納置樽待酌懸鐘聽扣説文云璣珠之不圓者淮南子曰聖人之道如中衢而設尊禮記曰善待問者如撞鐘扣之以小者則小鳴扣之以大則大鳴待其從容而後盡其聲不善答問者反此也後漢書丁鴻贊曰五更待問應若鳴鐘聲動天下光照四鄰武皇帝以介弟懿親特垂愛友而密謀奇策加禮敬焉武皇帝高祖也高祖為周太祖第四子憲為第五子故曰介弟左氏傳曰雖有小忿不廢懿親常謂左右曰孔子云自吾有囘門人日親其齊王之謂也史記曰顔囘年二十九髮白早死孔子哭之慟曰自吾有囘門人益親也後漢光武亦以此稱鄧禹矣用之作宰則萬方協和用之撫軍則四表懾伏作宰謂拜大冢宰也撫軍謂為大將軍也尚書曰協和萬邦左傳里克曰從曰撫軍尚書曰光被四表豈直臯繇為士國無不仁見論語隨會為卿民無羣盜左氏傳曰晋侯以黻冕命士會將中軍且為太傅於是晋國之盜逃奔於秦愛翫書籍敦崇禮樂一作典管絃入耳則谿谷俱調文雅沿心則煙霞並韻養由百發落雁吟猿應奉五行綈緗縹帙呂氏春秋曰荆庭有神白猿荆之善射者莫能中荆王請養由基射由基矯弓操矢而往未之射而括中之矣發之則猿應矢而下則養由基有先中中之矣按落雁乃更嬴事此並歸由基總以形其善射也後漢書曰應奉少聰敏凡所經履莫不暗記讀書五行俱下漢書師古注曰綈厚繒也釋名曰緗桑也如桑葉初生之色也縹猶漂漂淺青色也説文曰帙書衣也雍容舉止抑揚談論當世以為楷模搢紳以為軌範後漢書曰天下楷模李元禮漢書司馬相如曰耆老大夫搢紳先生之徒則少有壯志頗校兵書𤣥水降靈穀城授策飛風長栁月角星眉莫不吟誦在心撰成於手𤣥水黒水也山海經西北海有黑水又云大荒之中有人衣青衣名曰黄帝女魃蚩尤作兵伐黄帝黄帝乃令應龍攻之冀州之野應龍畜水蚩尤請風伯雨師縱大風雨黄帝乃下天女曰魃雨止遂殺蚩尤按北方黒色故云𤣥水疑引此事為降靈之事矣又穆天子傳云天子北征東還乃循𤣥水按此知北方有𤣥水矣水經注曰穀城有黄石臺黄石公與張子房期處也漢書藝文志有黄帝長栁占夢十一巻甘徳長栁占夢二十巻月角星眉未詳藝文志稱天文者序二十八宿歩五星日月以紀吉凶之象然此稱月角星眉疑謂射法也新月有如角弓故云月角又如眉故云星眉星如弧矢之類疑古有以此名書所未詳矣所著兵法凡有五巻六韜九法一作地不用吳起舊書三令五申無勞孫武先誡漢書藝文志曰周史六弢六篇師古曰即言取天下及軍旅之事弢字與韜同也九法當是九宫之術注見是篇銘内漢書藝文志有吳起四十八篇史記曰吳起衞人也好用兵為衞將撃秦拔五城後事楚南平百越北并陳蔡却三晋西伐秦又曰孫子武者齊人也以兵法見於吳王闔廬王出宫中美人得百八十人孫子分為二隊以王之寵姬二人分為隊長皆持㦸約束既布乃設鈇鉞即三令五申之於是鼔之右婦人大笑孫子曰約束不明申令不熟將之罪也復三令五申而鼓之左婦人復大笑孫子曰既巳明而不如法者吏士之罪也遂斬隊長二人以徇用其次為隊長復鼓之婦人左右前後皆中規矩無敢出聲於是闔閭知孫子能用兵卒以為將顯名諸侯可謂有忠孝焉有壯武焉不自驕矜謙光下物宋人獻玉不貪為寳伯成子高守仁為富本傳云于智告憲有謀帝乃遣小冢宰宇文孝伯謂憲曰三公之位宜屬親賢今欲以叔為太師九叔為太傅十一叔為太保叔以為何如憲曰臣才輕位重滿盈是懼三師之任非所敢當且太祖勲臣宜膺此舉若専用臣兄弟恐乖物議孝伯反命尋而復來曰詔王晚共諸王俱至殿門憲獨被引進執之遂縊死憲懼盈讓爵是其謙讓不貪之處故下云以信致欺也左氏傳曰宋人或得玉獻諸子罕子罕弗受獻玉者曰以示玉人玉人以為寳也故敢獻之子罕曰我以不貪為寳爾以玉為寳若以與我皆喪寳也不若人有其寳莊子曰堯治天下伯成子高立為諸侯禹為天子伯成辭諸侯而耕於野不謂以信致欺為善非樂悼齊王死非其罪以忠信見戮也後漢書東平王言為善最樂天年不享嗚呼哀哉以某年月日葬於石安縣洪瀆川之里原隰悽愴埋於盛徳幾年丘陵揺落藴於良才永矣爾雅曰高平曰原下濕曰隰廣雅曰小陵曰丘説文解字曰土之高也爾雅釋丘云如陵陵丘郭璞曰陵大阜也乃為銘曰悠哉朔方逖矣窮隂山連鳥道一作羽地盡龜林言其先世居朔野也爾雅曰悠逺也詩曰城彼朔方毛傳曰北方也尚書牧誓曰逖矣西土之人孔傳云逖逺也逖他歴反爾雅作逷音惕古文逖也天官書曰西宮昴畢間為天街其隂隂國其陽陽國言其居北方隂國路極遥逺也史記曰趙武靈王築長城自代並隂山下至高闕為塞正義曰地理志朔方臨戍縣北有連山險於長城其山中斷兩峰俱峻上俗名為高闕也南中志曰鳥道西百里以其地險絶獸猶無蹊特上有飛鳥之道耳龜林未詳按子山賀婁慈碑文云至如禪河清論秋水高談故以辨折龜林聲馳鹿野明是佛教之語西域地也本句經云昔佛在時有人河邉樹下道學二十年但念六塵心無寜息佛知可度化作沙門樹下共宿其夜月明龜從河出野干欲噉龜縮其頭尾及四足於甲中狗不得便須臾逺去龜還入水道人見此語沙門曰龜有䕶命之鎧野干不能得便沙門答曰世人不如此龜放恣六情外魔得便又文句云迦葉此翻大龜氏其先代學道靈龜負仙圖而應從徳命族故云龜氏有畢鉢羅父母禱樹神而生故名畢鉢羅云龜林者疑以樹下見龜又以命族故稱龜林説文云叢木為林此稱林者如檀林禪林之類地盡龜林言地直通西域之逺也重黎業大伯翳功深胄其積徳必有君臨言葛烏菟之後普囘得璽子孫遂成帝業也國語曰重黎氏世序天地史記曰楚之先祖重黎為火正又秦本紀曰秦之先大費佐舜調馴鳥獸鳥獸多馴服是為伯翳賜姓嬴氏索隠曰伯翳尚書謂之伯益是也謂宇文氏世徳類是其後必君臨天下也太祖撥亂喪君有君功廻地軸策動天文謂高歡之亂憲父周太祖奉魏武帝遷都長安也左氏傳曰晋惠公在秦呂甥曰征繕以輔孺子喪君有君博物志曰地有三千六百軸天官書曰王良策馬車騎滿野注曰䇿一星在王良前策動天文者言策馬星動天子出行也猶臨赤水尚復黄雲諸侯八百天下三分謂魏帝西遷之後宗社以安天命人心將歸於周也莊子曰黄帝遊於赤水之北左氏傳曰黄帝氏以雲紀又黄雲虞舜之瑞劇秦美新曰黄瑞湧出周本紀曰武王束伐盟津諸侯叛殷會周者八百公之挺生實惟天假翠微神降文昌星下此下序齊王憲也翠微即紫微春秋合誠圖云紫微大帝室太一之精也本序降太一之神下文昌之宿此稱翠微神降文昌星下其義同也又按爾雅釋山未及上翠微注云近上旁陂疏謂未及頂上在旁陂陀之處名翠微豈以憲爵居王位未及頂上故避紫微之名而稱之耶照於四國充於兩社舟檝江河棟梁華夏水湧詞鋒風飛文雅左氏傳曰成季之將生也桓公使卜楚丘之父卜之曰間於兩社為公室輔杜注曰周社亳社兩社之間朝廷執政所在也漢書賈誼曰是猶渡江河亡維檝師古曰檝所以刺船也班彪王命論曰楶棁之材不荷棟梁之任閔元年左傳曰諸夏親暱襄四年傳魏絳曰諸華必叛注云華夏皆謂中國論語正義曰夏大也言有禮義之大有文章之華也曹子建王仲宣誄曰文若春華思若湧泉陸士衡文賦曰思風發於胸臆言泉流於脣吻純深之性義極天經忠貞之道事感百靈君親帷一臣子惟寜忠泉出井孝笋生庭本傳云憲所生母達歩干氏茹茹人也建徳三年冊為齊國太妃憲有至性事母以孝聞太妃舊患風熱屢經發動憲衣不解帶扶侍左右憲或東西從役每心驚其母必有疾乃馳使叅問果如所慮西征賦曰秺侯之忠孝淳深孝經曰孝天之經也東都賦曰懐百靈後漢書耿恭傳曰匈奴攻恭於城下擁絶澗水恭於城中穿井十五丈不得水吏士渇乏恭整衣服向井再拜為吏士禱有頃水泉奔出衆皆稱萬歲楚國先賢傳曰孟宗字恭武至孝母好食笋宗入林中哀號方冬笋為之出因以供養時人以為孝感所致乃宰天官為國之輔是居上將為天之柱謂憲為冢宰也周禮天官冢宰之職上將文昌六星中名也晋書天文志曰三台六星兩兩而居起文昌列抵太微一曰天柱三公之位也乃聖乃神惟文惟武策高開闢威移雲雨此下序東討之師也九宫神略三術謨明天離轉戰月徳廻兵易乾鑿度曰太一取其數以行九宮鄭康成注曰太一者北斗神名也下行八卦之宫每四乃還於中央中央者北辰之所居故謂之九宫天數大分以陽出以隂入陽起於子隂起於午是以太一下九宫從坎宫始自此而從於坤宫又自此而從於震宫又自此而行於巽宫所以行半矣還息於中央之宫既又自此而從於乾宫又自此而從於兑宮又自此而從於艮宫又自此而從於離宫行則周矣上遊息於太一之星而反紫宫行起從坎宮始終於離宮也班固答賔戯曰商鞅挾三術以鑽孝公服䖍曰王霸富國强兵為三術李周翰曰三術謂帝道王道霸道而商君説秦孝公用此三術孝公用其霸術也書云謨明弼諧天離注見序文漢書曰匈奴舉事常隨月盛滿以攻戰月虧則退兵又隂陽雜書有天徳月徳黄道赤道之説言憲從高祖東征大克齊師也黎陽水駭官渡山驚冀州既載東原底平謂平鄴也臣瓚曰黎陽在魏郡劉禎鄴中詩曰北渡黎陽津銑曰謂從太祖征袁紹也文穎曰滎陽鴻溝即今官渡水也後漢書曰建安五年曹操與袁紹戰於官渡紹敗走禹貢曰冀州既載又云東原底平孔傳曰冀州堯所都也正義曰東原即今之東平郡也按冀州時大半屬於後齊太原為後齊别都蓋指齊地言大兵至鄴水駭山驚戰勝之後乃底定也溟波欲運弱木將危中峰岳斷半海鵬垂悼憲功業方太而中途摧折也莊子曰是鳥也海運則將徙於南溟南溟者天池也弱木即若木山海經曰灰野之山有赤樹青葉赤花名曰若木春秋漢含孳曰三公象五岳在天法三能台能同庾翼晋陽秋曰張華將死中台星遂坼莊子曰鵬之背不知其幾千里也怒而飛其翼若垂天之雲鳯沈丹穴龍亡黑陂臨淄廢市東武山移千秋萬古英靈在斯謂憲死時人知其寃酷所屬吏民皆傷之也山海經曰丹穴之山有鳥名曰鳯凰史記封禪書曰昔秦文公出獵獲黑龍此其水徳之瑞鳯沈龍亡以喻憲之死也地理志曰齊郡有臨淄縣吳越春秋曰范蠡作城訖瑯琊東武海中山一夕自來百姓怪之因名怪山後漢書郡國志曰清河國有東武城濟南王安子康為東武城侯注云今貝州武成縣是千秋二語言憲雖死功業自足不朽也周太子太保歩陸逞神道碑公諱逞字季明本姓陸吳郡一有吳字人也周書列傳曰陸通弟逞初名彦字世雄本姓陸後賜姓步陸孤氏魏文帝嘗從容謂之曰爾既溫裕何因乃字世雄且為世之雄非所宜也於爾兄弟又復不類遂改焉君子至止既紹虞賔鳯凰于飛實興齊國序陸氏得姓之始也陸氏本媯姓齊田氏之後葢虞舜之苗裔也史記索隠注曰陸氏譜云齊宣公子達食采於陸號曰陸侯達達生發發生臯適楚賈其孫也一云陸渾氏之後此言虞賔齊國蓋宗陳田也詩云君子至止鸞聲鏘鏘尚書曰虞賔在位左氏傳曰陳公子完奔齊初懿氏卜妻敬仲其妻占之曰吉是謂鳯凰于飛其鳴鏘鏘有媯之後將育于姜五世其昌並於正卿八世之後莫之與京及陳之初亡也陳桓子始大於齊其後亡也成子得政杜注云成子田常也敬仲八世孫史記曰田常曾孫和始為諸侯遷康公海濵康公卒呂氏遂絶其祀田氏卒有齊國南越使者解漢帝之衣西陵將軍覆吳王之蓋漢書陸賈傳曰中國初定尉佗平南越因王之高祖使賈賜佗印為南越王賈至令稱臣奉漢約歸報高帝大悦拜賈為太中大夫孝文即位欲使之南越丞相平乃言賈為太中大夫往使尉佗去黄屋稱制又南越王傳曰文帝召賈為太中大夫使賜佗書上楮五十衣中楮三十衣下楮二十衣遺王師古曰以綿装衣曰楮上中下者綿之多少厚薄之差也吳志曰陸遜振旅武昌權令左右以御蓋覆遜入出殿門凡所賜遜皆御物上珍於時莫與為比遣還西陵黄龍元年拜上大將軍右都䕶曾祖載為宋王司馬留鎮關中赫連之亂仗劒魏室黄河叅凌或亡追路烏江艤船更無歸迹今為河南洛陽人也逞兄陸通傳曰曾祖載從宋武帝平關中還留載隨其子義真鎮長安遂没赫連氏魏太武平赫連氏載仕魏任中山郡守漢書曰陳平間行仗劒亡降漢史記曰項羽欲東渡烏江烏江亭長檥船待如淳曰南方人謂整船向岸曰檥高祖冠軍將軍營州刺史隋志後魏置營州於和龍城吳人有降附者悉領為别軍自是官帥擁鐸更為吳越之兵君子習流别有樓船之陣謂吴人降附皆領别軍故魏軍中有吳師也國語曰吳王夫差出軍與晋爭長昬乃戒夜中令服兵擐甲陳士卒官帥擁鐸建祀姑此吳軍容之舊制也吳越春秋曰句踐復問范蠡曰可伐矣乃發習流二千人俊士四萬諸御千人以與吴戰遂虜殺太子入吴焚姑胥臺父政驃騎大將軍儀同三司恒州刺史中都獻公陸通傳云父政性至孝其母吴人好食魚北方魚少政求之常苦難後宅側忽有泉出而有魚遂得以供膳時人以為孝感所致因謂泉為孝魚泉初從爾朱天光討罰及天光敗歸文帝文帝為行臺以政為行臺左丞原州長史賜爵中都縣伯大統中卒漢書地理志中都屬太原郡太祖扶危濟傾經綸夷阻報君之恥逺襲平原太祖周文帝宇文泰也時高歡既破爾朱遂有異志賀拔岳軍西次平涼為侯莫陳悦所害悦附高歡不肯應召太祖馳赴平涼斬侯莫陳悦所謂報君之恥逺襲平原是也原州即其地矣以高平霸業所基委命留事謂以政為原州長史也周書本紀云賀拔岳既為侯莫陳悦所害太祖将赴之夏州吏民咸泣請曰聞悦今在永洛去平涼不逺若已有賀拔公之衆則圖之實難願且停留以觀其變太祖曰悦既害元帥自應乘勢直據平涼而反趦趄屯兵永洛吾知其無能為也遂進軍至原州太祖為行臺政為長史知其霸業所基重任也關中餽食非直滎陽之師河内供軍豈但淇園之竹史記曰漢與楚相守滎陽數年軍無見糧蕭何轉漕關中給食不乏後漢書曰光武南定河内拜恂河内太守行大將軍事光武於是復北征燕代恂移書屬縣講兵肄射伐淇園之竹為矢百餘萬以給軍前書音義曰淇園衛之苑多竹篠也言太祖以政為長史餽食供軍如蕭何寇恂矣公秉照晋疑作普之靈降明神之徳猛虎振檻七年不驚羝羊觸蕃九齡能對竹林七賢論曰王戎幼而清秀魏明帝於宣武場上為欄苞虎阱使力士袒裼與之搏縱百姓觀之戎年七嵗亦往觀焉虎乗間薄欄而吼其聲震地觀者莫不辟易顛仆戎亭然不動帝於門上見之使問姓名而異之羝羊觸蕃羸其角易大壯九三爻辭荀爽曰三與五同功為兑故曰羊終始陽位故曰羝蕃謂四也三欲觸四而危之四反羸其角角謂五也揚雄别傳曰揚信字子烏雄第二子幼而聰慧雄疑羝羊觸藩彌日不就子烏曰大人何不云荷㦸入榛揚子法言曰育而不苗者其吾家之童烏乎九齡而予我以𤣥文諸兄以公先君愛子稱之曰仁推而襲封本傳云逞少謹宻早有名譽兄通先以軍功别受茅土乃譲父爵中都縣伯令逞襲之起家羽林監左傳公族穆子曰請立起也與田蘇遊而曰好仁雖復季末大成之心守節疑作季末天成乃心守節當謂去爾朱氏而就周太祖言雖遇季世而心能守節也按逞兄陸通傳云通從爾朱榮榮死又從爾朱兆及爾朱氏滅乃入關文帝引為帳内督疑逞亦與焉且逞父政亦從天光敗後歸文帝而本傳無聞稱其守節當謂未從爾朱也事在襲封前而子山追序之矣既遭燻穴翻從壓紐亦謂爾朱氏滅逞得歸文帝也淮南子曰越王翳逃入山穴越人燻而出之哀江南賦云剖巢燻穴左氏傳曰楚平王再拜皆壓紐葢謂爾朱之敗為燻穴得從文帝為當璧之君矣太祖初封函谷始合諸侯以公辭令叅謀機密故得戎政克宣師言無漏本傳云文帝内親信時輩皆以驍勇自逹惟逞獨兼文雅帝由此加禮遇焉大統十四年叅大丞相府軍事尋兼記室左氏傳曰齊寺人貂始漏師於多魚賜姓歩陸孤氏事見陸通傳委鹿輅而論都入鴻門而舞劒方之吹律綽有餘榮漢書曰婁敬脫輓輅見齊人虞將軍虞将軍入言召見説上曰陛下都洛不便不如入關據秦之便上問張良良因勸上是日車駕西都長安上曰本言都秦地婁敬婁者劉也賜姓劉氏拜為奉春君蘇林曰一木横鹿車前一人推之孟康曰輅音胡格反輓音晚索隠曰輓者牽也輅者鹿車前横木二人前輓一人後推之又曰沛公從百餘騎見羽鴻門羽留沛公飲范増令項莊入以劒舞因撃沛公莊入為壽因拔劒舞項伯亦起舞常以身翼蔽沛公得免賜姓劉氏潛夫論曰古人始生吹律定其姓名漢書曰京房本姓季氏吹律定姓為京氏言歩陸孤賜姓若婁敬項伯為從龍應運之臣榮於吹律定姓也出身羽林監輕車將軍除尚書右丞官聨會計務應平準水衡貫朽長平粟紅趙氏孟子注曰孔子主委積倉庾之吏不失會計當直其多少而已史記有平準書漢書注曰水衡與少府皆天子私藏三輔黄圖有長平倉漢書曰太倉之粟紅腐而不可食授使持節車騎大將軍儀同三司增邑千戸尋遷駕部中大夫領吏部中大夫歴蕃部御伯東京鼎實先加鄧隲之勲西晋官人多用山濤之啓後漢書曰鄧隲字昭伯女弟為貴人立為和熹皇后延平元年拜隲車騎將軍儀同三司自隲始也殤帝崩太后與隲定策立安帝永初元年封隲上蔡侯食邑萬戸以定策功增三千戸隲辭譲上疏至於五六乃許之晋書曰山濤為吏部尚書所奏甄拔人物各為題目時稱山公啓事豈若五王登朝必司賔主之禮六龍御轡取定鸞和之節首語謂領蕃部也次語謂領駕部也按蕃部之職如古典客鴻臚掌四方歸義蠻夷實司賔禮者也云五王登朝者當引漢書匈奴傳五單于事謂呼韓邪單于屠耆單于呼揭單于車犂單于烏藉單于凡五王也甘露三年單于朝甘泉宫漢寵以殊禮矣漢書禮樂志曰六龍之調使我心若左傳錫鸞和鈴昭其聲也杜注曰鸞在鑣和在衡按駕部掌車輿牛馬等物故云是矣御正以官觸父名不拜周書明帝紀云武成元年八月增御正四人為上大夫按逞父名政故御正之官為觸父名矣會稽有王會之名其子不為太守博陵有王沈之封其兒不為刺史晋書曰王舒字處明丞相導之從弟也父會侍御史舒代鄧攸為尚書僕射時將徵蘇峻司徒王導欲出舒為外援乃授撫軍将軍㑹稽内史秩中二千石舒上疏辭以父名朝議以字同音異於禮無嫌舒復陳音雖異而字同求换他郡於是改會字為鄶舒不得巳而行又曰王沈字處道太原晋陽人初封博陵侯及武帝受禪以使命之勲封博陵郡公子浚字彭祖出補河内太守以郡公不得為二千石轉東中郎遷驃騎大将軍開府入掌納言治司宗伯漢官儀曰尚書唐虞官也龍作納言出入帝命周禮云春官宗伯本傳徙授司宗中大夫故云又為軍司馬職居常伯勤問於南宫位管王言連官於北斗漢官儀曰侍中周成王常伯任侍中殿下稱制出即陪乗後漢書曰肅宗詔賈逵入講尚書南宫雲臺禮記曰王言如絲其出如綸晋書天文志曰紫宫垣在北斗北門内東南維五星曰尚書主納言夙夜諮謀龍作納言此之象也豈止郊天祀地龍門嶰谷之聲贊鼔頒旗白露涼風之月上語謂宗伯之職也下語謂軍司馬之職也周禮大宗伯之職云掌建邦天神人鬼地示之禮又云冬日至於地上之圜丘奏樂六變則天神降夏日至於澤中之方丘奏樂八變則地示出又云龍門之琴瑟鄭注曰龍門山名呂氏春秋曰黄帝使伶倫自大夏之西崑崙之隂取竹之嶰谷生其竅厚薄均者斷兩節間而吹之以為黄鐘之管制十二筩以聽鳯凰之鳴雄鳴六雌鳴六以為律呂周禮曰司馬以旗致民平列陳如戰之陳辨鼔鐸鐲鐃之用淮南子曰孟秋之月涼風至白露降暗夜有人餉羅數十匹公閉門不受行人干觸具以聞奏朝野稱之太尉楊震直推故吏之金涼州張奐高揖羌人之馬清畏人知我無慙徳本傳云逞幹識詳明歴任三府所在著績朝廷嘉之進爵為公後漢書曰楊震字伯起時號關西孔子遷荆州刺史東萊太守當之郡道經昌邑故所舉荆州茂才王密為昌邑令謁見至夜半懐金十斤以遺震震曰故人知君君不知故人何也密曰暮夜無知者震曰天知地知我知子知何謂無知密愧而出又曰張奐字然明敦煌酒泉人遷安定屬國都尉使南匈奴不得交通東羌諸豪遂相率與奐和親共撃鞬等連戰破之郡界以寜羌豪帥感奐恩徳上馬二十疋先零酋長又遺金鐻八枚奐並受之而召主簿於諸羌前以酒酹地曰使馬如羊不以入廐使金如粟不以入懐悉以金馬還之晋陽秋曰胡威字伯虎淮南人父質以忠淸顯威為徐州世祖賜見與論邉事及平生帝歎其父清因謂威曰卿清孰與父對曰臣清不如也帝曰何以為勝汝耶對曰臣父清畏人知臣清畏人不知是以不如逺矣齊國通和封人受使以公有出境之才見命張􅎶之禮既珠盤揷血定楚國之連名七首登壇反齊人之侵地是謂使乎固稱光國本傳云天和三年齊遣侍中斛斯文略中書侍郎劉逖來聘初修鄰好盛選行人詔逞為使主尹公正為副以報之逞美容止善辭令敏而有禮齊人稱焉還届近畿詔定路車飾服郊迎而入時人榮之儀禮曰使者及境張􅎶乃謁關人周禮曰玉府若合諸侯則共珠槃玉敦鄭注曰敦槃類珠玉以為飾古者以槃盛血以敦盛食合諸侯者必割牛耳取其血㰱之以盟珠槃以盛牛耳尸盟者執之故書珠為夷鄭司農云夷槃或為珠槃玉敦揷血玉器史記曰秦之圍邯鄲趙使平原君求救合從於楚平原君與楚合從言其利害日出而言之日中不决十九人謂毛遂曰先生上毛遂按劒歴階而上謂平原君曰從之利害兩言而决楚王叱遂遂按劒而前曰十步之内王不得恃楚國之衆命懸遂手吾君在前叱者何也以楚之强天下弗能當白起小豎子耳率數萬之衆以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人合從者為楚非為趙也吾君在前叱者何也楚王曰唯唯誠若先生之言謹奉社稷以從毛遂曰從定乎楚王曰定矣毛遂謂楚王之左右曰取雞狗馬之血來毛遂捧銅盤而跪進之遂定從於殿上楚魏救至秦兵遂罷又刺客傳曰曹沫魯人也齊桓公與莊公既盟於壇上曹沬執匕首劫齊桓公曰魯弱齊强而大國侵魯亦以甚矣今魯城壊即壓齊境君其圖之桓公乃盡許歸魯之侵地曹沫三戰所亡地盡復予魯索隠曰七音比劉氏云短劒也鹽鐵論以為長尺八寸其頭類七故云七首也三輔公侯五陵鐘鼎銅街柳市塵起風飛乃授京兆尹增邑通前一千六百戸餘官如故本傳云四年除京兆尹三輔黄圖曰武帝太初元年改内史為京兆尹與左馮翊右扶風謂之三輔其理俱在長安古城中西都賦曰北眺五陵西京賦曰撃鐘鼎食沈約麗色賦曰狹邪才女銅街麗人黄圖曰長安有九市郡國志曰長安大俠黄子夏居栁市王仲宣雜詩曰風飄揚塵起白日忽已冥呂向曰風起舉揚塵埃喻兵戈暴起也上林兵息蘭池盜静不學王陽平生鑄金之術未同張敞終日章臺之遊言逞為京兆尹有美政也本傳云逞為京兆尹都界有豕生子經旬而死其家有豶遂乳養之諸䐁頼之以活時論以逞仁政所致漢舊儀曰上林苑方三百里苑中養百獸天子秋冬射獵取之三輔黄圖曰蘭池宮始皇三十一年為微行咸陽與武士四人俱夜出逢盜蘭池漢書曰王陽雖儒生自寒賤然好車馬衣服極為鮮好而無金銀文繡之物及遷徙去官處所載不過囊衣不蓄餘財去位家居布衣蔬食天下服其亷而怪其奢故俗傳王陽能作黄金又張敞傳曰敞為京兆朝廷每有大議引古今處便宜公卿皆服天子數從之然敞無威儀時罷朝㑹過走馬章臺街使御史驅自以便面拊馬家僮暮行還得遺錢於道并白絁十匹公訪得其主即以還之見金於路指以示人得錢於道持留掛樹方之今日異代同風皇甫謐髙士傳曰延陵季子出遊見道中有遺金顧披裘公曰取彼金公投䥥瞋目拂手而言曰何子處之高而視人之卑五月披裘而負薪豈取金者哉季子驚謝邴原别傳曰原嘗行而得遺錢拾以繫樹枝此錢既不見取而繫錢者愈多謂之神樹俄遷司會治小司馬重總六軍再操八柄考績入於嵗成論功書之年表本傳云俄遷司㑹中大夫出為河州刺史晋公䕶雅重其才表為中外府司馬頗委任之尋復為司㑹兼納言遷小司馬周禮鄭注云天子六軍周禮大宰之職以八柄詔王馭羣臣一曰爵二曰祿三曰予四曰置五曰生六曰奪七曰廢八曰誅逞前已為軍司馬今為司會中大夫復為司㑹遷小司馬故云重總六軍冄操八柄也尚書曰三載考績黜陟幽明史記有功臣年表及将相名臣年表尋授都督宜州諸軍事宜州刺史本傳云䕶誅免官頃之起為納言又以疾不堪任乃除宜州刺史周書太祖紀云魏廢帝三年改北雍州為宜州隋志云京兆郡華原縣後魏置北雍州西魏改為宜州露冕觀風停車待雨百城解印憚朱穆之威千里相迎愛王基之徳益都耆舊傳曰郭賀拜荆州刺史明帝巡狩至南陽特見嗟嘆賜以三公之服黼黻旒冕勅去幨露冕使百姓見此衣服以章其徳後漢書曰鄭𢎞為淮隂太守行春大旱隨車致雨又朱穆傳曰順帝末江淮盜賊羣起州郡不能禁梁冀辟之使典兵事永興元年冀州盜賊尤多故擢穆為冀州刺史州人有宦者三人為中常侍並以檄謁穆穆辭之疾不相見冀部令長聞穆濟河解印綬去者四十餘人及到奏劾諸部至有自殺者以威略權宜盡誅賊渠帥舉劾權貴或死獄中魏志曰王基字伯輿東萊曲城人也黄初中察孝亷除郎中是時青土初定刺史王浚特表請基為别駕後召為袐書郎浚復請還司徒王朗辟基浚不遣朗書劾之大將軍司馬宣王辟基未至擢為中書侍郎按逞􅊩任宜州未乆請停即被勅追還如公叔之始及濟河伯輿之歴經辟召矣曾未朞月被􅎁追還眷眷吏民不無河内之請依依故老實念黎陽之别本傳除宜州刺史故事刺史奉辭例備鹵簿逞以時屬農要奏請停之武帝深嘉焉詔遂其所請以彰雅操逞在州有惠政吏人稱之後漢書曰寇恂拜河内太守恂至潁川盜賊悉降而竟不拜郡百姓遮道曰願從陛下借寇君一年乃留恂又鄧訓傳曰訓撫接邊民為幽部所歸遷䕶烏桓都尉黎陽故人多攜將老幼樂隨訓徙邊少陽養徳前星守器尊師讓齒必俟賢能乃授太子太保本傳云東宫初建授太子太保顔延年曲氷詩序曰正體毓徳於少陽李善注云少陽東宫也周禮鄭注曰東郊少陽諸侯象也星經曰心三星中天王前為太子後為庶子故曰前星尊師師如太保太傅太師少保少傅少師也讓齒按禮太子入學以年大小為次不以天子之子為上方之劉寔道高於大邦譬以山濤榮深於小輦晋書曰劉寔字子真平原高唐人也為國子祭酒散騎常侍愍懐太子初封廣陵王高選師友以寔為師元康中進爵為侯累遷太子太保太安初寔以老病遜位賜安車駟馬以侯就第又曰山濤字巨源河内懐人也咸寜初轉太子少傅加散騎常侍除尚書僕射加侍中領吏部居選職十有餘年濤以老疾固辭不許帝嘗講武於宣武塲濤時有疾詔乗步輦從因與盧欽論用兵之本於時咸以濤不學孫吳而闇與之合帝稱之曰天下名言也本有消渴之疾常餌金石自理舊疾微增奄捐舘舍茂陵之下不留封禪之書校尉之營惟餘服食之器西京雜記曰長卿素有消渴疾及還成都悦文君之色遂以發痼疾漢書司馬相如傳曰相如既病免家居茂陵天子曰相如病甚可往悉取其書若後失之矣使所忠往而相如巳死家無遺書問其妻曰長卿未死時為一巻書有使来求書奏之其遺札書言封禪事所忠奏焉天子異之後漢書曰宣秉字巨公溤翊雲陽人遷司𨽻校尉秉性節約常服布被蔬食瓦器帝嘗幸其府舍見而嘆曰楚國二龔不如雲陽宣巨公即賜布帛帳什物四年拜大司徒司直六年卒於官帝愍惜之嗚呼哀哉春秋四十有七建徳二年五月十一日也天子以大臣之丧躬輟聽訟東朝以師傅之尊親臨攢祭東朝謂太子也震主東方故曰東朝詔贈大將軍本傳同諡某公禮也以今三年正月十日葬於京兆之高陽原夫人郁久閭郁久閭蠕蠕國姓也北史曰蠕蠕姓郁久閭氏始神元之末掠騎冇得一奴髮始齊眉亡本姓名其主字之曰木骨閭木骨閭者首秃也木骨閭與郁久閭聲相近故後子孫因以為氏齊神武娶蠕蠕公主郁久閭氏魏景穆皇后亦郁久閭氏蠕蠕强盛與西魏通和故得婚也逞之夫人當亦蠕蠕公主故下云王姬矣西遇王姬愛敬肅恭言容令淑有聞箴盥無廢紘綖禮記曰右佩箴管線纊管字同盥左氏傳曰奉匜沃盥杜云器也盥古緩反又左傳曰衡紞紘綖杜注曰紘纓從下而上者綖冠上覆列女傳敬姜曰公侯之夫人加之以紘綖爰在盛年先從大夜今節婦開墳松柏巳拱季孫成寢丘陵始同史記曰公子重耳謂季隗曰待我二十五年不來而後嫁對曰二十五年不來吾墓上柏大矣禮記曰季武子成寢杜氏之丧在西階之下請合葬焉許之况復圖畫賢妃方在甘泉之室瘞埋才子即用高陽之原上謂郁乆閭下謂逞也漢書曰金日磾母教誨兩子甚有法度上聞而嘉之病死詔圖畫於甘泉宫署曰休屠王閼氏日磾每見畫常拜嚮之涕泣然後乃去又曰李夫人少而早卒上憐閔焉圖畫其形於甘泉宫左氏傳曰高陽氏有才子八人後漢書曰荀氏有子八人號曰高陽里今𦵏地名高陽原故云公儀表外明風神内照器量深沈階基不測事君惟忠事親惟孝言為世範行為士則陳仲弓碑文辭也留連墳素怊悵文詞素即索左氏傳曰三墳五典八索九丘宋玉高唐賦云怊悵自失李善注云王逸楚辭注云怊悵恨貌霜府錄於尚書天官總於司會出入匡贊常帶數職身具六龜腰恒四綬周禮天官冢宰有司會之職鄭注曰會大計也司會主天下之大計計官之長若今尚書出入匡贊常帶數職者謂遷駕部領兵部歴蕃部及遷驃騎掌納言司宗伯又為軍司馬也又遷司會任河州表中外府司馬復為司會兼納言遷小司馬是其常帶數職有六龜四綬之集矣漢舊儀曰銀印背龜紐其文曰章謂刻為某官之章也董巴輿服志曰古者君臣佩玉尊卑有序及秦以采組連結於襚謂之綬漢承秦制陳平密謀既非天子所見荀彧上策又非諸侯所聞漢書曰高祖至平城為匈奴所圍七日用陳平袐計得出應劭曰陳平使畫工圖美人間遣人謂閼氏云漢有美女如此今皇帝困厄欲獻之閼氏畏其奪己寵謂單于曰漢天子亦有神靈得其土地非能有也於是匈奴開其一角得突出鄭氏曰以計鄙陋故不傳師古曰應氏之説出桓譚新論葢譚以意測之事當然耳非記傳所傳也魏志曰荀彧字文若潁川潁隂人也勸太祖至洛陽奉迎天子進為漢侍中守尚書令常居中持重太祖雖征伐在外軍國事皆與彧籌焉與紹連戰太祖保官渡紹圍之太祖軍糧方盡書與彧議欲還許以引紹用彧言遂以奇兵襲紹斬淳于瓊等紹退走許攸叛紹顔良文醜臨陣授首田豐以諫見誅皆如彧所策彧别傳曰彧自為尚書令常以書陳事臨薨皆焚毁之故奇䇿密謀不得盡聞也其為郡也惟取赤土封書其為州也惟以青鹽换粟東觀漢記曰鄧訓好青泥封書黎陽故吏載青泥一襆至上谷遺訓又西京雜記曰漢朝中書以武都紫泥為璽室加綠綈其上魏志曰徐邈為涼州刺史使持節領䕶羌校尉至值諸葛亮出祁山隴右三郡反邈輒遣叅軍及金城太守等撃南安賊破之河右少雨常苦乏榖邈上修武威酒泉鹽池以收虜穀漢書地理志云朔方縣有青鹽澤魏土地記云朔方縣有大鹽池其鹽大而青白名曰青鹽又名戎鹽留家則千樹無資遺子則一經而已習鑿齒襄陽耆舊傳曰吳李衡字叔平襄陽人習竺以女英習配之漢末為丹陽太守衡毎欲治家事習不聽後密遣客十人往武陵龍陽汎洲上作宅種橘千株臨死勅兒曰汝母毎怒吾治家事故窮如是然吾州有千頭木奴不責汝食嵗上匹絹亦當足用耳衡既亡後二十餘日兒以白英習曰此當是種樹也汝家失十客來七八年必汝父遣為宅汝父恒稱太史公言江陵千樹橘當封君家吾答云士患無徳義不患不富若貴而能貧方好爾漢書韋賢傳曰自韋孟至賢凡五世賢少子𤣥成復以明經歴位至丞相故鄒魯諺曰遺子黄金滿籯不如一經嫡子操本傳子操嗣至性過禮純孝不遺疑作匱左氏傳曰穎考叔純孝也詩曰孝思不匱墳前之樹染淚者先枯庭際之禽聞悲者則下干寳搜神記曰王裒字偉元元城營陵人父儀為文帝所殺裒廬於墓側旦夕常至墓所拜跪攀柏悲號涕泣著樹樹為之枯又曰鄭𢎞遷臨淮太守郡民徐憲在喪致哀有白鳩巢户側𢎞舉為孝亷朝廷稱為白鳩郎陸機周處碑文云墳前之樹淚染先枯庭際之禽聞悲乃下銘曰山連日觀水枕滇機富春沙起開陽柱飛言陸氏之先系出齊田後適楚國又為吳人及歸魏居洛陽也應劭漢官儀曰泰山東南山頂名曰日觀雞一鳴時見日始欲出長三丈許故以名焉按泰山日觀在齊地言陸氏之先出自齊國故山連日觀也水枕滇機謂楚地按史記楚威王使莊蹻循江上略至滇池滇楚接界故水枕其流矣言陸氏自齊適楚為楚人也郡國志富春屬吳郡吳志曰黄初五年秋分三郡惡地十縣置安東郡治富春以全琮為太守平討山越水經注曰浙江東北逕富春縣江南有山孫武皇之先所葬也浙江又逕越王允常冢北句踐都瑯琊欲移允常冢冢中生風飛沙射人遂止富春沙起是其事也吳時丹陽吳會山民為寇權分三郡險地為安東郡富春乃是一郡統率諸縣故得稱富春沙起也應劭漢官儀曰開陽門始成未有名夜有一柱來樓上瑯邪開陽縣上言縣南城門一柱飛去光武使視之因刻記其年月日以名門焉後漢書百官志洛陽城十二門有開陽門二語喻陸氏本吴人富春屬吴今為河南洛陽人開陽門在洛陽若飛柱矣大夫屈節將軍振威南越受吏西陵解圍大夫謂陸賈為南越使者將軍謂陸遜為西陵將軍也注見本序昔我烈祖垂翅秦中白馬無路烏江不通笛吟鄉里琴哀土風謂逞祖載留關中没赫連氏不得歸吳遂居洛陽也後漢書馮異傳璽書勞異曰始雖垂翅囘溪終能奮翼澠池史記高祖本紀云劉賈將騎二萬人騎數百渡白馬津索隠曰即黎陽津也南界東郡白馬縣史記曰項羽敗至烏江曰天之亡我何渡為向子期思舊賦序曰鄰人有吹笛者發聲寥亮追思曩昔遊宴之好感音而嘆左氏傳曰晋侯見鍾儀使與之琴操南音范文子曰樂操土風不忘舊也營州恒州擁旄世載壯節旃衿人雄關塞營州當謂載仕魏為中山郡守也恒州謂政為恒州刺史也史記正義曰旄節者編毛為之以象竹節直河穿趙平雲臨代生謂立功没為留愛恒州在趙代之間即漢之恒山郡依恒山為名左氏傳曰其次立功又曰子産古之遺愛也言政為刺史於州郡之内立功遺愛也降兹嶽瀆誕此貞明祥符雲氣慶合星精謂逞之生為天地之所鍾靈也尚書孔安國傳曰四嶽視公四瀆視伯史記天官書曰卿雲見喜氣也列仙傳曰東方朔為嵗星之精宮帷定策殿柱書名忠泉暗漏孝笋寒生宮帷定策即序中鄧隲事殿柱書名漢田鳯事忠泉耿恭事孝笋孟宗事皆注見前篇世屬殷周時逢楚漢天下三分鴻溝一半世屬殷周以魏周比殷周以周太祖比文王也故云天下三分時逢楚漢以齊周比楚漢本東西魏也魏分東西若割鴻溝矣以我明略來叅匡贊日乃再中天成兩旦謂逞叅謀機密周之帝業以成如殷日冄中堯華復旦也史記封禪書曰新垣平言日冄中居頃之日却復中虞舜卿雲歌曰日月光華旦復旦兮見呂氏春秋逓叅三事歴副六卿天師一作司光宅地載謨明詩云三事大夫又左氏傳曰六府三事謂之九功正徳利用厚生謂之三事六卿周禮冢宰司徒宗伯司馬司寇司空是也逞為吏部中大夫及小司馬未居正卿又歴諸部故云逓叅歴副矣尚書曰光宅天下又曰謨明弼諧春官定禮夏官治兵讖言黙識溫樹無名春官謂宗伯也夏官謂司馬也後漢書竇融傳云融上疏曰臣融年五十三有子年十五質性頑鈍臣融朝夕教導教以經義不得令觀天文讖記漢書曰孔光沐日歸休與兄弟妻子燕語終不及朝省政事或問光溫室省中樹皆何木也光黙不應更答以他語其不泄如此謙恭周密言行無乖忠公兕殪隂徳蛇埋漢書曰張安世以謹慎周密自著晋語叔向曰昔吾先君唐叔射兕於徒林殪以為太甲以封於晋韋昭曰兕似牛而青善觸人徒林林名一發而死曰殪甲鎧也列女傳曰孫叔敖為嬰兒之時出遊見兩頭蛇殺而埋之歸見其母而泣焉母問其故對曰吾聞見兩頭蛇者死今出遊見之其母曰蛇今安在對曰吾恐他人復見之殺而埋之矣其母曰汝不死矣夫有隂徳者陽報之徳勝百祥仁除百禍天之處高而聽卑書不云乎皇天無親惟徳是輔爾黙矣必興於楚及叔敖長為令尹軍國紛總部領填堦一作偕馬不入廐金不入懐言歴任諸部事繁逞有清聲也馬不入廐金不入懐後漢張奐事注見本序具瞻惟徳高山惟仰甲觀初登龍樓初上東國桓榮西京疎廣謂逞為太子太保也詩曰民具爾瞻又曰高山仰止三輔黄圖曰太子宮有甲觀畫堂又云龍樓門門上有銅龍漢書成帝紀曰上召太子出龍樓門後漢書明帝紀曰建武十九年立為皇太子師事博士桓榮學通尚書漢書曰疎廣為太傅受為少傅上疏乞骸骨歸公卿大夫為設祖道供帳東都門外年齡俄頃風電相摧銘旌兩没池栁雙廻禮記曰古者謂年齡齒亦齡也檀弓曰銘明旌也以死者為不可别已故以其旗識之又曰池視重霤鄭注云如屋之有承霤也栁宮象也以竹為池衣以青布懸銅魚焉今宮有承霤云以銅為之正義曰池者栁車之池也兩没雙廻言陸逞與郁久閭氏合葬也㷀㷀𦙍子在疚啣哀身障野火心懼天雷言子操居喪以禮也左氏傳曰予㷀㷀在疚李陵書曰足下𦙍子無恙後漢書曰長沙有孝子古初遭父喪未𦵏鄰人失火初匍匐柩上以身扞火火為之滅干寳搜神記曰王裒母性畏雷母没每雷輒到墓曰裒在此日月其除榮終哀始馬歸司𨽻書還太史歴對天星墳連地市詩曰今我不樂日月其除論語曰其生也榮其死也哀列異傳曰鮑宣三世為司𨽻嘗乗一驄馬史遷自序云談為太史公如淳注曰漢儀注太史武帝置位在丞相上天下計書先上太史公副上丞相序事如古春秋遷死後宣帝以其官為令行太史文書而巳歴對天星如莊子云傅説得之以騎箕尾説死為傅説星矣辛氏三秦記曰驪山始皇陵作地市生死人交易市平不得欺死人云山勢接飛松形蓋起徳音無絶平原忽矣抱樸子曰千嵗之松有如偃蓋楚辭曰平原忽兮路超逺周大將軍崔説神道碑公諱説周書作訦字士約博陵郡安平縣人也周書列傳曰崔謙字士遜博陵安平人也弟訦本名士約謙字士遜訦當以士約為字矣昔者華陽之野降龍首之神烈山之都啟龜文之繇序崔氏之先也帝王世紀曰神農氏姜姓也母曰任氏有蟜氏女登為少典妃遊華陽有神龍首感生炎帝人身牛首長於姜水有聖徳以火徳王故曰炎帝又曰神農本起烈山故曰烈山氏一曰厲山氏黄帝代之於時河出龍圖洛出龜書三皇本紀曰神農本起烈山故左氏稱烈山氏之子曰柱亦曰厲山氏禮曰厲山氏之有天下是也按崔氏系出齊姜姜姓本神農之後故云左傳云且其繇曰杜注云繇卜兆辭繇直救反匡周則盟津有會佐夏則龍門始鑿匡周謂齊太公望佐武王㑹諸侯於盟津也佐夏謂四岳也尚書舜曰咨四岳有能奮庸熈帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉按禹本四岳所薦故云佐夏也禹貢曰導河積石至于龍門地理志云龍門山在馮翊夏陽縣北此山當河之道禹鑿以通河東郡之西界也按四岳有伯夷齊為姜姓伯夷之裔言神農之後在夏則有伯夷在周則有呂尚先周後夏互文也西遊則起家秦相東入則載世齊卿備乎史籍可得言矣崔氏出自齊丁公左傳東郭偃曰今君出自丁杜注云齊丁公崔杼之祖也傳又云崔杼生成及彊而寡娶東郭姜生明崔成有疾廢之而及明崔成請老於崔弗許曰崔宗邑也必在宗子杜元凱曰濟陽東朝陽縣北有崔氏城傳又云崔氏滅崔明奔魯世系表云崔明生良十五世孫意如為秦大夫封東萊侯此云起家秦相者即是人也載世齊卿者即崔武子是齊卿在前秦相在後此亦互文也祖辯平逺将軍武邑郡守周書訦兄崔謙傳云祖辯魏平逺将軍武邑郡守魏書北史並作安南将軍隋志冀州信都武彊縣舊置武邑郡父楷散騎常侍光禄大夫殷州刺史崔謙傳云父楷散騎常侍光禄大夫殷州刺史贈侍中都督冀定相三州諸軍事驃騎大将軍儀同三司冀州刺史隋志豫州趙郡大陸縣舊曰廣阿置殷州並厲風霜俱張鋒穎邸史疊迹官曹凜然是謂鮑恢都官百城振懼葛豐握節京師斂手並厲俱張言祖辯父楷二人也邸史者按郡有邸及從事史漢書朱買臣傳云會稽郡守邸者又云郡邸直上計後漢書百官志從事史十二人都官從事等其餘部郡國從事每郡國各一人主督促文書察舉非法皆州自辟除官曹者如功曹書佐之類後漢百官志云每郡國各有典郡書佐一人各主一部文書以郡吏補以辯楷為郡守刺史故云後漢書曰鮑永為司𨽻校尉鮑恢為都官從事光武曰貴戚宜斂手避二鮑漢書曰諸葛豐字少季瑯邪人特立剛直元帝擢為司𨽻校尉刺舉無所避京師為之語曰間何闊逢諸葛上嘉其節加豐秩光禄大夫時侍中許章以外戚屬貴幸奢淫不法豐按劾章欲奏其事適逢許侍中私出豐駐車舉節詔章曰下欲收之章窘廹馳入宮自歸上豐亦上奏於是收豐節司校去節自豐始公特稟英靈偏鍾山嶽雄姿俊茂眉目疎朗觀虎於檻齠髮不驚稱象於船勝衣能對世説曰魏明帝於宣武塲上斷虎爪牙縱百姓觀之王戎七嵗亦往看虎乗間攀欄而吼其聲震地觀者無不辟易顛仆戎湛然不動了無恐色魏志曰鄧哀王沖字蒼舒少聰察岐嶷生五六嵗智意所及有若成人之智時孫權曾致巨象太祖欲知其斤重訪之羣下咸莫能出其理沖曰置象大船之上而刻其水痕所至稱物以載之則較可知矣太祖大悦即施行焉齠即髫剪髮為鬌也故云齠髮至於拉虎捭一作羈熊摧斑碎掌忘歸繁弱落雁吟猿故得氣蓋關中威申河外本傳云訦少鯁直有節槩膂力過人尤工騎射曹子建七啓曰批熊碎掌拉虎摧斑新序曰楚王載繁弱之弓忘歸之矢以射隨兕於雲夢也干寳搜神記曰楚王遊於苑白猿在焉王令善射者射之矢數發猿搏矢而笑乃命由基由基撫弓猿即抱木而號及六國時更嬴謂魏王曰臣能虚發而下鳥王曰然則射可至此乎嬴曰可有頃聞雁從東來更嬴虛發而鳥下焉吟猿落雁是其事也關中秦地漢書曰懐王與諸将約先入定關中者王之師古曰自函谷關以西總名關中項羽雞鳴歌云力拔山兮氣葢世潘岳西征賦曰出申威於河外李善曰河外謂之澠池史記曰秦王使告趙王為好會於西河外澠池按河外索隠謂曲沃等處正義謂同華州晋語入河外列城五注云河東也晋以河東為河外魏以河南為河外張儀説魏王曰秦下兵攻河外據巻衍酸棗説齊曰梁效河外索隠謂河外河之南邑若曲沃平周等處魏世家秦復予我河外無忌率五國兵攻秦敗之河外蘇秦説趙曰魏弱則割河外張儀説趙曰秦驅韓梁軍於河外正義謂滑州北臨河此河外澠池也解褐領軍錄事轉諮議參軍周書同時當塗失御政在權門始論函谷之兵即起韓陵之戰當塗言魏也權門言爾朱氏及高歡也後漢書曰代漢當塗高答賔戲曰王塗蕪穢因失其御魏本紀云明帝崩爾朱榮謀廢立立莊帝榮以兵權在己遂有異志帝殺榮尋為爾朱兆所弑立閔帝高歡復廢帝立孝武閔帝失位賦詩曰朱門久可患紫極非情翫顛覆立可待一年三易换時運正如此惟有修真觀其失御如此按魏本紀云武帝永熈三年九月高歡東還洛陽帝親督衆攻潼關斬其行臺華長瑜又尅華州此云始論函谷之兵是也又魏本紀云閔帝普泰元年六月高歡起兵信都以誅爾朱氏為名二年高歡敗爾朱天光等於韓陵此云韓陵之戰是按韓陵之戰在魏未遷之前當是互文函谷句謂高歡之亂韓陵句謂爾朱氏之亂此二家皆専權魏室者也太師賀拔勝作牧西荆周書列傳曰賀拔勝字破胡神武尖山人也武帝將圖神武以勝弟岳擁衆關西欲廣其勢援乃拜勝為都督三荆二郢南襄南雍七州諸軍事荆州刺史魏文帝三年以賀拔勝為太師公為假節冠軍將軍防城都督及南陽失守巻甲奔梁本傳云賀拔勝出牧荆州以訦為假節冠軍將軍防城都督又隨勝奔梁南陽失守者按賀拔勝傳武帝西遷勝還軍南陽自率所部將西赴關中進至淅陽詔封勝太保録尚書事時齊神武已䧟潼關屯軍華隂勝乃還荆州州民鄧誕執元穎北引侯景勝至景逆擊之勝軍不利率麾下數百騎南奔梁在江表三年梁武帝遇之甚厚勝常乞師北討齊神武既不果乃求還梁武帝許之親餞於南苑勝自是之後每行執弓矢見鳥獸南向者皆不射之以申懐徳之志也既至長安詣闕謝罪朝廷嘉其還乃授太師訦既從勝奔還俱同故備録於此樂毅羇旅猶思燕路陳軫悽愴終戀秦聲謂訦在梁之日思歸長安也戰國䇿曰樂毅破齊燕惠王得齊反間使騎劫代將而召樂毅毅畏誅遂西降趙趙封望諸君尊寵樂毅以驚動於燕齊齊田單破騎劫燕惠王後悔復以毅子樂間為昌國君而樂毅往來復通燕燕趙以為客卿卒於趙史記陳軫適至秦惠王曰子去寡人之楚亦思寡人不陳軫對曰越人莊舄仕楚執珪有頃而病楚王曰舄故越之鄙人也今仕楚執珪富貴矣亦思越不中謝對曰凡人之思故在其病也彼思越則越聲不思越則且楚聲使人往聽之猶尚越聲也今臣雖棄逐之楚豈能無秦聲哉惠王曰善幸值和鄰言歸舊國本傳復自梁歸國授衞將軍都督封安昌縣開國子食邑三百戸本傳同隋志豫州汝南郡朗山縣舊曰安昌𢎞農克復沙苑揮鋒本傳云從太祖復𢎞農戰沙苑皆有功克𢎞農戰沙苑周太祖與齊神武戰也在魏文帝大統三年八月至𢎞農十月至沙苑距齊神武軍皆大克獲獻俘長安隋書地志曰馮翊有沙苑進爵為侯增邑并前一千一百户本傳同信圭則更受司勲穀璧則還輸典瑞周禮宗伯云侯執信圭玉人云命圭七寸謂之信圭侯守之司勲屬夏官鄭司農云勲功也此官主功賞宗伯云子執穀璧鄭注云穀所以養人以穀為飾璧徑五寸不執圭者未成國也又宗伯有典瑞之職鄭注云瑞節信也典瑞若今璽節郎訦始封子今進爵為侯是用受信珪於司勲還穀璧於典瑞也鐵馬有河橋之戰戈船有汾水之兵河橋汾水連前𢎞農沙苑二戰本傳此獨不載按賀拔勝傳河橋之役勝大破東魏軍及齊神武攻玉壁勝從太祖追之於汾北訦荆州之役𢎞農沙苑之戰皆從此河橋汾水當亦在焉子山碑文為䡋詳矣陸倕石闕銘曰鐵馬千羣注云鐵馬鐵甲之馬也漢書曰歸義越侯嚴為戈船將軍張宴曰越人於水中負人船又有蛟龍之害故置戈於船下因以為名也除京兆太守本傳同移民下邑未學邊韶走馬章臺不同張敞移民下邑未學邊韶疑引延篤事後漢書曰延篤桓帝以博士徵拜議郎與朱穆邊韶共著作東觀徙京兆尹其政用寛仁憂恤民黎擢用長者與叅政事郡中歡愛三輔咨嗟焉郡人語曰前有趙張三王後有邊延二君時皇子有疾下郡縣出珍藥而大將軍梁冀遣客齎書詣京兆并貨牛黄篤發書收客曰大将軍椒房外家而皇子有疾必應陳進醫方豈當使客千里求利乎遂殺之冀慙不得言篤以病免按邊即邊鳯以邊延二君前後京兆故云韶疑邊鳯字或取尚書簫韶九成鳯凰來儀之義非謂邉孝先也漢書曰張敞為京兆尹走馬章臺街遷帥都督持節撫軍通直散騎常侍大都督尋遷使持節車騎大將軍儀同三司都官尚書定州大中正本傳同隋書地理志云冀州博陵郡舊置定州後魏置總管府五曹奏事有朱穆之忠九品論人見楊喬之直漢書成帝紀曰建始四年春初置尚書員五人師古曰漢舊儀云尚書四人為四曹成帝置五人有三公曹百官志曰世祖置六人凡六曹云五曹者依成帝也後漢書曰朱穆字公叔南陽宛人徵拜尚書穆既深疾宦官及在臺閣旦夕共事志欲除之上疏帝不納後穆因進見口復陳曰臣聞漢家舊典置侍中中常侍各一人省尚書事黄門侍郎一人傳發書奏皆用姓族自和熹太后以女主稱制不接公卿乃以閹人為常侍小黄門通命兩宮自此以來權傾人主窮困天下宜皆罷遣博選耆儒宿徳與參政事帝怒不應自此中官數因事稱詔詆毁之穆素剛不得意憤懣發疽卒又孟嘗傳曰桓帝時尚書同郡楊喬上書薦嘗曰臣前後七表言故合浦太守孟嘗謝承後漢書曰楊喬字聖逹烏傷人也前後數上書陳政事也改封安國傳作安固縣侯益邑合前一千四百戸隋志冀州信都郡鹿城縣後齊曰安國傳作安固者隋志清化郡安固縣梁置後周置蓬州賜姓宇文改名為説本傳云賜姓宇文氏并賜名訦焉漢王改婁敬之族事重論都魏后變程昱之名恩深捧日漢書曰高祖西都長安拜婁敬為奉春君賜姓劉氏論都謂婁敬勸帝都關中也後漢書曰杜篤著論都賦魏書曰程昱少時常夢上泰山兩手捧日昱私異之以語茍彧及兗州反頼昱得完三城於是彧以昱夢白太祖太祖曰卿當為吾腹心昱本名立太祖乃加其日更名昱也遷車周書北史作驃騎大將軍開府儀同三司加侍中竇憲連官單于之寳鼎可致張寛固位渭橋之流星可識後漢書曰竇憲字伯度南單于請兵北伐拜憲車騎將軍與北單于戰於稽落山大破之登燕然山刻石勒功紀漢威徳南單于於漢北遺憲古鼎容五斗其傍銘曰仲山甫鼎其萬年子子孫孫永保用憲乃上之拜憲大將軍陳壽益都耆舊傳曰漢武帝蜀張寛為侍中從侍甘棠至渭橋有女子浴於渭水乳長七尺上怪其異遣問之女曰帝後第七車知我已知張寛在第七車對曰天星主祭祀者齋戒不潔則女人見竇憲句謂為車騎大將軍也張寛句謂為侍中也司木七工既掌丘陵之賦司會六典乃均邦政之才居官得人於斯為盛禮記曰天子六府有司木考工記曰凡攻木之工七周禮天官冢宰之職云司㑹掌邦之六典八法八則之貳鄭注云司會若今尚書進爵為公改封萬年縣通前二千四百戸隋志云京兆郡大興縣後周舊郡置縣曰萬年除隴州刺史都督隴州諸軍事俱見本傳隴坻路遥秦川望逺鄧仲華之不去馬文淵之願歸周書太祖紀云魏廢帝三年改東秦州為隴州隋志扶風汧源西魏置隴東郡及汧隂縣有西魏東秦州後改為隴州有隴山汧山汧水漢書地理志隴西郡應劭曰有隴坻在其西也師古曰隴坁謂隴阪即今之隴山也三秦記隴頭歌有遥望秦川之句後漢書曰鄧禹字仲華南陽新野人也赤眉入長安是時三輔連覆禹乗勝獨尅名震關西延岑寇順陽間禹破之岑奔漢中餘黨悉降天下平定按隴州亦在關西於古為六郡之地鄧禹西征數年乃尅此隴州是鄧仲華之所不去也又後漢書曰馬援字文淵扶風茂陵人也璽書拜援隴西太守諸種萬餘人悉降視事六年徵入為虎賁中郎將尋除涼州刺史總督河西甘𤓰諸軍事本傳遷總管涼廿𤓰三州隋志武威郡舊置涼州後周置總管府又曰張掖郡西魏改西涼州尋改曰甘州又曰敦煌舊𤓰州此三州也地似伏龍城如飛鳥水經注地理風俗記曰漢武帝元朔三年改雍州曰涼州以其金行土地寒涼故也王隠晋書曰涼州有龍形故曰臥龍城南北七十里東西三里本匈奴所築也又水經曰三危山在燉煌縣南注山海經曰三危之山三青鳥居之是山也廣圓百里在鳥䑕山西即尚書所謂竄三苖於三危是也西河記曰姑臧匈奴曰蓋藏城也城不方有頭尾兩翅名葢鳥城燉煌實録宛在胸襟玉門亭障無勞圖畫漢書地理志曰武帝後元年分酒泉置燉煌郡師古曰即春秋左氏傳所云允姓之姦居於𤓰州者也隋書經籍志云敦煌實錄十巻劉景撰漢書地理志龍勒有玉門關酒泉郡有玉門縣闞駰云漢罷玉關屯徙其人於此又西域傳曰漢列亭障至玉門矣又張安世傳曰大將軍光問千秋戰鬭方略山川形勢千秋口對兵事畫地成圖無所忘失有馬如羊不以入廐有金如粟不以入懐水經注曰侍郎張奐為定安屬國都尉治此羌有獻金馬者奐主簿張祁入於羌前以酒酧地曰使馬如羊不以入廐使金如粟不以入懐盡還不受威化大行事出後漢書柱國齊王齊煬王憲也詳見憲碑文今上之介弟今上謂武帝也左傳曰上其手者曰夫子為王子圍寡君之介弟也龔行薄伐問罪河陽以公為行軍長史參謀帷幄本傳云齊王憲東征以訦為行軍長史按憲傳事在天和四年五年平齊尚書曰恭行天伐西都賦引此作龔隋志河南郡河陽有古河陽城問罪河陽謂伐齊也中軍之司既舉魏絳上卿之佐實用荀林以公方之差無慙徳魏絳魏犨子畢萬之後左傳成十八年云魏絳為中軍司馬文七年稱令孤之役荀林父佐上軍按春秋時晋中軍司馬非卿上軍之佐其位在四皆非主帥也以比行軍長史言叅謀帷幄如二公矣除使持節大將軍大都督本傳軍還除崇徳周書武帝紀云天和四年九月齊國公憲率衆於宜陽築崇徳等城安義周書劉雄傳云天和四年從憲出宜陽築安義等城建忠隋志京兆三原縣後周置建忠郡九曲河曲壽安縣有九曲城所謂九阿也齊宣置孔城防主以備周在縣東南見通典安樂周書明帝紀云二年七月寜屬公尉遲迥率衆於河南築安樂城三泉疑即三原後周建忠郡是伏流周書武帝紀云保定二年四月於伏流城置和州又魏𤣥傳云天和四年轉和州刺史伏流防主隋志河南陸渾開皇改縣曰伏流有東魏北荆州後周曰和州周張平泉固安蠻通谷凡十三防禦本傳云除使持節崇徳安義等十三防是崇徳安義巳下皆防御名也隋書地志蜀郡有平泉此平泉所以備周恐非隋志涿郡固安舊曰故安餘未詳熊和忠三州周書同隋志洛州宜陽縣後魏置宜陽郡東魏置陽州後周改曰熊州和州注見上文即伏流城是又襄城郡東魏北荆州後周改曰和州忠州疑即中州隋志河南郡新安後周置中州黄蘆起谷王宴供超牽羊溫狐交河大嶺避雨木柵寺十一戍諸軍事崇徳防主黄蘆下十一戍名也本傳稱三州諸軍事崇徳防主不載其名通典云河南府永寜縣後周熊耳縣有後周黄櫨同軌永昌三城以備齊隋志後周置同軌郡此十一戍並屬崇徳防主崇徳注見上文宜陽上地更有秦兵熊耳山前還逢積仗用是連營函谷獵騎黎陽威振兩河名陵三晋史記秦本紀曰武王三年使甘茂庶長封伐宜陽四年拔宜陽斬首六萬渉河城武遂正義曰宜陽在河南府福昌縣東故陽城是也此韓之大郡伐取之三川路乃通也後漢書曰赤眉敗樊崇乃將盆子及丞相徐宣以下三十餘人肉袒降上所得傳國璽綬及玉璧各一積兵甲宜陽城西與熊耳山齊注云宜陽縣故城韓國城也酈元水經注曰洛水之北有熊耳山雙巒競舉狀同熊耳在宜陽也函谷關名兩河謂河東河北也三晋韓魏趙也史記年表曰定王十六年魏桓子與韓康子趙襄子三人敗智伯於晋陽乃三分其地故號為三晋按後魏宜陽郡東魏置陽州後周改曰熊州本漢宜陽縣魏之一金塢城也後周置重兵於此以備齊韋孝寛曰宜陽一城之地兩國爭之周築崇徳等五城齊築統關豐化二城時方東討周齊兩國交爭接境在於宜陽本故秦韓之地所以連營函谷獵騎黎陽兩河三晋之間威名遂振矣改封安平縣公本傳加授大將軍改封安平縣公淮隂一國韓信之故人户牖萬家陳平之鄉里公此衣錦足為連類漢書曰韓信淮隂人也項羽死高祖徙信為楚王都下邳信至國召所從食漂母賜千金及下鄉亭長錢百曰公小人為徳不竟召辱已少年令出跨下者以為中尉告諸將曰此壯士也又曰陳平者陽武戸牖人也後高祖還至洛陽與功臣剖符定封封平為户牖侯言崔訦本博陵郡安平縣人今封安平縣公若韓信陳平矣項羽思東歸曰富貴不歸故鄉如衣錦夜行其後歸故里者皆云衣錦建徳四年正月十日薨於長安之永貴里私第春秋六十有四詔贈敷周書作鄜字同延丹綏恒周書作長五州諸軍事敷州刺史隋志上郡後魏置東秦州後改北華州西魏改敷州又曰延安郡後魏置東夏州西魏改為延州又曰延安郡義川西魏為丹州又曰雕隂郡西魏置綏州又曰朔方郡長澤縣有後魏太安郡及置長州按此五州皆隋雍州地也諡曰莊公禮也傳同即以其年二月二十四日葬於京兆平原鄉之吉遷里北陵追逺大司馬有賜綬之恩西京贈行冠軍侯有詔𦵏之禮史記曰乃益置大司馬位大將軍驃騎將軍皆為大司馬衞青冢近茂陵在長安北故云北陵霍去病封冠軍侯元狩六年卒天子悼之發屬國𤣥甲軍陳自長安至茂陵為冢像祁連山嗚呼哀哉世子儀同衍本傳云子𢎞度猛毅有父風大象末上柱國武鄉郡公此云衍本傳字摩訶衍生事以禮死𦵏以禮愛親有王祥之孝同氣有姜肱之睦百行之本於斯備焉崔謙傳曰謙性至孝與弟訦特相友愛雖名位各重所有資産皆無私焉居家嚴肅謙子曠與訦子𢎞度等並奉其遺訓焉干寳搜神記曰王祥字休徵瑯琊人性至孝早喪親繼母朱氏不慈數譖之由是失愛於父母使掃除牛下父母有疾衣不解帶母常欲生魚時天寒冰凍祥解衣將割冰求之冰忽自解雙鯉躍出持之而歸母又思黄雀炙有黄雀數十入其幕復以供母鄉里驚嘆以為孝感所致後漢書曰姜肱字伯淮與二弟仲海季江俱以孝行聞其友愛天至常共臥起及各娶妻兄弟相戀不能别寢以係嗣當立乃逓往就室嘗與季江謁郡夜於道過盜欲殺之兄弟更相爭死賊遂兩釋焉况復松檟深沈既封青石之墓丘陵標榜須勒黄金之碑戴延之西征記曰金鄉焦氏北數里有漢司𨽻校尉曾峻冢前有石祠堂四壁皆青石隠起自書契以來忠臣孝子孔子七十二人形象皆刻石記之水經注曰刺史賈逵廟前有碑碑石生金干寳曰黄金可採為晋中興之瑞乃為銘曰華陽之神厲山之祖鳯野匡周龍門佐禹言崔氏系出神農及夏之伯夷周之太公皆其祖也華陽注見本序厲山即烈山括地志曰厲山在隨州隨縣北百里山東有石穴曰神農生於厲鄉所謂列山氏也春秋時為厲國國語曰周之興也鸑鷟鳴於岐山鸑鷟鳯凰也故云鳯野龍門注見本序日浴溟池山浮海浦甫穆霸國營丘樂土山海經曰日浴溫源淮南子曰日浴於咸池莊子曰南溟者天池也漢書曰三神山在渤海中溟池海浦者言齊表東海之國説文云浦瀕也潛夫論曰炎帝苖胄四岳伯夷為堯典禮折民惟刑以封申呂裔孫尚為文王師克殷而封之齊甫疑作輔文王為穆考疑謂輔穆考而霸國也然下文對以營丘是齊地名此甫穆豈謂穆陵耶左氏傳曰南至於穆陵史記曰武王封尚父於營丘曰齊正義曰營丘在青州臨淄北百步外城中詩曰適彼樂土𦙍斯宗邑承此壤王一作土移封東武就君安陽左氏傳曰崔宗邑也譜云崔氏出自姜姓齊丁公伋嫡子季子讓國叔乙食采於崔遂為崔氏濟南東陽縣西北有崔城是也季子生穆伯穆伯生沃沃生野八世孫夭生杼為齊正卿生子成子明子彊皆為慶封所殺子明奔魯生良十五世孫意如為秦大夫封東萊侯三子業仲牟業字伯基漢東萊侯居清河東武城十三世孫林字徳儒魏司空安陽孝侯是也魏志曰崔林字徳儒清河東武城人也為司空封安陽亭侯三公封列侯自林始又進封安陽鄉侯譜牒所載葢與史符移封東武謂東萊侯居淸河東武城也就君安陽謂崔林封安陽鄉侯也自後遂為博陵望族矣中軍節目鎮北鋒芒商飈獵草電火驅霜謂訦祖父皆為將軍辯為中軍將軍楷為鎮北將軍世有威望如秋風殺草電火驅霜也公之輪奐繼體貞幹儀表丘􅇕風神牆岸孝有至徳忠能匡贊不廢横琴無妨欹案禮記張老曰美哉輪焉美哉奐焉叅同契曰長子繼父體周易曰貞者事之幹也說苑曰宓子賤治單父彈鳴琴身不下堂而單父治無妨欹案者欹案謂披書也既班三事又貳六官衞青受詔韓信登壇三亊見尚書六官見周禮東觀漢紀曰衞青大克匈奴武帝拜大將軍於幕中漢書蕭何薦韓信於高祖曰陛下必欲爭天下非信無可與計者漢王於是設壇拜信為大將軍長城馬窟廣武兵欄軍吏無犯營民不寒古詩曰飲馬長城窟郡國志云滎陽縣有廣武城城在山上漢所城也高祖與項羽臨絶澗對語責羽十罪羽射漢祖中胸處也言訦封拜之後歴有戰功軍吏無犯營民不寒者言其兵有紀律三軍之士皆如挾纊也乃用六謀乃論三策城壘向背星辰主客六謀如陳平之六出竒計也三策謂上策中策下策也漢書匈奴傳嚴尤曰周秦漢征之未有得上䇿者也周得中策漢得下策秦無策焉禮記鄭注曰壘軍壁也漢書天文志曰天鳯四年九月客星在紫宮中斗樞極間占曰為兵其五年六月發三輔郡國少年詣北軍五年四月燭星見奎婁間占曰有功敵人死邉城和其六年正月築遼東𤣥菟城二月度遼將軍范明友撃烏桓是客星為兵象主者對客而言又天文志曰太白為客辰星出太白為主人凡太白所出所直之辰其國為得位得位者戰勝所直之辰順其色而角者勝其色害者敗言訦用兵有謀策能察其城壘向背之勢又能仰觀星象知吉凶也劒起沈犀弓開伏石楚后讓盟秦君還璧犀犀甲也周禮曰犀甲七屬吳越春秋曰夫差衣水犀甲者十三萬人沈犀言劒利能切入犀甲也淮南子曰夫純鉤魚腸磨其鋒鍔則水斷龍舟陸剸犀甲干寳搜神記曰楚熊渠子夜行見寢石以為伏虎彎弓射之没金鎩羽下視知其石也因復射之矢摧無迹漢世復有李廣為右北平太守射虎得石亦如之劉向曰誠之至也而金石為之開况於人乎讓盟毛遂事注見前篇歩陸碑文還璧藺相如事史記藺相如奉璧入秦相如以璧歸百齡危脆千仞摧藏諸侯地裂邊將星亡史記天官書正義曰諸侯五星在東井北河主判舉戒不虞又天官書畢曰罕車為邊兵主弋獵正義曰畢八星其大星曰天髙一曰邊將四彞之尉此言地裂星亡謂崔訦之薨也輕車騎士𤣥甲黄腸社如齊地廟似桐鄉銘功贊徳碑闕相望漢書曰張安世薨天子贈以輕車介士師古曰輕車古之戰車𤣥甲見漢書霍去病傳黄腸見霍光傳師古曰𤣥甲謂甲之黑色也蘇林曰以柏木黄心致累棺外故曰黄腸社如齊地者諸侯有社稷崔氏本齊後今封公侯是公侯復始也漢書欒布傳曰燕齊之間為立社號欒公社又曰朱邑少時為舒桐鄉嗇夫亷平不苛後為大司農病且死屬其子曰必𦵏我桐鄉後世子孫奉我不如桐鄉人周大將軍司馬裔神道碑公諱裔字遵𦙍河内溫人也昔顓頊之命始則南正司天重黎之後又以羲和掌厯序司馬氏之先也司馬遷自序云昔在顓頊命南正重以司天北正黎以司地唐虞之際紹重黎之後使復典之至於夏商故重黎氏世序天地其在周程伯休父其後也當宣王時官失其守而為司馬氏司馬氏世典周史尚書曰乃命羲和孔傳云重黎之後羲氏和氏世掌天地四時之官也呂刑傳云重即羲也黎即和也羲和雖别為氏族而出自重黎矣夏陽適晋得隨會而同奔東海避秦與毛公而俱隠司馬遷曰惠襄之間司馬氏去周適晋晋中軍隨會奔秦而司馬氏入少梁其後司馬蘄事武安君白起而少梁更名夏陽東海司馬豫也子山司馬裔墓誌云豫之避秦共毛公而俱隠知東海避秦為司馬豫也其事未詳其後金行受命玉笥南遷帝系極於輿一作東圖中朝至於江表序裔本晋宣帝弟太常馗之後也晋以金徳王西方曰金行葢指西晋也謂宣帝司馬懿之後受命為天子也南遷謂西晋之亂元帝遷都也晋書曰愍帝崩問至建康百僚勸進即位是為元帝沈約齊安陸王碑曰是開金運祚始玉筐李善注云鄒子曰五徳從所不勝虞土夏木殷金周火呂氏春秋曰有娀氏二女為九成之臺飲食以鼔帝命燕往視之鳴若隘隘二女愛而爭搏之覆以玉筐少選發而視之燕遺卵而北飛遂不返高誘曰帝天也天命燕降卵於有娀氏女吞之生契按殷為金徳司馬氏亦以金徳王故云金行玉笥矣孫盛晋陽秋曰秦時望氣者曰東南有天子氣五百年有王者興至晋元帝適逢其時言東晋成江表偏王也曾祖楚之晋太傅錄尚書揚州牧會稽文孝王之次子元顯之幼弟也北史列傳曰司馬楚之字徳秀晋宣帝弟太常馗之八世孫也父榮期晋益州刺史此云會稽文孝王即榮期也元顯為㑹稽王世子楚之為顯幼弟注詳下文元顯見害之後桓𤣥簒逆之初爰自齠齔容一作客身屠釣北史楚之傳曰父榮期為其叅軍楊承祖所殺楚之時年十七送父喪還丹陽會劉裕誅夷司馬氏叔父宣期兄貞之並遇害楚之乃逃匿諸桑門中濟江至汝潁間又裔本傳云司馬氏桓𤣥劉裕之際歸北者又有司馬景之等按晋書安帝元興元年以後將軍元顯為驃騎大將軍征討大都督以討桓𤣥帝戎服餞元顯於西池桓𤣥敗王師於姑孰三月王師敗績於新亭驃騎大將軍會稽王世子元顯遇害二年桓𤣥簒位是元顯見害桓𤣥簒逆之事也元興三年劉裕舉義兵斬桓𤣥裕誅夷司馬氏故宣期貞之遇害榮期見殺楚之乃潛逃濟江歸北也劉裕又以恭帝元熈二年受晋禪是為宋武帝韓詩外傳曰太公望屠牛朝歌釣於磻溪河内道左抱劒長號代郡城前慟悲靈祭後漢書獨行傳曰張武父業至河内亭盜夜劫之業與賊戰死遂亡失屍骸武時年幼不及識父後之太學每節常持父遺劒至亡處祭醊泣而還風俗通曰俗傳文帝小生於軍長大有識不知父所在口祭於代東門外江淮志節之士汝潁風塵之客感激一言咸多依附楚之傳云濟江至汝潁間楚之少有英氣能折節待士及宋受禪規受報復復收衆據長社歸之者常萬餘人既而雲生伏鼈一作龜星出鯨魚太白經天蚩尤映野史記天官書曰旬始出於北斗旁狀如雄雞其怒青黑象伏鼈徐廣曰蚩尤也一作龜者史記龜策傳曰蓍生滿百莖者其下必有神龜守之其上常有青雲覆之王者得之長有天下四裔賔服博物志曰鯨魚死而彗星出漢書天文志曰太白經天天下革民更主又劉向封亊曰太白經天而行孟康曰謂出東入西出西入東也太白隂星出東當伏東出西當伏西過午謂經天也天官書曰蚩尤之旗類彗而後曲象旗見則王征伐四方孟康曰熒惑之精也晋灼曰吕氏春秋云其色黄上白下言時魏室多故楚之乗機歸附也公乃收合餘燼泣血登陴臨武牢之關據成臯之坂擁衆萬家歸於魏室本傳云明元末山陽公奚斤略地河南楚之遣使請降授荆州刺史陴女牆也釋名云城上垣曰陴於其孔中陴倪非常亦言陴益也助城之高也或曰女牆言其卑小比之於城如女子之於丈夫也晋書地理志河南郡成臯有關鄭之武牢按奚斤略地河南楚之從長社擁衆來歸晋書地志云長社屬潁川郡武牢成臯皆河南地也魏明元皇帝諱嗣道武帝長子也遥授平南大將軍荆州刺史襲封瑯琊郡王尚河内公主楚之傳云尚諸王女河内公主襲封謂承司馬氏後也晋元帝初為瑯琊王今楚之亦封瑯琊王為襲封也命王承制從賔國之儀謂楚之本晋宗室故命承制為賔客之儀如周客二王之後矣左氏傳曰宋于周為賔故云從賔國之儀於時宋兵馮陵旗鼓侵逼虎牢不封金墉無援謂宋兵征魏也南史到彦之傳曰元嘉七年遣彦之北侵至東平須昌縣魏滑臺虎牢洛陽守兵並走彦之留朱修之守滑臺尹沖守虎牢杜􅂹守金墉左氏傳曰馮陵我畿甸虎牢即前云武牢是左傳莊二十一年曰王與之武公之略自虎牢以東杜預曰虎牢河南成臯縣水經注曰穀水左會金谷水北角築之謂之金墉城魏文帝起層楼於東北隅晋宫闕名曰金墉按金墉城在河南洛陽故城西北角時司州金墉虎牢兗州碻磝滑臺為魏河南四鎮宋元嘉中有恢復河南之志詔到彦之等舟師入河段宏將精騎直指虎牢修復舊境彦之泝江西上魏主以河南四鎮兵少命悉衆北渡此云虎牢不封金墉無援是其事也魏太武皇帝授王使持節侍中安南大將軍開府儀同三司給前後部鼓吹元戎啓行志雪寃恥登壇慷慨三軍掩泣黄河漕粟巳出石門白馬連旗將臨野坂楚之傳云授安南大將軍封瑯琊王以拒宋師破宋到彦之别軍於長社又與冠軍安頡攻拔滑臺禽宋將朱修之等俘萬餘人上疏求更進討太祖以兵久勞不從徵還宋將裴方明胡崇之寇仇池楚之督關中諸軍撃走方明禽崇之仇池平而還南史宋文帝紀云元嘉八年二月魏剋滑臺癸酉檀道濟引軍還自是河南復亡又到彦之傳云魏軍向金墉城次至虎牢杜驥奔走尹沖衆潰而死魏軍仍進滑臺時河冰將合彦之回軍焚舟步至彭城資實蕩盡文帝遣檀道濟北救滑臺收彦之下獄石門白馬野坂皆地名晋書曰符堅伐晋運漕萬艘自河入石門達於汝潁水經注曰王𤣥漠自滑臺走鹿鳴鹿鳴津又曰白馬津東南有白馬城河水舊於白馬縣南決白馬縣故城五十里開山圖所謂白馬山山下有白馬羣行悲鳴則河決馳走則山崩野坂野或作冶魏太武帝紀云神䴥三年宋將到彦之遣將渡河攻冶坂冠軍將軍安頡督諸軍撃破之言楚之方事南討下文既而已下以征蠕蠕北歸也既而雲中柝起代郡烽然反斾南轅途窮北略楚之傳云車駕征蠕蠕楚之督運以繼大軍拜鎮西大將軍雲中鎮大將朔州刺史在邉二十餘年以清儉著聞遂薨於此言蠕蠕逆命雲中代郡撃柝舉烽有邉警也楚之方欲南征改命北討故云反斾卒於邉地為途窮也隋書地理志有雲中郡有代郡後魏道武為代王都雲中在朔州北三百餘里改代曰魏孝文遷洛陽時雲中為鎮周易鄭注曰手持二木以相敲是為撃柝撃柝為守備警戒也漢書師古注曰晝則舉烽夜則舉燧左氏傳曰令尹反斾南轅史記趙世家云趙武靈王北略中山之地贈征西大將軍都督梁益秦寜荆兗青豫郢洛十州諸軍事揚州牧司徒諡貞王祖金龍北史列傳云楚之在魏尚河内公主生金龍字榮則有父風封瑯邪鎮西大將軍儀同三司吏部尚書贈司空諡康王父恱北史列傳云字慶宗金龍第三子也鎮南將軍豫州刺史漁陽莊侯以荆河刺舉禹貢曰荆河惟豫州恱為豫州刺史故云荆河刺舉時值亂離釁起蕭牆遂終非命北史傳云永平元年豫州城人白皁生謀為叛遂斬恱首送梁詔揚州移購恱首贈青州刺史諡曰莊子公遺腹載誕流離寇逆複壁襁負深山擁樹程嬰之匿趙武從役家臣王成之藏李燮為傭酒市後漢書曰鄭𤣥惟有一子益恩孔融在北海舉為孝亷及融為黄巾所圍益恩赴難隕身有遺腹子𤣥以其手文類已名之曰小同詩曰流離之子陸機云流離梟也自關西謂梟為流離後漢書梁冀傳曰冀妻孫夀性鉗忌冀與支通期私通生子伯玉夀誅支氏冀慮夀害伯玉嘗置複壁中論語包注曰負者以器曰襁博物志曰織縷之廣八寸長丈二以約小兒於背深山即程嬰藏趙武於山中事見下文漢書夏侯嬰傳曰徐行靣擁樹馳蘇林曰南陽人謂抱小兒為雍樹面者大人以面向之小兒抱大人頸似縣樹也史記曰屠岸賈作難公孫杵臼取他兒代武死程嬰匿趙武於山中居十五年因晋侯有疾韓厥乃請立武為趙氏後袁宏後漢紀曰梁冀誣李固與文鮪通謀固死獄中二子憲公季公皆棄官歸固知罪之將及乃命二公將小子燮還鄉里固女文姬密與二公謀共逃燮實言還京師矣鄉人信之後被郡書二公受害王成者固之僕𨽻也文姬厚為其資以燮屬成成為義士乃將燮往徐州界變姓名為酒家傭賣卜於市隂相往来㑹赦得免燮學行才藝亞於固官至京兆尹按袁宏紀言王成固之僕𨽻范曄書言固門生李燮字徳公言裔少遭父難得全若趙武李燮矣遭太夫人憂苫草墳塋以終灰燧形骸毁瘠逾於喪禮左氏傳曰齊晏桓子卒晏嬰寢苫枕草年十有五始幹家事北史本傳云裔少孤有志操州郡辟召並不應楹前鑿柱即取遺書石上開松仍求故劒謂裔克承父志也晏子春秋曰晏子病將死鑿楹納書焉謂妻曰楹語也子壯而示之及子壯發書之言曰布帛不可窮窮不可飾牛馬不可窮窮不可服士不可窮窮不可任國不可窮窮不可竊也干寳搜神記曰楚干將莫邪為楚王作劒三年乃成王怒欲殺之劒有雌雄其妻重身當産夫語妻曰吾為君作劒三年乃成王怒往必殺我汝若生男大告之曰出戸望南山松生石上劒在其背於是即將雌劒往見楚王王大怒使相之劒有二一雄一雌雌来雄不来王怒即殺之莫邪子名赤比後壮乃問其母曰吾父所在母曰汝父為楚王作劒三年乃成王怒殺之去時屬我語汝子出户望南山松生石上劒在其背於是子出户南望不見有山但覩堂前松柱下石砥之上即以斧破其背得劒日夜思欲報楚王王夢見一兒眉間廣尺言欲報讎王即購之千金兒聞之亡去入山行歌客有逢者謂子年少何歌之甚悲耶曰吾干將莫邪子也楚王殺吾父吾欲報之客曰聞王購子頭千金將子頭與劒来為子報之兒曰幸甚即自刎兩手捧頭及劒奉之立僵客曰不負子也於是屍乃仆客持頭往見楚王王大喜客曰此乃勇士頭也當於湯鑊煑之王如其言煑頭三日三夕不爛頭踔出湯中躓目大怒客曰此兒頭不爛願王自往臨視之是必爛也王即臨之客以劒擬王王頭隨墮湯中客亦自擬已頭頭復墮湯中三首俱爛不可識别乃分其湯肉𦵏之故通名三王墓今在汝南北宜春縣界出身司徒府叅軍除中堅將軍員外散騎常侍值魏室多難所在烽起孟津以北無復封畿嵩山以南即為鋒鏑言高歡入洛孝武西遷河南諸郡從此興師也郡國志河内郡河陽縣注云左傳王與鄭盟杜預曰縣南孟津是也周禮封人掌為畿封而樹之鄭注云畿上有封若今時界也天子封人職典封疆者左傳申無宇曰諸侯正封杜云封疆有定分詩云邦畿千里郡國志潁川郡有嵩高山謂河内在孟津之北嵩高之南也公建議脩武立柵溫城函谷西封河橋北斷長亭籍馬並入武城百里租車咸輸溫縣魏室至溫縣按周書本傳云魏孝武西遷裔時在鄴潛歸鄉里志在立功大統三年大軍復𢎞農乃於溫城起義遣使送欵與東魏將軍永洛王陵等晝夜交戰衆寡不敵義徒死傷過半及大軍東征裔率所部從戰河橋又别攻懐縣獲其將吳輔叔自此頻與東魏交戰每有克獲修武溫城河南地也郡國志云河内郡修武故南陽又河内溫縣蘇子所都又云𢎞農本函谷關漢武帝遷於新安左氏傳曰又欲肆其西封杜預云封疆也時周太祖與齊神武有𢎞農之戰故云史記正義曰河橋在臨晋縣蒲津橋也時周太祖與齊神武又有河橋之戰矣應劭曰秦法十里一亭白帖云十里一長亭左氏傳曰楚蒍掩賦車籍馬武城即上修武城也漢書兒寛傳曰寛為左内史當免民恐失之大家牛車小家擔負輸租溫縣即河内溫縣裔立義之處言裔於溫城起義遣使送欵也太祖文帝締搆關都經綸夷阻招攜以禮懐逺以徳謂周太祖奉帝西遷裔率義衆歸欵特蒙賞勞也馬文淵之擇主去隴坻而歸身竇周公之入朝在河西而奉詔後漢書曰馬援字文洲與公孫述同里閈相善至蜀辭歸謂隗囂曰子陽井底蛙耳不如専意東方援奉書洛陽引見宣徳殿世祖迎笑謂援曰卿遨遊二帝間今見卿使人大慙援頓首辭謝因曰當今之世非獨君擇臣也臣亦擇君矣臣與公孫述同里閈相善臣前至蜀述陛㦸而進臣臣今逺来陛下何知非刺客而簡易若是帝復笑曰卿非刺客顧説客耳援曰陛下恢廓大度同符高祖乃知帝王自有真也遂從南幸黎丘後為伏波將軍封新息侯又曰竇融字周公扶風平陵人世任河西為吏人所敬向隗囂先稱建武年號融等從受正朔後決策東向遣長史劉鈞奉書獻馬光武見鈞歡甚令還賜融璽書制詔行西河五郡大將軍事後封為安豐侯言裔之歸周太祖如馬援歸身竇融奉詔也大統七年蒙授平東將軍北徐州刺史隋志瑯琊郡舊置北徐州十年河内故義四千餘家願立忠誠須公衣錦乃授使持節領河内太守加前將軍周書本傳云八年率其義衆入朝太祖嘉之特蒙賞勞頃之河内有四千餘家歸附並裔之鄉舊乃授前將軍太中大夫領河内郡守令安集流民裔本河内溫人今領河内郡守故稱衣錦矣懐州拓境兩鎮奔波柳泉轉戰三城授首隋志云河内郡舊置懐州又王屋縣後周置懐州注詳下文周書本傳云十三年攻拔東魏平齊栁泉蓼塢三城獲其鎮將李熈之加授都督是其事也十三周書北史並作五年太祖召山東諸立義之將能率衆入關者有加重賞公率先而至領戸千室即以為封固辭不受北史本傳云十五年周文令山東立義諸將等能率衆入關者並加重賞裔領户千室先至周文欲以封裔裔辭曰立義之士逺歸皇化者皆以其誠心内發豈裔能率之乎今以封裔便是賣義士以求榮周文善而從之授帥督周書傳同其菽粟之賜或以指囷馬牛之賞將同量谷吴志曰周瑜求資糧於魯肅肅家有兩囷米各三千斛肅乃指一囷與周瑜漢書貨殖傳曰烏氏蠃畜牧及衆斥賣求奇繒物間獻戎王戎王十倍其償予畜畜至谷量牛馬師古曰言其數饒不可計算故以山谷多少言之本傳十六年大軍東討裔請為前鋒遂入建州破東魏將劉雅興拔其五城朝廷以華陽西極漢水東流嘆孟達之奔兵怪劉封之失䇿謂漢中重地命裔出鎮為華陽郡守也禹貢曰華陽黑水惟梁州晋常璩著華陽國志列漢中諸郡以其在華山之陽也禹貢曰嶓冢導漾東流為漢孔安國傳曰泉始出山為漾水東南流為沔水至漢中東流為漢水蜀志曰建安二十四年命孟達從秭歸北攻房陵將進攻上庸先主隂恐達難獨任乃遣劉封自漢中乗沔水下統達軍與達㑹上庸上庸太守申耽降遷封為副軍將軍自關羽圍樊城襄陽連呼封達令發兵自助封達辭以山郡初附未可動揺不承羽命會羽覆敗先主恨之又封與達忿爭不和封尋奪達鼔吹達既懼罪又忿恚封遂發表辭先主率所領降魏魏前元年移鎮漢中除白馬城主領華陽郡守周書本傳云魏廢帝元年徵裔令以本兵鎮漢中除白馬城主帶華陽郡守白馬城者按桑欽水經沔水又東逕白馬戍南濜水入焉酈元注有張天師堂庾仲雍謂山為白馬塞堂為張魯治東對白馬城一名陽平關昔稱導漾今聞上瀦煙沈冰井雨歇雲門言漢中華陽等處也導漾即禹貢嶓冢導漾東流為漢是也史記索隠注曰水經云漾水出隴西氐道縣嶓冢山東至武都沮縣為漢水師古曰漾水出隴西氐道東流至武關山南為漢北周地圖記夏水合諸水同入漢自漢入瀦名七里沔煙沈冰井疑即火井博物記曰臨卭有火井以竹木取火後人以火燭投井中火即滅絶不復然蜀都賦曰火并沈熒於山泉謝惠連雪賦曰火并滅溫泉冰雨歇雲門者蜀都賦曰指渠口以為雲門按劉李諸君注稱渠口雲門如雲之出門惟取其名猶雲来則雨至也此以蜀都賦有雲門故以雲門指蜀巴蜀皆華陽所統蜀未平時尚屬武陵王紀裔之所鎮是其接界下文從尉遲迥長驅入蜀此二語疑即為下張本也其年授大都督加散騎常侍周書本傳云加授撫軍將軍大都督通直散騎常侍二年轉鎮宋熈郡今子山碑文從漢中徑至蜀郡故不序其轉鎮宋熈也柱國蜀國公尉遲迥也周書列傳云尉遲迥字薄居羅代人也孝閔踐祚進位柱國大將軍又迥有平蜀之功封蜀國公開金牛之道通牧馬之關謂尉遲迥伐蜀也尉遲迥傳云梁元帝弟武陵王紀在蜀稱帝率衆東下將攻之梁元帝大懼乃移書請救又請伐蜀太祖曰蜀可圖矣取蜀制勝在兹一舉乃與羣公會議惟迥以為紀既盡鋭東下蜀必空虚王師臨之必有征無戰太祖深以為然於是令迥伐蜀以魏廢帝二年春自散關由固道出白馬趨晋夀開平林舊道前軍臨劒閣紀安州刺史樂廣以州降梁州刺史楊乾時鎮潼州又降六月迥至潼州大饗將士引之而西遂平蜀括地志曰梁州褒城縣北五十里褒谷昔秦欲伐蜀路無由乃刻石為牛五頭置金於後偽言此牛能屎金以遺蜀蜀侯貪信之乃令五丁共引牛塹山堙谷致之成都秦遂尋道伐之號曰石牛道圖經百牢故基在今興元西縣兩壁山相對六十里不斷漢江流其間乃入金牛益昌路也華陽國志曰會無有天馬河馬日行千里後死於蜀𦵏江原小亭今天馬冢是也縣有天馬祠初民家牧馬山下或産駿駒云天馬子也今其天馬逕厥迹存焉公巻甲北塞懸車束馬遂得策預葭萌勲叅綿竹周書本傳云尋率所部兵從尉遲迥伐蜀與叱羅協破叛兵趙雄傑於槐林平鄧朏於梓潼漢書地理志曰廣漢郡有葭明縣綿竹縣師古曰明音萌後漢書作葭萌華陽國志曰蜀王别封弟葭萌於漢中號苴侯命其邑曰葭萌焉地道記曰綿竹有紫巖山綿水之所出也梓潼亦漢之廣漢郡縣名也封龍門縣開國子蒲州刺史仍領新州本傳以功賜爵云云尋行新城郡事隋志冀州河東郡龍門縣梁州新城郡梁末置新州尋授使持節車騎大將軍儀同三司大中正本傳云魏恭帝元年授大中正傳作散騎常侍本郡中正隆周授圖天保大定謂孝閔踐阼也詩云天保定爾以公才望仍為舊臣遂乃義深追逺恩隆繼絶即改封瑯邪縣公裔曾祖楚之太武初封瑯邪王至父恱遭難失國今復封裔瑯邪郡公故云追逺繼絶邑五百戸仍遷驃騎大將軍開府儀同三司都督巴州諸軍事巴州刺史武成二年明帝即位之四年也被勑赴援信州魚復道阻屢却岑彭荆門水急幾沈吳漢信州梁置在巴東後周置總管統魚復諸縣注見下文漢書地理志巴郡有魚復縣古庸國左傳文十三年庸人逐楚師是也後漢書曰岑彭字君然南陽棘陽人也公孫述遣其將任滿等將數萬人乗枋箄撃破馮駿及田𢎞李𤣥等遂拔夷道夷陵據荆門虎牙横江水起浮橋鬬樓立欑柱結營山上以拒漢兵彭數攻之不利華陽國志云巴楚相攻故置江關舊在赤甲城後移在江南岸對白帝城故基在今魚復縣又按犍為武陽有彭亡聚岑彭死處也征南惡彭亡之號為客刺死於此矣荆州記曰荆門上合下開有門形因以為名東觀漢記曰延岑遣奇兵出吴漢後漢墮水緣馬尾得出吳漢字子顔南陽宛人也公乃月峽先登瞿塘直上後漢郡國志巴郡有枳縣注云華陽國志有明月峽廣徳嶼者是也酈元水經注曰江東水東逕廣溪峽乃三峽之首也峽中有瞿塘黄龕二灘晋宋間有淫預歌云灧預大如馬瞿塘不可下灧預大如象瞿塘不可上天子以公操履忠勤儀刑亮直乃徵為大御伯尋轉大御正邑一千一百戸御正蓋古侍中之職也本傳云保定二年入為御伯中大夫增邑通前一千五百戸四年轉御正中大夫進爵為公傳云始封瑯邪伯至此乃進公位與碑文為小異也樞機近侍出納絲言所謂多識舊章殿中無雙者矣漢書張安世傳曰職典樞機禮記曰王言如絲魏志曰王粲博物多識問無不對魏國既建拜侍中時舊儀廢弛典造制度粲恒典之後漢書曰丁鴻字孝公拜侍中肅宗詔鴻與諸儒論定五經同異於白虎觀鴻論難最明時人語曰殿中無雙丁孝公四年大軍東討公所領義衆先守枳關授都督懐州諸軍事懐州刺史本傳云大軍東討裔率義兵與少師楊􅋆守枳關即授懐州刺史東道慰勞大使隋書地志云河内郡王屋後周置懐州有王屋山齊子嶺有枳關河内裔所起義處也偃師張幕河陽牧馬雖接戰於富平已連營於官渡謂裔合軍討東魏也漢書地理志曰河南偃師尸鄉殷湯所都又河内郡有河陽縣又北地郡有富平縣北地郡秦置雒陽西一千一百里郡國志滎陽有鴻溝水文穎曰於滎陽下引河東南為鴻溝即官渡水也時東魏都鄴西師東討是其連營接戰之所也五年詔追還拜始州刺史周書太祖紀云魏廢帝三年改安州為始州更討信州賊山彰尋寳渝恃險周書本傳作蠻酋向寳勝等據險自固峽路五尺絙約纔通懸水三門橋飛濟渡言信州道路之險也隋書地理志曰巴東郡梁置信州後周置總管府郡統魚復諸縣巴東有巫峽荆州記曰巴東三峽巫峽長是也言峽路之險須縣度矣漢書西南夷傳曰秦時嘗破略通五尺道師古曰其處險阸故道纔廣五尺懸水三門即荆門是荆州記云荆門上合下開有門之形後漢岑彭入荆門長驅破江關即是處也既而風行草偃谷静山空前後平十一城獲九千餘口馬歸平樂金輸水衡周書本傳云天和初信州蠻酋冉令賢等反連結二千餘里裔隨上庸公陸騰討之裔自開州道入先遣使宣示禍福蠻酋冉三公等二十餘城皆来降附進次雙城蠻酋向寳勝等率其種落據險自固向天王之徒為其外援裔晝夜攻圍腹背受敵自春至秋五十餘戰寳勝糧仗俱竭力屈乃降又拔籠東城獲賊帥冉西黎向天王等出師再朞羣蠻率服拜信州刺史華嶠後漢書曰明帝至長安迎取飛亷并銅馬置上西門平樂觀漢書宣帝紀注云水衡與少府皆天子私藏也天保疑作天和二年除信州刺史都督信州諸軍事朝發白帝暮宿江陵氣振巴丘之兵威警建平之戍信州注見上文白帝漢巴郡魚復縣公孫述所謂白帝城也江陵漢屬南郡水經注曰自三峽七百里中兩岸連山略無闕處重巖疊嶂隠天蔽日自非停午夜分不見曦月至於夏水襄陵㳂泝阻絶王命急宣有時朝發白帝暮到江陵其間千二百里雖乗奔馭風不以疾也吳志曰建安十九年權使魯肅以萬人屯巴丘以御關侯注云巴丘今曰巴陵干寳晋紀曰王濬治船於蜀吾彦取其流柹以呈孫皓曰晋必有攻吳之計宜增建平兵建平不下終不敢渡江皓弗從隋書地理志云巴東巫山舊置建平郡開皇初郡廢五年遷潼州刺史隋書地理志云金山郡西魏置潼州益州柱國公趙王招也周書文帝十三子傳云趙僭王招字豆盧突武成初進封趙國公保定中拜為柱國出為益州總管建徳中進爵為王降帝子之重鎮天井之星延閣擬於叢臺岷山方於代郡言趙國公出鎮益州則蜀郡之地擬於趙國也楚辭曰帝子降兮北渚河圖括地象曰岷山之精上為井絡帝以會昌之神建福上為天井左思蜀都賦曰結陽城之延閣漢書鄒陽曰夫全趙之時武力鼎士袨服叢臺之下者一旦成市師古曰叢臺故趙王之臺也在邯鄲山海經曰岷山江水出焉東北流注於海郭璞注曰岷山在汝山郡廣陽縣西大江所出史記趙世家曰趙襄子請代王使人以銅枓撃殺代王遂興兵平代以代封伯魯子周為代成君是代郡為趙地也公仰禀雄謨叅謀逺略故得身預舞陽之功位極長平之寵言趙國公為益州總管裔為潼州刺史相助為理也史記曰樊噲以舍人起沛從至霸上封舞陽侯元朔二年衛青再以車騎將軍取朔方河南功封長平侯索隠曰舞陽屬潁川長平屬汝南皆縣名六年授使持節大將軍大都督西寜州諸軍事西寜州刺史隋書地理志曰越巂郡後周置嚴州開皇六年改曰西寧州周書武帝紀曰天和五年平越巂置西寜州按周書及此是後周時已有西寜州矣方欲關沬若徼䍧牱見夜郎之侯習昆彌之戰漢書司馬相如傳曰故乃關沫若徼䍧牱華陽國志曰青衣有沫水出蒙山下伏地行中桑欽水經曰若水出蜀郡旄牛徼外東南至故關為若水也地理志曰䍧牱武帝元鼎六年開䍧牱郡有夜郎縣應劭曰故夜郎侯邑䍧牱臨䍧牱江也華陽國志曰楚頃襄王時遣莊蹻伐夜郎軍至且蘭椓船於岸而步戰既滅夜郎以且蘭椓船䍧牱處即改其名為䍧牱史記曰西南夷君長以什數夜郎最大唐蒙為郎中將從巴蜀笮關入遂見夜郎侯喻以威徳約為置吏使其子為令夜郎聽蒙約還報乃以為犍為郡漢書西域傳曰烏孫國大昆彌治赤谷城昆莫王號也名獵驕靡後書昆彌云此言習戰疑是昆明史記曰天子使求身毒國嵗餘皆閉昆明莫能通正義曰昆明在巂州西昆縣是也黄圖曰天子遣使求身毒國而為昆明所閉天子欲伐之乃作昆明池象之以習水戰是也按史記漢書漢卒破之以為郡縣矣而飛鳶墮水馬援去而無歸金馬騁光王褒行而不反方欲至不反按言徵拜之後除西寜州刺史未及而卒也後漢書馬援謂官屬曰方吾在浪泊西里間虜未滅之時下潦上霧毒氣重蒸仰視飛鳶跕跕墮水中臥念少游平生時語何可得也援征武陵五溪病卒漢書王褒傳曰方士言益州有金馬碧雞之寳可祭祀致也宣帝使褒往祀焉褒於道病亡上閔惜之地理志云越巂郡青蛉縣禺同山有金馬碧雞嗚呼哀哉七年正月十日薨本傳六年徵拜大將軍除西寜州刺史未及之部卒於京師春秋六十有五詔贈使持節大將軍懐邵汾晋四州諸軍事懐州刺史傳同夫人襄城公主魏獻帝之曾孫趙穆王之季女本傳云大統十五年拜妻元為襄城郡公主王姬肅恭褕翟典禮四教競一作兢莊三星令淑子夏詩序曰王姬下嫁於諸侯車服不繫其夫下王后一等毛傳曰服則褕翟周禮鄭注云翟雉名江淮而南青質五色皆備成章曰揺褕翟畫揺者又周禮云四教婦徳婦功婦言婦容亦見詩傳國風綢繆之詩云三星在户有光隆慮之賢足表平陽之盛史記外戚傳曰王太后第三女為林慮公主索隠曰林慮縣名屬河内本名隆慮避殤帝諱改名林慮慮音廬又王太后長女號曰平陽公主正義曰括地志云平陽故城即晋州城西面今平陽故城東面也城記云堯築也後漢皇后紀云皇女奴永平三年封平陽公主適大鴻臚馮順皇女迎三年封隆慮公主適牟平侯耿襲生則從夫以秩死則同穴以禮禮婦人從夫爵詩云死則同穴建徳元年八月十二日合葬於武功三時原大夫墓樹以柏諸侯墳高於雉三時原時當作畤在武功縣西南二十里隋文帝開皇二年三月開渠引杜陽水於三畤原是也白虎通曰諸侯墳樹以柏大夫樹以欒此云大夫樹柏矣徐爰射雉賦注云青幽之間土髙且大者通曰墳雉吁嗟滕公來居此里博物志曰漢滕公薨求𦵏東都門外公卿送𦵏駟馬不行跼地悲鳴跑蹄下地得石室有銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室遂𦵏焉滕公夏侯嬰也詔諡定公禮也公資忠履孝藴義懐仁直幹千尋澄波萬頃世説曰庾子嵩目和嶠森森如千丈松雖磊砢有節目施之大厦有棟梁之用又曰郭林宗詣黄叔度彌日信宿曰叔度汪汪如萬頃之波澄之不淸擾之不濁其器深廣難測量也逄蒙射法力牧兵書趙氏孟子注曰逄蒙羿之家衆也春秋傳曰羿將歸自田家衆殺之漢書藝文志有逄門射法二篇師古曰即逄蒙又有力牧十五篇黄帝臣依託也星辰高下之占風雨逄迎之氣漢書藝文志有常從日月星氣太一雜子雲雨諸書是也言用兵能占星氣知吉凶也故得出師以律天幸將軍者也周易師卦曰師出以律漢書曰霍去病從大將軍為驃騎校尉敢深入軍亦有天幸未嘗困絶至如官曹案牘未嘗煩壅戎馬交馳不妨餘裕足使四嶽彌峻三台更明尚書孔傳曰四嶽視公漢書天文志曰魁下六星兩兩而比者曰三能三能色齊君臣和蘇林曰能音台在朝四十一年身經一百餘戰凡任四郡歴八州未嘗以貨殖經懐去如始至貨殖見論語漢書因立貨殖傳左氏傳曰叔孫子所至必葺其牆屋去如始至渭南千畝之竹更懼盈滿洛陽二頃之田常思止足漢書貨殖傳曰蜀漢江陵千樹橘渭川千畝竹其人與萬户侯等史記蘇秦曰使我有洛陽二頃田安能佩六國相印乎身没之日家無餘財素車白馬狹室崎嶇黄腸𤣥甲堦庭仄陋有詔冬官為營寢室本傳云裔性清約不亊生産所得俸祿並散之親戚身死之日家無餘財宅宇卑陋喪庭無所詔為起祠堂焉漢書曰沛公至霸上秦王子嬰素車白馬應劭曰素車白馬喪人之服後漢書曰張邵喪至壙將窆而柩不肯進見有素車白馬號哭而來母曰此必范巨卿也庾闡著狹室賦埤蒼曰崎嶇不平也廣雅曰踣傾側也西征賦曰軌崎嶇以低仰呂延濟曰崎嶇傾側貌漢書霍光傳曰光薨賜便房黄腸題凑各一具又霍去病薨上悼之發屬國𤣥甲軍陳自長安至茂陵周禮冬官考工朱邑祭酹無所漢后是以賜金陳表妻子露立吳王為之開館漢書曰朱邑字仲卿廬江舒人也身為列卿居處儉節禄賜以共九族鄉黨家無餘財神爵元年卒天子閔惜下詔稱揚賜邑子黄金百金以奉其祭祀吳志曰陳表字文奥武庶子也年三十四卒家財盡於養士之日妻子露立太子登為起屋宅嗚呼哀哉世子侃孝家忠國揚名顯親見孝經是以勒此豐碑懼從陵谷植之松柏不忍凋枯周禮曰及窆執斧以涖匠師鄭注云匠師主豐碑之亊詩曰高岸為谷深谷為陵晋書曰山濤居喪過禮手植松柏銘曰欽若厯象平秩寅賔少梁奔華地入咸秦族夷興馬書窮獲麟言羲和之後遂以司馬命氏也尚書曰乃命羲和欽若昊天厯象日月星辰敬授人時又曰寅賔出日平秩東作孔傳曰寅敬賔導秩序也東方之官敬導出日平均次序漢書曰司馬氏入少梁師古曰少梁本梁國也為秦所滅族夷興馬者言重黎之後程國失官而為司馬氏也太史公曰自獲麟以来四百有餘嵗而諸侯相兼史記放絶今漢興海内一統予為太史而不論載廢天下之文予其懼焉玉鏡云始金行乃搆象浦通關龍沙開候玉鏡云始金行乃搆者謂西晋受命也尚書帝命期曰桀失其玉鏡用其噬虎金行注見本序水經注曰象水又兼象浦之名晋功臣表所謂金遴清逕象渚澄源者也後漢書班超傳贊曰咫尺龍沙注云龍沙沙漠也揚雄曰西北一候注云候亦官也言西晋幅􅊷廣大也時西北開候劉淵起於離石至其子劉聰亂晋遂有平陽之禍上糝石起河陽水鬬五馬南浮三星東宿言西晋之亂晋室南遷也上糝未詳晋書五行志曰愍帝建興五年石言於平陽是時帝蒙塵亦在平陽故有非言之物而言俄而帝為逆所殺國語曰周靈王二十二年穀洛鬬將毁王宫王欲壅之太子晋諫曰不可王卒壅之晋書五行志云大安中童謡曰五馬遊渡江一馬化為龍後五王同至江東而瑯邪王睿嗣統是為元帝又天文志曰永嘉六年熒惑嵗星太白聚牛女之間後元帝中興揚土太傅作牧奄有江沱司徒避亂承制荆河太傅謂裔曾祖楚之為晋太傅揚州牧也詩云江有沱禹貢曰荆河惟豫州言楚之會劉裕作難歸魏為荆州刺史承制尋授司徒也南勞推轂猶思枕戈龍媒被野蒼兕凌波言楚之事魏授安南大將軍南拒宋師漢書馮唐對曰臣聞上古王者遣將也跪而推轂晋書劉琨傳曰吾枕戈待旦漢書天馬歌曰天馬徠龍之媒史記齊世家曰師尚父左仗黄鉞右把白旄以誓曰蒼兕蒼兕總爾庶衆莊侯季年禍機相接誕公遺嗣崎嶇懐挾山竄趙武家藏李燮謂裔遭父難少孤也裔父恱諡曰莊故稱莊侯禍機謂白皁生之亂也詳見序文序云遺腹葢遺腹子也禰衡鸚鵡賦曰崎嶇重阻呂延濟曰崎嶇傾側貌程嬰匿趙武於山中故云山竄王成藏李燮於酒家故云家藏俱注見本序伍員道阻燕丹路遥南奔楚塞北避秦橋左氏傳曰費無極譖伍奢於楚平王執之召其子伍尚歸楚皆殺之員如吳博物志曰燕太子丹質於秦請歸秦王遣之為發機之橋欲陷丹丹驅馳過之而橋不發南奔楚塞即伍員事吳越春秋所謂昭關也北避秦橋即燕丹事秦王發機之橋也丹北歸燕故云北避水流登隴寒風度遼有功都䕶則疑作責重嫖姚三秦記隴頭歌有隴頭流水之句荆卿歌云風蕭蕭兮易水寒漢書曰以范明友為度遼將軍應劭曰常度遼水往撃之故以度遼為官號後漢書西域傳曰武帝時西域内屬有三十六國漢為置使者校尉領之宣帝改曰都䕶漢書云都䕶自鄭吉始也又云霍去病為嫖姚校尉言裔避難得出擢為將校有威望也懐書上馬習禮從戎陣圖六甲兵占八風吳志曰魯肅治軍整頓禁令必行雖在軍陣手不釋巻後漢書曰祭遵為將軍取士皆用儒術對酒設樂必雅歌投壺又建為孔子立後奏置五經大夫雖軍旅不忘俎豆可謂好禮恱樂守死善道者也𤣥女三宫戰法曰行兵之道天地之寳九天九地各有裏表九天之上六甲子也九地之下六癸酉也子能順之萬全可保六甲謂六甲子也兵占八風者按左傳云南風不競多死聲杜預注曰歌者吹律以詠八風南風微故曰不競也藏松寳劒射栁琱弓推誠賈復屈節亷公藏松寳劒即干將莫邪子赤比亊注見本序史記曰楚有養由基者善射者也去栁葉百步而射之百發而百中後漢書曰賈復在汝南部將殺人於潁川寇恂捕得繫獄時尚草創軍營犯法率多相容恂乃戮之於市復以為恥曰見恂必手劒之帝徴恂恂至引見時復先在坐欲起相避帝曰天下未定兩虎安得私鬬今日朕分之於是並坐極歡遂共車同出結友而去史記曰趙拜藺相如為上卿位在亷頗之上頗曰我有攻城野戰之功相如徒以口舌為勞而位居我上我見必厚辱之相如出望見亷頗輒引車避之舍人諫相如曰夫以秦王相如能廷叱之何畏亷將軍哉吾念彊秦不敢加兵於趙者葢以吾兩人也今兩虎鬬必不俱全吾所以先公家之急而後私讎也按此二語當指益州柱國為總管裔為刺史位在其下又從蜀國公亦居其下而能協和故云八翼頻飛六條亟秉勇此仁義行兹寛猛晋書陶侃傳曰侃夢生八翼飛而上天見天門九重已登其八惟一門不得入閽者以杖撃之因墜地折其左翼及寤左腋猶病及都督八州據上流握彊兵潛有窺窬之志每思折翼之祥自抑而止漢書曰刺史所察有六條察民疾苦寃失職者察墨綬長吏以上居官政狀察盜賊為民之害及大奸猾者察犯田律四時禁者察民有孝悌亷潔行修正茂才異等者察吏不簿入錢穀放散者所察不得過此左氏傳曰猛以濟寛寛以濟猛持印山開沈黎盜静取甲無丘均田不井謂裔為潼州刺史有善政也持印未詳當是益州地名與下沈黎同處漢書曰漢殺筰侯以筰都為沈黎郡春秋成元年三月作丘甲杜注云周禮九夫為井四井為邑四邑為丘丘十六井出戎馬一匹牛三頭四丘為甸甸六十四井出長轂一乗戎馬四匹牛十二頭甲士三人步卒七十二人此甸所賦今魯使丘出之譏重斂故書此云取甲無丘均田不井謂薄賦斂也懋功賜爵上將賞官軍中受詔塞外登壇言拜大將軍也按此當為授大將軍都督西寜州刺史之事下文言未及而卒矣尚書曰徳懋懋官功懋懋賞上將文昌中星名漢書衛青傳曰天子使使者持大將軍印即軍中拜青為大將軍後漢書竇憲傳曰詔使中郎將持節即五原塞拜憲大將軍方屠參合更鏖臯蘭渝川毒水僰道灾氛地亡都尉灘悲使君史記韓王信傳曰柴將軍屠參合斬韓王信蘇林曰代地也正義曰故城朔州定襄縣北水經注曰參合縣南魏因參合陘以即名也比俗謂之蒼鶴陘道出其中亦謂之參合口徑左縣之西北即燕書所謂太子寳自河還師參合三軍奔潰即是處也魏立縣以隸涼州郡也又云道人城北五十里有參合鄉故縣也漢書霍去病傳曰過焉支山千有餘里合短兵鏖臯蘭下師古曰山名也後漢書南蠻傳曰閬中有渝水其人多居水左右天性勁勇初為漢前鋒數陷陳俗喜歌舞高祖觀之曰此武王伐紂之歌也命樂人習之所謂巴渝舞也郡國志閬中屬巴郡有渝水矣漢書地理志云犍為郡有僰道應劭曰故僰侯國也音蒲北反漢書武帝紀云太初三年匈奴入張掖酒泉殺都尉水經曰江水又東逕羊腸虎臂灘酈元注云楊亮為益州至此舟覆懲其波瀾蜀人至今猶名之為使君灘周書本傳云卒於京師此似在道卒也言任西寜刺史方欲立功邊地不幸疾卒也谷寒無日山空足雲北風吹旐秋霖泣軍淮南子曰日至於蒙谷是謂定昏說文云雲者山川之氣旐丹旐銘旌也爾雅曰龜蛇曰旐漢書王莽傳曰遣太師王匡更始將軍亷丹祖東都門外天大雨沾衣上長老歎曰是謂泣軍今云悲其死也遣奠雙設銘旌兩布沁水同墳平陽合墓遣奠謂天子遣奠也禮記曰銘明旌也以死者為不可别故以其旗識之後漢書曰皇女至永平三年封沁水公主適高密侯鄧乾注云沁水縣屬河内乾鄧震之子禹之孫漢書曰衛青尚平陽主與主合葬雙設兩布言裔與夫人合𦵏也夫人為襄城公主若沁水之於鄧乾平陽之於衛青矣悲哀嗣子攀號靡訴慟甚風枝悲深霜露言世子侃居喪以禮也韓詩外傳曰樹欲定而風不静子欲養而親不在禮記曰霜露既降君子履之必有悽愴之心自此何世從斯幾年麒麟欲鬬華表中燃三輔黄圖曰秦始皇驪山墓上有石麒麟述異記曰秦漢間公卿墓則以石麒麟鎮之博物志曰麒麟鬬而日蝕干寳搜祌記曰燕惠王墓上有狐狸已經千餘嵗神變無比化為二書生持刺謁張華華引入談論三日不屈華甚疑之此必妖也乃掃榻延留留人防禦華曰千年之妖以千年神木照之即變世說燕惠王冢有華表木已經千年發走為使往取其木空中有青衣童子曰老狸不智不聽我言令日禍已及我其可逃乎乃發聲而泣忽然不見使伐其木木流血使將木歸照之其精乃變華乃烹之華表中燃盖引是事言從此千年墓上之石麟華表皆成神也地形樓起松心蓋圓茫茫丘隴代代英賢青烏子曰山有重疊望之如鼔吹樓𦵏之出連州二千石抱樸子曰千嵗之松有如偃盖周柱國大將軍長孫一作拓跋儉神道碑蓋聞放勲立而羲和昇重華登而元凱用堯典曰若稽古帝堯曰放勲又曰乃命羲和欽若昊天舜典曰舜曰重華左氏傳曰昔高陽氏有才子八人謂之八元高辛氏有才子八人謂之八愷此十六族也以至於堯堯不能舉舜臣堯舉八元八愷思皇多士既成西伯之功俊徳克明乃定南巢之伐大雅文王之詩云思皇多士生此王國王國克明惟周之禎西伯文王也淮南子曰湯放桀於歴山與妺喜同舟浮江奔南巢之山而死括地志云廬州樂縣有巢湖即尚書成湯放桀於南巢者也是知惟賢非后弗食惟后非賢弗乂若夫君臣一徳啓心沃心見之昌寜文公矣封昌寜郡公諡曰文隋書地志同昌郡怙夷縣西魏置昌寜郡公諱儉初名慶明恒州高陸人也周書列傳曰長孫儉河南洛陽人也本名慶明其先魏之枝族姓拓跋氏孝文遷洛改為長孫按傳以從魏遷洛故為洛陽人此序其未遷之先本恒州高陸人也北嶽天孫之星燕河帝子之國北史云魏之先出自黄帝子昌意之少子受封北國其後世為君長統幽都之北廣漠之野拓拔為魏之支庶故序其先世云云北嶽天孫之星者此北嶽北方之嶽謂赤山也言嶽者如中國五嶽非謂爾雅北嶽恒之北嶽也後漢書烏桓傳云使䕶死者神靈歸赤山赤山在遼東西北數千里如中國人死者魂神歸岱山也博物志曰泰山天帝孫也主召人魂東方萬物始故知人生命按此是泰山有天孫之名又織女星亦名天孫故云天孫之星謂遼東赤山若泰山天孫矣若序恒州恒山得稱北嶽然無天孫之稱故知其非也云燕河帝子之國者按燕本春秋燕國自慕容氏都燕自後常為帝都言拓抜氏之先世居彼土也故多奇節甚茂華風中國曰華謂其有中華之風也髙闕圖南二王齊軫史記曰趙武靈王築長城自代並隂山下至髙闕為塞圖南見莊子魏之先世本在塞北自後奄有南土如鵾鵬之圖南矣二王謂沙莫雄什翼犍也北史魏本紀云魏平文皇帝鬱律生二子長曰沙莫雄次曰什翼犍即魏道武皇帝祖也後魏法七分其國以兄弟分繞之沙莫雄號為南部大人後改名仁號為拓拔氏生嵩太尉柱國大將軍北平宣王道武以兄宗室之長改為長孫氏長城拔本十族分源長城趙武靈王所築括地志云在朔州善陽縣北左傳拔本塞源長城本以備邊既入内地是為拔本也魏書官氏志云獻帝以兄為紇骨氏改胡氏次兄普氏改周氏次兄拓拔氏改長孫氏弟達奚氏改奚氏次弟伊婁氏改伊氏次弟丘敦氏改為丘氏又次弟侯氏改亥氏又命叔父之後乙旃氏為叔孫氏疏屬車焜氏改車氏凡與帝室為十姓百世不通婚髙祖太尉北平王周書本傳五世祖嵩魏太尉北平王光輔五君允釐百揆恒衞既從淮沂其乂按嵩以魏道武登國元年為南部大人至太武大延三年正月薨年八十北史本傳云年十四代父統事昭成歴仕昭成道武元明太武凡四君此言光輔五君者左傳楚平王稱范會之徳曰宜其光輔五君以為盟主者也尚書曰允釐百工又云使宅百揆禹貢曰恒衛既從淮沂其乂地理志曰恒水出常山衞水出靈壽淮出桐柏沂出泰山師古曰淮出大復山也祖豹北史本傳云祖酌恒州刺史龍驤將軍恒州刺史常山刺舉非無取代之符龍驤總戎或似平吳一作戎之號地理志代郡有常山關按恒州本漢常山郡張宴曰恒山在西避文帝諱故改曰常山漢書曰刺舉無所避史記趙簡子告諸子曰吾藏寳符於常山上先得者賞母䘏曰從常山臨代代可取也晋書職官志曰龍驤等大將軍開府者位從公不開府非持節都督者品秩第二魏文帝黄初三年始制都督諸軍事或領刺史又王濬傳云加龍驤將軍以伐吳上語言為恒州刺史下語言為龍驤將軍也父䤋年止弱冠榮終解印北史傳云父䤋員外散騎常侍郎早卒公以五常藴智六氣資徳乗天則策馬秉靈降神則牽狼應象史記天官書曰漢中四星曰天駟旁一星曰王良王良策馬車騎滿野正義曰策一星在王良前主天子僕也占以動揺移易在王良前或居馬後則為策馬䇿馬而兵動也牽狼二星名爾雅曰何鼔謂之牽牛史記正義曰何鼓三星在牽牛北主軍鼔葢天子三將軍所以備關梁而拒難也天官書曰天矢東有大星曰狼下有四星曰弧直狼正義曰以伐叛懐逺也言儉名將誕生上應列宿也直心於物水火恬然無負於天雷霆不懼富貴自取豈資唐舉之言聲名有聞無勞李膺之識史記曰蔡澤遊學於諸侯小大甚衆不遇而從唐舉相曰富貴吾所自有吾所不知者壽也願聞之後漢書李膺傳曰時朝廷日亂紀綱廢弛膺獨持風裁以聲名自髙有被其容接者名為登龍門年十八解褐員外散騎侍郎尋授輕車將軍羽林監本傳云孝昌中起家員外散騎侍郎從爾朱天光破隴石太祖文皇帝駕馭天網苞羅英傑選公才徳光佐中書諸葛亮之西歸玉壘成三分之業管夷吾之入仕葵丘有一匡之功周書本傳云太祖臨夏州以儉為録事深器敬之賀抜岳被害太祖赴平凉凡有經綸謀策儉皆參預北史作周文臨夏州以儉為録事參軍事餘同蜀志曰諸葛亮字孔明瑯邪陽都人輔先主都蜀先主即帝位策亮為丞相三分魏蜀吴也玉壘山名華陽國志曰七國時杜宇稱帝於蜀號望帝其相開明決玉壘山以除水害是也史記曰管仲夷吾者潁上人也任政於齊齊桓公以霸九合諸侯一匡天下管仲之謀也左傳僖九年曰夏會諸侯於葵丘尋盟且脩好禮也秋齊桓盟諸侯於葵丘天水黠羌漁陽羣盜乃遷秦州長史本傳云從平侯莫陳悦留儉為秦州長史防城大都督封信都縣開國伯隋書地志曰信都郡長樂縣舊曰信都三年滑州蟻聚保障沈命靡旗亂轍乗冰渡河上語見左傳下語見後漢書光武紀按北史滑州當作渭州丞相大行臺授假節撫軍丞相大行臺謂周太祖也周太祖討平侯莫陳恱進位關西大都督略陽縣公承制封拜尋授關西大行臺故有此授周太祖為魏丞相行滑北史作渭州刺史北史本傳云渭州刺史可朱渾元奔東魏後河渭間人情離阻刺史李弼令儉權鎮渭州儉將十餘騎冒難赴之復隨機安撫羌胡悅服按渭州刺史乃李弼令儉權鎮非朝廷所授故云行渭州刺史大統元年授持節西夏州刺史加散騎常侍郅支抱馬如聞耿秉之戰單于願識似畏王商之威北史本傳云轉夏州刺史甚得人和時西夏州仍未内附而東魏遣許和為刺史儉以信義招之和乃歸附即以儉為西夏州刺史魏地形志西夏州寄治并州界領太安神武二郡後漢書曰耿秉竇固合兵萬四千騎出白山撃車師車師有後王前王秉議先赴後王以為并力根本則前王自服乃上馬引兵北入縱兵抄掠斬首數千級收牛馬十餘萬頭後王安得惶恐走出門脫帽抱馬足降其前王亦歸遂定車師而還漢書曰王商代匡衡為丞相天子甚尊任之為人多質有威重長八尺餘身體鴻大容貌甚過絶人河平四年單于來朝引見白虎殿丞相商坐未央庭中單于前拜謁商商起離席與言單于仰視商貌大畏之遷延却退天子聞而歎曰此真漢相也言儉至夏州使許和歸附若車師之降耿秉單于之畏王商也五年遷使持節鎮東將軍都督東北三夏諸軍事西夏州刺史增邑千戸改伯為公周書本傳云以儉為西夏州刺史總統三夏按三夏西夏州注見上文隋書地志云朔方郡後魏置夏州延安郡後魏置東夏州既而江漢遼逺車書寂莫謂荆襄初附也注見下文蜀主的顱未出檀溪之水秦王飛雉猶向南陽之城世語曰劉備屯樊城劉表禮焉憚其為人不甚信用曾請備宴會欲因會取備備覺之偽如厠潛逃出所乗馬名的顱走墮襄陽檀溪水中溺不得出備急曰的顱今日厄矣可努力的顱乃一踴三丈遂得過乗桴渡河中流而追者至以表意謝之曰何去之速乎隋書地理志云襄陽郡義清縣有檀溪水襄水干寳搜神記曰秦穆公時陳倉人掘地得物若羊非羊若猪非猪牽以獻穆公道遇二童子曰此名為媪常在地食死人腦若欲殺之以柏揷其首媪曰彼二童子名為陳寳得雄者王得雌者霸陳倉人舍媪逐二童子童子化為雉飛入平林陳倉人告穆公穆公發徒大獵果得其雌又化為石置之汧渭之間至文公時為立祠陳寳其雄者飛至南陽今南陽雉縣是其地也秦欲表其符故以名縣毎陳倉祠時有赤光長十餘丈從雉縣來入陳倉祠中有聲殷殷如雄雉其後光武起於南陽六年以公為使持節都督三荆二襄南雍平信江隨郢淅十二州諸軍事荆州刺史東南道行臺僕射周書本傳云時荆襄初附太祖表儉功績尤美宜委東南之任授荆州刺史東南道行臺僕射北史曰獨孤信都督三荆州獨孤畧定北荆州後周置兵於此以備齊隋書地理志北荆州後周曰和州東荆州後改曰淮州荆州為鄧州襄陽郡江左並僑置雍州西魏改曰襄州置總管府春陵郡湖陽後魏置南襄州蔡陽後魏置南雍州南郡當陽縣後魏置平州巴東郡梁置信州九江郡舊置江州漢東郡西魏曰隨州江夏郡舊置郢州又竟陵郡亦舊郢州淅陽郡西魏置淅州凡十二州也漢書百官表曰僕射秦官古者重武官有主射以督課之應劭曰僕主也射音夜楚城鄰境實有讓田吳人對營無妨贈藥儉為荆州刺史與梁接界言其能使二國邊境相安也讓田讓疑上聲讀如左傳薳章讓黄之讓責也吳越春秋曰楚之邊境卑梁其處女與吳之處女桑於境戯而傷卑梁之處女卑梁人操其傷子以讓吳人吳人應之不恭怒殺而去之吳人徃報之盡屠其家吳楚由是大格又讓如字劉向新序曰梁太夫有宋就者嘗為邊縣令與楚鄰界邊亭皆種瓜各有數梁之邊亭人劬力數灌其瓜瓜美楚人窳而稀灌其瓜瓜惡楚令因以梁之美瓜怒其亭之惡也心惡梁亭之賢因往夜竊搔梁亭之瓜皆有死焦者矣梁亭亦欲竊往報搔楚亭之瓜以請宋就就曰惡是何可搆怨禍之道也乃毎暮夜灌楚亭之瓜瓜日以美楚亭怪而察之則乃梁亭也楚令大恱以聞楚王王聞之惄然愧以意自閔也乃謝以重幣而請交於梁王梁楚之歡由宋就晋書曰羊祜與陸抗相對使命交通抗稱祜之徳難量雖樂毅諸葛孔明不能過也抗嘗病祜饋之藥抗服之無疑心人多諫抗抗曰羊祜豈酖人者時談以華元子反復見於今日按上語讓從上聲則文有開闔言楚城鄰境雖實有責讓之言乎然吳人對營不妨有贈饋之事也若如字則文偏於一皆言二國邊亭輯睦也部内屬城為人所訟公遂集文武肉袒自罰本傳云所部鄭縣令泉璨為民所訟推治獲實儉即大集僚屬而謂之曰此刺史教誨不明信不被物是我之愆非泉璨之罪遂於㕔事前肉袒自罰捨璨不問於是屬城肅勵莫敢犯法兄弟不讓延壽責躬吏民有過翁歸引咎漢書曰韓延壽字長公燕人也入守左馮翊行縣至高陵民有昆弟相與訟田延壽大傷之曰幸得備位為郡表率不能宣明教化至令民有骨肉爭訟咎在馮翊當先退是日移病不聽事閉閤思過一縣莫知所為令丞嗇夫鄉老皆自繫待罪於是訟者宗族傳相責讓此兩昆弟深自悔皆自髠肉袒願以田相移終死不敢復爭延壽起聽事郡中不敢犯又曰尹翁歸字子兄河東平陽人也拜東海太守入守右扶風選用亷平疾姦吏以為右職接待以禮好惡與同之其負翁歸罰亦必行天子異之璽書勞問贈賄加幣王人接踵本傳云魏文帝璽書勞之大丞相書云此之美事耳目之所未經歎賞無極故遣専使周書本傳云太祖又與儉書曰近行路傳公以部内縣令有罪遂自杖三十用肅羣下吾昔聞王臣謇謇匪躬之故蓋謂憂公忘私知無不為而已未有如公刻身罰巳以訓羣僚者也聞之嘉歎公善於撫馭長於接引山藪無棄苞苴不行示人赤心與人顔色盜不敢發民不忍欺北史本傳云儉清正率下兼懐仁恕有竊盜者原情得實誨而放之荆蠻舊俗少不敬長儉殷勤訓導風俗大革務廣耕桑兼習武事故邊境無虞人安其業王逸臨豫州教云舉遺逸於山藪禮記曰苞苴簞笥問人者鄭注云苞苴裹魚肉者也或以葦或以茅廣絶交論曰苞苴所入實行張霍之家後漢書光武紀曰蕭王推赤心置人腹中安得不投死乎漢書曰韓延壽為東郡太守民不忍欺至是將校耆老於州城之南起清徳之樓勒賢臣之頌本傳云吏民表請為儉構清徳樓樹碑刻頌朝議許之漢書曰王褒為聖主賢臣頌杜鎮南之作牧當世樹碑竇車騎之臨戎生年刻石方之今日彼獨何人鎮南即征南杜預也襄陽記曰杜元凱好為身後名常自言百年後必髙岸為谷深谷為陵作二碑叙其平吳勲一沈萬山下一沈峴山下謂叅佐曰何知後代不在山頭乎後漢書竇憲傳曰南單于請兵北伐乃拜憲車騎將軍與北單于戰於稽落山大破之遂登燕然山去塞三千餘里刻石勒功紀漢威徳令班固作銘云於時戸口日增荒萊畢墾華實紛敷黔黎茂豫但恐袞職有闕待公而補鼎飪未和須公而正是以漢隂民望荆南杞梓並皆上書詣闕連名乞留北史本傳云吏人又以儉秩滿恐有代至詣闕乞留儉朝廷嘉而許之在州遂歴七載詩曰衮職有闕惟仲山甫補之左氏傳曰民之望也又云杞梓皮革自楚往也按儉治荆州漢隂荆南皆其所屬河内之借寇恂更慙謁帝交州之請士燮還著上表後漢書曰寇恂拜河内太守恂從至潁川盜賊悉降而竟不拜郡百姓遮道曰願從陛下借寇君一年乃留恂吳志曰士燮字威彦蒼梧人也漢時燮為綏南中郎將董督七郡領交趾太守孫權遣步隲為交州刺史燮率兄弟奉承節度權加燮為大將軍九年授車騎大將軍儀同三司按北史云在州遂歴七載周書云在州遂歴二載乞留之文北史較詳當是大統六年授荆州刺史歴二載九年徴召吏民乞留在荆州授此車騎儀同之職也自六年至下十二年共歴七載而除行臺尚書矣故上文寇恂句為乞留也士燮句謂加大將軍也十二年除大行臺尚書仍為大丞相司馬以公識度嚴明志節清儉遂改公名儉字慶明丞相司馬疑是誤文當作仍為大司馬丞相以公識度嚴明丞相指周太祖為魏丞相也周書本傳云徴收大行臺尚書兼相府司馬嘗與羣公侍坐於太祖及退太祖謂左右曰此人閒雅孤毎與語嘗肅然畏敬恐有所失他日太祖謂儉曰名實理須相稱尚書既志安貧素可改名儉以彰雅操知丞相謂周太祖司馬謂儉傳冩之錯誤也非關書月詎待看碑幸得千畝不同二山無廢言改名也㑹稽先賢傳曰闞澤年十三夢見名字炳然在月中魏志曰鄧艾至潁川讀陳寔碑文言文為世範行為士則艾遂自改名為範字士則後族有與同者故改焉左傳桓二年曰晋穆侯之夫人姜氏以條之役生太子命之曰仇其弟以千畝之戰生命之曰成師杜預曰桓叔也西河界休縣南有地名千畝又桓六年傳曰先君獻武廢二山杜預曰二山具敖也魯獻公名具武公名敖更以其鄉名山十三年加開府餘官如故十四年除尚書右僕射加侍中進驃騎大將軍居上星執法在文昌之位以公才望兼而有之星經曰執法四星在太陽首西北主刑獄之人又為刑政之官助宣王命内常侍官也又云文昌與三公攝提軒轅共為一體十五年更除東南道行臺僕射都督十五州諸軍事行荆州事周書本傳云除行臺僕射荆州刺史時梁嶽陽王蕭詧内附初遣使入朝至荆州儉於㕔事列軍儀具戎服與使人以賔主禮相見儉容貌魁偉音聲如鐘大為鮮卑語遣人傳譯以問客客惶恐不敢仰視日晩儉乃著裙襦紗帽引客宴於别齋因序梁國喪亂朝廷招攜之意發言可觀使人大恱出曰吾所不能測也十六年大丞相總十六軍剋清河洛公又中分麾下叅謀帷幄髙選霸僚公為長史大丞相周太祖也周書本紀云魏大統十六年七月太祖率諸軍東伐所謂剋清河洛是也後漢書鄧禹傳曰乃拜為前將軍持節中分麾下精兵二萬人遣西入關令自選偏裨以下可與俱者漢書高帝曰運籌帷幄之中其年加都督南道三十六州諸軍事餘官如故南陽文學更遇王基章華袞衣還迎郭賀謂儉受知於周太祖也魏志曰王基字伯輿東萊曲城人也又王修傳曰修年二十遊學南陽止張奉舍又曰初修識高柔於弱冠異王基於幼童終皆逺至世稱其知人南陽文學葢王修也言周太祖之知儉猶王修之識基也後漢書曰郭賀拜荆州刺史明帝廵狩到南陽特見嗟嘆賜以三公之服黼黻旒冕勅去幨露冕使百姓見此衣服以彰其徳章華楚地謂荆州也為下文江陵張本時周祖雖未受禪其承制封拜有並尊之勢故以明帝比之以郭賀喻儉也昔日伐蜀之謀張儀與秦昭計合平吳之利羊祜與晉武意同言周太祖欲圖江陵儉與意合也史記曰秦昭王將伐蜀張儀勸伐之遂西舉巴蜀晋書曰武帝宻有滅吳之計朝議多違惟羊祜杜預張華與帝意合太祖始定成都即有江陵之志謂令尉遲迥伐蜀平武陵王紀遂欲伐江陵謀梁元帝也公密獻其策懸符深㫖糧運久積梯衝立備一戰而舉鄢郢再戰而燒夷陵遂得席巻三荆此又公之勲也周書本傳云梁元帝嗣位於江陵外敦鄰睦内懐異計儉密啓太祖陳攻取之謀於是徴儉入朝問其經界儉對曰今江陵既在江北去我不逺湘東即位巳渉三年觀其形勢不欲東下骨肉相殘民厭其毒荆州軍實器械儲積巳久若大軍西討必無匱乏之慮且兼弱攻昧武之善經國家既有蜀土若更平江漢撫而安之收其貢賦以供軍國天下不足定也太祖深然之乃謂儉曰如公之言吾取之晩矣令儉還州密為之備尋令于謹總戎衆伐江陵平史記毛遂曰一戰而舉鄢郢再戰而燒夷陵頃襄二十一年秦將白起拔郢燒夷陵詔賞奴婢三百口太祖與公書云由公立計果如所謀令公作鎮江陵以安蜀地周書本傳云江陵平以儉元謀故賞奴婢三百口太祖與儉書曰本圖江陵由公畫計今果如所言智者見未萌何其妙也但吳民離散事藉招懐南服重鎮非公莫可遂令鎮江陵後魏二年改武川昌寜郡開國公歴陽居民非惟景丹之封曲逆戸口豈但陳平之國武川屬恒州儉為恒州高陸人武川是其故鄉也隋書地志云文城郡有昌寜後漢書曰景丹字孫卿馮翊櫟陽人也建武二年定封丹櫟陽侯帝謂丹曰今關東故王國雖數縣不過櫟陽萬戸邑夫富貴不歸故鄉如衣錦夜行故以封郷耳丹頓首謝漢書陳平傳曰高帝南過曲逆上其城望室屋甚大曰壮哉縣吾行天下獨見雒陽與是耳顧問御史曲逆戸口幾何對曰始秦始三萬餘戸間兵數起多亡匿今見五千餘户於是詔御史更封平為曲逆侯盡食之言儉之衣錦如二公也其年授大將軍本傳遷大將軍太和之中曹真於府内受冊元封之末衞青於軍中即拜公之此比綽有餘榮魏志曰曹真字子丹太祖族子也太和二年蜀大将諸葛亮寇邊吏民叛應亮遣大将軍曹真都督關右太和魏明帝年號也漢書衞青傳曰元朔五年天子使使者持大將軍印即軍中拜青為大將軍此言元封按武帝紀元封五年大將軍青薨是元封中青尚在也詔曰吳人未復須助謀謨今使梁王兵馬受公節度詔文已見上注周書梁王詧傳云江陵平太祖立詧為梁王居江陵資以江陵一州之地太祖置江陵防主統兵居於西城名曰助防外示助詧備禦内實防詧即此鎮也本傳云移鎮荆州總管五十二州三年加都督東南道五十二州諸軍事增邑萬户維周革命光宅欽明作貳天官允諧邦治元年授小冡宰維周革命謂周受魏禪孝閔踐阼也元年閔帝元年也北史本傳云周閔帝初趙貴等將圖晋公䕶儉長子僧衍預其謀坐死護乃徵儉拜為小冢宰周易曰湯武革命光宅及欽命俱見尚書周禮天官太宰之職云掌建邦之六典以佐王治邦保定二年武帝即位之二年也治蒲州刺史檢校六防諸軍事四年治襄州仍授柱國大将軍餘官如故秩登四岳階平六府尚書帝曰咨四岳孔安國曰掌四岳之諸侯故稱焉六府水火金木土穀古文尚書文也左傳杜注稱逸書豈不功重昭陽名高蔡賜史記楚世家云陳軫見昭陽曰願聞楚國之法破軍殺將者何以貴之昭陽曰其官為上柱國封上爵執珪漢書陳勝傳曰以上蔡人房君蔡賜為上柱國控馭五十州風行數千里拔園葵而去織婦無三惑而絶四知漢書董仲舒賢良策曰公儀子相魯之其家見織帛怒而出其妻入於室而茹葵慍而拔其葵曰吾已食禄而奪園夫女紅利乎後漢書曰楊秉嘗從容言曰我有三不惑酒色財又曰王密夜遺楊震金曰暮夜無知者震曰天知地知子知我知誰謂無知此云四知是也一室之中未免虚白日膳之資三杯而已莊子曰虚室生白崔云白者日光所照也淮南子曰是故虛室生白吉祥止也高誘曰虛心也室身也白道也能虚其心以生於道道性無斷吉祥來止舍也漢書曰朱博為人亷儉食不重味案上不過三桮詔賜繒綵一千段粟麥二千斛北史本傳云朝議以儉操行清白勲績隆重乃下詔褒之兼賜雜綵粟麥以彰其美天和元年陜州刺史都督八州二十防諸軍事解荆州總管餘悉如故路出王官城臨河曲言陜州也王官地名史記曰秦繆公三十六年使孟明將兵伐晋取王官又曰繆公自將伐晋戰於河曲服䖍曰河曲晋地杜預曰河曲在蒲坂南正義曰河曲在華隂縣界儉臨陜州是其地也戍清陜右高視棠隂公羊傳曰自陜以西召公主之故云陜右詩序曰甘棠美召伯也部領宴繁晦明為疾左傳醫和曰晦淫惑疾明淫心疾天和四年謝病故京薨於私第春秋七十有八本傳云三年以疾還京為夏州總管薨鑾蹕降臨軒懸徹樂九旒龍旆之錫三河騎士之送言武帝親臨祭弔減膳徹樂也古者大臣死人君為之不舉左氏傳曰鍚鑾和鈴漢儀注曰皇帝輦動左右侍帷幄者稱警出殿則傳蹕止人清道也周禮曰大臣死凡國之大憂令弛縣又云正樂縣之位王宮縣諸侯軒縣卿大夫判縣士特縣辨其聲注樂縣謂鐘磬之屬縣於筍虡者鄭司農云宫縣四面縣軒縣去其一面判縣又去其一面特縣又去其一面四面象宮室四面有牆故謂之宮縣軒縣三面其形曲故春秋傳曰請曲縣繁纓以朝諸侯禮也康成謂軒縣去南面辟王也子山以周帝徹樂猶尚軒縣矣後漢書曰東平王蒼薨詔賜鑾輅乗馬龍旂九旒虎賁百人奉送王行又清河王慶薨賜龍旂九旒儀比東海恭王注云旂有九旒天子制也漢書曰高祖委發關中兵收三河士韋昭曰河東河南河内也霍光傳云發三河卒詔贈太保涼夏靈銀長原河鄯甘瓜十州諸軍事涼州刺史隋書武威郡舊涼州後周置總管府夏州注見上靈州郡後魏靈州雕隂郡儒林縣後周銀州朔方郡長澤縣後魏長州平涼郡舊置原州抱罕郡舊河州西平郡舊鄯州張掖郡西魏甘州燉煌郡舊瓜州諡曰文公狀貌丘􅇕風神磊落玉山秀立喬松直上煙霞之涯際莫尋江海之波瀾不測少遭荼苦在山服終攀柏樹枯侵松獸死詩云誰謂荼苦晋書曰王裒痛父非命廬於墓側旦夕嘗至墓所拜跪攀柏悲號淚著樹樹為之枯又曰許孜植松於親墓側有鹿犯其松孜嘆曰鹿獨不念我乎忽有猛獸殺鹿於所犯松下盡忠事國竭力從政其門如市其心若水漢書鄭崇傳上責崇曰君門如市人何以欲禁切主上崇對曰臣門如市臣心如水奇策密謀百僚仰止忠貞亮直明王敬焉周太祖所謂此人閒雅孤毎與語嘗肅然畏敬恐有所失者也注見上文至如風后隂陽之占力牧星辰之度魏公子之兵書李將軍之射法莫不成誦在心取為時用風后力牧黄帝臣漢書藝文志有風后十三篇力牧十五篇魏公子二十一篇圖十巻名無忌有傳李將軍射法三篇師古曰李廣也居常服翫或以布被松牀後漢書曰王良為大司徒司直在位恭儉妻子不食官舍布被瓦器時司徒史鮑恢以亊到東海過候其家而良妻布裙曵柴從田間歸恢告曰我司徒史也故来受書欲見夫人妻曰妾是也苦掾無書恢乃下拜嘆息而還盤案之間不過桑杯石鼎謝承後漢書曰高𢎞以桑杯盛漿言其儉也遺令山陵一無所用公私贈襚並不得受止依太祖陵側無忘事君墩等兄弟並至性善居喪號慕墳埏奉遵遺訓本傳云遺啓世宗請𦵏於太祖陵側并以官所賜之宅還官詔皆從之是以衞青之塜仍陪漢武之陵管仲之墳即接齊桓之墓顔師古漢書注曰衞青塜在茂陵東次霍去病之西相並者是也三輔黄圖曰武帝𦵏茂陵在長安城西北八十里括地志曰齊桓公墓在臨淄縣南二十里牛山上一名牛首堈一所三墳又云管仲塚在青州臨淄縣南二十里牛山之阿是管仲桓公之墓接也天和六年天子以四海未寧三方鼎峙有懐將帥之志言念封疆之臣史記樂書曰君子聽鼓鼙之聲則思將帥之臣又曰君子聽磬聲則思封疆之臣既畫雲臺乃題麟閣後漢書曰永平中顯宗追感前功臣乃圖畫二十八將於南宫雲臺漢書曰宣帝思股肱之美乃圖霍光等十一人於麒麟閣更贈公為鄶北史作鄫國公邑五千戸追崇列辟事極神䰟再改銘旌恩隆封墓鄭司農曰銘書死者名於旌今謂之柩公在民留愛身後見思吉日良辰郊祀野祭楚辭曰吉日兮良辰襄陽記曰諸葛亮初亡百姓巷祭戎彞野祠儀同趙超等六百九十七人表求立廟陳請象魏有詔許焉本傳云荆州人儀同趙超等六百九十七人詣闕請為儉立廟樹碑詔許之建徳元年詔曰故柱國鄶國公儉臨終審正爰吐徳音以所居之宅本因上賜制度宏麗非諸子所居請以還宮更遷他所昔叔敖辭沃壤之地蕭何就窮僻之鄉以古方今無慙曩哲而有司未達大體遽以其第即便給外今還其妻子俾清風逺播無替聿脩周禮太宰正月之吉縣治象之法於象魏使萬民觀治象左傳哀三年云命藏象魏又莊二十一年曰鄭伯享王於闕西辟杜預曰闕象魏也桂棟杏梁綠墀青瑣謂賜宅之宏麗也楚辭九歌曰桂棟兮蘭橑三輔黄圖曰靈波殿以桂為柱閒居賦曰飾文杏以為梁漢書曰王根驕奢僭上赤墀青瑣後漢書曰梁冀大起第宅牕牖皆有綺疎青瑣注云青瑣謂刻為瑣文而以青飾之也按歌會舞鳯葢霓裳南浦送而行雲東風飄而零雨張衡西京賦曰張鳯葢楚辭曰青雲衣兮白霓裳又曰送美人兮南浦又曰東風飄兮神靈雨是知漢陽郡前非徒武侯之廟臨淄城下豈獨欒公之社蜀志曰諸葛亮諡忠武侯景耀六年春詔為亮立廟於沔陽魏鎮西將軍征蜀至漢川祭亮之廟令軍士不得於墓所左右芻牧樵採漢書曰欒布為燕相燕齊之間皆為立社號曰欒公社按臨淄齊地地理志曰臨淄師尚父所封嗚呼哀哉乃為銘曰道鍾屯剝世屬雲雷地軸左轉天關北開周易上經有屯卦剝卦象曰雲雷屯博物志曰地有三千六百軸荆州星占曰北辰一名天關言世衰道微天廻地轉赤縣神州之地轉為隂山瀚海之郷而魏氏乃從此盛也容車周室繫馬秦臺乃齊七政爰答三才言魏氏始懐問鼎終膺當璧也史記秦武王三年王謂甘茂曰寡人欲容車通三川以窺周室而寡人死不朽矣三齊記曰般城南有蒲臺高八十尺秦始皇所頓處在臺下縈蒲繫馬今蒲猶縈者郡國志平原般縣是也尚書曰璿璣玉衡以齊七政鄭康成曰七政日月五星也易繫辭曰兼三才而兩之三才天地人也烈祖燮諧九龔梁棟取才逄獵求賢入夢烈祖謂沙莫雄也燮諧言沙莫雄燮理弼諧之功也九龔未詳疑作九龍龔又疑公訛似謂北魏十族長孫居其一自餘為九於魏室為棟梁之材也史記曰西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲霸王之輔於是周西伯獵果遇太公於渭之陽與語大恱載與俱歸立為師殷本紀曰武丁夜夢得聖人名曰說乃使百工營求之野得說於傅巖中是時說為胥靡築於傅巖見於武丁與之語果聖人舉以為相殷國大治遂以傅巖為姓號曰傅說匡贊官雲謀猷紀鳯律定公族珪分職貢言沙莫雄當魏之初興遂得設官分職賜姓裂土也左氏傳曰黄帝氏以雲紀故為雲師而雲名少皥摰之立也鳯鳥適至故紀於鳥為鳥師而鳥名潛夫論曰古者吹律定姓左氏傳曰官有世功則有公族言賜姓長孫如古吹律本魏支屬故云公族也珪分職貢者言魏七分其國沙莫雄為南部大人也又嵩為北平王珪分如周禮桓珪信珪躬珪之屬職貢如禹貢納秸納粟納米之類是也乃惟嗣徳實秉英靈身圖斗宿面繞樞星謂儉之誕生上感星宿也帝王世記曰禹胸有玉斗史記正義曰黄帝母曰附寳之祁野見大電繞北斗樞星感而懐孕二十四月而生黄帝於壽丘青衿敬業童子離經信陵虛左干木分庭毛萇曰青衿青領也學子之所服禮記曰十年視離經辨志史記曰魏公子無忌封信陵君為人仁而下士士無賢不肖皆請而禮交之致食客三千人從車騎虚左自迎夷門生又云魏文侯客段干木過其閭未嘗不軾莊子曰分庭抗禮言儉為周太祖所敬也忠孝純深樞機周密孔光不言曹叅勿失言周太祖赴平涼時儉得叅機密也漢書曰孔光與兄弟妻子燕語終不及朝省政事又曰惠帝時曹叅代蕭何為相國一遵何之約束百姓歌之曰蕭何為法較若畫一曹叅代之守而勿失載其清静民以寜一溫席扇枕承顔悅膝凍浦魚驚寒林笋出言其孝也本序少遭荼苦在山服終是儉有孝行矣干寳搜神記曰羅威字徳仁八嵗喪父事母性至孝母年七十天大寒常以身自溫席而後授其處又後漢書曰黄香九嵗失母獨養其父躬執勤苦夏則扇枕席冬則以身溫被干寳搜神記曰楚僚早失母事後母至孝母患癰瘇形容日悴僚自徐徐吮之血出迨夜即得安寢乃夢一小兒語母曰若得鯉魚食之其病即差可以延壽不然不乆死矣母覺而告僚時十二月冰凍僚乃仰天嘆泣脫衣上冰臥之有一童子決僚臥處冰忽自開一雙鯉魚躍出僚將歸奉其母病即愈壽至一百三十三嵗葢至孝感天神昭應如此此與王祥王延事同寒林笋出孟宗事注見齊王碑銘肅肅風政沉沉器局直似貞筠溫如瑞玉禮記曰如竹箭之有筠也詩云温其如玉清不置水明非舉燭馬願如羊金須似粟言儉在荆州有清徳故以清徳名樓也後漢書曰龎參為漢陽太守郡人任棠置水一盂太守曰水者欲吾清也韓子曰鄭人有遺燕相國書謂持燭者曰舉燭而誤書舉燭非書意也燕相受書曰舉燭言舉高明者而任之以治國也使馬如羊不以入廐使金如粟不以入懐後漢涼州張奐之言也注見步陸孤碑上將克昇元戎既序夏陽三㨗夷陵一舉晋書天文志曰文昌六星一曰上將大將軍建威武詩云元戎十乗以先啓行左氏傳曰晋伐虢滅下陽詩云一月三㨗楚世家曰秦拔郢燒夷陵言為鎮東將軍遂獲夏州督南道諸軍遂平荆州皆其勲也憑軾下齊淩江入楚鼎反歴室鐘歸大呂言儉下齊則清河洛入楚則平江陵也左氏傳曰憑軾而觀之潘岳詩云淩江而翔戰國策曰樂毅報遺燕惠王書曰大吕陳於元英故鼎反乎歴室髙誘曰燕噲亂齊殺噲得鼎今反歸燕故鼎史記索隠曰大呂齊鐘名六卿咸事天官是司二南作伯棠隂實治謂儉拜小冢宰尋為陜州刺史也周禮六卿天官冢宰之職二南周南召南甘棠美召伯也治平聲清風有頌緑竹聞詩贈行之冊超然帝師詩曰吉甫作頌穆如清風又衞風云綠竹猗猗毛傳曰緑王芻也竹篇竹也釋文綠竹並如字爾雅作箓音同韓詩竹作􅗨音徒沃反云􅗨篇筑也芻郭璞云今呼白脚莎一云鹿蓐也按緑竹本二物惟陸璣云緑竹一草名其莖葉似竹青緑色高數尺今淇澳傍生此人謂此為緑竹毛詩正義云此說非也詩有終朝采綠則綠與竹别草故傳依爾雅以為王芻與篇竹異也昔侍蘭苑今陪杏林死生契闊無違一心謂宅宇宏麗臨終之日請以還官是其死生無違也蘭苑杏林謂木蘭為柱文杏為梁也詩云死生契闊與子成説風雲積慘山陣連隂陵田野寂松逕寒深夏嬰之隴喬𤣥之墓馬見千年車迴三步史記曰汝隂侯夏侯嬰沛人也與高祖相愛封滕公卒諡文侯索隠曰姚氏云三輔故亊曰滕文公墓在飲馬橋東大道南俗謂之馬冢博物志曰公卿送𦵏至東都門外馬不行踣地悲鳴得石槨有銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室乃𦵏之焉後漢書曰喬𤣥字公祖梁國睢陽人也初曹操微時人莫知者嘗往候𤣥𤣥見而異焉謂曰今天下將亂安生民者其在君乎操常感其知巳及後經過𤣥墓輒悽愴致祭奠自為其文曰故太尉喬公懿徳高軌汎愛博容國令明訓士思令謨幽靈潛翳懇哉緬矣操以幼年逮升堂室特以頑質見納君子增榮益觀皆由奨朂猶仲尼稱不如顔淵李生厚歎賈復士死知巳懐此無忘又承從容約誓之言徂没之後路有經由不以斗酒隻雞過相沃酹車過三步腹痛勿怨雖臨時戯笑之言非至親之篤好何肯為此辭哉懐舊惟顧念之悽愴奉命東征屯次鄉里北望貴土乃心陵墓裁致薄奠公其享之魏志曰建安七年曹公軍譙遂致浚儀遣使以太牢祀喬𤣥進軍官渡也言儉與周太祖相善猶夏嬰之於漢高橋𤣥之於魏武也左無長樂前非武庫直望高碑增悲行路史記曰樗里子卒𦵏於渭南章臺之東曰後百嵗是當有天子之宫夾我墓至漢興長樂宫在其東未央宫在其西武庫正直其墓庾子山集巻十三
