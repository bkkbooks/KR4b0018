body:
  text: 庾子山集巻首上錢塘倪璠編年譜梁武帝梁書本紀曰帝諱衍字叔達小字練兒姓蕭氏與齊同承淮隂令整之後齊明帝崩遺詔以帝為都督雍州刺史永元三年二月帝發襄陽十二月斬東昏南康王即帝位進帝位相國總百揆封十郡為梁公備九錫之禮進爵為王齊帝下詔禪位天監元年夏四月即位於南郊在位曰十九年崩尊為武帝廟曰高祖葬於修陵天監十二年癸巳武帝即位之十二年也陸倕新刻漏銘曰天監六年大嵗丁亥哀江南賦稱大清二年為戊辰知是年嵗在癸巳又以滕王逌序已亥年六十七嵗逆數之信當以是年生天監十三年甲午秋七月立皇子綸為邵陵王繹為湘東王紀為武陵王隋書地理志梁武帝除暴寧亂奄有舊呉天監十三年有州十三郡三百五十縣千二百二十二其後務恢境宇多有析置至大同中州一百七郡縣亦稱於此天監十四年乙未天監十五年丙申是嵗魏明帝詡熙平元年天監十六年丁酉春詔織錦者不得為仙人鳥獸之形以其裁翦有乖仁恕宗廟牲牢皆代以麫薦用蔬果朝野喧囂以為宗廟去牲乃是不復血食帝終不從按武帝溺情釋教實起於此天監十七年戊戌天監十八年巳亥夏帝於無碍殿受佛戒普通元年庚子是嵗魏正光元年普通二年辛丑普通三年壬寅普通四年癸卯是年簡文帝以晉安王為雍州刺史信父肩吾為晉安王國常侍王每徙鎮肩吾常隨府在雍州被命與劉孝威等十人抄撰衆籍豐其果饌號髙齋學士普通五年甲辰普通六年乙巳是嵗魏孝昌元年普通七年丙午大通元年丁未本紀云初帝創同泰寺至是開通大門以對寺之南門取反語以協同泰自是晨夕講義多由此門三月辛未幸寺捨身甲成還宫大赦改元大通以符寺及門名及簡文帝為太子時有望同泰寺浮圖詩子山集中奉和同泰寺浮屠即此寺也王信時年十有五嵗侍梁眧明太子東宫講讀滕逌序信年十五侍梁東宫講讀賦云蘭成射策之年是也按天監元年立皇子統為皇太子至中大通三年薨知為梁昭明太子時也大通二年戊申是年春魏明帝崩夏魏大都督爾朱榮推奉孝莊帝是為永安元年中大通元年巳酉六月都下疫甚帝於重雲殿為百姓救苦設齋以身為禱按賦云設重雲之講即此殿也秋九月朱雀航華表灾按朱雀航即後太清二年庾信屯兵處九月帝捨身同泰寺羣臣以錢一億萬奉贖皇帝三請乃許中大通二年庚戌夏四月幸同泰寺設平等㑹朱是嵗魏莊帝永安三年秋魏莊帝殺其權臣爾榮僕射爾朱世隆奔髙都奉長廣王曄為主而弑孝莊帝年號建明集中碑誌所稱永安以來魏室大壞又云洛邑亂離當塗危遏葢指是事中大通三年辛亥夏四月皇太子薨六月立昭明太子子歡為豫章郡王譽為河東郡王詧為岳陽郡王秋七月立晉安王綱為皇太子信父肩吾為梁太子中庶子掌管記東海徐摛為右衛率摛子陵及信並為抄撰學士文並綺豔世號徐庾體時信為湘東國常侍轉安南府參軍年十九嵗十月上幸同㤗寺升法座為四部衆說湼槃經十一月微幸說般若經自後每嵗幸焉是歲魏爾朱兆又廢其主曄而奉節閔皇帝為普泰元年又魏渤海王髙歡舉兵信都别奉渤海太守朗為主改普泰為中興中大通四年壬子春立臨川王宏子正徳為臨賀郡王為嫡皇孫大器為宣城郡王邵陵王綸有罪免庶人是嵗魏高歡平爾朱氏廢節閔帝及自所奉渤海故王朗而奉平陽王修是為孝武帝永熙元年中大通五年癸丑是嵗魏孝武用侍中斛斯椿之言疑忌高歡殺其黨司空髙乾始與歡有隙中大通六年甲寅是年春魏秦州刺史侯莫陳恱殺闗西大行臺賀㧞岳夏夏州刺史宇文泰收岳擊恱斬之孝武以泰為闗西大行臺奔秋魏孝武帝出屯河橋髙歡將兵淮河孝武西長安以宇文泰為丞相秉政歡追至華隂而還别奉清河王庶子善見為主徙都鄴魏於是始分為兩孝武既至闗中又與㤗不合未幾遇鴆而崩大同元年乙卯是歲西魏文帝寳炬大統元年宇文泰封安定郡公大同二年丙辰冬十二月與東魏通和大同三年丁巳秋東魏人來聘使兼散騎常侍張臯聘於東魏闗是年髙歡自蒲津伐西魏使大都督竇泰攻潼春宇文泰擊竇秦斬之歡走秋宇文泰攻東魏𢎞農㧞之冬髙歡自蒲津擊西魏泰與戰於沙苑大破之俘斬七萬歡走泰遂濟河擊蒲坂汾絳皆下之還屯馮翊又使開府獨孤信攻洛陽拔之梁陳以西多降西魏集中諸碑誌所稱戰河橋復𢎞農解華山圍平沙苑陣皆是年事魏之大統三年也大同四年戊午夏東魏人來聘秋使兼散騎常侍劉孝義聘於東魏大同五年巳未冬東魏人來聘使兼散騎常侍柳豹聘於東魏大同六年庚申秋東魏人來聘遣散騎常侍陸晏子報聘大同七年辛酉夏東魏人來聘遣兼散騎常侍明少遐報聘冬東魏人來聘遣兼散騎常侍袁狎報聘十二月於宫城西立士林館延集學者賦云開士林之學即是館也大同八年壬戌春安成郡人劉敬躬挾左道以及江州刺史湘東王繹遣中兵曹子郢討擒之送於都斬之建康市按滕王逌序信時為郢州别駕使與湘東王論中流水戰事醜徒聞其名德遂即散奔賦云論兵於江漢之君在是年也時年三十大同九年癸亥冬益州刺史武陵王紀進號征西將軍開府儀同三司大同十年甲子三月幸京口城北固樓因改名北顧南史梁宗室傳云蔡謨起樓其上以置軍實是後崩壊項猶有小亭又云武帝登北顧亭曰江右有反氣骨肉為戎有賦云遭東南之反氣按太清亂後諸鎮猜嫌骨肉屠害武帝之言竟為騐矣大同十一年乙丑夏東魏人來聘南史紀年不載聘魏本傳累遣通直散騎常侍聘於東魏文章辭令盛為鄴下所稱滕王逌序使魏在湘東水戰之後又以魏書考之當在是年集中有將命至鄴詩又有將命至鄴酬祖正員詩北齊書云祖珽弟孝隱魏末為散騎常侍迎梁使時徐君房庾信來聘名譽甚髙魏朝聞而重之按魏書武定三年梁遣散騎常侍徐君房通直常侍庾信十月遣中書舍人魏瑾使梁滕逌序稱還本國為正員郎雜俎稱信對宴魏使東信時年三十有三以上大同三年至十一年魏未聘及梁朝報聘賦所謂王歙為和親之侯班超為定遠之使是也及侯景内附而東魏絶與東魏通和而侯景反矣中大同元年丙寅夏四月同泰寺灾本紀云始天監中沙門釋寳誌為詩曰昔年三十八今年八十三四中復有四城北火酣酣帝使周捨封記之及灾帝啓封見捨手迹為之流涕帝生於甲辰三十八尅建業之年也遇灾嵗實丙寅八十三矣四月十四日實起火之始遂至喪亂云按武帝天監元年至明年太凊元年凡四十七年是梁朝承平之世賦云五十年中冮表無事是也太清二年遂有侯景之亂矣時信為東宫學士領建康令年三十有四太清元年丁卯正月東魏相渤海王高歡薨二月已卯句虹貫日庚辰東魏司徒侯景求以河南十三州内属壬午以景為大將軍封河南王大行臺承制如鄧禹故事賦云漁陽有閣左戍卒離石有將兵都尉又云飲其瑠璃之􅃳賞其虎豹之皮是也行三月幸同泰寺設無遮大㑹上釋御服服法衣清淨大捨名曰羯磨帝升尤嚴殿講堂坐師子講金字三慧經捨身羣臣以錢一億萬奉贖皇帝賦云談劫燼之灰飛辨長罜之夜落是也景東魏高澄嗣事為渤海王遣其將慕容紹宗圍於長社景急乃求割魯陽長社東荆北兖請救於西魏方解圍八月諸軍北征以南豫州刺史簫明為大都督以大將軍侯景録行臺尚書事十一月慕容紹宗大敗蕭明於寒山明被俘執是侯景内附而東魏絶也太清二年戊辰賦云戊辰之年是也春春侯景與慕容紹宗戰於渦陽景大敗走保夀河南地復入東魏秋七月使兼散騎常侍謝斑聘於東魏通和八月戊戌侯景舉兵反是與東魏通和而侯景反也甲辰使開府儀同三司邵陵王綸都督衆軍討景江冬十月侯景襲譙州進攻陷厯陽已酉景自横濟采石辛亥至建鄴故賦云建亥之月建鄴梁之所都本故金陵故賦云大盗移國金陵瓦解及傷心賦所謂二男一女並得勝衣金陵喪亂相繼亡沒皆指是年之亂景反以臨賀王正僡為平北將軍都督京師諸軍屯丹陽郡正徳辛衆附賊十二月已木景立蕭正徳為天子於南關前賦云王子召戎姦臣介冑謂正徳也績庚辰邵陵王綸等入援進軍胡頭與賊戟賊敗賦云鎮北之負譽矜前風飈㓗然者也粲十二月丙辰司州刺史柳仲禮前衡州刺史韋等並帥軍入援推柳仲禮為大都督即賦申子是是信時年三十六嵗賦云信年始二毛即逢喪亂遇亂之年三十有六也本傳時為東宫學士領建康令侯景作亂簡文命信率宫中文武千餘人營於朱雀航北及景至徹航始除一舶見賊軍皆著鐡面遂棄軍走南塘㳺軍復閉航渡景皇太子以所乗馬授王質配精兵三千使援庾信質至領軍府與賊遇未陣便奔景乗勝至闕下按退後即潜跡西奔滕王逌序所謂出往上流者也太清三年巳巳正月柳仲禮帥衆分據南岸賊濟軍於青塘襲破韋粲營粲拒戰死賦所謂䕶軍慷慨忠能死節者也景庚申白虹貫日三重賦云白虹貫日計二月侯遣使求和盟於西華門下時景奸既成乃表陳帝失復舉兵向闕時四方征鎮入援者三十餘萬莫有闕志自相抄奪而已賦云官守無奔問之人于戚非平戎之戰又云晉鄭靡依魯衛不睦謂諸援軍也丁卯賊攻䧟宫城縱兵大掠巳亥賊矯詔遣石城公大欵解外援軍庚午侯景自為都督中外諸軍事大丞相録行臺事辛未援軍各散年四月帝憂憤􅃦疾五月丙辰帝崩於淨居殿時八十六帝為景所制御膳亦被裁抑疾久口告索蜜不得再曰荷荷遂崩賦云探雀鷇而未飽待熊蟠而詎熟是也辛巳太子即皇帝位立宣城王大器為皇太子立當陽大心為尋陽郡王簡文即位以信父肩吾為度支尚書簡文帝梁書本紀曰帝諱綱字世績小字六通武帝第三子昭明太子母弟也天監五年封晉安王大通三年昭明太子薨立為皇太子太清三年臺城陷皇太子坐永福省見侯景神色自若無懼容武帝崩即皇帝位在位二年崩承聖元年尊為簡文帝廟號太宗葬莊陵大寳元年庚午正月朔火赦改太清四年為大寳元年西魏尅安陸執司州刺史柳仲禮盡有漢東地按侯景攻城仲禮開門降賊至是復屈西魏賦云功業天枉身名埋沒矣二月侯景攻下廣陵景逼帝幸西州岳夏湘東王使將軍王僧辨攻殺河東王譽譽弟陽王詧以雍州入西魏秋七月賊行臺任約冦冮州刺史尋陽王大心以州降之按梁書及南史庾肩吾傳肩吾為度支尚書時上流諸蕃並據州拒侯景景矯詔遣肩吾喻當陽公大心大心尋舉州降賊肩吾因逃入東後臧帥宋子仙破㑹稽購得肩吾欲殺之尋釋以為建昌令仍間道奔江陵賦云既姦囘之奰逆終不恱於仁人是也八月相東王繹遣領軍將軍王僧辨逼郢州邵陵王綸棄郢州走九月乙亥侯景自進位相國封二十郡為漢王十月乙未景又逼帝幸西州曲宴自加宇宙大將軍都督六合諸軍事是歲夏五月丙辰東魏静帝遜位於齊大寳二年辛未二月邵陵王綸走至安陸董城為魏所攻見殺為王僧辨逼之軍潰故賦云才子併命俱非百年又云夏口濫逵泉之誅是也國三月侯景悉兵西上於大􅟘跨水築城名曰捍四月景遣宋子仙襲陷郢州乗勝西上號二十萬聨旗千里按本傳臺城陷後信奔江陵時侯景悉兵西上信方在道途遇景襲郢之兵故賦云吹落葉之扁舟飄長風於上㳺彼鋸牙而鈎爪又偱江而習流閏四月侯景園巴陵六月乙巳解圍宵遁秋七月景還至建業按景軍敗信得度郢州賦云落帆黄鶴之浦蔵船鸚鵡之洲葢江夏地也又按王僧辨平郢之後湘東王封蕭韶為長沙王郢州刺史南史梁宗室傳云韶昔為㓜童庾信愛之有斷袖之歡衣食所資皆信所給遇客韶亦為信傳酒後為郢州信西上江陵途經江夏韶接信甚薄坐青油幕下引信入宴坐信别㯮有自矜色信稍不堪因酒酣乃徑上韶床踐蹋肴饌直視韶面謂曰官今日形容大異近日時賓客滿坐韶甚慙恥知是時信在郢州年三十九歲皇八月戊午侯景廢帝為晉安王幽於永福省害太子大器等冬十月王偉等進觴於帝既醉寢偉雋進土囊王修纂坐上帝崩於永福省時年四十九偉徹户扉為棺遷殯於城北酒庫中賦云車側郭門筋縣廟屋又與諸子大器大心大大球大昕及尋陽王諸子二十人俱見害故云更不遇於浮邱遂無言於師曠以愛子而託人知西陵而誰望皆哀簡文帝也景迎豫章王棟即皇帝位改元天正又矯蕭棟詔禪位偽號太始元年侯景傳云臺城既陷武帝嘗語人曰侯景必為帝但不久耳破侯景宇成小人百口天子為帝景以辛未年十一月十九日篡位壬申三月十九日敗得一百二十日而景以三月一日便往姑熟計在宫殿足滿十旬其言竟騐信奔冮陵元帝承制除御史中丞賦云悞尸承於御史按王僧辨平郢信至郢州奔江陵當在七月後元帝承制時也滔信至江陵居城北三里宋玉舊宅即八世祖庾故居賦云誅茅宋玉之宅是也時信父肩吾亦奔江陵厯江州刺史領義陽大守封武原縣侯卒梁書云肩吾逃入建昌久之方得赴江陵未㡬卒賦云信生世等於龍門辭親冋於河洛用太史公事漢書遷生龍門天子始建漢家之封太史公㽞滯周南不得與從事發憤辛子遷適及見父於河洛之間按明年元帝即位肩吾已卒是亦不得與從事也時信適奔江陵始一見父遂爾遭喪事同河􅏖至承聖元年十一月帝即位時巳近小祥襲父爵為武康縣侯明肩吾之卒在是年也元帝梁書本紀曰帝諱繹字世誠小字七符武帝第七子也天監十三年封湘東王侯景陷建鄴王冲等請為太尉都督中外諸軍事不許又請為司空以主諸侯亦弗聽及簡文帝即位改元大寳帝以簡大制於賊臣卒不遵用簡文帝崩王僧辨等奉表勸進帝不許時巨冦尚存帝木欲即位乃下令斷表明年平景乃即位於江陵在位三年紹泰元年尊為孝元皇帝廟號世祖承聖元年壬申二月玉僧辨衆軍發自尋陽帝馳檄四方購獲景及逆者封萬户開國公絹布五萬疋賦云西楚霸王劍及繁陽謂元帝討景之師也三月僧辨等平景傳首江陵元帝命梟於市三日然後煮而漆之以付武庫賦云剖巢燃穴奔魆走魅埋長狄於駒門斬蚩尤於中冀燃腹為燈飲頭為器四月乙巳益州刺史武陵王紀僣位於蜀年號天正為五月甲申以開府儀同三司江州刺史王僧辨司徒賦云司徒之表裏經綸謂僧辨也刺以陳霸先為佂北大將軍開府儀同三司徐州史齊人賀平侯景和八月武陵王紀率巴蜀之衆東下遣䕶軍陸法屯巴峽以拒之賦云營軍梁溠蒐乗巴渝聖十一月丙子帝即位於江陵改太清六年為承元年賦云中宗之夷凶靖亂大雪寃恥去代邸而承基遷唐郊而纂祀謂元帝也帝即位信轉右衛將軍封武康縣侯加散騎侍郎賦云謬掌衛於中軍時年四十是歳魏廢帝欽元年承聖二年癸酉正月以史部尚書王褒為尚書僕射史五月甲申魏大將尉遲逈進兵逼巴西潼州刺楊乾運以城納逈巳丑武陵王紀軍至西陵七月武陵王紀衆人潰帝命樊猛斬紀賦云荆門遣廪延之戮是也八月戊戌尉遲逈平蜀於僕射王褒等請徙都建鄴帝不從賦云既無謀肉食非所望於論都東九月齊遣郭元建及將邢果逺步陸汙薩方老帥衆頓合肥賦所謂齊交北絶也承聖三年甲戌賦云窮于甲戌謂承聖三年甲戌也内是歳魏廢帝三年春正月始作九命之典以敘外官爵以第一品為九命第九品為一命改流外品為九秩亦以九為上人改置州郡及縣改東雍為華州北雍為宜州南雍為蔡州華州為同州北華為鄜州東秦為隴州南秦為成州北秦為友州東荆為淮州南荆為昌州東夏為延州南夏為長州東梁為金州南梁為隆州北梁為静州陽都為汾州南汾為勲州汾州為丹州南􅃎為寜州南岐為鳯州肉洛為上州南廣為淯州南襄為湖州西凉為甘州西郢為鴻州西益為利州東巴為集州北應為輔州怛州為均州沙州為深州寜州為麓州義州為巖州新州為温州江州為沔州西安為鹽州安州為始州并州為随州肆州為塘州冀州為順州淮州為純州楊州為潁州司州為憲州南平為昇州南郢為歸州青州為眉州凡改州四十六置州一改郡一百六改縣二百三十集中碑誌厯稱諸州故備録於此餘同此例是月魏帝為相安定公所廢而立齊王廓是為恭帝元年魏相安定公即周太祖宇文泰也先使魏使宇大仁恕來聘齊使又至江陵帝接仁恕有闕魏相安定公憾焉七月安定公至原州帝追使請據舊圖以定疆界又連結于齊言辭悖慢泰口古人有言天之所棄誰能與之其蕭繹之謂乎九月乙巳使柱國萬紐于謹來攻賦所謂秦患西起也十月丙寅魏軍至襄陽梁王蕭詧率衆㑹之賦云雖借人之外力實蕭牆之内起又云積天下之一家遭東内之反氣謂蕭詧也十一月丁亥魏軍至柵下是日帝猶賦詩不廢戊申胡僧祐朱買臣等出戰買臣敗繢僧祐中流矢賦云鬼火亂於平林殤魂遊於新市蓋偒中與之臣戰闕而死也辛亥魏軍大攻帝親臨陣督戰軍敗帝見執如梁王蕭詧營甚見詰辱十二月辛未魏人戕帝賦云中興道鎖窮于甲戌即是年也帝崩時年四十七愍懷太子元艮及始安王方畧等皆見害賦云撿亂之主忽焉中興之宗不祀伯兮叔兮冋見戮於猶子言皆為蕭詧所害也地魏人立蕭詧為梁王居冮陵城東資以一州之其㐮陽所統盡歸於周賦云以鶉首而晹秦天何為而此醉為江陵陷汝南王大封尚書左僕射王褒以下並俘以歸長安乃選百姓男女數萬口分為奴婢小弱者皆殺之本傳聘於東魏屬大軍南討遂留長安是江陵未陷之先信已至長安賦云提挈老幼闗河累牟滕土逌序㩦老入闗蒸蒸色養然子山出聘不得老幼並擕明是江陵獻俘之日信本江陵名士特為太祖所知推恩禮送故信老㓜皆在長安又小園賦云薄晚聞老幼相㩦蓬頭王霸之子椎髻梁鴻之妻光江陵䧟信仕西魏拜使持節撫軍將軍右金紫禄大夫大都督尋進車騎大將軍儀同三司時年四十有二敬帝梁書本紀曰帝諱方智字慧相小字法真世祖第九子也承聖三年十一月冮陵陷王僧辨陳霸先以帝為太宰承制奉迎還京師四年七月以帝為皇太子九月即帝位改元泰紹在位三年遜位於陳帝為江隂王薨於外邸時年十六追謚敬皇帝泰紹元年乙亥即承聖四年也三月齊送貞陽侯蕭明來主梁嗣至東闗遣呉興太守裴之横拒之七月僧辨納貞陽侯蕭明入建鄴即偽位年號天成以帝為皇太子司空陳霸先襲殺王僧辨黜蕭明而奉帝焉賦云南陽較書去之已逺上蔡逐獵知之何晚擬連珠云劉琨之英畧典知自免皆傷僧辨也九月丙午帝即位十月巳巳大赦改元壬子加司空陳霸先尚書令都督中外諸軍事震州刺史太平元年丙子九月大赦改元司徒陳霸先進位丞相録尚書事是歳魏恭帝三年春魏依周禮立六官十月乙亥魏相安定公宇文泰薨遺令兄子䕶輔世子覺以為政魏帝詔以岐陽之地封覺為周公十二月庚子禪位即周孝閔帝是也周閔帝踐阼信封臨凊縣子邑五百户除司水下大夫出為𢎞農守賦云譨東海之濱遂餐周粟集中有忝在司水看治渭橋詩王褒集有和庾司水治渭橋詩𢎞農有五張寺冇温湯集中𢎞農郡五張寺碑温􅣚碑皆是時作也時年四十有四太平二年丁丑冬十月辛未帝遜位於陳陳受命奉帝為江隂王改為永定元年賦云有媯之後將育於姜輸我神噐居為讓王又云用無頼之子弟舉江東而全棄謂陳霸先也按建鄴既非梁有信遂無所可歸擬連珠云烏江艤檝知無路可歸白雁抱書定無家可寄雖極思念鄉闗實無歸陳之志矣是嵗周閔帝元年及九月周冡宰宇文䕶殺閔帝而奉明帝又為明帝元年周明帝周書本紀曰帝諱毓小名統萬突火祖長子也大統十四年封寧都郡公孝閔帝踐阼進位柱國岐州刺史及閔帝廢晉公䕶遣使迎帝於岐州九月癸亥即天王位在位四年崩謚曰明廟號世宗二年戊寅明帝即位之二年也故正月乙未以大冢宰晉公䕶為太師是月梁觀寧侯蕭永卒信著思舊銘銘云歲在攝提呈居監徳知是年正月也一作鶉首在是年五月正月丁巳雍州置十二郡又於河東置蒲州河北置虞州𢎞農置陜州正平置絳州宜陽置熊州邵郡置邵州按𢎞農置陜州時信為𢎞農守是其治也尹三月改雍州刺史為雍州牧京兆郡守為京兆以廣業修城二郡置康州葭盧郡置文州庶六月戊子大雨霖詔公卿大夫士爰及牧守黎等各上封事讜言極諫無有所諱城分長安為萬年縣並治京是嵗陳永定二年武成元年巳卯明帝改天王稱皇帝復建年號曰武成機正月已酉太師晉公䕶上表歸政帝始親覽萬軍旅之事䕶猶總馬祀閔帝歌辭云升輿芒刺動入位據闗寒謂晉公䕶也初改都督諸州軍事為總管三月癸巳陳六軍帝親擐甲胄迎太白於東方八月以大將軍安城公憲為益州總管九月憲為齊國公趙大將軍天水公廣為梁州總管輕正平公招為國公招好屬文學庾信體詞多艷為皇弟儉為譙國公達逌為滕國公公天水公廣蔡國公高陽公奚武為鄭國武陽公豆盧寜為楚國公武成二年庚辰正月癸丑朔火㑹羣臣於紫極殿始用百戲焉本傳遷驃騎大將軍開府儀同三司司憲中大夫進爵義城縣侯滕王適序云入為司憲中大夫嘗正旦賦詩云云其王事之中優㳺如此集中有正旦上司憲府詩未詳何年正旦按子山出守𢎞農例必三年報最是歳為麟趾學士得預校書當在入為司憲之後故附録於此北史庾李才傳云武成二年與庾信王褎並為麟趾學士集中有預麟趾殿校書和劉儀同並二月雙白鶴飛集上林園大將鄭偉布弋設置皆禽獲信作鶴讚序稱武成二年春二月天子愍焉信奏亊階墀立使為讚知信時在長安為司憲中大夫時也三月辛酉重陽閣成㑹羣公列將卿大夫及突厥使者於芳林園賜錢帛各有差夏四月帝因食遇毒遂崩集中和宇文内史入重陽閣悼明帝也是歲陳文帝天嘉元年武帝周書本紀曰帝諱邕字禰羅突太祖第四子也母曰吒奴太后大統九年生於同州孝閔踐阼拜大將軍出鎮同州世宗即位進柱國蒲州刺史武成元年封魯公領宗師二年世宗崩遺詔傳位於帝在位七年崩謚曰武廟號髙祖保定元年辛巳正月以大冢宰告國公䕶為都督中外諸軍事令五府總於天官庚成祠圓丘壬子祠方丘甲寅祠盛生帝於南郊乙卯祠太社按後周憲章周禮圓丘宜在冬至方丘宜在夏至南郊祠感生帝宜在正月上辛今並在正月未冾古制時帝即位未久雖行周禮未臻雅正天和元年初造山雲舞以備六代至建徳三年樂成始有可觀隋志後周圓丘及南郊並正月上辛此用庚戌甲寅時武帝初立其制未足憑也於已巳祠太廟班太祖所述六官焉景子大射正武殿賜百官各有差二月于洮陽置洮州歳甲午朝日於東郊三按是年為辛巳馬射賦云在昭陽葢辛年也月三日華林園馬射擬在是年賦無歲支周史不載難以詳攷武帝時惟是年辛巳及天和四年辛卯有兩辛年是年武帝初立正月大射於正武殿是月景寅改八丁兵為十二丁兵時方示武之日華林馬射在是年者為長史或缺文也斗五月景午封皇子贇為魯國公晉公䕶獲五以獻集中有為晉陽公進玉律秤尺升斗表北六月乙酉遣治郤正殷不害等使于陳本傳南通好之時惟放王克殷不害等即是人也廣十一月陳遣使來聘帝是月齊孝昭帝薨弟長王湛代立是為武成保定二年壬午正月丁未以陳主弟頊為柱國送還江南按陳尚書周𢎞正自周還𢎞正以陳天嘉元年往長安迎宣帝明帝之武成二年也天嘉三年自周還武帝之保定二年也集中有别周尚書𢎞正詩又有送周尚書𢎞正二首重别周尚書二首皆是時作夫閏月已丑詔柱國以下帥都督以上母妻授太人夫人郡君縣君各有差集中譙國夫人步陸孤氏以下諸篇稱夫人郡君縣君皆此例矣二月癸丑以久不雨降宥罪人京城三十里内禁酒管梁主蕭詧薨以大將軍蔡國公廣為秦州總國四月已未於伏流城置和州山六月已亥以柱蜀國公尉遲逈為大司馬分南荆州安州襄州江陵為四州總管銘七月晉國公命鑿石闕之谷信著終南山義谷銘序曰周保定二年歳次壬午七月云云射九月陳遣使來聘午十月辛亥帝御大武殿大公卿列將皆㑹戊講武於少陵原分南軍州置恭州集中有從駕觀講武詩招十一月丁卯以大將軍趙國公招為柱國又以為益州總管集中上益州上柱國趙王二首奉報趙王出師在道賜詩和趙王送峽中軍和趙王途中五韻皆是時作保定三年癸未正月辛未改光遷國為遷州壬辰乞銀城置銀州四月乙未以柱國鄭國公逹奚武為太保按公夫人即鄭氏見墓誌子壬戌詔百官及民庶上封事極言得失五月甲朔避正寢不受朝旱故也甲戌雨州七月庚午陳遣使來聘封九月巳丑初令世襲郡縣者改為五等爵州伯郡封子縣封男州十月乙巳以開府杞國公亮為梁總管庚戌陳遣使來聘保定四年甲申五月丁亥改禮部為司宗大司禮為禮部大司樂為樂部按信後為司宗中大夫之職司宗大夫即古宗伯禮官後周依周禮建六官故改禮部為司宗矣六月庚寅改御伯為納言八月丁亥以柱國齊公憲為雍州牧下九月若干鳳為徐國公集中有侍從徐國公殿軍行陳遣使來聘閏月巳亥以大將軍長孫儉為柱國即十月癸亥大將軍陸通蔡國公廣並為柱國通譙國夫人步陸氏之父也大甲子詔大將軍大冢宰晉國公䕶率軍伐齊總軍出潼闗賀婁公碑文云大冡宰任總機衡是勤王畧是也柱十一月甲午柱國蜀國公尉遲逈率師圍洛陽國齊國公憲營於邙山晉公䕶次於陜州齊王憲碑文云保定四年與大司馬蜀國公圍金墉城師臨洛浦則廣武營奔兵上邙山則河橋路斷是也十二月壬戌齊師渡河晨至洛陽諸軍驚散至夜引還賀婁公碑文云中途甚雨未獲圍原軍師聞喪不成侵宋亦言是戰無功矣保定五年乙酉正月庚子令荆州安州江陵等總管並𨽻襄州總管府以柱國大司空衛國公直為襄州總管二月詔陳國公純等如突厥逆女辛威碑文云被使領命出西凉州奉迎突厥皇后又宇文廣墓誌云奉詔向甘州迎皇后即其事也成三月戊子柱國楚國公豆盧寧薨四月齊武禪位於其太子緯自稱太上皇帝婢六月辛未詔曰江陵人年六十五以上為官奴者已令放免其公私奴婢有年至七十以外者所在官司宜贖為庶人柱十月辛亥改函谷關城為通洛防是月庚申國楚國公岐州刺史慕容寜葬信著碑文石十一月丁未陳遣使來聘周冠軍公夫人烏蘭氏以是年葬信作墓誌天和元年丙戌正月辛巳露寢成幸之令羣臣賦古詩京邑耆老並預㑹焉頒賜各有差癸未大赦改元百官普加四級為丁未於宕昌置宕州師以柱國昌寜公長孫儉陜州總管遣小載杜果使於陳二月戊申以開府中山公訓為蒲州總管集中就蒲州使君乞酒蒲州刺史中山公許乞酒一車未送即是人也碑二月六日周隴右總管長史豆盧永恩葬信著文三月景午祠南郊四月陳文帝葬子伯宗嗣立是為天康元年渾五月庚辰帝御正武殿集羣臣親講禮記吐谷龍潤王莫昌率户内附以其地為扶州月六月景午以大將軍抱罕公辛威為柱國九乙亥信州蠻冉令賢向五子王反詔開府陸騰討平之樂十月甲子初造山雲儛以備六代之天和二年丁亥正月丁亥初立郊丘壇壝制度其制注詳第六巻歌辭四月乙已省東南諸州以潁州歸州溳州均州入唐州油州入純州鴻州入淮州洞州入湖州睢州入襄州憲州入昌州六月辛亥尊所生母叱奴氏為皇太后戊寅陳湘州刺史華皎率衆來附遣襄州總管衛國公直等將兵援之因而南伐集中有送衛王南征詩公壬辰以大將軍譙國公儉為柱國九月衛國直等與陳將淳于量吳明徹戰於沌口王師失利元定以步騎數千先渡遂投江南是歲陳廢帝光大元年天和三年戊子正月辛丑祠南郊按南郊用正月上辛此時始正所謂夏正郊夭祀感精帝靈威仰之神也後周以始祖獻侯莫那配之如古后稷配天之義禘其祖之所自出以其祖配之者也注詳第六巻歌辭三月癸卯皇后阿史那氏至自突厥周甲寅以蔡國公廣為陜州總管是月二十日太傅鄭國公夫人鄭氏薨於某月葬信作墓誌太四月辛巳齊國公憲為大司馬五月庚戌祠廟八月齊請和親遣使來聘詔軍司馬陸逗兵部尹公正報聘焉步陸碑云齊國通和封人受使以公有出境之才見命張􅎶之禮是其事也禮癸酉帝御大徳殿集百寮及沙門道士等親講記十月癸亥祠太廟足十一月陳安成王頊廢其主伯宗而自立為宣帝十二月齊武成帝薨天和四年己丑正月辛卯遣司㑹河陽公李綸等㑹葬於濟仍弔賻焉集中有司㑹河陽公新造山池寓日詩河陽公即綸也薨二月八日周大都督楊林伯長孫暇夫人羅氏以某年葬信作墓誌二月癸亥以柱國昌寜公長孫儉為州總管老戊辰帝御大徳殿集百寮道士沙門等討論釋義集中有奉和闡𢎞二教應詔詩人三月二十日後魏驃騎將軍荆州刺史賀抜夫元氏塟信作墓誌四月齊遣使來聘二十七日信代陜西總管作移齊河陽執事文五月已丑帝制象經成集百寮講說集中有象戲賦進象經賦表城六月築原州及涇州東城八月庚辰盗殺孔防主以其地入齊徳九月辛卯遣柱國齊國公憲辛衆於宜陽築崇等城十一月十日復作移齊河陽執事文是月辛亥柱國昌寜公長孫儉薨以某年葬信作碑文是嵗陳宣帝太建元年天和五年庚寅七月以柱國譙國公儉為益州總管墓十月周驃騎大將軍開府侯莫陳道生葬信作誌銘十一月五日周柱國大將軍大都督冋州刺史爾錦永葬有碑文是月梁故郢州刺史周大將軍義興公蕭世怡葬信作墓誌銘月十二月平越巂置西寧州是冬濟將斛作明冦邉於汾北築城自華谷至于龍門天和六年辛卯正月詔柱國齊國公憲率師禦斛律明月律田𢎞為柱國三月齊國公憲自龍門渡河斛明月退保華谷憲攻抜其新築五城門甲午大將軍杞國公亮為秦州總管庚子鴈公田𢎞率師取齊宜陽等九城即太安公閻慶南陽公叱羅恊等並為柱國按廢集中抗表致仕者也恊即長孫夫人羅氏之父為五月景辰中山公訓為柱國按訓晉公䕶世子蒲州刺史至建徳元年從蒲州徴赴京師子山就蒲州使君乞酒許乞酒一車未送者也六月周大將軍趙公宇文廣葬信著墓誌銘人八月癸酉省掖庭郡樂後官羅綺工人五百餘十月十日隴東公侯莫陳君夫人竇氏葬信作墓誌銘誌十一月六日周大將軍襄城公鄭偉葬信作墓銘是月十六日周安昌公夫人鄭氏葬信作墓誌某又大將軍聞嘉公柳遐葬信作墓誌銘稱天和年附録於此是年齊王憲伐齊信同盧愷並從軍行有同盧記室從軍詩建徳元年壬辰春正月帝幸𤣥都觀親御法座講說公卿道俗論難事畢還宫集中有奉和法筵應詔詩二月趙國公夫人紇豆陵氏葬信作墓誌誌稱天和七年三月景辰誅大冢宰晉國公䕶癸亥以太傅蜀國公尉遲逈為太師松滋公夫人尉遲氏墓誌云父太師柱國公是也柱國鄧國公竇熾為太傅按熾為趙國夫人紇竇陵氏之父見墓誌王齊國公憲為大冢宰碑文云建徳元年進爵為仍拜大冢宰是也為柱國枹罕公辛威為大司冦碑文作天和元年異四月甲戌以滕國公逌為柱國詔荆州安州江陵等總管停𨽻襄州公庚寅追尊畧陽公為孝閔皇帝癸巳立魯國贇為皇太子卿五月壬戌帝以大䍐集百官於庭詔求直言公各引咎自責其夜澍雨八月十二周大將軍司馬裔葬信著碑文又作墓誌銘民十月庚午詔冮陵所獲俘虜充官口者悉免為十一月二十二日譙國夫人步陸孤氏葬信作墓誌建德二年癸巳春正月辛丑祠南郊年乙巳以柱國鴈門公田𢎞為大司空碑文作元大將軍徐國公若干鳯為柱國集中侍從徐國公殿下軍行即若干鳯也乙卯祠太廟是月周柱國大將軍大都督同州刺史爾綿永夫人赫連氏合葬信著碑文騎閏月已巳陳遣使來聘二月二十三日周車大將軍贈小司空宇文顯葬信作墓誌銘等是月省雍州内八郡併入京兆馮翊扶風咸陽郡三月癸巳省六府諸司中大夫以下官府置四司以下大夫為之官長上士貳之夏四月巳亥祠太廟葬五月十一日周太子少保陸逞薨以明年正月信步步陸碑文六月庚子省六府員外諸官皆為丞申秋七月已巳祠太廟自春末不雨至於是月壬集百寮於大徳殿帝責罪己問以治政得失戊子雨來九月乙丑陳遣使來聘御冬十月癸卯齊遣使聘甲辰六代樂成帝崇信殿集百官以觀之按天和元年冬十月甲子初建山雲儛以備六代之樂至是乃成武帝造山雲儛其辭多出于子山之手集中郊廟燕社歌是也其圓丘方澤五帝歌辭采入隋志冬陳拔夀陽斬王琳按王琳不受陳命實梁室之忠臣軍敗為呉明徹所殺子山嘗寄詩云獨下千行淚聞君萬里書其見重如此有周大將軍閻慶以是年抗表致仕集中為閻大將軍乞致仕表建徳三年甲午正月壬戌冊柱國齊國公憲衛國公直趙國公招譙國公儉滕國公逌並進爵為王巳巳祠太廟一三月癸酉皇太后叱奴氏崩帝居倚廬朝夕共米羣臣表請累旬乃止詔皇太子贇總釐庶政所五月庚申葬文宣皇后於永固陵帝徒跣至陵辛酉詔行三年之喪縗麻之節苫廬之禮率遵前典以申㒺極公卿上表固請俯就權制過葬即吉帝不許引古禮答之羣臣乃止於是遂申三年之制五服之内亦令依禮按復周憲章周禮復行三年之喪其制最為盡善叱奴氏有廟集中有獻文宣皇太后歌辭詩十月景申御正楊尚希禮部盧愷使於陳愷即集盧記室也戊辰雍州獻蒼鳥集中有齊王進蒼烏表時齊王為雍州牧矣是月十五日周儀同松滋公夫人尉遲氏葬信作墓誌庸十一月戊午以柱國大司空上公陸騰為涇州總管建德四年乙未正月戊辰以柱國枹罕公辛威為寜州總管碑文云授寜州總管都督七州諸軍事即為河州大中正三二月二十四日周大將軍崔說葬信著碑文月景辰遣小司冦淮南公元倬等使於齊按是秋高祖親戎東討偉遂為齊人所執至六年齊平偉方見釋集中有贈司㓂淮南公詩和淮南公聽琴聞弦斷淮南公即元偉也大甲戌以柱國趙王招為雍州牧是月周車騎將軍張慈葬信著賀婁公碑文碑四月二十五日周柱國大將軍紇于𢎞葬信著文紇干𢎞即田𢎞也七月下詔伐齊趙王招為後三軍總管答趙王啓云張幕全韓連營上地是也時趙王為雍州收濟王憲率衆二萬趣黎陽拔壬午上親率六軍衆六萬直指河隂八月丁未之進攻子城未充上有疾還降拔三十餘城皆棄而不守作是月周驃騎大將軍冠軍伯柴烈李夫人葬信墓誌閏十月以柱國齊王憲為上柱國通信時為洛州刺史為政清淨夷人安之時陳氏好南北流寓之士各許還其舊國陳氏乃請王褒及信等十數人高祖惟放王克殷不害等信及褒並留而不還按南史殷不害傳太建七年自周還陳是歲陳太建七年陳氏請褒及信周朝惜而不遣即是年也時年六十有四建德五年丙申二月辛酉遣皇太子斌巡撫西土仍討吐谷渾戎事節度並宜隨禨専决三月壬寅至自同州文宣皇后服再朞戊申祥集中移虜留使文入境以來國祥甫邇按武帝服三月祥二月太子巡撫西土知虜謂吐谷渾渾王遣使入境以來國祥甫邇也六月辛亥祠太廟九月已酉帝總戎癸亥帝至晉州遣齊王憲率精騎二萬守雀鼠谷齊王碑文云又加王精兵六萬長圍晉州自爾即為前鋒横行入鄴是也而齊衆潰遂克晉州齊主留安徳王延宗守晉陽奔鄴延宗自稱帝遂攻拔之建德六年丁酉正月乙亥齊王傳位於其太子恒改元承光自號為太上皇壬辰帝至鄴齊王先於城外掘塹豎柵癸已帝率諸軍圍之齊人拒守諸軍奮擊大破之遂平鄴集中有奉和平鄴應詔詩賀平鄴都表表云蒞政東藩不獲躬到闗庭遣主簿陪臣曹敏奉表以聞是信時為洛州刺史在洛州為長安之東故云東藩某是月遣吐谷渾使信作移虜留使文按移文云入境以來國祥甫邇自秋迄冬未申􅅃接又云時當獻嵗惟新三元告慶陽和既動澤漸萬邦便當遣使相隨永敷隣睦故移知渾王遣使在建徳五年二月留至是年正月發遣歸國故作移文也六月癸亥於河州雞鳴防置旭州甘松防置芳州廣州防置𢎞州望七月景戌行幸洛州巳丑詔山東諸州舉有才者赴行在所共論政事得失信時為洛州刺史有奉報寄洛州詩憲尋㣲為司宗中大夫十一月稽胡反遣齊王率軍討平之齊王碑文亦序其事免詔自永熙已來冮陵良人沒為奴婢者並宜放所在附籍一同民伍宣政元年戊戌正月壬午行幸鄴宫分湘州廣平郡置洺州清河郡置貝州黎陽郡置黎州汲郡置衛州分定州常山郡置怛州分并州上黨郡置路州辛卯行幸懷州癸巳幸洛州詔於懐州置宫三月戊午於蒲州置宫廢同州及長春二宫大將軍王軏破陳師於吕梁擒其將呉明徹等俘斬三萬餘人明徹誌銘亦稱其事周封徹為懐徳郡公云六月丁酉帝崩甲于誅上柱國齊王憲碑文二十八日齊王憲薨宣帝周書本紀曰帝諱贇字乾伯高祖長子也建徳元年立為皇太子宣政元年六月高祖崩即皇帝位在位二年傳位於太子衍自稱為天元皇帝大象二年崩謚曰宣葬定陵大象元年巳亥按滕王逌序歳在屠維龍居淵獻春秋六十有七知是年已亥子山年六十七也正月癸巳改元大成子癸卯封皇子衍為魯王戊午立魯王衍為皇太二月辛巳傳位於皇太子衍改大成元年為大象元年帝於是自稱天元皇帝所居稱天臺冕有二十四旒車服旗鼓皆以二十四為節皇帝衍稱正陽宫集中有賀傳位於皇太子表為四月乙巳祠太廟五月辛亥以洺州㐮國郡趙國以荆州新野郡為滕國令趙王招滕王逌等並之國按滕王以是年撰庾開府集二十巻在新野製序寄至長安子山作啓謝之遥寄於彼故云至鄴可期從梁有日又云魚腸尺素鴈足數行書此謝辭終知不盡皆遥寄之文也是年信以疾去職大象二年庚子四月已已祠太廟悉巳卯詔死罪並降從流流罪從徒五嵗刑已下皆原宥壬午幸中山祈雨至咸陽宫雨降按集中有喜晴應詔詩同顔大夫初晴和趙王喜雨和李司錄喜雨諸篇自明帝二年保定三年建德元年二年並冇祈雨喜雨之事子山諸詩以英華類聚一處未詳何年所作故備録焉追五月乙未宣帝寢疾詔隋國公楊堅入侍丁未趙陳越代滕五王入朝巳酉帝崩矯制以隋國公堅受遺輔政七月丁未隋公楊堅為都督内外諸軍亊趙王招以謀執政被誅是月二十八日陳將呉明徹卒於長安至八月十九日寄葬京兆信作墓誌八月丁卯封上柱國抱罕公辛威為宿國公移相州於安陽分相州陽平郡置毛州昌黎郡置魏州九月辛丑分潼州管内新遂普合及盧州管内瀘戎六州並𨽻信州總管府於壬子陏公楊堅為大丞相尋加大冢宰五府總天官姓十一月十日周兖州刺史廣饒公鄭常葬常賜宇文集中有宇文公神道碑又著鄭常墓誌銘十十二月甲子大丞相隋國公楊堅進爵為王以郡為國丁未滕王逌以謀執政被誅靜帝周書本紀曰帝諱衍後改為闡宣帝長子也大象元年正月封魯王立為皇太子二月宣帝於鄴宮傳位授命居正陽公二年宣帝崩帝入居天臺廢正陽宫大定元年二月禪位於隋五月壬申崩謚曰静葬恭陵大定元年辛丑隋開皇元年正月壬午改大象三年為大定元年禮二月庚申隋王楊堅為相國總百揆偵九錫之甲子隋王楊堅稱尊號改為開皇元年按北史隋開皇元年庾信卒滕王序已亥為六十七歳知子山卒時年六十九歲也又按辛咸碑文開皇元年七月某日反葬河州碑銘猶出信手子山之歿當在秋冬矣璠按庾子山以梁武帝天監十二年癸巳某月日生大通元年丁未十有五歲侍梁東宫講讀起家湘東王國常侍轉安南府叅軍中大通三年辛亥年十九歲晉安王為皇太子與父肩吾及東海徐摛摛子陵並為抄撰學士宫中號徐庾體大同六年壬戌三十歲為郢州別駕時安城郡人劉敬躬反信與湘東王論中流水戰事深為武帝所賞遂擒敬躬斬之都市大同十一年乙丑三十三嵗為通直散騎常侍與徐君房聘于東魏中大同元年丙寅三十四歲為東宫學士領建康令太清二年戊辰年三十有六遇侯景之亂簡文帝命以本官率宫中文武千人營朱雀航北景至以衆先退遂爾西奔至大寳三年辛未三十九歲夏四月途遇侯景襲郢之兵濳跡江夏景退至郢州時刺史蕭韶昔爲幼童與信有斷袖之歡信至接信甚薄是年秋奔江陵元帝承制除御史中丞遂遭父喪時年四十承聖元年壬申四十一歲轉右衞將軍襲爵武康縣侯加散騎常侍承聖三年甲戌四十二歲聘于西魏屬大軍南討遂留長安是年魏師來伐岳陽王率衆㑹之江陵陷魏人戕帝立蕭詧為梁王都江陵獻俘長安信為魏相安定公所知其老幼入闗特䝉禮送由是烝烝色養矣即以是年仕魏拜持節撫軍將軍右金紫光禄大夫都督尋進車騎大將軍儀同三司敬帝太平元年魏恭帝之三年也魏禪周二年梁亦禪陳於是陳氏王江表矣周孝閔帝踐阼時年四十有五封臨清縣子邑五百户除司水下大夫出為𢎞農守遷驃騎大將軍開府儀同三司司憲中大夫進爵義城縣侯周閔帝即位明帝立帝好文學深加優禮武成二年四十七歲與王褒庾季才等並為麟趾學士得預校書俄拜洛州刺史明帝崩武帝立亦復好之如眀帝焉建德四年陳之太監七年也南北通好陳氏乃請王褒及信十數人髙祖惟放王克殷不害等信及褒並惜而不遣時年已六十四矣建德六年猶治洛州尋徵為司宗中大夫宣帝大象元年已亥六十七歲以疾去職是年滕王逌撰集二十巻靜帝大定元年即隋開皇元年辛丑六十有九卒自梁武帝天監十二年至隋開皇元年凡六十九年謹纂年譜四十五歲敬帝太平二年以上梁未亡時皆取南朝舊朔每年附録東西二魏及岳陽西附江陵立故主之仇陳氏南遷建鄴蹈讓王之轍子山既餐周粟此二十三年用後周年號末附梁陳二主猶魏志也信仕周位望通顯凡厯二十八年以夀終信事母以孝聞惟丁母憂未詳何年其孝情毁至曾為晉公所嘆當在獲誅之前建德以上事也餘備列年譜南北二史凡于子山集中有相發明者亦兼及之昔漢有二帝魏稱三祖求之異代且曰才難信在江南則有梁武帝二子簡文元帝及過江北則有周太祖二子世宗高祖並新情艷發雅辭雲委又得滕趙諸王周旋款至皆一時之俊君臣酬唱之際文人遇合可謂至矣庾子山集巻首上
