body:
  text: 庾子山集巻八周庾信撰錢唐倪璠纂註啓謝滕王集序啓周書云滕王逌字爾固突文帝子也逌製庾信集序作啓謝之信啓伏覽制垂賜集序始皇本紀皇命為制此於王稱制矣紫微懸映如傳闕里之書春秋合誠圖曰北極星五在紫㣲中紫㣲大帝室太乙之精也括地志云兗州曲阜縣魯城西南三里有闕里中有孔子宅宅中有廟孝經援神契曰孔子制作孝經向北辰而拜青鳥遥飛似送層城之璧山海經曰三危之山三青鳥居之又云蛇巫之山一曰龜山西王母綈几而戴勝杖其南有三青鳥為西王母取食在崑崙虛北淮南子云崑崙山上有層城九重楚辭曰崑崙縣圃其尻安在增城九重其髙幾里王子年拾遺記曰崑崙山上有九層旁有瑶臺十二各廣千步皆五色玉為臺基若夫甘泉宮裏玉樹一叢揚雄甘泉賦曰翠玉樹之青蔥兮璧馬犀之瞵㻞李善注云漢武故事曰上起神屋前庭植玉樹珊瑚為枝碧玉為葉𤣥武闕前明珠六寸北方𤣥武𤣥武闕前謂北闕也列仙傳曰朱仲常於會稽市上販珠髙后時下書募三寸珠仲讀購書笑曰直値汝矣齎三寸珠詣闕即賜五百金魯元公主復私以七百金從仲求珠仲獻四寸珠於闕即去不得譬此光芒方斯燭照言逌之文章光芒燭照雖珠玉不能比也有節有度即是能平八風愈唱愈髙殆欲去天三尺左傳曰夫舞所以節八音而行八風殿下雄才葢代逸氣横雲濟北顔淵關西孔子濟北先賢傳曰戴宏字元襄剛縣人為郡督郵府君欲撻之宏曰今鄙郡推仰公咸以為仲尼君國以宏為顔囘豈聞仲尼有撻顔囘之義後漢書楊震傳曰關西孔子楊伯起譬其毫翰則風雨爭飛論其文采則魚龍百變蒲桃繞館新開碣石之宮上林賦曰櫻桃蒲陶郭璞注云蒲陶似燕薁可作酒也史記孟軻傳曰騶衍如燕昭王築碣石宮身親往師之正義曰碣石宮在幽州薊縣西三十里寧臺之東修竹夾池始作睢陽之苑史記曰梁孝王築東苑方三百餘里廣睢陽城七十里大治宮室為複道自宮連屬於平臺三十餘里索隠曰如淳云在梁東北離宮所在也今城東二十里臨新河有故臺址俗云平臺又一名修竹苑琉璃泛酒鸚鵡承杯張隠文士傳曰潘尼與同僚飲主人有琉璃椀使客賦之尼於座上立成鮑照淮南王詩云瑠璃作盌牙作盤南州異物志曰鸚鵡螺狀如覆杯頭似烏頭向其腹視似鸚鵡故名郭璞江賦云鸚螺蜁蝸又嶺表録異云鸚鵡螺旋尖處屈而朱如鸚鵡嘴故以名殻裝為酒杯竒而可玩亦有範金為形者梁簡文書曰車渠屢酌鸚鵡驟傾鳳穴歌聲鸞林舞曲山海經曰爰有歌舞之鳥鸞鳥自歌鳳鳥自舞况復行雲逐雨廻雪隨風髙唐賦云旦為朝雲暮為行雨洛神賦云飄颻兮若流風之廻雪湖陽之尉既成為喜之因舂陵之侯便是銷憂之地言以荆州新野封逌本漢之南陽也周書滕王傳云宣政元年伐陳詔逌為元帥節度諸軍事大象元年五月詔以荆州新野郡邑萬户為勝逌出就國後漢書曰光武殺湖陽尉軍中分財物不均衆恚恨欲反攻諸劉光武斂宗人所得物悉以與之衆乃悦注云湖陽屬南陽郡今唐州縣也袁宏後漢紀曰孝景帝生長沙定王發武帝世諸侯得分封子弟以冷道縣舂陵封發中子買為舂陵節侯元帝時節侯之孫孝侯以南方卑濕請徙南陽於是以蔡陽白水鄉為舂陵侯封邑而與昆弟鉅鹿君及宗親俱徙焉按郡國志新野舂陵湖陽俱屬南陽郡言逌伐陳若光武殺湖陽尉分財與人衆皆悦是既成為喜之因也及封荆州新野萬户使出就國又若舂陵孝侯請徙南陽是為銷憂之地也某本乏材用無多作述加以建鄴陽九劣免儒硎江陵百六幾從士壠滕王庾信集序云昔陽都有集十四巻値太清罹亂百不一存及到江陵又有三巻即遭軍火一字無遺建鄴陽九謂武帝太清三年侯景之亂也江陵百六謂元帝承聖三年敗於魏軍也漢書律厯志云易九戹曰初入元百六陽九孟康曰易傳也所謂陽九之戹百六之會者也初入元百六歲有戹者則前元之餘氣也若餘分為閏也後漢衛宏古今竒字序曰秦始皇改古文為篆𨽻國人多謗乃召諸生至者皆拜為郎凡七百人宻令冬月種瓜於驪山硎谷中溫處瓜實使往視之先為伏機諸生方相論辨發機填之以土皆終命戰國䇿顔觸曰生王之頭曾不若死士之壟也至如殘編落簡並入塵埃赤軸青箱多從灰燼子山自謂太清江陵之亂已之文集皆一字無遺也比年疴恙彌留光隂視息桑榆已廹蒲栁方衰淮南子曰日垂影在樹端謂之桑榆袁宏後漢紀光武詔曰失之東隅收之桑榆爾雅曰楊蒲栁郭璞注云可以為箭左傳所謂董澤之蒲疏云楊一名蒲栁生澤中可以為箭世説云顧悦曰蒲栁之姿望秋先零松柏之質經霜猶茂不無秋氣之悲實有途窮之恨宋玉曰悲哉秋之為氣也晉書曰阮籍時率意獨駕不由徑路車轍所窮輒慟哭而反是以精采瞀亂頗同宋玉瞀莫遘切瞀亂迷惑也宋玉神女賦云目畧㣲眄精采相授楚辭曰中瞀亂兮迷惑言辭蹇吃更甚揚雄漢書揚雄為人簡易蕩佚口吃不能劇談一吟一咏其可知矣言已目昏口吃吟咏之不足觀可知好事者不求知音者不用漢書揚雄傳贊曰時有好事者載酒肴從遊學韓詩外傳曰夫參天下賢人也其習知音矣非有班超之志遂已棄筆後漢書曰班超與母隨至洛陽家貧嘗為官傭書以供養久勞苦嘗輟業投筆嘆曰大丈夫無他志猶當效傅介子張騫立功異域以取封侯安能久事筆硯間乎左右皆笑之超曰小子安知壯士志哉未見陸機之文久同燒硯晉書陸機傳云弟雲嘗與書曰君苖見兄文輒欲燒其筆硯至於凋零之後殘缺所餘又已雜用補袍隨時覆醬按後漢書羊續舉縕袍以示之疑是用紙作絮補袍漢書曰揚雄作太𤣥法言劉歆亦嘗觀之謂雄曰空自苦今學者有禄利然尚不能明易又如𤣥何吾恐後人用覆醬瓿也雄笑而不應注曰瓿音蔀小甖也聖慈憐愍遂垂存録始知揄揚過差君子失辭比擬縱橫小人迷惑君子謂滕王小人子山自謂也荆玉抵鵲正恐輕用重寳韓子曰卞和抱其璞哭於荆山之下鹽鐵論曰崑山之旁以玉璞抵烏鵲龍淵削玉豈不徒勞神慮後漢書曰肅宗嘗賜諸尚書劒惟韓稜郅夀陳忠特以寳劒自手署其名曰韓稜楚龍淵晉太康記曰汝南西平縣有龍淵水可淬刀劒特堅利古龍淵之劒取於此矣孔叢子曰周穆王大征西戎西戎獻錕鋙之劒用之切玉如泥焉荆玉龍淵皆喻滕王之文也匠石廻顧朽材變於雕梁莊子曰匠石之齊至乎曲轅見櫟社樹其大蔽牛絜之百圍其髙臨山十仞而後有枝其可以為舟者旁十數觀者如市匠石不顧遂行不輟弟子厭觀之走及匠石曰自吾執斧斤以隨夫子未嘗見材如此其美也先生不肯視行不輟何耶曰巳矣勿言之矣散木也以為舟則沉以為棺則速朽以為器則速毀以為門户則液樠以為柱則蠧是不材之木也無所可用故能若是之夀孫陽一言奔踶成於駿馬孫陽伯樂秦穆公時善相馬者也桓寛鹽鐵論曰騏驥負鹽車垂頭於太行之坂見伯樂則噴而長鳴漢武帝詔云馬或奔踶而致千里匠石孫陽喻滕王也朽材奔踶子山自喻也故知假人延譽重於連城借人羽毛榮於尺玉言已之文集藉王作序而重也西京賦曰所好生羽毛溟池九萬里無踰此澤之深莊子曰㝠海者天池有魚焉其名曰鯤有鳥焉其名曰鵬摶扶揺羊角而上者九萬里華山五千仞終愧斯恩之重括地志云華山在華州華隂縣南八里古文以為敦物也山海經太華之山削成而四方其髙五千仞其廣十里包咸論語注云七尺曰仞即日金門細管未動春灰後漢書郡國志曰𢎞農郡宜陽有金門山出竹為律管司馬彪續漢書曰候氣之法為室三重户閉塗釁必周宻布緹縵室中以木為按毎律各一庳外髙從其方位加律上以葭灰抑其内端按律而候之氣至者灰去其氣所動者其灰散人及風所動者其灰聚石壁輕雷尚藏冬蟄左氏傳曰閉蟄而烝又云火伏而後蟄者畢正義曰十月始蟄至十一月則遂閉之王制云昆蟲未蟄不以火田鄭注云昆明也昆蟲者得陽而生得隂而藏隂陽即寒溫也伏願聖躬與時納豫南陽寳雉幸足觀瞻史記封禪書曰野雉夜雊以一牢祠命曰陳寳臣瓚曰陳倉縣有寳夫人或一歲二歲與葉君合葉君來時天為之殷殷雷鳴索隠曰葉縣名在南陽葉君即雄雉之神故時與寳夫人合也酈縣菊泉差能延夀郡國志曰南陽縣有酈侯國注云盛宏之荆州記曰縣北八里有菊水其源悉芳菊水極甘馨又中有三十家不復穿井即飲此水上夀百二十中夀百餘七十者猶以為天司空王暢太傅袁隗為南陽令縣月送三十餘石飲食澡浴悉用之太尉胡廣父患風羸南陽恒汲引此水疾遂瘳此菊莖短葩大食之甘美異於餘菊廣又收其實種之京師遂處處傳植之按滕王本傳詔以荆州新野郡邑萬户為滕逌出就國荆州新野古南陽地也伏遲至鄴可期從梁有日至鄴喻滕王若魏太子陳思王已如吳質等也從梁喻滕王若漢梁孝王已如司馬相如枚乗等也同杞子之盟會必欲瞻仰風塵左傳桓十年公㑹杞侯莒子盟於曲池共薛侯而來朝謹當逢迎冠葢左傳隠十一年云滕侯薛侯來朝爭長薛侯曰我先封滕侯曰我周之卜正也世族譜云薛任姓黃帝之苖裔奚仲封為薛侯今魯國薛縣是也又按逌以大象元年出就新野二年朝京其冬為隋文帝所害是序當在新野時所作言來朝之日冀與王相接也滕逌本後周宗室如古滕侯故云並薛侯而來朝也魚腸尺素鳳足數行書此謝辭終知不盡古詩云客從遠方來遺我雙鯉魚呼兒烹鯉魚中有尺素書鳳足疑作㕍足轉寫之誤也漢書常惠勅漢使者謂單于言天子射上林中得㕍足有繫帛書言武等在某澤中言作此謝啓從長安遥寄新野不盡所懐也謹啓答趙王啓答趙王招也仰承張幕全韓連營上地周書趙王招傳云建徳三年除雍州牧大軍東討招為後三軍總管全韓謂宜陽故韓國城上地謂綏州澠池置陣解鄧禹之圍袁宏後漢紀曰建武三年拜馮異征西大將軍鄧禹既被徴與車騎將軍鄧𢎞還至華隂欲進兵撃赤眉馮異曰赤眉衆多可以恩信傾難以兵力破也上令諸將屯澠池要其東異相連綴撃其西上自待其㑹可一舉取之萬全之計也禹𢎞自以西征又被徴當還欲一戰決之遂戰移日禹軍大敗馮異將兵救之不勝棄軍走與麾下數人歸營又收散卒堅壁㑹赤眉饑困乃謀撃之大破之降者八萬餘人十餘萬東走宜陽璽書勞異曰垂翅回谿奮翼澠池失之東隅收之桑榆是也函谷開關削王元之印後漢書曰隗囂將王元説囂曰按秦舊迹表裏山河元請以一丸泥東封函谷關此萬世一時之利也蜂旗朝上刁斗夜鳴王子年拾遺記曰周武王東伐紂夜濟河時雲明如畫八百之族皆齊而歌有大蜂狀如丹鳥集王舟因以鳥畫其旗翼日而梟紂名其船曰蜂舟魯哀公二年鄭人撃趙簡子得其蜂旗則其類也漢書曰李廣行無部曲不撃刁斗以自衞孟康曰以銅作燋受一升晝炊飯食夜擊持行彌雄壯士之心足起橫行之志言趙王鎮雍伐齊行軍之盛也况復才人出娉還得賢夫古詩有邯鄲故才人嫁為厮養婦趙王武臣事注見哀江南賦言今昔趙王同符合契矣塞外有夫人之城軍中有女子之氣漢書曰漢軍絶勝追北至范夫人城又曰李陵與單于戰陵曰土地衰而鼓不起者何也軍中豈有女子乎又報趙王詩亦引其事彼云趙王鎮益州與夫人紇豆陵同行及軍中卒婦此云為雍州牧屬大軍東討鎮兵將卒皆有妻婦也都尉青旗即時春色都尉官名漢書張宴注曰主諸官故曰都有卒徒武事故曰尉月令於春月云載青旗是青為春色也又按漢書百官公卿表護軍都尉武帝四年屬大司馬此言趙王出師載青旗與春同色也將軍大樹已復花開後漢書曰馮異為人謙退不伐諸將論功異獨屏樹下軍中號大樹將軍雲氣浮壘流星泛枕細舞長歌橫簫直笛當乎此時青雲之上列子曰蒲且子連雙鶬於青雲之上信不學無術本分泥沈忽逢天造捜揚仄陋漢書曰霍光不學無術易曰天造草昧書曰明揚側陋今者遂總憲司預聞刋鼎本傳云信為司憲中大夫言已為司憲中大夫聞趙王勒功鐘鼎也獻歲刑書既應懸法周禮司冦之職云正月之吉始和布刑於邦國都鄙乃懸刑象之法於象魏使萬民觀刑象挾日而斂之上春木鐸方須徇人論語孔注云木鐸施政教時所振也正義曰禮有金鐸木鐸鐸是鈴也其體以金為之明舌有金木之異木鐸是木舌也周禮云教鼓人以金鐸通鼓大司馬教振旅兩司馬執鐸明堂位云振木鐸於庭是武事振金鐸文事振木鐸也但年髮已秋性靈久竭嘉石肺石無以測量周禮曰大司冦以嘉石平罷民肺石達窮民朝士左嘉石右肺石鄭注云嘉石文石也肺石赤石也舌端筆端惟知繁擁韓詩傳云辯士舌端文士筆端乖展一月遂涉兩年傾首東瞻山河千里風塵未盡霜露霑衣仰願珍宜以為身寳謝趙王示新詩啓周書列傳云趙王招學庾信體辭多輕豔某啓鄭叡至奉手教累紙幷示新詩八體六文足驚毫翰衛恒四體書勢曰自秦壊古文有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰𨽻書王莽使司空甄豐校文字部改定古文復有六書一曰古文二曰竒字三曰篆書四曰佐書即𨽻書也五曰繆篆六曰鳥書文賦云或含毫而邈然善云毫謂筆毫也王逸楚辭注曰鋭毛為毫漢書音義韋昭曰翰筆也四始六義實動性靈詩序云是謂四始詩之至也箋云始者王道興衰之所由正義曰四始者鄭答張逸云風也小雅也大雅也頌也詩序又云故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌落落詞髙飄飄意遠文異水而湧泉筆非秋而垂露藏之山巖可使雲霧鬱起濟之江浦必當蛟龍繞船首夏清和聖躬怡裕琉璃彤管鵲顧鸞廻左氏傳曰靜女之三章取彤管焉杜注云彤管赤管筆也庾肩吾書品序曰波囘墮鏡之鸞楷顧雕陵之鵲並以篆籀重復見重昔時言趙王善書也婉轉緑沈猿驚雁落梁簡文詩云吳戈夏服箭驥馬緑沈舟知緑沈言弓也猿驚楚養由基事雁落魏更嬴事言其善射也又按緑沈是其色也王羲之筆經云有人以緑沈漆管見遺鄴中記曰石虎造象牙桃枝扇或緑沈色或木蘭色或紫柑色梁武帝西園食緑沈瓜皆是緑沈色也杜甫詩云苔臥緑沈鎗楊巨源詩云校獵緑沈鎗亦謂鎗柄漆飾矣云婉轉緑沈猿驚雁落者葢以色名其弓者也下風傾首以日為年下風子山自謂也左氏僖傳晉大夫曰羣臣敢在下風十七帖云遲此期以日為歲言已與趙王别有一日三秋之感也犍為舎人實有誠願碧雞主簿無由遂心漢書地理志曰犍為郡武帝建元六年開屬益州又云越巂郡青蛉禺同山有金馬碧雞又王褒傳云方士言益州有金馬碧雞之寳可祭祀致也宣帝使褒往祀焉褒於道病死列仙傳云赤斧者巴戎人也為碧雞祠主簿按犍為郡屬益州碧雞出越嶲郡亦益州之寳言趙王出使益州已欲從無由也寂寞荆扉疎蕪蘭徑驂駕來梁未期卜日遣騎致鄴希垂枉道柏梁詩梁孝王曰驂駕駟馬從梁來魏文帝與梁朝歌令吳質書曰今遣騎到鄴故使枉道相過謝趙王賚絲布等啓按趙王所賚許賜疑是蒼頭或是下客啓内楊池掘荷以下明是役奴遣客之詞也鄭叡至蒙賜絲布綾等十段王褒至又賜許賜錢等望外之恩實符大賚非常之錫乃溢生涯曳練且觀無勞白馬之望論衡曰孔子與顔淵俱登魯東山望吳閶門謂顔淵曰爾何見曰一疋練前有生藍子曰白馬廬芻也流泉欲委佇見青鳧之飛周禮有泉府鄭司農云故書泉或作錢洞冥記曰帝升望月臺有三青鴨化為三小童皆著綺文襦各握鯨文大錢置帝前又干寳搜神記曰南方有蟲名青蚨大如蠶子取其子母即飛來不以遠近雖潛取其子母必知處以母血塗錢八十一文以子血塗錢八十一文每市物或先用母錢或先用子錢皆復飛歸輪轉無已故淮南子術以之還錢名曰青蚨楊池掘荷李園移樹既欣谷利彌思青林王褒僮約云楊氏池中擔荷往來市聚吳志李衡遣客作宅種樹千株江表傳谷利孫權奴青林疑亦奴名未詳陳留下粟有媿深恩論衡云建武中陳留雨榖櫟陽雨金翻慚曲施史記曰秦獻公十八年雨金櫟陽靈臺久客從此數炊三輔決録曰第五頡倫之小子洛陽無故人鄉里無田宅客止靈臺中或十日不炊黍谷長寒於今更暖劉向别録曰鄒衍在燕有谷寒不生五榖鄒衍吹律而溫之至生黍從雲夢之田不踰此樂漢書相如子虚賦曰僕樂王之欲夸僕以車騎之衆而對以雲夢之事也張揖曰楚藪也在南郡華容縣得豐城之劒未均斯喜豫章記曰吳未亡時恒有紫氣貫於牛斗之間雷孔章曰寳劒之精上徹於天耳為豐城令至縣移獄掘地得二劒龍淵太阿謹啓謝趙王賚絲布啓某啓奉教垂賚雜色絲布三十段按趙王賚信下賚荀娘其欵至如此去冬凝閉今春嚴勁夏侯孝若寒雪賦曰嚴氣枯殺𤣥澤閉凝雪似瓊田凌如鹽浦瓊田玉田也十洲記曰祖洲有不死之草生瓊田中凌冰也周禮曰凌人掌冰鄭注凌冰室晉書謝朗詠雪云似撒鹽空中言去冬今春天寒嚴閉視積雪凝冰白如瓊田鹽浦也張超之壁未足鄣風未詳後漢書文苑傳曰張超字文並河間鄭人也有文才又善於草書疑即是人或其家貧不足鄣風耶袁安之門無人開雪汝南先賢傳曰時大雪積地丈餘洛陽令自出按行見人家皆除雪出有乞食者至袁安門無有行路謂安已死令人除雪入户見安僵臥問何以不出安曰大雪人皆餓不宜干人令以為賢舉為孝㢘也覆鳥毛而不暖燃獸炭而逾寒晉朝雜記洛下少炭羊琇𢷬小炭屑以物和之作獸形用以溫酒遠降聖慈曲垂矜賑言當此嚴寒之候䝉趙王賚絲布也論其蠶月殆罄桑車津實秉杼幾空織室蠶書曰月當大火則浴其種三輔黃圖曰織室在未央宮又有東西織室言所賚之多也遂令新市數錢忽疑敗疑作販綵平陵月夜驚聞𢷬衣郡國志新市屬江夏平陵屬右扶風江夏梁之郢州子山故國也後周都長安京兆馮翊扶風漢之三輔言已本羇旅得此絲布忽疑新市販綵而來在此平陵驚聞𢷬帛裁衣若將寄遠也妾遇新縑自然心伏古詩云新人從門入故人從門去新人工織縑故人工織素織縑旦一匹織素五丈餘將縑來比素新人不如故妻聞裂帛方當含笑史記曰周幽王后好聞裂繒聲莊周車轍實有涸魚莊子云莊周謂監河侯曰周顧視車轍中有鮒魚焉曰我東海之波臣也君豈有升斗之水以活我哉信陵鞭前原非窮鳥列士傳曰魏公子無忌方入有鳩飛入案下見一鷂在屋令縱鳩鷂逐而殺之公子為不食曰鳩避患歸無忌竟為鷂所得吾負之鄰國捕得鷂三百餘頭以奉公子一鷂獨低頭不敢仰視乃取殺之後漢書曰趙臺字元叔漢陽西縣人著窮鳥賦仰䝉經濟伏荷深慈謹啓又謝趙王賚息絲布啓本傳云子立嗣荀娘豈庾立小字耶荀一作茍某啓某息荀娘昨䝉恩引曲賜絲布等五段南冠獲宥既預禮延左傳南冠而縶又云羇旅之臣幸若獲宥稚子勝衣還䝉拜謁史記曰楚懐王穉子子蘭關尹津梁之織鄴地雙絲陸劌鄴中記曰鄴有大登髙小登髙錦有大光明錦小光明錦扶風采文之機仙園獨繭子虚賦云曳獨繭之榆枻青衿宜襲書生無廢學之詩毛萇曰青衿學子所服也春服既成童子得雩沂之舞出論語况復棲烏挾子同知桂樹之恩古樂府云烏生八九子端坐秦氏桂樹間澤雉將雛共喜行春之令後漢書曰魯恭為中牟令螟不入中牟袁安使肥親往㢘之隨行阡陌俱坐桑下有雉過其傍傍有童兒親曰捕之兒言雉方雛親以豎子有仁心根株一潤枝葉俱榮謹啓謝趙王賚白羅袍袴啓趙王所賚白羅袍袴皆冬時具也覽啓内便知某啓垂賚白羅袍袴一具按下文袍袴似著綿者爾雅袍襺也左傳重襺衣裘程據上表空論雉頭晉咸寧起居注曰太醫司馬程據上雉頭裘一領詔於殿前焚之王恭入雪虛稱鶴氅晉書曰王恭字孝伯恭美姿儀人多愛悦或目之云濯濯如春月栁被鶴氅裘涉雪而行孟昶窺見之嘆曰此真神仙中人也未有懸機巧緤變躡竒文鳯不去而恒飛花雖寒而不落謂羅上織成花鳳文也披千金之暫暖棄百結之長寒説苑曰千金之裘非一狐之皮也王隠晉書曰董威於市得碎繒輒以為衣號曰百結衣永無黃葛之嗟方見青綾之重吳越春秋云越王自吳還國苦身勞心懸膽於户出入嘗之曰吳王好服之離體使國中男女入山采葛作黃絲之布欲獻之吳王乃增之以封越國大悦采葛之婦傷越王用心之苦乃作何苦之詩漢武帝内傳曰王母二侍女年可十六七服青綾之袿對天山之積雪尚得開襟史記索隠曰祁連山一曰天山亦曰白山在張掖酒泉二郡界西河舊事曰白山冬夏有雪故曰白山匈奴謂之天山過之皆下馬焉去蒲類海百里之内後漢明帝紀注云天山即祁連山今名折羅漢山在伊州北冒廣樂之長風猶當揮汗列子曰鈞天廣樂此云廣樂疑作廣莫淮南子曰北方廣莫風江賦云長風颹以增扇廣莫䬅而氣整白龜報主終自無期幽明録曰晉咸康中豫州刺史毛寳戍邾城有一軍人於武昌市得一白龜長四五寸置甕中養之漸大放江中後邾城遭石氏敗赴江者莫不沈溺所養人被甲入水中覺如墮一石上須臾視之乃是先放白龜既得至岸廻顧而去亦見捜神後記黃雀謝恩竟知何日吳均續齊諧記曰𢎞農楊寳至華隂山見一黄雀傷瘢甚多寳懐之以歸置巾箱中啖以黃花積年乃去是夕寳三更讀書有黃衣童子曰我王母使者昔使蓬萊為鴟梟所搏䝉君之仁愛見救今當受賜南海别以四玉環與之曰令君子孫潔白從登三公事如此環矣寳名位日隆子震震生秉秉生彪四世名公謝滕王賚巾啓奉教垂賜鹿子巾一枚解角新胎戴藤初孕交州記康頭山鹿額上戴科藤落星交映連珠疎點盤龍之刀既剪長命之縷仍縫盤龍謂剪刀之上刻為盤龍用以裁剪也長命謂巾縫以長命之縷也三輔黃圖曰戚夫人侍兒賈佩蘭説在宮時八月四日出雕房北户竹下圍棊勝者終年有福負者疾病取絲縷就北斗星辰求長命乃免翠羽懸推芙蓉髙讓廣州志云交趾蒼梧以翡翠為幘神仙服食經云漢武帝閒居未央殿有人駕白鹿冠芙蓉冠曰我中山衞叔卿也遊斯隠士足笑鼓皮鼓疑榖後漢周黨傳云榖皮綃頭注榖樹皮也入彼春林方誇笋籜漢書曰髙祖為亭長以竹皮為冠服䖍曰籜竹皮也師古曰竹皮笋皮謂笋上所解之籜也今人亦徃往為笋皮巾古之遺制也某蓬􅁂鬆䬃衰容耆朽三秋不沐實荷今恩十年一冠彌欣此賚莊子曰曾子居衞十年不製衣正冠而纓絶謹啓謝明皇帝賜絲布等啓臣某啓奉勅垂賜雜色絲布綿絹等三十段銀錢二百文某比年以來殊有闕乏白社之内拂草看冰晉書曰董京常宿白社中時乞於市靈臺之中吹塵視甑三輔決録注曰第五頡字子陵為郡功曹位至諫議大夫洛陽無主人鄉里無田宅客止靈臺中或十日不炊後漢書范丹傳歌曰甑中生塵范史雲懟妻狠妾既嗟且憎瘠子羸孫虛恭實怨王人忽降大賚先臨天帝賜年無踰此樂仙童贈藥未均斯喜張袖而舞𤣥鶴欲來𤣥鶴注見齊王進蒼烏表及進象經賦表撫節而歌行雲幾斷博物志曰秦青撫節悲歌聲振林木響遏行雲所謂舟檝無岸海若為之反風漢書師古注曰檝所以刺船也莊子北海若曰天下之水莫大於海博物志云風山之首髙三百里風穴如電突深三十里春風自此而出也何以知還風也假令東風雲反從西來詵詵而疾此不旋踵立西風矣所以然者諸風皆從上而下或薄於雲雲行疾下雖有㣲風不能上上風來則反矣薺麥將枯山靈為之出雨淮南子曰隂生於午故五月為小刑薺麥亭歴枯又云薺冬生中夏死麥秋生夏死髙誘曰薺水也水王而生土王而死麥金也金王而生土王而死按薺麥枯於仲夏正梅雨時也况復全抽素繭雪板疑傾言其白也倂落青鳧銀山或動啓謝絲䓁當有錢矣青鳧注見上篇是知青牛道士更延將盡之命漢武帝内傳曰封君達隴西人初服黃連五十餘年入鳥舉山服水銀百餘年還鄉里如二十者常乘青牛故號青牛道士聞有病死者識與不識便以腰間竹管中藥與服或下鍼應手皆愈不以姓名語人間聞魯女生得五嶽圖連年請求女生未見授幷告節度二百餘歲乃入𤣥丘山去白鹿真人能生已枯之骨神仙傳曰中山衞叔卿常乘雲車駕白鹿見漢武帝帝將臣之叔卿不言而去武帝悔求其子度世令追其父度世登華山見父與數人博石上勅度世令還山古樂府云仙人騎白鹿髮短耳何長導我上太華攬芝獲赤幡來到主人門奉藥一玉箱主人服此藥身體日康彊髮白復更黒延年夀命長雖復拔山超海負徳未勝言恩徳甚重雖巨鼇不能負也漢書項羽曰力拔山兮氣葢世孟子曰挾泰山以超北海垂露懸針書恩不盡庾肩吾書品序流星疑燭垂露似珠參差倒薤既思種栁之謡長短懸針復想定情之製酉陽雜俎云百體中有垂露體懸針體言恩徳不勝書也蓬萊謝恩之雀白玉四環干寳捜神記曰漢時𢎞農楊寳年九歲時至華隂山北見一黃雀為鴟梟所搏墜於樹下為螻蟻所困寳見愍之取歸置巾箱中食以黄花百餘日毛羽成朝去暮來一夕三更寳讀書未臥有黃衣童子向寳再拜曰我西王母使者使蓬萊不慎為鴟梟所搏君仁愛見拯實感盛徳乃以白環四枚與寳曰令君子孫潔白位登三事當如此環漢水報徳之􅉬明珠一寸干寳捜神記曰昔隨侯因使入齊路行漢水沙邊見一小􅉬可長三尺於熱沙中宛轉頭上血出隨侯見而愍之下馬以鞭撥於水中語曰汝若是神龍之子當願擁護於我言訖而去至於齊國經二月還復經此道有小兒手把一明珠當道送與隨侯曰昔日深䝉救命甚重感恩聊以奉貺侯曰小兒之物詎可受之不顧而去至夜又夢小兒持珠與侯曰兒乃􅉬也早蒙救䕶生全今日答恩不見垂納請受之無復疑侯驚異迨旦見一珠在牀頭乃收之而感曰傷􅉬猶解知恩重報在人反不知恩乎侯歸持珠進納見述元由終身食禄耳左傳漢東之國隨為大故曰漢水某之觀此寧無愧心直以物受其生於天不謝謹啓謝趙王賚犀帶等啓奉教垂賚犀裝帶錢十貫魏君寶帶特賜劉楨典略曰文帝常賜劉楨廓落帶其後師死欲借取以為像因書嘲楨曰夫物因人為貴故在賤者之手不御至尊之側今雖取之勿嫌其不反也楨答曰楨聞荆山之璞曜元后之寳隨侯之珠獨衆士之好南垠之金登窈窕之首鼲貂之尾綴侍臣之幘此四寳者伏朽石之下潛汙泥之中而揚光千載之上發采疇昔之外亦皆未能初自接於至尊也夫尊者之服卑者所修也貴者所御賤者所先也故夏屋初成而大匠先立其下嘉禾始熟而農夫先嘗其粒恨楨所帶無他妙飾若實殊異尚可納也楨辭㫖妙巧類皆如是趙王國租偏資裴楷晉書曰裴楷字叔則梁趙二王國之近屬貴重當時楷歲請二國租錢百萬以散親族人或譏之楷曰損有餘以補不足天之道也貫藏文馬如燒安息之銀史記大宛傳曰安息在大月氐西可數千里以銀為錢錢如其王面王死輒更錢效王面焉漢書西域傳曰其錢獨文為人面幕為騎面又云以銀為錢獨為王面幕為夫人面王死輒更鑄錢韋昭曰幕錢背也荀悦曰幕音慢無文面也帶挿通犀似獵雲南之獸通犀通天犀也一名駭雞犀抱樸子曰通天犀有白理如綖者以盛米置羣雞中雞欲往啄米至輒驚走故南人名為駭雞異物志曰角中特有光耀白理如線自本達末則為通天犀後漢郡國志云邪龍雲南屬永昌郡北郭騷之長貧是所甘愜説苑曰北郭騷踵見晏子曰竊説先生之義願乞所以養母者晏子使人分倉廪府金而遺之辭金而受粟有間晏子見疑於景公出奔北郭子召其友而告之曰養及親者身更其難今晏子見疑吾將以身白之遂造公庭求復者曰晏子天下之賢者也今去齊國齊國必侵方必先國之侵也不若先死請絶頭以白晏子逡巡而退因自殺也公聞之乘馳而自追晏子及之國郊請而反之晏子聞北郭騷之死白已太息而嘆曰嬰不肖罪過固其所也而士以身明之哀哉南宮敬之載寳殊非念望檀弓曰南宮敬叔反必載寳而朝夫子曰若是其貨喪不如速貧之為愈也鄭注云敬叔魯孟僖子之子仲孫閲葢嘗失位去魯載其寳來朝於君按左傳孟僖子卒南宫敬叔師事仲尼北郭喻有母南宫喻父肩吾巳卒也言己受賜但如北郭之乞養不效南宫之重貨也花開四照惟見其榮山海經曰招揺之山有木焉其狀如榖而異理其花四照其名曰迷榖佩之不迷鼇戴三山深知其重列子夏革曰渤海之東有歸塘其中有五山焉帝命禺強使巨鼇十五舉首而戴五山峙而不動𤣥中記曰鼇巨龜也昔沈羲將盡逢司命而還生神仙傳曰沈羲者吳都人學道於蜀中但能消災治病救濟百姓不知服食藥物功徳感天天神識之羲與妻賈共載詣子婦卓孔寧家還逢白鹿車一乗青龍車一乘白虎車一乘從者皆數十騎皆朱衣仗矛帶劒輝赫滿道問羲曰君是沈羲否羲愕然不知何等答曰是也騎人曰羲有功於民心不㤀道自少小以來履行無過夀命不長年夀將盡黃老遣仙官來下迎之須臾有三仙人羽衣持節以白玉簡青玉介丹玉字授羲遂載羲昇天禮記曰王立七祀曰司命鄭注曰司命主督察三命文昌六星有司中司命春秋佐助期曰司命神名為滅黨長八尺小鼻望羊多髭癯瘦通於命運斯度士燮行埋值仙人而更活神仙傳曰士燮嘗病死已三日仙人董奉以一丸藥與服以水含之捧其頭揺之食頃即開目動手顔色漸復半日能起坐四日復能語遂復常奉字君異侯官人也今日慈矜斯之謂矣馬前驅而導路或似識恩晉元帝紀曰蕩隂之敗帝懼禍出奔成都王頴先令諸關無得出貴人帝既至河陽為津吏所止從者宋典後來以鞭策帝馬而笑曰舎長官禁貴人汝亦被拘耶吏乃聽過雞未曉而開關容能報主史記曰孟嘗君為秦所囚有能為狗盜者入宮取所獻狐白裘賂幸姬得出夜半至函谷關秦昭王後悔出孟嘗君即使人馳傳逐之孟嘗君至關關法雞鳴而出客孟嘗君恐追至客之居下坐者有能為雞鳴而雞盡鳴遂發傳出食頃秦追果至關已後孟嘗君出乃還謹啓謝趙王賚米啓某啓奉教垂賚米十石丹烏銜穟既集西周尚書中候曰有火自天止於王屋流為赤烏以榖俱來師古漢書注謂武王伐紂師渡孟津之時也黃雀隨車還飛東市神仙傳曰成武丁聞羣雀鳴而笑曰市東車翻覆米羣雀相呼往食遣視之信然國策曰黃雀俯啄百粒漬而為種不無霜雪之情汜勝之書云取雪汁漬原蠶屎五六日和榖種之能禦旱故謂雪為五榖精也取以論兵即有山川之勢後漢書曰馬援於帝前聚米為山谷指畫形勢開示象軍所從道徑往來分析曲折昭然可曉某陋巷簞瓢櫛風沐雨論語云一簞食一瓢飲在陋巷鄭注曲禮云圓曰簞方曰笥淮南子曰禹沐浴霪雨櫛扶風髙誘曰禹勞力天下不避風雨以久雨為沐浴扶風疾風以疾風為梳㮰也剝榆皮於秋塞掘蟄鷰於寒山漢書注如淳曰長榆塞名王恢所謂樹榆以為塞者也師古曰在朔方衞青所云榆葉舊塞是也晉書曰郄鍳避難於魯國澤中掘野䑕蟄鷰以食之仰費國租遂開塵甑世説曰梁王趙王國之近屬貴重當時裴令公歲請二國租錢數百萬以䘏中表之貧者或譏之曰何以乞物行惠裴曰損有餘以補不足天之道也後漢書曰范冉結草室而居所止單陋有時絶粒窮居自若言貌無改閭里歌之曰甑中生塵范史雲釜中生魚范萊蕪范冉一作范丹非丹竈而流珠異荆臺而炊玉江淹别賦云守丹竈而不顧銑曰丹竈鍊丹竈也韓子曰卞和得璞玉於楚山之下按荆臺楚襄王雲夢之臺亦楚地也淮南子曰譬若鍾山之玉炊以罏炭三日三夜而色澤不變東方朔之奉米既息長饑漢書曰東方朔待詔公車奉禄薄未得省見久之朔紿朱儒曰上以若曹無益於縣官徒索衣食今欲盡殺若曹朱儒大恐有頃上過朱儒皆號頓上問何為對曰東方朔言上欲盡誅臣等上知朔多端召問朔何恐朱儒為對曰臣朔生亦言死亦言朱儒長三尺餘奉一囊粟錢二百四十臣朔長九尺亦奉一囊粟錢二百四十朱儒飽欲死臣朔饑欲死臣言可用幸異其禮不可用罷之無令但索長安米上因使待詔於金馬門西門豹之墾田方慚此賚史記西門豹為鄴令發民鑿十三渠灌田皆溉謝趙王賚乾魚啓某啓蒙賚乾魚十番醴水朝浮光疑朱鼈山海經曰珠蟞之魚其狀如肺而有目六足有珠郭云蟞音鼈呂氏春秋曰醴水之魚名曰朱鼈六足有珠百碧髙誘曰醴水在蒼梧環九疑之山其魚六足有珠如蛟皮也文鰩夜觸翼似青鸞山海經曰泰器之山觀水出焉西流注於流沙是多文鰩魚狀如鯉魚魚身而鳥翼蒼文而白首赤喙常行西海逰於東海以夜飛其音如鸞雞其味酸甘食之已狂見則天下大穰吳都賦云文鰩夜飛而觸綸况復洞庭鮮鮒溫湖美鯽晉太康地記曰武昌南湖通江夏有水冬則涸靡所産植陶太尉立塘以遏水常自不竭因取瑯邪郡隔湖菱魚以著湖菱甚甘美異於他湖所産鮒魚長三尺神異經曰東南海中有烜洲洲有溫湖鮒魚生焉其長八尺食之宜暑而避風寒廣雅曰鮒一名鰿今之鯽也波瀾成雨鱗甲防寒某本吳人常想江湖之味及其饑也惟資藜藿之餘左氏傳曰斬之蓬蒿藜藿而食之太史公自序曰藜藿之羮正義曰藜似藋而表赤藿豆葉也茲賚渥恩膏腴流竈不勞獅子之亭即勝雷池之長皆吳地按金陵西獅子山晉元帝渡江易名盧龍山郭璞江賦曰其旁則有雲夢雷池李善注云張勃吳録曰雷池在皖翻驚河伯獨不愛人莊子曰於是河伯忻然自喜音義曰河伯姓馮名夷一名冰夷一云姓呂名公子馮夷是公子之妻抱樸子曰馮夷華隂人以八月上庚日渡河溺死天帝署為河伯足笑任公終年垂釣莊子曰任公子為大釣巨綸五十犗以為餌蹲會稽投竿東海旦旦而釣期年不得魚巳而大魚食之憚赫千里謹啓謝滕王賚馬啓某啓奉教垂賚烏騮馬一匹栁谷未開翻逢紫鷰捜神記曰張掖之栁谷有開石焉其文有五馬象魏晉代之興也西京雜記曰文帝有紫鷰騮陵源猶遠忽見桃花陶潛桃花源記曰武陵人捕魚為業忽逢桃花林林盡水源便得一山山中人云先世避秦來此爾雅曰黃白雜毛駓郭璞注云即今之桃花馬也言馬名桃花即類武陵源矣流電爭光浮雲連影西京雜記曰文帝自代還有良馬九匹號為九逸一名浮雲一名赤電張敞畫眉之暇直走章臺漢書曰張敞為婦畫眉長安中傳張京兆眉嫵時罷朝會過走馬章臺街使御史驅自以便面拊馬王濟飲酒之歡長驅金埒世説曰王武子被責移第北邙時人多地貴濟好馬射買地作埒編錢匝地竟埒時號曰金埒謹啓謝滕王賚猪啓某啓奉教垂賚肥豕一腔朝野僉載云按後一腔東猪肉是猪稱腔白腹疑作頭見珍度遼東之水後漢書朱浮責彭寵書曰往時遼東有豕生子白頭異而獻之行至河東見羣豕皆白懐慙而還若以子之功論於朝廷則為遼東豕也赤欄為重對襄陽之城水經注曰沔氷又東逕豬蘭橋橋本名荻蘭橋橋之左右豐蒿荻於橋東劉季和大養豬襄陽太守曰此中豬屎臭可易名豬蘭橋百姓遂以為名矣忽降全恩謹充炮烙孫𢎞牧於淄水惟以求錢漢書曰公孫𢎞少時家貧牧豕海上年四十餘乃學春秋卜式養於上林豈知其味漢書曰卜式以田畜為事入山牧羊羊致千餘頭買田宅時漢方事匈奴式願輸家財半助邊上不報會渾邪等降縣官費衆倉府空無以盡贍式復持錢二十萬以給召拜為中郎初式不願為郎上曰吾有羊在上林欲令子牧之式既為郎布衣草蹻而牧羊歲餘羊肥息上過其羊所善之式曰非獨羊也治民亦猶是矣上竒其言歴位至御史大夫按卜式乃牧羊非牧豕也疑是梁鴻養於上林誤文也後漢書曰梁鴻受業太學家貧而尚介節學畢乃牧豕於上林苑中曾誤遺火延及他舎鴻乃尋訪燒者問所去失悉以豕償之其主猶以為少鴻曰無他財願以身居作主人許之因為執勤不懈朝夕鄰家耆老見鴻非恒人乃共責讓主人而稱鴻長者於是始敬異焉悉還其豕鴻不受而去歸鄉里矣謹啓謝趙王賚馬幷繖啓奉教垂賚紫騮馬幷銀釘乘具紫紬繖一張上天降雨特垂深澤若木流光偏蒙私照廻茲翠葢事重劉基之恩吳志曰劉繇長子基字敬輿權大暑時嘗於船中宴飲於船樓上値雷雨權以葢自覆又命覆基餘人不得也其見待如此降此青驪榮深李忠之賜後漢書曰李忠字仲都東萊黃人也與任光同奉世祖以為右大將軍封武固侯從攻下屬縣至苦陘世祖會諸將問所得財物惟忠獨無所掠世祖曰我欲特賜李忠諸卿得無望乎即以所乘大驪馬及繡被衣物賜之北部丹帷更須髙捲後漢書賈琮為冀州刺史車垂赤帷而行及至州自言曰刺史當遠視廣聽何反垂帷於車以自掩蔽乃命御者蹇去其帷西河竹馬即已郊迎後漢書曰郭伋治幷州童兒皆騎竹馬來迎在命之輕鴻毛浮於弱水司馬遷報任安書曰死有重於泰山或輕於鴻毛陽泉養性賦云况性命之幾㣲如鴻毛之漂輕𤣥中記曰天下之弱者有崑崙之弱水鴻毛不能勝也知恩之重鼇背負於靈山列仙傳曰巨鼇負蓬萊山而抃滄海之中𤣥中記曰鼇巨龜也况復驚鴻别水但見徘徊黃鶴去關惟知反顧棲戀之心事同於此洛神賦曰翩若驚鴻李陵贈蘇武詩曰黃鵠一遠别千里顧徘徊謝趙王賚雉啓夏翟秋飛江翬春澗禹貢曰羽畎夏翟孔傳曰夏翟翟雉名左氏傳曰五雉為五正杜注曰雉有五種西方曰鷷雉東方曰鶅雉南方曰翟雉北方曰鵗雉伊洛之南曰翬雉釋鳥云鸐山雞樊光曰其羽可持而舞毛詩曰右手秉翟郭璞云長尾者釋鳥又云伊洛而南素質五采皆備成章曰翬中牟縣之客遂得坐觀東觀漢紀曰魯恭為中牟令螟不入中牟河南尹袁安使仁恕掾肥親往㢘之恭随行阡陌俱坐桑下有雉過其旁旁有童兒親曰何不捕之兒言雉方雛親曰所以來者欲察君之化迹耳今蟲不犯境一異也化及鳥獸二異也豎子有仁心三異也具以狀白安賈大夫之妻巳應含笑左氏傳曰昔賈大夫惡娶妻三年不言不笑御以如臯射雉獲之其妻始笑而言仰費中廚來供下客曹子建詩云中廚辦豐膳山川道遠口腹知恩書為梁上黃侯世子與婦書北齊書曰蕭慤字仁祖梁上黃侯曄之子天保中入國武平太子洗馬慤工於詩詠曾秋夜賦詩云芙蓉露下落楊栁月中疎為知音所賞顔氏愛其蕭散宛然在目潁川荀仲舉瑯琊諸葛漠亦以為爾按此知慤亦善屬文者也昔陸機入洛有代彦先之詞何遜裁書有為衡山之札才子詞人自能揮翰而夫妻致詞間多代作此亦感其燕婉之情代傳别恨可以葛龔無去者也慤本梁朝宗室疑江陵陷後隨例入關若非隔絶即是俘虜此書摹暫離之狀寫永訣之情茹恨吞悲無所投訴殆亦江南賦中臨江愁思之類也昔仙人導引尚刻三秋干寳搜神記曰漢時有杜蘭香者自稱南康人氏以建業四年春數詣張傳傳年十七望見其車在門外婢通言阿母所生遣授配君可不敬從傳先名改碩碩呼女前視可十六七説事邈然久遠有婢子二人大者萱支小者松支鈿車青牛上飲食皆備作詩至其年八月旦復來作詩云云出薯􅀢子三枚大如雞子云食此令君不畏風波辟寒溫碩食二枚欲留不肯令碩食盡言本為君作妻情曠遠以年命未合其小乖大歲東方卯當還求君蘭香降時碩問禱祀何如香曰消魔自可愈疾淫祀無益香以藥為消魔按上黃侯書是夫妻離别之辭言杜蘭香下嫁張碩以八月旦至是仙人導引尚刻三秋之期也神女將梳疑作疏猶期九日干寳捜神記曰魏濟北從事掾弦超字義起以嘉平中夜獨坐宿夢有神女來從之自稱天上玉女東郡人姓成公字智瓊早失父母天帝哀其孤苦遣令下嫁從夫夢三四夕一旦顯然來遊自言年七十視之如十五六女車上有壺榼青白瑠璃五具飲啗竒異饌具醴酒與超共飲遂為夫婦經七八年父母與超娶婦之後分日而燕分夕而寢夜去晨來倐忽若飛惟超見之他人不見雖居闇室輒聞人聲常見踪跡然不覩其形後人怪問漏洩其事玉女遂求去云我神人也雖與君交不願人知而君性疎漏我今本來已露不復與君通積年交結恩義不輕一旦分别豈不愴恨贈詩一首把臂告辭涕泣流離肅然升車去若飛迅去後五年超奉使至洛到濟北魚山下陌上西行遥望曲道頭有一車馬似智瓊驅馳前至果是也遂披帷相見悲喜交切同乘至洛遂為室家克復舊好至太康中猶在但不日日往來每於三月三日五月五日七月七日九月九日旦十五日輒下往來經宿而去張茂先為之作神女賦言智瓊之踪跡將疏猶期九月九日可會也按智瓊與弦超刻期有三月三日五月五日七月七日九月九日及旦十五日此云九日特舉其大略也未有龍飛劒匣鶴别琴臺豫章記曰雷煥子爽為建安從事經淺瀨劒忽於腰中躍出入水乃變為龍見二龍相隨而逝焉按劒雖有終合之論然在豐城得劒之後孔章茂先各持其一亦似别離時也蔡邕琴操曰商陵牧子娶妻五年無子父兄欲為改娶牧子援琴鼓之歌别鶴以舒其憤懣故曰别鶴操嵇康琴賦云千里别鶴陶潛詩曰上絃驚别鶴下絃操孤鸞益州記曰司馬相如宅在州西笮橋北百步許李膺曰市橋西二百里得相如舊宅今梅安寺南有琴臺龍飛鶴别喻夫婦遠離也莫不銜怨而心悲聞猿而下淚宜都記曰猿鳴三聲淚沾裳已上言蘭香下嫁之日尚有三秋可期智瓊求去之後猶有九日可會未有分兩龍於劒匣别雙鶴於琴絃如今之悲淚也人非新市何處尋家别異邯鄲那應知路後漢書郡國志曰江夏郡南新市侯國有離鄉聚綠林史記秦本紀曰昭襄王八年使將竿戎攻楚取新市注云晉帝紀曰江夏有新市漢書張釋之傳曰上指視慎夫人新豐道曰此邯鄲道也張宴曰慎夫人邯鄲人也言不能相見也想鏡中看影當不含啼欄外將花居然俱笑范泰鸞鳥詩序曰昔􅄢賔王得鸞鳥懸鏡以照之鸞覩影而鳴一奮而絶言彷彿相見之時也分杯帳裏却扇牀前故是不思何時能憶儀禮昏禮云四爵合卺鄭注云卺破瓢也四爵兩卺凡六為夫婦各三酳一升曰爵世説曰溫嶠娶姑女既婚交禮女以手披紗扇撫掌大笑曰我嫌是老奴果如所疑何遜看新婦詩曰如何花燭夜輕扇掩紅粧後李商隠詩有代董秀才却扇成婚之夕遂以却扇為名有却扇詩催粧詩言昔成婚之時可足思憶也當學海神逐潮風而來往神異經曰西海水上有人乗白馬朱髪白衣𤣥冠從十二童子馳馬海上如飛如風名曰河伯使者或時上岸馬跡所及水至其處所之之國雨水滂沱暮則還河勿如織女待填河而相見淮南子曰烏鵲填河成橋而渡織女按海神織女二語似上黃世子夫婦南北隔絶之辭也庾子山集巻八
