body:
  text: 庾子山集巻四周庾信撰錢唐倪璠纂註詩園庭杖鄉従物外養學事閒郊禮記曰六十杖於鄉窮愁方汗簡無遇始觀爻後漢書曰吴恢殺青簡以寫經書章懐太子注云殺青者以火炙簡令汗取其青易書復不蠧謂之殺青亦謂汗簡義見劉向别録也易有三百八十四爻谷寒已吹律簷空更剪茅劉向别錄曰鄒衍在燕齊有谷寒不生五穀鄒衍吹律而温之至生黍漢書曰茅茨不剪師古曰屋蓋曰茨茅茨以茅覆屋也樵隐恒同路人禽或對巢臧榮緒晉書云何琦曰胡孔明有言隐者在山樵者亦在山在山則同所以在山則異譙周古史考曰許由夏常居巢故一號巢父水蒲開晩結風竹解寒苞鮑照採桑詩曰早蒲時結䕃爾雅曰如竹箭曰苞郭注云條竹性叢生古槐時變火枯楓乍落膠淮南畢萬術曰老槐生火山海經曰黄帝殺蚩尤棄其桎梏化為楓郭璞曰楓似白楊葉圓而岐有脂而香今之香楓是膠楓樹脂也倒屣迎懸榻停琴聴解嘲魏志王粲傳曰蔡邕才學顯著貴重朝廷常車騎填巷賔客盈座聞粲在門倒屣迎之後漢書徐穉傳曰豫章太守陳蕃不接賔客惟見穉來特設一榻去則懸之又陳蕃傳曰太尉李固表薦遷樂安太守郡人周璆高潔之士前後郡守招命莫肯至惟蕃能致焉字而不名特為置一榻去則懸之二傳互載在豫章則特設以待穉在樂安則特設以待璆並有懸榻之事也揚子解嘲序云人有嘲碓以𤣥之尚白碓解之號曰解嘲香螺酌美酒枯蚌藉蘭殽西京雜記曰趙飛燕為皇后其女弟上穟有香螺巵出南海一名丹螺王子年拾遺記曰漢武帝思懐李夫人侍者覺帝容色愁怨乃進洪梁之酒酌以文螺之巵巵出波祗之國知螺可用為酒巵也邊讓章華賦曰蘭殽山竦椒酒淵流注云蘭殽芳若蘭也飛魚時觸釣翳雉屢懸庖王子年拾遺記曰仙人寗封食飛魚而死二百年更生故寗先生逰沙海七言頌曰百齡暫死食飛魚此云飛魚葢言游魚之觸釣也周禮有庖人鄭注云庖之言苞也裹肉曰苞苴釋曰言庖者今之廚轉作庖者欲取庖人主六獸六禽以供庖廚有裹肉之意也庖扶交反但使相知厚當能來結交歸田子山欲歸田里故作是詩務農勤九穀歸來嘉一廛周禮冢宰職云以九職任萬民一曰三農生九穀鄭司農云三農平地山澤也九穀黍稷秫稻麻大小豆大小麥也後鄭謂三農原隰及平地九穀無秫大麥而有梁苽秫音述苽音𤓰彫胡也周禮載師云以廛里在國中之地鄭注云廛民之區域也以廛里任國中而遂人職授民田夫一廛百畝揚子雲有田一廛謂百畝之居也穿渠移水碓燒棘起山田漢書曰穿漕渠通渭孔融曰水碓之巧勝於聖人斷木掘地説文曰碓舂也棘荆棘燒棘謂芟草除地也鄭司農注周禮三農平地山澤知有山田矣樹隂逢歇馬魚潭見酒船苦李無人摘秋𤓰不直錢晉書曰王戎與羣兒戲於道側見李樹多實等軰競趨之戎獨不往或問其故戎曰樹在道邊而多子必苦李也取之信然吴越春秋曰越伐吴吴王遯去走三日三夕腹餒口饑因得生𤓰已熟吴王掇而食之謂左右曰何冬而生𤓰近道人不食何也左右曰盛夏之時人食生𤓰起居道傍子復生秋霜惡之故不食吴王嘆曰子胥所謂且食者也社雞新欲伏原蠶始更眠荆楚嵗時記曰春分日民並種戒火草於屋上有鳥如烏先雞而鳴架架格格民候此鳥則入田以為候社日四鄰並結宗㑹社牲醪為屋於樹下先祭神然後饗其胙周禮曰馬質禁原蠶者鄭注云天文辰為馬故蠶書曰蠶為龍精月值大火則浴其種是蠶與馬同氣也今日張平子翻為人所憐後漢書曰張衡字平子南陽西鄂人也衡著歸田賦李周翰曰衡逰京師四十不仕順帝時閹官用事欲歸田里故作是賦子山本張平子之賦而作此詩焉寒園即日寒園星散居揺落小村墟釋名曰星散也列位布散也青緗雜記嶺南謂村市為虚逰仙半壁畫隐士一牀書子月泉心動陽爻地氣舒禮記曰仲冬泉水動律書云十一月律中黄鍾黄鍾者陽氣鍾黄泉而出也其於十二爻為子子者滋也滋者言萬物滋於下也後漢書魯恭議奏曰易曰潛龍勿用言十一月十二月陽氣潛蔵未得用亊雖煦嘘萬物養其根荄而猶盛隂在上地凍水冰陽氣否隔閉而成冬故曰履霜堅冰隂始凝也馴致其道至堅冰也言五月㣲隂至十一月堅冰至也蔡邕獨斷曰冬至陽氣始動雪花深數尺冰牀厚尺餘韓詩外傳曰雪花六出故雪曰雪花左氏傳曰闕地下冰而牀焉故冰曰冰牀博物志曰北方地寒冰厚三尺氣出口為凌蒼鷹斜望雉白鷺下觀魚春秋文曜鉤曰金伐木故鷹撃雉李陵詩曰有鳥西南飛熠燿似蒼鷹張華鷦鷯賦云蒼鷹鷙而受緤爾雅曰鷺舂鉏郭注云白鷺也頭翅背上皆有長翰毛今江東人取以為睫攡名之曰白鷺縗陸機疏云鷺水鳥也白而好潔故謂之白鳥齊魯之間謂之舂鉏遼東樂浪吴揚人皆謂之白鷺好欲取魚時則弭之今吴人亦養焉更想東都外羣公别二疏漢書曰疏廣為太傅兄子受為少傅太子毎朝因進見太傅在前少傅在後父子並為師傅朝廷以為榮廣謂受曰吾聞知足不辱知止不殆功成身退天之道也即日父子俱移疾三月還稍篤上書乞骸骨上皆許之賜黄金二十斤皇太子贈以五十斤公卿大夫故人邑子設帳祖道供張東都門外送者車數百兩辭決而去及道觀者皆曰賢哉二大夫咸歎息為之下泣言雖仕者亦思乞骸骨歸也幽居值春山人久陸沉幽徑忽春臨莊子曰孔子之楚其鄰有夫妻臣妾登極者仲尼曰是陸沉者也決渠移水碓開園掃竹林西都賦曰決渠降雨欹橋久半斷崩岸始邪侵短歌吹細笛低聲泛古琴琴有泛音錢刀不相及耕種且須深風俗通曰錢刀俗説利傍有刀言治生得金者必有刀錢之禍漢書王莽造大錢作契刀錯刀五銖錢几四品並行故稱錢刀也長門一紙賦何處覔黄金長門賦序云孝武皇帝陳皇后時得幸頗妬别在長門宫愁悶悲思聞蜀郡成都司馬相如天下工為文奉黄金百斤為相如文君取酒因於解悲愁之辭而相如為文以悟主陳皇后復得親幸卧疾窮愁危慮風霜積窮愁嵗月侵留蛇常疾首映弩屢驚心晉書曰杜預在荆州因宴集醉卧齋中外人聞嘔吐聲竊窺戸止見一大蛇垂頭而吐聞者異之其後徴為司𨽻校尉加位特進行次鄧縣而卒題是卧疾似用此語又疑疾首是用孫叔敖兩頭蛇事賈誼新書云孫叔敖為兒時出道上見兩頭蛇殺而埋之歸見其母泣問其故對曰夫見兩頭蛇者必死今出見之故爾母曰蛇今安在對曰恐後人見殺而埋之矣母曰夫有隂徳者必有陽報爾無憂也及長為楚令尹今云留蛇常疾首者疑言留此兩頭之蛇常疾惡其首也有將死之徴矣映弩屢驚心者風俗通曰汲令應彬請主簿杜宣飲酒時其上懸赤弓照杯中如蛇宣惡之因得疾彬知之延宣於舊處置酒指曰此弩影似耳疾遂瘳又晉書樂廣請親客飲酒見杯中有蛇意甚惡之既飲而疾於是河南聴事壁上有角漆畫作蛇廣意杯中即角影也復置酒前處所見如初客豁然意解沉疴頓愈穉川求藥録君平問卜林晉書曰葛洪字穉川丹陽句容人也師事南陽太守上黨鮑𤣥𤣥亦内學逆占將來見洪深重之以女妻洪洪傳𤣥業兼綜練醫術凡所著撰皆精覈是非而才章富贍有金匱藥方肘後要急方漢書曰蜀有嚴君平卜筮於成都市裁日閲數人得百錢足自養則閉肆下簾而授老子博覽無不通依老子嚴周之指著書十餘萬言師古曰地理志謂君平為嚴遵三輔決録云君平名尊野老時相訪山僧或見尋應劭藝文志注云年老居田野相民耕種故稱野老説文曰僧浮屠道人也有菊翻無酒無絃則有琴續晉陽秋曰陶潛甞九月九日出宅邊菊叢中坐久之滿手把菊值王𢎞送酒至即便就酌醉而歸淵明不解音律而蓄無絃琴一張毎酒適輒撫㺯以寄其意詎知長抱膝徒為梁父吟蜀志曰諸葛亮躬耕隴畆好為梁父吟身長八尺自比於管仲樂毅時人莫之許也惟博陵崔州平潁川徐元直與亮友善謂為信然注云魏畧曰亮在荆州以建安初與潁川石廣元徐元直汝南孟公威等俱逰學三人務於精熟而亮獨觀其大畧毎晨夜従容常抱膝長嘯而謂三人曰卿仕進可至刺史郡守也三人問其所至亮笑而不言言已在周卧疾窮愁其狀似危求醫問卜訪尋者多豈知已抱膝而吟實有諸葛之志也山齋寂寥尋靜室䝉密就山齋楚辭曰聲嗷嗷以寂寥兮王逸曰寂寥空無人之貌也范蔚宗樂逰應劭詩曰遵渚攀䝉密滴瀝泉澆一作遶路穹窿石卧階説文曰滴歴水下滴瀝也江淹謝臨川詩云乳竇既滴瀝爾雅郭注云穹窿至極亦為大也淺槎全不動盤根惟半埋圓珠墜晚菊細火落空槐江淹恨賦曰秋露如珠淮南子曰老槐生火直置風雲慘彌憐心事乖望野試䇿千金馬來登五丈原漢書曰漢使壯士車令等持千金及金馬以請宛王貳師城善馬魏氏春秋曰諸葛亮據渭水南司馬懿謂諸將曰亮若出武功依山東轉是其勇也若西上五丈原則諸君無事矣亮果屯此原與懿相遇水經注曰武功縣西南衙嶺山北歴斜谷逕五丈原東諸葛亮與歩隲書曰僕前在五丈原原在武功西十里有城仍舊縣無樹即新村言野望有城之處仍舊時郡縣無樹之郷即今時村落也水向蘭池泊日斜細栁園括地志云蘭池陂即古之蘭池在咸陽縣界秦記云始皇都長安引渭水為池築為蓬瀛刻石為鯨長二百丈逢盜之處也漢書曰周亞夫屯細栁涸渚通沙路寒渠塞水門但得風雲賞何須人事論後漢二十八將論曰然咸能感㑹風雲奮其智勇言古佐命之臣風雲相感為可嘆賞至於人事盛衰不足論也䝉賜酒金膏下帝臺玉歴在蓬萊穆天子傳河伯曰示汝黄金之膏山海經曰鍾鼓之山帝臺之石所以觴百神也郭璞注云帝臺神人名舉觴燕㑹則於此山因名為鍾鼓也玉歴疑作玉瀝郭璞山海經注所謂白玉膏是也蓬萊三神山名仙人一遇飲分得兩三杯忽聞桑葉落正值菊花開水經注曰河東郡民有劉白墮者宿擅工釀採浥河流醖成芳酎懸食同枯枝之年排子桑落之辰故酒得其名矣自王公支庶牽拂相招者每云索郎有顧思同旅語索郎反語為桑落西京雜記曰九月九日佩茱茰食蓬餌飲菊花酒令人長壽菊花舒時并採莖葉雜黍米釀之至來年九月九日始熟就飲焉故謂之菊花酒阮籍披衣進王戎含笑來世説曰王戎弱冠詣阮籍時劉公榮在坐阮謂王曰偶有二斗美酒當與君共飲彼公榮者無預焉二人交觴酬酢公榮遂不得一杯而言語談戲三人無異従今覔仙藥不假向瑶臺楚辭曰望瑶臺之偃蹇兮奉報趙王恵酒梁王修竹園冠蓋風塵喧西京雜記曰梁孝王好宫室苑囿之樂築兔園九域志曰梁孝王苑囿中有修竹園西都賦曰冠蓋如雲陸士衡詩曰京洛多風塵行人忽枉道直進桃花源陶潛桃花源記曰武陵人捕魚為業忽逢桃花林夾岸林盡水源便得一山山有小口便捨船從口入土地平曠屋舍儼然男女衣著悉如外人自云先世避秦亂時率妻子邑人來此絶境不復出焉穉子還羞出驚妻倒閉門史記曰楚懐王穉子子蘭范雲贈張謖詩云還聞穉子説有客欵柴扉始聞傳上命定是賜中樽漢書如淳注曰稷米一斗得酒一斗為中尊師古曰中尊者宜為黍米作酒有澆醇之異為上中下耳又按盛酒器爾雅曰卣中尊也􅉓卣罍器也禮圖云六尊為中受五斗是中樽為盛酒器也野罏燃樹葉山杯捧竹根王韶南雍州記曰辛居士名宣仲家貧春月鬻筍充膓酌截竹為罌用充盛置人問其故宣仲曰我惟愛竹好酒欲令二物常相並耳風池還更煖寒谷遂成暄風池如風井之類宋玉風賦曰夫風生於地起於青蘋之末侵淫谿谷盛怒於土囊之口李善注引盛𢎞之荆州記曰宜都狼山縣有山山下有穴大數尺為風井土囊當此之類也此云風池亦猶是矣劉向别錄曰燕有谷地美而寒不生五穀鄒衍乃吹律而温氣至堪植黍今人謂之黍谷喻己如風池寒谷得此酒而温暖也未知稻􅆝雁何時能報恩説苑曰齊景公甞菽粟鳬雁有喜致醉此子山生子之辭也某息荀娘豈以此時舉之耶或即嗣子名立者所未詳矣忽見庭生玉欣看蚌出珠晉書謝𤣥曰芝蘭玉樹欲其生於庭階耳史記龜䇿傳曰明月之珠出於江海藏於蚌中生玉出珠喻得子也蘭芬猶載寢蓬箭始懸弧左氏傳曰鄭文公有賤妾曰燕姞夢天使與已蘭曰以是為而子既而文公見之與之蘭而御之辭曰妾不才幸而有子將不信敢徴蘭乎生穆公名之曰蘭詩曰乃生男子載寢之牀禮記曰子生男子設弧於門左三日始負子男射射人以桑弧蓬矢六射天地四方鄭注云桑弧蓬矢本大古也天地四方男子所有事也既喜枚都尉能歡陸大夫漢書曰枚乘為𢎞農都尉孽子臯乘在梁時取臯母為小妻乘東歸臯母不肯随乘乘怒分臯數千錢與母居又曰陸賈為太中大夫有五男乃出使越槖中裝賣千金分其子子二百金令為生産曰過女女給人馬酒食極欲十日而更頻朝中散客連日步兵厨晉書曰嵇康與魏宗室婚拜中散大夫魏氏春秋曰阮籍以世多故禄仕而已聞歩兵校尉缺厨多美酒營人善釀酒求為校尉遂縦酒昏酣遺落世亊襍曲隨琴用殘花聴酒須脆梨裁數實甘查惟一株兀然已復醉揺頭歌鳳雛劉伶酒徳頌曰兀然而醉豁爾而醒宋書樂志曰鳳將雛歌者舊曲也應璩百一詩云言是鳳將雛然則其來乆矣喜晴應詔勅自疏韻御辯誠膺録維皇稱有建應禎華林園集詩曰五徳更運膺籙受符李善注云春秋命歴序曰五徳之運同徴合符膺籙次相代洪範次五曰建用皇極雷澤昔經漁負夏時従販史記曰舜耕歴山漁雷澤陶河濵作器於壽丘就時於負夏正義曰括地志云雷夏澤在濮州雷澤縣郭外西北山海經曰雷澤有雷神龍首人頰鼓其腹則雷也索隐曰尚書大傳販於頓丘就時負夏孟子曰遷於負夏是也柏梁驂駟馬高陵馳六傳漢武帝元封三年作柏梁臺詔羣臣二千石有能為七言詩者乃得上座梁孝王云驂駕駟馬従梁來史記文帝本紀曰代王命宋昌參乘張武等六人乘傳詣長安至高陵休止正義曰括地志云高陵故城在雍州高陵縣西南一里本名横橋架渭水上有序屬賔連無私表平憲河堤崩故栁秋水高新堰廣雅曰堰潛堰也謂潛築土以壅水也一作堨音竭亦作塢烏古切堰一建切三字義同而音則異也心齋愍昏墊樂徹憐胥怨禮記曰齋之為言齊也心不茍慮必依乎道書曰下民昏墊孔傳曰言天下民昏暓墊溺皆困水災周禮曰大傀異裁令去樂凡國之大憂令弛縣商書曰盤庚五遷將治亳殷民咨胥怨禪河秉高論法輪開勝辯水經注曰佛國記云拘那竭城北雙樹間希建禪河邊世尊於此北首而盤泥洹佛説四十二章經曰世尊於鹿野苑中轉西諦法輪度憍陳如等五人而證道果維摩經曰三轉法輪於大千其輪本來常清淨王城水鬬息洛浦河圖獻國語曰周靈王二十二年穀洛鬬將毁王宫韋昭注曰穀洛二水名也鬬者兩水格有似於鬬洛在王城之北東入於瀍至靈王時穀水盛出於王城之西而南流於洛水毁王城西南將及王宫故齊人城郟周易繫辭曰河出圖洛出書聖人則之春秋緯云河以通乾出天苞洛以流坤吐地符河龍圖發洛龜書感河圖有九篇洛書有六篇孔安國以為河圖則八卦是也洛書則九疇是也伏泉還習坎埽風巳回㢲㢲音旋蘇貫切易曰習坎有孚又曰㢲為風桐枝長舊圍蒲節抽新寸寸音斷爾雅曰櫬梧郭云今梧桐也又爾雅曰榮桐木郭云即梧桐與上櫬梧一也説文曰榮桐也又曰蒲水草也可以作席山藪欣蔵疾幽棲得無悶悶音慢莫半切左傳伯宗曰山藪藏疾杜注云山之有林藪毒害者居之易曰遯世無悶有慶兆民同論年天子萬書曰一人有慶兆民賴之詩江漢云天子萬年箋云臣受恩無可以報謝稱言使君壽考而已樂府逺如期云増壽萬年亦誠哉同顔大夫初晴顔大夫顔之儀也北史曰顔之推字介瑯邪臨沂人也弟之儀字升博渉羣書好為辭賦江陵平随例遷長安周明帝以為麟趾學士宣帝即位遷上儀同大將軍御正大夫進爵為公夕陽含水氣反景照河隄爾雅曰山西曰夕陽郭注云暮乃見日説文曰景光也景即影字日景也古字無彡説文曰隄唐也聲都兮切濕花飛未逺隂雲斂向低燕燥還為石龍殘更是泥羅含湘中記曰零陵有石燕遇風雨則飛舞如燕止則為石淮南子曰聖人用物若用朱絲約芻狗若為土龍以求雨芻狗待之而求福土龍待之而得食高誘注曰土龍致雨雨而成穀故待土龍之神而得穀食香泉酌冷澗小艇釣蓮溪爾雅曰山夾水澗疏云謂山間有水者名澗詩云考槃在澗是也説文曰艇小舟也徒鼎切但使心齊物何愁物不齊莊子有齊物論又曰萬物一齊孰短孰長奉和趙王喜雨𤣥霓臨日谷封蟻對雲臺説文曰霓屈虹青赤或白色隂氣也日谷暘谷日所出也淮南子曰日出暘谷東觀漢記曰永平五年秋京師少雨上御雲臺召沛獻王輔以周易卦林占之其繇曰蟻封穴户大雨將至上以問輔輔曰蹇艮下坎上艮為山坎為水山出雲為雨蟻穴居知雨將至故以蟻興投壺欲起電倚柱稍驚雷神異經曰東王公與玉女投壺投而不接天為之笑開口流光張華注云今電是也世説曰夏侯太初甞倚柱作書時大雨霹靂破柱衣服燋燃神色不變白沙如濕粉蓮花類洗杯荆州記曰白沙如霜雪赤岸若朝霞言雨落沙中有如漬粉垂於荷上又類洗杯也驚烏洒翼度濕雁斷行來浮橋七星起高堰六門開華陽國志曰兩江冇七橋長老傳言李冰造七橋上應七星故世祖謂吴漢曰安軍宜在七星間水經注曰湍水逕穰縣為六門陂漢孝成之世南陽太守邵信成斷湍水立穰西石碣至元始五年更開三門為六石門故號六門碣也溉穰新野昆陽三縣五千餘頃又云昔有晉世杜預繼信臣之業復六門之陂遏六門之水下結二十九陂諸陂散流咸入朝水事見六門碑六門既陂諸陂遂斷猶言祀蜀帝即似望荆臺華陽國志曰蜀人為蜀侯惲立祠其神有靈能興雲致雨水旱禱之此云蜀帝承杜宇開明之稱也荆臺即高唐賦陽臺是也厥田終上上原野自莓莓禹貢曰厥土黄壤田上上賦中下爾雅云廣平曰原詩傳云郊外曰原左氏傳曰原田莓莓杜預曰若原田之草莓莓然言不惟田成沃壤即荒郊之草俱得生也和李司録喜雨純陽實久亢雲漢乃昭回易乾卦上九云亢龍有悔詩序云雲漢美宣王也首章云倬彼雲漢昭回于天箋云雲漢謂天河也昭光也時旱渇雨故宣王仰視天河望其候焉臨河沉璧玉夾道畫龍媒雲漢之詩云圭璧既平寕莫我聴淮南子注云土龍致雨高誘曰雲従龍故致雨也法言曰象龍之致雨艱矣哉龍乎龍乎新論劉歆曰致雨具作土龍龍見者輒有風雨起以迎送之故緣其象類而為之漢書曰龍之媒此云畫龍為媒亦土龍致雨之義離光初繞電震氣始乘雷易曰離為電鄭康成曰取火明也久明似日暫明似電也又震為雷虞翻曰太陽火得水有聲故為雷也海童還碣石神女向陽臺神異經曰西海有神童乘白馬見則天下大水郭璞江賦曰海童之所廵逰吴都賦曰海童於是燕語索隐史記注云地理志曰碣石山在北平驪城縣西南太康地理志曰樂浪遂城有碣石山長城所起水經注曰在遼西臨逾縣南水中葢碣石山有二禹貢夾右碣石入於河當非平北之碣石也宋玉高唐賦曰妾在巫山之陽高丘之岨旦為行雲暮為行雨朝朝暮暮陽臺之下又有神女賦即巫山神女也雲逐魚鱗起渠従龍骨開淮南子曰水雲魚鱗高誘注曰水氣出雲似魚鱗西京雜記曰昆明池刻玉石為魚每至雷雨魚常鳴吼鬐尾皆動漢世祭之祈雨往往皆驗史記河渠書曰穿渠得龍骨名曰龍骨渠崩沙雜水去卧樹擁槎來言為驟雨所漂激也嘉苗雙合頴熟稻再含胎孝經援神契曰王者徳至則嘉禾生應禎華林園集詩曰嘉禾重穎屬此欣膏露逢君摛掞才君謂李司録也言李君作此喜雨之詩也説文曰摛舒也愧乏瓊將玖無酬美且偲詩衛風曰投我以木李報之以瓊玖毛傳曰瓊玖玉名又詩曰彼留之子貽我佩玖毛傳曰玖石次玉者爾雅曰酬報也齊風盧令之詩曰盧重鋂其人美且偲毛傳曰偲才也説文曰强也愧已和非瓊玖不足酬李君之美才也郊行值雪風雲俱慘慘原野共茫茫爾雅曰慘慘愠也登樓賦曰原野閴其無人兮楚辭曰莽茫茫之無涯毛萇曰茫茫廣大也雪花開六出冰珠映九光韓詩外傳曰草木花多五出雪花獨六出漢武内傳曰燃九光之燈言雪之明亦猶是矣還如驅玉馬暫似獵銀獐陣雲全不動寒山無物香薛君一狐白唐侯兩驌驦史記曰田文代立於薛為孟甞君入秦秦昭王囚孟甞君欲殺之孟甞君使人抵昭王幸姬求解幸姬曰妾願得君狐白裘此時孟甞君有狐白裘直千金天下無雙入秦獻之昭王更無他裘孟甞君患之最下坐有能為狗盜者夜為狗以入秦宫藏中取所獻狐白裘以獻秦王幸姬姬為言昭王釋孟甞君左傳定三年曰唐成公如楚有兩肅爽馬子常欲之弗與三年止之唐人竊馬而獻之子常子常歸唐侯賈逵云色如霜紈者也肅如字爽音霜既以肅霜名馬後遂加馬旁作驌驦寒關日欲暮披雪上河梁李陵與蘇武詩曰攜手上河梁奉和趙王西京路春旦直城龍首抗横橋天漢分三輔黄圖曰長安西出第二門曰直城門又曰日營未央因龍首以制前殿引渭水灌都以象天漢横橋南渡以法牽牛西京賦云疏龍首以抗殿風烏疑近日露掌定高雲郭延生述征記曰長安宫南靈臺有相風烏遇風乃動按日有三足烏故云疑近日也三輔故事曰建章宫承露盤高二十丈大七圍以銅為之上有仙人掌承露和玉屑飲之新渠還入渭舊鼎更開汾漢書武帝紀云穿漕渠通渭又元鼎元年得鼎汾水上漢獵熊攀檻秦田雉失羣續列女傳曰漢馮昭儀者孝元帝之昭儀右將軍光禄勲馮奉世之女也元帝二年選入後宫始為長使數日為美人生中山孝王為婕妤建昭中上幸虎圈格獸後宫皆從熊逸出圏攀檻欲上殿左右傅昭儀貴人皆驚走而馮婕妤直當熊而立左右格殺熊天子問婕妤人情皆驚懼何故當熊對曰妾聞猛獸得人而止妾恐至御前故以身當之元帝嗟嘆以此敬重焉傳昭儀等皆慙明年中山孝王封乃立婕妤為昭儀太康記曰秦文公時陳倉人獵得獸若彘而不知其名道逢二童子曰此名為䊧弗迷䊧弗迷亦語曰彼二童子名為寶雞得雄者王得雌者霸陳倉人舍䊧弗迷逐二童子化為雉雄止陳倉化石雌如楚止南陽宜年動春律御宿斂寒氛宜年疑即宜春宫也漢書元后傳曰夏逰篽宿鄠杜之間三輔黄圖曰御宿苑在長安城南御宿川中漢武帝為離宫别館禁御人不得往來逰觀止宿其中故曰御宿時值春旦陽氣已動故寒氛歛也㺯玉迎蕭史東方覔細君列仙傳曰蕭史秦繆公時人善吹簫穆公有女號㺯玉好之公遂以妻焉遂教㺯玉作鳳鳴為作鳳臺夫婦止其上一旦皆随鳯凰去漢書曰伏日詔賜従官肉太官丞日宴不來東方朔獨拔劍割肉即懷肉去太官奏之上曰先生起自責也朔曰受肉不賜詔何無禮也拔劍割肉一何壯也割之不多又何亷也歸遺細君又何仁也上笑曰使先生自責乃反自譽復賜酒一石肉百斤歸遺細君楊栁成歌曲蒲桃學繡文楊栁折楊栁也崔豹古今注曰李延年因胡曲更造新聲二十八解魏晉以來不復具存世用者黄鶴隴頭出關入關出塞入塞折楊栁黄華子赤之陽望行人等十曲西京雜記曰霍光妻遺淳于衍蒲桃錦二十四匹鳥鳴還獨解花開先自薰誰知㶚陵下猶有故將軍漢書曰李廣與故潁隂侯屏居藍田山中射獵甞従一騎出従人田間飲還至㶚陵尉醉呵止廣廣曰故將軍尉曰今將軍尚不得夜行何故也奉和夏日應令朱簾捲麗日翠幕蔽重陽五月炎蒸氣三時刻漏長説文曰漏以銅受水刻節晝夜百刻周禮挈壺氏下士二人鄭注云挈讀如挈髪之挈壺盛水器也世主挈壺水以為漏然則挈壺者懸繫之名刻為置箭壺内刻以為節而浮之水上令水漏而刻下以記晝夜昏明之度數也續漢書曰孔壺為漏浮箭為刻下漏數刻以考中星云三時刻漏長者時維夏日夜短晝長也麥随風裏熟梅逐雨中黄月令曰孟夏之月農乃登麥天子乃以彘甞麥先薦寢廟風景風也淮南子曰清明風至四十五日景風至葢謂五月夏至之時故仲夏稱為麥秋矣風俗通曰夏至霖霪至前為黄梅先時為迎梅雨及時為梅雨後之為送梅雨二語皆為五月夏至之節也開冰帶井水和粉雜生香衫含蕉葉氣扇動竹花涼早菱生軟角初蓮開細房爾雅曰蔆蕨攗郭云蔆今水中芰疏云蔆一名蕨攗字林云楚人名蔆曰芰可食國語曰屈到嗜芰俗云蔆角是也又爾雅云薢茩郭云或曰䔖也關西謂之薢茩説文云䔖楚曰芰秦曰薢茩楚辭曰芙蓉始發雜芰荷王逸云芰菱也秦人謂之薢茩矣爾雅曰荷芙蕖其實蓮郭云蓮謂房也按菱與蓮至夏末始實今五月時菱角尚軟蓮房猶細故曰早菱初蓮矣願陪仙鶴舉洛浦聴笙簧列仙傳曰王子喬周靈王太子晉也好吹笙作鳳鳴逰伊洛間道士浮丘公接上嵩山二十餘年後來於山上告桓良曰告我家七月七日待我於緱氏山頭果乘白鶴駐山顛望之不得到舉手謝時人而去和樂儀同苦熱樂儀同樂遜也北史儒林傳曰樂遜字遵賢河東猗氏人也大統六年與諸儒分經敎授經業講孝經論語毛詩及服䖍所注大象初進爵崇業郡公又為露門博士二年進位開府儀同大將軍以老病賜安車衣服奴婢等於本郡賜田十頃儒者以為榮隋開皇元年卒年八十二樂儀同有苦熱之作子山和之火井沉熒散炎洲高燄通左太沖蜀都賦曰火井沉熒於幽泉高燄飛扇於天垂劉淵林注曰蜀郡有火井在臨卭縣西南欲出其火先以家火投之須臾許隆隆如雷聲燄出通天光輝十里以筩盛之接其光而無炭也東方朔十洲記曰炎洲在南海中地方二千里去北岸九萬里上有風生獸青色大如貍張網取之積薪數車以燒之薪盡而獸不然以石上菖蒲塞其鼻即死又有火林山山中有火光獸大如鼠毛長三四寸或赤或白山可三百里許晦夜即見此山林乃是此獸光照林如火光相似取其獸毛以緝為布時人號為火浣布此是也言炎夏熱如火矣鞭石未成雨鳴鳶不起風虞喜志林曰夷陵有隂陽石隂石常潤陽石常燥旱則鞭隂石必雨久雨鞭陽石則止曲禮曰前有塵埃則載鳴鳶鄭注曰烏鳶鳴則將風正義曰鳶今時鴟也鴟鳴則風生風生則塵起故畫鴟於旌首而載之也言久熱思風雨也思為鸞翼扇願借明光宫陸機芙蓉詩云夏揺比翼扇傅毅扇銘曰夏則鳳舉鸞鳳通稱故云漢書曰成都侯王商欲避暑従上借明光宫臨淄迎子禮中散就安豐魏志曰陳思王植字子建建安十九年封臨淄侯魏畧云邯鄲淳字子淑注見三巻上趙王後漢書列女傳注㑹稽典録云邯鄲淳字子禮知邯鄲淳又一字子禮也嵇康魏時拜中散大夫王戎封安豐侯皆竹林之友也見晉書美酒含蘭氣甘瓜開蜜筒漢書曰百末旨酒布蘭生晉灼曰布列芬芳若蘭之生筒當作筩蜜筩瓜名陸機𤓰賦曰其種族類則有括樓定桃黄㼐白傳金文蜜筩小青大班𤣥骭素椀貍首虎蟠説文曰筩㫁竹也徒紅切筒通簫也徒㺯切蜜筩者其甘如蜜形如㫁竹故取義焉又筩平聲筒去聲知其當作筩矣寂寥人事屏音并還得隐牆東後漢書曰平原王君公遭亂儈牛自隐時人為之語曰避世牆東王君公和裴儀同秋日裴儀同裴政也北史曰裴政字徳表河東聞喜人也祖邃父之禮南史並有傳政幼聰明博聞强記逹於従政為當世所稱仕梁以軍功封為夷陵侯給事黄門郎江陵平周文聞其忠授員外散騎侍郎引入相府命與盧辯依周禮建六官并撰次朝儀車服器用多遵古禮革漢魏之法事並施行授刑部下大夫轉少司憲隋開皇元年上儀同三司裴儀同有秋日詩大抵詠懐之作子山和之各述其羇旅之情也蕭條依白社寂寞似東臯此子山自喻也曹子建詩曰中野何蕭條晉書曰董京常宿白社中時乞於市寂寞閒靜也楚辭曰野寂寞兮無人阮籍奏記曰將耕東臯之陽秋興賦曰耕東臯之沃壤是也學異南宫敬貧同北郭騷左傳昭七年曰孟僖子病不能相禮及其將死也召其大夫曰我若獲沒必屬説與何忌於夫子使事之而學禮焉以定其位故孟懿子南宫敬叔師事仲尼晏子春秋曰齊有北郭騷者結果網捆蒲葦織屨以養其母猶不足踵門見晏子曰竊説先生之義願乞所以養母者晏子使人分倉廩府金而遺之辭金而受粟有間晏子見疑於景公出奔北郭子召其友而告之曰及親者身伉其難今晏子見疑吾將以身死白之遂造公庭求復者曰晏子天下之賢者也今去齊國齊國必侵矣方必先國之侵也不若死請以頭託白晏子逡巡而退因自殺也公聞之大駭乘馳而自追晏子及至國郊請而反之晏子聞北郭騷之以死白已也太息而嘆曰嬰不肖罪過固其所也而士出身以明之哀哉亦見劉向説苑按信父肩吾奔赴江陵未幾而卒攜母入關蒸蒸色養自喻父死之後學異南宫有母在堂貧同北郭也䝉吏觀秋水萊妻紡落毛莊子有秋水篇史記曰莊子者䝉人也名周甞為䝉漆園吏高士傳曰萊子楚人也當時世亂逃世於䝉山之陽莞萌為牆蓬蒿為室枝木為牀蓍艾為席飲水食菽墾山播種人或言於楚王王於是駕至萊子之門萊子方織畚王曰守國之政願煩先生萊子許之其妻樵還曰妾聞之可食以酒肉者可随而鞭撻可擬以官禄者可随而鈇鉞妾不能為人所制者妻投其畚而走老萊子亦随其妻至於江南而止曰鳥獸之毛可績而衣其遺粒足食也仲尼甞聞其論而蹙然改容焉喻已與其妻皆有隐居之志也小園賦云蓬頭王霸之子椎髻梁鴻之妻即此意也時子山老幼皆在長安矣旅人嗟嵗暮田家厭作勞杜預左傳注曰旅客也不得歸故嗟嵗暮也楊惲報孫㑹宗書曰田家作苦嵗時伏臘烹羊庖羔斗酒自勞霜天林木燥秋氣風雲高張協七命曰風高送秋曺植秋思賦曰雲高氣靜露凝衣栖皇終不定方欲涕沾袍詠園花暫住春園傍聊過看果行枝繁類金谷花雜映河陽水經注曰金谷水出河南太白原東南流歴金谷謂之金谷水經石崇故居石季倫思歸引序云河陽别業晉書曰潘岳為河陽令滿縣皆栽桃花自紅無假染真白不須粧言花有自然之色不須粧染也崔豹古今注曰燕支花非燕支所染自為紅藍爾舊謂赤白之間為紅今所謂紅藍也燕送歸菱井蜂銜上蜜房言此花燕送歸巢在於梁上蜂銜作蜜乃上窠中也燕𤣥鳥也菱井若藻井也西京賦曰蔕倒茄於藻井薛綜注云藻井當棟中交木方為之如井幹也善云風俗通曰今殿作天井井者東井之象也菱水中之物皆所以厭火也蜀都賦曰蜜房郁毓被其阜翰曰蜜房蜜窠房也非是金爐氣何關柏殿香言花有自然香氣也司馬相如美人賦曰金爐薰香三輔舊亊曰柏梁以香柏為梁也裛衣偏定好應持奉魏王文字集畧曰裛坌衣香也魏王魏文帝也王子年拾遺記曰魏文帝所愛美人薛靈芸名曰夜來妙於鍼工裁製立成非夜來縫製帝則不服宫中號為鍼神言美人以此花香裛衣是以魏王定好也西門豹廟史記滑稽傳曰戰國魏文侯時西門豹為鄴令豹往到鄴㑹長老問民所疾苦長老曰苦為河伯娶婦豹約諸三老曰為河伯娶婦幸來告語吾欲送女皆曰諾至時三老廷掾賦斂百姓取錢百萬巫覡行里中有好女者咒當為河伯婦以錢三萬聘女沐浴脂粉如嫁狀豹往㑹之三老巫掾與民咸集赴觀巫嫗年七十従十四弟子豹呼婦視之以為非妙令巫嫗入告河伯投巫於河中有頃曰何久也又令三弟子及三老入白並投於河豹罄折曰三老不來奈何復欲使廷掾豪長趣之皆叩頭流血乞不為河伯娶婦淫祀遂斷西門豹即發民鑿十二渠引河水灌民田田皆自溉名聞天下澤流後世水經注曰漳水東北逕西門豹祠前祠東側有碑隐起為字祠堂東頭石柱勒銘曰趙建武中所修也君子為利博達人樹徳深蘋藻由斯薦樵蘇幸未侵言西門豹決渠溉田其利斯溥又能斷兹淫祀是為達人故祠祭至今不絶也左氏傳曰蘋蘩蕰藻之菜可薦於鬼神杜預曰蘋大蓱也藴藻聚藻也爾雅釋草云萍蓱其大者蘋郭璞曰水中浮蓱江東謂之藻陸機毛詩義疏云今水上浮蓱是也季春始生可糝蒸為茹又可苦酒淹以就酒許慎説文云藻水草陸機疏云生水底有二種其一種葉如雞蘇莖大著長四五尺其一種莖大釵股葉如蓬謂之聚藻煑熟挼去腥氣米麫糝蒸嘉美揚州人饑荒可以當穀食鄭康成注庖人云備品物曰薦史記淮隂侯傳曰樵蘇後爨注云漢書音義曰樵取薪也蘇取草也言後人念其功徳不敢樵蘇於其上故廟貌常新也恭聞正臣一作直祀良識佩韋心正臣謂豹也韓子曰西門豹性急佩韋以自緩董安於性緩佩弦以自急也容範雖年代徽猷若可尋菊花隨酒馥槐影向牕臨西京雜記曰九月九日飲菊花酒説文曰馥香氣芬馥也聲房六切爾雅曰櫰槐大葉而黒守宫槐葉晝聶宵炕郭云槐樹葉大色黒者名為櫰槐葉晝日聶合而夜炕布者名為守宫槐聶音輒炕吁郎切張也鶴飛疑逐舞魚驚似聴琴王逸楚辭注曰師曠鼓琴天下𤣥鶴皆銜明月之珠以舞也韓詩外傳曰昔伯牙鼓琴而淵魚出聴言廟中飛鶴似逐舞而來逰魚若聴琴而出象生時也漳流鳴磴石銅雀影秋林史記河渠書曰西門豹引漳水溉鄴括地志曰漳水一名濁漳水源出潞州長子縣西力黄山漢書地理志曰濁漳水出長子鹿谷山東至鄴入清漳水經注曰魏武王堨漳水廻流東注號天井堰里中作十二墱墱相去三百歩令互相灌注一源分為十二流皆懸水門左思魏都賦謂墱流十二同源異口者也魏志曰建平十五年冬作銅雀䑓水經注曰魏武以郡國之舊引漳流自城西東入逕銅雀臺下伏流入城東注謂之長明溝溝水南北夾道枝流引灌所在通溉故魏武登臺賦曰引長明灌街里謂此渠也和王少保遥傷周處士周處士者梁故處士周𢎞讓也南史曰𢎞讓性簡素博學多通始仕不得志隐於句容之茅山頻徴不出晚仕侯景為中書侍郎人問其故對曰昔道正直得以禮進退今乾巛易位不至將害於人吾畏死耳獲譏於代承聖初為國子祭酒至仁威將軍城句容以居之命曰仁威壘按讓既仕侯景又仕梁元不得復稱處士所以云者信為金陵舊臣讓本句容處士得稱其故子山之志也少保王褒也周書王褒傳曰東宫既建授太子少保褒與梁處士周𢎞讓相善及𢎞讓兄𢎞正自陳來聘高祖許褒等通親知音問褒贈𢎞讓詩并致書𢎞讓亦復書焉周處士卒於陳信與褒在周作詩遥傷之也冥漠爾逰岱淒涼余向秦雖言異生死同是不歸人岱泰山也博物志曰泰山冇天孫主招魂逰岱者言其死也信聘西魏身留長安是為向秦言已與周處士一死一生同是不歸之人也昔余仕冠葢值子遊風塵言已仕梁時正𢎞讓隐居茅山之日也西都賦曰冠葢如雲陸士衡詩曰京洛多風塵素衣化為緇望氣求真隐伺關待逸民列異傳曰老子西逰關令尹喜望見其紫氣浮關而老子果乘青牛而過史記曰老子見周之衰遂去至關關令尹喜曰子將隐矣彊為我著書於是老子乃著書上下篇言道徳之意忽聞泉石友芝桂不防身傷𢎞讓之死也泉石喻隐者也謝宣城别傳曰眺常有言烟霞泉石惟隐遯者得之宦逰而癖此者鮮矣芝桂不防身者言隐士死如芝草之焚桂枝之落也悵然張仲蔚悲哉鄭子真三輔决録注曰張仲蔚扶風人也與同郡魏景卿隐身不仕所居蓬蒿沒人漢書曰谷口有鄭子真脩身自保成帝時元舅大將軍王鳳以禮聘子真子真遂不詘而終師古曰三輔決録云子真名樸三山猶有鶴五栁更應春漢書曰蓬萊方丈瀛洲此三神山者仙人在焉晉書曰陶潛字淵明著五栁先生傳以自況云宅邊冇五栁因以為號遂令従渭水投弔往江濵史記曰自屈原沉汨羅後百冇餘年漢冇賈生為長沙王太傅過湘水投書以弔屈原渭水言已在長安江濵言讓居江表遥傷之也説文曰濵水際也傷王司徒褒周書曰王褒字子淵瑯邪臨沂人也初仕梁元帝出降褒與衆俱出後至長安太祖喜之甚荷恩盼㤀其羇旅焉周世宗即位篤好文學時褒與庾信才名最高特加親待授太子少保遷小司空出為宜州刺史卒於位時年六十四信傷之故作是詩昔聞王子晉輕舉逐神仙王氏本周靈王太子晉之後汲冢周書曰靈王太子晉幼有盛徳聰明博達師曠與言弗能尚也晉年十五顧而問曰吾聞太師能知人年之短長也師曠對曰汝色白汝聲清汗火色不夀晉曰然吾後三年時上賔於帝女慎無言殃將及女其後二年而太子死孔子聞之曰惜夫殺吾君也世人以其豫自去期故傳稱王子喬仙仙之後其嗣避周難於晉家於平陽王氏田氏其後子孫世喜養性神仙之術潛夫論風俗通亦云是矣王氏又一源出於齊王法章是為陳田之後本媯姓與此為異也謂言君積善還得嗣前賢君謂王褒也言褒為子晉後裔又能積善宜得神仙度世之術也易曰積善之家必有餘慶四海皆流寓非為獨播遷北史庾信傳曰陳氏與周通好南北流寓之士各許還其本國惟信及褒並惜而不遣言人生如寄四海之内皆為流寓何必離家始為播遷也又按梁已禪陳信褒即歸已非故國是以羇北歸南總為流寓也豈意中台坼君當風燭前晉陽秋曰張華將死中台星坼大元中復還今正太傅謝安為相所致也淮南子曰人生於世倏爾而止如風火之燭自君鐘鼎族江東三百年言王之先也王氏之族一出太原一出瑯邪褒為瑯邪臨泝人葢瑯邪王氏族也按王褒先世見於晉宋齊梁諸書南北史本傳所載自漢諫議大夫吉之後至晉太保王祥祥弟覽覽生六子長子裁晉撫軍長史裁子導晉丞相諡曰文獻導六子其第二子洽晉中領軍洽子珣晉司徒珣子𢎞宋太保𢎞弟曇首宋光祿大夫豫寧文侯曇首子僧綽宋吏部尚書贈金紫光禄大夫諡曰愍侯僧綽子儉齊侍中南昌文憲公儉子騫梁侍中金紫光禄大夫南昌安侯騫子規梁侍中左民尚書南昌章侯規即褒父也並有盛名於江左晉書曰初吕䖍有佩刀工相之以為必登三公可服此刀䖍謂祥曰茍非其人刀或為害卿有公輔之量故以相與祥固辭强之乃受祥臨薨以刀授覽曰汝後必興足稱此刀覽後奕世多賢方興於江左矣張衡西京賦曰撃鐘鼎食郭璞曰江表偏王三百年還與中國合江東謂南朝也自東晉至宋齊梁王業幾三百年而王氏之族冠葢極盛也寶刀仍世載琱戈本舊傳寶刀謂王祥佩刀也祥以與弟奕世傳之代為公卿是世載也注見上文穀梁傳曰孟勞者魯之寶刀也王制曰諸侯賜弓矢然後專征伐按晉書王導平王敦輔幼主加羽葆鼓吹班劔二十人詔加大司馬假黄鉞出討石勒石季龍是其征伐之事如古彤弓之賜矣説文曰琱治玉也一曰石似玉聲都寮切綠紱紆槐綬黄金飾侍蟬漢書曰相國丞相皆秦官金印紫綬高帝相國綠綬徐廣曰金印綠綟綬綟音戾革名也以染似綠又云似紫紫紫綬名緺緺音𤓰其色青紫綟字亦作盭音同也後漢書輿服志曰古者君臣佩玉尊卑有度上有韍貴賤有殊佩所以章徳服之衷也韍所以執事禮之共也三代同之五伯迭興戰爭不息於是解去韍佩留其係璲以為章表秦乃以采組連結於璲光明章表轉相結綬故謂之綬注云徐廣曰韍如巾蔽膝也周官曰三槐三公位焉槐綬謂三公之綬也綠紱紆槐綬者王導為晉丞相也後漢書輿服志曰侍中中常侍加黄金璫附蟬為文貂尾為飾謂之趙恵文冠侍蟬謂侍中之冠飾以蟬也黄金飾侍蟬者謂王儉儉子騫騫子規皆為侍中也地建忠臣國家開孝子泉言王氏世以忠孝相傳也建國如豫寧南昌之屬皆王氏封域也注見上文家開孝子泉疑引王祥卧冰事見晉書及搜神記後漢書曰姜詩事母至孝妻奉順尤篤母好江水嗜魚鱠舍側忽有湧泉味如江水每旦輒出雙鯉魚焉自能枯木潤足得流水圓荀子曰玉在山而木潤尸子曰凡水其圓折者有珠以君承祖武諸侯無間然謂褒襲南昌侯之爵人無間言也青衿巳對日童子即論天言褒幼而聰敏也後漢書曰黄琬字公琰少失父母而辯慧祖父瓊育之瓊初為魏郡太守建和元年正月日蝕京師不見而瓊以狀聞梁太后詔問所食多少瓊思其對而未知所出琬年七嵗在傍曰何不言日蝕之餘如月之初瓊大驚即以其對應詔晉書曰明帝幼而聰哲為元帝所寵異年數嵗甞坐置膝前屬長安使來因問帝曰汝謂日與長安孰逺對曰長安近不聞人従曰邊來居然可知也元帝異之明日宴羣僚又問之對曰日近元帝失色曰何乃異間者之言乎曰舉頭見日不見長安由是益竒之博物志曰孔子東逰見二小兒曰日初出時大如車葢及日中時如盤盂此不為高逺者小而近者大乎一小兒曰日初出滄滄涼涼及其中而探湯此不為近者熱而逺者涼乎孔子不能決謂兩小兒曰孰謂汝多知乎事出列子潁隂珠玉麗河陽脂粉研言褒尚公主也褒本傳云梁武帝喜其才藝遂以弟鄱陽王恢之女妻之後漢書曰順帝女堅七年封潁隂長公主郡國志曰潁隂縣屬潁川郡漢書外戚傳曰趙皇后少壯屬河陽主家學歌舞號曰飛燕帝㣲行過主見而説之褒所尚王女也以梁武愛褒之才妻以其弟鄱陽王女若帝女也故借引公主之事矣名高六國共價重十城連史記曰蘇秦佩六國相印又曰秦王欲以十五城易趙和氏璧辯足觀秋水文堪題馬鞭莊子有秋水篇陸劌鄴中記曰魏文帝云余従上拜墳墓遵渭水徜徉乎高樹下駐馬書鞭為臨濁賦題都年切説文曰走頓也迴鸞抱書字别鶴繞琴弦索靖草書狀曰葢草書之為狀也婉若銀鉤漂若驚鸞舒翼未發若舉若安蔡邕琴操曰商陵牧子娶妻五年無子父兄欲為改娶牧子援琴鼓之歌别鶴以舒其憤懣故曰别鶴操擁旄裁甸服垂帷非被邊爾雅曰旄謂之藣郭注云旄牛尾也又釋旌旂云注旄首曰旌郭云載尾於竿頭如今之幢亦有旒疏云李巡曰旄牛尾著竿首孫炎曰折五采羽注旄上也其上亦有旒縿禹貢曰五百里甸服孔安國傳曰規方千里之内謂之甸服為天子服治田去王城面五百里周語文王制亦云千里之内曰甸鄭康成云服冶田出穀税也言甸者主治田故服名甸也甸田遍反説文曰在旁曰帷後漢書曰賈琮為冀州刺史車垂赤帷而行及至州自言曰刺史當逺視廣聴何反垂帷於車以自掩蔽乃命御者褰去其帷擁旄裁甸服者按元帝紀自侯景之難州郡大半入魏自巴陵至建康緣以長江為限荆州界武寜西拒峽口自嶺以南復為蕭勃所據文軌所同千里而近人籍户口不盈三萬中興之盛盡於此矣言梁地侵削旌旄所擁裁及甸服之地也垂帷非被邊者按褒仕元帝時為尚書左僕射在於江陵非邊逺之地帝性猜忌褒在左右不足舒其所長也靜亭空繫馬閒烽直起煙言魏師之至也後漢書光武紀曰築亭候舉烽燧注云亭候伺候望敵之所前書曰秦法十里一亭亭有長漢因之不改前書音義曰邊方備警急作高土臺臺上作桔臯桔臯頭有兠零以薪草置其中常低之有寇即燃火舉之以相告曰烽又多積薪寇至即燔之望其煙曰燧晝則舉烽夜乃舉燧廣雅曰兠零籠也梁與西魏久無兵革之事故曰靜亭閑烽靜亭空繫馬者言其不備不虞也閒烽直起煙者言魏師忽至舉烽相告也不廢披書案無妨坐釣船言江陵亡後褒卒仕於周也按元帝紀魏人燒柵王褒勸帝出降遂使皇太子王褒出質請降左僕射王褒以下並為俘以歸長安不廢披書案者言褒文士不嫺武畧也無妨坐釣船者按史記吕尚以漁釣奸周西伯魏相安定公周之太祖如古西伯矣王褒之坐釣船庾信之餐周粟也茂陵忽多病淮陽實未痊言褒之疾病也漢書司馬相如傳曰相如既病免家居茂陵又汲黯傳曰黯多病且滿三月上常賜告者數不瘉後以諸侯相秩居淮陽十嵗而卒侍醫逾黙黙神理遂綿綿漢書藝文志曰侍醫李柱國校方技注醫學書也世説戴公見林法師墓曰神理綿綿不與氣運俱盡耳永别張平子長埋王仲宣後漢書曰張衡字平子南陽西鄂人也年六十二永和四年卒著周官訓詁所著詩賦銘七言靈應間七辯巡誥懸圖凡三十三篇崔瑗稱平子曰數術窮天地制作侔造化禰衡弔張衡文云余今反國命駕言歸路由西鄂道弔平子魏志曰王粲字仲宣山陽高平人也善屬文舉筆便成無所改定時人常以為宿搆著詩賦論議垂六十篇建安二十一年從征吴二十二年春道病卒時十年四十一曺子建王仲宣誄曰建安二十一年正月二四日戊申魏故侍中關内侯王君卒言褒之文學如二公也柏谷移松樹陽陵買墓田晉書曰王濬葬柏谷山漢書李廣傳曰李蔡以丞相詔賜冢地陽陵當得二十畆陜路秋風起寒堂已颯焉説文曰颯翔風也聲蘇合切丘楊一揺落山火即時然本草曰白楊北土極多人種墟墓間樹大皮白山火鬼火也説文曰然燒也昔為人所羨今為人所憐漢成帝時歌謡曰桂樹華不實黄爵巢其顛昔為人所羡今為人所憐世途旦復旦人情𤣥又𤣥説文曰旦明也老子曰𤣥之又𤣥衆妙之門故人傷此别留恨滿秦川隴頭歌有遥望秦川肝腸斷絶之句庾信王褒皆南人羇士生離之後繼以死别故多留恨矣定名於此定全徳以斯全世途旦復且至全徳以斯全言世代既已移易人情總歸𤣥虚似此生死之際思及平生若使定名者名亦於此而定矣全徳者徳且以斯而全矣微意以為我兩人於進退之間其名辱矣有慙徳矣是其愧心之辭也惟有山陽笛悽余思舊篇向秀思舊賦序曰余與嵇康吕安舍止接近其人並有不羈之才其後各以事見法余逝將西邁經其舊廬於時日薄虞淵寒冰淒然鄰人有吹笛者發聲寥亮追思曩昔遊宴之好感音而歎故作賦云其辭曰經山陽之舊居信因此作思舊銘故云漢書地理志云河内郡有山陽縣仰和何僕射還宅懐故紫閣旦朝罷中臺夕奏稀晉書曰漢書尚書為中臺無復千金笑徒勞五日歸鮑照詩曰千金顧笑買芳年漢書萬石君傳曰每五日洗沐歸謁親文穎曰郎官五日一下又張安世傳曰休沐未甞出步簷朝未掃蘭房晝掩扉宋玉諷賦曰乃更於蘭房之室苔生理曲處網積廻文機張景陽雜詩曰房櫳無行跡庭草萋以綠青苔依空牆蜘蛛網四屋感物多所懐沉憂結心曲李善注云淮南子曰窮谷之洿生以蒼苔説文曰鼅鼃蝥也魏文帝詩曰蜘蛛繞户牖野草當階生論衡曰蜘蛛結絲以網飛蟲人之用計安能過也晉書載記曰竇韜妻蘇若蘭織錦端中作迴文詩以贈之故瑟餘絃斷歌梁秋雁飛韓娥去齊餘響繞梁三日故曰歌梁朝雲雖可望夜帳定難依宋玉高唐賦云故為立廟號曰朝雲願憑甘露入方假慧燈輝瑞應圖曰露色濃者為甘露寧知洛城晩還淚獨沾衣傷已獨不能還也本傳拜洛州刺史故云􅏖城送靈法師葬従英華作靈一作炅法師龍泉今日掩石洞即時封玉匣摧談柄懸河落辯鋒吕氏春秋曰含珠鱗施今葬皆用之注云含珠口實鱗施施玉匣於死者之體如魚鱗西京雜記曰漢帝送死皆珠襦玉匣世説云郭子𤣥辯若懸河香爐猶是柏麈尾更成松松柏墓上樹也故世説稱張湛好於齋前種松柏時人謂張屋下陳屍今云法師墓上柏似香爐松如麈尾若平生時也世説云王長史病篤寢卧燈下轉麈尾視之嘆曰如此人曾不得四十及亡劉尹臨殯以長柄麈尾著柩中因慟絶郭門未十里山迴已數重尚聞香閣梵猶聴竹林鐘送客風塵擁寒郊霜露濃性靈如不滅神理定何従隋書經籍志稱佛經所説云人世雖有生死之異至于精神則恒不滅此身之前則經無量身矣積而修習精神清淨深見佛性以成至道神理注見上篇傷王司徒褒和春日晩景宴昆明池西京雜記曰武帝作昆明池欲伐昆明彝教習水戰因而于上游戲養魚魚給諸陵廟祭祀餘付長安市賣之周迴四十里三輔黄圖曰甘泉宫南有昆明池春餘一作餘春足光景趙李舊經過漢書谷永傳曰成帝數微行近幸小臣趙李従微賤專寵又阮籍詩曰平生少年時輕薄好絃歌西逰咸陽中趙李相經過葢指是事顔延年注云趙漢成帝趙飛燕李漢武帝李夫人也上林栁腰細新豐酒徑多上林苑名西京雜記曰太上皇徙長安居深宫悽愴不樂高祖竊因左右問其故以平生所好皆屠販少年酤酒賣餅鬬雞蹴鞠以此為懽今皆無此以故不樂高祖乃作新豐徙諸故人以實之太上皇乃悅小船行釣鯉新盤待摘荷蘭臯徒税駕何處有陵波曹植洛神賦曰爾乃税駕於蘭臯又云陵波微歩羅韈生塵對宴齊使周書武帝紀曰天和四年夏齊遣使來聘歸軒下賔館送蓋出河堤酒正離杯促歌工别曲悽周禮有酒正之官杜預左傳注曰工樂師也林寒木皮厚沙迴雁飛低漢書􅏯錯曰夫育貉之地積隂之處也木皮三寸其性耐寒崔豹古今注曰雁自河北渡江南瘦瘠能高飛不畏矰繳江南沃饒每至還河體肥不能高飛按子山昔在梁時聘於東魏文章辭令甚為鄴下所稱北齊本東魏所禪遣使聘周子山對宴齊使自傷顔之厚矣有如木皮又似鎩翮之雁不能高飛也故人儻相訪知余已執珪史記曰莊舄故越之細鄙人也為楚執珪病而猶尚越聲漢書曹叅傳曰擄秦司馬及御史各一人遷為執珪如淳曰吕氏春秋得五員者號執珪古爵也子山鄉關之思屢動越吟聘魏仕周有如秦擄言齊地舊相識者儻或問余知余今已執珪矣葢自慙語也聘齊秋晩館中飲酒天和四年夏齊遣使來聘遣子山報聘當在秋矣欣兹河朔飲對此洛陽才後漢書曰袁紹公孫瓚相撃天子遣太僕趙岐和解關東使各罷兵瓚因此以書譬袁紹於是引軍南還三月上已大㑹賔徒於薄落津按河北青兗冀諸州瓚紹所據故稱河朔飲也魏志云沮授說紹曰將軍撮冀州之衆威震河朔史記曰賈生名誼洛陽人也潘岳西征賦云賈生洛陽之才子按東魏本従洛遷都鄴地齊受魏禪故於齊之諸臣稱為洛陽才也殘秋欲屏扇餘菊尚浮杯班婕妤咏紈扇詩云常恐秋節至涼風奪炎熱捐棄篋笥中恩情中道絶西京雜記曰九月九日飲菊花酒令人長夀菊花舒時并採莖葉雜黍米釀之至來年九月九日始熟就飲焉故謂之菊花酒按此二語聘齊當在秋深矣屏必郢切漳流鳴二水日色下三臺史記河渠書曰西門豹引漳水溉鄴以富魏之河内正義曰括地志云漳水一名濁漳水源出潞州長子縣西力黄山漢書地理志曰濁漳水出長子谷鹿山東至鄴入清漳此言二水葢謂濁漳凊漳也鄴中志曰魏武帝於漳水立三臺中名銅雀南名金虎北名冰井左思賦曰列三臺以崢嶸是也無因侍清夜同此月徘徊曹子建公宴詩曰清夜西園逰奉和濬池初成清晨臨汎王褒集冇𤣥圃濬池臨汎奉和千金高堰合百頃浚源開楊佺期洛陽記曰千金堰在洛陽城西去城三十五里堰有穀水䲧沈休文湖中雁詩云高出千金堰周易曰井渫不食鄭康成云謂已浚渫也浚源謂濬池也百畝為頃百頃謂池有百萬畝之廣也翻逢積翠一作草浪更識昆明灰高僧傳曰昔漢武帝穿昆明池底得黒灰問東方朔朔曰可問西域梵人後竺法蘭既至衆人追問之蘭云世界終盡劫火洞燒此灰是也朔言有驗矣猿嘯風還急雞鳴潮即來神異經曰沃淑山有玉雞玉雞鳴則金雞鳴金雞鳴則石雞鳴石雞鳴則天下之雞悉鳴潮水應之矣述異記曰伺潮雞潮水上則鳴孫綽望海賦云石雞清響而應潮是也時看青雀舫遙逐桂舟迴穆天子傳曰天子乘鳬舟郭注云舟為鳬形今之青雀舫即其遺象也楚辭沛吾乘兮桂舟和靈法師逰昆明池二首靈法師一作炅漢書武帝紀曰元狩三年穿昆明池臣瓚曰西南彝傳有越巂昆明國有潢池方三百里漢使求身毒國而為昆明所閉欲伐之故作昆明池象之以習水戰在長安西南周迴四十里上篇送靈法師葬當在後此篇和靈法師詩當在前知成集之日其叙題錯落多不詮次類是矣逰客重相歡連鑣出上蘭説文曰鑣馬銜也聲補嬌切顔師古漢書注曰上蘭觀名在上林中值泉傾葢飲逢花駐馬看孔叢子曰程生反自郯遭孔子於途傾葢而顧相語終日甚相親也平湖汎玉軸高堰歇金鞍郭璞方言注曰今江東人呼枻為軸張華詩云青葢被金鞍半道聞荷氣中流覺水寒秋光麗晩天鷁舸汎中川漢書音義曰鷁水鳥也畫其象於船首方言曰南楚江湖船大謂之舸密菱障浴鳥高荷沒釣船碎珠縈㫁菊殘絲繞折蓮落花摧斗一作十酒栖烏送一絃曹子建名都篇曰美酒斗十千古樂府有烏栖曲高士傳曰孫登彈一絃琴見逰春人長安有狹邪金穴盛豪華樂府長安有狹邪行曰長安有狹邪狹邪不容車後漢書光武郭皇后傳曰郭况遷大鴻臚帝數幸其第㑹公卿諸侯親家燕賞賜金錢縑帛豐盛莫比京師號况家為金穴連盃勸上馬亂果擲行車晉書曰潘岳美姿儀少時常挾彈出洛陽道婦人遇之者皆連手縈繞投之以凰遂滿車而歸深紅蓮子豔細錦鳯凰花那能學噀酒無處似欒巴神仙傳曰欒巴為尚書正朝大㑹巴獨後到又飲酒西南噀之有司奏巴不敬詔問巴巴頓首謝曰臣本縣成都市失火臣故因酒為雨以滅火詔即以驛書問成都成都答言正旦大失火食時有雨従東北來火乃息雨皆酒臭後忽一日大風天霧晦暝對坐皆不相見失巴所在問之其日還成都與親友别也别周尚書一作處士非𢎞正南史云周𢎞正字思行汝南安成人也元帝時為左户尚書魏平江陵𢎞正遯歸建業太平元年為都官尚書陳武帝授太子詹事天嘉元年遷侍中國子祭酒往長安迎宣帝三年自周還廢帝嗣位領都官尚書總知五禮事宣帝太建二年授尚書右僕射按陳武帝天嘉元年周明帝之武成二年也天嘉三年周武帝之保定二年也𢎞正以周武成二年至長安保定二年還陳故贈别云一作處士知其非者按處士乃𢎞正之弟周𢎞讓非𢎞正也知其誤矣扶風石橋一作天柱北函谷故關前此中一分手相逢知㡬年漢書地理志曰右扶風故秦内史武帝建元六年分為右内史太初元年更名主爵都尉為右扶風又云右扶風渭城故咸陽蘇林曰渭橋在長安三里跨渭水為橋函谷谷名因谷以名關舊在𢎞農湖城縣漢書楊僕為樓船將軍恥居關外武帝乃為徙於新安故關𢎞農湖城之關也地理志云𢎞農故秦函谷關衙山嶺下谷是也言𢎞正在周將欲南還已在長安之地别故人也黄鵠一反顧徘徊一作戀應愴然自知悲不已徒勞減瑟絃晉書樂志淮南王篇云願為雙黄鵠還故鄉還故鄉入故里徘徊故鄉苦身不已繁歌奇舞無不泰徘徊桑梓遊天外傷已不能歸故鄉也漢書郊祀志曰泰帝使素女鼔五十絃瑟瑟悲帝禁不止故破其瑟為二十五絃别張洗馬樞别席慘無言離悲兩相顧君登蘇武橋我見楊朱路漢書曰蘇武使匈奴二十年不降還為典屬國淮南子曰楊子見逵路而哭之為其可以南可以北傷其本同而末異也按張洗馬當是南朝人與子山同為羇士周陳通好之時南北流寓之士各許還其本國子山留而不遣故贈别焉言我兩人離别君如蘇武得遇南歸我若楊朱終悲岐路也關山負雪行河水乘冰渡言北地苦寒歸心之急也願子著朱鳶知余在𤣥菟後漢書曰交趾女子嫁為朱鳶人詩索妻反光武遣伏波將軍馬援討之郡國志交州交趾郡朱鳶縣是又幽州𤣥菟郡武帝置洛陽東北四千里即高句驪也朱鳶南之極𤣥菟北之極别庾七入蜀峻嶺拂陽烏長城連蜀都春秋元命苞曰陽成於三故日中有三足烏蜀都賦曰羲和假道於峻岐陽烏迴翼於高標又曰長城谿險石銘懸劒閣沙洲聚陣圖水經注曰小劒去大劒飛閣通衢謂之劒閣張孟陽著劒閣銘晉書曰初諸葛亮造八陣於魚復平沙上累石為八行相去二丈桓温見之曰此常山蛇勢也山長半股折樹老半心枯由來兄弟别共念一荆株吴圴續齋諧記曰京兆田真兄弟三人共議分財生貲皆平均惟堂前一株紫荆樹共議欲破三片明日欲截之其樹即枯死狀如火然真往見之大驚謂諸弟曰樹本同株聞將分斫所以顦顇是人不如木也因悲不自勝不復解樹樹應聲榮茂兄弟相感合財寶遂為孝門真仕至太中大夫陸機詩云三荆懽同樹是也將命使北始渡瓜步江隋志江都六合冇瓜步山述異記曰水際謂之步瓜步在吴山吴人賣𤓰於江畔因以名焉吴楚之間謂浦為步語之訛耳鮑照瓜步山楬文其畧曰鮑子辭吴客楚指兗歸揚道出關津升高問途北眺氊鄉高曬炎國分風代川揆氣閩澤瓜步山者亦江中眇小山也校尉始辭國樓船欲渡河漢書鄭吉傳曰自張騫通西域李廣利之後初置校尉又楊僕傳曰南越反拜楊僕為樓船將軍輴軒臨磧岸旌節映江沱尚書孔安國注曰泥乘輴説文曰軒曲輈藩車聲虚言切又曰磧水陼有石者聲七迹切爾雅曰注旄首曰旌史記索隐注曰節使者所擁也釋名曰節毛上下相重取象竹節詩召南云江有沱毛傳曰沱江之别者鄭箋曰岷山道江東流為沱觀濤想帷葢爭長憶干戈枚乘七發曰海水上潮其少進也浩浩溰溰如素車白馬帷蓋之張左傳哀十三年夏公㑹單平公晉定公吴夫差於黄池秋七月辛丑盟吴晉爭先吴人曰於周室我為長晉人曰於姬姓我為伯趙鞅呼司馬寅曰日旴矣大事未成二臣之罪也建鼔整列二臣死之長幼必可知也對曰請姑視之反曰肉食者無墨今吴王有墨國勝乎太子死乎且彝徳輕不忍久請少待之乃先晉人雖同燕市泣猶聴趙津歌史記曰荆軻嗜酒日與屠狗及高漸離飲酒於燕市酒酣以往高漸離撃筑荆軻和歌於市中相樂也已而相泣旁若無人及使秦太子丹送之至易水之上既祖取道高漸離撃筑荆軻和而歌為變徴之聲士皆垂淚涕泣劉向列女傳曰趙津女娟者趙河津之女趙簡子之夫人也初簡子南擊楚與津吏期簡子至津吏醉卧不能渡簡子欲殺之娟持檝而走簡子曰女子走何為對曰津吏息女妾父聞主君來渡不測之水恐風波之起水神動駭故禱祝九江三淮之神供具備禮御釐受福不勝玉祝杯酌餘瀝醉至於此君欲殺之妾願以鄙軀易父之死簡子曰非女子之罪也娟曰主君欲因其醉而殺之妾恐其身之不知痛而心不知罪也若不知罪殺之是殺不辜也願醒而殺之使知其罪簡子曰善遂釋不誅簡子將渡用檝者少一人娟攘巻操檝而請曰妾願備父持檝簡子曰不榖將行選士大夫齋戒沐浴誓不與婦人同舟而渡也娟對曰妾聞昔者湯伐夏左驂牝驪右驂牝靡而遂放桀武王伐殷左驂牝騏右驂牝驥而遂克紂至於華山之陽主君不欲渡則已與妾同舟又何傷乎簡子悦遂與渡中流為簡子發河激之歌其辭曰升彼阿兮面觀清水揚波兮杳㝠㝠禱求福兮醉不醒誅將加兮妾心驚罰既釋兮瀆乃清妾持檝兮操其維蛟龍助兮主將歸呼來櫂兮行弗疑簡子大悦曰昔者不穀夢娶妻豈此女乎使人祝祓以為夫人娟乃再拜而辭曰夫婦人之禮非媒不嫁嚴親在内不敢聞命遂辭而去簡子歸乃納幣於父母而立以為夫人君子曰女娟通逹而有辭詩云來遊來歌以矢其音此之謂也反命河朔始入武州隋書地理志曰下邳郡下邳梁曰歸政置武州輕車初逐李定逺未随班英書曰李廣従弟蔡武帝元朔中為輕車將軍従大將軍撃右賢王有功中率封為安樂侯後漢書曰班超使西域通三十六國明帝永元七年封定逺侯受詔祁連反申威疎勒還漢書曰霍去病至祁連山捕首虜甚多上曰驃騎將軍涉鈞耆濟居延遂臻小月氏攻祁連山楊武乎鱳得得單于單桓酋塗王及相國都尉以衆降下者二千五百人可謂能舍服知成而止矣師古曰祁連乃天山也匈奴呼天為祁連漢書西域傳曰疏勒國治疏勒城去長安九千三百里後漢書云耿恭引兵據疏勒城漢遣兵迎校尉遂歸飛蓬損腰帶秋鬢落容顔寄言舊相識知余生入關後漢書班超上疏曰臣不敢望到酒泉但願生入玉門關冬狩行四韻連句應詔三川羽檄馳六郡良家選韋昭曰三川河伊洛也史記陳豨傳上曰吾以羽檄徴天下兵注云魏武奏事曰今邊有少警輒露檄挿羽飛羽檄之意也裴駰曰推此言則以鳥羽檄書謂之羽徼取其急速若飛鳥也後漢書百官志曰羽林郎掌宿衛侍従常選漢陽隴西安定北地上郡西河凡六郡艮家補本武帝以便馬従獵還宿殿陛巖下室中故號巖郎觀兵細栁城校獵長楊苑三輔黄圖曰細栁觀在長安西北三輔舊事云漢文帝大將軍周亞夫軍於細栁今呼古徼是也又黄圖曰射熊館在長楊宫武帝好自撃熊司馬相如従上林作賦諫揚雄亦作長楊賦驚雉逐鷹飛騰猿看箭轉鳴笳河曲還猶憶南皮返爾雅曰河百里一小曲千里一曲一直漢書渤海郡南皮縣魏文帝與吴質書曰時駕而遊北遵河曲従者鳴笳以啓路文學記乘於後車又曰毎念昔日南皮之遊誠不可㤀謝靈運擬鄴中詩曰念昔渤海時南皮戲清沚今復河曲遊鳴笳汎蘭汜是也吕向曰魏近河故云河曲䈔笛也笳説文作䈔字同和王内史従駕狩王内史王褒也周書王褒傳曰保定中除内史中大夫冬狩出離宫還過獵武功左氏傳曰春蒐夏苖秋獮冬狩杜預曰狩圍守也冬物畢成獲則取之無所擇也漢書賈山曰起咸陽而西至雍離宫三百師古曰凡言離宫者皆謂於别處置之不常居也漢書地理志曰右扶風武功縣太壹山古文以為終南垂山古文以為敦物皆在縣東澗横偏礙馬山虚絶響弓更嬴承落雁韓盧鬬蟄熊博物志曰更嬴謂魏王曰臣能射為虛發而下鳥王曰然試可於此乎聞有鳥従東來嬴虚發而下之也事出戰國䇿鳥雁也國策作雁又國䇿曰韓盧天下之駿犬也淮南子曰熊羆蟄蔵毛詩草木蟲魚疏云熊能攀緣上樹見人則顛倒自投地而下冬則入穴而蟄始春而出脂謂之熊白羆有黄羆有赤羆大於熊其脂如熊白而麤不如熊白美也猶開三面網誰肯一山重吕氏春秋曰湯見網置四面拔其三面置其一面祝曰欲高者高欲下者下吾取其犯命者漢南聞之歸者四十國入道士館金華開八景玉洞上三危黄庭内經曰兼行形中八景神二十四真出自然陶𢎞景真靈位業圖有八景城吕氏春秋曰水之美者有三危之露高誘曰三危西極山名雲袍白鶴度風管鳳凰吹黄庭内經曰丹景雲袍帶虎符易説曰春有白鶴之雲也漢書音義曰律得風氣而成聲風俗通曰舜作簫其形參差以象鳯翼十管長尺二寸列仙傳曰秦女吹簫作鳳凰鳴曹植樂賦云鳳凰吹笙野衣縫蕙葉山巾篸笋皮楚辭曰荷衣兮蕙帶王逸云蕙香草也漢書曰高帝為亭長以竹皮為冠令求盜之薛治時時冠之及貴常冠所謂劉氏冠也應劭曰以竹始生皮作冠今鵲尾冠是師古曰竹皮笋皮謂笋上始解之籜今亦往往為笋皮中古之遺制也説文云篸差也聲所今切篸疑作糝鄭康成周易覆公餗注云糝謂之餗震為竹竹萠曰筍筍者餗之為菜也兹作篸葢从竹也何必淮南館淹留攀桂枝淮南王安招隐士曰桂樹叢生兮山之幽又云攀援桂樹兮仍淹留奉和永豐殿下言志十首永豐殿下梁故永豐侯蕭撝也北史六蕭撝字智遐武帝弟成安王秀之子也在梁封永豐侯武陵王僭號宗室在蜀惟撝一人尉遲迥入蜀従㢠歸魏仕周歴少保少傅改封蔡陽郡公晉書地理志始安郡有永豐縣立徳齊今古資仁一毁譽左氏傳曰太上有立徳論語曰誰毁誰譽譽平聲無機抱甕汲有道帶經鋤莊子曰子貢南逰於楚反於晉過漢隂見一丈人方將為圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡子貢曰有械於此一日浸百畦用力甚寡而見功多夫子不欲乎為圃者卭而視之曰奈何曰鑿木為機後重前輕挈水若抽數如􅀈湯其名為橰為圃者忿然作色而笑曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胸中則純白不備純白不備則神生不定神生不定者道之所不載也吾非不知羞而不為也説文曰甕汲瓶也音於貢反魏畧曰常林少單貧性好學漢末為諸生帶經鋤其妻嘗自餽餉之林雖在林野其相敬如賔又漢書云兒寛帶經而鋤處下惟名恵能言本姓蘧列女傳曰栁下恵死門人將諡之妻曰夫子之謚宜為恵乎門人従以為謚能言本姓蘧者按下文寵辱慘舒二語疑指蘧伯玉也左傳襄十四年孫氏欲逐獻公見蘧伯玉對曰君制其國臣敢奸之雖奸之庸知愈乎遂行従近關出二十六年寗喜欲納公告蘧伯玉伯玉曰瑗不得聞君之出敢聞其入遂行従近闗出疑此二語能言者也言如栁下恵蘧伯玉者可以無驚寵辱不係慘舒者也未論驚寵辱安知係慘舒老子曰寵辱若驚西京賦曰夫人在陽時舒在隂時則慘此章深慕避世之人身無榮辱不可及也王子從邊服臨卭惜第如言撝在蜀也相如傳曰第俱如臨卭索隠曰第且也如往也師古曰第但也周書本傳曰轉輕車將軍巴西梓潼二郡守及侯景作亂武陵王紀承制領益州刺史是也星橋擁冠蓋錦水照簪裾星橋錦水皆蜀地也水經注曰李冰造橋上應七宿故世祖謂吳漢曰安軍宜在七橋連星間後漢書曰公孫述募敢死五千人以配延岑於市橋注云市橋即七星之一橋也李膺益州記曰沖星橋舊市橋也在今成都縣西南四里譙周益州志曰成都織錦既成濯於江水其文勝於初成他水濯之不如也爾雅曰衱謂之裾方言曰即衣後裾也論文報潘岳詠史答應璩晉書曰潘岳字安仁滎陽中牟人也美姿儀辭藻絶麗尤善為哀誄之文世説曰孫興公云潘文爛若披錦無處不善魏志曰應瑒弟壉以文章顯官至侍中裴松之注云文章叙傳曰應璩字休璉博學好屬文善為書記帳幕參三顧風流盛七輿蜀志諸葛亮上疏曰猥自枉屈三顧臣於草廬之中左傳僖十年云及七輿大夫又襄二十三年云惟魏氏及七輿大夫與之服䖍於僖傳言上軍之輿帥七人屬申生者於襄傳言下軍之輿帥七人屬欒盈者杜預曰七輿官名侯伯七命副車七乘劉炫謂服言是矣此章言撝従武陵王紀在蜀領益州刺史聲名之盛也茫茫實宇宙與善定馮虚言宇宙茫茫天與善人之説為虚也淮南子曰茫茫昧昧従天之道又曰紘宇宙而章三光後漢郎顗傳易曰天道無親常與善人大夫傷魯道君子念殷墟史記太史公曰余聞孔子稱曰甚矣魯道之衰也觀慶父及叔牙閔公之際何其亂也按孔子甞為魯司寇故云大夫尚書大傳曰微子將朝周過殷之故墟見麥秀之此父母之國志動心悲也大夫傷魯道者喻湘東武陵兄弟搆釁亂如叔牙閔公之際也君子念殷墟者喻撝在蜀而蜀亡也周書本傳曰成都為尉遲迥所破撝遂請降許之程鄉既開國安平遂徙居史記曰重黎氏在周程伯休甫應劭曰封為程國伯休甫其字也括地志云安陵故城在雍州咸陽東二十一里周之程邑也漢書地理志曰淄川國東安平孟康曰紀季以酅入於齊今酅亭是也師古曰傅陵有安平故此加東酅音攜按左傳莊三年紀季以酅入於齊紀於是始判杜預曰季紀侯弟酅紀邑在齊國東安平縣齊欲滅紀故季以邑入齊為附庸先祀不廢社稷有奉故書字貴之程鄉既開國者喻撝歸魏仕周封蔡陽郡公是開國也安平遂徙居者喻撝従蜀徙魏武陵滅而永豐封若春秋時紀亾而季存也詎能従小隐終然遊太初晉王康琚反招隐詩曰小隐隐陵藪大隐隐朝市易乾鑿度云太初者氣之始言不能隐於陵藪在此朝市終當遂其初志也此章言蜀亡撝歸於魏也直城風日美平陵雲霧除三輔黄圖曰長安西出第二門曰直城門漢書地理志云平陵屬右扶風來往金張館絃歌許史閭漢書曰功臣之後帷有金氏張氏親近貴寵比於外戚又曰孝宣許皇后元帝母元帝封外祖父廣漢為平恩侯史良娣宣帝祖母也兄恭宣帝立恭已死封恭長子高為樂陵侯左太沖詠史詩云朝集金張館暮宿許史鳳臺迎㺯玉河陽送婕妤仙傳拾遺曰蕭史善吹簫作鸞鳯之響秦穆公有女㺯玉善吹簫公以㺯玉妻之遂教㺯玉作鳳鳴居十數年吹簫似鳯聲鳯凰來止其屋公為作鳯臺夫婦止其上一旦㺯玉乘鳳蕭史乘龍昇天而去秦為作鳳女祠時聞簫聲今洪州西上絶頂有蕭史石仙壇石室及巖屋真像存焉列女傳曰趙飛燕姊娣者成陽侯趙臨之女孝成皇帝之寵姬成帝甞微行出過河陽主樂作上見飛燕而悅之召入宫大幸有女弟復召入俱為婕妤河陽漢書作陽阿五馬遥相問雙童來夾車古詩日出東南隅行曰使君従南來五馬立踟蹰使君遣吏往問此誰家姝又相逢狹路間曰相逢狹路間道路不容車如何兩少年夾轂問君家此章言其歸魏仕周之事也託情忻六學遊目愛三餘六學疑六經詩書禮易春秋也又疑六藝禮樂射御書數也魏畧曰董畧字季真善左氏傳言學當以三餘冬者嵗之餘夜者日之餘隂雨者時之餘覆局能懸記看碑解暗疏魏志曰王粲觀人圍棊局壊粲復為之棊者不信以帊葢局使更以他局為之用相比不誤一道其强記默識如此世説曰魏武過曹娥碑下楊修見碑背上題作黄絹幼婦外孫韲臼八字魏武曰解否答曰解魏武曰卿未可言待我思之行三十里乃曰吾已得吾已得令修别記所知修曰黄絹色絲也於字為絶幼婦少女也於字為妙外孫女子也於字為好韲臼受辛也於字為辭所謂絶妙好辭也魏武亦記之與修同曰我才不及卿乃覺三十里詎甞遊魏冉那時説范㫿史記曰穰侯魏冉者秦昭王母宣太后異父長弟封穰侯相秦魏人范睢自謂張祿先生譏穰侯之伐齊奸説秦昭王昭王於是用范睢免相國令涇陽之屬皆出關又曰范睢為秦相封應侯蔡澤聞應侯任鄭安平王稽皆負重罪於秦應侯内慙蔡澤乃西入秦將見昭王使人宣言以感怒應侯應侯聞之使人召蔡澤澤説應侯稱善以聞秦昭王昭王召見與語大悦之拜為客卿范睢免相池水朝含墨流螢夜聚書羊愔能書人姓名曰𢎞農張芝字伯英高尚不仕善草書精勁絶倫家之衣帛中必先書而後練臨池學書池水盡黒每書云匆匆不暇草人謂為草聖弟昶漢黄門侍郎亦能草今世芝草者多是昶作也晉書曰車𦙍貧不得油夏月囊螢照書讀北史列傳云蕭撝善草書名亞王褒算數醫方咸亦留意所著詩賦雜文數萬言頗行於世武成中明帝令諸文儒於麟趾殿校定經史仍撰世譜撝亦豫焉此章言撝以文學見重於周也興雲榆莢晩燒薙杏花初春秋元命苞曰三月榆莢落月令曰季夏之月大雨時行燒薙行水利以殺草如以熱湯鄭注云薙謂廹也芟草也謂欲稼萊地先難其草草乾燒之至此月大雨流水潦畜其中則草死不復生而地美可稼也薙人掌殺草職曰夏日至而薙之又曰如欲其化也則以水火變之汜勝之書曰杏始華榮輒耕輕土弱土望花落復耕之輒藺之此謂一耕而五穫淮南時則訓曰二月官倉其樹杏按杏花在二月又按周禮五月夏至薙之六月合燒之燒薙當在五六月此云燒薙杏花初者葢謂二月謂興農播榖之初也滮池侵黍稷谷水播菑畬説文曰滮水流貌从水彪省聲皮彪切詩曰滮池北流又説文曰菑不耕田也畬三嵗治田也易曰不菑畬菑側詞切畬以諸切徐鍇曰菑从艸从巛从田田不耕則艸塞之故从巛巛音灾六月蟬鳴稻千金龍骨渠月令曰仲夏之月蟬始鳴孟秋之月寒蟬鳴是五月蟬鼔翼始鳴六月蟬正鳴時稻將熟矣楊佺期洛陽記曰千金堰在洛陽城西三十五里漢書溝洫志曰嚴熊言臨晉民願穿洛以溉重泉以東萬餘頃故惡地誠得水可令畝十石於是發卒萬人穿渠穿得龍骨故名曰龍骨渠括地志云伏龍祠在同州馮翊縣西北四十里故老云漢時自徴穿渠引洛得龍骨其後立祠因以伏龍為名今祠頗有靈驗也含風揺古度防露動林於吴都賦曰松梓古度劉欣期交州記曰古度樹不華而實實従皮中出大如安石榴色赤可食其實中有如蒲梨者取之為粽數日不煑即成蟲如蟻有翼穿皮飛出著屋正黒楚辭曰上葳蕤而防露兮下泠泠而來風戴凱之竹譜曰葢竹所生大抵江東上密防露下疎來風林於竹名吴越春秋曰袁公問於處女吾聞子善劒願一見之女曰吾不敢有所隐惟公試之於是袁公作林於竹竹枝上頡橋末墮地女即㨗末袁公則飛上樹化為白猿吴都賦云其竹則篔簹箖箊是也此章謂撝言志所在以穀稼為事也自憐循短綆方欲問長沮此下皆子山自謂也淮南子曰短綆不可以汲深器小不可盛大非其任也高士傳曰長沮桀溺者不知何許人人也耦而耕孔子過之使子路問津焉長沮曰是知津矣茂陵體猶瘠淮陽疾未祛史記曰司馬相如病免家居茂陵又曰汲黯多病以諸侯相秩居淮陽十嵗而卒翻疑承毒水忽似遇昌葅左氏傳曰晉伐秦秦人毒涇上流師人多死又僖三十年傳曰王使周公閲來聘饗有昌歜杜元凱注云昌歜昌蒲葅也歜在感反周禮鄭注云昌本昌蒲相切之四寸為葅漢陽嗟欲盡咎繇懼忽諸左氏傳曰漢陽諸姬楚實盡之又文五年傳曰楚子爕滅蓼臧文仲聞六與蓼㓕曰臯陶庭堅不祀忽諸杜預曰六與蓼皆臯陶後也傷二國之君不能建徳結援大國忽然而亡此章言已本小材素有隐志況復多病疑承毒水者有若江陵䧟後隨例入關似遇昌葅者本以聘問來秦備物宜饗今久留長安傷梁之宗室蕩然欲盡而梁國亦忽然而亡者也弱齡參顧問疇昔濫吹嘘言已少年在東宫時得備顧問濫竽粟食也齡年也陶潛詩云弱齡寄事外後漢百官志本注曰掌侍左右贊導衆事顧問應對綠槐垂學市長楊映直廬三輔黄圖曰元始中起明堂列槐樹數百行朔望諸生持經書及當郡所出物於此賣買號曰槐市又曰長楊宫在盭厔縣東南三十里漢書音義張宴曰直宿曰廬連盟翻滅鄭仁義反亡徐史記鄭世家曰鄭君乙立二年鄭負黍反復歸韓十一年韓伐鄭取陽城二十一年韓哀侯㓕鄭并其國言負黍之地來歸是連盟也負黍反鄭卒以滅喻侯景以十三州内屬梁卒以之亡也徐嬴姓國春秋徐子章羽奔楚是也徐偃王志曰徐偃王治國仁義著聞欲舟行上國乃導溝陳蔡之間得朱弓矢以為天瑞遂因名為號自稱徐偃王江淮諸侯服従者三十六國周王聞之遣使至楚令伐之偃王愛民不鬬遂為楚敗北走彭城武原縣東山下百姓随者萬數因名其山為徐山山下立石室亦有神靈民人請禱焉徐偃行仁而徐亡以喻梁武佞佛而梁亡也還思建鄴水終憶武昌魚晉書五行志云吴孫皓初童謡曰寜飲建鄴水不食武昌魚寧還建鄴死不止武昌居按建鄴梁武帝所都武昌漢之江夏鄂縣吴曰武昌梁屬郢州本云不食武昌魚今子山羇旅長安建鄴武昌舊都舊國皆可思也又按子山曽為郢州别駕與湘東王論水戰事深為梁主所賞従建鄴至江陵途之所經故武昌為可憶矣此章追述平生時抄撰東宫出入禁闥及侯景内附有如負黍之侵梁武行仁終蹈偃王之轍而已身遭離亂心念鄉關建鄴舊宫似渴江流之水武昌魚味不啻秋風之鱸矣崩堤壓故栁哀社卧寒樗詩曰采荼薪樗草木蟲魚疏云樗樹及皮皆似漆青色其葉臭野鶴能自獵江鷗解獨漁説文曰鷗水鶚也漢隂逢荷篠緇林見杖挐高士傳曰漢隂丈人者楚人也子貢適楚過漢隂見丈人為圃入井抱甕而灌用力甚多而見功寡又曰荷篠丈人不知何許人也論語遇丈人以杖荷篠包曰篠竹器説文作筱芸田器也莊子曰孔子遊乎緇帷之林休坐乎杏壇之上孔子弦歌鼓琴奏曲未丰有漁父者下船而來以聴曲終而招子貢子路二人俱對客指孔子曰有土之君與子貢曰非也侯王之佐與曰非也客乃笑而還行言曰仁則仁矣恐不免其身苦心勞形以危其真嗚呼逺哉其分於道也子貢還報孔子孔子推琴而起曰其聖人與乃下求之至於澤畔方將杖挐而引其船顧見孔子還向而立孔子反走再拜而進言畢乃刺船而去延葦間顔淵還車子路授綏孔子不顧待水波定不聞挐音而後敢乘司馬云挐橈也阮籍甞思酒嵇康懶著書晉書阮籍傳曰籍本有濟世志屬魏晉之際天下多故名士少有全者籍由是不與世事遂酣飲為常魏志曰嵇康文辭壯麗好言老莊而尚竒任俠披林求木實拂雪就園蔬濁膠非鶴髓蘭肴異蟹胥魏都賦曰濁膠如河漢書郊祀志曰先鬻鶴髓楚辭曰蘭肴蒸兮蘭藉釋名曰蟹胥取蟹藏之使骨肉解之胥胥然也野情風月曠山心人事疏徒知守瓴甓空欲報璠璵爾雅曰瓴甋謂之甓郭璞注云㼾甎也今江東呼為瓴甓左氏傳曰季平子卒陽虎將以璵璠斂杜注云璵璠美玉君所佩説文云魯之寶玉也張景陽雜詩云瓴甓夸璠璵瓴甓喻已才如瓦礫也璠璵喻永豐侯才如美玉也意指發於蕭撝子山和之故云報矣以上二章言志意所欲惟是棄絶人間超踰世網追踪嵇阮寄情風月富貴名利非所願也率爾成詠此亦詠懐之作臧榮緒晉書曰阮籍屬文初不苦思率爾便作沈休文有三月三日率爾成篇良曰率爾率疾也昔日謝安石求為淮海人彷彿新亭岸猶言洛水濵宋明帝文章志曰桓温止新亭大陳兵衞呼謝安及王坦之欲於坐害之王入失厝倒執手版汗流霑衣安神姿舉動不異於常舉目徧歴温左右衞謂温曰安聞諸侯有道守在四鄰明公何有壁間著阿堵輩温笑曰正自不能不爾於是莊矜之心頓盡令部左右促燕行觴笑語移日謝安字安石求為淮海人者安本放情丘壑不獲已乃出故云新亭桓温止處晉都洛陽在洛水之濵也濵水際也桓温新亭陳兵將移晉室安石得承顧命盡忠匡翼終能輯穆猶言洛水濵者言其能存晉祚也南冠今别楚荆玉遂遊秦左氏傳曰晉侯觀於軍府見鍾儀而問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也韓子曰卞和抱其璞哭於荆山之下史記曰秦王欲以十五城易趙和氏璧藺相如奉璧入秦秦王無意償趙城乃前曰璧有瑕請指之王授相如相如持璧睨柱秦王恐破璧乃謝相如相如持璧歸别楚者喻已去江陵也留秦者喻已身留長安也倘使如楊僕寧為關外人漢書應劭注曰楊僕數有大志恥為關外民上書乞徙東關以家財給其用度言謝安石昔者新亭之禍尚能全身為國已今日西魏之使遂致屈節比之楊僕翻以入關為恥也慨然成詠亦詠懐之作也慨然嗟嘆之詞慷慨發聲者也新春光景麗遊子離别情漢書高祖曰遊子悲故鄉言已羇旅長安雖春光甚麗惟有别離之情也交讓未全死梧桐唯半生劉逵注蜀都賦云交讓木名也兩樹對生一樹枯則一樹生如是嵗更終不俱枯俱生也枚乘七發曰龍門之桐高百尺而無枝其樹半死半生喻已非死非生若枯樹也值熱花無氣逢風水不平喻已如花之無香又如水之不靜也寶雞雖有祀何時能更鳴漢書曰秦文公獲若石於陳倉北阪城祠之其神光輝若流星従東方來集於祠城則若雄雞其聲殷殷云野雞夜鳴以一太牢祠之名曰陳寶喻已今食周粟如寶雞為秦所獲雖有祭祀不能更鳴言何時復能得志也奉和賜曹美人月光如粉白秋露似珠圓江淹别賦云至乃秋露如珠秋月如珪絡緯無機織流螢帶火寒崔豹古今注曰絡緯亦曰莎雞詩疏云絡緯鳴懶婦驚促織也古今注曰螢火一名景天一名熠燿一名丹良一名燐一名丹鳥一名夜光一名宵燭腐草為之食蚊蚋何年迎㺯玉今朝得夢蘭列仙傳曰秦穆公有女號㺯玉左氏傳曰鄭文公有賤妾曰燕姞夢天使與已蘭曰余為伯儵余而祖也以是為而子以蘭有國香人服媚之如是既而文公見之與之蘭而御之生穆公名之曰蘭訝許能含笑芙蓉宜熟看和趙王看伎綠珠歌扇薄飛燕舞衫長晉書曰石崇有妓曰綠珠美而豔荀悦漢紀曰趙氏善舞號曰飛燕琴曲隨流水簫聲逐鳳凰吕氏春秋曰伯牙鼔琴鍾子期聴之曰巍巍乎若㤗山湯湯乎若流水風俗通曰舜作簫其形參差以象鳯翼細縷纒鐘格一作細苣纒鐘板圓花釘鼓牀一作膺風蟬鬢亂映日鳯釵光格音閣懸鐘之木也言密緝其繩縮鐘於木今枝格不得下也一作纒鐘板者義同若有瞽之詩所謂設業設虡崇牙樹羽又綿篇云縮版以載是也毛傳曰業大板也所以飾枸為縣也㨗業如鋸齒或曰畫之植者為虡横者為枸崇牙上飾巻然可以縣也爾雅曰繩之謂之縮之郭云縮者約束之孫炎云繩束築版謂之束苣束葦也説文云其巨切牀鼔欄也若井欄淮南王篇以為銀牀矣圓花鼔釘也鼔釘圓刻作花文釘其上故云圓花釘鼔牀言作妓用鐘鼔也一作膺風蟬鬢亂映日鳯釵光者崔豹古今注曰魏文帝宫人絶所愛者有莫瓊樹蟬鬢縹緲如蟬故曰蟬鬢王子年拾遺記石崇愛婢翔風瑩金為鳯冠之髻是也懸知曲不誤無事畏周郎吴志曰周瑜少時精意於音樂雖三爵之後其有闕誤瑜必知之知之必顧時人謡云曲有誤周郎顧奉答賜酒仙童下赤城仙酒餉王平神仙傳曰茅濛字初成乃於華山之中乘雲駕龍白日昇天歌曰神仙得者茅初成駕龍上昇入泰清時下𤣥洲戲赤城繼世而徃在我盈帝若學之臘嘉平又曰王逺字方平以一貫錢與餘杭姥求沽酒須㬰還得一油囊酒五斗野人相就飲山鳥一羣驚細雪翻沙下寒風戰鼓鳴此時逢一醉應枯反更榮奉答賜酒鵝雲光偏亂眼風聲特噤心冷猿披雪嘯寒魚抱凍沉今朝一壺酒實是勝千金負恩無以謝惟知就竹林魏氏春秋曰嵇康與陳留阮籍河内山濤河南向秀籍兄子咸瑯邪王戎沛人劉伶相與友善逰於竹林號為七賢正旦䝉趙王賚酒正旦辟惡酒新年長命杯荆楚嵗時記注練化篇云正月且吞雞子赤豆七枚辟瘟氣又肘後方云旦及七日吞麻子小豆各二七枚消疾疫張仲景方云嵗有惡氣中人不幸便死取大豆二七枚雞子白麻子酒吞之麻豆之設當起於此崔寔月令云元日進酒降神畢室家尊卑次列於几之前各上椒酒於家長稱觴舉夀欣欣如也柏葉隨銘至椒花逐頌來荆楚嵗時記曰正月一日是三元之日也長幼悉正衣冠以次拜賀進椒柏酒梁昭明錦帶啓太簇正月云柏葉汎三元之酒晉書曰劉蓁妻元日獻椒花頌流星向椀落浮蟻對春開流星浮蟻皆酒也王子年拾遺記曰張華為九醖酒以三薇漬麴蘖蘖出西羗麴出北胡中有指星麥四月火星出麥熟而獲之以之釀酒醇美久含令人齒動若大醉不呌笑揺蕩令人肝腸消爛俗人謂為消腸酒閭里歌曰寜得醇酒消腸不與口月齊尤南都賦曰璆敷數寸浮蟻如萍注云釋名曰酒有汎齊浮蟻在上汎汎然如萍之多者成都已救火蜀使何時迴神仙傳曰欒巴蜀郡人也少而學道不修俗事為尚書正朝大㑹巴獨後到又飲酒西南噀之有司奏巴不敬有詔問巴巴頓首謝曰臣本縣成都市失火臣故因酒為雨以滅火臣不敢不敬詔即以驛書問成都成都答言正旦大失火食時有雨従東北來火乃息雨皆酒臭後忽一旦大風天霧晦暝對坐皆不相見失巴所在尋問之云其日還成都與親故别也衞王贈桑落酒奉答周書云文帝十三子文宣皇后生高祖衞刺王直直字豆羅突武成初進封衞國公建徳三年進爵為王愁人坐狹邪喜得送流霞古詩云長安有狹邪夾轂不容車陸機詩有長安有狹邪行抱樸子曰項曼卿修道山中自言至天上遊紫府遇仙人與流霞一杯飲之輒不饑渴愁人自謂也狹邪謂長安之地也言已本流寓愁坐長安狹邪之處喜衞王送酒而至也跂牕催酒熟停杯待菊花言得此酒煑之更待酌也跂倚也菊花酒名也霜風亂飄葉寒水細澄沙高陽今日晚應有接䍦斜世説曰山季倫為荆州時出酣暢人為之歌曰山公時一醉徑造高陽池日暮倒載歸茗艼無所知復能乘駿馬倒著白接䍦舉手問葛彊何如并州兒高陽池在襄陽彊是其愛將并州人也就蒲州使君乞酒蒲州使君中山公訓晉國公䕶世子也周書武帝紀天和元年二月以開府中山公訓為蒲州總管六年五月為柱國建徳元年䕶誅徴赴京師見害此就乞酒下篇有許乞之事蕭瑟風聲慘蒼茫雪貌愁楚辭曰蕭瑟兮草木揺落而變衰王逸注曰隂令促急風暴疾也鳥寒棲不定池凝聚未流言已本流寓之人在此苦寒之地如鳥寒棲欲飛池凍流還聚也蒲城桑葉落灞岸菊花秋蒲城蒲州城也灞岸灞陵岸也桑落菊花謂酒也洛陽伽藍記曰河東郡民劉白墮宿擅工釀排子桑落之辰故酒得其名王粲七哀詩曰南登霸陵岸西京雜記曰九月九日飲菊花酒願持河朔飲分勸東陵侯後漢書曰袁紹公孫瓚皆威震河朔紹數撃破瓚軍瓚遂還幽州不敢復出天子遣太僕趙岐和解關東使各罷兵瓚因此以書譬紹共同斯好紹於是引軍南還三月上已大㑹賔徒於薄落冿史記蕭相國世家曰召平者故秦東陵侯秦破為布􅐍貧種𤓰於長安城東𤓰美故世俗謂之東陵瓜従召平以為名也按子山身留長安江陵失守随例入關者如王褒等有數十人願乞此酒分勸諸彼自言本故梁亡國之臣與諸南人羇士若東陵故侯矣蒲州刺史中山公許乞音器酒一車未送上乞酒求乞之乞此乞酒乞讀曰氣與也後漢書楊政傳詔曰乞楊生師晉書謝安謂其甥羊曇曰以墅乞汝皆與也與求乞之乞字同而音義俱異矣細栁望蒲臺長河始一迴三輔黄圖曰長安西渭水北古徼西冇細栁倉三齊記曰般城南有蒲臺高八十尺秦始皇所頋處在臺下縈蒲繫馬今蒲猶縈者見郡國志平原般縣注江淹别賦云去復去兮長河湄細栁謂已在長安蒲臺謂中山公在蒲州也言兩處相望也秋桑幾過落春蟻未曾開桑落注見上篇謝朓詩曰淥蟻方獨持釋名云酒冇汎齊浮蟻在上洗洗然言許乞而未送也瑩角非難馭槌輪稍可催瑩角謂馭車之牛也槌輪謂車也以中山公許乞一車故云世説曰王君夫有牛名八百里駮常瑩其角昭明文選序曰大輅寜有椎輪之質吕向曰椎輪古棧車槌與椎字同只言千日飲舊逐中山來博物志曰𤣥石従中山酤酒酒家與之千日之酒答王司空餉酒一作答王褒餉酒今日小園中桃花數樹紅開君一壺酒細酌對春風未能扶畢卓猶足舞王戎晉中興書曰畢卓字茂世新蔡人少遊逹為胡母輔之所知太興末與吏部郎甞飲酒廢職比舍郎釀酒熟卓因醉夜至其甕間取飲之主者謂盜執而縛之知為吏部也釋之卓遂引主人燕甕側取醉而去世説曰長史謝仁祖同為王公掾長史云謝掾能作異舞謝便起舞王公熟視謂客曰使人思安豐王戎字濬仲瑯邪臨沂人也爵安豐縣侯仙人一捧露判不及盃中漢書云孝武作柏梁銅柱承露仙人掌之屬舟中望月舟子夜離家開舲望月華詩云招招舟子高誘淮南注曰舲小船也山明疑有雪岸白不關沙言月之所照則山如積雪岸似銀沙也天漢看珠蚌星橋似桂花河圖括地象曰河精上為天漢吕氏春秋曰月望則蚌蛤實羣隂盈月晦則蚌蛤虚羣隂缺龜䇿傳曰明月之珠出於江海藏於蚌中蚗蠪伏之酉陽雜俎曰舊言月中有桂高五百丈下有一人常斫之樹創随合人姓吴名剛西河人學仙有過謫令伐樹灰飛重暈闕蓂落獨輪斜淮南子曰晝随灰而月暈闕注云月暈以蘆灰為環缺其一面則月暈亦闕於上竹書紀年曰帝堯在位七十年有草莢階而生月朔始生一莢月半而生十五莢十六日以後日落一莢及晦而盡月小則一莢焦而不落名曰蓂莢望月夜光流未曙金波影尚賖漢書曰月穆穆似金波照人非七子含風異九華七子疑即七枝燈名西京雜記有七枝鐙言照人異於燈也又疑鏡名西京雜記云秦始皇常以鏡照宫人膽張心動者則殺之漢書曰漢興因秦之名號妾有美人良人八子七子之號焉梁簡文望月詩云形同七子鏡西京雜記曰趙飛燕為皇后其女弟上禭三十五條有九華扇曹子建九華扇賦序曰昔吾先君常侍得幸漢桓帝賜方竹扇不方不圖其中結成文名曰九華知九華是扇名言月之含風異於扇也蓂新半壁上桂滿獨輪斜蓂柱注見上篇乘舟聊可望無假逐仙一作靈槎荆楚嵗時記曰漢武帝令張騫使大夏尋河源乘槎經月而至一處見一女織一丈夫牽牛飲河渚織女取支機石與騫而還後為東方朔所識對雨繁雲猶暗嶺積雨未開庭階含侵角路鑊滿溜疎萍濕楊生細椹爛草變初螢椹諸深切音斟木跋也月令腐草化為螢徒勞看蟻封無事祀靈星易林曰蟻封户穴大雨將集後漢書祭祀志曰漢興八年有言周興而邑立后稷之祀於是高帝令天下立靈星祠言祠后稷而謂之靈星者以后稷又配星食也舊謂星謂天田星也一曰龍左角為天田官主穀祀用壬辰位祀之壬為水辰為龍就其類也牲用太牢縣邑令長侍祠三輔故事長安城東十里有靈星祠喜晴比日思光景今朝喜暫逢雨住便生熱雲晴即作峰水白澄還淺花紅燥更濃已歡無石燕彌欲棄泥龍湘中記曰零陵有石燕遇風雨則飛舞如燕止則為石淮南子曰土龍致雨高誘注云湯遭旱作土龍以像龍雲従龍故致雨也詠春近餘雪應詔送寒開小苑迎春入上林上林苑名絲條變栁色香氣動蘭心待花將一作思對酒留雪擬彈琴宋玉諷賦曰臣援琴而鼓之作幽蘭白雪之曲陪遊愧並作空見奉恩深奉和初秋和梁簡文帝也簡文集中有初秋詩落星初伏火秋霜正動鐘詩􅃎風云七月流火毛傳曰火大火也流下也昭三年左傳張趯曰火星中而寒暑退服䖍曰火大火心也季冬十二月平旦正中在南大寒退季夏六月黄昏火星中大暑退是火為寒暑之候哀十一年左傳曰火伏而後蟄者畢山海經曰豐山有九鐘焉是知霜鳴郭璞注曰霜降則鐘鳴北閣連一作更横漢南宫應鑿龍漢天漢也黄圖曰引渭水灌都以象天漢横橋南渡以法牽牛大戴禮云七月案戸漢也案戸也者直户也言正南北也西都賦云抗應龍之虹梁祥鸞棲竹實靈蔡上一作止芙蓉白虎通曰黄帝之時鳳凰蔽日而至止於東園食常竹實棲常梧相終身不去史記龜䇿傳曰余至江南問故老云龜千嵗乃遊蓮葉之上又曰臣為郎時見萬畢石朱方傳曰有神龜在江南嘉林中常巢於芳蓮之上靈蔡龜也論語臧文仲居蔡鄭曰蔡謂國君之守龜也漢書食貨志云元龜曰蔡芙蓉蓮也爾雅曰荷芙渠其實蓮郭璞注云别名芙蓉江東呼荷蓮謂房也自有南風曲還來吹九重樂記曰昔舜作五絃之琴以歌南風楚辭曰君門兮九重晚秋淒清臨晚景疎索望寒階濕庭凝墜露摶風巻落槐楚辭曰朝飲木蘭之墜露日氣斜還冷雲峰晩更霾可憐數行雁點點逺空排和潁川公秋夜泬寥空色逺葉黄淒序變楚辭曰泬寥兮天高而氣清王逸曰泬寥曠蕩空虚靜也泬音血説文曰泬水従孔穴疾出也聲呼穴切月令曰季秋之月草木黄落洞浦落遵鴻長飈送巢燕淮南子曰燕雁代飛高誘曰燕𤣥鳥也春分而來雁春分而去北詣溟中也燕秋分而北雁秋分而南詣彭蠡也故曰代飛千秋流夕景百籟含宵囀説文曰籟三孔龠也大者謂之笙其中謂之籟小者謂之箹籟洛帶切峻雉聆金柝層臺切銀箭峻雉謂高城也左傳祭仲曰都城過百雉杜預云方丈曰堵三堵曰雉也易繫辭云重門撃柝以禦暴客鄭康成云手持兩木以相敲是為撃柝守備警戒也顔延年楊給事誄曰金柝夜撃李善曰金謂刁斗也衞宏漢書儀曰晝漏盡夜漏起城門撃刁斗周廬撃木柝李周翰曰金謂刁也柝打更木也柝音托周禮作槖字同枚乘七發曰臺城層構周禮挈壺氏鄭注云漏之箭晝夜共百刻冬夏之間有長短焉太史立成法有四十八箭詠畫屏風詩二十四首屏風之制古所謂扆皆有畫飾禮記鄭注曰斧扆者畫屏風也又周禮注云黼依其制如屏風東觀漢記曰宋𢎞帝燕見御坐新施屏風圖畫列女鄴中記曰石虎作金銀鈕屈膝屏風以白縑畫義士仙人子山詠畫屏風詩二十四首其畫不一葢雜詠之也浮橋翠蓋擁平旦雍門開淮南子曰馳要褭建翠蓋高誘注云翠蓋以翠鳥羽飾蓋也淮南子曰日至於曲阿是為旦明高誘注云平旦也潘岳關中詩曰雍門不啓石崇迎客至山濤載妓來晉書曰石崇字季倫生於青州小名齊奴財産豐積室宇宏麗後房百數皆曳紈繡珥金翠絲竹盡當時之選庖膳窮水陸之珍與貴戚王愷羊琇之徒以奢靡相尚又曰山濤字巨源河内懐人也水紋恒獨轉風花直亂迴誰能惜紅袖寧一作迎用捧金杯碧玉歌云碧玉奉金杯淥酒助花色停車小苑外下渚長橋前澁菱迎擁楫平荷直蓋船殘絲繞折藕芰葉映低蓮遥望芙蓉影只言水底然爾雅曰荷芙蕖其華菡萏其實蓮其根藕郭璞曰别名芙蓉江東呼荷昨夜鳥聲春驚聞動四鄰今朝梅樹下定有詠花人流星浮酒泛粟瑱繞杯脣瑱它殿反粟瑱注見秋夜搗衣詩何勞一片雨喚作陽臺神宋玉高唐賦云旦為朝雲暮為行雨朝朝暮暮陽臺之下逍遥遊桂苑寂絶到桃源毛詩曰於焉逍遥謝莊月賦云肅桂苑陶潛有桃花源記狹石分花逕長橋映水門管聲驚百鳥人衣香一園定知歡未足横琴坐石根三春冠蓋聚八節管絃遊陸機文賦云流管絃而日新石險松横植巖懸澗竪流小橋飛斷岸高花出迥樓定須催十酒將來宴五侯曹植名都篇云美酒斗十千漢書曰成帝悉封舅王潭王立王根王逢王商時為列侯五人同日封故世謂之五侯高閣千尋起長廊四柱連柱疑作注枚乘七發云連廊四注歌聲上扇月舞影入琴弦班婕妤怨歌行曰裁成合歡扇團團似明月澗水纔牕外山花即眼前但願長歡樂従今盡百年日晚金槌路一作絡朱軒流水車漢書賈山曰隐以金椎服䖍曰隐築也以鐵椎築之尚書大傳曰未命為士不得朱軒鄭康成曰斬輿也士以朱飾之軒車通稱也後漢書明徳馬后曰前過濯龍門上見外家問起居者車如流水馬如龍也􅚫拂緣堤栁甍飄夾路花蒼頡篇曰帛張車上曰􅚫説文曰甍屋棟所以承瓦也聲莫耕切定迎劉碧玉將過隂麗華樂苑曰碧玉宋汝南王妾名後漢書光武帝曰娶妻當得隂麗華非是高陽路莫畏接䍦斜晉書曰山簡出鎮襄陽惟酒是耽諸習氏荆土豪族冇佳園池簡每出逰嬉多之池上置酒輒醉名之曰高陽池時有童兒歌曰山公出何許往至高陽池日夕倒載歸酩酊無所知時時能騎馬倒著白接䍦舉鞭向葛彊何如并州兒彊家在并州簡愛將也徘徊出桂苑徙倚就花林謝莊月賦云肅桂苑潘岳詩云徘徊不忍去徙倚步踟蹰李善注引楚辭曰步徙倚而遥思張銑曰徙遷移也倚立也下橋先勸酒跂石始調琴蒲低猶抱節竹短未空心絶愛猿聲近惟憐花徑深千尋木蘭館百尺芙蓉堂何平叔景福殿賦曰於是蘭栭積重李善曰蘭木蘭也以木蘭為栭楚辭曰坐堂伏檻臨曲池芙蓉始發雜芰荷落日低蓮井行雲礙芰梁魯靈光殿賦云圓淵方井反植荷蕖張衡西京賦所謂藻井是也薛綜曰藻井當棟中交木方為之如井幹也漢書郊祀志有井幹樓師古曰井幹樓積木而高為樓若井幹之形也井幹者井上木欄也其形或四角或八角張衡西京賦曰井幹疉而百層幹或作輯義同子山引之或稱蓮井或稱菱井皆謂棟中交木方若井幹之形也芰水草蓮與芰皆水中之物梁上畫以水草所以厭火若藻棁也落日行雲言其高挿天也流水桃花色春洲杜若香漢書曰來春桃花水盛楚辭曰搴汀洲兮杜若王逸曰杜若香草也就階猶不進催來上伎牀搗衣明月下靜夜秋風飄錦石平砧面蓮房接杵腰青陽度歌云碧玉搗衣砧七寶金蓮杵急節迎秋韻新聲入手調寒衣須及早將寄霍嫖姚漢書曰霍去病善騎射再従大將軍受詔予壯士為票姚校尉師古曰票姚勁疾之貌也荀悦漢紀作票鷂後為票騎將軍尚取票姚之字耳出沒看樓殿間關望綺羅翔禽逐節舞流水赴絃歌王逸楚辭注曰師曠鼔琴天下𤣥鶴皆銜明月之珠以舞也吕氏春秋曰伯牙鼔琴志在流水鍾子期曰善哉乎琴湯湯乎若流水細管吹叢竹新杯捲半荷南宫冠蓋下日暮風塵多後漢書曰肅宗詔賈逵入講尚書南宫雲臺西都賦曰冠蓋如雲玉柙珠簾捲金鉤翠幔懸漢武故事曰上起神屋以白珠為簾箔玳瑁柙之象牙為篾荷香薫水殿閣影入池蓮平沙臨浦口高栁對樓前上橋還倚望遥看采菱船楚辭曰涉江采菱發揚阿高閣千尋跨重簷百丈齊雲度三分近花飛一倍低吹簫迎白鶴照鏡舞山雞列仙傳曰蕭史者秦穆公時人也善吹簫致孔雀白鶴於庭異苑曰山雞愛其羽毛映水則舞魏武帝時南方獻之公子倉舒令置大鏡其前雞鑒形而舞不知止遂乏死何勞愁日暮未有夜烏啼樂府有夜烏啼河流值淺岸歛轡暫經過弓衣濕濺水馬足亂横波半城斜出樹長林直枕河今朝遊俠客不畏風塵多漢書有遊俠傳度橋猶徙倚坐石未傾壺淺草開長埒行營繞細厨沙洲兩鶴一作岸迥石岸一松孤自可尋丹竈何勞憶酒壚江淹别賦云守丹竈而不顧史記曰令文君當鑪韋昭曰鑪酒肆也以土為墮邊高似鑪上林春逕密浮橋栁路長上林苑名三輔黄圖曰霸橋在長安東跨水作橋漢人送客至此橋折栁贈别龍媒逐細草鶴氅映垂楊漢書曰天馬徠龍之媒丘遲侍宴樂遊苑詩云細草籍龍騎晉書曰王恭美姿儀人多愛悦或目之云濯濯如春月栁甞被鶴氅裘渉雪而行孟昶窺見之嘆曰此真神仙中人也説文曰氅析鳥羽為旗纛之屬从毛氅聲昌兩切水似桃花色山如甲煎香桃花水見漢書溝洫志注見前語林云石崇厠置甲煎沉香無不異備白石清一作春泉上誰能待月光白石春泉滿黄金新埒開晉書曰王濟移第北芒山下時􅏖京地甚貴濟買地為馬埒編錢滿之時人謂為金溝戚里車先度蘭池馬即來三輔黄圖曰萬石君奮徙家長安戚里漢書地理志曰渭城縣有蘭池宫又按尸子云馬有紫燕蘭池與宫名同矣落花承舞席春衫拭酒杯行廚半路待載妓一雙迴神仙傳曰麻姑入拜王逺逺起立坐定各進行廚皆金盤玉杯無限也將軍息邊務校尉罷従戎漢書百官公卿表云前後左右將軍皆周末官秦因之位上卿金印紫綬漢不常置或有前後或有左右皆掌兵及四彝有長史秩千石又云八校尉皆武帝初置秩皆二千石池臺臨戚里絃管入新豐漢書地理志云京兆新豐高祖七年置應劭曰太上皇思東歸於足高祖改築城市街里以象豐徙豐民以實之故號新豐浮雲隨走馬明月逐彎弓西京雜記稱漢文帝有馬名浮雲比來多射獵惟有上林中上林苑名天子射獵處也司馬相如作賦亡是公陳上林之事三危上鳳翼九坂度龍鱗楚辭曰馳六龍於三危兮王逸云三危西方山也穆天子傳曰西升九阿郭璞曰旋今新安縣十里有九坂又蜀有九折坂蜀都賦云馳九折之坂劉注云九折坂在漢夀嚴道縣卭萊山鳯翼龍鱗言其山形之相似也路高山裏樹雲低馬上人懸巖泉溜響深谷鳥聲春住馬來相問應知有姓秦古詩日出東南隅行曰使君従南來五馬立踟蹰使君遣吏往問此誰家姝答云秦氏女且言名羅敷聊開鬱金屋暫對芙蓉池樂府云盧家蘭室桂為梁中有鬱金蘇合香魏文帝有芙蓉池作水光連岸動花風合樹吹春杯猶雜泛細果尚連枝不畏歌聲盡先看箏柱欹阮瑀箏賦云柱三寸三才具也洞靈開靜室雲氣滿山齋古松裁數樹盤根無半埋愛靜魚爭樂依人鳥入懐仲春徵隐士蒲輪上計偕漢書武帝紀師古注曰以蒲裹輪取其安也計者上計簿使也偕俱也令所徵之人與上計者俱來也今朝好風日園苑足芳菲竹動蟬爭散蓮揺魚暫飛謝眺遊東田詩曰魚戲新荷動鳥散餘花落面紅新著酒風晩細吹衣跂石多時望蓮船始復歸金鞍聚磧岸玉軸汎中流張華詩云青蓋覆金鞍郭璞方言注云今江東人呼枻為軸畫鷁先防水媒龍即負舟淮南子曰龍舟鷁首高誘曰龍舟大舟也刻為龍文以飾之鷁水鳥也畫其象著船首晉書曰王濬作大船連舫畫鷁首於船頭以懼江神吕氏春秋曰禹南省方濟於江黄龍負舟沙城疑海氣石岸似江樓崩槎時半沒壊舸或空浮定是汾河上戈船聊試遊漢武帝秋風辭曰汎樓船兮濟汾河漢書如淳注曰汾在睢之北西流與河合武帝紀曰歸義越侯嚴為戈船將軍張宴曰有蛟龍之害故置戈於船下因以為名也竟日坐春臺芙蓉承酒盃老子曰如登春臺水流平澗下山花滿谷開行雲數番過白鶴一雙來行雲謂歌也博物志云秦青撫節悲歌響遏行雲白鶴謂舞也韓子云師曠援琴鼔清角有𤣥鶴二八集於廊門延頸而鳴舒翼而舞古詩云飛來雙白鶴水影揺叢竹林香動落梅直上山頭路羊腸能幾迴高誘淮南注曰羊腸山名在太原晉陽西北九十里通西河上郡關曰羊腸坂是太行孟門之限也此云羊腸者言其山勢之紆迴也贈周處士處士周𢎞讓也當是𢎞讓隐茅山時所贈故下篇云尋周處士若入魏而後南北異處雖仁威築壘而子山難可復尋矣故知是揚都集中之作也九丹開石室三徑沒荒林抱樸子曰服九轉丹内神鼎中夏至之後暴之神仙傳曰廣成子者古之仙人也居崆峒之山石室中三輔決録曰蔣詡字元卿舍中三逕惟羊仲求仲従之遊皆挫亷逃名不出陶潛歸去來辭曰三徑就荒松菊猶存李周翰曰荒蕪也仙人翻可見隐士更難尋上九丹句謂仙人也三徑句謂隐士也言隐士幽居較諸仙人更難訪也籬下黄花菊丘中白雪琴續晉陽秋曰陶潛甞九月九日出宅邊菊叢中坐久之滿手把菊王𢎞送酒至即便就酌而歸左太沖招隐詩云丘中有鳴琴宋玉對問曰其為陽春白雪二語謂隐士也方欣松葉酒自和游仙吟本草云松葉可為酒能已疾松葉六十斤細剉㕮咀水四石煑取四斗九升以釀五斗米如常法煑松葉沒米并饙飯泥釀封頭七日發飲之得此酒力者甚衆曹子建嵇叔夜何敬祖郭景純並著游仙詩言樽酒共酌招隐之思同於游仙矣尋周處士𢎞讓試逐赤松逰披林對一丘列仙傳曰赤松子者神農時雨師也服水玉教神農能入火不燒至崑崙山下常止西王母石室中随風雨上下炎帝少女追之亦得仙俱去漢書張良曰願棄人間事従赤松子遊耳棃紅大谷晚桂白小山秋西京雜記曰上林苑名果有大谷棃潘岳洛陽記曰洛陽有張公居大谷有大棃海内惟此一株閒居賦云張公大谷之棃是也楚辭招隐士序曰招隐士者淮南小山之所作也其詞曰桂樹叢生兮山之幽石鏡菱花發桐門琴曲愁謝靈運入彭蠡湖口詩曰攀崖照石鏡李善注引張僧鑒尋陽記曰石鏡山束有一圓石懸崖明淨照人見形又吴興郡記云臨安縣東有石鏡山東有石鏡具見人形又蜀本紀云蜀王妻以石鏡一枚表其墓魏武有菱花鏡以鏡有菱花之名故云石鏡菱花發也七發曰龍門之桐故云桐門以桐木堪為琴瑟也泉飛疑度雨雲積似重樓王孫若不去山中定可留劉安招隐士曰王孫遊兮不歸又云王孫兮歸來山中兮不可以久留王孫喻周處士也言其避世在山誠可隐處也鏡玉匣聊開鏡輕灰暫拭塵光如一片水影照兩邊人月生無有桂花開不逐春月中有桂鏡圓如月而無桂也鏡有菱花菱開夏時故不逐春也試挂淮南竹堪能見四鄰淮南子曰高懸大鏡坐見四鄰梅花當年臘月半已覺梅花䦨秦始皇本紀曰三十一年十二月更名臘曰嘉平廣雅曰周曰大蜡亦曰臘秦更曰嘉平不信今春晩俱來雪裏看言春晚雨雪舒梅也樹動懸冰落枝高出手寒早知覔不見真悔著衣單春衣單袷之時早知梅花獨遲必將有春寒雨雪非重幄輕裘難可耐寒也詠樹交柯乍百頃擢本或千尋楓子留為式桐孫待作琴爾雅曰攝木生江上有寄枝高三丈生毛一名楓子天旱以泥塗之即雨述異記曰南中有楓子鬼木之老者為人形亦呼為靈楓焉風俗通曰梧桐生於嶧陽山巖石之上采東南孫枝為琴聲清雅周禮鄭注曰孫枝竹之末生者也桐孫亦然殘核移桃種空花植棗林漢武故事曰王母以桃食帝帝留核欲種之王母笑曰此桃三千年一著子非下土所植也晏子春秋曰齊景公謂晏子曰東海有水而赤其中有棗華而不實幽居對䝉密蹊徑轉深沉鬭雞開軒望平子驟馬看陳王平子春秋時季平子名意如者也左傳昭二十五年曰季郈之雞鬬季氏介其雞郈氏為之金距平子怒益宫於郈氏且讓之郈昭伯亦怨平子陳王陳思王曹植也植名都篇云鬬雞東郊道走馬長楸間狸膏燻鬬敵芥粉壒春塲曹子建鬬雞詩曰願䝉狸膏助常得擅此場左氏傳曰季氏介其雞杜預注云搗芥子播其羽也或曰以膠沙播之為介雞正義曰杜此二解一讀介為芥擣芥子為末播其雞羽賈逵云擣芥子為末播其雞翼可以坌郈氏雞羽是此說也鄭衆云介甲也為雞著甲高誘注吕氏春秋曰鎧著雞頭葢以膠塗雞之足然以沙摻之令其澁得傷彼雞也此云芥粉用杜氏之前説也説文曰壒塵也聲於蓋切解翅蓮花動猜羣錦臆張鮑照雉朝飛云刎繡頸碎錦臆臆膺也言翅若蓮花膺色如錦也應令望别非新館開舟即舊彎浦喧征棹發亭空送客還路塵猶向水征帆獨背關杏花春色方盈野枝枝綻翠英依稀暎村塢爛漫開山城好折待賔客金盤襯紅瓊集周公處連句周公陳尚書周𢎞正也𢎞正入周信集其處有傷舊國之詞市朝一朝變蘭艾本同焚故人相借問平生如所聞謝眺詩曰寂寞市朝變淮南子曰紫芝與蕭艾俱死傅𤣥鷹兔賦曰秋霜一下蘭艾俱落寄徐陵南史云徐摛子陵字孝穆晉安王為皇太子東宫學士陵充其選陳武帝以為尚書左丞封建昌縣侯為尚書左僕射位至左光禄大夫太子少傅故人倘思我及此平生時莫待山陽路空聞吹笛悲向秀思舊賦序鄰人有吹笛者發聲寥亮追思曩昔遊宴之好感音而嘆故作賦云辭曰經山陽之舊居寄王琳南史云王琳字子珩㑹稽山隂人也本兵家元帝居蕃琳姊妹並入後庭見幸琳由此得在左右少好武遂為將帥平景之勳與杜龕俱為第一後平武陵王紀元帝性多忌以琳所部甚盛又得衆心故出之嶺外元帝為魏圍逼乃徵琳赴援除湘州刺史琳師次長沙知魏平江陵已立梁王詧乃為元帝舉哀三軍縞素遣别將侯平率舟師攻梁琳屯兵長沙傳檄諸方為進趣之計師老兵疲不能進陳武帝既殺王僧辯推立敬帝以侍中司空徴琳不受命乃大營樓艦將圖義舉陳武帝遣將侯安都等討琳仍受梁禪安都嘆曰我其敗乎師無名矣逆戰於沌口琳禽安都等移湘州軍府就郢城帶甲十萬練兵於白水浦琳巡軍而言曰可以為勤王之師矣温太真何人哉後因嵗星在牛斗自知有喪軍敗為吴明徹所殺哭者聲如雷矣按王琳方志雪讎恥故子山冇是寄焉玉關道路逺金陵信更疎獨下千行淚開君萬里書漢書曰龍勒有玉門關謝眺鼔吹曲云江南佳麗地金陵帝王州玉關喻已身留長安如逺戍玉門也金陵謂建鄴舊都也元帝遷都江陵為蕭詧所敗敬帝仍都建鄴又為陳霸先所篡王琳西攻岳陽東拒陳武葢梁室之忠臣子山為之下淚矣奉和趙王花徑日相攜花林鳥未棲比看中郎醉堪聞烏夜啼樂府烏夜啼宋彭城王義康時所作也和劉儀同臻隋書文學傳云劉臻字宣摯沛國人也年十八舉秀才為邵陵王東閣祭酒元帝時遷中書舍人江陵陷後歸蕭詧以為中書侍郎周冢宰宇文䕶辟為中外晉室叅軍羽檄多成其手高祖受禪進位儀同三司左僕射南岸廣陵岸迴首落星城不言登舊浦烽火照江明漢書曰廣陵國屬吴也吴都賦曰饗戎旅乎落星之樓劉淵林注云吴有落星樓在建鄴東北十里和庾四疑即庾季才與信同八世祖滔江陵平隨例入長安鄉關之思相為倡和云離關一長望别恨幾重愁無妨對春日懐抱只言秋禮記曰西方者秋秋之為言愁也淮南子曰秋士悲和侃法師三絶一作和侃法師别詩秦關望楚路灞岸想江潭幾人應淚落看君馬向南秦關函谷關灞岸灞陵岸謂長安也楚路江潭謂江陵也後周都長安江陵本元帝所都言在周想望故國也楚辭曰寄生乎江潭時侃法師南還與子山作别故云客遊經嵗月羇旅故情多近學衡陽雁秋分俱渡河左氏傳曰羇旅之臣地記云衡山一峰極高雁不能過遇春北歸故名迴雁或曰峰勢如雁之回故名迴首河隄望眷眷嗟離絶誰言舊國人到在他鄉别言與侃法師本南人今在北方别也舊國謂梁也他鄉謂長安也送周尚書𢎞正二首交河望合浦𤣥菟想朱鳶共此無期别知應復㡬年漢書曰車師王冶交河城又曰合浦郡武帝六年開屬交州𤣥菟郡武帝元封四年開高句驪屬幽州交趾郡朱鳶縣交河與合浦𤣥菟與朱鳶皆極逺之地以喻已與𢎞正南北隔絶若秦越矣離期定已促别淚轉無従惟愁郭門外應足數株松傷已將老死於長安也重别周尚書二首尚書周𢎞正也陽關萬里道不見一人歸惟有河邊雁秋來南向飛漢書西域傳曰東則阣以玉門陽關孟康曰二關皆在敦煌西界月令曰季秋之月鴻雁來賔言已留長安如在陽關之外𢎞正南還若秋雁渡河也河橋兩岸絶横岐數路分山川遥不見懐袖逺相聞贈别藏啼留送别拭淚强相叅誰言畜衫袖長代手中浛音含言濕衫袖若水和物也於韻宜在十三覃俗本不載或見去聲時俗字書須以此詩證入庶為近雅徐報使來止得一見徐陵也一面還千里相思那得論更尋終不見無異桃花源述異記曰武陵源在吴中山無他木盡生桃李俗呼為桃李源源上有石洞洞中有乳水世傳秦末喪亂吴中人於此避難食桃李實者皆得仙行途賦得四更應詔四更天欲曙落月垂關下深谷暗藏人欹松横礙馬説文曰曙旦明也和江中賈客一作賈客詞五兩開船頭長橋發新浦懸知岸上人遥振江中鼓淮南子曰譬若俔之見風也髙誘曰俔候風者也世謂之五两凡候風以雞羽重五两繫五丈為旗奉和平鄴應詔周書本紀云建徳六年帝至鄴率諸軍圍之齊人拒守諸軍奮撃大破之遂平鄴天䇿引神兵風飛掃鄴城陣雲千里散黄河一代清左傳杜預注云天䇿傅説星也鄴城北齊所都也鄴漢屬魏郡故三國魏都也掃平也史記天官書曰陣雲如立垣王子年拾遺記曰丹丘千年一燒黄河千年一清皆至聖之君以為大瑞送衞王南征周書曰文帝子衞刺王直天和中陳湘州刺史華皎舉州來附詔直督綏徳公陸通大將軍田𢎞權景宣元定等兵赴援與陳將淳于量吴明徹等戰於沌口是其事也望水初横陣移營寇未降風塵馬足起先暗廣陵江漢書地理志曰廣陵國屬荆州更屬吴景帝更名江都廣陵江都易王非廣陵厲王胥皆都此枚乘七發云並往觀濤乎廣陵之曲江言伐陳従廣陵渡江矣仙山二首金竈新和藥銀臺舊聚神相看俱莫怯先師應識人江淹恨賦曰守丹竈而不顧鍊金鼎而方堅郭璞遊仙詩曰神仙排雲出但見金銀臺石軟如香飯鉛銷似熟銀蓬萊暫近别海水遂成塵朱彦伯名士傳曰王烈服食養性嵇康甚敬信之随入山烈得石髓柔滑如飴即自服半餘半以與康即凝為石抱撲子曰道士李根煎鉛錫以藥投鼎中鐵匙攪之冷即成銀神仙傳曰尹軌入荆山銷鉛成銀山齋石影横臨水山雲半繞峯遥想山中店懸知春酒濃野步值泉仍飲馬逢花即舉杯稍看城闕逺轉見風雲來山中澗暗泉偏冷巖深桂絶香住中能不去非獨淮南王楚辭招隐士者淮南小山之所作也其辭云桂樹叢生兮山之幽又云王孫兮歸來山中不可以久留閨怨明鏡圓花發空房故怨多幾年留織女還應聴渡河神仙傳曰桂陽成武丁曰七月七日織女當渡河和趙王看妓長思浣紗石空想一作定憶擣衣砧臨卭若有便一作使為説解琴心十道志曰句踐索美女以獻吴王得之諸暨苧蘿山賣薪女也西施山下有浣紗石絶異記曰崇山之上有玉女擣帛石瑩徹光潔山下人曰立秋前一日中夜甞聞杵聲漢書司馬相如傳曰卓王孫有女文君新寡好音故相如繆與臨卭令相重而以琴心挑之文君竊従户窺心悦而好之既罷相如令侍人重賜文君使者通殷勤文君夜亡奔相如看舞鸞迴不假學鳳舉自相關到嫌衫袖廣恒長礙舉鬟袁宏舞賦云舞迴鸞以紆袖又云為鳳翼之逶迤韓詩外傳曰鳳舉曰上翔聴歌一絶協律新敎罷河陽始學歸但令聞一曲餘聲三日飛漢書曰李延年為恊律都尉列女傳曰趙皇后屬河陽主家學歌舞號曰飛燕列子曰韓娥東之齊遺糧過雍門鬻歌假食而去餘響遶梁三日不絶雍門人至今善歌效韓娥之遺意也暮秋野興賦得傾壺酒劉伶正促酒中散欲彈琴但令逢秋菊何須就竹林世説曰陳留阮籍譙國嵇康河内山濤三人皆相比預此契者沛國劉伶陳留阮咸河内向秀瑯邪王戎七人常集於竹林之下肆意酣暢對酒數杯還已醉風雲一作春風不復知惟有龍吟笛桓伊能獨吹晉書曰桓伊善音樂盡一時之妙為江左第一有蔡邕柯亭笛常自吹之王徽之赴召京師泊舟清溪側素不與徽之相識伊於岸上過船中客稱伊小字曰桓野王也徽之便令人謂伊曰聞君善吹笛試為我一奏伊是時已貴顯素聞王名即便回下車踞胡牀為作三調弄畢便上車去客主不交一言春日極飲檻前聞鳥囀園裏對花開就中言不醉紅袖捧金杯樂府碧玉歌碧玉奉金杯淥酒助花色春望春望上春臺春牕四面開落花何假拂風吹㑹併來老子曰熙煕然如登春臺新月鄭環惟半出秦鉤本獨懸若交臨酒影堪言照弩弦左氏傳曰宣子有環其一在鄭商釋器云肉好若一謂之環鮑照望月詩曰纎纖如玉鉤秦羅敷詞曰桂枝為籠鉤故曰秦鉤言新月類玦又如鉤也釋名曰弦月半之名也其形一旁曲一旁直若張弓弦也秋日蒼茫望落景羇旅對窮秋賴有南園菊殘花足解愁望渭水樹似新亭岸沙如龍尾灣猶言吟溟浦應有落帆還十洲記曰丹陽郡新亭在中思里吴舊亭也謝眺有新亭渚别范零詩越絶書曰北顧以西度陽下溪過歴山陽龍尾西大泱通安湖又曰無錫西龍尾陵道者春申君初封吴所造也言望長安如江南也塵鏡明鏡如明月恒常置匣中何須照兩鬢終是一秋蓬和淮南公聴琴聞弦斷嗣宗看月夜中散對行雲一弦雖獨韻猶足動文君晉書曰阮籍字嗣宗善彈琴嵇康字叔夜拜中散大夫常脩養性服食之事彈琴詠詩自足於懐漢書曰卓王孫有女文君新寡好音相如以琴心挑之文君夜亡奔相如一弦謂一弦斷也言此斷弦之聲亦足挑動文君也㺯琴二首雉飛催晚别烏啼驚夜眠若交新曲變惟須促一絃古辭有雉朝飛烏夜啼言其以為琴曲也神仙傳曰孫登善彈一絃琴不見石城樂惟聞烏噪林新聲逐絃轉應得動春心古辭有石城樂五曲其一云生長石城下開牕對城樓城中諸少年出入見依投唐書樂志云石城樂者宋􅆇所作也石城在竟陵郡於城上眺矚見羣少年歌謡通暢因作此曲古今樂録曰石城樂舊舞十六人烏噪林即烏夜啼曲也樂志云烏夜啼宋臨川王義慶所作也又有西烏夜飛五曲樂録云宋元徽五年荆州刺史沈攸之所作也楚辭曰目極千里蕩春心詠羽扇揺風碎朝翮拂汗落毛衣定似回谿路將軍垂翅歸東觀漢記曰馮異字公孫拜征西將軍與赤眉相距上命諸將士屯澠池為赤眉所乘反走上迴谿阪異復合兵追撃大破之璽書勞異曰垂翅回谿奮翼澠池題結綫袋子交絲結龍鳳鏤彩織雲霞一寸同心縷千年長命花賦得鸞臺九成吹玉琯百尺上瑶臺能將秦女去終是鳳皇來尚書曰簫韶九成鳳皇來儀説文曰古者玉琯以玉楚辭曰望瑶臺之偃蹇兮秦女㺯玉也見列仙傳賦得集池雁逢風時迴度逐侣作爭飛猶憶方塘水今秋已復歸劉楨詩曰方塘含白水中有鳬與雁詠雁南思洞庭水北想雁門關稻梁俱可戀飛去復飛還盛𢎞之荆州記曰雁塞北接陽州汶陽郡其間東西嶺屬天無際雁飛翥至此即囘翼惟一處稍下每雁飛逹則矯翼裁度下處而過故名雁塞山海經曰雁門之水出於雁門之山雁出其間郭璞注云雁門山即北陵西隃雁之所出因以名云在高栁北魯連子曰君雁鶩有餘粟韓詩外傳田饒謂魯哀公曰黄鵠止君園池啄君稻粱忽見㯽榔嵇含南方草木狀曰㯽榔樹高十餘丈皮似青桐節如桂竹下本不大上枝不小調直亭亭千萬若一森秀無柯端頂有葉葉似甘蕉條派開破仰望眇眇如挿叢蕉於竹杪風至獨動似舉羽扇之掃天葉下繫數房房綴數十實實大桃李天生棘重累其下所以御衞其實也味苦澁剝其皮鬻其膚熟如貫之堅如乾棗以扶留藤古賁灰并食則滑美下氣滑穀出林邑彼人以為貴婚族客必先進若邂逅不設用相嫌恨一名賔門藥餞綠房千子熟紫穂一作穟百花開莫言行萬里曾經相識來賦得荷秋衣行欲製風蓋漸應欹若有千年蔡須巢但見随楚辭曰製芰荷以為衣又曰援芙蓉以為葢張景陽七命曰兆發靈蔡漢書食貨志曰元龜名蔡師古曰李以蔡出善龜故名龜為蔡抱樸子王䇿記曰千嵗龜五色額骨起如角浮於蓮葉之上或在叢蓍之下移樹酒泉移赤柰河陽徙石榴雖言有千樹何處似封侯漢書地理志曰酒泉郡武帝太初六年開應劭曰其水若酒故曰酒泉西京雜記曰初修上林苑羣民遠方各獻名果異樹柰三白柰紫柰綠柰潘岳集中有河陽庭前安石榴賦其序云石榴者天下之奇樹九州之名果也漢書貨殖傳曰蜀漢江陵千樹橘渭川千畝竹此其人與千户侯等奉梨接枝秋轉脆􅅤消落更香擎置仙人掌應添瑞露漿三輔黄圖曰御宿園出大梨落地則破其取梨先以布囊承之號曰􅅤消漢書曰孝武作承露仙人掌傷往二首見月長垂淚花開定歛眉従今一别後知作㡬年悲此子山鄉關之思也鏡塵言苦厚蟲絲定㡬重還是臨牕月今秋迴照松論衡曰蜘蛛輕絲以網飛蟲張景陽雜詩曰蜘蛛網四屋春日離合二首秦青初變曲未有逐琴心明年花樹下月月來相尋列子曰薛譚學謳於秦青未窮青之技自謂盡之遂辭歸秦青弗止餞於郊衢撫節悲歌聲響遏行雲薛譚乃謝求返終身不敢言歸漢書曰文君新寡好音相如以琴心挑之師古曰寄心於琴聲以挑動之也田家足閒暇士友暫流連三春竹葉酒一曲鵾雞弦張衡七辨曰𤣥酒白醴葡萄竹葉張恊七命曰豫北竹葉張華輕薄篇曰蒼梧竹葉青宜城九醞酒嵇叔夜琴賦曰嚶若離鵾鳴清池又曰鵾雞遊絃李善注云古相和歌有鵾雞曲和迴文和湘東王後園旱蓮生竭鑊嫩菊養秋鄰滿池留浴鳥分橋上戲人問疾封中録雙聲形骸違學宦狹巷幸為閒虹迴或有雨雲合又含寒横湖韻鶴下迴溪狹一作浹猿還懐賢為榮衞和緩恵綺紈原本疑是何凡左傳有醫和醫緩良醫也示封中録二首似吃語詩貴館居金谷關扄隔藁街冀君見果顧郊間光景佳漢書曰郅支首懸藁街蠻彝邸間晉灼曰黄圖在長安城内也高階既激澗廣閣更交柯葛巾久乖角菊徑簡經過後漢書曰郭太字林宗甞於陳梁間行遇雨巾一角墊時人乃故折巾一角以為林宗巾注巾以葛為之秋夜望單飛雁失羣寒雁聲可憐夜半單飛在月邊無柰人心復有憶今暝將渠俱不眠代人傷往二首青田松上一黄鶴相思樹下兩鴛鴦無事交渠更相失不及従來莫作雙鄭緝之永嘉記曰有沐溪野去青田九里有雙白鶴年年生子長大便去只恒餘父母一隻耳精白可愛多云神仙所養浮丘公相鶴經云青田之鶴干寳搜神記云宋康王舍人韓憑娶妻何氏美康王奪之憑自殺妻投臺而死里人埋之冢相望也宿昔有大梓木生於二冢之端有鴛鴦各一恒棲樹上交頭悲鳴音聲感人宋人哀之遂號其木曰相思樹相思之名起於此也注詳見鴛鴦賦雜樹本惟金谷苑諸花舊滿洛陽城正是古來歌舞處今日看時無地行石崇金谷詩序曰有别廬在河内縣金谷澗中思歸引序柏木幾於萬株董矯嬈詩云洛陽城東路桃李生路傍枝枝自相對葉葉自相當狹客行一作畫屏風詩二十五篇之首在詩集文苑英華另作狹客行在樂府今附録四巻詩末五巻樂府之前狹客重連鑣金鞍被桂條説文曰鑣馬勒旁鐵也釋名曰鑣包也所以在旁包歛其口也細塵障路起驚花亂眼飄酒醺人半醉汗濕馬全驕漢書天馬歌曰沾赤汗沫流赭歸鞍畏日晩爭路上河橋晉書杜預建河橋於富平津庾子山集巻四
