body:
  text: 庾子山集巻九周庾信撰錢唐倪璠纂註連珠擬連珠傅𤣥敘連珠曰所謂連珠者興於漢章之世班固賈逵傅毅三子受詔作之其文體辭麗而言約不指說事情必假喻以達其㫖而覽者㣲悟合於古詩諷興之義欲使厯厯如貫珠易看而可悅故謂之連珠陸機復引舊義以廣之謂之演連珠信復擬其體以喻梁朝之興廢焉觀其辭㫖悽切略同於江南之賦矣蓋聞經天緯地之才拔山超海之力左氏傳曰經天緯地曰文史記項羽歌曰力拔山兮氣蓋世孟子曰挾泰山以超北海戰陣勇於風飈謀謨出於胸臆揚雄曰風發飈拂師古曰飈廻風也斬長鯨之鱗截飛虎之翼左氏傳曰古者明王伐不敬取其鯨鯢而封之以為大戮於是乎冇京觀異物志雄鯨雌鯢長者數千里汲冢周書曰無虎傅翼將飛入宫擇人而食是以一怒而諸侯懼安居而天下熄二語出孟子肅此章喻梁武帝雄才大力異勇神謀行次熨斗坑王十萬之軍兵發襄陽授東昏一夫之首使魏敕莫敢爭鋒齊王於焉禪位是梁朝有天下之始也蓋聞蕭曹贊務雄略所資漢書曰蕭何曹參為相國以喻南康即位之時武帝進位相國也魯衛前驅威風所假左氏傳曰太姒之子周公康叔為相睦也論語云魯衛之政兄弟也以喻帝與齊俱姓蕭氏同承淮陰令整之後為兄弟也是以黄池之㑹可以争長諸侯左傳哀十三年曰夏公㑹單平公晉定公吳夫差於黄池秋七月辛丑盟吳晉争先吳人曰於周室我為長晉人曰於姬姓我為伯杜元凱云陳留封丘縣有黄亭及濟水吳與晉於周皆姬姓以喻帝與齊皆蕭姓故得進爵王公争長於諸侯也鴻溝之盟可以中分天下史記高祖本紀曰項羽與漢王約中分天下割鴻溝而西者為漢鴻溝而東者為楚以喻梁武帝成江表王業與魏氏中分南北若鴻溝矣公此章喻梁帝匡贊擬於蕭曹宗盟同於魯衛故得王備九錫之儀南北定中分之業江表之極盛者也蓋聞解封豕之結塞長蛇之源必須製裳千里喢血轅門左傳申包胥曰吳為封豕長蛇以薦食上國杜云言吳貪害如蛇豕喻侯景也左傳子産曰子有美錦不使人學製焉大官大邑身之所庇也釋名曰上衣下裳史記文帝紀曰啑血京師索隠曰漢書啑作牒音跕丁蹀反漢書陳湯傳曰杜業皆言喋血無盟歃事廣雅曰喋履也謂履涉之周禮曰設車宫轅門鄭注謂王行止宿險之處備非常次車以為藩則仰車以其轅表門言欲寧亂必千里命將盟喢以備非常也是以開百里之圍用陳平之一策史記曰高帝擊韓王信於代卒至平城為匈奴所圍七日不得食高帝川陳平竒計使單于閼氏圍以得開高帝既出其計秘世莫得聞桓譚新論曰或云陳平為高帝解平城之圍則言其事秘世莫得而聞也以工妙踔善故藏隠不傳焉子能權知斯事否吾應之曰此策乃反薄陋拙惡故隠而不泄高帝見圍七日而陳平往說閼氏閼氏言于單于而出之以是知其所用說之事矣彼陳平必言漢有好麗美女為道其容貌天下無有今困急已馳使歸迎取欲進與單于單于見此人必大好愛之愛之則閼氏日以逺疎不如及其未到令漢得脫去去亦不持女來矣閼氏婦女有妬媔之性必増惡而事去之此說簡而要及得其用則欲使神怪故隠匿不泄也劉子駿聞吾言乃立稱善焉盟千乘之國須季路之一言左傳哀十四年曰小邾射以句繹來奔曰使季路要我吾無盟矣使子路子路辭季康子使冉有謂之曰千乘之國不信其盟而信子之言子何辱焉對曰魯有事於小邾不敢問故死其城下可也彼不臣而濟其言是義之也由弗能以喻侯景内附當如季路之於邾射辭之為是不當納也此章喻梁武帝納侯景之非也景屬高歡潛圖反叛彼既封豕長蛇包藏毒害之志我須製裳㰱血得其駕馭之方而乃造次納降漫無區畫既無陳平之竒策又少季路之一言使平城之圍困卒成句繹之叛徒滋盛醸成國禍是以傷之蓋聞得賢斯在不藉揮鋒股肱良哉無論應變是以屈倪參乘諸侯解方城之圍屈倪屈完也左傳僖四年曰齊侯以諸侯之師侵蔡遂伐楚楚子使屈完如師師退次於召陵齊侯陳諸侯之師與屈完乘而觀之齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以德綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池雖衆無所用之屈完及諸侯盟杜預注云方城山在南陽葉縣干木為臣天下無西河之戰史記曰魏文侯客段干木過其閭未嘗不軾也秦嘗欲伐魏或曰魏君賢人是禮國人稱仁上下和合未可圗也文侯由此得譽於諸侯而此章喻梁武帝用朱异等輩委寄失才也引古賢臣寓意自見所謂使覽者微悟合於古詩諷興之義是也蓋聞邯鄲已危徒思馬服史記曰趙恵文王賜趙奢為馬服君與亷頗藺相如同位秦與趙兵相距長平時趙奢已死奢子趙括代亷頗為將括軍敗數十萬之衆遂降秦秦悉坑之趙前後所亡凡四十五萬明年秦兵遂圍邯鄲嵗餘㡬不得脫薊城去矣空用荆軻史記曰秦兵臨易水禍且至燕太子丹陰養壯士二十人使荆軻獻督亢地圗於秦因襲刺秦王秦王覺殺荆軻使將軍王翦擊燕十月而拔薊城燕王亡徙居遼東斬丹以獻秦秦拔遼東虜燕王喜卒滅燕是以竹杖扶危不能正武擔之石漢書曰張騫言使大夏時見蜀布卭竹杖蜀本紀曰武都有丈夫化為女子顔色美好蓋山精也蜀王娶以為妻不習水土疾病欲歸國蜀王留之無幾物故故蜀王發卒之成都擔土於成都廓中葬蓋地數畝高七丈號曰武擔也蜀志曰劉先主即帝位於成都武擔之南裝松之曰武擔山名在成都西北蘆灰縮水不能救宣房之河淮南子曰女媧聚蘆灰以止淫水高誘曰蘆葦也生於水故積聚其灰以止淫水地平出水為淫水漢書溝洫志曰上使塞瓠子決河歌曰宣房塞兮萬福求於是卒塞瓠子築宫其上名曰宣房而道河北行二渠復禹舊迹而梁楚之地復寧無水災此章喻臺城陷後雖名將烈士無所復用邯鄲薊城皆喻建康之敗也竹杖已下言亂勢已成力不能挽哀江南賦云敝箄不能救鹽池之鹹阿膠不能止黄河之濁即此意也蓋聞穴蟻衝泉未知逺慮易林曰蟻封穴户大雨將至𤣥禽巢幕何能支久左傳襄二十九年云吳公子札謂孫文子曰夫子之在此也猶燕之巢於幕上杜預曰言至危也按燕一名𤣥鳥詩云天命𤣥鳥故稱𤣥禽也是以大厦既焚不可灑之以淚長河一決不可障之以手西京賦曰大厦耽耽薛綜曰屋之四下者為厦江淹别賦云去復去兮長河湄如此章喻臺城陷後侯景入城武帝簡文為賊臣所制蟻在泉中悲長河之一決燕巢幕上觀大厦之既焚豈可手障淚灑言其不能救也蓋聞膏脣喋喋市井營營或以如簧自進或以狙詐相傾史記匈奴傳曰喋喋而佔佔冠固何當索隠注曰喋音諜利口也服䖍曰口舌為喋莊子云仲尼曰商賈旦於市井以求其贏司馬彪曰九夫為井井有市列子林𩔖曰吾又安知營營而求生之非惑乎鮑照行樂至城東橋詩曰擾擾遊宦子營營市井人詩云巧言如簧漢書秦據勢勝之地騁狙詐之兵是以子貢使乎五都交亂史記仲尼弟子傳曰子貢一出存魯亂齊破吳彊晉而霸越子貢一使使勢相破十年之中五國各有變張儀見用六國縱横史記索隠注曰張儀說六國使連衡而事秦山東地形從長蘇秦相六國令從親而賔秦闗西地形衡長張儀相六國令破其縱而連秦之衡故蘇為合從張為連衡也衡音横東西為横南北為從也肉此章喻諸王授兵之日讒潛者多以致兄弟猜嫌骨屠害張纘有起兵聚米之說遂爾䦧牆蕭綸有代景行師之言聞之掩泣哀江南賦云晉鄭靡依魯衛不睦是也蓋聞謀猷是習權變須長時増齊竈或卧燕牆史記曰孫臏使齊軍入魏地為十萬竈明日為五萬竈明日為二萬竈後漢書曰虞詡征朝歌賊令吏士各作兩竈日増倍之或問曰孫臏減竈而君増之何也詡曰孫臏見弱吾今示強勢有不同故也崔鴻十六國春秋曰建興十年慕容寶軍參合魏縱兵擊之燕軍敗走赴水死傷者四五萬人十一年慕容垂至參合見往年戰處積骸如山設祭弔之禮死者父兄子弟皆號哭六軍哀慟垂慚憤嘔血因而寢疾乗馬輿而進頓平城西北三十里積十日疾篤踰山結營築燕昌城以自固是以井陘之兵如鴻毛之遇火漢書曰韓信張耳欲東下井陘擊趙未至井陘口三十里止舍使一大赤幟戒曰趙見我走必空壁逐我若拔趙幟立漢幟趙人還歸壁見漢赤幟大驚以漢為破趙矣遂亂遁走於是漢軍夾擊破趙斬成安君擒趙王歇長平之卒若秋草之中霜史記曰秦與趙兵相拒長平趙括為將秦將白起縱奇兵徉敗走而絶其糧道分斷其軍為二士卒離心四十餘日軍餓趙括出銳卒自搏戰秦軍射殺趙括括軍敗數十萬之衆衆遂降秦秦悉坑之趙前後所亡凡四十五萬此章喻王僧辯等平景之師也蓋聞彼黍離離大夫有䘮亂之感詩序曰黍離閔宗周也周大夫行役過故宗廟宫室盡為禾黍故為黍離之詩麥秀漸漸君子有去國之悲史記曰武王封箕子於朝鮮而不臣也其後箕子朝周過故殷墟感宫室毁壊生禾黍箕子傷之欲哭則不可欲泣為其近婦人乃作麥秀之詩以歌詠之其詩曰麥秀漸漸兮禾黍油油兮彼狡童兮不與我好兮所謂狡童者紂也殷民聞之皆為流涕是以建章低昻不得猶瞻灞岸三輔黄圗曰武帝太初元年作建章宫度為千門萬户王粲七哀詩曰南登灞陵岸廻首望長安建章灞岸在西京以喻梁都在建業傷故宫之殘毁也德陽淪没非復能臨偃師三輔黄圗曰景帝廟號德陽宫後漢書曰光武出自景帝漢書地理志云河南郡有偃師縣在洛陽東三十里光武都洛是臨偃師以喻元帝都江陵之後傷中興之道銷也傷此章喻梁國之亡似感宗周如悲殷室建康一敗既故國之殘江陵三年無補中興之業此子山所以舊國舊都望之悵然者也蓋聞市朝遷貿山川悠逺古出夏北門行曰市朝易人穆王傳道里悠逺山川間之是以狐兔所處由來建始之宫潘岳西征賦曰狐兔窟穴於殿傍魏志曰建安二十五年正月曹公在洛陽起建始殿荆棘參天昔日長洲之苑雍門周曰墳墓生荆棘狐兔穴其中吳都賦云佩長洲之茂苑清此章喻克復之後遷都江陵朝市既移山川遂隔太罹亂之後既已陷没臺城裴横入獵之餘復令揚灰太極羽儀輦路莫有孑遺户口人民百遺一二而故宫於焉禾黍矣蓋聞天方薦瘥䘮亂𢎞多詩小雅節南山之辭毛傳云薦重瘥病𢎞大也空思說劔徒聞枕戈樂記曰裨冕搢笏而虎賁之士說劔也晉書劉琨與親故書吾枕戈待旦志梟逆虜常恐祖生先吾著鞭方言曰㦸吳揚之間謂之戈是以劉琨之英略莫知自免晉書曰劉琨字越石中山魏昌人愍帝即位三年拜為司空都督幷冀三州諸軍事幽州刺史鮮卑段匹磾數遣使要琨欲與同奬王室琨由是率衆赴之從飛狐入薊匹磾見之甚相崇重與琨結婚約為兄弟是時西都不守元帝稱制江左琨乃令温嶠勸進於是河朔征鎮夷夏一百八十人連名上表元帝轉琨為侍中太尉其餘如故并贈名刀琨答曰謹當躬自執佩馘截二􅒾匹磾奔其兄䘮琨遣其世子羣送之為末波所獲因共結盟而襲匹磾宻遣使齎羣書請琨為内應而為匹磾邏騎所得時琨别屯故征北府小城不之知也因來見匹磾匹磾以羣書示琨曰意亦不疑公是以白公耳琨曰與公同盟志奬王室仰憑威力庶雪國家之恥若兒書宻達亦終不以一子之故負公㤀義也匹磾雅重琨初無害琨志將聽還屯其中弟叔軍好學有知謀為匹磾所信謂匹磾曰吾外夷耳所以能服晉人者畏吾衆也今我骨肉構禍是其良圗之日若能奉琨以起吾族盡矣匹磾遂留琨匹磾所署代郡太守辟閭嵩與琨所署雁門太守王據後將軍韓據連謀合作攻具欲以襲匹磾而韓據女為匹磾兒妾聞其謀而告之匹磾於是執王據等悉誅之會王敦宻使匹磾殺琨匹磾遂縊之子姪四人俱被害按劉琨喻王僧辯也梁元帝承制江陵僧辯勸進猶晉元帝承制江左劉琨勸進也僧辯為陳霸先所縊猶劉琨為段匹磾所縊也兩人行跡相似故引用之且陳武無匹磾之忠而蹈處仲之迹遂致易梁為陳王公之不免也惜哉祖逖之慷慨裁能渡河晉書曰祖逖字士稚范陽遵人也輕財好俠慷慨有節京師大亂逖以社稷傾覆常懐振復之志元帝以逖為奮威將軍豫州刺史給千人廪布三千匹不給鎧仗使自招募仍將本流徙部曲百餘家渡江中流擊楫而誓曰祖逖不能清中原而復濟者有如大江辭色壯烈衆皆慨歎屯於江陰起鑄冶兵器得二千餘人而後進前後剋獲由是黄河以南盡為晉上詔進逖為鎮西將軍石勒不敢窺兵河南子山引此恨當時無此人陳霸先不足云也此章喻建業陽九江陵百六王僧辯有討平侯景之功而鮮保身之哲陳霸先懐覬覦梁鼎之意而無渡河之心此南風之所以不競也蓋聞穀林長送蒼梧不從吕氏春秋曰堯葬穀林皇甫謐曰穀林即陽城堯都平陽於詩為唐國禮記謂舜葬蒼梧三妃未從以喻元帝之死也惟桐惟葛無樹無封左傳哀二年云趙簡子誓曰若其有罪絞縊以戮桐棺三寸不設屬辟注桐棺三寸禮記夫子制於中都四寸之棺五寸之椁以斯知不欲速朽也鄭康成注云此庶人之制也棺用難朽之木桐木易壊不堪為棺故以為罰墨子尚儉有桐棺三寸漢書楊王孫曰昔帝堯之葬也窽木為匱葛藟為緘服䖍曰藟葛蔓也一曰藟亦草名葛之纈也緘束也音工咸反周易曰古之葬者厚衣之以薪葬之中野不封不樹以喻元帝葬用帊席茅裹尸也是以隋珠日月無益驪山之火捜神記曰隋國之侯見大蛇傷者療而愈之蛇銜珠以報其德故稱隋珠西都賦曰隋侯明月漢書劉向上疏曰秦始皇葬於驪山之阿其後牧兒亡羊羊入其鑿牧者持火照求羊失火燒其臧槨雀臺絃管空望西陵之松魏志曰建安十五年冬作銅雀臺魏武遺令曰吾伎人皆著銅雀臺於臺上施六尺牀繐帳朝晡上晡糒之屬月朝十五日輒向帳作伎汝等時時登銅雀臺望吾西陵墓田謝朓銅雀臺詩曰鬱鬱西陵樹詎聞歌吹聲李善曰不敢指斥故以樹言之也岳此章喻梁元被戮不以人君之禮葬也江陵之敗遭陽之詰辱命傅準以行刑一囊之土罰甚桐棺一乗之車殉同鮮葬嗚呼生為撥亂之君死葬庶人之禮是以對驪山以興思望西陵而泣下津陽門外有故君之感焉蓋聞雷驚獸駭電激風驅陵厯闗塞枕跨江湖是以城形月偃陣氣雲鋪水經注曰沔左有却月城亦曰偃月壘戴監軍築故曲陵縣後乃沙羡縣治也昔魏將黄祖所守遣董襲陸統攻而禽之禰衡亦遇害於此湘中記曰遥望衡山如陣雲史記天官書曰陣雲如立垣言武陵王紀師次西陵軍容甚盛元帝命陸法和拒之立七勝之城鎖江斷峽也非緑林之散卒即驪山之叛徒後漢書劉𤣥傳曰諸亡命共攻離鄉聚藏於緑林中注云緑林山在今荆州漢書英布傳布友薛公曰布以驪山之徒自致萬乗此皆為身不顧後慮喻任約謝答仁等本侯景之黨也哀江南賦云驅緑林之散卒拒驪山之叛徒營軍梁溠蒐乗巴渝皆謂㧞逆黨以攻蜀也與此同元帝紀云承聖元年八月武陵王紀引兵東下二年五月帝拔任約於獄以為晉安王司馬撤禁兵以配之又於獄拔謝答仁為步兵校尉配衆一旅上赴以助陸法和是也此章喻元帝攻蜀之師復用侯景之黨也楚蜀雖有鬩牆之隙然本兄弟之國輔車相依脣亡齒寒者也蜀亡而楚必隨之㤀宿憤以結新讐驅叛徒而抗骨月王琳以藉盛師徒而遷之嶺外法和方大聚兵艦而復阻襄陽是以魏師卒至俛首係頸雖任約在外答仁請從帝豈能推腹心於彼耶宜其有江陵之敗也與蓋聞死别長城生離函谷楊泉物理論曰秦築長城死者相屬民歌云生男慎勿舉生女哺用脯不見長城下尸骸相支拄戰國策曰秦東有崤函之固韋昭曰函谷闗也時西魏都長安本故秦地江陵平男女盡俘入闗故云遼東寡婦之悲代郡霜妻之哭遼東寡婦未詳疑謂蔡文姬没于南匈奴為遼東也史記趙世家曰襄子姊前為代王夫人襄子北登夏屋請代王使厨人探銅枓以食代王及從者行斟陰令宰各以枓擊殺代王及從官遂興兵平代地其姊聞之泣而呼天摩笄自殺代人憐之所死地名之為摩笄之山遂以代封伯魯子周為代成君是以流慟所感還崩杞梁之城列女傳曰齊杞梁殖之妻莊公襲莒殖戰而死杞梁之妻無子内外皆無五屬之親既無所歸乃枕其夫之尸於城下而哭内諴動人道路過者莫不為之揮涕十日而城為之崩既葬遂赴淄水而死灑淚所沾終變湘陵之竹博物志云舜二妃曰湘夫人舜崩二妃啼以涕揮竹竹盡斑杜此章喻江陵之陷殺傷者衆屠戮之慘繼以别離如畿被害王褒獻俘男女盡為入闗弱小至於加戮所以啼枯湘水哭壊杞城也蓋聞三世用兵既非貽厥史記曰陳勝之反秦秦使王翦之孫王離擊趙圍趙王及張耳鉅鹿城或曰王離秦之名將也今將強秦之兵攻新造之趙舉之必矣客曰不然夫為將三世者必敗必敗者何也以其所殺伐衆矣其後受其不祥今王離已三世將矣居無何項羽救趙擊秦軍果虜王離陰謀累葉必以凶終史記陳平曰我多陰謀是道家之所禁吾世即廢亦已矣終不能復起以吾多陰禍也其後曽孫陳掌以衛氏親貴戚願得續封陳氏然終不得是以李都尉之風霜上蘭山而箭盡史記曰李陵拜騎都尉天漢二年使陵將其射士步兵五千人出居延可千餘里單于以兵八萬圍擊陵軍陵軍五千人兵矢既盡救兵不到遂降匈奴單于以女妻陵而貴之漢聞族陵母妻子自是之後李氏名敗陸平原之意氣登河橋而路窮晉書曰陸機為長沙王又敗於河橋孟玖譖於成都王潁潁殺之將刑嘆曰華亭鶴唳豈可復聞乎臧榮緒晉書曰成都王表理機起為平原内史故稱平原干寳晉紀曰初陸抗誅步闡百口皆盡有識尤之及機雲見害三族無遺此章喻江陵之敗僧祐戰死買臣敗績王褒俘虜似蘭山之箭盡杜畿兄弟若河橋之路窮蓋聞營魂不反燐火宵飛楚辭曰載營魂而升霞陸士衡文賦云覽營魂以探賾頓精爽而自求老子曰載營魄抱一能無離乎鍾會曰載辭也經䕶為營形氣為魄謂魂魄經䕶其形氣使之長存也左傳樂祁曰心之精爽是為魂魄陸士衡贈從兄車騎詩曰營魄懐兹土精爽若飛沈張銑曰營心府間也言心府魂魄懐於吳土而精爽若飛若沈不定也此云營魂即營魄也言心府間魂魄無所歸也淮南子曰人血為燐許慎注曰兵死之血為鬼火崔豹古今注云螢火一名燐亦名霄飛時遭獵夜之兵或斃空亭之鬼晏子春秋景公畋于梧丘夜夢有五丈夫稱無罪晏子曰先君靈公畋五丈夫駭獸斷其頭葬之曰五丈夫丘後漢書漦亭有鬼數殺過客王忳除郿令有女子訴曰妾夫為涪令之官過宿此亭亭長無狀枉殺妾家十餘口埋在樓下悉盜取財貨忳問亭長姓名女子曰即今門下遊徼者也明旦問遊徼詰問具服罪即收繫及同謀十餘人悉伏辜遣吏送其䘮歸鄉里於是亭遂清安是以射聲營之風雨時有寃魂射聲校尉漢武帝置光武建安七年省漢書音義曰射聲謂工射者也夜中聞聲則射之因以為名後漢書曰曹褒遷射聲校尉射聲營舍有停棺不葬百餘所褒親履行問故吏對曰此多是建武以來絶無後者褒為買空地悉葬其主者設祭以祀之廣漢集作莫非郡之陰寒偏多夜哭東觀漢記曰陳寵字昭公沛國人轉廣漢太守先是洛陽城南每陰常有哭聲聞於府中寵使案行昔嵗倉卒時骸骨不葬者多寵乃勑縣葬埋由是即絶謝恵連祭古冢文云射聲垂仁廣漢流渥是也廣漢俗本作廣莫以漢字轉寫誤漠漠復誤為莫也王隠晉書劉隗奏曰懐情抱恨雖没不亡故有隕霜之應夜哭之鬼王融策秀才文云棘林多夜哭之鬼也此章喻戰争之後殺傷者多與哀江南賦鬼火亂於平林傷䰟遊於新市意同蓋聞江黄戎馬之徼鄢郢風飈之格江黄鄢郢皆楚地也江黄春秋時嬴姓國名左傳江黄道柏皆弦姻也後為楚所滅老子曰天下無道戎馬生於郊漢書地理志曰南郡宜成故鄢又郢楚别邑故郢文選凡猋字五臣本皆作飈疾風也乍有去而不歸或無期而逺客言江黄鄢郢之間遭亂離也是以章華之下必有思子之臺左氏傳曰楚靈王成章華之臺及乾谿之辱蔡公使殺太子禄及公子罷敵王聞羣公子之死也自投於車下曰人之愛其子也亦如余乎又曰余殺人子多矣能無及此乎雲夢之傍應多望夫之石列異傳曰武昌新縣北山昔有貞婦其夫從役婦攜幼子餞送此山立望而形化為石張揖曰雲夢在南郡華容縣所此章喻江陵闔城長幼被擄入闗哀江南賦謂石望夫而逾逺山望子而逾多者也蓋聞無怨生離恩情中絶空思出水之蓮無復廻風之雪曹子建洛神賦曰河洛之神名曰宓妃其形也廹而察之灼若芙蕖出渌波又云飄颻兮若流風之廻雪是以樓中對酒而緑珠前去晉書曰孫秀使人求緑珠石崇不許秀怒乃勸趙王倫誅崇矯詔收崇等崇正宴於樓上介士到門崇謂緑珠曰我今為爾得罪緑珠泣曰當效死於官前因自投於樓下而死帳裏悲歌而虞姬永别史記曰項王軍壁垓下聞漢軍四面皆楚歌項王乃大驚曰漢皆已得楚乎是何楚人之多也項王則夜起飲帳中有美人名虞常幸從駿馬名騅常騎之於是項王乃悲歌慷慨自為詩曰力拔山兮氣蓋世時不利兮騅不逝騅不逝兮可奈何虞兮虞兮奈若何注云楚漢春秋曰漢兵已略地四面楚歌聲大王意氣盡賤妾何聊生此章喻江陵覆亡貴人妻妾盡被俘擄今時離怨平昔恩情雖復色茂開蓮風如廻雪而高臺巳傾愛妾何在緑珠則巳墮吹樓虞姬則聞歌夜帳矣蓋聞樹彼司牧既懸百姓之命及乎厭世復傾天下之心是以一馬之奔無一毛而不動一舟之覆無一物而不沈左傅邾文公曰天生民而樹之君使司牧之孔叢子子貢曰馬奔車覆此章喻梁之興亡皆由武帝一敗之後不復振也方其誅柬昏而興既使百姓待命及夫納侯景而亂復令天下傾心所謂自我得之自我失之者也是以武陵僭號蜀國既亡湘東雪讎江陵復敗蕃屏既巳無餘枝葉又將盡落岳陽西附僅逼一州敬帝南還終悲易姓譬如馬奔毛動舟覆物沈天之所壊不可支也蓋聞嚴霜之零無所不肅長林之斃無所不摽左傳哀十二年子木曰長木之斃無不摽也國狗之瘈無不噬也而况大國乎杜預曰摽擊也是以楚塹既填遊魚無託吳宫已火歸燕何巢楚塹謂江陵也吳宫謂建鄴也遊魚歸燕信自謂也越絶書吳地傳曰東宫秦始皇十二年守宫者照燕失火燒之此章喻大梁之亡如衰秋揺落江陵潰敗嗟楚塹之既填建鄴凋殘悲吳宫之已火巳遂無所依歸也蓋聞名高八俊傷於閹䜿之黨後漢書黨錮傳曰桓靈之問主荒政謬國命委於閹寺士子羞與為伍故匹夫抗憤處士横議遂乃激揚名聲互相題拂天下名士為之稱號李膺荀昱杜宻王暢劉祐魏朗趙典朱㝢為八俊俊者言人之英也靈帝詔捕張儉大長秋曹節因此諷有司奏捕前黨百餘人皆死獄中智周三傑斃於婦女之計史記高祖曰張良蕭何韓信此三者皆人傑也吾能用之此吾所以取天下也又韓信傳曰吕后使武士縛信斬之長樂鍾室信方斬曰吾悔不用蒯通之計乃為兒女子所詐豈非天哉是以洪澤之蛟遂挫長饑之虎平臯之蟻能摧失水之龍楚辭曰神龍失水而陸居兮為螻蟻之所裁王逸曰螻螻蛄也蟻蚍蜉也莊子庚桑子曰吞舟之魚碭而失水則蟻能苦之嵇康贈秀才入軍詩曰流磻平臯此章喻巳入魏之後束手受困雖有八俊之名三傑之智無所用之如猛虎長饑之候神龍失水之時也蓋聞吳艘蜀艇不能無水而浮淮南子曰越舲蜀艇不能無水而浮高誘注曰舲小船也蜀艇一版之舟若無水不能獨浮也說文曰艘船總名也以紅間緑不能無弦而射淮南子曰烏號之弓谿子之弩不能無弦而射是以樊籠之鶴寧有六翮之期骯髒之馬無復千金之價新序曰郭隗謂燕王曰古之君有以千金市千里馬者三年不得人請求之三月得馬已死矣買其骨以五百金君大怒之人曰死馬骨且市之况生馬乎天下必以王為好馬矣於是不朞年千里馬至者二權此章喻巳屈體魏周不能復振雖國有讎仇而身無藉有如樊籠之鳥豈望奮飛又若骯髒之馬已曽葬腹蓋聞性靈屈折鬱抑不揚乍感無情或傷非類左氏傳曰非我族類是以嗟怨之水特結憤泉感哀之雲偏含愁氣袁宏後漢紀耿恭曰聞貳師將軍拔佩刀以刺山而飛泉湧出乃整衣拜禱飛泉奔出謝恵連雪賦曰寒風積愁雲繁此章喻己降魏之後窮困愁苦也少卿有云終日無覩但見異類舉目言笑誰與為歡是以嗟怨成水哀感生雲也蓋聞遷移白羽流徙房陵春秋昭十年云冬許遷於白羽左氏傳曰楚子使王子勝遷許於析實白羽淮南子云趙王遷流於房陵思故鄉則為作山木之謳聞之者莫不隕涕括地志云趙王遷墓在房州房陵縣西九里也離家析里悽恨撫膺列子曰撫膺而恨膺胸也是以吳起之去西河澘然出涕吕氏春秋曰吳起治西河王錯譖之魏武侯武侯使人召呉起至岸門止車而立望西河泣數行下其僕曰竊觀公之志視天下若舍履今去西河而泣何也吳起雪泣應之曰使我畢能秦必亡西河今西河之為秦不久矣起入荆西河果入秦荆軻之别燕市悲不自勝史記曰荆軻嗜酒日與狗屠及高漸離飲於燕市酒酣以往高漸離擊筑荆軻和而歌於市中相樂也居頃之燕太子丹質秦亡歸厚養荆軻西刺秦王為秦所殺此章喻已家本江陵播遷秦地如許遷白羽趙虜房陵鄉闗之思彌殷悽恨之情遂切吳起之泣西河荆卿之悲燕市子山之哀江南有㫖哉有㫖哉蓋聞亷將軍之客館翟廷尉之高門盈虛倐忽貴賤何論史記曰亷頗之免長平歸也失勢之時故客盡去及復用為將客又復至亷頗曰客退矣客曰吁何見之晩也夫天下以市道交君有勢我則從君君無勢則去此固其理也有何怨乎漢書鄭當時傳曰下邽翟公為廷尉賔客填門及廢門外可設雀羅後復為廷尉客欲往翟公大署其門曰一死一生乃見交情一貧一富乃知交態一貴一賤交情乃見是以平生故人灌夫不去史記曰灌夫雖富然失勢卿相侍中賔客益衰及魏其侯失勢亦欲倚灌夫引繩批根生平慕之後棄之者蘇林曰二人相倚引繩直之意批根賔客也去之者不與交通門下賔客任安獨存史記衛青傳曰驃騎將軍秩禄與大將軍等自是之後大將軍青日退而驃騎日益貴舉大將軍故人門下多去事驃騎輒得官爵惟任安不肯此章喻己失勢之後賔客淪散也朱雀航中方愧投戈之日青油幕底遂踞斷袖之賔及夫右衛將軍復闢亷公之館中丞御史重開翟尉之門至今羇旅他鄉流離暮齒雖復羣公欵至才子爭交而平生之灌夫㡬人門下之任安安在矣蓋聞執珪事楚博士留秦史記曰莊舄故越之細人也為楚執珪病而猶尚越聲漢書曹參傳曰虜秦司馬及御史各一人遷為執珪如淳曰吕氏春秋得五員者號執珪古爵名也漢書百官公卿表曰博士秦官掌通古今秩比六百石員多至數十人又儒林傳曰秦始皇兼并天下燔詩書殺術士六學從此缺矣陳涉之王也魯諸儒持孔氏禮器往歸之於是孔卑為涉博士以秦禁其業而發憤於陳王也按博士雖為秦官秦禁其業留秦非其好也晉陽思歸之客臨淄羇旅之臣左傳定十三年曰秋七月范氏中行氏伐趙氏之宫趙鞅奔晉陽二子敗荀寅士吉射奔朝歌趙鞅入於絳又按杜預世族譜晉國本在太原晉陽縣變父改之曰晉此云晉陽當謂晉也思歸之客疑即鍾儀事注見哀江南賦序左傳莊二十二年曰陳人殺其大子御寇陳公子完奔齊齊侯使敬仲為卿辭曰羇旅之臣敢辱高位以速官謗杜曰羇寄也旅客也臨淄齊地也漢書地理志曰齊郡臨淄師尚父所封是以親友會同不妨懐撫悽愴山河離異不妨風月闗人此章喻巳鄉闗之思也周陳之兩國通好得與𢎞正相親南北之流寓各還獨並王褒不遣此子山所以目極千里傷心悲䰟兮歸來哀江南也蓋聞五十之年壯情久歇憂能傷人故其哀矣是以譬之交讓實半死而言生述異記曰黄金山有楠樹一年東邊榮西邊枯後年西邊榮東邊枯年年如此張華云交讓樹也如彼梧桐雖殘生而猶死枚乗七發曰龍門之桐高百尺而無枝其樹半死而半生桐此章喻已哀傷易老壯志久衰豈交讓之全生實梧之半死遺矢之說是所甘心據鞍之情吾無望矣燭之武之言無能為也蓋聞秋之為氣惆悵自憐宋玉曰悲哉秋之為氣也耿恭之悲疎勒後漢書曰耿恭字伯宗慷慨多大略有將帥才永平十七年以恭為戊己校尉屯後王部金蒲城恭以疎勒城傍有澗水可固乃引兵據之匈奴攻恭會顯宗崩救兵不至車師復畔與匈奴共攻恭恭厲士衆擊走之數月食盡窮困乃煑鎧弩食其筋革恭與士推誠同死生故皆無二心而稍稍死亡餘數十人建初元年漢遣軍迎校尉城中皆稱萬嵗開門共相持泣遂相隨俱歸虜兵追之且戰且行吏士饑困發疎勒時尚有二十六人隨路死没三月至玉門惟餘士二人衣履穿決形容枯槁班超之念酒泉後漢書曰班超字仲升扶風平陵人封定逺侯超自以久在絶域年老思土上疏曰臣不敢望到酒泉但願生入玉門闗注玉門闗屬敦煌郡今沙州也去長安三千六百里闗在敦煌縣西北酒泉今肅州也去長安二千八百五十里也是以韓非客秦避讒無路史記曰秦王見韓非孤憤五蠧之書曰嗟乎寡人得見此人與之遊死不恨矣李斯曰此韓非之所著書也秦因急攻韓韓王始不用非乃遣非使秦秦王恱之未信用李斯姚賈害之毁之曰韓非韓之諸公子也今王欲并諸侯非終為韓不為秦此人之情也今王不用久留而歸之此自遺患也不如以過法誅之秦王以為然下吏治非李斯使人遺非藥使自殺非欲自陳不得見秦王後悔之使人赦之非巳死矣信陵在趙思歸有年史記曰魏公子無忌封信陵君魏王怒公子之盜其兵符矯殺晉鄙公子亦自知也巳却秦存趙使將將其軍歸魏而公子獨與客留趙十年不歸此章喻巳思故國有如宋玉悲秋及夫疎勒不還酒泉何望身羇長安韓非將死於秦路心存建葉信陵終念於魏邦蓋聞懸鶉百結知命不憂荀子曰子夏之衣如懸鶉人曰子胡不仕曰諸侯之驕我者吾不為臣大夫之驕我者吾不復見王隠晉書曰董威於市得碎繒輒以為衣號曰百結衣毛詩傳曰鶉鳥也釋鳥云鷯鶉其雄鵲牝庳李巡曰别雄雌異方之言鶉一名鷯郭璞曰鶉鷫之屬也周易繫辭曰樂天知命故不憂言知命者不憂貧也十日一炊無時何恥後漢書注曰第五頡客止靈臺中或十日不炊是以素王之業乃東門之貧民賈逵春秋序曰孔子覽史記就是非之說立素王之法鄭康成六藝論云孔子既西狩獲麟自號素王為後世受命之君制明王之法史記曰孔子適鄭與弟子相失孔子獨立郭東門或謂子貢曰東門有人其顙似堯其項類臯陶其肩類子産自腰以下不及禹三寸纍纍若䘮家之狗孤竹之君實西山之餓士史記曰伯夷叔齊孤竹君之二子也武王巳平殷亂天下宗周而伯夷叔齊恥之義不食周粟隠於首陽山采薇而食之遂餓死其辭曰登彼西山兮采其薇矣索隠曰西山即首陽山不此章喻已不當仕也樂天知命則衣弊可以不憂時我與雖無食何足為恥所以東門貧民亦號素王西山餓士垂名孤竹而子山巳餐周粟矣盖聞胸中無學猶手中無錢今之學也未見能賢論衡曰胸内無學猶手無錢是以扶風之高鳳無故棄麥後漢書曰高鳳字文通南陽葉人也少為書生家以農畝為葉而專精誦讀晝夜不息妻嘗之田曝麥於庭令鳳䕶雞時天暴雨而鳳持竿誦經不覺潦水流麥妻還怪問鳳方悟之其後遂為名儒乃教授於西唐山中中牟之寗越徒勞不眠吕氏春秋曰寗越者中牟鄙人也苦耕稼之勞謂其友曰何為可以免此苦也其友曰莫如學也學三十嵗則可以達矣寗越曰請以十五嵗人將休吾不敢休人將卧吾不敢卧學十五嵗而為周威王之師也寗此章喻己文籍滿腹不直一錢故云高鳳無故棄麥越徒勞不眠傷其大節已虧文章究何補焉蓋聞十室之邑忠信在焉見論語五歩之内芬芳可録說苑曰十步之内必有芳蘭是以日南枯蚌猶含明月之珠漢書地理志曰日南郡故秦象郡武帝元鼎六年開水經注曰交州合浦郡漢武元鼎六年平越所置孫權黄武七年改曰珠官郡郡不産榖多採珠寳史記李斯上書曰垂明月之珠顧微廣州記曰海中有火珠明月珠水精珠龍門死樹尚抱咸池之曲龍門死樹桐也注見上咸池黄帝樂名此章喻己雖身在北朝而心存南國譬之蚌枯而珠在樹死而曲存此心終為梁也蓋聞百尺之高累於九碁之上說苑曰晉靈公造九層之臺費用千金荀息聞之上書求諫曰臣能累十二博碁加九雞子其上公曰子為寡人作之荀息正顔色定志意以碁子置下加雞子其上公曰危哉危哉荀息曰不危也復有危於此者九層之臺三年不成男不耕女不織國用空虚鄰國謀議將興社稷亡滅君欲何望公曰寡人之過也乃至於此即毁九層臺千鈞之重懸於一木之枝吕氏春秋曰薄疑說衛嗣君曰烏獲舉千鈞又况一斤高誘曰千鈞三萬斤也漢書枚乗上書曰夫以一縷之任繫千鈞之重上懸之無極之高下垂之百尺之淵雖甚愚之人猶知其將絶也是以截虎尾而非險傷龍鱗而未危尚書君牙曰心之憂危若蹈虎尾涉於春冰韓子曰夫龍之為物可狎而騎也然喉下有逆鱗徑尺若人有攖之者則必殺人人主亦有逆鱗說者能無攖人主之逆鱗則㡬矣所此章喻已多危慮也百尺加九碁之上千鈞豈一木支截兹虎尾將必咥人傷彼龍鱗終遭其怒蓋聞居蘭處鮑在其所習大戴禮曰與君子遊宓乎如入蘭芷之室久而不聞則與之化矣與小人遊臭乎如入鮑魚之肆久而不聞則與之化矣是故君子慎其所去就者也論衡曰中人之性在所習習善則善習惡則惡鮑白卯反白羽素絲隨其所染墨子曰墨子見染絲嘆曰染於蒼則蒼染於黄則黄五入之則為五色故染不可不慎非獨絲也國亦有染湯染伊尹紂染惡來也是以金性雖質處劒即凶水德雖平經風即險此章言人逐物遷性有如香臭隨時𤣥黄代色巳所習染雖則臭若鮑魚色同染惡然而金思處劒之時水望經風之日猶足自奮也蓋聞豫章七年斃於豐草子虛賦曰楩柟豫章郭璞曰豫章大木也似楸葉冬夏青生七年乃可知也正義曰按温舍人云豫今之枕木也章今之樟木也二木生七年枕樟乃可分别芳蘭九畹淪於幽谷楚辭曰余既滋蘭之九畹琴操曰孔子過谷中見蘭獨茂嘆曰蘭當為玉者香今乃獨茂與草為伍乃止車援琴而鼔之自傷不逢時托辭於幽蘭也是以欲求其真晉陽有自埋之蒿春秋後語曰張孟談謂趙襄子曰董安于之在晉陽公宫之垣皆荻蒿若賞其聲吳亭有已枯之竹爾雅曰東南之美者有會稽之竹箭焉漢書地理志曰會稽郡秦置高帝十二年更名吳按秦法十里一亭以會稽名吳故云吳亭此章喻已初有小善終無成功豫章豈曰凡材芝蘭實為香草求其真實則荻蒿自埋賞彼虛聲則竹箭將盡蓋聞明鏡蒸食未為得所淮南齊俗訓曰夫明鏡便於照形其以函食不如簞干將補履尤可傷嗟劉向說苑曰干將鏌鋣拂鐘不錚試物不知揚刃離金斬羽契鐵斧此至利也然以之補履曽不如兩錢之錐楚辭曰秉干將以切肉王逸曰干將利劒也利劒宜以為威誅無狀以征不服今用割肉非其宜也以言使賢者為僕𨽻之徒非其宜也子山自喻在魏周如明鏡所以照形今乃用以蒸食干將所以示威今乃用以補履亦失其志也是以氣足凌雲不應止為武騎漢書曰司馬相如亊孝景帝為武騎常侍非其好也相如既奏大人之頌天子大恱飄飄有凌雲之氣似遊天地之間意才堪王佐不宜直放長沙史記賈誼傳曰天子議以賈生任公卿之位絳灌東陽侯馮敬之屬盡害之乃短賈生曰雒陽之人年少初學專欲擅權紛亂諸事於是天子疏之不用其議乃以賈生為長沙王太傅賈生既辭往行聞長沙卑濕自以夀不得長又以適去意不自得乃度湘水為賦以弔屈原之此章喻己在魏周不得其所也位望雖高時有長岑意恩禮並至猶懐汨羅之心用明鏡以蒸食取干將而補履相如作賦止為武騎之官賈誼多才不過長沙之傅而巳蓋聞勢之所歸威之所假必能繫風捕影見莊子暴虎馮河見論語是以輕則鴻毛沈水重則磐石凌波抱樸子曰重類宜沈而南海有浮石之山輕物當浮而䍧牱有沉羽之流則此章喻人隨時重輕惟得勢假威故能乗空禦險或鴻毛不勝或則負山餘力今已亦失勢之時威所不假者也蓋聞意氣難干非資扛鼎史記曰項羽力能扛鼎才氣過人韋昭曰扛舉也索隠曰說文云扛横闗對舉也音江風神自勇無待翹闗列子曰孔子勁能招國門之闗而不肯以力聞淮南子曰孔子之通智過於萇𢎞勇過於孟賁足攝郊菟力招城闗能亦多矣吳都賦曰翹闗扛鼎李善注引列子云招與翹同是以曹劌登壇汶陽之田遽反左傳作劌史記作沬史記曰曹沬者魯人也以勇力事魯莊公與齊戰三敗北魯莊公懼乃獻遂邑之地以和猶復以為將齊桓公許與魯㑹於柯而盟桓公與莊公既盟於壇上曹沬執七首劫齊桓公桓公左右莫敢動而問曰子將何欲曹沬曰齊彊魯弱而大國侵魯亦巳甚矣今魯城壊即壓齊境君其圗之桓公乃許盡歸魯之侵地既已言曹沬投其七首下堂北面就羣臣之位顔色不變辭令如故桓公怒欲倍其約管仲曰不可夫貪小利以自快棄信於諸侯失天下之援不如與之於是桓公乃遂割魯侵地曹沬三戰所亡地盡復予魯又按左傳公賜季友汶陽之田夾谷之㑹孔子曰而不反我汶陽之田杜預曰汶陽田汶水北地汶水出泰山萊蕪縣西入濟相如睨柱連城之璧更還史記曰秦王欲以十五城易趙王和氏璧藺相如奉璧見秦王既奏相如視秦王無意償趙城乃前曰璧有瑕請指示王授璧因却立倚柱曰臣觀大王無意償趙城故臣復取璧大王必欲急臣頭與璧俱碎於柱矣因持璧睨柱秦王恐破璧乃謝相如璧歸於趙此章喻己使魏之後不能奮積辱之志也梁元帝有返齊侵地之心已觸魏怒庾子山無擎璧睨柱之勇早辱秦庭既意氣之可干傷風神之遂屈以致一忘楚操漸食周薇曹柯之盟豈可庶㡬相如奉璧不如復反矣蓋聞巻葹不死誰必有心爾雅曰巻施草拔其心不死江淮間謂之宿莾甘蕉自長故知無節南方草木狀曰甘蕉望之如樹珠大者一圍葉長一丈或七八尺廣尺餘二尺許花大如酒杯形如芙蓉根如芋魁大者如車轂每華一闔各有六子先後相次子不俱生花不俱落一名芭蕉或曰巴苴有類羊角名羊角蕉有類牛乳名牛乳蕉又有蕉葛可紡績為絺綌交廣有之三輔黄圗曰武帝元鼎六年破南越建扶荔宫以植所得竒草異木有甘蕉二本是以螺蚌得路恐異驪淵莊子曰河上有家貧恃緯蕭而食者其子没於淵得千金之珠其父謂其子曰夫千金之珠必在九重之淵而驪龍頷下子能得珠必遭其睡也雀鼠同歸應非丹穴禹貢道渭自鳥鼠同穴孔安國曰鳥鼠共為雌雄同穴處此山遂名曰鳥鼠渭水出焉郭璞山海經注曰今在隴西首陽縣西南山有鳥鼠同穴鳥名䳜鼠名如人家鼠而短尾䳜似而小黄黑色穴入地三四尺鼠在内鳥在外山海經曰丹穴之山丹水出焉有鳥狀如雞五采而文名曰鳳皇首文曰德翼文曰義背文曰禮膺文曰仁腹文曰信是鳥也飲食自然自歌自舞見則天下安寧在此章喻已在魏周如宿莾之傷心比巴苴之無節珠蚌中即異驪龍之頷穴雖巢雀終非鳳皇所居也蓋聞北邙之高魏君不能削郭縁生述征記曰北邙東則乾晡山山西南晉文帝崇陽陵陵西武帝浚陽陵邙之東北宣帝高厚陵景帝峻平陵邙之南則恵帝陵也是北邙為晉陵言魏衰晉盛魏君不能削北邙之高猶梁衰陳盛也穀洛之鬭周王不能改周語曰榖洛鬭將毁王宫王欲壅之及景王多寵人亂於是乎始生景王崩王室大亂喻梁朝之衰也是以愚公何德遂荷鍤而移山列子曰太行王屋二山方七百里高萬仞北山愚公年且九十面山而居懲山北之塞出入之迂也乃率子孫叩石墾壤運於渤海之尾河曲智叟笑而止之精衛何禽欲銜石而塞海述異記曰炎帝之女溺死東海化為精衛其名自呼每銜西山木石填東海一名鳥市一名寃禽將此章喻陳盛梁衰霸先方起似晉帝北邙之高梁室亡擬周王穀洛之鬭方之愚叟豈可移山如彼寃禽焉能塞海也蓋聞君子無其道則不能有其財忘其貧則不能恥其食是以顔囘瓢飲賢慶封之玉杯論語曰賢哉囘也一簞食一瓢飲左傳曰崔氏滅慶封當國慶封好田而嗜酒與慶舍政欒高陳鮑之徒殺慶舍慶封來奔齊人來讓奔吳予之朱方聚其族焉而居之富於其舊昭四年為楚靈王所殺玉杯言富而嗜酒也子思銀佩美虞公之垂棘桓寛鹽鐵論貧富篇子思之銀佩美於虞公之垂棘左傳僖二年云晉荀息請以屈産之乗與垂棘之璧假道於虞以伐虢虞公許之宫之竒諌不聽遂起師伐虢滅下陽僖五年云晉滅虢師還舘于虞遂襲虞滅之爾此章喻不義而富不如樂道而貧慶封因富嗜酒遂亡家虞公以賄先書因之失國今巳自入魏以來禄位雖高恥辱彌甚願為貧賤而不可得也蓋聞水之激也實濁其源木之蠧也將拔其根是以延年之家預論掃墓漢書曰嚴延年字次卿東海下邳人也為河南太守母從東海來欲從延年臘到雒陽適見報囚母大驚便止都亭不肯入府延年出至都亭謁母母閉閤不見延年免冠頓首閤下良久母乃見之因數責延年幸得備郡守專治千里不聞仁愛敎化有以全安愚民顧乗刑罰多刑殺人欲以立威豈為民父母意哉延年服罪重頓首謝因自為母御歸府舍母畢正臘謂延年天道神明人不可獨殺我不意當老見壯子被刑戮也行矣去女東歸埽除墓地耳遂去歸郡見昆弟宗人復為言之後嵗餘果敗東海莫不賢知其母延年兄弟五人皆有吏材至大官東海號曰萬石嚴嫗亦見續列女傳羊舌之族先知滅門春秋時晉公族有羊舌氏左傳閔二年云晉伐臯落氏羊舌大夫為尉正義曰羊舌氏也爵為大夫此人生職職生銅鞮伯華叔向叔魚叔虎為羊舌四族或曰羊舌氏姓李名果有人盜羊而遺其頭不敢不受受而埋之後盜羊事發辭連李氏李氏掘羊頭而示之以明巳不食惟識其舌舌存得免號曰羊舌氏此羊舌之族所自始也事見春秋正義云先知滅門者按左傳序叔虎之敗云初叔向之母妬叔虎之母美而不使其子皆諫其母母曰深山大澤實生龍蛇彼美余懼其生龍蛇以禍汝汝敝族也國多大寵不仁人間之不亦難乎余何愛焉使往視寢生叔虎美而有勇力欒懐子嬖之故羊舌氏之族及於難及伯石之敗傳又云初叔向欲娶申公巫臣氏其母欲娶其黨叔向曰吾母多而庶鮮吾懲舅氏矣其母曰子靈之妻殺三夫一君一子而忘一國兩卿矣可無懲乎吾聞之甚美必有甚惡是鄭穆少妃姚子之子子貉之妹也子貉早死無後而天鍾美於是將必以是有大敗也昔有仍氏黰黒名曰𤣥妻樂正后夔取之生伯封實有豕心貪惏無饜忿纇無期謂之封豕有窮后羿滅之夔是以不祀且三代之亡共子之廢皆是物也女何以為哉夫有尤物足以移人茍非徳義則必有禍叔向懼不敢取平公強使取之生伯石伯石始生子容之母走謁諸姑曰長叔姒生男姑視之及堂聞其聲而還曰豺狼之聲也狼子野心非是莫䘮羊舌氏矣遂弗視又叔魚之敗晉語云叔魚生其母視之曰是虎目而豕啄鳶肩而牛腹谿壑可盈是不可厭也必以賄死遂弗視羊舌之母蓋嘗三言而三當焉列女傳稱羊叔子之妻叔向叔魚之母為羊叔姬盜羊之事藉叔姬之言埋而不食為防害逺疑矣滕王序云自攜老入闗蒸蒸色養及丁母憂杖而後起是子山有母嚴嫗叔姬自喻其母之賢明也此章喻庾氏世德及巳而衰如水因流激而源濁木為枝敗而根傷嚴家五子萬石未取其歡羊舌四宗三言盡識其敗汚吾世矣負阿母矣見子山蒸蒸色養之義焉蓋聞磨礪脣吻脂膏齒牙漢書東方朔對曰臣觀其臿齒牙吐脣吻左傳子革曰摩厲以須說文曰戴角者脂無角者膏膏肥也臨風扇毒後漢書西域傳曰身熱頭痛風災鬼難之域釋法顯遊天竺記云西度流沙屢有熱風惡鬼過之必死蔥嶺冬夏有雪有毒龍若犯之則風雨晦冥飛砂揚礫遇此難無一全也向影吹沙干寶捜神記曰有物處於江水其名曰蜮一曰短狐能含沙射人所中者頭痛發熱劇者至死今俗謂之溪毒先儒以男女同川而浴淫女為主亂氣所生也洪範五行傳曰蜮射人生於南越謂之短狐抱樸子曰有短狐一名蜮一名射工一名射影其實水蟲也狀如鳴蜩狀似三合盃有翼能飛無目而利口中有横物角弩如聞人聲縁口中角弩以氣為矢因水射人中者即發瘡中影者亦病不治煞人又沙虱與射工相似皆煞人以火炙燎遍身則此蟲墮也毛詩義疏曰短狐一名射影如鼈三足今俗謂之水弩也鮑照苦熱行含沙射流影是也博物志曰江南山谿中水射工蟲甲類也長一二寸口中有弩形氣射人影隨所著處發瘡不治則殺人今鸚螋蟲溺人影亦隨所處生瘡是以敬而逺之豺有五子論語子曰敬鬼神而逺之爾雅曰豺狗足郭璞云脚似狗也吁可畏也鬼有一車周易曰載鬼一車君此章喻入魏之後厯經險阻見宇文楊氏諸易姓而興晉䕶滕逌之屬争權相殺扇風射影如鬼如豺子山雖蒙欵至然羇旅之臣皆可不與也蓋聞虛舟不忤令德無虞忠信為琴瑟仁義為庖廚是以從莊生則萬物自細史記曰莊子者蒙人也名周莊子齊物論曰天下莫大於秋毫之末而泰山為小莫夀於殤子而彭祖為夭天地與我並生而萬物與我為一歸老氏則衆有皆無史記曰老子者楚苦縣厲鄉曲仁里人也姓李氏名耳字伯陽謚曰𥅆周守藏之史也老子修道德其學以自隠無名為務太史公曰老子所貴虛無因應變化於無為老子曰常無欲以觀其妙常有欲以觀其竅𤣥之又𤣥衆妙之門又曰有之以為利無心以為用又曰天下萬物生於有有生於無此章言世事任虛船吾心求令德思江海之士細萬物而獨往讀道德之經貴虛無而自得蓋聞三闗頓足長城垂翅既羇既旅非才非智言己羇旅長安也後漢書光武贊曰四闗重擾翰曰四闗謂長安也此云三闗亦謂長安按西魏都闗中漢書項籍傳曰三分闗中立章邯為雍王司馬欣為塞王董翳為翟王以闗中之地曽為三秦故云三闗理物論曰秦築長城楚辭曰羇旅而無友生王逸曰逺客寄旅孤單特也是以烏江艤檝知無路可歸史記曰項王欲東渡烏江烏江亭長檥船待謂項王曰江東雖小地方千里衆數十萬人亦足王也願大王急渡今獨臣有船漢軍至無以渡項羽笑曰天之亡我我何渡為徐廣曰檥音儀一音我駰案應劭曰檥正也孟康曰檥附也附船著岸也如淳曰南方人謂整船向岸曰檥索隠曰鄒誕本作様船白雁抱書定無家可寄漢書蘇武傳曰昭帝即位數年匈奴與漢和親漢求武等匈奴詭言武死後漢使復至匈奴常恵請其守者與俱得夜見漢使具自陳道敎使者謂單于言天子射上林中得雁足有繫帛書言武等在某澤中使者大喜如恵語以讓單于單于視左右而驚謝漢使曰武等實在武以始元六年春至京師此章喻已思歸雖切而故國都非梁元帝楚國已亡江陵絶無歸路陳武帝有媯既育建業豈復為家岳陽固有深讎空存檥檝石頭無非簒迹安用寄書所以周陳通好流寓各歸庾信王褒雖惜而不遣乎然終甘於漢之陵律也庾子山集巻九
