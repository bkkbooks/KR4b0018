body:
  text: 庾子山集别集類一周提要臣等謹案庾子山集十六卷周庾信撰國朝倪璠注璠字魯玉錢塘人康熙乙酉舉人官內閣中書舍人是編以吳兆宜所箋庾開府集合衆手以成之頗傷漏略乃詳考諸史作年譜冠於集首又旁採博搜重為注釋其中如小園賦前一段本屬散文而璠以為用古韻未免失之穿鑿漢書藝文志别栩陽賦五篇自是人姓名而信哀江南賦乃云栩陽亭有離别之賦唐山夫人安世房中歌桂華二字自屬篇名馮馮翼翼承天之則二句乃下章之首而信黃帝雲門舞歌乃云清野桂馮馮皆顯然舛誤璠依違其詞不加駁正亦失之附會然比核史傳實較吳本為詳哀江南賦一篇引據時事尤為典核集末彭城公夫人爾朱氏墓志銘伯母東平郡夫人李氏墓志銘並考核年月證以文苑英華知為楊炯之文誤入信集辨證亦頗精密不以稍傷蕪冗為嫌也乾隆四十六年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2aa4ba6ec2a3b22eb7516e93546da9a56fa667ea8ea1c471f48baab8cc8140ff
