body:
  text: 庾子山集巻十四周庾信撰錢塘倪璠纂註碑周柱國大將軍紇干𢎞神道碑公諱𢎞字廣畧原州長城縣人也本姓田氏周書列傳曰田𢎞字廣畧高平人也虞賔在位基於揖讓之風鳯凰于飛紹於親賢之國序田氏之先也田氏本虞舜之後出自媯姓春秋時陳公子完奔齊始食田采以陳氏為田氏謂之陳田後周宇文起於荒服賜族皆變夏姓田𢎞為紇干氏其一也尚書曰虞賔在位羣后徳讓揖讓謂舜受禪也左氏傳曰初懿氏卜妻敬仲其妻占之曰吉是謂鳯凰于飛其鳴鏘鏘有媯之後將育於姜親賢之國謂齊也漢書地理志曰昔太公始封周公問何以治齊太公曰舉賢而上功周公曰後世必有簒殺之臣其後二年九世為彊臣田和所滅而和自立為齊侯初和之先陳公子完有罪來奔齊桓公以為大夫更稱田氏九世至和而簒齊至孫威王稱王五世為秦所滅論其繼世之功則狄城有廟序其移家之始則長陵有碑漢書曰田儋狄人也故齊王田氏之族儋從弟榮榮弟横皆豪傑宗彊能得人陳渉使周市畧地北至狄狄城守儋撃殺狄令而石豪子弟曰諸侯皆反秦自立齊古之建國儋田氏當王遂自立為齊王發兵擊周市略定齊地師古曰狄縣名也地理志屬千乗三輔黃圖曰漢高祖都長安徙諸齊田於長陵潛夫論曰漢高祖徙諸齊田而有第一至第八氏後漢第五倫其後也况復高廟上書小車而對漢主聊城祭鳥長岳而驅燕將疑作長驅而却燕將漢書曰田千秋年老上優之朝見得乗小車入宫殿中故因號曰車丞相史記曰燕軍攻安平盡降齊城惟獨莒即墨不下燕惠王使騎劫代樂毅毅歸趙燕人士卒忿而田單乃令城中人食必祭其先祖於庭飛鳥悉翔舞城中下食燕人怪之田單因宣言曰神來敎我卒破燕軍殺其將騎劫而齊七十餘城皆復又魯仲連傳曰田單攻之不下魯仲連乃為書遺燕將燕將自殺聊城亂田單遂屠聊城公以胎敎之月歳德在寅載誕之辰星精出昴列女傳曰太任文王之母摯任氏中女也王季娶為妃有娠目不視惡色耳不聽淫聲口不出敖言能以胎敎溲於豕牢而生文王爾雅曰歳在寅曰攝提離騷曰攝提貞於孟陬兮惟庚寅吾以降春秋佐助期曰漢相蕭何昴星精是以月中生樹童子知言水上浮瓜青衿不戲世説曰徐孺子年九歳嘗月下戲人語之曰若令月中無物當極明耶徐曰不然譬如人眼中有瞳子無此必不明浮瓜未詳㑹稽典録曹娥投瓜于江存其父尸異苑稱魏武見石旁八字不能了禰衡離合解之疑是事而受書黃石意在王者之圖一作師揮劒白猿心存霸國之用荀悦漢紀曰張良遊於汜上有父老直墮其履顧謂良曰孺子下取履良取履跪而進之父老曰孺子可敎矣後三期而良先至父老遺書一編曰讀此即為王者師後十三年見我於齊北榖城山下黃石即我已遂去不復見其書乃太公兵法也呉越春秋曰袁公與越女試劒竹枝上袁公即飛上樹變為白猿遂别去見越王王即加女號曰越女乃命五板之隊長高習之敎軍士當世莫能勝越女之劒本傳云少慷慨志立功名膂力過人敢勇有謀略魏永安中任子都督翻原州城受隴西王節度於時洛邑亂離當塗危逼禮樂征伐不出於天子舉賢誅暴實在於彊臣永安魏莊帝年號也子都督後魏官名隴西王爾朱天光也彊臣謂爾朱氏也魏本紀云明帝崩爾朱榮謀廢立以長樂王子攸為帝榮以兵權在己遂有異志乃害靈太后及幼主次害無上王邵等尋追諡無上王為皇帝餘死者皆有贈子孫聽立後授封爵爾朱榮率騎七千討葛榮於滏口破禽之以葛榮平大赦改元為永安是其事也洛邑魏所都也當塗謂魏也圖讖曰代漢者當塗高拓拔氏國號後魏故云當塗危逼太祖文皇帝始創霸功初勤王室秣馬蒐乗誓衆太原公仗劒轅門麄謀當世周書本傳云魏永安中陷於万俟醜奴爾朱天光入闗𢎞自原州歸順授都督及太祖初統衆𢎞求謁見乃論世事深被引納即處以爪牙之任左氏傳曰求諸侯莫如勤王又令狐之役云訓卒利兵秣馬蓐食又苖賁皇曰蒐乗補卒杜注云蒐閲也周禮曰設宮車轅門前漢紀曰樊噲仗劒楯衝門而入立於帳下隨何逺至實釋漢帝之憂許攸夜來遂定曹王之業漢書曰漢王與楚大戰彭城不利出梁地至虞謂謁者随何曰公能説九江王布使舉兵畔楚項王必留擊之吾取天下必矣隨何往説布果使叛楚布與隨何間行歸漢魏略曰許攸字子遜少與袁紹及太祖善初平中隨紹在冀州嘗在坐席言議官渡之役諫紹弗與太祖相攻紹自以彊盛必欲極其兵勢攸知不可為謀遂亡詣太祖言𢎞去爾朱而就周文猶隨何之説布畔楚許攸之去袁即曹也永熙中初一作奉迎魏武帝入闗魏本紀云武帝永熙三年七月帝親總六軍十餘萬次河橋高歡引軍東渡宇文泰迎帝於東陽入長安以雍州公廨為宫是為西魏封鶉隂縣開國子邑五百戸本傳又以迎魏孝武功封鶉隂縣魏屬平涼郡太祖以自著鐵甲賜公云天下若定還將此甲示寡人本傳稱孤餘同白水良劒罷朝而贈陳寵青驪善馬廻車而賜李忠並經輿服足為連類後漢書曰陳寵字昭公沛國洨人也久留臺閣賞賜有殊又韓稜傳曰稜為尚書令與僕射郅壽尚書陳寵同時俱以才能稱肅宗嘗賜都尚書劒惟此三人特以寳劒自署其名曰韓稜楚龍淵郅壽蜀漢文陳寵濟南椎成時論著為之説以稜淵深有謀故得龍淵壽明逹有文章故得漢文寵端樸善不見外故得椎成椎直追反謝承書漢官儀作鍜成袁宏後漢光武紀曰蔡陽白水鄉為舂陵侯封邑范蔚宗書亦云貨泉宇文為白水真人按白水本光武受命之地故明帝賜劒云白水良劒矣後漢書曰李忠字仲都東萊黃人也世祖以為右大將軍封武固侯時世祖自觧所佩綬以帶忠因從攻下屬縣至苦陘世祖㑹諸將問所得財物惟忠獨無所掠世祖曰我欲特賜李忠諸卿得無望乎即以所乗大驪馬及繡被衣物賜之𢎞之得䝉賜甲也如古贈劒賜馬矣大統三年轉帥都督進爵為公十四年授使持節都督原州諸軍事原州刺史仙人重返更入桂陽之城龍種復歸還尋白沙之路公此衣錦鄉里榮之本傳以𢎞勲望兼至故以衣錦榮之隋書地理志曰雍州平淳郡舊置原州後周置總管府按𢎞本原州長城縣人今為原州刺史是其鄉里也神仙傳曰蘇仙公者桂陽人也鄉中以仁孝聞天西北隅紫氣氤氲有𢾗十白鶴飛翔其中降於蘇氏之門皆化為少年怡然輕舉先生斂容逢迎乃跪白母曰某受命當仙被召有期儀衛已至當違色飬即便拜辭昇雲漢而去母年百餘歳無疾而終𦵏後忽見州東北牛脾山紫雲蓋上有號哭之聲咸知蘇君之神也郡守鄉人苦請相見乃出半而示一手皆有細毛異常人也三年之後無復哭聲自後有白鶴來止郡城東北樓上人或挾彈彈之鶴以爪攫樓板似漆書云城郭似人民非三百甲子一來歸吾是蘇君彈何為至今脩道之人毎至甲子日焚香禮於仙公之故第也襄陽記曰龎徳公子奐字世文晋太康中為牂牁太守去官歸鄉居白沙里鄉人宗敬之相語曰吾家池中龍種來水經注曰襄城東有東白沙白沙北有三洲言𢎞本原州人還為原州刺史衣錦之榮如蘇君之復返桂陽龎奐之還歸襄水也侍從太祖戰河橋復𢎞農解華山本傳作洛陽圍平沙苑陣事在魏大統三年隋書地理志馮翊郡有沙苑按沙苑一名沙阜在同州馮翊縣南十二里東西八十里南北三十里周太祖與高歡戰於沙苑大破之栽一樹以表其功其樹往往猶存見郡邑志必有元勲常䝉别賞太祖在同州周本紀云魏廢帝三年改華州為同州文武並集號令云人人如紇干𢎞盡心天下豈不早定即授車騎大將軍儀同三司本傳巳上俱同前魏元年本傳魏廢帝元年轉驃騎大將軍開府祈連猶逺即受冠軍之侯沙幕未開元置長平之府漢書曰霍去病封冠軍侯三歳元狩三年春為驃騎將軍去病出北地至祁連山捕首虜甚多是去病未至祁連時巳封冠軍侯也師古曰祁連山即天山也匈奴呼天為祁連武帝紀曰元朔六年衛青復將六將軍絶幕大克獲應劭曰幕沙幕匈奴之南界也臣瓚曰沙土曰幕直度曰絶師古曰幕者即今突厥中磧耳李陵歌曰徑萬里兮度沙幕按年表衛青以元朔二年擊匈奴取朔方封長平侯是沙幕未開之時也梁信州刺史蕭韶寜州刺史譙淹等猶處永安稱兵漁陽公受命中軍迅流下瀨遂得朝發白帝暮宿江陵猿嘯不驚雞鳴即定本傳云平蜀之後梁信州刺史蕭韶等各據所部未從朝化詔𢎞討平之漢書曰下瀨將軍下蒼梧後漢書曰公孫述改魚復為白帝城又郡國志曰南郡巫西有白帝城江陵南郡治也時為梁元帝所都猿嘯即荆州記所謂巴東三峡巫峡長猿鳴三聲淚沾裳是也注别見左氏傳曰雞鳴而駕塞井夷竈唯余馬首是瞻西平反羌本有漁陽之勇鳳州叛氐又習仇池之氣本傳云又討西平叛羌及鳳州叛氐等並破之地理志曰漁陽郡秦置屬幽州華陽國志曰阿池一名仇池地方百頃隋書地理志曰梁州河池郡後魏置南岐州後周改曰鳳州周書異域傳曰岩昌𦍑者其先蓋三苖之𦙍其界自仇池以西公推鋒直上白刃交前萬死一決兇徒多潰身被一百餘箭傷肉破骨者九創本傳𢎞毎臨陣摧鋒直前身被一百餘箭破骨者九馬被十槊露布申上朝廷壯焉本傳馬被十矟朝廷壯之信州蠻反又詔𢎞與賀若敦等平之葛屨糾糾魏有去舊之歌零露瀼瀼周受維新之命謂魏廢帝禪位周閔帝踐阼也詩魏風云糾糾葛屨可以履霜詩序曰葛屨刺褊也魏地陿隘其俗機巧趨利其君儉嗇褊急而無德以將之言魏祚既衰取古魏風以為比小雅蓼蕭云蓼彼蕭斯零露瀼瀼大雅文王篇曰周雖舊邦其命維新言宇文氏受命如古周德矣乃進爵封雁門郡公本傳孝閔踐阼進爵雁門郡公食邑通前二千七百戸保定元年授使持節都督岷州諸軍事岷州刺史隴頭流水延望秦闗川上峨眉猶通蜀道隋書地理志梁州臨洮郡臨洮縣西魏置岷州辛氏三秦記曰隴右西闗欲上者七日乃越上有㡬水四注流下俗歌記曰隴頭流水鳴聲幽咽遥望秦川肝腸斷絶杜預益州曰平鄉江東逕峨眉山在南安縣界去成都南十里秋日清澄望見两山相峙如峨眉焉公不發私書不然官燭獸則相負渡江蟲則相衘出境本傳保定元年出為岷州刺史𢎞雖武將而動遵法式百姓頗安之世説曰王經為江夏太守不發私書謝承後漢書曰巴祗為揚州刺史夜與士對坐暝暗之中不然官燭後漢書曰宋均字叔平南陽人遷九江太守郡多虎常設檻穽均到下記屬縣可去一檻穽其後傳言虎東渡江楚沛多蝗其飛至九江東界者輒散去四年拜大將軍餘官如故本傳云三年從隋公楊忠伐齊拜大將軍明年又從楊忠東伐師還乃旋所鎮衞青受詔未入玉門之闗竇憲當官猶在燕山之下公之此受差無慙德漢書曰衞青拜大將軍又西域傳曰阸以玉門陽闗敦煌郡龍勒有玉門闗後漢書曰竇憲與北單于戰於稽落山大破之遂登燕然山刻石紀功渾王叛換梗我西疆宕羌首竄藩籬擕貳公受脤於社偏師逺襲本傳云吐谷渾寇西邊宕昌羌潛相應詔𢎞討之按渾王吐谷渾也漢書注曰叛換猶跋扈也宕羌宕昌羌也周書異域傳云吐谷渾本遼東鮮卑慕容廆之庶兄也率其部落止於枹罕自為君長及孫葉延頗視書傳以古有王父字為氏遂以吐谷渾為氏焉又宕昌羌傳云保定四年彌定又引吐谷渾寇石門戍高祖怒詔大將軍田𢎞討滅之以其地為宕州揚旍龍涸繫馬甘松周書吐谷渾傳云天和初其龍涸王莫昌率衆降以其地為扶州隋書地理志曰同昌郡嘉城縣後周置縣并龍涸郡及扶州總管府又曰宕昌郡懐道縣後周置甘松郡水經注益州記曰自白馬嶺回行二千里至龍涸唐書曰松州交州郡屬劒南道取界内甘松嶺為名二十五王靡旗亂轍七十六柵鶉奔雉竄本傳云獲其二十五王拔其七十六柵遂破平之左傳曹劌曰吾視其轍亂望其旗靡詩云鶉之奔奔言𢎞破吐谷渾如逐獵也既䝉用命之賞乃奉旋師之樂天和二年被使南征謂與陳人戰也帶甲百萬軸轤千里江源水起海若乗流漢書曰武帝自潯陽浮江而下軸轤千里注云軸後施柁處轤前頭刺櫂處也按舳艫本从舟字或从車莊子北海若曰天下之水莫大於海船官之城登巢懸㸑吳兵習流長驅戰艦風灰箭火倏忽凌城船官之城謂湘水也水經注曰湘水又逕船官西湘舟商舟之所次也又曰荆州故楚也子革曰我先君僻處荆山以供王事遂遷紀郢今城楚船官地也春秋之渚宮左氏傳曰晋楚戰於鄢陵楚子登巢車以望晋軍杜預曰㸑炊也吳越春秋曰乃發習流二千人釋名曰上下重牀曰艦四方施板以禦矢石其内如牢檻楚辭曰往來倏忽公以白羽麾軍朱絲度水七十餘日始得解衣天和至解衣本傳云天和二年陳湘州刺史華皎來附𢎞從衞公直赴援與陳人戰不利乃以𢎞為江陵總管及陳將吳明徹來寇𢎞與梁主蕭巋退武保紀南令副總管高琳拒守明徹退乃還江陵鬻子曰王率兵車以伐紂紂虎旅百萬陣於商郊三軍之士莫不失色武王命太公把白旄以麾之紂軍反走吕氏春秋作白羽左氏傳曰晋侯伐齊將濟河獻子以朱絲繫玉二㲄而禱沉玉而濟朝廷以晉剋夏陽先通滅虢之政秦開武遂始問吞韓之謀左傳僖二年曰晉師㑹虞師伐虢滅夏陽五年晉滅虢史記曰秦武王四年拔宜陽斬首六萬涉河城武遂徐廣曰韓邑也是以馳傳追公以為仁壽城主本傳云尋以𢎞為仁壽城主以逼宜陽齊將段孝先斛律明月出軍定隴以為宜陽之援公背洛水而面熊山陳中軍而疏行首乗機一戰宜陽銜璧本傳云齊將段孝先斛律明月出軍定隴以為宜陽援𢎞與陳公純破之遂拔宜陽等九城北齊書曰段韶字孝先姑臧武威人斛律光字明月朔州敕勒部人也後漢書曰赤眉敗上所得積兵甲宜陽城西與熊耳山齊水經注曰洛水之北有熊耳山雙峰競舉狀同熊耳在宜陽矣左傳成十六年范匄曰塞井夷竈陳於中軍而疏行首杜注云疏行首者當陳前決開營壘為戰道増封五百戸進柱國大將軍司勳之䇿也建德元年拜大司空二年遷少保姬朝三列少保為前炎正五官冬官為北頻煩寵命是謂賢能尚書曰少師少傅少保曰三孤韓詩外傳曰三公者何曰司空司徒司馬漢書百官公卿表曰神農火師火名應劭曰火德也故為炎帝春官為大火夏官為鶉火秋官為西火冬官為北火中官為中火凡五官又百官表云冬官司空三年授使持節都督襄郢昌豐唐蔡六州諸軍事襄州刺史江漢之間不驚雞犬樊襄之下更多冠葢周書武帝紀云保定元年令荆州安州江陵等總管並隷襄州總管府隋志襄陽郡西魏曰襄州置總管府義陽郡後魏曰郢州又江夏梁置郢州時屬陳舂陵郡西魏曰昌州豐疑作澧隋志澧陽郡是時屬陳疑僑置隋志漢東郡唐城縣西魏曰唐州襄陽耆舊傳曰襄陽郡峴山南至宜城百餘里漢宣帝時有卿士刺史二千石數十家冠蓋承映荆州刺史雅歎其盛號曰冠蓋里按江漢二水名隋志襄陽郡安春縣後周廢樊城山都二縣入焉知襄陽郡舊有樊城故云樊襄既而三湘遼逺時遭鵩入五溪卑濕或見鳶飛言𢎞薨於州也漢書曰賈誼為長沙傳三年有鵩飛入誼舎止於坐隅鵩似鴞不祥鳥也誼以適居長沙長沙卑濕誼自傷悼以為壽不得長乃為賦以自廣南史侯景傳云巴陵有地名三湘寰宇記曰湘潭湘鄉湘源為三湘也後漢書馬援傳曰武威將軍劉尚擊武陵五溪蠻􅊂深入軍沒援因復請行時年六十二㑹暑盛中病遂卒於彼水經注曰武陵有五溪謂雄溪横溪酉溪潕溪辰溪悉是蠻􅊂所居故謂五溪後漢書馬援曰吾仰視飛鳶跕跕墮水中卧念少游時語何可得也舊疾增加薨於州鎮天子畫凌煙之閣言念舊臣出平樂之宮實思賢傅畫凌煙之閣未詳唐太宗貞觀十七年以功臣圖形凌煙閣事在唐時今按此文知後周以前巳有其事非始於唐也又按王子年拾遺記曰晉文公焚林以求介子推有白鵶繞煙而噪或集介子推之側火不能禁晉人嘉之為立臺號曰思煙介子推為晉國功臣凌煙之名起於此矣鮑照有凌煙樓銘西京賦薛綜注曰平樂館大作樂處也按平樂為作樂之處實思賢傅者即樂記所謂聽鐘聲則思武臣聽磬聲則思死封疆之臣等語謂樂作而思也有詔贈某官禮也本傳云大象末位至柱國小司馬朝廷又追録𢎞勳進㳟爵觀國公恭𢎞世子也即以四年四月二十五日歸𦵏於原州高平之鎮山屬國𤣥甲輕車介士一依霍驃騎之禮衞將軍之𦵏漢書曰霍去病薨上發屬國𤣥甲去病為驃騎將軍又曰張安世薨天子贈以輕車介士又曰衞青拜大將軍卒與平陽主合𦵏起冢象廬山嗚呼盛哉公入仕四十五年身經一百六戰通中陷刃疾甚曹参刮骨傅藥事同一作多闗某三輔故事曰楚漢相拒於京索間六年身被大創十二矢石通中過者蜀志曰闗某常為流矢所中貫其左臂羽便伸臂令醫刮去其毒言笑自若而風神果勇儀表沈雄事親無隠無犯禮記曰事親有隠而無犯學不專經略觀書籍兵無師古自得縱橫漢書霍去病傳曰上嘗欲敎之孫吳兵法對曰顧方略何如耳不至學古兵法青烏甲乙之占白馬星辰之變後漢書王景傳曰冢宅禁忌注云送𦵏造宅之法若黃帝青鳥之書白馬未詳青烏為冢宅之書此亦疑占星者有其書也九宮推歩三門伏起後漢書張衡曰重之以卜筮雜之以九宮易乾鑿度曰太一取其數以行九宮注詳齊王憲銘後漢書高彪箴曰天有太一五符三門注云三門者開門休門生門也天弧射法太乙營圖天弧弧矢星也天官書曰狼下有四星曰弧直狼漢書藝文志有太一兵法一篇泰壹雜子星泰一雜子雲雨又泰一二十九巻並皆成誦在心若指諸掌言青烏已下諸書皆成熟也虜青犢之兵甚有秘計燒烏巢之米本無遺䇿後漢書郡國志曰河内野王有射犬聚世祖破青犢處又光武紀曰别號諸賊青犢等各領部曲又袁紹傳官渡之役云淳于瓊等時宿在烏巢去紹軍四十里操自將歩騎五千人夜往攻破瓊等悉斬之曹瞞傳曰既至圍屯大放火營中驚亂大破之盡焚其糧穀實貨斬督將睢元等割得將軍淳于仲簡鼻殺士卒千餘人後漢書注云烏巢地名在滑州酸棗城東西零賊退屈指可知南部兵廻挿標而待西零謂西羌也南部謂陳也常願執金鼔而問吳王橫琱戈而返齊地有志不就忠貞死焉問吳王者謂其欲問罪於陳也返齊地者謂其有平齊之志也陳都江表故曰吳王高氏國號曰齊故云齊地𢎞有此二志不就而死也漢書呉王濞傳曰發弓高侯頽當執金鼔見膠西王卭曰王苦軍事願問王兵狀晉語曰秦穆公侵晉惠公令韓簡挑戰穆公衡琱戈出見使者世子恭等孝惟純深居喪過禮對其苫寢則梓樹寒生聞其悲泣則巢禽夜下喪服傳文及士喪禮記皆云居倚廬寢苫枕凷歠粥朝一溢米夕一溢米鄭康成曰苫編藁也左氏傳曰晏桓子卒晏嬰寢苫枕草史記伍子胥曰必樹吾墓上梓令可以為器正義曰器謂棺也此云梓樹棺木也干寳搜神記曰鄭𢎞遷臨淮太守郡民徐憲在喪致哀有白鳩巢户側𢎞舉孝廉朝廷稱為白鳩郎嗚呼哀哉乃為銘曰天齊水合日觀山連兵強東楚地逺西燕史記封禪書曰齊所以為齊以天齊也天齊淵水居臨菑南郊山下者索隠曰臨葘城南有天齊泉五泉並出有異於常言如天之腹臍也應劭漢官儀曰泰山東南山項名曰日觀者雞一鳴時見日始欲出長三丈許故以名焉言齊國強大桓公霸時田敬仲來奔也兵強東楚者史記曰桓公三十年伐楚次召陵桓公矜屈完以其衆屈完曰君以道則可若不則楚方城以為城江漢以為溝君安能進乎乃與屈完盟而去地逺西燕者史記曰桓公二十三年山戎伐燕桓公救燕遂伐山戎至於孤竹而還燕莊公送桓公入齊境桓公曰非天子諸侯相送不出境於是分溝割燕君所至與燕命燕君復修召公之政納貢於周是也陳厲公子完號敬仲奔齊國在桓公十四年是其時也五卿咸正三王並賢靈龍更起燧象還燃左傳莊二十二年曰初懿氏卜妻敬仲占曰五世其昌並於正卿八世之後莫之與京及陳之初亡也陳桓子始大於齊其後亡也成子得政杜注曰桓子敬仲五世孫陳無宇也世家成子曾孫太公和遷齊康公於海上和立為齊侯和孫威王稱王四世而秦滅之云三王者除湣王無道為淖齒所殺王建聽姦臣賔客以亡其國弗稱威王宣王襄王此三王並賢也又按田儋兄弟三人俱為王並賢史記曰儋弟榮榮弟橫高帝曰夫起自布衣兄弟三人更王豈不賢乎哉靈龍燧象即田單鐵籠火牛事史記曰樂毅破齊田單走安平令其宗人盡斷其車軸末而傳鐵籠已而燕人攻安平惟田單宗人以鐵籠故得脫單收即墨城中得千餘牛為絳繒衣畫以五彩龍文束兵刃於其角灌脂束葦於尾燒其端鑿城數上穴夜縱牛壯士五千人隨其後牛尾熱怒而奔燕軍燕軍大驚視之皆龍文所觸盡死傷燕軍敗云燧象者按左傳定四年曰王使執燧象以奔吳師杜預曰燒火燧繫象尾使赴吳師驚却之田單之術本於此矣自天之德乃祖乃父維嶽降神生申及甫大雅詩嵩高云維嶽降神生甫及申鄭箋曰四嶽卿士之官掌四時者也在堯時姜姓為之申甫齊許皆其苖裔北門梁棟西州雲雨勇讋燕城名題漢柱北門謂齊之北門燕在齊北史記齊威王曰吾吏有黔夫者使守徐州則燕人祭北門裴駰曰齊之北門燕人攻齊田單固守聊城卒以敗燕是為梁棟也西州謂京兆也周禮職方氏正西曰雍州故云西州謂田鳳為京兆人漢帝題柱之恩是遇雲雨也勇讋燕城接上北門句即田單事史記曰田單敗燕軍殺其將騎劫追亡逐北所過城邑皆畔燕而歸田單七十餘城皆復為齊名題殿柱接上西州句即田鳳事三輔決録曰漢靈帝殿柱題堂堂乎張京兆田郎言𢎞祖父皆有功績如田單之復燕城田鳳之題漢柱稱田氏之盛也公始青衿風神世載猛獸不驚家禽能對青衿以下言田𢎞也鄭風子衿云青青子衿毛傳曰青衿青領也學子之所服晉書曰王戎年六七歳於宣武場觀猛戰檻中虓呼震地衆皆奔走戎獨不動神色自若魏明帝於閣上見而竒之世説曰梁國楊氏子九歳甚聰慧孔君平詣其父父不在乃呼兒出為設果果有楊梅孔指以示皃曰此是君家果兒應聲答曰未聞孔雀是夫子家禽劒學千門書觀六代有竭忠貞無違敬愛許氏説文許冲上書曰古文時有六書一曰古文二曰竒字三曰古篆書四曰佐書五曰繆篆六曰鳥蟲書左傳荀息曰臣竭其股肱之力加之以忠貞乃數軍實乃握兵符集作謀非燒沙成壘聚石成圖左傳臧僖伯曰以數軍實杜預曰以數車徒器械及所獲也後漢書曰舊制發兵皆以虎符其餘徴調竹使符曹瞞傳曰公軍毎渡渭輒為馬超騎所衝突營不得立地又多沙不可築壘婁子伯説公曰今寒可起沙為城以水灌之可一夜而成公從之乃多作縑囊以運水夜渡兵作城比明城立由是公軍盡得渡渭晉書曰初諸葛亮造八陣於魚復平沙上累石為八行相去二丈桓溫見之曰此常山蛇勢也風雲順逆營陣孤虚靈雨鉦鳴爟火飛狐風后握竒經有風陳雲陳漢書藝文志有風后孤虚二十巻後漢書方術傳曰須臾孤虛之術章懐太子注云孤虛者孤謂六甲之孤辰若甲子旬中乙亥無干於是為孤也對孤為虚詩采芑云靈雨既零又云鉦人伐鼓説文曰鉦鐃也似鈴柄中上下通鼔人注云鐲鉦也形如小鐘是鐲亦名鉦也張宴曰爟火熢火也狀若井契臯矣漢書文帝紀曰以中大夫令免為車騎將軍屯飛狐如淳曰在代郡淮隂受䇿車騎登壇公為上將有此同官言𢎞授車騎大將軍轉驃騎大將軍也淮隂侯韓信也受䇿謂拜大將軍也後漢書曰竇憲拜車騎將軍上將文昌中星名左氏傳曰同官為僚今授將軍是為上將車騎等名為同官矣下江燒楚上地吞韓推功玉案定䇿珠盤下江燒楚謂𢎞為江陵總管退陳將吳明徹也後漢書郡國志曰南郡編縣有藍口聚下江兵所據注云今當陽城是也上地吞韓謂𢎞為仁壽城主以逼宜陽宜陽韓地也史記韓襄王五年云秦抜我宜陽斬首六萬又曰王翦將上地楚漢春秋韓信曰漢王賜臣玉案之食注詳司馬裔銘周禮曰玉府若合諸侯則供珠盤玉敦注云珠盤以珠飾盤所以盛牛耳玉敦以玉為敦所以盛血盟㑹用之天有三階公承其命國有六卿公從其政謂𢎞為少保司徒也藝文志曰泰階六符一巻李竒曰三台謂之泰階两两成體三台故六三階謂少保六卿謂大司空也台曜偕輝槐庭重映匡贊七德謨猷八柄腹滿精神心開明鏡台曜即三台也天官書曰魁下六星两两相比者名三能三能色齊君臣和不齊為乖戾蘇林曰能音台周官曰三槐三公位焉故云槐庭王儉褚淵碑文云贊道槐庭左氏傳曰武有七德周禮太宰職曰以八柄詔王馭羣臣一曰爵以馭其貴二曰禄以馭其富三曰予以馭其幸四曰置以馭其行五曰生以馭其福六曰奪以馭其貧七曰廢以馭其罪八曰誅以馭其過晉書溫嶠曰錢世儀精神滿腹世説曰何㸃嘗目陸慧曉心如明鏡遇形觸物無不朗然伏波受脤樓船推轂東道未從南征不復謂督襄郢諸州軍事不復返也伏波樓船將軍名前書武帝元鼎五年遣伏波將軍路博德出桂陽下湟水後漢書曰馬援為伏波將軍漢書曰樓船將軍楊僕出豫章下湞水左氏傳曰燭之武見秦伯曰若舎鄭以為東道主行李之往來共其困乏又僖四年傳曰昭王南征而不復寡人是問吕氏春秋曰周昭王親將征荆蠻辛餘靡長且多力為王右還反渉漢梁敗王及祭公隕於漢中辛餘靡振王北濟反振祭公高誘注引左傳云昭王之不復君其問諸水濵依左傳則昭王已沒於漢呂氏復云振王且或稱梁敗或説膠船其㫖不同一遵左氏之為正也飲丹有井澆泉無菊功存柳林身在樠木干寳搜神記曰臨汜縣有廖氏世老壽後徙居子孫輒殘折他人居其故宅復累世壽乃知是宅所為不知何故疑井水赤乃掘井左右得古人埋丹砂數十斛丹汁入水是以飲水而得壽盛𢎞之荆州記曰菊水在穰縣菊被涯水極甘香谷中皆飲此水上壽百二十七八十者猶以為夭太尉胡廣患風疾休沐南歸恒飲此水後疾遂瘳年八十二薨也魏文帝柳賦序曰昔建安五年上與袁紹戰於官渡時余從行始植斯柳按古人戰勝嘗種樹一枝以旌其功官渡之戰曹公破紹天下莫敵功之最大者也此云功存柳林以𢎞有宜陽戰功故引是事左傳莊四年曰王遂行卒於樠木之下杜預曰樠木木名樠郎蕩反又莫昆反又武元反言無丹井菊泉可以延壽功成遂薨於行也移茵返𦵏提柩山行芻靈隴水哀挽長城説文曰茵車褥也禮記曰在牀曰尸在棺曰柩又曰塗車芻靈自古有之鄭注曰芻靈束茅為人馬也山如北邙樹似東平松門石起碑字金生西京雜記曰何武𦵏北邙山薄龍坂王嘉冢東北一里皇覧曰東平思王冡在無鹽人傳言王在國思歸京師後𦵏其冢上松柏皆西靡也謝靈運入彭蠡湖口詩曰攀崖照石鏡牽葉入松門注引張僧鍳地志曰石鏡山東有一圓石懸崖明浄照人見形顧野王輿地志曰自入湖三百三十里窮於松門東西四十里青松徧於两岸王隠晉書曰永嘉元年陳國項縣賈逵石碑中生金人盜鑿取賣賣巳復生此江東中興之瑞也𣺌𣺌山河煢煢𦙍子泣血徒歩奔波千里言𢎞薨於州鎮子恭等奔喪千里也世説曰王濬沖為尚書令經黃公酒壚下過謂後車客曰自稽生天阮公亡以來今日視此雖近邈若山河左氏傳曰哀十六年孔子卒公誄之曰煢煢余在疚詩曰哀此煢獨泣血言泣盡而繼之以血也孝水先枯悲雲即起世數存没哀榮終始酈元水經注曰孝水在河南城西十餘里潘岳西征賦曰澡孝水而濯纓嘉善名而在兹謝靈運詩曰風悲黃雲起哀榮見論語周柱國大將軍大都督同州刺史爾字或作尒同綿永神道碑公諱永字永賔東燕遼東石城縣零泉里人也本姓段周書列傳云段永字永賔其先遼西石城人昔者昌意降居初分若水之姓共叔出奔始有京城之族序段氏之先也帝系黃帝產青陽昌意山海經曰南海之木若水之間有木名曰若木若水出焉水經注曰黃帝長子昌意德劣不足紹承大位降居若水為諸侯焉娶蜀山氏女生顓頊於若水之野有聖德二十登帝位承少皥金官之政以水德寶厯矣國語曰黃帝以姬水成段氏之先出自鄭國姬姓左氏傳曰鄭武姜愛共叔段請京始居之謂之京城太叔京叛太叔段太叔出奔共此段氏得姓之始也西河居士蕃魏而却秦北岳將軍威胡而奉晉其後居於北代則先封遼水備乎史籍可略而言史記魏世家曰文侯客段干木過其閭未嘗不軾也秦嘗欲伐魏或曰魏君賢人是禮國人稱仁上下和合未可伐也文侯由是得譽於諸侯按史記老子之子宗為魏將封於段干是段干為複姓未必即段氏之祖惟風俗通注云姓段名干木矣晉書曰段匹磾東郡鮮卑人也種類勁㨗世為大人父務勿塵懐帝時以為單于匹磾為左賢王率衆助國征討假撫軍大將軍後為石季龍所逼常著朝服持晉節經年國中謀推匹磾為主事露被害永本傳其先遼西石城人晉幽州刺史段匹磾之後也北岳恒山也祖援鎮西將軍馮翊太守本傳云曾祖愄仕魏黄龍鎮將因徙高陸之河陽焉父儒平東將軍持節恒燕朔三州諸軍事恒州刺史地名注見是篇銘内公年裁弱冠即值亂離驅馳闗塞之間早有縱橫之志本傳云永幼有志操閭里稱之魏正光末六鎮擾亂遂擕老幼避地中山後赴洛陽軍陣方圓無勞聚米山川形勢不待披圖後漢書曰馬援於帝前聚米為山谷指畫形勢開示衆軍所從道徑往來分祈曲折昭然可曉帝曰虜在吾目中矣漢書曰張安世長子千秋為中郎將隨度遼將軍范明友擊烏桓還謁大將軍光問千秋戰鬪方略山川形勢千秋口對兵事畫地成圖無所忘失又後漢書曰鄧禹從至廣阿光武舎城樓上披與圖指示禹曰天下郡國如是今始得其一子前言以吾慮天下不足定何也禹曰方今海内殽亂人思明君猶赤子之慕慈母古之興者在德厚薄不以大小光武悦魏正光五年入仕解褐殿中將軍孝昌三年加龍驤將軍永平三年授平東將軍都督中埏建義勳謀是先䝉賞倉泉縣開國男食邑一百戸正光五年魏明帝即位之八年也孝昌三年魏明帝十一年也按魏帝紀宣武之八年改元永平明帝為宣武子當作永安疑有誤隋書地理志曰漢陽郡上禄縣舊置仇池郡後魏置倉泉縣其年淮淝侵軼南鄙徵公兵受脤偏師一月三㨗本傳云青州人崔社客舉兵反永討平之進爵為侯左氏傳曰戎有受脤詩云一月三㨗昔張遼奄至原本有闕文逺魏志曰張遼字文雁門馬邑人也封沃陽縣開國伯食邑五百戸進爵為侯漢書地理志曰雁門郡有沃陽縣永熙元年魏孝武即位之年也授使持節車騎大將軍左光禄本傳云除左光禄大夫魏武帝特召入仕閣内大都督馬武小心侍蕭王於卧内典韋忠壯陪魏后於宮中後漢書曰更始遣侍御史持節立光武為蕭王袁宏後漢紀曰馬武字子張南陽湖陽人少時避怨綠林中起隨擊甄阜二公兵故王常親引之邯鄲既平王登臺從容謂武曰吾得漁陽上谷突騎欲令將軍主之何如武讓不敢當然歸心於王武既降置之帳下毎饗諸將武斟酌於前自以新屬也甚卑恭不敢與南陽時等王善之魏志曰典韋陳留巳吾人也為校尉性忠至謹重常晝立侍終日夜宿帳左右稀歸私寢好持大雙㦸與長刀等軍中為之語曰帳下壯士有典君提一雙㦸八十斤太祖征荆州至宛張繡迎降太祖延繡及其將帥置酒高㑹太祖行酒韋持大斧立後刃徑尺太祖所至之前韋輒舉斧目之繡及其將帥莫敢仰視於時賊帥元伯破掠城市西自潼函東綿鞏洛本傳云時有賊魁元伯生率數百騎西自崤潼東至鞏洛屠陷塢壁所在為患左傳文十三年晉侯使詹嘉處瑕以守桃林之塞杜預曰桃林在𢎞農華隂縣東潼闗高誘呂氏春秋注桃林縣西長城晉地道記曰潼闗是也郡國志曰𢎞農故秦函谷闗又河南榖城有函谷闗河南鞏縣故鞏伯國河南周公時所城洛邑也春秋之王城京畿大都督請士馬五千公曰此賊無他䇿尋為鳥散止請五百騎應手生擒朝廷賞其謀䇿百姓喜其除害本傳云魏孝武遣京畿大都督匹婁昭討之昭請以五千人行永進曰此賊既無城柵惟以寇抄為資安則蟻聚窮則鳥散取之在速不在衆也若星馳電發出其不虞精騎五百自足平殄若徵兵而後往彼必速竄雖有大衆無所用之帝然其計於是命永代昭以五百騎討之永覘知所在倍道兼進遂破平之既而喪亂𢎞多生民板蕩乗輿西幸宗社北遷言魏孝武遷都長安也公妙識𤣥象深知厯數乃與昆弟謀為自全斬西中郎將送首闗内本傳云帝西遷永時不及從大統初乃結宗人潛謀歸欵密與都督趙業等襲斬西中郎將慕容顯和傳首京師䝉賞昌平縣開國子食邑三百戸大統元年授使持節都督北徐州刺史平竇軍復𢎞農戰沙苑河橋公並預先登身當鋒首謨猷應變備在司勳本傳云從擒竇泰復𢎞農破沙苑並有戰功河橋之役永力戰先登周禮司勳屬夏官鄭注曰此官主功賞增邑八百戸通前合二千戸進爵為沃陽縣開國公授南汾州諸軍事南汾州刺史隋志云文城郡東魏置南汾州後周改為汾州十四年增邑三百戸轉大都督其年授車騎大將軍儀同三司加散騎常侍十六年授驃騎大將軍開府加侍中尋授恒州諸軍事恒州刺史又遷雲州刺史隋志云北地郡三水縣西魏置恒州尋廢又北地郡彭原縣有豐城西魏置雲州昔軒丘分族異姓者十四人酆邑建侯宗盟者四十國史記曰黄帝姓軒轅氏國語曰黃帝之子二十五宗其得姓者十四人左傳昭二十八年成鱄曰昔武王克商光有天下其兄弟之國者十五人姬姓之國者四十人詩云作邑於豐左傳周之宗盟異姓為後太祖文帝席巻闗河三分天下席巻見過秦論潁川從我並有鄕里之親新豐故人非無布衣之舊袁宏後漢紀曰世祖為大司馬遣平河北於是馮異銚期堅鐔祭遵臧宮王霸皆以為掾吏從至河北賔多去者世祖謂霸曰潁川從我者皆巳亡矣疾風知勁草爾其勉之漢書地理志曰京兆新豐故驪戎國高祖七年置應劭曰太上皇思東歸於是高祖改築城市街里以象新豐徙豐民以實之故號新豐更立九十九姓還存三十六國舊胄還姓爾綿本傳云賜姓爾綿氏周明帝紀二年詔曰三十六國九十九姓自魏氏南遷皆稱河南之民今周室既都闗中宜稱京兆人增邑一千戸進爵為廣一作州城郡開國公地理志曰廣城縣屬右北平尋授文州諸軍事文州刺史隋志云汶山郡後周置文州國家以玉門西拒久勞亭障陽闗北牧多事風塵漢書西域傳曰漢列亭障至玉門自玉門陽闗出西域有南道北道地理志曰敦煌郡有陽闗玉門闗武成二年有詔進公都督瓜州諸軍事瓜州刺史是以名馳梓嶺聲振榆闗無雷畏威負霜懐德漢書地理志曰敦煌郡古瓜州隋志云敦煌郡舊置瓜州梓嶺即梓潼也漢書地理志曰廣漢郡梓潼五婦山馳水所出益州郡有葉榆澤西域傳曰無雷國王治盧城去長安九千九百五十里又曰老上單于殺月氏以其頭為飲器月氏乃逺過大宛西擊大夏而臣之有五翎侯三曰貴霜翎侯治䕶澡城去都䕶五千九百四十里去陽闗七千九百八十二里此云負霜疑貴霜轉寫之誤也保定三年還朝受工部中大夫遷軍司馬夏官司武待白露而治兵冬官考工記𤣥雲而授職周禮夏官司馬之職謂永為軍司馬也月令曰七月白露降治兵謂秋獮之事也周禮冬官考工記謂永為工部大夫也服䖍曰黃帝以雲名官春官為青雲氏夏官為縉雲氏秋官為白雲氏冬官為黒雲氏中官為黃雲氏冬官黒雲故云𤣥雲矣四年增邑三百戸通前合三千九百戸其年授使持節大將軍都督治左八軍總管軍事一有洛食朝登上將暮會小卒事渉交接觀釁而返左傳隨武子曰會聞用師觀釁而動杜注曰釁罪也天和二本傳作四年以本官領小司寇三度有星名天獄八封有坎象刑書史記天官書注詩紀厯樞曰賤人牢一曰天獄坎上六係於徽纆寘於叢棘三歳不得凶虞翻曰徽索黒索也觀巽為繩艮為手上變入坎故係用徽繩坎多心故叢棘獄外種九棘故稱叢棘二變則五體剝剝傷坤殺故寘於叢棘也不得謂不得出獄艮止坎獄乾為歳五從乾來三非其應故曰三歳不得凶矣九家易曰坎為叢棘又為法律公繁不秋荼嚴無夏日鹽鐵論曰秦法繁於秋荼左氏傳曰趙盾夏日之日也民知約法未肯以獄吏為尊吏識刑名無敢以死灰相懼漢書高帝詔曰今民約法三章耳又周勃傳曰人有上書告勃欲反下廷尉吏稍侵辱之既出曰吾嘗將百萬軍然安知獄吏之貴也又韓安國傳曰安國坐法抵罪䝉獄吏田甲辱安國安國曰死灰獨不復然乎甲曰然即溺之又任左廂第三軍總管按後周六軍有右一軍右二軍右三軍左一軍左二軍左三軍總管見周武帝紀仍被勑將兵馬北道敎習韓信入闗即申軍令陳農受詔仍校兵書史記曰蕭何薦韓信拜大將遂聽信計部署諸將所擊按漢王入闗中韓信亡楚歸漢故云入闗漢書曰成帝時以書頗散亡使謁者陳農求遺書於天下豈直六郡良家五營騎士懸知正正之旗遥識堂堂一作亭亭之陣一作氣林漢書曰漢興六郡良家子選給羽期門師古曰六郡謂隴西天水安定北地上郡西河也漢官儀曰漢有五營孫子兵法曰無邀正正之旗勿擊堂堂之陣此治變者也注云正正齊也堂堂大也䝉犯霜露旗鼔驅馳左氏傳太叔曰跋渉山川䝉犯霜露又張侯曰師之耳目在吾旗鼔詩曰載馳載驅俄而遘疾遂至大漸五年六月十六日薨於賀葛城春秋六十有八本傳云率兵北道講武卒於賀葛城餘同將軍死綏三軍行哭都䕶喪還縁邊追祭司馬法曰將軍死綏綏却也漢書曰叚㑹宗死烏孫中年七十五矣城郭諸國為發喪立祠焉九月二十三日靈柩至於京師皇帝臨喪百寮赴弔詔遣使持節車騎大將軍儀同三司賀拔軌監䕶喪事又遣使持節車騎大將軍儀同三司紇豆陵亮冊贈使持節柱國大將軍同華宜敷丹五州諸軍事同州刺史隋志云馮翊郡後魏置華州西魏改曰同州京兆鄭縣西魏曰華州京兆華原縣西魏曰宜州上郡西魏敷州延安郡義川西魏為丹州後周為丹陽諡曰恭公其年十一月五日𦵏於京城南高陽原高司里夫人赫連氏赫赫勃勃之後也崔鴻十六國春秋夏錄曰赫連勃勃朔方人匈奴左賢王去卑之後劉元海之族也并衆數萬自稱天王大單于以匈奴夏后氏之苗裔僣稱大夏令曰古之氏族無常王者繫天為子是為徽赫實為天連改姓曰赫連氏庶恊皇天之意支庶以鐵伐為氏庶朕宗族子孫剛鋭如鐵皆堪伐人兗州刺史悦之女年十四適爾綿氏冊拜魯城縣君遷濟隂郡君又遷廣成國夫人肅恭令淑儀範賢才四德有耀三星增輝三公夫人見於斯矣四德謂婦德婦言婦容婦功也國風綢繆云三星在戸建德元年十二月亡春秋五十有八二年正月歸於高司之塋劉荆州之墓合𦵏於襄水之陽劉荆州劉表也後漢書注引代語曰表死後八十餘年晉太康中冢見發表及妻身形如生芬香聞數里又從征記曰劉表冢在高平郡表之子琮擣四方香珍香數千斛著棺中蘇合消疾之香莫不畢備永嘉中郡人發其墓表面如生香聞數十里衞將軍之陵同穴於廬山之下漢書曰衞青拜大將軍青尚平陽主與主合𦵏起冢象廬山嗚呼哀哉世子岌使持節儀同大將軍領兵部大夫純孝事親忠貞事國禮義自立聲名有焉銘曰軒臺受氏若水降居西城仲𦙍北陸寘餘言叚氏之先本黃帝之子昌意之後姬姓其在鄭國春秋時有共叔叚為京城大叔叚為武姜少子莊公之弟故云仲𦙍北陸寘餘謂叚匹磾本鮮卑人父務勿塵為單于匹磾假撫軍大將軍也北陸北方之總名也山川雄烈風俗扶疎昔我闗塞㳂襲干戈言愄仕魏為黃龍鎮將也本傳言曾祖序云曾祖援疑愄是其高祖矣時遭拔本世值橫波北封代郡東據遼河言比魏盛時儒為平東將軍持節燕恒朔三州也左氏傳曰拔本塞源漢書地理志云代郡秦置屬幽州遼西郡遼東郡秦置屬幽州遼陽大梁水西南至遼陽入遼云北封代郡東據遼河者儒為恒州刺史持節燕恒朔三州按魏地形志及隋書地志魏太和中分恒州東部置燕州恒山本恒山郡隋志馬邑郡舊置朔州本漢五原郡後魏置懐朔鎮及朔州此三州之地在燕代之間遼陽在東也地未平一天猶薦瘥我公重光繼文踵武言魏正光末六鎮擾亂永遂於此時立功也逸書曰地平天成又老子曰地得一以寜詩曰天方薦瘥我公謂叚永也楚辭曰及前王之踵武王逸曰踵繼也武跡也總牧三蕃兼治六輔雅俗觀風都亭待雨謂永厯任諸州軍事及諸州刺史也漢書曰兒寛表奏開六輔渠韋昭曰六輔謂京兆馮翊扶風河東河内河南也師古曰溝洫志云兒寛為左内史奏請穿六渠以益漑鄭國旁高卬之田於鄭國渠上流南岸更開六道小渠以輔助灌漑耳渠在雍州雲陽三原兩縣界鄉人名曰六渠亦號輔渠故河渠書云闗内則輔渠靈軹是也任昉曰六輔殊風文選李善引韋昭注此云六輔亦引韋氏之義也禮記曰太師陳詩以觀民風謝承後漢書曰鄭𢎞為淮隂太守消息繇賦政不煩苛行春大旱隨車致雨不逢問吏無聞桴鼔袁宏後漢紀曰劉寵為㑹稽太守郡中大治徵入為將作大匠山隂父老共往送寵曰山谷老生未嘗到郡縣他時吏發不去民間或狗吠竟夕民不得安自明府下車以來吏稀至民間狗不夜吠第五種拜高密侯相是時徐兗二州盗賊羣輩種皆大儲糧稸勤厲吏士賊聞皆憚之桴鼔不鳴流民歸者歳終不止數千家桴擊鼔杖也音夫公以載世挺此令聞孝有三德忠惟一君馬陵釋患聊城解紛左傳成七年云㑹武陵杜預曰魏郡元成縣東有地名馬陵史記曰龎涓死處聊城解紛田單事注巳見兵防滿月戰避迎雲長松都尉細柳將軍漢書匈奴傳曰匈奴舉事常隨月盛壯以攻戰月虧則退兵續漢志曰雲如壊山謂營頭之星也占曰營頭之星所墜其下覆軍殺將血流千里後漢郡國志廣漢屬國都尉水經注云漢永初三年置周白馬水出長松縣東北注白水又東逕隂平漢書曰亞夫為將軍居細柳旣牧淮海且蕃恒代高壁負闗長亭穿塞謂永任徐州恒州刺史諸州軍事也左傳杜注曰壁壘壁也漢官儀曰秦法十里一長亭釁鼔司盟闕此處脱四字鼔左傳僖三十三年孟明稽首曰君之惠不以纍臣釁杜預曰殺人以血塗鼔謂之釁鼓釁計覲反吏不能欺兵無敢背玉闗遺矩汾海留愛説文曰釁血祭也應劭曰殺牲以血塗鼔曰釁玉闗遺矩謂為瓜州刺史瓜州燉煌玉門闗是也汾海留愛謂為南汾州刺史也大將受冊公昇其壇六卿咸事公貳其官大將昇壇韓信事謂授使持節大將軍也六卿咸事者永為小司寇故云貳矣夷陵燒楚上黨分韓營軍叅合校戰臯蘭史記曰秦將白起伐楚拔郢燒夷陵漢書地理志曰上黨本韓之别郡也逺韓近趙後卒降趙皆趙分也史記韓王信傳曰柴將軍屠叅合斬韓王信蘇林曰叅合代地也正義曰故城在朔州定襄縣北地理志曰代郡有叅合縣水經注曰道人城北五十里有叅合鄉故縣也漢書霍去病傳曰合短兵鏖臯蘭下師古曰山名也年深厲起福過災生上台裂岳次將傾星傷其卒也庾亮讓中書監表曰小人禄薄福過災生上台三台也次將文昌中星名言永死上應列宿也赤地疑作虵悲淚白虎哀鳴懸弓靈幕繫馬寒坰赤虵丹旐也爾雅曰龜虵曰旐陳留風俗傳曰沛公起兵野戰喪皇妣於黄鄉天下平定乃使使者以梓宮招魂幽野有丹虵在水自洒濯之入於梓宮其浴處有遺髪焉故諡曰昭靈夫人水經注引此作丹旐矣干寶搜神記曰王業字子香漢和帝時為荆州刺史毎出行部沐浴齋素以祈於天地當啓佐愚心無使有枉百姓在州七年惠風大行苛慝不作山無豺狼卒於湘江有二白虎低頭曳尾宿衞其側及喪去虎踰州境忽然不見民共為立碑號曰湘江白虎墓爾雅曰林外謂之坰煙凝不動泉凍無聲天子愴然追於贈諡禮官賜冊陪陵受地謂帝臨喪冊贈追諡更受𦵏地也印綬曰策衣衾曰燧𤣥窆就列黃腸在位漢書曰張安世薨天子贈印綬送以輕車介士穀梁傳曰衣衾曰燧何休云燧猶遺也以衣服可以贈人因謂衣服為燧周禮鄭注曰窆𦵏下棺也漢書音義曰以柏木黃心為椁曰黃腸也自此何世從茲㡬春樹為櫪社陵成谷神詎知雲閣名在功臣櫪社疑即櫟社莊子曰匠石之齊見櫟社樹觀者如市按莊子以此木得終天年此云墓樹長久也老子曰谷神不死注云谷養也神謂五臟之神人能養其神炁則長生不死此云陵成谷神者言死而不朽視彼丘陵有如生年也雲閣漢書所謂雲臺是也臺閣通稱矣周車騎大將軍賀婁公神道碑昔者軒丘命氏初分兄弟之姓若水降居始建諸侯之國序張氏之先也按姓譜自軒轅子少昊第五子揮觀弧星始造弓矢為弓正主祀弧世掌其職為張氏軒丘命氏若國語所云黃帝之子十四姓也注見齊王憲碑若水降居昌意事注見叚永碑言張氏本黃帝之後姬姓也自是以官為族因地為宗水𣲖枝分其可知矣以官為族所謂弓正是也因地為宗按潛夫論河東解邑有張城有西張城是也公諱慈字元逹本姓張清河東武城人也仕於周張仲為孝友謀於晉張彦為賢臣小雅六月之詩曰侯誰在矣張仲孝友箋云張仲尹吉甫之友爾雅李廵注曰張姓仲字其人孝故稱孝友矣春秋晉有張氏世為大夫左傳成十八年曰張老為侯奄國語云使張老延譽於四方且觀道逆者是也襄三年悼公以張老為中軍司馬至襄十六年平公即位以其子張君臣代之其後張氏累見於傳張彦疑即張老爾雅曰美士為彦彦士之美稱故曰張彦若漢書魏倩汲直矣韓有開地則五世稱強一作強國趙有孟談則三卿不戰漢書曰張良其先韓人大父開地相韓昭侯宣惠王襄哀王父平相釐王悼惠王秦滅韓良求客刺秦王為韓報仇以五世相韓故師古曰從昭侯至悼惠王凡五君戰國䇿曰張孟談隂見韓魏之君殺守隄吏決水灌智伯智伯軍亂擒智伯身死國分為三三卿韓趙魏也祖慶少習邊將慿仗智勇雖復五車竹簡不取博士之名一巻兵書即以將軍自許莊子曰惠施其書五車其道蹐駁漢書藝文志稱兵書有娷一篇又有兒良一篇廣武君一篇丁子一篇項王一篇太壹兵法一篇鵊冶子一篇孟子一篇圖一巻鮑子兵法圖一巻苗子圖一巻角端在手必無齊魯之侵蓮花挿腰甚得蛟龍之氣司馬相如上林賦曰獸則麒麟角􅗧郭璞曰角􅗧音端似猪角在鼻上堪作弓李陵嘗以此弓十張遺蘇武也毛詩疏云角端有肉張揖曰角端似牛角可以為弓齊魯之侵引史記曹沬事注見歩陸碑蓮花劒也越絶書曰越王取純鉤薛燭望之其花捽如芙蓉蛟龍之氣即雷煥張華云豐城劒氣也後劒化為龍矣為車騎大將軍儀同三司散騎常侍霸城縣開國伯贈河州刺史隋志京兆太興有後魏杜城縣西霸城縣父璨公子公孫有鎡基於天下良弓良冶有世業於家風孟子曰雖有鎡基不如待時賈逵曰鎡基耨也列子曰良弓之子必先為箕良冶之子必先為裘書則百家可知劒則千人可敵三槐以鼐鼎象物知其神奸五等以桓珪班瑞守其宮室君以才望兼而有之周禮曰三槐三公位焉左氏傳曰昔夏之方有德也逺方圖物貢金九牧鑄鼎象物使人知神姦爾雅曰鼎絶大謂之鼐周禮曰上公之禮執桓珪鄭云雙植謂之桓桓宮室之象所以安其工終於使持節車騎大將軍儀同三司散騎常侍武定縣開國公贈河州刺史惟公秉山岳之靈受星辰之氣年在髫髪甫就勝衣後漢光武紀曰今皇子賴天能勝衣趨拜竹馬來迎巳知名於郭伋羊車在道即見賞於王澄後漢書曰郭伋在并州素給恩德及後入界所到縣邑老幼相擕始至行部到西河美稷有兒童數百各騎竹馬道次迎拜晉書曰衞玠字叔寶總角乗羊車入市見者皆以為玉人觀之者傾都瑯邪王澄有高名少所推服毎聞玠言輙嘆息絶倒故時人為之語曰衞玠談道平子絶倒豈直童子明經書生説卦而巳後漢書曰臧洪年十五以父幼拜童子郎注云漢法孝廉試經者拜為郎洪以年幼才俊故拜童子郎續漢書曰左雄奏徴海内名儒為博士使公卿子弟為諸生有志操者加其俸禄及汝南謝連河南趙建章年始十二各能通經雄並奏拜童子郎於是負書來學雲集京師也秉山岳之靈至而巳言張慈幼敏也至如禪河清論秋水高談故以辨折龜林聲馳鹿野釋法顯傳曰恒水東南流逕拘夷那竭國南城北雙樹間有希連禪河世尊於此北首般泥洹分舎利處莊子有秋水篇龜林注詳齊王碑本句經稱龜頭尾四足以喻六塵長阿含經曰毗婆尸如來於槃頭城鹿野苑中轉無上法輪城内四千人往詣鹿野苑中毗婆尸佛所頭面禮足即於座上逺離塵垢得法浄眼國家官族君為首姓起家車騎大將軍儀同三司襲爵為公增邑合一千六百戸弱冠登朝傳呼甚寵漢書蕭望之傳曰下車趨門傳呼甚寵漢魏台鼎故無此比中朝方伯罕有其年大冢宰任總機衡是勤王略惜君忠壯委以爪牙大冢宰晉國公䕶也周書武帝紀云保安元年以大冢宰晉公護為都督中外諸軍事五府總於天官晉起居注曰元康元年詔曰司徒王渾文武勳庸著在方策宜叅弼機衡以亮天工其可録尚書事也左傳成二年曰侵敗王略杜預曰略經略法度也又成十二年傳郤至曰略其武夫以為己腹心股肱爪牙杜云為搏噬之用也漢書武帝詔曰將軍者國之爪牙也乃領左廂親信出為梁州防主隋書地志梁州在禹貢自漢川以下諸郡皆其封域周時以併雍部及漢又析置益州又曰漢川郡舊置梁州華陽西極漢水東流巴濮既寜沉黎即静言梁州之地也禹貢曰華陽黒水惟梁州又云嶓冢導漾東流為漢左傳昭九年曰巴濮楚鄧吾南土也正義曰土地名云巴巴郡江州縣也建寜郡南有濮夷地漢書曰武帝元鼎六年定西南夷置況黎郡臣瓚曰茂陵書沉黎治笮都去長安三千三百五十五里領縣二十一保定四年王師北伐以君驍勇被召將兵師下宜陽身登函谷括地志云故韓城一名宜陽城在洛州福昌縣東十四里即韓宜陽縣城也函谷闗名西征記曰函谷右絶岸十丈中容車而巳周書保定五年改函谷闗為通洛防將燒白馬之城以覆烏巢之壘桑欽水經曰沔水東逕白馬戍南濜水入焉酈元注濜水又南逕張魯治東水西上有張天師堂庾仲雍謂山為白馬塞堂為張魯治東對白馬城一名陽平闗亦云濜口城矣魏志張魯傳云太祖自散闗出武都征之至陽平闗魯欲舉漢中降聞陽平已陷乃奔南山入巴中左右欲悉燒寳貨倉庫魯封藏而去曹瞞傳曰官渡之戰許攸曰公孤軍獨守外無救援而粱榖已盡此危急之日也今袁氏輜重有萬餘乗在故市烏巢屯軍無旅備今以輕兵襲之不意而至燔其積聚不過三日袁氏自敗也既而中塗甚雨未獲圍原軍師聞喪不成侵宋言伐齊之師無功也周書武帝紀云保定四年十月詔大將軍大冢宰晉國公䕶率軍伐齊䕶總大軍出潼闗大將軍權景宣率山南諸軍出豫州少師楊㯹出枳闗十一月柱國蜀國公尉遲逈圍洛陽柱國齊國公憲營於邙山晉國公護次於陜州十二月齊豫州刺史王士良以州降齊師渡河晨至洛陽諸軍驚散尉遲逈麾下數十騎扞敵得却至夜引還柱國庸國公王雄力戰死之遂班師楊㯹於枳闗戰沒權景宣亦棄豫州而還五年春正月甲申朔廢朝以庸國公王雄死王事故也左傳僖二十五年云晉侯圍原命三日之糧原不降命去之左傳圍原無遇雨之文五張寺碑銘云有雨圍原及此篇皆云遇雨是所未詳疑此原字即爾雅高平曰原之原葢郊外通稱與下侵宋借對非謂原邑也六韜云武王伐殷兵行之日大雨左傳僖十九年云衞伐邢師興而雨此皆師出有功者也左傳襄十八年云楚師伐鄭渉於魚齒之下甚雨及之楚師多凍役徒㡬盡此無功之師今周師伐齊無功又將士多棄軍戰沒疑是引楚伐鄭之事又按左傳弦高稱鄭有原圃杜云滎陽中牟縣圃田澤也豈以鄭囿有原圃之名得稱圍原耶史記宋世家曰文公元年晉率諸侯伐宋責以弑君聞文公定立乃去在春秋文十六年十一月經云宋人弑其君杵臼十七年晉人衞人陳人鄭人伐宋諸侯㑹于扈左氏傳曰晉荀林父衞孔逹陳公孫寜鄭石楚伐宋討曰何故弑君猶立文公而還卿不書失其所也晉侯蒐于黃父遂復合諸侯平宋也公不與㑹齊難故也書曰諸侯無功也杜預曰昭公雖以無道見弑而文公猶宜以弑君受討荀林父伐宋以失所稱人晉侯平宋以無功不序刺欲平宋而復不能也今晉公䕶等伐齊無功其猶失所稱人之例與柱國趙王今上之第九弟也文則河間上書武則任城置陣周書文帝十三子傳云趙僭王招字豆盧突幼聰博渉羣書好屬文學庾信體詞多輕艶武成初進封趙國公保定中拜為柱國建德中進爵為王漢書曰河間獻王脩學好古實事求是從民得善書必為好寫與之留其真加金帛賜以招之由是四方道術之人不逺千里或者先祖舊書多奉以奏獻王者故得書多與漢朝等武帝時獻王來朝獻雅樂對三雍宮及詔䇿所問三十餘事其對推道術而言得事之中文約指明立二十六年薨魏志曰任城威王彰字子文少善射御膂力過人手格猛獸不避險阻數從征伐志意慷慨太祖課彰讀詩書彰謂左右曰丈夫一為衞霍將十萬騎馳沙漠驅戎狄立功建號耳何能作博士耶太祖常問諸子所好使各言其志彰曰好為將太祖曰為將奈何對曰被堅執鋭臨難不顧為士卒先賞必行罰必信太祖大笑代郡烏丸反以彰為驍騎將軍大破之斬獲千數大賜將士無不悦喜時鮮卑大人軻比能將萬騎觀望強弱見彰力戰所向皆破乃請服北方悉平時太祖在長安召彰詣行在所彰自代過鄴太子謂彰曰卿新有功今西見上宜勿自伐應對常若不足者彰到如太子言歸功諸將太祖喜持彰鬚曰黃鬚兒竟大竒也黃初三年立為任城王作鎮岷丘揚旍一作軫錦水白虎之俗難安黃龍之盟不定周書趙王招傳云出為益州總管是也周書武帝紀云保定二年十一月以趙國公招為益州總管岷丘岷山也山海經曰岷山江水出焉華陽國志曰錦江織錦濯其中色鮮明又曰秦昭襄王時有一白虎常從羣虎藪遊秦蜀巴漢之境傷害千餘人有巴郡閬中人作白竹之弩射殺白虎昭王嘉之而以其􅊂人不欲加封乃刻石為盟要復􅊂人秦犯􅊂輸黃龍一雙􅊂犯秦輸清酒一鍾􅊂人安之難安不定謂湏叅佐也以君智略入佐中權左氏傳曰中權後勁天和元年授使持節大都督治柱國總府司録仍轉司馬餘官封如故相如西喻鏤石於靈山武侯南征浮船於瀘水方之今日彼獨何人漢書曰上遣司馬相如責唐䝉等因喻告巴蜀民相如使略定西南􅊂卭莋冉駹斯榆之君皆請為臣妾除邊闗邊闗益斥西至沫若水南至牂牁為檄通靈山道橋孫水以通卭莋張揖曰鑿開靈山道置靈道縣蜀志曰諸葛亮五月渡瀘深入不毛注云漢書地理志曰瀘惟水出牂牁句萠縣九品課工為上之下謂為司馬之職也四年入朝歸事宰旅即受載師大夫將命齊國尋盟出境即用和鄰之儀入國聞喪仍從會𦵏之禮左傳襄二十六年曰韓宣子聘於周王使請事對曰晉士起將歸時事於宰旅無他事矣杜注云禮諸侯大夫入天子國稱士時事四時貢職宰旅冢宰之下士言獻職貢於宰旅不敢斥尊史記曰平原君與楚合從毛遂捧銅盤而跪進之楚王遂定從而歸左傳文六年曰秋季文子將聘於晉使求遭喪之禮以行其人曰將焉用之文子曰豫備不虞古之善敎也八月晉襄公卒按周書武帝紀天和三年十二月齊武成帝薨四年春正月辛卯朔廢朝以齊武成薨故也遣司會河陽公李綸等㑹𦵏於齊仍弔賻焉是賀婁慈時將命齊國從會𦵏之禮也可使南面出論語此之謂乎尋以本官入治軍正至如渭水兵書在心為志軒丘陣法聚石成圖既得師不疲勞兵無怨讟渭水兵書太公兵法也太公釣於渭水故云史記留侯傳正義曰太公兵法一袠三巻太公姜子牙周文王師封齊侯也軒丘陣法黃帝兵符也史記曰黃帝名曰軒轅皇甫謐云居軒轅之丘因以為名正義曰龍魚河圖云天遣𤣥女下授黃帝兵符左氏傳曰君無怨讟入陪中禁更領儀同邸舎城池門闌戸籍咸資廵警並用司存帝城近臣公室密戚如逢司隷似畏都官後漢書東海公陽對曰河南帝城多近臣南陽帝鄉多近親司隷都官注見崔説碑既而孤城鄭嫗不相其年巴水涪翁不醫其疾吳録曰吾粲生數歳孤城嫗相之謂其母曰兒有卿相之骨又曰皇象工書嚴武圍碁宋壽占夢曹不興善畵孤城鄭嫗能相人及吳範劉惇趙達八人世稱妙謂之八絶云見呉志注後漢書方術傳曰有父老不知何出常漁釣於涪水因號涪翁乞食人間見有疾者時下鍼石輒應時而效乃著鍼經診脉傳於世郡國志曰巴郡涪陵出丹注巴漢志曰涪陵巴郡之南鄙從枳南入折丹涪水春秋三十有三奄捐官舎呂子明之疾甚嘆軫吳王阮元瑜之長逝悲深魏主吳志曰呂䝉字子明汝南富陂人也獲荆州為南郡太守封孱陵侯䝉疾發孫權時在公安迎置内殿所以治䕶者萬方募封内有能愈䝉疾者賜千金時有鍼加權為之慘戚心欲數見其顔色又恐勞動常穿壁瞻之見小能下食則喜顧左右言笑不然則咄唶夜不能寐病中瘳為下赦令羣臣畢賀後更增篤權自臨視命道士於星辰下為之請命年四十二遂卒於内殿時權哀痛甚為之降損魏志曰陳留阮瑀字元瑜瑀以十七年卒文帝與元城令吳質書曰元瑜書記翩翩致足樂也又云昔伯牙絶絃於鍾期仲尼覆醢於子路痛知音之難遇傷門人之莫逮也諸子但為未及古人亦一時之儁也此皆悲傷之詞有詔贈某官禮也以建德四年三月日歸𦵏於河州苑川郡之禁山公六郡良家西河鼎族地壯金行人雄塞氣漢書曰以六郡良家子給選羽林史記正義曰河在冀州西故云西河黃帝素問曰西方者金玉之城沙石之處其人山居而多風水土剛強兵書七巻河水浮來射法三篇天弧夜下兵書七巻河水浮來未詳漢書藝文志有楚兵書七篇又有李將軍射法三篇史記天官書注曰弧九星在狼東南天之弓也鋒旗不息刁斗恒驚鋒旗疑作蜂旗左傳哀二年曰鄭人擊趙簡子得其蜂旗漢書曰李廣不擊刁斗以自衞猶得馬上讀書軍中習禮吳書曰魯肅雖在軍陣手不釋巻東觀漢記曰祭遵雖在軍旅不忘爼豆太史子義善於謀䇿諸葛公休長於撫馭吳志曰太史慈字子義東萊黃人也北海孔融為賊管亥所圍慈到平原説劉備遣精兵三千人隨慈賊聞兵至散走孫䇿拜折衝中郎將劉繇亡豫章士衆萬餘人未有所附䇿命慈往撫安焉劉表從子磐驍勇數為寇於艾西安縣䇿以慈為建昌都尉治海昬并督諸將攻磐磐絶迹不復為寇孫權統事以慈能制磐遂委南方之事魏志曰諸葛誕字公休瑯邪陽都人也傾帑藏賑施以結衆心厚飬親附及陽州輕俠者數千人為死士及反後皆曰為諸葛死不恨其得人心如此四代儀同三司七世河州刺史按本序祖慶為儀同三司河州刺史父粲亦為儀同三司河州刺史此言四代七世是高曾以上世授此職也鍾鼎成列冠蓋連隂所謂生為貴臣死為貴神者也左傳用物精多則䰟魄強是以有精爽至於神明家語云生為上公死為貴神者也但以遊䰟久客反𦵏途逺道阻山長妻孤子幼哀聲滿野愁氣連雲况復松檟飄颻方臨武威之戍丘陵廻逺直對臨洮之城任彥升為范始興作表云松檟成行漢書地理志曰武威郡故匈奴休屠王地武帝太初四年開臨洮屬隴西郡洮水出西羌中北至枹罕東入河師古曰洮吐高反馬援亡於武溪尸柩返於槐里梁鴻死於會稽妻子歸於平陵後漢書曰馬援字又淵扶風茂陵人也援在交阯常餌薏苡實用得輕身省慾以勝瘴氣還載之一車及卒後有上書譖之者以為前所載皆明珠文犀益怒援妻懼不敢以喪還舊塋裁買城西數畆地藁𦵏而巳兄子嚴與妻子草索相連詣闕請罪上書訴寃同郡朱勃詣闕上書奏報歸田里崔豹古今注曰武溪深乃馬援南征之所作也援門生爰寄生善吹笛援作歌以和之名曰武溪深其曲曰滔滔武溪一何深鳥飛不度獸不能臨嗟哉武溪多毒淫按馬援扶風茂陵人漢書地理志曰扶風即茂陵師古曰黃圖云本槐里之茂鄉後漢書曰梁鴻字伯鸞扶風平陵人也卒伯通等求𦵏地於吳要離冢傍咸曰要離烈士而伯鸞清髙可令相近𦵏畢妻子歸扶風嗚呼哀哉﨑嶇逺矣昔者繁昌祠前即有黃金之碣德陽墓下猶傳青石之碑魏志曰繁昌縣授禪石碑中生金表送上羣臣皆賀水經注云魏書國志曰文帝以漢獻帝延康元年登禪改元黃初以潁隂之繁陽亭為繁昌縣城内有三臺時人謂之繁昌臺壇前有二碑昔魏文帝禪於此自壇而降曰舜禹之事吾知之矣故其石銘曰遂於繁昌築靈臺也於後其碑六字生金論者以為司馬金行故曹氏六世遷魏而事晉也華陽國志曰德陽縣有青石祠山原肥沃有澤漁之利士女貞孝望山樂水土地易於生事車騎將軍鄧芝雅有終焉之志遂𦵏其山是謂勒功乃為銘曰七葉佐漢五世相韓漢書曰金日磾張安世皆七代仕漢左太沖詠史詩曰金張藉舊業七葉弭金貂漢書曰張良五世相韓忠臣入仕孝友當官忠臣謂良忠於韓入仕漢也詩曰張仲孝友青城仙洞黃石祠壇仙傳拾遺曰嵩山叟晉時人也世説曰嵩山北有大穴莫測其淺深百姓毎歳遊觀其上叟嘗悞墮穴中同輩冀其儻不死投食於穴墮者得而食之廵穴而行十許日忽曠然見明有草屋一區中有二仙對碁局下有數盆白飲墮者告以飢渴碁者與之飲飲畢氣力十倍碁者曰汝欲留此否曰不願停碁者敎云從此西行數十歩有大井井中多怪異慎勿畏之必投身井中多蛟龍見叟輙避其路於是隨井而行井中物如青泥而香美食之了不飢半年許乃出蜀青城山因得歸洛問張華華曰此仙館丈夫所飲者玉漿所食者龍穴石髓子其得仙者乎遂尋洞往不知所之𤣥中記曰蜀郡青城山有洞穴分為三道西北通崑崙茅君傳云青城是第五洞九仙寶室之天周廻二千里十洞天之一也入山十里得至焉按此張華知之是謂張華也漢書張良傳曰良始所見下邳圯上父老與書者後十三歳從高帝從濟北果得榖城山下黃石取而寶祠之及良死并𦵏黃石毎上冢伏臘祠黃石臺堪走馬書足廻鸞漢書曰張敞走馬章臺街衞恒四體書勢曰𢎞農張伯英臨池學書池水盡黒韋仲將謂之草聖伯英弟文舒次伯英索靖草書狀曰蓋聞草書之為狀也婉若銀鉤漂若驚鸞巳上皆言張氏之先也武定風飈霸城嚴肅並馳雙傳俱分兩竹謂父璨為武定縣開國公祖慶為霸城開國伯也漢書音義曰舊出入闗皆用傳傳煩因裂襦帛分持後復出合之以為符信漢書文帝紀曰初與郡守為銅虎符竹使符師古曰與郡守為符合分其半右留京師左以與之雙傳兩竹言璨父子二人也重世刺舉連鑣袞服草靡青丘風馳赤谷亦謂璨父子也草靡風馳言能服逺也十洲記曰長洲一名青丘在南海漢書西域傳曰烏孫國大昆彌治赤谷城去長安八千九百里世不乏賢挺茲上嗣孝有三德忠無二志謂祖父有此世德故生賢嗣指張慈也劒足身挺書堪面試列子曰宋有簡子者以技干宋元君㺯七劒迭躍五劒常在空中元君大驚立賜金帛魏志曰陳思王植善屬文太祖嘗視其文曰汝倩人耶植跪曰言出為論下筆成章顧當面試奈何倩人旍節既秉高蟬且珥龜轉印函蛇盤綬笥蔡邕獨斷曰太尉巳下惠文侍中珥貂蟬漢書百官公卿表曰凡吏秩比二千石以上皆銀印青綬師古曰漢舊儀云銀印背龜紐其文曰章謂刻為某官之章郡也後漢書方術傳曰許曼桓帝時隴西太守馮緄始拜開綬笥有兩赤蛇分南北去緄令曼筮之卦成曼曰三歳之後君當為邊將官有東名當東北行三十里後五年更為大將軍南征出為遼東太守討鮮卑後拜車騎將軍擊武陵蠻賊皆如占按笥以竹為之禮記鄭注云圓曰簟方曰笥左右將軍前後常侍繼踵五侯因循三事漢書曰前後左右將軍皆周末官秦因之位上卿金印紫綬漢不常置或有前後或有左右皆掌兵又元后傳曰河平元年上悉封舅譚為平阿侯商成都侯立紅陽侯根曲陽侯逢時為髙平侯五人同日封故世謂之五侯旍旃九坂艫舳雙流還驅木馬更引金牛謂鎮益州也九坂九折坂漢書王陽所畏道也溝洫志曰於蜀則蜀守李冰鑿離􅕞穿二江成都中此渠皆可行舟蜀都賦云帶二江之雙流是也蜀志曰建興十年諸葛亮休士勒農於黃沙作流馬木牛畢敎兵講武水經注曰蜀志云秦惠王欲伐蜀而不知道作五石牛以金置尾下言能屎金蜀王負力令五丁引之成道秦使張儀司馬錯尋路滅蜀因曰石牛道江波錦落火井星浮樽酒望帝安歌蜀侯江波錦落錦江也注已見博物記曰有火井深二三丈在縣南百里以竹木投取火後人以火燭井中火即絶滅不然華陽國志曰七國時杜宇稱帝於蜀號望帝戰國䇿秦伐蜀取之遂定蜀蜀主更號為侯而使陳莊相蜀蜀既屬秦益强富厚輕諸侯受脤河陽偏師洛浦置陣成臯連旗廣武謂東征齊國也左氏傳曰戎有受脤河陽洛浦謂河南洛浦也隋志云河南郡洛陽縣後周置東京六府洛州總管漢書高帝紀曰四年漢王引兵渡河復取成臯軍廣武孟康曰於滎陽築兩城而相對名為廣武城在厫倉西三室山上朝兵減竈夜營多鼔箭麗一作起六麋鋒摧九虎減竈戰國孫臏事注已見左氏傳析公曰若多鼓均聲以夜軍之楚師必遁乂曰樂伯射麋麗龜晉魏錡如楚致師潘黨逐之及滎澤見六麋射一麋以頭獻漢書王莽傳曰莽拜將軍九人皆以虎為號號曰九虎後漢書馮衍傳曰皇帝率宛葉之衆摧九虎之軍倏忽人世俄然今古祟發兩星醫驚二豎左氏傳曰晉侯有疾卜人曰實沈臺駘為祟子産曰昔高辛有二子長曰閼伯季曰實沈帝遷閼伯於商丘主辰遷實沈於大夏主參則實沈參神也又成十年傳云晋侯疾病求醫於秦秦伯使醫緩為之未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰疾不可為也在肓之上膏之下攻之不可逹之不及藥不至焉不可為也公曰良醫也厚為之禮而歸之遊魂通夢言返舊塋紫泥賜册黃腸贈行言慈卒於官歸𦵏河州也後漢書曰溫序死𦵏洛城傍長子壽夢序告曰乆客思鄉里壽上書乞骸乃反𦵏舊塋焉西京雜記曰中書以武都紫泥為璽室加綠綈其上黃腸漢書張安世事注云柏木棺也途登石紐路入金城呉越春秋曰鯀娶有莘之女得薏苡而吞之意若為人有感因而妊孕剖脅而產高密家於西羌家於石紐石紐在蜀西川也漢書地志曰金城郡高帝六年置應劭曰初築石得金故曰金城臣瓚曰稱金取其堅固也故墨子曰雖金城湯池寒關樹直秋塞雲平劒埋合柱書藏鑿楹埋劒干將莫邪子赤比事鑿楹晏子事注皆見司馬裔碑武侯為廟欒公為社二語注見拓拔儉碑雲葢低臨霓裳紛下碑枕金龜松橫石馬楚辭曰雲為蓋兮霓為裳漢舊儀黃金龜紐此借稱龜趺水經注曰睢水東逕石馬亭西有漢故伏波將軍馬援墓永矣身世留名華夏周上柱國宿國公河州都督普屯威神道碑公諱威字某河南洛陽人也舊姓辛周書有辛威傳隴西人基若水之源纂商丘之胄邑於大亳實定其居封於小辛乃成其姓序辛氏之先也辛氏本姒姓史記曰夏禹之後用國為辛氏其後有辛甲為周太史左傳所謂命百官官箴王闕者也劉向别錄曰辛甲事紂七十五諫而不聽去之周文王以為公卿封之長子故周有辛氏後枝流於晋矣又按辛氏為莘國變姓故湯妃為有莘之女晋侯登有莘之虛括地志曰國在陳留水經注謂邑本郃縣今子山所引大亳小辛皆殷之名號且商丘又相土所因豈其子姓之苖裔耶史記曰黃帝子昌意降居若水娶蜀山氏女生高陽有聖德焉左傳襄九年曰閼伯居商丘祀大火相土因之故商主大火杜注云相土契孫商之祖也始代閼伯之後居商丘亳殷所都也毛詩正義曰殷有三亳二在梁國一在河洛之間榖熟為南亳即湯都也䝉為北亳即景亳是湯所受命也偃師為西亳即盤庚所徙者也立政之篇曰三亳阪尹是也殷本紀曰盤庚崩小辛立是子姓有小辛之號以辛成姓所未詳矣是以三川被髮辛有得見事之機八卦占爻辛廖有知人之鑒左傳僖二十三年曰初平王之東遷也辛有適伊川見被髮而祭於野者曰不及百年此其戎乎其禮先亡矣應劭曰三川今河南郡韋昭曰三川河伊洛也又閔元年傳曰畢萬筮仕於晋辛廖占之曰吉杜預曰辛廖晋大夫也佐治以東都上將魏帝解衣武賢以西國功臣漢王推轂魏志曰辛毘字佐治潁川陽翟人也其先建武中自隴西東遷毘隨兄評從袁紹太祖為司空辟毘毘不得應命及袁尚攻譚於平原譚使毘詣太祖求和太祖大悦許譚平次於黎陽明年攻鄴克之表毘為議郎文帝踐祚遷侍中賜爵闗内侯帝欲徙冀州士家千萬戸實河南時連蝗民饑羣司以為不可而帝意盛莫敢言毘曰陛下欲徙士家其計安在帝曰卿謂我徙之非耶毘曰誠以為非也帝曰吾不與卿共議也毘曰陛下不以臣不肖置之左右厠之謀議之官安得不與臣議耶臣所言非私也乃社稷之慮也安得怒臣帝不荅起入内毘隨而引其裾帝遂奮衣不還良久乃出曰佐治卿持我何太急耶毘曰今徙既失民心又無以食也帝遂徙其半漢書曰辛武賢自羌軍還後七年復為破羌將軍征烏孫至敦煌後不出徵未到卒子慶忌至大官大將軍王鳳薦忌曰父破羌將軍武賢顯名前世有威西􅊂祖大汗渭州刺史周書本傳云祖大汗魏渭州刺史考生河州四面總管大都督周書本傳云父生河州四面大都督及威著勲追贈大將軍涼甘等五州刺史隴右貴臣河西鼎族公侯踵武岳牧連鑣言為隴西大族世為公侯四岳十二牧見尚書並得聲振長榆名雄高柳如淳曰長榆塞名王恢所謂樹榆以為塞者也地理志云代郡髙柳西部都尉治公秉靈山岳載誕星辰結髮嶷然齠年成徳澄波萬頃建標千仞鋒頴既高光芒已逺世説郭林宗曰叔度汪汪如萬頃之波澄之不清擾之不濁孫綽遊天台賦云赤城霞起以建標注引㑹稽記云懸溜千仞謂之瀑布青衿學劒既為人主所稱童子論兵即佐中軍之䇿毛萇曰青衿青領也學子之所服左傳成十六年鄢陵之戰云楚晨壓晋軍而陳軍吏患之范匄趨進曰塞井夷竈陳於軍中而疏行首晋楚唯天所授何患焉文子執戈逐之曰國之存亾天也童子何知焉永熙四年入仕䝉授直盪都督本傳云威少慷慨有志略初從賀拔岳征討有功假輔國將軍都督是也太祖文皇帝雪舊君之恥連西伯之功始裂鴻溝初登函谷此下言周太祖統賀拔之衆遂用威也割鴻溝登函谷謂扈駕西遷興高氏分東西魏矣公擢衣沐髮杖劒轅門撤洗足而相迎下賔階而顧問漢書曰沛公至高陽傳舎使人召酈食其食其至入謁沛公方踞牀令兩女子洗足而見食其食其長揖不拜曰必欲聚徒合義兵誅無道秦不宜踞見長者於是沛公輟洗起衣延食其上坐禮記曰主人就東階客西階若降等則就主人之階史記信陵君傳曰趙王掃除自迎執主人之禮引公子就西階自此即居帳内仍為直寢授寜逺將軍羽林監白土縣開國伯邑五百戸本傳云太祖統嶽之衆見威竒之引為帳内尋授羽林監封白土縣伯邑五百戸漢書地理志云上郡有白土縣圜水出隨志云北地郡新平舊曰白土西魏置豳州大統元年從迎大駕本傳云從迎魏武因攻回洛城功居最大統元年拜寜逺將軍進爵為侯增邑三百戸加冠軍將軍散騎常侍轉大都督公善於用兵長於撫御自攻洛陽定𢎞農戰河橋平沙苑冒刃衝鋒前無橫陣本傳云從擒竇泰復𢎞農戰沙苑並先鋒陷敵勇冠一時從于謹破襄城又從獨孤信入洛陽經河橋陣况以弦木六鈞函犀七屬周易繫辭曰弦木為弧左氏傳曰顏高之弓六鈞周禮曰函人為甲犀甲七屬門多懸胄射必中鞍左氏傳曰公及邾師戰于升陘我師敗績邾人獲公胄懸諸魚門又昭二十六年傳曰齊子淵㨗從洩聲子射之中楯瓦繇胊汰輈匕入者三寸聲子射其馬斬鞅殪山積器械谷量牛馬袁宏後漢紀曰上幸宜陽赤眉請降盆子與徐宣等二十餘人肉袒奉所得更始璽綬積兵甲宜陽西與熊耳山等漢書貨殖傳曰烏支蠃畜牧及衆斥賣求竒繒物間獻戎王戎王十倍其償予畜畜至谷量牛馬師古曰言其數饒不可計算故以山谷多少言之軍吏計功司勲賞策授使持節銀青光禄大夫進爵為公增邑八百戸昔者受律赤符韓信當乎千里治兵白帝張飛擬於萬人比跡今日公之謂也史記劉季為沛公旗幟皆赤由所殺蛇白帝子殺者赤帝子故上赤受律赤符言信拜大將受漢符命也蜀志曰張飛字益德涿郡人與闗某俱事先主飛雄壯威猛亞於闗某魏謀臣程昱等咸稱関張萬人之敵也五年授使持節都督揚州諸軍事揚州刺史傳同浮於江海逹於淮泗篠蕩既敷瑶琨即序禹貢曰淮海維揚州又曰均江海通淮泗又曰篠簜既敷又曰瑶琨竹箭鄭注云篠箭也漢書師古注曰篠小竹也簜大竹也敷布地而生也篠先了反孔傳云瑶琨皆美玉也十三年授車騎大將軍儀同三司尋遷驃騎大將軍開府仍賜姓普屯北史同此周書作普毛即為官族本傳云賜姓普毛氏餘同左傳云官有世功則有官族入陪武帳出總戎韜置府於陽闗張旃於瀚海漢書汲黯傳曰上嘗坐武帳黯前奏事戎韜太公六韜也漢書西域傳阸以玉門陽闗孟康曰在敦煌西界府如衞青幕府是史記匈奴傳曰驃騎臨翰海而還正義曰翰海自天海羣鳥解羽伏乳於此因名旃旗曲柄也故得上書於漢即用同宗争長於周還無異姓漢書曰婁敬上書論都賜姓劉氏左氏傳曰滕侯與薛侯來朝争長公曰周之宗盟異姓為後十六年授鄜州諸軍事鄜州刺史本傳云出為鄜州刺史威時望既重朝廷以桑梓榮之遷河州鄜音敷公頻領兩牧風政神明虎去西河梟移東郡後漢書曰劉昆為𢎞農太守為政三年仁風大行虎皆負子渡河説苑曰梟與鳩相遇梟曰我將束徙此言仁風所被也河湄瑞氣特表㢘平鄜祀神光偏明正直言威河州鄜州兩牧稱神明也爾雅水草交曰湄史記封禪書曰秦文公夢黃蛇自天下屬地止於鄜衍史敦以為神故作鄜畤索隐曰鄜音敷地名後為縣屬馮翊左傳曰神聰明正直而壹者也及乎魏終天禄周受維新謂周閔帝踐祚也明命巳遷彛倫或革周元年改授大將軍枹罕郡開國公增邑一千戸枹罕漢屬金城郡應劭曰故罕羌侯邑枹音鈇隋志云枹罕郡舊置河州軍中受詔非論北伐之功大將登壇無待東歸之䇿東觀漢紀曰衞青大克匈奴武帝拜大將軍於幕中因號幕府漢書韓信傳蕭何曰王必欲長王漢中無所事信必欲争天下非信無可與者顧王䇿安決王曰吾亦欲東耳安能鬱鬱久居此乎於是王欲召信拜之何曰王必欲拜之擇日齋戒設壇場具禮乃可王許之諸將皆喜人人各自以為得大將至拜乃韓信也一軍皆驚置陣太平開隂晉之道連兵廣武納滎陽之城史記曰秦惠文君五年隂晉人犀首為大良造六年魏納隂晉隂晉更名寜秦漢書地理志曰華隂故隂晉也後漢郡國志曰河南滎陽有鴻溝水有廣武城注云西征記曰有三皇山或謂三室山上有二城東者曰東廣武西者曰西廣武各在山一頭相去三百歩其間隔深澗漢主與項籍語處本傳司馬消難來附威與逹奚武率衆援接校戰丹山移營白壁莫不勇冠三軍名凌五將保定初率兵討丹州叛胡破之三年與逹奚武攻陽闗拔之丹山丹州白璧玉璧也杜預云三軍上軍中軍下軍李陵荅蘓武書曰五將失道陵獨遇戰保定四年授寜州總管隋志北地郡後魏置幽州西魏改為寜州掌其北門既為鄭國所委捍其西鄙無懼秦亭之逼本傳云是年從尉遲逈圍洛陽左傳僖二十二年曰杞子自鄭使告於秦曰鄭人使我掌其北門之管若潜師以來國可得也史記注徐廣曰今天水隴西郡有秦亭也是以築平綱之城衞人拱手戍滎波之澤梁氏寒心平綱疑作剛平戰國策曰或為六國説秦曰築剛平衞無東野趙敬侯四年築剛平以侵衞五年齊魏為衞取我剛平史記魏世家無忌曰秦有鄭地得垣雍決滎澤水灌大梁大梁必亡禹貢豫州云滎波既豬導沇水入於河溢為熒是熒在河南左傳云衞及狄人戰於熒澤杜云此熒澤在河北朝廷與公有内外之親令公從戚里之貴乃以魏文帝女為公夫人遂得長門之左别開公主之園濯龍之傍更築王姬之館漢書東方朔傳曰帝姑館陶公主號竇太主獻長門園上大悦之更名竇太主園為長門宮如淳曰竇太主園在長門長門在長安城東南園可以宿館處所故獻之後漢書明德馬后曰前過濯龍門上見外家問起居者車如流水馬如龍左氏傳曰秋築王姬之館於外五年被徵入京拜少司馬本傳云圍洛陽還拜小司馬期於司武以公為魏絳佐於中軍以公為荀首左傳成十八年曰魏絳為司馬又成二年傳稱楚屈巫對莊公云知罃之父成公之嬖也而中行伯之季弟也新佐中軍而善杜云知罃父荀首也豈直謂之鶉火稱之縉雲而巳哉漢書百官公卿表曰神農火師火名黃帝雲師雲名應劭曰火德也故為炎帝夏官為鶉火黄帝以雲紀事夏官為縉雲是也辛威拜少司馬蓋夏官也表又云周官夏官為司馬其年被使領兵出西涼州奉迎突厥皇后隋書地理志曰張掖郡西魏置西涼州尋改為甘州周書皇后傳曰武帝阿史那皇后突厥木扞可汗俟斤之女突厥滅茹茹之後盡有塞表之地控弦數十萬志陵中夏太祖方與齊人争衡結以為援俟斤初欲以女配帝既而悔之高祖即位前後遣使要結乃許歸后於我保定五年二月詔陳國公純等奉偹皇后文物及行殿并六宮以下百二十人至俟斤牙帳所迎后俟斤又許齊人以婚將有異志純等在彼累載不得反命雖論之以信義俟斤不從㑹大雷風起飄壊其穹廬等旬日不止俟斤大懼以為天譴乃備禮送后及純等設行殿列羽儀奉之以歸天和三年三月后至高祖行親迎之禮后有姿貌善行止高祖深敬焉紀裂繻來卿為君逆稱族而行尊君命也左氏傳曰紀裂繻來逆女卿為君逆也天和元年授柱國本傳云天和初進位柱國拜大司寇本傳云建德初拜大司寇楚之柱國方之南火軒之司寇譬以西雲柱國楚卿也戰國策周累謂周君曰君爵為執珪位為柱國國語曰楚重黎之後也黎為高辛火正又曰顓頊乃命南正重司天史記曰黃帝名軒轅應劭曰黃帝受命有雲瑞故以雲紀事由是而言春官為青雲夏官為縉雲秋官為白雲冬官為黒雲中官為黃雲司寇秋官乃白雲白者西方金行之氣故云西雲也總授於公能官人也建德二年授少傅本傳云三年遷少傅出為寜州總管四年授寜州總管都督七州諸軍事即為河州大中正本傳在魏大統十七年此為周建德四年小異公之桑梓本於此地再為連率頻仍衣錦注見前威本河州人為河州總管即為河州大中正是再為連率頻仍衣錦也襄城龍種更反池臺桂陽仙人還歸鄕里謂以桑梓榮之也襄陽記曰龎德公子魯字世文晉太康中為牂柯太守去官歸鄕鄕人相語曰吾家池中龍種來按桂陽仙人有二其一是成武丁其一是蘓仙公並出神仙傳神仙傳曰成仙公者諱武丁桂陽臨武烏里人也為縣小吏使京還過長沙郡投郵舎不及遂宿於野樹下忽聞樹上人語云向長沙市藥旦視之乃二白鶴仙公異之遂往市見二人罩白􅏛相隨而行先生遂呼之設食食訖遂出玉函有素書果有武丁姓名於是以藥二丸令服之曰君當得地仙遂令還家還家明照萬物獸聲鳥鳴悉能解之府君周忻有知人之鑒見而異之後告病四日而殞府君自臨殯之經兩日猶未成服先生友皆臨武來於武昌岡上逢先生乗白驢西行友人問曰日將暮何所之也荅曰暫往迷溪斯湏即返我向來忘大刀在戸側履在雞棲上可過語家人收之友人至其家聞哭聲大驚曰吾向來於武昌岡逢先生共語云暫至迷溪斯須當返令過語家人收刀並履何得爾乎其家人云刀履并入棺中那應在外即以此事往啟府君府君遂令發棺視之不復見尸棺中惟有青竹杖長七尺許方知先生托形仙去時人謂先生乗驢於武昌岡乃改為驢里也又曰蘓仙公者桂陽人也早䘮所怙鄕中以仁孝聞母欲食魚鮓去家百二十里斯須即返母大驚駭知其神異耽後白母受命應仙當違色養封一櫃留之有所闕乏可以扣櫃所需立至三年之後母心疑因即開之見雙白鶴飛去自後扣之無復有應母百餘歳無疾而終鄉人𦵏之後忽見州東北牛脾山紫雲蓋上有號哭之聲咸知蘓君之神也鄕人苦請相見即出半面示一手皆有細毛異常人也後有白鶴來止郡城自言是蘓君矣故老親賔酣歌相慶安車駟馬天下榮之史記陸賈傳曰陸生常安車駟馬宣政元年授上柱國本傳同更加少傅配於上相即陪𤣥扈之圖居於京師實有圯橋之䇿史記天官書曰文昌六星有上相河圖曰蒼頡為帝南廵狩登陽虛之山臨於𤣥扈洛汭靈龜負圖丹甲赤文以授之圯橋黃石公期張良處也見漢書改封宿國公按本傳在大象二年食邑并前五千五百戸射鴻舊圃舞鶴餘城既浮酸棗之河聊對淇園之竹言宿國也宿故衞地左氏傳曰衞獻公戒孫文子寗惠子食皆服而朝日旰不召而射鴻於囿又曰衞懿公好鶴故鶴有乗軒者史記河渠書曰漢興三十九年孝文時河決酸棗東潰金隄於是東郡大興卒塞之其後四十有餘年元光之中河決瓠子是時東流郡燒草以故柴薪少而下淇園之竹以為楗來朝建章則天子降席出遊戚里則羣公下階漢書曰建章宮度為千門萬戸又曰萬石君奮徙家長安戚里中是以行滿天下名聞四海方當光輔五君參謀七政本傳云威性持重有威嚴厯官數十年未嘗有過故得以身名終兼其家門友義五世同居世以此稱之孝經曰行滿天地無怨惡左氏傳曰宜其光輔五君以為盟主也尚書鄭注曰七政謂日月五星也夭厲弗戒薨於所居春秋六十有九柳莊告殯傾社稷之臣鄭僑云亡得諸侯之禮禮記曰衞有太史曰柳莊寢疾衞獻公再拜請於尸曰臣有柳莊也非寡人之臣社稷之臣也鄭僑鄭子產國僑也左傳及系家云子產死孔子泣曰子產古之遺愛也及韓詩稱子産卒鄭人耕者輟耒婦人損其佩玦也皇覽曰子産冡在河南新鄭城外大冡是也按子產鄭國之臣死則丈夫輟耕婦人損佩其為國君所禮可知特其事未聞耳鄭國之君雖為伯爵得稱諸侯言鄭僑亡得諸侯所禮非謂以諸侯之禮加之也詔贈某官諡某公禮也以今開皇元年周静帝大定元年遜位於隋王楊堅是為隋文帝改為開皇元年七月某日反𦵏於河州金城郡之苑川鄕子山以是年卒按此時子山猶在也山行隴底地入塞源望積石以緣河臨崆峒而下坂師古曰隴底謂隴阪即今之隴山也地里志曰金城郡河闗積石山在西南羌中河水行塞外東北入塞内至章武入海禹貢曰浮於積石孔安國曰積石山在金城西南河所經也史記曰黃帝西至於崆峒登雞頭韋昭曰崆峒在隴𤣥甲黃腸﨑嶇亭障及云奠徹方勞榆沈𤣥甲甲之黒色也見漢書霍去病傳黄腸柏木棺也見霍光傳注在司馬裔碑漢書曰光祿諸亭障師古注曰漢制毎塞要處别築為城置人鎮守謂之候城此即障也儀禮曰屬引撤奠乃祖謝莊宣貴妃誄曰階撤兩奠銑曰撤去也奠祭也禮記檀弓曰諸侯輴而設幬為榆沉鄭注云以水浸榆白皮之汁潘地取其引車滑而不滯若夫樹反壤也封夏屋焉終須潁川之碑乃見華隂之碣檀弓國子高曰反壤樹之哉又子夏曰昔者夫子言之曰吾見封之若堂者矣見若覆夏屋者矣鄭注云封築土為壟覆猶茨瓦也夏屋今之門廡其形旁廣而卑又夏屋山名呂氏春秋曰趙簡子病召太子而告之曰我死巳𦵏服衰而上夏屋之山以望太子敬諾簡子死巳𦵏服衰召大臣而告之願登夏屋以望大臣皆諌曰登夏屋以望是遊也服衰以遊不可襄子曰此先君之命也襄子上於夏屋以望代俗其樂甚美於是襄子曰先君必以是教之也歸慮所以取代矣高誘曰夏屋山代之南山也觀望欲令之取代也此云封夏屋焉蓋檀弓之夏屋也蔡邕陳太丘碑文云實字仲弓潁川許人述征記華岳廟前立碑叚煨所刻其文張旭造世子儀同永達本傳云子永達嗣大象末以威勲拜儀同大將軍孝性有聞居喪得禮嗟海變而田成懼山飛而地絶神仙傳麻姑曰已見東海三為桑田越絶書曰龜山一曰怪山往古一夜自來呉越春秋曰瑯邪東武海中山一夕自來故名怪山按龜山一名飛來一名寶林一名怪山史記䝉恬傳恬曰恬罪固當死起臨洮屬之遼東城塹萬餘里此其中不能無絶地脉哉勒石墓田仍銘云爾少典之孫𤣥王之子虹貫於月金承於水史記曰黃帝者少典之子黃帝生二子其後皆有天下其一曰𤣥囂是為青陽青陽降居江水其二曰昌意降居若水昌意娶蜀山氏生高陽有聖德焉正義曰華陽國志及十三州志云蜀之先肇於人皇之際黃帝為子昌意娶蜀山氏後子孫因封焉帝顓頊高陽氏黃帝之孫昌意之子母曰昌僕謂之女樞河圖云瑤光如蜺貫月正白感女於幽房之宮生顓頊首戴干戈有德文也按史記顓頊高陽黃帝之孫昌意之子高辛𤣥囂之孫黃帝曾孫高辛於顓頊為族子虹貫於月謂顓頊也雄曰虹雌曰蜺顓頊為金德高辛為水德故云金承於水言少典生黃帝黃帝二子其後皆有天下也降及於周公侯復始風俗氣候山川表裏左傳辛廖曰公侯之子孫必復其始左氏傳曰表裏山河孫炎曰内曲裏也外曲表也河連積石山帶崆峒秦亭北上漢使西通括地志曰積石山今名小積山在河州枹罕縣西七里河州在京西一千四百七十二里崆峒山在肅州福禄縣東南抱朴子内篇云黃帝見廣成子受九品之方過崆峒從廣成子受自然之理即此山酈元云蓋大隴山異名也莊子云廣成子學道崆峒山黃帝問道於廣成子蓋在此秦亭在隴西郡注見本序漢書西域傳曰西域以孝武時始通金行氣壯地勢人雄稜稜高節凜凜疎風漢書金城郡師古注曰以郡在京師之西故謂金城金西方之行祖考藩屏濁河清渭兩地謨明雙流光賁謂祖大汗為渭州刺史考生為河州總管也蜀都賦曰帶二江之雙流水無别色雲無異氣為吏為民惟懐惟畏東觀漢紀曰朱暉為臨淮太守民懐其惠又曰暉斥逺佞人吏畏其威公之嗣世實秉英靈降神中嶽廻文列星左傳僖二十六年展禽對齊侯曰豈其嗣世九年而棄命廢職詩曰維嶽降神爾雅曰嵩高為中嶽廻文列星即所謂文昌六星上將貴相等名也鸞翔鳳舞珠角山庭臣深義本子極天經山海經曰軒轅之丘鳳鳥自歌鸞鳥自舞珠角山庭注見齊王憲碑孝經曰夫孝天之經也洛城戰陣河橋旗鼓謂威從獨孤信入洛陽城經河橋陣也箭飲石梁劒然銅柱並麗六麋俱抽雙虎水經注曰泗水之上有石梁焉故曰呂梁昔宋景公以弓工之弓彎弧東射矢集彭城之東飲羽於石梁即斯梁也史記刺客傳曰荆軻引其七首以摘秦王不中中銅柱正義曰燕太子云荆軻拔七首擲秦王決耳入銅柱火出左氏傳曰樂伯射麋麗龜晉魏錡如楚致師楚潘黨逐之及熒澤見六麋射一麋以顧獻史記張儀傳曰兩虎果鬬大者傷小者死卞莊子從傷者而刺之一舉果有兩虎之功玉門開郡陽闗置府再為上台兩為少傅漢書地理志曰敦煌郡龍勒有玉門陽闗春秋漢含孳曰三公象五岳在天法三能台能同按辛威傳建德二年授少傅宣政元年更加少傅是兩為少傅也模範帝師經綸國歩允襲峻德欽明審諭不吝車茵誰言溫樹潘岳揚仲武誄曰子以妙年之秀固能縂覽義㫖而軌式模範矣史記曰周文王得呂尚於磻溪以為師武王曰師尚父成王尊為太師周易曰君子以經綸詩云國歩斯頻峻德欽明俱見尚書漢書曰丙吉為丞相於官屬掾史務掩過揚善吉馭吏嗜酒數逋蕩從吉出醉歐丞相車上西曹主吏白欲斥之吉曰以醉飽之失去士使此人將復何所容西曹地忍之此不過汚丞相車茵耳又曰孔光沐日歸休兄弟妻子宴語終不及朝省政事或問光溫室省中樹皆何木也光黙不應更荅以他語其不泄如是天道茫昧年齡倏忽上將星開功臣鼎没淮南子曰茫茫昧昧從天之道李善曰倏忽言疾也上將文昌中星名按鐘鼎所以勒勲功臣亡故云鼎没九原陵阜三河甲卒地險龜林營危馬窟國語文子曰九原可作者其隨武子乎漢書高祖委發闗中兵收三河士淮南王諫伐南越書曰甲卒死亡龜林未詳疑謂西域也齊王憲碑地盡龜林又賀婁慈碑云辨析龜林聲馳鹿野是龜林佛敎語以喻六塵疑以此名地矣注詳前二碑内古詩曰飲馬長城窟西州永别北闕長辭山張虚蓋野祭空帷西州謂隴西河州是也北闕長辭謂反𦵏河州也潘岳哀永逝文曰風泠泠兮入帷雲霏霏兮承蓋禮記曰士殯帷之又禮記鄭注云在傍曰帷在上曰荒所以依柳陵原地迥松路風悲銘於碣石勒以貞一作金龜周禮曰國大遷太師則貞龜鄭注曰正龜於卜位也周柱國楚國公岐州刺史慕容公神道碑昔在殷書懋賞周禮議勲諸侯計功大夫稱伐商書仲虺誥曰德懋懋官功懋懋賞周禮曰司勲掌六卿賞地之法以等其功左傳臧武仲曰夫銘天子令德諸侯言時計功大夫稱伐惟師尚父昆吾載寶鼎之銘王命尸臣栒邑傳琱戈之賜墨子曰昔夏開使飛廉採金於山以鑄鼎於昆吾蔡邕銘論曰呂尚作周太師而封齊其功銘於昆吾之冶張景陽七命曰銘德於昆吾之鼎是也漢書郊祀志曰美陽得鼎獻之中有刻書曰王命尸臣官此栒邑賜爾旂鸞黼黻琱戈尸臣拜手稽首曰敢對揚天子丕顯休命張敞曰臣愚不足以迹古文竊以傳記言之此鼎殆周之所以褒賜大臣大臣子孫刻銘其先功藏之於宗廟也注云尸主也故知太上立德左傳叔孫豹之言明試以功出尚書存有顯爵之榮殁有大名之貴郊特牲云死而諡今也古者生無爵死無諡晉中興書曰中宗即位尊號時賜諡多由封爵不考德行王導上疏曰臣聞大行受大名小行受小名則稱實不誣而巳昊天不弔其惟楚國公乎詩云昊天不弔不憖遺一老可以旌德景鐘勒勲彞器晉語曰昔克潞之役魏顆以其身郤退秦師於輔氏親止杜囘其勲銘於景鐘左傳昭十七年籍談曰諸侯之封也皆受明器於王室以鎮撫其社稷故能薦彝器於王王曰有勲而不廢有績而載奉之以土田撫之以彝器杜預曰彝常也謂可常寶之器式昭盛美載揚洪烈者焉公諱寜字永安昌黎徒河人也周書有傳都尉總六縣之卿名山稱五岳之佐序慕容氏之先世居昌黎徒河本漢遼東屬國都尉治也後漢書百官志曰毎屬國置都尉一人比二千石郡國志曰遼東屬國故邯郸西部都尉安帝時以為屬國都尉别領六城雒陽東北三千六百六十里六縣謂昌遼賔徒徒河無慮險瀆房也五岳爾雅中岳嵩山東岳泰山西岳華山南岳衡山北岳恒山按燕在趙北其名山為醫無閭是北岳之佐也周禮職方氏云東北曰幽州其山鎮曰醫無閭鄭注云醫無閭在遼東燕太祖文皇帝慕容皝以當世英雄奄有河朔詩云奄有龜䝉河朔河北也鄭康成曰朔比方也趙之南境且建王城冀之北土仍為興國晉書載記曰慕容氏其先有熊氏之苖裔世居北􅊂邑於紫蒙之野其後與匈奴並盛控弦之士二十餘萬秦漢之際為匈奴所敗分保鮮卑山因以為號莫護拔率其諸部入居遼西從宣帝伐公孫氏有功拜率義王始建國於棘城之北燕多冠歩搖冠莫護拔好之乃斂髮襲冠諸部因呼之曰歩揺其後音訛遂為慕容焉或云慕二儀之德繼三光之容遂以慕容為氏慕容皝字元貞廆第三子也龍顔版齒身長七尺八寸雄毅多權略尚經學善天文廆卒嗣位朝鮮公討逸豆歸築榆城安晉二城而還征遼東剋襄平分徙遼東大姓於棘城置和陽武次西樂三縣襲宇文别歩於大獲從昌黎踐凌而進擒母弟仁敗屈雲於五官水盡俘其衆以咸康三年僣即王位皝將圖石氏從容謂諸將曰石季龍自以安龍諸城守防嚴重城之南北必不設備今若詭路出其不意冀之北土可盡破也於是率騎二萬出蠮螉塞長驅至於薊城進渡武遂津於高陽所過焚燒積聚倞徙幽冀三萬餘戸使陽裕等築龍城搆宮廟改柳城為龍城於是成帝遣使持節拜皝侍中大都督河北諸軍事大將軍燕王咸康七年皝遷都龍城伐宇文歸斬其將奕于盡俘其衆開地千餘里徙其部人五萬餘落於昌黎改渉奕于城為威德城以永和四年死在位十五年時年五十二儁僣號追諡文明皇帝東京賦曰然後以建王城左氏傳曰冀之北土焉之所生公既皝之苖裔家世燕陲周書本傳其先慕容氏前燕之支庶也高祖侍中本傳高祖勝使持節都督中外諸軍事太保錄尚書北地疑作海王慕容超之世晉書載記曰慕容超字祖明德兄北海王納之子以義熙元年僣嗣偽位藩屏王室詳之燕錄可得稱焉左氏傳曰封建親戚以蕃屏周崔鴻十六國春秋有前燕錄後燕錄曾祖尚書府君因魏室之難改姓豆盧仍為官族本傳云勝以燕皇始初歸魏授長樂郡守賜姓豆盧氏或云避難改焉案傳改姓當是高祖此云曾祖為異也祖仕魏文成皇帝豆盧永恩碑云祖代左右將軍魏文皇帝直寢魏書本紀云高宗文皇帝諱濬景穆皇后之長子也考早亡本傳云父長柔朝廷以庸勲攸屬恩深追逺保定三年有詔贈柱國將軍少師涪陵郡開國公食邑二千戸本傳云父長柔𤣥鎮將有威重見稱於時武成初以寜著勲追贈柱國大將軍少保涪陵公隋書地志曰梁州涪陵郡西魏置合州公稟氣中和降祥川嶽岐嶷表羈貫之年通禮稱綺紈之歲夙著竒節幼表大成本傳云寜少驍勇果有志氣身長八尺美儀容善騎射詩大雅曰克岐克嶷鄭云岐岐然意有所知也其貌嶷然有所别識也榖梁傳曰羈貫成童漢書敘傳稱綺𥜗紈袴師古曰綺即今之繒紈皁黒色學記曰九年知顯通達强立而不反謂之大成兄弟分果備知推讓賔客解鈴曽無恡色本傳云初寜未有子養弟永恩子勣及生子讚親屬皆請讚為嗣寜曰兄弟子猶子也吾何擇焉遂以勣為世子世以稱之又請以先封武陽郡三千戸益弟孔融家傳曰兄弟七人融第六幼有自然之性年四歲時毎與諸兄共食梨融輒引小者大人問其故荅曰我小兒法當取小者由是宗族竒之傅暢自序曰余方五歳散騎常侍魯叔虎與先公友善喜與余戲常脫余金環與侍謂余怖惜余笑與之經日不索見太平御覽永安元年太宰爾朱天光一本作元天穆魏室元輔握兵淮右抗權江南魏書曰爾朱天光榮從祖兄子少勇決善弓馬榮親愛之毎有軍戎事要常預謀策永安中加侍中金紫光禄大夫北秀容第一酋長尋轉衞將軍大將軍元天穆東征邢杲詔天光以本官為使持節假鎮東將軍都督𨽻天穆討破之公時任别將便從征伐自是長城峽石必先行陣秦南隴西毎當矢石摧堅乗勝莫不前驅策勲行賞常居第一本傳云永安中以别將隨爾朱天光入闗加授都督又以破万俟醜奴功賜靈夀男天光敗後侯莫陳悦反太祖討悦寜與李弼率衆歸太祖周書賀拔岳傳云時万俟醜奴僣稱大號闗中騷動爾朱天光軍至汧渭之間醜奴棄平涼而走岳追擒之賊行臺万俟道洛入隴投略陽賊帥王慶雲天光與岳渡隴並擒之禹貢曰夾右碣石入於河太康地志曰樂狼遂城縣長城所起蜀志隴西郡屬秦州左傳荀偃士匄攻偪陽親受矢石永熙元年補子都督並加鼓節軍儀除桑乾太守漢書地理志云代郡有桑乾縣隋志云馬邑郡善陽縣有後魏桑乾郡轉補都督其年以魏皇西幸奉迎大駕賜封河陽縣開國伯增邑三百戸本傳云魏孝武西遷以奉迎勲封河陽縣伯邑五百戸隋志云河内郡河陽有古河陽城治俄遷大中大夫改伯為侯增邑九百戸本傳在大統元年仍授使持節都督顯州諸軍事顯州刺史本傳顯州大中正隋志扶風郡陳倉後周置顯州四年遷鎮東將軍金紫光禄大夫其年秋河橋之役先登破陣本傳云從太祖擒竇泰復𢎞農戰沙苑遷為車騎大將軍儀同三司五年沙苑之功加封合前二千戸俄授敷州刺史加散騎常侍外深推轂内侍集書顔師古曰推轂薦舉人如車轂之運轉也此云推轂集書謂常侍之職夾車參乗入侍左右集羣書也十五年授右衞將軍十六年授大將軍後魏元年重授敷州刺史公以先經刺舉固辭不就本傳云拜北華州刺史在州未幾以廉平著稱加散騎常侍七年從于護破稽胡帥劉平伏於上郡及梁企定反以寧為軍司監隴右諸軍事賊平進位侍中使持節驃騎大將軍開府儀同三司九年從太祖迎高仲密與東魏戰於邙山遷左衞將軍進爵范陽郡公増邑四百戸十六年拜大將軍羌帥傍乞鐵忽及鄭五醜等反叛寜率衆討平之周太祖紀云魏廢帝三年改北華州為鄜州鄜音敷三年本傳魏恭帝二年改封武陽郡開國公隋書地理志云武陽郡後周置魏州武陽郡莘縣後周置武陽郡焉除尚書僕射職惟贊奏任居封掌分左右之儔兼典舉之選漢書百官表云僕射秦官自侍中尚書博士郎皆有古者重武有主射以督課之軍屯騶宰永巷宮人皆有取其領事之號後漢書百官志曰尚書僕射一人六百石署尚書事令不在則奏下衆事漢書典官職云尚書僕射主開封掌授禀假錢榖也百官表注云建安以來執金吾榮劭為尚書左僕射僕射之有左右自此始也魏志曰陳泰為尚書左僕射典選舉屬以江南阻兵渚宮邊敵軍機警急鋒鏑縱橫謂梁將王琳寇江陵也注見下文江陵本楚地戰國時荆郢通稱江南左氏傳曰阻兵安忍渚宮謂江陵也後漢陳龜年傳疏曰懸命鋒鏑顔師古曰鋒戈㦸刃也鏑箭鏃也史記索隠注曰南北為縱東西為横公奉命星言元戎啓路總秦人之銳士兼荆户之廣卒謂奉命征討自秦至楚也詩云星言夙駕又云元戎十乗以先啓行按魏都長安故云秦人江陵楚地故云荆戸漢書刑法志曰秦昭以銳士勝師古曰銳勇利也左傳宣十二年曰其君之戎分為二廣廣有一卒卒偏之兩杜預注曰十五乗為一廣司馬法百人為卒二十五人為兩車十五乗為大偏今廣十五乗亦用舊偏法復以二十五人為承副水龍競雙刀之勢歩騎陳四分之威豫章記曰劒入襄城水中變為二龍漢書云冒頓縱精兵三十餘萬騎圍高帝於白登匈奴騎西方盡白東方盡駹北方盡驪南方盡騂夷陵既燒黔中方定旋軍反斾解甲休兵屬以江南至解甲休兵本傳云梁將王琳遣其將侯方兒潘純陀寇江陵寜與蔡祐鄭永等討之方兒等遁走史記楚世家曰頃襄王二十一年秦將白起遂拔我郢燒先王墓夷陵二十二年秦復拔我巫黔中郡其後鳳州内叛成都外絶公又總督衆軍蒐乗即道兵不血刃並皆擒獲遷其酋豪納其降附本傳云三年武興氏及固宜氐魏天王等相因反叛寜復討平之隋志云河池郡後魏置南岐州後周改曰鳳州又蜀郡有成都縣皇朝受終文祖革命神宗選賢與能改絃創制爰降册書授公柱國本傳云孝閔踐阼授柱國大將軍皇朝謂周也尚書舜典曰正月上日受終於文祖鄭康成曰文祖者五府之大名猶周之明堂史記正義曰尚書帝命驗云帝者承天立府以尊天垂象也五府者唐虞謂之天府文祖者赤帝熛怒之府名曰文祖火精光明文章之祖也周易曰天地革命尚書禹謨曰正月朔旦受命於神宗選賢與能禮記禮運之辭也增邑四千戸二年本傳武成初授同州刺史襟帶闗輔脣齒秦晉編戸殷積邸閣儲峙藩籬是任親賢勿居按括地志同州本臨晉城也一名大荔城亦曰馮翊城言同州要地以寜賢能擢斯職也西京賦曰衿帶易守闗謂闗中輔謂三輔也左氏傳曰脣亡齒寒言同州為古秦晉二國脣齒之地也獻帝紀曰大司農出雜繒二萬匹賜公卿以下及貧民不能自存者李傕曰我邸閣儲峙少乃悉載其營見魏志董卓傳注過秦論云䝉恬北築長城而守藩籬張孟陽劒閣銘曰形勝之地匪親勿居此云親賢勿居者言此同州險要之地非親子弟與賢者不可令居也公建旟作牧褰帷行部六條斯舉百城咸勸周禮九旗之名云鳥隼曰旟漢書公卿表曰刺史成帝更名牧後漢書曰賈琮為冀州刺史舊典傳車驂駕垂赤帷裳迎於州界及琮之部命御者褰之百城聞風自然震悚其諸臧過者解印綬去漢書百官公卿表注曰刺史班宣周行郡國省察治狀黜陟能否斷治寃獄以六條問事非條所問即不省謝承後漢書曰黃琬拜豫州刺史威邁百城三年授公大司寇又以公勲庸特著冊封楚國公食邑一萬戸蓋因破侯方仁等於荆陜即其地而封焉本傳云復督諸軍討稽胡郝阿保劉桑德等破之遷大司寇進封楚國公邑萬戸别邑鹽亭一千戸收其租賦逖糾王慝弛張刑政左傳僖二十八年王命晉侯曰逖糾王慝杜預曰逖逺也有惡於王者糾而逺之式遏寇虐於是御之以寛猛詩云無俾作慝式遏寇虐左氏傳曰寛以濟猛柔逺能邇然後平之以沖和詩云柔逺能邇以定我王老子曰沖氣以為和舜任咎陶不仁者逺論語子夏之辭晉舉隨㑹羣盜皆奔左氏傳曰晉隨㑹將中軍且為太傅晉國之盜奔秦也保定四年授岐州諸軍事岐州刺史沉痼彌留本傳云保定四年授岐州刺史屬大軍東討寜輿疾從軍隋志云扶風郡舊置岐州保定五年三月四日薨於私第春秋六十有二本傳云五年薨於同州時年六十六詔贈太保同鄜等十州諸軍事同州刺史諡昭公本傳同禮也十月庚申𦵏於洪瀆之川馳綍毁宗客車專道禮記曰四十者馳綍鄭注云綍引棺紼也檀弓曰及𦵏毁宗躐行出於大門殷道也雜記曰專道而行注云柩行於路人皆避之𤣥甲被屬國之兵介士陳輕車之騎漢書曰霍去病薨上發屬國𤣥甲又曰張安世薨天子贈以輕車介士克善令終生榮死感嗚呼哀哉公經德秉哲尚書酒誥辭孔傳云能常德持智也體道居貞履貴思沖居盈一作滿念損澄波千頃不能變其清濁高牆百仞無以測其汙隆立身行已居安如墜亡躬殉義視嶮若夷至於將略應變出竒設伏太乙風角之占常從星辰之候樓船戰陣之錄强弩馳射之書漢書曰翼奉有風角五德又藝文志有太壹雜子星太壹兵法有常從日月星辰二十一巻師古曰常從人姓名也老子師之藝文志又曰武帝時軍政楊僕捃摭遺逸紀奏兵錄列傳云楊僕為樓船將軍又藝文志有强弩將軍王圍射法五巻望逺連弩射法具十五篇莫不動會幾神發符雷電至於至雷電本傳云寜嘗與梁企定遇於平涼州相與肄射乃於百歩懸莎草以射之七發五中定服其能贈遺甚厚梯衝所向地靡百樓之城長㦸所臨野闗疑作闕三門之陣魏略曰諸葛亮攻郝昭於陳倉以雲梯衝車臨城中昭以火箭射之雲梯盡然人皆燒死後漢書公孫瓚與子續書曰袁氏之攻狀若鬼神梯衝舞吾樓上應瑒檄文曰長戟百萬後漢書高彪曰天有太一五將三門是以斬將搴旗四十三戰尊官厚禄三十七年武彰七德之義歌誦九功之業漢書楊僕傳上以書勅責之曰非有斬將騫旗之實也師古曰騫與搴同騫拔取之司馬遷報任安書曰外之不能備行伍攻城野戰有斬將搴旗之功下之不能積日累勞取尊官厚禄以為宗族交遊光寵左傳楚子曰夫武禁暴戢兵保大定功安民和衆豐財者也杜預注曰此武七德又傳晉郤缺曰九功之德皆可歌也謂之九歌六府三事謂之九功迹紀庸器之文行昭易名之典表記鄭注云諡者行之迹也周禮曰典庸器掌藏樂器庸器鄭注云庸器伐國所獲之器若崇鼎貫鼎及以其兵物所鑄銘也又云陳庸器鄭注云陳功器以華國也禮記曰衞公叔文子卒其子戍請諡於君曰日月有時將葬矣請所以易其名者君曰昔者衞國凶饑夫子為粥以與國之饑者是不亦惠乎昔者衞國有難夫子以其死衞寡人不亦貞乎夫子聽衞國之政修其班制以與四鄰交衞國社稷不辱不亦文乎故謂夫子貞惠文子昔臧文既沒穆叔稱其立言鄭僑云亡宣尼泣其遺愛左傳襄二十四年云穆叔如晉范宣子逆之問焉曰古人有言曰死而不朽何謂也穆叔曰魯有先大夫曰臧文仲既沒其言立其是之謂乎又昭二十年曰子産卒仲尼聞之泣曰古之遺愛也德陽青石之墓千年未平華陽國志曰德陽縣有青石祠車騎將軍鄧芝葬於其山板疑作枝江白虎之碑百代無毁板江當作枝江水經注曰陳留王子香漢和帝時出為荆州刺史有惠政天子徵之卒枝江亭中常有三白虎出入人間送喪踰境百姓追美甘棠以永元十八年立廟設祠刻石銘德號曰枝江白虎王君其子孫世今猶謂之為白虎王又按板江者後漢書南蠻傳板楯蠻􅊂者秦昭襄王時有一白虎常從羣虎數遊秦蜀巴漢之境傷害千餘人昭王乃重募國中有能殺虎者賞邑萬家金百鎰時有邑郡閬中夷人能作白竹之弩射殺白虎昭王嘉之乃刻石盟號為板楯蠻􅊂然此云送葬當用枝江白虎也敢因斯義乃作銘曰遼水之東冀州之北既曰都尉兼稱屬國後漢書和帝紀曰永元十六年復置遼東西部都尉官注云西部都尉安帝以為屬國都尉在遼東郡昌黎城也漢書曰以蘓武為典屬國師古曰典屬國本秦官漢因之掌歸義蠻􅊂屬官斂氣餘勇雄邊遺則孝實天經忠為令德左傳高固曰欲勇者賈余餘勇孝經曰夫孝者天之經也左氏傳曰忠為令德冠冕世禄羽儀祚𦙍俗被燕丹風慚英藺言燕王苖裔世居燕也地理志稱燕俗有燕丹遺風西征賦曰杖命世之英藺注云藺相如也劬勞役行辛苦行陣勇過溺駿氣踰瓦震謝聎登孫權故城詩曰北拒溺驂鑣李善云春秋感精符曰强傑並侵戰兵雷合龍門溺驂史記曰趙惠文時秦軍軍武安西鼓噪勒兵武安屋瓦盡振王國克生思皇多士溫溫恭人謙謙君子上三句詩辭下謙卦爻辭擁旄仗節出蕃入仕脫二字五朝建旟千里李廵曰旄牛尾著竿首也爾雅曰鳥隼曰旟時逢改特疑作物名載策勲淮隂召拜昭陽破軍改物謂周受禪也左氏傳曰文之伯也豈能改物又曰賜爵策勲焉禮也史記淮隂侯韓信傳曰王拜大將又楚世家陳軫問昭陽曰願聞楚國破軍殺將者何以貴之昭陽曰其官為上柱國職司刑政獄慎深文沈羊不飲萑盜無聞職司刑政謂授大司寇也漢書趙禹傳周亞夫曰極知禹無害然文深不可以居大府劉向新序曰魯有沈猶氏旦飲羊飽之以欺市人孔子將為司寇沈猶氏不敢朝飲其羊左氏傳曰鄭國多盜取人於萑苻澤中巴庸薄伐江漢專征軍總六校兵兼七營春秋巴國本姬姓左傳桓九年云巴子使韓服告楚請與鄧為好是也杜預云巴國在巴郡江州縣文十六年云巴與秦楚共滅庸戰國時七國稱王巴亦稱王張儀貪巴苴之富取巴執王以歸置為郡縣杜預曰庸今上庸縣屬楚之小國又曰漢水出武都至江夏南入江按巴庸江漢皆楚地時王琳之寇江陵命寜討之故云是矣漢書百官公鄕表云五校尉皆二千石晉書職官志曰屯騎歩兵越騎長水射聲等校尉是為五校並漢官也又王濬傳曰拜濬輔國大將軍舊校惟五置此營自濬始也有司又奏輔國依比未為逹官不置司馬不給官騎詔依征鎮給五百大車増兵五百人為輔國營給親騎百人官騎十人置司馬按五校尉加輔國為六校也魏書曰公孫淵自稱燕王令官屬上書曰七營虎士五部蠻􅊂各懐素飽見魏志公孫淵傳注運長撃短後實先聲增壘威敵減竈潛兵周書曰長勝短漢書李左車曰兵有先聲而後實左氏傳曰宋皇瑗圍鄭師毎日遷舎作壘塹成輒徙合其圍也壘合鄭師哭遂取鄭也減竈孫臏事注已見鐘鳴夜漏晞露朝陽邑里蕭索宅帷荒涼魏志田豫曰年過七十而居位猶鐘鳴漏盡而夜行不休也李陵曰人生若朝露豐碑下柩題凑遷喪宮臨樗里臺傾孟嘗檀弓曰公室視豐碑鄭注曰言視者時僣天子也豐碑斲大木為之形如石碑於槨前後四角樹之穿中於間為鹿盧下棺以繂繞天子大繂四碑前後各垂鹿盧也繂音律漢書曰霍光薨賜便房黃腸題凑各一具史記曰樗里子卒𦵏於渭南章臺之東曰後百歳是當有天子之宮夾我墓桓子新論曰雍門周説孟嘗君曰千秋萬歳後高臺既巳傾曲池既巳平卜兆戒期逺辰告筮德遺身後名昭没世孝經曰卜其宅兆而安措之鄭注云宅墓穴也兆塋域也𦵏事大故卜之曲禮曰凡卜筮日旬之外曰逺某日旬之内曰近某日喪事先逺日吉事先近日左氏傳曰吾聞有盛德者必百世祀論語曰君子疾没世而名不稱焉館舎長捐泉扃永閉晏嬰悼齊柳莊悲衞晏子春秋曰晏子死景公伏尸而號曰天降禍於齊不加禍於夫子齊國之社稷危矣又云晏子死公操玉加於晏子而哭之涕沾襟章子諌曰非禮也公曰安用禮乎吾失夫子則亡何禮之有禮記曰柳莊寢疾衞獻公請於尸曰臣有柳莊非寡人之臣也杜稷之臣也又按左傳齊公孫竈卒晏子曰惜也姜族弱矣似引此事謂悼齊國然柳莊無悲衞之言明是齊悼晏嬰衞悲柳莊互文也言寜死天子愍焉如晏嬰之見悼於齊君柳莊之致悲於衞主也風秋北原日没川逝𦵏田舊頃客土新封淚墮片石劒挂孤松漢書成帝永始元年詔曰客土疏惡終不可成服䖍曰取他處土以増高為客土也晉書曰羊祜好遊峴山襄陽人建碑立廟於其地望其碑者無不流涕因謂之墮淚碑劉向新序曰延陵季子將西聘晉帶寶劒以過徐君徐君不言而色欲之季子為有上國之事未獻也然心許之致使於晉顧反則徐已死於是以劒帶徐君墓樹而去清徽令範千載餘蹤周兗州刺史廣饒公宇文公本姓鄭周書作鄭常神道碑唐朝以元凱並進十有六人周室以昭穆先封十有五國帝王世紀曰堯都平陽於詩為唐國徐廣曰號陶唐左氏傳曰昔高陽氏有才子八人謂之八愷高辛氏有才子八人謂之八元此十六族也又曰昔武王克商光宅天下其兄弟之國者十有五人發源纂胄葉𣲖枝分開國承家珠聨璧合周易曰開國承家竹書紀年曰日月如連珠五星如合璧是用克明峻德尚書辭也思皇多士詩大雅之詞也盛德有後公其裕哉公諱常字子元豫州滎陽人也周書附鄭偉傳後周宣中興然後樹賢建戚鄭武有國然後保姓受氏韋昭鄭語注曰桓公友鄭始封之君周厲王之少子宣王之弟也宣王封之於鄭又周語注云鄭武桓公之子武公滑突也幽王既滅鄭武公以卿士夾輔平王東遷洛邑左氏傳曰保姓受氏以守宗祊荆衡之賦千乗莫能加兵虢㑹之封十城翻為獻邑按春秋鄭國屬楚至弭兵之㑹始晉楚俱朝荆衡楚地云賦千乗者若左傳魯賦八百乗邾賦六百乗此云千乗之賦以貢楚也云莫敢加兵者左傳宣十六年楚子圍鄭克之退三十里而許之平按自後鄭屬於楚國語曰鄭桓公問於史伯曰王室多故余懼及焉其何所可以逃死史伯曰其濟洛河穎之間乎是其子男之國虢㑹為大虢叔恃勢㑹仲恃險是皆有驕侈怠慢之心而加之以貪冒君若以周亂之故寄孥與賄焉不敢不許周亂而弊是驕而貪必將背君君若以成周之衆奉辭伐罪無不克矣若克鄢蔽補丹依㽥厯辛君之土也若前莘後河右洛左濟主芣騩而食溱洧修典型以守惟是可以少固公悦乃東寄孥與賄虢㑹受之十邑皆有寄地韋昭曰十邑謂虢㑹鄢蔽補丹依㽥厯辛也况復郊門致騎先迎内史之賔史記曰鄭莊以任俠自喜孝景時為太子舎人毎五日休洗常置驛馬長安諸郊存諸故人請謝賔客夜以繼日武帝立莊稍遷至九卿為右内史南宮旦朝獨識尚書之履漢書曰哀帝擢鄭崇為尚書僕射數求見諌争上初納用之毎見曳革履上笑曰我識鄭尚書履聲祖思慶建威將軍山陽太守隋志云揚州江都郡山陽縣舊置山陽郡建威取曹仁之號可以定名山陽有王暢之賢足觀風俗魏志曰曹仁字子孝太祖從弟也文帝時拜大將軍後漢書曰王龔山陽高平人也子暢字叔茂以清實為稱無所交黨拜南陽太守郡中豪族多以奢靡相尚暢常布衣皮褥車馬羸敗以矯其敝考頊周書鄭偉傳云偉族人頊字寜伯銀青金紫方於溫羨傅袛鎮南征東比於劉𢎞荀顗晉書曰溫羨字長卿太原祁人懐帝即位遷左光禄大夫開府領司徒又曰傅袛字子莊北海泥陽人拜常侍加光禄大夫門施行馬晉書職官志曰左右光禄大夫加金章紫綬者品秩第二加銀章青綬者品秩第三銀青金紫謂溫羡傅袛皆為光禄大夫也晉書曰劉𢎞字和季沛國相人也新野王歆之敗也以𢎞代為鎮南將軍都督荆州諸軍事荀顗字景倩穎川人魏太尉彧之第六子也母丘儉文欽反顗預討有功進爵萬歲亭侯武帝踐阼位至侍中太尉鎮南謂劉𢎞征東謂荀顗也報功之册則槐路是儀贈行之典則荆河惟牧本傳云頊少有幹用起家貟外散騎侍郎稍遷行臺左丞與偉同謀立義後隨偉入朝賜爵魏昌縣伯除太府出為扶風郡守後為太府少卿轉衞尉少卿厯職内外並有恪勤之稱尋卒官贈儀同三司豫州刺史周禮曰三槐三公位焉禹貢曰荆河惟豫州言頊位至少卿贈豫州刺史也公弱齡早慧幼學夙成立必正方言無勦説易曰君子以立不易方禮記曰毋勦説青衿智勇即埋雲夢之蛇童子仁心巳愛中牟之雉列女傳曰孫叔敖為兒時出遊見兩頭蛇殺而埋之歸見其母泣問其故曰吾聞見兩頭蛇者死恐他人見殺而埋之矣母曰夫有隂德者陽報之爾黙矣必興於楚及長為令尹後漢書曰魯恭為中牟令螟不入中牟河南尹袁安使仁恕掾肥親往廉之恭隨行阡陌俱坐桑下有雉過止其傍傍有童兒親曰何不捕之兒言雉方雛親曰所以來者欲察君之化迹耳今蟲不犯境一異也化及鳥獸二異也豎子有仁心三異也具以狀白安始遊庠塾不無儒者之榮或見兵書遂有風雲之志許氏説文曰塾門側堂也後漢書二十八將論曰感㑹風雲奮其智勇出忠入孝事盡於心脩身立名理窮於性大統三年起義華陽先登廣武浮潛逾沔入渭亂河周書鄭偉傳云大統三年河内公獨孤信既復洛陽偉與宗人榮業糾合州里建義於陳留攻拔梁州擒東魏刺史鹿永吉等獲陳留郡守趙季和乃率衆來附因是梁陳之間相次降欵偉馳入朝太祖與語歎美之按常父項與偉同謀立義本傳亦云以立義及累戰功知起義之時鄭常在焉禹貢曰華陽黑水惟梁州華陽華山之南常建義陳留攻拔梁州為華陽矣孟康曰於榮陽築兩城相對因為廣武城史記楚與漢臨廣武而軍是也禹貢曰浮於潛逾於沔入於渭亂於河漢書地理志師古注曰漢上曰沔音莫踐反正絶流曰亂䝉授永安縣開國男輔國將軍隋志冀州西河郡永安縣又臨汾郡霍邑舊曰永安自爾長從太祖入為帳内都督河橋接戰秋水則三月不流洛城揮鋒金墉則一月路斷史記正義曰河橋在臨晉縣東渡河至蒲州今蒲津穚也陸機洛陽記曰金墉城在宮之西北角魏故宮人皆在中西京不賔羌戎侵軼城如飛鳥地有伏龍按此疑常除涼州刺史總督河西甘瓜諸州軍事故云飛鳥伏龍集中崔説碑文亦云是矣西京不賔者按漢書地志張掖酒泉故昆邪王地武帝太初元年開後元年分酒泉置敦煌郡敦煌本古瓜州左傳所云允姓之戎居於瓜州者也故云羌戎矣山海經曰三危之山三青鳥居之水經曰三危山在敦煌縣南西河記曰姑臧匈奴故曰蓋藏城也城不方有頭尾兩翅名蓋鳥城晉書張軌傳曰姑臧城本匈奴所築南北七里東西三里地有龍形故名卧龍城又按括地志云伏龍祠在同州馮翊縣西北四十里故老云漢時自徵穿渠引洛得龍骨其後立祠因以伏龍為名今祠頗有靈驗是同州亦有伏龍之名然以崔説碑飛鳥伏龍按之及本文西京不賔羌戎侵軼知是涼州之卧龍城也公以金僕裁抽靈銔蹔舉蜂目巳奔狼心遂革左傳莊十一年曰乗丘之役公以金僕姑射南宮長萬杜預曰金僕姑矢名又昭十年傳曰齊惠欒高伐虎門公卜使王黑以靈姑銔率吉請斷三尺焉而後用之杜注云靈姑銔公旗名斷三尺不敢與君同又文元年傳曰楚子將以商臣為太子訪諸令尹子上曰是人蜂目而豺聲忍人也又昭二十八年傳曰狼子野心非是莫喪羊舌氏矣遷平東將軍帥都督十五年襲父封魏昌縣開國伯轉大都督隋志云石城郡石泉縣舊曰永樂置晉昌郡西魏改郡曰魏昌後周省魏昌郡入中城郡魏後三年授使持節車騎大將軍儀同三司黃權受詔嘉其入魏之功竇憲當官賞其平戎之策公之此授勲庸著矣蜀志曰黃權字公衡巴西閬中人也先主時為鎮北將軍後降魏景初元年遷車騎將軍儀同三司後漢書曰竇憲字伯度南匈奴請兵北伐拜憲為車騎將軍與耿秉各將四千騎與北單于戰於稽落山大破之言常為車騎勲同二公矣進爵廣饒縣開國公本傳云賜爵饒陽侯隋志云徐州東海郡東海縣舊曰廣饒邑五百戸保定三年授都督羅州諸軍事羅州刺史隋志房陵郡竹山梁曰安城西魏改焉置羅州仍領金州兵馬應接上庸公於文谷路溪澗峥嶸巖崖豁嶮山窮水斷馬束橋飛中埒既開雙城即欵隋志云西城郡梁置梁州尋改南梁州西魏改置東梁州尋改為金州置總管府上庸公陸騰也漢書地理志曰漢中有上庸縣括地志曰上庸今房州竹邑縣即金州是也隋志房陵郡上庸梁曰新豐西魏改焉後周曰孔陽周書曰陸騰字顯聖代人也魏恭帝三年爵上庸縣公保定二年資州磐石民反殺郡守據險自守州軍不能制騰討斬之而蠻獠兵及所在蜂起山路險阻難得掩襲騰遂量山川形勢隨便開道蠻獠畏威承風請服所開之路多得古銘並是諸葛亮桓溫舊道是年鐵山獠抄斷内江路使驛不得通進軍出其不意撃之應時奔潰一日三下其城斬其魁帥獲三千人招納降附者三萬户益州記曰江曲由左擔道鄧艾束馬懸車之處山窮水斷馬束橋飛者言房陵道險水陸無路懸車束馬飛橋度濟也中埒既開雙城即欵者按周書司馬裔傳陸騰進次雙城往者申息盡掩江黃無援往者以下追叙梁元帝武陵王紀之師也楚蜀興師脣亡齒寒江陵之伐當必與焉左氏傳曰申息之北門不啓又曰江黃道柏皆弦姻也言魏人侵蜀元帝不恤其難而使樊猛斬紀故云無援矣此下皆言元帝之敗也涔陽極浦亟犯風塵夏首西浮頻遭鋒鏑涔陽夏首楚地風塵喻亂也楚辭曰望涔陽兮極浦又曰望夏首而西浮王逸曰夏首夏水口也杜預曰漢水入口今夏口也師古曰鋒戈戟刃也鏑箭鏃也公以伏波受脤樓船誓衆入橫江之陣進下瀨之兵漢書曰路博德為伏波將軍後漢書曰馬援為伏波將軍左傳戎有受脤漢書曰楊僕為樓船將軍郡縣志云横江浦在和州對江之采石往來濟渡處漢書武帝紀曰甲為下瀨將軍下蒼梧臣瓚曰瀨湍也伍子胥書有下瀨船越客文身湛盧終去吳人長鬛艅艎遂逺漢書曰少康之庶子封於㑹稽文身斷髪以避蛟龍之害吳越春秋曰湛盧之劒惡闔閭之無道也乃去而出水行如楚楚昭王臥而寤得吳王湛盧之劒於牀昭王不知其故乃召風湖子對曰是五山之英太陽之精寄氣託靈出之有神服之有威可以拒衝拒敵然人君有逆理之謀其劒即出故去無道以就有道今吳王無道殺君謀楚故湛盧入楚昭王曰其直幾何風湖子曰臣聞此劒在越之時客有酬其直者有市之鄕三十駿馬千匹萬都之戸二是其一也薛燭對曰赤董之山已令無雲若耶之溪深而莫測羣臣上天歐冶死矣雖金量金珠玉盈河猶不能得此寶而况有市之鄕駿馬千匹萬都之戸何足言也昭王大悦遂以為寶左傳昭十七年曰吳楚戰於長岸大敗吳師獲其乗舟餘皇使隨人與後至者守之環而塹之及泉盈其隧炭陳以待命吳公子光請於其衆曰喪先王之乗舟豈惟光之罪衆亦有焉請藉取之以救死衆許之使長鬛者三人潛伏於舟側曰我呼皇則對師夜從之三呼皆迭對楚人從而殺之楚師亂吳人大敗之取餘皇以歸建德四年授使持節開府儀同大將軍公孫敖下光禄之塞諸葛誕勒丸都之山漢書曰武帝太初元年遣因杵將軍公孫敖築塞外受降城三年紀云壊光禄諸亭障應劭曰光禄勲徐自為所築列城宣帝時呼韓邪單于欵塞朝於甘泉宮請留居光禄塞下有急保漢受降城知受降城近光禄塞也魏志曰諸葛誕字公休瑯琊陽都人諸葛豐後也又按魏志母丘儉傳云儉以高句驪數侵叛督諸軍歩騎萬人出𤣥菟從諸道討之大戰梁口句驪王宮連破走儉遂束馬懸車以登丸都六年復征之宮奔買溝追過沃沮千有餘里至肅慎氏南界刻石紀功刋丸都之山銘不耐之城論功受賞侯者百餘人本母丘儉事而云諸葛誕者以魏志儉誕二傳相連且又揚豫換州淮南俱叛故開府通用也公之處焉差無慚德謂比於公孫諸葛無慚德也四方雜俗天下殊風以君廉能使兼觀察馳傳擁節揚旍持斧既乗驄馬仍被繡衣羣盜累足貴戚斂手漢書曰暴勝之為直指使者衣繡衣持斧逐捕盜賊後漢書曰桓典拜侍御史是時宦官秉權典執政無所囘避常乗驄馬京師畏憚為之語曰行行且止避驄馬御史漢書百官公卿表曰侍御史有繡衣直指服䖍曰指事而行無阿私也師古曰衣以繡者尊寵之也貴戚斂手後漢二鮑事注見下文鄉亭留宿幸無歸忌之疑後漢書郭鎮傳曰桓帝時汝南有陳伯敬者行必矩歩坐必端膝叱狗馬終不言死自有所見不食其肉行路聞凶便解駕留止還觸歸忌則寄宿鄕亭注云隂陽書厯法曰歸忌日四孟在丑四仲在寅四季在子其日不可逺行歸家及徙也公車奏事寜有反支之日後漢書王符傳曰明帝時公車以反支日不受章奏章懐太子注曰凡反支日用月朔為正戌亥朔一日反支申酉朔二日反支午未朔三日反支辰巳朔四日反支寅卯朔五日反支子丑朔六日反支見隂陽書也潛夫論曰明帝問今旦何得無上書者左右對曰反支故帝曰民既廢農逺來詣闕而復使避反支是則又奪其日而寃之也乃勅公車奏章無避反支漢官儀曰公車掌啓司馬門天下上事及徵召皆總領之是使陽球司𨽻無所申威鮑恢都官因人成事後漢書酷吏傳曰陽球字方正漁陽泉州人也拜尚書令時中常侍王府曹節等姦虐弄權扇動外内球嘗拊髀發憤曰若陽球作司𨽻此曹子安得容乎光和三年遷為司𨽻校尉又鮑永傳曰永為司𨽻校尉劾帝叔父趙王良大不敬由是朝廷肅然莫不戒慎乃辟扶風鮑恢為都官従事恢亦抗直不避彊禦帝常曰貴戚且宜斂手以避二鮑其見憚如此言鄭常威能雖陽球鮑恢不能及也高祖武皇帝宇文邕太祖第四子也以仲春誓衆甲子濟河公仗劒六軍披圖八陣杜預左傳注曰六軍天子之軍也兵法有八陣圖譬彼張遼前鋒而報魏主魏志曰張遼字文逺雁門馬邑人也從征袁尚於柳城卒與虜遇遼勸太祖戰氣益奮太祖壯之自以所持麾授遼遂撃大破之斬單于蹋頓合肥之戰幾獲孫權太祖大壯遼拜征東將軍方之耿弇先戰而待蕭王後漢書曰耿弇字伯昭扶風茂陵人也弇道聞光武在盧奴乃馳北上謁固説䕶軍朱祐求歸發兵以定邯郸決䇿河北定計南陽以成光武之業蕭王光武更始時所封也及乎九州逌同四隩既宅二語出禹貢遂得功參勇爵名入司勲授上開府增邑五百戸本傳以立義及累戰功授上開府儀同大將軍周禮司勲掌六卿賞地之法以等其功加以舉功行賞推恩分邑兼乗而反光乎譙郡之城載寶而歸照於臨漳之水漢書曰司馬相如馳四乗之傳至蜀晉書地理志曰譙郡魏置檀弓曰南宮敬叔反必載寶而朝鄭云藎嘗失位去魯載其寶來朝於君干寶晉紀總論曰上諱業故改鄴為臨漳漳水名也即日賜姓宇文與國同族婁敬上書於鹿輅項伯舞劒於鴻門公之此榮足為連類漢書曰婁敬肬輓輅見齊人虞將軍虞將軍入言召見上説曰陛下都洛不如入闗據秦之便遂都長安賜姓劉氏又高祖紀鴻門之㑹云項莊入為夀請以劒舞項伯亦起舞常以身翼蔽沛公五年封項伯等四人為列侯賜姓劉氏以公績著屯險誠貫風霜其年授使持節都督東徐州諸軍事徐州刺史本傳云信東徐南兗三州刺史隋志云徐州彭城郡舊置徐州後周立總管府宣政元年授都督南兗州諸軍事南兗州刺史隋志云豫州譙郡後魏置南兗州後周置總管府作牧濟河風行於雷澤建旟海岱化被於淮沂史記曰舜漁雷澤鄭康成曰雷夏兗州澤今屬濟隂周禮九旗之名云鳥隼為旟禹貢曰淮沂其乂淮沂二水名顔師古曰淮出大復山沂出泰山襜帷入境貪殘者解印冕旒從政仁義者郊迎後漢書曰賈琮為冀州刺史舊典傳車驂駕垂赤帷裳迎於州界及琮之部升車言曰刺史當逺視廣聽糾察美惡何有反垂帷裳以自掩塞乎乃命御者褰之其諸臧過者望風解印綬去又曰郭賀拜荆州刺史顯宗廵狩到南陽特見嗟嘆賜以三公之服黼黻冕旒勅行部去襜帷使百姓見其容服以章有德豈直白石開渠青鹽換粟祥雲入境行雨隨軒而巳哉白石開渠未詳疑即溝洫志白渠魏志曰徐邈為涼州太守值諸葛出祁山隴右三郡反河右少雨乏穀邈上修武威酒泉鹽池以收虜穀廣志曰北肓有青鹽謝承後漢書鄭𢎞行春隨車致雨在任遘疾薨於方鎮皇甫嵩監御斯牧賢能刺史荀中郎連率此則中興方伯英聲茂實公之有焉後漢書曰皇甫嵩字義真安定朝那人拜左車騎將軍領冀州牧晉書曰荀羨字令則除北中郎將徐州刺史中興方伯未有如羨之少者詔贈某官諡某公禮也本傳贈本官加郢鄯陜三州諸軍事郢州刺史以大象二年十一月十日歸𦵏於滎陽之某山舊墓九原悽愴趙文子其何言駟馬悲鳴滕成公其巳逺國語趙文子與叔向遊於九京曰死者若可作也吾誰與歸叔向曰其陽子乎文子曰夫陽子行廉直於晉國不免其身其知不足稱也叔向曰其舅犯乎文子曰舅犯見利不顧其君其仁不足稱也其隨武子乎納諌不忘其師言身不失其友事君不援而進不阿而退博物志漢滕公薨求𦵏東都門外公卿送喪駟馬不行跼地悲鳴跑蹄下地得石室有銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室遂𦵏焉若夫勒鼎刋碑銘功頌德陳其令範必在生前嗟乎此之樹碑異乎洙泗之水此之勒石異乎燕然之山史記曰孔子𦵏魯城北泗上孔叢子曰夫子墓塋方一里在魯城北泗水上從征記曰洙泗二水交於魯城東北十七里論衡曰書傳言孔子當泗水之𦵏泗水為之却流此言孔子之德能使水却不湍其墓也後漢書曰竇憲登燕山刻石勒功紀漢威德嗚呼哀哉乃為銘曰高陽之子少典之孫蒼林逺遘若水遥源言鄭氏之先出自姬姓也史記曰帝顓頊高陽者黃帝之孫而昌意之子也又曰黃帝者少典之子國語胥臣曰黃帝之子二十五宗其得姓者十四人為十二姓青陽與蒼林為姬姓史記曰嫘祖為黃帝正妃生二子其二曰昌意降居若水娶蜀山氏女生高陽有聖德焉水經曰水出旄牛徼外東南至故闗為若水公侯復始鐘鼎逾繁承基纂胄建國開藩我壯我武既公既侯緇衣出鄭卿士歸周左氏傳曰公侯子孫必復其始毛詩序曰緇衣美鄭武公也父子並為周司徒善於其職國人宜之故美其德以明有國善善之功焉言鄭氏自桓武有國之後以國為氏也魚陵北上滎澤東流河移酸棗粟雨陳留皆鄭地也郡國志潁川襄城有魚齒山左傳謂魚陵杜預曰在讎縣北漢書地理志曰河南曰豫州川曰滎雒師古曰滎即沇水所溢者也又溝洫志曰孝文時河決酸棗地理志曰酸棗屬陳留郡王充論衡曰建武中陳留雨穀蔽地形若粢而黒祖守南邦考鎮東郡兩龜為印雙蛇結綬謂祖思慶為山陽太守考頊贈豫州刺史也漢舊儀曰銀印背龜紐其文曰章後漢輿服志采組連結於璲謂之綬又許曼傳隴西太守馮緄始拜有雙蛇盤綬笥日察隂陽星占長柳是曰世載其名不朽漢書藝文志曰隂陽家者流蓋出於羲和之官敬順昊天厯象日月星辰敬授民時此其所長也又雜占十八家有黃帝長柳占夢十一巻甘德長柳占夢二十巻事親之道孝以立身事君之道忠以立仁今君嗣德一此君親如松之茂如竹之筠禮記曰如竹箭之有筠也功叅荆棘職主兵戈北臨青嶺南通白波謂從周太祖為帳内都督遷平東將軍也隋志允吾後魏置曰廣武有青巖山後漢書董卓傳曰黃巾賊郭太等起西河白波谷號為白波賊直雲橫塞長星渡河陣開沙斷師移竈多與本序往者申息盡至艅艎遂還意同謂其有戰功也湘中記曰遥望衡山如陣雲晉書曰有長星自西南流於東北墜於梁水帝斬公孫文懿於梁水之上漢書曰韓信撃龍且夾濰水陳信乃夜令人為萬餘囊盛沙以壅水上流引兵半渡撃龍且後漢書曰虞詡令吏士各作兩竈日倍増之曰孫臏示弱我今示强勢有不同也舉功行賞封疆受位宮室鏤珪山河分地言以立義戰功授開府大將軍饒陽縣公也周禮公執桓珪鄭注云雙植謂之桓桓宮室之象所以安其上也漢書功臣表封爵之誓曰黃河如帶泰山如厲國以長存爰及苖裔決勝千里謀深計秘建武功成名連星次漢書高帝曰運籌帷幄之中決勝千里之外吾不如張良後漢書論曰中興二十八將前世以為上應二十八宿建武光武年號言常従周武帝如漢二祖矣建旟濟漯擁節龜䝉既蠶桑土實撫梧桐謂授兗徐二州刺史也禹貢曰泲河惟兗州浮於泲漯師古曰泲本濟水之字従水􅙻聲言此州東據濟水西北距河􅙻音泲漯水出東郡東武陽漯它合反詩曰奄有龜䝉禹貢曰兗州桑土既蠶又徐州云嶧陽孤桐野無異器河無别風吳亭楚障一作塞莫敢彎弓謂常為徐州刺史威震吳楚也徐州楚地與吳接境過秦論曰士莫敢彎弓而報怨倏忽身世俄然松檟路轉銅魚山廻石馬左傳伍子胥曰樹吾墓上檟任昉范始興表云松檟成行禮記鄭注云以竹為池衣以青布懸銅魚焉西京雜記曰張丞相墓前有石馬武侯之廟欒公之社望此高碑悽然淚下武侯諸葛亮也蜀志曰景耀六年春詔為亮立廟於沔陽漢書曰欒布梁人也吳楚反時以功封鄃侯復為燕相燕齊之間皆為立社號曰欒公社晉書曰羊公碑名墮涙碑周隴右總管長史贈太子少保豆盧公神道碑君諱永恩字某周書云豆盧寜之弟也昌黎徒河人本姓慕容燕文明帝皝之後也周書云其先本姓慕容氏南燕之支庶也十六國春秋前燕録曰慕容皝字元真廆第二子小字萬年長七尺八寸雄毅善權略博學多材藝晉建武元年振武將軍永昌初拜左賢王太寜末拜平北將軍朝鮮公咸和八年即遼東公位九年晉遣謁者拜皝鎮東大將軍平州刺史大單于僣即燕王位晉使鴻臚郭忱持節拜皝侍中大都督河北諸軍事大將軍燕王遷都龍城及薨諡文明王子雋稱尊追尊曰文明皇帝朝鮮微當作箕子之封孤竹伯夷之國前燕錄曰皝拜朝鮮公又云即遼東公位孤竹遼地也漢書地理志曰樂浪郡朝鮮應劭曰故朝鮮國也武王封箕子於朝鮮又地理志云遼西令支有孤竹城應劭曰故伯夷國今有孤竹城漢有四城秦為一候謂燕也漢書地理志曰昭帝元鳳元年改燕國為廣陽郡宣帝本始元年更為國有薊縣方城縣廣陽縣隂鄕縣凡四城也揚雄解嘲曰西北一候銑曰候所以伺候逺國來朝之賔亦官也其先保姓受氏初存柳城之功開國承家始静遼陽之亂前燕録曰昔高辛氏遊於海濵留少子厭越以君北夷世居遼左秦漢之際為匈奴所敗分保鮮卑山因復以為號莫護跋魏率其諸部入居遼西從司馬宣王討公孫淵有功拜率義王始建國於棘城之北見燕代少年多冠歩搖符意甚好之遂斂髪襲冠諸部因呼之為歩揺其後因訛遂為慕容焉生木延左賢王従母丘儉征高麗有功加號大都督又渉歸以全柳城之勲進拜單于遷邑遼東於是漸變胡風自云慕二儀之德繼三光之容遂以慕容為姓漢書地理志曰柳城屬遼西遼陽屬遼東保姓受氏左傳穆叔之辭開國承家易師卦上九爻辭也自天市星妖連津兵覆晉書天文志曰惠帝永康元年彗星出牽牛之西指天市占曰牛者七政始彗星出之改元易號之為也天市一名天府一名天子旗帝座在其中哀帝咸寜元年八月有星孛於角亢入天市占曰為兵喪三年三月慕客恪攻沒洛陽沈勁等戰死前燕録曰永嘉初遼東太守龎本殺東􅊂校尉李臻附塞鮮卑素喜連木丸津等託為臻報讎攻陷諸縣太守袁謙請與連和連津不從廆東撃連津破斬之盡併二部之衆徙之棘城立遼東郡而歸尚書府君改姓豆盧筮仕於魏周書云高祖勝以燕皇始初歸魏授長樂郡守賜姓豆盧氏或云避難改焉左氏傳曰初畢萬筮仕於晉祖代左右將軍魏文皇帝直寢父長少以雄略知名不幸早世周書云父長柔𤣥鎮將有威重見稱於時周朝以兄弟佐命義存追逺兄弟謂兄豆盧寜及豆盧永恩也保定二年有詔贈柱國大將軍涪陵郡公周書豆盧寜傳云以寜著勲追贈柱國大將軍少保涪陵郡公隋書地志曰梁州涪陵郡舊曰漢平是知春雨潤木自葉流根西伯行慶推存及沒張士然求為諸孫置守冢人表云臣聞春雨潤木卣葉流根言豆盧兄弟以著勲報本為自葉流根周朝追贈如文王之澤矣公以山嶽精靈星辰秀異氣侔鐘鼎聲感風雲觀於秦兵尚稱童子對於楚戰猶在青衿周書云永恩有識度為時輩所稱左傳僖二十三年曰秦師過周北門左右免胄而下超乗者三百乗王孫滿尚幼觀之言於王曰秦師輕而無禮必敗又成十六年鄢陵之戰云楚晨壓晉軍而陳吏患之范匄趨進曰塞井夷竈陳於軍中而疏行首晉楚惟天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉毛萇曰青衿學子所服太祖文皇帝周太祖宇文泰也乗時撥亂奄有霸業潁川一作昌從我舊愛無渝舂陵故人相知惟眷周書本傳云初隨寜事侯莫陳悦後與寜歸太祖後漢書王霸傳云霸従至洛陽及光武為大司馬以霸為功曹史従度河北賔客従霸者稍稍引去光武謂覇曰潁川從我者皆逝而子獨留努力疾風知勁草又光武紀曰建武三年十月幸舂陵祠園因置酒舊宅大㑹故人父老普泰二年闗西建義授殄寇將軍本傳云歸太祖授此官奉迎大駕賜封新興縣伯邑五百戸本傳云以迎魏孝武功封晉書地理志新興縣屬南安郡開新安之鄕還移楊僕之闗解𢎞農之圍更入劉昆之郡漢書曰武帝元鼎三年徙函谷闗於新安故闗為𢎞農縣應劭曰時樓船將軍楊僕數有大功恥為闗外民上書乞徙東闗以家財給其用度武帝意亦好廣闊於是徙闗於新安去𢎞農三百里後漢書曰劉昆字桓公陳留東昏人拜𢎞農太守援桴併轡並預前驅左氏傳曰左并轡右援桴而鼔大統三年有沙苑之戰四年河橋之役周書豆盧寜傳云從太祖擒竇泰復𢎞農戰沙苑本傳云屢逢征戰皆有功沙苑河橋恩皆與戰矣介胄蟣虱戎馬生郊韓子曰攻戰無巳時甲胄生蟣虱老子曰天下無道戎馬生郊公應一作靈變愈長風飈更勇隠若敵國差彊人意後漢書光武曰吳漢差彊人意隠若敵國矣授龍驤將軍中散大夫八年授直寢右親信都督尋轉大都督加通直散騎常侍十六年授使持節車騎大將軍儀同三司魏元年本傳云魏廢帝元年授驃騎大將軍開府儀同三司鄧隲以漢朝親戚始授中台後漢書曰鄧隲字昭伯女弟為和熹皇后延平元年拜車騎將軍儀同三司始自隲也黃權以魏國功臣初登上將蜀志曰黃權字公衡巴西閬中人也先主以權為鎮北將軍督江北軍以防魏師及南軍敗績先主引退而道隔絶權不得還故率將所領降於魏景初元年權遷車騎將軍儀同三司公頻煩寵授朝野為榮三年都督成州諸軍事成州刺史本傳同周書太祖紀云魏廢帝三年改南秦州為成州尋加侍中外總連帥威振百城内參常伯榮高八舎蔡質漢儀曰侍中常伯選舊儒高德博學淵慤仰占俯視切問近對喻㫖公卿上殿稱制佩璽秉劒員本八人司𨽻校尉見侍中執板揖河南尹亦如之於時隴坻黠羌時穿上谷榆中羣賊或聚漁陽漢書地理志隴西郡應劭曰有壠坻在其西也又曰上谷郡秦置屬幽州枚乗説吳王曰昔秦北備榆中之闗師古曰即今所謂榆闗也地理志曰漁陽郡秦置屬幽州公巻甲星馳長驅千騎廻洛兇徒望風草靡瓜州豪傑束手歸軍廻洛謂万俟洛也北史曰万俟普太平人子洛字受洛干河隂之戰諸軍北渡橋洛以一軍不動謂西人曰万俟受洛干在此能來可來也西人畏而去神武名其所營地為囘洛洛慷慨有氣節勇鋭冠世隋書地志曰敦煌郡舊置瓜州後魏元年改封龍支縣侯周書魏恭帝元年進封龍來縣侯隋志抱罕郡龍支後魏曰北金城西魏改焉三年朝廷使大將安政公隨突厥一有天子二字吐谷一作番渾歸國安政公史寜也周書曰史寜字永和建康袁氏人吐谷渾通使於齊寜撃獲之就拜大將軍時突厥木扞可汗假道涼州將襲吐渾寜與木汗撃夸呂破之虜其妻子大獲珍物寜乃還州周書異域傳曰突厥者匈奴之别姓阿史那氏别為部落其俗謂兠鍪為突厥因以為號訥都六有十妻生子皆以母族為姓阿史那是其小妻之子也其後部落稍盛始通中國又曰吐谷渾本遼東鮮卑慕容廆之庶兄也止於抱罕自為君長自吐谷渾至伏連籌一十四世伏連籌死子夸呂立始自號為可汗治伏俟城在青海西十五里河鄯二州屬當路首公領騎八千以為戎防周書本傳云三年大將軍安政公史寜隨突厥可汗入吐谷渾令永恩領騎五千鎮河鄯二州以為邊防隋志曰抱罕縣舊置河州西平郡舊置鄯州南通丹粟西望白蘭闗塞無虞公之勲也山海經曰荆山之首曰景山睢水出焉東南流至於江其中多丹粟晉書曰吐谷渾龍渾王據有西零以西甘松之界極乎白蘭數千里周書異域傳曰白蘭者羌之别種也其地東北接吐谷渾西北至利模徒南界郍鄂風俗物產與宕昌同周元年孝閔帝踐阼之年也授都督鄯州諸軍事鄯州刺史其年改封沃野縣公增邑千戸二年授隴右總管長府史傳同武成元年都督利渉本傳作沙汶三州諸軍事利州刺史周帝魏廢帝三年改西益為利州沙州為深州水經注酒泉南有鳴沙故曰沙州隋志汶山郡後周汶州義城郡西魏利州置總管府五年兵破文州陽陣蠻仍平濾水本傳時文州蠻叛永恩率兵撃破之以保定元年一有遣字將兵破巴州恒獌獠周書異域傳曰獠者蓋南蠻之别種自漢由達於卭笮川洞之間所在有之自江左及中州逓有巴蜀多恃險不賔太祖平梁之後令所在撫慰其與華民雜居者亦頗從賦役然天性暴亂旋至擾動每歳命隨近州鎮出兵討之獲其口以充賤𨽻謂之為壓獠焉有木籠獠鐵山獠恒稜獠此恒獌獠即周書所謂恒稜獠也渡瀘五月葛亮有深入之兵長坂九廻王尊有忠臣之路蜀志曰諸葛亮言五月渡瀘并日而食臣非不自惜也顧王業不可偏安於蜀故也水經注曰瀘水左右馬歩之徑裁通而時有瘴氣三月四月逕之必死非此時猶令人悶吐五月以後行者差得無恙故武侯以夏渡為艱漢書王尊傳曰上以尊為郿令遷益州刺史先是瑯邪王陽為益州刺史行歩至卭郲九折嘆曰奉先人遺體奈何乗此險後以病去及尊為刺史至其坂問吏曰此非王陽所畏道耶吏對曰是尊叱其馭曰驅之王陽為孝子王尊為忠臣應劭曰九折坂在蜀嚴道縣霜雹不驚水草無乏天幸將軍斯之謂矣漢書曰霍去病從大將軍為驃騎校尉敢深入軍亦有天幸未嘗困絶其年授司會本傳云保定元年入為司㑹中大夫八法斯掌九賦是均事總歳成功參月要周禮曰司㑹掌邦之六典八法八則之貳以九貢九賦九功九式之法致財用以參互考日成以月要考月成以歳㑹考歳成三年還授隴右總管府長史公屢弼英蕃頻相大府北海入朝仰以對問東平謁帝因而定禮後漢書曰北海敬王睦遣中大夫奉璧朝賀召而謂之曰朝廷設問寡人大夫將何辭以對使者曰大王忠孝慈仁敬賢樂士臣雖螻蟻敢不以實睦曰吁子危我哉此乃孤幼時進趨之行也大夫其對以孤襲爵以來志意衰惰聲色是娛犬馬是好使者受命而行其能屈申若此又曰東平憲王蒼即位拜為驃騎將軍置長史掾史貟四十人位在三公上是時中興三十餘年四方無虞蒼以天下化平宜修禮樂乃與公卿共議定南北郊冠冕車服制度遂使馬首懐燕不無樂毅蕃臣疑漢或多田叔史記曰燕惠王用齊反間使騎劫代將而召樂毅毅畏誅遂西降趙趙封樂毅於觀津曰望諸君燕惠王後悔使人讓樂毅且謝之樂毅往來復通燕燕趙以為客卿又曰田叔者趙陘陽人也趙王張敖以為郎中貫高等謀弑上亊發漢下詔捕趙王有敢隨王者辠三族惟孟舒田叔等十餘人頳衣自髠鉗為王家奴隨趙王敖至長安貫高事明白趙王敖得出乃進田叔等十餘人盡拜為郡守兄楚國公豆盧寜也周書云寜以佐命元勲封楚國公以叅和挹讓莊贊樂推建國開都奄荒南服求以先封武陽郡三千戸益公沃野之封本傳同朝廷以兄弟相讓不無前史推恩分邑有詔許焉增邑并前合四千七百戸既而六氣相犯五聲相觸靈壽不終遊魂且變左傳醫和曰天有六氣降生五味發為五色徴為五聲淫生六疾六氣曰隂陽風雨晦明也隂淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾杜預曰五聲白聲商青聲角黒聲羽赤聲徵黃聲宮也漢書皇太后賜孔光靈壽杖知靈壽杖名也周易曰遊魂為變薨於官舎春秋五十八周書作四十八詔贈少保幽冀定相等五州諸軍事幽州刺史諡曰敬公禮也天和元一作六年二月六日𦵏於咸陽之洪瀆川大夫墓樹以柏諸侯墳高於雉春秋緯云天子墳高三刃樹以松諸侯半之樹以柏大夫八尺樹以藥草士四尺樹以槐庶人無墳樹以楊柳周禮云以爵等為丘封之度與其樹數鄭云漢律曰諸侯墳高四丈左傳杜注云三堵曰雉一雉之牆高一丈嗚呼哀哉公資忠履孝蘊義懐仁直榦百尋澄波千頃世説曰和嶠森森如千丈松又曰叔度汪汪若千頃波留心職事愛玩圖籍官曹案牘未嘗煩委一作擁戎馬交馳不妨餘裕兄弟公侯國朝親戚宜春有湯沐之盛濯龍無流水之譏漢書衞青傳曰封青子伉為宜春侯不疑為隂安侯登為發于侯青謝曰上幸裂地封為三侯地理志曰宜春屬汝南郡左氏傳曰諸侯有大功德乃有朝宿湯沐之邑袁宏後漢紀馬太后詔曰前過濯龍門上見外家車如流水馬如龍吾亦不譴怒之但絶其歳用冀以默愧其心宜春有湯沐之邑言兄弟公侯也濯龍無流水之譏者言國朝親戚也渭南千畝之竹尚懼盈滿池一作咸陽二頃之田常思止足漢書曰渭川千畝竹此其人與千戸侯等漢書溝洫志白渠歌曰田於何所池陽谷曰地理志池陽屬左馮翊應劭曰在池水之陽老子曰知足不辱知止不殆閒居賦序云於是覽止足之分立身則十世可宥遺子則一經而已左氏傳曰天將十世宥之以勸能者漢書韋賢傳曰遺子黃金滿籝不如教子一經刺史賈逵之碑既生金粟將軍衞青之墓方留石麟王隠晉書曰永嘉元年陳國項縣賈逵石碑中生金人盜鑿取賣賣巳復生此江東中興之瑞也述異記曰秦漢間公卿墓則以石麒麟鎮之乃為銘曰朝鮮建國孤竹為君地稱高柳山名密雲遼陽趙裂武遂秦分朝鮮孤竹注見本序漢書地理志曰代郡高柳西部都尉治隋書地志云安樂郡宻雲縣後魏置宻雲郡領白檀要陽宻雲三縣遼陽疑作漁陽史記趙世家悼襄王九年趙攻燕取貍陽城正義曰燕無貍陽疑貍字誤當作漁陽故城在檀州宻雲縣南十八里燕漁陽郡城也趙東界至瀛州則檀州在北趙攻燕取漁陽城也地理志云遼陽屬遼東郡按武遂有二其一在韓其一在燕史記韓世家襄王六年秦復與我武遂九年秦復取我武遂釐王六年與秦武遂二百里正義曰上武遂及此武遂皆宜陽近地又趙世家悼襄王二年李牧將攻燕拔武遂方城徐廣曰武遂屬安平正義曰括地志云易州遂城戰國時武遂城也隋志云上谷郡遂城舊曰武遂今云慕容氏本都燕國蓋謂燕武遂城與韓為異也戰國時燕為秦所滅故云武遂秦分寶珪世胄雕戈舊勲名稱賔實言謂身文挺此含章降兹岐嶷寶珪周禮所謂桓圭信圭是也漢書郊祀志曰黼黻雕戈莊子曰名者實之賔也左傳介之推曰言身之文也易曰含章可貞詩曰克岐克嶷鄭箋曰岐吱然意有所知也其貌嶷然有所别識也有犯無隠王道正直惟愛惟敬永成悦色枕藉禮闈留連學殖禮記曰事君有犯無隠尚書曰王道正直孟子云禮門也説闈宮中之門也左氏傳云學猶殖也不殖將落策叅幃帳功披荆棘韓陣揮戈齊城馮軾漢書高祖曰運籌幃帳之中後漢書馮異傳帝曰為我披荆棘定闗中博物志曰魯陽公與韓戰戰酣日暮援戈而麾之曰為之反三舎左氏傳曰君馮軾而觀之馮皮冰反此云齊城馮軾者引屈完事左傳楚子使屈完如師師退次於召陵齊侯使陳諸侯之師與屈完乗而觀之是也豹策乃建龍韜同啓校戰岐陽申威隴坻城壘畫地山林聚米太公六韜文武虎豹龍犬校戰岐陽本序河橋沙苑等戰是也申威隴坻本序隴坻黠羌時穿上谷至瓜州豪傑束手歸軍是也地理志曰扶風美陽岐山居西北中水鄕周太王所居隴坻注見本序漢書李廣傳曰廣呐口少言與人居則畫地為軍陳袁宏後漢紀曰上西征至漆議者以為車駕不宜入險馬援夜至勸上曰囂衆瓦解兵進必破以米為山谷於上前指衆軍所入處上笑曰虜在吾目中矣上馬諭一作論書臨戎習禮賈復開營㢘公屈體漢書高祖曰乃公居馬上得之安事詩書陸賈曰馬上得之寜可以馬上治乎後漢書祭遵傳曰雖在軍旅不忘俎豆可謂好禮悦樂守死善道者也袁宏後漢紀曰賈復字君文南陽冠軍人寇恂為穎川太守時賈復兵在汝南其部將殺人恂戮之復怒曰吾與寇恂並立而為其所陷今與相見欲手劒撃之恂謀好避之終崇曰請以劒従有交足以相當恂曰不然昔藺相如不畏秦王而屈於廉頗者為國也區區之趙尚有此義士吾安可以忘之乎上徵恂恂至引入時復在前欲起上曰天下未定兩虎安可私鬬詔令並坐極歡遂共車出結友而去亷頗藺相如事見史記從容傅會占對造請用此㢘平終兹寛猛漢書贊曰陸賈從容平勅之間附㑹將相西征賦曰或從容傅㑹望表知裏後漢書徐防傳曰占對可觀綠林兵息潢池盜静名振赤山威高青嶺𤣥獸浮河飛螟出境後漢書曰王莽末南方饑饉新市人王匡王鳳為平理諍訟遂推為渠帥數百人於是諸亡命馬武王常成丹等往從之共攻離鄕聚藏於緑林中注云綠林山在今荆州當陽縣東北也漢書曰龔遂為渤海太守召見謂遂曰渤海廢亂朕甚憂之君何以息其盜賊以稱朕意遂對曰海瀕遐邇不霑聖化其民困於饑寒而吏不恤故使陛下赤子盜㺯陛下之兵於潢池中耳今欲使臣勝之邪將安之也上説荅曰選用賢良固欲安之也乗傳至渤海郡界移書勅屬縣悉罷捕盜賊吏諸持鉏鉤田器者皆為良民吏母得問持兵者乃為盜賊單車獨行至府郡中翕然盜賊亦皆罷後漢書祭彤傳曰匈奴鮮卑及赤山烏桓連和强盛數入塞殺略吏人彤使招呼鮮卑示以財利其大都督偏何歸化撃破赤山斬其魁首持首詣彤塞外震讋又烏桓傳曰赤山在遼東西北數千里按烏桓神靈所歸之處也若中國岱山矣隋書地志允吾後魏置廣武郡有青巖山後漢書曰劉昆為𢎞農太守仁風大行虎皆負子渡河又魯恭傳曰建德七年郡國螟傷稼犬牙緣界不入中牟災氛一作氣生隴毒水侵涇朝傾地鎮夜落台星説文曰氛祥氣也隴地理志所謂隴坻是也左氏傳曰秦人毒涇上流師人多死周禮職方氏有山鎮朝傾地鎮即所謂泰山頽也晉書曰張華死中台坼石壇承祀豐碑頌靈渭城高柏昌陵下亭須知地市為讀山銘漢書曰張良死并𦵏黃石毎上冢伏臘祠黃石周禮及窆執斧以涖匠師鄭注云匠師主豐碑之事以涖之使戒其事漢書地理志曰扶風渭城故咸陽成帝紀曰于昌陵賜丞相御史將軍列侯公主中二千石冢地第宅蜀本紀曰始皇陵有銀蠶金雀以多竒物故俗云秦皇地市庾子山集巻十四
