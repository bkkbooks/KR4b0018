body:
  text: 庾子山集卷十二周庾信撰錢唐倪璠纂注銘秦州天水郡麥積崖佛龕銘并序天水郡漢武帝元鼎三年置秦州地記云郡前湖水冬夏無增減因以名焉麥積山者北跨清渭南漸兩當五百里岡巒麥積處其中崛起一石嵬高萬尋望之團團如民間麥積之狀故有此名其青雲之半峭壁之間鐫山成佛萬龕千室雖自人力疑具鬼功隋帝分葬神泥舍利函於東閣之下伽室之中有庾信銘記刋於巖中見太平廣記袁宏後漢紀曰浮屠者佛也漢言覺將覺悟羣生也龕者塔也方志云受廣雅云盛也按周武帝建德三年始除佛道二教是銘當在建德三年以前所作也麥積崖者乃隴底之名山河西之靈嶽隋書地理志云天水郡舊秦州後周置總管府天水郡有隴城縣西京賦曰右有隴坻之隘應劭曰天水有大阪曰隴坻左氏傳曰名山名川史記曰渾邪王以衆降數萬遂開河西酒泉之地正義曰河謂隴右蘭州之西河也夏本紀曰至於龍門西河索隱曰河在冀州西故云西河隋書地志云周禮職方正西曰雍州安定北地上郡隴西天水金城于古為六郡之地河西諸郡其風頗同竝有金行之氣按麥積在秦州東南九十里又有豆積山在其中高峯尋雲深谷無量淮南子曰高山尋雲溪肆無景方之鷲島迹遁三禪史記大宛傳注括地志曰王舍國胡語曰罪悅祗國其國靈鷲山胡語曰耆闍崛山山似青石石頭似鷲鳥名耆闍鷲也山周四十里外周圓水佛於此坐禪及諸阿難等俱在此坐大品經曰初禪二禪三禪四禪按十八天分為四禪初禪三天二禪三天三禪三天四禪九天三禪皆依雲住至四禪方在空居此云迹遁三禪者言高峯插雲也譬彼鶴鳴虛飛六甲舊唐書地理志云蜀州晉源漢江源地鶴鳴山在西北十里神仙傳曰張道陵與弟子入蜀住鵠鳴山著作道書二十四篇乃精思鍊志忽有天人下千乘萬騎金車羽蓋驂龍駕虎不可勝數或自稱柱下史或稱東海小童乃授陵以新出正一明威之道鶴鳴即鵠鳴山鶴鵠通稱矣又漢武內傳上元夫人謂王母有六甲靈飛之符按此為道家之言故云譬彼言麥積可擬靈鷲鶴鳴二山也鳥道乍窮羊腸或斷南中志曰鳥道西百里以其險絶獸猶無蹊特上有飛鳥之道耳高誘曰羊腸其山盤紆如羊腸也酈道元水經注云羊腸盤道三十六回在成州仇池山雲如鵬翼忽已垂天莊子曰鵬之背不知其幾千里也怒而飛其翼若垂天之雲樹若桂華翻能拂日楚辭曰折若木以拂日是以飛錫遙來度杯逺至孫綽遊天台賦曰應貞飛錫以跨虛注云大智論曰菩薩常應二時頭陀常用錫杖經傳佛像佛國記曰那竭國城東北一山延到一谷口有佛錫杖亦起精舍供養杖以牛頭栴檀作長丈六七尺許以木筒盛之正復百千人舉不能移高僧傳曰杯度者不知姓名常乘木杯渡來疏山鑿洞鬱為净土維摩經曰爾時螺髻梵王語舍利弗我見釋迦牟尼佛土清净如自在天宫佛語舍利弗若人心净便見此土功德莊嚴拜燈王於石室乃假馭風維摩詰經曰文殊師利言東方度三十六恆河沙國有世界名須彌相其佛號須彌燈王佛身長八萬四千由旬其師子座高八萬四千由旬嚴飾第一於是長者維摩詰現神通力即時彼佛遣三萬二千師子之座高廣嚴净來入維摩詰室悉皆包容無所妨礙爾時維摩詰語文殊師利就師子座與諸菩薩上人即自變形為四萬二千由旬坐師子座諸新發意菩薩及大弟子皆不能升維摩詰言為須彌燈王如來作禮乃可得坐於是新發意菩薩及大弟子即為須彌燈王如來作禮便得坐師子座莊子曰夫列子御風而行泠然善也禮花首於山龕方資控鶴花首菩薩名此及釋氏所引舊作花首今藏經本首作手佛說華手經十卷姚秦鳩摩羅什譯經云時大目連從座起頂禮佛足為佛敷座高至梵天又於空中作經行之處七寶莊嚴有雜色蓮花彌覆水上華上有化比丘皆如目連又云諸菩薩持蓮華頂禮佛足又云時諸菩薩以此蓮華欲散十方佛以手摩一一蓮華中佛身半現此諸化佛從空而去孫綽遊天台山賦曰王喬控鶴以冲天毛萇詩傳曰控引也按上文石室此云山龕謂麥積山之石室山龕也言佛之神通變化無相無名非有藉于風鶴也而此山之刻石為室足拜燈玉鐫山成龕亦禮化佛此馭風控鶴之喻亦空亦有者也大都督李允信者周書宇文廣傳云其故吏李允信等上表籍於宿植深悟法門乃於壁之南崖梯雲鑿道奉為亡父造七佛龕按長阿含經一毗婆尸佛二尸棄佛三毗舍婆佛四拘留孫佛五拘那含佛六迦葉佛七釋迦牟尼佛也似刻浮檀如攻水玉佛國記曰佛上忉利天為母說法九十日波斯匿王思見佛即刻牛頭栴檀作佛像置佛坐處佛後還入精舍像即避出迎佛佛言還坐我般泥洹後可為四部衆作法式像即還坐此像最是衆像之始後人所法者也大莊嚴經論曰我昔曽聞波斯匿王往詣佛所頂禮佛足聞有異香殊于天香即白世尊為誰香耶爾時世尊以手指地即有骨現如赤栴檀長于五丈如來語王所聞香者從此骨出過去有佛號迦葉彼佛世尊化緣已訖入於涅槃爾時彼王名曰迦翅取佛舍利造七寶塔高廣二由旬又敕國內諸有花香不聽餘用盡皆持往供養彼塔時彼國中有長者子與媱女通為欲所盲即入迦葉佛塔盜取一花持與媱女即時悔熱身遍生瘡初如芥子後轉增長無有空處甚為臭穢是時彼人父母兄弟皆來瞻視復命良醫而重診之云須牛頭栴檀用塗身體爾乃可愈時彼父母即以貴價買牛頭栴檀用塗子身爾時彼人涕泣驚懼白父母言子病從今而起非是身患專念迦葉如來三藐三菩提涕泣盈目以巳所持栴檀之香悲哀白塔而說偈言即以花香塗香末香用供迦葉佛塔復以牛頭栴檀以畫佛身身瘡漸差熱患盡愈彼長者子於後命終生於天上或處人中身常有香身體肢節皆有好相父母立字號曰香身爾時香身厭惡陰界求索出家得辟支佛道此骨是辟支佛所出之香是故衆人應供養塔獲大功德又增一阿含經云優填王用牛頭栴檀雕佛形像高五尺此為始也佛地論云七寶四頗胝迦翻譯云頗梨或云塞頗胝迦此云水玉即蒼玉或云水精又云白珠刋正記云正名窣坡致迦其狀似此方水精有赤有白山海經曰堂庭之山多水玉郭璞曰水玉今水精也言鐫石為像如栴檀水玉也從容滿月照曜青蓮瑞應經曰面如滿月色從容維摩經曰目净修廣如青蓮肇曰五情百骸目最為長瞻顔而作故先讚目也天竺有青華其葉修而廣青白分明有大人目相故以為喻也法華經曰有人聞是品能隨喜讚善者是人口中出青蓮香晉書佛圗澄傳曰澄咒鉢水生青蓮花光色曜目影現須彌香聞忉利僧肇維摩經注曰須彌山天帝釋所在金剛山也秦言妙高處大海之中水上方高三百六十六萬里如來處四部之中威相超絶光蔽大衆猶金山之顯溟海者也什曰須彌山秦言妙高山也凡有十寶山須彌處其中餘九圍之也樓炭經曰須彌山王以四寶琉璃水精金銀作成之須彌山王北脅天金照北方天下須彌山王東脅天銀照東方天下須彌山王西脅天水精照西方天下須彌山王南脅天琉璃照南方天下又曰忉利天宫在須彌山上瑞應經曰第二忉利天上為天帝釋又曰佛生七日其母命終以懷天師功德大故上生忉利封受自然菩薩本知母人之德不堪受其禮故因其將終而從之應法師云忉利梵音訛略正云多羅夜登陵舍此云三十三俱舍頌云妙高頂八萬三十三天居四角冇四峰金剛手所住中宫名善現周萬踰繕那高一半金城中有殊勝殿周千踰繕那踰繕那者舊曰由旬如斯塵疑作鹿野還開說法之堂塵野疑作鹿野槃頭王苑名在槃頭城毗婆尸佛說法處也長阿含經曰毗婆尸如來於槃頭城鹿野苑中轉無上法輪又四十二章經曰世尊成道已於鹿野苑中轉四諦法輪度憍陳如等五人而證道果猶彼香山更對安居之佛一作剎修行經太子言吾出香山之東雪山之北國名迦維宣律師四分羯摩云四安居謂前中後也律有比丘四月十六日欲安居不止所在十七日方到佛言聽後安居即五月十六日也明了論云無五過處得安居一太逺聚落求須難得二太近城市妨修出家道三多蟲蟻自他兩損四無可依人五無施主供給衣藥竝不可安居一作剎者伽藍號剎利輔行云西域以柱表剎示所居處也梵語剌瑟胝此云竿即幡柱也法華云表剎甚高廣法苑云阿育王取金華金幡懸諸剎上塔寺低昻昔者如來追福有報恩之經如來佛號梵言多陀阿伽度報恩經後漢翻譯經云父母者三界福田又曰釋迦牟尼佛說大方便大報恩經報欲令一切衆生孝養父母故一切衆生亦曽為如來父母如來亦曽為一切衆生而作父母為一切父母故常修方便此經名攝衆善本亦名大方便亦名微密行亦名佛報恩菩薩去家有思親之供僧肇曰菩薩正音云菩提薩埵菩提佛道名也薩埵秦言大心衆生有大心入佛道孟蘭盆經曰大目犍連始得六通欲度父母報乳哺之恩即以道眼觀世間見其亡母生餓鬼中不見飲食皮骨連立目連悲哀即以鉢盛飯往餉其母母得鉢飯食未入口化成火炭遂不得食目連大呌悲號涕泣馳還白佛佛告目連十方衆僧七月十五日僧自恣時當為七世父母及現在父母厄難中者具飯百味五果著盆中供養此等自恣僧者現世父母六親眷屬得出三塗之苦應時解脫衣食自然時目連母即于是日得脫一劫餓鬼之苦敢緣斯義乃作銘曰鎮地鬱盤基乾峻極石關十上銅梁九息周禮鄭注曰鎮名山安地德者也徐敬業詩曰兹山復鬱盤禮記曰峻極于天蜀都賦曰阻以石門善曰石門在漢中之西褒中之北賦又曰外負銅梁於宕渠善曰銅梁山名在巴東百仞崖橫千尋松直陰假道陽烏回翼論語包咸注曰七尺為仞周禮云八尺曰尋張衡靈憲云月者陰精而成獸象蛤焉春秋元命苞曰陽成於三故日中有三足烏烏者陽精蜀都賦曰羲和假道於峻岐陽烏回翼於高標載疏山穿龕架嶺糾紛星漢回旋光景壁纍經文龕重佛影史記夏本紀曰山行乘檋如淳曰檋車謂以鐵如錐頭長半寸施之履下以上山不蹉跌也河圖括地象曰河精上為天漢楚辭曰借光景以往來兮王逸曰借神光電景洎往來也釋老志序曰蔡愔得佛經四十二章及釋迦立像明帝令畫工圗佛像置清涼臺及顯節陵上經緘蘭臺石室佛國記曰那竭城南半山延有石室博山西南向佛留影此中去十餘步觀之如佛真形金色相好光明炳著轉近轉微髣佛如有十方國王遣工畫師模寫莫能及彼國人傳云千佛盡當於此留影顔氏家訓云影字當為光景之景凡陰景者因光而生即謂景也尚書云惟景嚮葛洪字苑景傍加彡於景切梵云頻婆帳此云身影雕輪月殿刻鏡花堂橫鐫石壁暗鑿山梁大毗婆沙論曰法輪如世間呼金輪等輪是動轉不住義又圓滿義長阿含經曰月宫殿四方逺見故圓寒溫和適天銀琉璃所成純真無雜內外清徹光明逺照縱橫四十九由旬楞伽云譬如明鏡持諸色像現識現處亦復如是謂石室中雕輪則皆圓滿刻鏡則常净照也論語曰山梁雌雉鄭注曰梁石絶水之梁也言雕刻鐫鑿皆人工所成也雷乘法鼓樹積天香嗽泉珉谷吹塵石床法華經曰擊大法鼓燒衆名香法鼓鐘也維摩經曰坐香樹下聞斯妙香地理志藍田谷出玉說文珉石之美者關中記曰嵩高山石室十餘孔有石床池水食飲之具集靈真館藏仙冊府芝洞秋房檀林春乳桓談仙賦序曰華山下有集靈宫漢武帝欲懷集仙者故名殿為存仙門為望仙穆天子傳曰先王之所謂策府郭注云藏書冊之府也漢書有芝房歌佛經有栴檀林冰谷銀砂山樓石柱異嶺共雲同峯别雨華嚴經曰如日光出時無熱池中金沙銀沙一切寶物皆有日影于中顯見冀城餘俗河西舊風水聲幽咽山勢崆峒隋書地理志天水郡冀城縣後周曰冀城郡國志曰隴西郡河關積石山在西南河水出秦川記隴頭歌有云隴頭流水鳴聲幽咽史記黃帝紀曰西至於崆峒應劭曰山名韋昭曰在隴右法雲常住慧日無窮方域芥盡不變天宫華嚴經曰不壞法雲遍覆一切法華經曰慧日大聖尊久乃說是法劉虯曰菩薩圓净照均明兩故曰慧日王􅋄頭陀寺碑文曰䕃法雲于真際則火宅晨凉曜慧日于康衢則重昏夜曉維摩經曰乃見須彌入芥子中佛藏經曰四天下中普雨大石皆如須彌有人以手承接此石無有遺落如芥子者又云譬如劫盡大火燒時人以一唾能滅又以一吹還成世界及諸天宫樓炭經說天地遭三災變天宫宫宫相拍碎如粉塵有僧伽風吹水在于空中自然變成光音天宫七寶所成是為三災三復終南山義谷銘并序括地志云終南山一名中南山一名太一山一名南山一名橘山一名楚山一名泰山一名周南山一名地肺山在雍州萬年縣南五十里周保定二年嵗次壬午七月巳已朔大冢宰晉國公周書云晉蕩公護字薩保太祖之兄邵惠公皓之少子也拜大冢宰晉國公命鑿石關之谷下南山之材維公匡濟彞倫𢎞敷庶績燮理餘暇披閲山經以為終南敦物禹貢曰終南敦物至於鳥鼠鄭康成曰地理志終南敦物皆在右扶風武功也索隱曰按左傳中南山杜預以為終南山地理志云太一山古文以為終南華山古文以為敦物皆在扶風武功縣東敦物山名漢書云垂山也日月虧蔽杶幹栝柏椅桐梓漆子虛賦曰岑崟參差日月虧蔽張揖曰高山雍蔽日月虧缺半見也禹貢云杶幹栝柏師古曰杶木似樗而實幹栝也栝木柏葉而松身杶丑倫反栝古活反詩云椅桐梓漆年代藴積於何不有乃謀山澤之官兼引衡虞之匠周禮有山虞澤虞又云林衡若斬木材則受法於山虞而掌其政令東出藍田則控灞乘滻地理志京兆有藍田縣山出美玉有虎候山祠秦孝公置也灞水出藍田谷北入渭師古曰兹水秦穆公更名以章霸功視子孫潘嶽關中記曰涇渭灞滻灃滈潦潏凡八川張揖曰灞水出藍田谷西北入渭滻水出藍田谷至霸陵入灞西連子午則據涇浮渭辛氏三秦記曰子午長安正南也山名秦嶺谷名褒斜長安志曰王莽有意篡漢通子午道漢書王莽傳曰莽以皇后有子孫瑞通子午道子午道從杜陵直絶南山徑漢中師古曰子北方也午南方也言通南北道相當故謂之子午耳今京城直南山有谷通梁漢道者名子午谷又宜州西界慶州東界有山名子午嶺計南北直相當北山是子南山是午共為子午道括地志云涇水源出原州百泉縣西南笄頭山涇谷渭水源出渭原縣西七十六里鳥鼠山今名青雀山渭有三源竝出鳥鼠山東流入河派别八溪流分九谷潘嶽關中記曰涇與渭洛為關中三川與渭灞滻潦潏灃滈為關中八水張衡東京賦曰濯龍芳林九谷八溪薛綜曰九谷八溪養魚池按張衡所稱乃賦東京之事且又養魚池名此在西京必别有八溪九谷如關中八水等名矣銅梁四柱石關一作闕雙啓一作聳蜀都賦注銅梁山在巴東石關在漢中之西青綺春門溝渠交映黃圗曰長安城東出南頭第一門曰霸城門亦曰青綺門洞冥記曰王夫人生武帝于綺蘭殿有青雀羣飛于霸城門乃改為青雀門更修飾刻木為綺橑雀去因名青綺門緑槐秋市舟楫相通潘嶽懷縣作曰緑槐夾門植黃圗曰元始中起明堂列槐樹數百行朔望持經書及當郡所出物於此賣買號槐市蓄之則為屯雲泄之則為行雨杜篤論都賦曰屯黑雲青牛文梓白鶴貞松郭氏𤣥中記曰萬嵗樹精為青牛又曰秦文公造長安宫面四百里南至終南山山有梓樹大數百圍蔭宫中公惡而伐之連日不克輒大風雨夜有鬼問梓樹樹曰豈奈吾何鬼曰若使三百人披頭以繞樹豈不敗汝樹默然不應明日人言於秦王王依此言伐之有青牛逐之入澧州神境記滎陽郡有孤松千丈常有雙鶴晨必接翮夕輒偶影運以置宫崇斯雲屋千櫨抗殿龍首干雲說文曰欂櫨柱枅也西京賦曰疏龍首以抗殿薛綜曰抗舉也潘嶽關中記曰未央宫殿皆疏龍首山土作之三秦記曰昔有黑龍從南山出飲渭水其行道為龍首山萬頃疏苗蟬鳴再熟易稽覽圗曰夏至後三十日極溫夏至景風生蟬始鳴川后讓德山靈景從洛神賦曰川后靜波豈如運石甘泉才通櫟陽之殿博物志曰始皇陵在驪山之北運取大石於渭北渚歌曰運石甘泉口渭水為不流地理志櫟陽屬左馮翊黃圗曰高祖初居櫟陽穿渠穀水直繞金墉之城山海經曰傳山之西有林焉曰墦冢穀水出焉東流至於洛述征記曰穀洛二水本於王城東北合流所謂穀洛鬬也陸機洛陽記曰金墉城在宫之西北角魏故宫人皆在中將事未勞為功實重國富人殷方傳千載因功立事敢勒山阿張載劍閣銘曰勒銘山阿敢告梁益銘曰寥廓上浮峥嶸下鎮楚辭曰下峥嶸而無地兮上寥廓而無天漢書師古注曰寥廓宏逺也峥嶸深邃也壁立千丈峯橫萬仞張載劍閣銘曰壁立千仞桂月危懸風泉虛韻按酉陽雜爼曰舊說月中有桂故云桂月風泉虛韻者言風籟泉聲俱成韻也乘輿嶺阪舉插雲根西都賦曰荷插成雲銑曰插鍬也張協詩曰雲根遊八極八溪分注九谷通源八溪九谷注見本序北涵桐井南浮石門魏文帝詩曰雙桐生空井山海經曰積石之山其下有石門河水冒以西南流模象大壯規繩百堵周易曰上古穴居而野處後世聖人易之以宫室上梀下宇以待風雨蓋取諸大壯左思魏都賦曰思重爻摹大壯詩曰築室百堵膠葛九成徘徊千柱吳都賦曰東西膠葛李善曰膠葛長逺貌魯靈光殿賦曰層曲九成酉陽雜爼云閻摩那婆羅第二樹中有千拄殿桂棟凌波柏梁乘雨三輔黃圗井泉宫南有昆明池池中有凌波殿以桂為柱風來自香三輔舊事柏梁以香柏為梁也疏川奠谷落實摧柯事均刋木功侔鑿河禹貢曰隨山刋木又曰道河積石至於龍門師古曰治河施功自積石起鑿山穿地以通其流至龍門山也思舊銘并序思舊銘者悼梁觀寧侯蕭永作也觀寧之卒王褒有送葬之詩子山著思舊之銘昔向秀山陽聞笛感音而賦子山與蕭王二君同時羇旅是篇皆其鄉關之思及褒薨信作詩云惟有山陽笛悽余思舊篇謂斯銘也蕭永注見本序嵗在攝提星居監德一作鶉首梁故觀寧侯蕭永卒爾雅曰太嵗在寅曰攝提格天官書曰以攝提格嵗陰左行在寅嵗星右轉居丑正月與斗牽牛晨出東方名曰監德一作鶉首者月令鄭注曰仲夏者日月會于鶉首而斗建午之辰也帝王世紀曰自井十六度至栁八度曰鶉首之次於律為蕤賔斗建在午依監德文永卒當在寅年正月依鶉首文當在寅年五月按下文為羇終嵗門人謝焉至於東首告辭西陵長往是觀寧之羈絏長安不過年餘大約承聖以後周明帝二年嵗次戊寅此云嵗在攝提當是戊寅年卒也梁故觀寧侯蕭永鄱陽王範弟也觀寧梁時所封為故侯也梁鄱陽王傳云復遣其弟觀寧侯永將兵通南川助莊鐵按鄱陽王恢有男女百人男封侯者三十九人梁朝宗室甚多於範稱其弟當是忠烈王之子也南史周敷傳云敷性豪俠輕財重士侯景之亂敷至豫章時梁觀寧侯蕭永等避難流寓聞敷信義皆往依之敷愍其危懼屈體崇敬厚加給恤送之西上按此知永亦西上江陵及元帝敗後與庾信王褒同時羇旅當亦隨例入關者也嗚呼哀哉人之戚也既非金石所移古詩云人身非金石豈能長夀考士之悲也寧有春秋之異淮南子曰春女思秋士悲高臺巳傾稷下有聞琴之泣桓談新論曰雍門周以琴見孟嘗君曰臣竊為足下有所常悲夫角帝而困秦者君也連五國而伐楚者又君也天下未嘗無事不從即衡從成則楚王衡成則秦帝天以秦楚之彊而報弱薛猶磨蕭斧而伐朝菌也有識之士莫不為足下寒心天道不常盛寒暑更進退千秋萬嵗之後宗廟必不血食高臺既已傾曲池又已平墳墓生荆棘狐兔穴其中游兒牧豎躑躅其足而歌其上曰孟嘗君之尊貴亦猶是乎於是孟嘗君喟然太息涕淚承睫而未下雍門周引琴而鼓之徐動宫商叩角羽終而成曲孟嘗君遂欷歔而就之曰先生鼓琴令文立若亡國之人也壯士一去燕南有擊筑之悲史記曰荆軻愛燕之屠狗及善擊筑者高漸離日與飲於燕市太子丹使荆軻獻督亢地圖于秦太子送之易水髙漸離擊筑荆軻和而歌曰風變蕭蕭兮易水寒壯士一去兮不復還荆軻敗後髙漸離名姓為人庸保匿作於宋子聞其家堂上客擊筑高漸離乃退出其匣中筑擊筑而歌客為流涕宋子傳客之聞於秦始皇始皇使擊筑未嘗不稱善稍益近之高漸離乃以鉛置筑中復進得近舉筑撲秦皇帝不中遂誅高漸離終身不近諸侯之人索隱曰筑似琴有絃用竹擊之取以為名項羽之晨起帳中李陵之徘徊岐路史記項羽晨起帳中歌曰力拔山兮氣蓋世漢書曰李陵字少卿武帝天漢二年為騎都尉出居延至浚稽山與胸奴相值戰敗降胸奴為右校王李陵與蘇武詩云徘徊蹊路側悢悢不能辭韓王孫之質趙韓王孫韓公子也按史記韓宣惠王十一年君號為王故云王孫淮陰侯傳漂母曰吾哀王孫而進食蘇林曰如言公子也索隱曰劉德云秦末多失國言王孫公子尊之也按失國猶稱王孫是韓之公子得稱王孫矣按國策世家無韓公子質趙之事疑即質秦史記曰韓王絶秦十九年大破我岸門太子倉質於秦以和秦與趙同祖後始皇生於趙城因姓趙氏秦趙或可通稱耶楚公子之留秦史記曰楚頃襄王使黃歇與太子完入質於秦秦留之數年楚頃襄王病太子不得歸無假窮秋於時悲矣宋玉曰悲哉秋之為氣也况復魚飛武庫預有棄甲之徵魏志曰嘉平四年夏二月魚二見於武庫屋上十一月詔王昶等征吳十二月吳大將軍諸葛恪拒戰大破衆軍於東關不利而還又王肅傳曰有二魚長尺集於武庫之屋有司以為吉祥肅曰魚生於淵而亢于屋介鱗之物失其所也邊將其殆有棄甲之變乎其後果有東關之變鳥伏翟泉先見橫流之兆晉書五行志曰洛陽步廣里地陷有蒼白鵝出蒼者飛翔冲天白者止焉陳留董養嘆曰步廣周之翟泉盟會地也白者國諱蒼者異象自後有劉淵之亂星紀吳亡庚辰楚滅左傳昭三十二年曰吳伐越晉史黯曰不及四十年越其有吳乎越得嵗而吳伐之必受其凶杜預曰此年嵗在星紀星紀吳越之分也有亡之數不過三紀嵗星三周三十六嵗故曰不及四十年哀公二十二年越滅吳又定四年傳曰吳楚戰於柏舉楚師敗績庚辰吳入郢以班處宫紀侯大去鄅子無歸左傳莊四年曰紀侯不能下齊以與紀季夏紀侯大去其國違齊難也世本云紀姜姓國伯爵也杜預曰紀國在東莞縣又昭十八年傳曰鄅人藉稻邾人襲鄅遂入之盡俘以歸鄅子曰余無歸矣世本云鄅妘姓國也杜元凱曰鄅國今琅邪開陽縣鄅音禹許慎郭璞皆音矩國名原隰載馳轘轅長别詩曰於彼原隰又衛風曰載馳載驅左氏傳曰許穆夫人賦載馳杜預曰夫人痛衛之亡思歸唁之不可故作詩以言志東京賦曰邪徑捷乎轘轅薛綜曰轘轅阪名也甲裳失矣餘皇棄焉左傳宣十二年邲之戰云趙旃棄車而走林屈蕩搏之得其甲裳又昭十七年曰楚人大敗吳師獲其乘舟餘皇杜預曰餘皇舟名河傾酸棗杞梓與樗櫟俱流漢書曰漢興三十有九年孝文時河决酸棗東隤金隄大發卒塞之班固云文堙酸棗武决瓠歌是也水經注曰今無水史記正義曰酸棗屬滑州黃河南岸地述異記曰耆舊說周秦間河南雨酸棗遂生野棗今酸棗縣是也左氏傳曰杞梓皮革詩小雅四牡云集于苞杞爾雅云杞枸檵郭云今枸杞也陸璣疏云一名苦杞一名地骨又爾雅云椅梓郭云即楸陸璣疏云楸之疏理白色而生子者為梓詩云山有樗爾雅云栲山樗陸璣云山樗與田樗略無異葉似差狹耳吳人以其葉為茗詩秦風云山有苞櫟爾雅云櫟其實梂陸璣云秦人謂柞櫟為櫟河內人謂木蓼為櫟椒榝之屬也海淺蓬萊魚鱉與蛟龍共盡列子曰渤海之東有大海焉其中有五山一曰蓬萊隨波上下往來不得暫峙山海經曰蓬萊在海中神仙傳麻姑曰向到蓬萊又水淺于往日會時略半耳說文曰魚水蟲也按爾雅龜鱉之類總名釋魚以皆水類也王逸楚辭注曰小曰蛟大曰龍言河傾則諸木並流海淺則衆類俱盡以喻國破則智愚貴賤並遭其難也焚香復道詎斂遊魂述異記曰聚窟洲有返魂樹伐其根心於玉釡中煮取汁又熬之令可丸名曰驚精香或名震靈丸或名返生香或名却死香死尸在地聞氣即活博物志云漢武帝幸上林苑西使至乘輿間并奏其香帝付外庫後長安中大疫西使乞見請燒所貢香一枚以辟疫氣帝不得巳聽之病者登日並差長安中百里盛聞香氣芳積九十餘日香猶不歇漢書叔孫通傳曰惠帝為東朝長樂宫作復道方築武庫南叔孫通曰陛下築復道髙帝寢衣冠月出遊髙廟子孫奈何乘宗廟道上行哉惠帝懼曰急壞之通曰人主無過舉今巳作百姓皆知之矣願陛下為原廟益廣宗廟大孝之本又成帝紀曰元帝即位成帝為太子上嘗召太子出龍樓門不敢絶馳道西至直城門得絶乃度三輔黃圗曰桂宫周回十里內有復道橫度西至神明臺按上下有道曰復復音復復道即馳道也周易曰遊魂為變焚香是漢代事是以西域表月支之獻南海置涪陽之尉漢帝出警遂置復道焚香以辟惡氣此云焚香復道詎斂遊魂者即聚窟洲震靈返魂之類也載酒屬車寧消愁氣東方朔别傳曰武帝幸井泉長平坂道中有蟲赤如肝頭目口齒悉具驅還以報上使視之莫知之時朔在屬車中令往視焉朔曰此謂怪哉是必秦獄處也上使按此圗果秦獄地上問朔何以知之朔曰夫積憂者得酒而解乃取蟲置酒中立消賜朔帛百匹後屬車上盛酒為此也漢書揚雄傳曰是時趙昭儀方大幸每上井泉常法從在屬車間豹尾中服䖍曰大駕屬車八十一乘作三行尚書御史乘之最後一乘縣豹尾以前皆為省中又遊俠陳遵傳云揚雄酒針曰鴟夷滑稽腹大如壺盡日盛酒人復借酤常為國器託于屬車出入兩宫經營公家由是言之酒何過乎師古曰天子屬車常載酒食故有鴟夷也芝蘭蕭艾之秋形殊而共瘁羽毛鱗介之怨聲異而俱哀楚辭曰何昔日之芳草兮今直為此蕭艾也淮南子曰紫芝蕭艾俱死世說曰毛伯成既負其才氣常稱寧為蘭摧玉折不作蕭敷艾榮張衡西京賦曰所好生毛羽所惡成瘡痏淮南子曰毛羽者飛行之類也故屬乎陽介鱗者蟄伏之類也故屬乎陰所謂天乎乃曰蒼蒼之氣詩黍離云悠悠蒼天彼何人哉毛傳逺視之蒼蒼然則稱蒼天莊子曰天之蒼蒼其正色耶爾雅曰春為蒼天穹蒼蒼天也郭注天形穹隆其色蒼蒼因名言天道無知也所謂地乎其實搏搏一作博博之土楚辭曰乘精氣之搏搏兮王逸曰楚人名員曰搏也搏佐官切言地亦塊然無知也一作博博者潛夫論云昔樂毅以博博之小燕破齊怨之徒也何能感焉言遭此亂世智愚同盡呼天搶地怨之至也凋殘殺翮無所假於風飈零落春枯不足煩於霜露幕府初開賢俊翹首為羇終嵗門人謝焉後漢書蔡雍薦邊讓於何進曰伏惟幕府初開博選清英華髮舊德並為元龜至於東首告辭西陵長往禮記喪大記曰疾病寢束首於北牖下西陵魏武帝墓魏武遺令曰時時望吾西陵墓田山陽車馬望一作永别郊門向秀笛賦曰鄰人有吹笛者發聲寥亮追想疇昔遊宴之好感音而嘆故作賦云潁川賔客遙悲松路漢書灌夫傳曰宗族賔客為權利橫潁川夫家居卿相侍中賔客益衰嵇叔夜之山庭尚多楊栁文士傳曰嵇康家有盛栁樹乃激水以圜之夏天甚清凉恆居其下傲戲述征記曰山陽縣城東北二十里魏中散大夫嵇康園宅今悉為丘墟而父老猶謂嵇公竹林地以時有遺竹也王子猷之舊徑惟餘竹林世說曰王子猷嘗暫寄人空宅住便令種竹或問暫住何煩爾王嘯咏良久直指竹曰何可一日無此君王孫葬地方為長樂之宫史記曰樗里子名疾秦惠王異母弟也昭王七年樗里子卒葬於渭南章臺之東曰後百嵗是當有天子之宫夾我墓至漢興長樂宫在其東未央宫在其西武庫正直其墓正義曰漢長樂宫在長安縣西北十五里烈士埋魂即是將軍之墓烈士傳曰羊角哀左伯桃二人為死友欲仕於楚道阻遇雨雪不得行飢寒自度不俱生伯桃謂角哀曰俱死之後骸骨莫收內手捫心知不如子生恐無益而棄子之能我樂在樹中角哀聽之伯桃入樹中而死楚平王愛角哀之賢以上卿禮葬伯桃角哀夢伯桃曰蒙子之恩而獲厚葬正苦荆將軍冢相近今月十五日當大戰以决勝負角哀至期日陳兵馬詣其冢作三桐人自殺下而從之昔嘗歡宴風月留連追憶生平宛然心目及乎垂翅秦川關河羇旅降乎悲谷之景實有憂生之情淮南子曰日至於悲谷是謂晡時美酒酌焉猶思建業之水晉書五行志曰孫皓初童謡曰寧飲建業水不食武昌魚鳴琴在操終思華亭之鶴晉書陸機曰華亭鶴唳豈可復聞乎重為此别嗚呼哀哉麟亡星落月死珠傷春秋運斗樞曰璣星得則麒麟生萬人夀吕氏春秋曰月望則蚌蛤實羣陰盈月晦則蚌蛤虛羣陰缺瓶罄罍耻芝焚蕙歎詩小雅蓼莪云瓶之罄矣惟罍之恥注云瓶小而罍大也罄盡也淮南子曰紫芝與蕭艾俱死陸機傷逝賦曰嗟芝焚而蕙歎所望鐘沈德水聲出風雲史記封禪書曰昔秦文公出獵獲黑龍此其水德之瑞於是秦更命河曰德水音上大吕劍沒豐城氣存牛斗雷渙别傳曰煥字孔章鄱陽人司空張華夜見異氣起牛斗問煥見之乎煥曰此謂寶劍氣華以煥為豐城令煥至縣移獄掘地三十餘尺得青石函一枚中有雙劍文采甚明煥取南昌西山黃白土用拭劍光艷照耀乃送一劍與華自留一劍華使以華陰赤土一斤送與煥煥得土磨劍鮮光愈亮及華誅劍亡後煥子爽帶劍經延平津劍無故墮水見二龍長數丈光采微發曜日映川潸然思舊乃作銘云風雲上慘舟壑潛移言梁朝太清之亂也周易曰雲從龍風從虎風雲上慘喻亂也莊子曰藏舟于壑謂之固矣夜半有力者負之而趨舟壑潛移喻國變也駸駸霜露君子先危毛詩曰載驟駸駸駸駸馬奔貌禮記曰霜露既降君子履之必有悽愴之心抱朴子曰周穆王南征一軍盡化君子為猿鶴小人為沙蟲按君子對小人而言故云先危紀侯大去懷王不返上句注見本序史記曰楚懷王見秦王書往會秦昭王昭王詐令一將軍伏兵武關號為秦王楚王至則閉武關遂與西至咸陽朝章臺如蕃臣不與亢禮因留楚王楚人立太子橫是為頃襄王三年卒於秦秦歸其喪於楚楚人皆憐之如悲親戚紀侯懷王喻觀寧侯去國也玉樹長埋風流遂逺世說曰庾文康亡何揚州臨葬云埋玉樹著土中使人情何能久之又曰王東亭亡後王敬道與會稽王道子書曰元琳風流之美公私所寄忽爾喪失豈惟風流相悼荀伯一作卿舊縣慶封餘邑荀伯藝文類聚作荀卿史記曰荀卿適楚春申君以為蘭陵令春申君死荀卿因家蘭陵左傳襄二十八年慶封奔吳吳句餘豫之朱方杜預曰朱方吳邑地理志丹徒師古曰即春秋朱方也蕭子顯齊書曰蕭氏之先蕭何孫侍中彪居東海蘭陵晉分東海為東蘭陵中朝亂淮陰令慗過江居晉陵武進縣僑置本土加以南名為南蘭陵人按齊梁俱淮陰令後永為宗室朱方漢之丹徒魏曰武進晉置蘭陵是蘭陵本荀卿舊縣南蘭陵又為慶封餘邑也萬里歸魂修門詎入楚辭魂兮歸來入修門注云修門郢城門言不能魂歸蘭陵也墳橫一作城連武庫山枕盧龍史記樗里子墳武庫正直其墓魏志田疇傳曰舊北平郡治在平岡道出盧龍達于栁城思歸道逺返葬無從徒留送雁空靡長松送雁蘇武事長松東平思王事劉峻所謂東平之樹望咸陽而西靡徒留空靡傷其不能復歸也平陵之東無復梧桐崔豹古今注曰平陵東翟義門人所作也王莽殺義義門人作歌以怨之歌曰平陵東松柏桐不知何人劫義公仲長子昌言曰古者之葬用松柏梧桐以識其墳也平陵漢屬右扶風松聲蕭瑟長起秋風吳越春秋曰富貴之於我如秋風之過耳疇昔隆貴提攜語默疇昔以下言與信舊交也左傳杜注曰疇昔猶前日也禮記鄭注曰提攜謂牽將行易曰或語或默託情嵇阮風雲相得嵇阮嵇康阮籍也有酒如澠終溫且克左傳有酒如澠有肉如陵詩云人之齊聖飲酒溫克朝陽落鳳大野傷麟傷觀寧侯之卒也詩云鳳凰鳴矣於彼高岡梧桐生矣於彼朝陽家語孔叢子曰叔孫氏之車子鉏商樵於野而獲麟焉衆莫之識以為不祥棄之五父之衢冉有告曰麕身而肉角豈天之妖乎夫子往觀焉泣曰麟也麟出而死吾道窮矣乃歌云唐虞世兮麟鳳遊今非其時來何求麟兮麟兮我心憂佳城鬱鬱流寓於秦獨異志曰漢書夏侯嬰以功封滕公及死將葬未及墓引車馬踣地不前使人掘之得一石室室中有銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室遂改卜焉山陽相送惟餘故人注見本序孀機嫠緯獨鶴孤鸞左傳嫠不恤其緯陶潛詩上絃驚别鶴下絃操孤鸞閨深夜靜風高月寒生平已矣懷舊何期潘嶽作懷舊賦匣中絃絶鄰人笛悲文士傳曰嵇康臨死取琴調之為太平引曲成歎息曰太平引絶於今日耶康别傳曰袁孝尼嘗從吾學廣陵散吾每靳之廣陵散於今絶矣謝莊宋武宣貴妃誄曰匣有遺絃李善注匣琴匣也鄰人笛悲向秀事注見本序昔為幕府今成繐帷禮記鄭注曰凡布細而疏者謂之繐今南陽有鄧繐繐音嵗謝朓銅雀臺詩曰繐帷飄井幹玉帳山銘一作東宫玉帳山銘玉帳山以下梁宫中之小山也一本玉帳山及下行雨山並有東宫二字梁簡文集中有明月山銘行雨山銘知以下諸銘中大通三年後簡文為太子時隨侍東宫之所作也玉帳寥廓崑山抵鵲淮南子曰崑山之玉填而塵垢弗能汚也高誘曰崑山崑崙也鹽鐵論曰崑山之旁以玉璞抵烏鵲總葉成帷連雲一作枝一作珠起幕陸機招隱詩曰密葉成翠幄周禮鄭注曰在旁曰帷在上曰幕歸藏啓室曰昔者女媧氏張雲幕玉策一作蘂難移金花不落山海經曰黃帝取密山之玉策投之鍾山之陰鄴中記曰帳頂安金蓮花此以山名玉帳故云隱士彈琴仙人看博神仙傳曰孫登善彈一絃琴風俗通曰漢武帝與仙人對博碁沒石中馬蹄迹處於今尚存曹植詩仙人攬六箸對博泰山隅巖留舊鼎竈聚新荆一作雲上新荆史記曰黃帝鑄鼎于荆山南越志曰長沙郡劉陽縣東有王喬山山有合丹竈别賦云守丹竈而不顧錬金鼎而方堅此云鼎及竈者金鼎丹竈也煮石初爛燒丹欲成陶𢎞景真誥曰斷穀入山當煮食白石昔白石子者以石為糧故世號曰白石生此至人也今為東府左仙卿桑田屢變一作盡海水頻盈一作傾神仙傳麻姑謂王逺曰接侍以來已見東海三為桑田向到蓬萊又水淺於往日會時略半耳豈將復為陸乎逺嘆曰聖人皆言海中行復揚塵也長聞鳳曲永聽簫聲列仙傳曰蕭史日教弄玉作鳳鳴一旦隨鳳飛去秦人為作鳳女祠於雍宫中時有簫聲吹臺山銘江寧吹嶺雖山出筠秦簫下鳳此岫為真晉書地理志曰丹陽郡江寧太康二年分建鄴置丹陽記曰江寧縣南四十里有慈母山積石臨江生簫管竹王褒洞簫賦所稱即此也其竹圓緻異于衆處自伶倫採竹嶰谷其後惟此簳見珍故歷帝給樂府而俗呼曰鼓吹山雖山出筠未詳禮記曰如竹箭之有筠也列仙傳曰蕭史者秦穆公時人善吹簫穆公女弄玉好之公妻之一旦隨鳳飛去言秦人吹簫築臺不如吹臺之山自然得名者為真也青槐避日朱草司一作伺晨爾雅曰懷槐守宫槐葉晝聶而夜炕大戴禮記曰朱草日生一葉至十五日已後日落一葉周而復始石名新婦樓學仙人蜀記曰梓桐縣有五婦山昔秦遺蜀五美人皆化為石又臨海記云新婦山土石悉綵色似人形漢武故事曰公孫卿言仙人好樓居不極高顯神終不降也于是上於長安作飛亷觀高四十丈於井泉作延夀亦如之吳中字玉城南姓秦一作中字玉成南君姓秦搜神記曰吳王夫差小女名玉悅童子韓重欲嫁之不得乃結氣而死重遊學歸知之往弔于墓側玉形見顧重延頸而歌云南山有鳥北山張羅意欲從君讒言孔多悲結成疹沒身黃壚命之不造寃如之何羽族之長名為鳳凰一日失雄三年感傷雖有衆鳥不為匹雙故見鄙姿逢君輝光身逺心近何曽暫忘古詩曰日出東南隅照我秦氏樓比花依樹登榭要春楚辭注曰無木謂之臺有木謂之榭舞能留客一作容聲便度新雕梁數振一作逺無復輕塵七略曰漢興善歌者魯人虞公發聲動梁上塵望美人山銘一作後堂望美人山銘高唐礙石一作雨洛浦無舟宋玉高唐賦曰昔者先王嘗遊高唐倦而晝寢夢見一婦人曰妾巫山之女也為高唐之客聞君游高唐願薦枕席王因幸之曹植洛神賦曰河洛之神名曰宓妃又云御輕舟而上泝何處相望山邊一樓峯因五婦石是三侯述異記曰秦惠王獻五美女於蜀王王遣五丁迎之乃見大蛇入山穴中五丁曵蛇山崩五女上山皆化為石南中志曰有竹王者興於遁水有一女浣於水濵有三節大竹流入女子足間推之不肯去聞有兒聲取持歸破之得男兒長有才武遂雄夷濮以竹為姓捐所破竹於野成林今竹王三郎是也王與從人嘗止大石上命人作羮從者曰無水王以劍擊石水出今王水是也破石存焉武帝拜唐䝉為都尉以重幣喻諸種侯王斬竹王置牂柯郡以吳霸為太守後夷濮以竹王非血氣所生求立後嗣霸表封其三子列侯配食父祠與竹王三郎是也􅕑踰地肺危陵天柱高士傳曰四皓隱於地肺山括地志曰終南山一名地肺山秦記云終南又名地肺又真誥曰金陵之地地方三十七頃是金陵之地肺也爾雅霍山為南嶽郭云天柱山潛水所出也地理志云天柱在廬江潛縣又王子年拾遺記云崑崙之山有銅柱焉謂之天柱禁苑斜通春人常一作恆聚樹裏聞歌枝中見舞恰對妝臺諸窗晝一作併開斜看已識直一作試喚便回豈同織女非秋不來星經曰織女三星在天市東常以七月一月六七日見東方荆楚嵗時記曰七月七日為織女牽牛聚會之夜至仁山銘峯橫鶴嶺水學龍津豫章記曰鸞岡西有鶴嶺王子喬控鶴所經三秦記曰河津一名龍門兩旁有山水陸不通龜魚不能上江海大魚薄集龍門不得上曝腮水次也瑞雲一片仙童兩人洞冥記東方朔云東海有大明之墟有釡山山出瑞雲應王者之符命如黃帝黃雲堯時有赤雲之祥之類魏文帝詩曰西山一何高高高上無極上有兩仙童不飢亦不食與我一丸藥光耀有五色服藥四五日身輕生羽翼三秋雲薄九日寒新真花暫落畫樹長春橫石臨砌飛簷枕嶺壁繞藤苗窗銜竹影菊落秋潭桐疏寒井陸機要覽曰酉陽山中有甘谷谷中皆菊花墮水中居人飲之多夀有及一百五十有餘嵗魏文帝詩曰雙桐生空井仁者可樂將由愛靜明月山銘梁簡文帝有明月山銘其詞曰迢遞峯長威紆嶽聚既正書門兼同天柱非競小山寧論大庾豈學土龍詎須石鼓緅色斜臨霞文橫豎是銘簡文時同作也竹窗標嶽四面臨虛山危簷迥葉落窗疏看椽有笛對樹無風蔡雍長笛賦序曰雍避難江南宿之柯亭柯亭之館以竹為椽雍仰而盼之曰良竹也取以為笛竒聲獨絶管輅别傳曰輅與倪清河既刻雨期言樹上已有少女微風風生石洞雲出山根盛𢎞之荆州記曰宜都狼山縣有山山下有穴大數尺為風井博物志曰山澤通氣以興雷雲氣觸石膚寸而合不崇朝以雨陸機感時賦曰凝行雨于雲根霜朝唳鶴秋夜鳴猿周處風土記曰白鶴夜警至八月露降則鳴蜀本紀曰蜀王秀所立三峽明月峽巴峽巫峽荆州記巴東三峽巫峽長猿鳴三聲淚沾裳此云鳴猿以山名明月若巴東三峽矣堤梁似堰野路疑村船橫埭下樹夾津門寧殊華蓋詎識桃源西京雜記曰終南山有樹直上百尺如車蓋亦云華蓋樹述異志曰武陵源在吳中山盡生桃李俗呼桃李源上有石洞世傳秦末喪亂吳中人於此避難食桃李者皆得仙行雨山銘一作梁東宫行雨山銘梁簡文帝行雨山銘曰巖畔途逺阿曲路深猶云息馭尚且抽琴兹峯獨擅嶔﨑千變卻繞畫房前臨寶殿玉岫開華紫水回斜溪開聚葉澗裏縈沙月映成水人來當花樹結如帷磧起成基芝香馥徑石鏡臨墀是銘亦簡文時同作也山名行雨地異陽臺高唐賦曰旦為朝雲暮為行雨朝朝暮暮陽臺之下佳人無數神女羞一作看來宋玉神女賦云楚襄王夢與神女遇其狀甚麗翠幔朝開新妝旦起劉公幹齊都賦曰翠幄浮遊樹入牀頭一作前花來鏡裏草緑一作色衫同花紅面似開年寒盡正月遊春俱除錦帔併脫紅輪沈約詩云紅輪映早寒庾肩吾詩云粉白映輪紅子山和趙王美人春日詩亦云紅輪帔角斜或云婦女所執暖扇之類天絲劇藕蝶粉生或作多塵天絲即遊絲道書云蝶交則粉退言行雨山遊絲想折藕飛蝶擬香塵若有人也橫藤礙路弱一作垂栁低人誰言洛浦一箇河神洛神賦曰河洛之神名曰宓妃刀銘三首風伯吹罏雨一作雲師煉冶高誘淮南注曰風伯箕星雨師畢星張協七命曰飛亷扇炭風俗通及王逸楚辭注並云飛亷風伯也吳越春秋曰薛燭善相劍王取純鉤示之薛燭曰臣聞王之初造此劍赤堇之山破而出錫若耶之溪涸而出銅雨師灑道雷師發鼓蛟龍捧爐天帝莊炭太一下觀於是歐冶子曰天地之精悉其伎巧矣鐵焰朝流金精夜下吳越春秋薛燭曰夫寶劍者金精從理至本不逆價重十城名高千馬吳越春秋越王曰客有買此劍者有市之鄉駿馬千匹千戶之都其可與乎薛燭曰雖傾城量金珠玉不可與况駿馬萬戶之都乎千金頴合百錬鋒成吕氏春秋曰伍員逃楚至江見一丈人刺船渡之員解劍與之曰此劍其值千金崔豹古今注吳大帝有寶刀百錬光連斗氣焰動山精吳越春秋伍子胥曰此劍有七星北斗文豫章記曰吳未亡時恆有紫氣見於牛斗之間雷孔章曰是寶劍之精上徹於天耳吳越春秋曰干將作劍采五山之鐵精身文水動刃古珠生越絶書風胡子曰欲知泰阿觀其鈲巍巍翼翼如流水之波欲知工布鈲從文起至脊而止如珠不可袵文若流水不絶山海經注曰鮫魚皮有珠文而堅可以飾劍口斗精遙降山靈下從斗精疑即豐城劍氣光于牛斗者也又吳越春秋子胥云此吾前君之劍中有七星文按北斗七星此為斗精矣山靈若管子所謂葛盧山發而出金吳越春秋赤堇山破而出錫是也水文千曲蛇鱗百重水文即風胡子所云文若流水也注見上蛇鱗若傅𤣥歌辭所謂鏤象龍螭矣燕砥斂刃蜀水開鋒莊子曰天子之劍以燕溪石城為鋒音義曰燕溪地名在燕國石城在塞外司馬曰劍刃也蒲元傳云君性多竒思得之天然為諸葛亮鑄刀三千口鎔金造器特異常法刀成言漢水鈍弱不任淬礪蜀江水夾烈是謂夭金之元精天分其野乃命人於成都取之水既至君以淬刀言雜涪水不可用取水者猶悍言不雜君以刀畫水云雜八升何故言不雜取水者叩首曰實於涪津渡覆水懼怖以涪水八升益之於是咸共驚服稱為神妙氣生分景環成屈龍典論曰魏太子丕造寶劍色似采虹光似流星名曰飛景夏書曰赫連勃勃造百鍊剛刀為龍雀大環號曰大夏龍雀庾子山集卷十二
