body:
  text: 庾子山集卷十六周庾信撰錢塘倪璠纂注志銘周譙國公夫人步陸孤氏墓志銘按步陸孤氏乃譙國公宇文儉之妻也建德三年儉進爵為王夫人以建德元年葬時儉方為公夫人諱某字某本姓陸吳郡人也周書云本姓陸賜姓步陸孤氏大夫拓境百越來庭丞相勒兵三江席卷序陸氏之先也史記曰髙祖時中國初定尉他平南越因王之髙祖使陸賈賜尉他印為南越王令稱臣奉漢約歸報髙祖大恱拜賈為大中大夫過秦論曰南取百越之地韋昭曰越有百邑吳志曰赤烏七年以上大將軍陸遜為丞相遜尅關公敗曹休厯著功績三江席捲謂相吳成江表王業也過秦論曰有席捲天下之意史記索隱注韋昭曰三江謂松江錢塘江陽江地理志曰有南江北江中江是謂三江髙祖載為劉義真長史留鎮關中既沒赫連因即仕魏周書陸通傳云曾祖載從宋武帝平關中還留載其子義真至長安遂沒赫連氏魏大武守平赫連載仕魏為中山郡臨終誡其子孫曰樂操土風不忘本也左傳苑文子言鍾儀之辭言念爾祖無違此心詩云無念爾祖言此心思歸吳也祖政驃騎大將軍儀同三司恆州刺史父通柱國大將軍大司馬文安公匡贊經綸參謀揖讓名高廣武功重長平祖政父通事注見陸逞碑文匡贊經綸參謀揖讓者言天光敗後政歸周文帝為行臺左丞爾朱氏滅通入關文帝引為帳內督是也郡國志滎陽有廣武城注云漢祖與項籍語處也漢書曰衛青封長平侯言拜大將軍大司馬也夫人七德含章四星連曜敬愛天情言容禮典左傳武有七德易曰含章可貞謂坤貞佐其武德也九日登高作銘秋菊三元告始或頌春椒傅充妻辛氏作秋菊頌曰英英麗草稟氣靈和春茂翠葉秋矅金華布護高原蔓衍靈阿揚芳吐馥載芬載葩爰采爰拾投之醇酒御于王公以介眉夀服之延年佩之黃耉文園賔客乃用不朽晉書曰劉臻妻陳氏聰辨能屬文嘗正旦獻椒花頌其詞曰旋穹周回三朝肇建青陽散輝澄景載煥標美靈葩爰採爰獻聖容映之永夀於萬年十有四娉於譙國周明帝武成元年封皇弟儉為譙國公友其琴瑟愈恭節儉之心伐其條枚實秉憂勤之德關雎之詩云琴瑟友之葛覃詩序曰躬儉節用服浣濯之衣汝墳之詩云伐其條枚毛傳云枝曰條幹曰枚鄭箋曰伐薪於汝水之側非婦人之事以言君子賢者而處勤勞之職亦非其事也鄴地登高之錦自濯江波平陽采桑之津躬勞蠶月陸劌鄴中記曰錦有大登高小登高九域志曰笮橋江水亦名濯錦江俗云以此水濯錦則鮮明後漢郡國志曰河東郡平陽侯國有采桑津左傳僖八年晉侯敗狄於采桑是也天和元年册拜譙國夫人東武亭之妻既稱有秩南城侯之婦還聞受封魏志曰鍾繇封東武亭侯小子鍾會傳注云會為其母傳曰夫人張氏字昌蒲太原兹氏人太傅定陵侯之命婦也王隱晉書羊祜傳曰武帝封祜妻夏侯氏為萬歲鄉君羊祜泰山南城人也柱國殿下周武帝天和二年以大將軍譙國公儉為柱國以名華分照增城峻土揚旌僰道問政邛都白狼之溪途艱黃牛之坂荔枝之山地險葡萄之國言譙國公使蜀道路之險也周書云儉以天和中出為益州刺史名華若木也山海經曰灰野之山上有赤樹青葉赤華名曰若木郭璞云生崑崙西附西極其華光赤下照地楚辭曰增城九重漢書地理志犍為郡僰道應劭曰故僰侯國也音蒲北反又地志越嶲郡有邛都縣南山出銅有邛池澤右北平郡有白狼縣師古曰有白狼山故以名縣後漢書西南夷傳曰自汶山以西白狼槃木唐菆等百餘國又云和帝永元十三年旄牛徼外白狼等率種人歸義內屬水經注曰黃牛山下有黃牛灘行者謳曰朝發黃牛暮發黃牛三朝三暮黃牛如故華陽國志曰僰道縣有荔枝史記大宛傳曰大宛國有蒲萄酒夫人别離親戚關河重阻夷歌一曲未足消憂猿鳴三聲沾衣無巳言夫人與譙國公至蜀鄉關之思遂爾成疾也後漢南蠻傳曰閬中有渝水其人多居水左右天性徑勇初為漢前鋒數陷陳俗喜歌舞高祖觀之曰此武王伐紂之歌也乃命樂人習之所謂巴渝舞也夷歌即巴楯蠻夷歌也夫人在巴蜀聞此歌不足消憂矣袁嵩宜都記歌曰巴東三峽猿鳴悲猿鳴三聲淚沾衣是以夭厲之疾遂成沉痼玉瀝難開金膏實逺山海經曰少室之山其上多玉郭注此山巔亦有白玉膏服之即得仙道世人不能上也詩含神霧云又峚山有玉膏其源沸沸湯湯黃帝是饗是食玉瀝玉膏也穆天子傳曰河伯曰示汝黃金之膏建德元年七月九日薨於成都私第春秋二十有一即以其年十一月二十二日歸葬長安之北原詔贈譙國夫人禮也殿下神傷秋月掩淚長松周季直之留書更深冥漠潘安仁之詞藻徒增哀怨荀粲别傳曰粲婦病亡粲不明而神傷寡婦賦曰長松萋萋兮振柯周季直書未詳當亦傷妻之所作也潘嶽悼亡賦及哀永逝文皆傷妻之作嶽字安仁榮陽中牟人也豈直西河女子獨見銀臺東海婦人先逢金闕張衡思玄賦曰聘王母於銀臺注云王母西王母也銀臺仙人所居也按西王母居崑崙崑崙為河水之源在西其西河女子邪神仙傳麻姑謂王方平曰接待以來巳見東海三為桑田向到蓬萊水淺淺於往日會時略半也豈將復為陵陸乎方平笑曰聖人皆言海中復揚塵也按十洲記蓬萊與方丈瀛洲為三神山漢書郊祀志此三神山在渤海中黃金白銀為宫闕故蓬萊得稱金闕矣銘曰芟陵反斾椒山止戈金精據嶺昌閣凌波西遊卿相東裂山河華亭冠冕穀水絃歌言陸氏之先漢有陸賈吳有陸遜也芟陵反斾椒山止戈者言漢高弗伐南越魏帝不攻東吳也芟陵椒山未詳左氏傳曰止戈為武金精據嶺者言趙他自立為南越武王也天官星占太白金之精又月賦曰月以降靈亦曰金精金精月也按左傳鄢陵之戰呂錡夢射月中之退入於泥占之曰姬姓日也異姓月也時漢帝為尊日也南越為卑月也趙他王越為金精據嶺矣云據嶺者按史記索隱曰陽山嶺也又云南野大庾嶺三十里至橫浦有秦時關桂陽有陽山縣今此縣上流百餘里有騎田嶺當是陽山關昌閣疑閶闔謂吳也吳為水國故云凌波謂淩江建國也東裂山河華亭冠冕謂陸遜也時天下三分而吳都江東是為東裂八王故事曰華亭吳由拳縣郊外墅也西遊卿相穀水絃歌謂陸賈歸漢也漢都關中故云西遊史記曰陸賈楚人以客從高祖定天下使南越歸拜大中大夫以好畤田善可以家焉常安車駟馬從歌舞鼓琴瑟侍者十人寶劍直百金漢書地理志曰穀水出穀陽谷東北至穀城入洛震維徙族燕垂從宦塞入飛狐關連鳴雁策預登阜功參臨澗寶鼎留銘雕戈餘贊震維徙族燕垂從宦者謂載從宋武帝子義真至長安遂沒赫連也塞入飛狐至雕戈餘贊謂魏太武平赫連載仕魏政為驃騎將軍恆州刺史父通參謀機密有匡贊之功也如淳曰飛狐在代郡山海經曰雁門之山無草木郭注曰雁門山即北陵西隃雁之所出因以名云在高柳北皆恆州地也登阜臨澗謂周太祖與齊神武戰爭之日若廣武鴻溝也寶鼎留銘雕戈餘贊者漢書郊祀志曰美陽出鼎獻之中有刻書曰王命尸臣官此栒邑賜爾旗鸞黼黻雕戈尸臣再拜稽首曰敢對揚天子丕顯休命應圖淑令秉禮言歸魚軒馮軾澤雉文衣言夫人生而有令德也漢書藝文志有劉向列女傳頌圖詩曰言告言歸左氏傳曰歸夫人魚軒又子玉曰請君馮軾而觀之澤雉文衣謂翟服也周禮內司服云褘衣揄狄闕狄是也翟雉也明月照鏡仙石支機行雲細起回雪輕飛蜀王本紀曰武帝丈夫化為女子蜀王納以為妃無幾物故葬於成都郭中以石鏡一枚以表其墓荆楚歲時記曰張騫使大夏尋河源乘槎經月而至一處見織女取支機石與騫而還髙唐賦曰旦為朝雲暮為行雨洛神賦曰飄飄兮若流風之回雪北降帝子南麾蜀守若水既開靈山巳鏤月峽猿啼江神牛鬪帝子謂儉也蜀守謂儉為益州刺史也華陽國志曰旄牛在邛崍山表邛人自蜀入度此山甚險難南人毒之故名邛崍有鮮水若水一名州江劉淵林蜀都賦注曰靈關山名在成都西南漢夀界華陽國志有明月峽郡國志巴郡枳縣是杜預益州記曰二江者郫江流江也風俗通曰秦昭王使李氷為蜀守開成都縣兩江溉田萬頃神須取女二人以為婦氷自以為女與神婚徑至祠勸神酒酒杯淡淡因厲聲責之因忽不見良久有兩蒼牛鬪於江峰有間輒還流江謂官屬曰吾鬪疲極不當相助耶南向腰中正白者我綬也主簿刺殺北面者江神遂死星機北轉日轡西回陽泉伏氣陰律沉灰星機織女星也日轡日御也楚辭曰吾令羲和弭節兮注云羲和日御也史記律書曰十一月律中黃鍾陽氣踵黃泉而出也後漢書律厯志曰候氣之法為室三重加律其上以葭莩灰抑其內端案厯而候之氣至者灰去言葬時十一月也鶴辭吳市鳯去秦臺神光離合燈影徘徊吳越春秋曰吳王闔閭葬女於閶闔門外乃舞白鶴於吳市中令萬民隨而觀之還使男女與鶴俱入延門因機發以掩之殺生以送死列仙傳曰蕭史秦穆公時人善吹簫穆公有女號弄玉好之公遂以妻焉遂教弄玉作鳯鳴為作鳯凰臺夫婦止其上一旦隨鳯凰去洛神賦曰神光離合乍陰乍陽漢書曰李夫人卒上思念不已方士齊人少翁言能致其神乃夜張燈燭設帷帳陳酒肉而令上居他帳遙望好女如李夫人之貌還幄坐而步又不得就視上愈益相思悲感賦云何靈魂之紛紛兮哀徘徊以躊躇雙流反葬百兩回旌少女離位夫人去城蜀都賦曰帶二江之雙流雙流二江也言從雙流反葬也百兩車也詩曰百兩將之旌明旌也周易繫辭曰兌為少女漢書曰漢軍乘勝追北至范夫人城張宴曰范氏能詛胡者帷堂野設帳殿郊營山川竒事風月無情左氏傳曰聲巳不視帷堂而哭檀弓曰尸未毁飾故帷堂小斂而徹至大斂之節又帷堂以至於殯恆帷堂又云帷殯非古自敬薑之哭穆伯始也搖落丘隴荒涼封域樹樹秋聲山山寒色草短逾一作愈平松長轉直節墳方固園陵永植周趙國夫人紇豆陵氏墓志銘按紇豆陵氏趙國公宇文招之妻也武成元年正平公招為趙國公建德三年招封趙王建德元年天和之七年也夫人葬在七年時招方為公矣夫人諱含生本姓竇扶風平陵人周書竇熾傳云漢大鴻臚章十一世孫章子統靈帝時為雁門太守避竇武之難亡奔胸奴遂為部大人後魏南徙子孫因家於代賜姓紇豆陵氏纍世仕魏皆至大官魏其朝議列侯則莫敢抗禮漢書曰七國破封竇嬰為魏其侯遊士賔客爭歸之每朝議大事條侯魏其列侯莫敢與抗禮安豐奉圖功臣則咸推上席後漢書曰光武賜竇融以外戚屬圖及太史公五宗外戚世家魏其侯列傳後以功封安豐侯就諸侯位賞賜恩寵傾動師在功臣之右外戚列傳既聞建武之書光武即位建元為建武又竇融封建武男後漢書曰融為建武男融小心精詳每決策東向光武帝欲招之以逼囂述亦發使遺融書所以慰藉之甚備融既深知帝意乃與隗囂書責讓之與五郡太守共砥礪兵馬上書請師期帝深嘉美之乃賜融以外戚屬圖仲山古鼎或表單于之獻後漢書竇憲傳曰單于遺憲古鼎容五斗其傍銘曰仲山甫鼎其萬年子子孫孫永保用憲乃上之拜憲大將軍封武陽侯紇豆陵氏本出竇姓若仲山古鼎矣祖略少保建昌郡公周書云平逺將軍以熾勳贈少保柱國大將軍建昌公父織周書作熾柱國大將軍大宗伯鄧國公孟津大誓常預同德之臣咸陽違約克贊先登之主言北魏西遷熾有從駕之功也周書竇熾傳云帝與齊神武有隙以熾有威重堪處爪牙之任從帝西遷與高金龍戰於千秋門敗之因入宮城又大統元年復擒竇泰復𢎞農戰沙苑皆有功尚書武王伐殷師渡孟津作泰誓漢書高帝紀元年西入咸陽項羽引兵西屠咸陽使入還報懷王懷王曰如約羽曰懷王者吾家所立耳非有功伐何以得專主約是違約也並得位入六府功參八柄尚書曰六府金木水火土穀也周禮曰太宰以八柄詔王馭羣臣爵祿豫置生奪廢誅也夫人有文在手有象應圖左氏傳曰宋仲子生而有文在其手曰為魯夫人正義曰隸書起於秦末手文必非隸書石經古文魯作􅨞手文容或似之其文及夫人固當有似之者也劉向著列女傳頌圖榮曜夙彰徽華早茂肅恭以禮受教於公宮言容以德有聞於師氏詩曰言告師氏毛傳曰師女也古者女師教以婦德婦言婦容婦功及乎進賢君子內主邯鄲琴瑟在堂輜軿是服詩序曰卷耳后妃之志也又當輔佐君子求賢審官知臣下之勤勞內有進賢之志而無險詖私謁之心朝夕思念至於憂勤也邯鄲趙地言歸於趙國公也輜軿有擁蔽之車也列女傳曰齊孝公華孟姬謂公曰妾聞后妃踰國必乘安車輜軿長久於節不無秋菊之銘履端於始或有椒花之頌注見步陸孤氏志銘豈止莊姬掩口一作笑一作淚楚相知慙定薑問兆齊兵不入劉向列女傳曰楚姬者楚莊王之夫人也莊王即位好田獵樊姬諫不止乃不食禽獸之肉王改過勤於政事王嘗聽朝罷宴姬下殿迎曰何罷宴也得無飢倦乎王曰與賢者俱不知飢倦也姬曰王之所謂賢者何也曰虞丘子也姬掩口而笑王曰姬之所笑何也曰虞丘子賢則賢矣未忠也王曰何謂也對曰妾執巾櫛十一年遣人之鄭衛求美人進於王今賢於妾者二人同列者七人妾豈不欲擅王之寵愛乎妾聞堂上兼女所以觀人能也妾不能以私蔽公欲王多見知人能也妾聞虞丘子相楚十餘年所薦非子弟則族昆弟未聞進賢退不肖是蔽君而塞賢路知賢不進是不忠不知其賢是不知也妾之所笑不亦可乎王悅明日王以姬言告虞丘子丘子避席不知所對於是避舍使人迎孫叔敖而進之王以為令尹治楚三年而莊王以霸楚史書曰莊王之霸樊姬之力也左傳襄十年曰衛侯救宋師於襄牛鄭皇耳帥師侵衛孫文子追之獻兆於定薑薑氏問繇曰兆如山陵有夫出征而喪其雄薑氏曰征者喪雄禦寇之利也大夫圖之衛人追之孫蒯獲鄭皇耳於大丘武成二年册拜趙國公夫人漢王聞立義之婦邑以延鄉齊侯見有禮之妻封之石窖異代同榮差無慙德陳留風俗傳曰延丘者衛地也故燕之延鄉髙祖與項氏戰敗有翟母者免其難故以延鄉封焉左傳成三年鞍之戰齊侯見保者曰勉之齊師敗矣辟女子女子曰君免乎曰免矣曰鋭司徒免乎曰免矣曰茍君與吾父免矣可若何乃奔齊侯以為有禮既而問之辟司徒之妻也豫之石窖杜注石窖邑名濟北盧縣東有地名石窖柱國殿下居若木之一枝在天潢之别派言趙國公姓宇文出自國族也楚辭曰折若木以拂日史記天官書曰王良旁有八星絶漢曰天潢揚旌玉壘驅傳銅陵南通向日之民東被無龍之國周書趙王招傳云保定中拜為柱國出為益州總管華陽國志曰杜宇相開明決玉壘山以除水害揚雄蜀都賦曰西有鹽泉鐵冶橘林銅陵漢書地理志曰日南郡故秦象郡屬交州師古曰言其在日之南所謂開比户以向日者又比景縣如淳曰日中於頭上景在已下故名無龍疑無雷西域傳無雷國王治盧城東北至都護治所夫人從政月峽贊德雲門錦濯江波還臨織室出明石鏡即對粧樓華陽國志曰枳縣有明月峽蜀都賦曰決渠石以為雲門又華陽國志曰蜀郡西城故錦官也錦江織錦濯其中則鮮明濯他江則不好故命曰錦里也又曰武都有一丈夫化為女子美而艷蓋山精也蜀王納為妃不習水土欲去必欲留之乃為東平之歌以樂之無幾物故蜀王哀之乃遣五丁之武都擔土為妃作冢蓋地數畝高七丈上有石鏡今成都比角武擔是也既而玉律頻移金爐不變續漢書曰候氣之法殿中候用玉律十二惟二至乃候靈臺用竹律六十胡香四兩嗟西域之使稀靈草一株一作枝恨瓊田之路絶東方朔十洲記曰聚窟洲人烏山多大樹與楓木相類而花葉香聞數百里名為反魂樹扣其樹亦能自作聲聲如羣牛吼聞之者皆心驚神駭伐其木根心於玉釡中煮取汁更微火煎如黑餳狀令可丸之名曰驚精香或名震靈丸或名反生香或名震檀丸或名人鳥精或名却死香一種六名斯靈物也香氣聞數百里死者在地聞香氣乃却活不復亡也以香薰死人更加神驗征和三年武帝安定西胡月支國王遣使獻香四兩大如雀卵黑如桑椹帝以香非中國所有以付外庫後元元年長安城內病者數百亡者大半帝取月支神香燒之於城內其死未三日者皆活芳氣經三月不歇於是信知其神物也乃更祕録餘香後一旦又失之檢函封印如故無復香也帝愈懊恨恨不禮待於使者益貴方朔之遺語自愧求李君之不勤慙衛卿於階庭矣明年帝崩於五祚宮已亡月支國人烏山震檀却死香也向使厚待使者帝崩之時何緣不得靈香之用耶自合隕命矣又曰祖洲近在東海之中地方五百里去西岸七萬里上有不死之草草形如菰苖長三四尺人巳死三日者以草覆之皆當時活也服之令人長生昔秦始皇大宛中多枉死者橫道有鳥如烏狀銜此草覆死人面當時起坐而自活也有司聞奏秦始皇遣使者齎草以問北郭鬼谷先生先生云此草是東海祖洲上有不死之草生瓊田中或名為飬神芝其葉似菰苖不叢生一株可活一人始皇於是慨然言曰可採得否乃使使者徐福發童男童女五百人率攝樓船等入海尋祖洲遂不返福道大也字君房後亦得道也天和五年四月二十二日薨於成都之錦城春秋二十孫子荆之傷逝怨起秋風潘安仁之悼亡悲深長簟晉書曰孫楚字子荆太原中都人也楚除婦服作詩以示王濟濟曰未知文生於情情生於文覽之悽然增伉儷之重又曰潘嶽字安仁哀永逝文悼亡賦皆傷妻之詞也况復仙臺永别無復簫聲傅母長歸惟留琴曲仙臺即蕭史弄玉吹簫鳯臺事注見前篇列女傳曰傅母者齊女之傅母也女為衛莊公夫人號曰莊薑母諭之作詩曰碩人其頎衣錦絅衣齊侯之子衛侯之妻東宮之妹邢侯之姨談公維私厲女之心以高節女遂感而自修君子善傅母之防未然也按國風為絲聲碩人之詩為琴曲也七年二月日歸葬於長安之洪瀆原詔贈趙國夫人禮也雲雨去來既留連於楚后光陰離合實惆悵於陳王宋玉高唐賦曰楚襄王與宋玉遊於雲夢之臺望高堂之觀其上獨有雲氣所謂朝雲也陳王曹植也洛神賦曰神光離合乍陰乍陽銘曰河西斗絶觀津孤起章武賢臣安豐賢疑作貴仕後漢書曰竇融世任河西為吏又曰河西斗絶在羌胡中注斗峻絶也前書成山斗入海漢書外戚傳曰竇少君聞皇后新立家在觀津姓竇氏廣國去時雖少識其縣名及姓又嘗與姊採桑墮用為符信上書自陳皇后持之而泣乃厚賜之後封章武侯是孤起也廣國封章武侯融封安豐侯木樓千仞金山萬里紹慶邢姨基昌宋子後漢書竇固傳固與耿秉秦彭等絶漠六百餘里至三木樓山金山疑即金微山也後漢和帝紀曰耿夔圍北單于於金微山言竇氏亡奔胸奴也詩碩人云邢侯之姨毛傳曰妻之姊妹曰姨又衡門云豈其娶妻必宋之子箋云宋子姓施襟趙北侍母秦南紘綖禮數厭狄騑驂説文曰襟交衽也毛萇曰女施襟結帨施襟趙北謂聘於趙國也侍母秦南謂招為蜀州總管也魯語曰王后親織玄紞公侯之夫人加之以紘綖韋昭曰冕曰紘紘纓之無緌者也從下而上不結綖冕上之覆也鄭康成曰狄當為翟翟雉也毛詩傳曰車乘厭翟正義曰王后五路重翟為上厭翟次之義超江汜仁流葛覃玉筐迎燕金籠助蠶詩序曰江有汜美媵也鄭箋曰喻江水大汜水小然得並流似嫡媵宜俱行詩序曰葛覃后妃之本化天下以婦道也呂氏春秋曰有娀氏二女為九成之臺飲食以鼓帝命燕往視之鳴若隘隘二女愛而爭搏之覆以玉筐少選發而視之燕遺卵而北飛遂不返髙誘曰帝天也天命燕降卵於有娀氏女吞之生契也毛詩傳曰方曰筐圓曰筥釋烏云嶲周燕燕郭璞曰一名玄烏齊人呼鳦孫炎曰别三名舍人曰巂周名燕燕又名鳦孟子云禮曰夫人蠶繅以為衣服續漢書曰貴人助蠶玳瑁叉加簪珥此言采桑躬織也敬愛純深端莊淑問有光國史無形喜愠舉案外恭停機下訓馨馥於蘭年華於蕣續列女傳曰梁鴻妻每進食舉案齊眉不敢正視列女傳曰孟子之少也既學而歸孟母以刀斷其織曰子之廢學若吾斷斯織也孟子懼旦夕勤學不息師事子思遂成天下之名儒蘭香草也詩云有女同車顔如蕣華毛傳蕣木槿也釋草云椵木槿櫬木槿樊光曰别二名也其樹如李其華早生暮落與草同氣故在草中風雨消散神靈離絶婺女還星姮娥歸月漢書曰北宮有婺女星占曰婺女為既嫁之女也易歸藏曰昔姮娥以不死之藥奔月左楹夕奠高堂朝發空揚淩波更無回雪史記孔子曰夏人殯於東階周人於西階殷人於兩柱間昨暮豫夢坐奠兩柱之間繆熙伯挽歌朝發高堂上暮宿黃泉下洛神賦曰凌波微步羅襪生塵又云飄颻兮若流風之回雪下濕曰隰高平曰原爾雅文也西臨火井北望寒門猶垂雉服尚駕魚軒相如大人賦軼先驅於寒門應劭曰寒門北極之門也鄭康成周禮內司服褘衣褕狄闕狄注云狄當為翟雉名伊洛而南素質五色皆備文章曰翬江淮而南靑質五色皆備成章曰搖王后之服刻繒為之形而采畫之綴於衣以為文章褘衣畫翬者褕翟畫搖者闕翟刻而不畫此三者皆祭服從王祭先王則服褘衣祭先公則服揄翟祭羣小則服闕翟今世有圭衣者蓋三翟之遺俗又外內命婦之服注云三夫人及公之妻其闕狄以下乎侯伯之夫人揄狄子男之夫人亦闕狄惟二王後褘衣紇豆陵為國公之妻按古制當服闕翟矣杜預左傳注云魚軒夫人車以魚皮為飾平原匆矣天道何言山回地市路沒滕城辛氏三秦記曰驪山始皇陵作地市生死人交易市平不得欺死人獨異志曰漢夏侯嬰以功封滕公及死將葬未及墓引車馬踣地不前使人掘之得一石室室中有銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室遂改卜焉松悲鶴去草亂螢生新雲别起舊月孤明賢墳永式節隴常貞周安昌公夫人鄭氏墓志銘周書元偉傳大將軍納言小司空荆州總管安昌郡公元則隋志永安黃陂縣周安昌郡夫人諱某滎陽陽武人也周宣王之母弟俾侯於鄭鄭莊公之重世卿士於周以國為族自兹而始左傳僖二十四年曰鄭有平惠之勳又有厲宣之親杜注曰鄭始封之族桓公友周厲王之子宣王之母弟又隱三年曰鄭武公莊公為平王卿士杜注曰卿士王卿之執政者言父子秉周之政祖瓊太常恭侯周書云范陽郡守贈安東將軍靑州刺史父穆司空貞公周書列傳云鄭孝穆字道和滎陽開封人為少司空諡曰貞西京賦詩奉常參柏梁之宴東都言讖司空為武衛一作玄武之官漢書曰奉常秦官掌宗廟禮儀有丞景帝六年更名太常師古曰太常王者旌旗也畫日月焉王有大事則建以行禮官主奉持之故曰奉常也後改曰太常尊大之義也武帝元封三年作柏梁臺詔羣臣二千石有能為七言詩乃得上坐太常周建德云撞鐘伐鼓聲中詩袁宏後漢紀曰建武元年野王令王梁為大司空封武強侯初赤伏符曰王梁主衛作玄武上以野王衛徙也玄武水神也司空水土之官也乃以梁為大司空上云奉常謂祖瓊為太常也下云司空謂父穆為司空也籍連帝譜既同盤石門稱通德無廢儒林鄭孝穆傳云賜姓宇文氏是與周同譜也後漢書鄭玄傳曰髙密縣為玄特立一鄉曰鄭公鄉題其門號為通德門夫人禮義閨門端莊令淑采采芣苡萋萋葛覃毛詩傳曰芣苡馬舄馬舄車前宜懷妊焉郭璞曰今車前草大葉長穗好生道邉江東呼為蝦蟆衣陸璣疏云馬舄名車前一名當道喜在牛迹中生故曰車前當道也幽州人謂之牛舌草可鬻作茹大滑其子治婦人難産鄭箋曰葛延蔓於谷中喻女作父母之家形體浸浸日長大也葉萋萋然喻其容色美盛也及乎作配君子言事舅姑下氣怡聲承巾奉帚親戚惟禮閨闈以睦禮記內則曰以適父母舅姑之所及所下氣怡聲又曰進盥少者奉槃長者奉水請沃盥卒授巾鄭注云槃承盥水者中以帨手保定二年册拜滎陽郡君序戚升榮從夫有秩豈惟立義一作德之婦邑以延鄉有禮之妻封之石窖注見前篇紇豆陵氏志銘大將軍沉犀二江夫人聞猿三峽明月靈關之阻秋風蜀道之難言安昌公出鎮益州夫人偕行道路之難遂以疾卒也益州記曰伏犀灘東南二十里有黃魚道岸今在僰道縣界括地志曰二江並在益州成都縣界杜預益州記曰二江郫江流江袁嵩宜部記曰峽中猿鳴至清山谷傳其響泠泠不絶行者歌曰巴東三峽猿鳴悲猿鳴三聲淚沾衣華陽國志曰枳縣有明月峽蜀都賦曰廓靈關而為門劉逵注曰靈關山名在成都西南漢夀縣界水經注曰自蜀西至卭苲其至險有弄棟八渡之難楊母閣路之阻掩以瑶華先從春露楚辭曰折疏麻兮瑶華將以遺兮離居王逸注曰瑶華謂麻之白華也漢書李陵曰人生如朝露天和十八年五月二十日薨於成都春秋三十有六詔贈安昌國夫人禮也即以其年十一月十六日歸葬於咸陽之白起原遂使山回反壤先封節婦之陵日入虞淵實掩賢姬之墓檀弓國子高曰葬也者藏也藏也者欲人之弗得見也是故衣足以飾身棺周於衣椁周於棺土周於椁反壤樹之哉淮南子曰日至于虞淵是謂高舂嗚呼哀哉乃為銘曰天河開國分畿置政地有十城人居九命言鄭氏有國之始也史記鄭世家桓公問太史伯曰王室多故豫安逃死乎史伯曰獨洛之東土河濟之南可居地近虢鄶虢鄶之君貪而好利百姓不附今公為司徒皆愛公公誠居之虢鄶之君見公方用事輕分公地公誠居之虢鄶之民皆公之民也及王東徙其民洛東而虢鄶果獻十邑竟國之虞翻曰十邑謂虢鄶鄢蔽蒲丹依㽥厯華也博物志曰舊説云天河與海通天河開國謂鄭國都於河南豫州之地也周宣王母弟友封於畿內地理志京兆鄭縣是桓公之子武公與平王東遷洛邑遂伐虢鄶而并其地是為新鄭地理志河南新鄭是是分畿置政也其國在河洛之間故云天河言黃河之水與天通也十城謂十邑也人居九命者鄭國伯爵周禮曰九命作伯又按左傳䇿命晉侯為侯伯此九命作伯之伯特尊於侯異於五等之爵鄭伯未居九命在侯之下故魯以周班後鄭蓋借稱矣疇昔之邑今兹成性識履傳風參輿留慶史記韓哀侯滅鄭并其國鄭之子孫以國為氏漢書曰哀帝擢鄭崇為尚書僕射數求諫爭上每見曵革履笑曰我識鄭尚書履聲晉書曰武帝出祀南郊詔使鄭默驂乘三星在户百兩言歸三星在戶國風綢繆之詩毛傳曰參星正月中直户也鄭箋曰心星在戶謂之五月之末六月之中毛傳曰百兩百乘也諸侯之子嫁於諸侯送御皆百乘又詩曰言告言歸傳云言我也虔恭內政榮曜中闈承姑奉盥訓子停機內則曰進盥少者奉槃左氏傳曰懷嬴奉匜沃盥説文曰盥澡手也從臼水臨皿盥古緩反列女傳曰文伯退朝朝敬薑敬薑方績又孟子既學而歸孟母方績問曰學所至矣孟子曰自若也孟母以刀斷其織曰子之廢學若吾斷斯織也桑園蠶織錦室鸞飛珩璜節步藻火文衣詩云雜佩以贈之毛萇曰珩璜琚瑀衝牙之類釋文珩音衡佩上玉也半璧曰璜孔安國曰藻水草有文者火為火字杜預曰火畫火也巴女幽咽猿鳴斷絶月落珠傷春枯桂折巴水猿鳴注見本序呂氏春秋曰月望則蚌蛤實羣陰盈月晦則蚌蛤虛羣陰缺漢武帝悼李夫人賦曰桂枝落而銷亡趙琴長辭秦簫永别貞姬掩隧節女封墳趙琴疑即趙瑟楊惲報孫會宗書婦趙女也雅善鼓瑟琴瑟通稱矣左氏傳曰晉侯請隧杜注云闕地通路曰隧王之葬禮也正義曰隱元年傳闕地及泉隧而相見是闕地通路曰隧也禮記鄭注曰封謂聚土為墳洛濵無月荆臺失雲鳥悲傷聽松聲愴聞千年遂古百代餘芬洛濵無月者曹植洛神賦曰流盻乎洛川又云髣佛兮若輕雲之蔽月荆臺失雲者宋玉高唐賦曰楚襄王遊雲夢也之臺玉對曰所謂朝雲者周大將軍隴東郡公侯莫陳君夫人竇氏墓志銘夫人諱某扶風平陵人也章武開國名高外戚之右安豐入朝位在功臣之上漢書曰竇后弟廣國字少君為退讓君子不以富貴驕人文帝崩景帝立皇后為皇太后乃封廣國為章武侯後漢書曰寶融封安豐侯賞賜恩寵傾動京師在功臣之右祖以孝昌之始主諾淮陽父以正光之初褰帷海岱孝昌正光魏明帝年號魏孝昌元年梁之普通六年也魏正光元年梁之普通元年也後漢書曰汝南太守范孟博南陽宗資惟畫諾又褰帷賈琮事禹貢海岱惟靑州夫人生於禮義之門宗於針誡之德張華作女史針曹大家作女誡虔恭惟禮令淑惟儀及乎百兩言歸三星在戶針盥始事條枚是則有子從政猶無逸豫之心有夫出征自識山陵之兆國語曰公父丈伯退朝朝其母其母方績文伯曰以歜之家而主猶績懼干季孫之怒也其以歜為不能事主乎其母嘆曰魯其亡乎使童子備官而未之聞耶昔聖王之處民也擇瘠土而處之勞其民而用之故長王天下夫民勞則思思則善心生逸則淫淫則惡心生沃土之民不材淫也瘠土之民莫不嚮義勞也列女傳曰鄭皇耳帥師侵衛孫文子卜追之獻兆於定薑曰兆如山林有夫出征而喪其雄定薑曰征者喪雄禦寇之利也大夫圖之衛人追之獲鄭皇耳於大丘君子謂定薑逹於事情事出左傳大統十六年册授永安郡君婦以夫尊親由子貴朝章家慶一作成家之慶兼而有之保定二年改授隴國夫人車服禮數袿褵典則有美河魴足光彤史車服所謂五路六服也方言曰袿謂之裾釋名曰婦人上服謂之袿詩云親結其褵爾雅婦人之褘謂之褵褵緌也郭注曰即今之香纓也褘邪交落帶繫於體因名為褘緌繫也詩衡門云豈其食魚必河之魴豈其娶妻必齊之薑靜女之詩云貽我彤管毛傳曰古者后夫人必有女史彤管之法既而風霜所及一作厲灰琯遂侵與善何言至於大漸天和六年四月七日薨春秋六十有六即以其年十月十日遷葬於咸陽萬年縣之杜原一作咸陽若安原山形起伏既符白鶴之祥地勢風煙乃合靑烏之氣陶侃别傳曰侃丁母憂在墓下忽有二客來弔不哭退羽儀鮮異知非常人遣隨視之但見雙鶴沖天而去按相冡書有靑烏子後漢書王景傳曰冡宅禁忌注云送葬造宅之法若黃帝靑烏之書也銘曰觀津世族平陵豪姓四侯登仕三君從政漢書外戚傳曰竇皇后親蚤卒葬觀津又竇嬰傳曰父世觀津人也地理志觀津屬信都國師古曰觀音工喚及後漢書曰竇融扶風平陵人也四侯謂竇氏之先竇嬰為魏其侯長君子南皮侯少君為章武侯竇融為安豐侯也三君按竇融傳曰竇氏一公兩侯注云一公大司馬也兩侯安豐顯親也疑此三君矣依本序文當稱竇融又按竇氏亦有稱三君者後漢書黨錮傳曰指天下名士為之稱號上曰三君竇武劉淑陳蕃為三君君者一世之所宗也竇武字遊平扶風平陵人安豐戴侯融之玄孫也又疑作二君漢書曰竇后兄長君弟廣國字少君崔駰曰竇氏二君以淳淑守道成名白狼建功丹蛇襲慶漢之廣矣先聞淑令言祖父有功魏室復生此令淑之女也漢書地理志古北平郡有白狼縣師古曰有白狼山故以名縣陳留風俗傳曰沛公起兵野丘野野戰喪皇妣於黃鄉天下平乃使使者梓宮招魂幽野有丹蛇在水自洗濯入於梓宮其浴處仍有遺髮故諡曰昭靈夫人或竇氏亦神元皇后之族耶詩序曰漢廣德廣所及無思犯禮求而不可得也詩云漢之廣矣不可泳思君子朝端賢才家政簪珥以禮軒車以命君子謂侯莫陳君也賢才謂夫人也列女傳曰周宣薑后賢而有德事非禮不言行非禮不動宣王常早卧宴起薑后脫簪珥待罪於永巷王勤於政事早朝宴退服虔曰車有藩曰軒按以命言有命數讓果成廉推珠止競孔融家傳曰兄弟七人融第六幼有自然之性年四歲時與諸兄共食梨融輒引小者大人問其故答曰我小兒法當取小者由是宗族竒之列女傳曰珠崖令卒於官妻送喪漢法內珠入關者死妻棄其係臂珠前妻子初九歲好而取之置其母鏡奩中母不知也至關吏搜索得珠劾問誰當坐者初曰我當坐繼母請曰幸無劾兒誠不知也妾當坐初又曰夫人哀初之孤欲以活初耳因號泣傍人莫不酸鼻隕涕關吏執筆不能就一字乃棄珠遣之二語謂夫人訓子女成禮也百年超忽千金莫恃室謝賢夫庭辭貴子歸鞍輟露采蘩廢祀室委眠蠶衣留畫雉畫雉謂翟服也翟雉也又疑為車衣喪大記所謂振容是也釋云謂于竹池之內畫搖雉于絞繒之上垂之于下車行振動以為容儀也雲垂下澤日掩高舂空帷舊館虛幕新封淮南子曰八澤之雲是雨九州淮南子曰日至虞淵是謂髙舂至于連日是謂下舂檀弓曰孔子之衛遇舊館人之喪入而哭之哀使子貢説驂而賻之山回廣柳路沒深松遊魂幾變大人何從周易曰遊魂為變漢書張博曰王遇大人益解注謂母也周冠軍公夫人烏石蘭氏墓志銘漢書冠軍屬南陽郡魏書官氏志云嗢石蘭氏後改為石氏夫人諱某樂陵人也晉司徒樂陵公苞後子孫就封因即家焉烏石蘭氏其先本姓石氏晉石仲容之後也晉書曰石苞字仲容渤海南皮人也武帝踐阼拜大司馬進封樂陵郡公扶風舊城猶存鐵市河陽故墅尚餘金谷世語曰初青龍中石苞鬻鐵於長安得見司馬宣王宣王知焉後擢為尚書郎厯青州刺史鎮東將軍晉書曰苞有六子少子崇崇有别館在河陽之金谷一名梓澤送者傾都帳飲於此焉或寓燕郵仍仕代郡祖行代郡尹父魏司空蘭陵郡公司空佐命魏朝少傅丞凝周室並為大族俱蒙賜姓秦晉匹也是曰通家司空謂穆亮太傅謂于謹魏官氏志太和十九年詔令司空穆亮等詳定北人姓於是升降區别矣周書孝閔踐阼于謹遷太傅魏恭帝元年謹平江陵以諸將功高者為三十六國後次功為九十九姓後言烏石蘭兩定大姓歸宇文連婚帝族也夫人年十七歸於宇文氏淑令端莊含章貞吉坤卦爻辭針盥惟儀閨闈已正某年除金鄉郡君某年改授冠軍夫人四德小君宜其家室三事內主翻辭贊務毛詩傳曰四德婦德婦言婦容婦功也論語曰夫人自稱曰寡小君尚書曰三事大夫敬爾有官按左傳大夫稱主如范宣子撫荀偃曰事吳敢不如事主醫和謂趙文子曰主是謂矣如此之類其文多矣列女傳曰敬薑力績文伯曰以歜之家而主猶績懼干季孫之怒其以歜為不能事主乎是婦人亦稱主大夫之妻為內主矣以保定五年四月遘疾薨時四十有四即以其年某月日歸葬於京兆之某原人世風煙山川超忽淩波疑作陵陂青麥儻逢貞女之墳隴首白楊或表賢姬之墓莊子曰青青之麥生陵之陂生不布施死何含珠古詩曰驅車上東門遙望北郭墓白楊何蕭蕭松柏夾廣路下有陳死人杳杳即長暮潛寐黃泉下千載永不寤本草曰白楊北土極多人種虛墓間樹大皮白乃為銘曰三星麗天五嶽鎮地禮有其秩人居其位燕趙多竒山川雄氣詩曰三星在户爾雅曰河南華河西嶽河東岱河北恆江南衡是也周禮鄭注曰鎮名山安地德者也又為五嶽言天有三星地有五嶽公侯夫人居其秩位也燕趙言其世寓燕郵或仕代郡得山川之雄也代趙地也挺兹令淑惟此含章玉生庭照蘭開室香邢姨褧服宋子河魴言夫人生而令德也周易曰含章可貞晉書曰謝安嘗戒約子姪曰子姪亦何豫人事而正欲使其佳玄答曰譬如芝蘭玉樹欲其生於庭階耳詩碩人云碩人其頎衣錦褧衣又云邢侯之姨毛傳曰夫人德盛而尊嫁則錦衣加褧襜鄭箋曰褧襌也國君夫人翟衣而嫁今衣錦者在塗之所服也尚之以禪衣為其文之太著玉藻云襌為絅釋文褧説文作褮枲屬也詩衡門云豈其娶妻必宋之子又云豈其食魚必河之魴鄭箋云宋子姓爾雅曰魴魾郭璞注云江東呼魴魚為鯿一名魾陸璣云魴今伊洛濟潁魴魚也廣而薄肥恬而少肉細鱗魚之美者遼東梁水魴特肥而厚尤美於中國魴故其鄉語曰居就糧梁水魴是也魴音房魾音毗百兩言歸九儀從聘褕狄七采軒車六命鼎室辭親槐庭贊政言夫人嫁於宇文為命婦也毛傳曰諸侯之女嫁於諸侯送御皆百乘百兩百乘也周禮王后六服有褘衣揄狄闕狄鄭注曰狄當為翟翟雉名又外內命婦之服注云侯伯之夫人揄翟服虔曰車有藩曰軒左氏傳曰晉將嫁女於吳齊侯使析歸父媵之以藩載欒盈及其士杜預云藩車之有障蔽者衛風碩人云翟茀以朝毛傳曰夫人以翟羽飾車茀蔽也疏云婦人乘車不露見車之前後設障以自隱蔽謂之茀因以翟羽為之飾此云軒車六命蓋重翟厭翟之類有命數也鼎室辭親謂辭烏石蘭氏槐庭贊政謂贊宇文氏也夫人為蘭陵公女復為冠軍公妻三公調和鼎鼐故云鼎室三槐三公位馬故云槐庭世為閲水人成大夢回帳山門移燈泉洞金棗長含銀蠶永送陸機歎逝賦曰川閲水以成川莊子曰大覺而後知其大夢也按山門墓門黃圖曰陵冢為山謝莊武宣貴妃誄曰重扄閟兮燈已黯中泉寂兮此夜深抱朴子曰吳景帝時戍將於廣陵掘諸冢取版以治城發一大冢從死人懷中透出墮地兩耳及鼻孔中皆有黃金如棗許大此則骸骨有假物而不朽之效也蜀本紀曰始皇陵有銀蠶金雀香填柏槨路閉松城悲鸞獨景雄劍孤鳴留連趙琴疑作瑟悽愴秦笙左氏傳曰范獻子去魏獻子柏槨松城即夏侯嬰墓銘所謂佳城鬱鬱是也見西京雜記范泰鸞鳥詩序曰昔罽賔國結罝峻卯之山獲一鸞鳥王甚愛之三年不鳴其夫人曰嘗聞鳥見其類而後鳴何不縣鏡以映之王從其言鸞睹影悲鳴沖霄一奮而絶吳越春秋名劍二枚一曰干將二曰莫邪莫邪干將之妻也趙琴疑作趙瑟漢書楊惲報孫會宗書曰婦趙女也雅善鼓瑟秦笙即蕭史吹簫事笙簫通稱矣周太傅鄭國公夫人鄭氏墓志銘太傅鄭國公夫人達奚武之妻也周明帝武成元年以高陽公達奚武為鄭國公武帝天和三年以太保鄭國公達奚武為太傅夫人諱某滎陽開封縣逺里人也七子賦詩足光賔客三卿從政實靜諸侯序鄭氏之先本鄭國也左傳襄二十七年曰鄭伯享趙孟於垂隴子展伯有子西子産子太叔二子石從趙孟曰七子從君以寵武也請皆賦以卒君貺武亦以觀七子之志子展賦草蟲伯有賦鶉之賁賁子西賦黍苖之四章子産賦隰桑子太叔賦野有蔓草印段賦蟋蟀公孫段賦桑扈卒享文子告叔向曰伯有將為戮矣其餘皆數世之主也子展其後亡者也在上不忘降印氏其次也樂而不荒樂以安民不淫以使之後亡不亦可乎又僖七年管仲曰鄭有叔詹堵叔師叔三良為政未可間也驂乘則晉后停輿來朝則漢君識履華胄蟬聨無虛史籍晉書曰武帝出祀南郊詔使鄭默驂乘漢書曰鄭崇為尚書僕射每見曳輩履上笑曰我識鄭尚書履聲祖那秦州别駕父茂伯撫軍將軍涼州刺史伯陽縣侯夫人令淑早聞芝蘭獨茂既容既德言告言歸毛詩曰言告師氏言告言歸傳曰古者女師教以婦德婦言婦容婦功悌實溫凊恭惟針盥禮記曰冬溫而夏凊內則曰右佩針管線纊管字或作盥太傅弼諧周室股肱攸寄太傅逹奚武也周書列傳云逹奚武字成興代人也少倜儻好馳馬為賀拔嶽所知及嶽為侯莫陳悅所害武收嶽尸歸平涼同翊戴太祖從平悅齊神武與竇泰高敖曹三道來侵從太祖擒竇泰斬高敖曹進位大將軍平劍比振旅還京師齊將高茍子攻新城武邀擊之悉虜其衆孝閔踐阼拜柱國大司冦武成初進封鄭國公天和三年轉太傅夫人輔佐君子勤勞是司琴瑟既友條枚無伐故得用之邦國成之孝敬卷耳詩序云又當輔佐君子求賢審官知臣下之勤勞關雎詩云琴瑟友之汝墳詩云伐其條枚關雎詩序曰關睢后妃之德也風之始也所以風天下而正夫婦也故用之鄉人焉用之邦國焉又云先王以是經夫婦成孝敬某年月日封鄭國夫人當是武成元年褕翟既加紘綖是務周禮鄭注曰翟雉名侯伯之夫人褕翟左氏傳曰衡紞紘綖杜預注曰紘纓從下而上者綖冠上覆疏云魯語稱公侯夫人織紘綖知紘亦織而為之綖冠上覆者冕以木為幹以元布衣其上謂之綖論語尚書皆云麻冕知其當用布也孔安國論語注曰言績麻三十升以為冕即是綖也夫集有人字今衍有安世之貴躬服浣濯子有文伯之尊無忘機杼漢書曰張安世尊為公侯食邑萬户然身衣弋綈夫人自紡績家僮七百人皆有手技作事內治産業纍積纎微是以能殖其貨富於大將軍光詩序云服浣濯之衣列女傳曰魯季敬薑者莒女也號戴已魯大夫公父穆伯之妻文伯之母博逹知禮文伯退朝朝敬薑敬薑方績文伯曰以歜之家而主猶績懼干季孫之怒其以歜為不能事主乎敬薑嘆曰魯其亡乎使童子備官而未之聞也男女效績否有辟古之制也仲尼曰季氏之婦不淫矣婦人以織紝為事休之非禮也表裏惟安閨闈且正醫門有疾對藥無徵天和三年三月二十日薨葬於長安之石安原世子某兄弟並朂慈訓咸遵母儀霜露深悲寒泉增慟銘曰居德圃田當官教府置騎賔來開黌學聚左傳定四年祝鮀曰封畛土略自武父以南及圃田之北竟杜預曰圃田鄭藪名爾雅釋地十藪鄭有圃田郭璞曰今滎陽中牟縣西圃田澤是也衛之南竟至此澤畔漢書曰鄭當時為太子舍人每五日洗沐常置驛馬長安諸郊請謝賔客夜以繼日至明旦常恐不遍開黌學聚謂鄭康成通德門也黌學舍也福履家室賢才踵武棠棣之華螽斯之羽此棠棣之華蓋引召南與小雅常棣異鄭箋曰喻王姬顔色之美盛爾雅釋文舍人曰唐棣一名栘郭璞曰今白栘也似白楊江東呼夫栘詩序曰螽斯后妃子孫衆多也言若螽斯不妒忌則子孫衆多也毛傳曰螽斯蚣蝑也爾雅曰螽螽蚣蝑郭注云蚣䗥也俗呼為蝽􅀈人倫七德風化二南采采芣苡萋萋葛覃七德注已見然此七德謂婦德有七也二南謂周南召南也又劉向列女賢明傳曰周南大夫之妻能匡夫貞順傳召南中人之女得婦道之儀以絶無禮之求防淫欲之行焉毛詩傳曰采采非一辭也芣苡馬舄車前也宜懷妊焉采取也覃延也葛所以為絺綌女功之事繁縟者萋萋茂盛貌節行聲玉副加一作笄珈篸柳園秉杼桑津浴蠶詩衛風云佩玉之儺毛傳儺行有節度也鄭風云佩玉瓊琚疏云言其玉聲和諧行步中節也鄘風云副笄六珈毛傳副者后夫人之首飾編髮為之笄衡笄也珈笄飾之最盛者所以别尊鄭箋珈之言加也副既笄而加飾如今步搖上飾古之制所未聞郡國志河東平陽北屈有采桑津蠶書曰月當大火則浴其蠶春秋超忽零落無一作非時家亡淑女國喪賢姬香墳永送舞鶴長辭列仙傳曰鈎弋夫人殯尸不冷而香一廬月間後昭帝即位更葬之越絶書曰闔子女冢在閶門外道北下方池廣四十八步水深二丈五尺池廣六十步水深丈五寸隧出廟路以南通姑胥門並周六里舞鶴吳市殺生以送死山深月暗風急松悲千年開閉將驗靈龜周禮龜人云天龜曰靈屬又云若有祭事則奉龜以往旅亦如之喪亦如之後魏驃騎將軍荆州刺史賀拔夫人元氏墓志銘賀拔夫人疑即賀拔勝之妻也周書傳曰賀拔勝神武尖山人孝武帝時進位驃騎大將軍開府儀同三司荆州刺史按勝以魏大統十年薨猶魏時人故稱後魏在河之洲聞君子之配德言采其蕨一作薄言采蕨見夫人之有禮用之風化人倫厚焉在河之洲君子好逑皆關雎首章之辭草蟲之詩云陟彼南山言采其蕨傳云蕨鱉也箋云言我也我采者在塗而見采鱉菜者得其所欲得猶已今之行者欲得禮以自喻也詩序大夫妻能以禮自防也草木疏云周秦曰蕨齊魯曰鱉本又作鱉俗云其初生似鱉腳故名焉關雎詩序云上以風化下又云厚人倫美教化移風俗夫人諱安字大羅河南洛陽人也祖某京兆康王元氏後魏宗室本姓拓跋氏居代孝文太和十九年遷洛陽二十年改為元氏故夫人姓元氏為河南洛陽人也按魏書元昭之祖素諡曰康素子陪斤康王當是夫人曾祖父昭驃騎大將軍開府儀同三司録尚書司州牧汝陽郡王魏書云陪斤子昭入為尚書號征西將軍卒贈尚書左僕射隋志河南郡汝陽後魏置司州跗蕚雄圖階基霸迹詩小雅棠棣之華卾不韡韡鄭箋承華者卾不當作拊拊鄂足也卾足得華之光明則韡韡然盛拊亦作跗按詩序棠棣燕兄弟今元氏本魏宗室故云公卿之室將相維家一作維國夫人能修法度無思犯禮恭儉節用憂在進賢采蘋詩序云采蘋大夫妻能循法度也漢廣詩序云無思犯禮求而不可得也葛覃詩序云恭儉節用服浣濯之衣關雎詩序云關雎樂得淑女以配君子憂進賢不淫其色哀窈窕而無傷善之心焉大統五年封安樂公主隋志北海郡博昌縣舊曰樂安歸於賀拔氏時年十三思事憂勤化成婦德彤管載暉棠棣早茂靜女詩箋云彤管赤筆管也棠棣注見前篇及乎謳歌有歸褕翟降等輔佐君子猶安其室謂周受魏禪時也按周禮王后六服褘衣為上褕翟次之言夫人本故魏公主受禪之後為降等也孝閔踐阼子仲華襲爵琅邪公是猶安其室也周天和元年乃封章武郡君章武本漢竇廣國所封郡國志屬渤海郡章懷太子注云在滄州魯縣霜露不居風煙飄忽遘疾纍旬奄捐館舍以周天和四年二月二十六日薨於長安萬年里春秋五十有二詔贈頓正疑作丘國夫人禮也地理志頓丘屬東郡即以其年三月二十日歸葬於咸陽之石安原既異乘鸞翻然永去雖非舞鶴即掩泉門列女傳曰蕭史㺯玉一旦乘鳯凰飛去鸞鳯通稱故云乘鸞吳越春秋曰吳王有女滕玉因謀伐楚與夫人及女會蒸魚王前嘗半而與女女怒曰王食魚辱我不忘久生乃自殺闔閭痛之葬於國西閶門外鑿池積土文石為椁題湊為中金鼎玉杯銀樽珠襦之寶皆以送女乃舞白鶴於吳市中令萬民隨而觀之還使男女與鶴俱入羡門因發機以掩之殺生以送死國人非之湛盧之劍惡其無道而如楚矣泉門墓門即所謂羡門也欲志佳城佳城鬱鬱滕成公墓石函之詞也注見前篇乃為銘曰逖矣雄謀悠哉霸轍九服潛運三川中竭卿相連鑣賢才舞疑作無絶言元氏起家荒服後魏之興世為卿相也逖矣悠哉言其逺也周禮九服一侯服二甸服三男服四采服五衛服六蠻服七夷服八鎮服九藩服國語曰幽王三年西周三川皆震伯陽父曰夫國必依山川山崩川竭亡之徵也琬琰令淑施袊結褵方之棠棣譬以螽斯既全婦德還稱母儀楚辭曰懷琬琰以為心説文曰襟交衽也詩云親結其褵毛萇曰䄜婦人之褘也女施襟結縭爾雅曰褵緌也郭璞曰即今之香纓也召南云唐棣之華陸璣曰粵李也一名雀梅一名車下李所在山皆有其華或白或赤六月中熟大如李子可食爾雅疏曰蜇螽周南作螽斯七月作斯螽一名蚣蝑一名蝽􅡂陸璣云幽州人謂之蝽箕蝗類也長而青長角長股股鳴者也或謂似蝗而小斑黑其股似玳瑁又五月中以兩股相切作聲聞數十步者是也婦德四德之首也劉向列女傳首篇有母儀傳逝一作遊水滔滔危途冉冉問藥無對蒸丹不驗狄服空陳絃機虛掩言夫人以疾卒也楚辭曰波滔滔兮來迎又曰老冉冉兮既極狄服周禮褕狄闕狄之類鄭注作翟雉名郭門路轉哀挽途窮隴深結霧松高聚風春蘭秋菊惟始惟終周大都督陽林伯長孫瑕夫人羅氏墓志銘按夫人本姓叱羅氏叱羅協之女也周書魏恭帝三年太祖徵協入朝論蜀中事乃賜姓宇文氏協既受晉公護冀得婚連帝室乃求復舊姓叱羅氏高祖許之此云羅氏省文也夫人諱某恆州代郡太平縣人祖某父協周大將軍南陽郡公周書叱羅協傳云建德三年高祖以協宿齒授儀同三司賜爵南陽郡公夫人資於事親躬奉訓誡教於宗室足聞詩禮及乎言歸肅恭如事蘋藻維敬紘綖是勤內位克諧中閨以睦年齡不競霜露先侵更無延壽之杯遂闕長主之枕漢書曰新垣平使人獻玉杯刻曰主人延壽神仙傳曰漢光武東巡見太山老父鋤于道頭上白光高數尺呼問之對曰昨有一道士教臣作神枕枕有三十二竅二十四以應二十四氣八竅應八風臣用之轉少齒生以周天和四年二月八日薨於長安之洪固鄉時年二十有三某年某月日葬於萬年縣之壽里山非宋國翻為節女之陵地異荆臺遂有賢妃之墓劉向列女傳曰伯姬者魯宣公之女成公之妹也伯姬嫁於宋恭公十年恭公卒伯姬寡至景公時伯姬常遇夜失火左右曰夫人少避火伯姬曰婦人之義保傅不俱夜不下堂待保傅來也越義而生不如守義而死遂逮於火而死春秋詳録其事為賢伯姬諸侯聞之莫不悼痛以為死者不可復生財物猶可復故相與會於澶淵償宋之所喪春秋善之又曰楚昭越姬者越王句踐之女楚昭王之姬也昭王燕遊蔡姬在左越姬在右王親乘駟以逐遂登附社之臺以望雲夢之囿顧謂二姬曰吾願與子生若此死薨若此蔡姬曰願生俱樂死同時王顧謂史書之復謂越姬越姬對曰昔者吾先君莊王淫樂三年不聼政事終而能改卒霸天下妾以君王為能法吾先君將改斯樂而勤於政也今則不然而要婢子以死其可得乎妾聞之諸姑婦人以死彰君之義王益君之寵不聞其茍以暗死為榮妾不敢聞命於是寤敬越姬之言而猶親嬖蔡姬也居二十五年王救陳越姬從王病在軍中有赤雲夾日如飛鳥王問周史史曰是害王身然可移於將相將相聞之將請以身禱於神王曰將相之於孤猶股肱也今移禍焉庸為去是身乎越姬曰大哉君王之德以是妾願從王矣昔日之遊燕樂也是以不敢許及君王復於禮國人皆將為君王死而况於妾乎請願先驅狐狸於地下王曰昔之遊樂吾戲耳若將必死是彰孤之不德也越姬曰昔者妾雖口不言心既許之矣妾死王之義不死王之好也遂自殺王薨於車中蔡姬竟不能死惠王立然後罷兵歸葬昭王君子謂越姬信能死義銘曰畢狼建國靈武開都地接天柱山臨寶符人資義烈世襲雄圖史記天官書曰畢昴間為天街其陰陰國其東有大星曰狼漢書地理志曰趙地昴畢之分野北地郡有靈武縣言北魏之先開基於此也云地接天柱者按天柱有二其一是崑崙山名神異經曰崑崙之山有銅柱焉其高入天所謂天柱也圍三千里周圓如削其一是漢武帝以後南嶽霍山之名爾雅曰霍山為南嶽郭注云即天柱山潛水所出也疏云上云江南衡地理志云衡山在長沙湘南縣南張楫廣雅云天柱謂之霍山地理志云天柱在廬江潛縣則在江北矣本衡山一名霍山漢武帝以衡山遼曠移嶽神於天柱又名天柱亦為霍故漢以來衡霍别矣按此趙地亦有霍山無天柱之名與彼為異周禮冀州其山鎮曰霍山史記曰霍太山陽侯天吏地理志云河東郡彘縣霍太山在東不得以趙地之霍山引廬江之天柱疑云西接崑崙為崑崙之天柱矣山臨寶符者謂恆山也史記趙簡子謂諸子曰吾藏寶符於恆山中往得者立為後諸子皆競往無所得無恤曰恆山臨代代可取也簡子曰是知符矣遂立之言恆山代郡之地世有雄才也葛覃維萋棠棣早盛巳見既安淑德爰從配命四教𢎞宣三星克正注巳見霜凋桂苑風落芝田三從闕性五福傷年謝莊月賦曰清蘭路肅桂苑王子年拾遺記曰崑崙第九層山形漸小狹下有芝田蕙圃皆數百頃羣仙種耨焉列女傳母師曰婦人有三從之義而無專制之行少繫父母長繫于夫老繫于子歸安永絶言告長捐悽切郊野紆回隰原歸安歸寧也詩歸寧父母又曰言告言歸爾雅曰邑外謂之郊郊外謂之牧牧外謂之野下濕曰隰廣平曰原公羊傳云下平曰隰風慘雲愁松悲露泣朗月空嗟傷神何及世説曰荀奉倩與婦至篤婦亡奉倩後少時亦卒劉孝標注云粲别傳曰粲常以婦人才智不足論自宜以色為主驃騎將軍曹洪女有色粲於是聘焉容服帷帳甚麗專房燕婉後婦病亡未殯傅嘏往唁粲粲不言而神傷嘏問曰婦人才色並茂為難子遺才存色非難遇也何哀之甚粲曰佳人難再得顧逝者不能有傾城之異然未可易遇也悲悼不能巳己歲餘亦亡亡年二十九周儀同松滋公拓跋競夫人尉遲氏墓志銘魏書宗室傳曰高涼王孤平文皇帝之第四子也孤孫度道武初賜爵松滋侯仍得世襲競或其後也隋書地理志云南郡松滋縣江左舊置河東郡夫人諱某河南洛陽人也本代人其先魏之别種號尉遲部因而姓焉從魏入洛為洛陽人祖某父大師柱國公夫人疑即尉遲迥女也祖俟夔父迥周本紀云武帝建德元年以太傅蜀國公尉遲迥為太師魏室喪亂經綸夷阻周朝建國匡翊揖讓按周書迥從太祖復𢎞農戰沙苑皆有功孝閔踐阼進位柱國大將軍封寧蜀公魏室喪亂謂高歡入洛孝武西遷也周祖周太祖也揖讓周受魏禪也圖牒帝系即有內外之親分裂山河仍為舅甥之國迥傳云父俟夔尚太祖姊昌樂大公主生迥迥尚魏文帝女金明公主拜駙馬都尉以平蜀功封一子為公自劍閣以南得承制封拜及黜陟又迥曰吾居將相與國舅甥夫人容範端莊儀型淑令六義觀德南風有夫人之詩八卦成形東方有少女之位詩序曰詩有六義一曰風二曰賦三曰比四曰興五曰雅六曰頌國風召南鵲巢以下皆言夫人是南風夫人之詩也易卦傳曰兑三索而得女故謂少女巽為長女居東南兑為少女居正秋在西方矣姆母習言公宮教業針盥線纊佩帨茝蘭內則曰婦事舅姑左佩紛帨刀礪小觿金燧右佩針管線纊施縏􅐆大觿木燧鄭注云縏小囊也言施明為針管線纊有之按管與盥同年十有二適儀同拓跋競衣其翟服既得宗婦之儀乘其魚軒還從列國之禮拓跋氏鮮卑索頭部稱代改為魏至孝文改元氏拓跋競魏之支屬也毛詩傳曰車乘厭翟服則褕翟翟雉也宗婦同宗之婦也拓跋競為魏宗室故夫人為宗婦矣左傳閔二年曰歸夫人魚軒正義曰陸璣義疏曰魚獸似豬東海有之其皮背上有斑文腹下有純靑今人以為弓鞬步矢者也其夫雖乾燥為弓鞬矢服經年海水將潮及天陰毛皆起水潮還及晴則毛復如故雖在數千里外可以知海水之潮自相感也摽梅三實無闕其時夭桃九華能修其政詩序曰摽有梅男女及時也詩云摽有梅其實三兮求我庶士逮其今兮箋云此夏鄉晚梅之墮落差多在者餘三耳詩序桃夭后妃之所致也不妒忌則男女以正婚姻以時國無鰥民也詩云桃之夭夭毛傳曰夭夭其少壯也某年某月册拜回洛縣君回落疑即万俟洛營齊神武以其地名回洛城矣母金明公主魏文帝長女春則帝女採桑秋則王姬築館山海經曰宣水淪水出焉其上有桑大五十尺其枝四衢其葉大尺餘赤理黃華靑樹名曰帝女之桑郭璞注曰婦以主蠶故以名桑左傳莊元年曰秋築王姬之館於外為外禮也夫人出入主家遨遊戚里濯龍園苑長門宮殿主家公主家也漢書東方朔傳曰董偃隨母出入主家詩曰以遨以遊漢書石奮傳顔師古注曰於上有姻戚者則皆名之故名其里為戚里後漢書明德馬后曰前過濯龍上見外家問起居者車如流水馬如龍史記封禪書長安門注稱括地志云長安門故亭在雍州萬年縣東北苑中後館陶公主長門國武帝以為長門宮即此既而膏腴美疢一作疾華茂傷年沉痼床帳蒸離寒暑左傳臧孫曰美疢不如惡石劉公幹贈五官中郎將詩曰余癭沉痼疾李善注云禮記曰身有痼疾説文曰痼久也詩云載離寒暑三世之術無逮一作乏於醫門百草之本途疑作徒窮於藥性禮記曰醫不三世不服其藥正義曰擇其父子相承至三世也又説云三世者一曰黃帝針灸二曰神農本草三曰素女脈訣又云夫子脈訣若不習此三世之書不得服食其藥三皇本紀神農氏作蠟祭以赭鞭鞭草木始嘗百草始有醫藥途窮疑作徒窮建德三年五月七日亡春秋三十昔西河女子值九節之菖蒲東海婦人得三山之芝草西河女子西王母也抱朴子曰菖蒲須石上一寸九節紫花者尤善神仙傳曰漢武帝登嵩山登大愚室石起道宮使董仲舒東方朔等齋潔思神至夜忽有仙人曰吾九疑之神也聞中嶽石上菖蒲一寸九節可以服之長生故來採耳王興聞之乃採服之不息遂得長生又神仙傳麻姑謂王方平曰接待以來巳見東海三為桑田向到蓬萊水淺淺於往日會時略半也史記封禪書曰海中三神山曰蓬萊方丈瀛洲東海婦人謂麻姑也無由再遇悲矣如何即以其年十一月十五日葬於京兆之北陵原龜筮告辰丘陵啓奠禮記曰龜為卜䇲為筮廣雅云小陵曰丘爾雅曰大阜曰陵西臨織疑作玉女之廟南望湘妃之墳星經曰織女三星史記天官書云是天帝外孫戴德夏小正云七月織女西臨織女之廟未詳墳在京兆近華山疑作玉女詩含神霧云華山有明星玉女持玉漿得上服之即成仙道險僻不通郭璞讚曰華嶽靈峻削成四方爰有神女玉漿是挹山海經曰洞庭之山帝之二女居之是常遊於江淵澧沅之風交瀟湘之淵郭注天帝之二女而處江為神即列仙傳江妃二女離騷九歌所謂湘夫人稱帝子者是也河圖玉版曰湘夫人帝堯女也秦始皇浮江至湘山逢大風而問博士湘君何神博士曰聞之堯二女舜妃也死而葬此列女傳曰二女死於江湘之間俗謂為湘君鄭司農亦以舜妃為湘君説者皆以舜陟方而死二妃從之俱溺死於湘江遂號為湘夫人嗚呼哀哉乃為銘曰父曰帝師母曰王姬車服不繫江漢無思言父迥為太師母為魏金明公主也詩序曰王姬下嫁於諸侯車服不繫其夫又曰漢廣德德廣所及也文王之道被於南國美化行於江漢之域無思犯禮求而不可得也是生令淑觀禮敦詩聲超宋子德茂邢姨謂夫人之賢德也左氏傳曰説禮樂而敦詩書詩曰豈其娶妻必宋之子又曰邢侯之姨繼世盛德思賢克舉奠雁迎門濡一作糯見文苑英華蘋實爼詩云雍雍鳴雁旭日始旦鄭箋云雁者隨陽而處似婦人從夫故昏禮用焉自納采至請期用昕親迎用昏毛萇采蘋傳蘋大蘋也鄭箋曰蘋之言賔也釋草云蘋萍其大者蘋舍人曰萍一名蓱今水上浮蓱也江東謂之漂音瓢左傳蘋蘩蕰藻之萊奉盥如事移茵即序春冰浴蠶秋機秉杼王子年拾遺記曰東海員嶠山有冰蠶長七寸有鱗角以霜雪覆之始為繭其色五綵織為文錦入冰不濡投火不燎浴蠶注見前篇月令曰促織鳴懶婦驚故曰秋機帝鄉近親帝城近臣濯龍親戚平陽主人後漢書東海公陽對曰河南帝城多近臣南陽帝鄉多近親濯龍注見本序漢書曰王太后長女號曰平陽公主後漢書曰明帝女迎封平陽公主適大鴻臚馮順注平陽縣屬河東金波回月玉樹臨春漢書曰月穆穆以金波揚雄甘泉賦曰翠玉樹之靑蔥弄玉鳳凰昌容紫草自此千年無人得道舜華榮曜飄零何早列仙傳曰秦穆公有女字㺯玉與蕭史皆隨鳳凰飛去又曰昌容常山道人也自稱殷王子能致紫草女仙傳曰昌容者商王女也修道於常山食蓬虆根二百餘年顔如二十許能致紫草鬻與染工得錢以為貧病者住來城市世世見之嘗行日中不見其形或云昌容能練形者也忽沖天而去神仙傳彭祖曰得道者耳非仙人也詩顔如舜華毛萇曰舜木槿也渭水北原平陵故園才通谷口即望寒門謂葬於京兆之北陵原也漢書地理志曰扶風渭城故咸陽又平陵縣昭帝置三輔黃圖曰秦始皇都咸陽渭水貫都以象天漢地理志曰谷口屬左馮翊史記漢武紀曰所謂寒門者谷口也索隱曰服虔云寒門黃帝所仙之處小顔曰谷口山之谷口漢時為縣今呼為冶谷去甘泉八十里盛夏凜然故曰寒門吁嗟此地去矣歸魂孟冬十月長松九年親賔掩淚悽愴何言江淹别賦曰親賔兮淚滋周驃騎大將軍開府儀同三司冠軍伯柴烈李夫人墓志銘夫人諱某隴西狄道人也周有柱史夫子以之猶一作見龍史記曰老子者楚苦縣厲鄉曲仁里人也姓李氏名耳字伯陽諡曰聃周守藏室之史也孔子適周問禮於老子去謂弟子曰老子其猶龍邪又張湯傳曰老子為柱下史即藏史之柱下因以為官名漢有將軍宛城以之輸馬漢書曰太初元年以李廣利為二師將軍至二師取善馬又大宛傳張騫曰大宛在胸奴西南漢正西去漢可萬里其俗多善馬馬汗血其先天馬子也復有西入上書仍為秦王之相史記曰李斯者楚上蔡人也西説秦王秦王拜斯為客卿會議逐客斯亦在逐中乃上書秦王除逐客之令復李斯官卒用其計謀官至廷尉二十餘年竟并天下尊主為皇帝以斯為丞相東向問計即是韓王之師史記韓信傳曰信與張耳以兵數萬欲東下井陘擊趙趙王成安君陳餘聚井陘口號稱二十萬廣武君李左車説成安君曰聞漢將韓信涉西河虜魏王禽夏説新喋血閼與今乃輔張耳議欲下趙此乘勝而去國逺鬪其鋒不可當願足下假臣竒兵三萬人從間路絶其輜重足下深溝高壘堅營勿與戰彼前不得鬪退不得還吾竒兵絶其後使野無所掠不至十日而兩將之頭可致於戲下否必為二子所禽矣成安君不聽韓信使人間視知不用還報則大喜及破趙軍斬成安君禽趙王歇乃令軍中毋殺廣武君有能生得者購千金於是有縳廣武君而致戲下者信乃解其縛東向坐西向對師事之復從其䇿父宜使持節大將軍南北二華州刺史順陽郡公魏武皇帝之長舅也隋書地志曰馮翊郡後魏置華州上郡後魏置東秦州後改為北華州荆州舂陵郡湖陽縣後魏置順陽郡北史魏孝武帝紀曰帝諱修字孝則廣平文穆王懷之第三子也母曰李氏穰侯魏冉居咸陽之宮曲陽王根借明光之殿語其貴戚差足擬倫論其揖讓彼多慚德史記曰穰侯魏冉者秦昭王母宣太后弟也宣太后二弟其異父長弟曰穰侯姓魏氏名冉自惠王武王時任職用事武王卒諸弟爭立惟魏冉能立昭王昭王即位以冉為將軍衛咸陽誅季君之亂封於穰號曰穰侯漢書曰成都侯王商嘗病欲避暑從上借明光宮後又穿長安城引內澧水注第中大陂以行船立羽蓋張周帷楫濯歌上幸商第見穿城引水意恨內銜之未言後微行出過曲陽侯第又見園中土山漸臺似類白虎殿於是上怒以讓車騎將軍音商根兄弟欲自黥劓謝太后上聞之大怒音籍藁請罪商等皆負斧質謝罪上不忍誅然後得巳久之平借明光宮本王商事此云王根按本文論外戚之奢漢書根商連文故通用之言比之古人魏冉王根俱為貴戚而李宜有揖讓之德也夫人幼而聰敏早聞令淑彤一作針管有美賢才見稱左氏傳曰靜女之三章取彤管焉杜預曰彤管赤筆管也弄其紙筆懼失諸兄之意翦其齠齡畏傷王母之心魏志曰甄后少喜書常用諸兄筆硯袁宏後漢紀曰和熹皇后鄧訓女也后年五嵗祖母為翦髮老人目瞑并中后額忍痛不言一額盡傷左右怪而問之后曰太夫人慈恩為斷髮難傷老人意故忍之耳年十有一出適驃騎大將軍開府儀同柴烈烈以上將頒朔一作領胡中台受任軍國忠勤規模繁總漢書天文志曰斗魁戴筐六星曰文昌宮一曰上將魁下六星兩兩而比名曰三台夫人輔佐君子言容匡贊增耀三星欽明四德授巾沃盥有謹於事姑斷織停機無忘於訓子保定二年册授大夏縣君既以夫尊又云子貴乃遷順陽改郡君夫人之邑或用鄉名小君之號多從夫秩典册光臨足稱榮寵漢書外戚傳曰武帝即位封皇太后母臧兒為平原君武帝封王太后在民間時所生女金氏為修成君宣帝制詔御史賜外祖母號為博平君東觀漢記曰鄧皇后太夫人為新野君王隱晉書曰武帝封羊祜妻夏侯氏為萬歲鄉君按柴烈李夫人封大夏縣君鄉名如此類也禮記曰婦人無爵從夫之爵本有風氣之疾頻年增動略多枕卧飛龜之散遣疾無徵畫龍之符流年不驗抱朴子曰靈寶經有正機平衡飛龜授袟凡三篇皆仙術也又曰或丙午日日中時作燕君龍虎符歲符歲易之是也以今建德四年三月日薨於館舍春秋四十九即以其年八月日葬於長安之洪瀆原神光離合尚在河湄雲氣徘徊猶歸樓下洛神賦曰神光離合乍隂乍陽小雅巧言云居河之湄爾雅云水草交曰湄高唐賦王問王曰此何氣也玉對曰所謂朝雲者也嗚呼哀哉乃為銘曰上書秦相立功漢將隴水分流秦川遙望秦相李斯漢將李廣利也隴水秦川言夫人為隴西人也漢書地理志曰隴西郡秦置應劭曰有隴坻在其西也三秦記隴水歌有遙望秦川之句秋陸俗勇金行地壯廣武軍中安平河上言李氏世居隴西西方金行之氣代有名將也續漢書曰日行西陸謂之秋後漢書西羌論序曰性堅剛勇猛得西方金行之氣焉西征記曰三皇山或謂三室山山上有二城東者曰東廣武西者曰西廣武各在山一頭相去二百餘步其間隔深澗漢祖與項籍語處後漢郡國志曰安平國故信都信都有絳水滹沱河又王霸傳曰光武至下曲陽聞王郎兵在後從者皆恐及至滹沱河光武令霸往視之詭曰冰堅可渡官屬皆喜遂前比至河河冰亦合乃令霸護度未畢數騎而冰解光武謂霸安吾衆得濟免者卿之力也妻者齊也謂嫁曰歸三星夜照百兩朝飛白虎通曰妻者齊也與夫齊體自天子下至庶人其義一也毛詩傳曰婦人謂嫁曰歸三星百兩注巳見褕翟有典容禮無違台庭等秩一作列畫侯一作秩服同衣周禮內司服有褕狄鄭注云狄當為翟翟雉名褕翟畫搖者昏禮注云婦容婉娩台庭等秩侯服同衣者謂從夫秩也天官書曰魁下六星名三台周禮九服一侯服柴烈為開府儀同冠軍伯是上應台階職居侯服矣子奉母儀夫聞家政七族承和九閨連慶漢書鄒陽曰荆軻湛七族張晏曰七族上至曾祖下至曾孫紛帨恭肅溫凊孝敬杼秉秋成蠶隨春令內則曰婦事舅姑左佩紛帨曲禮曰凡為人子之禮冬溫而夏凊宋均曰促織立秋女功急故趣之周禮鄭注曰蠶為龍精月值大火則浴其種月令曰季春之月蠶事既登年華未落電影先過徒餐日氣空飲天河楚辭曰餐六氣而飲沆瀣兮漱正陽而含朝霞保神明之清澄兮精氣入而粗穢除王逸曰餐吞日精食元符也陵陽子明經曰春食朝霞者日始出赤氣也秋食淪漢者日沒後赤黃氣也冬食沆瀣者北方夜半氣也夏食三陽者南方日中氣也荆楚歲時記曰漢武帝令張騫使大夏尋河源乘槎經月而至一處見一女子織一丈夫牽牛飲河渚織女取支機石與騫而還後為東方朔所識星凋玉井月捐金波虞淵浴日薤露哀歌後漢書郎顗傳曰夜有白氣從西方天苑趨左足入玉井注云天官書參星下四小星為玉井漢書曰月穆穆以金波淮南子曰日出暘谷入於虞淵崔豹古今注曰薤露蒿里送哀歌也出自田橫門人橫自殺門人傷之而作悲歌言人命如薤上露易晞滅至李延年乃分為二曲薤露送王公貴人蒿里送士大夫庶人使挽逝者歌之俗呼為挽歌寂寞虛奠荒涼象設幽隴龜封重泉蟻結酉陽雜爼曰臨邑縣北有華公墓碑龜尋失惟趺龜存焉石趙世此龜常負碑入水有伺之者因呌呼龜走墜折碑焉檀弓曰蟻結於四隅殷士也鄭注曰畫褚於四角其文如蟻之行往來相交錯蟻蚍蜉也殷之蟻結如畫文蛇秋色悽愴松聲斷絶百年何幾歸於此别彭城公夫人爾朱氏墓志銘後漢郡國志徐州彭城國高祖置古大彭邑也彭城公姓氏未詳此篇及下東平李夫人志皆非子山之作按滕王序開府文集二十卷及隋經籍志稱二十一卷今並不傳近本皆出文苑英華英華列此二篇於子山諸志之後此篇失名次篇稱前人後人采英華成集誤為庾作又篇內上元元年及下篇永淳二年皆唐高宗年號下篇炯沗為詹事司直明是楊炯之作也初唐四傑去庾最近余喜其文似開府遂不忍去因附注釋且證其集非周隋舊本昔中郎虎賁貌似者猶或愛之矧盈川之文江河萬古在所不廢者也夫人爾朱氏河南洛陽人也北史爾朱榮傳曰世為部落酋帥其先居爾朱川因為氏焉爾字或作爾若夫陰山表裏衝北斗之璣衡瀚海彌綸直西街之畢昴史記曰趙武靈王北破林胡築長城自代並陰山索隱曰徐廣云西安縣縣北有陰山在河南陽山北也正義曰括地志云陰山在朔州北塞外突厥界左氏傳曰表裏山河天官書曰北斗七星所謂璇璣玉衡以齊七政索隱曰春秋運斗極云斗第一天樞第二璇第三璣第四權第五衡第六開陽第七搖光第一至第四為魁第五至第七為杓合而為斗馬融云璣渾天儀可轉旋故曰璣衡其中橫䇶以璇為璣以玉為衡蓋貴天象也鄭注大傳言渾儀其中䇶為璇璣外為玉衡者是也漢書霍去病傳曰登臨瀚海如淳曰瀚海北海名也周易曰故能彌綸天地之道史記天官書曰西宮也畢間為天街其陰陰國其陽陽國正義曰天街三星在昴畢間主國界街南謂華夏之國街北為􅊂翟之國土金守胡兵入也按漢國界在趙代之間陰山瀚海皆胸奴地也北魏是其子孫後建都洛陽撫有中夏是西街畢昴衝於北斗璣衡矣爾朱氏世為部落酋帥故稱之也四時銜火燭龍開照地之光六月搏風大鵬運垂天之翼山海經曰西北海之外有神人而蛇身而赤其眼及晦視乃明不食不寢是燭九陰是謂燭龍炬可以照明莊子曰鵬之背不知其幾千里也怒而飛其翼若垂天之雲又云鵬之徙於南冥也水擊三千里摶扶搖而上者九萬里以六月息者也由是奄有京縣遂荒中土車書禮樂三王之損益可知將相公侯百代之山河不殞言爾朱氏從魏入洛帝業既成遂世為卿相也北史云爾朱羽健魏登國初為領人酋長率契胡武士從平晉陽定中山拜散騎常侍以居秀容川割方三百里封之長為世業健羽子鬱德鬱德子代勤繼為酋長代勤太初敬哀皇后舅也以外親兼征伐有功厯肆州刺史封梁郡公祖敞隋書列傳曰爾朱敞字乾羅秀容契胡人爾朱榮之族子也父彥伯官至司徒博陵王隋儀同三司金紫光祿大夫岐同金申信臨徐七州總管兵一作藩部尚書金一作邉城郡開國公天列尚書之星地標光祿之塞隋書本傳高祖受禪改封邊城郡公黔安蠻叛命敵討平之師旋拜金州總管政號明肅吏民懼之後以年老乞骸骨賜二馬軺車歸河內卒於家時年七十二天文志曰門內東南維五星曰尚書主納言夙夜咨謀龍作納言此之象也漢書曰單于自請願留居光祿塞下應劭曰光祿勳徐自為所築也敞為金城郡公故云出身萬里知呂岱之元勳專命一方識劉𢎞之重寄吳志曰呂岱字定公廣陵海陵人也清身奉公所在可述初在交州厯年不餉妻子飢乏權聞之嘆息以讓羣臣曰呂岱出身萬里為國勤事家門為困而孤不早知股肱耳目其責安在於是賜錢米布絹歲有常限晉書曰劉𢎞字和季沛國相人也為鎮南將軍都督荆州諸軍事張昌作亂𢎞遣軍討斬之悉降其衆時荆州守宰多闕𢎞請補選帝從之𢎞乃敘功銓德隨才補授甚為論者所稱𢎞每有興廢手書守相丁寧欵密所以人皆感悅爭赴之咸曰得劉公一紙書賢於十部從事父休最北史隋書作朂隋左千牛備身朝散大夫齊王府司馬襲封爵金一作邊城公大夫稱伐諸侯胙土左傳臧武仲曰大夫稱伐又衆仲曰胙之土而命之氏淮仙致雨仍攀桂樹之山楚客臨風更入芙蓉之水淮仙淮南王劉安也安封於淮南學神仙之術故稱淮仙楚客屈原宋玉也屈宋楚人故云楚客淮南王安招隱士曰桂樹叢生兮山之幽又云攀援桂樹兮聊淹留離騷曰集芙蓉以為衣又云采薜荔兮水中搴芙蓉兮木末又云因芙蓉而為煤兮憚褰裳而濡足王逸曰芙蓉蓮華也言最為齊王府司馬猶八公之在淮南屈宋之事楚王也夫人玉臺貞氣金河仙一作靈液漢書天馬歌曰遊閶闔觀玉臺應劭曰玉臺上帝之所居金河仙液比西王母也西王母亦稱金母居崑崙山崑崙為河水之源故云金河矣蔡中郎之女子早聽色絲謝太傅之閨門先揚麗則世説曰魏武嘗過曹娥碑下楊修從碑背上見題作黃絹幼婦外孫虀臼八字魏武謂修曰解不答曰解魏武曰卿未可言待我思之行三十里魏武乃曰吾已得令修别記所知修曰黃絹色絲也於字為絶幼婦少女也於字為妙外孫女子也於字為好虀臼受辛也於字為辭所謂絶妙好辭也魏武記之與修同乃嘆曰我才不及卿乃覺三十里異苑曰陳留蔡雍避難過吳讀曹娥碑文因刻石旁作八字曰黃絹幼婦外孫虀臼後漢書陳留董祀妻者同郡蔡雍之女也名琰字文姬博學有才辨又妙於音律晉書曰謝安幼有公輔之望處家常以儀範訓子弟及薨贈太傅彭城公發源殷伯承家漢相言彭城公先世在殷為侯伯在漢為丞相也山川氣候彰白武於臯繇象緯休徵下蒼龍於曼倩白武白虎也史記曰西方七星白虎宿也淮南子曰西方金也其神為太白其獸白虎尚書臯陶作士按此知彭城公為刑官也淮南子曰東方木也其神為歲星其獸蒼龍高誘曰木色蒼蒼龍順其色也東方朔别傳曰東方朔小名曼倩未死時謂同舍郎曰天下人無能知朔知朔者惟太王公耳朔卒後武帝得此語即召太王公問之曰爾知東方朔乎公對曰不知公何所能曰頗善星厯帝問諸星皆具在否曰諸星具獨不見歲星十八年今復見耳帝仰天歎曰東方朔生在朕傍十八年而不知是歲星哉按象緯休徵下蒼龍於曼倩者蒼龍歲星曼倩方朔小字明是東方朔為歲星事漢書云東方朔字曼倩平原厭次人自公孫𢎞以下或至公卿朔常為朗與枚臯郭舍人俱在左右詼啁而已終不見用上云白武臯陶是彭城公已為刑官此引曼倩非謂職官明矣疑謂方朔有割肉細君之事為下文鳴雁飛皇夫婦張本矣三星照夜佇稽鳴雁之期七日秉秋坐豸飛皇之兆詩曰綢繆束薪三星在天毛傳三星參也鄭箋曰三星心星也心有尊卑夫婦父子之象又為二月之合宿故嫁娶者以為候焉按昏姻六禮皆用雁故曰鳴雁之期左傳懿氏卜妻敬仲詩云鳳凰于飛故曰飛皇之兆夫人年甫十八遂歸於我巫山南眺逢暮雨於瑶姬華嶽西臨降明星於玉女水經注曰郭景純云丹山西即巫山帝女居焉宋玉所謂天帝之季女名曰瑶姬未行而亡封於巫山之臺精魂為草實為靈芝所謂巫山之女高唐之姬旦為行雲暮為行雨朝朝暮暮陽臺之下旦早視之果如其言故為立廟號朝雲焉詩含神霧曰華陰山上有明星玉女持玉漿得上服之即成仙道險僻不通郭璞讚曰華嶽靈峻削成四方爰有神女玉漿是浥又按集仙録明星玉女者居華山服玉漿白日升天玉女祠前有五石臼號曰玉女洗頭盆動合詩禮言成軌則晨昏展敬事極於移天蘋藻潔誠義申於中饋儀禮曰夫者天也杜預曰婦人在室則天父出則天夫詩曰於以采蘋於以采藻毛傳曰蘋大蓱也藻聚藻也鄭箋曰蘋之言賔也藻之言澡也婦人之行在柔順自潔清故取名以為戒周易曰無憂纍在中饋女郎砧石響明月而思秋風織婦一作女機床聽寒蛩而催絡緯水經注曰漢水南有女郎山山上有女郎冢逺望山墳嵬嵬狀高及即其所裁有墳形山上直路下出不生草木世人謂之女郎遒下有女郎廟及搗衣石言張魯女也有小水北流入漢謂之女郎水又述異記曰搗衣山一名靈山在琅邪郡山南絶險巖有方石昔有神女于此搗衣其石明瑩謂之玉女搗練砧崔豹古今注曰蟋蟀一名吟蛩一名蛩秋初生得寒則鳴濟南呼為懶婦又云莎雞一名促織一名絡緯一名悉蚿一名促織一名紡績促織謂鳴聲如急織絡緯謂其鳴聲如紡績也用曹大家之明訓守宋伯姬之貞節後漢書曰扶風曹世叔妻者同郡班彪之女也名昭字惠班一名姬博學高才世叔早卒有節行法度兄固著漢書其八表及天文志未及竟而卒和帝詔昭就東觀藏書閣踵而成之帝數召入宮令皇后諸貴人師事焉號曰大家作女誡七篇有助內訓劉向列女傳曰伯姬者魯宣公女成公之妹也其母曰繆薑嫁伯姬於宋恭公十年恭公卒伯姬寡至景公時伯姬嘗遇夜火左右曰夫人少避火伯姬曰婦人之義保傅不俱夜不下堂待保傅來也越義而生不如守義而死遂逮於火而死春秋詳録其事為賢伯姬以為婦人以貞為行者也伯姬之婦道盡矣按此二語是彭城公已卒夫人其婺婦也加以心依八覺理會三空加以以下言夫人奉佛教也八覺言佛八種覺悟也有八大人覺經經云八大人覺亦名八生法一道當少欲多欲非道二道當知足無厭非道三道當間靜樂衆非道四道當自守戲笑非道五道當精進懈怠非道六道當專念多忘非道七道當定意亂意非道八道當智慧愚癡非道也般若經云三空一人空二法空三俱空僧肇維摩經注序曰道越三空非二乘所議遊智刃於檀林泛仙舟於法海王巾頭陀寺碑文曰智刃所遊日新月故觀佛三昧經曰伊蘭與栴檀生末利山中伊蘭臭牛頭旃檀上妙之香説文云叢木曰林功德施論云如欲濟川先應取筏至彼岸巳捨之而去此云仙舟即郭璞云水中􅀢筏也乂大論云波羅伽秦言度彼岸華嚴云以波羅密船于生死流中不依此岸不著彼岸不住中流而度衆生無有休息維摩經曰當禮法海德無邊幾神獨照默言象而無施空有兼忘束荃蹄而不用周易曰知幾其神乎後漢書西域傳論曰詳其清心釋纍之訓空有兼遣之宗道書之流也注云不執著為空執著為有兼遣謂不空不有虛實兩忘也維摩詰曰我及涅槃此二皆空老子云常無欲以觀其妙常有欲以觀其徼故曰道書之流也莊子曰筌者所以得魚也得魚而忘筌蹄者所以得兔也得兔而忘蹄言者所以得意也得意而忘言吾焉得夫忘言之人而與之言哉人生天地壽非金石銀臺竊藥想奔月而何年金殿一作玉釡一作金釡煎香思反魂而無日淮南子曰姮娥羿妻羿請不死之藥於西王母姮娥竊藥以奔月中張衡思玄賦曰聘王母於銀臺注云銀臺仙人所居也述異記曰聚窟州有返魂樹伐其根心於玉釜中煮取汁又熬之令可丸名曰金精香或名振靈丸或名反生香或名却死香死尸在地聞氣即活王子年拾遺記曰漢延和三年春武帝定西胡月支國王遣使獻香四兩大如雀卵黑如桑椹帝以香非中國所乏以付外庫至始元元年京城大疫死者大丰帝取月支神香燒之於城內其死未三日者皆活香氣經三月不歇帝信神香乃祕録餘香一日函檢如故而失神香也此香出於聚窟州人鳥山山多牛吼聞之者心振神駭伐其木根於玉釡中者取汁更以微香熟煮之如黑飴狀令可丸名為驚精香或名振靈丸或名返生香或名振檀香或曰却死香一種六名斯皆靈物也以某年月日終於平康一作原里之私第越上元三年十月二十日合葬於城南之畢原禮也按上元唐高宗年號也舊唐書高宗紀云改咸亨五年為上元元年齊侯寢側杜氏階前對文王之畢原用周公之合葬晏子春秋曰景公成路寢之臺逢於何遭喪遇晏子於途再拜乎馬前晏子下車挹之曰子何以命嬰也對曰於何之母死兆在路寢之臺牖下願請命合骨晏子入白公公作色曰自古及今子亦嘗聞請合葬人主之宮者乎對曰古之人君不奪生人之居不踐死人之墓故未嘗聞請葬人主之宮也且嬰聞之生者不得安命之曰畜憂死者不得葬命之曰畜哀畜憂者怨畜哀者危君不如許之公曰諾逢於何葬其母於路寢之臺牖下檀弓曰季武子成寢杜氏之葬在西階之下請合葬焉許之武子曰合葬非古也自周公以來未之有改也馬融曰畢文王墓地名偃松千古長無寡鶴之悲文梓百尋還見雙鴛之集抱朴子曰千樹之松有如偃蓋王褒洞簫賦曰孤雌寡鶴娛優乎其下列異傳曰宋康王埋韓馮夫婦宿昔文梓生有鴛鴦雌雄各一恆棲樹上聲音感人又述異記云吳黃龍中吳郡海鹽有陸東美妻朱氏亦有容止夫妻相重寸步不相離時人號為比肩人夫婦云皆比翼恐不能佳後妻卒東美不食求死家人哀之乃合葬未一歲冡上生梓樹同根二身相抱而合成一樹每有雙鴻常宿於樹下權聞之嗟嘆封其里曰比肩墓又曰雙梓後子𢎞與妻張氏雖無異亦相愛慕吳人又呼為小比肩其銘曰合葬非古周公所存謝惠連祭古冢辭本禮記死生千載棺椁雙魂謝惠連祭古冢文曰還祔雙魂野曠風急天寒日昏煙霾杳嶂霧失遙村詩云終風且霾毛傳曰霾雨土也釋天云風而雨土為霾孫炎曰大風揚塵土從上下也紀黃絹之碑表對靑松之墓門黃絹注見本序潘嶽寡婦賦云長松萋萋兮振柯又云墓門兮肅肅伯母東平郡夫人李氏墓志銘夫人唐常州刺史楊德裔之妻楊炯之伯母也按文苑英華楊炯有常州刺史楊公墓志銘集作伯父東平楊公其略云公諱德裔字德裔𢎞農華陰人也即常州刺史華山公之元孫左衛將軍武安公之長子也封東平公䇿勳上柱國知夫人楊炯伯母篇內炯沗為詹事司直是篇亦盈川之文也夫人姓李氏隴西狄道人也自涼武昭王以後一門三公為四海著族國史家牒詳之矣晉書曰涼武昭王皓字玄盛小字長生隴西成紀人姓李氏漢前將軍廣之十六世孫也廣曾祖仲翔漢初為將軍討叛羌於素昌素昌乃狄道也衆寡不敵死之仲翔子伯考奔喪因葬于狄道之東川遂家焉世為西州右姓初署穀效令假業僭稱涼王進玄盛持節都督涼興諸軍事鎮西將軍領護西􅊂校尉隆安四年六郡推為涼公薨年六十七國人上諡曰武昭王墓曰建世陵廟號太祖子歆字士業涼後主玄盛以安帝隆安四年立至宋少帝景平元年滅據河右凡二十四年舊唐書高祖本紀云其先隴西狄道人涼武昭王皓七代孫也夫人為涼武昭王之後與國同乘矣祖充潁後周大將軍消州刺史流江郡公隋書地理志云宕渠郡流江後魏置縣及置流江郡考玄明皇朝上儀同闕濟三州刺史成紀縣男隋志云天水郡成紀縣舊廢後周置出入三朝剖符分竹漢書文帝紀曰二年九月初與郡守為銅虎符竹使符應劭曰銅虎符第一至第五發兵遣使符合乃聽之竹使符以竹箭五枚長五寸鐫刻篆書亦第一至第五也説文云符信也漢制以竹長六寸分而相合秦隴河濟之地人到於今稱之天下士大夫知與不知莫不想望其風采漢書李廣傳曰百姓知與不知老壯皆為流涕夫人生而純深幼而恭敬長而敦睦成而和惠年及初笄甫歸於我內則曰十有五年而笄執箕帚奉舅姑人不間於娣姒妾媵之年閨門之內穆如也故宗黨推其令問鄉閭以為美談周禮二十五家為閭四閭為黨五族為黨五黨為州五州為鄉東平公守清白之基逢太平之日東平本漢時國漢書地理志云故梁國宣帝甘露二年為東平國辟命交至聲聞於天詩小雅鶴鳴之詞也制集作詔徵尚書郎遷御史中丞出為棣曹恆常四州刺史楊常州墓志云詔徵尚書郎御史中丞謇謇諒直有王臣之節尋以公事去官復拜饒州括州越州都督三州長史在會稽引陂水溉田數十頃人獲其利於今稱之焉遷棣曹恆常四州刺史厯政清白為當時所重夫人輔佐君子聿修內政平旦纚笄則有君臣之嚴沃盥饋食則有父子之敬報友而行則有兄弟之道受期必誡則有朋友之信其婦德也如此高誘淮南注云旦明平旦也內則曰婦事舅姑雞初鳴咸盥漱櫛縰笄總衣紳鄭注云縰韜髮者也又士冠禮注云纚一幅長六尺足以韜髮而結之矣又內則云進盥少者奉槃長者奉水請汏盥盥卒授巾鄭康成曰娣姒猶兄弟也厯職中外聲名藉甚和其琴瑟正其邦家者夫人與有力焉蓋嘗喟然而言曰古者卿之內子為大帶命婦成祭服社而獻功可不朂哉可不朂哉禮器曰太廟之內敬矣君親制祭夫人薦盎君親割牲夫人薦酒卿大夫從君命婦從夫人由是服浣濯之衣躬紡績之事葛覃詩序曰服浣濯之衣鄭箋曰浣謂濯之耳衣謂襆以下至褖衣列女傳仲尼曰季氏之婦不淫矣詩曰婦無公事休其蠶織言婦人以織績為事休之非禮也筐筥錡釡之器見左傳所以執其勞蘋蘩蕰藻之菜見左傳所以明其德左傳杜注曰方曰筐圓曰筥無足曰釡有足曰錡筐丘方反筥九呂反錡其綺反筐筥皆器也蘋大䓑也蘩皤蒿蕰藻聚藻也藴紆粉反䓑蒲丁反皤蒲多反白蒿也非夫博文逹禮貞婉聽從者孰能與於此乎內則曰姆教婉娩聽鄭注云婉謂言語也娩之言媚謂容貌也婉紆晚反及公乞骸告老退歸初服夫人年踰耳順視聽不衰每獻歲發春日南長至楚辭曰獻嵗發春兮泊吾南征左傳莊二十九年曰日南而畢杜預曰日南至微陽始動故土功息又僖五年傳曰五年春王正月辛亥朔日南至杜云周正月十一月冬至之日日南極正義曰日之行天有南有北常立八尺之表以候景之短長夏至之景尺有五寸日最長而景最短是謂曰比至也自是以後日稍近南冬至之景一丈三尺日最短而景最長是謂日南至也冬至者十一月之中氣中氣者月半之氣也月朔而得中氣是必前月閏月令曰仲夏之月日長至正義曰長至者謂此月之時日長之至極太史漏刻夏至畫漏六十五刻夜漏三十五刻是日長至也羣從子弟稱觴上壽者動至數十百集無此字未嘗不勸一作歡言善誘借以溫顔侃侃焉誾誾焉有孟母之風焉有敬薑之誨焉公乞骸至誨焉覽楊常州墓志云於是先賢之言知止足之分罷歸初服告老私庭乃率羣從子弟營别業於宜城神鄉之望仙里其制宅也宗廟為先廄庫為後喟然而言曰古人所謂歌于斯聚國族于斯者吾知之矣劉向列女傳曰鄒孟軻之母號孟母孟子長學六藝成大儒之名君子謂孟母善以漸化謂孟母知人母之道謂孟母知禮而明于姑母之道謂孟母知婦道又曰魯季敬薑莒女也號戴已魯大夫公文穆伯之妻文伯之母季康之從祖叔母也博逹知禮穆伯先死敬薑守飬文伯備于教化維永淳元年秋八月旁死魄寢疾彌留終於華陰之望仙里享年八十有一按楊常州墓志公以文明元年夏四月薨于正寢春秋八十有五此云夫人以永淳元年終永淳二年高宗崩太子立為𢎞道元年𢎞道二年改朔元年二月天后廢帝為廬陵王立豫章王為帝改元文明夫人先公二年卒尚書武成曰惟一月壬辰旁死魄孔傳曰旁近也月二日死魄正義曰朔是死魄故月二日近死魄魄者形也謂月之輪郭無光之處名魄也朔後明生而魄死望後明死而魄生律厯志云死魄朔也生魄望也顧命云生惟四月哉生魄傳云始生魄月十六日也月十六者為始魄是一日為始死魄二日近死魄也按此知夫人以永淳元年八月二日卒也冬十一月一日丙辰遷窆於永豐鄉之平原從先兆也楊常州墓志云越垂拱元年春二月某日與夫人隴西李氏合葬於某原逺近會葬千餘人操筆而為誄者以百數蓋遷窆也此云永淳之冬時東平公尚存矣東平公撫存懷舊用痛悼於厥心逺近咸集宗親畢會生榮死哀其此之謂矣是日也皇太子監守長安炯忝為詹事司直按此知為楊炯之作也舊唐書楊炯傳云炯俄遷詹事司直按傳儀鳯中授此職此云永淳之冬炯巳為詹事司直矣左傳里克曰太子奉冡祀社稷之粢盛以朝夕視君膳者也故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也漢書曰詹事秦官掌皇太子家不獲就展集作展哀喪次陪奉靈輀儀禮鄭注云次倚廬也也説文曰輀喪車也薦李顒之文庶同潘嶽之誄隋書經籍志有晉李顒集十卷録一卷晉書潘嶽辭藻絶麗尤善為哀誄之文嗚呼哀哉乃為銘曰高嶽之上浮雲翔兮函谷之外直氣揚兮言李氏為西州右姓也高嶽謂西嶽也隴右在西皆西嶽所鎮函谷關名鹽鐵論云秦左殽函右隴厄西都賦云左據函谷二崤之阻右界褒斜隴首之險是隴坻在函谷之西也建功北狄討西羌兮受封南鄭家素昌兮建功北狄討西羌者言涼武昭王為鎮西將軍領護西􅊂校尉推為涼公遂據河右也受封南鄭家素昌者言涼後主歆字士景子重耳國亡奔宋為汝南太守後魏安南將軍豫州刺史也素昌地名即狄道注見本序言家于隴西狄道也於赫祖考為龍光兮牧州典郡佩銀黃兮謂祖充頴考玄明並為刺史也詩云為龍為光漢書百官公卿表曰綏和元年改刺史為牧銀印靑綬云銀黃者銀謂印黃謂綬也漢官儀綬有黃赤綘緑五采漢名臣奏云大司空朱浮奏曰乘與綬五采何黃多也可更用赤絲為地降生淑質秉禎祥兮苕華菊茂蘭若芳兮言夫人生而令淑也我有懿德如圭璋兮求之卜筮鳴鳳凰兮詩云好是懿德又云如圭如璋左氏傳曰初懿氏卜妻敬仲其妻占之曰吉是謂鳯凰于飛其鳴鏘鏘君子至止玉環鏘兮室家好合琴瑟張兮詩云君子至止説文曰環璧也肉好若一謂之環詩云妻子好合如鼓瑟琴又云宜爾室家執其麻枲供衣裳兮羞其饋食澄酒漿兮禮記內則曰執麻枲治絲􅗀織紝組紃學女事以共衣服觀於祭祀納酒漿籩豆菹醢禮相助奠枲思里反紃音巡正義曰麻枲以下為婦功也諸姑伯姊穆溫良兮姨姒叔妹歡未央兮公之出門牧守四方兮夫人之化德洋洋兮言東平公為刺史夫人修其內政也公之告老返維桑兮閨門之內道彌彰兮言東平公乞骸歸里夫人敦睦親族也正月上日南至長兮子孫歡慶各稱觴兮尚書曰正月上日受終于文祖孔傳曰上日朔日也按東平公無子此云子孫謂諸子諸孫即羣從子弟也楊常州墓志云一子令珍早亡朝夕溫凊者四女公慨然有喪明之痛因不豫遂留遺命以弟之子神毅為後宋公集作云孟母魯季薑兮匪怒伊教由舊章兮宋公疑謂宋恭公之妻宋伯姬也列女傳曰伯姬者魯宣公之女成公之妹也其母曰繆薑嫁伯姬于宋恭公三月廟見伯姬以恭公不親迎不肯聽命宋人告魯魯使李文子如宋致命于伯姬既嫁十年恭公卒嘗夜遇火保傳未至守義而死孟母季薑注見本序匪怒伊教者如宋姬之疾不親迎孟母之以刀斷織季薑之戒淫慎微皆匪怒而為教也詩云率由舊章方期高舉登紫房兮誰謂不宜集作冥默掩玄堂兮清虛真人歌曰凝祌泥丸內紫房何蔚炳傅玄七哀詩曰杳杳三泉室冥冥玄夜堂肅肅松檟鬱成行兮沉沉厚夕集作穸終不㿩兮任昉范始興表云松檟成行左氏傳曰惟是春秋窀穸之事杜注曰窀厚也穸夜也厚夜謂葬埋也窀張倫反一徒門反穸音夕庾子山集卷十六
