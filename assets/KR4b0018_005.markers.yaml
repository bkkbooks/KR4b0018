  - {type: variant, offset: 1, length: 42098, content: 子山集巻三周庾信撰錢唐倪璠纂註詩奉和汎江藝文作王臺卿非春江下白帝畫舸向黄牛後漢書郡國志曰公孫述據蜀自稱白帝號魚復為白帝城桑欽水經曰江水又東逕黄牛山酈元注曰下有灘名曰黄牛灘南岸重嶺疊起最外髙崖間有石如人負力牽牛人黑牛黄成就分明行者謡曰朝發黄牛暮宿黄牛三朝三暮黄牛如故言水路紆深迴望如一矣許慎説文曰舸舟也聲古我切漢書注曰鷁水鳥畫其象於船首錦䌫迴沙磧蘭橈避荻洲吳書曰甘寧住止常以繒錦維舟去或割棄以示奢也陳張正見賦朔雪映夜舟詩云檣風吹影落䌫錦雜花浮是也許氏説文曰磧水渚有石者橈短檝也音人遥切爾雅曰檝謂之橈述異記曰七里州中有魯班刻木蘭舟濕花隨水汎空巢逐樹流建平船柹下荆門戰艦浮晋書曰王濬造船於蜀其木柹蔽江而下吳建平太守吾彦取流柹以呈孫皓曰晋必有攻吳之計宜増建平兵建平不下終不敢渡皓不從後漢書曰岑彭破荆門長驅入江闗吳漢留夷陵裝露橈泝江而上荆州記曰郡西泝江六十里南岸有山名曰荆門上合下開有門形因以為名岸社多喬木山城足迴樓日落江風静龍吟逈上㳺漢書項籍傳曰古之帝者必居上㳺奉和山池梁簡文帝有山池詩樂宫多暇豫望苑暫迴輿樂宫長樂宫望苑傳望苑也鳴笳陵絶浪飛蓋歴通渠桂亭花未落桐門葉半疎荷風驚浴鳥橋影聚行魚日落含山氣雲歸帶雨餘陪駕幸終南山和宇文内史潘岳闗中記曰終南山一名中南言在天中居都之南也括地志曰終南山一名中南山一名太一山一名南山一名橘山一名楚山一名㤗山一名周南山一名地肺山在雍州萬年縣南五十里内史宇文昶也昶陪駕幸終南山詩云堯盖臨河潁漢蹕踐華嵩日旂迴北鳯星斾轉南鴻青雲過宣曲先驅背射熊金桴拂泉底玉琯吹雲中古轍稱難極龍途或易窮煙生山欲盡潭盡水恒空交松上連霧修竹下來風仙才道無别靈氣法能同東棗差朝座西桃獻夜宫詔令王子晉出對浮丘公玉山乗四載瑶池宴八龍穆天子傳曰天子至於羣玉之山四轍中乗先王之所謂䇿府郭璞注云山海經羣玉山西王母所居又云造父乃具青羊之血以飲四馬之乗郭曰與王同車御右之屬左傳所謂四乗是也尚書禹曰予乗四載孔安國曰四載謂水乗舟陸乗車泥乗輴山乗􅀈穆天子傳曰天子觴西王母於瑶池之上天子乗八駿之乗赤驥盗驪白義踰輪山子渠黄驊騮緑耳周禮云馬八尺以上曰龍黿橋浮少海鵠蓋上中峰山海經曰有㓜海少海竹書紀年曰周武王伐紂東至於九江叱黿鼉以為梁江淹恨賦云方駕黿鼉以為梁是也中峰即闗中記所謂中南山言在天之中也飛狐横塞路白馬當河衝漢書酈食其曰距飛狐之口守白馬之津以示諸侯形勢則天下歸矣臣瓚曰飛狐在代郡西南塞名史記髙祖本紀曰劉賈將卒二萬人騎數百渡白馬津索隱曰即黎陽津也南界東郡白馬縣水奠三川石山封五樹松史記秦武王謂甘茂曰寡人欲容車通三川窺周室死不恨矣韋昭曰三川河伊洛也秦始皇本紀曰始皇東封㤗山風雨暴至休於樹下因封為五大夫按五大夫秦時官名也此云五樹松矣長虹雙瀑布圓闕兩芙蓉戍樓鳴夕鼔山寺響晨鐘新蒲節轉促短筍籜猶重謝靈運詩曰新蒲含紫茸服䖍漢書注曰籜筍皮也樹宿含櫻鳥花留釀蜜蜂櫻桃一名含桃迎風下列缺灑酒召昌容漢書揚雄傳曰辟厯列缺吐火施鞭應劭曰列缺天隙電照也列仙傳曰昌容者常山道人也自稱殷王子食蓬蘲根二百餘年而顔色如二十許人能致紫草賣與染家得錢以遺孤寡歴世而然奉祀者萬計讃曰殷女忘榮又女仙傳云昌容商王女也知昌容為女仙矣且欣陪北一作此上一作欣陪北山上方欲待東封東封謂封禪㤗山也爾雅曰東嶽為㤗山和宇文内史春日逰山逰客值春輝金鞍上翠㣲爾雅曰山未及上曰翠㣲風逆花迎面山深雲濕衣雁持一足倚猿將兩臂飛戍樓侵嶺路山村落獵圍道士封君達仙人丁令威神仙傳曰封衡字君達隴西人也常駕一青牛人莫知其名因號青牛道士搜神後記曰丁令威本遼東人學道於靈虚山後化鶴歸遼煮丹於此地居然未肯歸逰山一作逰仙聊登𤣥圃殿更上增城山不知髙幾里低頭㸔世間𤣥圃即縣圃崑崙山名也淮南子縣圃凉風樊桐在崑崙閶闔之中又曰崑崙冇增城九重其髙萬一千里唱歌雲欲聚彈琴鶴欲舞列子曰秦青撫節安歌響遏行雲玉符瑞圖云晉平公鼔琴有𤣥鶴二八而下銜明珠舞於庭澗底百重花山根一片雨説文曰澗山夾水也列子曰五山之根無所連著言山之根蔕觸石生雲有一片之雨也婉婉藤倒垂亭亭松直竪和宇文京兆逰田北史曰宇文神舉建徳三年自京兆尹出為熊州刺史小苑禁門開長楊獵客來揚雄羽獵賦序曰武帝開廣上林西至長楊五拃懸知畫眉罷走馬向章臺漢書曰張敞為婦畫眉長安中傳張京兆眉膴時罷朝㑹過走馬章臺街使御史驅自以便面拊馬澗寒泉反縮山晴雲倒回熊饑自䑛掌雁驚獨銜枚熊掌熊蹯也左傳宰夫胹熊蹯崔豹古今注曰雁自河北渡江南瘦瘠能髙飛不畏繒繳江南沃饒每至還河體肥不能髙飛恐為虞人所獲常銜蘆長數寸以防繒繳焉周禮銜枚氏軍旅由役命銜枚鄭以為枚止言語囂諠也枚狀如箸横銜之言雁之銜蘆亦類是矣美酒餘杭醉芙蓉即奉杯神仙傳稱王逺與麻姑飲蔡京家須臾酒盡以千錢與餘杭老姥乞酤酒奉報寄洛州本傳信拜洛州刺史按周本紀建徳六年平齊子山為洛州刺州時也舟師㑹孟津甲子陳東隣尚書㤗誓曰武王伐殷師渡孟津又牧誓曰時甲子昧爽王朝至於商郊乃誓孔安國曰克紂之月甲子之日二月四日也易既濟九五東隣殺牛不如西鄰之禴祀崔憬曰居中當位於既濟之時則當是周受命之日也按北齊本東魏所禪後周本西魏所禪以西鄰喻周而謂東鄰為齊比殷紂矣雷轅驚戰鼔劒室動金神淮南曰雷以為車輪周禮有雷鼔雜記曰髙祖斬蛇劍在室中光景猶照於外幕府風雲氣軍門闗塞人漢書音義拜大將軍於幕中因曰幕府左傳胥甲趙穿當軍門而呼長旍析鳥羽合甲抱犀鱗馬融廣成頌曰建雄虹之長旍周禮司常職云析羽為旌鄭注云析羽皆五采繫之於旗旌之上所謂注旄於首是也周禮犀甲夀百年兕甲夀二百年合甲夀三百年星芒一丈燄月暈七重輪天文志曰彗星小者數寸長或竟天見則兵起大水主掃除除舊布新有五色各依五行木精所主史臣按彗體無光傅日而為光故夕見則東指晨見則西指在日南北則隨日光而指頓挫其芒或長或短光芒所及則為災天官書曰平城之圍月暈參畢七重索隱曰天文志云其占者畢昴間天街也街北胡也街南中國也昴為匈奴参為趙畢為邉兵是嵗髙祖自將兵撃匈奴至平城為冒頓所圍七日乃觧則天象有若符契七重者主七日也黎陽水稍渌官渡栁應春漢書音義臣瓚曰黎陽在魏郡伏滔北征記曰黎陽津名也劉楨鄴中詩曰北渡黎陽津銑曰謂從太祖征袁紹也漢書音義文潁曰於滎陽下引河東為鴻溝即今官渡水也官渡袁曹争戰之地黎陽官渡本魏地後魏都洛自分東西東魏都鄴後禪於齊西魏都長安後禪於周時周武帝親征齊國巳平洛屬於周故子山得涖此地無庸奉天睠驅傳牧南秦繫辭勞簡牘雜俗弊風塵言已為洛州刺史也周書本傳云俄拜洛陽刺史信多識舊章為政清浄吏民安之即此時矣周禮鄭注曰傳遽若今時乗傳騎驛而使者也如淳曰律四馬髙足為傳傳張戀反杜預春秋序曰大事書之於䇿小事簡牘而已説文曰簡牒也牘書版也陸士衡詩云京洛多風塵上洛逢都尉商山見逸民後漢靈帝紀曰中平元年以河南尹何進為大將軍屯都亭置八闗都尉注云都亭在洛陽漢書曰漢興有園公綺里季夏黄公甪里先生當秦之世避而入商洛深山以待天下之定三輔舊事曰四皓秦時為博士避於上洛牛耳山留滯終南下惟當一史臣司馬遷自序云天子始建漢家之封而太史公留滯周南括地志云終南山一名周南山徐廣曰摯虞曰古之周南今之洛陽索隱曰張晏云自陜巳東皆周南地也言今當平齊正功臣建封之日巳為洛州刺史留滯周南當一史臣也按終南一名周南此洛陽周南無兼稱終南疑誤也奉報窮秋寄隱士以詩末二句解之當是報趙王也王倪逢齧缺桀溺耦長沮莊子曰齧缺問於王倪又天地篇云齧缺之師髙士傳曰王倪堯時人也桀溺長沮出論語藜牀負日荷麥隴帶經鋤英雄記曰向詡常坐藜牀上釋名曰人所坐卧曰牀牀裝也所以自裝載也漢書曰倪寛帶經而鋤又魏畧云常林性好學漢末為諸生帶經耕鋤其妻常餽餉之雖在田野相敬如賔自然曲木几無名科斗書爾雅曰科斗活東疏云郭曰蝦蟆子一名科斗一名活東頭圓大而尾細古文似之孔安國云皆科斗古文是也聚花聊餉鶴穿池試飬魚小村治澁路低田補壊渠秋水牽沙落寒藤抱樹疎空枉平原騎來過仲蔚廬平原謂趙王也史記云趙有平原君故以為比髙士傳曰張仲蔚之所居蓬蒿没人上益州上柱國趙王二首周書趙王招傳云武成初進封趙國公食邑萬戸保定中為柱國出為益州總管建徳三年進爵為王銅梁影棠樹石鏡寫搴帷蜀都賦注曰銅梁山在巴東銅梁影棠樹者言趙王出鎮益州巴蜀銅梁是其聼政之所若召伯甘棠矣蜀王本紀曰武都丈夫化為女子蜀王納以為妃無幾物故𦵏於成都郭中以石鏡一枚表其墓搴帷賈琮事按下文此帷疑謂婦人之飾時紇豆陵氏偕行與墓誌山名石鏡即對粧臺同兩江如漬錦雙峰似畫眉蜀都賦曰帶二江之雙流括地志曰二江並在益州成都縣界杜預益州記曰二江者郫江流江也風俗通云秦昭王使李氷為蜀守開成都縣兩江溉田萬頃水經注益州記曰平鄉江東逕峨眉山在南安縣界去成都南十里秋日清澄望見兩山相峙如蛾眉焉穿荷低晚蓋衰栁掛殘絲風流盛儒雅泉湧富文詞無因同子淑暫得侍臨淄魏畧曰邯鄲淳字子淑博學有才章髙祖素聞其名甚敬異之欲使在文學官屬中㑹臨淄侯植亦求淳太祖遣淳詣植植初得淳甚喜及論羲皇以來賢聖名臣烈士優劣之差頌古今文章賦誄當官政事宜所先後用武行兵倚伏之勢坐席黙然無與抗者及暮淳歸嘆植之材謂之天人於是世子未立太祖俄有意於植而淳亦屢稱植材子山以趙王之才比於陳思矣寂寞嵗隂窮蒼茫雲貌同鶴毛飄亂雪車轂轉飛蓬雁歸知向暖鳥巢解背風吕氏春秋曰仲秋之月候雁来𤣥鳥歸羣鳥飬羞髙誘曰寒氣將至羣烏養進其羽毛御寒也淮南子曰巢居知風寒沙兩岸白獵火一山紅願想懸鶉弊時嗟陋巷空詩伐檀云不狩不獵胡瞻爾庭有懸鶉兮詩序曰在位貪鄙無功而受禄也又按懸鶉敝衣荀子曰子夏之衣如懸鶉論語云在陋巷謹贈司寇淮南公司寇淮南公魏宗室元偉也周書武帝紀云建徳四年遣小司寇淮南公元偉使於齊周書列傳云元偉字獻道河南洛陽人也魏昭成之後少好學有文雅建徳二年遷小司寇四年以偉為使主報聘於齊是秋髙祖親戎東討偉遂為齊人所執六年齊平偉方見釋髙祖以其久被幽縶加授上開府位至大將軍初自鄴還也庾信贈其詩曰虢亡垂棘返齊平寳鼎歸其為辭人所重如此按此知是詩為贈淮南公元偉也危邦久亂徳天䇿始乗機危邦亂徳言齊國久危亂也天䇿乗機謂髙祖親戎東討也左氏傳曰天䇿焞焞虢公其奔杜注云天䇿傅説星也九河聞誓衆千里見連旂九河禹貢鉤盤鬲津等名虢亡垂棘返齊平寳鼎歸左傳僖元年云晋以垂棘之璧假道於虞以伐虢五年滅虢戰國䇿樂毅書曰故鼎反於磨室言齊平偉歸為國重寳也久弊風塵俗殊勞闗塞衣絆驥還千里垂鵬更九飛猶憐馬齒進應念節旄稀言齊平見釋髙祖以其久被幽縶加授開府也淮南子曰絆騏驥而求千里説文曰絆半也拘使半行不得自縦也莊子曰鵬之背不知其幾千里也怒而飛其翼若垂天之雲又云摶扶揺而上者九萬里榖梁傳曰馬齒加長矣漢書蘇武傳曰匈奴徙武北海上無人處使牧羝羝乳乃得歸武既至海上廪食不至掘野鼠去屮實而食之杖漢節牧羊卧起操持節旄盡落言於此時不降齊國若蘇武矣迴軒入故里園桞始依依舊竹侵行逕新桐益幾圍寒谷梨應重秋林栗更肥謂偉歸也謝靈運詩曰園栁變鳴禽潘岳閒居賦曰張公大谷之梨故云寒谷美酒還參聖雕文本入㣲促歌迎趙瑟逰絃召楚妃偉本傳云偉性温柔好虚静居家不事生業篤學愛文政事之暇未嘗棄書謹慎小心與物無忤時人以此稱之詩小苑云人之齊聖飲酒温克箋云中正通知之人飲酒雖醉猶能温藉自持以勝魏志曰時禁酒尚書郎徐邈私飲酒至沉醉校事趙逵問以曹事邈曰中聖人逵白之太祖太祖大怒鮮于輔進曰平日酒客謂清者為聖人濁者為賢人雕文即揚子法言所謂雕蟲篆刻者也揚子晚而談𤣥是入㣲矣楊惲報孫㑹宗書曰婦趙女也雅善鼔瑟嵇康琴賦曰鵾鷄逰絃又曰王昭楚妃注引歌録曰石崇作楚妃嘆陸機吳趨行云楚妃且勿嘆齊娥且莫謳小人司刺舉明敭一作時實濫吹小人子山自稱時刺舉洛州漢官儀曰刺舉州事尚書曰明明􅏡側陋􅏡舉也濫吹即南郭吹竽事江淹雜體詩曰濫竽乖名實南部治都尉軍謀假建威隋書地志曰洛州後周置東京六府總管漢書百官公卿表云武帝元鼎二年置三輔都尉奉車都尉駙馬都尉皆比二千石後漢書曰耿弇為建威將軍商山隱士石丹水鳳凰磯謂洛州治也漢書曰園公綺里季夏黄公甪里先生隱商洛山髙士傳曰髙車山上有四皓碑及祠皆漢恵帝所立也山海經曰丹水南流注於渤海有鳥焉名曰鳯凰桑欽水經曰丹水出京兆上洛縣西北冢嶺山又東南過商縣至於丹水縣入於汋野亭長被馬山城早掩扉言疆場時有警也後漢書曰郭伋止野亭傳呼擁絳節交㦸映彤闈漢書蕭望之傳曰下車趨門傳呼甚寵師古曰傳聲而呼甚有尊寵也史記索隱曰節使者所擁也漢書曰漢節純赤史記項羽本紀稱樊噲入軍門交㦸之衛士欲止不内謝朓酬王晋安詩曰日旰坐彤闈言為洛州刺史辱此髙位也遂令㤀楚操何但食周薇左氏傳曰晋侯與鍾儀操琴南音杜注云南音楚聲古史考曰夷齊采薇有婦人謂之曰子義不食周粟此亦周之草木也於是餓死傷已屈節仕周深愧偉之使齊全節也三十六水變四十九條非抱樸子曰道家有三十六水經神仙傳云八公詣淮南王安授丹經及三十六水方洞仙傳曰扈謙魏郡人有詩云手揺四十九靈光在上照按謙晋廢帝時人此謂飬生無術故下文丹竈歇而年齡衰也駕又一觧袁宏後漢紀曰傕汜繞營呌呼李藥欲令車御船過砥柱出盟津楊彪口臣𢎞農人也自此以東有三十六灘非萬乗所當登劉艾亦曰臣前為陜縣知其危險莊子曰蘧伯玉行年五十而知四十九年之非按詞連上文信治洛州危險如三十六灘之變立身有四十九條之非也丹竈風煙歇年齡蒲柳衰言已於今老矣無能為也南越志曰長沙郡瀏陽縣東有王喬山山有合丹竈世説曰顧悦與簡文同年而髮先白簡文曰卿何以先白對曰蒲栁之姿望秋先零松柏之質經霜彌茂同僚敢不盡疇日懼難追左氏傳曰同官為僚周書元偉傳云世宗初受詔於麟趾殿刋正經籍按武成二年子山亦為麟趾學士天和初為司空中大夫知與偉同官也正旦上司憲府滕王逌序云入為司憲中大夫嘗正旦賦詩云云其王事之中優游如此詰旦啟門䦨繁辭湧筆端左氏傳曰詰朝將見杜注云詰朝明旦也説文曰闌門遮也韓詩外傳云文士筆端蒼鷹下獄吏獬豸飾刑官漢書郅都傳曰都嚴酷行法不避貴戚列侯宗室見都側目而視號曰蒼鷹應劭漢官儀曰法冠一曰柱後冠左傳曰南冠而縶者楚囚也秦滅楚以其冠賜近臣御史服之即今獬豸冠也古有獬豸獸觸不直者故執憲以其形用為冠令觸人也司朝引玉節盟載捧珠盤周禮曰掌節掌守邦節而辨其用以輔王命守邦國者用玉節鄭注云玉節之制如王為之以命數為大小盟載載書也左傳云士莊子為載書周禮玉府云若合諸侯則供珠盤玉敦窮紀星移次歸餘律未殫吕氏春秋曰季冬日窮於次月窮於紀左氏傳曰歸餘於終事則不悖言月紀已窮而冬律未盡也雪髙三尺厚氷深一丈寒短筍猶埋竹香心未啟蘭孟門久失路扶揺忽上摶孟門山名史記云商紂之國左太行右孟門莊子齊諧之言曰鵬之徙於南㝠也水撃三千里摶扶揺而上者九萬里棲烏還得府棄馬復歸欄漢書曰御史府中列柏樹常有野烏數千棲宿其上晨去暮来號曰朝夕烏棄馬即後漢書所謂鮑氏驄三入司𨽻再入公行行且止避桓氏驄馬是也榮華名義重虚薄報恩難枚乗還起疾貢禹遂彈冠漢書曰梁客皆善屬詞賦乗尤髙孝王薨乗歸淮隂武帝自為太子聞乗名及即位乗年老乃以安車蒲輪徵乗道死又曰王吉與貢禹為友世稱王陽在位貢公彈冠言其取舍同也方垂蓮葉劍未用竹根丹越絶書曰越王取純鉤薛燭望見其華粹如芙蓉神仙傳曰以竹根汁煑丹一知懸象法誰思垂釣竿周禮司冦云正月之吉始和布刑於邦國乃懸刑象之法於象魏使萬民觀刑象挾日而斂之後周司憲古周司冦也詩衛風曰籊籊竹竿以釣於淇豈不爾思逺莫致之詩序曰竹竿衛女思歸也適異國而不見答思而能以禮者也言己本不欲仕又未能隱為司憲惟知懸其刑書在異國而不能遂其思歸之情也任洛州酬薛文學見贈别本傳云俄拜洛州刺史予居河之曲英彦本連蹤史記正義曰河曲在華隂縣界文子曰智過萬人謂之英爾雅曰美士為彦鹽形或變虎鼎氣乍成龍左氏傳曰王使周公閲來聘饗有形鹽下云鹽虎形葢其形象虎也杜元凱云鹽虎形以象虎也魏土地記曰𢎞農湖縣有軒轅黄帝登仙處昔黄帝採首山銅以鑄鼎鼎成有龍下迎帝仙去小臣攀龍髯而上者七十二人漢武帝於此建鼎湖宫若人承載徳宫牆定數重五衢開辯路四照起文峰言薛文學承祖父之世徳更有異才也山海經曰少室之山其上有木焉名曰帝休葉茂狀如楊其枝五衢黄華黑實服者不怒郭璞曰言樹枝交錯相重五出有若衢路也又山海經曰南山之首山曰鵲山有木焉其狀如穀而黑其華四照其名曰迷穀佩之不迷郭璞曰言有光炎若木華赤其光照下地也曰余濫推轂民願始天從上洛分都尉𢎞農開附庸曰余子山自謂言除洛州刺史也漢書鄭當時傳曰其推轂士及官屬丞吏誠有味其言也師古曰推轂言薦舉人如車轂之運轉也漢書地理志曰上洛屬𢎞農有冢嶺山雒水出後漢靈帝紀曰中平元年大將軍何進將兵屯都亭置八闗都尉官章懐太子注曰都亭在洛陽八闗謂函谷廣武伊闕大谷轘轅旋門小平津孟津也漢書地理志曰𢎞農郡武帝元鼎四年置故秦函谷闗羊腸連九坂熊耳對雙峰史記吳起傳曰夏桀之居羊腸在其北臣瓚曰今河南城為直之東京賦曰西阻九阿銑曰洛陽西十里九坂之道也漢書地理志曰𢎞農郡盧氏有熊耳山水經曰洛水又東逕熊耳山北東北過盧氏縣南酈道元注云禹貢所謂導洛自熊耳是也又云洛水之北有熊耳山雙巒競舉狀如熊耳此是别山不與禹貢導洛自熊耳同也昔漢光武破赤眉樊崇積甲仗與熊耳山平即是山也是有兩熊耳山一山在𢎞農盧氏縣别一山在宜陽縣矣白石仙人芋青林隱士松神仙傳曰焦先字孝然河東人也年一百七十嵗常食白石以分與人熟煮如芋晋書曰髙士戴安道修道成功有眞氣結成五色雲浮於松上故號隱士之松耳北梁送孫楚西堤别葛龔臧榮緒晋書曰孫楚字子荆太原人征西扶風王駿與楚舊好起為恭軍梁令衛軍司馬為馮翊太守卒後漢書曰葛龔字元輔梁國寧陵人和帝時以善文記知名舉茂才為臨汾令有政績著文賦碑誄書記凡二十篇故人倘書札黎陽土足封後漢書曰鄧訓字平叔將黎陽營兵屯狐奴撫接邉兵為幽部所歸遷䕶烏桓校尉黎陽故人多携將老幼樂隨徙邉東觀漢紀曰鄧訓故吏最貧羸者舉國念訓常所服藥北州乏少又知訓好青泥封書從黎陽歩推鹿車於洛陽市還過趙國易陽並載青泥一樸至上國遺訓其得人心如是將命至鄴酬祖正員酬祖孝隱也北齊書祖珽傳云珽弟孝隱魏末為散騎常侍迎梁使時徐君房庾信來聘名譽甚髙魏朝聞而重之接對者多取一時之秀盧孔景之徒並降階攝執更遞司賔我皇臨九有聲教洎無隄興文盛禮樂偃武息氓黎我皇謂梁武帝也武帝紀云大同二年十二月與東魏通和是此時聘於東魏矣商頌𤣥鳥詩曰奄有九有毛傳曰九有九州也按隋書稱梁武帝除暴寧亂奄有舊吳至大同中有州一百七是其聲教所及矣尚書曰王來自商至於豐乃偃武修文孔安國曰闡修文教賈逵國語注云偃息也承乏驅騏驥旌旗事琬珪一作旌㫋事鼔鼙莊子騏驥驊騮一日而馳千里説文曰騏馬青色文如博棊也聲渠之切驥千里馬也孫陽所相者聲几利切周禮冬官考工記曰琬珪九寸而繅以象徳鄭注云琬猶圜也王使之瑞節也諸侯有徳王命賜之使者執琬珪以致命焉古碑文字盡荒城年代迷被隴文𤓰熟交塍香穗低西都賦曰溝塍刻鏤塍音乗説文曰塍稻田之畦也投瓊實有慰報李更無蹊詩衛風木𤓰云投我以木李報之以瓊玖漢書李廣傳贊諺云桃李不言下自成蹊將命至鄴將命至鄴二首皆在梁時作聘於東魏文章辭令盛為鄴下所稱大國修聘禮親鄰自此敦儀禮有聘禮鄭注云大問曰聘諸侯相與久無事使卿相問之禮小聘使大夫周禮曰凡諸侯之邦交嵗相問也殷相聘也世相朝也于五禮屬賔禮張旃事原隰負扆一作賔序報成言儀禮聘禮曰及竟張旜誓乃謁闗人鄭注云張旜明事在此國也張旜謂使人維之釋曰節服氏掌祭祀朝覲六人維王之大常大常十二旒人有六一人維持二旒諸侯四人不依命數大夫無文或一人或二人維持之周禮曰通帛為旃爾雅曰因章為旃郭璞注云以帛練為旒因其文章不復畫之也詩曰皇皇者華于彼原隰爾雅曰髙平曰原下濕曰隰又爾雅曰戸牖之間謂之扆郭注云窗東戸西也覲禮云天子設斧依于戸牖之間左右几鄭注云依如今綈素屏風也有繡斧丈所以示威也斧謂之黼是也西過犯霜露北指度轘轅新序孔子張曰臣犯霜露冐塵埃轘轅坂名漢書曰沛公從轘轅臣瓚曰在緱氏東南東京賦曰邪徑㨗乎轘轅交歡值公子展禮覿王孫左傳襄二十九年曰吳公子札來聘見叔孫穆子説之聘於齊説晏平仲聘于鄭見子産如舊相識與之縞帶子産獻紵衣焉適衛説蘧瑗史狗史鰌公子荆公叔發適晋説趙文子韓宣子魏獻子國語曰王孫圉聘于晋定公享之趙簡子鳴玉以相儀禮曰賔覿奉束錦總乗馬二人贊入門左北面奠幣再拜稽首玉藻云公事自闑西鄭注云聘享也又云私事自闑東鄭注云覿面也儀禮又稱私覿愉愉焉論語亦云矣何以譽嘉樹徒欣賦采蘩左傳昭二年曰韓宣子來聘既享宴于季氏有嘉樹焉宣子譽之武子曰宿敢不封殖此樹以無㤀角弓遂賦甘棠宣子曰起不堪也無以及召公又昭元年傳曰夏趙孟叔孫豹曹大夫入于鄭鄭伯兼享之趙孟為客禮終乃宴穆叔賦采蘩杜預曰詩召南義取蘩葉薄物可以薦公侯享其信不求其厚四牢欣折俎三獻滿罍樽左氏傳曰晋士鞅來聘以齊國歸費之禮為士鞅士鞅怒曰鮑國之位下其國小而使鞅從其牢禮是卑敝邑也將復諸寡君魯人恐加四牢焉為十一牢又宣十六年傳曰王享有體薦宴有折俎杜預曰體解節折升之于俎物皆可食所以示慈惠也又昭元年杜注曰卿㑹公侯享宴皆折俎不體薦儀禮聘禮曰乃至於禰筵凡於室薦脯醢觴酒陳席於阼薦脯三獻一人舉爵獻從者行酬乃出上介至亦如之鄭注云主人酌進奠一獻也室老亞獻士三獻也爾雅曰尋卣罍器也小罍謂之坎郭注云罍形似壺大者受一斛周禮司尊罍云皆有罍諸侯之所酢注云罍亦刻而畫之為山雲之形漢書云梁孝王有􅪖尊鄭氏以為取象雲雷矣人臣無境外何由一作日欣此言禮人臣無境外交風俗既殊阻山河不復論無因旅南館空欲祭西門魏文帝與吳質書曰旅食南館李善曰儀禮曰尊士旅食於門鄭注云旅衆也士衆謂未得禄所謂庶人在官者史記齊威王曰吾臣有黔夫者使守徐則燕人祭北門趙人祭西門徙而從者七十餘家眷然惟此别夙期幸共存入彭城館漢書地理志曰彭城古彭祖國襄君前建國項氏昔稜威襄君宋襄公也彭城為春秋時宋楚之接境故北征記云彭城有宋桓魋石槨地理志云彭城在傅陽縣左傳襄十年云晋滅之以與宋國者也項氏楚項籍也史記曰項羽都于彭城敗于垓下漢書武帝報李廣曰威稜攝乎隣國李竒曰神靈之威曰稜潘岳馬汧督誄曰秋霜稜威下云鶂飛則宋襄公事也鷄鳴則楚項羽事也鶂飛傷楚戰雞鳴悲漢圍漢書五行志曰宋襄公區霿自用不容臣下􅊇司馬子魚之諫而與彊楚争盟後六年為楚所執應六鶂之數云左傳僖十六年曰六鷁退飛過宋都風也周内史叔興聘於宋宋襄公問焉對曰君將得諸侯而不終杜預曰宋襄公不終别以政刑吉凶他占之此云鶂飛傷楚戰用五行志文也傷楚戰者即春秋戰於泓之事宋襄公為楚所敗矣左傳作鷁漢書作鶂音同杜預曰鷁水鳥髙飛遇風而退莊子云鶂之相視眸子不運而風化博物志云雌雄相視則孕雄鳴上風雌承下風是也漢書曰漢兵圍羽垓下羽夜聞漢軍四面皆楚歌應劭曰楚歌者雞鳴歌也年代一作世殊氓俗風雲更盛衰後漢書二十八將論曰感㑹風雲水流浮磬動山喧雙翟飛禹貢曰泗濵浮磬孔安國傳曰泗水涯水見石可以為磬伏淊北征記曰彭城北六里有山臨泗是彭城近泗水也禹貢曰羽畎夏翟孔傳云夏翟雉名夏餘花欲盡秋近鷰將稀淮南子曰仲秋之月𤣥鳥歸𤣥鳥鷰也槐庭垂緑穗蓮浦落紅衣王儉褚淵碑文云贊道槐庭楚辭曰製芰荷以為衣集芙蓉以為裳王逸曰芙蓉蓮華也説文曰浦瀕也以周禮三槐為三公之位故槐曰槐庭以楚辭集芙蓉為衣故蓮曰紅衣徒知日云暮不見舞雩歸春官女巫職曰旱暵則舞雩因謂其處為舞雩舞雩之處有壇墠樹木可以休息故論語云風乎舞雩也同州還周書宣帝紀大象二年三月行幸同州庾子自同州至隋書地理志云馮翊郡後魏置華州西魏改同州按元年隋王楊堅為大後丞趙王招等並之國故云范睢入相穰侯出蕃赤岸繞新村青城臨綺門周書宣帝紀云幸同州自應門至於赤岸澤十里間幡旂相蔽是同州有赤岸澤也三輔皇圖曰長安城東出南頭第一門曰覇城門民見門色青名曰青城門或曰青門廟記曰覇城門亦曰青綺門范㫿新入相穰侯始出蕃史記曰穰侯魏冉者秦昭王母宣太后弟也魏人范睢自謂張禄先生譏穰侯之伐齊乃越三魯以攻齊也以此時奸説秦昭王王用范睢睢言宣太后専制穰侯擅權於諸侯涇陽髙陵之屬富於王室於是秦昭王悟乃免相國涇陽之屬皆出闗就封邑穰侯出闗輜重千乗有餘穰侯卒於陶而因葬焉上林催獵響河橋争渡喧漢舊儀曰上林苑方三百里苑中飬百獸天子秋冬射獵取之史記正義曰河橋在臨晋縣東渡河至蒲州今蒲津橋也竄雉飛横澗藏狐入斷原將軍髙宴晚來過青竹園東觀漢紀曰上拜冦恂為河内太守恂移書屬縣講兵肄射伐淇園之竹治矢百餘萬從駕觀講武周書武帝紀云保定二年十月戊午講武於少陵園校戰出長楊兵欄入鬭塲漢書揚雄曰聊因校獵以風師古曰校獵謂圍守禽獸而大獵也三輔黄圗曰長楊宫在今盩厔縣東南三十里本秦舊宫至漢修飾之以偹行幸宫中有垂楊數畆因為名門曰射熊觀秦漢逰獵之所置陣横雲起開營雁翼張史記天官書曰陣雲如立垣雜兵書曰八陣八曰雁行陣門嫌磁石礙馬畏鐵菱傷三輔黄圖曰阿房宫以磁石為門懐刃者止之鮑明逺蕪城賦云製磁石以為禦磁石門乃阿房宫北闕門也門在阿房悉以磁石為之故專其目令四夷朝者皆入門而脅止以示神亦曰却胡門鐵菱疑即渠答也漢書晁錯曰髙城深塹具藺石布渠答蘇林曰渠答鐵蒺藜也龍淵觸牛斗繁弱駭天狼龍淵劒名越絶書曰楚王召風胡子曰聞吳有干將越有歐冶子請此二人作鐵劍可乎於是風胡子見二人作劍三枚一曰龍淵二曰太阿三曰工市晋書曰吳未滅時斗牛之間常有紫氣雷煥曰寳劍之精上徹於天耳繁弱弓名左傳曰封父之繁弱天官書云東有大星曰狼狼角變色多盗賊下有四星曰弧直狼落星奔驥騄浮雲上驌驦落星即流星言其疾也李尤七歎曰神奔電驅星流矢騖則莫若益野騰駒陳孔璋所云飛兔流星超出越海者也張衡南都賦曰騄驥齊鑣五臣本作驥騄李善曰穆天子傳云八駿冇赤驥騄耳陳琳代曹洪與魏文帝書曰夫騄驥垂耳於坰牧騄音緑字从馬取驥緑耳之義也西京雜記曰文帝有良馬名浮雲驌驦左傳作肅爽唐成公如楚冇兩肅爽馬是也杜預曰肅爽駿馬名爽音霜或作霜以肅霜名馬後人更从馬字為驌驦急風吹戰鼓髙塵擁貝裝荀子曰東海有紫紶楊倞注云紫貝也紶當為蜐郭璞謂之石蜐盖蛤蚌之屬古以龜貝為貨張宴曰裝囊也駭猿時落木驚鴻屢斷行駭猿飬由基事驚鴻更嬴事注巳見樹寒條更直山枯菊轉芳一作香豹畧推全勝龍韜一作圖揖所長莊子曰從説之則有金板六弢司馬崔云金板六弢皆周書名或曰秘䜟也本又作韜謂太公六韜文武虎豹龍犬也小臣欣寓目還知奉㑹昌左傳子玉曰請君馮軾而觀之得臣亦寓目焉蜀都賦云逺則岷山之精上為井絡天帝運期而㑹昌劉逵注云河圗括地象曰岷山之精上為井絡帝以㑹昌神以建福昌慶也言天帝於此㑹慶建福也時將發師至蜀從駕講武故云奉報趙王出師在道賜詩報趙王招也周書趙王招傳云保定中拜為柱國出為益州總管按上篇講武詩還知奉㑹昌下篇奉和趙王送峽中軍知是為益州總管時不然本傳趙王之出師也多矣上將出東平先定下江兵上將文昌星名東平漢王國也後漢書有東平王蒼又曰王莽地皇三年王常成丹西入南郡號下江兵郡國志云南郡編縣有藍口聚注云下江兵所據今當陽縣城是也彎弓伏石動振鼔沸沙鳴韓詩外傳曰昔楚熊渠子夜行見寢石以為伏虎彎弓而射之没金飲羽異苑曰凉州西沙山昔有覆師於此積尸數萬大風吹沙覆成山阜時聞冇鼔角聲横海將軍號長風駿馬名漢書曰東越反上遣横海將軍韓説等入軍於越吳都賦曰習御長風狎翫靈胥李善注云越絶書曰子胥死王使捐於大江口乃發憤馳騰氣若奔馬乃歸神大海雨歇殘虹斷雲歸一雁征暗巗朝石濕空山夜火明低橋澗底渡狹路花中行觀此數語知是從峡中行也錦車同建節魚軒異泊營軍中女子氣塞外夫人城言與趙國夫人紇豆陵氏同行也漢書西域傳曰初楚主侍者馮嫽能史書習事常持漢節為公主使行賞賜於城郭諸國敬信之號曰馮夫人為烏孫右大將妻右大將與烏就屠相愛都䕶鄭吉使馮夫人説烏就屠降烏就屠曰願得小號宣帝徵馮夫人自問狀遣謁者竺次期門甘延夀為副送馮夫人馮夫人錦車持節詔焉服䖍曰錦車以錦衣車也左氏傳曰歸夫人魚軒漢書曰李陵與單于戰陵曰士氣少衰而鼓不起者何也軍中豈有女子乎始軍出時闗中羣盗妻徙邉者隨軍為卒妻婦大匿軍中陵捜得皆斬之又商子兵守篇云壯女為一軍史記云孫武以兵法見於吳王試以婦人梁湘東王嘗出軍有人將婦從者王曰才愧李陵未能先誅女子將非孫武遂欲驅戰婦人皆引軍中女子之事也漢書曰漢軍乗勝追北至范夫人城應劭曰本漢將築此城將亡其妻率餘衆完保之因以為名也張宴曰范氏能詛胡者時趙王將婦出軍故引軍中女子塞外夫人之事子山紇豆陵墓誌云柱國殿下揚旌玉壘驅傳銅陵夫人從政月峡贊徳雲門是也夫人後薨於成都之錦城矣小人乖攝飬岐路阻逢迎小人子山自稱也揚子悲岐路爾雅曰二逵謂之岐旁郭注曰岐道旁出也幾月芝田熟何年金竈成十洲記曰鐘山在北海之子地仙家數千萬耕田種芝草課計頃畆也鮑照舞鶴賦曰朝戯乎芝田史記曰少君言上曰祠竈則致物而丹砂可為黄金黄金成以為飲食噐則益夀哀笳闗塞曲嘶馬别離聲傅𤣥笳賦序曰吹葉為聲説文作葭子山身為羇旅又與趙王離别即李陵書所謂胡笳互動牧馬悲鳴者也王子身為寳深思不倚衡王子謂趙王也史記袁盎曰百金之子不騎衡服䖍曰自惜身不騎衡如淳曰騎倚也衡樓殿邉欄楯也韋昭曰衡車衡也和趙王送峽中軍一作和趙王送從軍樓船聊習戰白羽試撝軍西京雜記曰武帝作昆明池欲伐昆吾教習水戰又曰昆明池中有戈船樓船各數百艘樓船上建樓櫓戈船上建戈矛吕氏春秋曰武王伐殷係墮武王左釋白羽右釋黄鉞免而自為係鬻子曰武王率兵車以伐紂紂虎旅百萬陣於商郊起自黄鳥至於赤斧三軍之士莫不失色武王乃命太公把白旄以麾之紂軍反走髙誘淮南子注云撝揮也山城對却月岸陣抵平雲水經注曰沔左有却月城亦曰偃月壘湘中記曰衡有玉牒禹案其文治水遥望衡山如陣雲沿湘千里九向九背乃不復見赤虵懸弩影流星抱劍文風俗通曰汲令應彬請主簿杜宣飲酒時其上懸赤弩照杯中如虵宣惡之彬曰此弩影似耳古今注曰吳大皇帝有寳劍六白虹紫電辟邪流星青㝠百里胡笳遥警夜塞馬暗嘶羣李陵答蘇武書曰胡笳互動牧馬悲鳴吟嘯成羣邉聲四起杜摯笳賦序曰笳者李伯陽入西戎所作也客行明月峽猿聲不可聞蜀本紀曰蜀王秀所建三峡明月峡巴峡巫峽荆州記曰巴東三峡巫峡長猿鳴三聲淚沾裳奉和趙王途中五韻同前飄飄暎車幕出没望連旗度雲還翊陣迴風即送師風后握竒經有雲陣風陣又六宗箕星有風師之名故云度雲翊陣迴風送師也峽路沙如月山峰石似眉華陽國志曰巴郡枳縣有明月峡蜀都賦曰抗峩眉之重阻劉逵注云峩眉山名在成都南犍為界村桃拂紅粉岸栁被青絲錦城遥可望迴鞍念此時任豫益州記曰益州城張儀所築錦城在州南蜀時故宫也其處號錦里同盧記室從軍隋書列傳云盧愷字長仁涿郡范陽人也愷性孝友神情爽悟畧渉書記頗觧屬文周齊王憲引為記室其後襲爵容城伯從憲伐齊説伯杜鎮下之是其事也又按齊王憲傳憲伐齊在天和六年此云同盧記室從軍知伐齊之役子山同盧愷並從齊王軍行也河圖論陣氣金匱辨星文孔安國尚書傳曰河圖即八卦之形河圖論陣氣者諸葛孔明所謂八陣圖也若八卦矣太公有金匱書金匱辨星文者歩星宿以紀吉凶之象也地中鳴鼓角天上下將軍後漢書公孫瓚與子續書曰鼓角嗚於地中漢書曰周亞夫為太尉東撃吳楚既至覇上趙渉遮説亞夫曰兵事上神將軍何不從此右去直入武庫諸侯聞之以為將軍從天而下也函犀恒七屬絡鐵本千羣周禮曰函人為甲犀角七屬陸倕新刻漏銘曰鐵馬千羣朱旗萬里飛梯聊度絳合弩暫凌汾陳琳武庫賦曰其攻也則飛梯行雲臨閣靈構隋書地理志曰絳郡後魏置東雍州後周改曰絳州又正平縣有後魏南絳郡翼城縣後魏置曰北絳縣并置北絳郡後齊廢新安縣並南絳入焉絳縣舊置絳郡後周置晉州又曲沃縣有絳山按絳本春秋時晋地左傳莊二十六年晋士蒍城絳以深其宫杜預曰絳晋所都也今平陽絳邑縣時周齊接界並置郡縣故伐齊之師飛梯度絳矣釋名曰弩者怒也其柄曰臂鉤絃者為牙隋志文成郡東魏置南汾州後周改為汾州後齊為西汾州後周平齊置總管府按汾亦春秋晋地左傳稱臺駘汾神時齊未平西汾尚屬於齊故云合弩凌汾也寇陣先中斷妖營即兩分寇陣妖營謂齊國營陣也連𤇺對嶺度嘶馬隔河聞方言曰烽虞望也嶺謂絳山河謂汾也箭飛如疾雨城崩似壊雲袁宏後漢紀昆陽之戰云弩射城中如雨有流星墮營中正晝有雲氣若壊山直於營而墮不及地尺而滅吏士皆壓仆英王於此戰何用武安君英王謂齊王憲也史記曰白起為武安君侍從徐國公殿下軍行徐國公者若干惠之子若干鳳也周書列傳云保定二年追録佐命之功封鳳徐國公八風占陣氣六甲候兵韜易緯通卦驗云東北曰條風東方曰明庶風東南曰清明風南方曰景風西南曰凉風西方曰閶闔風西北曰不周風北方曰廣莫風條風一名融風景風又名凱風左傳襄十八年曰晋人聞有楚師師曠曰吾驟歌北風又歌南風杜預注曰歌者吹律以詠八風歌南北風者聼晋楚之强弱黄帝𤣥女兵法曰禹問於風后曰吾聞黄帝有屈勝之圖六甲隂陽之道太公有六韜文武虎豹龍犬説文曰韜劍衣也置府仍開幕麾軍即秉旄漢書注晋灼曰衛青征匈奴絶大漠大克獲帝就拜大將軍於幕中府故曰幕府淮南子曰武王伐紂渡孟津陽侯之波逆流而撃疾風晦冥人馬不相見武王左操黄鉞右秉白旄瞋目而撝之風濟而波罷張平子思𤣥賦舊注尚書曰右秉白旄以麾按執旄以指撝也秦漢以来即以所執之旄名曰麾謂麾幡曲蓋者也長旂臨廣武烽火對成臯漢書髙帝紀曰漢王引兵渡河復取成臯軍廣武孟康曰於滎陽築兩城而相對因為廣武城在敖倉西三室山上地理志曰河南郡成臯故虎牢或曰制匈奴傳烽火通於長安師古曰晝則舉燧夜則舉烽巡寒重挾纊酌水勝單醪左傳宣十二年曰楚子圍蕭申公巫臣曰師人多寒王巡三軍拊而勉之三軍之士皆如挾纊正義曰玉藻云纊為繭緼為袍鄭云纊新綿也黄石公記曰昔良將之用兵也人饋一簞醪投河令衆迎流而飲之夫一簞之醪不味一河而三軍思為致成非嗞味及之也陣後雲逾直兵深星轉髙陣雲注見上篇從駕觀講武詩河圖稽燿鉤曰太白散為天狗主候兵電𦦨驅龍馬山精鏤寳刀崔豹古今注曰秦始皇有馬名奔電周禮曰馬八尺以上為龍吳越春秋曰干將作劒采五山之鐵精塞逈翻榆葉闗寒落雁毛如淳漢書注曰長榆塞名王恢所謂樹榆以為塞者也郭璞山海經注曰雁門山即北陵西隃雁之所出因以名云在髙栁北既得從神武何須念久勞易繫辭曰古之聰明睿知神武而不殺者夫王仲宣從軍詩曰所從神且武安得久勞師伏聞逰獵虞旂喜旦晴獵馬向山横周禮曰若大田獵則萊山田之野植虞旂于其中致禽而珥焉石闗魚貫上山梁雁翅行相如上林賦曰蹷石闗張宫揖曰觀名周易曰貫魚以人寵無不利王弼曰駢頭相次似貫魚也范蔚宗樂逰應詔詩曰山梁協孔性白虎通曰雁飛則成行鮑照出自薊北門行曰雁行緣石起魚貫度飛梁雪平尋兔跡林叢聴雉聲馬嘶山谷響弓寒桑柘鳴許慎曰南方谿子巨黍蠻􅊂柘弩皆善材也聞弦鳥自落望火獸空驚無風樹即正不凍水還平誰知茂陵下願入睢陽城漢書曰相如上疏諫獵既病免家居茂陵又曰梁孝王廣治睢陽城為複道自宫連屬於平臺三十餘里招延四方豪傑言已欲擬相如病免仍歸梁也見征客始還遇獵貳師新受詔長平正凱歸猶言乗戰馬未得解戎衣史記大宛傳言拜李廣利為貳師将軍伐宛期至貳師城取善馬故號貳師將軍衛青傳云封青為長平侯周禮曰王師大獻則合奏愷樂鄭注云大獻獻㨗於祖也左氏傳曰振旅凱入于晉吳都賦云迄可休而凱歸戎衣者周禮司服云凡兵事韋弁鄭注云韋弁以韎韋為弁又以為衣裏也杜預左傳注曰戎服軍旅之衣也上林遇逐獵宜春暫合圍三輔黄圖曰上林苑中飬百獸天子秋冬射獵取之史記曰上至長楊獵相如上疏諫之還過宜春宫漢帝熊猶憤秦王雉更飛漢書孝元馮昭儀傳曰上幸虎圈鬭獸熊佚出圈攀檻欲上殿左右貴人皆走馮媫妤當熊而立左右格殺熊上問何故當熊媫妤曰猛獸得人而止妾恐至御座故身當之帝嗟嘆以此倍敬重焉太康記曰秦文公時陳倉人獵得獸若彘而不知其名道逢二童子曰此名為䊧弗迷䊧弗迷亦語曰彼二童子名為寳雞得雄者王得雌者覇陳倉人舍䊧弗迷逐二童子化為雉雄止陳倉化石雌止南陽故人迎借問念舊始依依河邉一片石不復肯支機蘇武詩曰思心常依依李善注曰依依思戀之貌也荆楚嵗時記曰張騫使大夏尋河源經月而至一處見城郭如州府室内有一女織又見一丈夫牽牛飲河織女取支機石與騫而還言得見故人述其思婦之情也奉和闡𢎞二教應詔二教謂釋道二教也五明教已設三元法復開世説曰六通五明同歸正異名注經云六通天眼天耳身通它心漏盡此五者皆在心之明也又天竺大論曰五明一聲明二工巧明三醫方明四因明五内明按此亦五明黄庭内經曰上覩三元如連珠落落明景照九隅陶𢎞景真靈位業圖有玉清三元宫元始天尊為主魚山將鶴嶺清梵兩邉來異苑曰陳思王曹植字子建嘗臨魚山忽聞巖岫裏有誦經聲清遒深亮逺谷流響不覺斂襟祇敬便則而效之梵唱皆植依擬所造豫章記曰洪井有鸞岡鸞岡西有鶴嶺王子喬控鶴所經魚山謂釋鶴嶺謂道言此二教清梵從兩處來也香煙聚為塔花雨積成臺説文曰塔西域浮屠也聲上盍切言香煙上浮自聚為塔花雨所落自積成臺不假人力也空心論佛性貞氣辨仙才維摩經喜見菩薩曰色色空為二色即是空非色滅空色性自空如是受想行識識空為二識即是空非識性自空於其中通而達者為入不二法門魏收釋老志序曰所謂佛者本號釋迦文者譯言能人謂徳充道偹堪濟萬物也漢武内傳王母曰夫欲修身當營其氣太仙真經所謂行益易之道益者益精易者易形形易則變化變化則成道成道則為仙人又云劉徹形慢神穢雖當語之以至道殆恐非仙人也露盤髙掌滴風烏平翅迴三輔故事曰建章宫承露盤髙二十丈大七圍以銅為之上有仙人承掌露和玉屑飲之郭延生述征記云長安宫南靈臺有相風烏遇風乃動一曰長安靈臺上有相風銅烏千里風至此烏乃動無勞問待詔自識昆明灰漢書曰東方朔待詔金馬門應劭曰諸臣才技徵召未有正官故曰待詔三輔黄圖曰武帝初穿昆明池得黑土帝問東方朔朔曰西域胡人知之乃問胡人胡人曰燒刼之餘灰也至老子廟應詔虚無推馭辨寥廓本乗蜺淮南子曰虚無者道之所居也廣雅曰寥空也廓深也淮南子曰乗雲車入雲蜺逰雲霧髙誘曰以雲蜺為馬逰行也三門臨苦縣九井對靈谿西京賦曰旁開三門神仙傳老子耳有三門然此三門廟門道也史記曰老子者楚苦縣賴鄉曲仁里人也索隠曰苦縣本屬陳國春秋時楚滅陳而苦又屬楚括地志曰苦縣在亳州谷陽縣界有老子宅及廟廟中有九井尚存今亳州眞源縣是也盛丹須竹節量藥用刀圭言竹中有節可以盛丹也抱樸子曰九丹者神丹之要第二之丹曰神丹以此丹塗足下歩行水上服之三刀圭三尸九蟲即皆消壊百疾皆愈也第三之丹曰神丹服一刀圭百日仙也第四之丹曰還丹服一刀圭百日仙也第七之丹曰柔丹服一刀圭百日仙也第九之丹曰寒丹服一刀圭百日仙也石似臨邛芋芝如封禪泥抱樸子曰洛陽有道士董威輩常止白社中了不食陳子敘等守事之從學道積久乃得其方云食甘草防風壳實之屬十餘種搗為散先服方寸匕乃吞石大如雀卵十二枚足辟百日輙更服散氣力顔色如故也欲遂食榖者當服葵子湯下石子乃可食耳又赤龍血青龍膏作之用丹砂和清水以石納其中須臾石柔而可食也若不即取石消爛盡也食此石以最飽令人丁壯又有引石散以方寸匕投一斗白石子中以水合煎之立熟如芋子可食以當榖也漢書貨殖傳曰蜀卓氏曰吾聞岷山之下沃埜下有踆鴟至死不飢師古曰踆鴟謂芋也其根可食以充糧故無饑年華陽國志曰汶山郡都安縣有大芋如踆鴟也地理志曰蜀郡冇臨卭縣言煮石之爛如臨卭芋也列仙傳曰彭祖常食桂芝又曰鹿皮公食芝草飲神泉史記封禪書正義曰此㤗山上築土為壇以祭天報天之功故曰封此㤗山下小山上除地報地之功故曰禪言禪者神之也白虎通曰或曰封者金銀繩故曰古泥金繩封之印璽也西京雜記漢以武都紫泥為璽室加緑綈其上漢舊儀曰天子信璽六皆以武都紫泥封之言芝色如封印璽之泥也盖言神仙之法餐芝餌石矣毻毛新鵠小盤根古樹低毻鳥易毛也抱樸子曰千嵗之鵠純白能登於木神仙傳曰老子生而能言指李樹曰以此為我姓此云古樹盖老子廟中樹也述異記曰瀨鄉老子祠有紫石榴紅縹李一李二色野戍孤煙起春山百鳥啼路有三千别途經七聖迷禮記王制曰凡四海之内斷長補短方三千里此云老子西逰在中國三千里之外也莊子曰黄帝將見大隗於其茨之山方明為御昌㝢驂乗張若謵朋前馬昆閽滑稽後車至於方襄城之野七聖皆迷無所問塗李云地名七聖黄帝一明二昌寓三張若四謵朋五昆閽六滑稽七也惟當别闗吏直向流沙西列仙傳曰闗令尹喜者周人也善内學星宿服精華隱徳行仁時人莫知老子西逰喜先見其氣知真人當過候物色而迹之果得老子老子亦知其竒為著書與老子俱之流沙服巨勝實莫知其所終又著書十篇名闗令子列異傳曰老子西逰闗令尹喜望見有紫氣浮闗而老子果乗青牛而過奉和趙王逰仙藏山還採藥有道得從師京兆陳安世成都李意期神仙傳曰陳安世京兆人也為權叔本家傭賃叔本好道思神有二仙人託為書生從叔本逰以觀試之而叔本不覺其仙人也久而意轉怠二仙復來詣門叔本使安世出二仙乃以藥二丸與安世誡之曰汝歸勿復飲食别止於一處安世承誡二人常徃來其處叔本怪之曰安世處空何得有人語往輙不見疑非常人乃執弟子之禮安世道成白日昇天叔本後亦仙去又曰李意期者本蜀人傳世見之漢文帝時人也於成都角中作土窟居之劉𤣥徳欲伐吳報闗公之死使迎意期到甚敬之問其伐吳吉凶意期不答而求紙畫作兵馬噐仗十數萬乃一一裂壊之曰啒又畫作一大人掘地埋之乃徑還去備不悦果為吳軍所敗十餘萬衆纔數百人得還甲仗軍資畧盡𤣥徳忿怒遂卒於永安宫意期少言人往問吉凶但占其顔色若歡悦則善慘􅀈則惡後入瑯琊山中不復見出也玉京一作魚傳相鶴太乙授飛龜葛洪枕中書曰元始天王在天中心之上名曰玉京山山中宫皆金玉飾之又曰𤣥都玉京七寳山周迴九萬里在大羅之上城上七寳宫宫内七寳臺有上中下三宫上宫是盤古眞人元始天王太元聖母所治中宫太上眞人金闕老君所治下宫九天眞王三天眞王所治玉京有八十一萬天路通八十一萬山嶽洞室雖有億萬徃來如一歩耳道士浮丘公有相鶴經抱樸子曰神仙經皆云黄帝及老子奉事太乙元君以授要訣靈寳經有正機平衡飛龜授秩凡三篇皆仙術也白石香新芋青泥美熟芝神仙傳曰白石先生中黄丈人弟子嘗煮白石為糧因就白石山居時人號曰白石先生又曰焦先嘗煮白石以分與人熟煑如芋食之又曰王烈字長休邯鄲人也之太行山中見山破石裂石中冇一穴口經濶尺許中有青泥流出如髓烈取泥試丸之須臾成石如投熱蠟之狀隨手堅凝如粳米飯嚼之亦然言煮白石新香如芋餐青泥美熟如芝也山精逢照鏡樵客值一作遇圍棊抱樸子曰山無大小皆有神靈古之入山道士皆以明鏡九寸以上懸於背後則老魅不敢近或有来試人者則當顧視鏡中其是仙人及山中好神鏡中如人形若是鳥獸邪魅則其形貌皆見鏡中矣昔張蓋蹹及偶髙成二人並精思於雲臺山石室中忽有一人著黄練單衣葛巾往到其前曰勞乎道士乃辛苦幽隱於是二人顧視鏡中乃是鹿也即成鹿而走去又林慮山下有一亭其中有鬼每有宿者或死或病後郄伯夷過之宿明燈燭而坐誦經夜半有十餘人來與伯夷對坐自共樗蒲戲伯夷宻以鏡照之乃是羣犬也伯夷徉誤以燭燼爇其衣乃作燋毛氣伯夷懐小刀因捉一人而刺之初作人聲死而成犬餘犬悉走於是遂絶乃鏡之力也虞喜志林曰信安山石室王質入其室見二童子方對棊看之局未終視其所執伐薪柯已爛朽遽歸鄉里已非矣又見述異記石紋如碎錦藤苖似亂絲蓬莱在何處漢后欲遥祠史記封禪書曰蓬莱方丈瀛洲此三山世傳在海中去人不逺嘗有至者言諸仙人不死之藥在焉黄金白銀為宫闕草木禽獸盡白望之如雲及至反居水下欲到即風引船去終莫能至云秦始皇登㑹稽並海上冀遇三神山之竒藥漢武帝既封㤗山無風雨變至方士更言蓬莱諸藥可得於是上欣然至海冀獲蓬莱者奉和同㤗寺浮屠和梁簡文帝也浮屠塔也南史梁武帝本紀大通元年云初帝創同㤗寺至是開大通門以對寺之南門取反語以協同㤗自是晨夕講義多由此門幸寺捨身還宫大赦改元大通以符寺及門名中大通元年帝捨身同㤗寺羣臣以錢一億萬奉贖皇帝三請乃許中大同元年幸同㤗寺講金字三慧經仍施身皇太子以下奉贖仍於同㤗寺設解㑹法大赦改元是夜同㤗寺災梁京寺記曰梁武帝改年號大同起同㤗在臺城内窮竭帑藏造大佛閣七層為火焚武帝捨身施財以祈福自大同以後無年不幸簡文帝集中有幸同㤗寺浮屠詩故子山和之岧岧凌太清照殿比東京岧岧髙貌太清謂天言塔之髙也鶡冠子曰上及太清下及太寧張衡著東京賦東京謂洛陽也牟子曰漢明帝夢見神人身有白光飛在殿前以問羣臣傅毅對曰天竺有佛將其身也後得其形像言神光照殿比東漢明帝時也長影臨雙闕髙層出九城古詩曰雙闕百餘尺淮南子曰縣圃凉風樊桐在崑崙之中山上有層城九重栱積行雲礙幡揺度鳥驚爾雅曰樴謂之􅍻大者謂之栱郭注云􅍻橛也樴徒得反􅍻音亦説文曰礙止也西京雜記曰幡旄光影照耀一殿又按佛家有幡維摩經曰降服四種魔勝幡建道塲王巾頭陀寺碑文云勝幡西振言栱髙則行雲過而或礙幡長則飛鳥視之而驚也鳳飛如始泊蓮合似初生西京賦曰鳳騫翥於甍標薛綜曰謂作鐵鳳凰張兩翼舉頭敷尾以挿屋上當棟中央下有轉樞常向風如將飛者言鑄鳳甍標狀如始泊刻蓮方井形類初生時也輪重對月滿鐸韻擬鸞聲言塔上懸鏡疑月揺鐸似鸞也周禮鼓人職鄭注云鐸大鈴也西京雜記所謂九子金鈴每好風日鈴聲震動左右此云鐸韻亦猶是矣畫水流全注圖雲色半輕一作行言圖畫行雲流水之象也露晚盤猶滴珠朝火更明漢書曰孝武作柏梁銅柱承露仙人掌之屬西京賦曰綴隋珠以為爥薛綜曰明月大珠夜則有光如燭李善曰火齊玫瑰珠也雖連博望苑還接銀沙城三輔黄圖曰武帝立子據為太子開博望苑以通賔客在長安門南杜門外王巾頭陀寺碑文曰脱屣金沙李善注曰拔河一名金沙河雖連博望苑者言簡文時為太子也還接銀沙城者言佛國也是詩當在中大通年作也天香下桂殿仙梵入伊笙三輔黄圖曰昆明池中冇靈波殿皆以桂為殿柱風来自香列仙傳曰王子晋好吹笙作鳳鳴逰於伊洛間庶聞八解樂方遣六塵情維摩經曰八觧之浴池定水湛然滿六塵謂色聲香味觸法眼入色耳入聲鼻入香舌入味身入觸意入法是為六入又為六根又為六職奉和法筵應詔周書武帝紀建徳元年正月戊午帝幸𤣥都觀親御法座講説五城鄰北極百雉壯西崑抱樸子曰仙經九轉丹經液經皆在崑崙五城之内藏以玉函爾雅曰北極謂之北辰郭注云北極天之中以正四時言城髙上與北極為隣也左傳祭仲曰都城過百雉杜預注云方丈曰堵三堵曰雉一雉之牆長三丈髙一丈説文曰崑崙山名佛教出於西方故云西崑鉤陳横複道閶闔抵靈軒天文志曰鉤陳六星在紫宫中漢書注云上下有道故曰複音復黄圖曰宫之正門曰閶闔千柱蓮花塔由旬紫紺園説文曰塔西域浮屠也毘曇論云四肘為一弓五百弓為一拘盧舍今之二里也八拘盧舍為一由旬今十六里也佛影胡人記經文漢語翻劉孝標世説注曰佛經之行中國尚矣莫詳其始牟子曰漢明帝夜夢神人身有白光明日博問羣臣傅毅對曰臣聞天竺有道者號曰佛輕舉能飛身有白光殆將其神人也於是遣羽林將軍秦景博士弟子王遵等十二人之大月氐國寫諸佛經二十四部在蘭臺石室劉子政列仙傳曰列觀百家之中以相撿騐得仙者百四十六人其七十四人巳在佛經故撰得七十可以多聞博識者遐觀焉如此即漢哀成之間已有經矣與牟子傳説便為不同魏畧西戎傳曰天竺城中有臨兒國浮屠經云其國王生浮圖浮圖者太子也父曰屑頭邪母曰莫邪浮圖者身服色黄髪如青絲爪如銅其母夢白象而孕及生從右脇出而有髻墜地能行七歩天竺有神人曰沙律昔漢哀帝元壽元年博士弟子景慮大月氐王使伊存口傳浮圖經曰復豆者其人也漢武故事昆邪王殺休屠王以其衆来降得其金人之神置之甘泉宫金人皆長丈餘其祭不用牛羊惟燒香禮拜上使依其國俗祀之此神全類於佛豈當漢武之時其經未行於中土而但神明事之耶故驗劉向魚豢之説佛至哀成之世明矣然則牟傳所言四十二者其文今存非妄盖明帝遣使廣求異聞非是時無經也星窺朱鳥牖雲宿鳳凰門朱鳥朱雀南方神也景福殿賦曰朱鳥舒翼以峙衡三輔故事曰建章宫闕上有銅鳳凰新禽解雜囀春栁卧生根早雷驚蟄戸流雪長河源月令云仲春之月雷始發聲始電蟄蟲咸動啟戸始出釋法顯佛國記曰蔥嶺冬夏有雪彼土人人即名為雪山人也漢書西域傳曰河有兩源一出蔥嶺建始移交讓徽音種合昏魏志曰建安二十五年曹公在洛陽起建始殿蜀都賦曰交讓所植劉淵林注云交讓木名也兩樹對生一樹枯則一樹生如是嵗更終不俱生俱枯也出岷山在安都縣洛陽宫殿簿有徽音殿周處風土記曰合昏槿也葉晨舒而昏合陸佐公新刻漏銘云合昏暮巻是也本草曰合歡即夜合也一名合昏風飛扇天辯泉湧屬絲言禮記曰王言如絲天辯絲言謂下詔也羈臣從散木何以預中天羈臣自謂本羈旅之臣也莊子匠石曰散木也是不材之木無所可用列子曰周穆王築臺號曰天中之臺逥翔遥可望終類仰鵾絃嵇康琴賦曰鵾雞㳺絃李善注云古相和歌有鵾雞和從駕登雲居寺塔一作和趙王逰雲居寺重巒千仞塔危磴九層臺國語曰晋平公為九層之臺石闗恒逆上山梁乍斗迴張揖曰石闗觀名武帝建元中作在雲陽甘泉宫外論語曰山梁雌雉毛詩鄭箋云梁石絶水之梁也階下雲峰出忩前風洞開隔嶺鐘聲度中天梵響来平時欣侍從於此暫徘徊和何儀同講竟述懐無名即講道有動定論機老子曰道可道非常道名可名非常名無名天地之始有名萬物之母故常無欲以觀其妙常有欲以觀其竅此兩者同出而異名又云道無常名易繫辭曰幾者動之㣲安經讓禮席正業理儒衣似得逰焉趣能同捨講歸後漢書曰朱祐初學長安帝往候之祜不時相勞苦而先升講舍後車駕幸其第帝因笑曰主人得無捨我講乎以有舊恩數䝉賞賚石渠人少歇華隂市暫稀三輔黄圖曰石渠閣蕭何所造成帝於此藏秘書焉後漢書曰張楷除長陵令不至官隱居𢎞農山中學者隨之所居成市後華隂山南遂有公超市秋雲低晚氣短景側餘輝螢排亂草出雁捨斷蘆飛月令曰腐草為螢淮南子曰夫雁順風以愛氣力銜蘆而翔以備矰弋髙誘曰未秀曰蘆巳秀曰葦矰矢弋繳銜蘆所以令繳不得截其翼也别有平陵逕蕭條客鬢衰饑噪空倉雀寒驚懶婦機别有以下子山自謂也地理志云平陵屬扶風楚辭曰山蕭條而無獸蘇伯玉妻盤中詩曰空倉雀常苦饑崔豹古今注曰蟋蟀一名吟蛩初秋得寒則鳴一云濟南呼為懶婦小園賦亦云聚空倉而雀噪驚懶婦而蟬嘶實欣懐謏音小問逢君理入㣲學記曰足以謏聞不足以動衆鄭注云謏之言小也聞音問奉和趙王隱士褒集中有和趙王隱士洛陽徵五隱東都别二賢袁宏後漢紀曰陳蕃薦五處士豫章徐穉彭城姜肱汝南袁閎京兆韋著潁川李曇詔公車備禮徵不至又按後漢書逸民傳薛方逢萌聘而不肯至嚴光周黨王霸至而不能屈亦五隱也漢書曰疎廣疎受帳飲東都門皆曰賢哉二大夫漢書音義曰長安東都城北頭第一門後漢書曰逢萌觧冠挂東都城門雲氣浮函谷星光聚潁川京房易飛候云視四方常有火雲五色見其下賢人隱也漢書曰𢎞農故函谷闗上洛屬𢎞農四皓隱於上洛熊耳山故云是矣天文志曰少㣲處士星也莊子曰許由娛於潁陽霸陵採樵路一作徑成都賣卜錢後漢逸民傳曰韓康入霸陵山詩云言採其樵漢書曰蜀有嚴君平卜筮於成都市一日裁數人得百錢足自飬則閉肆下簾而授老子鹿裘披稍裂藜牀坐欲穿説苑曰孔子見榮啟期衣鹿皮裘鼔瑟而歌孔子問曰先生何樂也榮啟期對以三樂髙士傳曰管寧自越海及歸常坐一木榻積五十餘年箕股其榻上當膝處皆穿阮籍惟長嘯嵇康訝一絃魏氏春秋曰阮籍少時嘗逰蘇門山蘇門山有隱者莫知姓名有竹實數斛臼杵而巳籍從之與談太古無為之道及論五帝三王之義蘇門生蕭然曾不經聼籍乃對之長嘯清韻響亮蘇門生逌爾而笑籍既降蘇門生亦嘯若鸞鳳之音焉神仙傳曰孫登者不知何許人也恒止山間穴地而坐彈琴讀易冬夏單衣天大寒人視之輒自披髮覆身髪長丈餘又雅容非常歴世見之嵇叔夜有邁世之志曾詣登登不與語叔夜乃扣難之而登彈琴自若久之叔夜退登曰少年才優而識寡劣於保身其能免乎俄而叔夜竟䧟大辟叔夜善彈琴於是登彈一弦之琴以成音叔夜乃嘆息絶思也澗險無平石山深足細泉短松猶百尺少鶴已千年言松之短者猶有百尺則長者可知鶴之少者巳有千年則老者可知即鮑照升天行所謂蹔逰越萬里近别數千齡者也野鳥繁絃囀山花焰火然洞風吹戸裏石乳滴牕前雖無亭長識終見野人傳髙士傳曰韓康入霸陵山中博士公車連徵不至桓帝時乃偹安車以聘之康不得已乃佯許諾辭安車自乗柴車冒晨先發至亭亭長以韓徵君當過方發人牛修道橋及見康柴車幅巾以為田叟也使奪其牛康即釋駕與之有頃使者至奪牛翁乃徵君也使者欲奏殺亭長康曰此是老子與之亭長何罪乃止康因中路逃遁以夀終又曰漢濵父老者桓帝延熹中幸竟陵過雲夢臨沔水百姓莫不觀者有父老獨耕不輟尚書郎南陽張温異之下道百歩自與言父老曰我野人也不達斯語昔聖王宰世茅茨采椽而萬人以寧今吾子之君勞人自縱逸逰無忌吾為子羞之子何忍欲人觀之乎温大慚問其姓名不告而去擬詠懐二十七首昔阮歩兵詠懐詩十七首顔延年以為在晉文代慮禍而發子山擬斯而作二十七篇皆在周鄉闗之思其辭旨與哀江南賦同矣歩兵未飲酒中散未彈琴索索無真氣昏昏有俗心魏氏春秋曰阮籍聞歩兵校尉缺厨多美酒營人善釀酒求為校尉遂縱酒昏酣遺落世事臧營緒晋書曰籍拜東平相沈醉日多作詠懐八十餘篇為世所重嵇康拜中散大夫宗正喜為康傳曰康善屬文論彈琴詠詩自足於懐抱之中言已處亂世不能飲酒彈琴棄絶人事而困於塵俗深愧二公矣涸鮒常思水驚飛每失林莊子云莊周謂監河候曰周顧視車轍中有鮒魚焉曰我東海之波臣也君豈有升斗之水而活我哉戰國䇿曰有鴻雁從東方来更嬴虚發而下之曰其飛徐者其創痛也悲鳴者久失羣也故創未發而驚心未忘聞絃音引而髙飛故創怯言已處喪亂之後如失水之魚離羣之雁也風雲能變色松竹且悲吟風雲喻佐命之臣江陵三年即遭其變松竹比有節之士西魏一使良可深悲自喻去梁仕周致哀失節也由來不得意何必徃長岑後漢書曰崔駰字亭伯竇憲為車騎將軍辟駰為掾憲専權驕恣駰數諫之憲不能容出為長岑長駰自以逺去不得意遂不之官而歸永元四年卒於家章懐太子注云長岑縣屬樂浪郡其地在遼東言己身在長安已不得意何必長岑之逺乎赭衣居傅巖垂綸在渭川乗舟能上月飛幰欲捫天言己本有興梁之大志也赭衣罪人之服也漢書賈山曰秦赭衣半道又賈誼曰傅説胥靡乃相武丁張宴曰胥靡刑名也傅説被刑築於傅巖尚書云髙宗夢得説説築傅巖之野王子年拾遺記曰傅説賃為頳衣者舂於深巖以自給夢乗雲繞日而行筮得利建侯之卦嵗餘以玉帛聘為阿衡也嵇叔夜贈秀才入軍詩云流磻平臯垂綸長川史記曰吕尚以漁釣干周西伯西伯出獵遇太公於渭之陽毛詩鄭箋云釣者以絲為之綸竹書紀年曰伊摯將應湯命夢乗船過日月之傍按傅巖渭川言元帝見用也上月捫天言其志大也釋名曰幰憲也禦熱也説文曰捫撫持也楚辭曰遂倐忽而捫天誰知志不就空有直如弦應劭風俗通曰順帝之末京師謡曰直如弦死道邉曲如鈎反封侯洛陽蘓季子連衡遂不連戰國䇿曰蘇秦字季子洛陽軒里人也始將連衡說秦書上而説不行言已聘於西魏本欲事秦屬大軍南討是連衡不連也既無六國印翻思二頃田史記云季子嘆曰使我有洛陽負郭田二頃安能佩六國相印乎言已既不能連衡事秦又不能合縱攻秦身為羈旅翻欲歸家引秦事所以比魏周也俎豆非所習幃幄復無謀論語曰俎豆之事則嘗聞之矣軍旅之事未之學也後漢書詔曰前將軍鄧禹與朕謀謨帷幄决勝千里不言班定逺應為萬里侯後漢書曰班超字仲升扶風平陵人行詣相者曰祭酒布衣諸生耳而當封侯萬里之外超問其狀相者曰生燕頷虎頸飛而食肉此萬里侯相也後使西域通三十六國封定逺侯傷巳本無謀習而出使不歸玉門生入不可得矣燕客思遼水秦人望隴頭史記曰荆軻入秦燕丹餞之易水髙漸離撃筑曰風蕭蕭兮易水寒壯士一去兮不復還秦州記曰隴山東西百八十里登山嶺東望秦川四五百里極目泯然山東人行役升此而顧瞻者莫不悲思倡家遭强聘質子値仍留漢書李延年曰父母兄弟皆故倡也師古曰倡樂人也説文曰倡樂也謂作妓者左氏傳曰晋太子圉為質於秦質音致言倡家作妓本不欲嫁質子思歸本不欲留以喻已本不欲仕而魏周逼之若强聘留質矣自憐才智盡空傷年鬢秋子山以元帝承聖元年甲戌聘魏時年四十有二遂老於北地矣楚材稱晋用秦臣即趙冠左氏傳曰惟楚有材實晋用之後漢書輿服志曰武冠謂之趙惠文冠秦滅趙以其君冠賜近臣離宫延子産羈旅接陳完離宫延子産即左傳子産壊垣事在襄公三十一年莊二十年傳曰陳公子完奔齊齊使敬仲為卿辭曰羈旅之臣杜預曰敬仲陳公子完羈寄旅客也寓衞非所寓安齊獨未安言己留魏非所樂也雪泣悲去魯悽然憶相韓韓詩外傳曰孔子去魯遲遲乎其行也西征賦曰丘去魯而顧嘆吕氏春秋曰吳起雪泣而應之髙誘曰雪拭也史記張良傳曰韓破良悉以家財求客刺秦王為韓報讐以太父父五世相韓故去魯喻已去江陵父母之邦也留侯五世相韓庾氏亦父子仕梁深念舊恩矣惟彼窮途慟知余行路難魏氏春秋曰阮籍率意獨駕不由徑路車跡所窮輒慟哭而返言己至此惟有窮途之慟而已惟忠且惟孝為子復為臣一朝人事盡身名不足親言庾氏世徳忠孝累傳已為庾氏之子復為梁朝之臣今人事既盡身存名滅為可傷也吳起嘗辭魏韓非遂入秦史記曰公叔為相尚魏公主而害吳起欲去之吳起見公主之賤魏相果辭魏武侯武侯疑之而未信也吳起懼得罪遂去即之楚又曰韓非韓之諸公子也喜刑名法術之學而其本歸於黄老作孤憤五蠧内外儲説林説難十餘萬言人或傳其書至秦秦王見孤憤五蠧之書曰嗟乎寡人得見此人與之逰死不恨矣李斯曰此韓非之所著書也秦因急攻韓韓王始不用非乃急遣非使秦秦王悦之未信用李斯姚賈害之言已去梁即魏猶吳起辭魏韓非入秦也壯情已消歇雄圖不復申言不能為國報讐也移住華隂下終為闗外人漢書楊僕上書曰耻為闗外人子山辭楚入秦翻慙闗内矣疇昔國士遇生平知已恩直言殊可吐寧知炭欲一作可吞言梁朝以國士遇我有知巳之感不能報也易坤靈圖曰吐珠於澤誰能不含史記曰趙襄子最怨知伯漆其頭以為飲器豫讓遁逃山中曰嗟乎士為知已死女為悦已容今智伯知我我報讐而死以報智伯則吾魂魄不愧矣乃變名姓為刑人又漆身為厲吞炭為啞使形狀不可知伏於橋下襄子至橋馬驚襄子曰此必豫讓也襄子數豫讓曰子不嘗事范中行氏乎智伯盡滅之子不為報讐而反為委質臣於智伯智伯亦已死矣而子獨何以報讐之深也豫讓曰范中行氏昔衆人遇我我故衆人報之智伯國士遇我找故國士報之一顧重尺璧千金輕一言史記曰藺相如持璧晲柱秦王恐破璧乃謝相如漢書曰得黄金百金不如季布一諾兹云輕者言使魏為其所辱也悲傷劉孺子悽愴史皇孫言江陵之敗梁祚日㣲帝子被戮也悲傷劉孺子者傷敬帝也南史敬帝紀云帝遜位於陳陳受命奉帝為江隂王薨於外邸是也悽愴史皇孫者傷建業江陵前後二敗簡文元帝諸子遇害者多也漢書王莽傳曰平帝崩立宣帝𤣥孫嬰為皇太子號曰孺子廢嬰為安定公宣帝紀曰孝宣皇帝武帝曾孫戾太子孫也太子納史良娣生史皇孫皇孫納王夫人生宣帝號皇曾孫生數月遭巫蠱事太子良娣皇孫王夫人皆遇害曾孫雖在襁褓猶坐收繫郡邸獄無因同武騎歸守霸陵園漢書曰司馬相如為武騎常侍又曰相如拜為孝文園令文帝葬㶚陵故云㶚陵園言已本梁朝文學之臣不能如司馬相如歸守原陵也榆闗斷音信漢使絶經過漢書枚乗説吳王曰昔秦北備榆中之闗師古曰即今所謂榆闗也漢使如張騫甘英之屬云斷音信絶經過者喻已鄉闗之情若逺戍也胡笳落淚曲羌笛斷腸歌李陵書曰胡笳互動長笛賦曰近世雙笛從羌起纖腰減束素别淚損横波好色賦曰腰如束素傳毅舞賦曰目流涕而横波恨心終不歇紅顔無復多自言闗塞苦寒之狀若閨怨矣枯木期塡海青山望斷河述異記曰炎帝之女溺死東海化為精衛其名自呼每銜西山木石以塡東海一名鳥市一名寃禽白馬向清波乗氷始渡河謂梁元帝承制江陵也清波楚地史記陳渉世家曰黥布擊秦左右校破之清波復以陳為楚後漢光武紀曰帝至呼沱河無船適遇氷合得過置兵須近水移營喜竈多漢書曰韓信破趙諸校問信曰兵法右背山陵前左水澤今將軍令臣等反背水陣此何術也信曰兵法不曰陷之死地而後生乎後漢書虞詡傳曰羌寇武都詡遷武都太守停軍不進而宣言上書請兵羌聞之分鈔傍縣詡因其兵散日夜進道令吏士各作兩竈日増倍之羌不敢逼或曰孫臏減竈而君增之何也詡曰虜見吾竈日增必謂郡兵来迎孫臏示弱吾今示彊勢有不同也及羌敗散詡占相地勢築營壁二十八所招還流亡假賑貧人郡遂以安時元帝承制馳檄四方王僧辯等討平侯景正中興之極盛者也長坂初垂翼鴻溝遂倒戈謂元帝即位纔及三年魏軍至襄陽梁王詧率衆㑹之遂至於敗也時梁魏地分南北有若鴻溝詧本梁朝宗室助魏自伐故云倒戈矣三輔黄圖曰甘泉宫有長平坂司馬相如賦云登陂陀之長阪兮列子曰溟海者天池也有鳥焉其名為鵬翼若垂天之雲其體稱焉喻魏兵之强也項羽本紀曰項王與漢約中分天下割鴻溝以西為漢東為楚詩曰殷士倒戈以喻梁王詧蕭牆之變也的盧於此去虞兮奈若何的盧傷元帝之死也虞兮自傷也史記曰項王軍壁垓下兵少食盡漢軍四面皆楚歌項王夜起飲帳中有美人名虞常幸從駿馬名騅常騎之於是項王乃悲歌慷慨自為詩曰力拔山兮氣葢世時不利兮騅不逝虞兮虞兮奈若何及烏江之敗項王謂亭長曰吾知公長者吾騎此馬五嵗所當無敵嘗一日行千里不忍殺之以賜公伯樂相馬經曰馬白額入口齒者名曰榆雁一名的盧奴乗客死主乗棄市凶馬也空營衛青塚徒聼田横歌史記注姚氏曰茂陵東北西者衛青塚東者霍去病塚也崔豹古今注曰薤露蒿里送哀歌也出自田横門人横自殺門人傷之而作悲歌言人命如薤上露易晞滅至李延年乃分為二曲薤露送王公貴人蒿里送士大夫庶人使挽逝者歌之俗呼為挽歌言已不能如衛青之征戰起塜廬山又不能學田横五百人俱死海島也北臨𤣥莵郡南戍朱鳶城共此無期别俱知萬里情漢書地理志曰𤣥莵郡武帝元鼎四年開髙句驪屬幽州應劭曰故眞番朝鮮胡國後漢書郡國志曰交趾郡有朱鳶縣又南蠻傳云建武十六年交趾女子嫁為朱鳶人詩索妻甚雄勇交趾太守蘇定以法繩之側忿故反光武遣伏波將軍馬援樓船將軍段志討之言已出使不歸與𤣥莵朱鳶南北極逺之地俱為無期之别也昔嘗逰令尹今時事客卿不特貧謝富安知死羡生左傳宣十二年曰蒍敖為宰杜預注云宰令尹也周禮曰六卿太宰為長遂以宰為上卿之號楚臣令尹為長從他國之言亦謂之宰令善也尹正也言用善人正此官也楚官多以尹為名皆取其正直也史記曰秦王拜李斯為客卿言昔仕元帝嘗逰楚令尹之門今在魏周更事秦客卿之官非惟不慕富貴並不樂生也懐秋獨悲此平生何謂平淮南子曰春女思秋士悲論語曰久要不㤀平生之言孔安國曰平生少時也盖傷已平生之志今安在也悲歌度遼水一作易水一作燕水弭節出陽闗李陵從此去荆卿不復還水經注曰遼水出􅀈石山自塞外東流直遼東之望平縣屈而南流逕襄平縣故城西秦始皇二十二年滅燕置遼東郡治此有大遼水小遼水漢書西域傳曰自燉煌西出玉門陽闗渉鄯善北通伊吾千餘里弭節猶持節也杜預曰節國之符信索隱曰節使者所擁也漢書李陵傳曰陵字少卿天漢二年率歩卒五千人出塞與匈奴戰乃降匈奴中史記曰荆軻衛人也其先乃齊人徙於衛衞人謂之慶卿而之燕燕人謂之荆卿荆軻入秦燕太子餞之易水髙漸離撃筑荆軻和而歌曰風蕭蕭兮易水寒壯士一去兮不復還傷已持節使魏不復歸也故人形影滅音書兩俱絶遥㸔塞北雲懸想闗一作天山雪言南北兩隔絶也逰子河梁上應將蘇武别李陵與蘇武别詩曰擕手上河梁逰子暮何之揺落秋為氣淒涼多怨情啼枯湘水竹哭壊杞梁城宋玉曰悲哉秋之為氣也揺落而變衰博物志曰舜二妃曰湘夫人舜崩二妃啼以涕揮竹竹盡斑琴操杞殖戰死妻泣曰上則無父中則無夫下則無子人生之苦至矣乃放聲長號杞城為之崩殖一名梁言江陵之敗君臣被戮殺傷者衆有夫妻離别之苦也天亡遭憤戰日蹙值愁兵史記項羽曰天之亡我我何渡為天文志曰日濛濛無光士卒内亂直虹朝映壘長星夜落營天文志曰虹頭尾至地流血之象蜀後主建興十三年諸葛亮帥大衆伐魏屯於渭南有長星赤而芒角自東北西南流投亮營三投再還往大還小占曰兩軍相當有大流星来走軍上及墜軍者皆破敗之象也九月亮卒於軍焚營而退羣帥交怨多相誅殘言梁元帝江陵敗亡之徵也楚歌饒恨曲南風多死聲漢書曰項羽軍垓下聞漢軍四面皆楚歌左氏傳曰晋人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功時梁元帝都江陵本楚地故多引楚事以為辭眼前一杯酒誰論身後名世説曰張季鷹縦任不拘時人號為江東歩兵或謂之曰卿可縦適一時獨不為身後名耶答曰使我有身後名不如即時一杯酒此言一杯酒身後名者特言江陵君臣但適一時不顧後慮也如安戀荆楚不歸建業致有此敗惜其不用周𢎞正朱買臣之言也又于謹來伐時計用三䇿以帝懦而無謀多疑少斷知其必用下䇿向使耀兵漢沔席巻渡江丹陽帝居又何患焉嗚呼此其所以無謀也與周王逢鄭忿楚后値秦寃周逢鄭忿謂元帝與岳陽王詧結釁也楚值秦寃謂西魏之來伐也北史于謹傳云初梁元帝於江陵嗣位密與齊交通將謀侵軼其兄子岳陽王詧時為雍州刺史以梁元帝殺其兄譽遂結隙據襄陽來附乃命謹出討是周逢鄭忿也元帝承聖二年紀曰先是魏使宇文仁恕来聘帝接仁恕有闕魏相安定公憾焉使于謹來攻是楚值秦寃也魏相安定公周太祖宇文㤗也左氏傳曰周鄭交惡又曰鄭文公伐滑王使伯服㳺孫伯如鄭請滑鄭伯怨惠王之入而與厲公爵也又怨襄王之與衛滑也故不聼王命而執二子皆周王逢鄭忿之事史記張儀見楚王曰王為閉闗絶齊使使者西取商於之地六百里王絶齊齊秦交合秦發兵撃之與秦戰丹陽秦大敗我軍斬甲士八萬虜大將軍屈匄禆將軍逢侯丑等七十餘人遂取漢中之郡是楚后值秦寃之事也梯衝已鶴列冀馬忽雲屯謂西魏將于謹及梁王詧㑹兵來伐軍容之盛也魏志曰公孫瓚與子續書云袁氏之攻狀若鬼神鼓角鳴於地中梯衝舞吾城上鶴列陳兵也莊子曰君必盛鶴列於麗譙之間後漢書劉表傳曰冀馬雲屯武安檐瓦振昆陽猛獸奔言攻城之急也史記曰趙惠文王時秦軍軍武安西鼓譟勒兵武安屋瓦盡振後漢光武紀曰王尋王邑圍昆陽驅猛獸犀象之屬以助威光武率敢死者乗鋭奔之流星夕照鏡烽火夜燒原天文志曰流星天使也自上而降曰流自下而升曰飛大者曰奔奔亦流星也奔星所墜其下有兵夕照鏡者言其星之明也顔師古漢書注曰夜則舉烽故云夜燒原也爾雅曰髙平曰原古獄饒寃氣空亭多枉䰟述異記曰漢武帝幸甘泉長坂道中有蟲赤如肝頭目口齒悉具人莫知也時東方朔曰此古獄地也積憂所致上使按圖果秦獄地朔曰夫積憂者得酒而觧乃以蟲置酒中立消後漢書曰王忳除郿令到官至漦亭有鬼數殺過客入亭止宿夜中聞有女子稱寃之聲前訴曰妾夫為涪令之官過宿此亭亭長無狀枉殺妾家十餘口埋在樓下悉盗取財忳問亭長姓名女子曰即今門下㳺徼者也明旦召㳺徼詰問具服罪即收繫及同謀十餘人悉伏辜遣使送其喪歸鄉里於是亭遂清安言江陵戰鬬之時殺傷者衆故多寃䰟也天道或可問微兮不忍言楚辭曰屈原放逐因書其壁呵而問之號曰天問言天使梁亡不可問也横流遘屯慝上墋結重氛屯易卦名陸機功臣頌曰上墋下黷注云墋不澄不清之貌説文曰氛祥氣也聲符分切此祥字如祥桑之祥葢謂禨祥妖也哭市聞妖獸頽山起怪雲哭市聞妖獸疑用春秋齊襄公見公子彭生事左傳所謂豕人立而啼是也襄公為無知所弑矣續漢志曰雲如壊山謂營頭之星也占曰營頭之所墜其下覆軍殺將流血千里言江陵將陷有妖異之徵也緑林多散卒清波有敗軍緑林清波皆楚地也後漢書曰新市人王匡王鳳與諸亡命藏於緑林中漢書曰英布撃秦左右校破之清波復以秦為楚緑林多散卒者謂任約謝答仁本侯景之黨元帝復用至此其卒多散去也清波有敗軍者謂胡僧祐朱買臣之敗也智士今何用忠臣且未聞惜無萬金産東求滄海君言江陵敗後智士忠臣無所可用惜已無資不能為國報讐也史記曰秦滅韓張良家僮三百人弟死不葬悉以家財求客刺秦王為韓報讐以大父父五世相韓故良常學禮淮陽東見滄海君得力士為鐵椎重百二十斤秦皇帝東逰良與客徂擊秦皇帝博浪沙中誤中副車顔師古漢書注曰滄海君當時賢者之號也吉士長為吉善人終日善大道忽云乖生民隨事蹇易曰蹇難也險在前也有情何可豁忘懐固難遣麟窮季氏罝虎振周王圈左傳哀十四年曰西狩於大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之當云麟窮叔氏罝然魯三家季孫為政故可通用也穆天子傳曰七萃之士生搏虎而獻天子命為柙而畜之東虢是曰虎牢説文曰圏飬獸閑周禮鄭注云牢閑也平生幾種意一旦衝風巻漢書韓安國曰衝風之衰不能起毛羽師古曰衝風疾風之衝突者也言已道乖事蹇如麟在罝中虎居圏内平生志意若衝風之盡巻也六國始咆哮縱横未定交史記索隱注曰六國韓魏趙燕齊楚是也與秦為七國亦謂之七雄又六國與宋衞中山為九國其三國葢㣲又前亡又曰東西為横南北為縱山東地形縱長蘇秦相六國令縱親而擯秦闗西地形衡長張儀相六國令破其縱而連秦之衡欲競連城玉翻徵縮酒茅史記曰秦欲以十五城易趙王和氏璧左傳云管仲謂楚王曰爾貢包茅不入無以縮酒六國始咆哮縱横未定交者以喻梁元帝與岳陽王詧不能和緝也欲競連城玉翻徵縮酒茅者時西魏方盛比之强秦詧與江陵方宜合縱攻秦而反㑹兵來伐責楚包茅大寳是以西去矣襄陽形勝其為連城也與析骸猶換子登㸑已懸巢左傳宣十五年華元曰敝邑易子而食析骸以㸑杜預曰㸑炊也何休公羊傳注曰骸骨也左傳成十六年曰晋楚戰於鄢陵楚子登巢車以望晋軍杜預曰巢居車上為櫓巢説文作轈云兵馬髙如巢以望敵也櫓澤中守草樓也是巢與櫓俱是樓之别名言江陵之危急也壯氷初開地盲風正折膠禮記月令曰仲春之月氷始壯地始拆仲秋之月盲風至鄭注云盲風疾風也正義曰皇氏云秦人謂疾風為盲風漢書鼂錯曰欲立威者始于折膠蘇林曰秋氣至膠可折弓弩可用輕雲飄馬足明月動弓弰西京雜記稱漢文帝馬有浮雲之名故馬曰輕雲言馬壯也劉熙釋名云弦月半之名若張弓弛弦故弓曰明月言兵彊也楚師正圍鞏秦兵未下崤左傳昭二十三年曰二師圍郊郊潯潰杜預注云河南鞏縣西南有地名鄩中郊鄩二邑皆子朝所得昭二十六年傳曰晋師克鞏王子朝奉周之典籍以奔楚至定四年楚柏舉之敗明年王人殺子朝於楚正圍鞏者言楚方盛也僖三十二年傳曰秦穆召孟明西乞白乙使出師於東門之外蹇叔曰晋人禦師必於殽杜預曰殽在𢎞農澠池縣西殽字或作崤戸交反始知千載内無復有申包左傳定四年曰昭王在隨申包胥如秦乞師立依於秦牆而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出明年包胥以秦師至大敗吳師遂復楚國按江陵之師在承聖三年甲戌冬十一月壯氷以下言自春至秋馬壯兵彊此時楚師方盛秦兵未來何不急徵諸援以備不虞若王僧辯王琳陸法和諸軍一戰可勝而保守羅郭遂為于謹所破竟無申包胥之一人報讎復國也横石三五片長松一兩株對君俗人眼真興理當無野老披荷葉家僮掃栗跗竹林千戸封甘橘萬頭奴此子山小園賦也言其可以棲遲矣毛詩鄭箋鄂不曰鄂拊鄂足也釋文云拊亦作跗此云栗跗亦栗之足也漢書曰渭川千畆竹此其人與千戸侯等吳志曰李衡臨終嘗勅其子曰龍陽洲千頭木奴嵗收絹千疋君見愚公谷真言此谷愚傷已於此築室真為愚也韓非子曰齊威公入山問父老曰此何谷曰臣舊畜牛生犢以子買駒少年謂牛不生駒遂持而去傍鄰以臣為愚遂名為愚公谷日曉荒城上蒼茫餘落暉都䕶樓蘭返將軍疏勒歸漢書曰傅介子北地人昭帝時為平樂監時樓蘭國數反覆霍光白遣介子與士卒齎金幣以賜外國為名至樓蘭樓蘭王與介子飲乃令壯士二人刺殺之持首詣闕又西域傳曰鄯善國本名樓蘭王治扞夷城去陽闗千六百里又鄭吉傳曰使䕶鄯善以西南道並䕶車師以西北道故號都䕶都䕶之置自吉始焉後漢書曰耿恭為戊巳校尉引兵據疏勒城匈奴攻㳟食盡困窮稍稍死亡餘數十人㑹漢遣軍迎校尉遂相隨俱歸漢書西域傳曰疏勒國治疏勒城去長安九千三百五十里馬有風塵氣人多闗塞衣曹子建出行詩曰䝉霧犯風塵闗塞衣謂征衣也言見征客初歸也陣雲平不動秋蓬巻欲飛天官書曰陣雲如立垣曹子建朔風詩曰風飄蓬飛聞道樓船戰今年不解圍漢書曰楊僕宜陽人也南越反拜為樓船將軍有功封梁侯此章述其南北絶逺之情也尋思萬戸侯中夜忽然愁言已不能為國建勲也漢書李廣傳文帝曰惜廣不逢時令當髙祖世萬户侯豈足道哉琴聲遍屋裏書巻滿牀頭雖言夢蝴蝶定自非莊周莊子曰昔莊周夢為蝴蝶栩栩然蝴蝶也殘月如初月新秋似舊秋露泣連珠下螢飄碎火流樂天乃知命何時能不憂易繫辭曰樂天知命故不憂言已功業都捐琴書何益光華已晚瞬息衰秋思之甚為可憂也憒憒天公曉精神殊乏少言天道無知有如長夜也荘子曰彼又惡能憒憒然為世俗之禮以觀衆人之耳目哉憒上内反説文蒼頡篇並云亂也一郡催曙雞數處驚眠鳥説文曰曙旦明也其覺乃于于其憂惟悄悄荘子曰㤗氏其徐徐其覺于于邶風柏舟之詩云憂心悄悄愠于羣小毛傳曰悄悄憂貌張儀稱行薄管仲稱器小史記曰張儀魏人也嘗從楚相飲已而楚相亡璧門下意張儀曰儀貧無行必此盗相君之璧共執張儀掠笞數百不服釋之論語曰管仲之器小哉天下有情人居然性靈夭言天道昧昧不可問也在死猶可忍為辱豈不寛古人持此性遂有不能安言人死且可忍豈不能忍辱乎然古人有烈性者獨不安於此故寧死不辱也其面雖可熱其心長自寒面可熱者自慙之辭若兩頬發赤矣漢書鄭崇曰臣心如水慙巳面雖可熱而心寒如水異於熱中者也匣中取明鏡披圖自照㸔幸無侵餓理差有犯兵欄史記曰許負相周亞夫指其口曰有從理入口此餓死法也干寳捜神記曰魏舒嘗詣野王主人妻夜産俄而聞車馬之聲相問曰男也女也曰書之十五以兵死復問寢者為誰曰魏公後十五載詣主人問所生兒何在曰因條桑為斧傷而死舒自知當為公矣言取鏡照㸔已面雖無餓死之法亦有兵死之相何竟不能一死行陣也擁節時驅傳乗亭不據鞍漢書曰司馬相如為中郎將建節往使副使者王然等馳四乗之傳至蜀説文曰以車曰傳以馬曰據師古漢書注曰傳者若今之驛古者以車謂之驛騎漢書曰秦法十里一亭後漢書曰馬援據鞍顧盼言已但有驅傳之舉而無據鞍之事也代郡蓬初轉遼陽桑欲乾王僧達咏古詩云仲秋邉風起孤蓬巻霜根漢書地理志曰代郡秦置屬幽州應劭曰故代國又地理志曰代郡冇桑乾縣孟康曰乾音干秋雲粉絮結白露水銀團言衰秋之氣白雲如粉秋露垂珠若水銀團也毛詩曰野有蔓草零露團兮一思探禹穴無用鏖臯蘭漢書司馬遷傳曰上㑹稽探禹穴張宴曰禹巡狩至㑹稽而崩因葬焉上有孔穴民間云禹入此乂霍去病傳曰過焉支山千有餘里令短兵鏖臯蘭下師古曰臯蘭山名鏖謂苦擊而多殺也言衰老不能復戰也倐忽市朝變蒼茫人事非言建鄴江陵之變也古出夏北門曰市朝易人千載墓平避讒猶采葛忘情遂食薇言在江陵時使於魏是為采葛仕於周是為食薇也子夏詩序曰采葛懼讒也鄭箋曰采葛喻臣以小事使出史記曰伯夷叔齊義不食周粟採薇而食之遂餓死於首陽山譙周古史考云夷齊採薇有婦人曰薇亦周之草木也於是餓死是夷齊并不食薇也子山仕周為餐粟矣懐愁正揺落中心愴有違宋玉曰悲哉秋之為氣也揺落而變衰獨憐生意盡空驚槐樹衰世説曰桓𤣥敗後殷仲文還為大司馬咨議意似二三非復往日大司馬府㕔前有一老槐甚扶疎殷因月朔與衆在㕔視槐良久嘆曰槐樹婆娑無復生意子山引此作枯樹賦以為世異時移忽忽不樂矣日色臨平樂風光滿上蘭西京賦曰大駕幸乎平樂之館又曰正壘壁乎上蘭三輔黄圖曰上林有上蘭觀又史記周勃傳曰御史大夫施屠昆邪破館軍上蘭南國美人去東家棗樹完離騷曰恐美人之遲暮王逸注云美人謂懐王也王逸章句云靈修美人以嫓於君漢書曰王吉少時學問居長安東家大棗樹垂吉庭中吉婦取棗以啖吉吉後知之乃去婦東家聞而欲伐其樹鄰里共止之因固請吉令婦還里中為之歌曰東家有樹王陽婦去東家棗完去婦復還南國謂楚也美人喻君也時元帝都江陵本楚地故比之南國美人吉婦自喻也東家棗完喻已身在長安如出婦不還矣抱松傷别鶴向鏡絶孤鸞蔡邕琴操曰商陵牧子娶妻五年無子父兄欲為改娶牧子援琴鼔之歌别鶴以舒其憤懣故曰别鶴操劉敬叔異苑曰罽賔國王買得一鸞欲其鳴不可致飾金繁饗珍羞對之愈戚三年不鳴夫人曰嘗聞鸞得類則鳴何不懸鏡照之王從其言鸞覩影悲鳴冲霄一奮而絶喻巳身在異域如别鶴孤鸞也不言登隴首惟得望長安隴首即隴頭歌所謂隴頭流水鳴聲幽咽遥望秦川肝腸斷絶乂云隴頭流水分離四下念我行役飄然曠野登髙逺望涕零雙墮王餐詩曰南登灞陵岸迴首望長安言登隴首得望長安今已之鄉闗在於南國不能復見也鬬麟能食日戰水定驚龍春秋孔演圖曰麟木精也麒麟鬬日無光博物志曰麒麟鬬而蝕日國語曰靈王二十二年榖洛將毁王宫王卒壅之及景王崩王室大亂及定王王室遂卑韋昭曰榖洛二水名也鬪者兩水格有似于鬪喻梁元帝與西魏兩國争戰也鼓鞞喧七萃風塵亂九重禮記曰君子聞鼓鞞之聲則思將帥之臣周禮注曰字林並曰鞞小鼓也穆天子傳曰天子賜七萃之士王仲宣雜詩曰風飄揚塵起白日忽已冥吕向曰風起舉揚塵埃喻兵戈暴起也風塵亂九重者言元帝出降天子䝉塵也九重謂君也鼎湖去無返蒼梧悲不從三輔黄圗曰黄帝採首山銅以鑄鼎鼎成有龍下迎迎帝仙去小臣攀龍髯而上者七十二人漢武帝於此建鼎湖宫禮記曰舜葬蒼梧二妃不從言魏人戕帝時已在長安不能從君死也徒勞銅爵妓遥望西陵松魏志曰曹公臨死謂媫妤妓人曰汝等時時登銅爵臺望吾西陵墓田言元帝葬於津陽門外遥望如西陵墓田矣無悶無不悶有待何可待易曰遯世無閟昏昏如坐霧漫漫疑行海寗戚歌曰長夜漫漫何時旦沈約詩曰歸海流漫漫千年水未清一代人先改易乾鑿度曰聖人受命瑞應先見於河河水先清清變白白變黒黒變黄各三日無悶無不悶言已不隱不仕也有待何可待言欲待梁興而梁反亡也昏昏如坐霧言已之昏憒也漫漫疑行海言已無所歸也千年水未清一代人先改盖傷梁運之遂終也昔日東陵侯惟有𤓰園在三輔黄圖曰長安城東出南頭第一門曰覇城門或曰青門門外舊出佳𤓰廣陵人邵平為秦東陵侯秦破為布衣種𤓰青門外𤓰美故時人謂之東陵𤓰言已本梁臣今梁亡而留於長安若東陵故侯也懐抱獨昏昏平生何所論由來千種意併是桃花源捜神後記曰晋太康中武陵人捕魚為業縁溪行忘路逺近忽逢桃花夾岸數百歩中無雜樹芳華鮮美落英繽紛漁人甚異之復前行欲窮其林林盡水源便得一山山有小口彷彿若有光便捨舟從口入初極狭纔通人復行數十歩豁然開朗土地曠空屋舍儼然有良田美地桑竹之屬阡陌交通雞犬相聞男女衣著悉如外人黄髮垂髫並怡然自樂見漁人大驚問所從來具答之便要還家為設酒殺鷄作食村中人聞有此人咸來問訊自云先世避秦難率妻子邑人至此絶境不復出焉遂與外隔問今是何世乃不知有漢無論魏晋此人一一具言所聞皆為嘆惋餘人各復延至其家皆出酒食停數日辭去此中人語云不足為外人道也既出得其船便扶向路處處誌之及郡乃詣太守説如此太守劉歆即遣人隨之往尋向所誌不復得焉言已平生懐抱至此皆不足論惟有避秦而已穀皮兩書帙壺盧一酒樽自知費天下也復何足言史記貨殖傳曰夫山西饒材竹穀纑索隱曰穀木名皮可為紙詩云其下維穀毛詩草木蟲魚疏曰穀幽州人謂之榖桑或曰楮桑交廣謂之穀中州人謂之楮殷中宗時桑穀共生是也今江南人績其皮以為布又擣以為紙謂之穀布紙長數丈潔白光輝其裏甚好其葉初生可以為茹王子年拾遺記曰張儀蘇秦剝樹皮編以為書帙以盛天下良書説文曰帙書衣也世説曰陸士衡初入洛咨張公所宜詣劉道真是其一陸既往劉尚在哀制中性嗜酒禮畢初無他言惟問東吳有長柄壺盧卿得種來不陸兄弟殊失望乃悔往壺盧可以盛酒也言已既有避秦之志惟有兩帙之書一樽之酒不足復論天下事也蕭條亭障逺悽惨風塵多劉歆遂初賦曰野蕭條而寥廓漢書西域傳曰於是漢列亭障至玉門矣陸士龍答張士然詩曰飄飄冒風塵闗門臨白狄城影入黄河春秋左傳僖三十三年曰晋師敗狄於箕郤缺獲白狄子杜預曰白狄狄别種也故西河郡有白部胡宣十五年晋滅赤狄潞氏正義曰狄有赤狄白狄就其赤白之間各自别有種類謂之赤白其義未聞盖其俗尚赤衣白衣也又國語云桓公西征攘白狄之地遂至於西河也闗門臨白狄者言闗門之外白狄所居也城影入黄河者言地近黄河為日景所照也秋風蘇武别寒水送荆軻漢書曰蘇武字子卿以天漢元年使匈奴不降昭帝即位數年匈奴與漢和親漢求武等於是李陵置酒賀武云異域之人壹别長絶陵起舞歌曰徑萬里兮度沙幕為君將兮奮匈奴路窮絶兮矢刃催士衆滅兮名已隤老母已死雖欲報恩將安歸陵泣下數行因與武决戰國䇿荆軻歌曰風蕭蕭兮易水寒誰言氣蓋世晨起帳中歌史記曰項羽晨起帳中歌曰力㧞山兮氣盖世言巳入長安之後即景傷懐若李陵之長絶荆卿之不還又傷江陵之亡同於垓下也被甲陽雲臺重雲久未開子虚賦云楚王乃登陽雲之臺孟康曰雲夢中髙堂之臺宋玉所賦者言其髙出雲之陽李周翰曰陽雲臺則髙唐觀寰宇記曰巫山縣西有陽臺古城即襄王所逰之地亦曰陽雲臺髙一百二十丈南枕長江被甲陽雲臺謂江陵之師也鷄鳴楚地盡鶴唳秦軍來漢書曰圍羽垓下羽夜聞漢軍四面皆楚歌應劭曰楚歌者雞鳴歌也晋書載記曰苻堅肥水之敗其走者聞風聲鶴唳以為晋兵楚地盡言江陵陷秦軍來言魏師至也羅梁猶下礌揚排久飛灰言魏師攻城之急也礌大石也古有矢石葢用石撃之也左傳旝動而鼓賈逵以旝為發石一曰飛石引范蠡作飛石以證之説文亦云建大木置石其上發機以磓敵也魏志曰袁尚使審配守鄴太祖進攻之配將馮禮開突門納太祖兵三百餘人配覺之從城上以大石擊突中柵門柵門閉入者皆没配兄子榮守東門夜開門納太祖兵與配戰生禽配礌字或作礧漢書曰匈奴乗隅下礧石音力對反羅梁猶下礌者言城上轉石自髙而下也時魏軍大攻反者斬西門守軍以納魏軍矣後漢書曰楊璇靈帝時為零陵太守是時蒼梧桂陽猾賊相聚攻郡縣賊衆多而璇力弱吏人憂恐璇乃特置馬車數十乗以排囊盛石灰於車上繫布索於馬尾又為兵車専彀弓弩剋共㑹戰乃令馬車居前順風鼔灰賊不得視因以火燒布布燃馬驚奔突賊陣因使後車弓弩亂發鉦鼔鳴震羣盗波駭破散追逐傷斬無數梟其渠帥郡境以清此言久者謂兵弱敵强不能固守也出門車軸折吾王不復回言元帝出降遂見害也漢書曰上徵臨江王榮榮行祖於江陵北門既上車軸折車廢江陵父老流涕竊言曰吾王不返矣榮至詣中尉府對簿中尉郅都簿責訊王王恐自殺葬藍田燕數萬銜土置塜上百姓憐之盛宏之荆州記曰荆州城臨漢江臨江王所治王被徵出城北門而車軸折父老泣曰吾王去不還矣從此不開北門時元帝出降見執如梁王蕭詧營甚見詰辱詧遣尚書傅準監行刑進土囊而殞之是去不還矣和張侍中述懐張侍中疑即張綰也梁書曰張綰字孝卿纘第四弟也承聖二年加侍中明年江陵陷朝士皆俘入闗綰以病免後卒於江陵或當時有述懐之詩子山和之其㫖與上詠懐二十七首同陽窮乃悔吝世季誠屯剥乾上九亢龍有悔子曰亢龍有悔窮之災也荀爽曰升極當降故有悔屯卦彖曰屯剛柔始交而難生崔憬曰於人事則是運季業初之際也剥卦辭曰剥不利有攸往彖曰剥剥也柔變剛也不利有攸往小人長也荀爽曰謂隂外變五五者至尊為隂所變故曰剥也言梁運之將終也奔河絶地維折柱傾天角列子曰共工氏與顓頊争為帝怒而觸不周之山折天柱絶地維故天傾西北成羣海水飛如雨天星落揚雄劇秦美新曰神歇靈液海水羣飛劉良曰海水羣飛喻天下亂也漢書劉向封事諫曰夜中星隕如雨負鍤遂移山藏舟終去壑列子曰太行王屋二山方七百里髙萬仞北山愚公年九十面山而居懲山北之塞出入之迂也遂率子孫即石墾壤運於渤海之尾河曲智叟笑而止之操蛇之神聞之懼其不已告之於帝帝感其誠命夸娥氏二子負二山一厝朔東一厝雍南鍤鍬也聲楚甲切莊子曰夫藏舟於壑藏山於澤謂之固矣然而夜半有力者負之而走昧者不知也生民忽已魚君子徒為鶴左氏傳曰㣲禹吾其魚乎抱撲子曰周穆王南征一軍盡化君子為猿鶴小人為沙蟲以上言梁朝太清承聖之亂公私塗炭也疇昔逢知已生平荷恩渥故組竟無聞程嬰空寂寞言梁朝舊臣䝉君知巳之恩無一人可圖報復也傷簡文諸子及元帝子愍懐始安也故組疑作胡組漢書丙吉傳曰宣帝生數月以皇曽孫坐衛太子事繫幾不全者數焉吉數勅保飬乳母視遇甚有恩惠吉曰渭城胡組淮陽郭徵卿有恩耳史記曰屠岸賈作難公孫杵臼取他兒代武死程嬰匿趙武於山中十五年因晋侯有疾韓厥乃請立武為趙氏後永嘉獨流寓中原惟鼎鑊此下自序也王隱晋書曰懐帝即位年號永嘉永嘉之後懐愍遇害劉石繼亂矣獨流寓者謂巳此時流寓長安也謝靈運述祖徳詩曰中原昔喪亂喪亂豈觧已崩騰永嘉末逼迫太原始李善注曰晋中興書曰中原亂中宗初鎮江東中原謂洛陽也説文曰鑊䥴也胡郭切周禮烹人掌供鼎鑊以給水火之齊鄭注云鑊所以煮肉及魚腊之器既熟乃烝于鼎齊多少之量言中原百姓在水火之中也道險卧樚櫨身危累素殻樚櫨井上汲水圓轉木也言人卧於樚櫨之上木轉則人有墜井之患是其至險者也道險卧樚櫨者言如臨深淵也世説曰顧愷之作危語曰井上轆轤卧嬰兒劉子政説苑曰晋靈公造九層臺荀息聞之求見曰臣能累十二博碁加九雞其上公曰子作之荀息以碁子置下加九雞子其上公曰危哉潘岳西征賦曰危素卵之累殻漂流從木梗風巻隨秋籜戰國䇿蘇代謂孟嘗君曰子東園之桃梗耳洚雨下淄水至則漂之而去言已之漂泊無定如木梗之在漂流秋風之巻飛籜也服䖍曰籜笋皮也詩云籜兮籜兮風其吹女注槁也張翰不歸吳陸機猶在洛文士傳曰張翰字季鷹世説曰張季鷹辟齊王東曹掾在洛見秋風起因思吳中蓴菜羮鱸魚鱠曰人生貴得適意耳何能羈宦數千里以要名爵遂命駕便歸俄而齊王敗時人皆謂為見機晋書曰陸機年二十而吳滅太康末與弟雲同入洛以喻己本吳人今留秦地矣漢陽錢遂盡長安米空索後漢書趙壹漢陽人賦曰文籍徒滿腹不如一囊錢漢書東方朔曰臣言可用幸異其禮不可用罷之無令但索長安米時占季主龜乍販韓康藥史記日者傳曰司馬季主者楚人卜於長安東市宋忠賈誼同輿而之市逰於卜肆中聞其言忽而自失芒乎無色悵然噤口不能言以為老莊之義未有以異也後漢書曰韓康字伯休京兆覇陵人采藥名山賣與長安市口不二價三十餘年時女子從康買藥守價不移女子怒曰公是韓伯休耶乃不二價伯休嘆曰我本避名今女子皆知有我何用藥為乃遁入霸陵山中言己在長安特如季主賣卜韓康市藥耳無求見用於世也伏轅終入絆垂翅猶離繳漢書曰局趣效轅下駒釋名曰轅援也車之大援也絆半也使半行不得自縦也説文云絆馬縶也聲博漫切後漢書曰垂翅回谿子虚賦曰孅繳施説文曰繳生絲縷也言已留於長安猶馬之羈絆鳥之離繳也離平聲繳之藥反徒懐琬琰心空守黄金諾周禮曰琬圭以治徳以結好琰圭以易行以除慝鄭注云琬猶圜也琬圭王使之瑞節也諸侯有徳王命錫之使者執琬圭以致命焉琰圭亦王使之瑞節琰圭有鋒芒傷害誅伐征討之象令為善者以此圭責讓諭告之也又曰諸侯有為不義使者征之執以為瑞節焉楚辭曰懐琬琰以為心漢書曰得黄金百不如季布一諾言當使魏之時持此瑞節本以王命出使而魏不保其信為徒然也虢鄶終無寄齊秦竟何託國語曰鄭桓公從史伯之言乃東寄帑與賄虢鄶受之後三年幽王敗桓公死其子武公與平王東遷卒定虢鄶之地史記曰秦欲伐齊而楚與齊從親秦惠王患之乃宣言張儀免相使張儀南見楚王曰王為儀閉闗而絶齊使使者從儀西取商於之地方六百里懐王大悦羣臣皆賀而陳軫獨弔曰西起秦患北絶齊交兩國之兵必至楚王弗聼齊王大怒折楚符而合於秦秦齊交發兵撃之大敗我軍遂取漢中之郡虢鄶終無寄者言當使魏之後師下江陵帝與愍懐始安俱戮何所寄帑也齊秦竟何託者魏分東西西魏本秦地髙氏受禪東魏是曰北齊都於鄴秦師來征齊兵不救竟何所託也大夫唯閔周君子常思亳言江陵亡後冇黍離麥秀之感也詩序曰黍離閔宗周也周大夫行役過故宗廟宫室盡為禾黍故為黍離之詩尚書大傳曰㣲子將朝周過故殷之墟見麥秀之漸漸此父母之國志勤心悲也亳殷舊都也寂寥共羈旅蕭條同負郭左傳陳公子完曰羈旅之臣史説曰張負隨陳平至其家家乃負郭窮巷以敝席為門劉歆遂初賦曰野蕭條而寥廓子山在周日久雖位望通顯周之帝王並遇恩禮而鄉闗之思彌殷是以義共羈旅之疏情同負郭之貧也農談止榖稼野膳惟藜藿周禮鄭注曰種榖曰稼如嫁女之有所生史記太史公自序曰藜藿之羮正義曰藜似藿而表赤藿豆葉也操樂楚琴悲忘憂魯酒薄左氏傳曰晋侯觀囚于軍府見鍾儀問曰南冠而縶者誰也有司對曰鄭人所獻楚囚也問其旅曰伶人也與之琴操南音范文子曰楚囚君子也樂操土風不忘舊也莊子曰魯酒薄而邯鄲圍渭濵觀坐釣谷口㸔秋穫史記曰太公望吕尚以漁釣奸周西伯西伯遇太公於渭之陽漢書曰谷口鄭子真不詘耕於巖石之下名震京師髙士傳曰鄭樸字子真惟有丘明恥無復榮期樂論語曰匿怨而友其人左丘明恥之丘亦耻之丘明魯太史漢書藝文志冇左氏傳三十巻後漢陳元所謂丘明至賢親愛孔子者也髙氏傳曰榮啟期鹿裘帶索鼔琴而歌孔子逰於㤗山見而問之曰先生何樂也對曰吾樂甚多矣天生萬物惟人為貴吾得為人矣是一樂也男女之别男尊女卑故以男為貴吾既得為男矣是二樂也人生有不見日月不免襁褓者吾既行年九十矣是三樂也貧者士之常也死者民之終也居常以待終何不樂也言己惟有自恥而巳無復可樂也夷則火星流天根秋水涸髙誘淮南子注曰夷則七月也夷傷則法也言陽衰隂發萬物彫傷應法成性故曰夷則詩云七月流火毛萇曰火大火也杜預左傳注曰大火心星也七月即見爾雅曰天根氐也郭璞注云角亢下繫於氐若木之有根國語曰天根見而水涸淮南子仲秋之月云是月也水始涸冬嚴日不暖嵗晚風多朔冬嚴嚴寒也朔風北風也爾雅曰朔北方也王正長雜詩云朔風動秋草言秋冬之際觀揺落變衰之象為可悲也楊浮有怪雲細凌聞災雹漢書曰楊浮雲淮南子曰浮楊於無畛崖之際髙誘曰浮楊猶遨翔也左氏傳曰凡分至啟閉必書雲物杜預曰分春秋分至冬夏至啟立春立夏閉立秋立冬雲物氣色災變也楊浮有怪雲者言當此秋冬殺物之候見怪雲遨翔而起也周禮曰凌人掌氷十二月令斬氷三其凌鄭注云凌氷室也左傳昭四年曰聖人在上無雹雖有不為災古者口在北陸而藏氷西陸朝覿而出之七月之卒章藏氷之道也杜注云謂十二月鑿而取之也西京雜記云董仲舒曰雹霰之流也隂氣暴上雨則凝結成雹焉細凌聞災雹者亦言十二月固隂沍寒之時也木皮三寸厚涇泥五斗濁漢書晁錯曰夫狐貉之地積隂之處也木皮三寸氷厚六尺食肉而飲酪其人宻理鳥獸毳毛其性能寒能音耐又溝洫志鄭白渠歌曰涇泥一石其泥數斗斗音主言已來此西北苦寒之地加以秋冬肅殺之景且喻顔之厚矣有如木皮身名混濁無分涇渭也雖忻曲轅樹猶懼雕陵鵲莊子曰匠石之齊至乎曲轅見櫟社樹觀者如市而匠石不顧曰是不材之木也又曰莊周逰乎雕陵之樊覩一異鵲自南方來者翼廣七尺目大運寸感周之顙而集於栗林生涯實有始天道終虛槖言人生有始天道不終也毛萇云大曰槖小曰囊埤蒼曰有底曰囊無底曰槖且悦善人交無疑朋友數論語何宴注云謂速數之數言張侍中為善人與己為朋友不嫌其凟也何時得雲雨復見翔寥廓雲雨謂際時也言何時梁運復興得遂其冲霄之志也廣雅曰寥空也廓深也奉和示内人然香鬱金屋吹管鳳凰臺説文曰然燒也鬱金香草也樂府云盧家蘭室桂為梁中有鬱金蘇合香列仙傳云蕭史善吹簫秦穆公女弄玉好之公遂以女妻焉遂教弄玉作鳳鳴為作鳳凰臺春朝迎雨去秋夜隔河來春朝迎雨去即宋玉所謂朝為行雲暮為行雨是也秋夜隔河來即續齊諧記桂陽成武丁云七月七日織女當渡河是也聼歌雲即斷聞琴鶴倒回列子曰薛談學謳於秦青辭歸青餞於郊衢撫節悲歌聲振林木響遏行雲風俗通曰春秋師曠為晋平公作清角之音有𤣥鶴二八從南方來進於廊門之扈再奏之而成列三奏之則延頸而鳴舒翼而舞音中宫商聲聞於天下公大悦坐者皆喜春牕刻鳳下寒壁畫花開定取流霞氣時添承露杯抱樸子曰項曼都自云仙人以流霞一杯與我飲之輒不饑渴三輔舊事曰建章宫承露盤髙二十丈大七圍以銅為之上有仙人掌承露和玉屑飲之奉和趙王美人春日直將劉碧玉來過隂麗華樂府有碧玉歌樂苑云碧玉歌者宋汝南王之所作也碧玉汝南王妾以寵愛之甚所以歌之後漢書曰光烈皇后諱麗華汝南新野人初光武適新野聞后美心悦之後至長安見執金吾車騎甚盛因嘆曰仕宦當為執金吾娶妻當得隂麗華祗言滿屋裏併作一園花言美人顔色如花也新藤亂上格春水漫吹沙幽明録云句章人至東野還暮見路傍有小屋燈火因投宿有女子彈絃而歌曰連綿葛上藤一綏復一絙欲知我姓名姓陳名阿登釋名曰縠謂沙縠取踧踧如沙也亦言美人與春花相若矣歩揺釵梁動紅輪帔角斜西京雜記曰趙飛燕為皇后女弟上襚三十五條有黄金歩揺梁簡文云九梁插花歩揺為古沈約詩云畫扇迎朝暑紅輪映早寒庾肩吾詩云粉白映輪紅或疑如婦女所執暖扇之類所未詳矣今年逐春處先向石崇家續文章志曰石崇資産累巨萬金宅室輿馬僣擬王者庖膳必窮山陸之珍後房數百皆曳紈繡珥金翠而絲竹之藝盡一時之選築榭開沼殫極人巧與貴戚羊琇王愷之徒競相髙以侈靡而崇為居最琇等每愧羡以為不及也奉和趙王春日城傍金谷苑園裏鳳凰池晋書曰石崇有别業在河内縣金谷澗中又荀朂曰奪我鳳鳳池細管調歌曲長衫教舞兒向人長曼臉由來薄面皮楚辭曰蛾眉曼睩目騰光長髮曼鬋豔陸離王逸曰曼澤也梅花絶解作樹葉本能吹梅花樹葉謂笛笳之類笛中有落梅花曲傅𤣥笳賦曰吹葉為聲香煙龍口出蓮子帳心垂香煙龍口出者言香爐刻為龍形薰香煙從口中出也蓮子帳心垂者所謂金蓮帳是也鄴中記曰石虎冬月用複帳帳之四角安金銀鑿鏤香爐爇以百合香帳頂安金蓮花中懸金箔織成錦囊莫畏無春酒須花但見隨詩云為此春酒夢入堂内雕梁舊刻杏香壁本泥椒間居賦曰飾文杏以為梁西京雜記曰温室以椒塗壁椒房殿在未央宫以椒和泥塗取其温而芬芳也幔繩金麥穂簾鈎銀蒜條言金繩如麥穗銀鈎若蒜條象其形也畫眉千度拭梳頭百遍撩釋名曰黛代也滅去眉毛以此畫代其處也黛説文作黱畫眉也聲徒耐切字同漢書比疏一史記作比余徐廣曰或作疏比也索隱曰比音鼻廣雅曰比櫛也蒼頡篇曰靡者為比麤者為梳説文曰撩理也聲洛蕭切小衫裁裹臂纒絃掐抱腰釋名曰衫芟也衫末無袖端也抱腰疑即抱腹注見下夜聼搗衣篇纒絃抱腰如古鞶帶之飾矣日光釵熖動牕影鏡花揺説文曰釵笄屬飛燕外傳有七出菱花鏡一奩故云鏡花歌曲風吹韻笙簧火炙調漢書音義曰律得風氣而成聲周禮笙師掌教笙鄭注曰笙十二簧爾雅郭璞注曰列管匏中施簧管端大者十九簧即今須戲去誰復待明朝和詠舞和梁簡文帝也簡文有詠舞詩洞房花燭明燕餘雙舞輕楚辭曰姱容脩態絙洞房又云蘭膏明燭華容備張衡七辨曰淮南清歌燕餘才舞荀悦漢紀曰趙氏善舞號曰飛燕上悦之由體輕而封皇后也西京賦曰飛燕寵於體輕頓履隨疎節低鬟逐上聲楊惲報孫㑹宗書曰奮袖低昂頓足起舞四聲中有上聲上音賞歩一作伴轉行初進衫飄曲未成鸞廻鏡欲滿鶴顧市應傾范㤗鸞鳥詩序云昔罽賔王結罝峻卯之山獲一鸞鳥王甚愛之三年不鳴其夫人曰嘗聞鳥見其類而後鳴何不懸鏡以映之王從其言鸞覩影悲鳴一奮而絶越絶書曰闔廬子女冡在閶門外舞鶴吳市殺生送死已從天上學詎是世一作見地中生夜聼搗衣秋夜搗衣聲飛度長門城今夜長門月應如晝日明字林云直舂曰搗古人搗衣兩女子對立執一杵如舂米然今易作卧杵對坐搗之取其便也漢書外戚傳曰陳皇后罷退居長門宫長門賦序曰孝武皇帝陳皇后時得幸頗妬别在長門宫愁悶悲思三輔黄圖曰長門宫離宫在長安言明月夜砧長門别怨聞之愈増愁思也小鬟宜粟瑱圓腰運織成鬟髻鬟也粟眉飾也瑱耳飾也東觀漢記曰明帝馬皇后美髮為四起大髻但以髮成尚有餘繞髻三匝眉不施黛獨左眉角小缺補之如粟左氏傳曰縛一如瑱杜注云瑱充耳也劉熈釋名曰瑱鎮也懸當耳旁不欲使人妄聼自鎮重也或曰充耳塞耳所以止聼也故里語云不瘖不聾不成姑公圓腰疑抱腹也釋名云抱腹上下有帶抱裹其腹上無襠者也又有帕腹横帕其腹也吉施小鬟更束縛其腰便於舂杵也秋砧調急節亂杵變新聲謝惠連搗衣詩云欄髙砧響發楹長杵聲哀善曰砧搗帛之質也文字集畧曰砧杵之質也猪金切爾雅曰砧謂之䖍石燥砧逾響桐虚杵絶鳴石砧石也砧以石為之桐謂杵以桐木為之鳴石出華隂虚桐採鳳林言砧石杵桐之所出也山海經曰長石之山有谷名曰共谷共水出焉西南流至於洛其中多鳴石郭璞注云晋永康元年襄陽郡上鳴石似玉色青撞之聲聞七八里今零陵泉陵縣永正鄉有鳴石二所其一狀如鼔俗謂之石鼔即此類也張協七命曰鳴鳳在林顆於黄帝之園北堂細腰杵南市女郎砧捜神記曰何文暮入北堂梁上有一人髙冠朱幘呼曰細腰細腰應諾文呼細腰問向衣冠是誰答曰金也在西壁下問君是誰答曰杵也今在竈下文掘金燒杵由是大富水經注漢水南有女郎山山上有女郎塚逺望山墳巍巍狀髙及即其所裁有墳形山上直路下出不生草木世人謂之女郎道下有廟及搗衣石言張魯女也有小水北流入漢謂之女郎水撃節無勞鼔調聲不用琴言砧杵能諧音節不須鼔琴也並結連枝縷雙穿長命針倡樓驚别怨征客動愁心西京雜記曰戚夫人侍兒賈佩蘭説在宫時七月七日臨百子池作于闐樂樂闋以五色縷相羈謂之相連愛八月四日出雕房北戸竹下圍碁勝者終年有福負者終年疾病取絲縷就北辰星求長命乃免言搗衣之時見衣中縷猶並結針尚雙穿則思婦之獨守倡樓蕩子之逺為征客能無愁怨乎盖傷别之辭也同心竹葉椀雙去雙來滿易繫辭曰二人同心張協七命曰豫北竹葉張華輕薄篇曰蒼梧竹葉青宜城九醖酒言同心及雙去雙來者按舂杵兩人對為之謝惠連搗衣詩云㣲風起兩袖輕汗染雙題皆取兩人之義矣裙裾不奈長衫袖偏宜短釋名曰裙下羣也連接裾副也裾倨也倨倨然直亦言在後常見裾也衫芟也衫末無袖端也龍文鏤剪刀鳳翼纒篸管言裁衣也謝惠連搗衣詩云裁用笥中刀縫為萬里衣龍文鏤剪刀者言剪刀之上刻鏤龍形用為裁剪也篸説文云差也聲所金切篸疑即篸音讃綴衣也鳳翼纒篸管者言綴以鳳文也篸字从竹參故云篸管風流響和韻哀怨聲悽斷新聲繞夜風嬌轉滿空中應聞長樂殿判徹昭陽宫三輔黄圖曰長樂宫有長信長秋永夀永寧四殿髙帝居此後太后常居成帝趙皇后居昭陽殿有女弟俱為媫妤貴傾後宫班媫妤居增城舍漢書曰趙氏姊弟嬌妬班媫妤恐久見危求供飬太后長信宫上許焉言長樂宫有長信殿班姬失寵聞此砧聲愈増愁怨昭陽趙氏姊弟所居最為寵幸故判徹也判與拚同花鬟醉眼纈龍子細文紅鬟髻鬟也纈胡結切廣韻云結也言淚眼如醉當此春杵之際或亂髪下垂與眼若相繫也李賀詩云青琴醉眼涙泓泓本此古今注曰蝘蜓守宫一名龍子博物志云以器飬之食以眞朱體盡赤重七斤搗萬杵以㸃女人體終身不滅耦則落故云守宫知守宫名龍子也濕摺通夕露吹衣一夜風説文曰摺之渉切玉堦風轉急長城雪應闇班媫妤自傷賦曰華殿塵兮玉堦苔江淹咏班媫妤詩云竊愁凉風至吹我玉堦樹漢書曰秦北為長城之役史記曰始皇以謫遣戍譴罰獄吏不直者築長城也陸機從軍行云北戍長城阿是也言婦在玉堦搗衣寒風甚急因思夫在長城逺戍飛雪應闇矣盖傷征夫之苦寒矣新綬始欲縫細錦行須纂後漢書輿服志曰古者君臣佩玉五伯解去紱佩留其係璲以為章表秦以采組連結於璲光明章表轉相結受故謂之綬有黄赤綬赤綬緑綬紫綬青綬黑綬黄綬釋名曰錦金也作之用功重於其價加金故其制字帛與金也言搗帛裁衣將以寄逺也聲煩廣陵散杵急漁陽摻魏志注嵇康别傳云康臨終之言曰袁孝尼嘗從吾學廣陵散吾每固之不與廣陵散於今絶矣後漢書曰曹操聞禰衡善撃鼔乃召為鼓吏禰方為漁陽參撾蹀𨄌而前容態有異聲節悲壯聼者莫不慷慨章懐太子注云搥及撾並撃鼔杖也參撾是撃鼔之法而王僧儒詩云散度廣陵音參冩漁陽曲而於其詩自音云參音七紺反後諸文人多同用之據詩意參曲奏之名則撾字入下句全不成文下云復參撾而去足知參撾二字相連而讀參字音去聲不知何所憑也參七甘反按此詩所云漁陽摻三字與廣陵散對是為曲奏之名參加手傍韻為七紺從僧儒之義也盖言砧杵之聲較煩於琴更急於鼔也新月動金波秋雲汎濫過漢書月穆穆以金波秋雲白雲也誰憐征戍客今夜在交河漢書有七科適戍屯兵而守也又曰車師前王治交河城有交河水分流遶城下栩陽離别賦臨江愁思歌漢書藝文志有别栩陽賦五篇又冇臨江王及愁思節士歌四篇復令悲此曲紅顔餘幾多言彼栩陽以離别為賦臨江之愁思作歌者復令悲此搗衣之曲紅顔無復多也預麟趾殿校書和劉儀同周書明帝紀曰帝即位集公卿以下有文學者八十餘人於麟趾刋校經史公之得預盖此時也又北史庾季才傳曰武定二年與王裒庾信同補麟趾學士劉儀同劉臻也止戈興禮樂修文盛典謨左氏傳曰夫文止戈為武尚書有典謨壁開金石篆河浮雲霧圖孔安國尚書序曰魯共王好治宫室壊孔子舊宅以廣其居於壁中得先人所藏古文虞夏商周之書及傳論語孝經皆科斗文字王升孔子堂聞金石絲竹之音乃不壊宅悉以書還孔氏科斗書廢已久時人無能知者以所聞伏生之書考論文義定其可知者為𨽻古定更以竹篇寫之增多伏生五篇竹書紀年曰黄帝五十年天霧三日三夜龍圖出河芸香上延閣碑石向鴻都魚豢典畧曰芸香辟紙魚蠧故藏書臺曰芸臺漢書曰武帝時内有延閣廣内秘書之府劉歆七畧曰孝武皇帝勅丞相公孫𢎞廣開獻書之路百年之間書積如山故内有延閣廣内秘書之府後漢書曰靈帝光和元年始置鴻都門學生蔡邕書冊於碑令工鐫刻於太學門外碑始立其觀視及摹冩者車乗日千餘兩塡塞街陌後諸為尺牘及書鳥篆者皆引召遂至數千人焉誦書稱博士明經拜大夫漢書曰伏生濟南人也故為秦博士孝文時求能治尚書者伏生年九十餘不能行詔使晁錯徃受之又曰韋𤣥成以明經擢為諫大夫璧池寒水落學市舊槐疎一作枯三輔黄圖曰璧廱如璧之圓雍之以水象教化流行也又曰元始中起明堂列槐樹數百行朔望持經書及當郡所出物於此賣買號槐市髙譚變白馬雄辯塞飛狐孔叢子曰趙人公孫龍云白馬非馬馬者所以命形白者所以命色夫命色者非命形故曰白馬非馬也漢書酈食其曰距飛狐之口臣瓚曰飛狐在代郡西南塞名月落將軍樹風驚御史烏後漢書曰馮異每所止舍諸將並坐論功異獨屏樹下軍中號曰大樹將軍漢書朱博傳曰御史府中列柏常有野烏數千棲宿其上晨去暮來號曰朝夕烏鳥去不來者數月長老異之後二嵗休廢御史大夫之職子雲猶一作方汗簡温舒正削蒲漢書曰揚雄字子雲蜀郡成都人也劉向别録云殺青者以火炙簡令汗取其青易書復不蠧謂之殺青亦謂汗簡漢書曰路温舒字長君鉅鹿東里人也父為里監門使温舒牧羊温舒取澤中蒲截以為牒編用寫書後受春秋通大義舉孝亷位至臨淮太守連雲雖有閣終欲想江湖曹子建節逰賦曰連雲閣以逺徑潘岳秋興賦序曰髙閣連雲又曰譬猶池魚籠鳥有江湖山藪之思和宇文内史入重陽閣和宇文内史昶悼周明帝也周書明帝紀云武成二年辛酉重陽閣成㑹羣公列卿大夫及突厥使者於芳林園賜錢帛各有差夏四月帝因食遇毒庚子大慚辛丑崩于延夀殿北原風雨散南宫容衛疎北原北陵也原陵通稱西都賦曰北眺五陵三輔黄圖曰太上皇葬櫟陽北原漢書音義曰原再也謂已立廟更立者為原後漢書曰肅宗詔賈逵入講尚書南宫雲臺待詔還金馬儒林歸石渠三輔黄圖曰金馬門宦者署武帝時大宛以銅鑄像立於署門因以為名東方朔主父偃嚴安徐樂皆待詔金馬門石渠閣蕭何造其下礲石為渠以導水若今御溝因為閣名所藏入闗所得秦之圖籍至於成帝又於此藏秘書焉徒懸仁夀鏡空聚茂陵書周書明帝紀云帝善屬文摭採衆書自黄農以來訖於漢魏末叙為世譜凡五百六巻所著文章十巻陸機與弟雲書曰仁夀殿前有大方銅鏡髙五尺餘廣二尺二寸暗著庭中向之便冩人形體漢武内傳曰武帝遺詔以雜道書三十巻置棺中河中太守張純以書進宣帝時有武帝典書郎冉登見之流涕曰此先皇殯時物也漢書云武帝𦵏茂陵臣瓚曰茂陵在長安西北八十里竹淚垂秋筍蓮衣落夏蕖博物志云舜二妃曰湘夫人舜崩二妃啼以淚揮竹竹盡斑楚辭曰製芰荷以為衣王逸曰芰菱也荷芙蕖也顧成始移廟陽陵正徙居三輔黄圖曰故文帝廟號顧成廟孝文四年作顧成廟在長安城南文帝自為廟制度逼狭若顧望而成猶文王靈臺不日成之故曰顧成也景帝陽陵在長安城東北四十里按景帝五年作陽陵起邑陽陵山方百二十歩髙十丈舊蘭憔悴長殘花爛漫舒别有昭陽殿長悲故一作班媫妤漢書曰班媫妤成帝即位選入後宫始為少使俄而大幸為媫妤居增成舍後趙飛燕寵盛媫妤失寵希復進見退處東宫作賦自傷悼成帝崩媫妤充奉園陵薨因𦵏園中以喻宇文内史入重陽閣有傷悼之辭也忝在司水看治渭橋本傳云孝閔踐阼封臨清縣子除司水下大夫是也漢書注蘇林曰渭橋在長安三里跨渭水為橋王裒集中有和庾司水修渭橋詩大夫參下位言已為下大夫之職也司職渭之陽言為司水㸔治渭橋在渭水之陽也富平移鐵鏁一作鏁柱甘泉運石梁晋陽秋曰杜預造橋於富平津所謂造舟為梁也博物志曰秦始皇在驪山之北運取大石於渭北歌曰運石甘泉口渭水為不流千人唱萬人鉤金陵餘石大如塸跨虹連絶岸浮黿續斷航爾雅曰螮蝀謂之雩螮蝀虹也郭注云俗呼為美人虹江東呼雩月令季春之月虹始見音義云虹雙出鮮盛者為雄雄曰虹闇者為雌雌曰蜺是隂陽交㑹之氣言橋似之也爾雅注曰兩厓累者為岸説文曰黿大鼈也𤣥中要記曰千嵗之黿能與人語江淹恨賦曰方欲駕黿鼉以為梁方言云闗西東或謂舟為航説文作斻在方部航胡郎切春洲鸚鵡色流水桃花香水經注曰黄鵠磯在鸚鵡之下尾此云鸚鵡色言緑色似之也漢書溝洫志曰来春桃花水盛必羡溢有填淤反壤之害師古曰月令仲春之月如雨水桃始華盖桃方華時既有雨水川谷水洋衆流猥積波瀾盛故謂之桃花水耳星精逢漢帝釣叟值周王干寳搜神記曰蜀張寛漢武帝時為侍中從侍甘泉至渭橋有女子浴於渭氷乳長七尺上怪其異遣問之女曰帝後第七車者知我所來時寛在第七車對曰天星主祭祀者齋戒不潔則女人見史記曰吕尚盖嘗困窮年老矣以漁釣干周西伯西伯出獵遇太公於渭之陽與説大悦載與俱歸立為師平堤石岸直髙堰栁長長廣雅曰堰潛堰也謂潛築土以壅水也羡言杜元凱河橋獨舉觴晋書曰杜預以孟津渡險有覆没之患請建河橋於富平津議者以為殷周所都厯聖賢而不作者必不可立故也預曰造舟為梁則河橋之謂也及橋成帝從百寮臨㑹舉觴屬預曰非君此橋不立也對曰非陛下之明臣不能施其㣲巧北園新齋成應趙王教虹粉跂鳥翼山節拱蘭枝爾雅曰螮蝀虹也粉疑作棼説文曰棼複屋棟也翼屋榮也西都賦曰抗應龍之虹梁又云列棼橑以布翼吕延濟曰梁曲如虹故言虹梁吕向曰言棟上布椽如翼也此言梁棼若虹梁矣棼音汾色咸語論注云節者栭也刻鏤為山蘭枝木蘭枝也畫梁雲氣繞雕牕玉女窺王裒甘泉頌曰采雲氣以為楣西京賦曰繡栭雲楣薛琮曰楣梁也皆雲氣畫如繡也魯靈光殿賦曰玉女窺牕而下視月懸惟返照蓮開長倒垂魯靈光殿賦曰璧暠曜以月照李善曰言璧之白如月之照也賦又曰反植芙蕖張載曰反植者根在上而葉在下盤根細壊石行雨暴澆池長藤連格徙髙樹帶巢移鳥聲惟雜囀花風直亂吹白虎題書觀𤣥熊帖射皮後漢有白虎觀周禮王大射共熊侯文絃入舞曲月扇掩歌兒張揖廣雅曰琴五絃宫商角徵羽文王増二絃曰少宫少商見世本班媫妤怨歌行曰裁為合歡扇團團似明月玉節調笙管金船代酒巵説文曰古者玉琯以玉舜之時西王母來獻其白琯前零陵文學姓奚于泠道舜祠下得笙玉琯夫以玉作音故神人以和鳯凰来儀也漢書音義曰管漆竹長一尺六孔古以玉作不但竹也按琯从玉管從竹節竹約也以玉為之故云玉節矣八王故事曰陳思有神思為鴨頭杓浮於九曲酒池王意有所勸鴨頭則迴向之又為鵲尾杓柄長而直王意有所到處於罇上鏇之鵲則指之大業拾遺云作小舸子長八尺七艘木人長二尺許乗船行酒毎一船一人擎酒杯一人捧酒缽一人撑船二人盪槳遶曲水池隨岸而行疾於水飾水飾遶池一匝酒船得三遍毎到坐客處即停住擎酒木人於船頭伸手酒客取酒飲訖還杯木人受杯迴向捧酒缽人取杓斟酒滿杯船依飾自行按金船即鴨頭杓之遺陳思王所制也後李白詩云却放酒船回李商隱詩云雨送酒船香皆云酒巵盖本此也若論曹子建天人本共知魏畧曰邯鄲淳嘆曹植之材謂之天人同㑹河陽公新造山池聊得寓目周書曰李綸為河陽郡公横階仍鑿澗對戸即連峰暗石疑藏虎盤根似卧龍楚熊渠子漢李廣皆夜行射寢石以為虎故石疑藏虎抱樸子云千龍之松其狀如龍故根似卧龍也沙洲聚亂荻洞口礙横松陸機云薍謂之荻至秋堅成則謂之萑引泉恒數派開巖即十重北園聞吹管南隣聼撃鐘左太冲詩曰南隣撃鐘磬北里吹笙竽菊寒花正合杯香酒絶濃由來魏公子今日始相逢漢書地理志云河南之開封中牟陽武酸棗巻皆魏分也故河陽公稱魏子比戰國信陵矣登州中新閣跨虚凌倒景連雲拒少陽漢書如淳注曰倒景在日月之上日月反徙下照故其景倒魯靈光殿賦曰承明堂於少陽李善注云漢書曰少陽東方也凌倒景言其髙也拒少陽言其在東也璇極龍鱗上雕薨鵬翅張甘泉賦曰璇題玉英應劭曰題頭也榱椽之頭皆以玉飾也漢書音義曰三輔間謂屋梁為極也魯靈光殿賦曰崱繒綾而龍鱗説文曰薨屋棟也徐鍇曰所以承瓦聲莫耕切莊子曰北海有鳥曰鵬璇極言以玉飾梁也龍鱗似龍之鱗雕薨畫棟也鵬翅謂棟翅若飛翔者千尋文杏照十里木蘭香西京雜記曰上林苑有文杏材有文采者也述異記曰木蘭在潯陽江中多木蘭樹昔吳王闔廬植木蘭於此用搆宫殿也閒居賦曰刻木蘭以為榱兮飾文杏以為梁開牕對髙掌平坐望河梁西京賦曰綴以二華巨靈屭贔髙掌逺蹠以流河曲開牕對髙掌者言對二華之山也魏文帝燕歌行曰牽牛織女遥相望爾獨何辜限河梁平坐望河梁者言閣之髙上凌天河也梁橋也歌響聞長樂鐘聲徹建章三輔黄圖曰長樂宫本秦之興樂宫也建章宫在未央宫西長安門外賦用王延夀書須韋仲將後漢書曰王逸字叔師南郡宜城人子延夀字文考有雋才逰魯作靈光殿賦蔡邕亦造此賦未成及見延夀賦甚竒之遂輟世說曰韋仲將能書魏明帝起殿欲安榜使仲將登梯題之既下頭鬢皓然用勅兒孫勿復學書龍來隨畫壁鳳起逐吹簧毛萇曰簧笙也説文曰笙象鳳身言畫龍疑眞刻鳳儼若吹簧也石作芙蓉影池如明鏡光郭璞曰江東人呼荷華為芙蓉花梁反披葉蓮井倒垂房所謂井者淮南子曰大構駕興宫室延樓棧道鷄棲井榦髙誘曰鷄棲井榦復金熒井刻花置其中也榦音貫漢書有井榦樓榦音韓西京賦曰蔕倒茄於藻井披紅葩之狎獵飾華榱與壁璫流景曜之韡韡薛綜注曰茄藕莖也以其莖倒置於藻井其華下向反披也華榱畫其榱也魯靈光殿賦曰圓淵方井反植荷蕖緑房紫的窋䆛垂珠張載注云緑房芙蕖之房也芙蕖蓮也窋張滑切䆛丁嫁切反披倒垂皆謂根在上而葉在下也云蓮井者當棟中交木方若井榦刻以蓮花也徒然思鷰賀無以預鵾翔淮南子曰大厦成而鷰雀相賀莊子曰北溟有魚其名曰鯤化而為鵬怒而飛翼若垂天之雲鷦鷯賦云鷲鶚鵾鴻李善注云鵾狀如鶴而大嵗晚出横門三輔黄圖曰長安城北出西頭第一門曰横門年華改歳隂逰客喜登臨楚辭曰登山臨水兮送將歸據鞍垂玉帖横腰帶錦心後漢書曰馬援據鞍顧盼氷弱浮橋没沙虚馬跡深倚弓依石岸回牀向栁隂智瓊來勸酒文君過聼琴干寳搜神記曰魏濟北郡從事掾弦超以嘉平中夜獨宿夢冇神女来從之自稱天上玉女東郡人姓成公字智瓊早失父母天帝哀其孤苦遣令下嫁超當其夢也精爽感悟嘉其非常人之容覺悟欽想若存若亡如此三四夕一旦顯然來逰駕輜軿車從一婢服羅綺之衣姿顔容體狀若飛仙自言年七十視之如十五六車上有壺榼青白琉璃五貝飲啗竒異饌具醴酒與超共飲食遂為夫婦漢書曰卓王孫有女文君新寡好音故相如繆與令相重而以琴心挑之文君夜亡奔相如明朝雲雨散何處更相尋髙唐賦云昔者先王夢一婦人曰妾巫山之女也朝為行雲暮為行雨朝朝暮暮陽臺之下旦而視之如言故為立廟曰朝雲北園射堂新成周書若干惠傳太祖嘗造射堂新成與諸將宴射徙堂於惠宅軒臺聊可習仙的不難登山海經曰西王母之山有軒轅臺射者不敢西向轉箭初調筈横弓先望堋筈音括筈㑹也謂與弦相㑹也堋射埒也驚心一雁落連臂兩猿騰上更嬴事下飬由基事注已見直知王濟巧誰覺魏舒能世説曰王君夫有牛名八百里駮常瑩其角王武子語君夫曰吾射不如卿今指賭卿牛以錢千萬對之君夫既恃手快且謂駿物無有殺理便相然可令武子先射武子一起便破的卻據胡牀叱左右速探牛心來須臾炙至一臠便去王隱晋書曰魏舒字陽元任城人少工射為後將軍鍾毓長史毓與參佐射戲舒常為坐畫籌後值朋人少以舒充數於是發無不中加博措閒雅殆盡其妙毓嘆之曰吾之不足盡卿如此射矣空心不死樹無葉未枯藤擇賢方知此傳巵喜得朋禮記鄭注曰巵酒器也易曰西南得朋庾子山集巻三, SBCK: ''}
