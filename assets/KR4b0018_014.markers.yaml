  - {type: variant, offset: 0, length: 3490, content: 欽定四庫全書庾子山集巻十二周庾信撰錢唐倪璠纂註銘秦州天水郡麥積崖佛龕銘并序天水郡漢武帝元鼎三年置秦州地記云郡前湖水冬夏無增減因以名焉麥積山者北跨清渭南漸兩當五百里岡巒麥積處其中崛起一石嵬高萬尋望之團團如民間麥積之狀故有此名其青雲之半峭壁之間鐫山成佛萬龕千室雖自人力疑具鬼功隋帝分葬神泥舍利函於東閣之下伽室之中有庾信銘記刋於巖中見太平廣記袁宏後漢紀曰浮屠者佛也漢言覺將覺悟羣生也龕者塔也方志云受廣雅云盛也按周武帝建德三年始除佛道二敎是銘當在建德三年以前所作也麥積崖者乃隴底之名山河西之靈嶽隋書地理志云天水郡舊秦州後周置總管府天水郡有隴城縣西京賦曰右有隴坻之隘應劭曰天水有大阪曰隴坻左氏傳曰名山名川史記曰渾邪王以衆降數萬遂開河西酒泉之地正義曰河謂隴右蘭州之西河也夏本紀曰至於龍門西河索隠曰河在冀州西故云西河隋書地志云周禮職方正西曰雍州安定北地上郡隴西天水金城于古為六郡之地河西諸郡其風頗同竝有金行之氣按麥積在秦州東南九十里又有豆積山在其中高峯尋雲深谷無量淮南子曰高山尋雲谿肆無景方之鷲島迹遁三禪史記大宛傳注括地志曰王舍國胡語曰罪悅祗國其國靈鷲山胡語曰耆闍崛山山似青石石頭似鷲鳥名耆闍鷲也山周四十里外周圓水佛於此坐禪及諸阿難等俱在此坐大品經曰初禪二禪三禪四禪按十八天分為四禪初禪三天二禪三天三禪三天四禪九天三禪皆依雲住至四禪方在空居此云迹遁三禪者言高峯挿雲也譬彼鶴鳴虛飛六甲舊唐書地理志云蜀州晉源漢江源地鶴鳴山在西北十里神仙傳曰張道陵與弟子入蜀住鵠鳴山著作道書二十四篇乃精思鍊志忽有天人下千乗萬騎金車羽蓋驂龍駕虎不可勝數或自稱柱下史或稱東海小童乃授陵以新出正一明威之道鶴鳴即鵠鳴山鶴鵠通稱矣又漢武内傳上元夫人謂王母有六甲靈飛之符按此為道家之言故云譬彼言麥積可擬靈鷲鶴鳴二山也鳥道乍窮羊腸或斷南中志曰鳥道西百里以其險絶獸猶無蹊特上有飛鳥之道耳高誘曰羊腸其山盤紆如羊腸也酈道元水經注云羊腸盤道三十六回在成州仇池山雲如鵬翼忽已垂天莊子曰鵬之背不知其㡬千里也怒而飛其翼若垂天之雲樹若桂華翻能拂日楚辭曰折若木以拂日是以飛錫遥來度杯逺至孫綽遊天台賦曰應貞飛錫以跨虛注云大智論曰菩薩常應二時頭陀常用錫杖經傳佛像佛國記曰那竭國城東北一山延到一谷口有佛錫杖亦起精舍供養杖以牛頭栴檀作長丈六七尺許以木筒盛之正復百千人舉不能移高僧傳曰杯度者不知姓名常乘木杯渡來疏山鑿洞鬱為净土維摩經曰爾時螺髻梵王語舍利弗我見釋迦牟尼佛土清净如自在天宫佛語舍利弗若人心净便見此土功德莊嚴拜燈王於石室乃假馭風維摩詰經曰文殊師利言東方度三十六恒河沙國有世界名須彌相其佛號須彌燈王佛身長八萬四千由旬其師子座高八萬四千由旬嚴飾第一於是長者維摩詰現神通力即時彼佛遣三萬二千師子之座高廣嚴净來入維摩詰室悉皆包容無所妨礙爾時維摩詰語文殊師利就師子座與諸菩薩上人即自變形為四萬二千由旬坐師子座諸新發意菩薩及大弟子皆不能昇維摩詰言為須彌燈王如來作禮乃可得坐於是新發意菩薩及大弟子即為須彌燈王如來作禮便得坐師子座莊子曰夫列子御風而行泠然善也禮花首於山龕方資控鶴花首菩薩名此及釋氏所引舊作花首今藏經本首作手佛說華手經十巻姚秦鳩摩羅什譯經云時大目連從座起頂禮佛足為佛敷座高至梵天又於空中作經行之處七寶莊嚴有雜色蓮花彌覆水上華上有化比丘皆如目連又云諸菩薩持蓮華頂禮佛足又云時諸菩薩以此蓮華欲散十方佛以手摩一一蓮華中佛身半現此諸化佛從空而去孫綽遊天台山賦曰王喬控鶴以冲天毛萇詩傳曰控引也按上文石室此云山龕謂麥積山之石室山龕也言佛之神通變化無相無名非有藉于風鶴也而此山之刻石為室足拜燈玉鐫山成龕亦禮化佛此馭風控鶴之喻亦空亦有者也大都督李允信者周書宇文廣傳云其故吏李允信等上表籍於宿植深悟法門乃於壁之南崖梯雲鑿道奉為亡父造七佛龕按長阿含經一毘婆尸佛二尸棄佛三毘舍婆佛四拘留孫佛五拘那含佛六迦葉佛七釋迦牟尼佛也似刻浮檀如攻水玉佛國記曰佛上忉利天為母說法九十日波斯匿王思見佛即刻牛頭栴檀作佛像置佛坐處佛後還入精舍像即避出迎佛彿言還坐我般泥洹後可為四部衆作法式像即還坐此像最是衆像之始後人所法者也大莊嚴經論曰我昔曽聞波斯匿王往詣佛所頂禮佛足聞有異香殊于天香即白世尊為誰香耶爾時世尊以手指地即有骨現如赤栴檀長于五丈如來語王所聞香者從此骨出過去有佛號迦葉彼佛世尊化縁已訖入於湼槃爾時彼王名曰迦翅取佛舍利造七寶塔高廣二由旬又勅國内諸有花香不聽餘用盡皆持往供養彼塔時彼國中有長者子與媱女通為欲所盲即入迦葉佛塔盜取一花持與媱女即時悔熱身遍生瘡初如芥子後轉増長無有空處甚為臭穢是時彼人父母兄弟皆來瞻視復命良醫而重診之云須牛頭栴檀用塗身體爾乃可愈時彼父母即以貴價買牛頭栴檀用塗子身爾時彼人涕泣驚懼白父母言子病從今而起非是身患專念迦葉如來三藐三菩提涕泣盈目以巳所持栴檀之香悲哀白塔而說偈言即以花香塗香末香用供迦葉佛塔復以牛頭栴檀以畫佛身身瘡漸差熱患盡愈彼長者子於後命終生於天上或處人中身常有香身體肢節皆有好相父母立字號曰香身爾時香身厭惡陰界求索出家得辟支佛道此骨是辟支佛所出之香是故衆人應供養塔獲大功德又増一阿含經云優填王用牛頭栴檀雕佛形像高五尺此為始也佛地論云七寶四頗胝迦翻譯云頗梨或云塞頗胝迦此云水玉即蒼玉或云水精又云白珠刋正記云正名窣坡致迦其狀似此方水精有赤有白山海經曰堂庭之山多水玉郭璞曰水玉今水精也言鐫石為像如栴檀水玉也從容滿月照曜青蓮瑞應經曰面如滿月色從容維摩經曰目净修廣如青蓮肇曰五情百骸目最為長瞻顔而作故先讚目也天竺有青華其葉修而廣青白分明有大人目相故以為喻也法華經曰有人聞是品能隨喜讚善者是人口中出青蓮香晉書佛圗澄傳曰澄咒鉢水生青蓮花光色曜目影現須彌香聞忉利僧肇維摩經注曰須彌山天帝釋所在金剛山也秦言妙高處大海之中水上方高三百六十六萬里如來處四部之中威相超絶光蔽大衆猶金山之顯溟海者也什曰須彌山秦言妙高山也凡有十寶山須彌處其中餘九圍之也樓炭經曰須彌山王以四寶瑠璃水精金銀作成之須彌山王北脅天金照北方天下須彌山王東脅天銀照東方天下須彌山王西脅天水精照西方天下須彌山王南脅天瑠璃照南方天下又曰忉利天宫在須彌山上瑞應經曰第二忉利天上為天帝釋又曰佛生七日其母命終以懐天師功徳大故上生忉利封受自然菩薩本知母人之德不堪受其禮故因其將終而從之應法師云忉利梵音訛略正云多羅夜登陵舍此云三十三俱舍頌云妙高頂八萬三十三天居四角冇四峰金剛手所住中宫名善現周萬踰繕那高一半金城中有殊勝殿周千踰繕那踰繕那者舊曰由旬如斯塵疑作鹿野還開說法之堂塵野疑作鹿野槃頭王苑名在槃頭城毘婆尸佛說法處也長阿含經曰毘婆尸如來於槃頭城鹿野苑中轉無上法輪又四十二章經曰世尊成道已於鹿野苑中轉四諦法輪度憍陳如等五人而證道果猶彼香山更對安居之佛一作刹修行經太子言吾出香山之東雪山之北國名迦維宣律師四分羯摩云四安居謂前中後也律有比丘四月十六日欲安居不止所在十七日方到佛言聽後安居即五月十六日也明了論云無五過處得安居一太逺聚落求須難得二太近城市妨修出家道三多蟲蟻自他兩損四無可依人五無施主供給衣藥竝不可安居一作刹者伽藍號刹利輔行云西域以柱表刹示所居處也梵語剌瑟胝此云竿即幡柱也法華云表刹甚高廣法苑云阿育王取金華金幡懸諸刹上塔寺低昻昔者如來追福有報恩之經如來佛號梵言多陀阿伽度報恩經後漢翻譯經云父母者三界福田又曰釋迦牟尼佛説大方便大報恩經報欲令一切衆生孝養父母故一切衆生亦曽為如來父母如來亦曽為一切衆生而作父母為一切父母故常修方便此經名攝衆善本亦名大方便亦名微密行亦名佛報恩菩薩去家有思親之供僧肇曰菩薩正音云菩提薩埵菩提佛道名也薩埵秦言大心衆生有大心入佛道孟蘭盆經曰大目犍連始得六通欲度父母報乳哺之恩即以道眼觀世間見其亡母生餓鬼中不見飲食皮骨連立目連悲哀即以鉢盛飯往餉其母母得鉢飯食未入口化成火炭遂不得食目連大呌悲號涕泣馳還白佛佛告目連十方衆僧七月十五日僧自恣時當為七世父母及現在父母厄難中者具飯百味五果著盆中供養此等自恣僧者現世父母六親眷屬得出三塗之苦應時解脫衣食自然時目連母即于是日得脫一劫餓鬼之苦敢縁斯義乃作銘曰鎮地鬱盤基乾峻極石闗十上銅梁九息周禮鄭注曰鎮名山安地德者也徐敬業詩曰兹山復鬱盤禮記曰峻極于天蜀都賦曰阻以石門善曰石門在漢中之西褒中之北賦又曰外負銅梁於宕渠善曰銅梁山名在巴東百仞崖横千尋松直陰假道陽烏迴翼論語包咸注曰七尺為仞周禮云八尺曰尋張衡靈憲云月者陰精而成獸象蛤焉春秋元命苞曰陽成於三故日中有三足烏烏者陽精蜀都賦曰羲和假道於峻岐陽烏迴翼於高標載疏山穿龕架嶺糺紛星漢迴旋光景壁累經文龕重佛影史記夏本紀曰山行乘檋如淳曰檋車謂以鐵如錐頭長半寸施之履下以上山不蹉跌也河圖括地象曰河精上為天漢楚辭曰借光景以往來, SBCK: ''}
