  - {type: variant, offset: 0, length: 7337, content: 欽定四庫全書庾子山集巻八周庾信撰錢唐倪璠纂註啓謝滕王集序啓周書云滕王逌字爾固突文帝子也逌製庾信集序作啓謝之信啓伏覽制垂賜集序始皇本紀皇命為制此於王稱制矣紫微懸映如傳闕里之書春秋合誠圖曰北極星五在紫㣲中紫㣲大帝室太乙之精也括地志云兗州曲阜縣魯城西南三里有闕里中有孔子宅宅中有廟孝經援神契曰孔子制作孝經向北辰而拜青鳥遥飛似送層城之璧山海經曰三危之山三青鳥居之又云蛇巫之山一曰龜山西王母綈几而戴勝杖其南有三青鳥為西王母取食在崑崙虛北淮南子云崑崙山上有層城九重楚辭曰崑崙縣圃其尻安在增城九重其髙幾里王子年拾遺記曰崑崙山上有九層旁有瑶臺十二各廣千步皆五色玉為臺基若夫甘泉宮裏玉樹一叢揚雄甘泉賦曰翠玉樹之青蔥兮璧馬犀之瞵㻞李善注云漢武故事曰上起神屋前庭植玉樹珊瑚為枝碧玉為葉𤣥武闕前明珠六寸北方𤣥武𤣥武闕前謂北闕也列仙傳曰朱仲常於會稽市上販珠髙后時下書募三寸珠仲讀購書笑曰直値汝矣齎三寸珠詣闕即賜五百金魯元公主復私以七百金從仲求珠仲獻四寸珠於闕即去不得譬此光芒方斯燭照言逌之文章光芒燭照雖珠玉不能比也有節有度即是能平八風愈唱愈髙殆欲去天三尺左傳曰夫舞所以節八音而行八風殿下雄才葢代逸氣横雲濟北顔淵關西孔子濟北先賢傳曰戴宏字元襄剛縣人為郡督郵府君欲撻之宏曰今鄙郡推仰公咸以為仲尼君國以宏為顔囘豈聞仲尼有撻顔囘之義後漢書楊震傳曰關西孔子楊伯起譬其毫翰則風雨爭飛論其文采則魚龍百變蒲桃繞館新開碣石之宮上林賦曰櫻桃蒲陶郭璞注云蒲陶似燕薁可作酒也史記孟軻傳曰騶衍如燕昭王築碣石宮身親往師之正義曰碣石宮在幽州薊縣西三十里寧臺之東修竹夾池始作睢陽之苑史記曰梁孝王築東苑方三百餘里廣睢陽城七十里大治宮室為複道自宮連屬於平臺三十餘里索隠曰如淳云在梁東北離宮所在也今城東二十里臨新河有故臺址俗云平臺又一名修竹苑琉璃泛酒鸚鵡承杯張隠文士傳曰潘尼與同僚飲主人有琉璃椀使客賦之尼於座上立成鮑照淮南王詩云瑠璃作盌牙作盤南州異物志曰鸚鵡螺狀如覆杯頭似烏頭向其腹視似鸚鵡故名郭璞江賦云鸚螺蜁蝸又嶺表録異云鸚鵡螺旋尖處屈而朱如鸚鵡嘴故以名殻裝為酒杯竒而可玩亦有範金為形者梁簡文書曰車渠屢酌鸚鵡驟傾鳳穴歌聲鸞林舞曲山海經曰爰有歌舞之鳥鸞鳥自歌鳳鳥自舞况復行雲逐雨廻雪隨風髙唐賦云旦為朝雲暮為行雨洛神賦云飄颻兮若流風之廻雪湖陽之尉既成為喜之因舂陵之侯便是銷憂之地言以荆州新野封逌本漢之南陽也周書滕王傳云宣政元年伐陳詔逌為元帥節度諸軍事大象元年五月詔以荆州新野郡邑萬户為勝逌出就國後漢書曰光武殺湖陽尉軍中分財物不均衆恚恨欲反攻諸劉光武斂宗人所得物悉以與之衆乃悦注云湖陽屬南陽郡今唐州縣也袁宏後漢紀曰孝景帝生長沙定王發武帝世諸侯得分封子弟以冷道縣舂陵封發中子買為舂陵節侯元帝時節侯之孫孝侯以南方卑濕請徙南陽於是以蔡陽白水鄉為舂陵侯封邑而與昆弟鉅鹿君及宗親俱徙焉按郡國志新野舂陵湖陽俱屬南陽郡言逌伐陳若光武殺湖陽尉分財與人衆皆悦是既成為喜之因也及封荆州新野萬户使出就國又若舂陵孝侯請徙南陽是為銷憂之地也某本乏材用無多作述加以建鄴陽九劣免儒硎江陵百六幾從士壠滕王庾信集序云昔陽都有集十四巻値太清罹亂百不一存及到江陵又有三巻即遭軍火一字無遺建鄴陽九謂武帝太清三年侯景之亂也江陵百六謂元帝承聖三年敗於魏軍也漢書律厯志云易九戹曰初入元百六陽九孟康曰易傳也所謂陽九之戹百六之會者也初入元百六歲有戹者則前元之餘氣也若餘分為閏也後漢衛宏古今竒字序曰秦始皇改古文為篆𨽻國人多謗乃召諸生至者皆拜為郎凡七百人宻令冬月種瓜於驪山硎谷中溫處瓜實使往視之先為伏機諸生方相論辨發機填之以土皆終命戰國䇿顔觸曰生王之頭曾不若死士之壟也至如殘編落簡並入塵埃赤軸青箱多從灰燼子山自謂太清江陵之亂已之文集皆一字無遺也比年疴恙彌留光隂視息桑榆已廹蒲栁方衰淮南子曰日垂影在樹端謂之桑榆袁宏後漢紀光武詔曰失之東隅收之桑榆爾雅曰楊蒲栁郭璞注云可以為箭左傳所謂董澤之蒲疏云楊一名蒲栁生澤中可以為箭世説云顧悦曰蒲栁之姿望秋先零松柏之質經霜猶茂不無秋氣之悲實有途窮之恨宋玉曰悲哉秋之為氣也晉書曰阮籍時率意獨駕不由徑路車轍所窮輒慟哭而反是以精采瞀亂頗同宋玉瞀莫遘切瞀亂迷惑也宋玉神女賦云目畧㣲眄精采相授楚辭曰中瞀亂兮迷惑言辭蹇吃更甚揚雄漢書揚雄為人簡易蕩佚口吃不能劇談一吟一咏其可知矣言已目昏口吃吟咏之不足觀可知好事者不求知音者不用漢書揚雄傳贊曰時有好事者載酒肴從遊學韓詩外傳曰夫參天下賢人也其習知音矣非有班超之志遂已棄筆後漢書曰班超與母隨至洛陽家貧嘗為官傭書以供養久勞苦嘗輟業投筆嘆曰大丈夫無他志猶當效傅介子張騫立功異域以取封侯安能久事筆硯間乎左右皆笑之超曰小子安知壯士志哉未見陸機之文久同燒硯晉書陸機傳云弟雲嘗與書曰君苖見兄文輒欲燒其筆硯至於凋零之後殘缺所餘又已雜用補袍隨時覆醬按後漢書羊續舉縕袍以示之疑是用紙作絮補袍漢書曰揚雄作太𤣥法言劉歆亦嘗觀之謂雄曰空自苦今學者有禄利然尚不能明易又如𤣥何吾恐後人用覆醬瓿也雄笑而不應注曰瓿音蔀小甖也聖慈憐愍遂垂存録始知揄揚過差君子失辭比擬縱橫小人迷惑君子謂滕王小人子山自謂也荆玉抵鵲正恐輕用重寳韓子曰卞和抱其璞哭於荆山之下鹽鐵論曰崑山之旁以玉璞抵烏鵲龍淵削玉豈不徒勞神慮後漢書曰肅宗嘗賜諸尚書劒惟韓稜郅夀陳忠特以寳劒自手署其名曰韓稜楚龍淵晉太康記曰汝南西平縣有龍淵水可淬刀劒特堅利古龍淵之劒取於此矣孔叢子曰周穆王大征西戎西戎獻錕鋙之劒用之切玉如泥焉荆玉龍淵皆喻滕王之文也匠石廻顧朽材變於雕梁莊子曰匠石之齊至乎曲轅見櫟社樹其大蔽牛絜之百圍其髙臨山十仞而後有枝其可以為舟者旁十數觀者如市匠石不顧遂行不輟弟子厭觀之走及匠石曰自吾執斧斤以隨夫子未嘗見材如此其美也先生不肯視行不輟何耶曰巳矣勿言之矣散木也以為舟則沉以為棺則速朽以為器則速毀以為門户則液樠以為柱則蠧是不材之木也無所可用故能若是之夀孫陽一言奔踶成於駿馬孫陽伯樂秦穆公時善相馬者也桓寛鹽鐵論曰騏驥負鹽車垂頭於太行之坂見伯樂則噴而長鳴漢武帝詔云馬或奔踶而致千里匠石孫陽喻滕王也朽材奔踶子山自喻也故知假人延譽重於連城借人羽毛榮於尺玉言已之文集藉王作序而重也西京賦曰所好生羽毛溟池九萬里無踰此澤之深莊子曰㝠海者天池有魚焉其名曰鯤有鳥焉其名曰鵬摶扶揺羊角而上者九萬里華山五千仞終愧斯恩之重括地志云華山在華州華隂縣南八里古文以為敦物也山海經太華之山削成而四方其髙五千仞其廣十里包咸論語注云七尺曰仞即日金門細管未動春灰後漢書郡國志曰𢎞農郡宜陽有金門山出竹為律管司馬彪續漢書曰候氣之法為室三重户閉塗釁必周宻布緹縵室中以木為按毎律各一庳外髙從其方位加律上以葭灰抑其内端按律而候之氣至者灰去其氣所動者其灰散人及風所動者其灰聚石壁輕雷尚藏冬蟄左氏傳曰閉蟄而烝又云火伏而後蟄者畢正義曰十月始蟄至十一月則遂閉之王制云昆蟲未蟄不以火田鄭注云昆明也昆蟲者得陽而生得隂而藏隂陽即寒溫也伏願聖躬與時納豫南陽寳雉幸足觀瞻史記封禪書曰野雉夜雊以一牢祠命曰陳寳臣瓚曰陳倉縣有寳夫人或一歲二歲與葉君合葉君來時天為之殷殷雷鳴索隠曰葉縣名在南陽葉君即雄雉之神故時與寳夫人合也酈縣菊泉差能延夀郡國志曰南陽縣有酈侯國注云盛宏之荆州記曰縣北八里有菊水其源悉芳菊水極甘馨又中有三十家不復穿井即飲此水上夀百二十中夀百餘七十者猶以為天司空王暢太傅袁隗為南陽令縣月送三十餘石飲食澡浴悉用之太尉胡廣父患風羸南陽恒汲引此水疾遂瘳此菊莖短葩大食之甘美異於餘菊廣又收其實種之京師遂處處傳植之按滕王本傳詔以荆州新野郡邑萬户為滕逌出就國荆州新野古南陽地也伏遲至鄴可期從梁有日至鄴喻滕王若魏太子陳思王已如吳質等也從梁喻滕王若漢梁孝王已如司馬相如枚乗等也同杞子之盟會必欲瞻仰風塵左傳桓十年公㑹杞侯莒子盟於曲池共薛侯而來朝謹當逢迎冠葢左傳隠十一年云滕侯薛侯來朝爭長薛侯曰我先封滕侯曰我周之卜正也世族譜云薛任姓黃帝之苖裔奚仲封為薛侯今魯國薛縣是也又按逌以大象元年出就新野二年朝京其冬為隋文帝所害是序當在新野時所作言來朝之日冀與王相接也滕逌本後周宗室如古滕侯故云並薛侯而來朝也魚腸尺素鳳足數行書此謝辭終知不盡古詩云客從遠方來遺我雙鯉魚呼兒烹鯉魚中有尺素書鳳足疑作㕍足轉寫之誤也漢書常惠勅漢使者謂單于言天子射上林中得㕍足有繫帛書言武等在某澤中言作此謝啓從長安遥寄新野不盡所懐也謹啓答趙王啓答趙王招也仰承張幕全韓連營上地周書趙王招傳云建徳三年除雍州牧大軍東討招為後三軍總管全韓謂宜陽故韓國城上地謂綏州澠池置陣解鄧禹之圍袁宏後漢紀曰建武三年拜馮異征西大將軍鄧禹既被徴與車騎將軍鄧𢎞還至華隂欲進兵撃赤眉馮異曰赤眉衆多可以恩信傾難以兵力破也上令諸將屯澠池要其東異相連綴撃其西上自待其㑹可一舉取之萬全之計也禹𢎞自以西征又被徴當還欲一戰決之遂戰移日禹軍大敗馮異將兵救之不勝棄軍走與麾下數人歸營又收散卒堅壁㑹赤眉饑困乃謀撃之大破之降者八萬餘人十餘萬東走宜陽璽書勞異曰垂翅回谿奮翼澠池失之東隅收之桑榆是也函谷開關削王元之印後漢書曰隗囂將王元説囂曰按秦舊迹表裏山河元請以一丸泥東封函谷關此萬世一時之利也蜂旗朝上刁斗夜鳴王子年拾遺記曰周武王東伐紂夜濟河時雲明如畫八百之族皆齊而歌有大蜂狀如丹鳥集王舟因以鳥畫其旗翼日而梟紂名其船曰蜂舟魯哀公二年鄭人撃趙簡子得其蜂旗則其類也漢書曰李廣行無部曲不撃刁斗以自衞孟康曰以銅作燋受一升晝炊飯食夜擊持行彌雄壯士之心足起橫行之志言趙王鎮雍伐齊行軍之盛也况復才人出娉還得賢夫古詩有邯鄲故才人嫁為厮養婦趙王武臣事注見哀江南賦言今昔趙王同符合契矣塞外有夫人之城軍中有女子之氣漢書曰漢軍絶勝追北至范夫人城又曰李陵與單于戰陵曰土地衰而鼓不起者何也軍中豈有女子乎又報趙王詩亦引其事彼云趙王鎮益州與夫人紇豆陵同行及軍中卒婦此云為雍州牧屬大軍東討鎮兵將卒皆有妻婦也都尉青旗即時春色都尉官名漢書張宴注曰主諸官故曰都有卒徒武事故曰尉月令於春月云載青旗是青為春色也又按漢書百官公卿表護軍都尉武帝四年屬大司馬此言趙王出師載青旗與春同色也將軍大樹已復花開後漢書曰馮異為人謙退不伐諸將論功異獨屏樹下軍中號大樹將軍雲氣浮壘流星泛枕細舞長歌橫簫直笛當乎此時青雲之上列子曰蒲且子連雙鶬於青雲之上信不學無術本分泥沈忽逢天造捜揚仄陋漢書曰霍光不學無術易曰天造草昧書曰明揚側陋今者遂總憲司預聞刋鼎本傳云信為司憲中大夫言已為司憲中大夫聞趙王勒功鐘鼎也獻歲刑書既應懸法周禮司冦之職云正月之吉始和布刑於邦國都鄙乃懸刑象之法於象魏使萬民觀刑象挾日而斂之上春木鐸方須徇人論語孔注云木鐸施政教時所振也正義曰禮有金鐸木鐸鐸是鈴也其體以金為之明舌有金木之異木鐸是木舌也周禮云教鼓人以金鐸通鼓大司馬教振旅兩司馬執鐸明堂位云振木鐸於庭是武事振金鐸文事振木鐸也但年髮已秋性靈久竭嘉石肺石無以測量周禮曰大司冦以嘉石平罷民肺石達窮民朝士左嘉石右肺石鄭注云嘉石文石也肺石赤石也舌端筆端惟知繁擁韓詩傳云辯士舌端文士筆端乖展一月遂涉兩年傾首東瞻山河千里風塵未盡霜露霑衣仰願珍宜以為身寳謝趙王示新詩啓周書列傳云趙王招學庾信體辭多輕豔某啓鄭叡至奉手教累紙幷示新詩八體六文足驚毫翰衛恒四體書勢曰自秦壊古文有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰𨽻書王莽使司空甄豐校文字部改定古文復有六書一曰古文二曰竒字三曰篆書四曰佐書即𨽻書也五曰繆篆六曰鳥書文賦云或含毫而邈然善云毫謂筆毫也王逸楚辭注曰鋭毛為毫漢書音義韋昭曰翰筆也四始六義實動性靈詩序云是謂四始詩之至也箋云始者王道興衰之所由正義曰四始者鄭答張逸云風也小雅也大雅也頌也詩序又云故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌落落詞髙飄飄意遠文異水而湧泉筆非秋而垂露藏之山巖可使雲霧鬱起濟之江浦必當蛟龍繞船首夏清和聖躬怡裕琉璃彤管鵲顧鸞廻左氏傳曰靜女之三章取彤管焉杜注云彤管赤管筆也庾肩吾書品序曰波囘墮鏡之鸞楷顧雕陵之鵲並以篆籀重復見重昔時言趙王善書也婉轉緑沈猿驚雁落梁簡文詩云吳戈夏服箭驥馬緑沈舟知緑沈言弓也猿驚楚養由基事雁落魏更嬴事言其善射也又按緑沈是其色也王羲之筆經云有人以緑沈漆管見遺鄴中記曰石虎造象牙桃枝扇或緑沈色或木蘭色或紫柑色梁武帝西園食緑沈瓜皆是緑沈色也杜甫詩云苔臥緑沈鎗楊巨源詩云校獵緑沈鎗亦謂鎗柄漆飾矣云婉轉緑沈猿驚雁落者葢以色名其弓者也下風傾首以日為年下風子山自謂也左氏僖傳晉大夫曰羣臣敢在下風十七帖云遲此期以日為歲言已與趙王别有一日三秋之感也犍為舎人實有誠願碧雞主簿無由遂心漢書地理志曰犍為郡武帝建元六年開屬益州又云越巂郡青蛉禺同山有金馬碧雞又王褒傳云方士言益州有金馬碧雞之寳可祭祀致也宣帝使褒往祀焉褒於道病死列仙傳云赤斧者巴戎人也為碧雞祠主簿按犍為郡屬益州碧雞出越嶲郡亦益州之寳言趙王出使益州已欲從無由也寂寞荆扉疎蕪蘭徑驂駕來梁未期卜日遣騎致鄴希垂枉道柏梁詩梁孝王曰驂駕駟馬從梁來魏文帝與梁朝歌令吳質書曰今遣騎到鄴故使枉道相過謝趙王賚絲布等啓按趙王所賚許賜疑是蒼頭或是下客啓内楊池掘荷以下明是役奴遣客之詞也鄭叡至蒙賜絲布綾等十段王褒至又賜許賜錢等望外之恩實符大賚非常之錫乃溢生涯曳練且觀無勞白馬之望論衡曰孔子與顔淵俱登魯東山望吳閶門謂顔淵曰爾何見曰一疋練前有生藍子曰白馬廬芻也流泉欲委佇見青鳧之飛周禮有泉府鄭司農云故書泉或作錢洞冥記曰帝升望月臺有三青鴨化為三小童皆著綺文襦各握鯨文大錢置帝前又干寳搜神記曰南方有蟲名青蚨大如蠶子取其子母即飛來不以遠近雖潛取其子母必知處以母血塗錢八十一文以子血塗錢八十一文每市物或先用母錢或先用子錢皆復飛歸輪轉無已故淮南子術以之還錢名曰青蚨楊池掘荷李園移樹既欣谷利彌思青林王褒僮約云楊氏池中擔荷往來市聚吳志李衡遣客作宅種樹千株江表傳谷利孫權奴青林疑亦奴名未詳陳留下粟有媿深恩論衡云建武中陳留雨榖櫟陽雨金翻慚曲施史記曰秦獻公十八年雨金櫟陽靈臺久客從此數炊三輔決録曰第五頡倫之小子洛陽無故人鄉里無田宅客止靈臺中或十日不炊黍谷長寒於今更暖劉向别録曰鄒衍在燕有谷寒不生五榖鄒衍吹律而溫之至生黍從雲夢之田不踰此樂漢書相如子虚賦曰僕樂王之欲夸僕以車騎之衆而對以雲夢之事也張揖曰楚藪也在南郡華容縣得豐城之劒未均斯喜豫章記曰吳未亡時恒有紫氣貫於牛斗之間雷孔章曰寳劒之精上徹於天耳為豐城令至縣移獄掘地得二劒龍淵太阿謹啓謝趙王賚絲布啓某啓奉教垂賚雜色絲布三十段按趙王賚信下賚荀娘其欵至如此去冬凝閉今春嚴勁夏侯孝若寒雪賦曰嚴氣枯殺𤣥澤閉凝雪似瓊田凌如鹽浦瓊田玉田也十洲記曰祖洲有不死之草生瓊田中凌冰也周禮曰凌人掌冰鄭注凌冰室晉書謝朗詠雪云似撒鹽空中言去冬今春天寒嚴閉視積雪凝冰白如瓊田鹽浦也張超之壁未足鄣風未詳後漢書文苑傳曰張超字文並河間鄭人也有文才又善於草書疑即是人或其家貧不足鄣風耶袁安之門無人開雪汝南先賢傳曰時大雪積地丈餘洛陽令自出按行見人家皆除雪出有乞食者至袁安門無有行路謂安已死令人除雪入户見安僵臥問何以不出安曰大雪人皆餓不宜干人令以為賢舉為孝㢘也覆鳥毛而不暖燃獸炭而逾寒晉朝雜記洛下少炭羊琇𢷬小炭屑以物和之作獸形用以溫酒遠降聖慈曲垂矜賑言當此嚴寒之候䝉趙王賚絲布也論其蠶月殆罄桑車津實秉杼幾空織室蠶書曰月當大火則浴其種三輔黃圖曰織室在未央宮又有東西織室言所賚之多也遂令新市數錢忽疑敗疑作販綵平陵月夜驚聞𢷬衣郡國志新市屬江夏平陵屬右扶風江夏梁之郢州子山故國也後周都長安京兆馮翊扶風漢之三輔言已本羇旅得此絲布忽疑新市販綵而來在此平陵驚聞𢷬帛裁衣若將寄遠也妾遇新縑自然心伏古詩云新人從門入故人從門去新人工織縑故人工織素織縑旦一匹織素五丈餘將縑來比素新人不如故妻聞裂帛方當含笑史記曰周幽王后好聞裂繒聲莊周車轍實有涸魚莊子云莊周謂監河侯曰周顧視車轍中有鮒魚焉曰我東海之波臣也君豈有升斗之水以活我哉信陵鞭前原非窮鳥列士傳曰魏公子無忌方入有鳩飛入案下見一鷂在屋令縱鳩鷂逐而殺之公子為不食曰鳩避患歸無忌竟為鷂所得吾負之鄰國捕得鷂三百餘頭以奉公子一鷂獨低頭不敢仰視乃取殺之後漢書曰趙臺字元叔漢陽西縣人著窮鳥賦仰䝉經濟伏荷深慈謹啓又謝趙王賚息絲布啓本傳云子立嗣荀娘豈庾立小字耶荀一作茍某啓某息荀娘昨䝉恩引曲賜絲布等五段南冠獲宥既預禮延左傳南冠而縶又云羇旅之臣幸若獲宥稚子勝衣還䝉拜謁史記曰楚懐王穉子子蘭關尹津梁之織鄴地雙絲陸劌鄴中記曰鄴有大登髙小登髙錦有大光明錦小光明錦扶風采文之機仙園獨繭子虚賦云曳獨繭之榆枻青衿宜襲書生無廢學之詩毛萇曰青衿學子所服也春服既成童子得雩沂之舞出論語况復棲烏挾子同知桂樹之恩古樂府云烏生八九子端坐秦氏桂樹間澤雉將雛共喜行春之令後漢書曰魯恭為中牟令螟不入中牟袁安使肥親往㢘之隨行阡陌俱坐桑下有雉過其傍傍有童兒親曰捕之兒言雉方雛親以豎子有仁心根株一潤枝葉俱榮謹啓謝趙王賚白羅袍袴啓趙王所賚白羅袍袴皆冬時具也覽啓内便知某啓垂賚白羅袍袴一具按下文袍袴似著綿者爾雅袍襺也左傳重襺衣裘程據上表空論雉頭晉咸寧起居注曰太醫司馬程據上雉頭裘一領詔於殿前焚之王恭入雪虛稱鶴氅晉書曰王恭字孝伯恭美姿儀人多愛悦或目之云濯濯如春月栁被鶴氅裘涉雪而行孟昶窺見之嘆曰此真神仙中人也未有懸機巧緤變躡竒文鳯不去而恒飛花雖寒而不落謂羅上織成花鳳文也披千金之暫暖棄百結之長寒説苑曰千金之裘非一狐之皮也王隠晉書曰董威於市得碎繒輒以為衣號曰百結衣永無黃葛之嗟方見青綾之重吳越春秋云越王自吳還國苦身勞心懸膽於户出入嘗之曰吳王好服之離體使國中男女入山采葛作黃絲之布欲獻之吳王乃增之以封越國大悦采葛之婦傷越王用心之苦乃作何苦之詩漢武帝内傳曰王母二侍女年可十六七服青綾之袿對天山之積雪尚得開襟史記索隠曰祁連山一曰天山亦曰白山在張掖酒泉二郡界西河舊事曰白山冬夏有雪故曰白山匈奴謂之天山過之皆下馬焉去蒲類海百里之内後漢明帝紀注云天山即祁連山今名折羅漢山在伊州北冒廣樂之長風猶當揮汗列子曰鈞天廣樂此云廣樂疑作廣莫淮南子曰北方廣莫風江賦云長風颹以增扇廣莫䬅而氣整白龜報主終自無期幽明録曰晉咸康中豫州刺史毛寳戍邾城有一軍人於武昌市得一白龜長四五寸置甕中養之漸大放江中後邾城遭石氏敗赴江者莫不沈溺所養人被甲入水中覺如墮一石上須臾視之乃是先放白龜既得至岸廻顧而去亦見捜神後記黃雀謝恩竟知何日吳均續齊諧記曰𢎞農楊寳至華隂山見一黄雀傷瘢甚多寳懐之以歸置巾箱中啖以黃花積年乃去是, SBCK: ''}
