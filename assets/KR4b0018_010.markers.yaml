  - {type: variant, offset: 7332, length: 7291, content: 寳三更讀書有黃衣童子曰我王母使者昔使蓬萊為鴟梟所搏䝉君之仁愛見救今當受賜南海别以四玉環與之曰令君子孫潔白從登三公事如此環矣寳名位日隆子震震生秉秉生彪四世名公謝滕王賚巾啓奉教垂賜鹿子巾一枚解角新胎戴藤初孕交州記康頭山鹿額上戴科藤落星交映連珠疎點盤龍之刀既剪長命之縷仍縫盤龍謂剪刀之上刻為盤龍用以裁剪也長命謂巾縫以長命之縷也三輔黃圖曰戚夫人侍兒賈佩蘭説在宮時八月四日出雕房北户竹下圍棊勝者終年有福負者疾病取絲縷就北斗星辰求長命乃免翠羽懸推芙蓉髙讓廣州志云交趾蒼梧以翡翠為幘神仙服食經云漢武帝閒居未央殿有人駕白鹿冠芙蓉冠曰我中山衞叔卿也遊斯隠士足笑鼓皮鼓疑榖後漢周黨傳云榖皮綃頭注榖樹皮也入彼春林方誇笋籜漢書曰髙祖為亭長以竹皮為冠服䖍曰籜竹皮也師古曰竹皮笋皮謂笋上所解之籜也今人亦徃往為笋皮巾古之遺制也某蓬鬢鬆䬃衰容耆朽三秋不沐實荷今恩十年一冠彌欣此賚莊子曰曾子居衞十年不製衣正冠而纓絶謹啓謝明皇帝賜絲布等啓臣某啓奉勅垂賜雜色絲布綿絹等三十段銀錢二百文某比年以來殊有闕乏白社之内拂草看冰晉書曰董京常宿白社中時乞於市靈臺之中吹塵視甑三輔決録注曰第五頡字子陵為郡功曹位至諫議大夫洛陽無主人鄉里無田宅客止靈臺中或十日不炊後漢書范丹傳歌曰甑中生塵范史雲懟妻狠妾既嗟且憎瘠子羸孫虛恭實怨王人忽降大賚先臨天帝賜年無踰此樂仙童贈藥未均斯喜張袖而舞𤣥鶴欲來𤣥鶴注見齊王進蒼烏表及進象經賦表撫節而歌行雲幾斷博物志曰秦青撫節悲歌聲振林木響遏行雲所謂舟檝無岸海若為之反風漢書師古注曰檝所以刺船也莊子北海若曰天下之水莫大於海博物志云風山之首髙三百里風穴如電突深三十里春風自此而出也何以知還風也假令東風雲反從西來詵詵而疾此不旋踵立西風矣所以然者諸風皆從上而下或薄於雲雲行疾下雖有㣲風不能上上風來則反矣薺麥將枯山靈為之出雨淮南子曰隂生於午故五月為小刑薺麥亭歴枯又云薺冬生中夏死麥秋生夏死髙誘曰薺水也水王而生土王而死麥金也金王而生土王而死按薺麥枯於仲夏正梅雨時也况復全抽素繭雪板疑傾言其白也倂落青鳧銀山或動啓謝絲䓁當有錢矣青鳧注見上篇是知青牛道士更延將盡之命漢武帝内傳曰封君達隴西人初服黃連五十餘年入鳥舉山服水銀百餘年還鄉里如二十者常乘青牛故號青牛道士聞有病死者識與不識便以腰間竹管中藥與服或下鍼應手皆愈不以姓名語人間聞魯女生得五嶽圖連年請求女生未見授幷告節度二百餘歲乃入𤣥丘山去白鹿真人能生已枯之骨神仙傳曰中山衞叔卿常乘雲車駕白鹿見漢武帝帝將臣之叔卿不言而去武帝悔求其子度世令追其父度世登華山見父與數人博石上勅度世令還山古樂府云仙人騎白鹿髮短耳何長導我上太華攬芝獲赤幡來到主人門奉藥一玉箱主人服此藥身體日康彊髮白復更黒延年夀命長雖復拔山超海負徳未勝言恩徳甚重雖巨鼇不能負也漢書項羽曰力拔山兮氣葢世孟子曰挾泰山以超北海垂露懸針書恩不盡庾肩吾書品序流星疑燭垂露似珠參差倒薤既思種栁之謡長短懸針復想定情之製酉陽雜俎云百體中有垂露體懸針體言恩徳不勝書也蓬萊謝恩之雀白玉四環干寳捜神記曰漢時𢎞農楊寳年九歲時至華隂山北見一黃雀為鴟梟所搏墜於樹下為螻蟻所困寳見愍之取歸置巾箱中食以黄花百餘日毛羽成朝去暮來一夕三更寳讀書未臥有黃衣童子向寳再拜曰我西王母使者使蓬萊不慎為鴟梟所搏君仁愛見拯實感盛徳乃以白環四枚與寳曰令君子孫潔白位登三事當如此環漢水報徳之蛇明珠一寸干寳捜神記曰昔隨侯因使入齊路行漢水沙邊見一小蛇可長三尺於熱沙中宛轉頭上血出隨侯見而愍之下馬以鞭撥於水中語曰汝若是神龍之子當願擁護於我言訖而去至於齊國經二月還復經此道有小兒手把一明珠當道送與隨侯曰昔日深䝉救命甚重感恩聊以奉貺侯曰小兒之物詎可受之不顧而去至夜又夢小兒持珠與侯曰兒乃蛇也早蒙救䕶生全今日答恩不見垂納請受之無復疑侯驚異迨旦見一珠在牀頭乃收之而感曰傷蛇猶解知恩重報在人反不知恩乎侯歸持珠進納見述元由終身食禄耳左傳漢東之國隨為大故曰漢水某之觀此寧無愧心直以物受其生於天不謝謹啓謝趙王賚犀帶等啓奉教垂賚犀裝帶錢十貫魏君寶帶特賜劉楨典略曰文帝常賜劉楨廓落帶其後師死欲借取以為像因書嘲楨曰夫物因人為貴故在賤者之手不御至尊之側今雖取之勿嫌其不反也楨答曰楨聞荆山之璞曜元后之寳隨侯之珠獨衆士之好南垠之金登窈窕之首鼲貂之尾綴侍臣之幘此四寳者伏朽石之下潛汙泥之中而揚光千載之上發采疇昔之外亦皆未能初自接於至尊也夫尊者之服卑者所修也貴者所御賤者所先也故夏屋初成而大匠先立其下嘉禾始熟而農夫先嘗其粒恨楨所帶無他妙飾若實殊異尚可納也楨辭㫖妙巧類皆如是趙王國租偏資裴楷晉書曰裴楷字叔則梁趙二王國之近屬貴重當時楷歲請二國租錢百萬以散親族人或譏之楷曰損有餘以補不足天之道也貫藏文馬如燒安息之銀史記大宛傳曰安息在大月氐西可數千里以銀為錢錢如其王面王死輒更錢效王面焉漢書西域傳曰其錢獨文為人面幕為騎面又云以銀為錢獨為王面幕為夫人面王死輒更鑄錢韋昭曰幕錢背也荀悦曰幕音慢無文面也帶挿通犀似獵雲南之獸通犀通天犀也一名駭雞犀抱樸子曰通天犀有白理如綖者以盛米置羣雞中雞欲往啄米至輒驚走故南人名為駭雞異物志曰角中特有光耀白理如線自本達末則為通天犀後漢郡國志云邪龍雲南屬永昌郡北郭騷之長貧是所甘愜説苑曰北郭騷踵見晏子曰竊説先生之義願乞所以養母者晏子使人分倉廪府金而遺之辭金而受粟有間晏子見疑於景公出奔北郭子召其友而告之曰養及親者身更其難今晏子見疑吾將以身白之遂造公庭求復者曰晏子天下之賢者也今去齊國齊國必侵方必先國之侵也不若先死請絶頭以白晏子逡巡而退因自殺也公聞之乘馳而自追晏子及之國郊請而反之晏子聞北郭騷之死白已太息而嘆曰嬰不肖罪過固其所也而士以身明之哀哉南宮敬之載寳殊非念望檀弓曰南宮敬叔反必載寳而朝夫子曰若是其貨喪不如速貧之為愈也鄭注云敬叔魯孟僖子之子仲孫閲葢嘗失位去魯載其寳來朝於君按左傳孟僖子卒南宫敬叔師事仲尼北郭喻有母南宫喻父肩吾巳卒也言己受賜但如北郭之乞養不效南宫之重貨也花開四照惟見其榮山海經曰招揺之山有木焉其狀如榖而異理其花四照其名曰迷榖佩之不迷鼇戴三山深知其重列子夏革曰渤海之東有歸塘其中有五山焉帝命禺強使巨鼇十五舉首而戴五山峙而不動𤣥中記曰鼇巨龜也昔沈羲將盡逢司命而還生神仙傳曰沈羲者吳都人學道於蜀中但能消災治病救濟百姓不知服食藥物功徳感天天神識之羲與妻賈共載詣子婦卓孔寧家還逢白鹿車一乗青龍車一乘白虎車一乘從者皆數十騎皆朱衣仗矛帶劒輝赫滿道問羲曰君是沈羲否羲愕然不知何等答曰是也騎人曰羲有功於民心不㤀道自少小以來履行無過夀命不長年夀將盡黃老遣仙官來下迎之須臾有三仙人羽衣持節以白玉簡青玉介丹玉字授羲遂載羲昇天禮記曰王立七祀曰司命鄭注曰司命主督察三命文昌六星有司中司命春秋佐助期曰司命神名為滅黨長八尺小鼻望羊多髭癯瘦通於命運斯度士燮行埋值仙人而更活神仙傳曰士燮嘗病死已三日仙人董奉以一丸藥與服以水含之捧其頭揺之食頃即開目動手顔色漸復半日能起坐四日復能語遂復常奉字君異侯官人也今日慈矜斯之謂矣馬前驅而導路或似識恩晉元帝紀曰蕩隂之敗帝懼禍出奔成都王頴先令諸關無得出貴人帝既至河陽為津吏所止從者宋典後來以鞭策帝馬而笑曰舎長官禁貴人汝亦被拘耶吏乃聽過雞未曉而開關容能報主史記曰孟嘗君為秦所囚有能為狗盜者入宮取所獻狐白裘賂幸姬得出夜半至函谷關秦昭王後悔出孟嘗君即使人馳傳逐之孟嘗君至關關法雞鳴而出客孟嘗君恐追至客之居下坐者有能為雞鳴而雞盡鳴遂發傳出食頃秦追果至關已後孟嘗君出乃還謹啓謝趙王賚米啓某啓奉教垂賚米十石丹烏銜穟既集西周尚書中候曰有火自天止於王屋流為赤烏以榖俱來師古漢書注謂武王伐紂師渡孟津之時也黃雀隨車還飛東市神仙傳曰成武丁聞羣雀鳴而笑曰市東車翻覆米羣雀相呼往食遣視之信然國策曰黃雀俯啄百粒漬而為種不無霜雪之情汜勝之書云取雪汁漬原蠶屎五六日和榖種之能禦旱故謂雪為五榖精也取以論兵即有山川之勢後漢書曰馬援於帝前聚米為山谷指畫形勢開示象軍所從道徑往來分析曲折昭然可曉某陋巷簞瓢櫛風沐雨論語云一簞食一瓢飲在陋巷鄭注曲禮云圓曰簞方曰笥淮南子曰禹沐浴霪雨櫛扶風髙誘曰禹勞力天下不避風雨以久雨為沐浴扶風疾風以疾風為梳㮰也剝榆皮於秋塞掘蟄鷰於寒山漢書注如淳曰長榆塞名王恢所謂樹榆以為塞者也師古曰在朔方衞青所云榆葉舊塞是也晉書曰郄鍳避難於魯國澤中掘野䑕蟄鷰以食之仰費國租遂開塵甑世説曰梁王趙王國之近屬貴重當時裴令公歲請二國租錢數百萬以䘏中表之貧者或譏之曰何以乞物行惠裴曰損有餘以補不足天之道也後漢書曰范冉結草室而居所止單陋有時絶粒窮居自若言貌無改閭里歌之曰甑中生塵范史雲釜中生魚范萊蕪范冉一作范丹非丹竈而流珠異荆臺而炊玉江淹别賦云守丹竈而不顧銑曰丹竈鍊丹竈也韓子曰卞和得璞玉於楚山之下按荆臺楚襄王雲夢之臺亦楚地也淮南子曰譬若鍾山之玉炊以罏炭三日三夜而色澤不變東方朔之奉米既息長饑漢書曰東方朔待詔公車奉禄薄未得省見久之朔紿朱儒曰上以若曹無益於縣官徒索衣食今欲盡殺若曹朱儒大恐有頃上過朱儒皆號頓上問何為對曰東方朔言上欲盡誅臣等上知朔多端召問朔何恐朱儒為對曰臣朔生亦言死亦言朱儒長三尺餘奉一囊粟錢二百四十臣朔長九尺亦奉一囊粟錢二百四十朱儒飽欲死臣朔饑欲死臣言可用幸異其禮不可用罷之無令但索長安米上因使待詔於金馬門西門豹之墾田方慚此賚史記西門豹為鄴令發民鑿十三渠灌田皆溉謝趙王賚乾魚啓某啓蒙賚乾魚十番醴水朝浮光疑朱鼈山海經曰珠蟞之魚其狀如肺而有目六足有珠郭云蟞音鼈呂氏春秋曰醴水之魚名曰朱鼈六足有珠百碧髙誘曰醴水在蒼梧環九疑之山其魚六足有珠如蛟皮也文鰩夜觸翼似青鸞山海經曰泰器之山觀水出焉西流注於流沙是多文鰩魚狀如鯉魚魚身而鳥翼蒼文而白首赤喙常行西海逰於東海以夜飛其音如鸞雞其味酸甘食之已狂見則天下大穰吳都賦云文鰩夜飛而觸綸况復洞庭鮮鮒溫湖美鯽晉太康地記曰武昌南湖通江夏有水冬則涸靡所産植陶太尉立塘以遏水常自不竭因取瑯邪郡隔湖菱魚以著湖菱甚甘美異於他湖所産鮒魚長三尺神異經曰東南海中有烜洲洲有溫湖鮒魚生焉其長八尺食之宜暑而避風寒廣雅曰鮒一名鰿今之鯽也波瀾成雨鱗甲防寒某本吳人常想江湖之味及其饑也惟資藜藿之餘左氏傳曰斬之蓬蒿藜藿而食之太史公自序曰藜藿之羮正義曰藜似藋而表赤藿豆葉也茲賚渥恩膏腴流竈不勞獅子之亭即勝雷池之長皆吳地按金陵西獅子山晉元帝渡江易名盧龍山郭璞江賦曰其旁則有雲夢雷池李善注云張勃吳録曰雷池在皖翻驚河伯獨不愛人莊子曰於是河伯忻然自喜音義曰河伯姓馮名夷一名冰夷一云姓呂名公子馮夷是公子之妻抱樸子曰馮夷華隂人以八月上庚日渡河溺死天帝署為河伯足笑任公終年垂釣莊子曰任公子為大釣巨綸五十犗以為餌蹲會稽投竿東海旦旦而釣期年不得魚巳而大魚食之憚赫千里謹啓謝滕王賚馬啓某啓奉教垂賚烏騮馬一匹栁谷未開翻逢紫鷰捜神記曰張掖之栁谷有開石焉其文有五馬象魏晉代之興也西京雜記曰文帝有紫鷰騮陵源猶遠忽見桃花陶潛桃花源記曰武陵人捕魚為業忽逢桃花林林盡水源便得一山山中人云先世避秦來此爾雅曰黃白雜毛駓郭璞注云即今之桃花馬也言馬名桃花即類武陵源矣流電爭光浮雲連影西京雜記曰文帝自代還有良馬九匹號為九逸一名浮雲一名赤電張敞畫眉之暇直走章臺漢書曰張敞為婦畫眉長安中傳張京兆眉嫵時罷朝會過走馬章臺街使御史驅自以便面拊馬王濟飲酒之歡長驅金埒世説曰王武子被責移第北邙時人多地貴濟好馬射買地作埒編錢匝地竟埒時號曰金埒謹啓謝滕王賚猪啓某啓奉教垂賚肥豕一腔朝野僉載云按後一腔東猪肉是猪稱腔白腹疑作頭見珍度遼東之水後漢書朱浮責彭寵書曰往時遼東有豕生子白頭異而獻之行至河東見羣豕皆白懐慙而還若以子之功論於朝廷則為遼東豕也赤欄為重對襄陽之城水經注曰沔氷又東逕豬蘭橋橋本名荻蘭橋橋之左右豐蒿荻於橋東劉季和大養豬襄陽太守曰此中豬屎臭可易名豬蘭橋百姓遂以為名矣忽降全恩謹充炮烙孫𢎞牧於淄水惟以求錢漢書曰公孫𢎞少時家貧牧豕海上年四十餘乃學春秋卜式養於上林豈知其味漢書曰卜式以田畜為事入山牧羊羊致千餘頭買田宅時漢方事匈奴式願輸家財半助邊上不報會渾邪等降縣官費衆倉府空無以盡贍式復持錢二十萬以給召拜為中郎初式不願為郎上曰吾有羊在上林欲令子牧之式既為郎布衣草蹻而牧羊歲餘羊肥息上過其羊所善之式曰非獨羊也治民亦猶是矣上竒其言歴位至御史大夫按卜式乃牧羊非牧豕也疑是梁鴻養於上林誤文也後漢書曰梁鴻受業太學家貧而尚介節學畢乃牧豕於上林苑中曾誤遺火延及他舎鴻乃尋訪燒者問所去失悉以豕償之其主猶以為少鴻曰無他財願以身居作主人許之因為執勤不懈朝夕鄰家耆老見鴻非恒人乃共責讓主人而稱鴻長者於是始敬異焉悉還其豕鴻不受而去歸鄉里矣謹啓謝趙王賚馬幷繖啓奉教垂賚紫騮馬幷銀釘乘具紫紬繖一張上天降雨特垂深澤若木流光偏蒙私照廻茲翠葢事重劉基之恩吳志曰劉繇長子基字敬輿權大暑時嘗於船中宴飲於船樓上値雷雨權以葢自覆又命覆基餘人不得也其見待如此降此青驪榮深李忠之賜後漢書曰李忠字仲都東萊黃人也與任光同奉世祖以為右大將軍封武固侯從攻下屬縣至苦陘世祖會諸將問所得財物惟忠獨無所掠世祖曰我欲特賜李忠諸卿得無望乎即以所乘大驪馬及繡被衣物賜之北部丹帷更須髙捲後漢書賈琮為冀州刺史車垂赤帷而行及至州自言曰刺史當遠視廣聽何反垂帷於車以自掩蔽乃命御者蹇去其帷西河竹馬即已郊迎後漢書曰郭伋治幷州童兒皆騎竹馬來迎在命之輕鴻毛浮於弱水司馬遷報任安書曰死有重於泰山或輕於鴻毛陽泉養性賦云况性命之幾㣲如鴻毛之漂輕𤣥中記曰天下之弱者有崑崙之弱水鴻毛不能勝也知恩之重鼇背負於靈山列仙傳曰巨鼇負蓬萊山而抃滄海之中𤣥中記曰鼇巨龜也况復驚鴻别水但見徘徊黃鶴去關惟知反顧棲戀之心事同於此洛神賦曰翩若驚鴻李陵贈蘇武詩曰黃鵠一遠别千里顧徘徊謝趙王賚雉啓夏翟秋飛江翬春澗禹貢曰羽畎夏翟孔傳曰夏翟翟雉名左氏傳曰五雉為五正杜注曰雉有五種西方曰鷷雉東方曰鶅雉南方曰翟雉北方曰鵗雉伊洛之南曰翬雉釋鳥云鸐山雞樊光曰其羽可持而舞毛詩曰右手秉翟郭璞云長尾者釋鳥又云伊洛而南素質五采皆備成章曰翬中牟縣之客遂得坐觀東觀漢紀曰魯恭為中牟令螟不入中牟河南尹袁安使仁恕掾肥親往㢘之恭随行阡陌俱坐桑下有雉過其旁旁有童兒親曰何不捕之兒言雉方雛親曰所以來者欲察君之化迹耳今蟲不犯境一異也化及鳥獸二異也豎子有仁心三異也具以狀白安賈大夫之妻巳應含笑左氏傳曰昔賈大夫惡娶妻三年不言不笑御以如臯射雉獲之其妻始笑而言仰費中廚來供下客曹子建詩云中廚辦豐膳山川道遠口腹知恩書為梁上黃侯世子與婦書北齊書曰蕭慤字仁祖梁上黃侯曄之子天保中入國武平太子洗馬慤工於詩詠曾秋夜賦詩云芙蓉露下落楊栁月中疎為知音所賞顔氏愛其蕭散宛然在目潁川荀仲舉瑯琊諸葛漠亦以為爾按此知慤亦善屬文者也昔陸機入洛有代彦先之詞何遜裁書有為衡山之札才子詞人自能揮翰而夫妻致詞間多代作此亦感其燕婉之情代傳别恨可以葛龔無去者也慤本梁朝宗室疑江陵陷後隨例入關若非隔絶即是俘虜此書摹暫離之狀寫永訣之情茹恨吞悲無所投訴殆亦江南賦中臨江愁思之類也昔仙人導引尚刻三秋干寳搜神記曰漢時有杜蘭香者自稱南康人氏以建業四年春數詣張傳傳年十七望見其車在門外婢通言阿母所生遣授配君可不敬從傳先名改碩碩呼女前視可十六七説事邈然久遠有婢子二人大者萱支小者松支鈿車青牛上飲食皆備作詩至其年八月旦復來作詩云云出薯􅀢子三枚大如雞子云食此令君不畏風波辟寒溫碩食二枚欲留不肯令碩食盡言本為君作妻情曠遠以年命未合其小乖大歲東方卯當還求君蘭香降時碩問禱祀何如香曰消魔自可愈疾淫祀無益香以藥為消魔按上黃侯書是夫妻離别之辭言杜蘭香下嫁張碩以八月旦至是仙人導引尚刻三秋之期也神女將梳疑作疏猶期九日干寳捜神記曰魏濟北從事掾弦超字義起以嘉平中夜獨坐宿夢有神女來從之自稱天上玉女東郡人姓成公字智瓊早失父母天帝哀其孤苦遣令下嫁從夫夢三四夕一旦顯然來遊自言年七十視之如十五六女車上有壺榼青白瑠璃五具飲啗竒異饌具醴酒與超共飲遂為夫婦經七八年父母與超娶婦之後分日而燕分夕而寢夜去晨來倐忽若飛惟超見之他人不見雖居闇室輒聞人聲常見踪跡然不覩其形後人怪問漏洩其事玉女遂求去云我神人也雖與君交不願人知而君性疎漏我今本來已露不復與君通積年交結恩義不輕一旦分别豈不愴恨贈詩一首把臂告辭涕泣流離肅然升車去若飛迅去後五年超奉使至洛到濟北魚山下陌上西行遥望曲道頭有一車馬似智瓊驅馳前至果是也遂披帷相見悲喜交切同乘至洛遂為室家克復舊好至太康中猶在但不日日往來每於三月三日五月五日七月七日九月九日旦十五日輒下往來經宿而去張茂先為之作神女賦言智瓊之踪跡將疏猶期九月九日可會也按智瓊與弦超刻期有三月三日五月五日七月七日九月九日及旦十五日此云九日特舉其大略也未有龍飛劒匣鶴别琴臺豫章記曰雷煥子爽為建安從事經淺瀨劒忽於腰中躍出入水乃變為龍見二龍相隨而逝焉按劒雖有終合之論然在豐城得劒之後孔章茂先各持其一亦似别離時也蔡邕琴操曰商陵牧子娶妻五年無子父兄欲為改娶牧子援琴鼓之歌别鶴以舒其憤懣故曰别鶴操嵇康琴賦云千里别鶴陶潛詩曰上絃驚别鶴下絃操孤鸞益州記曰司馬相如宅在州西笮橋北百步許李膺曰市橋西二百里得相如舊宅今梅安寺南有琴臺龍飛鶴别喻夫婦遠離也莫不銜怨而心悲聞猿而下淚宜都記曰猿鳴三聲淚沾裳已上言蘭香下嫁之日尚有三秋可期智瓊求去之後猶有九日可會未有分兩龍於劒匣别雙鶴於琴絃如今之悲淚也人非新市何處尋家别異邯鄲那應知路後漢書郡國志曰江夏郡南新市侯國有離鄉聚綠林史記秦本紀曰昭襄王八年使將竿戎攻楚取新市注云晉帝紀曰江夏有新市漢書張釋之傳曰上指視慎夫人新豐道曰此邯鄲道也張宴曰慎夫人邯鄲人也言不能相見也想鏡中看影當不含啼欄外將花居然俱笑范泰鸞鳥詩序曰昔罽賔王得鸞鳥懸鏡以照之鸞覩影而鳴一奮而絶言彷彿相見之時也分杯帳裏却扇牀前故是不思何時能憶儀禮昏禮云四爵合卺鄭注云卺破瓢也四爵兩卺凡六為夫婦各三酳一升曰爵世説曰溫嶠娶姑女既婚交禮女以手披紗扇撫掌大笑曰我嫌是老奴果如所疑何遜看新婦詩曰如何花燭夜輕扇掩紅粧後李商隠詩有代董秀才却扇成婚之夕遂以却扇為名有却扇詩催粧詩言昔成婚之時可足思憶也當學海神逐潮風而來往神異經曰西海水上有人乗白馬朱髪白衣𤣥冠從十二童子馳馬海上如飛如風名曰河伯使者或時上岸馬跡所及水至其處所之之國雨水滂沱暮則還河勿如織女待填河而相見淮南子曰烏鵲填河成橋而渡織女按海神織女二語似上黃世子夫婦南北隔絶之辭也庾子山集巻八, SBCK: ''}
