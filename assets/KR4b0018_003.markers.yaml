  - {type: variant, offset: 3, length: 43801, content: 集巻一周庾信撰錢唐倪璠纂註賦三月三日華林園馬射賦并序華林園起自魏明帝名芳林園齊王芳改為華林干寶晉紀泰始四年二月上幸芳林園與羣臣宴賦詩觀志應貞有晉武帝華林園集詩按周書明帝時㑹羣公及突厥使者於芳林園魏在鄴都晉在洛陽後周承其名或名華林或名芳林其為長安别舘洛下舊宫是所未詳又按本序暫離北闕聊宴西城賦云日下澤宫筵闌相圃悵徙蹕之留歡眷廻鑾之餘舞知華林園是長安城西别苑可以朝出暮歸者也幸華林園當是武帝事注見序文臣聞堯以仲春之月刻玉而遊河尚書中候曰帝堯即政七十載脩壇河洛仲月辛日禮備至於日稷榮光出河龍馬銜甲赤文緑色臨壇吐河論語考比讖曰仲尼云吾聞堯率舜等遊首山觀河渚乃有五老遊渚五老曰河圖將浮龍銜玉苞刻版題命可巻金泥玉檢封書成知我者重瞳黄姚視五老飛為流星上入昴舜以甲子之朝披圖而廵洛顧野王玉符瑞圖虞舜時黄龍洛水出詣舜鱗甲成字舜即位與三公臨觀黄龍五采負圖出舜前夏后瑶臺之上或御二龍易歸藏曰昔者夏后啟筮享神於晉之虛作為璿臺於水之陽瑤臺璿臺也山海經曰大樂之野夏后啓於此舞九代馬乗兩龍周王𤣥圃之前猶驂八駿穆天子傳舂山之澤清水出泉溫和無風飛鳥百獸之所聚先王所謂縣圃又曰天子之駿赤驥盗驪白義踰輪山子渠黄驊騮綠耳八駿之乘是也亦見列子郭璞紀年曰穆王十七年西征於崑崙見西王母淮南子曰昆侖去地一萬一千里上有曾城九重或上倍之是謂閬風或上倍之是謂𤣥圃我大周之創業也宇文氏國號曰周南正司天北正司地平九黎之亂定三危之罪楚語曰少昊氏之衰九黎亂徳人神雜擾不可方物顓頊受之乃命南正重司天以屬神火正黎司地以屬民使復舊常無相侵凟其後三苗復九黎之德堯復育重黎之後不忘者使復典之以至於夏商故重黎氏世序天地唐尚書云火當為北北隂位也尚書竄三苖於三危雲紀御官鳥司從職左傳郯子曰昔黄帝氏以雲紀故為雲師而雲名少皥摰之立也鳯凰適至故為鳥師而鳥名鳯鳥氏厯正也𤣥鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩司徒也鴡鳩司馬也鳲鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也皇王有秉厯之符𤣥珪有成功之瑞莊子廣成子謂黄帝曰得吾道者上為皇而下為王郭象注皇王殊迹隨世異名尚書曰禹鍚𤣥圭告厥成功豈直天地合德日月光華而已哉易曰夫大人者與天地合其徳日月合其明皇帝以上聖之姿膺下武之運皇帝謂周武帝也賦云嵗在昭陽蓋嵗陽為辛而不詳其嵗隂按子山入魏而後兩厯辛年武帝保定元年為辛巳天和六年為辛卯幸華林園馬射於史不載以意推之當為武帝也墨子曰上聖立於天子其次立於三公毛詩序曰下武嗣文也王元長曲水詩序皇帝體膺上聖運鍾下武通乾象之靈啓神明之徳夷典秩宗見之三禮䕫為樂正聞之九成尚書帝曰咨四岳有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗䕫命汝典樂教胄子又簫韶九成克巳備於禮容威風總於戎政左傳曰古也有志克已復禮仁也史記曰孔子陳爼豆設禮容加以卑宫菲食見論語皂帳綈衣賈誼治安策曰且帝之身自衣皁綈師古曰綈厚繒也百姓為心四海為念西郊不雨即動皇情東作未登彌廻天眷易云宻雲不雨自我西郊堯典平秩東作孔傳曰嵗起於東而始就耕謂之東作兵革無會非有待於丹烏尚書帝驗曰太子發渡河中流火流為烏其色赤又王子年拾遺記越王入呉國有丹烏夾王飛故句踐之霸也起望烏臺言丹烏之瑞也宫觀不移故無勞於白鷰王子年拾遺記魏禪晉之嵗北闕下有白光如鳥雀之狀時飛翔来去有司奏聞帝使羅之得一白鷰以為神物於是以金為樊置於宫中旬日不知所在論者云金徳之瑞昔師曠時有白鷰来巢撿瑞應圖果如所論白色叶於金徳師曠晉時人也古今之議相符焉銀瓮金船顧野王瑞應圖曰王者宴不及醉則銀甕出莊子音義甕烏送反同瓮禮運鄭注器謂若銀甕丹甑也瑞應圖曰王者徳盛則金人下乘金船遊王後池山車澤馬禮記山出器車禮斗威儀曰其政太平山車垂鉤孝經援神契曰徳至山陵則山出根車澤出神馬豈止竹葦兩草共垂甘露青赤三氣同為景星晉中興書曰甘露降耆老得敬則松柏受之尊賢容衆則竹葦受之史記天官書曰天精而見景星景星者徳星也其狀無常常出於有道之國精漢書作腥孟康曰腥精明也有赤方氣與青方氣相連赤方中有兩黄星青方中有一黄星凡三星共為景星也雕題鑿齒識海水而来王山海經雕題國在鬱水南又曰大荒之中有山名曰融天海水南入焉有人曰鑿齒羿與鑿齒戰於夀華之野羿射殺之羿持弓鑿齒持盾郭璞曰鑿齒亦人也齒如鑿長五六尺因以為名烏弋黄支驗東風而受吏漢書西域傳自玉門陽闗出南道厯鄯善而南行至烏弋山離南道極矣服䖍曰三十六國烏弋最在西地理志曰自天甘都盧國船行可二月餘有黄支國民俗略與珠厓相類其州廣大戸口多多異物自武帝以来有譯長屬黄門應劭曰黄支在曰南之南去京師三萬里顔延年曲水詩序云廻面受吏向曰謂受郡縣之化於時𤣥鳥司厯蒼龍御行左傳曰𤣥鳥氏司分者也正義曰說文云燕𤣥鳥也釋鳥云燕燕鳦郭璞曰詩云燕燕于飛一名𤣥鳥齊人呼鳦詩云天命𤣥鳥月令云𤣥鳥至之日是一名𤣥鳥也或單呼燕或重名燕燕異方語也此鳥以春分来秋分去故以名官使之主二分天官書曰東宫蒼龍文耀鉤曰東宫蒼帝其精為龍周禮馬八尺巳上為龍月令天子居青陽左个乘鸞路駕蒼龍羔獻冰開桐華萍生月令獻羔開冰在仲春之月又曰仲春之月桐始華淮南子曰季春之月桐始華萍始生詩義疏曰澹水上浮萍麤大者謂之蘋小者為萍季春始生可糝蒸為茹又可苦酒淹就酒也皇帝幸於華林之園玉衡正而泰階平閶闔開而勾陳轉尚書璿璣玉衡以齊七政漢書曰願陳泰階六符孟康曰泰階三階也應劭引黄帝泰階六符經曰泰階者天子之三階上階上星為男主下星為女主中階上星為諸侯三公下星為卿大夫下階上星為士下星為庶人三階平則隂陽和風雨時不平則稼穡不成冬雷夏霜天行暴令好興甲兵脩宫榭廣苑囿則上階為之坼也應劭曰閶闔天門也三輔黄圖宫之正門曰閶闔天文志曰鉤陳六星在紫宫中鉤陳口中一星曰天皇大帝其神曰耀廹寶主御神靈執萬神圖星經後句四星為四輔其句陳六星為六宫亦主六軍千乘雷動萬騎雲屯東都賦千乘雷動萬騎紛紜落花與芝蓋同飛楊栁共春旗一色張衡西京賦云芝蓋九葩春旗青旗也月令載青旂衣青衣服蒼玉淮南子云建青旗注熊虎曰旗言楊桞與春旗皆青色也乃命羣臣陳大射之禮周禮宗伯禮官曰大射王出入令奏王夏及射令奏騶虞釋云大射謂將祭祀擇士而射於西郊虞庠學中雖行祓禊之飲即同春蒐之儀風俗通曰周禮女巫掌祓除疾病禊者潔也於水上盥潔也已者祉也邪疾已去祈介祉也韓詩外傳鄭國上已於溱洧兩水上祓除不祥裴子野宋畧曰文帝元嘉十一年三月禊飲樂遊苑作詩詔顔延年作序蕭子顯齊書曰武帝永明九年三月三日幸芳林園禊飲朝臣勑王融為序文三月三日祓禊之飲舊有之矣今用馬射合古春蒐也周禮大司馬職中春教師旅遂以蒐田左氏傳曰春蒐夏苖秋獮冬狩杜預云蒐索擇取不孕者止立行宫裁舒帳殿天子行所在名曰行宫帳殿天子行幸所在以帳為殿也階無玉璧既異河間之碑户不金鋪殊非許昌之賦河間碑漢靈帝事藝文類聚載後漢張超靈帝河間舊廬碑云樹中天之雙闕崇冠山之華堂通樓間道丹階紫房金葱鬰律玉璧内璫許昌地名魚豢典略曰魏明帝將東廵恐夏熱故許昌作殿名曰景福既成命人賦之何晏賦云青瑣銀鋪是為閨闥注銀鋪以銀鋪首也長門賦云排玉户而撼金鋪洛陽宫殿簿曰許昌景福殿七間言此行宫帳殿不必有金玉之麗也洞庭既張承雲乃奏莊子黄帝張樂於洞庭之野淮南子有虞氏其樂咸池承雲九韶騶虞九節貍首七章騶虞樂章名在召南之卒章周禮射人職曰王射樂以騶虞九節諸侯射樂以貍首七章鄭司農曰騶虞聖獸也正繪五采之雲壺寜百福之酒禮記曰失諸正鵠鄭注畫布曰正棲皮曰鵠疏云正鵠皆鳥名也正音征繪畫文也考工記曰繪畫之事雜五色詩公尸来燕来寜爾酒既清公尸燕飲福祿来成又曰干祿百福壺盛酒器也唐弓九合冬幹春膠周禮唐弓以授學射者使者勞者又曰天子之弓合九而成規又弓人曰冬析幹則易春液角則合上云鹿膠青白馬膠赤白牛膠火赤䑕膠黒魚膠餌犀膠黄鄭注皆謂煑用其皮或用角夏箭三成青莖赤羽子虛賦曰右夏服之勁箭索隱曰按夏羿善射者又服箭之室故云夏服又夏后氏有良弓其矢亦良六韜曰陷堅陣攻强敵以大黄㕘連弩飛鳧電景矢自副注云電景青莖赤羽以鋼為首韓詩外傳曰赤羽如日於是選朱汗之馬校黄金之埒漢書武帝神馬出渥洼水中為太一歌云霑赤汗兮沫流赭應劭曰大宛馬汗血霑濡也世說王武子好馬買地作埒編錢匝地竟埒時人號曰黄金埒紅陽飛鵲紫鷰晨風皆良馬名張協七命曰駕紅陽之飛燕李善注或云駿馬圖有含陽即紅聲之悞銑曰紅陽人也有良馬名飛燕尸子曰我得而治民則馬有紫鷰蘭池西京雜記文帝有紫鷰騮等名劉劭趙都賦良馬則飛兔奚斯常驪紫鷰黄子曰駿馬有晨風黄鵠皆取鳥名馬言疾走若飛也晨風鷂屬唐成公之肅爽海西侯之千里左氏傳曰唐成公如楚有兩肅爽馬子常欲之弗與三年止之唐人竊馬而獻之子常子常歸唐侯賈逵云色如霜紈馬融說肅爽雁也其羽如練高首而脩頸馬似之天下希有故子常欲之爽音霜或作驌驦漢書上以李夫人兄李廣利為貳師將軍封海西侯又曰貳師將軍斬大宛王獲汗血馬應劭曰大宛舊有天馬種蹋石汗血號一日千里莫不飲羽銜竿吟猿落雁韓詩外傳楚熊渠子夜行見寢石以為伏虎彎弓而射之没金飲羽竿箭榦銜竿亦没矢也吟猿飬由基事落雁更嬴事皆言其善射也注詳見下文鐘鼓震地塵埃漲天酒以罍行餚由鼎進罍酒器詩曰我姑酌彼金罍毛傳金罍酒器也周禮王旦舉鼎十有二物皆有爼鄭注殺牲盛饌曰舉鼎十有二牢鼎九陪鼎三采則錦市俱移錢則銅山合徙益州記錦里在益州南筰橋東流江南岸以錦為市漢書文帝賜鄧通蜀道銅山得自鑄錢鄧氏錢布天下其富如此又呉王濞傳云呉有豫章郡銅山濞招致天下之亡命者益鑄錢有兩銅山故云合徙也西京雜記並載其事太史聴鼓而論功司馬張旃而賞獲周禮鼓人職云掌教六鼓之音聲以節音樂以和軍旅以正田役教為鼓而辨其聲用又司馬云中春教振旅司馬以旗致民平列陳如戰之陳辨鼓鐸鐲鐃之用爾雅因章曰旃郭璞曰以白練為旒因其文章不復畫之周禮云通帛為旃上則雲布雨施下則山藏海納上林賦云綠林流澤雲布雨施郭璞曰言徧山野也山藏海納即上林賦所謂江河為阹泰山為櫓者也師古曰因江河以遮禽登泰山而望獲言田獵之廣逺耳阹音袪實天下之至樂景福之歡欣者也詩曰君子萬年以介景福既若木將低金波欲上若木日也金波月也楚辭折若木以拂日漢書樂章云月穆穆以金波師古曰言月光穆穆若金之流波也天顧惟穆賔歌惟醉詩天子穆穆詩序既醉太平也醉酒飽徳人有士君子之行焉箋云旅酬下徧羣臣至於無算爵故云醉焉雖復暫離北闕聊宴西城按此知華林園是長安城西别舘也即同酆水之朝更是岐山之㑹左傳椒舉曰成有岐陽之㑹康有酆宫之朝杜預曰酆在始平鄠縣東有雲臺康王於是㑹諸侯周成王歸自奄大蒐於岐山之陽岐山在扶風美陽縣西北小臣不舉奉詔為文以管窺天以蠡酌海盛徳形容豈陳梗槩東方朔客難曰以管窺天以蠡測海注管竹管也蠡蚌蛤也東京賦曰其梗槩如此薛綜注梗槩不纖密言粗舉大綱也嵗次昭陽月在大梁史記厯書云昭陽作噩四年索隱曰昭陽辛也爾雅作重光作噩酉也辛酉嵗今云昭陽蓋辛年也而嵗支不詳爾雅曰大梁昴也西陸昴也昭四年左傳曰古者日在北陸而藏冰西陸朝覿而出之杜元凱以西陸為三月日在大梁之次漢書律厯志大梁初胃七度榖雨中昴八度清明終於畢十一度知大梁為三月也其日上巳其時少陽西京雜記三月上已張樂於流水上已即三月三日也漢書丙吉傳云方春少陽用事春史司職青祗效祥春史謂太史也青祗謂青帝也其神勾芒晉張協詩云春郊禮青祗徴萬騎於平樂開千門於建章西京賦大駕幸乎平樂之舘漢書曰建章宫度為千門萬户屬車釃酒複道焚香揚雄酒箴曰鴟夷滑稽腹大如壺盡日盛酒人復借酤常為國器載於屬車師古曰天子屬車常載酒食故有鴟夷也屬音之欲反小雅伐木云釃酒有藇毛傳云以筐曰釃正義曰釃酒者或用筐或用草於今猶然左傳曰爾貢苞茅不入無以縮酒是也漢書注云上下有道故曰複音復三輔舊事曰桂宫周廻四十里内有複道横度西至神明臺皇帝翊四校於仙園一作翊四圍於帝閑廻六龍於天苑上林賦云扈從横行出乎四校之中文穎曰凡五校今言四者一隨天子乘輿也一作帝閑者周禮校人云天子十有二閑馬六種楚辭曰維六龍於扶桑曹子建與呉質書曰抑六龍之首翰曰六龍日車也史記天官書參西有勾曲九星三處羅一曰天旗二曰天苑三曰九斿正義曰天苑十六星如環狀在畢南天子養禽獸之所稀暗則多死亡漢儀注太僕牧師諸苑三十六所師古曰養鳥獸通名為苑故謂牧馬處為苑對宣曲之平林望甘泉之長坂上林賦曰西馳宣曲三輔黄圖宣曲宫在昆明池西孝宣帝曉音律常於此度曲因以為名甘泉宫有長平坂司馬相如賦曰登陂陀之長坂兮華蓋平飛風烏細轉路直城遥林長騎逺崔豹古今注華蓋黄帝所作也與蚩尤戰於涿鹿之野常有五色雲氣金枝玉葉止於帝上有花葩之象故因而作華蓋也西京賦曰華蓋承辰天畢前驅注云華蓋星覆北斗王者法而作之晉天文志華蓋九星所以蔽覆帝座天子之華蓋象之郭延生述征記長安宫南靈臺有相風銅烏遇風乃動一曰長安靈臺上有相風銅烏千里風至此烏乃動帷宫宿設帳殿開筵旁臨細柳斜界宜年周禮為帷宫設旌門鄭注謂王行晝止有所展肆若食息張帷為宫則樹旌以表門王融曲水詩序緹帷宿置善曰周禮注云在旁曰帷在上曰幕帳殿注見前三輔黄圖細桞觀在長安西北三輔舊事漢文帝大將軍周亞夫軍於細桞今呼古檄是也上林賦云掩細桞郭璞曰細桞觀名在昆明池南宜年疑蘄年黄圖云蘄年宫在雍開鸛一作鶴列之陣靡魚鬚之旃左氏傳曰鄭翩願為其鸛其御願為其鵝杜注鸛鵝皆陣名一作鶴列莊子君必無盛鶴列於麗譙之間鶴列陳兵也子虛賦曰靡魚鬚之橈旃郭璞曰以魚鬚為旒旌通帛為旃也行漏抱刻前旌載鳶續漢書曰孔壺為漏浮箭為刻下漏數刻以考中星昏明星焉張衡漏水轉渾天儀制曰鑄金銅人為胥徒居壺之左右以左手抱箭右手指刻以别天時之早晚也禮記曰前有塵埃則載鳴鳶鳶䲭也言畫於旌旗之上以取象焉河湄薙草渭口澆泉爾雅曰水草交曰湄釋名曰湄眉也臨水如眉臨目也周禮有薙氏掌山澤芟除草菅鄭注掌殺草謂除道也渭口澆泉者言取渭水蕩滌也堋雲五色的暈重圓堋射埒也的暈謂射候之中如月暈也陽管既調春絃實撫律厯志竹曰管律有十二陽六為律隂六為吕絲曰絃總章協律成均樹羽三輔黄圖明堂之制舜曰總章薛綜曰舜明堂以草蓋之名曰總章魏志曰明帝立總章魏荀氏傳曰勗為光祿大夫公以魏杜䕫所定律品檢校大樂總章鼓吹八音與律吕吕向曰總章禮官也漢書李延年為協律都尉周禮大司樂掌成均之法以教建國之學校而合國之子弟焉詩曰崇牙樹羽翔鳯為林靈芝為圃白虎通云黄帝時鳯凰蔽日而至食常竹實棲常梧桐終身不去景福殿賦翔岐陽之鳴鳯水經注天目山上有霜木皆是數百年物謂之翔鳯林雖非其地翔鳯之名古有之矣漢書武帝紀甘泉宫芝九莖連葉作芝房歌草銜長帯桐垂細乳鳥囀歌来花濃雪聚三齊記曰鄭𤣥教授不期山山下生草大如䪥葉長一尺餘堅刃異常土人名曰康成書帯莊子桐乳致巢司馬彪曰桐子似乳著其葉而生其巢似箕鳥喜巢其中也鳥囀歌来花濃雪聚言遊此林圃啼鳥成歌落花如雪也玉律調鐘金錞節鼓玉律用玉琯吹之有十二律陽六黄鐘太簇姑洗蕤賔夷則無射隂六林鐘南吕應鐘大吕夾鐘中吕也孟康漢書注律得風氣而成聲風和乃律調也周禮鼓人職云以金錞和鼓以金鐲節鼓鄭注錞錞于也圜如雄頭大上小下樂作鳴之與鼓相和於是咀銜拉鐵逐日追風顔師古漢書注銜馬銜也說文馬勒口中銜行馬者咀含味也拾遺記周穆王八駿四超影逐日而行崔豹古今注始皇有馬名追風王融曲水詩序云逐景追風之騎逐日逐景也說文景日光也即俗影字并試長楸之埒俱下蘭池之宫曹植詩云走馬長楸間翰曰古人種楸於道故曰長楸三輔黄圖籣池宫始皇三十一年為㣲行咸陽與武士四人俱夜出逢盜蘭池渭城縣有蘭池宫又尸子云馬有蘭池之名矣鳴鞭則汗赭入埒則塵紅樂志霑赤汗兮沫流赭顔延年赭白馬賦膺門沫赭汗溝走血既觀賢於大射乃頒政於司弓毛萇詩傳曰射禮有三有大射有賔射有燕射正義曰大射者將祭擇士於射宫也周禮司弓矢掌六弓四弩八矢之法辨其名物而掌其守藏與其出入中春獻弓弩中秋獻矢箙及其頒之有王弧夾庾唐大六者矣變三驅而畫鹿登百尺而懸熊畫鹿麋侯也懸熊熊侯也周禮天官司裘職曰王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠繁弱振地鐵驪蹋空繁弱弓名左氏傳曰封父之繁弱王逸楚辭注曰純黒為驪吕氏春秋曰駕鐵驪穆天子傳八駿有盜驪郭注盜驪為馬細頸驪黒色也蹋空謂騰虛空而行也禮正六耦詩歌九節周禮射人職云王以六耦射三侯三獲三容樂以騶虞九節五正鄭注九節析羽九重設於長杠也言節者容侯道之數也樂記曰明乎其節之志不失其事則徳成而功立九節者九十弓大射禮曰大侯九十七札俱穿五豝同穴左氏傳曰養由基蹲甲而射之穿七札焉召南卒章云一發五豝毛傳豕牝曰豝弓如明月對堋馬似浮雲向埒劉熈釋名曰弦月半之名也其形一旁曲一旁直若張弓弛弦也西京雜記曰文帝自代還有良馬九匹一名浮雲雁失羣而行斷猿求林而路絶戰國策更嬴與魏王處京臺之下更嬴謂魏王曰臣能虛發而下鳥魏王曰然則射可至此乎更嬴曰可有鴻雁從東方来更嬴以虛弓發而下之王曰射之精可至此乎更嬴曰此孽也王曰先生何以知之對曰其飛徐者其創痛也悲鳴者久失羣也故創未發而驚心未忘聞弦音烈而高飛故創怯也淮南子曰楚有白猿王自射之則搏矢而顧使養由基射之始調弓矯矢未發而猿抱樹號矣控玉勒而揺星跨金鞍而動月玉勒金鞍以金玉為之揺星挾矢也動月張弓也謂乘馬上而挾矢張弓也周禮考工記蓋弓二十有八以象星也又云弧旌枉矢以象弧也動月注見上文乃有六郡良家五陵豪選漢書曰漢興六郡良家子選給羽林期門師古曰六郡謂隴西天水安定北地上郡西河又高祖都長安徙諸齊田楚屈昭景及諸功臣於長陵後世世徙吏二千石高貲富人及豪傑兼并之家於諸陵强本弱末以制天下西都賦北眺五陵謂長安陽茂平此五陵也新廻馬邑之兵始罷龍城之戰漢書曰漢兵約單于入馬邑而縱兵單于不至遂絶和親自馬邑軍後五嵗之秋漢使四將各萬騎擊胡關市下將軍衛青出上谷至龍城龍城單于祭天處將軍戎服来叅武讌尚帶流星猶乘奔電將軍之稱起於左傳魏舒梗陽之獄閻没女寛曰豈將軍食之而有不足杜預曰魏子中軍帥故謂之將軍正義曰晉使卿為軍將謂之將中軍將上軍此以魏子將中軍故呼為將軍及六國以来遂以將軍為官名蓋其元起於此左傳鄭子産獻㨗於晉戎服將事杜元凱云戎服軍旅之衣異於朝服周禮司服云凡兵事韋弁服鄭注云韋弁以韎韋為弁又以為衣裳也武讌者謂射行燕禮也毛萇詩傳云有燕射之禮也流星奔電神駿也陳琳答東阿王牋曰譬猶飛兔流星超山越海龍驥所不能追崔豹古今注秦始皇有七名馬追風白兔躡景奔電飛翮銅爵神鳧始聽鼓而唱籌即移竿而標箭馬噴沾衣塵驚灑面石堰水而澆園花乘風而繞殿熊耳刻杯飛雲畫罍熊耳按禮器爵上有兩柱取飲不盡之義戒其過也言其競舉象兩熊耳也周禮鄭注山罍刻而畫之為山雲之形史記梁孝王有罍樽直千金鄭徳曰上蓋刻為雲雷象應劭曰詩云我姑酌彼金罍罍有雲雷之象以金飾之水衡之錢山積織室之錦霞開漢書宣帝紀本始二年以水衡為平陵徙民起第宅注云水衡與少府皆天子私藏也三輔黄圖織室在未央宫又有東西織室織作文繡郊廟之服有令史司筵賞至酒正杯来周禮春官宗伯云司几筵下士二人鄭注筵亦席也鋪陳曰筵藉之曰席又云掌五几五席之名物辨其用與其位釋曰大射席在虞庠又天官冢宰有酒正之官鄭注酒正酒官之長又曰酒正掌酒之政令以式法授酒材辨五齊之名三酒之物馬融廣成頌曰酒正按隊至樂則賢乎秋水歡笑則勝上春臺莊子有至樂篇秋水篇老子曰衆人熈熈如享太牢如登春臺秋興賦云登春臺之熈熈是也既而日下澤宫筵闌相圃毛詩疏射義曰天子將祭必先習射於澤宫澤者所以擇士也已射於澤宫然後於射宫射中者得與於祭不中者不得與是先王將祭必射以擇士也澤宫是習射射宫乃行大射云毛萇詩傳孔子射於矍相之圃觀者如堵牆悵徙蹕之留歡眷廻鑾之餘舞崔豹古今注警蹕所以戒行徒也周禮蹕而不警秦制出警入蹕謂出軍者皆警戒入國者皆蹕止也一曰蹕路也謂行者皆警於塗路也鑾鈴也楚辭鳴玉鑾之啾啾廻鑾謂駕旋也舞一作武欲使石梁銜箭銅山飲羽闞子曰宋景公使弓人為弓九年乃成公曰何其遲也弓人對曰臣不復見矣臣之精盡於此矣獻弓而歸三日而死景公登虎圏之臺援弓而射之矢踰於西霜之山集於彭城之東其餘力猶飲羽於石梁水經注泗水之上有石梁焉故曰吕梁昔宋景公以弓工之弓彎弧東射矢集彭城之東飲羽於石梁即斯梁也横弧於楚水之蛟飛鏃於呉亭之虎孔叢子曰楚王張繁弱之弓載忘歸之矢以射蛟於雲夢又漢書武帝南廵狩至於盛唐望祀虞舜於九疑登灊天柱山自尋陽江親射蛟中之亦楚地也呉亭即庱亭呉志建安二十三年孫權將如呉親乗馬射虎於庱亭馬為虎所傷權投以雙㦸虎却廢常從張世擊以戈獲之庱音攄陵反四子講徳論曰走箭飛鏃釋器云金鏃翦羽之鏃方言云關西曰箭江淮謂之鏃則鏃者䥫鏃之矢名也况復㳟已無為出論語南風在斯樂記云昔者舜作五絃之琴以歌南風非有心於蜓翼豈留情於㦸枝惟觀揖讓之禮蓋取威雄之儀尸子曰楚莊王命養由基射蜻蛉曰吾願生得之養由基援弓射之拂左翼爾雅曰虰蛵負勞郭云即蜻蛉也江東呼狐黎字林云一名桑根陶注本草云一名蜻蜓是也後漢書吕布傳曰袁術遣將紀靈等歩騎三萬以攻備備求救于布布率歩騎千餘徃趨之乃令軍侯植㦸于營門布彎弓顧曰諸君觀布射㦸小支中者當各解兵不中可留决鬭布即一發五中㦸支靈等皆驚言將軍天威也言志不在於技藝之末惟取揖讓威雄之禮儀耳小園賦小園賦者傷其屈體魏周願為隱居而不可得也其文既異潘岳之閒居亦非仲長之樂志以鄉關之思發為哀怨之辭者也若夫一枝之上巢父得安巢之所巢父山父也譙周古史考曰許由夏常居巢故一號巢父琴操曰許由夏則居巢冬則穴處饑則仍山而食渴則仍河而飲堯大其志禪為天子放髮優游可以安已不懼非以貪天下也莊子曰鷦鷯巢林不過一枝一壺之中壺公有容身之地神仙傳曰壺公常懸一壺空屋上日入之後公跳入壺中人莫能見惟費長房樓上見之知非凡人也賦之發端言一枝一巢猶可棲遲遊息已本長安羈旅之人結廬容身而已不必有高堂邃宇也况乎管寜藜牀雖穿而可坐髙士傳曰管寜字幼安北海朱虛人常坐一木榻積五十年未常箕踞榻上當膝皆穿嵇康鍜竈既煗而堪眠文士傳曰嵇康性絶巧能鍜鐵家有盛桞樹激水以園之夏天甚清涼恒居其下傲戯乃身自鍜家雖貧有人說鍜者康不受直惟親舊以雞酒徃與啖清談而已豈必連闥洞房南陽樊重之第後漢書曰樊宏南陽湖人父重其所起廬舎皆有重堂髙閣陂池灌注西都賦門闥洞開說文闥門也薛綜西京賦注宫門小者曰闥枚乘七發云洞房清宫連闥謂門闥相連屬也洞通也謂相當也綠墀青瑣西漢王根之宅漢書元后傳曲陽侯王根驕奢僣上赤墀青瑣孟康曰以青畫戸邊鏤中天子制也師古曰青瑣刻為連環文而青塗之也說文墀涂地也禮天子赤墀余有數畝敝廬寂寞人外聊以擬伏臘聊以避風霜雖復晏嬰近市不求朝夕之利左傳昭三年曰景公欲更晏子之宅曰子之宅近市湫溢囂塵不可以居請更諸爽塏者辭曰君之先臣容焉臣不足以嗣之於臣侈矣且小人近市朝夕得所求小人之利也潘岳面城且適閒居之樂晉書潘岳作閒居之賦以歌事遂情焉其辭曰退而閒居於洛之埃賦又曰陪京泝伊面郊後市楊佺期洛陽記曰城南七里名曰洛水是其居面城也况乃黄鶴戒露非有意於輪軒左傳閔二年曰衛懿公好鶴鶴有乗軒者周處風土記曰鳴鶴戒露爰居避風本無情於鐘鼓左傳文二年曰臧文仲祀爰居魯語曰海鳥曰爰居止於魯東門之外三日命國人祭之展禽曰今茲海其有災乎夫廣川之鳥皆知避其災是嵗海多大風冬暖爾雅爰居一名雜縣郭注云漢元帝時有大鳥如馬駒時人謂之爰居樊光云似鳯凰江淹詩咸池饗爰居鐘鼓或愁辛言懿公好鶴故鶴有乗軒而黄鶴非有意於輪軒也臧文不知故祀爰居而爰居本無情於鐘鼓也以喻魏周强欲已仕而已本無情於祿仕也陸機則兄弟同居世說曰蔡司徒在洛見陸機兄弟住㕘佐廨中三間瓦屋士龍住東頭士衡住西頭士龍為人文弱可愛士衡長七尺餘作鐘言多慷慨韓康則舅甥不别晉書曰韓伯字康伯潁川長社人又殷浩傳浩甥韓伯浩素賞愛之隨至徙所經嵗還都浩送至渚側詠曹顔逺詩云富貴他人合貧賤親戚離因而泣下子山本呉人流寓長安引此二人皆羈旅之時也蝸角蚊睫又足相容者也莊子曰有國於蝸之左角曰觸氏有國於蝸之右角曰蠻氏相與争地而戰伏尸數萬逐北旬有五日而後反爾雅郭注云蝸牛音𤓰蝸角喻小也崔豹古今注蝸牛陵螺也形如螔蝓殻如小螺熱則自懸於葉下野人結圓舍如蝸牛之殻故曰蝸舎亦曰蝸牛之舍也山海經青要之山是多僕纍郭云僕纍蝸牛也晏子春秋東海有蟲巢於蚊睫飛乳去来而蚊不為驚臣嬰不知其名而東海漁者命曰焦冥以上似賦序至爾乃句始是賦然以古韻按之若夫以下疑用韻語蓋賦之發端非序文也今附讀於後所音徙班固西都賦云繚以周牆四百餘里離宫别館三十六所古無四聲徙與地第皆通韻矣眠疑作眂漢書敘傳云伯惶恐起眂事注眂古視字視亦今韻之上聲者也至西漢王根之宅句換韻下皆從之寂寞人外外魚厥切黄庭經云洞視得見無内外存漱五牙不饑渴與臘同韻風霜疑作風雪利力蘖切如厲之音烈矣樂讀如櫟楚辭棄彭咸之娯樂兮滅巧倕之繩墨至非有意於輪軒句換韻軒許斤切陸雲夏府君誄曰丘園靡滯鸞驥馮軒豈方伊類捉髮躬勤風防愔切楚辭曰上葳蕤而防露兮下泠泠而来風孰知其不合兮若松柏之苦心又曰乘鄂渚而反顧兮歎秋冬之緒風歩余馬兮山臯低余車兮芳林鐘鼓疑倒文鼓鐘小雅有鼔鐘之詩鐘鼓鼓鐘隨文上下鐘字如中之切為渚仍周易訟卦中與成同韻矣陸機至又足相容同前韻容音滛楚辭曰賢士窮而隱處兮亷方正而不容子胥諫而靡軀兮比干忠而剖心若云陸機則同居兄弟韓康則不别舅甥甥字亦同韻然古賦用韻或至數語一見今依文讀之至又足相容乃成音也凡者也等字皆助語之辭不在韻列如易象去也字詩去兮及之乎矣等字讀之成韻楚辭招䰟去些字大招去只字皆七言詩也或云五言始蘇李七言始魏帝豈知去此助語自三百篇俱備其體矣子山用古韻處見此賦數語及喜晴應詔勅自疏韻詩爾乃窟室徘徊聊同鑿坯左氏傳曰鄭伯有耆酒為窟室而夜飲酒擊鐘焉杜預曰窟室地室淮南子曰顔闔魯君欲相見而不肯使人以幣先馬鑿坯而遁之揚雄解嘲曰或鑿坯以遁言已縱酒昏酣脫落政事亦如隱士鑿坯而遁也桐間露落柳下風来世說云王㳟嘗行至京口射堂於是清露晨流新桐初引恭目之曰王大故自濯濯琴號珠柱書名玉杯琴有柱以珠為之江淹恨賦云横玉柱而霑軾吕延濟曰瑟有柱以玉為之知琴瑟皆有柱飾以珠玉矣漢書曰董仲舒說春秋事得失玉杯蕃露清明竹林之屬數十篇十餘萬言有棠梨而無館足酸棗而非臺漢書曰甘泉有封欒棠梨揚雄甘泉賦云度三巒兮偈棠梨翰曰度三巒山息棠梨舘也水經注曰酸棗縣城西有韓王望氣臺孫子荆故臺賦序曰酸棗寺門外夾道左右有两故臺訪之國老云韓王聴訟觀臺高一十五仞雖樓榭泯滅然廣基似於山嶽召公大賢猶舎甘棠區區小國而臺觀隆崇驕盈於世以鑒来今故作賦云蔑丘園之邐迤亞五嶽之嵯峨言壯觀也謂園中但有梨棗而無臺舘之麗矣猶得欹側八九丈縱横數十歩欹側不正貎小爾雅曰五尺謂之墨倍墨謂之丈孟康曰南北為縱東西為横小爾雅曰跬一舉足也倍跬謂之歩司馬法曰六尺為歩榆柳兩三行棃桃百餘樹爾雅云榆白枌郭注曰枌榆先生葉却著莢皮色白爾雅曰柳有檉旄楊三種說文云柳小楊也爾雅云棃山摛疏云在山曰摛人植之曰棃又桃有荆桃冬桃山桃之别言園中有此榆栁棃桃四種樹木也撥䝉宻兮見牕行欹斜兮得路范蔚宗樂遊應詔詩曰遵渚攀䝉宻蟬有翳兮不驚雉無羅兮何懼月令曰寒蟬鳴爾雅郭璞注云寒螿也方言云蟬楚謂之蜩宋衛謂之螗蜩陳鄭謂之蜋蜩秦晉謂之蟬海岱謂之䗁其小者謂之麥蜇有文者謂之螓爾雅云弊者翳郭注云樹䕃翳覆地者言蟬有樹翳弊故不驚也按爾雅釋雉有五曰翬鷂鶅鵗鷷左傳五雉是也又有鷮雉鴻雉鷩雉海雉翟雉雗雉鵫雉皆雉類也說文曰羅以絲罟鳥也髙誘曰羅鳥網也言雉無網罟可不懼也草樹混淆枝格相交言園中草樹隨其所長不加修葺也格音閣樹高長枝為格山為簣覆地有堂坳言園之極小任其自然而成山水也論語曰譬如為山未成一簣包咸曰簣土籠也莊子曰覆杯水於坳堂之上則芥為之舟置杯焉則膠水淺而舟大也崔云堂道謂之坳司馬云塗地令平支遁亦謂有坳垤形也坳於交反藏貍並窟乳鵲重巢顔師古急就篇注云貍一名豾江淮陳楚謂之為猍其子􅡐鵲者亦因聲以為名也其為鳥也知来作巢則避太嵗淮南子曰鳥鵲識嵗之多風去喬木而巢扶枝連珠細茵長柄寒匏謝萬春賦云草靡靡以成茵連珠細茵者言其草實可食厯厯如貫珠也又按茵席也或言細草連貫如珠若鋪茵席也世說曰陸士衡詣劉道真劉無他言惟問東呉有長柄壺蘆得種来不論語何宴注云匏瓠瓜也可以療饑可以棲遲高士傳四皓歌曰煜煜紫芝可以療饑詩曰衡門之下可以棲遲言已在小園並鳥獸以棲遲食草實以療饑無求於安飽也㩻區兮狹室穿漏兮茅茨簷直倚而妨㡌戸平行而礙眉言園小而處所亦極狹漏也妨㡌礙眉言其低也庾闡著狹室賦墨子曰堯舜茅茨不剪坐帳無鶴支牀有龜神仙傳曰介象字元則㑹稽人也呉王徴至武昌甚尊敬之稱為介君詔令立宅供帳皆是綺繡遺黄金千鎰從象學隱形之術後告言病帝以美梨一奩賜象象食之須臾便死帝埋𦵏之以日中死晡時已至建鄴所賜梨付苑吏種之吏後以表聞先主即發棺視之惟一符耳帝思之與立廟時時躬徃祭之常有白鶴来集座上遲廻復去坐帳無鶴者言已無仙術可歸建鄴也時梁都建鄴思歸故國矣抱朴子曰史記龜䇿傳云江淮間居人為兒時以龜支牀至後死家人移牀而龜猶生此亦不減五六十嵗也不飲不食如此之久而不死其與凡物不同亦逺矣亦復何疑於千嵗哉仙家象龜之息豈不有以乎支牀有龜者喻巳久住長安若龜支牀矣鳥多閒暇花隨四時心則歴陵枯木髮則睢陽亂絲厯陵地名漢屬豫章郡宋書五行志曰永嘉六年七月豫章郡有樟樹久枯是月忽更榮茂水經注曰豫章城之南門曰松陽門門内有樟樹高七丈五尺大二十五圍枝葉扶疎垂䕃數畆應劭漢官儀曰豫章郡樹生庭中故以名郡矣此樹嘗中枯逮晉永嘉中一旦更茂豐蔚如初咸以為中興之祥也按厯陵即禹貢敷淺原雖所屬逓遷是即豫章枯木矣又地理志曰梁國睢陽故宋國按墨翟宋人也吕氏春秋曰墨子見染素絲者而嘆故云睢陽亂絲言園中雖有花鳥可樂而已心灰如槁木髪白如亂絲也亂絲言蓬頭白髮其色若素絲也又按史記梁孝王築東苑廣㫿陽城七十里西京雜記曰梁孝王遊於忘憂之舘集諸遊士各使為賦枚乗柳賦云于嗟細柳流亂輕絲是亦睢陽亂絲然不如素絲之義兼類白髮也非夏日而可畏異秋天而可悲左傳云趙盾夏日之日也杜預曰夏日可畏宋玉曰悲哉秋之為氣也言心中惟有怖畏悲涼而已不復知有樂也一寸二寸之魚三竿兩竿之竹字林曰竿竹挺也雲氣䕃於叢蓍金精養於秋菊史記龜策傳曰聞蓍生滿百者其下必有神龜守之其上必有雲氣覆之傳曰天下和平王道得而蓍莖長丈其叢生滿百莖禮記曰季秋菊有黄華玉函方云甘菊九月上寅日採名曰金精棗酸梨酢桃榹李薁爾雅曰樲酸棗郭璞曰樹小實酢馬第伯封禪記曰酢梨酸棗爾雅曰榹桃山桃郭璞曰實如桃而小不解核疏云生山中者名榹桃謝靈運酬弟詩曰山榹發紅蕚薁山李也即詩所云唐棣草木疏曰粤李一名雀梅一名車下李所在山皆有其華或白或赤六月中熟大如李子可食落葉半牀狂花滿屋以上言園中草木繁茂也名為野人之家是謂愚公之谷後漢書曰桓帝延熹中幸竟陵過雲夢臨沔水百姓莫不覩者漢隂父老獨耕不輟尚書郎張温異之下道百歩自與言父老曰我野人耳不逹斯語劉向說苑曰齊桓公出獵逐鹿而走入山谷之中見一老公而問之是為何谷對曰愚公之谷桓公曰何故對曰以臣名之桓公曰今視公之儀狀非愚人也何以為公名對曰臣請陳之臣故畜㹀牛生子而大賣之而買駒少年曰牛不生馬遂持駒去傍鄰聞之以臣為愚故名此谷為愚公之谷言其如隱士之居也試偃息於茂林乃久羨於抽簪言已位望通顯實非其好有隱遁之志也以下皆言隱居之事潘岳秋興賦曰僕野人也偃息不過茅屋竹林之下論衡曰山種棗栗名曰茂林蘭亭記云茂林修竹鍾㑹遺榮賦曰散髮抽簪永縱一壑通俗文曰幘道曰簪雖有門而長閉實無水而恒沉陶潛歸去来辭曰門雖設而長關莊子曰與世違而心不屑與之俱是陸沉者也郭注云人中隱者譬無水而沉曰陸沉三春負耡相識五月披裘見㝷皇甫謐髙士傳曰林類者魏人也年且百嵗底春披裘拾遺穗於故畦並歌並進孔子適衞望之於野顧謂弟子曰彼叟可與言者子貢請行逆之隴端又曰披裘公者呉人也延陵季子出遊見道中有遺金顧披裘公曰取彼金投鎌公瞋目拂手而言曰何子處之高而視人之卑五月披裘而負薪豈取金者哉季子大驚既謝而問姓名公曰吾子皮相之士何足語姓名也問葛洪之藥性訪京房之卜林抱樸子自序曰抱樸子姓葛名洪字穉川丹陽句容人也終日黙然邦人咸稱為抱樸之士是以洪著書因自號焉其内篇言神仙方藥鬼悖變化養生延年禳邪却病之事屬道家其外篇言人間得失世事臧否屬儒家晉書葛洪傳曰洪師事南海太守上黨鮑𤣥𤣥亦内學逆占將来見洪深重之以女妻洪洪傅𤣥業兼綜練醫術有金匱藥方一百巻肘後要急方四巻漢書曰京房字君明東郡頓丘人也治易事梁人焦延夀其說長於災變分六十四卦更直日用事以風雨寒溫為候各有占驗房用之尤精草無忘憂之意花無長樂之心萱草一名紫萱又呼為忘憂草述異記曰呉中書生呼為療愁花嵇中散養生論云萱草忘憂崔豹古今注曰欲忘人之憂則贈之以丹棘丹棘一名忘憂草使人忘其憂也名醫别錄曰萱草今之鹿蔥傅咸紫華賦序曰紫華一名長樂花言已在長安既無求於當世又即境傷懷視園中花草皆含憂也鳥何事而逐酒魚何情而聽琴莊子曰昔者海鳥止於魯郊魯侯御而觴之廟鳥眩視悲憂不敢飲一杯三日而死韓詩外傳曰昔伯牙鼓琴而淵魚出聽喻已宜如飛鳥棲深林當若遊魚潛重淵今乃失其故性非所樂也加以寒暑異令乖違徳性言其憂勞成疾也以下皆言其寢疾之事崔駰以不樂損年呉質以長愁養病後漢書曰竇憲為車騎將軍辟崔駰為掾憲擅權驕恣駰數諫之及出擊匈奴道路愈多不法駰為主簿前後奏記數十指切長短憲不能容稍疎之因察駰髙第出為長岑長駰自以逺去不得意遂不之官卒於家魏略曰呉質字季重與徐幹等並見友於太子二十二年魏大疫諸人多死故太子與質書質報之曰質已四十二矣白髮生鬢所慮日深實不復若平日之時也但欲保身勅行不蹈有過之地以為知已之累耳遊宴之歡難可再遇盛年一過實不可追鎮宅神以薶石厭山精而照鏡淮南畢萬術曰埋石四隅家無鬼漢黄門令史游急就篇曰石敢當顔師古注曰敢當言所當無敵也按今俗居當衝道猶埋石書石敢當其遺意也薶即埋字抱樸子登渉篇曰萬物之老者其精能假託人形以眩惑人目而常試人惟不能於鏡中易其真形耳是以古之入山道士皆以明鏡九寸已上懸於背後則老魅不敢近人注見第三巻詩搜神後記曰王文獻曾令郭璞筮已一年吉凶璞曰當有小不吉利可取廣州二大甖盛水置牀張二角名曰鏡好以厭之至某時撒甖去水其災可消至日忘之㝷失銅鏡不知所在後撒去水乃見所失銅鏡在於甖中甖口數寸鏡大尺餘王公復令璞筮鏡甖之意璞云撒甖違期故至此妖邪魅所為無他故也使燒車轄而鏡立出山精亦邪魅也注見枯樹賦屢動莊舄之吟㡬行魏顆之命史記曰越人莊舄仕楚執珪有頃病楚王曰舄思越則越聲不思越則且楚聲徃聼之猶尚越聲也王仲宣登樓賦曰莊舄顯而越吟左氏傳曰魏武子有嬖妾武子有疾命顆曰必嫁是妾疾甚則曰必以殉及卒顆嫁之曰從其治命言已去梁即魏常思故國疾病至於昏亂也薄晩閒閨老幼相擕蓬頭王霸之子椎髻梁鴻之妻謂已老幼皆入長安也後漢書曰太原王霸少立高節光武時連徴不仕妻亦美志行同霸與同郡令狐子伯為友後子伯為楚相而其子為郡功曹子伯乃令子奉書於霸車馬服從雍容如也霸子時方耕於野聞賔至投耒而歸見令狐子怚怍不能仰視霸目之有愧容客去而久臥不起妻怪問其故曰吾與子伯素不相若向見其子容服甚光舉措有適而我兒曹蓬頭厯齒未知禮則見客有慙色父子深恩不覺自失耳妻曰君少修清節不顧榮祿今子伯之貴孰與君之髙奈何忘宿志而慙兒女子乎霸屈起而笑曰有是哉遂終身隱遁又曰梁鴻字伯鸞娶同縣孟氏女始以裝飾入門七日而鴻不答乃更為椎髻者布衣操作而前鴻大喜曰此眞梁鴻妻也按哀江南賦云提挈老幼關河累年又滕王逌序云信擕老入關蒸蒸色養及丁母憂杖而後起是子山有老母也又謝趙王賚絲布啓云某息荀娘昨䝉恩賜是子山有幼子也又報趙王惠酒詩云穉子還羞出驚妻倒閉門子山雖為羈旅老幼妻子並在於周矣燋麥兩甕寒菜一畦馬汧督誄曰㸑陳焦之麥劉熈孟子注曰今俗以五十畝為大畦風騷騷而樹急天慘慘而雲低後漢書張衡思𤣥賦曰寒風淒而未至兮拂穹岫之騷騷注云騷音脩王粲登樓賦曰天慘慘而無色聚空倉而雀噪驚懶婦而蟬嘶漢蘇伯玉妻盤中詩曰空倉鵲常苦饑崔豹古今注云蟋蟀一名吟蛩秋初生得寒則鳴一云齊南呼為懶婦宋均曰促織蟋蟀也立秋女功急故趣之詩疏絡緯鳴懶婦驚促織也驚懶婦者非蟬而云蟬嘶言促織之鳴類蟬嘶也且以此名蟲若懶婦魚矣昔草濫於吹噓藉文言之慶餘言已仕梁時也韓子曰齊宣王使人吹竽南郭處士請為王吹竽粟食與三百人等宣王死文王即位一一聽之處士乃逃或云韓昭侯嚴使一一聼之乃知濫也吹噓謂吹竽也易坤卦文言曰積善之家必有餘慶謂已仕梁承先世之徳也門有通徳家承一作藏賜書後漢書曰鄭𤣥字康成北海高密人國相孔融深敬於𤣥履屣造門告高密縣為𤣥特立一鄉曰鄭公鄉云昔東海于公僅有一節猶或誡鄉人侈其門閭矧鄭公之徳而無駟牡之路可廣門衢令容髙車號曰通徳門漢書叙傳曰班彪字叔皮與仲兄嗣共遊學家有賜書内足於財好古之士自遠方至父黨揚子雲以下莫不造門門有通徳者謂祖易為齊徵士若漢鄭公鄉矣家承賜書者按梁書文學傳云庾於陵字子介博學有才思有文集十巻弟肩吾八嵗能賦詩特為於陵所友愛又為東宫學士文集行於世於陵為肩吾仲兄若班嗣矣子山承之大庾小庾又若叔皮孟堅也或陪𤣥武之觀時㕘鳯凰之虛三輔舊事曰未央宫北有𤣥武闕三輔黄圖曰漢宫殿有鳯凰殿西京賦曰鳯凰鴛鸞也觀受釐於宣室賦長楊於直廬漢書曰文帝思賈誼徵之至入則上方受釐坐宣室上因感鬼神事而問鬼神之本蘇林曰宣室未央前正室也應劭曰釐祭餘肉也音僖揚雄作長楊賦三輔黄圖曰長楊宫在今盩厔縣東南三十里陸機洛陽記曰吾常怪謁帝承明廬問張公張公云魏明帝在建始殿朝㑹皆由承明門然直廬在承明門側漢書張宴注云直宿所止曰廬本傳云父肩吾為梁太子掌管記及信並為抄撰學士父子在東宫出入禁闥恩禮莫與比隆是其事也遂乃山崩川竭冰碎瓦裂大盜潛移長離永滅言梁武帝太清二年侯景之亂也史記周本紀云伯陽甫曰山崩川竭亡國之徵也後漢書光武讚曰炎政中微大盜移國注云大盜謂王莽簒位也西漢遭王莽之簒光武遷都洛陽建鄴遭侯景之亂元帝遷都江陵故云是矣摧直轡於三危碎平途於九折高誘曰三危西極山名漢書曰王陽為益州刺史行部至卭僰九折坂嘆曰奉先人遺體奈何數乗此險杜篤首陽山賦曰九坂萎㠑而多艱言其多危難也荆軻有寒水之悲蘇武有秋風之别言聘於西魏也史記曰荆軻入秦燕丹餞之易水髙漸擊筑歌曰風蕭蕭兮易水寒漢書曰蘇武字長卿以天漢元年使匈奴二十年不降還為典屬國喻已出聘魏國身留長安也關山則風月悽愴隴水則肝膓斷絶言在西魏時有鄉關之思也古樂府有關山月秦川記曰隴西郡隴山其上懸巖吐溜於中嶺泉渟因名萬石泉北人升此而歌有云隴頭流水鳴聲幽咽遥望秦川肝膓斷絶龜言此地之寒鶴訝今年之雪水經注引車頻秦書曰苻堅建元十二年高陸縣民穿井得龜大二尺六寸背文負八卦古字堅以石為池養之十六年而死取其骨以問吉凶名為客龜太卜佐高夢龜言我將歸江南不遇死於秦高於夢中自解曰龜三萬六千嵗而終終必亡國之徴也為謝𤣥破於淮肥自縊新城浮圖中秦祚因即淪矣子山引此謂已思歸江南不欲客死於秦也劉敬叔異苑曰晉太康二年冬大寒南州人見二白鶴語於橋下曰今茲寒不減堯崩年也於是飛去龜言此地之寒者言已時在西魏如客龜也鶴訝今年之雪者言元帝死若堯崩矣按江陵陷在冬十一月至十二月魏人戕帝故以寒雪為言百靈兮倏忽光華兮已晩言已壯年逄此喪亂光隂瞬息遂成暮齒傷其遂老於此也不雪雁門之踦先念鴻陸之逺山海經曰雁門之水出於雁門之山雁出其間漢書段㑹宗為都護谷永閔其老予書戒曰願吾子因循舊貫毋求竒功終更亟還亦足以復雁門之踦應劭曰踦隻也㑹宗從沛郡下為雁門又坐法免為踦隻不偶也踦音居宜反易漸卦九三爻辭曰鴻漸于陸夫征不復虞翻曰高平稱陸謂初已變坎水為平三動之坤故鴻漸于陸初已之正三動成震震為征為夫而體復象坎陽死坤中坎象不見故夫征不復也不雪雁門之踦者言已踦隻不偶也先念鴻陸之逺者言已逺征不復反也非淮海兮可變非金丹兮能轉國語趙簡子嘆曰雀入於海為蛤雉入於淮為蜃郭璞遊仙詩云淮海變微禽吾生獨不化抱樸子曰鄭君惟見授金丹之經又曰九轉内神鼎中金丹有一轉至九轉之法言國破家亡以致屈節非如淮海之内能變蜃蛤金丹之藥可轉烘爐葢傷之也不暴骨於龍門終低頭於馬坂三秦記曰龍門山在河東界禹鑿山斷門一里餘黄河自中流下兩岸不通車馬魚登者化為龍不登者㸃額暴腮而返又交州記曰有隄防龍門大魚登者化成龍不得過曝腮㸃額血流此水恒如丹池戰國策曰昔騏驥駕鹽車上呉坂遷延負轅而不敢進遭伯樂仰而鳴之知伯樂知已二語喻巳不能死節致罹此辱也諒天造兮昧昧嗟生民兮渾渾易曰天造草昧淮南子曰茫茫昧昧從天之道又曰渾渾沉沉孰知其前言天道昧昧不可問也竹杖賦竹杖賦者庾子山哀憤之所為作也桓宣武平荆州喻江陵之陷也楚丘先生信自謂也臺城陷後信奔江陵仕於元帝江陵楚地故號楚丘先生名父之子言父肩吾有盛名也雖有聞於十室幸無求於千里者信聘西魏身留長安故無逺求也寡人有銅鐶靈夀以下喻魏周逼已以仕也中國明於禮義闇於知人者言已無情於祿仕也世變市朝以下言身經亂離憂幹扶疎以下言悲憂易老予此衰矣雖然有以謂國破家亡之故伯玉何嗟丘明惟恥言不能死節身存名辱也九棘龎眉至或非乖理明已非周室親故不當蒙此恩禮也末復悲歌庾信之文可謂篇篇有哀矣桓宣武平荆州假設桓宣武以起賦端也宣武桓溫也桓溫别傳曰溫字元子譙國龍亢人漢五更桓榮後也父彜有識鍳溫少有豪邁風氣為溫嶠所知累遷琅邪内史進鎮西大將軍鎮西夏時逆􅨨未誅餘燼假息溫親勒部卒建旗致討清蕩伊洛展敬園陵薨諡宣武侯世說云桓征西治江陵城甚麗注引盛𢎞之荆州記曰荆州城臨江漢臨江王所治時梁元帝都江陵即荆州城也魏相安定公令于謹来伐遂陷江陵故假桓宣武平荆州為喻也溫别傳又曰溫以永和元年自徐州遷荆州刺史在州寛和百姓安之晉書桓𤣥書曰朕皇考宣武王聖徳高邈又案晉康帝建元十二年三月姚襄入於許昌太尉桓溫討平之徙其餘衆三千餘家於江漢之間執周成而歸是其事也外白有稱楚丘先生来詣門下劉向新序曰昔者楚丘先生行年七十披裘帶索徃見孟嘗君桓帝一作公曰按晉書桓溫廢主立威有不臣之跡至其子桓𤣥始簒位稱帝以喻周文帝宇文泰至其子閔帝始受魏禪時泰相魏為安定公江陵之伐皆由於泰子山本梁朝舊臣故深怪之不引眞人但取桓宣武為比直稱桓帝下曰寡人豈其紫色蛙聲耶可以觀文人之寓意矣名父之子流離江漢孤之責矣名父謂肩吾也侯景之亂子山奔江陵是為流離江漢也漢書蕭育傳曰大將軍王鳯以育名父子著材能除為功曹左傳哀六年楚昭王曰江漢濉漳楚之望也杜預曰四水在楚界及命引進乃曰噫子老矣鶴髮雞皮蓬頭厯齒鶴髮白髮也雞皮言其縐也莊子曰蓬頭突髩登徒子好色賦曰蓬頭攣耳齞脣厯齒說文曰厯猶疎也廼是江漢英靈衡荆杞梓尚書曰荆及衡陽惟荆州孔安國曰北據荆山南及衡山之陽也左氏傳曰如杞梓皮革自楚徃也雖有聞於十室幸無求於千里論語曰十室之邑必有忠信劉越石詩曰鄧生何感激千里來相求寡人有銅鐶靈夀銀角桃枝常璩華陽國志曰巴地竹木之璝者有桃枝靈壽左思三都賦曰靈壽桃枝劉逵注云靈壽木名也出涪陵縣桃枝竹屬也出墊江縣二者可以為杖爾雅曰桃枝四寸有節郭璞注曰今桃枝節間相去多四寸竹譜曰篔簹射箇箖箊桃枝魏書云武帝賜楊彪銀角桃枝一枚以章舊徳開木瓜而未落養蓮花而不萎干寶搜神記曰呉時有徐光者嘗行術於市里從人乞瓜其主勿與便從索瓣杖地種之俄而𤓰生蔓延生花成實乃取食之因賜觀者鬻者反視所出賣皆亡耗矣凡言水旱甚驗過大將軍孫綝門褰衣而趨左右唾踐或問其故答曰流血臭腥不可耐綝聞惡而殺之斬其首無血及綝廢幼帝更立景帝將拜陵上車有大風盪綝車車為之傾見光在松樹上拊掌指揮嗤笑之綝問侍從皆無見者俄而景帝誅綝按呉志綝廢亮立休懼因求出屯武昌休許焉武昌荆州地及下王敦皆在武昌故子山引之沈約宋書五行志曰王敦在武昌鈴下儀仗生華如蓮花狀五六日不萎落此木失其性而為變也干寶曰鈴閣尊嚴者之儀鈴下主威嚴之官今狂花生於枯木又在鈴閣之間言威儀之富榮華之盛皆如狂花之發不可久也其後終以逆命没又加戮是其應也一說此花孽也於周易為枯楊生華亦見干寶搜神記及晉書五行志詩曰無木不萎萎槁也江陵之伐由岳陽安定諸君信所不悅引此二語妖異之詞也迎仙客於錦市送游龍於葛陂言於蜀郡而得此杖也益州記曰錦里在益州南筰橋東流江南岸以錦為市後漢書費長房傳曰壺公與一竹杖曰騎此任所之則自至矣既至可以杖投葛陂中也長房乗杖須臾来歸自謂去家適經旬日而已十餘年矣即以杖投陂顧視則龍也家人謂其久死不信長房曰徃日所𦵏乃竹杖耳乃發冢剖棺杖猶存焉章懷太子注云陂在今新蔡北先生將以養老將以扶危學士年長者謂之先生先生笑而言曰中國明於禮義闇於知人心之憂矣中國謂國中也言君國中雖明禮義而不知人所以為憂也如葛覃之詩施於中谷毛傳以為谷中今反文葢微辭也心之憂矣出詩惟我生民雖復疎條勁柘促節貞筠杖端刻鳥角首圖麟豈能相予此疾將予此身說文曰柘桑也筠竹皮也後漢書曰仲秋案户比民年七十者授之以玉杖長尺端以鳩為飾鳩食不噎之鳥故取之一說漢高祖與項羽戰敗帝遁於澤中時鳩鳴其上追者以為必無人遂得脱及即位作鳩杖以扶老劉向别錄有麒麟角杖賦言人之生老病死皆有常數雖勁柘貞筠之材刻鳥圖麟之麗終不能延年却病是杖無所用也以喻高爵厚祿無所加於我矣若乃世變市朝年移陵谷猿吟鷹厲風霜慘黷楚漢争衡袁曹競逐獸食無草禽巢無木詩曰高岸為谷深谷為陵古出夏門行曰市朝人易千年墓平漢書項羽大破漢軍多殺士卒睢水為不流魏志官度之戰袁紹軍大潰餘衆偽降曹操盡坑之前後所殺八萬人喻魏師至人如鳥獸無所依也於時無懼而慄不寒而戰於時以下喻江陵之陷西魏將男女數萬口盡俘以歸也淮南子堯戒曰戰戰慄慄漢書魏勃退立股戰而栗師古曰戰懼之甚也胡馬哀吟羌笳悽囀親友離絶妻孥流轉玉闗寄書章臺留釧李陵書曰胡笳互動牧馬悲鳴吟嘯成羣胡馬哀吟羌笳悽囀者言逺適異國有别離之慘也親友離絶妻孥流轉者喻魏人分男女數萬口皆為奴婢獻俘長安也漢書地理志曰龍勒有玉門關後漢書班超疏曰但願生入玉門關晉記云王逹妻衛氏太安中為鮮卑所掠路由章武臺留一書并釵釧訪其家又陸機羽扇賦云昔楚襄王㑹於章臺之上言章華臺也史記秦王坐章臺漢書云張敞走馬章臺街秦地亦有章臺之名然無留釧知其謂章武臺也說文釧尺絹切臂環也寒關悽愴羈旅悲涼疎毛抵於矰繳脆骨被於風霜喻江陵之敗子山已留長安若失羣鳥也左氏傳曰羈旅之臣班固兩都賦曰撫罿鴻御矰繳周禮曰矰矢也鄭康成曰結繳於矢謂之矰矰高也說文曰繳生絲縷也聲之若切淮南子曰雁銜蘆而飛以避矰繳髮種種而愈落眉髟髟而競長言梁亡之後巳狼狽流離遂至衰老也左傳盧蒲嫳曰予髮如此種種予奚能為服䖍通俗文曰髮垂而髟潘岳賦曰斑髩髟以承弁兮說文曰髟長髮猋猋也髟所銜切又必周切眉髟髟者言眉之長垂如髮也是以憂幹扶疎悲條鬱結假竹之枝幹以明心七發曰中鬱結之輪菌根扶疎以分離説文扶疎四布也宿昔僛醜俄然耄一作耆耋淮南子曰視毛嬙西子猶䫏醜也高誘曰䫏頭也方相氏黄金四目衣赭稀世之䫏醜貎非生人也但其像耳目䫏醜言極醜也廣雅曰䫏醜也䫏音欺僛醜當作䫏醜說文僛醉舞貎禮記曰八十曰耄爾雅曰耋老也郭璞曰八十為耋劉熈釋名曰七十曰耄頭髮白髦髦然也八十曰耋耋鐵也皮膚變黑色如鐵也一作耆者周禮八十曰耆言其悲憂忽成醜老也變田鳯於承宫改陽文於鬷蔑三輔決録曰漢靈帝殿柱題堂堂乎張京兆田郎顔氏家訓引此云用論語題京兆人田鳯也後漢書曰承宫字少子瑯邢姑幕人也永平中拜博士遷左中郎將數納忠言朝臣憚其節名播匈奴時北單于遣使求得見宫顯宗勅自整飾宫對曰􅊂翟眩名非識實者也臣狀醜不可以示逺宜選有威容者帝以大鴻臚魏應代之淮南子曰不待脂粉芳澤而性可悦者西施陽文也高誘曰陽文古之好女許慎曰楚之好人也左氏傳曰鬷蔑惡杜預曰惡醜貌也言亂離改節悲憂易老如美貌化為醜人也阮嗣宗詠懷詩云也朝為媚少年夕暮成醜老即此意潘岳秋興嵇生倦游桓譚不樂呉質長愁並皆年華未暮容貎先秋潘岳秋興賦序曰於時秋也故秋興命篇春秋三十有二始見二毛感秋而興此賦也趙至與嵇蕃書曰去矣嵇生永離隔矣漢書曰長卿故倦游文穎曰倦疲也言疲厭游學也後漢書曰桓譚上疏言讖記之非帝省奏不説其狀有詔㑹議雲臺所處帝謂譚曰吾欲讖決之譚黙然良久曰臣不讀讖帝問其故譚復極言讖之非經帝大怒曰桓譚非聖無法將下斬之譚叩頭流血良久乃解出為六安郡丞意忽忽不樂道病卒魏志曰呉質字季重濟隂人以文才為文帝所善官至振威將軍質答魏太子牋云今質已四十二矣白髮生髩所慮日深實不復若平日之時也予此衰矣雖然有以非鬼非蜮乃心憂矣左傳醫和曰非鬼非食惑以喪志詩曰為鬼為蜮箋云蜮短狐干寶捜神記曰有物處於江中其名曰蜮一曰短狐能含沙射人所中者頭痛發熱劇者至死言已之衰老乃為故國非有所惑若其滛溺惑亂有如鬼蜮乃可憂也未見從心先求順耳見論語伯玉何嗟丘明惟恥莊子曰蘧伯玉行年五十而知四十九年之非行年六十而六十化論語曰左丘明恥之孔注曰左丘明魯太史按子山述懷詩云惟有丘明恥無復榮期樂丘明之恥豈匿怨而臣其人耶拉虎捭熊予猶穉童觀形察貎子實悲翁曹子建七啓曰批熊碎掌拉虎摧斑説文曰拉搦也聲盧合切捭撃也聲補買切穉幼禾也聲直利切言巳狀貌雖老搦虎撃熊尚如童穉之年喻已猶可有為憤辭也子貌雖少一老翁矣别有九棘龎眉三槐暮齒周官曰三槐三公位焉左九棘孤卿大夫位焉右九棘公侯伯子男位焉鄭司農曰槐之言懷也言懷来人於此欲與謀也樹棘以為位者取其赤心而外刺象以赤心而有刺也龎蒼雜色也漢武故事曰武帝輦郎署見顔駟龎眉皓髮孔光謝病袁逢致仕漢書曰孔光為太師稱病辭位太后詔賜太師靈壽杖黄門令為太師省中坐置几太師入省中用杖賜餐十七物然後歸老於第官屬按職如故後漢書曰袁逢字周陽以累世三公子寛厚篤信著稱於時後為司空卒於執金吾朝廷以逢嘗為三老特優禮之呉濞不朝楊彪喪子史記曰呉王濞髙帝兄劉仲之子也髙帝立為呉王稍失藩臣之禮稱疾不朝天子賜呉王几杖老不朝後漢書曰楊彪子脩字徳祖為曹操所殺操見彪問曰公何瘦之甚對曰愧無日磾先見之明猶懷老牛䑛犢之愛操為之改容魏書黄初二年公卿朝朔旦并引故漢太尉楊彪待以客禮賜延年杖及馮几謁請之日便使杖入明公此贈或非乖理言如孔光以下此四君者竹杖之贈或非乖禮喻魏與周不當以爵祿與已也按上文稱桓宣武為帝宣武自命孤寡而楚丘先生僅以明公稱之猶諸侯之禮矣先生乃歌曰秋藜促節白藋同心終堪荷篠自足驅禽一傳大夏空成鄧林左氏傳曰斬之蓬蒿藜藋而共處之說文曰藜草也聲郎實切戴凱之竹譜曰杞髮苦竹促節薄齒説文曰藋堇草也一曰拜啻藋聲徒弔切又竹譜曰篠出魯郡堪為笙也又曰細篠大簜書曰篠簜既敷鄭注篠箭也論語曰遇丈人以杖荷篠包曰篠竹器漢書曰張騫使大夏見蜀布卭竹杖又律厯志曰黄帝使伶倫取竹於大夏之西山海經曰夸父與日逐走入日渴欲得飲飲於河渭河渭不足北飲大澤未至遂渴而死棄其杖化為鄧林言藜藋在野是其眞性且可用以荷篠驅禽若竹之製以為杖而死者過半即莊子義臺露寢之義喻已無羨於榮華而魏周强欲已仕哀其失故也卭竹杖賦寓意與竹杖賦同漢書曰張騫言使大夏時見蜀布卭竹杖問所從来曰從東来身毒國可數千里得蜀賈人市三輔黄圖曰天子遣使求身毒國市竹而為昆明所閉天子欲伐之乃作昆明池象之以習水戰即此竹矣劉逵蜀都賦注曰卭竹出興古盤江以南竹中實而髙節可以為杖戴凱之竹譜曰竹之堪杖莫尚於卭卭其恭切沉冥子遊於巴山之岑取竹於北隂沉冥若子虛之屬假立以為端也漢書曰蜀嚴沉冥久幽而不改其操孟康曰蜀郡嚴君平沉深𤣥黙無欲幽深難測也揚子曰蜀莊沉冥李軌注曰沉冥猶𤣥寂泯然無迹之貌卭竹出蜀巴蜀接境故云遊於巴山之岑爾雅曰山小而髙岑郭云言岑崟也吕氏春秋曰昔黄帝令伶倫作為律伶倫自大夏之西乃之阮隃之隂取竹於嶰谿之谷髙誘曰大夏西方之山阮隃山名山北曰隂㛹娟高節寂厯無心霜風色古露染斑深每與龍鍾之族幽翳沉沉㛹娟見楚辭江淹詩曰寂厯百草晦善云寂厯彫疎貌張衡南都賦其竹則籦籠䈽篾篾刀叶反䈽音謹廣韻曰龍鍾竹名世言龍鍾謂其年老如竹之枝葉揺拽不能自禁也文不自殊質而見賞蘊諸鳴鳯之律製以成龍之杖漢書律厯志曰黄帝制十二筩以聽鳯之鳴為十二律王子年拾遺記曰岑華山在西海上有象竹截為管吹之為翠鳯之鳴述異記作蔓竹神仙傳曰費長房以杖投葛陂中顧視則龍也又鄧徳明南康記曰南野縣有漢監匠陳鄰其人通靈夜嘗乘龍還家其妻懷身母疑與外人通密看乃知是鄰乘龍龍至家輒化青竹杖鄰内致户前母不知因將杖去須臾光采滿堂俄而飛失杖乃御雙鵠還又列仙傳曰呼子先者漢中闕下卜師也壽百餘年夜有仙人持二竹竿至呼子先騎之乃龍也上華隂山又神仙傳曰蘇仙公嘗持一竹杖時人謂曰蘇生竹杖固是龍也厯諦傳記竹杖之成龍者多矣拔條勁直璘斌色滋和輪人之不重待羽客以相貽甘泉賦曰馬犀之璘㻞注音斌埤蒼曰璘㻞文貌也晉灼曰㻞音豳向曰璘㻞寶物文采也說文曰滋益也聲子之切輪車輪說文曰車有輻曰輪輪人作車輪之人言扶杖則安歩當車矣非有車輪之重也羽客羽人也山海經有羽人之國不死之民言待此不死之民以相與也青春欲暮白雲来遲謀於長者操以從之執末而獻無因自持楚辭大招曰青春受謝白日昭只穆天子傳云西王母為天子謡曰白雲在天山䧙自出道里悠逺山川間之將子無死尚能復来禮記曰謀於長者必操几杖以從之鄭注云從猶就也言少年不可再得神仙亦復来遲於是謀於長者用操此杖矣執末而獻無因自持者禮記曰獻杖者執末疏云末拄頭地也拄地不浄不可嚮人故執以自嚮持淨頭以授與人也諸蔗雖甘不可以倚嵇含草木狀曰諸蔗一曰甘蔗按諸蔗對下彼藜知蔗之種類不一故云諸蔗若諸葛矣崔瑗杖銘曰諸蔗雖甘猶不可杖曹植矯志賦曰諸蔗雖甘杖之必折言諸蔗類竹味雖甘而脆不可倚以為杖也彼藜雖實不可以美莊子曰子貢見原憲原憲杖藜應門言藜雖實可以為杖而非美物也未若處不材之間當有用之始莊子曰莊子行於山中見大木枝葉繁茂伐木者止其旁而不顧也莊子曰此木以不材得終其天年舍於故人之家故人喜命豎子殺雁而烹之殺不能鳴者明日弟子問於莊子曰昨日山中之木以不材得終其天年今主人之雁以不材死先生將何處莊子笑曰周將處夫材與不材之間吕氏春秋曰聖人之於物也無不材孔子以六尺之杖論貴賤之等辨親疎之義高誘注曰材用也又莊子云惠子謂莊子曰言無用莊子曰言無用而始可與言用矣夫地非不廣且大也且人之所用容足耳然側足而墊之致黄泉人尚有用乎惠子曰無用莊子曰然則無用之之為用也明矣魯分以爵漢錫以年昔尚爾齒今優我賢禮記曰大夫七十而致事若不得謝則必賜之几杖疏曰熊氏云既不聼致事則祭義云七十杖於朝是也聽致事則王制云七十杖於國八十杖於朝是也是杖亦分以爵當云周分以爵豈以周禮在魯而云魯分也與漢錫以年者若漢書文帝賜呉王濞几杖不朝元后賜孔光靈壽杖是也昔尚爾齒今優我賢者設為爾我之辭言昔日尚爾為貴今受此分爵錫年之異數當優我杖者為賢也書横几玉塵筵則函之以後拂之以前謂授几杖也周禮有司几筵之官鄭注云筵亦席也禮記曰席間函丈又云進几杖者拂之言書在几玉在筵而此杖與之不離前後也爾其摘芳林沼行樂軒除間尊卑之垂帨隨上下之遊紆説文曰平土有叢木曰林沼池也軒曲輈藩車除殿陛也禮記曰尊卑垂帨鄭注云帨佩巾也磬折則佩垂授受之儀一夫寄根江南淼淼幽潭傳節大夏悠悠廣野説文曰淼大水也字同渺楚辭曰便娟之修竹兮寄生乎江潭戴凱之竹譜曰葢竹生江南深谷中蜀都賦曰卭竹傳節於大夏之邑劉逵注云卭竹杖以節為竒故曰傳節也喻已昔本呉人今為羈旅猶竹杖之根寄江南節傳大夏也豈比夫接君堂上之履為君座右之銘而得與綺紳瑶珮出芳房於蕙庭史記曰平原君使人於春申君趙使欲夸楚為玳瑁簮刀劒室皆以珠飾之請春申君春申君客三千人其上客皆躡珠履使大慙後漢書曰崔瑗字子玉涿郡人也兄璋為人所殺瑗遂手刃其讐亡命䝉赦而出作銘自戒常置座右曰座右銘説文曰綺文繒也聲袪彼切論語孔注云紳大帶詩曰報之以瓊瑶毛傳曰瑶美玉説文曰瑶美石也珮佩玉也即毛傳所謂雜佩者珩璜琚瑀衝牙之類蕙芳草也蕙庭若蘭房矣子山本賦杖而引用好客報讐之事喻已不能如黄歇豪俠之舉珠履滿堂又不能如崔瑗報讐之後作銘自戒而悠悠無所用之僅如竹杖扶老而已意㫖深長假比發端以攄懷舊之蓄念非徒賦卭杖也枯樹賦枯樹賦者庾子山鄉關之思所為作也朝野僉載曰梁庾信從南朝初至北方文士多輕之信將枯樹賦以示之於後無敢言者時溫子昇作韓陵山寺碑信讀而寫其本南人問信曰北方文字何如信曰惟有韓陵山一片石堪共語薛道衡盧思道稍觧把筆自餘驢鳴狗吠聒耳而已枯樹賦有碑貞觀四年褚遂良所書也殷仲文一本有者字風流儒雅海内知名世一作代唐本異時移出為東陽太守常忽忽不樂顧庭槐而嘆曰此樹婆娑生意盡矣續晉陽秋曰殷仲文字仲文陳郡人祖融太常父康呉興太守仲文聞桓𤣥平京邑棄郡投焉𤣥甚悦之引為咨議㕘軍及簒位以佐命親貴桓𤣥敗先投義軍累遷侍中尚書以罪伏誅世説曰桓𤣥敗後殷仲文還為大司馬咨議意似二三非復徃日大司馬府㕔前有一老槐甚扶疎殷因月朔與衆在㕔視槐良久嘆曰槐樹婆娑無復生意殷仲文既素有名望自謂必當阿衡朝政忽出為東陽太守意甚不平及之郡至富陽慨然嘆曰當復出一孫伯符至如白鹿貞松青牛文梓十三州志曰燉煌有白鹿塞地多古松白鹿棲息其下因而得名燉煌郡蒼松縣漢武帝置南山有松干寶捜神記曰昔武王伐雍州大神樹將倒樹中流血變作一㹀牛走入豐水中故樹精百年化為青牛郭氏𤣥中記曰萬嵗樹精為青牛又曰秦文公造長安宫面四百里南至終南山山有梓樹大數百圍䕃宫中公惡而伐之連日不剋輒大風雨夜有鬼問梓樹樹曰豈奈吾何鬼曰若使三百人披頭以繩繞樹豈不敗汝樹黙然不應明日人言於秦王王依此言伐之有青牛逐之入灃州錄異傳曰秦文公伐雍州南山文梓木有青牛出走豐水矣根柢盤魄山崖表裏漢書鄒陽曰蟠木根柢蘇林曰柢音蔕張宴曰柢根下本也爾雅曰厓内為隩外為隈郭注云别厓表裏之名孫炎云内曲裏也外曲表也爾雅又曰涘為厓郭云謂水邊也厓與崖字同桂何事而銷亡桐何為而半死漢書曰武帝作賦悼李夫人其辭曰秋氣潛以淒淚兮桂枝落而銷亡枚乘七發曰龍門之桐髙百尺而無枝其樹半死半生昔之三河徙植一作殖九畹移根南史宋武帝紀曰漢光武社於南陽漢末而其樹死劉備有蜀乃應之而興及晉季年舊根始萌至是而盛矣漢書曰髙祖委發關中兵收三河士韋昭曰河東河南河内也史記曰唐人都河東殷人都河内周人都河南夫三河在天下之中按光武都洛在河南劉備都蜀劉裕都建康國號曰宋皆社樹之應是其三河徙植之事矣後漢書西𦍑傳曰爰劒亡入三河間注云今比言三河即黄河賜支河湟河也亦稱三河與此為異也楚辭曰余既滋蘭之九畹王逸曰十二畝為畹或曰田之長為畹也開花建始之殿落實睢陽之園魏志曰建安二十五年正月曹公在洛陽起建始殿後漢書郡國志梁國有睢陽縣地道記曰梁孝王築城十二里小鼓唱節杵下而和之稱睢陽曲九域志曰睢陽郡有梁孝王東苑方三百里苑囿中有可室山雁池修竹園聲含嶰谷曲抱雲門漢書律厯志曰黄帝使伶倫自大夏之西昆侖之隂取竹之觧谷生其竅厚均者斷兩節而吹之以為黄鍾之宫制十二筩以聽鳯之鳴孟康曰觧脱也谷竹溝也取竹之脱無溝節者也一説昆侖之北谷名也晉灼曰谷名是也周禮曰大司樂雲門之舞鄭注云雲門黄帝樂言木中含抱律吕之音也觧音蟹字或作嶰將雛集鳯比翼巢鴛楚辭曰哀枯楊之寃雛王逸注曰生哺曰鷇生啄曰雛悲哀飛鳥生雛其身煩寃而不得出在於枯楊之樹居危殆也禮瑞命記曰黄帝時鳯蔽日而来止帝園食常竹實棲常梧桐終不去宋書樂志曰鳯將雛歌者舊曲也應璩百一詩云為作陌上桑反言鳯將雛然則鳯將雛其来久矣晉書樂志曰呉聲十曲有鳯將雛又歩出夏門古辭鳯凰鳴啾啾一母將九雛張正見置酒高殿上詩琴挑鳯將雛當是用相如鼓琴挑鳯兮鳯兮歸故鄉遨遊四海求其凰之義列異傳曰宋康王埋韓馮夫妻宿昔梓生有鴛鴦雌雄各一恒棲樹上音聲感人又玉臺新詠載廬江焦仲卿妻詩序云漢末建安中廬江府小史焦仲卿妻劉氏為仲卿母所逼自誓不嫁投水而死仲卿聞之自縊於庭樹兩家合𦵏華山傍詩曰東西植松柏左右植梧桐枝枝相覆葢葉葉相交通中有雙飛鳥自名為鴛鴦臨風亭一作庭而唳鶴對月峽而吟猿晉書陸機曰華亭鶴唳可得聞乎荆州記曰峽長七百里兩岸連山略無絶處重巖疊嶂隱天蔽日常有高猿長嘯屬引清逺漁者歌曰巴東三峽巫峽長猿鳴三聲淚沾裳郡國志巴郡枳縣注曰華陽國志云有明月峽是也廼有拳曲擁腫盤坳反覆莊子曰吾有樹人謂之樗其大本擁腫而不中繩墨其小枝拳曲而不中規矩說文曰坳地不平也从土幼聲於交切熊彪一作虎顧盼魚龍起伏節竪山連文横水蹙説文曰彪虎文論語云山節藻棁包咸曰節栭也刻鏤為山棁者梁上楹畫為藻文藻水草也説文曰蹙廹也聲子六切匠石驚視公輸眩目莊子曰匠石之齊見櫟社樹觀者如市匠石不顧司馬彪曰匠石字伯説墨子曰公輸般為雲梯禮記鄭注曰公輸若匠師也般若之於多技巧也趙岐孟子注曰公輸子魯班魯之巧人也雕鐫始就剞劂仍加平鱗鏟甲落角摧牙重重碎錦片片眞花紛披草樹散亂煙霞甘泉賦曰般倕棄其剞劂應劭曰剞曲刀也劂曲鑿也淮南子注曰剞劂曲刀也張揖廣雅曰陳寶孟勞馬氏曰楊剞劂劉刀也剞車竒反劂歸衛反剞又居綺反蒼頡篇曰鏟削平也言巧匠得此樹木窮致其功雕刻魚龍麒麟牙獸之狀錦花草樹煙霞之文極其眩爛也若夫松子古度平仲君遷左太沖呉都賦曰木則楓柙豫章松梓古度平仲君遷劉逵注云松梓二木名今云松子葢轉寫之誤或云松樹結實可食者也逵又云古度樹也不華而實子皆從皮中出大如安石榴正赤初時可煑食也廣州有之晉顧微廣州記曰熈安縣有孤古度樹生其號曰古度俗人無子於祠炙其乳則生男以金帛報之劉成曰平仲之木實白如銀君遷之樹子如瓠形森梢百頃槎枿千年王粲柳賦曰莖森梢以奮揚春秋傳曰山木不槎張衡東京賦曰山無槎枿薛綜注云斜斫曰槎斬而復生曰枿李廵曰枿槁木之餘也魏都賦曰林不槎枿吕良曰枿斬去木梢也森疏簮切音參梢所交切槎仕雅切又側下切枿五割切秦則大夫受職漢則將軍坐焉史記秦本紀曰始皇東封泰山風雨驟至避於松下因封為五大夫袁宏後漢紀曰馮異為人謙退不伐每軍行止舎諸將争功異常屏處大樹下軍中號為大樹將軍上常分諸營吏士問曰屬誰營耶皆曰願屬大樹將軍莫不苔埋菌壓鳥剝蟲穿或低垂於霜露或撼頓於風煙言已上諸樹為蟲鳥風霜所壞也師古曰苔水氣所生蘇林曰寄生者芝菌之類淋潦之日著樹而生形有周圜象說文曰菌地蕈也渠殞切東海有白木之廟西河有枯桑之社東海言東至於海也白木俗説密縣東三里天仙宫有白松相傳軒轅黄帝葬三女處於今猶存按漢書地理志膠東國下密有三石山祠豈其是耶西河言西至於河也河源出於崑崙在西則河之所經汎稱西河也干寶捜神記曰南頓張助於田中種木見李核欲持去顧見空桑中有土因植種以餘漿溉灌後人見桑中反復生李轉相告語有病目痛者息隂下言李君令我目愈謝以一豚目痛小疾亦行自愈衆犬吠聲盲者得視逺近翕赫其下車騎常數千百酒肉滂沱間一嵗後張助逺出來還見之驚云此有何神乃我所種耳因就斫之亦見風俗通蔡邕獨斷曰社者欲令萬民加肅敬也各以其野所宜之木以名其社及其野世說阮宣子曰社而為樹伐樹則社亡樹而為社伐樹則社移矣北陸以楊葉為關南陵以梅根作冶爾雅云髙平曰陸大阜曰陵北陸北方之地也楊葉為關未詳按爾雅楊蒲柳説文曰柳小楊也漢書地理志曰代郡高柳西部都尉治遼西郡柳城西部都尉治疑以木得名若榆中之關樹榆為塞矣榆中漢屬金城郡南陵宣城縣名鮑照詩云昨夜宿南陵今旦入蘆洲李善注稱宣城郡南陵縣矣平隋書地理志云宣城郡南陵梁置南陵郡又云宣城郡陳改為宣州楊炯李懷州墓誌銘序宣州刺史云呉土舊邑楚國先封江廻鵲尾之城山枕梅根之冶又孟浩然泊宣城界詩云火熾梅根冶煙迷楊葉洲是梅根作冶當在宣城矣言東南西北四方有廟社關冶以木得名者也小山則叢桂留人扶風則長松繫馬淮南王安招隱士序曰招隱士者淮南小山之所作也其詞曰桂樹叢生兮山之幽又云攀援桂枝兮聊淹留劉琨扶風行曰繫馬長松下發鞍髙岳頭豈獨城臨細柳之上塞落桃林之下漢書曰周亞夫屯細柳以備邊在長安城西左氏傳曰晉侯使詹嘉以守桃林之塞若乃山河阻絶飄零離别拔本垂淚傷根瀝血若乃以下喻已失國喪家流離異域猶木之拔本傷根也左氏傳曰拔本塞源淮南子曰秦擄趙王遷徙之漢中房陵思故鄉為山木之謳聞者莫不墮淚魏志曰曹公在洛陽起建始殿伐濯龍樹而血出又掘移梨根傷而血出曹公惡之遂寢疾是月薨又風俗通曰桂陽太守江夏張遼叔髙去􅋣令家居買田田中有大樹十餘圍扶疎葢數畝地播不生榖遣客伐之木中血出客驚白叔髙怒曰老樹汁出此何等血因自嚴行復斫之血大流灑有白頭公長可四五尺忽出徃赴叔髙髙逆格殺之凡殺四頭非人非獸遂伐其木其年應司空辟侍御史兖州刺史以二千石之尊過鄉里薦祝祖考白日繡衣榮羡安居均伐樹血出而禍福互異矣火入空心膏流斷節淮南畢萬術曰老槐生火膏流斷節者膏謂樹脂也老樹汁出若流膏矣説文曰膏肥也節竹約也横洞口而欹臥頓山腰而半折文斜者百圍冰碎理正者千㝷瓦裂一作文衰合體俱碎理正中心直裂載癭銜瘤藏穿抱穴木魅䁡睒一作睒曍一作睒䁑山精妖孽淮南子曰險阻之氣多癭南方草木狀曰五嶺之間多楓木焉久則生癭瘤養生論曰頸處險而癭李善注曰人居山險樹木瘤臨其上飲此水則患癭藏穿為蟲所穿抱穴為鳥所穴也蕪城賦曰木魅山説文曰魅老物精也莫愧切杜預曰魅怪物山海經曰山精如人面而有毛説文曰睒暫視貌聲失冉切睗目疾視也聲施隻切抱樸子曰山之精形如小兒而獨足向後喜来犯人其名曰蚑知而呼之即當自却一名超空亦可兼呼之又或如鼓赤色一足其名曰渾又或如人長九尺衣裘戴笠名曰金纍又或如龍五色赤角名曰飛龍見之皆可呼其名不敢為害山中大樹精名曰雲陽呼之則吉山中夜見火光枯木所作勿怪也又大蛇名升卿山中寅日自稱虞君者虎也稱當路君者狼也稱令長者老狸也卯日稱丈人者兔也稱東王父者麋也稱西王母者鹿也辰日稱雨師者龍也稱河伯者魚也稱無腸公子者蟹也已日稱寡人者社中蛇也稱時君者龜也午日稱三公者馬也稱仙人者老樹也未日稱主人者羊也稱吏者麞也申日稱人君者猴也稱九卿者猿也酉日稱將軍者雞也稱捕賊者雉也戍日稱人姓氏者犬也稱成陽君者狐也亥日稱婦人者金玉也稱神君者猪也子日稱社君者䑕也稱神人者伏翼也丑日稱書生者牛也但知其物名則不能為害也𤣥中記曰山精如人頭長三四尺食山蟹夜出晝藏左氏傳曰地反物為妖說文作􅀈云衣服歌謡草木之怪謂之妖孽説文作􅖈云禽獸蟲蝗之怪謂之􅖈况復風雲一作雷不感羇旅無歸言梁中興道銷已不能復歸也後漢二十八將論曰感㑹風雲奮其智勇左傳陳敬仲曰羇旅之臣未能採葛還成食薇詩王風有采葛之篇詩序曰采葛懼讒也鄭箋云采葛喻臣以小事使出史記曰武王已平殷亂天下宗周伯夷叔齊義不食周粟隱於首陽山採薇而食之歌曰登彼西山兮採其薇矣索隱曰薇蕨也爾雅云蕨鱉也陸璣毛詩草木疏云蕨山菜也莖葉皆似小豆蔓生其味亦如小豆藿可作羮亦可生食也本傳云聘於西魏遂留長安是以小事使出也哀江南賦云讓東海之濵遂餐周粟又詩何但食周薇皆引夷齊之事以自喻此言奉命出使不能為君効力屈節魏周也沉淪窮巷蕪没荆扉既傷揺落彌嗟變衰宋玉曰草木揺落而變衰喻已思念故國遂至衰老猶樹木之衰秋揺落枯朽時也淮南子云木葉落長年悲斯之謂矣淮南子云桑葉落而長年悲也淮南子者漢髙帝之孫劉安所作也西京雜記曰淮南王安著鴻烈二十一篇號為淮南子一曰劉安子自云字中皆挾風霜乃歌曰建章三月火黄河萬一作千里槎漢書曰武帝太初元年柏梁災起建章宫文穎曰越巫名勇謂帝曰越國有火災即復大起宫室以厭勝之故帝作建章宫按建章宫起在柏梁既災之後是柏梁災非建章災也此云建章三月火者當是赤眉焚西京宫室事後漢書建武二年曰赤眉焚西京宫室發掘園陵又董卓傳卓遷天子西都初長安遭赤眉之亂宫室營寺焚滅無餘是時惟有髙廟京兆府舍遂便時幸焉後移未央宫史傳既云焚滅無餘知建章宫亦被焚矣按漢書建章宫度為千門萬户以其宫室之崇麗者故稱引之云三月火者按史記項羽至咸陽燒秦宫室三月火不滅此言三月特稱其火之大也博物志曰有居海島者每年見浮槎徃来不失期遂賫糧乗槎而去至犯牛女星蜀郡嚴君平知之後知黄河與天漢通若非金谷滿園樹即是河陽一縣花晉書曰石崇有金谷園石季倫思歸引序曰河陽别業柏木㡬於萬株又晉書云潘岳為河陽令滿縣皆栽桃花言今日之煨燼漂流皆昔日之繁花密樹也桓大司馬聞而嘆曰昔年種柳依依漢南今看揺落悽愴江潭樹猶如此人何以堪桓大司馬桓溫也桓温别傳曰温字子元譙國龍亢人也興寜九年以溫克復舊京肅靜華夏進都督中外諸軍事侍中大司馬世説曰桓公北征經金城見前為琅邪時種柳皆巳十圍慨然嘆曰木猶如此人何以堪攀枝執條泫然流淚晉書曰桓溫自江陵北行經少時所種柳處皆十圍蹵然嘆曰木猶如此人何以堪按桓溫為桓𤣥之父仲文為東陽太守在桓𤣥既敗之後子山所賦皆發巳意假殷仲文以起賦端末引淮南王桓司馬以致一篇之意不必其同時也傷心賦并序傷心賦者雖傷弱子亦悼亡國也楚辭曰目極千里傷心悲魂兮歸来哀江南子山二賦取諸此焉予五福無徵三靈有譴尚書洪範云九曰嚮用五福孔傳曰言天所以嚮勸人用五福徵驗也又洪範云曰休徴孔傳云敘美行之驗也班固典引曰答三靈之繁祉注云三靈天地人也説文曰譴謫問也聲去戰切至於繼體多從夭折左傳成二年説鄭靈公早死云夭子蠻又昭十九年子産云札瘥夭昏是夭為少死也尚書六極一曰凶短折孔安國曰短未六十折未三十疏云鄭𤣥以為凶短折皆是夭枉之名未昏曰折漢書五行志云草木曰折一曰凶夭是也兄喪弟曰夭父喪子曰折並與孔不同夭於表反折時設反又之舌反二男一女並得勝衣金陵喪亂相守亡没金陵喪亂葢指太清二年侯景之亂也羇旅關河倏然白首謂留魏不歸也苗而不秀頻有所悲世説曰王戎子萬有大成之風苖而不秀一女成人一長一作外孫孩穉奄然𤣥壤何痛如之既傷即事追悼前亡既傷即事者傷其去梁即魏不能復歸也追悼前亡者傷今一女一孫并悼前金陵亡没之男女也惟覺傷心遂以傷心為賦若夫入室生光非復企及夾河為郡前途逾逺孝子傳曰後漢汝南應樞生四子見神光照社樞見光以問卜人卜人曰此天符也子孫其興乎乃探得黄金自是諸子宦學並有才名至瑒七世通顯漢書杜周傳曰始杜周為廷史有一馬及久任事列三公而兩子夾河為郡守家貲累巨萬矣婕妤有自傷之賦揚雄有哀祭之文漢書曰孝成班婕妤帝初即位選入後宫始為少使俄而大幸為婕妤居増成舍再就舘有男數日失之其後趙飛燕姊娣嬌妒婕妤退處深宫作賦自傷悼漢書曰揚雄字子雲蜀郡成都人也好詞賦常怪屈原文過相如至不容作離騷自投江而死悲其文讀之未甞不流涕也以為君子得時則大行不得時則龍蛇遇不遇命也何必沉身哉乃作書徃徃摭離騷而反之自岷山投諸江流以弔屈原名曰反離騷又旁離騷作重一篇名曰廣騷又旁惜誦以下至懷沙一巻名曰畔牢愁贊曰王莽簒位雄以耆老次轉為大夫雄恬於勢利欲求文章成名於後世作太𤣥法言又按雄子揚烏九齡而通𤣥文早卒法言所謂吾家童烏育而不苖者也注見下文王正長有北郭之悲謝安石有東山之恨臧榮緒晉書曰王讚字正長義烏人博學有俊才辟司空掾歴散騎侍郎有詩云朔風動秋草邊馬有歸心胡寜久分析靡靡忽至今王事離我心殊隔過商參又云人情懷舊鄉客鳥思故林又晉書曰謝安字安石始有東山之志後嚴命屢臻勢不獲已始就桓公司馬安雖受朝寄然東山之志始末不渝每形於言色有二子瑶琰瑶襲爵官至瑯邪王友早卒子該嗣終東陽太守無子斯既然矣言班揚王謝諸人或以失寵自傷或以不遇哀祭或在北郭而懷歸或處東山而被命又並有夭折之事若此者既為傷心矣至若曹子建王仲宣魏志曰陳思王植字子建善屬文封平原侯徙封臨菑侯貶爵安鄉侯改封鄄城侯立為王徙封雍丘浚儀改還雍丘徙封東阿封為陳王植每欲求别見獨談論及時政幸冀試用不能得既還悵然絶望又以前過事復減半十一年中而三徙都常汲汲無歡遂發疾薨時年四十一曹子建集中有金瓠哀辭其序云金瓠予之首女雖未能言固已授色知心矣生十九旬而夭折乃作此辭有行女哀辭其序云行女生於季秋而終於首夏三年之中二子頻喪又魏志曰王粲字仲宣山陽高平人也獻帝西遷徙居長安以西京擾亂之荆州依劉表表卒太祖辟為丞相掾賜爵關内侯拜侍中建安二十二年卒粲二子為魏諷所引誅後絶注云文章志曰太祖時征漢中聞粲子死歎曰孤若在不使仲宣無後按植與粲有贈答七哀詩謂痛而哀義而哀感而哀怨而哀耳目聞見而哀口歎而哀鼻酸而哀也又按王粲著傷夭賦曰惟皇天之賦命實浩蕩而不均或老終以長世或昏夭而夙冺物雖存而人亡心惆悵而長慕哀皇天之不惠抱此哀而何愬求魄神之形影差幽冥而弗迕淹伭徊以想像心彌結而紆縈晝忽忽其若昏夜炯炯而至明傅長虞應徳璉王隱晉書曰傅咸字長虞北地泥陽人也拜太子洗馬後為司𨽻校尉薨咸贈何邵王濟詩序云歴試無效且有家艱魏志曰汝南應瑒字徳璉太祖辟為丞相掾屬轉為平原侯庶子後為五官將文學瑒集有别詩二首云朝雲浮四海日暮歸故山行役懷舊土悲思不能言悠悠渉千里未知何時旋浩浩長流水九折東北流晨夜赴滄海海流亦何抽逺適萬里道歸來未有由臨河累太息五内懷傷憂劉韜之母任延之親晉劉韜母孫氏悼艱賦曰伊稟命之不辰遭天難之靡忱夙無父之何怙哀壅悴以抽心云云見藝文類聚後漢書曰任延字長孫南陽宛人也為九江太守産子者始知種姓咸曰使我有是子者任君也多名子為任按下文書翰傷切數語任延當作任咸潘岳集任澤蘭哀辭曰澤蘭者任子咸之女也渉三齡未没喪而殞遂為其母辭又寡婦賦云孤女藐焉始孩是也書翰傷切文辭哀痛千悲萬恨何可勝言言曹子建諸君並有悲怨之詞也龍門之桐其枝已折巻施之草其心實傷枚乗七發曰龍門之桐髙百尺而無枝爾雅曰巻施草拔心不死郭注云宿莽也離騷云夕搴中洲之宿莽王逸云草冬生不死者楚人名之曰宿莽嗚呼哀哉賦曰悲哉秋風揺落變衰宋玉九辨曰悲哉秋之為氣也蕭瑟兮草木揺落而變衰衰所追切魂兮逺矣何去何依宋玉招魂曰魂兮來歸去君之恒幹望思無望歸来不歸三輔黄圖曰武帝寤戾太子無辜被殺作思子宫為歸来望思之臺於湖漢書亦云顔師古注曰言已望而思之庶太子之魂歸来也其臺在今湖城縣之西閿鄉之東基址猶存招魂云魂兮歸来又云歸来歸来未逹東門之意空懼西河之譏列子曰魏有東門呉者子死而不憂人怪問之曰吾無子時不憂今子死乃與無子時同吾何憂也禮記曰子夏哭其子而喪明曾子弔之曰朋友喪明則哭之曾子哭子夏亦哭曰天乎予之無罪也曾子怒曰商汝何無罪也吾與汝事夫子於洙泗之間退而老於西河之上使西河之民疑汝於夫子爾罪一也喪爾親使民未有聞焉爾罪二也喪爾子喪爾明爾罪三也子夏投其杖而拜曰吾過矣吾過矣在昔金陵天下喪亂王室板蕩生民塗炭兄弟則五郡分張父子則三州離散梁書武帝紀曰太清二年冬十月已酉侯景自横江濟采石辛亥景師至京哀江南賦所謂戊辰之年建亥之月大盜移國金陵瓦觧者也郡國志曰丹陽郡秣陵其地本金陵秦始皇改建安十六年孫權改曰建業十七年城石頭建業梁之所都故云金陵詩大雅曰上帝板板下民卒癉毛云板反也癉病也言厲王為政反先王之道下人盡病也又蕩之什曰蕩蕩上帝下民之辟鄭箋云蕩蕩法度廢壞之貌塗炭見尚書應休璉與從弟書曰濟蒸人於塗炭吕向曰塗泥也炭猶火也言人如墜泥火欲濟之令出甚難也五郡兄弟三州父子俱詳見哀江南賦注地鼎沸於袁曹人豺狼於楚漢袁曹袁紹曹操也楚漢項藉漢髙帝也注見竹杖賦喻侯景作亂天下分爭生民荼毒有如袁曹官度楚漢鴻溝矣王子年拾遺記曰禹鑄九鼎當夏桀之時鼎水忽沸後漢書朱穆上書曰養魚於沸鼎之中漢書杜文謂孫寶曰豺狼當路孫楚為石仲容與孫皓書曰豺狼抗爪牙之毒吕延濟曰豺狼惡獸喻亂賊也以喻侯景矣或有擁樹罹災藏衣遭難或有以下言喪亂時男女亡没也史記夏侯嬰傳曰項羽大破漢軍漢王欲棄孝惠魯元嬰常收竟載之徐行面雍樹乃馳卒得脱而致孝恵魯元於豐蘇林曰南陽人謂抱小兒為雍樹面者大人以面首向臨之小兒抱大人頸似縣樹也漢書師古注曰面偕也雍抱持之言取兩兒令面背已而抱持之以馳故云面雍樹馳雍讀曰擁藏衣疑作載衣即斯干之詩所謂載衣之裳載衣之裼列女傳云魯孝義保孝公稱之保母伯御殺懿公自立求稱將殺之保乃衣其子以稱之衣卧於稱處伯御殺之保抱稱以逃史記程嬰取他兒負之衣以文葆匿山中皆似藏衣遭難也未設桑弧先空柘館禮記曰國君太子生三日卜士負之射人以桑弧蓬矢六射天地四方又見左傳漢書班婕妤賦曰痛陽禄與柘館兮仍襁褓而離災服䖍曰二舘名也生子此舘皆失之也師古曰二觀並在上林中人惟一丘亭遂千秋春秋説題辭曰丘者墓也廣雅云小陵曰丘潘岳傷弱子序曰三月壬寅弱子生五月之長安壬寅次於新安之千秋亭甲辰而弱子夭乙已𦵏於亭東西征賦亭有千秋之號子無七旬之期是也邊韶永恨孫楚長愁邊韶後漢時人永恨未詳疑指無子或喪子事後漢書曰邊韶字孝先陳留浚儀人也以文學知名教授數百人曾晝日假卧弟子私嘲之曰邊孝先腹便便懶讀書晝日眠韶應時對曰邊為姓孝為字腹便便五經笥但欲眠思經事寐與周公通夢静與孔子同意師而可嘲出何典記嘲者大慙後為陳相卒於官著詩頌碑銘書䇿凡十五篇晉書曰孫楚字子荆太原中都人也按孫楚有和氏外孫道生哀文又有和氏外孫小同哀文本賦序一作一外孫孩穉似引此又晉書云三子衆洵纂衆及洵俱未字而早終張壯武之心疾羊南城之淚流晉書曰張華字茂先范陽方城人也論前後忠勲進封壯武郡公為司空初華所封壯武郡有桑化為柏識者以為不祥又華舍及監省數有妖怪少子韙以中台星坼勸華遜位華不從曰天道𤣥遠惟脩徳以應之耳不如静以待之以應天命及趙王倫孫秀將廢賈后詐稱詔召華遂害之韙儒博曉天文散騎侍郎同時遇害云張壯武者稱其所封之郡名也壯武本漢宋昌所封史記云封宋昌為壯武侯是也晉以其地封張華矣括地志云壯武故城在萊州即墨縣西六十里古萊夷國有漢壯武縣故城晉書曰羊祜字叔子泰山南城人也位至公而無子幽明錄曰羊祜有一兒五六嵗端明可喜掘墓之後兒即亡晉書地理志云泰山郡有南武城祜封南城侯又南城人故曰羊南城稱其邑居也痛斯傳體尋茲世載天道斯慈人倫此愛膝下龍摧掌中珠碎芝在室而先枯蘭生庭而蚤刈爾雅郭注云芝一嵗三華瑞草晉書曰謝安甞戒約子姪曰子弟亦何豫人事而正欲使其佳𤣥答曰譬如芝蘭玉樹欲使其生於庭階耳左傳宣二年曰初鄭文公有賤妾曰燕姞夢天使與之蘭曰以是為而子既而文公見之與之蘭而御之辭曰妾不才幸而有子將不信敢徵蘭乎生穆公名之曰蘭及穆公有疾曰蘭死吾其死乎吾所以生也刈蘭而卒刈倪制切音藝割也命之脩短哀哉已滿脩短長短也潘岳西征賦曰生有脩短之命東征賦曰脩短之運愚智同班固覧海賦曰運之脩短不豫期也鶴聲孤絶猿吟腸斷崔豹古今注曰别鶴操商陵牧子所作也娶妻五年而無子父兄為之改娶妻聞之中夜起而悲嘯牧子聞之愴然而悲乃援琴歌之曰將乖比翼隔天端山川幽逺路漫漫攬衣不寐食忘餐世說曰桓公入蜀至三峽中部伍中有得猿子者其母緣岸哀號行百餘里不去遂跳上船至便即絶破視其腹中腸皆寸寸斷公聞之怒命黜其人嬴博之間路似新安漢書劉向曰延陵季子適齊而返其子死於嬴博之間穿不及泉歛以時服封墳掩坎其髙可隱而號曰骨肉復歸乎土魂氣則無不之也夫嬴博去呉千里季子不歸葬孔子徃觀之曰延陵季子於禮合矣事出禮記師古曰嬴博二邑在泰山潘岳西征賦曰夭赤子於新安坎路側而瘞之又傷弱子辭序曰予之長安次於新安千秋亭而弱子夭感嬴博之哀乃傷之藤緘轊櫝枿掩虞棺不封不樹惟棘惟欒魏志文帝紀曰其告郡國給槥櫝殯歛裴松之注云槥音衛漢書髙祖令曰士卒從軍死者為槥歸其縣應劭曰槥小棺也今謂之櫝應璩百一詩曰轊車在道路征夫不得休禮記曰周人以有虞氏之瓦棺葬無服之殤轊與槥古字通轊櫝小棺也虞棺瓦棺也藤緘枿掩謂為蔓草所縈掩以無梢之木也魏都賦曰林不槎枿薛綜曰斬而復生曰枿吕良曰枿斬去木梢也易曰古之葬者厚衣之以薪藏之中野不封不樹顔師古劉向傳注云不封謂不聚土為墳也不樹謂不種樹也爾雅曰終牛棘郭璞注云馬棘也其刺粗而長雍門周曰墳墓生荆棘欒盧官切音鸞木似蘭天慘慘而無色雲蒼蒼而正寒王仲宣登樓賦曰天慘慘而無色春秋文耀鉤曰楚有蒼雲如霓郭璞爾雅注曰天形穹隆其色蒼蒼况乃流寓秦川飄颻播遷况乃以下自序奉使西魏羇留長安也秦川西魏地也隴頭歌有遥望秦川之句趙至書曰飄颻逺遊之士從官非官歸田不田沈約和謝宣城詩曰從宦非宦侣官音宦左傳曰官三年矣亦讀為宦又如字世説曰劉尹之没孫興公為之誄曰居官無官之事作事無事之心張平子著歸田賦對玉關而羇旅坐長河而暮年漢書西域傳曰阸以玉門陽關後漢班超曰但願生入玉門關江淹别賦曰去復去兮長河湄已觸目於萬恨更傷心於九泉自言鄉關之思已屬萬恨更兼悼亡其心愈傷也晉書胡奮曰吾一女入於九天一子入於九地説文曰地有九重故曰九泉至如三虎二龍三珠兩鳯三輔決録曰賈彪兄弟三人並有高名彪最優故天下稱曰賈家三虎偉節最怒世説曰謝子微見許子將兄弟弱冠時則曰平輿之淵有二龍焉三珠未詳山海經三珠樹生赤水上北齊書崔陵侍中弟仲文銀青光祿大夫同日拜受時云兩鳯連飛並有山澤之靈各入熊羆之夢周易說卦曰山澤通氣詩曰吉夢維何維熊維羆維熊維羆男子之祥箋云熊羆在山陽之祥也故生男爾雅曰羆似熊而黄色望隴首而不歸出都門而長送辛氏三秦記曰隴西關其坂九廻不知髙㡬里欲上者七日乃越髙處可容百餘家下處數十萬户其上有淸水回注俗歌曰隴頭流水鳴聲幽咽遥望秦川肝腸斷絶去長安千里望秦川如帶關中人上隴者還望故鄉悲思而歌則有絶死者漢書曰上徵臨江王榮榮行祖於江陵北門上車軸折父老曰吾王不返矣按元帝時都江陵故臨江王所治都門長送當引此事二語謂已使西魏遂不復歸序所謂羇旅關河倏然白首者也此下言一女一孫奄然𤣥壤之事矣對寶盌而痛心撫𤣥經而流慟孔氏志怪曰盧充者范陽人家西三十里有崔少府墓充先冬至一日出家西獵見一麞舉弓而射即中之麞倒而復起充逐之不覺遠忽見一里門如府舍門中一鈴下有唱家前充問此何府也答曰少府府也充曰我衣惡唱得見貴人即有人提襆新衣迎之充著盡可體便進見少府展姓名酒炙數行崔曰近得尊府君書為君索小女婚故相延耳即舉書示充充父亡時雖小然已見父手迹便欷歔無辭崔即敕内令女郎莊嚴使充就東廊充至婦已下車立席頭共拜為夫婦三日畢還見崔崔曰君可歸矣女有娠相生男當以相還生女當留自養敕外嚴車送客崔送至門執手零涕離别之感無異生人復致衣一襲被褥一副充便上車去如電追須臾至家家人相見推問知崔是亡人而入其墓道以懊惋居四年三月三日臨水戲忽見一犢車乍浮乍没既上岸充徃開車後户見崔氏女與三嵗男兒共載充見之欣然欲捉其手女舉手指後車曰府君見人即見少府充徃問訊女抱兒還充又與金盌别并贈詩曰煌煌靈芝質光麗何猗猗華豔當時顯嘉異表神竒含英未及秀中夏罹霜萎榮曜長幽滅世路永無施不悟隂陽運哲人忽来儀㑹淺離别速皆由靈與祗何以贈予親金盌可頥兒愛恩從此别斷絶傷肝脾充取兒盌及詩忽不見二車處將兒還四坐謂是鬼魅僉遥唾之形如故問兒誰是汝父兒逕就充懷衆初怪惡傳省其詩慨然嘆死生之𤣥通也充詣市賣盌髙舉其價不欲速售冀有識者歘有一老婢問充得盌之由還報其大家即女姨也道視之果是謂充曰我姨姊崔少府女未嫁而亡家親痛之贈一金盌著棺中今視卿盌甚似得盌本末可得聞不充以事對即詣充家迎兒兒有崔氏狀又似充貌姨曰我舅甥三月末間産父曰春煙溫也願休强也即字溫休溫休葢幽婚也其兆先彰矣兒遂成為令器歴數郡二千石皆著績後生植為漢尚書植子毓為魏司空冠葢相承至今也亦見干寶捜神記桓譚新論曰揚雄作𤣥書以為𤣥者天也道也言聖賢制法作事皆引天道以為本統而因附續萬類王政人事法度攷宓羲氏謂之易老子謂之道孔子謂之元而揚雄謂之𤣥𤣥經三篇以紀天地人之道立三體有上中下如禹貢之陳三品三三而九因以九九八十一故為八十一卦以四為數數從一至四重累變易竟八十二而篇不可損益以三十五蓍揲之𤣥經五十餘言而傳十二篇也揚子法言曰育而不苖者其吾家之童烏乎九齡而予我以𤣥文石華空服犀角虛篸謝靈運詩曰揚帆采石華臨海志曰石華附石可啖郭璞曰犀頭似猪痺脚一角在頭也抱樸子曰通天犀能殺毒續齊諧記曰蔣潛至不期縣露一尸頭著通天犀纛風無少女草不宜男管輅别傳曰輅與倪清河相見既刻雨期至日向暮了無雲氣衆人並嗤輅輅言樹上已有少女微風樹間隂鳥和鳴又少男風起衆鳥和翔其應至矣須臾果有艮風鳥鳴風雲並興𤣥氣四合大雨河傾見魏志管輅傳裴松之注魏志云管輅字公明平原人也本草曰萱草亦名宜男周處風土記云婦妊佩此花則生男子烏毛徒覆獸乳空含師曠禽經曰慈烏反哺張華注慈烏曰孝烏長則反哺其母大嘴烏否蔡邕曰烏反哺之鳥至孝之應也春秋繁露曰羔飲其母必跪類知禮者公羊傳何休注云乳必跪而受之震為長男之宫巽為長女之位在我生年先凋此地周易説卦曰震一索而得男故謂之長男巽一索而得女故謂之長女傷已男女凋零也人生㡬何百憂俱至二王當作何奉佛二郗奉道必至有期何能相保世說二郄奉道二何奉佛以財賄謝中郎云二郄諂於道二何佞於佛劉孝標注云中興書曰郄暗及弟曇奉天師道晉陽秋曰何充性好佛道崇脩佛寺供給沙門以百數久在揚州徵役吏民功賞萬計是以為遐邇所譏充弟準亦精勤惟讀佛經營治寺廟而巳矣言雖奉佛奉道至生死之期不能相保也悽其零零䬃焉秋草楚辭王逸注曰草死曰零木死曰落説文曰䬃翔風也聲蘇合切去矣黎民哀哉仲仁異苑曰賈充字公閭妻郭氏為人凶妒生兒犂民年始三嵗乳母抱之當閣犂民見充外入喜笑充就乳母懷中嗚撮郭遥見謂充愛乳母即鞭殺之兒恒啼泣不食他乳經日遂死郭於是終身無子晉書曰賈充子黎民生四嵗而卒仲仁疑即仲雍曹子建仲雍哀辭曰曹喈字仲雍魏太子之仲子也三月而生五月而死冀羊祜之前識期張衡之後身晉書羊祜傳曰祜年五嵗時令乳母取所弄金環乳母曰汝先無此物祜即詣鄰人李氏東垣桑樹中探得之主人驚曰此吾亡兒失物也云何持去乳母具言之李氏悲惋時人異之謂李氏子則祜之前身也蔡邕别傳曰張衡死月餘邕母始懷孕此二人才貎甚相類時人云邕是衡之後身一朝風燭萬古埃塵丘陵兮何忍能留兮㡬人淮南子曰人生於世倏爾而止如風火之燭説文曰埃塵也聲烏開切廣雅云小陵為丘郭璞爾雅注云陵大阜也象戲賦周書武帝紀云天和三年帝制象經成集百僚講說集中有進象經賦表云伏讀聖製象經并觀象戲是也北史王褒傳云武帝作象經令褒注之引據該洽甚見稱賞象戲之制其法不傳以賦按之葢彈棊格五六博之遺意也楚辭曰琨蔽象棊有六博王逸曰以琨蔽作箸象牙為棊疑本此為象戲矣彈棊之制乃蹴鞠所變始自漢成帝帝好蹴鞠羣臣以為勞體非尊者所宜可擇似而不勞者劉向奏彈棊以獻之魏文帝為之特妙用手巾角拂之無不中者其局以石為之方五尺中心髙似葢形如覆盂上圓下方兩人對局白黑棊各六枚先列棊相當更先彈也梁簡文彈棊論序有完五全六八反四角之説格五之戲格五簺也行棊相塞謂之簺簺有四采簺白乘五至五即格不得行前書吾丘壽王後漢梁冀皆善為之六博之戲投六箸行六棊用十二棊六棊白六棊黑所擲頭謂之瓊瓊有五采刻為一畫者謂之塞刻為二畫者謂之白刻為三畫者謂之黑一邊不刻五塞之間謂之五塞見於宋玉王逸鮑宏諸家今按賦中局取諸乾坤以為輿二章明是上圓下方類彈棊局矣又按從月建而左轉起黄鍾而順行蓋取十二之數明是用十二棊也歴諦傳記象戲之法蓋本諸此依文即事難可復㝷又按周史及子山序賦明是武帝所制增衍之餘即為創造是用設此圖經并鳩觀試未必一如舊制今之雙六頗類古法而其數不侔愧非張華博物胥臣多聞上追覆局之能直擬看碑之識安能别其行陣也乎觀夫造作權輿皇王厥初觀夫以下言萬物初生天地開闢於是聖人起而制作也爾雅曰權輿始也萬物皆含胎長養之時莊子云廣成子謂黄帝曰得吾道者上為皇而下為王詩曰厥初生民法凝隂於厚徳仰冲氣於清虛易曰履霜堅冰隂始凝又曰君子以厚徳載物乾鑿度曰清輕者上為天於當有是字綠簡既開丹局直正淮南子曰河出丹書洛出綠圖喻武帝制此象經如河圖洛書聖人之作也理洞研幾原窮作聖繫辭曰夫易者聖人之所以極深而研㡬也若扣洪鐘如縣明鏡世説龎士元曰若不一扣洪鐘伐雷鼓則不識其音響也淮南子曰誠得清明之士執𤣥鏡於心照物明白不為古今易意攄舒明指以示之闔棺不恨矣以言聖人才智用之不窮如洪鐘任扣明鏡匪疲也白鳯遥臨黄雲髙映左傳郯子曰我髙祖少皥摰之立也鳯鳥適至故紀於鳥為鳥師而鳥名黄帝氏以雲紀故為雲師而雲名後漢書賈逵曰左氏以為少皥氏代黄帝即圖讖所謂帝宣也注河圖曰大星如虹下流華渚女節意感生白帝朱宣宋均注曰朱宣少皥氏也以白帝朱宣有鳯瑞故云白鳯黄帝受命有雲瑞故云黄雲服䖍曰黄帝以雲名官中官為黄雲可以變俗移風可以涖官行政言此戲雖小可以喻大著以為經如古聖鳥官雲紀可以圖治也是以局取諸乾仍圖上𤣥月輪新滿日暈重圓摸羽林之華蓋寫明堂之璧泉言其局上圓以象天也王褒象經序云一曰法天以觀其象天日月星是也二曰地理以法其形地水火木金土是也三曰隂陽以順其本陽數為先本于天隂數為先本於地是也按此云象天日月星下文言法地甘泉賦曰將郊上𤣥張揖廣雅曰暈捲也氣在外捲結之也日月俱然天官書曰虛南有衆星曰羽林天軍晉書天文志曰華蓋九星所以覆蔽帝座天子之華蓋象之漢書平帝紀曰安漢公奏立明堂璧廱應劭曰明堂布政之官上圓下方璧廱者象璧圜雍之以水象教化流行坤以為輿剛柔巻舒若方鏡而無影似空城而未居言其下方以法地也易曰坤為輿宋玉大言賦曰方地為車説卦曰立地之道曰柔與剛注言其形也西京雜記曰髙祖咸陽宫得方鏡表裏有明人來照之影不例見以手捧心可見腸胃五臟厯然無疑言其形若方鏡也空城未居謂未甞投箸行棊之時如空城未居人也促成文之畫亡靈龜之圖馬麗千金之馬符明六甲之符成文如刻為一畫二畫三畫之類言刻畫成文如古龜龍之圖棊箸等類又如兵馬行陣須人用之也淮南子曰馬之似鹿者千金漢武内傳有五帝六甲左右靈飛之符抱樸子曰立夏帶六壬六甲之符於是搢笏當次依辰就席於是以下謂人用之也晉書輿服志曰古者貴賤皆執笏其有事則搢之於腰帶所謂搢紳之士者搢笏而垂紳也當次就席謂兩人對局之始列棊相當也如楚辭分曹並進之説王逸云分曹列偶並進技巧投箸行棊轉相遒廹使不得擇行也廻地理於方珪轉天文於圓璧周禮曰王執鎮珪鄭注云鎮安也所以安四方周禮又云以蒼璧禮天鄭注云璧圜象天也方珪圓璧言局之下方上圓廻轉言旋轉於局中類彈棊矣分荆山之美玉數藍田之珉石王逸曰琨玉蔽博箸是謂以玉飾之也曹子建七啓錯以荆山之玉范子計然曰玉英出藍田説文曰珉石之美者南行赤水之符北使𤣥山之策居東道而龍青出西關而馬白南北東西蓋指四角謂行棊也王褒象經序曰四時以應其序東方之色青其餘三色例皆如之與此赤黒青白配南北東西同赤水即丹水六韜曰堯與有苖戰於丹水之陽高誘曰丹水在南陽浦崖𤣥山未詳疑即𤣥女授黄帝九宫戰法禮記曰左青龍而右白虎青龍在左故云東道天文志曰東方蒼龍宿揚子太𤣥曰東動青龍光離於淵范望注曰青龍在東方故言東動也桓譚新論曰公孫龍常爭論曰白馬非馬人不能屈後乘白馬無符傳欲出關關吏不聽此虛言難以奪實也既舒𤣥象聊定金枰𤣥象天象也小爾雅方言云所以投博謂之枰枰局也昭日月之光景乗風雲之性靈取四方之正色用五徳之相生格五簺有四采簺白乗五至五即格不得行四方正色謂四采也五徳相生若格五也王褒象經序曰算數以通其變俯仰則為天地日月星變通則為水火金木土是也今之雙六亦至五即格不得行從月建而左轉起黄鍾而順行謂十二棊也言用此十二棊左轉右行如一嵗之十有二月黄鍾之有十二律也若用二十四棊則白黒各有十二矣李頎彈棊歌曰藍田美石清如砥白黑相分十二子韋應物歌云圓天方地局二十四氣子隂翻則顧兔先出陽變則靈烏獨明魚豢典略曰兔者明月之精博物志曰兔望月而孕春秋元命苞曰陽成於三故日中有三足烏况乃豫遊仁壽行樂徽音水影揺日花光照林乍披圖而久玩或開經而熟㝷雖復成之以手終須得之於心言帝於宴遊之暇觀象經而為此戲惟其得心始應手也晉書陸機與弟雲書曰仁夀殿前有大方銅鏡知仁夀殿名也洛陽宫殿簿有徽音殿乃有龍燭銜花金爐浮氣月落桂垂星斜柳墜猶豫樞機嫌疑涇渭顧望廻惑心情怖畏應對坎而衝離或當申而取未楚辭曰日晏不到燭龍何照山海經曰鍾山之神曰燭隂郭璞曰即燭龍也魏武上雜物疏曰御物三十種有純金香爐一枚雪賦曰燎薫爐兮炳明燭顔師古曰猶豫獸名也爾雅曰猶如􅕱善登木此獸性多疑慮常居山中忽聞有聲即恐有人且来害之每豫上樹久之無人然後敢下須臾又上如此非一故不决者稱猶豫焉一曰隴西俗謂犬子為猶犬隨人行毎豫在前待人不得又來迎候故云猶豫也􅕱音几易鄭注曰樞謂户樞機謂弩牙毛詩傳曰涇渭相入而清濁異王褒象經序曰律吕以先其氣在子取未在午取丑八卦以定其位至震取兑至離取坎錯綜参伍細玩熟尋不知至離取坎在子取未臨戲象形如對坎卦而衝離卦或當申時而取未時也春賦春賦以下庾子山仕南朝時為東宫學士之文也滕王逌開府集序以為太清值亂離之後承聖遭軍火之餘揚都有集百不一存江陵之文無遺一字所撰止入魏以來爰洎周代著述合二十巻今集中所載頗雜南朝舊文殆逌所云揚都之集百不一存者耶當宇文集序之日地限南北故所撰止魏周時文及隋唐一統之後其江南遺藁時或猶存好事者増入舊編今之所謂庾子山集其非滕王故本可知也且子山自入魏而後大抵皆離愁之作觸景傷懷似此諸賦辭傷輕艶恐非羇臣所宜觀其文氣略與梁朝諸君相似晉安湘東所賦題頗類之蓋當時宫體之文徐庾並稱者也至其歴魏仕周閔姬思亳得南朝之精微窮北方之枝葉蓋有騷人之風非孝穆所能及也於詩亦然今皆附攄管見為之列序諸篇謂是在梁之作云爾梁簡文帝集中有晩春賦元帝集有春賦賦中多有類七言詩者唐王勃駱賔王亦嘗為之云效庾體明是梁朝宫中庾子山創為此體也宜春苑中春巳歸披香殿裏作春衣史記司馬相如傳曰上還過宜春宫正義曰括地志云秦宜春宫在雍州萬年縣西南三十里宜春苑在宮之東杜之南始皇本紀云葬二世宜春苑中三輔黄圖曰宜春宫本秦之離宮在長安城東南杜縣東近下杜又有宜春下苑在京城東南隅荆楚嵗時記曰立春之日悉剪綵為鷰戴之帖宜春二字傅咸鷰賦曰御青書以贊時著宜春之嘉祉皆取宜春之義也西都賦曰披香發越黄圖云武帝時後宫八區有披香殿飛燕外傳曰宣帝時披香博士淖方成白髮教授宫中號淖夫人是漢宮闕名有披香殿也論語包咸注曰春服既成衣單袷之時作春衣當謂天子内官主織作衣服者新年鳥聲千種囀二月楊花滿路飛河陽一縣併是花金谷從来滿園樹晉書曰潘岳為河陽令滿縣皆栽桃花石崇有金谷園思歸引序曰河陽别業柏木㡬於萬株一叢香草足礙人數尺遊絲即横路楚辭王逸注曰蘭香草也沈休文詩曰遊絲映空轉開上林而競入擁河橋而争渡漢舊儀曰上林苑方三百里苑中養百獸逺方各獻名果異卉三千餘種植其中亦有製為美名以摽竒異晉書曰杜預以孟津渡險起建河橋於富平津出麗華之金屋下飛燕之蘭宫後漢書光武帝曰娶妻當得隂麗華漢書武帝謂長公主曰若得阿嬌當以金屋駐之又孝成趙皇后傳曰后本長安宫人屬陽阿主家學歌舞號曰飛燕三輔黄圖曰趙皇后居昭陽殿有女弟俱為婕妤貴傾後宫昭陽舍蘭房椒壁楚辭曰彷彿兮蘭宫釵朶多而訝重髻鬟髙而畏風王子年拾遺記曰魏文帝所愛美人薛靈芸入宫乗寵愛外國獻火珠龍鸞之釵帝曰明珠翡翠尚不勝况乎鸞鳯之重乃止而不進後漢書曰梁冀妻孫壽色美而善為妖態作墮馬髻風俗通曰墮馬髻者側在一邊唐段柯古髻鬟品云髻始自燧人氏以髮相纒而無繫縛周文王加珠翠翹花名曰鳯髻又名歩揺髻秦始皇有望仙髻參鸞髻凌雲髻漢有迎春髻王母降武帝宫從者有飛仙髻九環髻漢元帝宫中有百合分髾髻同心髻太元中公主婦女必緩鬢欣髻又有假髻合徳有欣愁髻貴妃有義髻魏武宫有反綰髻又梳百花髻魏明帝有函煙髻晉惠帝宫有芙蓉髻梁宮有羅光髻段氏言髻鬟者多其餘在子山之後者不備錄焉眉將柳而争緑面共桃而競紅影来池裏花落衫中苔始綠而藏魚麥纔青而覆雉周處風土記曰石髮水苔也青綠色皆生於石也師曠禽經曰澤雉啼而麥齊張華注云澤雉如啇庚春季之月始鳴麥平隴也吹簫弄玉之臺鳴佩凌波之水列仙傳曰蕭史秦穆公時人善吹簫穆公有女號弄玉好之公遂以妻焉遂教弄玉作鳯鳴為作鳯凰臺夫婦止其上一旦隨鳯凰去故秦氏作鳯女辭曹子建洛神賦曰凌波微歩羅襪生塵移戚里而家富入新豐而酒美漢書曰萬石君奮徙家長安中戚里師古曰於上有姻戚者則皆居之故名其里為戚里三輔舊事曰太上皇不樂關中思慕鄉里髙祖徙豐沛屠兒酤酒煑餅商人立為新豐石榴聊汎蒲桃醱醅蜀都賦曰蒲桃亂潰石榴競裂廣雅曰石榴若榴也南都賦曰梬棗若榴扶南傳曰頓孫國有安石榴取汁停杯中數日成美酒上林賦注云郭璞曰蒲桃似燕薁可作酒漢武帝外傳曰西王母下降帝設葡萄酒魏文帝云葡萄釀以為酒甘於麴麥善醉博物志曰西域有葡萄酒積年不敗彼俗云可十年飲之醉彌月乃觧醱普活切音潑醅鋪杯切音丕李白詩曰蒲桃初醱醅蓋夲此也芙蓉玉碗蓮子金杯朝野僉載曰西魏文帝造二欹器其一為二荷同處一盤相去盈尺中有芙蓉下垂器上以水注芙蓉而盈於器又為鳬雁蟾蜍以飾之謂之水芝欹器庾闡斷酒賦曰椎金罍碎玉碗新芽竹笋細核楊梅説文曰笋竹萠也范汪祠制云仲春薦竹笋臨海異物志曰楊梅大如彈丸正赤五月中熟熟時似梅其味甜酸綠珠捧琴至文君送酒来晉書曰石崇有妓名綠珠美而豔善吹笛漢書曰司馬相如與文君俱之臨邛盡賣車騎買酒舎乃令文君當罏玉管初調鳴絃暫撫陽春淥水之曲對鳯廻鸞之舞漢書音義曰管以玉為之不惟竹也宋玉曰陽春白雪國中屬而和者不過數十人淮南子曰手㑹淥水之趨髙誘曰淥水古詩也張衡觀舞賦曰裾似飛鸞袖如廻雪袁宏賦云舞廻鸞以紆䄂覩佳人之王儀更炙笙簧還移筝柱毛詩曰吹笙鼓簧爾雅云大笙謂之簧郭璞曰列管匏中施簧管端後漢侯瑾筝賦曰急絃促柱變調改曲月入歌扇花承節鼓班婕妤詩曰裁為合歡扇團圓似明月節疑時節周禮中春擊土鼓協律都尉射雉中郎漢書曰李延年為協律都尉潘岳著射雉賦又秋興賦序曰晉十有四年余春秋三十有二始見二毛以太尉掾兼虎賁中郎將寓直於㪚騎之省射雉中郎蓋潘岳也停車小苑連騎長楊三輔黄圖曰長楊榭在長楊宫秋冬校獵其下命武士搏射禽獸天子登此以觀焉金鞍始被柘弓新張拂塵看馬埒分朋入射堂西京雜記曰武帝時得貳師天馬帝以玫瑰石為鞍鏤以金銀瑜石又云紫金為花以飾其上考工記曰工人取材柘為上許慎曰南方谿子蠻􅊂柘弩皆善射也馬是天池之龍種帶乃荆山之玉梁開山圖云隴西神馬山有泉乃龍馬所生秦州有馬池源出嶓冢山韓子曰卞和抱其璞哭於荆山之下王子年拾遺記曰玉山其石五色而輕北有玉梁豔錦安天鹿新綾織鳯凰天鹿獸名言織成綾錦上有鳥戰之文也三日曲水向河津日晩河邊多觧神續齊諧記曰晉武帝問摰虞三日曲水之義虞曰漢章帝時平原徐肇以三月初生三女至三日俱亡村人以為怪方招擕之水濵洗祓遂因水汎觴其義起此帝曰必如所談便非好事束晳進曰摰虞小生不足以知臣請言之昔周公成洛邑因流水以汎酒故逸詩曰羽觴隨波流又秦昭王以三日置酒河曲見金人奉水心之劒曰令君制有西夏乃霸諸侯因此立為曲水二漢相沿皆為盛集帝曰善賜金十五斤左遷摰虞為陽城令樹下流杯客沙頭渡水人荆楚嵗時記曰三月三日士民並出江渚池沼間為流觴曲水之飲鏤薄窄衫袖穿珠帖領巾董勳問禮俗曰人日鏤金薄為人以貼屏風戴於頭髩起自晉代賈充妻李夫人云俗人入新年改舊從新也釋名曰衫芟也衫末無袖端也領頸也以壅頸也亦言總領衣體為端首也束晳近遊賦曰載穿領之疎巾百丈山頭日欲斜三晡未醉莫還家池中水影懸勝鏡屋裏衣香不如花淮南子曰至於悲谷是謂晡時晡奔謨切音逋申時也言白日將欲西匿遊人不醉無歸春水照人有如明鏡春花撲鼻可代薫衣也七夕賦兔月先上羊燈次安五經通義曰月中有兔與蟾蜍梁簡文帝對燭賦曰金羊燈火不須然覩牛星之曜景視織女之闌干周處風土記曰七夕祠牽牛織女云此二星當㑹天漢中奕奕有白氣光曜五色以此為徵便拜而有乞也續齊諧記曰桂陽成武丁有仙道常在人間忽謂其弟曰七月七日織女當渡河答曰織女暫詣牽牛明日失武丁至今云織女嫁牽牛古樂府云月没參横北斗闌干闌干横斜貎於是秦娥麗妾趙豔佳人窈窕名燕逶迤姓秦方言曰秦俗美貌謂之娥古詩云燕趙多佳人美者顔如玉毛詩傳曰窈窕幽閒也荀悅漢紀曰趙氏善舞上悦之號曰飛燕袁宏賦云曵羅裙以徘徊為鳯翼之逶迤崔豹古今注曰邯鄲女子姓秦名羅敷為邑人王仁妻後為趙王家令羅敷出採桑於陌上趙王見而悦之因飲酒欲奪之羅敷乃彈筝作陌上桑之歌焉嫌朝妝之半故憐晚飾之全新言麗妾佳人早時梳妝至此已嫌其半舊矣晩復飾之其新妝為可愛也此時併捨房櫳共徃庭中縷條𦂳而貫矩針鼻細而穿空説文曰櫳檻也聲盧紅切西京雜記曰戚夫人侍兒賈佩蘭説在宫内時七月七日臨百子池作于闐樂樂畢以五色縷相羈謂為相連愛又曰漢采女常以七月七日穿七孔針於開襟樓俱已習之荆楚嵗時記曰七夕婦人結綵縷穿七孔針陳𤓰果於庭以乞巧有蟢子網於𤓰上則以為得巧燈賦梁簡文帝集中有看燈賦有列燈賦九龍將暝三爵行棲山海經曰西北海之外有神人面蛇身而赤其眼及晦視乃明不食不寢是燭九隂是謂燭龍炬可以照明禮記曰君子飲酒也禮三爵而油油以退瓊鉤半上若木全低瓊鉤月也若木日也謂月上日落也鮑照翫月詩曰始見城南樓纖纖如玉鉤淮南子曰建木在廣都若木在建木西木有十日其華照地牕藏明於粉壁桞助暗於蘭閨漢官典職云漢省中皆胡粉塗壁宋玉諷賦有云蘭房之閨翡翠珠被流蘇羽帳楚辭招魂云翡翠珠被爛齊光漢書曰駙馬赤珥流蘇張衡東京賦曰飛流蘇之騷殺摰虞决疑要注曰天子帳以流蘇為飾羽帳注見下文舒屈膝之屏風掩芙蓉之行障陸劌鄴中記曰石季龍作金銀鈕屈膝屏風衣以白縑畫義士仙人禽獸之像讚者皆二十二言髙施八尺下施四尺或施六尺隨意所欲也梁簡文詩云織成屏風金屈膝是也鮑照行路難云七綵芙蓉之羽帳巻衣秦后之牀送枕荆臺之上呉均歌曰咸陽春草芳秦女巻衣裳樂府題注云秦王捲衣言咸陽春景及宫闕之美人秦王巻衣以贈所歡也髙唐賦云楚襄王與宋玉遊於雲夢之臺玉曰昔者先王甞遊髙唐怠而晝寢夢見一婦人曰妾巫山之女也為髙唐客聞君遊髙唐願薦枕席王因幸之後漢書邊韶遊章華臺賦曰楚王遊雲夢之澤之荆臺之上乃有百枝同樹四照連盤香添然蜜氣雜燒蘭燼長宵久光青夜寒秀華掩映蚖膏照灼動鱗甲於鯨魚燄光芒於鳴鶴楚辭蘭膏明燭華燈錯淮南畢萬術曰取蚖脂為燈置火中即見諸物述異記曰南海有明珠即鯨魚目瞳鯨死而目皆無精夜可以鍳謂之夜光王子年拾遺記曰昔秦始皇為塜歛天下瓌異於海中作玉象鯨魚啣火珠為星以代膏燭光出墓中精靈之偉也王筠詠燈檠詩云百華耀九枝鳴鶴映冰池蛾飄則碎花亂下風起則流星細落崔豹古今注曰飛蛾善拂燈一名火花一名慕光况復上蘭深夜中山醑清顔師古漢書注曰上蘭觀名在上林中鄭康成周禮注曰清酒今之中山冬釀接夏而成也楚妃留客韓娥合聲嵇叔夜琴賦曰王昭楚妃李善注云歌錄曰石崇作楚妃嘆列子曰韓娥東之齊遺糧過雍門鬻歌假食而去餘響遶梁三日不絶雍門人至今善歌效韓娥之遺聲也低歌著節游絃絶鳴嵇叔夜琴賦曰鵾雞游絃輝輝朱燼熖熖紅榮乍九光而連采或雙花而並明漢武内傳云七月七日王母至帝掃除宫内然九光之燈寄言蘇季子應知餘照情戰國䇿曰甘茂亡秦且之齊出關遇蘇子曰君聞夫江上之處女乎蘇子曰不聞曰夫江上之處女有家貧而無燭者處女相與語欲去之家貧無燭者將去矣謂處女曰妾以無燭故常先至掃舍布席何愛於餘明之照四壁者幸以賜妾何妨於處女妾自以為有益於處女何為去我處女相語以為然而留之今臣不肖棄逐於秦而出關願為足下掃室布席幸無我逐也蘇子乃西説秦王與之上卿對燭賦梁簡文帝元帝集中並有對燭賦龍沙雁塞甲應寒天山月沒客衣單後漢班超傳贊曰咫尺龍沙注云龍沙沙漠也郭璞山海經注曰雁門山即北陵西隃雁之所出因以名云在高柳北史記曰貳師將軍李廣利擊匈奴右賢王於祁連山索隱曰祁連山一曰天山亦曰白山在張液酒泉二郡界祖孫登詩云抽鞭上關路誰念客衣單蓋關塞苦寒之辭也燈前桁衣疑不亮月下穿針覺最難刺取燈花持桂燭還却燈檠下燭盤謂夫壻逺行婦製征衣須對燭也桁音下浪反衣袈又曬衣竿也杜甫詩云翡翠鳴衣桁王子年拾遺記曰王母取綠桂之膏然以照夜説文曰檠榜也聲巨京切鑄鳯銜蓮圖龍並眠燼髙疑數翦心濕暫難然銅荷承淚蠟鐵鋏染浮煙本知雪光能映紙復訝燈花今得錢任昉為蕭揚州作薦士表曰至乃集螢映雪注引孫氏世錄曰孫康家貧常映雪讀書清介交游不雜西京雜記云陸賈應樊將軍曰夫目瞤者得酒食燈火花得錢財乾鵲噪而行人至蜘蛛集而百事喜小既有徴大亦宜然蓮帳寒檠牕拂曙筠籠熏火香盈絮鄴中記曰石虎造流蘇斗帳上安金蓮花花中懸金箔盛腕囊盛以異香帳之四面皆作十二香囊采色爛耀筠籠竹火籠也東宫舊事曰皇太子納妃有漆畫手巾熏籠二大被熏籠三衣熏籠三劉向别錄云淮南王有熏籠賦方言曰南楚江沔之間籠謂之篣或謂之笯陳楚宋魏之間謂之庸君今熏籠是也説文曰絮敝綿也聲息據切傍垂細溜上繞飛蛾王子年拾遺記曰西王母與昭王遊於燧林之下説炎帝鑽火之術取綠桂之膏然以照夜忽有飛蛾銜火狀如丹雀来拂於桂膏之上此蛾出於圜丘之穴憑氣餘露飛不集下羣仙殺此蛾以合九轉神丹謝眺詠燈詩云飛蛾三四繞光清寒入燄暗風過楚人纓脱盡燕君書誤多説苑曰楚莊王賜羣臣酒日暮燭滅乃有人引美人之衣者美人援絶其冠纓告王趣火来上視絶纓者王曰飲人酒使醉失禮奈何欲顯婦人之節而辱士乎乃命左右曰與寡人飲不絶冠纓者不歡羣臣百餘人皆絶去其冠纓乃上火也韓子曰郢人有遺燕相國書者夜火不明因謂持燭者曰舉燭云而過書舉燭舉燭非書意也燕相受書而悦之曰舉燭者尚明也尚明也者舉賢而任之燕相白王大悦國以治治則治矣非書意也今世學者多似此類夜風吹香氣隨鬱金苑芙蓉池魏略曰鬱金香大秦國二三月花如紅藍四五月採之其香十二葉為百草之英魏文帝有芙蓉池詩秦皇辟惡不足道漢武胡香何物竒崔豹古今注曰辟惡車秦制也按辟惡香名當是香車也博物志曰漢武帝時弱水西國有人乘毛車以渡弱水来獻香者帝謂是常香非中國之所乏不禮其使久留之帝幸上林苑西使至乘輿間并奏其香帝取之看大如鸞卵三枚與棗相似帝不悦以付外庫後長安中大疫宫中皆疫病帝不舉樂西使乞見請燒所貢香一枚以辟疫氣帝不得已聽之宫中病者登日並瘥長安中百里咸聞香氣芳積九十餘日香猶不歇帝乃厚禮發遣餞送一説漢制獻香不滿斤西使臨去乃發香氣如大豆者拭著宫門香氣聞長安數十里經數月乃歇晩星沒芳蕪歇還持照夜遊詎減西園月古詩曰晝短苦夜長何不秉燭遊魏文帝芙蓉池詩云乗輦夜行遊逍遥歩西園丹霞夾明月華星出雲間鏡賦天河漸没日輪將起楊泉物理論曰水之精氣上浮宛轉隨流名之曰天河列子曰日出之初大如車輪説文曰車有輻曰輪以下言天之轉夜為晝燕噪烏驚美人起而梳妝乃照鏡也燕噪呉王烏驚御史越絶書呉地傳曰東宫周一里二百七十歩路西宫在長秋周平二十六歩秦始皇帝十一年守宫者照燕失火燒之鮑照空城雀云誠不及青鳥逺食玉山禾猶勝呉宫燕無罪得焚窠漢書曰御史府中列柏樹常有野烏數千棲宿其上晨去暮来號曰朝夕烏玉花簟上金蓮帳裏東宫舊事曰太子納妃有赤花雙文簟陸劌鄴中記曰石虎作流蘇帳頂安金蓮花花中懸金薄織成綩囊裹受三升以盛香帳之四面十二香囊采色亦同始摺屏風新開戸扇朝光晃眼早風吹面臨桁下而牽衫就箱邊而著釧言美人之曉起也説文曰釧臂環也陳思王樂府云皓腕約金環繁欽定情詩云綰臂雙金環皆是物也一名條脱真誥晉世萼緑華贈羊權金玉條脱各一枚是也宿鬟尚巻殘粧已薄無復脣朱纔餘眉萼靨上星稀黄中月落言美人未梳妝時也劉熈釋名曰脣脂以丹作之象脣赤也宋書云武帝女壽陽公主人日卧於含章簷下梅花落額上成五出花拂之不去後遂效為梅花粧楚辭大招云靨輔竒牙紅笑嫣説文曰靨頰輔也洛神賦云靨輔承權或説後周天元帝令宫人黄眉墨粧其風流於後世按梁簡文帝詩同安鬟裏撥異作額間黄當時已有之矣然不知起自何代也酉陽雜爼曰如射月者謂之黄星靨鏡臺銀帶本出魏宫魏武上雜物疏曰鏡臺出魏宫中有純銀參帶鏡臺一枚能横却月巧挂廻風却月言鏡之形圓似月也爾雅曰廻風為飄郭注云旋風也龍垂匣外鳯倚花中謝眺詠鏡臺詩曰對鳯懸清冰垂龍挂明月鏡乃照膽照心難逢難值西京雜記曰咸陽宫有方鏡廣四尺髙五尺九寸表裏有明人直來照之影則倒見以手捫心而來則見腸胃五臟厯然無硋人有疾病在内則掩心而照之則知病之所在又女子有邪心則膽張心動秦始皇常以照宫人膽張心動者則殺之鏤五色之盤龍刻千年之古字鄴中記曰石虎宫中鏡有徑二三尺者下有純金蟠龍雕飾大戴禮曰武王踐阼于鑑為銘焉銘曰見爾前慮爾後云云刻千年之古字者言銘之相垂久也山雞看而獨舞海鳥見而孤鳴劉敬叔異苑曰山雞愛其毛羽映水則飛魏武時南方獻之公子蒼舒令置大鏡其前雞鍳形而舞不知止遂乏死韋仲將為之賦其事國語曰海鳥爰居范泰鸞鳥詩序云昔罽賔王得鸞鳥甚愛之欲其鳴而不得夫人曰聞鳥得類而後鳴何不懸鏡以照之王從其言鸞覩影而鳴一奮而絶按鸞鳥似鳯爰居亦似鳯故臧文仲祀之今云海鳥即鸞矣臨水則池中月出照日則壁上菱生飛燕外傳曰昭儀上姊三十六事有七出菱花鏡一奩暫設粧奩還抽鏡屜競學生情爭憐今世鬢齊故略眉平猶剃廣雅曰其上連髮曰鬢剃眉者謂滅去眉毛以畫代之也飛花塼子次第須安塼主緣切音專字或作甎瓴甓之屬詩所謂中唐有甓是也飛花塼子謂花塼也朱開錦蹹黛蘸油檀左傳宣十二年杜注云斥候蹹伏蹹徒臘反疏云蹹行也朱丹色謂蹹行之處用錦繡為之有丹色也釋名曰黛代也滅眉毛去之以此畫代其處也草木蟲魚疏云檀木正青滑澤脂和甲煎澤漬香蘭裴啓語林曰石崇厠常有十餘侍婢列皆佳麗藻飾置甲煎沉香無不異備唐陳藏器曰甲煎以諸藥及美果花燒灰和蠟治成可作口脂釋名曰脂砥著面柔滑如砥石也香澤者人髮恒枯悴以此濡澤之也鹽鐵論曰毛嬙天下之姣人也待脂粉香澤而後容毛詩草木蟲魚疏曰蘭香草也其莖葉似藥草澤蘭但廣而長節節中赤髙四五尺漢諸池苑及許昌宫中皆種之可著粉中神女賦曰沐蘭澤含若芳枚乗七發曰被蘭澤張銑曰蘭澤以蘭漬膏者也量髻鬢之長短度安花之相去説文曰髻總髮也聲古詣切鬢頰髮也聲必刃切言美女對鏡挿花量度其髻鬢之長短也懸媚子於搔頭拭釵梁於粉絮西京雜記曰武帝過李夫人就取簪搔頭自此後宫人搔頭皆用玉玉價倍貴焉粉絮即俗粉撲用綿為之也言釵梁用粉絮拭之其色光明也梳頭新罷照著衣還從粧處取將歸暫看絃繫懸知纈縵衫正身長裙斜假襻真成箇鏡特相宜不能片時藏匣裏暫出園中也自隨鴛鴦賦崔豹古今注曰鴛鴦鳧類也雌雄未常相離人得其一思而死故謂之匹鳥梁簡文帝元帝集中並有鴛鴦賦虞姬小來事魏王自有歌聲足繞梁何曾織錦未肯挑桑終歸薄命著罷空牀魏志曰初明帝為王始納虞氏為妃帝即位虞氏不得立為后太皇卞太后慰勉焉虞氏曰曹氏自好立賤未有能以義舉者也然后職内事君外聼政其道相由而成茍不能以善始未有能令終者也殆必由此亡國喪祀矣虞氏遂絀還鄴宮列子曰韓娥歌音繞梁古詩有妾薄命篇又曰空牀難獨守見鴛鴦之相學還欹眼而淚落言空牀獨守之時見兹匹鳥觸物傷懷也南陽漬粉不復看京兆新眉遂懶約漢書曰蕭何薨高后乃封何夫人同為酇侯師古曰酇南陽縣也王韶南雍州記曰粉水蕭何夫人漬粉處也漢書云張敞為婦畫眉長安中傳京兆眉憮况復雙心並翼馴狎池籠浮波弄影刷羽乗風沈約詩曰刷羽同揺漾注刷理也共飛詹瓦全開魏宫魏志文帝問周宣曰吾夢殿屋兩瓦墮地化為鴛鴦宣對曰後宫當有暴死者黄門令奏宫人相殺俱棲梓樹堪是韓馮捜神記曰韓憑妻何氏美宋康王奪之妻宻遺憑書曰其雨淫淫河大水深日出當心王得其書以示左右蘇賀對曰其雨淫淫愁且思也河大水深不得徃来也日出當心心有死志也俄而憑乃自殺其妻隂腐其衣王與之登臺妻遂自投臺左右攬之衣不中手而死遺書於帶曰王利其生妾利其死願以屍骨賜憑合葬王怒弗聽使里人埋之冢相望也王曰爾夫婦相愛不已若能使冡合則吾弗阻也宿昔之間便有大梓木生於二冢之端旬而大盈抱屈體相就根交於下枝錯於上又有鴛鴦雌雄各一恒棲樹上晨夕不去交頸悲鳴音聲感人宋人哀之遂號其木曰相思樹相思之名起於此也南人謂此禽即韓憑夫婦之精魂今睢陽有韓憑城其歌謡至今猶存若乃韓壽欲婚溫嶠願婦玉臺不送胡香未有必見此之雙飛覺空牀之難守世説曰韓壽美姿容賈充辟以為掾充每聚㑹賈女於青璅中看見壽悦之恒懷存想發於吟詠後婢徃壽家具述如此并言女光麗壽聞之心動遂請婢潛修音問及期徃宿壽蹻捷絶人踰牆而入家中莫知自是充覺女盛自拂拭暢悦有異於常後㑹諸吏聞壽有竒香之氣是外國所貢一著人則厯月不歇充計武帝惟賜已及陳騫餘家無此香疑壽與女通而垣牆重密門閤急峻何由得爾乃託言有盜令人修牆使反曰其餘無異惟東北角如有人跡而牆髙非人所踰充乃取女左右婢考問即以狀對充秘之以女妻壽劉孝標注云郭子謂韓壽通者乃是陳騫女即以妻壽未婚而女亡因娶賈氏故世因傳是充女又世説云溫嶠從姑劉氏女美托嶠覔壻嶠密有自婚意答曰佳壻難得看得如嶠比何如姑曰何希汝比也後少曰嶠報云已覔得壻處因下玉鏡臺一枚姑大喜既婚交禮女大笑曰我固疑是老奴玉鏡臺嶠為劉越石長史北征劉聰所得蕩子賦陳思王詩曰借問歎者誰云是蕩子妻君行十餘年孤妾常獨棲故作蕩子賦乃離别之辭也蕩子辛苦逐征行直守長城千里城史記曰秦并天下乃使䝉恬將三十萬衆北逐戎翟收河南築長城隴水恒冰合關山唯月明一作唯明月秦州記隴頭歌隴頭流水分流四下念我行役飄然曠野樂府有度關山曲况復空牀起怨倡婦生離古詩曰昔為倡家女今為蕩子婦蕩子行不歸空牀難獨守漢書曰孝武李夫人本以倡進師古曰倡樂人音昌紗牕獨掩羅帳長垂鮑照詩曰羅帳空巻舒新筝不弄長笛羞吹常年桂苑昔日蘭閨謝莊月賦曰乃清蘭路肅桂苑劉逵呉都賦注曰呉有桂林苑羅敷總髮弄玉初笄樂府曰羅敷採桑為使君所邀羅敷盛誇其夫以拒之列仙傳曰秦穆公有女字弄玉劉熈釋名曰笄繫也所以繫冠使不墜也新歌子夜舊舞前溪晉書樂志曰子夜歌者女子名子夜造此聲孝武太元中瑯邪王軻之家有鬼歌子夜則子夜是此時人也前溪歌者晉車騎將軍沈玩所製寰宇記云前溪在烏程縣東入太湖謂之風渚夾溪悉生箭箬晉車騎將軍沈玩家於此别後關情無復情奩前明鏡不須明徐幹詩云自君之出矣明鏡不復治合歡無信寄廻紋織未成古詩曰客從逺方來遺我一端綺相去萬餘里故人心尚爾文采雙鴛鴦裁為合歡被璇璣圖詩序曰前秦苻堅時秦州刺史竇滔妻蘇氏名蕙字若蘭年十六歸於竇氏滔甚敬之然蘇氏性近於急頗傷妒嫉滔有寵姬趙陽臺歌舞之妙無出其右滔置之别所蘇氏知之求而獲焉苦加捶辱滔深以為憾滔將鎮襄陽邀蘇氏同徃蘇氏忿之不與偕行乃擕陽臺之任絶蘇氏音問蘇氏悔恨自傷因織錦為廻文五采相宣瑩心輝目縱廣八尺題詩二百餘首計八百餘字縱横反覆皆為文章名曰璇璣圖遂發蒼頭齎至襄陽滔覧之感其妙絶因送陽臺之關中而具車盛禮迎蘇氏歸於漢南恩好愈重游塵滿牀不用拂細草横階隨意生劉鑠擬行行重行行云流塵生庭中綠草滋寒螿崔豹古今注云空室無人行則生苔蘚或青或紫一名綠錢前日漢使著章臺聞道夫壻定應廻漢使即京兆尹張敞漢書所謂張敞為婦畫眉長安中傳張京兆眉膴是也又云張敞走馬章臺街手巾還欲燥愁眉即剰開逆想行人至迎前含笑來秦嘉婦與嘉書云今奉越布手巾一枚漢名臣奏云王莽斥出王閎太后憐之閎伏泣失聲太后親自以手巾拭閎泣後漢書梁冀傳云梁冀妻孫壽作愁眉啼粧言閨中思婦念夫壻將歸轉憂成喜也庾子山集巻一終, SBCK: ''}
