  - {type: variant, offset: 4, length: 11958, content: 巻首下錢塘倪璠纂註本傳庾信字子山南陽新野人祖易周書本傳云齊徴士父肩吾周書云梁㪚騎常侍中書令竝南史有傳注見滕王序信幼而俊邁聰敏絶倫博覽羣書尤善春秋左氏傳身長八尺腰帶十圍容止頽然有過人者周書此下云起家湘東國常侍轉安南府㕘軍時肩吾為梁太子中庶子掌管記云云父肩吾為梁太子中庶子掌管記東海徐摛為右衛率摛子陵及信竝為抄撰學士父子東宫出入禁闥恩禮莫與比隆既文竝綺豔故世號徐庾體焉南史曰徐摛字士秀東海剡人也晉安王綱入為皇太子轉家令兼管記尋帶領直摛文體既别春坊盡學之宫體之號自斯而始子陵字孝穆王立為皇太子東宫置學士陵充其選北史文苑傳曰徐陵庾信分路揚鑣其意淺而繁其文匿而采辭尚輕險情多哀思文中子曰徐陵庾信古之夸人也其文誕按徐庾竝稱蓋子山江南少作宫體之文也及至江北而庾進矣是以輕險之目楚既失之夸誕之評齊未為得當時後進競相模範毎有一文都下莫不傳誦累遷通直散騎常侍周書曰累遷尚書度支郎中通直正員郎出為郢州别駕尋兼通直散騎常侍聘於東魏文章辭令盛為鄴下所稱梁大通六年魏武帝永熙三年魏武帝西都長安為西魏髙歡别奉清河王庶子善見為主徙都鄴是為東魏魏於是始分為兩梁隋書地理志曰魏郡鄴縣東魏所都按子山聘魏南史書紀年闕文考魏齊諸書子山副徐君房將命至鄴魏令祖孝隱盧孔景等宴梁使故集中有將命至鄴酬祖正員詩祖正員即祖孝隱也及魏使尉瑾魏肇師來聘梁朝又令庾信徐君房同宴魏使其文章辭令皆足稱也北齊書祖珽傳云珽弟孝隱魏末為散騎常侍迎梁使時徐君房庾信來聘名譽甚髙魏朝聞而重之接對者多取一時之秀盧孔景之徒並降階攝職更逓司賔酉陽雜俎云梁徐君房勸魏使尉瑾酒一噏即盡笑曰竒快瑾曰卿在鄴飲酒未嘗傾巵武州已來舉無遺滴君房曰我飲實少亦是習慣微學其進非有由然庾信曰庶子年之髙卑酒之多少與時升降使不可得而度魏肇師曰徐君年隨情少酒因境多未知方十復作若為重輕又云梁宴魏使魏肇師舉酒勸陳昭曰此席已後便與卿少時阻闊念此甚以悽眷昭曰我欽仰名賢亦何已也路中都不盡深心便乖隔泫歎如何俄而酒至鸚鵡杯徐君房飲不盡屬肇師肇師曰海蠡蜿蜒尾翅皆張非獨為玩好亦所以為罰卿今日真不得辭責信曰庶子好為術數遂命更滿君房謂信曰相持何乃急肇師曰此謂直道而行乃非豆萁之喻君房乃覆椀信謂瑾肇師曰適信家餉致􅍽醁酒數器泥封全但不知其味若為必不敢先嘗謹當奉薦肇師曰毎有珍藏多相費累顧更以多慚又曰庾信作詩用西京雜記事旋自追改曰此呉均語恐不足用也魏肇師曰古人託曲者多矣然鸚鵡賦禰衡潘尼二集並載奕賦曹植左思之言正同古人用意何至於此君房曰詞人自是好相採取一字不異良是後人莫辯魏尉瑾曰九錫或稱王粲六代亦言曹植信曰我江南才士今日亦無舉世所推如温子昇獨擅鄴下常見其詞筆亦足稱是逺名近得魏收數巻碑製作富逸特是髙才也按子山為通直散騎常侍聘魏及還為正員郎魏人來聘對宴魏使其文章辭令如此還滕逌序云還本國為正員郎為東宫學士領建康令隋志丹陽郡建康縣侯景作亂梁簡文帝命信率宫中文武千餘人營於朱雀航及景至信以衆先退南史賊臣傳曰侯景魏之懐朔鎮人也事爾朱榮為定州刺史髙歡誅爾朱氏景以衆降稍至吏部尚書歡使擁兵十萬專制河南仗任若己之半體太清元年二月遣其行臺郎中丁和上表求降帝封景河南王大將軍使持節督河南北軍事大行臺承制如鄧禹故事二年八月景遂發兵反建康令庾信率兵千餘人屯航北及景至徹航始除一舶見賊軍皆著鐡面遂棄軍走南塘㳺軍復閉航度景皇太子以所乗馬授王質配精兵三千使援庾信質至領軍府與賊遇未陣便奔景乗勝至闕下臺城陷後信奔於江陵臺城本吳後苑城晉建康宫城江陵漢南郡江陵是梁元帝承制除御史中丞及即位轉右衛將軍封武康縣侯加散騎侍郎周書作常侍聘於西魏周書作來聘於我以其為一代耑史也今以子山之志故錄是篇若春秋鄭志宋志矣屬大軍南討遂留長安江陵平累遷儀同三司周書云江陵平拜使持節撫軍將軍古金紫光禄大夫大都督尋進車騎大將軍儀同三司周孝閔帝踐阼封臨清縣子周書邑五百戸除司水下大夫出為𢎞農郡守遷驃騎大將軍開府儀同三司司憲中大夫進爵義城縣侯俄拜洛州刺史信為政簡靜吏人安之周書為政簡靜上有多識舊章四字時陳氏與周周書作朝廷通好南北流寓之士各許還其舊國陳氏乃請王襃及信等十數人武帝惟放王克殷不害等周書列傳曰王襃字子淵琅邪臨沂人也美風儀善談笑博覽史傳尤工屬文元帝出降襃與王克劉㲄宗懔殷不害等數十人俱至長安世宗即位篤好文學時襃與庾信才名最髙特加親待帝毎遊宴命襃等賦詩談論常在左右南史列傳曰王克美容貌善容止仕梁厯司徒右長史尚書僕射臺城陷仕侯景位太宰侍中録尚書事景敗克迎候王僧辯僧辯誚克曰王氏百世卿族便是一朝而墜仕陳位尚書右僕射又孝義傳曰殷不害字長卿陳郡長平人也性至孝事老母養小弟勤劇無所不至魏平江陵失母所在時天寒雪凍死者填滿溝壑不害行哭尋求聲不暫輟過見死人溝中即投身捧視舉體凍僵水漿不入口者七日始得母尸即江陵權殯與王襃庾信俱入長安自是蔬食布衣枯槁骨立見者莫不哀之大建七年自周還陳除司農卿位至給事中是陳氏請襃及信在大建七年周武帝之建徳四年也信及褎竝惜而不遣尋徴為司宗中大夫周書武帝紀云保定四年五月丁亥改禮部為司宗明帝武帝周書作世宗髙祖稱其廟號也竝雅好文學信特䝉恩禮至於滕趙諸王滕王逌趙王招也周旋欵至有若布衣之交羣公碑誌多相託焉惟王襃頗與信埒自餘文人莫有逮者周書論曰王襃庾信竒才秀出牢籠于一代是時世宗雅詞雲委滕趙二王雕章間發咸築宫虚館有如布衣之交由是朝廷之人閭閻之士莫不忘味於遺韻眩精于末光猶丘陵之仰嵩岱川流之宗溟渤也然則子山之文發源于宋末盛行于梁季其體以淫放為本其詞以輕險為宗故能誇目侈于紅紫蕩心逾于鄭衛昔楊子雲有言詩人之賦麗以則詞人之賦麗以淫若以庾氏方之斯又詞賦之罪人也按子山少年宫體之作當時習稱徐庾及至晚年又與王襃竝埒而後世無庾王之目若欲品藻斯文子山之作求之六季罕有其儔徐王二家難可提衡矣至其鄉關之文竝多哀思是亦大雅之遺而令狐以為誇目蕩心詞賦之罪殆不然矣信雖位望通顯常作鄉關之思乃作哀江南賦以致其意周書備載其文大象初以疾去職大象周静帝年號隋開皇元年卒有文集二十巻隋開皇元年即周靜帝大定元年也靜帝禪位于隋改元開皇信卒時年六十九嵗按此及滕王序竝稱文集二十巻惟隋書經籍志稱後周開府儀同庾信集二十一巻疑隋平陳以後得揚都之文較滕王本増多一巻也周書卒不紀年亦不記其文集此為較詳矣文帝悼之贈本官加荆雍周書作淮二州刺史子立嗣謝趙王啓云某息荀娘荀娘疑即庾立小字舊唐書賊薛舉傳曰仁杲舉長子也多力善騎射軍中號萬人敵然所至多殺人納其妻妾獲庾信子立怒其不降磔于猛火之上漸割以啖軍士按此知立亦志節之士也原序周滕王逌撰滕王逌周文帝子也周書列傳曰滕聞王逌字爾固突少好經史解屬文武成初封滕國公建徳三年進爵為王六年為行軍總管與齊王憲征稽胡逌破其渠帥穆友等還除河陽總管宣政元年進位上柱國其年伐陳詔逌為元帥節度諸軍事大象元年五月詔以荆州新野郡邑萬户為滕逌出就國明年朝京其年冬為隋文帝所害國除逌所著文章頗行於世按此序大象元年滕王在新野時作所撰止魏周著述不及梁時蓋以太清罹亂江陵兵燹之故今集中多雜南朝舊作又非滕王故本矣序出文苑英華今錄為弁首加注釋焉蓋聞五聲調應則宫徵成其文左傳晏子曰五聲六律杜預注云五聲宫商角徵羽八音克諧則絃管和其韻尚書曰八音克諧周禮大師職云八音金石土革絲木匏竹也所以周南召南之篇為風人之首小雅大雅之作實王政之由子夏詩序曰關睢后妃之徳也風之始也雅者正也政有大小故有大雅焉有小雅焉詩譜曰周召者禹貢雍州岐山之陽地名大雅小雅者周室居西都豐鎬之時也復其英華疑作有陽春白雪之唱郢中之曲彌髙宋玉對問曰客有歌於郢中者其為陽春白雪國中屬而和者不過數十人其曲彌髙其和彌寡秋風黃竹之詞伊上之才尤盛穆天子傳曰天子遊黄臺之丘獵於苹澤有陰雨天子乃休日中大寒北風雨雪有凍人天子作詩三章以哀之曰我徂黄竹員閟寒乃宿於黄竹孔安國曰伊水出陸渾山地理志云伊水出𢎞農盧氏縣東熊耳山東北入洛時穆王都西京故曰伊上遂能𢎞孝敬敘人倫移風俗化天下兼夫吟詠情性沉鬱文章者可畧而言也揚雄為方言劉歆與雄書曰非子雲澹雅之才沉鬱之志不能成此書開府司宗中大夫義成周書作城公庾信字子山南陽新野人也周書武帝紀云保定四年五月改禮部為司宗隋書地理志襄陽郡穀城縣舊曰義城置義城郡又西魏益州有義城郡義城縣庾氏之先本鄢陵人晉世居新野元帝時徙江陵周書北史及此序皆云南陽新野以其本新野人蓋西晉時邑居也注見哀江南賦若夫有周之時掌庾原其得姓皇晉之代太尉闡其宗譜左氏傳曰獻太子之傅庾皮之子過是庾氏得姓之先為掌庾大夫在於有周之時哀江南賦云掌庾承周矣詩大雅甫田曰曾孫之庾又楚茨云我庾維億毛傳曰露積曰庾鄭箋曰庾露積榖也周語曰野有庾積包咸論語注曰十六斗為庾史記文帝紀曰發倉庾應劭曰水漕倉曰庾胡廣漢官解詁曰在邑為倉在野為庾索隱曰郭璞注三蒼云庾倉無屋也或云堯時有掌庾大夫以官命氏按梁元帝庾承先墓誌云悠哉掌庾興自陶唐伯舅居晉連鑣渭陽謂唐堯時已有掌庾至太尉庾亮為晉外戚也晉書曰庾亮字元規明穆皇后之兄咸康六年薨贈太尉亮父琛在外戚傳琛永嘉初為建威將軍過江為㑹稽太守子山八世祖滔亦隨晉元帝過江為散騎常侍且滔未徙江陵之先滔居新野而明穆皇后之族家于鄢陵是太尉亮乃信逺祖之族非其本祖也以其晉世椒房氏族極盛故稱引之云闡其宗譜矣舄奕氤氲布在方策國史家牒世並詳焉班固典引曰舄奕乎干載注蔡邕曰舄奕光曜流行貌吕向曰舄長奕盛也周易曰天地氤氲萬物化生禮記鄭注云方版也策簡也說文曰牒札也八世祖滔散騎常侍領大著作遂昌縣侯晉書地理志遂昌縣屬東陽郡北史庾季才傳云八世祖滔隨晉元帝過江官至散騎常侍封遂昌侯徙居南郡江陵哀江南賦云彼淩江而建國始播遷於吾祖分南陽而賜田裂東岳而胙土誅茅宋玉之宅穿徑臨江之府是滔為徙居江陵一代之祖也梁元帝庾肩吾墓誌云掌庾命族世濟琳琅遂昌開國蟬聨冠冕是也祖易徵士隱遁無悶確乎不拔二語出易宋終齊季早檀英聲南史列傳曰庾易字幼簡新野人也徙居江陵易志性恬靜不交外物齊臨川王映表薦之餉麥百斛易辭不受以文義自樂安西長史袁承欽其風贈以鹿角書格蚌盤蚌硯白象牙筆并贈詩曰白日清明青雲遼亮昔聞巢許今覩臺尚易以速理几竹翹書格報之建武三年詔徵為司空主簿不就卒梁元帝庾肩吾墓誌云父易髙尚其道肥遁居貞關吏早逢夙表真人之氣少微晚映還彰隱士之星哀江南賦亦稱其祖為少微真人天山逸民矣劉氏國號曰宋蕭氏國號曰齊言易在宋齊二代有盛名也父肩吾散騎常侍中書令文宗學府智囊義窟鴻名重譽獨步江南梁書列傳曰庾肩吾字子慎八歲能賦詩特為兄於陵所友愛初為晉安王國常侍王每徙鎮肩吾常隨府厯王府中郎雲麾叅軍並兼記室叅軍中大通三年王為皇太子兼東宫通事舍人除安西湘東王錄事諮議叅軍俄以本官領荆州大中正累遷中錄事諮議叅軍太子率更令中庶子初太子在藩雅好文學時肩吾與東海徐摛等同被接賞及居東宫又開文徳省置學士肩吾子信摛子陵等充其選太清中侯景寇京都及太宗即位以肩吾為度支尚書時上流諸蕃並據州拒侯景景矯詔遣肩吾喻當陽公大心大心尋舉州降賊肩吾因逃入建昌久之方得赴江陵未幾卒文集行於世南史本傳云肩吾字慎之為晉安王國常侍王每徙鎮肩吾常隨府在雍州及奔江陵厯江州刺史領義陽太守封武康侯卒贈散騎常侍中書令餘同梁書梁元帝集中有中書令庾肩吾墓誌銘後漢書崔駰傳贊曰崔為文宗世擅雕龍史記曰秦樗里子號智囊漢書曰晁錯號智囊後漢書曰魯匡王莽時為羲和有術數號智囊晉書曰宣帝舉兵廢曹爽桓範出赴喪宣帝曰智囊往矣又杜預號智囊義窟未詳江南楚地戰國時荆郢間俱稱江南肩吾家本江陵哀江南賦楷模盛於漳濵亦謂江陵也或昭或穆七世舉秀才且珪且璋五代有文集貴族華望盛矣哉七世自滔至肩吾凡七世也五代肩吾肩吾父易易父道驥驥父玫玫父某凡五代也玫父未詳昭穆如父為昭子為穆左傳文之昭也武之穆也詩大雅云如珪如璋令聞令望謝承後漢書曰郭林宗嘆劉儒有珪璋之質南史庾於陵文集十巻隋書經籍志梁度支尚書庾肩吾集十巻其餘文集史或缺文按此知子山以上五代皆有文集也按文苑英華本此下有幼而清惠唯良之美稱共治之能十三字接佩犢帯牛有侔龔遂至王公名貴盡為虛襟接信降山嶽之隆緼烟霞之秀至出為𢎞農守職實剖符寄深分竹下接加以㝠心資敬篤信天倫云云以子山少長爵秩推之明是錯簡今為改正仍存舊本以備叅考信降山嶽之靈英華作隆緼烟霞之秀器量侔瑚璉志性甚松筠論語曰瑚璉也鄭注曰黍稷器夏曰瑚殷曰璉世說曰謝混問羊孚何以器舉瑚璉羊曰故當以為接神之器妙善文詞尤工詩賦窮緣情之綺靡盡體物之瀏亮陸機文賦曰詩緣情而綺靡賦體物而瀏亮誄奪安仁之美碑有伯喈之情箴似揚雄書同阮籍晉書曰潘岳字安仁辭藻絶麗尤善為哀誄之文續漢書曰蔡伯喈為郭林宗作碑曰吾為人作銘未甞不有慚容惟有郭有道碑頌無愧耳後漢書曰初揚雄依虞箴作十二州二十五官箴其九箴亡闕後涿郡崔駰及子瑗劉騊駼増補十六篇胡廣復作四篇名曰百官箴凡四十八篇世說曰魏朝封晉文王為公備禮九錫文王固辭不受公卿將校當詣府敦諭司空鄭中馳遣信就阮籍求文籍時在袁孝尼家醉扶起書札為之無所㸃定乃寫付使時人以為神筆少而聰敏綺年而播華譽齠歲而有俊名孝性自然仁心獨秀忠為令徳言及文詞穿壁未勤映螢愈甚西京雜記曰匡衡字穉圭勤學而無燭隣舍有燭而不逮衡乃穿壁引其光以書映其光而讀之續晉陽秋曰車𦙍字武子南平人𦙍就業恭勤博覽不倦家貧不常得油夏月則練囊盛數十螢火以繼日焉若乃徳聖兩禮韓魯四詩漢書儒林傳曰梁戴徳延君戴聖次君徳號大戴為信都太傅聖號小戴以博士論石渠至九江太守由是禮有大戴小戴之學又曰韓嬰燕人孝文時為博士景帝時至常山太傅嬰推詩人之意而作内外傳燕趙間言詩者由韓生又曰申公魯人也獨以詩經為訓故蘭陵王臧既從受詩已通事景帝為太子少傅免去武帝使安車蒲輪束帛加璧徵魯申公云四詩者漢書藝文志曰漢興魯申公為詩訓詁而齊轅固燕韓生皆為之傳三家皆列于學官又有毛公之學按魯申公齊轅固燕韓生三家加趙人毛公此四詩也志又云詩經二十八巻魯韓齊三家應劭曰申公作魯詩后蒼作齊詩韓嬰作韓詩按此三詩加毛公作毛傳亦四詩也九流七畧之文萬巻百家之說漢書曰九流有儒家流道家流陰陽家流法家流名家流墨家流從横家流雜家流農家流又曰劉歆總羣書而奏其七畧故有輯畧有六藝畧有諸子畧有詩賦畧有兵書畧有數術畧有方技畧博物志曰蔡邕有書近萬巻淮南子曰百家異說各有所出後漢書伏湛傳曰永和元年詔無忌與議郎黄景校定中書五經諸子百家藝術注云中書内中之書也藝文志諸子凡一百八十九家言百家舉其成數也名山海上金匱玉版之書魯壁魏墳縹帙緗囊之記司馬遷報任安書曰僕誠著此書藏諸名山後漢書曰荀爽遭黨錮隱於海上又遁漢濱以著書為事題為新書凡百餘篇任昉王文憲集序云海上名山之旨是也太史公序曰石室金匱之書索隱曰國家藏書之處漢書鼂錯傳曰平陽侯窋等曰刻於玉版藏於金匱後漢書張衡傳曰清河宋景以厯推言水灾偽稱洞視玉版漢書魯恭王傳曰聲恭王好治宫室壊孔子舊宅以廣其宫聞鐘磬琴瑟之遂不敢壊於其壁間得古文經傳王隱晉書束晳傳曰太康元年汲郡民盜發魏安釐王冢得竹書漆字科斗之文有周易上下經二巻紀年十二巻瑣語十一巻周王遊行五巻說穆王遊行天下之事今謂之穆天子傳郭璞穆天子傳序曰太康二年汲縣民不准盜發古塜所得書也汲者戰國時魏地也案所得紀年蓋魏惠成王子今王之塚也於世本蓋襄王也亦見杜預春秋後序梁昭明文選序云詞人才子則名溢於縹囊飛文染翰則巻盈乎緗帙吕向曰縹青白色囊有底袋也用以盛書緗淺黄色也帙書衣也劉熙釋名曰緗桑也如桑葉初生之色也縹猶漂漂淺青也有碧縹有天縹有骨縹各以其色所象言之也莫不窮其枝葉誦其篇簡言以上諸書皆能窮究也豈止仲任一見之敏世叔五行之速後漢書曰王充字仲任會稽上虞人也家貧無書常游洛陽市肆閱所賣書一見輒能誦憶遂博通衆流百家之言又曰應奉字世叔汝南南頓人也少聰明自為童兒及長凡所經履莫不暗記讀書五行俱下强記獨絶博物不羣年十五侍梁東宫講讀為梁昭明太子東宫講讀也時梁武帝大通元年哀江南賦云王子濵洛之歲蘭成射䇿之年始含香於建禮仍矯翼於崇賢是東宫講讀時年十五矣雖桓驎十四之歲答宿客之詩文士傳曰桓驎伯父烏官至太尉驎年十四在座烏告客曰吾此弟子知有異才殊能作詩賦客乃作詩曰甘羅十二楊烏九齡昔惟二子今則桓生驎即應聲答曰邈矣甘羅超等絶倫伊彼楊烏命世稱賢嗟予蠢弱殊才偉年仰慙二子俯愧過言魯連十二之年杜堅離之辨魯連子曰齊辯士田巴服徂丘議稷下毁五帝罪三王服五霸離堅白合同異一日服千人有徐劫者其弟子曰魯仲連年十二號千里駒往請田巴曰臣聞堂上不奮郊草不芸白刃交前不救流矢急不暇緩也今楚軍南陽趙伐髙唐燕人千萬聊城不去國亡在旦夕先生奈之何若不能者先生之言有似梟鳴出城而人惡之願先生勿復言田巴曰謹聞命矣巴謂徐劫曰先生乃飛也豈直千里駒巴終身不談匪或斯尚同日語哉言桓驎魯連二子不是過也玉墀射䇿髙等甲科公孫金馬之時仲舒鴻漸之日未能連類曾何足云漢書曰匡衡射策甲科以不應令除為太常掌故師古曰儒林傳說歲課甲科為郎中乙科為太子舍人丙科補文學掌故又漢書曰公孫𢎞拜為博士待詔金馬門揚雄解嘲云公孫創業於金馬是也漢書贊曰公孫𢎞卜式兒寛皆以鴻漸之翼困於燕雀又云儒雅則公孫𢎞董仲舒兒寛解褐授安南府行㕘軍尺木未階髙衢方騁呉志太史慈傳注云孫策出教曰龍欲騰翥先階尺木王粲登樓賦曰假髙衢而騁力尋轉尚書度支郎中壯歲精練必以吏能上象列宿非因忿氣漢官典職云尚書郎初從三署詣臺試初上臺稱守尚書郎中歲滿稱尚書郎三年稱侍郎凡三十三人選吏能者為之華嶠後漢書曰館陶公主為子求郎不許賜錢千萬明帝謂羣臣曰夫郎中上應列宿出守百里茍非其人則民受其殃夜不離閣無愧於黄香開霧覩天有同於樂廣後漢書曰黄香字文彊江夏安陸人也甞獨止宿臺上晝夜不離省闥王隱晉書曰樂廣字彦輔南陽淯人也為尚書令衞瓘見而奇之命諸子造焉曰每見此人瑩然若開雲霧覩青天仍為郢州别駕刺史之半驥足斯展郢州漢之江夏吳曰武昌是也隋志江夏郡舊置郢州庾亮答郭豫書曰别駕舊與刺史别乗同宣王化於萬里者其任居刺史之半安可任非其人蜀志呉將魯肅遺先主書曰龎士元非百里才也使處治中别駕之任始當展其驥足耳於時江路有賊梁先主使信與湘東王論中流水戰事醜徒聞其名徳遂即散奔深為梁主所賞南史武帝紀云大同八年春安城郡人劉敬躬挾左道以反江州刺史湘東王繹遣中兵曹子郢討擒之送於都斬之建康市哀江南賦云論兵於江漢之君是也先主梁武帝也梁書云天監十三年立皇子繹為湘東王蓋善戰者不陣此之謂乎榖梁傳曰善師者不陣善陣者不戰注云帥衆素嚴不須耀軍列陣也兼通直常侍使於魏土接對有才辯本傳聘於東魏文章辭令甚為鄴下所稱賦云拭玉於西河之主是也雖子貢之旗鼓陳說仲山之專對智謀無以加也史記曰端木賜衛人字子貢利口巧辭一出存魯亂齊破吳彊晉而霸越韓詩外傳曰孔子逰於景山之上子路子貢顔淵從孔子曰登髙必賦小子願言者何其願丘將啓汝子貢曰兩國構難壯士列陣塵埃漲天賜不持一尺之兵一斗之糧解兩國之難用賜者存不用賜者亡孔子曰辯士哉詩大雅蒸民云保兹天子生仲山甫又曰王命仲山甫式是百辟出納王命王之喉舌賦政于外四方爰發肅肅王命仲山甫將之邦國若否仲山甫明之毛傳曰仲山甫樊侯也還本國為正員郎職位清顯以望以實又為東宫領直春宫兵馬竝受節度龍樓蘭錡寵寄逾隆本傳云為東宫學士哀江南賦云遂崇文而㑹武又有掌兵典午之詞知東宫領直節度兵馬故簡文帝命信率宫中文武千餘人是其任兼文武者也漢書成帝紀曰上常急召太子出龍樓門張晏曰門樓上有銅龍若白鶴飛廉之為名也西京賦曰武庫禁兵設在蘭錡值侯景簒逆攻圍淮海建康宫殿非無流矢之兵丹陽帝居遂有生荆之痛梁書武帝紀云太清二年侯景陷建業三年臺城陷五月武帝崩簡文帝即位改元為大寳元年冬十月侯景逼帝幸西州曲宴自加宇宙大將軍都督六合諸軍事二年廢帝為晉安王矯帝詔以為次當支庶宜歸正嫡禪位於豫章王棟使吕季畧令帝寫之帝書至先皇念神器之重思社稷之固越升非次遂主震方嗚咽不能自止賊衆皆為掩泣乃幽帝於永福省冬十月帝崩景以辛未年十一月十九日簒位建康梁之所都漢之丹陽郡也隋志丹陽郡江寧梁置丹陽郡及南丹陽郡有秣陵建康同夏三縣禮記曰魯莊公及宋人戰於乗丘縣賁父御馬驚敗績縣賁父死之圉人浴馬有流矢在白肉公曰非其罪也遂誄之淮南子曰白刃合流矢接吕氏春秋云子胥曰嗟乎吳朝必生荆棘矣漢書伍被曰臣今見宫中生荆棘出徃上流來歸全楚本傳侯景作亂梁簡文帝命信率宫中文武千餘人營於朱雀航及景至信以衆先退臺城陷後信奔於江陵江陵楚地漢書項籍傳曰古之王者地方千里必據上㳺文頴曰水之流上㳺或作流漢書音義曰舊名江陵為南楚吳為東楚彭城為西楚時元帝承制江陵統屬三楚故云來歸全楚於時州后即湘東王梁元帝也時元帝承制江陵其後封豕既誅長蛇受戮湘東有雪恥之功淮海有勤王之旅同少康之復夏若太戊之紹殷即於荆江驟置文物梁書元帝紀云大寶二年十月簡文帝崩王僧辯等奉表勸進帝不許而四方表勸前後相屬乃下令斷表承聖元年二月王僧辯衆軍發自潯陽帝馳檄四方購獲景封萬戸開國公絹布五萬疋三月僧辯等平景傳首江陵斬賊左僕射王偉於江陵市四方征旗王公卿士復勸進乃許之即位於江陵左氏傳曰吳為封豕長蛇流災上國封豕喻侯景也湘東雪恥謂平侯景也淮海勤王謂王僧辯等軍也左傳狐偃曰求諸侯莫如勤王又哀元年伍員謂吳子曰昔有過澆滅夏后相后緡方娠逃出自竇歸於有仍生少康焉逃奔有虞有田一成有衆一旅以收夏衆遂滅過戈復禹之績史記曰殷道衰諸侯或不至帝太戊伊陟為相殷復興諸侯歸之故稱中宗復為梁後主蕭繹御史中丞繹梁元帝諱也本傳元帝承制除御史中丞晉書職官志曰御史中丞本秦官也秦時御史大夫有二丞其一御史丞其一為中丞中丞外督部刺史内領侍御史受公卿奏事舉劾按章漢因之元夀二年御史中丞為臺主厯漢東京至晉因其制以中丞為臺主中興司直具瞻斯在詩云邦之司直又云民具爾瞻貴戚斂手豪族屏氣後漢書曰鮑永為司𨽻校尉鮑恢為都官從事帝曰貴戚且宜斂手以避二鮑謝承後漢書曰吳郡王閎為冀州刺史不畏豪族後漢書曰李膺拜司𨽻校尉諸黄門常侍皆鞠躬屏氣遷散騎常侍右衛將軍豐貂右弭戎章再徙應劭漢官儀曰侍中金蟬右貂貂取内勁悍而外温潤王隱晉書曰顧凱之拜散騎常侍表云不悟陛下聖思所加登之常伯之列飾以貂璫之暉戎章再徙謂為右衛將軍也阮籍非好之職鄭黙參乗之官晉書阮籍傳曰髙貴鄉公即位封關内侯散騎常侍籍本有濟世志屬晉魏之際天下多故名士少有全者籍由是不與世事遂酣飲為常又鄭黙傳曰黙為散騎常侍武帝出祀南郊詔使鄭黙驂乗著徳廊廟切問近對史記曰賢人深謀於廊廟爾雅曰室有東西廂曰廟犍為舍人曰殿有東西小堂也蔡質漢儀曰侍中常伯切問近對喻㫖公卿拜武康縣開國侯晉書地理志云吳興郡武康縣故防風氏國開國承家信圭是執河帶山礪貽厥於后謂肩吾封武康縣侯子山襲父爵也周易師卦云大君有命開國承家周禮諸侯之禮執信圭漢書功臣表封爵之誓曰使黄河如帶泰山若礪國以永存爰及苗裔應劭曰帶衣帶也礪砥礪也即以本官奉使大國謂聘西魏也光華重出原隰再來詩云皇皇者華于彼原隰太祖夾輔魏朝作相關右太祖周太祖宇文泰魏之安定公也髙歡之亂太祖奉帝都長安故曰作相關右三分有二九合一匡出論語徳邁晉宣雄踰魏武晉宣帝司馬懿魏武帝曹操也謂周太祖將有魏室功業過於晉魏二君也功髙網地道映在田呂氏春秋曰湯見祝網者置四面湯收其三面置其一面漢南之國聞之曰湯之徳及禽獸矣四十之國歸之人置四面未必得鳥湯去其三面以網其國四十非徒網鳥也易曰見龍在田利見大人君徳也亦見子山賜職如舊屬我太祖獻策魏帝命將荆衡謂平江陵也元帝紀云先是魏使宇文仁恕來聘帝接仁恕有闕魏相安定公憾焉使于謹來攻是江陵之師為周太祖獻䇿也安定公周太祖也尋值本朝青蓋入洛續漢志曰王車朱班輪青蓋左右騑駕三馬本朝謂周也時未受禪爲王爵故曰青蓋於是拾節入仕乃沐霸恩改授使持節車騎大將軍儀同三司戎號光隆比儀台鉉天文志有三台周易云鼎玉鉉髙官美宦有踰舊國舊國謂梁也莊子曰舊都舊國又遷驃騎大將軍開府義城公王沉晉代始受此榮黄權魏時首膺斯命晉書曰王沉字處道太原晉陽人也武帝受禪以使命之勲轉驃騎將軍進爵為公蜀志曰黄權字公衡巴西閬中人也先主以權為鎮北將軍督江北軍以防魏師先主自在江南及吳將軍陸議乗流斷圍南軍敗績先主引退而道隔絶權不得還故率將所領降於魏景初三年權遷為車騎將軍儀同三司降在季世秩居上品爵為五等榮貴兩朝晉書職官志曰開府儀同三司漢官也殤帝延平元年鄧騭為車騎將軍儀同三司儀同之名始自此也及魏黄權以車騎將軍開府儀同三司開府之名起於此也驃騎車騎將軍開府者皆為位從公諸公及開府位從公者品秩第一五等公侯伯子男也兩朝謂魏周也出為𢎞農郡守職實剖符寄深分竹本傳云周孝閔踐阼封臨清縣子除司水下大夫出為𢎞農郡守隋志云河南陜縣後魏置陜州𢎞農郡又志稱𢎞農郡𢎞農舊置西恒農郡後周廢漢書文帝紀曰初與郡守為銅虎符竹使符張晏曰符以代古之圭璋從簡易也師古曰與郡守為符者謂各分其半右留京師左以與之佩犢帶牛有侔龔遂漢書曰龔遂為渤海太守躬率以儉約勸民務農桑民有帶持刀劍者使賣劍買牛賣刀買犢曰何為帶牛佩犢春夏不得不趨田畆秋冬課收斂益畜果實菱芡勞來循行郡中皆有畜積吏民皆富實訟獄息止桑枝麥穗無謝張堪後漢書曰張堪字君游光武時為漁陽太守捕擊八姦猾賞罰必信吏民皆樂為用乃於狐奴開稻田千餘頃勸民耕種以致殷富百姓歌之曰桑無附枝麥穗兩岐張君為政樂不可支入為司憲中大夫帥掌三勑之法助宣五禁之書秋府得人於斯為盛易曰君子以明罰勑法三勑疑作三刺禮記曰司寇正刑明辟以聽獄訟必三刺鄭注一曰訊羣臣二曰訊羣吏三曰訊萬民周禮司刺掌三刺三宥三赦之法又曰士師掌國之五禁之法以左右刑罰一曰宫禁二曰官禁三曰國禁四曰野禁五曰軍禁皆以木鐸狥之於朝書而懸於門閭秋府謂司憲大夫即古秋官司寇之職也嘗正旦上府賦詩曰詰旦啓門闌繁辭擁筆端蒼鷹下獄吏獬豸飾刑官司朝引玊節盟載捧珠盤窮紀星移次歸餘律未殫雪髙三尺厚冰深一丈英華作寸寒短筍猶埋竹香心未起蘭孟門久失路扶摇忽上摶栖烏還得府棄馬復歸欄榮華名義重虚薄報恩難枚乗還起疾貢禹遂彈冠方垂蓮葉劍未用竹根丹一知懸象法詎思垂釣竿注見第四巻詩集其王事之中優游如此出為洛州刺史隋志河南洛陽後魏置司州東魏置洛州後周置東京六府總管徳茂褰帷才膺刺舉後漢書曰賈琮為冀州刺史舊典傳車驂駕垂赤帷裳迎于州界及琮之部升車言曰刺史當逺視廣聽糾察美惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風自然竦震其諸臧過者望風解印綬去漢官儀曰刺舉州事吏不敢賄人不忍欺後漢書曰楊震為荆州刺史知其民王密舉為茂才除昌邑縣令震改為東萊太守路經舊徑密夜懐金十金奉公公不受密曰無知莫若夜公曰天知神知我知汝知何謂無知漢書曰韓延夀為束郡守民不忍欺上洛童兒如逢郭伋商山故老似值劉𢎞後漢書曰郭伋在并州素結恩徳及後入界所到縣邑老㓜相攜始至行部到西河美稷有兒童數百各騎竹馬道次迎拜伋辭謝之及事訖諸兒復送至郭外問使君何日當還伋謂别駕從事計日當告之行部既還先期一日伋為違信於諸兒遂止於野亭須期乃入晉書曰劉𢎞字和季沛國相人也有幹畧政事之才太安中使持節南蠻校尉荆州刺史又為鎮南將軍都督荆州諸軍事討斬張昌悉降其衆𢎞勸課農桑寛刑省賦嵗用有年百姓愛悅位至車騎將軍開府𢎞子璠為順陽内史江漢之間翕然歸心父老追思𢎞雖甘棠之詠召伯無以過也言子山在洛如郭伋之治并州劉𢎞之鎮襄陽也上洛商山皆洛州地漢書𢎞農郡有上洛縣四皓隱於商山復為司宗中大夫總轄禮府佐治春卿辨九拜之儀教六詩之義周禮宗伯禮官之職云辨九􅉔一曰稽首二曰頓首三曰空首四曰振動五曰吉􅉔六曰凶􅉔七曰竒􅉔八曰褎􅉔九曰肅􅉔以享右祭祀􅉔音拜又云教六詩曰風曰賦曰比曰興曰雅曰頌謂司宗大夫即古宗伯禮官之職是為春官故云禮府春卿矣自梁朝筮仕周世驅馳至今嵗在屠維龍居淵獻春秋六十有七爾雅曰太嵗在已曰屠維在亥曰大淵獻蓋巳亥年也嵗陽在已謂嵗干也嵗陰在亥謂嵗支也時周静帝大象元年已亥嵗也隋開皇元年辛丑信卒年六十九嵗齒雖耆宿文更新竒才子詞人莫不師教王公名貴盡為虚襟加以㝠心資敬篤信天倫孝實人師刑推士則世說曰陳仲舉言為士則行為世範愠喜不形於色忠恕不離於懐世說王戎云與嵇康居二十年未嘗見其喜愠之色忠恕見論語矜簡儼然師心獨往似陸機之愛弟若韓康之養甥晉書曰陸機字士衡弟雲字士龍又曰韓伯字康伯潁川長社人為殷浩甥浩素賞愛之小園賦云韓康則舅甥不別是也此云韓康養甥當是康伯之甥按康甥卞鞠世說曰韓康伯母殷卞鞠是其外孫又曰韓康伯母隱古几毁壊卞鞠見几惡欲易之答曰我若不隱此女何以得見古物以韓伯字康伯故曰韓康與後漢逸民韓伯休為異也環堵之間怡怡如也禮記曰環堵之室屢聘上國特為太祖所知江陵名士惟信而巳綢繆禮遇造次推恩明帝守文偏加引接武皇英主彌相委寄本傳世宗髙祖竝雅好文學信特䝉恩禮密勿王事多厯嵗年自攜老入關亟移灰琯晉書樂志曰取𢎞農宜陽金門竹為琯河内葭莩為灰以候氣氣至者灰去烝烝色養勤同扇席尚書曰克諧以孝烝烝又弗格姦潘岳閒居賦曰尚能違膝下色養而屑屑從斗筲之役乎晉書曰王延事親盡色養夏則扇席冬則以身温被及丁母憂杖而後起病不勝哀青鸞降宿樹之祥白雉有依欄之感謝承後漢書曰方儲字聖明㓜喪父事母母終自負土成墳種竒樹千株鸞鳥止其上續漢書曰申屠蟠陳留外黄人九嵗喪父哀毁過禮廬於塚側致甘露白雉之祥晉國公廟期受託為世賢輔周書云晉蕩公䕶字薩保太祖之兄邵惠公顥之少子也太祖西巡至牽屯山遇疾馳驛召䕶䕶至涇州見太祖而太祖疾已綿篤謂䕶曰吾形容若此必是不濟諸子幼小寇賊未寧天下之事屬之於汝宜勉力以成吾志䕶涕泣奉行至雲陽而太祖崩䕶秘之至長安乃發喪時嗣子沖弱彊寇在近人情不安䕶綱紀内外撫循文武於是衆心乃定孝閔踐阼拜大司馬封晉國公見信孝情毁至毎日憫嗟嘗語人曰庾信南人羈士至孝天然居喪過禮殆將滅性禮記喪服制曰毁不滅性不以死傷生也孝經曰毁不滅性聖人之教也寡人一見遂不忍看其至徳如此被知亦如此昔在揚都有集十四巻值太清罹亂百不一存及到江陵又有三巻即重遭軍火一字無遺今之所撰止入魏巳來爰洎皇代凡所著述合二十巻分成兩帙附之後爾按此及北史皆云文集二十巻惟隋書經籍志稱二十一巻集中詩賦多雜梁時舊作疑是平陳後所得増多一巻且今所貽留亦非滕王故本大抵建業之文猶有存者而江陵軍火無遺一字矣余與子山夙期欵密本傳滕趙諸王周旋欵至知滕王與子山其交最為欵密也情均縞紵契比金蘭左氏傳曰吳公子札聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉易繫辭曰二人同心其利斷金同心之言其臭如蘭欲予製序聊命翰札幸無愧色非有絢章方當貽範搢紳懸諸日月焉後漢書曰郭泰卒同志者乃共刻石立碑蔡邕為文既而謂涿郡盧植曰吾為碑銘多矣皆有慙徳惟郭有道無愧色耳馬融論語注曰絢文貌司馬相如封禪書曰因雜搢紳先生之畧術臣瓚曰搢赤白色紳大帶揚雄答劉歆書曰張伯松不誦雄之文然亦有以竒之曰是懸諸日