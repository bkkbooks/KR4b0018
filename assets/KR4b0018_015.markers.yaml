  - {type: variant, offset: 0, length: 1006, content: 欽定四庫全書庾子山集巻十三周庾信撰錢塘倪璠纂註碑文陜州𢎞農郡五張寺經藏碑隋書地理志云河南郡陜縣後魏置陜州𢎞農郡周明帝紀云二年春於𢎞農置陜州庾信本傳云出為𢎞農守此篇及下温湯碑皆為𢎞農太守時作也五張者張元高子兄弟五人捨宅為寺故以為名寺者寺本華題釋名曰寺嗣也謂治事者相嗣續於其内也故天子有九寺僧史略云鴻臚寺本禮四夷逺國之邸舎尋令别擇洛陽西雍門外蓋一精舎以白馬䭾經來故用白馬為題本是司名西僧乍來權止公司移入别居不忘其本還標寺號經者梵音素怛囕或蘇怛囉者華言線蓋取貫穿攝持義也又梵云脩多羅或脩妬路者秦言契謂上契理下契根故言經者具三義謂久通由也肇云經常也謝靈運云經者由也律也通也謂言由理生理由言顯學者神悟從理教而通矣藏者梵云俱舎或云比咤或云摘迦此翻為藏經律論謂之三藏又辟攴佛藏菩薩藏聲聞藏名三藏又阿含毗尼阿毗曇為三藏四教義稱阿含即定藏毗尼即戒藏阿毗曇即慧藏藏者攝也謂攝人攝法故包含攝持之義時寺主法映及洛州刺史張隆等於寺中造一切法輪子山出守此邦逢兹佛㑹遂相請託有此碑文也蓋聞如来說法萬萬恒沙如来佛號佛有十種名稱功徳如来十號之一也梵云多陀阿伽陀亦云怛闥阿竭後秦翻為如来恒沙喻多也維摩經曰名為多陀阿伽度肇曰秦言如来亦云如去如法而来如法而去古今不改千聖同轍故名如来亦名如去什曰多陀阿伽度秦言如来亦言如去如法知如法説故名如也諸佛以安隱道来此佛亦如是来彼佛安隱去此佛亦如此去也竺道生注曰如者謂無復有如之理從此中来故曰如来謝靈運金剛般若經注曰諸法性空理無乖異謂之為如會如解故名如来維摩經曰佛以一音演説法衆生隨類各得解法華經曰佛以恒河沙等三千大千世界為一佛土又曰其數如恒沙又曰爾時他方國土諸来菩薩過八恒河沙數於大衆中合掌作禮而白佛言我等於佛滅後在此娑婆世界䕶持經典當於此土而廣説之佛言不須汝等䕶持此經我娑婆世界自有六萬恒河沙菩薩一一菩薩多有六萬恒河沙眷屬能於我滅後䕶持誦讀廣說此經佛說是時娑婆世界三千大千國土地皆振裂而於其中有無量千萬億菩薩同時涌出身皆金色三十二相無量光明先盡在此娑婆世界之下虚空中住聞佛所説音聲從下發来一一菩薩皆大衆唱導之首各將六萬恒河沙眷屬如是等比無量無邉算數譬喻所不能知又曰我説是如来夀命長逺時六百八十萬億那由他恒河沙衆生得無生法忍四四天下微塵數菩薩四生當得阿耨多羅三藐三菩提按恒沙喻如一佛國恒河沙數乃至如四四天下微塵數言如来説法菩薩四衆䕶持經典如萬萬佛國恒河沙數之多也菩薩轉輪生生世界菩薩梵語具足云菩提薩埵此云覺有情從, SBCK: ''}
