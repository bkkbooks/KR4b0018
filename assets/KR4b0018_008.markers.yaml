  - {type: variant, offset: 482, length: 38436, content: 在數崔氏以雩為常祭九也隋書禮儀志曰祭天之數終歲有九圜丘三年一行若圜丘之年祭天有九若天不通圜丘之祭終歲有八此則鄭學之所宗也一云惟有昊天無五精之帝而一天歲二祭壇位一圜丘之祭即是南郊南郊之祭即是圜丘日南至於其上以祭天春又一祭以祈農事謂之二祭無别天此則王學之所宗也梁陳以降議者各宗所師故郊丘互有變易自晉太始二年竝圜丘於南郊云王鄭異學各宗所師者王肅難鄭以為郊即圜丘圜丘即郊按圜丘配以帝嚳南郊配以后稷郊丘本異何得混而為一又王肅引郊特牲文以難鄭以為周郊日以至與圜丘同配后稷先儒引鄭注以魯禮無冬至祭天圜丘之事故以建子之月郊天周衰禮廢儒者見周禮盡在魯因推魯禮以言周郊特牲文是魯禮非周郊也禮疏言之甚悉且祭法云周人禘嚳而郊稷明是稷卑於嚳故丘大於郊若郊丘同配后稷則祭法直云周人禘稷而郊稷矣何緣更配帝嚳乎知其肅之妄也隋書禮儀志曰後周憲章姬周祭祀之式多依儀禮司量掌為壇之制圜丘三成崇一丈二尺深二丈上徑六丈十有二階每等十有二節在國陽七里之郊圜壝徑三百歩内壝半之方一成下崇一丈徑六丈八尺上崇五尺方四丈八方方一階階十級級一尺南郊為方壇於國南五里其崇一丈二尺其廣四丈其壝方百二十歩内壝半之按此知圜丘與南郊為二與周禮同然爾雅云非人為之丘泰壇則人功所作圜丘與泰壇别謂之丘者凡地上之丘皆可祭焉無常處今後周圜丘有壇在國陽七里之郊南郊之壇在國陽五里各有常處俱從人功為異于古也又隋書禮儀志曰後周圜丘及南郊並正月上辛按周禮冬日至于地上之圜丘不用正月上辛不知此正月上辛之日先往圜丘後往南郊乎此又異於姬周之處也隋書所志豈其誤耶依周禮鄭氏之義圜丘宜用冬日至從周禮之文也南郊宜用夏正建寅之月從郊特牲所謂郊之祭迎長日之至是也若用王肅之說如郊即圜丘等語則郊祭亦在建子之月至建寅月又祈穀郊祭亦非並用正月上辛後周之制一遵周禮必申鄭義且郊丘既别不從王肅偽學其禮儀憲章漢魏以来所未曽有故上辛之說疑其誤矣又隋書禮儀志曰後周圜丘則以其先炎帝神農氏配昊天上帝於其上周書帝紀曰其先出自炎帝神農氏為黃帝所滅子孫遯居朔野有葛烏莵者雄武多算略鮮卑慕之奉以為主遂總十二部落世為大人其後曰普回因狩得玉璽三紐有文曰皇帝璽普回心異之以為天授其俗謂天曰宇謂君曰文因號宇文并以氏焉是其系出炎帝之事也姬周圜丘以帝嚳配昊天上帝後周圜丘以神農配昊天上帝逺祖之尊以配逺尊天帝一依古制矣昭夏降神夏昭夏詩篇歌之則為樂章周禮有三夏九鄭注所謂樂章名也大司樂云凡樂事大祭祀宿縣遂以聲展之王出入則令奏王夏尸出入則令奏肆夏牲出入則令奏昭夏鄭注云三夏樂章名鍾師云凡樂事以鐘鼓奏九夏王夏肆夏昭夏納夏章夏齊夏族夏裓夏驁夏鄭注云以鐘鼓者先擊鐘次擊鼓以奏九夏夏大也樂之大歌有九載在樂章樂崩亦從而亡是以頌不能具後周本之而作昭夏皇夏雍夏其即姬周三夏之遺與重陽禋祀大報天馬融廣成頌曰超荒忽出重陽章懐太子注云重陽天也周禮大宗伯曰以禋祀祀昊天上帝鄭注云禋之言煙周人尚臭煙氣之臭聞者左氏傳曰以致其禋祀杜注云禋敬也又隠十一年注云潔齊以享謂之禋禮記郊特牲云大報天而主日也祭義亦云大報天矣丙隋書作景午封壇肅且圜丙午在南方言其在國之陽也鄭氏之義丙取其炳明午取其鄂布也隋書禮儀志云後周司量掌為壇之制圓壝徑三百歩内壝半之孤竹之管雲和絃周禮曰孤竹之管雲和之琴瑟冬日至于地上之圜丘奏之神光未下風肅然神光言神之光采也宣帝紀曰薦鬯之夕神光交錯封禪書曰神君最貴者太乙其佐曰太禁司命之屬皆從之不可得見聞其言言與人音等時去時来来則風肅然言天帝之神未嘗下而其風肅然如至也王城七里通天臺隋書禮儀志稱後周圜丘在國陽七里之郊故云王城七里張衡東京賦曰然後以建王城今云王城後周所都長安也漢書武帝紀曰元封二年作甘泉通天臺師古曰言此臺高上通于天也漢舊儀云高三十丈望見長安言圜丘在長安七里築壇之高若漢通天臺也紫㣲斜照影徘徊禮記正義曰冬至祭昊天上帝者春秋緯云紫㣲為天帝北極耀廹寳是也其配之人曰帝嚳故祭法云周人禘嚳樂叶徴圖曰天宫紫㣲北極天一太一史記封禪書索隠注云春秋合誠圖曰紫微大帝室太一之精也漢書樂志曰神裴回若留放裴回與徘徊字同連珠合璧重光来後漢書天文志曰三皇邁化協神純樸謂五星如連珠日月如合璧化由自然民不犯慝亦見竹書紀年天策蹔轉勾陳開左氏傳曰天策焞焞杜預曰天策傅說星天文志曰勾陳六星在紫宫中鈎陳口中一星曰天皇大帝其神曰耀廹寳主御神靈執萬神圖皇夏皇帝入門將周禮王出入則奏王夏釋曰王出入謂王祭祀入廟門升祭訖出廟門皆令奏王夏也按姬周承二王之後天子稱王故云王夏秦兼稱皇帝漢魏以来因之不改皇帝出入得稱皇夏矣旌廻外壝蹕靜郊門爾雅曰注旄首曰旌郭注云載旄於竿頭如今之幢亦有旒周禮凡祭祀社壝用瓦罍鄭注云壝謂委土為墠壇所以祭也旌廻外壝者言旌旗廻繞於壇壝也云外壝者壝有外壝内壝所謂圓壝徑三百歩内壝半之是也周禮曰大祭祀設門燎蹕宫門廟門鄭司農云蹕謂止行者清道若今時儆蹕云郊門者言圜丘在國陽七里之郊也千乗按轡萬騎雲屯蔡邕獨斷大駕備千乗萬騎東都賦千乗雷動萬騎紛紜濟曰千乗萬騎天子法駕也藉茅無咎掃地惟尊易曰藉用白茅无咎郊特牲曰掃地而祭於其質也又禮器云禮有以下為貴者至敬不壇掃地而祭正義曰至敬不壇掃地而祭者謂祭五方之天燔柴於壇下掃地而設正祭此周法也然特牲謂郊天之祀禮器指五方之天至於圜丘為地上之丘祭無常處愈尊愈質今後周既已築壇則燔柴在壇正祭於地擬于夏正郊天五方迎氣矣揖讓展禮衡璜節歩周禮天官玉府云共王之服玉佩玉珠玉鄭注引詩傳曰佩玉上有葱衡下有雙璜衡牙蠙珠以納其間釋文云珩音衡佩上玉也半璧曰璜星漢就列風雲相顧河圖括地象曰河精上為天漢言星漢如就列位風雲流行若相顧盻也取法於天降其永祚昭夏俎入奏取周禮牲出入則昭夏之義也日至大禮豐犧上辰日至日南至也周禮大司樂云冬日至於地上之圜丘奏之是也後周禮儀若依隋志所云用正月上辛則此日至謂長日之至郊特牲云迎長日之至也按禮昊天上帝之神必於冬至以天是陽冬至一陽生還於陽生之日祭之周禮鄭注禮天以冬至謂天皇大帝在北極者也又鄭注郊特牲文云三王之郊一用夏正建寅之月迎長日者建卯而晝夜分分而日長也然彼是郊祭非圜丘也圜丘之祭必用冬至以隋志有後周並用正月上辛之文故兩述之大禮謂圜丘之祭禘之最大者也鄭康成曰犧純黒色也周禮馮相氏云十有二辰釋云謂子丑寅卯之等十有二辰也豐犧言犧牛豐美也上辰言上吉之辰也牲牢脩牧繭栗毛純禮記曰祭天特牲又王制曰祭天地之牛角繭栗漢書郊祀歌曰牲繭栗粢盛香師古曰繭栗言角之小如繭及栗之形也信南山之詩曰執其鸞刀以啓其毛取其血膋箋云毛以告純也楚語曰觀射父云毛以示物韋昭曰物色是毛以告純俎豆斯立陶匏以陳論語子曰俎豆之事則嘗聞之矣孔安國云俎豆禮器郊特牲云器用陶匏以象天地之性也大報反命居陽兆日郊特牲曰大報天而主日也兆於南郊就陽位也鄭注云大猶徧也天之神日為尊日太陽之精也六變鼓鐘三和琴瑟周禮大司樂云凡樂圜鐘為宫黃鐘為角太簇為徵姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降俎竒豆偶惟誠惟質禮記郊特牲云鼎俎竒而籩豆偶隂陽之義也正義曰鼎俎竒者聘禮牛一羊二豕三魚四腊五腸胃六膚七鮮魚八鮮腊九也是鼎九其數竒也正鼎九鼎別一俎俎亦九也又少牢陳五鼎特牲三鼎皆是鼎俎竒也籩豆偶者掌客云上公豆四十侯伯三十二子男二十四又禮器云天子之豆二十有六諸公十有六諸侯十有二大夫八下大夫六案禮籩與豆同是籩豆偶也云誠質者郊特牲曰用犢貴誠也又云掃地而祭於其質也漢書郊祀志曰貴誠尚質不修其文也昭夏奠玉帛玉此言禮神之帛也圓玉已奠蒼幣斯陳瑞形成象璧氣含春周禮以蒼璧禮天又云皆有牲幣各放其器之色鄭注云此禮天以冬至謂天皇大帝在北極者也禮神者必象其類璧圜象天也爾雅云肉倍好謂之璧是圜者為璧故云圓玉蒼璧禮天幣從其色故云蒼幣瑞形成象者以圓璧為瑞玉其形類天象也璧氣含春者春為蒼精祭天用蒼璧蒼是東方之色故云含春也禮從天數智總圓神禮從天數亦謂牲幣之類智總圓神謂璧之圜也易曰蓍之徳圓而神卦之徳方以智為祈為祀至敬咸遵郊特牲鄭注曰祈猶求也謂祈福祥求永貞也漢書郊祀志曰洪範八政三曰祀祀者所以昭孝事祖通神明也皇夏皇帝升壇七里是仰八陛有慿七里即隋志所稱後周圜丘在國陽七里之郊是也八陛謂壇也司馬彪續漢書祭祀志云壇有八陛通道以為門三輔黃圖曰上帝壇八觚神道八通廣三十歩也按周禮疏稱圜丘者爾雅土之高者曰丘取自然之丘圜者象天圜既取丘之自然則未必要在郊無問東西南北方皆可後周圜丘在國陽七里是定於南方祭有常處矣其為壇之制崇髙階級各有丈尺雖與郊壇劃然為二亦失自然為丘之義七里八陛乃是後周圓壝非古姬周之圜丘也就陽之位如日之升就陽位也郊特牲文鄭注云日太陽之精也如日之升小雅天保之辭也箋云日始出而就明也此言皇帝升壇亦如日就陽位初升時也故引天保之詩云如日矣思䖍肅肅致敬繩繩周頌雝篇云至止肅肅大雅思齊云肅肅在廟爾雅曰肅肅敬也又云恭也大雅抑篇云子孫繩繩爾雅曰繩繩戒也漢書郊祀歌曰繩繩意變備得其所應劭曰繩繩謹敬更正意也祝史陳信𤣥象斯格左氏傳曰其祝史陳信於鬼神無愧辭𤣥象天象也易曰天𤣥而地黃蒼𤣥是天色言以誠格天也惟類之典惟靈之澤幽顯對揚人神咫尺左氏傳曰敢對揚天子之丕顯休命又曰天威不違顏咫尺杜預曰言天鑒察不逺威嚴常在顏面之前八寸曰咫正義曰賈逵亦云八寸曰咫說文云周制寸尺咫尋皆以人之體為法中婦人手長八寸謂之咫周尺也雲門舞皇帝初獻作雲門之舞曰周禮雲門之舞冬日至圜丘奏之禮又以樂舞教國子雲門大巻鄭注云此周所存六代之樂黃帝曰雲門大巻言其徳如雲之所出民得以有族類也又五帝及日月星辰亦用之周禮乃奏黃鐘歌大吕舞雲門以祀天神是也又按隋書方澤舞辭同圜丘是方澤亦用此舞辭也周禮圜丘有雲門之舞方澤有咸池之舞方澤舞辭似宜作咸池舞然六代之樂黃帝曰雲門故可通用也獻以誠鬱以清獻謂初獻也詩信南山云祭以清酒箋云清𤣥酒也酒鬱鬯五齊三酒也祭之禮先以鬱鬯降神然後迎牲享於祖考納享時山罍舉沈齊傾周禮鄭注司尊彞云山罍亦刻而畫之為山雲之形又天官冡宰曰酒正辨五齊之名五曰沈齊鄭注云沈者成酒而滓沈如今清酒矣惟尚饗洽皇情禮記曰惟聖人為能饗帝顏延年讌曲水詩曰皇情爰眷劉良曰皇情天子之情也降景福通神明毛詩曰君子萬年介爾景福雲門舞皇帝初獻配帝作雲門之舞嚳配帝謂人帝炎帝神農氏也祭法曰禘而郊稷謂祭天圜丘以嚳配之後周圜丘以其先炎帝神隋農氏配昊天上帝法姬周帝嚳配天之義也按書方澤舞辭同圜丘知方澤配帝舞辭亦同也又按後周方丘亦以神農配后地之祗知二丘配帝同也長丘逺歴大電遥源弓藏髙隴鼎没寒門史記正義曰黃帝母曰附寳之祁野見大電繞北斗樞星感而懐孕二十四月而生黃帝於壽丘史記曰黃帝接萬靈明廷明廷者甘泉也所謂寒門者谷口也黃帝鑄鼎於荆山鼎成有龍垂胡髯下迎黃帝小臣不得上乃悉持龍髯墮黃帝之弓黃帝既上天乃抱其弓與龍髯號故後世因名其處曰鼎湖其弓曰烏號服䖍曰寒門黃帝所仙之處也按此數語皆黃帝軒轅之事後周圜丘配以神農非配軒轅也然昊天至尊神農極逺後周逺祖於周無功徒以逺祖之尊以配逺尊天帝若姬周帝嚳矣且神農之事若炎政火官諸語偏屬五方迎氣播穀耒耨之用似雜祈穀郊壇天帝尊至昊天無所不該人帝配之至尊之前功績所著不宜雜引盖以神農之世年代綿渺假稱軒皇之事以明天之所生有此靈異及没還歸於天其立辭之慎如此非子山誤引也人生於祖物本於天禮記郊特牲曰萬物本乎天人本乎祖此所以配上帝也鄭注曰言俱本可以配也此言後周逺祖本炎帝神農氏猶萬物之生原本昊天上帝所以圜丘配之奠神配徳迄用康年配徳謂徳足配天也詩臣工云明昭上帝迄用康年登歌皇帝初獻及獻配帝畢奏登歌歌周禮曰大祭祀帥瞽登歌鄭司農云登歌者在堂也釋曰凡大祭之時大師有此一事言帥瞽登歌者謂下神合樂皆升歌清廟故特作樂時太師帥取瞽人登堂於西階之東北面坐而歌者與瑟以歌詩也登歌之名盖取諸此歲之祥國之陽周禮馮相氏掌十有二歲十有二月十有二辰十日二十有八星之位辨其序事以㑹天位鄭注云歲謂太歲若今厯日太歲在某月某日某甲朔日直某也國之陽者言在國陽七里之郊也蒼靈敬翠雲長蒼靈以天色蒼故云若後周圜丘亦用正月上辛則此蒼靈當謂春初句芒之神也尚書帝命驗曰帝者承天立五府蒼曰靈府顏延年曲水詩序云蒼靈奉塗是也翠雲亦青色也象為飾龍為章周禮鄭注云象尊以象鳳凰或曰以象骨飾尊禮記曰旂十有二旒龍章而設日月以象天也正義曰所建之旂十有二旒畫龍為章而設日月以象天也者旂十有二旒象天數十二也龍為陽氣變化日月以光照下皆是象天也乘長日坏蟄户郊特牲曰郊之祭也迎長日之至也若後周圜丘南郊二祭俱用正月上辛則後周圜丘之祭亦在夏正建寅之月鄭注所謂建寅迎長日建卯而晝夜分分而日長者也特牲之文可通用矣又按月令仲夏云是月也日長至正義曰長至者謂此月之時日長之至極太史漏刻夏正晝漏六十五刻夜漏三十五刻是日長至也又月令仲秋云蟄蟲坏户鄭注云坏益也蟄蟲益之謂稍小之也按長日坏户乃是夏秋之令四圜丘似非其時然卑者不能兼尊尊者可以該卑非如郊之祀各司其一也列雲漢迎風雨詩云倬彼雲漢昭回於天禮器曰為高必因丘陵為下必因川澤是故天時雨澤君子達亹亹焉疏云蓋謂天地感祭而降雨澤也又禮器云饗帝於郊而風雨節寒暑時乃是四郊之文四郊尚能感致則圜丘之致祥瑞可知大呂歌雲門舞周禮大司樂冬至圜丘之祭有雲門之舞則天神皆降鄭注天神主北辰者也其上文云乃奏黃鐘歌大吕舞雲門以祀天神鄭注云天神謂五帝及日月星辰也按歌大吕所祀之天神非圜丘北極之天神也祀圜丘之天神其樂用圜鐘之等列具周禮無大吕之歌歌大吕者乃是五帝日月星辰之神此借稱也其雲門則是矣省滌濯奠牲牷周禮曰大祭祀省牲眡滌濯又肆師云立大祀用玉帛牲牷左氏傳曰吾牲牷肥腯杜預曰牲牛羊豕也牷純色完全也鬱金酒鳳凰樽周禮鬱人曰凡祭祀和賔客之祼事和鬱鬯以實彞而陳之鄭注云築鬱金煮之以和鬯酒又郊特牲所謂臭鬱和鬯是也周禮司尊彛有象尊鄭司農云象尊以象鳳凰廻天睠顧中原皇夏皇帝飲福酒奏皇夏國命在禮君命在天陳誠惟肅飲福惟䖍洽斯百禮福以千年毛詩曰烝畀祖妣以洽百禮鉤陳掩映天駟徘徊楊雄甘泉賦曰伏鉤陳使當兵服䖍曰鉤陳紫宫外營陳星爾雅曰天駟房也史記天官書曰房為府曰天駟又曰漢中四星曰天駟索隠曰詩紀歴樞云房為天馬主車駕彫禾飾斚翠羽承罍毛萇曰斚爵也夏曰醆殷曰斚周曰爵周禮鄭注曰斚讀曰稼稼彞畫禾稼也犧尊飾以翡翠罍神之所飲也受斯茂祉從天之來雍夏徹奠奏雍夏歌周禮樂師曰及徹帥學士而歌徹又云徹鄭注曰徹者歌雍雍在周頌臣工之什釋云謂徹為歌雍者論語云三家者以雍徹孔子云相維辟公天子穆穆奚取於三家之堂惟天子乃可用雍詩徹祭器大夫諸侯皆不得用雍故云歌徹者歌雍詩也後周本此而作雍夏如周之歌雍徹器用徹詩也禮將畢樂將闌廻日轡動天關楚辭曰吾令羲和弭節兮王逸曰羲和日御也漢書天文志曰兩河天關間為關梁翠鳳揺和鸞響五雲飛三歩上翠鳳旗也李斯上書曰建翠鳳之旗詩蓼蕭云和鸞雝雝毛傳曰在軾曰和在鑣曰鸞正義曰和亦鈴也以其與鸞相應和故載見曰和鈴央央是也風為馭雷為車無轍迹有煙霞漢書曰靈之車結𤣥靈靈之下若風馬傅𤣥歌辭云雲為車兮風為馬左氏傳曰將皆必有車轍馬跡焉說文曰霞赤雲气也从古韻車如字霞洪孤切楚辭逺遊篇云餐六氣而飲沆瀣兮潄正陽而含朝霞保神明之清澄兮精氣入而麤穢除是霞與除同韻與車並在六魚矣从今韻車尺遮切霞胡加切暢皇情休靈命雨留甘雲餘慶皇情天子之情也靈命神靈之命也詩甫田云以祈甘雨漢書天文志曰若煙非煙若雲非雲郁郁紛紛是謂慶雲皇夏皇帝就望燎位奏皇夏言周禮曰以禋祀祀昊天上帝鄭注云禋之煙周人尚臭煙氣之臭聞者積柴實牲體焉釋曰先積柴次實牲次取煙義全於昊天也六典聯事九司咸則周禮曰太宰之職建邦之六典以佐王治邦國一曰治典二曰教典三曰禮典四曰政典五曰刑典六曰事典又小宰之職云以官府之六聯合邦治一曰祭事之聨事漢書劉向上疏曰舜命九官濟濟相讓應劭曰尚書曰禹作司空棄后稷契司徒臯陶作士師垂共工益朕虞伯夷秩宗䕫典樂龍納言凡九官也顏延年宋郊祀歌曰六典聯事九官列序此云九司謂司空司徒之屬所司者有九官也率由舊章於焉允塞詩云不愆不忘率由舊章尚書舜典曰温恭允塞掌禮移次燔柴在焉周禮有掌次之官張大次小次鄭注云次謂幄也注詳方澤皇夏爾雅曰祭天曰燔柴郭注云既祭積薪燒之疏云祭天之禮積柴以實牲體玉帛而燔之使煙氣之臭上達于天因名祭天曰燔柴也燔柴在焉者按禮疏正祭於地燔柴在壇故禮記云掃地而祭煙升玉帛氣歛牲牷周禮肆師職曰立大祀用玉帛牲牷立次祀用牲幣立小祀用牲鄭司農曰大祀天地次祀日月星辰小祀司命後鄭大祀又有宗廟次祀又有社稷五祀五嶽小祀又有司中風師雨師山川百物也疏云經言立大祀用玉帛牲牷者天神中非直有升煙玉帛牲亦有禮神者也又大宗伯曰以禋祀祀昊天上帝以實柴祀日月星辰以槱薪祀司中司命飌師雨師鄭注云禋之言煙槱積也詩曰芃芃棫樸薪之槱之三祀皆積柴實牲體焉疏云禋祀中有玉帛牲牷三事實柴中則無玉惟有牲幣槱薪中但止有牲惟昊天具之云煙升玉帛氣歛牲牷者以圜丘大祀全用玉帛牲牷也又按祭祀有升煙之玉帛牲牷有禮神之玉帛牲牷此云升煙之玉帛牲牷也玉蒼璧帛蒼幣牲蒼犢周禮牧人云掌共祭祀之牲牷祭用純色牷謂純色完全言毛體全具也休氣馨香膋芳昭晰詩曰取其血膋鄭箋曰膋脂膏也血以告殺膋以升臭合之黍稷實之於蕭合馨香也漢書郊祀志歌曰􅌊膋蕭延四方李奇曰膋腸間脂也蕭香蒿也師古曰以蕭􅌊脂合馨香也膋音来彫反􅌊音人說反翼翼䖍心明明上徹詩云維此文王小心翼翼爾雅曰翼翼恭也又云明明在上爾雅曰明明察也郭云聰明鑒察也皇夏皇帝還便殿奏皇夏玉帛禮畢神人事分嚴承乃睠瞻仰廻雲輦路千門王城九軌漢書曰建章宫度為千門萬户左傳莊二十八年曰楚伐鄭入自純門及逵市杜預云逵竝九軌周禮曰國中經涂九軌式道移候司方廻指漢書曰式道左右中候也左太沖吴都賦曰指南司方得一惟清於萬斯寧老子曰天得一以清地得一以寧神得一以靈谷得一以盈侯王得一以為天下貞受兹景命於天告成周祀方澤歌隋書樂志云方澤舞辭同圓丘方澤禘之大祭祀地祗主崑崙之神夏至祭之周禮所謂祀大祗是也大地對神州之地為小地方澤地之大祗主崑崙與圜丘天之大神主北辰對别一祭北郊祀神州與南郊祀感精之帝對是地有二祭方澤居其一也其祭用黃琮黃犢黃幣皆以象地所謂牲幣各放其器之色樂用函鐘之等也周禮曰夏日至於澤中之方丘奏之若樂八變則地示皆出可得而禮矣鄭注曰地祗則主崑崙正義曰言澤中方丘者因高以事天故於地上因下以事地故於澤中取方丘者水鍾曰澤不可以水中設祭故亦取自然之方丘象地方故也隋書禮儀志曰祭地之數一嵗有二方澤三年一行若方澤之年祭地有二若地不通方澤之祭終嵗有一此鄭學之所宗也自晉太始二年竝方澤於北郊後周祭祀之式多依儀禮方丘在國隂六里之郊丘一成八方下崇一丈方六丈八尺上崇五尺方四丈方一階級一尺其壝八面徑百二十步内壝半之神州之壇崇一丈方四丈在北郊方丘之右其壝如方丘與北郊為二禮地神有二嵗有二祭其一是夏至之日祭崑崙之神于方澤其一是夏正之月祭神州之地祗于北郊後周郊丘為二其制是也然禮記為髙必因丘陵謂冬至祭天於圜丘之上也為下必因川澤謂夏至祭地于方澤之中也又云因天事天因地事地是凡澤中之方丘皆可祭焉亦取自然之丘異於北郊神州之祗祭有常處者也後周郊丘既别一如周禮而方丘在國隂六里是祭有常處其壇壝又有丈尺階級人力為之殊失自然之義雖遵古制然而改其質素崇尚華飾矣又隋書禮儀志曰後周方丘則以神農配后地之祗神州以獻侯莫那配焉知後周方丘與北郊二祭亦取周禮禘嚳郊稷之義也昭夏降神奏昭夏報功隂澤展禮𤣥郊隂澤方澤也禮崑崙之地祗必於夏至以地是隂夏至一隂生還于隂生之日祭之義見禮疏𤣥郊謂後周方丘在國隂六里之郊也北方黑神曰𤣥㝠故云𤣥郊平琮鎮瑞方鼎升庖周禮大宗伯云以黃琮禮地鄭注曰琮八方象地又庖人注云庖之言苞也裏肉曰包苴調歌孫竹縮酒江茅周禮澤中方丘之祭云孫竹之管鄭注云孫枝竹之末生者也桐孫亦然左傳僖四年管仲對曰爾貢包茅不入王祭不供無以縮酒尚書包匭菁茅郊特牲云縮酌用茅鄭注云沛之以茅縮去滓也周禮甸師祭祀共蕭茅鄭興云蕭字或為莤莤讀為縮束茅立之祭前沃酒其上酒滲下去若神飲之故謂之縮縮滲也史記封禪書曰江淮之間一茅三脊聲舒鐘鼓器質陶匏云鐘鼔者周禮大司樂所謂方澤之樂函鐘之等靈鼓靈鼗是郊特牲云器用陶匏以象天地之性也列曜秀華凝芳都荔漢書安世房中歌曰金支秀華張晏曰秀華中主有華艷也臣瓚曰樂上衆飾有流遡羽葆以黃金為支其首敷散若草木之秀華也又歌曰都荔遂芳窅窊桂華孟康曰都良薜荔之香鼓動桂華也川澤茂祉丘陵容衞禮記曰為高必因丘陵為下必因川澤周禮曰凡六樂者一變而致羽物及丘陵之示又云三變而致麟物及丘陵之示雲飾山罍蘭浮汎齊周禮司尊彞云其再獻用兩山尊皆有罍鄭注云山罍刻而畫之為山雲之形又酒正曰辨五齊之名一曰汎齊鄭注云汎者成而滓浮泛泛然若今宜成醪矣日至之禮歆兹大祭周禮鄭注云禮地以夏至謂神在崑崙者也此日至謂夏日至也昭夏奠玉帛奏昭夏曰若厚載欽明方澤易曰坤厚載物尚書曰欽明文思安安孔傳曰欽敬也敢以敬恭陳之玉帛玉謂黃琮也帛謂黃幣也此言禮神之玉帛也徳包含養功藏靈迹斯箱既千子孫則百詩甫田曰乃求千斯倉乃求萬斯箱大雅思齊曰則百斯男登歌初獻奏登歌舞辭同圜丘質明孝敬求隂順陽壇有四陛琮分八方漢書郊祀志曰郊壇在雒陽城北四里方壇四陛按後周方丘在長安城北六里亦有壇壝矣周禮曰以黃琮禮地鄭注云琮八方象地也牲牷蕩滌蕭合馨香周禮牧人掌共祭祀之牲牷鄭司農云牷純也後鄭謂牷體完具牷音全又大宗伯云眡滌濯鄭注云滌濯溉祭器也此云蕩滌言其潔也禮記郊特牲曰蕭合黍稷臭陽達於墻屋故既奠然後􅌊蕭合羶薌鄭注云蕭薌蒿也染以脂合黍稷燒之詩云取蕭祭脂羶當為馨聲之誤也和鸞戾止振鷺来翔左氏傳曰鍚鸞和鈴昭其聲也杜預曰鸞在鑣和在衡毛詩傳曰在軾曰和在鑣曰鸞戾至也詩序曰振鷺二王之後来助祭也詩云振鷺于飛毛傳曰振振羣飛鷺白鳥也威儀簡簡鐘鼓喤喤詩執競云鐘鼓喤喤又云降福簡簡威儀反反毛傳曰喤喤和也簡簡大也聲和孤竹韻入空桑周禮鄭注曰孤竹竹特生者述異記曰空桑生大野中為琴瑟之最者空桑也封中雲氣坎上神光周禮封人掌設王之社壝為畿封而樹之鄭注云壝謂壇及堳埒也畿上有封若今時界矣說文曰坎陷也下元之主功深蓋藏樂動聲儀云下元地氣也乃萬物始生育長養蓋藏之主皇夏望坎位奏皇夏祗周禮肆師云立大祀用玉帛牲牷疏云地中非直瘞埋中有玉帛牲亦兼有禮神玉帛牲也前祭天望燎位謂升禋玉帛牲也此祭地望坎位謂瘞埋玉帛牲也司筵撤席掌禮移次周禮司几筵掌五几五席之名物辨其用與其位鄭康成云筵亦席也鋪陳曰筵藉之曰席周禮有掌次張大次小次鄭注云次謂幄也大幄初往所止居也小幄接祭退俟之處祭義曰周人祭日以朝及闇雖有强力孰能支之是以退俟與諸侯代有事焉云移次者周禮疏云兩次設幄大幄謂王侵晨至祭所祭時未到去壇壝之外逺處設大次王旦止居也接祭者與臣交接相代而祭去壇宜近置一小帷退俟之處也廻顧封壇恭臨坎位周禮有封人之職注見上篇坎居北方坎位隂位也禮記曰祭地於㤗折在北郊在隂位也韋昭曰折謂為壇于昭晰地也瘞玉埋俎藏芬歛氣禮記曰瘞埋於㤗折祭地也按祭天有升煙之玉帛牲祭地有瘞埋之玉帛牲升煙取其上達于天瘞埋取其藏歛於地故云藏芬歛氣也是曰就幽成斯地意周祀五帝歌五帝五方之帝與昊天上帝而六王者之先祖皆感大微五帝之精以生五天帝靈威仰赤熛怒含樞紐白招拒汁光紀是也五人帝太皥神農黃帝少皥顓頊是也祀五天帝以五人帝配之南郊祀感精之帝三代用之皆在夏正之月殷人則祭汁光紀周人則祭靈威仰祈穀郊天各祭所感之帝周郊靈威仰以后稷配用正歲之正月郊祭之蓋特尊焉若五時迎氣迎春之時前帝後王皆祭靈威仰餘各以其時祭之玉帛牲各如方之色樂用黃鐘大吕等雩祭大饗亦皆祀之周禮曰祀五帝則掌百官之誓戒與其脩具又司服云祀昊天上帝則大裘而冕祀五帝亦如之小宗伯云兆五帝於門郊此皆祀五帝之文也春秋緯曰紫微宫為大帝太微為天庭中有五帝座星青帝靈威仰赤帝赤熛怒黃帝含樞紐白帝白招拒黑帝協光紀周禮鄭元疏者也按隋書禮儀志稱後周憲章周禮南郊以始祖獻侯莫那配所感帝靈威仰於其上即古后稷配天之義禘其祖之所自出以其祖配之者也餘無明文以意解之郊天以莫那配之如后稷此外又有五時迎氣及雩祭五天帝靈威仰之屬仍以五人帝太昊之屬配之九月大饗五天帝五人帝以文武配之者當以周文帝宇文泰配之如文王周武帝宇文邕配之如武王宣帝時疑用是矣云周祀五帝歌者其歌辭凡祀五帝皆可通用舞辭如南郊祀靈威仰用青帝雲門舞其下配帝舞獻侯莫那用之也五時迎氣其歌辭則五用之舞辭天人諸帝各以其方雩及大饗則皆用之用樂不異以其皆是五帝故可同用此歌也隋書禮儀志云後周五郊壇其崇及去國如其行之數其廣皆四丈其方俱百二十歩内壇皆半之是也皇夏奠玉帛奏皇夏嘉玉惟芳嘉幣惟量成形依禮稟色隨方曲禮曰玉曰嘉玉周禮曰及祀之日贊玉幣之事鄭注曰玉幣所以禮神玉與禮幣各如其方之色正義曰大宗伯云以玉作六器以天地四方又云青圭禮東方赤璋禮南方白琥禮西方𤣥璜禮北方季夏之月迎土氣於南郊亦用赤璋是其享神幣與玉各如其方之色也神班其次歲禮惟常神班其次者言東南西北中及天人之神各有班次也歲禮惟常者如正月南郊五時迎氣四月雩九月大饗每歲各有常祭也威儀抑抑率由舊章二語詩大雅假樂之詞毛傳曰抑抑美也皇夏初獻奏皇夏惟令之月惟嘉之辰周禮馮相氏掌十有二歲十有二月十有二辰釋曰十有二月謂斗柄月建一辰十二月而周也十有二辰者謂子丑寅卯之等十有二辰也惟令之月如正月郊天五時迎氣四月雩祭九月大饗皆為令月惟嘉之辰如正月上辛以下皆為嘉辰言其吉也司壇宿設掌史誠陳周禮掌舎云為壇壝宫鄭云謂王行止宿平地築壇又委壝土起堳埒以為宫掌史即周禮太史小史也左傳晏子引趙武之言曰其祝史祭祀陳信不愧杜預曰祝太祝史太史也言有司為壝宫天子止宿之處已設掌史之官於是陳其誠信也敢用明禮言功上神鈎陳旦闢閶闔朝分星經曰勾陳六星為六宫亦主六軍司馬相如大人賦曰排閶闔而入帝宫兮載玉女而與之歸韋昭云閶闔天門也淮南子曰西極之山閶闔之門亦如之旒垂象冕樂奏山雲周禮司服云王之吉服祀昊天上帝則大裘而冕祀五帝亦如之鄭注云服周冕首飾尊也釋云冕名雖同其旒數則亦有異禮記郊特牲云戴冕璪十有二旒則天數也鄭注璪音早將廻霆策蹔轉天文五運周環四時代序五運謂東方青木南方赤火中央黃土西方白金北方黑水是也四時謂春正月郊夏四月雩秋九月大饗春迎青帝於東郊于夏迎赤帝于南郊夏季迎黃帝亦於南郊秋迎白帝西郊冬迎黑帝於北郊是也五郊本是五時以郊黃帝在季夏與赤帝同在夏時故稱四時也鱗次玉帛循廻樽俎鱗次玉帛者言玉帛以次陳之若魚貫也玉若青圭赤璋白琥𤣥璜也帛幣也幣與玉俱設有禮神之幣有從爵之幣周禮立大祀用玉帛牲牷此禮神之幣皆有牲幣各放其器之色此從爵之幣也見於禮疏玉與幣同色者也樽俎禮器也孔子曰不出樽俎之間是也神其降之介福斯許青帝雲門舞皇帝初獻青帝奏雲門之舞在青帝謂天帝靈威仰之神其色青于東方主木此蒼精之帝祖之所自出者也祭用青圭牲幣亦如其器之色河圖曰蒼帝靈威仰周禮雲門之舞以祀天神是其一也祭青帝每歲有四其一是正月上辛祀感精之帝靈威仰以后稷配之天子出南門在于南郊祭法所謂郊稷是也其一是迎春之祭祀青帝靈威仰以帝太皥配之天子出東門在于東郊月令云其帝太皥又云迎春于東郊是也其四月雩祭九月大饗皆以太皥配之此青帝居五天帝之一姬周感生之帝為青帝靈威仰以后稷配後周感生之帝亦是青帝靈威仰以莫那配餘祀五帝俱同惟南郊一祭為特尊之後周南郊迎春及雩祭大饗汎配五帝祀青帝用此舞辭也甲在日鳥中星月令曰孟春之月其日甲乙史記天官書曰察日月之行以揆歲星順逆曰東方木主春曰甲乙義失者罰出歲星堯典曰日中星鳥以殷中春孔傳曰日中謂春分之日鳥南方朱鳥七宿殷正也春分之昏鳥星畢見以正仲春之氣節轉以推季孟則可知禮東后奠蒼靈東后蒼靈謂東方青帝也周禮以青圭禮東方注云禮東方以立春謂蒼青之帝也顏延年曲水詩序曰蒼靈奉塗李善注云尚書帝命騐曰帝者承天立五府蒼曰靈府鄭康成曰蒼帝靈威仰之府也樹春旗命青史月令曰孟春之月載青旗立春三日太史謁之天子曰某日立春又云乃命太史守典奉法候雁還東風起吕氏春秋曰三月候雁来月令曰孟春之月東風解凍鴻雁来歌木徳舞震宫月令孟春云盛徳在木易說卦曰帝出乎震又云萬物出乎震震東方也泗濱石龍門桐禹貢曰泗濱浮磬周禮云龍門之琴瑟枚乗七發云龍門之桐是也孟之月陽之天孟之月月令所云孟春之月也春為陽故云陽之天南郊在正月上辛迎春在立春之日其雩祭大饗雖非正月以青帝所司在於春令亦得歌此矣億斯慶兆斯年月令曰命相布徳和令行慶施惠下及兆民配帝舞皇帝初獻配帝奏舞其配帝謂人帝也配青帝靈威仰者有二為南郊之祭配感精之帝與則以莫那配之其為迎春之祭及雩祭大饗所祀東方之青帝與則以太皥配之姬周感生之帝為靈威仰祈穀郊壇配以后稷後周感生之帝亦靈威仰祈穀郊壇配以莫那其五方一定之配自古以来著徳立功之人若迎春雩祭大饗姬周以太皥配者後周仍以太皥配之無所改作是配青帝者有二以其俱是配青帝靈威仰之神故同此舞辭也帝出於震蒼徳於神易說卦曰帝出乎震蒼徳于神者以人帝之神徳配蒼帝靈威仰也其明在日其位居春言配青帝在于東方司職于春也祭義云大明生于東覲禮云拜日於東郊玉藻又云朝日于東門之外也其位居春者南郊在正月上辛迎春在立春之日是也勞以定國功以施人若姬周后稷後周莫那皆開國之君謂其有勞於子孫有功於人民者也大皥雖逺亦自古著徳立功者義兼之矣言從配祀近取諸身配祀謂南郊則為莫那五方則為太皥皆所以配青帝也易繫辭曰近取諸身赤帝雲門舞皇帝初獻赤帝奏雲門舞主赤帝天帝赤熛怒之神在於南方火其色赤河圖曰赤帝赤熛怒周禮雲門之舞以祀天神赤帝居其一也立夏之日祭之於南郊雩祭大饗亦皆祭之其祭玉用赤璋牲幣亦如其色樂用黃鐘大吕之等人帝神農所配之帝也招揺指午對南宫淮南子曰仲夏之月招揺指午髙誘曰招揺北斗第七星史記天官書曰南宫朱鳥日月相㑹實沈中左傳昭七年士文伯曰日月之㑹是謂辰孔安國洪範傳曰十二辰以紀日月所㑹疏云㑹者日行遲月行疾俱循天度而行二十九日日過半月行一周天又前及日而與日㑹處為辰左傳昭元年子產曰參為晉星實沈參神也月令孟夏日在畢仲夏日在東井季夏日在柳鄭注云孟夏者日月㑹於實沈而斗建巳之辰帝王世記曰自畢十二度至東井十五度曰實沈之次於辰在申謂之涒灘於律為斗建在巳晉魏分野律厯志曰實沈初畢十二度立夏離光布政動温風易曰相見乎離離也者南方之卦也月令季夏云温風始至純陽之月樂炎精鄭康成曰立夏迎赤帝於南郊純陽之月謂夏至以前為純陽到夏至一隂始生炎帝謂赤帝之神為火精也月令孟夏云其帝炎帝鄭注云赤精也彼雖人帝感此炎精矣赤雀丹書飛送迎史記索隠曰文耀鈎云南宫赤帝其精為朱鳥吕氏春秋曰周文王時見大赤烏銜書集於周社以南方赤色朱鳥屬夏故引朱雀丹書言其盛徳在火也朱絃絳鼓罄䖍誠朱絳皆赤色若青有青蒼二色矣朱絃絳鼓取其色之相似也萬物含養各長生禮斗威儀曰君乗火而王其政頌平則祥風至宋均曰景風也其来長養萬物配帝舞皇帝初獻配帝奏舞一配帝謂炎帝神農氏之神五方人帝之月令云其帝炎帝是也立夏之祭配天帝赤熛怒於南郊雩祭大饗皆以神農氏配之後周之祀與姬周同也以炎為政以火為官左傳昭十七年郯子曰炎帝氏以火紀故為火師而火名杜預曰以火紀事名百官位司南陸享配離壇續漢書曰日行南陸謂之夏漢書魏相曰南方之神炎帝乗離執衡司夏言神農氏乗離司夏與天帝配享也三和實俎百味浮蘭論語孔注云俎豆禮器漢書曰百末旨酒布蘭生神其茂豫天歩艱難詩白華云天歩艱難毛傳曰天地之氣無微不著無不覆養也黃帝雲門舞皇帝初獻黃帝奏雲門之舞主黃帝天帝含樞紐之神在于中央土其色黃河圖曰黃帝含樞紐周禮雲門之舞以祀天神黃帝居其一也季夏之月祭之亦於南郊雩祭大饗亦總祭之其祭按月令用黃玉牲幣各如其色樂用黃鐘大吕之等人帝軒轅氏所配之帝也三光儀表正四氣風雲同史記天官書曰太微三光之庭宋均曰三光日月五星也四氣風雲同者禮記正義曰夫四時五行同是天地所生而四時是氣五行是物氣是清虚所以麗天物體質碍所以屬地四時係天年有三百六十日則春夏秋冬各分居九十日五行分配四時布於三百六十日間以木配春以火配夏以金配秋以水配冬以土則每時輒寄十八日也雖每分寄而位本末宜處於季夏之末金火之間故在此陳之也戊巳行初厯黃鐘始變宫月令曰中央土其日戊己其帝黃帝其神后土其音宫律中黃鐘之宫鄭注云季夏之氣至則黃鐘之宫應平琮禮内鎮隂管奏司中周禮曰以黃琮禮地鄭注云琮八方象地彼雖祀大地崑崙之神以琮色黄兼以象地故中央黃土亦得稱之律厯志云黃鐘之宫制十二筩陽管為律隂管為吕云内鎮司中者以其鎮内地司中央也司中與司命司中有異齋壇芝曄曄清野桂馮馮漢書樂志曰桂華馮馮翼翼承天之則師古曰馮馮盛滿也夕牢芬六鼎安歌韻八風夕牢疑漢書夕牲日先祭一日也左傳夫舞者所以節八音而行八風也神光乃超忽嘉氣恒葱葱四子講徳論曰神光燿暉後漢書曰氣佳哉鬱鬱葱葱然配帝舞皇帝初獻配帝奏舞一配帝謂黃帝軒轅氏之神五方人帝之月令云其帝黃帝是也季夏之祭配天帝含樞紐於南郊雩祭大饗皆以軒轅氏配之後周之祀與姬周同也四時咸一徳五氣或同論四時咸一徳者謂土每時寄十八日四時俱有之也五氣或同論者謂中央土氣與四方之氣為五也軒轅為黃精之君著徳與天帝含樞紐同矣猶吹鳳凰管尚對梧桐園二語皆黃帝事也吕氏春秋曰黃帝使伶倫自大夏之西崑崙之隂取竹之嶰谷生其竅厚薄均者斷兩節間而吹之以為黃鐘之管制十二筩以聴鳳凰之鳴雄鳴六雌鳴六以為律吕禮瑞命紀曰黃帝服黃服戴黃冠齋于宫鳳乃蔽日而来止帝園食竹實棲帝梧桐終不去器圜居土厚位總配神尊月令曰其器圜以閎鄭注云器圜者象土周布於四時閎讀如紘紘謂中寛象土含物位總配神尊者土氣四時俱有季夏總而祀之五方之神中央含樞紐最尊故配帝軒轅亦與俱尊也始知今奏樂還用我雲門周禮鄭注云黃帝曰雲門大巻按黃帝樂曰雲門今祀黃帝用樂奏雲門舞是還用我雲門也白帝雲門舞皇帝初獻白帝奏雲門舞主白帝天帝白招拒之神在於西方金其色白河圖曰白帝白招拒周禮雲門之舞以祀天神白帝居其一也立秋之日祭之於西郊雩祭大饗亦皆祭之其祭玉用白琥牲幣各如其色樂用黃鐘大吕之等人帝少皥所配之帝也肅靈兌景承配秋壇易通卦騐曰兌西方主秋分周禮曰兆五帝於四郊鄭注云兆為壇之營域知兆白帝於西郊為秋壇矣雲髙火落露白蟬寒皆秋令也曹植秋思賦曰雲高氣靜露凝衣詩豳風云七月流火月令曰孟秋之月白露降寒蟬鳴帝律登年金精行令月令曰是月也農乃登穀又云盛徳在金瑞獸霜耀祥禽雪映霜雪皆取其白西方秋金之氣也司藏肅殺萬寳咸宜爾雅曰秋為白藏郭云氣白而收藏莊子曰秋而萬寳成厥田上上收功在斯厥田上上尚書禹貢之辭言田功收於秋時也配帝舞皇帝初獻配帝奏舞一配帝謂少皥金天氏之神五方人帝之月令云其帝少皥是也立秋之祭配天帝白招拒於西郊雩祭大饗皆以金天氏配之後周之祀與姬周同也金行秋令白帝朱宣河圖曰大星如虹下流華渚女節意感生白帝朱宣宋均曰朱宣少皥氏也司正五雉歌庸九川當作淵疑唐本避髙祖諱所改也左傳郯子曰少皥摯立鳥師而鳥名五雉為五工正帝王世記曰少皥作樂曰九淵執文之徳對越彼天介以福祉君子萬年詩瞻彼洛矣及鴛鴦篇並有君子萬年之辭黑帝雲門舞皇帝初獻黑帝奏雲門舞主黑帝天帝汁光紀之神在於北方水其色黑河圖曰黑帝汁光紀周禮雲門之舞以祀天神黑帝居其一也立冬之日祭之于北郊雩祭大饗亦皆祭之其祭玉用𤣥璜牲幣各如其色樂用黃鐘大吕之等人帝顓頊所配之帝也北辰為政𤣥壇爾雅曰北極謂之北辰郭注云北極天之中以正四時月令鄭注云迎冬者祭黑帝汁光紀於北郊之兆也又周禮鄭注云兆為壇之營域知𤣥壇為北郊之壇也北方有黑𤣥二色故曰𤣥壇北陸之祀員官左傳昭四年曰日在北陸而藏氷杜注云陸道也爾雅曰𤣥枵虚也顓頊之虛虛也北陸虛也郭云虛在正北北方黑色顓頊水徳位在北方虚星之名凡四正義曰四者𤣥枵也虛也顓頊之虛也北陸也云員官者北方水府之官也天帝則為黑帝汁光紀若人帝黑精之君則顓頊水官之臣則𤣥㝠此祀黑帝乃天帝汁光紀之神在北方司水若水官矣宿設𤣥璜浴蘭周禮曰以𤣥璜禮北方鄭注云半璧曰璜象冬閉藏地上無物惟天半見幽明錄曰廟方四丈不作墉道廣五丈夾樹蘭香齋者煮以沐浴後祭所謂蘭湯以祭坎徳隂風御寒易說卦云坎北方之卦也王粲七釋云立隂戒寒次律將廻窮紀月令十二月日窮於次月窮於紀星周于天數將幾終歲且更始微陽欲動細泉周語注云十一月建子陽氣在中月令仲冬云水泉動微陽細泉謂一陽始生水泉動潤上行也管猶調於隂竹周禮曰隂竹之管鄭注云隂竹生於山北者續漢書曰以葭莩灰實律之端按厯者候之氣至則灰飛而管通聲未入於春絃淮南子曰孟春之月鼓琴瑟北方黑帝所司者冬令故聲未入于春絃也待歸餘於送厯漢書律厯志引左傳曰先王之正時也履端於始舉正於中歸餘於終師古曰歸餘於終謂有餘日則歸於終積而成閏也方履慶於斯年配帝舞皇帝初獻配帝奏舞一配帝謂顓頊髙陽氏之神五方人帝之月令云其帝顓頊是也立冬之祭配天帝汁光紀於北郊雩祭大饗皆以髙陽氏配之後周之祀與姬周同也地始坼虹始藏月令曰仲冬之月氷益壯地始坼周書曰小雪日虹藏不見服𤣥玉居𤣥堂月令曰孟冬之月天子居𤣥堂左个服𤣥玉沭蕙氣浴蘭湯蕙蘭香草楚辭曰浴蘭湯沐芳華匏器潔水泉香月令曰水泉必香陶器必良匏器即禮記所謂器用陶匏是也涉配彼福無疆涉配彼謂配彼黑帝汁光紀之神也福無疆謂神降之福為無疆也君欣欣此樂康言神既降福君心亦欣欣然樂也大雅云旨酒欣欣楚辭曰欣欣兮樂康以上圜丘方澤五帝歌辭載在隋書樂志按五帝五天帝也五配帝五人帝也五帝之外又有五神東方其神句芒南方其神祝融中央其神后土西方其神蓐收北方其神𤣥㝠此為五官之臣見於月令鄭氏之義五精之君五官之臣自古以来著徳立功者也亦見左傳昭二十九年知五方天帝配以五方人帝尚有五方之臣取以相配祭五徳之帝亦食此神焉宗伯謂之五祀在地祗中歌五帝與五配帝舉其尊者而言也又按周禮祭天如圜丘南郊五時迎氣雩祭大饗注已見前天神中又有四類日月星辰大宗伯云以實柴祀日月星辰鄭注云星謂五緯辰謂日月所㑹十二次小宗伯云四類亦如之鄭注云兆日于東郊兆月與風師于西郊兆司中司命于南郊兆雨師于北郊是也鄭康成又以星辰加司中司命風師雨師謂之六宗尚書禋于六宗周禮以槱燎祀司中司命飌師雨師是也司中司命文昌第五第四星風師箕也雨師畢也祭地有方澤北郊二祭又有社稷五祀五嶽山林川澤四方百物諸祭大宗伯云以血祭祭社稷五祀五嶽以貍沈祭山林川澤以疈辜祭四方百物是也小宗伯有四望後鄭謂五嶽四鎮四瀆也又小宗伯云兆山川丘陵墳衍各因其方此皆地祗也鄭康成云社稷土穀之神五祀五官之神五嶽岱宗衡山華山恒山嵩高山四鎮揚州之㑹稽青州之沂山幽州之醫無閭冀州之霍山四瀆江河淮濟八蜡以祀四方祭百種以報嗇也此皆周禮祭祀之義後周祭天有圜丘歌圜丘之祭用之有五帝歌正月南郊五時迎氣雩祭大饗用之無日月星辰司中司命風師雨師之辭祭地有方澤歌方丘之祭用之無北郊社稷四望山林川澤丘陵墳衍等辭豈後周憲章周禮有未盡與盖當時盧辯裴政等遵用周禮子山分得此題自餘文人以次相撰作隋書者見庾集中有此數闋采入樂志餘或闕焉又隋書禮儀志云後周用牲之制五帝日月五星十二辰四望五官各以其方色又云星辰七宿岳鎮海瀆山林川澤丘陵墳衍亦各於其方配郊而祀之其星辰為壇崇五尺方二丈岳鎮為埳方二丈深二尺山林已下亦為埳壇崇三尺埳深一尺俱方一丈其儀頗同南郊冢宰亞獻宗伯終獻禮畢知後周祭祀與姬周同二丘五郊之外有其義而亡其辭也周祀宗廟歌宗廟謂高祖以下四親廟也周禮小宗伯云右社稷左宗廟又匠人亦云禮記王制曰天子七廟三昭三穆與太祖之廟而七鄭注云此周制七者太祖后稷及文王武王之祧與親廟四殷則六廟契及湯與二昭二穆夏則五廟無太祖禹與二昭二穆而已疏云周所以七者以文王武王受命其廟不毁以為二祧并始祖后稷及髙祖以下親廟四故為七也若王肅則以為天子七廟者為髙祖之父及髙祖之祖為二祧并始祖及親廟四為七文武受命之王不遷之廟非常廟之數引家語子羔問孔子說天子七廟又有二祧云云馬昭難王義云喪服小記王者立四廟又引禮緯夏無太祖宗禹而已則五廟殷人祖契而宗湯則六廟周尊后稷宗文王武王則七廟自夏及周少不减五多不過七禮器云周旅酬六尸一人發爵則周七尸七廟明矣今使文武不在七數既不同祭又不享嘗豈禮也哉曽子問孔子說周事而云七廟無虛主若王肅數髙祖之父髙祖之祖廟與文武而九主當有九孔子何云七廟無虛主乎故云以周禮孔子之言為本且家語先儒以為肅之所作未足可依以上出自禮疏其申鄭難王之說言之甚詳不能具載今特書其梗槩以證王肅之謬也按虞夏商周親廟皆四周制太祖后稷及文武二祧故有七廟王肅之說則有九廟若謂文武不遷之廟非常廟之數則太廟亦不遷何得獨在常數乎殷人祖契而宗湯與四廟而六周人祖稷而宗文武與四廟而七有常制矣何謂非常家語一書王肅所集所謂孔子之言除經傳所有之外亦雜取吕氏春秋韓詩外傳諸書盖子家之言非經語也其中偽造數端以資難鄭先儒以周禮孔子之言為本此善學孔子者也又如今文尚書伏生口授自漢以後諸儒習之孔安國所注古文尚書遭巫蠱不傳直至晉世託言出自皇甫謐家取左傳諸書所引先儒所謂逸書者補入増多于今文其中有顯背周禮資難鄭學者皆王肅偽文使六經互異後人莫知適從所謂小辯破言小言破道論之刑科罪在不赦者也然則學周禮者當以儀禮周禮為法隋書禮儀志曰後周之制思復古之道乃右宗廟而左社稷置太祖以下二昭二穆凡五親盡則遷其有徳者謂之祧廟亦不毁閔帝受禪追尊皇祖為徳皇帝文王為文皇帝廟號太祖擬已上三廟遞遷至太祖廟不毁其下相承置二昭二穆為五焉明帝崩廟號世宗武帝崩廟號髙祖並為祧廟而不毁其時祭各於其廟祫禘則于太祖廟亦以皇后預祭皇后亞獻訖后又薦加豆之籩其實菱芡芹葅兎醢冢宰終獻訖皇后親徹豆降還板位然後太祝撤焉此後周之制也按後周憲章周禮逺祖神農配帝圜丘比姬周禘嚳之義是神農無廟矣南郊之祭配以莫那比姬周南郊配以后稷后稷姬周始祖即是太廟之祖則後周莫那似當尊之太廟隋志宇文泰廟號太祖不毁是後周以泰為太祖始祖莫那無聞其文武二祧廟後周以明帝廟號世宗武帝廟號髙祖並為祧廟不毁是明帝毓比之如文王武帝邕比之如武王毓邕兄弟昭穆同班異於姬周文穆武昭以後周太祖已下無功徳如文武者明帝武帝有功于周故立為不遷之廟豈謂世室既非常數無礙昭穆禮之變者耶又按宣帝時文帝為祖武帝為禰皆在四親未宜遂居祧廟若文帝泰居太廟則皇髙祖韜曽祖肱反居泰下矣閔帝明帝武帝兄弟相代不異昭穆譬如兄弟四人皆立為君祖父之廟不必從毁依常制閔明二主當祔於其祖肱廟内武帝主特在禰廟若謂明帝武帝各居祧廟則禰廟虚主又不然矣謹案魏初髙堂隆為鄭學議立親廟四太祖武帝猶在四親之内乃虛置大祖及二祧以待後代此周宗廟歌蓋四親廟二昭二穆是也其厯傳以来昭穆之次未詳假如以高為昭則昭廟諱韜下云獻皇高祖是也以曽為穆則穆廟諱肱下云獻皇曽祖是也以祖為昭則昭廟諱泰下云獻皇祖是也以禰為穆則閔明武三帝均是穆明閔二主祔于曽祖肱穆廟禰廟中特設武帝主諱邕下云獻武皇帝是也此後周四廟其髙曽祖禰對宣帝而言也若宣帝崩靜帝為祭主三年喪畢宣帝主迎入昭廟韜為遷主前所云穆廟諱肱者為皇髙祖廟閔明二主仍祔昭廟諱泰者為皇曽祖廟穆廟諱邕者為皇祖廟昭廟韜所居者韜主遷新主贇入為皇考廟其文帝太廟及世宗髙祖二祧當亦虚置以待後代矣皇夏皇帝入廟門奏皇夏肅肅清廟巖巖寢門思齊之詩云肅肅在廟詩序云清廟祀文王也箋云清廟者祭有清明之徳者之宫也天徳清明文王象焉故祭之而歌此詩也毛萇詩傳曰巖巖積石貌也周禮左宗廟注稱庫門内雉門外之左也按廟有寢故云寢門欹器防滿金人戒言家語曰孔子觀于魯桓公之廟有欹器焉孔子問于守廟者曰此謂何器對曰此盖為宥坐之器孔子曰吾聞宥坐之器虚則欹中則正滿則覆明君以為至誡故常置之於坐側顧謂弟子曰試注水焉乃注之水中則正滿則覆夫子喟然嘆曰嗚呼夫物惡有滿而不覆哉又曰孔子觀周遂入太祖后稷之廟堂右階之前有金人焉三鍼其口而銘其背曰古之慎言人也戒之哉應􅉧懸鼓崇牙樹羽周頌有瞽曰應田懸鼓毛傳曰應鞞鼓也田大鼓也懸鼓周鼓也鄭箋曰田當作􅉧􅉧小鼓在大鼓旁應鞞之屬也字轉誤變而作田此云應􅉧依鄭文也􅉧音𦙍又有瞽云崇牙樹羽毛傳云崇牙上飾巻然可以懸也樹羽置羽也階變升歌庭紛象舞禮記祭統曰聲莫重于升歌子夏詩序曰維清奏象舞也鄭箋云象舞象用兵時刺伐之舞武王制焉閒安象設緝熙清奠招魂云像設君室静閒安毛詩曰維清緝熙文王之典春鮪初登新蓱先薦詩序曰潛季冬薦魚春薦鮪也月令曰季春薦鮪於寢廟天官漁人云春獻王鮪陸機云河東鞏縣東北崖上山腹有穴舊説云此穴與汪湖通鮪從此穴而来北入河西上龍門入漆沮故張衡云王鮪岫居山穴為岫謂此穴也陸機又云大者為王鮪小者為鮇鮪爾雅曰萍蓱其大者蘋郭注云水中浮萍江東謂之漂詩曰于以采蘋左氏傳曰蘋蘩蕰藻之菜可薦于鬼神鄭注庖人云備品物曰薦僾然入室儼乎其位祭統云祭之日入室僾然必有見乎其位出户而聴愾然必有聞乎其歎息之聲悽愴履之非寒之謂禮記曰霜露既降君子履之必有悽愴之心昭夏降神奏昭夏永維祖武潛慶靈長詩曰䋲其祖武鄭箋云祖考所踐履之迹龍圖革命鳳厯歸昌尚書傳曰伏羲氏王天下龍馬出河遂則其文以畫八卦謂之河圖左傳郯子曰我祖少皡摯之立也鳯鳥適至故紀于鳥為鳥師而鳥名鳯鳥氏厯正也杜注云鳯鳥知天時故以名厯正之官功移上墋徳曜中陽陸機功臣頌曰茫茫宇宙上墋下黷李善注云天以清為常地以靜為本今上墋下黷言亂常也墋不澄之貌也漢書曰髙祖沛豐邑中陽里人也清廟肅肅猛簴煌煌周頌云於穆清廟毛萇曰肅肅敬也西京賦曰猛簴趪趪注云周禮鳬氏寫獸之形大聲有力者以為鐘簴也曲髙大夏聲和盛唐周禮鄭注云大夏禹樂也禹治水敷土言其徳能大中國也盛唐盖指唐堯盛世其樂為咸池也又漢書孝武帝南廵狩至盛唐作盛唐之歌是亦盛唐矣牲牷蕩滌蕭合馨香二語已見方澤登歌注詳彼處漢書師古注云蕭香蒿也以蕭􅌊脂合馨香也和鸞戾止振鷺来翔二語已見方澤登歌注詳彼處韓詩内傳曰鸞在衡和在軾前振鷺詩篇名謂来助祭者也永敷萬國是則四方詩云是則是效皇夏俎入皇帝升階奏皇夏年祥辨日上協龜言周禮曰凡有祭祀則奉龜以往奉酹承列来庭駿奔武成云丁未祀於周廟駿奔走執豆籩詩清廟云駿奔走在廟箋云駿大也諸侯與衆士於周公祭文王俱奔走而来在廟中助祭也彫禾飾斚翠羽承樽周禮司尊彞云秋嘗冬烝祼用斚彞黃彞皆有舟鄭司農云斚讀曰稼稼彞畫禾稼也又司尊彞云春祠夏禴祼用雞彞鳥彞皆有舟其朝踐用兩獻尊鄭司農云獻讀為犧犧尊飾以翡翠敬殫如此㳟惟執燔左傳襄二十二年公孫僑曰公孫夏從寡君以朝于君見于嘗酎與執燔焉杜預云助祭燔又作膰祭肉也皇夏皇帝獻皇髙祖奏皇夏云皇髙祖宇文韜也皇帝宣帝也周書帝紀普回子莫那十世至陵陵生系系生韜並以武略稱韜生肱為皇曽祖徳皇帝宣帝韜之𤣥孫是韜于宣帝為皇髙祖也以下所用廟樂皆象功徳而舞焉慶緒千重秀洪源萬里長言宇文氏本神農之後厯傳至韜世系之逺也詩閟宫云纘禹之緒又云至于文武纘太王之緒又殷武云湯孫之緒左氏傳曰如水木之有本源也千重萬里言其久逺也無時猶戢翼有道故韜光言時未至猶歛戢其翼世有道故須韜晦其光也盛徳必有後仁義終克昌言韜有盛徳更行仁義終當昌大其後也左氏傳曰吾聞有盛徳者必百世祀又曰五世其昌明星初兆慶大電久呈祥言其有靈異也竹書紀年曰帝顓頊髙陽氏母曰女樞見瑶光之星貫月如虹感已于幽房之宫生顓頊于若水又曰黃帝母曰附寳見大電繞北斗樞星光照郊野感而孕二十五月而生帝於壽丘皇夏皇帝獻皇曽祖徳皇帝奏皇夏按周書皇曽祖諱肱武成初追尊曰徳皇帝太祖肱之少子宣帝肱之曽孫是肱于宣帝為皇曽祖也克昌光上烈基聖穆西藩詩曰克昌厥後又云休有烈光云基聖者謂開基之聖後周起于代故云西藩周禮曰鎮服外五百里曰藩服崇仁高渉渭積徳被居原史紀周本紀曰公劉自漆沮渡渭取材用行者有資居者有積畜百姓懐之多徙而保歸焉周道之興自此始古公亶父去邠踰梁山止于岐下邠人舉國扶老攜弱及他旁國亦多歸之徐廣曰岐山在扶風美陽西北其南有周原詩云周原膴膴是也帝圖張往迹王業茂前尊言閔帝受禪肱為皇祖追尊為徳皇帝也重芬徳陽廟疊慶壽陵園漢書景帝中四年三月起徳陽宫臣瓚曰是景帝廟也帝自作之諱不言廟故言宫西京故事云景帝廟為徳陽後漢書明帝紀曰帝初作壽陵制令流水而巳無得起墳後漢書注云陵謂山墳園謂塋域百靈光祖武千年福孝孫東都賦曰懐百靈詩下武云繩其祖武周頌閟宫云孝孫有慶皇夏皇帝獻皇祖太祖文皇帝奏皇夏字周書帝紀云太祖文皇帝姓宇文氏諱泰黑獺代武川人也齊神武逼京邑太祖奉武帝西遷剋𢎞農戰沙苑有功封安定公位至太師崩年五十二𦵏于成陵諡曰文公孝閔帝受禪追尊為文王廟曰太祖武成元年追尊為文皇帝雄圖屬天造宏略遇羣飛易曰天造草昩楊雄劇秦美新曰海水羣飛善曰羣飛言亂也謂太祖適當魏之亂世得展其雄才大略也風雲猶聴命龍躍遂乗機周書本紀云帝母王氏孕五月夜夢抱子昇天纔不至而止寤言而告徳皇帝徳皇帝喜曰雖不至天貴亦極矣是有命也易乾卦曰雲從龍風從虎聖人作而萬物覩又曰龍躍在淵言雖不能及身而王至其子閔帝受禪如躍龍乗機而飛矣百二當天險三分拒樂推言天命人情皆已歸往帝猶以人臣之禮終也漢書田肯曰秦形勝之國也持㦸百萬秦得百二焉論語曰三分天下有其二函谷風塵散河陽氛霧晞西都賦曰左據函谷函谷秦關名也河陽謂河南漢之河南郡洛陽縣也在南曰陽函谷風塵散者謂周太祖奉武帝都長安也河陽氛霧晞者謂齊神武推清河王都鄴去洛陽也濟弱淪風起扶危頽運歸言周太祖輔魏西遷濟弱扶危遂成中興之業地紐崩還正天樞落更追謝莊宋明堂歌地紐謐乾樞回晉書天文志曰北極北辰最尊者也其紐星天之樞也天運無窮三光迭耀而極星不移故曰居其所而衆星拱之又魁第一星曰天樞原祠乍超忽畢隴或綿微史記曰孝惠五年以沛宫為髙祖原廟徐廣曰光武紀曰上幸豐祠髙祖于原廟裴駰謂原者再也先既已立廟今又再立謂之原廟馬融曰畢文王墓地名又括地志曰武王墓在雍州萬年縣西南三十八里畢原上也終封三尺劍長巻一戎衣漢書髙祖曰吾以布衣提三尺劍取天下此豈非天命乎禮記中庸篇云一戎衣而有天下皇夏皇帝獻文宣皇太后奏皇夏為周書列傳云文宣叱奴皇后代人也太祖丞相納后為姬生高祖天和三年六月尊為皇太后建徳二年三月癸酉崩四月丁已葬永固陵又武帝紀云母曰叱奴太后大綂九年生帝于同州是文宣太后為高祖武帝之母也周禮大司樂云乃奏夷則歌小吕舞大濩以享先妣鄭注云先妣姜嫄也姜嫄履大人跡感神靈而生后稷是周之先母也周立廟自后稷為始祖姜嫄無所妃是以特立廟而祭之謂之閟宫閟神之此婦人之廟一也又春秋隠五年云考仲子之宫初獻六羽杜預曰諸侯無二嫡隠公成父之志為别立宫此又婦人之廟一也按凡祭以某妃配惟姜嫄無所妃周立七廟自后稷已下不得更立后稷父廟故特立婦人之廟而祭之文宣太后為宣帝祖母在四親之内雖非姜嫄之比特以太祖元后為嫡合葬成陵並享太廟則有正妃元氏叱奴本太祖之妾雖母以子貴尊稱太后而義無二嫡不得並享太祖之廟若春秋孟子入惠公之廟仲子無享祭之所為别立宫焉文宣太后之祀實法春秋仲子之義其廟與七廟而八又類周禮姜嫄之宫故篇内云閟宫惟逺矣山雲之舞造自武帝一以母子之親一以憲章周禮别立廟祭有此歌辭宣帝因之無所改作也月靈興慶沙祥發源鄭康成周禮九御注云凡君幸妃御見之法月為后妃其象也卑者宜先尊者宜後自九嬪以下九九而御于王所女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕亦十五日而徧云自望後反之孔子云日者天之明月者地之理隂契制故月上屬為天使婦從夫放月紀按月為后妃之象故云月靈興慶漢書元后傳曰元城建公曰昔春秋沙麓崩晉史占之曰後五百四十年宜有聖女興其齊田乎今王翁麓儒賀徙正直其地日月當之元城東有五麓之虛即沙後八十年當有貴女興天下毛詩曰長發其祥功參禹迹徳贊堯門左氏傳曰茫茫禹迹畫為九州功參禹迹者塗山氏也尚書娶于塗山是也淮南子曰禹治鴻水通轘轅山化為熊謂塗山氏曰欲餉聞鼓聲乃来禹跳石誤中鼓塗山氏往見禹方作熊慙而去至嵩髙山下化為石方生啟禹曰歸我子石破北方而啟生漢書武帝見夏后啓母石矣列仙傳曰鈎弋夫人姓趙氏河間人武帝披其手得玉鈎而手展有寵而生昭帝姙娠十四月上曰聞堯十四月而生今鈎弋亦然乃命所生門曰堯母門居曰鈎弋宫功參禹迹者言為文帝姬稱其婦道也徳贊堯門者言為武帝母稱其母徳也言容典禮褕狄徽章周禮九嬪掌婦學之法婦徳婦言婦容婦功鄭注云婦言謂辭令婦容謂婉娩又内司服云掌王后之六服褘衣褕狄闕翟鞠衣展衣緣衣素沙鄭注云狄當作翟褕翟畫揺者江淮而南青質五色皆備成章曰揺儀形温徳令問昭陽温徳昭陽皆殿名也詩曰儀刑文王又曰令聞令望温徳見後漢書靈帝光和元年三輔黃圖曰武帝時後宫八區有昭陽飛翔等殿成帝趙皇后居此日月不居歲時晼晚孔融與盛孝章書曰歲月不居時節如流楚辭曰白日晼晚其將入晼晚曰暮也晼於逺反瑞雲纒心閟宫惟逺瑞雲慶雲也心星名洪範五行傳曰心之大星天皇前星太子後星庶子詩閟宫云閟宫有侐實實枚枚赫赫姜嫄其徳不回上帝是依無灾無害彌月不遲是生后稷箋云閟神也姜嫄神所在故廟曰神宫言武帝即位則瑞應于天王之宫太后稱尊斯祭擬于姜嫄之廟也皇夏皇帝獻閔皇帝奏皇夏祖周書帝紀云孝閔皇帝諱覺字陁羅尼太第三子也魏恭帝三年三月命為安定公世子十月太祖崩嗣位太師大冢宰十二月丁亥魏恭帝詔以岐陽之地封帝為周公庚子禪位于帝在位一年按閔帝為宣帝世父與明帝武帝皆兄終弟及其主當祔於徳皇帝肱廟内禮所謂祔於其祖者也龍圖基代徳天歩屬艱難言周徳方盛魏祚既衰也竹書紀年曰黃帝五十年龍圖出河龜書出洛白華之詩云天歩艱難之子不猶箋云天行此艱難之妖久矣王不圖其變之所由爾謳歌還受瑞揖讓乃登壇言閔帝受魏禪也周書本紀云魏帝臨朝遣民部中大夫濟北公廸致皇帝璽紱固辭公卿百僚勸進太史陳祥瑞乃從之升輿芒刺重入位據關寒謂晉公護專政也漢書宣帝立謁見髙廟大將軍霍光參乗上内嚴憚之若有芒刺在背鄒陽上書曰孝文帝據關入立寒心銷志不明求衣巻舒雲汎濫㳺揚日浸微言君弱臣强也雲喻臣汎濫言其勢盛也日喻君浸微言其勢衰也出鄭終無反居桐竟不歸謂晉公護幽帝以弑崩也周書本紀云帝性剛果見晉公護執政深忌之與宫伯􅡧弗鳳等共謀誅䕶司㑹李植軍司馬孫恒奏帝將召羣公入因誅䕶張光洛白護護乃共謀廢立盡誅鳳等罷散禁兵譴大司馬賀蘭祥逼帝遜位遂幽於舊邸月餘以弑崩左氏傳曰天王出居於鄭尚書曰放太甲於桐出鄭居桐以喻閔帝幽於舊邸也無反不歸言其竟以弑崩也祀夏今惟舊尊靈謚更追言武帝時始得祭祀更上謚也左傳哀元年伍員曰祀夏配天不失舊物周書云武帝誅護太師蜀國公逈於南郊上謚曰孝閔皇帝陵曰靜陵皇夏皇帝獻明皇帝奏皇夏也周書本紀云世宗明皇帝諱毓太祖長子太統十四年封寧都郡公孝閔踐阼進位柱國岐州刺史及閔帝廢晉公䕶迎帝即天王位在位四年崩謚曰明廟號世宗隋書禮儀志云明帝廟號世宗為祧廟而不毁按明帝為武帝之兄於宣帝為世父並在四親當祔其祖祧廟尚宜虛置及親盡之代居之若姬周世室矣若水逢降居窮桑屬惟政言帝為太祖庶長立元后子閔帝為後是若水降居之事也閔帝為帝第三弟嗣安定公卒受魏禪是窮桑屬惟政也史記曰黃帝生二子其後皆有天下其二曰昌意降居若水若水在蜀所封國也左傳昭二十九年曰少皡氏四叔世不失職遂濟窮桑杜預曰窮桑少皥氏之號也四子能治其官使不失職濟成少皡之功死皆為民祀窮桑地在魯北論語子曰書云孝乎惟孝友于兄弟施于有政是亦為政丕哉馭帝籙鬱矣當天命言帝始受降居終膺天命也東京賦曰髙祖膺籙受圖薛綜曰膺籙謂當五勝之籙也方定五雲官先齊八風令史記曰黃帝官名皆以雲命為雲師應劭曰黃帝受命有雲瑞故以雲紀事也春官為青雲夏官為縉雲秋官為白雲冬官為黑雲中官為黃雲淮南子曰八風東北曰條風東方曰明庶風東南曰清明風南方曰景風西南曰凉風西方曰閶闔風西北曰不周風北方曰廣莫風文昌氣似珠太史河如鏡孝經援神契曰文者精所聚昌者揚天紀輔拂並居以成天象故曰文昌宫爾雅釋九河一曰徒駭二曰太史是太史河名也南宫學巳開東觀書還聚後漢書曰肅宗詔賈逵入講尚書南宫雲臺又竇章傳曰學者稱東觀為老氏臧室道家蓬莱山文辭金石韻毫翰風飈豎以上言帝好文學也周書本紀云帝寛明仁厚敦睦九族有人君之度幼而好學博覽羣書善屬文詞采温麗及即位集公卿以下有文學者八十餘人於麟趾殿刋校經史又捃採衆書自羲農以来訖於魏末叙為世譜凡五百巻云所著文章十一巻陸機文賦云被金石而徳廣爾雅曰扶揺謂之猋猋與飈字同清室桂馮馮齊房芝詡詡漢書樂志安世房中歌曰桂華馮馮翼翼承天之則師古曰馮馮盛滿也又齊房歌曰齊房產草九莖連葉齊房元封二年芝草生甘泉齊房作師古曰齊讀齋羽獵賦風詡詡其扶輪寧思玉管笛空見靈衣舞西京雜記曰髙祖入咸陽宫周行府庫有玉笛長二尺三寸六孔楚辭曰靈衣兮披披潘岳寡婦賦云瞻靈衣之披披良曰靈衣平生衣謝莊宣貴妃誄云靈衣虛襲皇夏皇帝獻高祖武皇帝奏皇夏子周書本紀云髙祖武皇帝諱邕太祖第四也孝閔踐阼拜大將軍出鎮同州世宗即位進柱國蒲州刺史武成元年封魯公領宗師二年世宗崩遺詔傳位於帝在位七年崩諡曰武廟號髙祖隋書禮儀志云武帝廟號髙祖為祧廟而不毁按武帝宣帝之父於四親廟為禰祧廟亦宜虛置及親盡之後乃得居之亦如姬周世室矣南河吐雲氣北斗降星辰周書本紀云母曰叱奴太后大統九年生帝於同州有神光照室史記天官書曰東井西曲星曰鉞鉞北北河南南河兩河天闕間為關梁正義曰南河三星北河三星分夾東井南北置而為戒天官書又云北斗七星所謂璇璣玉衡以齊七政百靈咸仰徳千年一聖人東都賦曰禮神祗懐百靈易乾鑿度曰黃河千年一清至聖之君以為大瑞書成紫微動律定鳳凰馴春秋合誠圖云北辰其星五在紫微中又云紫微大帝室太一之精律厯志云黃帝使伶倫造律制為十二筩以聴鳳凰之鳴六軍命西土甲子陳東隣言武帝有平鄴之功也左傳杜注云六軍天子之軍也尚書曰武王以甲子日入朝歌易曰東隣殺牛不如西隣之禴祭後周本西魏所禪都長安故云西土齊本東魏所禪都鄴是為東隣比於殷周矣周書本紀云建徳六年平鄴是其事也戎衣此一定萬里更無塵周書本紀云破齊之後遂欲窮兵極武平突厥定江南一二年間必使天下一統此其志也煙雲同五色日月並重輪天官書曰若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂卿雲卿雲見喜氣也古樂府有日重光月重輪流沙既西靜蟠木又東臣史記五帝本紀曰西至於流沙東至于蟠木山海經曰流沙出鍾山西南行昆侖墟入海海外經曰東海中有山焉名曰度索上有大桃樹蟠曲三千里凱樂聞朱雁鐃歌見白麟左氏傳曰振旅凱入於晉周禮曰王師大獻則令奏愷樂鄭注云大獻獻㨗于祖也又鼓人職云以金鐃止鼓鄭云鐃如鈴無舌有秉執而鳴之以止擊鼓司馬職曰鳴鐃且郤鐃女交反漢書武帝紀曰上行東海雍獲赤雁作赤雁歌又曰上行幸雍獲白麟作白麟歌今為六代祀還得九疑賔隋書樂志云天和元年武帝初造山雲舞以備六代具用六舞六代大夏大濩大武正徳武徳山雲之舞也史記曰舜葬於江南九疑是為零陵皇覽曰舜冢在零陵營浦縣其山九豀皆相似故曰九疑言武帝造山雲舞以備六代今没即以六代之樂祀之還如虞舜葬于九疑也皇夏皇帝還東壁飲福酒奏皇夏禮殫祼獻樂極休成周禮曰大祭祀后祼獻則贊鄭注云謂祭宗廟王既祼而出牲后乃從後祼也獻謂王薦腥薦孰后亦從後獻也又大宗伯云以肆獻祼享先王鄭注云獻獻醴謂薦血腥也祼之言灌灌以鬱鬯謂始獻尸求神時也又司尊彝稱春祠夏禴秋嘗冬蒸四時之間祀追享朝享有祼有獻鄭注云祼謂以圭瓚酌鬱鬯始獻尸也禮殫祼獻者謂祼獻之禮已畢也漢書樂志曰登歌再終下奏休成之樂美神明既饗也長離前掞宗祀文明漢書樂志曰長麗前掞光耀明晉灼曰掞即光炎字也臣瓚曰長離靈鳥也故相如賦曰前長麗而後矞皇舊說云鸞也張衡思𤣥賦亦曰前長麗使拂羽師古曰麗音離孝經云宗祀文王于明堂縮酌浮蘭澄罍合鬯枚乗七發云蘭英之酒酌以滌口周禮鄭注云罍神之所飲也又云鬯釀秬為酒芬香條暢於上下也秬如黑黍一稃二米磬折禮容旋廻靈貺曲禮曰立則磬折垂佩疏云僂折如磬之背故云磬折也後漢書光武贊曰靈貺自甄注云靈貺謂佳氣神光之類也受釐徹俎飲福移樽史記曰賈生徵見漢文帝方受釐坐宣室應劭曰釐祭餘肉也徐廣曰祭祀福胙也釐音僖惟光惟烈文子文孫尚書立政曰繼自今文子文孫皇夏皇帝還便坐奏皇夏庭闋四始筵終三薦子夏詩序云是謂四始詩之至也按四始謂風大雅小雅頌也周禮鄭注云筵亦席也鋪陳曰筵藉之曰席又云薦進也備品物曰薦顧歩階墀徘徊餘奠說文曰墀涂地也六龍矯首七萃警途漢書樂志曰吾知所樂獨樂六龍六龍之調使我心若穆天子傳曰天子賜七萃之士鼓移行漏風轉相烏行漏謂下漏數刻也相烏相風烏也三輔黃圖曰長安宫靈臺有相風烏遇風乃動翼翼從事綿綿四時爾雅曰翼翼恭也從事從祭事若春秋有事於武宫謂有祭祀也爾雅曰綿綿穮也孫炎云綿綿言詳密也四時謂四時之祭爾雅曰春祭曰祠夏祭曰礿秋祭曰嘗冬祭曰烝此四時之祭名也惟神降嘏永言保之以上並載隋書樂志周大祫歌周禮祫禘祫嘗祫烝鄭注云祫合也天子諸侯之喪畢合先君之主於祖廟而祭之謂之祫後因以為常天子先祫而後時祭春秋文二年八月丁夘大事于太廟公羊傳曰大事者何大祫也毁廟之主陳於太廟未毁廟之主皆升合食於太祖故為大事禮緯云三年一祫五年一禘禮疏稱鄭康成祫禘及四時祭所以異者祫謂祭於始祖之廟毁廟之主及未毁廟之主皆在始祖廟中始祖之主于西方東靣始祖之子為昭北方南靣始祖之孫為穆南方北靣自此以下皆然從西為上禘則太王王季以上遷主祭於后稷之廟其坐位乃與祫相似其文武以下遷主若穆之遷主祭於文王之廟文王東靣穆主皆北靣無昭主若昭之遷主祭于武王之廟武王東靣其昭主皆南靣無穆主又祭親廟四其四時之祭惟后稷文武及親四廟也隋書禮儀志稱後周時祭各于其廟祫禘則于太祖按文帝廟號太祖比之后稷矣后稷姬周逺祖後周文帝祖父尚在四親之内子雖齊聖不先父食文帝以上不宜反居其下太廟中東向之位疑尚虛置祫祭之時惟有昭在北方南靣穆在南方北靣及文帝親盡之後毁廟之主與未毁廟之主合食太廟文帝正太祖之位其主始西矣方東面而已下昭穆如其位若魏高堂隆之議于禘亦然禘祭之説閔帝廟毁其遷主得祭于太祖之廟如太王以上遷主得祭于后稷之廟也其明帝武帝兄弟同班不異昭穆雖二廟不遷亦異姬周穆之遷主祭於文王之廟昭之遷主祭于武王之廟故祫禘雖屬二祭而隋志云皆于太祖廟祭之也其時祭則有二昭二穆上篇髙曽祖禰是也親盡之後時祭則有太祖世宗髙祖三廟加四親廟合于姬周七廟之數然宣帝世太祖為王父至靜帝世為曽祖而大定元年隋受周禪矣昭夏降神律在夾鍾服居蒼袞周禮鄭注曰夾鍾卯之氣也二月建焉而辰在降婁月令仲春云律中夾鍾天子衣青衣蒼亦青也杳杳清思綿綿長逺漢書樂志曰杳杳㝠㝠克綽永福詩曰綿綿𤓰瓞毛傳曰綿綿不絶貌就祭於合班神於本公羊傳曰祫合祭也来庭有序助祭有章論語詩云相維辟公天子穆穆包咸曰雍篇歌此者有諸侯及二王之後来助祭故也樂舞六代賔歌二王周語曰樂及徧舞韋昭曰徧六代之樂也謂黃帝曰雲門堯曰咸池舜曰大招禹曰大夏殷曰大濩周曰大武也詩序曰振鷺二王之後来助祭也二王於周為客故云賓也詩曰我客戾止和鈴以節鞗革斯鏘詩載見云和鈴央央鞗革有鶬毛傳云和在軾前鈴在旂上鄭箋云鞗革轡首也齋宫饌玉鬱斚浮金尚書曰惟辟玉食吴都賦云矜其宴居則珠服玉饌周禮鬱人掌祼器凡祭祀賔客之之祼事和鬱鬯以實彞而陳之鄭注云築鬱金煑之以和鬯酒鬱為草若蘭又司尊彞云祼用斚彝黃彝皆有舟斚讀為稼洞庭鐘鼓龍門瑟琴莊子曰黃帝張樂於洞庭之野周禮曰龍門之琴瑟於宗廟之中奏之鄭注云龍門山名其樂已變惟神是臨周禮曰若樂九變則人鬼皆降可得而禮矣登歌奠玉帛神惟顯思不言而令周頌之詩云敬之敬之天惟顯思玉帛之禮敢陳莊敬奉如弗勝薦如受命交於神明慤於言行燕射歌辭儀禮燕禮曰射人為擯又為司正又云若射則大射正為司射如鄉射之禮是于燕末行射謂之燕射也又燕禮云工歌鹿鳴四牡皇皇者華笙奏南陔白華華黍間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀遂歌鄉樂周南關睢葛覃巻耳召南鵲巢采繁采蘋太師告樂正曰正歌備禮記鄉飲酒義亦云工入升歌三終笙入三終間歌三終合樂三終工告樂備知燕禮有射樂成告備也周禮曰以燕射之禮親四方之賔客鄭注云賔客謂朝聘者燕禮上下經註燕有四等目錄云諸侯無事而燕一也卿大夫有王事之勞二也卿大夫有聘而来還與之燕三也四方聘客與之燕四也毛萇詩傳曰射禮有三有大射有賔射有燕射正義曰大射者將祭擇士於射宫賔射者謂諸侯来朝與之射于朝燕射者因燕賔客即與射於寢此三者其處不同其侯亦别冬官梓人云張皮侯而棲鵠則春以功張五采之侯則遠國屬張獸侯則王以燕息三者别文皮侯即大射也五采之侯賔射也獸侯燕射也不言鄉射者鄉射是州長與其民射於州序之禮天子諸侯無之故不言也燕必有樂故賔之初筵二章重說燕事籥舞笙鼔也古有此禮後周行之命子山作辭即儀禮三終一備之遺意也周五聲調曲五聲宫商角徵羽也注見下序曰元正饗㑹大禮賔至食舉稱觴薦玉六律既從八風斯暢以歌大業以舞成功宫調曲宫調曲者歌其君也以宫為君故以此歌周之君也樂記曰宫為君正義曰月令云宫屬土土居中央總四方君之象也又土爰稼穡猶君能滋生萬物也又五音以絲多聲重者為尊宫絃最大用八十一絲故宫為君史記樂書索隐注亦云是矣按儀禮燕射歌鄉樂周南召南鄭注云昔太王王季居於岐山之陽躬行召南之教以興王業及文王而行周南之教以受命作邑於豐三分天下有其二徳化被于西土是以其詩有仁賢之風者屬之召南焉有聖人之風者屬之周南焉故國君與其臣下及四方之賔燕用之合樂也子山以宫調歌其君首章言太祖變魏作周王業之所由興也次三章言閔帝受命及明帝武帝徳化之所被也比姬周之有太王王季文王二南六篇燕禮用之合樂者也氣離清濁割元開天地分易乾鑿度云輕清者上為天重濁者下為地說文云元氣初分輕清陽為天重濁隂為地萬物所陳列也三才初辨正六位始成文三才天地人也易繫辭曰兼三才而兩之又乾卦云六位時成繼天爰立長安民乃樹君穀梁傳曰為天下主者天也繼天者君也周易曰君子體仁足以長人左傳邾文公曰天生民而樹之君使司牧之其明廣如日其澤厚如雲史記曰帝堯放勲就之如日望之如雲惟昔我文祖撥亂拒謳歌文祖謂周太祖文皇帝也詩云烝衎烈祖以洽百禮是燕射之禮得進樂其先祖而神降之福也太祖為後周有功烈祖故首歌之撥亂謂齊神武入洛太祖奉魏帝西遷𢎞農沙苑諸戰俱㨗也拒謳歌者言太祖辭王就公天下將歸如舜避丹朱禹避商均也謳歌見孟子三分未撫運八百不陵河論語曰三分天下有其二以服事殷史記周本紀曰武王渡河諸侯不期而㑹者八百諸侯皆曰紂可伐矣武王曰女未知天命未可也乃還師禮敷天下信樂正神人和言太祖有制禮作樂之功也風塵行息警江海欲無波韓詩外傳曰越裳氏重譯来朝獻白雉曰海不揚波三年矣意者中國有聖人乎又我皇承下武革命在君臨謂周閔帝受命革魏如姬周下武嗣文也子夏詩序曰下武繼文也武王有聖徳復受天命能昭先人之功也周易曰湯武革命順乎天而應乎人又曰知臨大君之宜吉應圖當舜玉嗣徳受堯琴圖河圖也論語䜟曰仲尼云吾聞堯率舜等逰首山觀河渚一老曰河圖將來告帝期帝王世紀曰堯賜舜樂以昭華之玉尚書曰王義嗣德再拜孔安國曰嗣繼也記曰舜作五絃之琴以歌南風世本曰神農作琴知舜作是作南風之歌非謂舜始造琴也孟子萬章曰琴朕弤朕趙臺卿注云琴舜所彈五絃琴也弤彫弓也天子曰彫弓堯禪舜天下故賜之彫弓也按琴本神農所作彫弓天子之賜知琴亦帝堯所授故云堯琴矣沈首多推運陽城有讓心尚書大傳曰帝沈首而笑曰明哉一人天下也乃見於鐘石史記曰禹避于陽城天下諸侯皆去商均而朝禹於是遂即天子位劉熙曰潁川陽城是也以上言周受魏禪也就日先知逺觀淵早見深史記五帝紀曰就之如日禮記中庸篇云淵泉如淵𤣥精實委御蒼正乃皆平𤣥精黑精也謂黑帝之神汁光紀也蒼正謂後周感精之帝為蒼帝靈威仰也履端朝萬國年祥慶百靈左氏傳曰履端于始史記曰正月為端東都賦曰禮神祗懐百靈玉帛咸觀禮華戎各在庭左氏傳曰禹㑹塗山執玉帛者萬國杜預左傳注曰諸華中國也戎西𦍑别種曲禮有西戎詩賔之初筵言燕射之禮鄭箋云進樂其先祖於是又合天下諸侯所獻之禮諸侯所獻之禮既陳于庭有卿大夫又有國君天下徧至得萬國之歡心王受神之福於尸則子孫皆喜樂也二語言天下諸侯畢至也鳳響中夷則天文正玉衡律厯志曰黃帝使伶倫作律制為十二筩以聴鳳之鳴七月律中夷則史記曰舜乃璿璣玉衡以齊七政鄭康成曰璿璣玉衡渾天儀也七政日月五星也皇基自天保萬物乃由庚詩序曰天保下報上也君能下下以成其政臣能歸美以報其上焉又曰由庚萬物得其道也又儀禮燕禮云間歌魚麗笙由庚握衡平地紀觀象正天樞蜀都賦曰地以四海為紀春秋運斗樞曰北斗第一天樞第二璇第三機也祺祥鍾赤縣靈瑞炳皇都詩曰壽考維祺毛傳曰祺吉也鄒衍曰中國為赤縣神州皇都天子之都也更受昭華玉還披蘭葉圗尚書大傳曰堯得舜而尊之贈以昭華之玉淮南子曰黃帝齋于河洛之間㳺於翠媯大盧魚折漝而至汎白圖蘭采朱文以授帝金波来白兎弱水下蒼烏漢書曰月穆穆以金波傅𤣥擬天問曰月中何有白兎擣藥山海經曰崑崙之丘其下有弱水之川環之淮南子曰日中有踆烏玉斗調元協金沙富國租孝經援神契曰折其玉斗注云玉斗者渾儀蜀都賦曰金沙銀鑠青丘還擾圃丹穴更巢梧十洲記曰長洲一名青丘在南海辰已之地一洲之上專是林木故名青丘山海經曰丹丘之山有鳥焉名曰鳳凰見則天下大安寧安樂新成慶長生百福符明明九族序穆穆四門賔爾雅曰明明察也尚書曰以親九族又曰賔於四門四門穆穆孔傳曰穆穆美也四門四方之門舜流四凶族四方諸侯来朝者舜賔迎皆有美徳無凶人也隂陵朝北附蟠木引東臣漢書地理志九江郡有隂陵縣項羽迷失道處九江時屬南朝言將北附也史記曰北至于幽陵東至于蟠木蟠木東臣以喻平齊之後東極諸國莫不来王也澗途求版築溪源取釣綸尚書髙宗夢得說說築傅巖之野孔安國云傅氏之巖在虞虢之界通道所經有澗水壊道常使胥靡刑人築䕶此道說賢而隐代胥靡築之以供食也孟子云傅說舉於版築之間是也吕氏春秋曰太公釣于玆泉酈元曰磻磎中有泉謂之兹泉積水為陣即太公釣處多士歸賢戚維城屬茂親詩云濟濟多士又云宗子維城貴位連南斗高榮據北辰荆州星占曰南斗主爵禄爾雅曰北極謂之北辰迎時乃推策司職且班神迎時謂四時迎氣也推策即所謂乾之策坤之策是也史記堯本紀曰辨于羣神徐廣曰辨音班日月之所照霜露之所均禮記中庸篇云日月所照霜露所墜凡有血氣者莫不尊親永從文軌一長無外户人中庸云今天下車同軌書同文此言周武帝破齊之後欲平突厥定江南使天下一統言王者以天下為一家四海之内皆文軌所及故無外户之人也又此章言後周宫室之壯麗也另為一篇屬宫調鬱盤舒棟宇崢嶸侔大壯子虚賦曰其山則盤紆岪鬱徐敬業詩云茲山復鬱盤吕延濟曰鬱盤重厚貌魯靈光殿賦曰神靈扶其棟宇甘泉賦曰似紫宫之崢嶸司馬彪曰崢嶸髙深貌周易曰上古穴居野處後世聖人易之以宫室上棟下宇以待風雨盖取諸大壯大壯卦名魏都賦云思重爻摹大壯拱木詔林衡全模徵梓匠左思魏都賦曰僝拱木於林衡授全模於梓匠劉逵注云左氏傳曰山林之木衡鹿守之治木器曰梓李善注云趙岐孟子注云梓匠木工千櫨綺翼浮百栱長虹抗薛綜西京賦注曰櫨者栱欒類而曲也說文曰欂櫨柱枅也魏都賦曰欒櫨疊施張載曰綺文也魯靈光殿賦曰朱鳥舒翼以峙衡景福殿賦曰飛櫩翼以軒翥千櫨綺翼浮者言千柱皆刻為綺文如鳥舒翼也爾雅曰樴謂之􅍻大者謂之栱西都賦曰抗應龍之虹梁李善注云應龍虹梁梁形似龍而曲如虹也北去邯鄲道南来偃師望漢書地理志曰趙國故秦邯鄲郡高帝四年為趙國景帝三年復為邯鄲郡師古曰邯音寒地理志又云河南郡偃師縣殷湯所都龍首載文㮰雲楣承武帳三輔黃圖曰日營未央宫因龍首以制前殿王褒甘泉頌曰編瑇瑁之文㮰聲類曰㮰屋連緜也西京賦曰繡栭雲楣薛綜曰楣梁也皆雲氣畫如繡也漢書孟康注曰武帳置兵闌五兵於帳中也居者非求益卑宫豈難尚言皇居貴於壯麗不必有心以求狹隘大禹卑宫不難尚也論語曰禹卑宫室壯麗天下觀是以從蕭相漢書曰蕭何造未央宫上見其壯麗甚怒何曰天子以四海為家非令壯麗無以重威且亡令後世有以加也變宫調左傳昭二十五年曰五聲六律七音杜預曰周武王伐紂自午及子凡七日王因此以數合之以聲昭之故以七同其數以律和其聲謂之七音七音宫商角徴羽變宫變徵也正義曰聲之清濁數不過五而有七音者終五以外更變為之也賈逵注周語云周有七音謂七律謂七器音也黃鍾為宫太簇為商姑洗為角林鍾為徵南吕為羽應鍾為變宫蕤賔為變徴是五聲以外更加變宫變徵為七音也此二變者舊樂無之武王始加二變周樂有七音耳後周憲章周禮五聲中既有變宫變徵子山以宫調歌其君取宫為君之義也時周宣帝傳位于太子衍自號天元皇帝於事為變即取變宫以歌其事故首篇有出震明離具茨汾陽之詞次篇言其作樂之盛篇末感物觀治亂心恒防未然君子得其道太平何有焉寓勉勵之意知是時宣帝號天元皇帝居天臺靜帝衍居正陽宫二帝竝存上正宫調歌其先祖此變宫調二篇所以歌其生君也帝遊光出震君明擅作離易曰帝出乎震又曰主器者莫若長子故受之以震又曰明兩作離巖廊惟眷顧欽若尚無為漢書董仲舒傳制曰盖聞堯舜之時㳺於巖廊之上垂拱無為而天下太平文頴曰巖廊殿下小屋也晉灼曰堂邉㢘巖廊謂嚴峻之廊也尚書曰欽若昊天論語曰無為而治者其舜也與龍穴非難附鸞巢欲可窺言其攀龍附鳳有仙焉之志也龍居穴中故以龍穴為言竹書云黃帝時鳳巢阿閣鸞鳳通稱故云鸞巢孫柔之瑞圖曰鸞鳥者赤神之精鳳凰之佐雞身赤尾色亦被五采鳴中有音人君進退有度親疎有序則至也具茨應不逺汾陽寧足隨莊子曰黃帝將見大隗於具茨之山又曰堯治天下之民平海内之政往見四子藐姑射之山汾水之陽窅然喪其天下焉烝民播植重溝洫劬勞多詩云天生蒸民論語包咸注曰方里為井井間有溝溝廣深四尺十里為成成間有洫洫廣深八尺桑林還注雨積石遂開河左傳襄十年曰宋公享晉侯於楚丘請以桑林杜預曰桑林天子之樂名正義曰經典言殷樂為大濩此復云桑林者書傳言湯伐桀之後大旱七年史卜曰當以人為禱湯乃剪髪斷爪自以為牲而禱於桑林之社而雨大至方數千里或禱桑林以得雨遂以桑林名其樂也皇甫謐云殷樂一名桑林以為大濩别名也禹貢曰浮於積石至於龍門孔傳曰積石在金城西南河所經也明徵逢永命平秩值年和夏書曰明徵定保召誥曰用供王能祈天永命堯典曰平秩東作孔安國曰敬道出日平均次序東作之事以務農也更有薰風曲方聞晨露歌家語曰帝舜歌曰南風之薰兮可以解吾民之愠兮吕氏春秋曰湯命伊尹作大濩歌晨露又移風廣軒厯崇徳盛唐年孝經曰移風易俗莫善于樂後漢律厯志云黃帝造厯元起辛卯易曰先王以作樂崇徳軒厯謂黃帝軒轅氏之長厯也唐年謂唐堯之盛年也成文興大雅出豫奏鈞天詩序曰雅者正也政有大小故有大雅焉有小雅焉列子曰清都紫㣲鈞天帝之所居張湛曰清都紫㣲天帝之所居也傳記云秦穆疾不知人既寤曰我之帝所甚樂與百神游鈞天廣樂九奏樂舞不類三代之樂其聲動心一云趙簡子亦然也黃鍾六律正閶闔八風宣律厯志稱律有十二陽六為律黄鍾太簇姑洗蕤賔夷則無射隂六為吕大吕夾鍾中吕林鍾南吕應鍾是也左傳服䖍注云八卦之風乾音石其風不周坎音革其風廣莫艮音匏其風融震音竹其風明庶巽音木其風清明離音絲其風景坤音土其風凉兊音金其風閶闔黃鍾為六律之始閶闔居八風之一也孤竹調陽管空桑節雅弦周禮曰孤竹之管空桑之琴瑟舞林鸞更下歌山鳳欲前山海經曰女牀之山有鳥焉其狀如鶴五色文曰鸞鳥見即天下安寧又曰丹穴之山有鳥焉其狀如鵠五采名曰鳳凰是鳥也飲食自歌舞見則天下安寧又曰臷民之國爰有歌舞之鳥鸞鳥自歌鳳鳥自舞爰有百獸相羣爰處百穀所聚言鸞鳳亦解歌舞故見舞而下聞歌欲前也聞音能辨俗聴曲乃思賢樂記曰審音以知樂審樂以知政聴曲乃思賢者即樂記所謂君子聴鐘聲則思武臣聴磬聲則思死封疆之臣聴琴瑟則思志義之臣聴笙竽則思畜聚之臣聴鼓鼙之聲則思將帥之臣是也感物觀治亂心恒防未然樂記曰凡音之起感於物而動又云治世之音安以樂其政和亂世之音怨以怒其政乖鄧析子曰慮能防於未然言逺慮也君子得其道太平何有焉言人君能得其道以治天下則太平之理不難致也商調曲商調曲者歌其臣也燕射賔客有諸侯卿大夫皆天子之臣以商為臣故以商調歌其臣也樂記曰商為臣正義曰鄭注月令云商屬金以其濁次宫臣之象也宫八十一絲商七十二絲次宫如臣之得次君之貴重也崔氏云商是金金以决斷為臣事君亦以義斷為賢矣亦見史記索隠注君以宫唱寛大而謨明臣以商應聞義則可行樂記曰宫為君商為臣聞其宫聲使人温良而寛大聞其商聲使人方廉而好義此下言聖君之得賢臣也有熊為政訪道於容成皇甫謐曰黃帝受國於有熊居軒轅之丘故因以為名又以為號索隠曰本是有熊國君之子也列仙傳曰容成公自稱黃帝師殷湯受命委政於阿衡阿衡伊尹也商書曰惟嗣王不惠於阿衡正義曰鄭云阿倚衡平也伊尹湯倚而取平故以為官名忠其敬事有罪不逃刑左氏傳羊舌赤曰事君不避難有罪不逃刑誦其箴諫言之無隠情左傳師曠曰工誦箴諫又魏綘曰命百官官箴王闕夏書曰工執藝事以諫左傳子木問于趙孟曰范武子之徳何如對曰夫子之家事治言於晉國無隠情有剛有斷四方可以寧史記索隠曰商是金金為决斷臣事也言人臣有剛斷之才則四方賴以寧定也既頌既雅天下乃升平詩有風雅頌言誦詩乃能授政可以治平天下也專精一致金石為之開西京雜記曰李廣獵於㝠山之陽見卧虎射之没矢飲羽進而視之乃石也其形類虎退而更射鏃破簳折而石不傷余嘗以問揚子雲子雲曰至誠則金石為開言能忠以事君則精誠無不格也動其兩心妻子恩情乖晏子曰一心可以事百君二心不可以事一君孟子云身不行道不能行於妻子者也茍利社稷無有不盡懐孟子趙注曰忠臣志在安社稷而後為悅者也昊天降祐元首惟康哉毛詩傳曰尊而君之則為皇天元氣廣大則為昊天周易曰自天祐之尚書曰元首明哉股肱良哉庶事康哉百川俱㑹大海所以深羣材既聚故能成鄧林尚書大傳曰百川赴東海山海經曰夸父與日逐走入日渴欲得飲飲於河渭河渭不足北飲大澤未至渴死棄其杖化為鄧林言衆水㑹而成海衆材聚而成林以喻賢人聚而國乃大也猛虎在山百獸莫敢侵忠臣處國天下無異心言忠臣之能拒亂賊猶猛虎之能驅百獸也昔我文祖執心且危慮驅剪豺狼經營此天歩言太祖文帝事魏克盡臣道也史記曰正月上日舜受終于文祖文祖者堯大祖也宇文泰為後周太祖又謚曰文故稱文祖漢書孫寳曰豺狼當路詩曰天步艱難豺狼喻亂賊也謂髙歡之亂太祖奉武帝西遷𢎞農沙苑諸戰剋㨗魏室以安也今我受命又無敢逸豫惟爾弼諧各可知兢懼我謂後周之帝盖設為天子之辭也爾謂饗燕諸臣也言太祖執心危慮如此今我子孫受命以来日以太祖之心為心亦無敢逸豫爾諸臣可不知兢懼乎是為臣當以太祖事魏為法也尚書曰不惟逸豫惟以亂民又曰無康好逸豫乃其治民又曰謨明弼諧禮樂既正神人所以和玉帛有序志欲靜干戈尚書舜典曰神人以和聘禮曰執玉致命執帛致享左氏傳曰禹㑹諸侯于塗山執玉帛者萬國各分符瑞俱誓立山河周禮典瑞鄭注云瑞節信也典瑞若今符璽郎按符若漢書所謂銅虎符竹使符是也瑞玉瑞也若周禮桓圭信圭之屬是也漢書功臣表封爵之誓曰使黃河如帶泰山若礪國以永存爰及苗裔今日相樂對酒且當歌魏武帝短歌行曰對酒當歌人生幾何言與諸功臣既有山河之誓今日燕飲須當樂也道徳以喻聴撞鐘之聲樂叶徵圖曰黃鐘生于一一生萬物故君子鑠金為鐘撞鐘以知君道徳宋均注曰鳴鐘顯功罪故樂用鐘也神姦不若觀鑄鼎之形左傳宣三年曰昔夏之方有徳也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦故民入川澤山林不逢不若螭魅罔兩莫能逢之用能協於上下以承天休杜預曰若順也酆宫既朝諸侯於是穆左傳昭四年椒舉曰康有酆宫之朝杜元凱云酆在始平鄠縣東有靈臺康王於是㑹諸侯岐陽或狩淮夷自此平左傳椒舉曰成有岐陽之蒐杜注云周成王歸自奄大蒐於岐山之陽岐山在扶風美陽縣西北尚書序曰成王東伐淮夷遂踐奄作成王政成王歸自奄在宗周誥庶邦作多方是也孔安國傳曰淮夷徐奄之屬若渉大川言憑於舟檝如和鼎實有寄於鹽梅尚書說命曰若濟巨川用汝作舟楫又曰若作和羮爾惟鹽梅君臣一體可以靜氛埃得人則治何世無竒才左太沖詠史詩曰何世無竒才遺之在草澤風力是舉而台階序平史記曰黃帝舉風后力牧常先大鴻以治民鄭康成曰風后黃帝三公也漢書東方朔願陳泰階六符孟康曰泰階三台也台星凡六星六符六星之符騐也應劭引黃帝泰階六符經曰泰階者天子之三階三階平則隂陽和風雨時重黎既登而天地位成楚語曰少皥之衰也九黎亂徳民神雜糅不可方物顓頊受之乃命南正重司天以屬神火正黎司地以屬民使復舊常無相侵凟其後三苗復九黎之徳堯復育重黎之後不忘舊者使復典之以至於夏商故重黎氏世叙天地功無與讓銘太常之旌周禮建太常十二斿鄭注云太常九旗之畫日月名又曰日月為常析羽為旌又曰凡有功者銘書於王之太常鄭注云銘之言名也生則書於王旌以識其人與功也馬融廣成頌曰載日月之太常注云太常天子所建大旗也畫之日月世不失職受騂毛之盟左傳襄十年瑕禽曰昔平王東遷吾七姓從王牲用備具王賴之而賜之騂旄之盟曰世世無失職杜預曰騂旄赤牛也舉騂旄者言得重盟不以雞犬正義曰周禮牧人陽祀用騂牲檀弓云周人尚赤牲用騂尚書洛誥云文王騂牛一武王騂牛一諸言騂皆是赤牛則知騂旄是赤牛也旄謂尾也共旌旗之用故其字從旌旗者旌旗行而從風偃也左傳作旄此作毛省文也輯瑞班瑞穆穆於堯門尚書舜典曰輯五瑞既月乃日覲四岳羣牧班瑞於羣后又曰賔於四門四門穆穆釋言云輯合也班賦也孫炎曰謂布與也輯是歛聚班為散布惟翰惟屏膴膴於周原詩曰大邦維屏大宗維翰又曰周原膴膴毛萇曰膴膴美也箋云廣平曰原周之原地在岐山之陽膴膴然肥美也功成而治定禮樂斯存樂記曰王者功成而作樂其功大者其樂備復子而明辟姬旦何言尚書曰周公拜手稽首曰朕復子明辟孔傳曰周公致禮盡敬言我復還明君之政於子子成王年二十成人故必歸政而退老角調曲角徴羽三調曲歌其民安物阜庶績咸熈也以角為民故以角調歌其民也樂記曰角為民正義曰鄭注月令云角屬木以其清濁中民之象也宫濁而羽清角六十四絲聲居宫羽之中半清半濁民比君臣為劣比事為優故云角清濁中民之象也崔氏云角屬春春時物生衆多皆有區别亦象萬民衆多而有區别也史記索隠注亦云止戈見於絶轡之野稱伐聞於丹水之征左傳曰於文止戈為武帝王世記曰炎帝殺蚩尤於中冀其地曰絶轡之野六韜曰堯與有苗戰於丹水之陽髙誘曰丹水在南陽浦崖信義俱存乃先忘食左氏傳曰君能制命為義臣能承命為信信載義而行之為利謀不失利以衞社稷民之主也忘食即論語所謂去食自古皆有死民無信不立也五材並用誰能去兵左傳襄二十七年子罕曰天生五材民並用之廢一不可誰能去兵杜預注五材云金木水火土也雖聖人之大寳曰位實天地之大徳曰生周易繫辭之文也涇渭同流清濁異能詩曰涇以渭濁湜湜其沚毛傳云涇渭相入而清濁異張揖曰涇水出涇陽开頭山入渭渭水出隴西首陽縣鳥䑕同穴山入河琴瑟竝御雅鄭殊聲毛詩曰琴瑟在御莫不靜好孫綽曰涇渭殊流雅鄭異調擾擾烝人聲教不一枚乘七發曰擾擾若三軍之騰裝鮑昭詩曰擾擾遊宦子吕延濟曰擾擾馳逐貌詩曰天生烝民毛傳曰烝衆也茫茫禹跡車軌未并左氏傳曰茫茫禹跡畫為九州禮記曰車同軌志在四海而尚恭儉心包宇宙而無驕盈尹文子曰四方上下曰宇蒼頡篇曰舟輿所届曰宙言而無文行之不逺義而無立勤則無成左傳仲尼曰言之無文行而不逺學記時過然後學則勤苦而難成惻隠其心訓以慈惠孟子曰惻隠之心仁之端也左氏傳曰享以訓恭儉宴以示慈惠恭儉以行禮而慈惠以布政政以禮成民是以息又叔向曰慈惠之師流宥其過哀矜典刑尚書舜典曰流宥五刑孔傳曰宥寛也以流放之法寛五刑論語曰如得其情則哀矜而勿喜舜典曰象以典刑孔曰法用常刑用不越法匡贊之士或從漁釣史記曰太公以漁釣干周西伯雲雨之才乍嘆幽谷詩云出自幽谷尋芳者追深徑之蘭識韻者探窮山之竹楚辭臯蘭被徑王逸曰徑路也窮山疑即漢書崑崙之隂取竹之嶰谷也言人君思得賢才亦猶是矣克明其徳貢以三事詩曰其徳克明尚書曰三事大夫敬爾有官樹之風聲言於九牧尚書畢命曰彰善癉惡樹之風聲左氏傳曰樹之風聲杜預曰因土地風俗為立聲教之法尚書周官曰以倡九牧阜成兆民孔傳云九州牧伯也虞書云肇十有二州又云咨十有二牧孔安國曰禹治水之後舜分冀州為幽州并州分青州為營州始置十二州此云九牧周官文也協用五紀風若從事尚書洪範曰協用五紀孔傳曰協和也和天時使得正用五紀洪範又云五紀一曰歲二曰月三曰日四曰星辰五曰厯數又曰聖時風若農用八政甘作其穀尚書洪範曰農用八政又曰稼穡作甘殊風共軌見之周南詩譜曰文王受命作邑于豐乃分岐邦周召之地為周公旦召公奭之采地其得聖人之化者謂之周南得賢人之化者謂之召南異畝同穎聞之康叔康叔疑作唐叔周書序曰唐叔得禾異畝同穎穀獻諸天子王命康叔歸周公于東土周公既得命禾旅天子之命作嘉禾祁寒暑雨是無胥怨尚書君牙篇曰夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨孔傳曰冬大寒也天覆雲油滋焉滲漉司馬相如封禪書頌曰自我天覆雲之油油滋液滲漉何生不育徐廣曰滲音色䕃反索隠曰說文云滲漉水下流之貌也幸無謝上古之淳人庶可以封之于比屋尚書大傳曰周人可比屋而封徵調曲徵調曲者歌其事也樂記曰徵為事正義曰鄭注月令云澂屬火以其徵清事之象也羽最清徵次之故用五十四絲事勝于物而劣于民故次民居物之前所以徵為事之象也崔氏云徵屬夏夏時生長萬物萬物皆成形體事亦有體故以徵配事也史記索隠注亦云乾坤以含養覆載日月以貞明照臨周易曰乾為天坤為地又曰日月之道貞明者也尚書泰誓曰惟我文考若日月之照臨達人以四海為務明君以百姓為心左氏傳曰其後必有達人老子曰聖人無常心以百姓心為心水波瀾者源必逺樹扶疎者根必深爾雅曰大波為瀾枚乗七發云根扶疎以分離說文曰扶疎四布也雲雨取施無不洽廊廟求才多所任淳風布政常無欲至道防人能變俗言淳風至道可以化民成俗也求仁義急於水火用禮讓多於菽粟孟子曰菽粟如水火而民焉有不仁焉者乎屈軼無佞人可指獬豸無繁刑可觸竹書紀年曰黃帝軒轅氏有屈軼生於庭佞人入朝則草指之是以佞人不敢進異物志曰東北荒中有獸名獬豸一角性忠見人鬪則觸不直者聞人論則咋不正者司馬相如曰弄獬豸漢書音義曰獬豸似鹿而一角人君刑罰得中則生於朝廷主觸不直者可得而弄也王道蕩蕩用無為天下四人誰不足蕩蕩無為俱見論語四人謂四民士農工商也聖人千年始一生黃河千年始一清王子年拾遺記曰黃河千年一清至聖之君以為大瑞攝提以之而從紀玉燭於是而文明爾雅曰歲在寅為攝提格李廵曰言萬物承陽起故曰攝提格格起也天官書曰以攝提格歲索隠曰太歲在寅歲星辰出東方爾雅曰四時調謂之玉燭易曰天下文明東南可以補地缺西北可以正天傾淮南子曰昔共工之力觸不周之山使地東南傾又曰共工氏與祝融戰不勝而怒乃頭觸不周山崩天柱折地維缺女媧乃煉五色石以補天斷鼇足以立四極聚蘆灰以濟冀州於是地平天成髙誘曰三皇時天不足西北故補之浮黿則東海可厲運鍤則南山可平竹書紀年曰周穆王三十七年征伐大起九師東至於九江叱黿鼉以為梁説文曰黿大鼈也列子曰太行王屋二山方七百里髙萬仞本在冀州之南河陽之北北山愚公年九十面山而居懲山北之塞出入之迂也遂率子孫即石墾壤箕畚運於渤海之尾寒暑易節始一反焉操蛇之神聞之懼其不已也告之於帝帝感其誠命夸娥氏二子負二山一厝朔東一厝雍南自此兾之南漢之隂無隴斷焉爾雅曰鍬謂之鍤衆仙就朝於瑶水羣帝受享於明庭穆天子傳曰天子與西王母觴於瑶池之上史記封禪書曰黃帝接萬神明庭明庭者甘泉也懐和則韎任竝奏功烈則鐘鼎俱銘周禮曰韎東樂名任南樂名吳都賦曰詠韎任毛萇詩傳曰東彞之樂曰韎孝經鈎命决曰東彞曰昧南彞曰任西彞曰株北彞曰禁左氏傳曰且夫大伐小取其所得以作彞器銘其功烈以示子孫杜預曰彞常也謂鐘鼎為宗廟之常器張衡東京賦曰銘勲彞器厯世彌光薛綜曰勒銘于宗廟之器鐘鼎萬祀彌益光明字林曰銘題勒也三光以記物呈形四時以裁成正位宋均曰三光日月五星也易曰后以裁成天地之道又云正位居體雷風大山嶽之響寒暑通隂陽之氣武功則六合攸同文教則二儀經緯左傳潘黨曰臣聞克敵必示子孫以無忘武功髙誘淮南注曰四方上下曰六合孔安國書傳曰設舉序脩文教二儀天地也周易曰易有太極是生兩儀張協七命曰徳與二儀比大左氏傳曰經天緯地曰文有道則咸浴其徳好生則各繁其類尚書曰好生之徳洽於民心白日經天中則移明月橫漢滿而虧能虧能缺既無為雖盈雖滿則不危春秋元命苞曰日尊故滿滿故明明故精在外日滿者常盛無虧也禮記曰月三五而盈三五而闕言白日當中必將西匿明月盈滿終有虧時則人事亦有盛衰貴得持滿之戒也開信義以為苑囿立道徳以為城池講徳論曰游觀乎道徳之域東方朔集曰文帝以道徳為籬以仁義為藩周禮曰囿遊之獸鄭𤣥曰囿今之苑周監二代所損益郁郁乎文其可知見論語庖犧之親臨佃漁神農之躬秉耕稼周易曰古者庖犧氏之王天下也作結繩而為網罟以佃以漁蓋取諸離庖犧氏没神農氏作斲木為耜揉木為耒耒耨之利以教天下蓋取諸益湯則救旱而憂勤禹則正冠而無暇尸子曰湯之救旱也素車白馬布衣身嬰白茅以身為牲淮南子曰禹之趨時冠掛而不顧履遺而不取草上之風無不偃君子之甿知可化論語云草上之風必偃說文曰甿田民也將欲比徳於三皇未始追蹤於五霸三皇伏犧神農女媧五霸齊桓晉文宋襄秦穆楚莊也纎纎不絶林薄成涓涓不止江河生揚雄甘泉賦曰列秋荑于林薄周禮注曰竹木曰林廣雅曰草叢生曰薄家語金人銘曰涓涓不壅為江為河陶潛歸去来辭云泉涓涓而始流涓涓泉流貌事之豪髪無謂輕慮逺防微乃不傾言纎纎草木而成林薄涓涓泉流而生江河事之積微成著亦類然矣雲官乃垂拱大君鳳厯惟欽明元首左氏傳曰黃帝以雲紀故為雲師而雲名尚書曰垂拱而天下治易曰知臨大君之宜吉左傳曰鳳鳥氏厯正也尚書曰欽明文思安安又曰元首明哉孔傳曰元首君也類上帝而禋六宗望山川而朝羣后尚書曰肆類於上帝禋於六宗鄭曰禮祭上帝於圜丘六宗星辰司中司命風師雨師也王制曰天子將出類於上帝鄭曰昊天上帝謂天皇大帝北辰之星五經異義曰非時祭天謂之類言以事類告也周語云精意以享曰禋也史記裴駰注云六宗義衆鄭説為長尚書曰望於山川徧于羣神班瑞於羣后孔傳曰九州名山大川五岳四瀆之屬皆一時望祭之后君也地鏡則山澤俱開河圖則魚龍合負古有地鏡圖又地鏡圖云欲知寳所在地以大鏡夜照見影若光在鏡中者物在下也淮南子曰黃帝夢見兩龍挺白圖即帝以授于河之都天老曰天其授帝圖乎黃帝乃齋于河洛之間游于翠媯大盧魚折漝而至汎白圖蘭采朱文以授黃帝春秋元命苞曰堯游河渚赤龍負圖出赤如綈狀龍没圖在按黃帝時有盧魚負圖至唐堯時有赤龍負圖故云魚龍合負也我之天網莫不該閶闔九關天門開老子曰天網恢恢淮南子曰排閶闔踰天門髙誘曰天門上帝所居紫宫門楚辭曰虎豹九關啄害下人王逸曰天門九重使神虎豹執其開閉也卿相則風雲𤣥感匡贊則星辰下来易曰雲從龍風從虎聖人作而萬物覩春秋佐助期曰漢相蕭何昴星精既興周室之三聖乃舉唐朝之八才三聖姬周之之文武周公也八才唐朝之八元八凱也左氏傳曰髙陽氏才子八人蒼舒隤敳懤戭大臨尨降庭堅仲容叔達謂之八凱髙辛氏才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍謂之八元此十六族也以其數皆八故云八才莘臣參謀於左相天老教政於中台史記曰阿衡欲干湯而無由乃為有莘氏媵臣負鼎俎以滋味說湯致于王道孔安國曰仲虺湯左相奚仲之後莘臣謂伊尹左相為仲虺言成湯時伊尹參謀于仲虺也竹書紀年曰黃帝臣天老力牧容成黃帝泰階六符經曰泰階天子之三階漢書孟康注曰泰階三台也言黃帝有三臣天老力牧容成如天有上中下三台故云天老教政于中台也其宜作則於明哲故無崇信於姦回尚書說命曰羣臣咸諫于王曰嗚呼知之曰明哲明哲實作則又泰誓曰崇信姦回放黜師保言當法明哲之君子無信姦回之小人也又正陽和氣萬類繁君王道合天地尊夏居南方故曰正陽董仲舒曰陽居大夏而以生育長養為功史記索隠曰徵屬夏夏時生長萬物皆成形體事亦有形體故配事此徵調曲所以歌事言人君法天地之道亦以長養萬物為事也黎人耕植於義圃君子翺翔於禮園孔傳曰黎庶也司馬相如上林賦曰脩容于禮園翺翔於書圃落其實者思其樹飲其流者懐其源劉向說苑曰食其實不伐其樹飲其水者不濁其源韓詩外傳田饒曰食其食者不毁其器䕃其樹者不折其枝咎繇為謀不仁逺論語子夏辭士會為政羣盗奔左傳宣十六年曰晉侯以黻冕命士會將中軍且為太傅於是晉國之盜逃奔於秦克寛則昆蟲内向彰信則殊俗宅心商書曰克寛克仁彰信兆民毛詩序曰文王徳及鳥獸昆蟲焉尚書曰亦越文王武王克知三有宅心渭橋有月支抱馬上苑有烏孫學琴漢書匈奴傳曰單于正月朝天子於甘泉宫漢寵以殊禮位在諸侯王上上自甘泉宿池陽宫上登長平詔單于毋謁其左右當户之羣臣皆得列觀及諸蠻夷君長王侯數萬咸迎于渭橋下夾道陳上登渭橋咸稱萬歲單于就邸留月餘遣歸國按月氏西域别國名為單于所并故云月支抱馬也漢書西域傳曰烏孫國大昆彌治赤谷城去長安八千九百里元康二年上以烏孫主解憂弟子相夫為公主置官屬待御百餘人舎上林中學烏孫言宣帝時烏孫公主遣女来至京師學鼔琴赤玉則南海輸賮白環則西山獻琛說文曰賮會禮也帝王世記曰西王母慕舜之徳来獻白環魯頌曰来獻其琛無勞鑿空於大夏不待蹶角於蹛林史記大宛傳曰張騫遣使通大夏之屬於是西北國始通於漢矣然張騫鑿空蘇林曰鑿空開通也騫開通西域道索隠曰謂西域險阸本無道路今鑿空而通之也尚書泰誓曰百姓懍懍若崩蹶角孟子趙注云蹶角叩頭以額􅠅蹶地漢書匈奴傳曰秋馬肥大會蹛林課校人畜計服䖍曰蹛音帶匈奴秋社八月中㑹祭處也師古曰蹛者繞林木而祭也鮮卑之俗自古相傳秋天之祭無林木者尚豎柳枝衆騎馳遶三周廼止此其遺法羽調曲羽調曲者歌其物也樂記曰羽為物正義曰鄭注月令云羽屬水以其最清物之象也用四十八絲而為物劣於事故最處末所以羽為物也崔氏云羽屬冬冬物聚則成財用冬則物皆藏聚與財相類也史記索隠注同樹君所以牧人立法所以靜亂左氏傳曰天生民而樹之君使司牧之首惡既其南巢元兇於是北竄尚書曰成湯放桀於南巢孟子曰舜流共工于幽州共工為四凶元大也謂大兇之人也幽州在北故云北竄説文曰竄匿也居休氣而四塞在光華而兩旦尚書中侯曰帝堯脩壇河洛昩爽禮備榮光出河休氣四塞尚書云舜曰重華是以雨施作解是以風行惟渙解渙俱周易卦名解卦彖曰天地解而雷雨作雷雨作而百果草木皆甲坼解之時大矣哉渙卦象曰風行水上渙周之文武洪基光宅天下文思尚書序曰昔在帝堯聰明文思光宅天下孔傳曰言聖徳之逺著千載克聖咸熙七百在我應期尚書曰庶績咸熙左傳宣三年王孫滿曰成王定鼎于郟鄏卜世三十卜年七百天所命也實昊天有成命惟四方其訓之詩周頌曰昊天有成命二后受之又曰四方其訓之運平後親之俗時亂先疎之雄踰桂林而驅象濟弱水而承鴻賈誼過秦論曰南取百越之地以為桂林象郡韋昭曰今鬱林日南是也𤣥中記曰天下之弱者有崑崙之弱水鴻毛不能勝也大荒西經曰弱水有二源俱在女國北阿耨達山南流㑹於女國東去國一里深丈餘濶六十歩非毛舟不可濟南流入海阿耨達山一名崑崙山既浮干吕之氣還吹入律之風周禮太師掌六律六吕以合隂陽之聲律厯志云律有十二陽六為律隂六為吕黃帝之所作也左傳衆仲曰夫舞所以節八音而行八風又晏子曰一氣二體三類四物五聲六律七音八風九歌十洲記天漢三年月氏國獻神香曰國有常占東風入律百旬不休青雲干吕連月不散意中國有好道君故披竒異而貢神香錢則都内貫朽倉則常平粟紅漢書食貨志曰武帝之初七十年間國家亡事非遇水旱則民人給家足都鄙廩庾盡滿而府庫餘財京師之錢累百鉅萬貫朽而不可校太倉之粟陳陳相因充溢露積于外腐敗而不可食又王嘉傳曰都内錢四十萬萬食貨志曰大司農中丞耿壽昌白令邊郡皆築倉以穀賤時増其賈而糴以利農穀貴時減價而糶名曰常平倉吳都賦曰海陵之倉則紅粟流衍吕延濟曰紅粟謂儲久而色赤也火中乃寒乃暑年和一風一雨左傳昭三年張趯曰火中寒暑乃退杜預曰心以季夏昏中而暑退季冬旦中而寒退王充論衡曰太平瑞應五日一風十日一雨聴鐘磬念封疆聞笙竽思畜聚史記樂書曰君子聴鐘聲則思武臣聴磬聲則思死封疆之聴笙竽簫管之聲則思畜聚之臣臣瑶琨篠簜既從怪石鉛松即序瑶琨篠簜怪石鉛松皆出禹貢孔傳曰瑶琨皆美玉篠竹箭簜大竹怪異好石似玉者長樂善馬成廏水衡黃金為府三輔黃圖曰未央六廏在長安故城中漢官儀曰未央宫六廏長樂承華等廏令皆秩六百石漢書王嘉傳曰水衡錢二十五萬萬少府錢十八萬萬宣帝紀注云水衡與少府皆天子私藏也百川乃宗巨海衆星是仰北辰尚書大傳曰百川赴東海論語曰譬如北辰居其所而衆星共之漢書天文志云斗為帝車運於中央臨制四海分隂陽建四時均五行移節度定諸紀皆繫于斗是以衆星共之也九州攸同禹跡四海合徳堯臣禹貢曰於是九州攸同四奥既居朝陽栖於鳴鳳靈畤牧於般麟詩云鳳凰鳴矣於彼朝陽梧桐生矣于彼髙岡爾雅曰山東曰朝陽鄭箋云鳳凰之性非梧桐不棲非竹實不食也史記封禪書曰郊雍獲一角獸若麟然有司曰陛下肅祗郊祀上帝報享錫一角獸盖麟云於是以薦五畤雲玉葉而五色月金波而兩輪崔豹古今注曰黃帝與蚩尤戰於涿鹿之野常有五色雲氣金枝玉葉止於帝上有華葩之象故因作華盖也漢書樂志曰月穆穆以金波又樂府有月重輪故云兩輪凉風迎時北疑作西狩小暑戒節南廵月令孟秋之月云凉風至天子迎秋于西郊又仲夏云小暑至尚書曰五月南廵狩按凉風秋時屬西方故疑作西狩也小暑夏節屬南方故云南廵山無藏於紫玉地不愛於黃銀禮斗威儀曰君乗金而王則紫玉見於深山又曰君乗金而王則黃銀見雖南征而北怨實西略而東賔尚書曰東征西夷怨南征北狄怨曰奚獨後予既永清於四海終有慶於一人尚書泰誓曰爾尚弼予一人永清四海又吕刑曰一人有慶兆民頼之定律零陵玉管調鐘始平銅尺漢書音義曰章帝時零陵文學奚景於泠道縣舜祠下得白玉琯古以玉為管不但竹也晉諸公贊曰散騎侍郎阮咸謂荀朂所造聲不合樂懼非徳政中和之音必是古今尺有長短所致然今鐘磬是魏時杜夔所造不與朂律相應音聲舒雅而久不知夔所造時人為之不足改易朂性自矜乃因事左遷咸為始平太守而病卒後得地中古銅尺校度朂今尺短四分方明咸果解音然無能正者龍門之下孤桐泗水之濱鳴石枚乗七發曰龍門之桐高百尺而無枝禹貢曰嶧陽孤桐泗濱浮磬孔安國曰嶧山之陽特生桐中琴瑟泗水涯中見石可以為磬鄭曰泗水出濟隂乗氏也括地志曰泗水至彭城吕梁出石磬河靈於是讓珪山精所以奉璧左氏傳曰王子朝用成周之寳珪於河津人得諸河上隂不佞以温人南侵拘得玉者取其玉將賣之則為石王定而獻之與之東訾杜預曰珪自出水也山精奉璧若荆山出玉矣韓子曰楚人和氏得璞玉於楚山之中言山川之精靈出此珪璧寳物也滌九川而賦稅乗三危而納錫禹貢曰九川滌原衆土交正致慎財賦孔傳曰九州之川已滌除無壅塞也又禹貢云三危既宅三苗丕叙鄭康成引河圖及地記三危山在鳥䑕西南與岐山相連孔安國曰西裔之山也北里之禾六穂江淮之茅三脊史記封禪書管仲曰古之封禪鄗上之黍北里之禾所以盛江淮之間一茅三脊所以為藉也蘇林曰鄗上北里皆地名禹貢曰包匭菁茅鄭康成曰匭纒結也菁茅茅有毛刺也給宗廟縮酒重之故包裹又纒結也括地志曰辰州盧溪縣西南三百五十里有苞茅山武陽記云山際出苞茅有刺而三脊因名苞茅山可以玉檢封禪可以金繩探策史記正義曰泰山上築土為壇以祭天報天之功故曰封泰山下小山上除地報地之功故曰禪言禪者神之也白虎通云封者金銀繩或曰古泥金繩封之印璽也孟康曰刻石記號有金策石函金繩玉檢之封焉風俗通曰岱宗上有金篋玉策武帝探得十八因倒讀八十其後壽果如策終永保於鴻名足揚光於載籍太上之有立徳其次之謂立言左傳穆叔曰太上立徳其次立功其次立言樹善滋於務本除惡窮於塞源左傳穆叔曰可以樹善君子也周書泰誓曰樹徳務滋除惡務本左傳詹桓伯曰拔本塞源冲深其智則厚昭明其道乃尊仁義之財不匱忠信之禮無繁動天無有不届惟時無幽不徹尚書益賛於禹曰惟徳動天無逺弗届作徳心逸日休作偽心勞日拙尚書周官之辭也自非剛克掩義無所離於勦絶尚書洪範三徳二曰剛克甘誓曰有扈氏威侮五行怠棄三正天用勦絶其命孔傳曰用其失道故勦絶也𠞰絶謂滅之已上燕射歌辭按隋書音樂志云太祖輔魏之時高昌欵附乃得其伎教習以備饗宴之禮及天和六年武帝罷掖庭四彞樂其後帝娉皇后於北狄得其所獲康國龜兹等樂更雜以高昌之舊竝于大司樂習焉採用其聲被于鐘石取周官制以陳之按此知制雖取諸周官聲仍雜以彞樂所謂升歌笙入間歌合樂之節未必一如古音觀其以次而歌宫商角徵羽與君臣民事物相配亦天地自然之音律也庾子山集巻六, SBCK: ''}
