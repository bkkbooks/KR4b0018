  - {type: variant, offset: 0, length: 487, content: 欽定四庫全書庾子山集巻六周庾信撰錢唐倪璠纂註郊廟歌辭隋書樂志曰周太祖迎魏武入關樂聲皆闕恭帝元年平荆州大獲梁氏樂器以屬有司有司詳定雖著其文竟未之行也閔帝受禪居位日淺明帝雖革魏氏之樂而未臻雅正天和元年武帝初造山雲舞以備六代南北郊雩壇大廟禘樂具用六舞六代大夏大濩大武正徳武徳山雲之舞也於是正定雅音為郊廟樂創造鐘律頗得其宜宣帝嗣位皆循用之無所改作按隋書所采皆子山之辭周書云天和元年冬十月初造山雲舞以備六代之樂建徳三年冬十月六代樂成集中有賀新樂表是周武帝時郊廟燕射使子山作辭也周祀圜丘歌圜丘禘之大祭祀昊天上帝北極耀廹寳之神冬至祭之周禮所謂祀大神是也此天為大天對五帝為小天其祭用蒼璧蒼犢蒼幣皆以象天所謂牲幣各放其器之色樂用圜鐘之等周禮曰冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣鄭注云天神則主北辰又司服云王祀昊天上帝則大裘而冕此圜丘之祭也祭灋曰周人禘嚳而郊稷謂此祭天圜丘以嚳配之也圜丘比郊則圜丘為大若以郊對五時之迎氣則郊為大郊祀感精之帝祖之所自出者也五時迎氣祀五帝俱各有配注見下篇禮疏皇氏云天有六天歲有八祭冬至圜丘一也夏正郊天二也五時迎氣五也通前為七也九月大饗八也雩與郊禖為祈祭, SBCK: ''}
