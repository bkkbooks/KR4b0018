  - {type: line-break, offset: 0, content: '', id: KR4b0018_WYG_006-1a01}
  - {type: variant, offset: 0, length: 2866, content: 欽定四庫全書庾子山集巻四周庾信撰錢唐倪璠纂註詩園庭杖鄉従物外養學事閒郊禮記曰六十杖於鄉窮愁方汗簡無遇始觀爻後漢書曰吴恢殺青簡以寫經書章懐太子注云殺青者以火炙簡令汗取其青易書復不蠧謂之殺青亦謂汗簡義見劉向别録也易有三百八十四爻谷寒已吹律簷空更剪茅劉向别錄曰鄒衍在燕齊有谷寒不生五穀鄒衍吹律而温之至生黍漢書曰茅茨不剪師古曰屋蓋曰茨茅茨以茅覆屋也樵隐恒同路人禽或對巢臧榮緒晉書云何琦曰胡孔明有言隐者在山樵者亦在山在山則同所以在山則異譙周古史考曰許由夏常居巢故一號巢父水蒲開晩結風竹解寒苞鮑照採桑詩曰早蒲時結䕃爾雅曰如竹箭曰苞郭注云條竹性叢生古槐時變火枯楓乍落膠淮南畢萬術曰老槐生火山海經曰黄帝殺蚩尤棄其桎梏化為楓郭璞曰楓似白楊葉圓而岐有脂而香今之香楓是膠楓樹脂也倒屣迎懸榻停琴聴解嘲魏志王粲傳曰蔡邕才學顯著貴重朝廷常車騎填巷賔客盈座聞粲在門倒屣迎之後漢書徐穉傳曰豫章太守陳蕃不接賔客惟見穉來特設一榻去則懸之又陳蕃傳曰太尉李固表薦遷樂安太守郡人周璆高潔之士前後郡守招命莫肯至惟蕃能致焉字而不名特為置一榻去則懸之二傳互載在豫章則特設以待穉在樂安則特設以待璆並有懸榻之事也揚子解嘲序云人有嘲碓以𤣥之尚白碓解之號曰解嘲香螺酌美酒枯蚌藉蘭殽西京雜記曰趙飛燕為皇后其女弟上穟有香螺巵出南海一名丹螺王子年拾遺記曰漢武帝思懐李夫人侍者覺帝容色愁怨乃進洪梁之酒酌以文螺之巵巵出波祗之國知螺可用為酒巵也邊讓章華賦曰蘭殽山竦椒酒淵流注云蘭殽芳若蘭也飛魚時觸釣翳雉屢懸庖王子年拾遺記曰仙人寗封食飛魚而死二百年更生故寗先生逰沙海七言頌曰百齡暫死食飛魚此云飛魚葢言游魚之觸釣也周禮有庖人鄭注云庖之言苞也裹肉曰苞苴釋曰言庖者今之廚轉作庖者欲取庖人主六獸六禽以供庖廚有裹肉之意也庖扶交反但使相知厚當能來結交歸田子山欲歸田里故作是詩務農勤九穀歸來嘉一廛周禮冢宰職云以九職任萬民一曰三農生九穀鄭司農云三農平地山澤也九穀黍稷秫稻麻大小豆大小麥也後鄭謂三農原隰及平地九穀無秫大麥而有梁苽秫音述苽音𤓰彫胡也周禮載師云以廛里在國中之地鄭注云廛民之區域也以廛里任國中而遂人職授民田夫一廛百畝揚子雲有田一廛謂百畝之居也穿渠移水碓燒棘起山田漢書曰穿漕渠通渭孔融曰水碓之巧勝於聖人斷木掘地説文曰碓舂也棘荆棘燒棘謂芟草除地也鄭司農注周禮三農平地山澤知有山田矣樹隂逢歇馬魚潭見酒船苦李無人摘秋𤓰不直錢晉書曰王戎與羣兒戲於道側見李樹多實等軰競趨之戎獨不往或問其故戎曰樹在道邊而多子必苦李也取之信然吴越春秋曰越伐吴吴王遯去走三日三夕腹餒口饑因得生𤓰已熟吴王掇而食之謂左右曰何冬而生𤓰近道人不食何也左右曰盛夏之時人食生𤓰起居道傍子復生秋霜惡之故不食吴王嘆曰子胥所謂且食者也社雞新欲伏原蠶始更眠荆楚嵗時記曰春分日民並種戒火草於屋上有鳥如烏先雞而鳴架架格格民候此鳥則入田以為候社日四鄰並結宗㑹社牲醪為屋於樹下先祭神然後饗其胙周禮曰馬質禁原蠶者鄭注云天文辰為馬故蠶書曰蠶為龍精月值大火則浴其種是蠶與馬同氣也今日張平子翻為人所憐後漢書曰張衡字平子南陽西鄂人也衡著歸田賦李周翰曰衡逰京師四十不仕順帝時閹官用事欲歸田里故作是賦子山本張平子之賦而作此詩焉寒園即日寒園星散居揺落小村墟釋名曰星散也列位布散也青緗雜記嶺南謂村市為虚逰仙半壁畫隐士一牀書子月泉心動陽爻地氣舒禮記曰仲冬泉水動律書云十一月律中黄鍾黄鍾者陽氣鍾黄泉而出也其於十二爻為子子者滋也滋者言萬物滋於下也後漢書魯恭議奏曰易曰潛龍勿用言十一月十二月陽氣潛蔵未得用亊雖煦嘘萬物養其根荄而猶盛隂在上地凍水冰陽氣否隔閉而成冬故曰履霜堅冰隂始凝也馴致其道至堅冰也言五月㣲隂至十一月堅冰至也蔡邕獨斷曰冬至陽氣始動雪花深數尺冰牀厚尺餘韓詩外傳曰雪花六出故雪曰雪花左氏傳曰闕地下冰而牀焉故冰曰冰牀博物志曰北方地寒冰厚三尺氣出口為凌蒼鷹斜望雉白鷺下觀魚春秋文曜鉤曰金伐木故鷹撃雉李陵詩曰有鳥西南飛熠燿似蒼鷹張華鷦鷯賦云蒼鷹鷙而受緤爾雅曰鷺舂鉏郭注云白鷺也頭翅背上皆有長翰毛今江東人取以為睫攡名之曰白鷺縗陸機疏云鷺水鳥也白而好潔故謂之白鳥齊魯之間謂之舂鉏遼東樂浪吴揚人皆謂之白鷺好欲取魚時則弭之今吴人亦養焉更想東都外羣公别二疏漢書曰疏廣為太傅兄子受為少傅太子毎朝因進見太傅在前少傅在後父子並為師傅朝廷以為榮廣謂受曰吾聞知足不辱知止不殆功成身退天之道也即日父子俱移疾三月還稍篤上書乞骸骨上皆許之賜黄金二十斤皇太子贈以五十斤公卿大夫故人邑子設帳祖道供張東都門外送者車數百兩辭決而去及道觀者皆曰賢哉二大夫咸歎息為之下泣言雖仕者亦思乞骸骨歸也幽居值春山人久陸沉幽徑忽春臨莊子曰孔子之楚其鄰有夫妻臣妾登極者仲尼曰是陸沉者也決渠移水碓開園掃竹林西都賦曰決渠降雨欹橋久半斷崩岸始邪侵短歌吹細笛低聲泛古琴琴有泛音錢刀不相及耕種且須深風俗通曰錢刀俗説利傍有刀言治生得金者必有刀錢之禍漢書王莽造大錢作契刀錯刀五銖錢几四品並行故稱錢刀也長門一紙賦何處覔黄金長門賦序云孝武皇帝陳皇后時得幸頗妬别在長門宫愁悶悲思聞蜀郡成都司馬相如天下工為文奉黄金百斤為相如文君取酒因於解悲愁之辭而相如為文以悟主陳皇后復得親幸卧疾窮愁危慮風霜積窮愁嵗月侵留蛇常疾首映弩屢驚心晉書曰杜預在荆州因宴集醉卧齋中外人聞嘔吐聲竊窺戸止見一大蛇垂頭而吐聞者異之其後徴為司𨽻校尉加位特進行次鄧縣而卒題是卧疾似用此語又疑疾首是用孫叔敖兩頭蛇事賈誼新書云孫叔敖為兒時出道上見兩頭蛇殺而埋之歸見其母泣問其故對曰夫見兩頭蛇者必死今出見之故爾母曰蛇今安在對曰恐後人見殺而埋之矣母曰夫有隂徳者必有陽報爾無憂也及長為楚令尹今云留蛇常疾首者疑言留此兩頭之蛇常疾惡其首也有將死之徴矣映弩屢驚心者風俗通曰汲令應彬請主簿杜宣飲酒時其上懸赤弓照杯中如蛇宣惡之因得疾彬知之延宣於舊處置酒指曰此弩影似耳疾遂瘳又晉書樂廣請親客飲酒見杯中有蛇意甚惡之既飲而疾於是河南聴事壁上有角漆畫作蛇廣意杯中即角影也復置酒前處所見如初客豁然意解沉疴頓愈穉川求藥録君平問卜林晉書曰葛洪字穉川丹陽句容人也師事南陽太守上黨鮑𤣥𤣥亦内學逆占將來見洪深重之以女妻洪洪傳𤣥業兼綜練醫術凡所著撰皆精覈是非而才章富贍有金匱藥方肘後要急方漢書曰蜀有嚴君平卜筮於成都市裁日閲數人得百錢足自養則閉肆下簾而授老子博覽無不通依老子嚴周之指著書十餘萬言師古曰地理志謂君平為嚴遵三輔決録云君平名尊野老時相訪山僧或見尋應劭藝文志注云年老居田野相民耕種故稱野老説文曰僧浮屠道人也有菊翻無酒無絃則有琴續晉陽秋曰陶潛甞九月九日出宅邊菊叢中坐久之滿手把菊值王𢎞送酒至即便就酌醉而歸淵明不解音律而蓄無絃琴一張毎酒適輒撫㺯以寄其意詎知長抱膝徒為梁父吟蜀志曰諸葛亮躬耕隴畆好為梁父吟身長八尺自比於管仲樂毅時人莫之許也惟博陵崔州平潁川徐元直與亮友善謂為信然注云魏畧曰亮在荆州以建安初與潁川石廣元徐元直汝南孟公威等俱逰學三人務於精熟而亮獨觀其大畧毎晨夜従容常抱膝長嘯而謂三人曰卿仕進可至刺史郡守也三人問其所至亮笑而不言言已在周卧疾窮愁其狀似危求醫問卜訪尋者多豈知已抱膝而吟實有諸葛之志也山齋寂寥尋靜室䝉密就山齋楚辭曰聲嗷嗷以寂寥, SBCK: ''}
