  - {type: variant, offset: 20, length: 316, content: 六巻周庾信撰國朝倪璠註璠字魯玉錢塘人康熙乙酉舉人官内閣中書舍人是編以呉兆宜所箋庾開府集合衆手以成之頗傷漏畧乃詳考諸史作年譜冠於集首又旁採博蒐重為註釋其中如小園賦前一段本屬散文而璠以為用古韻未免失之穿鑿漢書藝文志别栩陽賦五篇自是人姓名而信哀江南賦乃云栩陽亭有離别之賦唐山夫人安世房中歌桂華二字自屬篇名馮馮翼翼承天之則二句乃下章之首而信黄帝雲門舞歌乃云清野桂馮馮皆顯然舛誤璠依違其詞不加駁正亦失之附㑹然比核史傳實較呉本為詳哀江南賦一篇引據時事尤為典核集末彭城公夫人爾朱氏墓誌銘伯母東平郡夫人李氏墓誌銘並考核年月證以文苑英華知為楊炯之文誤入信集辨證亦頗精宻不以稍傷蕪冗為嫌也乾隆四十六年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀, SBCK: ''}
