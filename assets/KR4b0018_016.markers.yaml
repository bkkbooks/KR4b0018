  front:
  - {type: 'kr:newline', offset: 0, content: '

      ', id: KR4b0018_krp_016-bkkkrnewl1}
  - {type: line-break, offset: 0, content: '', id: KR4b0018_WYG_016-1a01}
  - {type: variant, offset: 0, length: 1830, content: 欽定四庫全書庾子山集巻十四周庾信撰錢塘倪璠纂註碑周柱國大將軍紇干𢎞神道碑公諱𢎞字廣畧原州長城縣人也本姓田氏周書列傳曰田𢎞字廣畧高平人也虞賔在位基於揖讓之風鳯凰于飛紹於親賢之國序田氏之先也田氏本虞舜之後出自媯姓春秋時陳公子完奔齊始食田采以陳氏為田氏謂之陳田後周宇文起於荒服賜族皆變夏姓田𢎞為紇干氏其一也尚書曰虞賔在位羣后徳讓揖讓謂舜受禪也左氏傳曰初懿氏卜妻敬仲其妻占之曰吉是謂鳯凰于飛其鳴鏘鏘有媯之後將育於姜親賢之國謂齊也漢書地理志曰昔太公始封周公問何以治齊太公曰舉賢而上功周公曰後世必有簒殺之臣其後二年九世為彊臣田和所滅而和自立為齊侯初和之先陳公子完有罪來奔齊桓公以為大夫更稱田氏九世至和而簒齊至孫威王稱王五世為秦所滅論其繼世之功則狄城有廟序其移家之始則長陵有碑漢書曰田儋狄人也故齊王田氏之族儋從弟榮榮弟横皆豪傑宗彊能得人陳渉使周市畧地北至狄狄城守儋撃殺狄令而石豪子弟曰諸侯皆反秦自立齊古之建國儋田氏當王遂自立為齊王發兵擊周市略定齊地師古曰狄縣名也地理志屬千乗三輔黃圖曰漢高祖都長安徙諸齊田於長陵潛夫論曰漢高祖徙諸齊田而有第一至第八氏後漢第五倫其後也况復高廟上書小車而對漢主聊城祭鳥長岳而驅燕將疑作長驅而却燕將漢書曰田千秋年老上優之朝見得乗小車入宫殿中故因號曰車丞相史記曰燕軍攻安平盡降齊城惟獨莒即墨不下燕惠王使騎劫代樂毅毅歸趙燕人士卒忿而田單乃令城中人食必祭其先祖於庭飛鳥悉翔舞城中下食燕人怪之田單因宣言曰神來敎我卒破燕軍殺其將騎劫而齊七十餘城皆復又魯仲連傳曰田單攻之不下魯仲連乃為書遺燕將燕將自殺聊城亂田單遂屠聊城公以胎敎之月歳德在寅載誕之辰星精出昴列女傳曰太任文王之母摯任氏中女也王季娶為妃有娠目不視惡色耳不聽淫聲口不出敖言能以胎敎溲於豕牢而生文王爾雅曰歳在寅曰攝提離騷曰攝提貞於孟陬兮惟庚寅吾以降春秋佐助期曰漢相蕭何昴星精是以月中生樹童子知言水上浮瓜青衿不戲世説曰徐孺子年九歳嘗月下戲人語之曰若令月中無物當極明耶徐曰不然譬如人眼中有瞳子無此必不明浮瓜未詳㑹稽典録曹娥投瓜于江存其父尸異苑稱魏武見石旁八字不能了禰衡離合解之疑是事而受書黃石意在王者之圖一作師揮劒白猿心存霸國之用荀悦漢紀曰張良遊於汜上有父老直墮其履顧謂良曰孺子下取履良取履跪而進之父老曰孺子可敎矣後三期而良先至父老遺書一編曰讀此即為王者師後十三年見我於齊北榖城山下黃石即我已遂去不復見其書乃太公兵法也呉越春秋曰袁公與越女試劒竹枝上袁公即飛上樹變為白猿遂别去見越王王即加女號曰越女乃命五板之隊長高習之敎軍士當世莫能勝越女之劒本傳云少慷慨志立功名膂力過人敢勇有謀略魏永安中任子都督翻原州城受隴西王節度於時洛邑亂離當塗危逼禮樂征伐不出於天子舉賢誅暴實在於彊臣永安魏莊帝年號也子都督後魏官名隴西王爾朱天光也彊臣謂爾朱氏也魏本紀云明帝崩爾朱榮謀廢立以長樂王子攸為帝榮以兵權在己遂有異志乃害靈太后及幼主次害無上王邵等尋追諡無上王為皇帝餘死者皆有贈子孫聽立後授封爵爾朱榮率騎七千討葛榮於滏口破禽之以葛榮平大赦改元為永安是其事也洛邑魏所都也當塗謂魏也圖讖曰代漢者當塗高拓拔氏國號後魏故云當塗危逼太祖文皇帝始創霸功初勤王室秣馬蒐乗誓衆太原公仗劒轅門麄謀當世周書本傳云魏永安中陷於万俟醜奴爾朱天光入闗𢎞自原州歸順授都督及太祖初統衆𢎞求謁見乃論世事深被引納即處以爪牙之任左氏傳曰求諸侯莫如勤王又令狐之役云訓卒利兵秣馬蓐食又苖賁皇曰蒐乗補卒杜注云蒐閲也周禮曰設宮車轅門前漢紀曰樊噲仗劒楯衝門而入立於帳下隨何逺至實釋漢帝之憂許攸夜來遂定曹王之業漢書曰漢王與楚大戰彭城不利出梁地至虞謂謁者随何曰公能説九江王布使舉兵畔楚項王必留擊之吾取天下必矣隨何往説布果使叛楚布與隨何間行歸漢魏略曰許攸字子遜少與袁紹及太祖善初平中隨紹在冀州嘗在坐席言議官渡之役諫紹弗與太祖相攻紹自以彊盛必欲極其兵勢攸知不可為謀遂亡詣太祖言𢎞去爾朱而就周文猶隨何之説布畔楚許攸之去袁即曹也永熙中初一作奉迎魏武帝入闗魏本紀云武帝永熙三年七月帝親總六軍十餘萬次河橋高歡引軍東渡宇文泰迎帝於東陽入長安以雍州公廨為宫是為西魏封鶉隂縣開國子邑五百戸本傳又以迎魏孝武功封鶉隂縣魏屬平涼郡太祖以自著鐵甲賜公云天下若定還將此甲示寡人本傳稱孤餘同白水良劒罷朝而贈陳寵青驪善馬廻車而賜李忠並經輿服足為連類後漢書曰陳寵字昭公沛國洨人也久留臺閣賞賜有殊又韓稜傳曰稜為尚書令與僕射郅壽尚書陳寵同時俱以才能稱肅宗嘗賜都尚書劒惟此三人特以寳劒自署其名曰韓稜楚龍淵郅壽蜀漢文陳寵濟南椎, SBCK: ''}
