  - {type: variant, offset: 2, length: 47734, content: 山集巻二周庾信撰錢塘倪璠纂註賦哀江南賦并序哀江南賦者哀梁亡也本傳信雖位望通顯常有鄉闗之思乃作哀江南賦以致其意宋玉招䰟曰䰟兮歸來哀江南宋玉戰國時楚人梁武帝都建鄴元帝都建鄴元帝都江陵二都本戰國楚地故云之舊本序列諸篇哀江南賦在卭竹杖賦後今為詮觧其文繁多特為一巻粤以戊辰之年建亥之月大盜移國金陵瓦解南史梁武帝紀太清二年八月戊戌候景舉兵反十月侯景襲譙州進攻䧟歴陽已酉景自横江濟采石辛亥至建鄴是太清二年歳在戊辰十月為建亥之月侯景兵至京城也爾雅釋詁粤於爰曰也疏云謂語辭發端也大盜謂侯景也後漢光武贊炎政中微大盜移國江表傳江紘謂孫權曰秣稜楚武王所置名曰金陵昔秦始皇東巡㑹稽經此縣望氣者云金陵地形有王者都邑之氣故掘斷連岡改名秣稜今處所具存矣漢書徐樂上書曰安土樂俗之人衆故諸侯無境外之助此之謂瓦解余乃竄身荒谷公私塗炭說文竄匿也杜預左傳注荒谷楚地本傳侯景至信以衆先退臺城䧟後信奔江陵是竄身荒谷也商書有夏昏徳民墜塗炭孔傳曰若陷泥墜火無救之者言已去後公室私門俱遭其塗炭也華陽奔命有去無歸梁元帝承聖三年信使於西魏是年冬江陵䧟遂留北不歸南郡江陵在華陽言從華陽奔命而北至長安遂不歸也常劇著華陽國志西魏都長安班固西都賦漢之西都在於雍州實曰長安雍州在華山之隂矣左傳楚申公巫臣遺二子書曰余必使爾罷於奔命以死子重子反於是乎一嵗七奔命中興道銷窮於甲戌言元帝江陵之敗也南史元帝紀承聖三年魏使于謹来攻冬十月魏軍至襄陽梁王詧率衆㑹之十一月魏軍至柵下帝見執魏人戕帝是年嵗在甲戌按元帝承制江陵尅平侯景既雪讐恥且應天人啓中興之業江陵之陷也是中興道銷窮於甲戌之年三日哭於都亭三年囚於别館晉書羅憲傳魏之伐蜀憲守永安城及成都敗知劉禪降乃率所部臨於都亭三日左傳國人大臨守陴者皆哭杜云臨哭也昭二十三年傳曰叔孫婼如晉晉人執之館諸箕舎子服昭伯於他邑杜注别囚之言江陵之陷己時奉使長安為魏所執遥臨國亡矣天道周星物極不反左氏傳曰十二年是謂一終一星終也杜注嵗星十二歳而一周天正義曰直言一星終知是嵗星者以古今厯書推歩五星金水日行一度土三百七十七日行星十二度火七百八十日行星四百一十五度木三百九十八日行星三十三度十二年一終故知是嵗星嵗星天之貴神所在必昌按左傳嵗在鶉火而陳滅析木之津又将復由蔡凶復在豕韋椘凶復在大梁越得嵗而呉伐之不及四十年越遂有呉皆云天之道也是周星之時物極必反也梁元帝江陵敗後竟不能復故下云但有身世王室之悲也史記春申君曰臣聞物至則反冬夏是也正義曰至極也極則反也冬至隂之極夏至陽之極傅燮之但悲身世無䖏求生後漢書傅燮字南容北地靈州人也為漢陽太守賊王國韓遂等進圍漢陽城中兵少糧盡燮猶固守子幹年十三從在官舎諌曰國家昏亂遂令大人不容於朝今天下已叛而兵不足自守鄉里羌胡先佩恩徳欲令棄郡而歸徐至鄉里率厲義徒見有道而輔之以濟天下言未終燮慨然呼子幹曰别成汝知吾必死邪盖聖達節次守節世亂不能養浩然之志食禄又欲避其難乎吾行何之必死於此幹哽咽不能復言左右皆泣下遂麾左右進兵臨陣戰沒謚曰壮節侯袁安之每念王室自然流涕後漢書袁安字邵公汝南汝陽人也安為司徒以天子幼弱外戚擅權毎朝㑹進見及與公卿言國家事未嘗不噫嗚流涕昔桓君山之志事一作士杜元凱之平生並有著書咸能自序後漢書桓譚字君山著書二十九篇號曰新論晉書杜預字元凱著春秋經傳集觧杜預自序曰少而好學在官則觀於吏治在家則滋味典籍潘岳之文采始述家風世說潘岳作家風詩晉書潘岳字安仁滎陽中牟人也陸機之辭賦先陳世徳陸機集有祖徳述先二賦又文賦云詠世徳之駿烈晉書陸機字士衡呉郡人也祖遜呉丞相父抗呉大司馬世為将相有大勲於江表信年始二毛即逢䘮亂藐是一作狼狽流離至於暮齒左氏傳曰不禽二毛杜預注二毛頭白有二色潘岳秋興賦序余春秋三十有二始見二毛以滕王逌序已亥年六十七嵗逆數之逢亂之嵗子山時年三十有六左傳以是藐諸孤詩弼風云流離之子毛傳流離鳥也少好長醜始而愉樂終以㣲弱箋云衛之諸臣初有小善終無成功似流離也陸璣云流離梟也自闗西謂梟為流離漢書師古注流離謂亡其居處也子山丁年出使皓首不歸是賦暮年所作雖位望通顯常有鄉闗之思故云流離至暮齒也一作狼狽孔叢子孔子曰吾於狼狽見聖人之志茍恱漢紀論曰周勃狼狽失據塊然囚執酉陽雜俎狼狽是兩物狽前足絶短毎行駕兩狼失狼則不能動故言世事乖者稱狼狽燕歌逺别悲不自勝魏文帝有燕歌行北史王褒傳曰褒作燕歌妙盡塞北苦寒之言元帝及諸文士和之而競為悽切及江陵為魏師所破元帝出降方驗焉子山集中亦有此作楚老相逢泣将何及徐州先賢傳曰楚老彭城之隠人也謝靈運為廬陵王墓下作曰延州協心許楚老惜蘭芳觧劍竟何及撫墳徒自傷楚老謂漢世弔龔勝者也子山本國江陵世居楚地言江陵引楚事多以自喻此椘老盖指彭城之椘老也漢書兩龔皆楚人也勝字君賔舎字君倩並著名節徴為光禄大夫舎年六十八王莽居攝中卒莽遣使徴勝勝曰吾受漢厚恩無以報今年老矣旦暮入地誼豈以一身事二姓下見故主哉語畢遂不復開口飲食積十四日死有父老来弔哭甚哀既而曰嗟乎薰以香自燒膏以明自銷龔生竟夭天年非吾徒也遂趨而出信本楚人為魏周所逼何異王莽時故引此事深慙楚龔傷其身事二姓絶紀唐矣畏南山之雨忽踐秦庭讓東海之濵遂餐周粟列女傳陶答子妻曰妾聞南山有𤣥豹霧雨七日而不下食者何也欲以澤其毛而成文章故藏而逺害淮南子曰申包胥累繭重胝七日七夜至於秦庭以見秦王曰使下臣告急秦王乃發軍撃呉果大破之以存楚國元帝都江陵本楚地西魏都長安故曰秦庭信之至秦欲以存楚也又按漢書孫㑹宗書田彼南山張宴曰山髙而在陽人君之象也或其時迫扵君命不敢不行以南山喻君所未詳矣或云畏南山之雨是蹇叔送子事按左傳殽有二陵南陵夏后臯之墓北陵文王之所避風雨不得云南山之雨也讓東海之濵者盖指魏周禪受也史記田大公和遷齊康公於海上云讓者㣲詞也遂餐周粟者宇文氏國號曰周故假夷齊周粟為比言元帝畏秦兵之下使巳聘魏忽踐秦庭也及江陵既䧟身留長安見周受魏禪遂終仕於周也又史記伯夷自海濵来歸之正義曰伯夷孤竹國在平州濵東海也夷齊始為讓國而逃其後不食周粟似是一事然於子山不類按之上句不得引東海周粟為一事也下亭漂泊髙橋一作臯橋羈旅後漢獨行傳髙陽孔嵩辟公府之京師道宿下亭盜共竊其馬後漢書梁鴻至呉依大家臯伯通居廡下唐梁肅梁髙士碣云作銘臯橋萬古是望今閶門内有髙橋是楚歌非取樂之方魯酒無忘憂之用漢書戚夫人涕泣上曰為我椘舞吾為若楚歌歌曰鴻鵠髙飛一舉千里羽翼已就横絶四海又可奈何雖有繒繳尚安所施歌數闋戚夫人歔欷流涕上起去罷酒又項羽敗四面皆楚歌荘子魯酒薄而邯鄲圍許慎淮南子注楚㑹諸侯魯趙俱獻酒於楚王魯酒薄而趙酒厚椘之主酒吏求酒扵趙趙弗與吏怒乃以趙厚酒易魯薄酒奏之楚王以趙酒薄故圍邯鄲也漢書東方朔曰銷憂者莫若酒追為此賦聊以記言不無危苦之辭惟以悲哀為主漢書藝文志古之王者世有史官左史記言右史記事此賦記梁朝之興亡治亂及己世之飄颻播遷古有詩史此可謂賦史矣嵇叔夜琴賦序稱其材幹則以危苦為上賦其音聲則以悲哀為主日暮途逺一作窮人閒何世吳越春秋子胥謝申包胥曰吾日暮途逺吾故倒行而逆施之又漢書主父偃曰吾日暮故倒行逆施之荘子有人間世篇言已老矣無能為也已以下復序自梁至魏哀建鄴江陵之亡故作此賦將軍一去大樹飄零後漢馮異傳毎所止舎諸将並坐論功異常獨屏樹下故軍中號大樹将軍将軍一去大樹飄零者言已率宫中文武千餘人營於朱雀航及已退為侯景所據是其飄零者也壯士不還寒風蕭瑟戰國䇿荆軻為燕太子丹報讐去至易水太子送之宋意為撃筑軻援劍舞歌曰風蕭蕭兮易水寒壮士一去不復還其精誠感天白虹貫日後擯秦王悮中銅柱身死於秦宫楚辭宋玉曰蕭瑟兮草木揺落而變衰壮士不還者言已出使西魏如荆卿之不歸也荆璧睨柱受連城而見欺史記趙惠文王得和氏之璧秦昭王聞之使人遺趙王書願以十五城易璧趙王遂使藺相如奉璧入秦秦王坐章臺見相如相如奉璧奏上相如視秦王無意償趙城乃前曰璧有瑕請指之王授相如相如持璧倚柱怒髪上衝冠曰觀大王無意償趙城邑故臣復取璧大王必欲殺臣臣頭與璧俱碎於柱矣因持璧睨柱秦王恐破璧乃謝相如言聘於西魏為魏所欺也載書横階捧珠盤而不定史記平原君傳平原君與楚合從日中不决毛遂按劍歴階而上責楚王楚王曰唯唯遂曰從定乎王曰定矣毛遂捧銅盤而跪進之楚王遂定從而歸左氏傳曰晉士荘子為載書杜注載書盟府周禮玉府若合諸侯則供珠盤玉敦鄭注珠槃以珠飾槃所以盛牛耳言出使之後反遭魏兵是從不定也鍾儀君子入就南冠之囚左傳成七年楚子重伐鄭鄭人囚鄖公鍾儀獻諸晉晉人以鍾儀歸囚諸軍府九年傳云晉侯歸扵軍府見鍾儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之召而弔之再拜稽首問其族對曰伶人也使與之琴操南音范文子曰楚囚君子也重為之禮使歸求成言已本楚人今來秦地若南冠之囚矣季孫行人㽞守西河之館左傳昭十三年盟於平邱晉人執季孫叔魚曰鮒也聞諸吏將為子除館於西河言已遂留於長安也申包胥之頓地碎之以首左傳定四年吳伐楚戰於柏舉楚師敗績五戰及郢昭王奔隨申包胥如秦乞師立依於庭牆而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出蔡威公之淚盡加之以血劉向說苑蔡威公閉門而泣三日三夜泣盡而繼之以血曰吾國且亡言使魏之後江陵遭兵革之患已無處求救也釣臺移一作栘栁非玉闗之可望未詳按漢書龍勒有玉門闗又酒泉郡有玉門闞駰云漢罷玉門屯徙其人於此班超所謂但願生入玉門闗者也又按吴志孫權於武昌臨釣臺飲酒大歡晉陽秋陶侃鎮武昌嘗課諸營種栁又侃嘗整陣於釣臺楊栁歌亦云武昌城下誰見移非玉闗之可望者大約言征夫逺戍故鄉園栁不能復見也子山覊絏長安不勝玉闗之情矣武昌本漢之鄂縣屬江夏曽為郢州别駕論水戰事為武帝所賞或是追念在郢州時不可復得也一作栘栁古今注栘栁亦曰蒲栁爾雅楊蒲栁郭云可以為箭釣臺栘栁非逺戍玉闗者能望猶華亭唳鶴非敗於河橋者可聞引古自喻或是兩截未必一如陸機故事武昌有釣臺陶侃之鎮武昌夏施盜植官栁又子山作歌有武昌栘栁之文武昌釣臺豈其是耶華亭鶴唳豈河橋之可聞世說陸平原河橋敗為盧志所讒被誅臨刑嘆曰欲聞華亭鶴唳可復得乎注八王故事曰華亭吴由拳縣郊外墅有清泉茂林陸機兄弟共逰於此十餘年孫䇿以天下為三分衆纔一旅吴志孫䇿字伯符吴郡富春人䇿父堅薨䇿載母就吴景因緣召募得數百人從袁術術以堅部曲還䇿遂平定江東權稱尊號追諡䇿曰長沙桓王陸遜傳昔桓王創基兵不一旅而開創大業左氏傳曰夏少康逃奔有虞有田一成有衆一旅復禹之績杜預云五百人為旅三分魏蜀吴也項籍用江東之子弟人惟八千漢書項籍字羽下相人也箱斬㑹稽假守梁乃召故人所知豪吏諭以所為遂舉吳中兵使人収下縣得精兵八千人及敗笑曰籍與江東子弟八千人渡而西遂乃分裂山河宰割天下過秦論曰宰割天下分裂山河豈有百萬義師一朝巻甲芟夷斬伐如草木焉言孫䇿以一旅之衆項籍用八千之人遂成吳楚而梁朝百萬之師竟無所用傷建鄴亦以悼江陵也南史侯景反武帝聞之使太子家令王質率兵三千巡江遏防景至質無故自退歴陽太守莊鐵降景西豐公大椿棄石頭城走謝禧亦棄白下城走援兵至北岸號百萬後皆走侯景傳景嘗戒諸將曰破柵平城當淨殺之令天下知我威名故諸將戰勝専以焚刧為事斬艾人如草芥江陵之敗王僧辯未至而荆州已平于謹入江陵胡僧祐等戰死杜畿等被害男女數萬口分為奴婢弱小者皆殺之是前後二敗誅戮無餘矣左傳曰如農夫之務去草焉芟夷藴崇之月令虞人入山行木毋有斬伐江淮無涯岸之阻亭壁無藩籬之固臺城之陷莊鐵導景至江王質無故自退而侯景濟自采石矣江陵之敗㑹蕭詧於襄陽襲宗均於武寧而于謹遂臨城下矣言其失之易也說文江水出蜀湔氐徼外岷山入海淮水出南陽平氏桐柏大復山東南入海涯水邉也爾雅郭璞注云兩厓髙者為岸漢官儀曰十里一亭亭長持二尺板以劾賊索繩以収執賊又曰亭長課徼巡尉逰徼亭長皆習設備五兵風俗通曰漢家因秦大率十里一亭亭留也蓋行旅宿㑹之所館亭說文壁垣也杜預左傳注壁司徒主壘壁者過秦論下篇云曽無籓籬之艱言梁朝失國之易不備不虞也頭㑹箕歛者合從締交史記陳餘傳頭㑹箕歛以供軍費漢書音義曰家家人頭數出榖以箕歛之過秦論合從締交相與為一鋤耰棘矜者因利乗便過秦論鉏耰棘矜不敵於鉤㦸長鎩也又云因利乗便宰割天下孟康曰耰鋤柄也爾雅曰棘㦸也師古曰耰摩田器也矜與􅚙同謂矛鋋之把也侯景之亂梁祚漸衰陳氏日盛陳霸先其本甚微卒受梁禪頭㑹箕歛鋤耰棘荆者言其以布衣起兵也又霸先之起也胡穎廣州結託徐度交阯委質程靈洗周鐵武錢道戢駱文牙等皆為所用南史所云感㑹風雲擢自降附者也此皆合從締交因利乗便之事將非江表王氣終於三百年乎序梁亡因言江表王氣之盡也秦時望氣者曰東望有天子氣其後吴大帝孫權都建業皓遷都武昌自黄龍元年至天紀四年凡五十一年中斷東晉太興元年歴宋齊梁至敬帝太平二年凡二百四十一年共二百九十二年云三百舉其成數也合陳則三百二十四年及隋皇一統江表之王氣遂終是其驗也是知并吞六合不免軹道之災過秦論曰并吞八荒之心又曰履至尊而制六合漢書沛公至霸上秦王子嬰素車白馬繫頸以組封皇帝璽符節降枳道旁師古曰枳音軹軹道亭在霸成觀西四里混一車書無救平陽之禍史記張儀曰混一諸侯禮記車同軌書同文晉書懷帝永嘉五年劉聰使呼延晏等陷洛陽遷帝於平陽遇害愍帝建興四年劉曜陷長安送帝於平陽亦遇害言臺城之禍擬於平陽江陵出降符於軹道也嗚呼山嶽崩頽既履危亡之運禮記泰山其頽乎國語山崩川竭亡之徵也國䇿唐雎曰權輕於鴻毛而積禍重於山嶽春秋迭代必有去故之悲東京賦春秋改節四時迭代天意人事可以悽愴傷心者矣阮嗣宗詠懷詩曰素質遊商聲悽愴傷我心况復舟楫路窮星漢非乗槎可上賈誼治安䇿曰是猶渡江河亡維楫師古曰楫所以刺船也博物志舊說天河與海通近世有人居海濵者年年八月有浮槎去來不失期人有竒志立飛閣於槎上多齎糧乗槎而去十餘日中猶觀日月星辰自後茫茫忽忽亦不覺晝夜去十餘日奄至一處有城郭狀屋室甚嚴遥望宫中多織婦見一丈夫牽牛渚次飲之牽牛人驚問曰何由至此此人具說來意并問此是何處答曰君還至蜀郡訪嚴君平則知之竟不上岸因還如期後至蜀問君平曰某年月日有客星犯牽牛宿計年月正是此人到天河時也風飈道阻蓬萊無可到之期飈回風也揚雄曰風發飈拂詩遡徊從之道阻且長蓬萊海上三山名漢書郊祀志自威宣燕昭使人入海求蓬萊方丈瀛洲此三神山者其傳在渤海中去人不逺蓋有至者諸仙人及不死之藥皆在焉其物禽獸盡白而黄金銀為宫闕未至望之如雲及到三神山反居水下臨之患且至則風輙引船而去終莫能至云拾遺記蓬萊山亦名防邱亦名雲東髙二萬里廣七萬里水淺有細石如金玉得之不加陶冶自然光淨仙者服之路窮道阻以喻已之道窮也故下云達言歌事矣窮者欲達其言勞者須歌其事晉書王隠曰古人不遇則以言達其才韓詩序曰勞者歌事序已作賦之志也陸士衡聞而撫掌是所甘心晉書陸機初入洛擬作三都賦聞左太沖作之撫掌大笑與弟士龍書曰此間有傖父欲作三都賦須其成以覆酒甕耳及左賦出遂輟筆焉張平子見而陋之固其宜矣後漢書曰張衡字平子南陽西鄂人也藝文類聚云昔班固觀世祖遷都於洛邑懼將必踰溢制度不能遵先王之正法也故假西都賔盛稱長安舊制有陋洛邑之議而為東都主人折禮衷以答之張平子薄而陋之故更造焉我之掌庾承周以世功而為族經邦佐漢用論道而當官言已系出庾氏其先以掌庾得姓漢世而後官族可得而叙也左傳昭十二年曰獻太子之傅庾皮之子過杜預注庾過劉獻公太子之傅衆仲曰官有世功則有官族是庾氏得姓之先為周掌庾大夫也周書曰茲惟三公論道經邦庾氏在漢固無三公惟後漢隠逸庾乗子孫為鄢陵著姓餘則無聞平準書曰漢興七十餘年之間都鄙廩庾皆滿居官者以為姓號如淳曰倉氏庾氏是也按周禮有坐論作行食貨為經邦大政當官謂居官受職左傳云當官而行言論道而此居其職在漢世有此倉庾之姓也稟嵩華之玉石潤河洛之波瀾叙潁川鄢陵之地也言庾氏在漢晉時世居於此代有名人是其偏鍾河洛之靈特稟嵩華之秀者也鄢陵即春秋時鄢所云鄭伯克段於鄢是也郡國志鄢陵與陽城俱屬潁川郡陽城有嵩髙山爾雅曰嵩山為中嶽又云河南華周禮職方氏河南曰豫州其山鎮曰華山故云稟嵩華之玉石也按郡國志潁川在河南洛陽東南五百里庾亮讓中書令表亦稱中州舊邦以潁川近洛陽洛陽為中州也云潤河洛之波瀾者河謂黄河也爾雅河水出崑崙師古曰洛出冡嶺山入河爾雅釋水云大波曰瀾居負洛而重世邑臨河而晏安言庾氏本鄢陵人再世之後分徙新野故又為南陽新野人也云負洛者按郡國志潁川在洛陽東南五百里洛陽在北故云負洛又南陽郡在洛陽南七百里摯虞云南陽郡在京之南張衡南都賦云陪京之南謂南陽也京謂洛陽也是亦負洛然稍逺矣言在潁川鄢陵其居負洛重世之後邑居新野又臨河也臨河謂臨淯水也酈元水經注淯水又南入新野縣知此新野邑居臨淯水也水經注又云有樊氏陂東西十里南北五里亦謂之凡亭陂陂東有樊氏故宅樊氏既滅庾氏取其陂故諺曰陂汪汪下田良樊子失業庾公昌後漢書樊宏傳注章懷太子引此云在今鄧州新野縣之西南是庾氏世為南陽大姓矣又按南史庾杲之隠逸傳庾詵及子山之先祖皆稱新野人庾恱孝義傳庾道愍隠逸傳庾承先皆稱鄢陵人其餘不可殫述是庾氏之族或居新野或仍居鄢陵者也史記春申君上書云王無重世之徳索隠曰重世猶再世也晏安見左傳閔元年管敬仲之言逮永嘉之艱虞始中原之乏主晉書懐帝改元永嘉永嘉之後懷愍遇害劉聰劉曜相繼作亂故云中原乏主民枕倚於牆壁路交横於豺虎後漢書獻帝還洛陽披荆棘倚牆壁間漢書張耳陳餘述曰據國爭權還為豺虎值五馬之南奔逢三星之東聚晉書五行志曰晉惠帝太安中童謡云五馬浮渡江一馬化為龍其後中原大亂宗藩多絶惟瑯琊汝南西陽南頓彭城同至江東而元帝嗣統矣天文志永嘉六年熒惑嵗星太白聚牛女之間占曰牛女揚分是後兩都傾覆而元帝中興揚土彼凌江而建國始播遷於吾祖凌江建國謂晉元帝徙都建康也吾祖謂滔也晉書元帝紀云愍帝崩問至建康百僚勸進即位北史庾季才傳滔隨晉元帝過江官至散騎常侍字文逌序滔信八世祖也以上序西晉之亂元帝渡江八世祖滔始徙居江陵也盧諶贈劉琨書云王室喪師私門播遷分南陽而賜田裂東嶽而胙土謂滔封遂昌侯也左傳僖二十五年晉侯朝王與之陽樊温原攅茅之田晉於是始啟南陽爾雅曰泰山為東嶽按春秋祊田泰山湯沐邑也左傳衆仲曰胙之土而命之氏誅茅宋玉之宅穿徑臨江之府渚官故事曰庾信因侯景亂自建康遁歸江陵居宋玉故宅宅在城北三里故哀江南賦云後杜甫詩曽聞宋玉宅每欲到荆州李商隠詩可憐留著臨江宅異代應教庾信居是其證矣按庾氏本新野人今賦所云自滔徙居江陵即是宋玉舊宅非信始居也北史滔過江家南郡江陵縣是也屈原卜居曰寧誅耡草茅以力耕乎漢書曰立共敖為臨江王都江陵水木交運山川崩竭水木交運者謂宋以水徳王齊以木徳王也南史齊髙帝紀曰宋水徳也義熙元年宋武帝王業之始至齊受命七十年孔子河洛䜟曰堨河梁塞龍泉消除水災泄山川水即宋也宋氏為災害故曰水災沈約曰水徳方衰阮孝緒傳曰齊為木行國語伯陽甫曰夫國必依山川山川崩竭亡之徵也家有直道人多全節訓子見於純深事君彰於義烈南史庾易傳云祖玫巴郡太守父道季安西㕘軍易信之祖也言自逺祖滔歴世至於髙曾當此宋齊興亡之際庾家多有直道全節之人也訓子事君言其世以忠孝相傳新野有生祠之廟河南有胡書之碣按祖滔已徙江陵稱新野河南者以始祖自鄢陵徙居新野又自新野徙居江陵今從江陵上遡新野鄢陵歴敘庾氏世有生祠碑碣也鄢陵故鄭地在河南豫州之境故云河南也滔雖徙居江陵史傳於其後猶曰新野人稱其本也胡書科斗文也任昉述異記伏滔銘曰胡書龜厯之文况乃少微真人天山逸民謂信祖庾易也南史曰庾易字幼簡新野人也徙居江陵易志性恬靜不交外物齊臨川王表薦之餉麥百斛辭不受建武三年詔徵為司空主簿不就卒天官書曰廷藩西有隋星五曰少微士大夫索隠曰春秋合誠圖云少微處士位又天官占云一名處士星也易天山遯後漢書有逸民傳逸民本出論語階庭空谷門巷蒲輪南史劉虬傳云永明三年刺史廬陵王子卿表劉虬及同郡宗測宗尚之庾易劉昭五人請加蒲車束帛之命詔徵之是當時曽以蒲輪徵易也詩曰皎皎白駒在彼空谷疏云以賢者隠居必當潜處山谷也漢書武帝紀曰遣使者安車蒲輪束帛加璧徴魯申公師古曰蒲裹輪取其安也移談講樹就簡書筠講樹當是引髙士事晉書曰嵇康家有盛栁樹恒居其下親舊以雞酒往與啖清談而已釋器云簡謂之畢郭璞云今簡札也說文云簡牒也蔡邕獨斷曰䇿簡也劉向别録云殺青者直用青竹作簡書禮記云如竹箭之有筠也說文筠竹皮降生世徳載誕貞臣謂信父肩吾也肩吾不受賊職潛奔江陵故以貞臣稱之言其秉忠貞之性也詩云世徳作求西征賦云貞臣見於國危文詞髙於甲觀楷模盛於漳濵庾肩吾傳曰肩吾字慎之八嵗能賦詩初為晉安王國常侍在雍州與劉孝威等十人抄撰衆籍豐其果饌號髙齋學士王為王太子兼東宫通事舎人後為安西王中録事諮議㕘軍太子率更令中庶子簡文開文徳省置學士肩吾父子等並充其選及簡文即位以肩吾為度支尚書漢書曰孝成皇帝元帝太子也母曰王皇后元帝在太子宫生甲觀畫堂黄圖曰甲觀太子宫漢書注云甲乙丙丁之次也文詞髙於甲觀者言為東宫通事舎人累官太子率更令中庶子重其文詞也後漢書云天下楷模李元禮漳水名也山海經曰荆山漳水出焉王仲宣四言詩云遷於荆楚在漳之湄說文云漳出南郡臨沮肩吾家於江陵又嘗為湘東王中録事諮議㕘軍故云漳濵濵水際也嗟有道而無鳳歎非時而有麟言父為度支尚書時簡文制於賊臣梁之亂世也論語云鳳鳥不至左傳哀公十四年春西狩於大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之家語孔子涕泣曰麟為明王出出非其時見害故傷焉既姦回之奰逆一作匿終不恱於仁人言父為侯景矯詔所遣又為賊宋子仙所逼雖逃奔江陵未幾而卒也肩吾傳曰時上流藩鎮並據州拒侯景景矯詔遣肩吾使江州喻當陽公大心大心乃降賊肩吾因逃入東後賊宋子仙破㑹稽購得肩吾欲殺之先謂曰吾聞汝能作詩今日可作若能將貸汝命肩吾操筆便成詞采甚美子仙乃釋以為建昌令仍間道奔江陵歴江州刺史領義陽太守封武康縣侯卒奰皮器反舊音備大雅蕩云内奰於中國毛傳云奰怒也不醉而怒曰奰西京賦云巨靈贔屭以流河曲奰與贔同字其音備矣姦回謂賊侯景之黨宋子仙也仁人謂父肩吾也王子濵洛之嵗蘭成射䇿之年信自序也劉向列仙傳曰王子喬周靈王太子晉也好吹笙作鳳鳴逰伊洛間竹書紀年云晉平公使叔譽聘於周見太子晉與之言五稱而三窮告平公曰太子行年十五而譽弗能言君請事之濵洛之嵗蓋言十五嵗也沈約安陸王碑云蓋同王子濵洛之嵗實惟辟疆侍從之年俱云十五也滕王逌序云信年十五侍梁東宫講讀陸龜蒙小名録云蘭成信小字也又張說過信宅詩云蘭成追宋玉舊宅偶詞人謂信字蘭成居宋玉故宅也漢書儒林傳曰武帝立五經博士開弟子員設科射䇿甲科為郎中乙科為太子舎人丙科補文學掌故滕王逌序亦云玉墀射䇿髙等甲科矣言昔王子濵洛之嵗乃今蘭成射䇿之年也始含香於建禮仍矯翼於崇賢謂為尚書郎尋轉東宫學士也應劭漢官儀曰桓帝時侍中刁存年老口臭上出雞香與含之後尚書郎含雞舌香始於此漢書典膱曰尚書郎晝夜更直於建禮門沈休文詩云晨趨逰建禮是也按滕王逌序信解褐授安南府㕘軍尋轉尚書度支郎故云是矣東京賦曰昭仁惠於崇賢陸機詩云矯迹入崇賢注云崇賢太子門揚雄解嘲曰矯翼厲翮本傳云累遷尚書度支郎中出為郢州别駕尋兼通直散騎常侍聘於東魏還為東宫學士言初為抄撰學士在東宫至此還為東宫學士故云仍也遊洊雷之講肆一作肄齒明離之胄筵言在東宫時也易曰洊雷震繫辭云主器者莫若長子故受之以震講肆左傳注音肄尚書曰䕫命汝典樂教胄子易曰明兩作離王元長曲水詩序云入虎闈而齒胄注言太子入學以年大小為次不以天子之子為上故曰齒胄既傾蠡而酌海遂測管而窺天東方朔客難曰以管窺天以蠡測海張宴曰蠡瓠瓢也方塘水白釣渚池圓劉公幹詩云方塘含白水中有鳧與雁鮑明逺蕪城賦云弋林釣渚之館侍戎韜於武帳聴雅曲於文絃說文曰韜劍衣也漢書汲黯傳曰上嘗坐武帳黯前奏事上不冠望見黯避帷中使人可其奏其見禮敬如此孟康曰武帳置兵闌五兵於帳中也隋書樂志曰梁武帝定國並以雅為稱取詩序云言天下之事形四方之風謂之雅雅者正也梁三朝雅樂歌有俊雅𦙍雅寅雅介雅需雅諸曲張揖廣雅曰琴五絃文王増二絃乃解懸而通籍遂崇文而㑹武漢書陳湯傳劉向疏曰宜以時解懸通籍除過勿治尊寵爵位以勸有功魏志明帝青龍四年夏四月置崇文觀徵善文者以充之滕王逌序云又為東宫領直春宫兵馬並受節度蓋任兼文武也居笠轂而掌兵出蘭池而典午左氏傳曰楚子與若敖氏戰於臯滸伯棼射王汰輈以貫笠轂杜曰兵車無蓋尊則邉人執笠依轂而立以御寒暑名曰笠轂蘭池宫名在渭城漢書武帝責楊僕曰受詔不至蘭池宫蜀志譙周曰典午忽兮月酉没兮典午者謂司馬也論兵於江漢之君拭玉於西河之主江漢謂元帝之為湘東王時也湘東楚地故云江漢西河之主謂東魏也東魏都鄴西河魏地滕王逌序云於時江路有賊梁先主使信與湘東王論中流水戰事醜徒聞其名徳遂即散奔深為梁王所賞是論兵於江漢之君也又云兼通直常侍使於魏土接對有才辯還本國為正員郎本傳聘於東魏文章辭令甚為鄴下所稱是拭玉於西河之主也左氏傳曰江漢睢漳楚之望也杜預云四水在楚界正義曰土地名江經南郡江夏弋陽安豐漢經襄陽至江夏安陸縣入江儀禮曰賔人北面坐拭圭鄭康成注曰賔使者拭清之也史記魏文侯以吴起為西河守武侯浮西河而下中流顧謂吴起曰美哉山河之固此魏國之寶也知西河為魏地矣以上歴敘已之在梁時有聲名也於時朝野歡娱池臺鐘鼓於時言梁之承平時也張協詠史詩云昔在西京時朝野多歡娱左氏傳曰髙臺深池撞鐘舞女里為冠蓋門成鄒魯水經注曰宜城縣有太山山下有廟漢末多士其中刺史二千石卿長數十人朱軒華蓋同㑹於廟下荆州刺史行部見之雅嘆其盛號曰冠蓋里漢書韋孟傳曰自孟至賢五世賢以詩教授號稱鄒魯大儒里為冠蓋言其多富貴也門成鄒魯言其多文學也連茂苑於海陵跨横塘於江浦漢書枚乗上書曰轉粟西向不如海陵之倉脩治上林苑守禽獸不如長洲之苑吴都賦云佩長洲之茂苑是也晉灼曰海陵海中山為倉也臣瓚曰海陵縣名也有吴大倉連茂苑於海陵者以喻天監中立建興苑於秣陵之建興里也又魏都賦云横塘查下劉逵曰横塘在淮水南緣江築堤謂之横塘查下在横塘西隔江自山頭南上十里至查浦跨横塘於江浦者以喻天監九年緣淮塘之作也事見梁武帝本紀東門則鞭石成橋南極則鑄銅為柱史記秦始皇本紀曰立石東海上胊界中以為秦東門述異記曰秦始皇作石横橋於海上欲過海觀日出處有神人驅石去不速神人鞭之皆流血今石橋其色猶赤東門言梁地東至于海也廣州記曰馬援到交阯立銅柱為漢之極界也南史中大同元年交州刺史楊瞟剋交阯嘉寧城李賁竄入屈獠洞交州平是梁地南極交阯也隋書地理志曰梁武帝除暴寧亂奄有舊吴天監十三年有州三十郡三百五十縣千二十二其後務恢境宇頻事經畧開拓閩越克復淮浦平俚洞破牂柯又以舊州遐濶多有析置大同中州一百七郡縣亦稱於此既而侯景搆禍臺城淪滔典籍散逸注記無遺郡縣戸口不能詳究逮於陳氏土宇彌蹙橘則園植萬株竹則家封千户言蜀漢江陵諸州郡皆為梁地國之生産富饒也漢書貨殖傳曰蜀漢江陵千樹橘渭川千畝竹此其人與千户侯等西賮浮玉南琛沒羽言外國朝貢之多也按南史武帝天監二年扶南龜兹中天竺國各遣使朝貢三年遣使朝貢有北天竺國五年有鄧至國九年有于闐林邑等國十年有宕昌國又婆利國獻金席十一年有髙麗國又百濟等國十三年林邑等國朝貢作浮山堰十四年有蠕蠕狼牙國十五年有河南國十七年有千陁利國普通元年有滑國二年有新羅國三年有白題國大通元年有師子等國中大通元年有盤盤國三年有丹丹國五年有波斯等國中大同元年渴盤陁國遣使獻方物以上皆遣使朝貢諸國或有再至及每嵗來朝者今惟紀其國名故不多載說文賮㑹禮也琛寶也顔延年讌水曲詩云航琛越水輦賮踰璋王子年拾遺記曰西海之西有浮玉山竹書紀年曰堯時僬僥氏貢没羽南史四􅊂傳曰自晉氏南度介居江左北荒四裔隔礙莫通至於南徼東邉界壤所接泊宋元嘉撫運爰命干戈象浦之絶威震冥海於是鞮譯相係無絶嵗時以洎齊梁職貢有序及侯景之亂邉鄙日蹙陳氏基命衰微已甚故西賮南琛無聞竹素此敘梁朝全盛之時所以逺方貢賦不絶也吴歈越吟荆艶楚舞吴越荆楚皆梁地言其太平作此歌舞也吴都賦云荆艶楚舞吴歈越吟楚辭曰吴歈蔡謳登樓賦曰莊舄顯而越吟顔延年侍逰曲阿後湖詩云江南進荆艶曹植妾薄命行曰齊謳楚舞草木之遇陽春魚一作蛟龍之逢風一作雲雨言其人民之歡恱也漢書文帝詔曰方春和時草木羣生之物皆有以自樂古詩云陽春布徳澤于寶晉紀總論曰恱而歸之如魚龍之趣淵澤也樂動聲儀曰風雨動魚龍仁義動君子一作蛟龍淮南子曰蛟龍伏於川人不見其飛舉而能髙者風雨舉之也五十年中江表無事南史羊侃傳曰是時梁興四十七年境内無事公卿在位及閭里士大夫莫見兵甲云五十年者舉其成數也王歙為和親之侯班超為定逺之使此下言南北通好不事甲兵及納東魏將侯景始召亂也按南史中大通六年魏始分為兩大同二年與東魏通和三年東魏人來聘使張臯聘於東魏自後每嵗遣使報聘焉至太清元年東魏司徒侯景内屬東魏攻景始遣蕭明北征及與東魏結和而侯景舉兵反矣王歙和親班超定逺言與東魏通好之時也漢書曰長水校尉王歙使匈奴告單于又曰須卜當即王昭君女伊墨居次云之壻也云常與中國和親當遂勸咸和親天鳳元年當遣人告塞吏曰欲見和親侯和親侯王歙者王昭君兄子也中部都尉以聞莽遣歙後漢書曰班超字仲升扶風平陵人超使西域通三十六國封定逺侯馬武無預於甲兵馮唐不論於將帥按武帝天監後每舉兵侵魏及魏分東西東魏通和而西魏邉警無聞是以莫見兵革也後漢書曰光武時馬武上言欲擊匈奴帝不許自是諸將莫敢言兵事漢書匈奴傳贊曰文帝中年聚天下精兵於廣武顧問馮唐與論將帥豈知山嶽闇然江湖潛沸漁陽有閭左戍卒離石有將兵都尉謂梁朝狃於治安禍機潛伏遂有侯景之亂漁陽戍卒者按梁書侯景起家為北鎮戍兵也離石都尉者時髙歡使擁兵十萬専制河南也注見下文陸機豪士賦序曰一匱之釁積成山嶽詩云百川沸騰漢書師古注曰沸湧出也漢書陳勝傳曰秦二世元年秋七月發閭左戍漁陽九百人勝廣皆為屯長殺兩尉詐稱公子扶蘇項燕從民望也袒右稱大楚自立為將軍廣為都尉干寶晉紀總論曰彼劉淵者離石之將兵都尉也天子方刪詩書定禮樂設重雲之講開士林之學天子謂梁武帝也南史所謂留心俎豆忘情干戚溺於釋教弛於刑典履霜弗戒卒致亂亡者也此下皆言梁武帝致敗之故梁武帝紀帝著毛詩問答尚書大義樂社義等書又天監初何佟之等并撰五禮千餘巻帝稱制斷疑太清元年帝捨身光嚴重雲殿游仙化生皆震動三日乃止又云武帝於重雲殿講說名僧碩學四部聴衆常萬餘人城西又開士林館以延學士朱异與左丞賀琛逓日講武帝禮記中庸義虞荔傳云武帝於城西置士林館荔乃制碑奏上帝命勒之於館仍用荔為士林學士談劫燼之灰飛辨常星之夜落言其溺情釋教也干寶捜神記曰漢武帝鑿昆明池極深悉是灰墨無復土舉朝不解以問東方朔朔曰臣愚不足以知之試問西域人帝以朔不知難以移問至後漢明帝時西域道人入來洛陽時有憶方朔言者乃試以武帝時灰墨問之道人云經云天地大刼將盡則劫燒此劫燒之餘也乃知朔言有旨春秋莊公七年夏四月辛夘夜恒星不見左氏傳曰夏恒星不見夜明也杜預曰恒常也謂常見之星漢書劉向上封事諫曰夜常星不見即指是事也本恒星避漢文帝諱故稱常星矣瑞應經曰到四月八日夜明星出佛生右脇墮地即行七步魯莊公七年夜明佛生之日也南史武帝太清元年三月乙巳帝升光嚴講堂師子講金字三慧經捨身夏四月庚寅羣臣以錢一億萬奉贖皇帝菩薩僧衆黙許又侯景傳曰景以太清元年二月遣其行臺中丁和上表求降初帝以是嵗正月乙夘於善言殿讀佛經因謂左右黄慧弼曰我昨夢天下太平爾其識之及和至校景實以正月乙夘日定計帝由是納之景之得入亦以佛教也地平魚齒城危獸角言不能完城郭以為保守之計也左傳襄十八年楚師伐鄭次於魚陵子庚信於城下而還涉於魚齒之下杜預注云魚陵魚齒山也在南陽犨縣北吕氏春秋曰猛獸之角能以為城臥刁斗於滎陽絆龍媒於平樂言其忘情干戚也漢書曰李廣行無部曲不擊刁斗以自衛孟康曰以銅作燋受一升晝炊飯食夜擊持行今在滎陽庫中也龍媒馬也馬八尺以上為龍漢書天馬歌曰龍之媒天馬徠三輔黄圖曰漢明帝永平五年至長安悉取飛廉并銅馬置之西門外為平樂館宰衡以干戈為兒戲縉紳以清談為廟略謂朱异也南史自周捨卒後异代掌機宻其軍旅謀謨方鎮改換朝議國典詔誥勑書並内典掌之大同八年加侍中异文華敏洽曲營世譽在省十餘年未嘗被譴司農卿傅岐嘗謂异曰今聖上委政於君安得每事從旨頃者外聞殊有異論异曰政言我不能諌爭耳當今天子聖明吾豈敢以其所聞干忤天聴及侯景降謝舉等以為不可許异探帝微㫖答曰侯景分魏國大半逺歸聖朝若不容許恐絶後來之望帝深納异言又感前夢遂納之景謀反鄱陽王範及羊鴉仁啟景有異志朱异曰侯景數百叛虜何能為役並不奏聞及景反鎮戍相次啟聞异尚曰景必無渡江志賊至遂以討异及陸驗為名帝將誅之簡文曰賊特以异等為名耳今日殺异無益適足貽笑乃止簡文愍亂四言詩曰愍彼陂田嗟斯氛霧謀之不臧褰我王度又製圍城賦末章云彼髙冠及厚履並鼎食而乗肥升紫霄之丹地排玉殿之金扉陳謨謀之啟沃宣政刑之福威四郊以之多壘萬邦以之未綏問豺狼其何者訪虺蜴之為誰並以指异又帝登南望賊顧謂异曰四郊多壘誰之罪與异流汗不能對慙憤發病卒又侯景傳云景反以誅中領軍朱异少府卿徐驎太子左率陸驗制局監周石珍為辭以為姦臣亂政漢書曰王皇后立三月以禮見髙廟尊父安漢公號曰宰衡位在諸侯王上周亞夫傳漢文帝曰向者棘門霸上如兒戲耳禮記鄭注云紳帶也搢挿也挿笏於紳也或作縉者淺赤言帶之色晉輿服志古者貴賤皆執笏有事則搢之於腰帶所謂搢紳之士者搢笏而垂紳也晉書曰王衍終日清談石勒王彌宼京師衍為元帥舉軍為石勒所破勒曰破壞天下正是君罪使人夜排牆填殺之衍將死顧而言曰嗚呼吾曹雖不如古人向若不祖尚浮虛戮力以匡天下猶不至今日淮南子曰運籌於廟堂之上決勝千里之外清談為廟略者譏其無濟於政事也乗漬周書作潰水以周書作而膠船馭奔駒以朽索帝王世紀曰周昭王徳衰南征濟於漢船人惡之以膠船進王王御船至中流膠液船解王及祭公俱没於水左傳昭王之不復君其問諸水濵是其事也夏書曰予臨兆民若朽索之馭六馬孔疏云腐索馭六馬索絶馬驚馬驚則逸言危懼甚也小人則將及水火君子則方成猿鶴孟子曰救民於水火之中言侯景將至殘賊小民若殷民之在水火中也抱朴子曰周穆王南征一軍盡化君子為猿鶴小人為沙蟲敝箄不能救鹽池之鹹阿膠不能止黄河之濁淮南畢萬術曰膠橈水則清敝箕止鹹取箕以納醬中鹹著箕矣孔融曰敝箄不能救鹽池之滷說文曰箄蔽也所以甑底也淮南子曰阿膠一寸不能止黄河之濁既而魴魚赬尾四郊多壘汝濆之詩云魴魚赬尾王室如燬毛萇曰赬赤也魚勞則尾赤禮記曰四郊多壘卿大夫之辱也注云壘軍壁也數見侵伐則多壘殿狎江鷗宫鳴野雉言亡國之徵妖異迭見也説文曰鷗水鴞也漢書劉向曰秦始皇之末世至二世野禽戲庭張晏曰野鳥入處主人將去又五行志曰野鳥入處宫室將空易京房傳曰辟退有徳厥咎狂厥妖水鳥集於國中鴻嘉二年三月博士行大射禮有飛雉集於庭歴階登堂而雊又集未央宫承明殿屋上宋書五行志曰晉武帝太始四年翟雉飛上閶闔門湛盧去國艅艎失水湛盧劒名艅艎左傳作餘皇舟名越絶書曰昔越王句踐有寶劒五聞於天下客有能相劒者名薛燭王召而問之對曰歐冶子因天地之精悉其伎巧一曰純鉤二曰湛盧三曰莫邪四曰豪曹五曰巨闕楚昭王臥而得吴湛盧之劒於牀問於風胡子對曰人君有逆理之謀其劒即出今吴王無道殺君謀楚故湛盧去國左傳昭十七年楚人大敗呉師獲其乗舟餘皇見被髮於伊川知百年而為戎矣左傳僖二十三年曰初平王之東遷也辛有適伊川見被髪而祭於野者曰不及百年此其戎乎其禮先亡矣秋秦晉遷陸渾之戎於伊川言侯景之來也彼姦逆之熾盛久遊魂而放命姦逆謂侯景也南史侯景傳云侯景字萬景魏之懐朔鎮人也少而不羈為鎮功曹史魏末北方大亂乃事邉將爾朱榮甚見器重以軍功為定州刺史始魏相髙歡微時與景甚相友愛及歡誅爾朱氏景以衆降仍為歡用稍至吏部尚書非其好也毎獨曰何當離此反故紙耶尋封濮陽郡公歡之敗於沙苑也景謂歡曰宇文泰恃於戰勝今必致怠請以數千勁騎致闗中取之歡不許後為河南大行臺位司徒又言於歡曰恨不得泰請兵三萬横行天下要取濟江縛取蕭衍老公以作太平寺主歡壯其言使擁兵十萬専制河南若已之半體賦言景之姦逆少而不羈及事榮降歡復思反叛始欲以千騎抵闗潛圖事泰後欲以三萬定梁來歸於我久矣逰魂而放命也易繫辭曰逰魂為變後漢書曰第五倫擢謝夷吾為督郵時烏程長有臧釁倫使収案其罪夷吾曰竊以占候知長當死近三十日逺六十日遊魂假息非刑可加故不収之月餘果暴卒大則有鯨有鯢小則為梟為獍左傳楚子曰古者明王伐不敬取其鯨鯢而封之以為大戮杜預曰鯨鯢以喻不義之人吞食小國裴淵廣州記曰鯨鯢長百尺雄曰鯨雌曰鯢目即明月珠也周處風土記曰鯨鯢海中大魚也俗説出入穴即為朝水梟惡鳥即一梟獍惡獸即破鏡郊祀志曰祠黄帝用一梟破鏡張宴曰梟惡逆之鳥方士虚誕云以嵗始祓除凶災令神仙之帝食惡逆之物使天下為逆者破滅訖竟無有遺育也孟康曰梟鳥名食母破鏡獸名食父黄帝欲絶其類使百吏祠皆用之破鏡如貙而虎眼如淳曰漢使東郡送梟五月五日作梟羮以賜百官其以惡鳥故食之也述異記曰獍之為獸狀如虎豹而小始生還食其母故曰梟獍侯景傳云景既南奔魏相髙澄悉命剝景妻子面皮以大鐵鑊盛油煎殺之女以入宫為婢男三嵗者並蠶室後齊文宣夢獮猴登御牀乃並煮景子於鑊其子之在北者殲焉言景之凶逆大則蠶食諸國有若鯨鯢小則如梟獍使已種類破滅無遺育也負其牛羊之力凶其水草之性漢書匈奴傳曰其畜之所多則馬牛羊逐水草遷徙無城郭常居耕田之業非玉燭之能調豈璿璣之可正爾雅曰四時調謂之玉燭尚書曰璿璣玉衡以齊七政值天下之無為尚有欲於羈縻武帝紀云太清元年侯景以十三州内屬漢書曰匈奴欲致和親漢亦羈縻之司馬相如難蜀父老曰蓋聞天子之牧􅊂翟也其義羈縻勿絶而已應劭漢官儀曰馬曰羈牛曰縻言四􅊂如牛馬之受羈縻也後漢書魯恭曰是以聖王之制羈縻勿絶而已注云字書曰羈馬絡頭也蒼頡篇曰縻牛繮也飲其琉璃之酒賞其虎豹之皮謂侯景内附梁朝遂納降也侯景傳云景用王偉計以太清元年二月遣其行臺郎中丁和上表求降帝召羣臣議之尚書僕射謝舉皆言納景非便武帝不從遂納之封景河南王大將軍使持節督河南北諸軍事大行臺承制如鄧禹故事漢書匈奴傳曰單于以徑路刀金留犁撓酒以老上單于所破月氐王頭為飲器者共飲血盟昌猛還應劭曰徑路匈奴寶刀也金契金也留犁飯匕也撓和也契金著酒中撓攪飲之也左氏傳曰無終子嘉父使孟樂如晉因魏莊子納虎豹之皮以和諸戎見胡柯一作桐於大夏識鳥卵於條枝漢書曰張騫言使大夏時見蜀布卭竹杖問所從來曰從東來身毒國可數千里得蜀賈人市又西域傳曰條支國臨西海暑濕田稻有大鳥卵如甕郭義恭廣志云大爵頸及身膺蹄都似槖駝舉頭髙八九尺張翅丈餘食大麥其卵如甕一作胡桐按西域志出鄯善國豺牙密厲虺毒潛吹謂侯景潛圖反叛也侯景傳云景長不滿七尺長上短下眉目疎秀廣顙髙權色赤少鬢低低屢顧聲散識者曰此謂豺狼之聲故能食人亦當為人所食爾雅曰豺狗足字林云豺狼屬狗聲郭云脚似狗貪殘之獸孔叢子曰梁邱據遇虺毒三旬而後瘳後漢段熲東羌疏云今傍郡户口單少數為羌所創毒而欲令降徒與之雜居是猶種枳棘於良田養虺蛇於室内也漢書注應劭曰蝮一名虺螫人手足則割其肉不然致死師古曰虺若土色所在有之俗呼土虺輕九鼎而欲問聞三川而遂窺南史侯景傳云景自渦陽敗後多所徵求朝廷含𢎞未嘗拒絶後表疏跋扈言辭不遜元貞知景異志累啓還朝景謂曰將定江南何不少忍貞益懼奔還建鄴具以事聞景又招司州刺史羊鴉仁同逆鴉仁録送其使時鄱陽王範鎮合肥及鴉仁俱累啟稱景有異志朱异並不奏聞景所以姦謀益果時帝與魏通和景上言曰髙澄狡滑寧可全信陛下納其詭語求與連和臣亦竊笑也臣年四十有六未聞江左有佞邪之臣一旦入朝乃致嚻讟寧堪粉骨投命讎門請乞江西一境受臣控督如其不許即領甲臨江上向閩越非惟朝廷自恥亦是三公旰食帝使朱异宣語答景使曰譬如貧家畜十客五客尚能得意朕惟有一客致有忿言是亦朕之失也景遂反遣徐思玉入啟乞帶甲入朝除君側之惡帝遣中書舍人賀季等隨思玉徃勞之於板橋景北面受勑季曰今日之舉何以為名景曰欲為帝也左傳武王遷九鼎於洛邑楚子伐陸渾之戎觀兵於周疆問鼎之大小焉秦本紀秦武王謂甘茂曰寡人欲容車通三川以窺周室死不恨矣始則王子召戎姦臣介胄既官政而離逷遂師言而泄漏王子謂臨川王宏之子蕭正徳也南史正徳字公和少而凶慝招聚亡命齊建武中武帝𦙍嗣未立養以為子及平建康生昭明太子正徳自謂應居儲嫡每形於言數有罪蒙赦大通中封臨賀郡王累試無能從是黜廢轉増憤恨乃隂養死士常思國釁太清二年秋侯景反知其有姦心遣徐玉至建鄴具以事告又與正徳書曰今天子年尊姦臣亂國以景觀之計日必敗大王屬當儲貳中被廢辱天下義士竊所忿慨大王豈得顧此私情棄兹億兆景雖不武實思自奮正徳得書大喜曰侯景之意暗與人同天贊我也遂許之及景至正徳潛運空航詐稱迎荻以濟景焉朝廷未知其謀以正徳為平北將軍屯朱雀航景至正徳乃北面望闕三拜詭辭欷戯流涕引賊入宣陽門與景通揖馬上退據左衛府賊以正徳為天子號曰正平元年及臺城開正徳率衆揮刃欲入賊先使其徒守門故正徳不果乃復太清之號降正徳為侍中大司馬正徳入問訊拜且泣帝曰惙其泣矣何嗟及矣正徳知為賊所賣深自咎悔宻書與鄱陽嗣王契以兵入賊遮得書乃矯詔殺之梁室傾覆皆由正徳百姓至聞臨賀郡名亦不欲道童謡云寧逢五虎入市不欲見臨賀父子其惡之如是王子召戎者謂侯景之入正徳召之也姦臣介冑者謂朝廷不知其謀使正徳為平北將軍也陸士龍大將軍讌㑹詩曰在昔姦臣稱亂紫微李善注曰姦臣謂趙王倫也正徳簒逆比於倫矣杜預左傳注曰介甲也胄兠鍪也既官政而離逷者按左傳戎子駒支曰我諸戎相繼於時以從執政猶殽志也豈敢離逷言侯景始立正徳為天子後復降為侍中是離逷也遂師言而泄漏者按左傳齊寺人貂始漏師於多魚言正徳宻書與鄱陽王契以兵入為賊所遮得以致見殺是泄漏也望廷尉之逋囚反淮南之窮寇漢書百官志曰廷尉秦官應劭曰聴獄必質諸朝廷與衆共之兵獄同志故稱廷尉言侯景得罪東魏來奔於我是廷尉逋逃之囚又敗於渦陽故稱窮寇侯景傳景内附髙澄嗣事為渤海王遣其將慕容紹宗圍景於長社景急乃求割魯陽長社東荆北兗請救於西魏西魏収之紹宗乃退景復請兵於司州刺史羊鴉仁鴉仁乃發兵據懸弧景將蔡道遵北歸言景有悔過志髙澄以為信然乃以書喻景若還許以豫州刺史終其身所部文武更不追攝闔門無恙并還寵妻愛子景報書不從澄知景無歸志乃遣軍相繼王隠晉書曰蘇峻討王敦有功封公遷歴陽太守詔書徵峻峻曰臺下云我反反豈得活耶我能山頭望廷尉不能廷尉望山頭乃作亂魏志曰諸葛誕據淮南反言昔日廷尉逋囚淮南窮寇至此轉盛也出周書作飛狄泉之蒼鳥起横江之困獸王隠晉書曰董養字仲道太始初到洛下千禄求榮永嘉中洛城東北角歩廣里中地陷中有二鵞蒼者飛去白者不能飛問之博識者不能知養聞嘆曰昔周時所盟㑹狄泉此地也卒有二鵞蒼者盲象後明當入洛白者不能飛此國諱也出狄泉之蒼鳥者以劉淵喻侯景也左傳曰困獸猶鬭起横江之困獸者言景有渦陽之敗也地則石鼓鳴山天則金精動宿郭璞山海經注曰今鄴西北有鼓山山下有石鼓象縣著山旁鳴則有軍事水經注曰魏正元二年吴王孫亮分長沙東部立縣有石鼓髙六尺湘水所逕鼓鳴則土有兵革之事晉書五行志曰呉興長城夏架山有石鼓鳴則三呉有兵至安帝隆安中大鳴後有孫恩之亂郡國志曰呉王離宫在石鼓山越王獻西施於此石鼓鳴即兵起按普通二年始平郡中石鼔村地自開是其驗矣漢書天文志曰太白曰西方秋金義也太白經天天下革民更王是為亂紀人民流亡太白兵象也石氏星經曰昴者西方白虎之宿太白者金之精太白入昴金虎相薄主有兵亂武帝紀云太清元年六月天裂於西北長十丈濶二丈光出如電其聲若雷十二月天西北裂有光如火三年正月有流星長三十丈墮武庫或云金精月也太清二年正月癸巳朔兩月相承如鉤見於西方是其事也北闕龍吟東陵麟鬭春秋元命苞曰孤星髙則羣龍吟博物志曰麒麟鬭而日月蝕南史云普通五年夏六月乙酉龍鬭於曲阿王陂因西行至建陵城所經樹木倒折開數十丈又中大同元年正月曲阿縣建陵口石辟邪起舞有大蛇鬭隧中其一被傷是其災異迭見也爾乃桀黠横扇馮陵畿甸謂臺城既陷侯景入城縱兵殺掠也侯景傳云景攻東府城設百尺樓車鉤城堞盡落城陷景使其儀同盧暉略率數千人持長刀夾城門悉驅城内文武倮身而出賊交兵殺之死者三千餘人縱兵殺掠交尸塞路富家豪室恣意裒剝子女妻妾盡入軍營又募北人先為奴者並令自投賞以不次朱异家黯奴與其儕踰城投賊景以為儀同使至闕下以誘城内乗馬披錦袍詬曰朱异五十年仕宦方得中領軍我始事侯王已為儀同於是奴僮競出盡皆得志鹽鐵論曰匈奴桀黠擅恣入塞諡法云賊人多殺曰桀漢書曰匈奴桀黠羣盗犯法南中志云􅊂中有桀黠能言議屈服人按貨殖傳刁間収取桀黠奴文稱豪奴矣左氏傳云馮陵我城廓說文曰畿天子千里地甸天子五百里地擁狼望於黄圖填盧山於赤縣漢書揚雄曰前代豈樂傾無量之資快心於狼望之北填盧山之壑而不悔也孟康曰盧山單于南庭山師古曰狼望匈奴中地名後漢西域傳曰黔首隕於狼望之北財幣靡於盧山之壑三輔黄圖曰採秦漢以來宫殿門闕樓觀池苑在闗輔者著於篇茲云黄圖謂畿輔也史記鄒衍傳云中國名赤縣神州青袍如草白馬如練侯景傳云大同中童謡曰青絲白馬夀陽來景渦陽之敗求錦朝廷所給青布及是皆用為袍采色尚青常乗白馬青絲為轡欲以應謡景之圍臺城援軍三十萬兵士望青袍則氣消膽奪及簒立後時著白紗㡌而尚被青袍又云景既尅建鄴修飾臺城及朱雀宣陽等門童謡曰脫青袍著芒蹻荆州天子挺應著古詩云青袍似春草家語云顔淵與孔子俱上泰山東南望呉昌門外孔子見白馬引顔淵指之若見呉昌門乎顔淵曰見之有繫練之狀天子履端廢朝單于長圍髙宴侯景傳云景屯西州使偽陳慶以甲防太極殿悉鹵掠乗輿服玩後宫嬪妾収王侯甲士送永福省撤二宫侍衛使王偉守武徳殿于子恱屯太極東堂矯詔大赦自為大都督都督中外諸軍事録尚書事其侍中使持節大丞相王如故後毎徵求多不稱旨至於御膳亦被裁抑又云景築長圍以絶内外又於東宫置酒奏樂以為樂左氏傳曰履端于始史記正月為端漢書匈奴傳曰單于姓攣鞮氏其國稱之曰撑犁孤塗單于匈奴謂天為撑犁謂子為孤塗單于廣大之號言其象天單于然南史齊東昏侯紀云帝出時人以其所圍處號為長圍及建康城見圍亦名長圍識者以為讖焉天子指梁武帝也謂武帝身被困逼正月不視朝也單于指侯景也謂侯景築長圍置酒宴樂也侯景簒位百日天子故稱單于矣兩觀當㦸千門受箭謂侯景百道攻城晝夜不息及入又使王偉陳慶等以甲防守太極武徳諸殿也左氏傳曰雉門及兩觀災三輔黄圖曰闕觀也周置兩觀以表宫門其上可居登之可以逺觀人臣將朝至此則思其所闕漢書曰建章宫度為千門萬户白虹貫日蒼鷹擊殿博物志曰列傳云聶政刺韓相白虹為之貫日専諸刺呉王僚鷹擊殿上又戰國䇿曰聶政之刺韓隗也白虹貫日要離之刺慶忌也蒼鷹擊於殿上南史太清元年二月己夘白虹貫日三年正月庚申白虹貫日三重是其驗矣竟遭夏臺之禍終視堯城之變謂武帝被幽也史記曰夏桀召湯而囚之夏臺桀曰吾悔不殺湯於夏臺括地志曰竹書云昔堯徳衰為舜所囚故濮州鄄城縣東北十五里有堯城水經注曰小城陽在城陽西半里許俗諺以為囚堯城官守無奔問之人干戚非平戎之戰侯景傳云時荆州刺史湘東王繹師於武城河東王譽次巴陵前信州刺史桂陽王慥頓江津並未之進既而有勅班師湘東王欲旋中記室㕘軍蕭賁曰景以人臣舉兵向闕今若放兵未及度江童子能斬之必不為也大王以十萬之師未見賊而退若何湘東王不恱賁骨鯁士也每恨湘東不入援嘗與王雙六食子未下賁曰殿下都無下意王深為憾遂因事害之景知援兵號令不一終無勤王之效左傳臧文仲曰天子䝉塵於外敢不奔問官守釋言干扞也孫炎曰干楯自蔽扞也干楯名明堂位云朱干玉戚以舞大武戚斧也戎謂侯景也言不能平之二語謂援兵之不力也陶侃空爭一作裝米船顧榮虚揺羽扇陶侃喻王琳也顧榮喻羊鴉仁也南史王琳傳云太清二年元帝遣琳獻米萬石未至都城陷乃中江沉米輕舸還荆又羊鴉仁傳云太清三年景既背盟鴉仁乃與趙伯超及南康王㑹理共攻賊於東府門一日為賊敗臺城陷景以為五兵尚書鴉仁常思奮發謂所親曰吾以凡流受寵朝廷竟無報効以答重恩今若以此終没有餘責因泣下見者傷焉晉書陶侃傳云陳敏遣陳恢寇武昌侃禦之以運船為戰艦云又温嶠傳云蘇峻之亂是時義軍屢戰失利嶠軍食盡陶侃怒曰使君前云不憂無將士惟得老僕為主耳今數戰皆敗良將安在荆州接胡蜀倉廩當備不虞若復無食僕便欲西歸更思良算但今嵗計殄賊不為晚也嶠曰不然自古成監師克在和光武之濟昆陽曹公之拔官渡以寡敵衆仗義故也峻約小豎為海内所患勇而無謀藉驕勝之勢今挑之戰一鼓可擒且天子幽逼社稷危殆嶠等與公並受國恩是致命之日若違衆獨反義旗將逥指於公矣侃無以對遂留不去侃督水軍向石頭率精勇一萬以挑戰峻突陣馬躓為侃將所斬時京邑荒殘資用不給嶠借資蓄具器用而後反於武昌晉書陳敏傳云敏反自將討甘卓顧榮以白羽扇揮之衆皆潰言温嶠借資陶侃卒平蘇峻今王琳運米而都城已陷是空爭米船也顧榮揮扇而却陳敏今鴉仁竟為賊敗臨死恨報効不終是虛揺羽扇也將軍死綏路絶長圍司馬法曰將軍死綏注曰綏却也有前一尺無却一寸左傳注曰古名敗軍為綏南史侯景傳云賊築長圍以絶内外以下云侯景攻城中外隔絶援兵不至為賊所敗也烽隨星落書逐鳶飛侯景傳云太清三年三月朔城内以景違盟舉烽鼓噪又曰賊圍臺城中外隔絶有羊車兒獻計作紙鳶繫以長繩藏敕於中簡文出太極殿前因北風而放冀得書達羣賊駭之謂是厭勝之術又射下之其危急如此又按獨異志云侯景圍臺城逺不通問簡文作紙鳶飛空告急於外侯景謀臣王偉謂景曰此紙鳶所至即以事達外令左右善射者射之乃墮皆化為鳥飛入雲中不知所徃漢書相如曰夫邉郡之士聞烽舉燧燔孟康曰烽如覆米䉛縣著契臯頭有寇則舉之燧積薪有寇則燔也又師古曰晝則舉燧夜則舉烽故云隨星落也墨子作木鳶飛三日不集淮南子曰公輸班為木鳶而飛之論衡曰魯班刻木為飛鳶飛三日不下遂乃韓分趙裂鼓臥旗折南史侯景至援兵百萬皆走邵陵王綸敗績奔京口城執西豐公大春是其韓分趙裂鼓臥旗折之事也史記張儀說韓王曰夫塞城臯絶上黨則王之國分矣戰國䇿司空馬曰大王裂趙之半以賂秦後漢書隗囂傳曰櫜弓臥鼓晉書曰陸機臨戎而牙旗折左以下皆言援師之敗侯景攻城之急也失羣班馬迷輪亂轍左傳襄十八年平隂之役齊侯畏其衆也乃脫歸齊師夜遁邢伯告中行伯曰有班馬之聲齊師其遁杜注云夜遁馬不相見故鳴班别也又長勺之戰曹劌曰吾視其轍亂望其旗靡故逐之猛士嬰城謀臣巻舌大風歌曰安得猛士兮守四方李陵答蘇武書曰謀臣如雨漢書蒯通曰必將嬰城固守揚雄劇秦美新日巻其舌而不談昆陽之戰象走林常山之陣蛇奔穴南史云景造諸攻具飛樓橦車登城車鉤堞車階道車火車並髙數丈車至二十輪陳於闕前百道攻城交矟以戰鼓呌沸騰昏夜不息引𤣥武湖水灌臺城闕前御街並為洪波又燒南岸居人營寺莫不咸盡後漢光武紀曰王尋王邑圍昆陽驅虎豹犀象之屬以助威光武率敢死者乗銳奔之城中亦鼓噪而出震呼動天地虎豹皆股慄神異經曰西方中有蛇頭尾差大有色五采人物觸之者中頭則尾至中尾則頭至中腰則頭尾並至名曰率然茂先注云㑹稽常山最多此蛇孫子兵法三軍勢如率然者是也又博物志曰常山之蛇名率然有兩頭觸其一頭一頭至觸其中則兩頭俱至孫武以喻善用兵者晉書曰初諸葛亮造八陣圖於魚復平沙上累石為八行相去二丈桓温見之曰此常山陣蛇勢也五郡則兄弟相悲三州則父子離别言侯景攻城甚急武帝諸子援兵在外父子兄弟不相接救也五郡疑指湘東邵陵武陵廬陵南康此五郡也三州疑指荆州益州郢州此三州也按本文序臺城内外兵馬相接之際此二語當序諸王至䕶軍以下始序諸將蓋梁朝宗室父子兄弟也又按武帝八子除昭明太子死簡文帝位居儲貳及豫章王綜奔亡削爵尚有湘東王繹邵陵王綸武陵王紀其廬陵王續南康王績早卒不及危季有子嗣爵是武帝子兄弟封王者有此五郡也三州如湘東王為荆州武陵王為益州邵陵王時在郢州續績早亡惟此三人於武帝為父子也武帝䝉塵三子在外援兵最盛不能接救是父子離别也又按臺城之陷湘東王師於武城援兵不進邵陵王與侯景戰敗還京口武陵王聞武帝崩總戎將發益鎮繹使胡智監至蜀書止之故云三州父子别離也干寳捜神記曰世說云五郡之人各是異材而逢喪亂常山一人安定一人襄陵一人博陵一人悉皆孤獨俱行衛國同至樹隂因相問姓名各言離亂惻然因相謂曰我等皆無骨肉今日幸得聚㑹亦天然也因結義為兄弟長字仲伯次名文仲次名季仲次名叔仲次名雅仲五人因相諾衛國市中見一老母孤單告乞五人収養事奉敬如親母三年母疾五人憂愁不能寢食母曰吾是幷州太原人董世臺之女嫁同郡張文賢為妻任北海太守因遭荒亂文賢早卒𦵏在太原赤山之下八塜同行東頭頭一塜是賢塜也吾死後女等若能送葬到塜側吾願畢矣吾遭荒亂之日有一子姓張名遺年七嵗胸中有七黶足下有通徹之文父喪因流浪失汝等宜思記之言訖而卒五人扶喪至太原忽叔仲横被朝歌令禁繫時有一人走投太守言養母之狀述幷葬之由因話男之形狀太守聞之號哭擗地曰此吾母也吾幼小兵革離亂母子相失迨今又哭之乃發使往朝歌迎喪幷具表聞奏於魏帝帝善其人義重可以旌之五人各為太守賻贈張遺母喪追封太原縣太夫人仍遷張遺為魏府都䕶孝心動天地感應昭信矣孝子傳曰晉三州人約為父子父令二人作舍於大澤中欲成父曰不如河邉乃徙焉又幾成父曰不如河中二人乃負土填河三旬不立有書生過為縛兩土豚投河中父乃止二人曰何嘗見江河填耶吾觀汝行耳明迴至河邉河中土為髙丈餘袤廣十餘里因居其上是五郡兄弟三州父子古今之事相符焉䕶軍慷慨忠能死節三世為將終於此滅䕶軍謂韋粲也南史列傳云韋粲字長倩京兆杜陵人也將屯青塘當石頭東路帥所部水陸俱進時昏霧軍人塞道比及青塘夜已過半壘塞至曉未合景登禪靈寺門望粲營未立便率銳卒來攻軍敗乗勝入營左右髙馮牽粲避賊粲不動兵死略盡遂見害粲子尼及三弟助警搆從弟昂皆戰死親戚死者數百人賊傳粲首闕下以示城下簡文聞之流涕謂御史中丞蕭愷曰社稷所寄惟在韋公如何不弔先死行陣詔贈䕶軍將軍元帝平侯景追謚忠貞三世為將謂粲祖叡父放與粲三世俱為將也史記王離傳云將三世者敗濟陽忠壯身㕘末將兄弟三人義聲俱唱濟陽謂江子一子四子五兄弟三人也南史列傳云江子一字元亮濟陽考城人為南津校尉兄弟性並剛烈及城被圍開明門出戰子一及弟尚書左丞子四東宫殿主子五並力戰直前賊並坐甲不起子一引矟撞之賊縱突騎衆並縮子一刺其騎騎倒矟折賊解其肩時年六十二弟曰與兄俱出何面獨旋乃免胄赴敵子四矟洞胸死子五傷脰還至塹一慟而絶漢書項籍傳云范增為末將主辱臣死名存身喪狄一作敵人歸元三軍悽愴江子一傳云賊義子一之勇歸之面如生詔贈子一給侍中黄門侍郎子四中書侍郎子五散騎侍郎侯景平元帝又贈三人諡曰義子曰毅子曰烈子史記范蠡曰臣聞主憂臣辱主辱臣死亦見國語左氏傳曰先軫免胄入狄師死焉狄人歸其元面如生尚書多算守備是長雲梯可拒地道能防尚書謂羊侃也南史列傳云羊侃字祖忻泰山梁父人也為都官尚書侯景反攻陷歴陽帝問侃討景之䇿侃求以二千人急據采石令邵陵王襲取夀春使景進不得前退失巢窟烏合之衆自然瓦解議者謂景未敢便逼都遂寢其䇿令王質往侃曰今茲敗矣乃令侃率千餘騎頓望國門景至新林追侃入副宣城王都督城内諸軍事賊至卒迫公私駭震軍旅指揮一决於侃膽力俱壯簡文深仗之及賊逼城衆皆兇懼侃偽得射外矢邵陵西昌侯已至近路衆乃少安賊攻東掖門縱火甚盛侃以水沃滅火射殺數人賊乃退賊為尖頭木驢攻城矢石所不能制侃作雉尾炬施鐡鏃以油灌之擲驢上焚之俄盡賊又起二土山以臨城城中震駭侃命為地道潛引其土山不能立賊又作登城樓髙十餘丈欲臨射城中侃曰車登塹虚彼來必倒可臥而觀之及車動果倒衆皆服焉初侃長子鷟為景所獲執來城下示侃侃曰我傾宗報主猶恨不足豈復計此子乎幸早殺之數日復持來侃謂鷟曰久以汝為死猶在耶因引弓射之賊以其忠義亦弗之害後大雨城内土山崩賊乗之垂入苦戰不能禁侃乃令多擲火為火城以斷其路徐於城内築城賊不能進淮南子曰楚欲伐宋墨子聞而悼之見楚王王命工輸作為雲梯之械設以攻宋墨子設守宋之備九攻而墨子九却之弗能入乃偃兵不攻後漢光武紀曰昆陽之戰或為地道衝棚撞城有齊將之閉壁無燕師之臥牆大事去矣人之云亡悼羊侃善於防守不幸疾卒也南史羊侃傳云尋以疾卒於城内史記曰燕軍攻安平田單東保即墨燕既盡降齊城惟獨莒即墨不下燕軍聞齊王在莒幷兵攻之淖齒既殺愍王於莒因堅守拒燕軍數年不下燕引兵東圍即墨即墨大夫出戰死城中相與推田單立以為將軍以即墨拒燕是齊將閉壁之事也壁壘壁也今侃之技巧如鐵籠火牛城中賴以固守故云有齊將之閉壁也水經注云燕書建平十年慕容寳自河而還軍敗於㕘合死者六萬人十一年垂衆北至㕘合見積骨如山設䇿弔之死者父兄皆號泣哀慟垂慙憤嘔血因而寢疾焉輿過平城北四十里疾篤築燕昌城而還亦見崔鴻十六國春秋是燕師臥牆之事也慕容寢疾築城而還侃疾遂死故云無燕師之臥牆也侃卒而臺城遂陷是大事去矣晉書陶侃傳云賊攻大業壘陶侃欲救之長史殷羡曰若遣救大業歩戰不如峻則大事去矣詩云人之云亡邦國殄瘁蓋傷羊尚書之死也申一作甲子奮發勇氣咆勃實總元戎身先士卒申子謂栁仲禮也栁仲禮傳云仲禮勇力兼人少有膽氣初侯景潛圖反噬仲禮知之屢啟求以精兵三萬討景朝廷不許及景濟江朝廷便望其至兼蓄雍州司精卒與諸蕃赴援見推總督景素聞其名甚憚之仲禮亦自謂當世英雄莫己若也又韋粲傳云粲建議推仲禮為大都督報下流衆軍裴之髙自以年位髙恥居其下粲乃抗言於衆曰今日同赴國難義在除賊所推栁司州者正以久捍邉疆先為侯景所憚且士馬精銳無出其前裴公朝之舊齒豈應復挾私以阻大計粲為諸君解釋之裴之髙泣願剖心以示於是諸將定議仲禮方得進軍次新亭陸龜䝉小名録云仲禮小字申子引子山賦云西征賦曰何猛氣之咆勃李善注云怒貌也左傳劉文公曰天子之老請帥王賦元戎十乗以先啟行杜預曰元戎戎車在前者毛詩傳曰元大也周曰元戎先良也胄落魚門兵填馬窟屢犯通中頻遭刮骨謂栁仲禮青塘之敗也栁仲禮傳云韋粲見攻仲禮方食投箸被練馳之騎能屬者七十比至粲已敗仲禮因與景戰於青塘大敗之景又與仲禮交戰各不相知仲禮矟將及景而賊將支伯仁自後斫仲禮再斫中肩馬陷於淖賊聚矟刺之騎將郭山石救之以免自此壯氣外衰不復言戰左傳僖二十二年公及邾師戰於升陘我師敗績邾人獲公胄縣諸魚門杜預曰胄兠鍪魚門邾城門正義曰説文云胄兠鍪首鎧也書傳皆云胄無兠鍪之語言兠鍪舉今以曉古蓋秦漢以來語兠丁侯反鍪莫侯反酈善長水經注云余嘗至長城其下往往有泉窟可飲馬古詩飲馬長城窟行信不虚也史記髙祖本紀云漢王出行軍病甚因馳入成臯索隠曰三輔故事曰楚漢相距於京索間六年自被大創十二通中過者有四言漢王病創也蜀志云闗侯嘗為流矢所中貫其左臂後創雖愈毎至隂雨骨嘗疼痛醫曰矢鏃有毒當破臂作創刮骨去毒然後此患乃除耳侯便伸臂令醫刮之功業夭枉身名埋沒傳云栁仲禮自青塘敗後神情傲狠凌蔑將帥邵陵王綸亦鞭䇿軍門每日必至累刻移時仲禮亦弗見也綸既忿嘆怨隙遂成而仲禮亦嘗置酒髙㑹日作優倡毒掠百姓汚辱妃主父津登城謂曰汝君父在難不能盡心竭力百代之後謂汝為何仲禮聞之言笑自若景登朱雀樓與之語遺以金鐶是後閉營不戰裴之髙王僧辯曰將軍擁衆百萬致宫闕淪沒正當悉力決戰何所多言仲禮竟無一言諸軍乃隨方各散栁仲禮開營降賊時城雖淪陷援軍甚衆軍士咸欲盡力及聞降莫不歎憤論者以為梁禍始於朱异成於仲禮後至江陵㑹岳陽王詧南寇湘東王以仲禮為雍州刺史將侵襄陽岳陽王詧告急於魏魏遣大將楊忠援之仲禮與戰於漴頭大敗没於魏魏相安定公待以客禮西魏於是盡得漢東史論以為仲禮始終之際其不相副天方喪梁斯人而有斯迹是其功業夭枉身名埋没之事也蓋仲禮喪節於侯景俘囚於西魏功業何存身名兩失子山之賦所以深恨之尚書鄭注凶短折夭枉之名或以隼翼鷃披虎威狐假沾漬鋒鏑脂膏原野南史侯景傳云景與入援諸軍戰諸軍敗績邵陵王綸奔京口賊執西豐公大春綸司馬莊邱慧達直閤將軍胡子約廣陵令霍儁等來送城下逼令云巳禽邵陵王霍儁獨云王小失利已全軍還京口城中但堅守援軍尋至語未卒賊以刀傷其口景義而釋焉正徳乃収而害之亢倉子曰以隼翼而披鷃不明者以為隼明者視之乃鷃也戰國䇿江乙對楚宣王曰虎得狐狐曰無啖我天帝命我長百獸我為子先行子隨我後百獸見我能無走乎虎隨狐而行百獸皆走虎不知百獸畏巳反以為畏狐也漢書淮南子諌伐南越書曰甲卒死亡霑漬山谷過秦論銷鋒鍉鑄以為金人十二師古曰鋒戈㦸刀也鍉與鏑同即箭鏃也爾雅釋文孫菼曰膏凝曰脂說文曰帶角者脂無角者膏膏肥也爾雅云廣平曰原詩傳云郊外曰野魏鼓吹曲克官渡云克紹官渡由白馬僵尸流血被原野兵弱虜強城孤氣寡聞鶴唳而心驚聴胡笳而淚下晉書載記曰苻堅淝水之敗其走者聞風聲鶴唳皆以為晉兵又劉琨傳云琨在晉陽為胡騎所圍中夜奏胡笳賊皆流涕欷戯拒神亭而亡㦸臨横江而棄馬吳志曰孫䇿與太史慈鬭䇿刺慈馬而擥得慈項上手㦸慈亦得䇿兠鍪㑹兩家兵騎並各來赴於是解散䇿平定宣慈住涇縣䇿躬自攻討遂見囚執即解縛捉其手曰寧志神亭時耶注吳厯云慈於神亭戰敗為䇿所囚執與正史異按本文乃是敗辭子山所引依吳厯文也江表傳曰孫䇿說袁術云家有舊恩在東願助舅討横江横江拔因投本土召募可得三萬兵以佐明使君匡濟漢室術許之䇿渡江攻劉繇牛渚營時彭城相薛禮下邳相笮融依繇為盟主禮據抹陵城融屯縣南䇿先攻融因渡江攻禮禮突走而樊能于麋等復合衆襲奪牛渚屯䇿聞之還攻破能等獲男女萬餘人復下攻融為流矢所中傷股不能乗馬因自輿還牛渚營崩於鉅鹿之沙碎於長平之瓦漢書曰章邯擊趙大破之趙歇陳餘張耳走入鉅鹿城秦將王離涉間圍鉅鹿章邯軍其南築甬道而輸之粟陳餘將卒數萬人軍鉅鹿北請兵項羽乃悉發兵渡河至則圍王離與秦軍遇九戰絶甬道大破之殺蘇角擄王離涉間不降自燒殺楚擊秦士無不一當十呼聲動天地諸侯軍人人惴恐於是楚已破秦軍地理志云鉅鹿郡秦置屬益州有鉅鹿縣紂所作沙邱臺在東北七十里應劭曰鹿林之大者也臣瓚曰山足為鹿又馮奉世傳曰其先馮亭為華陽君與趙將括距秦戰於長平按史記趙奢傳秦軍軍武安西秦軍鼓噪勒兵武安屋瓦盡振趙奢縱兵擊之大破秦軍後四年趙惠文王卒子孝成王立七年秦與趙相距長平趙奢已死子括為將秦軍射殺趙括軍敗數十萬之衆降秦秦悉坑之當云碎於武安之瓦子山詠懷詩云武安檐瓦振是也此云長平合二戰矣崩沙碎瓦言其振動也於是桂林顛覆長洲麋鹿謂臺城既陷建康荒蕪也吳都賦曰數軍實於桂林之苑劉逵注云吳有桂林苑也又曰佩長洲之茂苑詩序云閔周之顛覆漢書伍被曰子胥云見麋鹿逰姑蘓之臺潰潰沸騰茫茫墋黷天地離阻神人慘酷詩曰潰潰回遹又曰百川沸騰陸機功臣頌曰茫茫宇宙上墋下黷晉鄭靡依魯衛不睦謂臺城陷後諸王不急討賊自相猜忌也左傳周桓公曰周之東遷晉鄭焉依又公叔文子曰太姒之子惟周公康叔為相睦也言靡依不睦者按侯景傳時荆州刺史湘東王繹師於武城河東王譽次巴陵前信州刺史桂陽王慥頓江津並未之進是靡依也又按河東王譽傳云元帝軍於武城新除雍州刺史張纘宻報元帝曰河東起兵岳陽聚米將襲江陵元帝甚懼沉米斷䌫而歸遣世子方等征之反為譽敗死又令信州刺史鮑泉討譽亦見敗又遣王僧辯攻譽遂斬譽又邵陵王綸傳云于時元帝圍河東王譽於長沙既久譽請救於綸綸欲徃救為軍糧不繼遂止乃與元帝書曰道之斯美以和為貴况天時地利不及人乎豈可手足肱支自相屠害即日大敵猶彊天讎未雪余爾昆弟在外三人如不匡救安用臣子如使逆寇未除家禍仍搆料今訪古未或弗亡夫征戰之理義在克勝至於骨肉之戰愈勝愈酷捷則非功敗則有喪勞兵損義虧失多矣侯景之軍所以未窺江外者正謂藩屏盤固宗鎮彊宻若自相魚肉是謂代景行師景便不勞兵力坐致成效醜徒聞此快何如之元帝復書陳譽有罪不可解圍之狀綸省書流涕曰天下之事一至於斯左右聞之莫不掩泣於是大修器甲將討侯景元帝聞其盛乃遣王僧辯帥舟師一萬以逼綸綸將劉龍武等降僧辯綸遂與子躓十餘人走卒為魏人所殺又周書梁王詧傳曰朱榮又遣使報云桂陽住此欲應譽詧梁元帝信之歸至江陵収慥殺之元帝之攻譽也譽告急於詧詧聞之大怒因攻之元帝大懼遣庾㚟謂詧曰正徳肆亂天下崩離汝復效尤欲將謂何吾䝉先帝愛顧以汝兄弟見屬今以姪伐叔順逆安在詧謂㚟曰家兄無罪累被攻圍同氣之情豈可坐觀成敗七父若顧先恩豈應若是如能退兵湘水吾便旋斾襄陽詧既攻柵退而築城不能自固乃遣使於魏稱藩請為附庸卒有江陵之伐又鄱陽王傳云潯陽王大心遣兵擊莊鐵鄱陽王範遣其弟觀寧侯永將兵通南川助莊鐵時二鎮相猜無復圖賊之志又侯景傳云初援兵至北岸衆號百萬百姓扶老擕幼以候王師纔過淮便競剝掠徵責金銀列營而立互相疑貳邵陵王綸栁仲禮甚於讎敵臨城公大連永安侯確逾於水火無有鬭心賊黨有欲自拔者聞之咸止其不睦如此晉鄭魯衛皆周宗姬姓以喻梁朝宗室所以深責諸王也競動天闗爭迴地軸史記天官書曰黑帝行徳天闗為之動正義曰黒帝北方協光紀之帝冬萬物閉藏為之動為之開閉也天一星在五軍南畢西北為天門日月五星所道主邉事亦為限隔内外陣絶往來禁道之作違者占芒角有兵起五星守之主貴人多死也河圖括地象曰地下有四柱廣十萬里有三千六百軸海賦又似地軸挺拔而争迴探雀鷇而未飽待熊蹯而詎熟謂武帝宴駕也侯景傳云景入宫後每徵求多不稱㫖至於御膳亦被裁抑遂懷憂憤五月感疾餒崩於文徳殿景秘不發喪權殯於昭陽殿自外文武咸莫之知二十餘日然後升梓宫於太極前殿迎簡文即位又武帝紀云帝疾久口苦索蜜不得再曰荷荷遂崩賊秘之太子問起居不得見慟於閣下史記趙世家曰公子成李兌圍主父宫主父欲出不得探雀鷇而食之三月餘餓死爾雅疏云鳥子生須母哺而食名鷇謂燕雀之屬也史記趙武靈王探雀鷇而食之是也左傳文元年楚成王黜太子商臣商臣以宫甲圍成王王請食熊蹯而死弗聴王縊杜注熊掌難熟冀久將有外救又左傳云宰夫胹熊蹯不熟知熊蹯為難熟之物也蹯扶元反乃有車側郭門筋懸廟屋謂侯景惡葬武帝又弑簡文也南史侯景傳云武帝崩及葬脩陵使衛士以大釘於要地釘之欲令後世絶滅簡文帝紀云大寳二年景幽帝於景福殿廢後王偉乃與彭儁王脩纂進觴於帝曰丞相以陛下幽憂既久使臣上夀帝笑曰巳禪帝位何言陛下此夀酒將不盡此乎於是儁等幷賫酒肴曲頃琵琶與極飲帝知將見殺乃盡酣謂曰不圖為樂一至於斯既醉而寢偉乃出儁進囊王脩纂坐上乃崩偉徹户扉為棺遷殯於城北酒庫中左傳襄二十五年崔杼弑其君崔氏側莊公於北郭丁亥葬諸士孫之里四翣不蹕下車七乗不以兵甲杜注曰側葬埋之不殯於廟下車送葬之車髙誘吕氏春秋注曰齊湣王無道卓齒殺之而擢其筋懸之於東廟終日而死亦見史記田完世家鬼同曹社之謀人有秦庭之哭左氏傳曰初曹人或夢衆君子立於社宫而謀亡曹曹叔振鐸請待公孫彊許之旦而求之曹無之戒其子曰我死爾聞公孫彊為政必去之及曹伯陽即位好畋弋曹鄙人公孫彊好弋且言田弋之說恱之因訪政事説於曹伯從之乃背晉而奸宋宋人伐之執曹伯陽以歸殺之曹遂滅左氏傳曰申包胥如秦乞師立依於庭牆而哭七日七夜不絶聲二語傷梁亡建鄴為侯景所據也按秦庭之哭與序内忽踐秦庭事同而取意各異彼言入長安此言金陵失守二帝遇害巳有乞援之志故逃奔江陵矣爾乃假刻璽於闗塞稱使者之酬對以下序已道奔江陵歴盡闗塞之苦也漢書酷吏傳曰寧成詐刻傳出闗歸家後漢書曰郭丹從師長安買符入函谷闗乃慨然嘆曰丹不乗使者車不出闗去家十二年果乗髙車出闗如其志焉更始敗諸將悉歸光武並獲封爵丹獨保平氏不下為更始發喪衰絰盡哀建武二年遂潛逃去敝衣間行涉歴險阻求謁更始妻子奉還節傳乃歸鄉里漢舊儀曰奉璽書使者乗馳傳其驛騎也三騎行晝夜千里為程逢鄂坂之譏嫌值耏門之征稅史記曰伍胥與太子建之子勝俱奔吳到昭闗闗吏欲執之伍胥遂與勝獨自走幾不得脫追者在後索隠曰其闗在西江乃是吳楚之境地理志曰江夏有鄂縣史記曰楚熊渠子立其中子紅為鄂王晉太康地記以為東鄂九州記曰鄂今武昌也庾仲雍江圖曰蘆洲至樊口二十里伍子胥所渡處樊口至武昌十里江夏為吳楚之境子胥自楚奔吳子山自吳奔楚闗吏譏嫌當引此事又晉書地志云河南陽城有鄂坂闗此鄂坂之譏嫌非河南之鄂坂也左傳文十一年曰初宋武之世鄋瞞伐宋司徒皇父帥師禦之耏班御皇父充石以敗狄於長邱獲長狄緣斯宋公於是以門賞耏班使食其征謂之耏門杜預注征稅也乗白馬而不前䇿青騾而轉礙劉向曰公孫龍持白馬之論以度闗魯女生别傳李少君在河東蒲坂乗青騾按神仙傳蘓仙公桂陽人仙去見白馬常在嶺上改牛脾山為白馬嶺桂陽成五丁死友人於武昌岡逢之乗白騾西行乃改為騾岡乗馬䇿騾疑假地名為言也吹落葉之扁舟飄長風於上游滕王序云出往上流來歸全楚謂循江而上也白帖云古者觀落葉因以為舟漢書貨殖傳曰范蠡乃乗扁舟孟康曰特舟也音匹延反後漢書方望曰范蠡乗扁舟於五湖劉攽曰史傳皆作扁舟扁特也吳都賦云習御長風漢書項藉傳曰古之王者地方千里必據上游文穎曰水之流上游或作流師古曰游流也彼鋸牙而鉤爪又循江而習流言西上江陵途經江夏遇侯景襲郢之兵也侯景傳云大寳二年於大􅟘跨水築城名曰捍國四月景遣宋子仙襲郢州刺史方諸景乗勝西上號二千萬聨旗千里江左以來水軍之盛未有也淮南子曰鋸牙鉤爪於是摯矣神異經曰窮竒鋸牙鉤爪遇忠信之人則噬而食之吳都賦云鋸牙鉤爪自成鋒穎喻侯景也吳越春秋云句踐發習流二千人俊士四萬君子六千諸御千人以與吳戰循江習流謂襲郢之兵也排青龍之戰艦鬭飛燕之船樓南史王僧辯傳云湘州賊陸納造青龍艦述異記云吳王夫差作天池池中造青龍舟舟中盛陳妓樂日與西施為水嬉是舟舊有青龍之名子山引用之又屬吳事古今合符矣釋名曰上下重牀曰艦晉令水戰有飛燕船船樓樓船也漢有樓船將軍張遼臨於赤壁王濬下於巴邱乍風驚而射火或箭重而回舟未辨聲於黄蓋已先沉於杜侯張遼王濬喻王僧辯胡僧祐等也風驚射火者謂景為火艦燒柵風不便自焚也箭重回舟者謂景遁潛軍夏首又倍道歸建鄴也未辨聲於黄蓋已先沉於杜侯者謂賊任約為陸法和所擒宋子仙丁和為杜龕所擒景不能救也南史王僧辯傳云侯景浮江西寇軍次夏首僧辯為大都督軍次巴陵景既陷郢城將進寇荆州於是緣江屯戍望風請服僧辯並沉公私船於水中分命衆軍乗城固守偃旗臥鼓安若無人翌日賊衆濟江輕騎至城下景軍内薄苦攻城内同時鼔噪矢石雨下賊乃引退元帝又命平北將軍胡僧祐率衆援僧辯是日賊復攻城不剋又為火艦燒柵風不便自焚而退有流星墜其營中賊徒大駭相顧失色賊帥任約又為陸法和所擒景乃燒營夜遁旋軍夏首元帝以僧辯為征東將軍命即率巴陵諸軍沿流討景攻拔魯山仍攻郢即入羅城景聞之倍道歸建鄴賊帥宋子仙等困蹙求輸郢城身還就景僧辯偽許之子仙謂為信然浮舟將發僧辯命杜龕鼓噪掩至大破之擒子仙丁和等送江陵元帝命生釘和舌臠殺之郢州平渚宫舊事曰景遣任約衆號五萬伐湘東王於江陵兵將逼法和乃出詣湘東云自有兵書乞征任約召諸蠻弟子八百人在江津二日便發王遣胡僧祐等千餘人與之同行法和登艦大笑曰無量兵馬江陵多神祠人俗常所祈禱自法和軍出無復一騐人以為諸神皆從行故也至赤洲湖與任約相對法和乗輕舟不介胄沿流而下去約軍一里乃逺謂將士曰觀彼龍睡不動吾軍之龍甚自踴躍即攻之縱火舫於前而逆風不便法和執白羽扇以麾風風勢即反約衆皆見梁兵步於水上於是大潰皆投水約逃竄不知所之法和曰明日午時當得及期未得人問之法和曰吾前於此水乾時建一刹語檀越等此雖為刹實是賊標今何不向標下求賊也如其言果見任約在水中抱刹柱頭纔出鼻遂擒之魏志云張遼字文逺雁門馬邑人也合肥之戰遼執甲持㦸先登陷陣殺數千人斬二將大呼自名衝壘入至權麾下權大驚衆不知所為人馬皆披靡無敢當者權収合肥十餘日城不可拔乃引退遼率諸軍追擊幾復獲權太祖大壯遼拜征東將軍時元帝以王僧辯為征東將軍故取以為比張遼本臨合肥而云赤壁者疑是誤文也赤壁周瑜事按吳志赤壁之戰曹公軍次江北周瑜等在南瑜部將黄蓋取䝉衝鬭艦數十艘實以薪草膏油灌其中裹以帷幕上建牙旗先書報曹公欺以欲降引次俱前蓋放諸船同時發火時風甚猛悉延燒岸上營落煙炎張天軍遂退敗是其事也時臺城既陷建鄴吳地已為賊營子山引用張遼王濬皆是攻吳敗吳之事不得云周瑜赤壁之兵也故云誤矣晉書曰王濬字士治𢎞農湖人也拜益州刺史武帝謀伐吳詔濬脩舟艦乃作大船連舫又畫鷁首怪獸於船首以懼江神舟檝之盛自古未有濬造船於蜀其木柹蔽江而下尋以謡言拜濬為龍驤將軍監益梁諸軍事太康元年濬發自成都率巴東監軍廣武將軍唐彬攻吳丹陽剋之吳人於江險磧要害之處並以鐵鏁横截之濬作火炬長十餘丈大數十圍以麻油在船前遇鏁燃炬燒之於是船無所礙魏畧曰權乗大船來觀軍公使弓弩亂發箭著其船船偏重將覆權因迴船復以一面受箭箭均船平乃還吳志曰黄蓋字公覆零陵泉陵人也吳書曰赤壁之役蓋為流矢所中時寒墮水為吳軍人所得不知其蓋也置厠牀中蓋自强以一聲呼韓當當聞之曰此公覆聲也向之垂涕解易其衣遂以得生魏志曰杜畿字伯侯京兆杜陵人也受詔作御船於陶河試船遇風覆没魏氏春秋曰諸葛誕與僕射杜畿試船陶河遭風覆没誕亦俱溺虎賁浮河救誕誕曰先救杜侯誕飄至岸畿竟溺死落帆黄鶴之浦藏船鸚鵡之洲述異記曰荀環好道術嘗東遊憇江夏黄鶴樓上望西南有物飄然降霄漢乃駕鶴之仙也齊諧志曰黄鶴山者仙人子安乗黄鶴過此上有黄鶴樓黄鶴一名黄鵠水經注曰江之右岸有船官浦歴黄鵠磯西而南直鸚鵡洲之下尾落帆藏船避之也按王僧辯平郢州蕭韶為郢州刺史梁宗室傳曰元帝封韶為長沙王郢州刺史韶昔為幼童庾信愛之有斷袖之歡衣食所資皆信所給遇客韶亦為信傳酒後為郢州信西上江陵途經江夏韶接信甚薄坐青油幕下引信入宴坐信别榻有自矜意信稍不堪因酒酣乃徑上韶牀踐蹋肴饌謂曰官今日形容大異近日時賔客滿坐韶甚慙恥即其時也路已分於湘漢星猶㸔於斗牛漢書地理志曰零陵郡陽海山湘水所出北入酃入江過郡行二千五百三十里禹貢嶓冡山西漢所出東過三澨至於大别南入江師古曰三澨水在江夏竟陵韶傳云韶為郢州信西上江陵途經江夏韶得接信是信由郢而至江陵也爾雅曰星紀斗牽牛吳分野謂路已漸入江陵而舊國舊都猶望之悵然矣若乃隂陵失路一作路絶釣臺斜趣漢書曰項羽至隂陵迷失道孟康曰縣名屬九江郡述異記曰今隂陵故城九曲澤澤中有項王村即項羽迷失路處水經注曰武昌郡治城南有袁山即樊山也北背大江江上有釣臺望赤壁而沾衣艤烏江而不渡赤壁周瑜破曹公處注見前瑜破魏兵於烏林烏林赤壁東下一百一十里烏江項羽敗處漢書項羽敗遂引東欲渡烏江烏江亭長檥船待謂羽曰江東雖小地方千里衆數十萬亦足王也羽笑曰乃天亡我何渡為服䖍曰檥音蟻如淳曰南方人謂整船向岸曰檥臣瓚曰烏江在牛渚述異記曰今烏江長亭亭下有駐馬塘即當時烏江亭長檥舟待項王處雷池柵浦鵲一作鵠陵焚戍郭璞江賦曰其旁則有雲夢雷池注吳録曰雷池在皖左傳昭五年楚伐吳吳人敗諸鵲岸杜預曰廬江舒縣有鵲尾渚旅舍無煙巢禽無樹自隂陵以下當謂侯景巴陵失律江郢喪師還奔建康所經之路築柵焚戍也南史侯景傳云都下户口百無一二大航南岸極目無煙又云於是千里絶煙人跡罕見白骨成聚如邱壠焉又按下文謂衡荆之杞梓庶江漢之可恃則巢禽無樹一語當謂諸王之敗皆不足倚惟湘東可望中興也如河東王譽為元帝所敗遂見殺邵陵王綸敗走卒為魏人所殺岳陽王詧不能自固請藩於魏且襄陽路逺皆歴有敗亡之禍無可投奔若巢禽之無樹不足恃也謂荆衡之杞梓庶江漢之可恃謂元帝可恃以靖亂也禹貢云荆及衡陽惟荆州左傳云如杞梓皮革自楚往也又曰江漢睢漳楚之望也淮海維揚三千餘里禹貢云淮海惟揚州信自謂遡江而上走三千餘里也過漂渚而寄食託蘆中而渡水漢書韓信傳云信至城下釣有一漂母哀之飯信竟漂數十日信謂漂母曰吾必重報母母怒曰大丈夫不能自食吾哀王孫而進食豈望報乎韋昭曰以水擊絮曰漂吳越春秋曰伍員奔吳追者在後至江中有漁父子胥呼之曰漁父渡我漁父歌之曰日月昭昭乎浸已馳與子期乎蘆之漪子胥即止蘆之漪漁父又歌曰日已夕兮予心悲月已馳兮何不渡為事浸急兮當奈何子胥入船乃渡之千尋之津既渡父持麥飯鮑魚羮盎漿飲食畢欲去子胥解百金之劒以與漁者遂辭不受子胥曰請丈人姓字漁父曰何用姓字子為蘆中人吾為漁丈人富貴無相忘也子胥既去漁者巳覆舟自沉於江水之中矣届於七澤濵於十死謝眺辭隋王牋云西浮七澤吕向曰七澤荆州楚境齊語桓公曰管夷吾射寡人中鉤是以濵於死賈誼書曰十死一生嗟天保之未定見殷憂之方始詩曰天保定爾詩序云天保下報上也君能下下以成其政臣能歸美以報其上焉言已奔江陵元帝用已時天保尚未定也潘岳西征賦云憂天保之未定晉書劉琨勸進元帝表云或殷憂以啓聖明本不達於危行又無情於禄仕危行見論語謬掌衞於中軍濫尸丞於御史本傳云元帝承制信除御史中丞及即位轉右衛將軍按左傳三軍有中軍上軍下軍沈約奏彈王源云謬掌天憲書曰太康尸位信生世等於龍門辭親同於河洛奉立身之遺訓受成書之顧託謂父肩吾卒於江陵也肩吾傳云奔江陵歴江州刺史領義陽太守封武康侯卒漢書曰司馬談為太史公既掌天官不治民有子曰遷遷生龍門太史留滯周南病且卒而子遷適反見父子於河洛之間太史公執手而泣曰予先周室之太史也予死爾必為太史為太史毋忘吾所著論矣且夫孝始於事親中於事君終於立身揚名於後世以顯父母此孝之大也蘇林曰龍門禹所鑿也師古曰龍門山其東在秦州龍門縣西在同州韓城縣北而河從其中流昔四世而無慙今七葉而始落博物志曰太邱長陳實實子鴻臚卿紀紀子司空羣羣子泰四世於漢魏今朝有重名而其徳漸小減時人為其語曰公慙卿卿慙長漢書曰金日磾張安世皆七代仕漢左太沖詠史詩曰金張藉舊業七葉珥金貂下云泊予身而七葉子山自言先世之徳無慙於卿長及己身而衰落也泣風雨於梁山惟枯魚之銜索信思親也琴操曰曽子耕太山下雨雪不得歸思父母作梁山操家語子路見孔子曰枯魚銜索幾何不蠧二親之夀忽如過隙入欹斜之小徑掩蓬藋之荒扉就汀洲之杜若待蘆葦之單衣左氏傳曰斬之蓬蒿藜藋而共處之楚辭曰搴汀洲兮杜若王逸曰汀平也杜若香草吳志諸葛恪傳云童謡曰諸葛恪蘆葦單衣篾鉤絡於何相求成子閣成子閣者反語石子岡也建鄴南有長陵曰石子岡葬者依然鉤絡者板飾革帶世謂之鉤絡帶恪果以葦席裹其身而篾束其腰投之於此岡後聴恪故吏歛葬求之於石子岡云時元帝猜忌信憂讒待死若屈原葛恪矣於是一作時西楚霸王劒及繁陽謂元帝馳檄討景也南史帝紀云承聖元年二月王僧辯發自潯陽帝馳檄四方購侯景及逆者封萬户侯開國公絹布五萬疋僧辯等遂平景漢書項羽自立為西楚霸王孟康曰舊名江陵為南楚吳為東楚彭城為西楚羽都彭城元帝都江陵時元帝承制尚未正位故以為比左氏傳曰楚子怒劒及於寢門之外又昭五年云薳射帥繁陽之師先入南懷楚師從之又襄四年云楚師為陳敗故猶在繁陽杜預曰鮦陽南有繁陽亭楚地也鏖一作麾兵金匱校戰玉堂太公有金匱書漢書髙帝紀曰丹書鐵契金匱石室如淳曰金匱猶金縢也衛青傳曰鏖兵臯蘭一作麾兵者張衡思𤣥賦舊注云尚書右秉白旄以麾秦漢以來即以所執之旗名曰麾謂麾幡曲蓋者也解嘲曰歴金門上玉堂晉灼曰黄圖有大玉堂小玉堂蒼鷹赤雀鐵軸牙檣皆戰艦也晉令云水戰有蒼隼船又陶侃有青雀舟郭璞方言曰今江東人呼枻為軸埤蒼曰檣帆柱也古詩曰象牙作帆檣言舟師之盛也沉白馬而誓衆負黄龍而渡江海潮迎艦江萍送王王僧辯傳曰陳武帝率兵五萬出自南江前軍五千行至盆口與僧辯㑹於白茅洲為盟於是升壇挿血共讀盟文辭氣慷慨皆淚下霑衿及發鵲頭中江而風浪師人咸懼僧辯再拜告天曰僧辯忠臣奉辭伐罪社稷中興當使風息若鼎命中淪請從此逝言訖風止自此遂泛安流有羣魚躍水飛空引導賊望官軍有五色雲雙龍挾艦行甚迅疾漢書曰漢王即皇帝之位論功而封之申以丹書之信重以白馬之盟吳越春秋曰禹南渡江黄龍負舟吳都賦曰迎海潮而振緍想萍實之復形家語曰楚昭王渡江江中有物大如斗圓而赤直觸王舟舟人取之王使使聘於魯問於孔子孔子曰此所謂萍實也可剖而食之吉祥也惟霸者為能獲焉使者反王遂食之戎車屯於石城戈船掩於淮泗南史承聖元年三月辛已王僧辯督諸軍乗潮入淮壬午陳霸先於石頭西落星岡築柵共攻景陸機飲馬長城窟行曰戎車無停軌伏淊北征記曰石頭城建康西界臨江城也是曰京師吳都賦曰戎車盈於石城戈船掩於江湖劉逵注云石城石頭䲧也在建鄴西臨江中有庫藏軍儲吳志建安十六年權徙治抹陵明年城石頭改抹陵為建業山謙之丹陽記云石頭城吳時悉土塢義熙初始加磚甓因山以為城因江以為池形勢險固有竒氣亦謂之石首城也越絶書曰伍子胥船有戈漢書曰歸義侯嚴為戈船將軍出零陵下灕水諸侯則鄭伯前驅盟主則荀罃暮至左氏傳曰諸侯如楚魯衛曹邾不㑹鄭伯先待於申六月丙午楚子合諸侯於申又襄十一年四月諸侯伐鄭已亥齊太子光宋向戍先至於鄭門於東門其暮晉荀罃至於西郊東侵舊許時晉主夏盟故曰盟主剖巢燻穴奔魑走魅侯景傳云王僧辯等進營於石頭城北景列挑戰僧辯大破之景既退敗不敢入宫歛其散兵屯於闕下遂將逃王偉按劒攬轡曰自古豈有叛天子乎今宫中衞士尚足一戰寧可便去景曰我在北打賀拔勝敗葛榮揚名河朔與髙王一種人來南渡大江取臺城如反掌皆乃所親見今日事恐是天亡乃好守城當復一决仰觀石闕逡巡歎息乃以皮囊盛二子挂馬鞍與其儀同田遷范希榮等百餘騎東奔王偉遂委臺城竄逸左氏傳曰魑魅魍魎莫能逢之杜注魑山神獸形魅怪物又傳曰投諸四裔以禦魑魅魑勅知反魅反備反吳都賦曰顛覆巢居剖破窟宅淮南子曰越王翳逃山穴越人熏而出之埋長狄於駒門斬蚩尤於中冀謂斬侯景也侯景傳云赤亭之役胡僧祐以羸卒一千破任約精兵二萬轉戰而東前無横陣既而侯瑱追及景衆未陳皆舉幡乞降景不能制乃與腹心人數十單舸走推二子於水自扈瀆入海至胡豆洲前太子舍人羊鯤殺之送於王僧辯左氏傳曰鄋瞞伐齊遂伐我公使叔孫得臣追之敗狄於鹹獲長狄僑如富父終甥舂其喉以戈殺之埋其首於子駒之門帝王世紀曰黄帝戮蚩尤於中冀之野燃腹為燈飲頭為器侯景傳云景宴集其黨召王僧通僧通取肉榅鹽以進景問曰好不景答所恨大鹽僧通曰不鹽則爛及景死僧辯截其二手送齊文宣傳首江陵果以鹽五斗置腹中送於建康暴之於市百姓爭取屠膾羹食皆盡焚骨揚灰曽罹其禍者乃以灰和酒飲之首至江陵元帝命梟於市三日然後煑而漆之以付武庫後漢書董卓既斬乃尸卓於市天時始熱卓體充肥脂流於地守尸吏然火置卓臍中光明達曙漢書張騫傳云匈奴破月氐王以其頭為飲器又匈奴傳以所破月氐王頭共飲血盟師古曰飲酒之器也戰國䇿云趙襄子最怨知伯漆其頭以為飲器直虹貫壘長星屬地侯景傳云白虹貫日三重天文志云周禮眂祲氏掌十煇之法以觀妖祥辨吉凶七曰彌謂白虹彌天而貫日也凡白虹者百殃之本衆亂所基姦臣謀君擅權立威虹頭尾至地流血之象晉宣帝紀云有長星墜於諸葛之壘又時有長星自西南流於東北墜於梁帝斬公孫文懿於星墜之所昔之虎踞一作據龍盤加以黄旗紫氣莫不隨狐兔而窟穴與風塵而殄瘁傷故國之凋殘也侯景傳云王克開臺城門引裴之横入宫縱兵蹂掠是夜遺燼燒太極殿及東西堂延閣秘署皆盡羽儀輦路莫有孑遺王僧辯命武州刺史杜崱救火僅而得滅臺城都下尸口百遺一二張勃吳録曰劉備曽使諸葛亮至京因覩秣陵山阜乃嘆曰鍾山龍盤石城虎踞帝王之宅也司馬徳操與劉恭嗣書曰黄旗紫氣恒見東南終成天下者揚州之君乎潘岳西征賦云狐兔窟穴於殿傍張景陽七哀詩云狐兔窟其中蕪穢不復掃詩大雅瞻卬云邦國殄瘁毛傳云殄盡也瘁病也西瞻博望北臨𤣥圃南史宋武帝紀云於博望梁山立雙闕陸機詩有皇太子宴𤣥圃宣猷堂應令之作梁昭明太子於𤣥圃穿築與朝士名素者逰其中又簡文帝嘗於𤣥圃述武帝所製五經講疏聴者傾朝野按漢時有博望苑崑崙之山有𤣥圃蓋舊有此名矣月榭風臺池平樹古沈約郊居賦曰風臺累翼月榭重栭戰國䇿雍門周曰曲池又以平王褒詩云百年餘古樹倚弓於玉女牕扉繫馬於鳳凰樓柱魯靈光殿賦云玉女窺牕而下視晉宫闕名洛陽有鳳凰樓仁夀之鏡徒懸茂陵之書空聚晉書陸機傳云機與弟雲書仁夀殿前有大方銅鏡髙五尺餘廣三尺二寸暗著庭中向之便冩人形體漢武帝内傳云帝崩三日葬茂陵又帝崩時遺詔以雜書三十餘巻常讀玩之使隨身歛到建康二年河東功曹李友入上黨抱犢山採藥於巖室中得此經盛以金箱巻後題東觀臣姓名記月日武帝時也河東太守張純以經箱奏進帝問武帝時左右近臣有典書中郎冉登見經及箱流涕對曰此孝武皇帝殯殮時物也知帝為得仙之下者矣漢武好道梁武佞佛故用此語蓋傷之也若夫立徳立言謀明寅亮聲超於繫表道髙於河上悼簡文帝也梁本紀云帝諱綱字世讃武帝第三子幼而聰睿六嵗能屬文及長器寛𢎞未嘗見喜愠色尊嚴若神眄睞則目光燭人讀書則十行俱下藻辭豔發博綜羣言善談𤣥理自十一便能親庶務歴試藩政所在稱美性恭孝居穆貴嬪喪哀毁骨立所坐席霑濕盡爛及居監撫多所𢎞宥文簿部領纖毫必察𢎞納文學之士接賞無倦自幽縶之後為文自序云有梁正士蕭世讃立身行道終始若一風雨如晦雞鳴不巳弗欺暗室豈况三光數至於此命也如何蓋賢君也左傳叔孫豹曰太上有立徳其次有立功其次有立言此之謂不朽書謨明弼諧寅亮天地世說荀粲曰象外之意繫表之言神仙傳云河上公者莫知其姓氏漢文帝時結草為菴于河之濵帝讀老子經頗好之時皆稱河上公亦見髙士傳更不遇於浮邱遂無言於師曠劉向列仙傳云王子喬周靈王太子晉也好吹笙作鳳鳴逰伊洛間道士浮邱公接上嵩山二十餘年後來於山上告桓良曰告我家七月七日待我於緱氏山頭果乗白鶴駐山頭望之不得舉手謝時人而去汲冡周書云晉平公使叔譽聘於周見太子晉與之言五稱而三窮歸告平公師曠曰請使瞑臣往與之言師曠見太子晉曰吾後三年將上賔於帝所汝慎無言師曠歸未及三年告死者至喻簡文為太子時為賊所制不能遇浮邱公卒至於死也太清二年景入都後三年為大寳二年帝為景所弑是無言於師曠也以愛子而託人知西陵而誰望隋書云臺城陷後太子以幼子大圜屬湘東繹幷剪爪髪以寄之陸機弔魏武序曰指姬女以指季豹以示四子曰以累汝因泣下傷哉曩以天下自任今以愛子托人又曰吾婕妤妓人皆著銅爵臺於臺堂上施八尺牀張繐帳朝夕上脯糒之屬月朝十五日輙向帳作妓汝等時時登銅爵臺望吾西陵墓田非無北闕之兵猶有雲臺之仗南史栁敬禮傳云景餞仲禮於後渚敬禮謂仲禮曰景今來㑹敬禮抱之兄便可殺雖死無恨仲禮壯其言許之不敢動景征晉熙敬禮與南康王㑹禮謀襲其城尅期將發建安侯蕭賁告之遂遇害臨死曰我兄老婢也國家敗亡實余之責今日就死豈非天乎又南康王㑹理傳云景往晉熙都下虚弱㑹理復與栁敬禮及北兗州司馬成欽謀之敬禮曰舉大事必有所資今無寸兵安可以動㑹理曰湖熟有吾故舊三千餘人昨來相知尅期嚮應計賊守兵不過千人若大兵外攻吾等内應直取王偉事必有成縱景後歸無能為也敬禮曰善於時百姓厭賊咸思用命建安侯賁以謀告王偉偉遂収㑹理遇害侯景傳云南康王㑹理之事景謂簡文欲謀之遂懷逆謀言當此之時如南康王栁敬禮等非無北闕内應之兵而賊之心腹如王偉蕭賁等其守兵猶有雲臺之仗以致忠臣見戮帝遂被弑終簡文之死也漢書云更始初義兵入長安誅王莽莽將王邑等拒擊北闕下魏志髙貴鄉公髦甘露五年注魏氏春秋曰帝自將穴從僕射李昭黄門從官焦伯等下陵雲臺鎧仗授兵欲因際㑹自出討文王時侯景入宫王偉等以甲防守皆弄主兵故引雲臺之仗云司徒之表裏經綸狐偃之惟王實勤司徒謂王僧辯也梁書曰王僧辯字君才右衛將軍神念之子也討景逆寇悉平京都尅定世祖即帝位以功進授司徒為司徒在平景後此在後稱之也左傳僖二十五年云秦伯師於河上將納王狐偃言於晉侯曰求諸侯莫如勤王言今日僧辯之師猶昔日狐偃勤王之舉也横琱戈而對霸主執金鼓一作鞭而問賊臣晉語云韓簡挑戰穆公衡琱戈出見使者漢書吳王濞傳云漢兵至膠西王肉袒叩頭漢軍壁弓髙侯執金鼓見之曰王苦軍事願聞王發兵狀賊臣謂侯景也平吳之功壯於杜元凱王室是賴深於温太真晉書云杜預字元凱咸寧中武帝有滅吳之計惟預與武帝合後預遂平吳晉書曰温嶠字太真太真人也為郡尹後平蘇峻之亂始則地名全節終則山稱枉人水經全鳩澗水酈元注述征記曰全節地名也潘岳西征賦曰紛吾既邁此全節李善注云全節即漢書全鳩里戾太子死處圖經曰全節在閿鄉縣東十里鳩澗西水經注云沅水又東歴小彎謂之枉渚東鳴澗西渚東里許便得枉人山隋書地理志云汲郡黎陽有枉人山隋圖經曰枉人山谷名或云殷紂殺比干於此因得名古凡伯國也南陽一作山校書去之已逺上蔡逐獵知之何晚謂僧辯父子為陳武帝所誅也王僧辯傳云元帝江陵之敗僧辯未至而荆州已滅及敬帝初即梁王位僧辯預援立功承制齊文宣又納貞陽侯蕭明以為梁嗣僧辯不納後納之遣龍舟法駕往迎貞陽㑹於江寧浦明踐位僧辯常處石頭城㑹江淮人報云齊兵大舉至夀春僧辯謂齊軍必出江表因遣記室㕘軍以事報陳武仍使整舟艦器械陳武宿有圖僧辯志及聞命留旴城中銜枚而進縱火焚之僧辯共頠下就執是夜及子頠俱被絞殺時夀春竟無齊軍又非陳武之譎殆天授也南陽校書去之巳逺者哀僧辯功成見殺也上蔡逐獵知之何晚者罪僧辯内有粤主而外求君以致父子俱戮也吳越春秋云越王賜文種屬鏤之劒種得劒嘆曰南陽之宰而為越王之禽史記曰李斯具五刑出獄與其中子俱執顧謂其子曰吾欲與若復牽黄犬出上蔡東門逐狡兔其可得乎李斯舍扶蘇而立胡亥且父子同戮故取以為比僧辯既死陳武遂致受禪梁之社稷存亡繫於王公故賦終言之鎮北之負譽矜前風飈凛然鎮北謂邵陵王綸也侯景傳云邵陵王綸率西豐公大春新塗公大戊永安侯確等馬步二萬發自京口直據鍾山景黨大駭咸欲逃散分遣萬餘人拒戰綸大破之於愛敬寺下景初聞綸至懼形於色及敗軍還尤言其盛命具舟石頭將北濟任約曰去鄉萬里走欲何之戰若不捷君臣同死草間乞活約所不為景乃止所謂負譽矜前風飈凜然者也云矜前者綸卒為景所敗還奔京口其譽不終也云鎮北者按綸傳大同中綸嘗為揚州刺史揚州在江北故云鎮北也至太清元年又遷郢州矣負譽謂邵陵討景時有此威望若其少時險躁幾絶人道不足譽也水神遭箭山靈見鞭是以蟄熊傷馬浮蛟没船一作鳶亦謂綸少時險躁不為山川之靈所祐故討景之功不成也隋書五行志云綸將兵援臺城至鍾山有蟄熊嚙綸所乗馬南史邵陵王傳云綸討景發白下中江而浪起有物傷舟將覆識者尤異之及次鍾陵景巳渡采石綸乃晝夜兼道旋軍入赴濟江中流風起人馬溺者十一二一作鳶邵陵王子確傳云侯景乞盟憚確在外啟求召確確遂入城景愛其膂力恒令在左右後從景仰見飛鳶羣賊爭射之不中確射之應弦而落賊徒忿嫉咸勸除之後與景獵鍾山同逐禽引弓將射景弦斷不得發賊覺殺之是倂序綸子確之死也史記云秦始皇夢與海神戰如人形問占夢博士曰海神不可見以大魚蛟龍為候乃令入海者齎捕魚具而自以連弩候大魚出射之至之罘見巨魚射殺一魚遂並海西至平原津而病三齊略記云始皇作石橋欲過海㸔日出處有神人驅石下海而去不速神輙鞭之石皆流血才子倂命俱非百年按武帝有子八人故賦比之高陽之數名曰才子倂命謂元帝與之作難也南史列傳云綸大修器甲將討侯景元帝遣王僧辯逼之軍潰後為西魏楊忠陸通所害俱非百年者謂兄弟猜忌家禍疊搆邵陵既亡江陵亦敗俱不能永年也左傳云髙陽氏有才子八人中宗之夷凶靖亂大雪寃恥謂元帝也梁帝紀云世祖孝元皇帝諱繹字世誠武帝第七子也天監十三年封湘東王太清元年為荆州刺史太清二年承制江陵明年平侯景元帝廟號世祖云中宗者以其啟中興之業若晉元帝矣干寳晉紀總論曰故大命集於中宗皇帝夷凶靖亂大雪寃恥者謂其能平侯景報萬民之寃洒兩君之恥也去代邸而承基遷唐郊而纂祀謂元帝由湘東王而承帝業也梁帝紀云承聖元年冬十一月丙子皇帝即位於江陵漢書文帝紀云奉天子法駕迎於代邸帝王世紀云摯登帝位封異母弟放勲為唐侯後受摯禪是為帝堯反舊章於司𨽻歸餘風於正始後漢光武紀云更始將北都洛陽以光武行司𨽻校尉使前整修宮府於是致僚屬作文移從事司察一如舊章衛玠别傳曰玠至武昌見王敦與之談論彌日信宿敦顧謂僚屬曰昔王輔嗣吐金聲於中朝此子復玉振於江表微言之緒絶而復續不晤永嘉之中復聞正始之音阿平若在當復絶倒見劉孝標世說注亦見晉書沉猜則方逞其欲藏疾則自矜於已天下之事没焉諸侯之心揺矣梁本紀云帝性好矯飾多猜忌於名無所假人微有勝已者必加毁害帝姑義興昭長公主子王銓兄弟八九人有盛名帝妬忌其美遂改寵姬王氏兄王珩名琳以同其父名忌劉之遴學使人鴆之如此者甚衆雖骨肉亦徧被其禍南史論曰元帝居勢勝之地啟中興之業既雪讎恥且應天人而内積猜忍外崇矯飾攀號之節忍酷於踰年交省之制申情於木偶竟而雍州引寇釁起河東之戮益州親尋事習邵陵之窘悖辭屈於僧辯殘虐極於圓正不義不眤若斯之甚而復謀無經逺心勞志大近捨宗國逺迫强鄰外弛藩籬内崇講肄卒於溘至戕隕方追始皇之迹雖復文籍滿腹何救社稷之墟歴觀書契以來未有三葉遘愍若肅宗之酷也諸侯心揺為下齊交秦患張本既而齊交北絶秦患西起齊謂北齊也秦謂西魏也西魏都長安是秦地也梁本紀云承聖元年齊將潘樂辛術等攻秦郡王僧辯遣將杜崱帥衆拒之齊人又賀侯景平二年九月齊遣郭元建等帥衆頓合肥又承聖二年五月魏大將尉遲迴進兵逼巴西潼州刺史楊乾運以城納迥先是魏使宇文仁恕來聘齊使至江陵帝接仁恕有闕魏相安定公憾焉使柱國萬紐于謹來攻十月魏軍至襄陽梁王蕭詧率衆㑹之卒有江陵之禍戰國䇿云秦欲伐齊齊楚之交善王患之張儀南見楚王曰大王茍能閉闗絶齊臣請使秦王獻商於之地方六百里楚王大恱羣臣聞見者畢賀陳軫獨不賀曰西生秦患北絶齊交兩國之兵必至矣况背闗一作闕而懷楚異端委而開吳謂元帝安戀江陵不復歸都建鄴也漢書項羽傳贊云及羽背闗懐楚左傳哀七年云子貢對宰嚭曰太伯端委以治周禮杜預曰端委禮衣也吳都賦云有吳之開國也肇自泰伯驅緑林之散卒拒驪山之叛徒營軍梁溠蒐乗巴渝謂元帝拔逆黨任約謝答仁於獄以攻蜀也武陵王紀傳云魏軍侵蜀魏將尉遲迥逼涪水楊乾運降之迥即趨成都五月紀次西陵軍容甚盛元帝命䕶軍將軍陸法和立二城於峽口名七勝城鎖江以斷峽時陸納未平蜀軍復逼元帝甚憂法和告急旬日相繼元帝乃拔任約於獄以為晉安王司馬徹禁兵以配之幷遣劉棻共約西付六月紀築連城攻絶鐵鎖元帝復於獄拔謝答仁為步兵校尉配衆一旅上赴紀頓兵日久頻戰不利師老糧盡智力俱殫又魏人入劒閣成都虚弱憂懣不知所為遂致於敗按元帝紀魏尉遲迥平蜀在承聖二年八月蜀平而江陵隨之矣及元帝敗魏人燒柵朱買臣謝答仁勸帝乗暗潰圍出就任約答仁又求自扶帝帝問僕射王褒褒曰答仁侯景之黨豈是可信成彼之勲不如降也信譏元帝復用侯景之黨以抗拒骨肉也渚宫舊事云初陸法和擒任約於水中約言求就師目前死法和曰檀越有相必不死且於王有緣決無他慮王於後微得檀越力果釋用為郡守後漢書劉𤣥傳云新市人王匡王鳳與諸亡命藏於緑林中注緑林山在荆州當陽縣東北也漢書英布傳布反薛公曰布以驪山之徒自致萬乗此皆為身不顧後慮左傳莊四年云楚武王伐隨卒於樠木之下令尹鬭祁莫敖屈重除道梁溠營軍臨隨隨人懼行成杜注溠水在義陽厥縣西東南入鄖水梁橋也地理志云巴屬益州故巴國左傳云巴子使韓服告楚是後漢書曰閬中有渝水其人多居水左右天性勁勇喜歌舞髙祖觀之曰此武王伐紂之歌也乃命樂人習之所謂巴渝舞營軍梁溠蒐乗巴渝者言自楚攻蜀也左傳苖賁皇曰蒐乗補卒注云蒐閱也問諸淫昏之鬼求諸厭劾之符承聖二年上聞武陵王東下使方士畫板為紀像親釘支體以厭之左傳僖十九年云宋公使邾文公用鄫子於次睢之社以屬東夷司馬子魚曰今一㑹而虐二國之君又用諸淫昏之鬼將以求霸不亦難乎魏志董卓傳注獻帝起居注曰李傕性喜鬼怪左道之術常有道人及女巫謳擊鼓下神祭祠六丁符劾厭勝之具無所不為荆門遭廩延之戮謂元帝命樊猛斬武陵王紀也南史列傳云武陵王紀字世詢武帝第八子也特為帝愛天監十三年封武陵王大同三年為都督益州刺史大寳二年僣號於蜀改元天正魏人侵蜀元帝遣任約謝答仁上赴紀將軍侯叡為任約謝答仁所破紀頻敗知不振遣署度支尚書樂奉業徃江陵論和緝之計元帝知紀必破遂拒而不許於是兩岸十餘城遂俱降逰擊將軍樊猛率所領至紀所紀在船中遶牀而走以金擲猛等曰此顧卿送我一見七官卿必當富貴猛曰天子何由可見殺足下此金何之猶不敢逼圍而守之法和馳啟上宻敕樊猛曰生還不成功也猛遂斬紀荆門按元帝與紀書又為詩曰回首望荆門驚浪且回奔四鳥嗟長别三聲悲夜猿圓正在獄中連句曰水長二江急雲生三峽昏願貰淮南罪思報阜陵恩帝㸔詩而泣荆州記曰荆門上合下開開達山南有門之形故曰荆門後漢書注云荆門山名在今硤州宜都縣西北今猶有故城基址在山上廪延用春秋共叔段事以元帝不兄也左傳云鄭莊公弟太叔段又収貳以為己邑至於廩延太叔將襲鄭公命子封帥車二百乗以伐京夏口一作首濫逵泉之誅謂元帝攻邵陵王綸綸卒為魏所殺是禍由元帝也邵陵王傳云邵陵攜王綸字世調武帝第六子也大寳二年綸至夏口承制百官湘東王繹遣王僧辯帥舟師逼之僧辯據郢州綸為西魏所害是元帝逼之以至於死故曰誅也邵陵王乃元帝之兄故用季友酖兄之事左傳莊三十二年云成季使以君命命僖叔待於鍼巫氏使鍼季酖之歸及逵泉而卒僖叔成季皆桓公之子以喻邵陵湘東皆武帝子以弟害兄也夏口者左傳云吳伐楚楚沈尹戍奔命於夏汭杜預曰漢水入口今夏口也郡國志南郡津鄉注曰史記云蘇秦說楚威王楚東有夏州左傳云楚莊伐陳鄉取一人以歸謂之夏州今夏口城有州名夏口晉志云武昌沙羡縣有夏口對沔口有津水經注云對黄鵠岸入沔津故城以夏口為名亦沙夷縣治也一名夏首楚辭曰過夏首而西浮王逸注云夏首水口也蔑因親以教一作致愛忍和樂於彎弧孝經云因親以教愛孟子曰其兄彎弓而射之詩云兄弟既翕和樂且耽言不能兄弟親愛而反以彎弧為和樂也既一作慨無謀於肉食非所望於論都南史曰侯景平王僧辯啟送秘府圖籍勅周𢎞正讎校時朝議遷都但元帝再臨荆峽前後二十餘年情所安戀不欲歸建鄴兼故府臣僚皆楚人並欲即都江陵云建康蓋是舊都彫荒已極且王氣已盡兼與北近若有不虞悔無所及且臣等又聞荆南有天子氣今其應矣元帝無去意時尚書左僕射王褒及𢎞正咸侍帝顧曰卿意何如褒等以帝猜忌弗敢衆中公言唯唯而已褒後因清間宻謀還丹陽甚切終不引納他日本𢎞正乃正色諌於再三曰若如士大夫惟聖王所都無定處至於黔首未見入建鄴城便謂未是天子猶列國諸王今日付百姓之心不可不歸建鄴當時頗相酬許𢎞正退後黄羅漢宗懍乃言𢎞正王褒東人乃勸東下非為國計𢎞正復面折二人帝欲徧試人情曰欲吾去者左袒於是左袒過武昌太守朱買臣復勸上遷曰買臣家在荆州豈不願官長徃但恐是買臣富貴非官富貴耶帝深感其言卒不能用及于謹入江陵朱買臣按劒進曰惟斬宗懍黄羅漢可以謝天下帝曰曩實吾意宗黄何罪左傳云長勺之戰曹劌請見其鄉人曰肉食者謀之又何間焉劌曰肉食者鄙未能逺謀杜預曰肉食在位者說苑曰晉東郭氏上書於獻公公曰肉食者已慮之矣對曰忽使肉食失計於廟堂藿食寧得不肝腦塗地也陸士衡云無以肉食資取笑藜與藿是也後漢杜篤傳云光武欲建都洛邑篤以闗中先帝舊京不宜改營作論都賦奏之未深思於五難先自擅於二一作三端左傳昭十三年云韓宣子問於叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈焉何難對曰取國有五難有寵而無人一也有人而無主二也有主而無謀三也有謀而無民四也有民而無徳五也楚君子干涉五難以弑舊君誰能濟之武陵王紀傳云元帝與紀書曰吾膺此樂推事歸當璧當璧即左傳康王諸子事故取子干為比言其未思五難也二端帝常自比諸葛桓温惟張纘許焉是二端又曰我韜於文士媿於武夫亦是二端三端帝能詩工書善畫自圖宣尼像為之贊而書之時人謂之三絶韓詩外傳曰君子避三端文士筆端勇士鋒端辯士舌端登陽城而避險臥砥柱而求安謂元帝即安荆楚猶登至險以避險臥不安以求安也左傳昭四年云司馬侯對晉侯曰陽城九州之險也杜注云陽城在河東陽城縣東北禹貢曰南至於華隂北至於底柱又曰底柱析城至於王屋師古曰底柱在陜縣東北在河中形若柱也既言多於忌刻實志勇而形一作刑殘但坐觀於時變本無情於急難言元帝忌克殘忍當援師討景時但坐觀時變而無兄弟急難之義如於邵陵武陵河東桂陽之屬俱自相屠戮也左傳云晉惠公反國秦伯謂公孫枝曰夷吾其定乎對曰今其言多忌克難哉詩云兄弟急難地惟黑子城猶彈丸其怨則黷其盟則寒元帝紀云自侯景之難州郡大半入魏自巴陵以下至建康縁以長江為限荆州界武寧西拒峽口自嶺以南復為蕭勃所據文軌所同千里而近人户著籍不盈三萬中興之盛盡於此矣黷怨寒盟如魏宇文仁恕來聘帝接有闕致起魏師詳見前注漢書賈誼上疏云淮南之比大諸侯厪如黑子之著面史記平原君傳趙郝曰此彈丸之地左氏傳曰君無怨黷又子貢對宰嚭曰盟可尋也亦可寒也豈寃禽之能塞海非愚叟之可移山山海經云赤帝之女嬉逰東海溺而死不返化為寃禽名曰精衛常取西山木石以填東海博物志云有鳥如烏文首白喙赤足曰精衛常取西山之木石以填東海列子云大行王屋二山方七百里髙萬仞本在冀州之南河陽之北北山愚公年九十面山而居懲山北之塞出入之迂也聚室而謀曰吾與汝畢力平險指通豫南達於漢隂可乎雜然相許其妻獻疑曰以君之力曽不能損魁父之邱如太行王屋何且焉置土石雜曰投諸渤海之尾隠土之北遂率子孫荷擔者三夫即石墾壤箕畚運於渤海之尾鄰人京城氏之孀妻有遺男始齓跳往助之寒暑易節始一反焉河曲智叟笑而止之曰甚矣汝之不惠以殘年餘力曽不能毁山之一毛其如土石何北山愚公長息曰汝心之固固不可徹曽不若孀妻弱子雖我之死有子存焉子又生孫孫又生子子子孫孫無窮匱也而山不加増何苦而不平河曲智叟無以應操蛇之神聞之懼其不已也告之於帝帝感其誠命夸蛾氏二子負二山一厝朔東一厝雍南自此冀之南漢之隂無隴斷焉喻元帝以荆州小國搆釁兄弟結怨强鄰不量力也况以沴氣朝浮妖精夜隕赤烏則三朝夾日蒼雲則七重圍軫謂元帝即位以來災異迭見梁運將終也元帝紀云承聖元年冬天門山獲野人星隕吳郡淮南有野象數百宣城郡猛獸暴食人二年春南宫門籥牡飛兩龍見湘川三年春主衣庫見黑蛇遶之並黑色帝退居栖心省又有蛇從屋墮落帝帽忽然便失城濠中龍騰出煥爛五色竦曜入雲六七小龍相隨飛去羣魚騰躍墜死於陸道城上常有紫氣至時消歇及魏軍至柵是夜有流星墜城中又嵗星在井熒惑守心後漢書五行志云氣之相傷謂之沴注尚書大傳曰凡六沴之朝嵗之朝月之朝日之朝則后王受之左氏傳曰楚有雲如衆赤烏夾日以飛三日楚子問諸周太史太史曰其當王身乎春秋文耀鉤云楚有蒼雲如霓圍軫七蟠中有荷斧之人向軫而蹲於是楚唐史畫遺灰而雲滅故曰唐史之䇿上滅蒼雲地理志云楚地翼軫之分野也亡吳之嵗既窮入郢之年斯盡左傳昭三十二年云吳伐楚史墨曰不及四十年越其有吳乎越得嵗而吳伐之必受其凶至哀二十二年越滅吳又昭三十一年趙簡子夢童子羸而轉以歌占諸史墨曰六年及此月也吳其入郢乎入郢必以庚辰定四年庚辰吳入郢北史藝術傳庾季才曰秦將入郢陛下宜還都以避其患周含鄭怒楚結秦寃有南風之不競值西鄰之責言周書蕭詧傳云魏恭帝元年令于謹伐江陵詧以兵㑹之周含鄭怒者謂詧以元帝殺其兄譽遂結釁也左傳云周鄭交惡又僖二十四年王怒將以狄伐鄭楚結秦寃者謂西魏來伐也左傳襄十八年曰晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功元帝紀云魏師至帝在幽逼求酒飲之製詩四絶其一曰南風且絶唱西陵最可悲今日還蒿里終非封禪時春秋僖十四年云晉侯及秦伯戰於韓獲晉侯左傳曰初晉獻公筮嫁伯姬於秦遇歸妹之暌其繇曰西鄰責言不可償也言楚有可敗之道西魏乗機而入也俄而梯衝亂舞冀馬雲屯魏志公孫瓉與子續書曰袁氏之攻狀若鬼神鼓角鳴於地中梯衝舞於城上左傳云冀之北土馬之所生陸機詩曰胡馬如雲屯言魏師之盛也俴秦車於暢轂㳫漢鼓於雷門秦風小戎之詩云小戎俴収毛傳云小戎車也俴淺収軫也又云文茵暢轂毛傳曰暢轂長轂也正義曰淺収暢轂皆謂兵車也兵車言淺軫長轂者對大車平地載任之車為淺為長也漢書王尊傳曰毋持布鼓過雷門師古曰雷門㑹稽城門也有大鼓越擊此鼓聲聞洛陽下陳倉而連弩渡臨晉而横船蜀志云建興六年冬諸葛亮出散闗圍陳倉亮性長於巧思損益連弩木牛流馬皆出其意漢書云韓信進兵擊魏魏盛兵蒲反塞臨晉信乃益為疑兵陳船欲渡臨晉而伏兵從夏陽襲安邑魏豹驚引兵迎信信遂擄魏豹雖復楚有七澤人稱三户箭不麗於六麋雷無驚於九虎言江陵防守之弱不足抵西魏之師也子虚賦云臣聞楚有七澤嘗見其一未見其餘也左傳哀五年云晉執蠻子與其五大夫以畀楚師於三户杜元凱曰今丹水縣北有三户亭三户楚地或云屈景昭為三户非也左傳宣十二年邲之戰云樂伯射麋麗龜晉魏錡如楚致師楚潘黨逐之及熒澤見六麋射一麋以顧獻王子年拾遺記曰太初謡言云三七末世雞不鳴狗不吠宫中荆棘亂相繫當有九虎爭為帝至王莽簒位將軍有九虎之號矣後漢書馮衍傳曰皇帝破百萬之陣摧九虎之軍雷震四海注云莽末拜將軍九人皆以虎為號辭洞庭兮落木去涔陽兮極浦謂巳時去江陵身在長安也本傳云聘於西魏屬大軍南討遂留長安楚辭曰洞庭波兮木葉下又曰望涔陽兮極浦王逸曰涔陽江陭名也近附郢極逺也浦滙也吕向曰涔陽浦接於楚都也後漢馮衍傳注云洞庭湖名也中有洞庭山在今岳州西南云辭去者言已入長安離楚地也熾火兮焚旗貞風兮害蠱左傳晉獻公之筮曰車說其輹火焚其旗不利行師敗於宗邱秦伯伐晉卜徒父筮之其卦遇蠱曰千乗三去三去之餘獲其雄狐夫狐蠱必其君也蠱之貞風也其悔山也嵗云秋矣我落其實而取其材所以克也乃使玉軸揚灰龍文折柱元帝紀云魏軍燒柵元帝焚古今圖書十四萬巻以寳劒擊柱折之曰文武之道盡於此矣龍文劒名博物志云龍文吳王使干將所作下江餘城長林故營下江長林梁時屬武寧郡魏軍至襄陽梁王詧率衆㑹之武寧為襄陽接境武寧既失遂入江陵王琳傳云湘州武陵平元帝性多忌以琳所部甚盛又得衆心故出之嶺外其友李膺帝所任遇琳告之曰琳蒙拔擢常欲畢命以報國恩今天下未平遷琳嶺外如有萬一不虞安得琳力何不以琳為雍州刺史使鎮武寧琳自放兵作田為國禦捍膺然其言而不敢啟故率衆至嶺南元帝為魏圍逼乃徵琳赴援琳師次長沙而魏已平江陵矣漢書王莽傳曰南郡張霸江夏羊牧王匡等起雲杜緑林號曰下江兵晉灼曰本起江夏雲杜縣後分西上入南郡屯藍田故號下江兵也後漢書郡國志曰南郡編縣有藍口聚注云下江兵所據宋書州郡志云武寧長林晉安帝立隋書地理志云南郡有長林縣徒思拑馬之秣未見燒牛之兵言魏軍濟漢襲武寧執宗均遂至江陵也公羊傳云圍者拑馬而秣之使肥者應客史記田單傳曰單為齊將守即墨城燕師攻城田單取牛千頭衣以五采束矛盾於其角繫火於其尾穿城而出城上大噪燕師大敗言此武陵郡下江長林本可固守惜無良將所以見敗也章曼枝一作支以轂走宫之竒以族行言江陵敗亡之日去國者多也元帝紀云魏人燒柵買臣謝答仁勸帝乗暗潰圍出就任約王褒不可答仁又請守子城収兵可得五千人帝然之即授城内大都督既而又召王褒謀之答仁請入不得嘔血而去裴政犯門而出徐世譜任約自馬頭走巴陵約後降於齊世譜入陳韓子曰智伯欲伐仇猶國道險難不通乃鑄大鐘遺之載以廣車仇猶大恱險塗内之章曼支諫不聴曼支因斷轂而馳至十九日而仇猶亡也左傳僖五年曰晉侯復假道於虞以伐虢宫之竒諫弗聴許晉使宫之竒以其族行曰虞不臘矣在此行也晉不更舉矣晉滅虢遂滅虞河無冰而馬渡闗未曉而雞鳴後漢書光武紀曰光武至滹沱河王霸詭曰冰堅可渡遂前至河河冰已合乃渡未畢數騎而冰解博物志曰燕太子丹至於秦請歸聞秦王之謬言仰而嘆烏即頭白俯而嗟馬即生角秦王不得已遣之為機發之橋欲䧟丹丹驅馳過之而橋不發遁到闗闗門不開丹為雞鳴於是衆鷄悉鳴闗開遂歸又史記曰孟嘗君為秦所囚賂幸姬得出夜半至闗闗法雞鳴乃出客客有善為雞鳴者野雞皆應乃出二語亦言去國者也忠臣解骨君子吞聲謂王琳陸法和等也王琳已見北史藝術傳及渚宫舊事並曰陸法和大聚兵艦欲襲襄陽而入武闗帝使止之法和乃致其兵謂使者曰法和求道之人尚不希帝釋天王豈窺人主之位但與主有香火因緣救援耳今既被疑是業不可改也於是設供養具大䭔餅及西魏舉兵法和赴江陵帝又使人逆之曰此自能破賊但鎮郢州不須動也法和乃還州堊其城門著三麤白布衫布褲邪巾大繩束腰裹葦席終日乃脫之及聞梁滅復取前凶服著之受弔梁人西入魏果見䭔餠焉國語聖人不出忠臣解骨恨賦云莫不飲恨而吞聲章華望祭之所雲夢偽遊之地江陵故楚都章華雲夢皆楚地以下言江陵既敗魏軍縱其屠戮也左傳昭七年曰楚靈王即位為章華之宫又曰楚子成章華之臺願與諸侯落之杜云章華南郡華容縣又哀六年楚昭王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也漢書陳平傳曰漢六年人有告楚王韓信反者帝問平平曰古者天子巡狩諸侯南方有雲夢陛下苐出偽逰雲夢㑹諸侯於陳陳楚之西界信聞天子好出逰其勢必郊迎謁而陛下因禽之特一力士之事耳帝行至陳楚王信果郊迎即執縛之後漢書郡國志曰南郡華容雲夢在南晉書地理志曰南郡編縣有雲夢官荒谷縊於莫敖冶父囚於羣帥硎谷一作穽摺拉鷹鸇批㩌元帝紀云丁亥魏軍至柵下戊申胡僧祐朱買臣等出戰買臣敗績辛亥魏軍大攻帝出枇杷門親臨陣戰僧祐中流矢薨軍敗反者斬西門守卒以納魏軍帝見執將軍杜畿畿弟機並受害謝答仁三人相抱俱見屠汝南王大封尚書左僕射王褒以下並為俘以歸長安乃選百姓數萬口分為奴婢小弱者皆殺之左傳桓十三年云楚屈瑕伐羅羅與盧戎兩軍之大敗之莫敖縊於荒谷羣帥囚於冶父以聴刑杜曰荒谷冶父皆楚地郡國志云江陵有津鄉注云荆州記曰西北有小城名曰冶父衛宏詔定古文官書序曰秦既焚書患苦天下不從所改更而諸生到者拜為郎中前後七百人宻令冬月種𤓰於驪山硎谷中温處𤓰實詔博士說之人人不同乃令就視先為伏機諸生賢儒皆至焉方相難不已發機填之以土皆壓之終乃無聲後漢書陳蕃傳注今新豐縣温湯處愍儒鄉湯西有馬谷西岸有坑古老相傳以為秦坑儒處也史記范睢傳曰魏齊使舎人笞擊睢拉脇摺齒左傳季文子曰如鷹鸇之逐鳥雀也寃霜夏零憤泉秋沸淮南子曰鄒衍盡忠於燕惠王惠王信讒而繫之衍仰天而哭正夏天為之降霜後漢書曰耿恭據疏勒城七月匈奴來攻遂於城下擁絶澗水吏士渴乏恭仰嘆曰聞昔貳師將軍拔佩刀刺山飛泉湧出今漢徳神明豈有窮哉乃整衣服向井再拜為吏士禱有頃泉水奔出按耿恭出泉在秋七月天根水涸時故以秋沸為異也城崩杞婦之哭竹染湘妃之淚左傳襄二十三年曰齊莊公襲苢杞梁華旋載甲夜入宿於莒郊莒子親鼓之從而伐之獲杞梁莒人行成齊侯歸遇杞梁之妻於郊使弔之辭曰殖之有罪何辱命焉若免於罪猶有先人之敝廬在下妾不得與於郊弔齊侯弔諸室列女傳曰杞梁妻齊杞梁殖之妻也齊莊公襲莒殖戰而死杞梁之妻無子内外皆無五屬之親就其夫屍於城下而哭之城為之崩述異記曰湘水去岸三十里有相思宫望帝臺昔舜南巡而葬於蒼梧之野堯之二女娥皇女英追之不及相與慟哭沾竹竹文為之斑斑然水毒秦涇山髙趙陘以下言江陵百姓被擄之時在道路之苦也左氏傳曰晉鄭伐秦秦人毒涇上流師人多死趙陘即井陘趙地漢書曰張耳韓信欲東下井陘擊趙未至井陘口三十里使人拔趙幟立漢幟破趙成安君禽趙王歇者是也十里五里長亭短亭漢書曰秦法十里一亭亭有長漢因之不改漢官儀曰十里一亭亭長亭侯五里一郵郵間相去二里半司姦盜白孔六帖云十里一長亭五里一短亭饑隨蟄燕暗逐流螢何法盛中興晉書曰中原喪亂鄉人遂共推郗鑒為主與千餘家避暑於魯國嶧山有重險百姓饑饉野無生草掘野䑕蟄燕而食之後漢靈帝紀曰閔貢扶帝與陳留王協夜步逐螢光還至帝舍張璠漢紀曰帝為諸黄門所劫出榖門走至河上諸黄門既投水死帝與陳留王獨夜步行欲還宮暗暝逐螢火而行數里得民家以露車載送秦中水黑闗上泥青禹貢曰黑水西河惟雍州師古曰西距黑水雍州秦地晉書姚𢎞載記曰劉裕次於陜城遣沈林子率精兵萬餘越山開道㑹沈田子等於青泥將攻堯栁泓使姚裕率步騎八千距之泓退次於霸上闗中水經注曰藍田嶢栁城魏置清渥軍於城内世謂之清渥城也藍田縣南有嶢闗地名嶢栁水經注所謂清渥城疑即清泥城矣地理志曰秦西有清泥闗於時瓦解冰泮風飛電散於是以下言江陵闔城長幼被擄入闗也春秋斗運樞曰不能宣徳天下瓦解冰泮漢書徐樂上書曰何謂瓦解吳楚齊趙之兵是也楊泉物理論云熱氣散而為電渾然千里淄澠一亂北史庾季才傳云荆州覆亡衣冠士人多没為賤季才散所賜物購求親故周文乃悟免梁俘為婢者數千口列子云口將爽者先辨淄澠張湛注淄音緇澠音乗淄水出魯郡萊蕪縣澠水西自北海郡千乗縣界流至夀光縣二水相合説符篇曰淄澠之合易牙嘗之爽差也淄澠水異味既合則難别吕氏春秋云孔子曰淄澠之水合者易牙嘗而知之亦見淮南子劉幹新論曰淄味異質晉王以淄澠二水合羮與張華餘華曰此羮有淄澠二水味也以喻當時貴賤紊亂盡被擄辱矣雪暗如沙冰横似岸按魏平江陵獻俘長安在冬十二月南史殷不害傳云魏平江陵時天寒雪凍死者填滿溝壑不害與王褒庾信俱入長安矣范雲詩云寒沙四面平飛雪千里驚鮑照冬至詩曰層冰如玉岸逢赴洛之陸機見離家之王粲言江陵亡已在長安遇諸見俘之人也晉書曰陸機年二十而吳滅太康末與弟雲同入洛機集有赴洛詩有赴洛道中詩二首魏志曰王粲山陽髙平人少而聰慧有大才仕為郎時董卓作難仲宣避難荆州依劉表遂登江陵城樓因懷歸而作登樓賦述其進退危懼之情也莫不聞隴水而掩泣向闗山而長嘆郭仲産秦州記曰隴山東西百八十里登山嶺東望秦川四五百里極目泯然山東人行役升此而顧瞻者莫不悲思故歌曰隴頭流水分離四下念我行役飄然曠野登髙逺望涕零雙墮古樂府相和歌有度闗山曲江淹恨賦云明妃去時仰天太息紫臺稍逺闗山無極况復君在交河妾在青波後漢書耿恭傳云擊車師攻交河城注前書車師前王治交河城河水分流遶城下故號交河去長安八千一百五十里故城在今西州交河縣也史記陳涉世家曰黥布擊秦左右校破之青波復以陳為楚青波楚地謂君徃秦川妾畱楚地夫婦離别之辭設為閨怨也石望夫而逾逺山望子而逾多劉義慶幽明録曰武昌北山上有望夫石狀如人立俗傳云古者有貞婦其夫從役逺征餞送此山立望夫而死化為石因以名山又劉澄之鄱陽記曰鄱陽西有望夫岡昔縣人陳明與梅氏為婚未娶妖魅詐迎婦去請卜者決云行五十里求之明如言見大穴深邃無底以繩懸入遂得其婦乃令婦先出而明所將鄰人秦文遂不取其妻乃自誓執志登此岡而望其夫因以名焉述異記曰中山有韓夫人愁思臺望子陵才人之憶代郡公主之去清河玉臺新詠謝眺有詠邯鄲故才人嫁為厮養卒婦詩史記張耳傳及楚漢春秋並曰趙王武臣為燕軍所獲囚於燕獄先後使者往請輙為燕所殺趙有厮養卒謝其舍中曰吾將載趙王歸舍中人笑之乃走燕壁以利害說燕將燕以為然乃歸趙王厮養卒御王以歸武臣歸趙以美人妻養卒以報之是其事也晉書賈后傳曰臨海公主先封清河洛陽之亂為人所略傳賣吳興錢温温以送女女遇主甚酷元帝鎮建業主詣縣自言元帝誅温及女改封臨海宗正曹統尚之晉書地理志云清河國屬冀州栩陽一作揚亭有離别之賦臨江王有愁思之歌漢書藝文志有别栩陽賦五篇又臨江王及愁思節士歌詩四篇服䖍曰栩音翊别有飄颻武威覊旅金微别有以下信自謂奉使留秦有鄉闗之思也本傳云南北流寓各許還國惟信及王褒並惜而不遣漢書曰霍去病破匈奴左右地置武威等四郡又地理志曰武威郡故匈奴休屠王地武帝太初四年開後漢書曰竇憲遣耿夔等擊北單于於金微山趙至書曰飄颻逺逰之士戰國䇿腹擊曰臣覊旅也班超生而望返溫序死而思歸後漢書班超傳曰超久在絶域年老思歸乃上疏曰臣不敢望到酒泉郡但願生入玉門闗又獨行傳曰温序宇次房太原人也建武六年拜謁者遷䕶羌校尉序行部至襄武為隗囂别將茍宇所拘劫序素有氣力大怒叱宇等曰虜何敢迫脅漢將遂伏劒而死光武聞而憐之命送喪致洛陽城傍為冡地除三子為郎中長子夀夢序告之曰久客思鄉里夀即棄官上書乞骸骨歸葬帝許之乃反舊塋焉李陵之雙鳧永去蘇武之一雁空飛李陵别蘇武詩云雙鳧俱北飛一鳧獨南翔子當留斯館我當留故鄉漢書蘇武傳曰武留匈奴中常惠教漢使謂單于曰天子射上林中得雁足有繫帛書言武等在某澤中單于驚謝歸武若江陵之中否乃金陵之禍始承聖三年魏剋江陵明年敬帝至建鄴是仍都金陵也三年陳受禪是金陵之禍矣雖借人之外力實蕭牆之内起北史蕭詧傳云詧既與江陵搆隙恐不能自固大統十五年乃請使稱藩為魏附庸周文令祭酒榮權使焉詧大恱是嵗栁元禮率衆進圖襄陽詧懼乃遣其妻王氏及世子寮為質以請救周文又令榮權䇿命詧為梁王詧乃於襄陽置百官承制封拜魏恭帝元年周文令柱國于謹伐江陵詧以兵㑹之遂平江陵是借人之外力也北史庾季才傳云梁元帝頗明星厯謂季才曰朕猶慮禍起蕭牆季才曰秦人將入郢陛下宜留重臣作鎮荆陜還郢以避其患帝然之與宗懍等議乃止俄而江陵覆没按詧以姪伐叔是蕭牆之内起也左傳臧武仲曰今將借人之力以救其死蕭牆見論語鄭注云蕭之言肅也牆謂屏也君臣相見之禮而加肅敬焉是以謂之蕭牆撥亂之主忽焉中興之宗不祀撥亂中興謂元帝也元帝平侯景啟中興之業故云元帝紀云帝見執如梁王蕭詧營甚見詰辱詧遣尚書傳準監行刑進土囊而殞之詧使以布帊裹屍歛以蒲席束以白茅以車一乗葬於津陽門外左傳臧文仲曰臯陶庭堅不祀忽諸伯兮叔兮同見戮於猶子伯叔猶言長幼哀太子元良及始安王方畧也猶子謂岳陽王詧對元帝而稱詧為昭明第三子於元帝為叔姪也國風旄邱云叔兮伯兮何多日也鄭云叔伯字也又籜兮云叔兮伯兮倡予和汝毛云長幼鄭云兄弟之稱按古人字二十以伯仲若孟仲叔之類謂元帝子若長若幼皆見戮於元帝之猶子也元帝紀云江陵之禍愍懷太子元良及始安王方畧等皆見害是其事也荆山鵲飛而玉碎隋岸蛇生而珠死韓子曰楚人和氏得玉璞於荆山之下奉而獻之文王使玉人治其璞而得寳鹽鐵論曰崑山之旁以玉璞扺烏鵲淮南子曰隋侯之珠和氏之璧得之而富失之而貧髙誘曰隋侯見大蛇傷斷以藥傅而塗之後蛇於夜中銜大珠以報之因曰隋侯之珠括地志云濆山一名崑山一名斷蛇邱在隨州隨縣北一十五里珠玉喻帝子也鬼火亂於平林殤魂遊於新市傷戰爭之後中興之臣死傷者多也鬼火燐也殤魂即傷魂鳥名博物志曰鬭戰死亡之處其人馬血積年化為燐燐著地及草木如露畧不可行或有觸者著人體便有光拂拭便分散無數愈甚有細咤聲如炒豆惟静住良久乃滅後其人忽忽如失魂經日乃差淮南子曰人血為燐許慎注云兵死之血為鬼火王子年拾遺記曰惠帝元熙二年改為永平元年常山郡獻傷魂鳥狀如雞毛色似鳳帝惡其名棄而不納復愛其毛羽當時博者云黄帝殺蚩尤有驅虎誤噬一婦人七日氣不絶黄帝哀之葬以重棺石槨有鳥翔其塚上自呼為傷魂則此婦人之靈也平林新市皆楚地也後漢光武紀曰伯升於是招新市平林兵注云新市縣屬江夏郡故城在今郢州富水縣東北平林地名在今隨州隨縣東北按後漢中興始兵有新市平林之號當時胡僧祐等皆元帝中興之臣至是皆戰鬭而死是以傷之梁故豐徙楚實秦亡不有所廢其何以昌梁故豐徙謂元帝從建鄴徙都江陵也江陵楚地魏都闗中秦地魏滅梁是楚實秦亡也漢書髙帝讚曰劉向云戰國時劉氏自秦獲於魏秦滅魏遷大梁都於豐故周市說雍齒曰豐故梁徙也史記曰楚雖三户亡秦必楚本豐故梁徙而云梁故豐徙本亡秦必楚而云楚實秦亡皆反文以切時事也左傳里克對惠公曰不有所廢其何以昌廢指江陵之敗又指建鄴之禪也興謂北周之盛又謂陳武之簒也二語為下張本有媯之後將育於姜輸我神器居為讓王有媯謂陳武帝也陳氏本媯姓虞舜之後在周為陳國春秋時陳公子完奔齊其後遂姓陳氏陳武自襲殺王僧辯後而梁祚日微陳氏日盛矣讓王謂敬帝也梁本紀云敬帝諱方知字慧相元帝第九子也承聖三年魏剋江陵陳霸先以帝為梁王太宰四年二月於江州奉迎至建鄴九月即帝位改紹㤗元年二年改元太平太平二年十月帝遜位於陳陳受命奉帝為江隂王陳本紀云陳髙祖武帝諱霸先字興國吳興長城下若里人其本甚微自云漢太邱長實之後以太平二年冬十月受梁禪改永定元年左氏傳曰陳公子完奔齊初懿氏卜妻敬仲其妻占之曰吉是謂鳳皇于飛其鳴鏘鏘有媯之後將育於姜老子曰天下神器不可為也西征賦云輸文武之神器莊子有讓王篇天地之大徳曰生聖人之大寶曰位二語為下江東全棄鶉首賜秦張本周書梁王詧傳云江陵平詧將尹徳毅說詧欲設享㑹因請于謹等為歡預伏武士因而斃之江陵百姓撫而安之文武官僚隨即詮授魏人攝息未敢送死王僧辯之徒折簡可致然後朝服濟江入踐皇極晷刻之間大功可立詧曰魏人待我甚厚未可背徳若遽為卿計則鄧祈侯所謂人將不食吾餘也既而闔城長幼被擄入闗又失襄陽之地詧乃追悔曰恨不用尹徳毅之言以至於是蕭詧愍時賦序云于謹平梁之後闔城長幼被擄入闗又失襄陽故地乃曰恨不用尹徳毅言以致於是又見邑居殘毁干戈日尋恥威畧不振常懷憤懣乃著愍時賦以見其意夫蕭詧存荆州之舊隙戀魏人之小恩雖取江陵空城而長幼被擄弱小加刑又傷好生之心又失大寶之位使雍州西去建鄴東亡此下皆深咎之以見梁朝宗社遂盡於此二語出周易繫辭用無賴之子弟舉江東而全棄謂丹陽諸郡皆為陳有也無賴子弟謂陳霸先也霸先其本甚微故云漢書吳王濞傳云袁盎曰吳所誘皆無賴子弟故相率以反髙祖本紀云髙祖奉玉巵起為太上皇夀曰始大人常以臣無賴晉灼曰許慎云賴利也或曰江湖之間謂小兒多狡猾為無賴惜天下之一家遭東南之反氣謂詧與元帝本一家而反適資强敵也南史鄱陽王範傳云朱异謂武帝曰昔陛下登北顧亭以望謂江右有反氣骨月為戎首漢書髙祖召吳王濞曰漢後五十年東南有反氣豈若耶然天下一家慎無反以鶉首而賜秦天何為而此醉按周書江陵平太祖立詧為梁王居江陵東城資以江陵一州之地其襄陽所統盡歸於周又按襄陽形勝之地乃是梁朝創基之所故賦深悼之賜秦謂為西魏所有也張衡西京賦曰昔者天帝悅秦繆公而覲之饗以鈞天廣樂帝有醉焉乃為金䇿錫用此土而翦諸鶉首虞喜志林曰喭曰天帝醉秦暴金誤隕石墜謂秦繆公夢天帝奏鈞天廣樂已有此諺漢書云自井至栁謂之鶉首之次秦之分野也隋書地理志云尚書荆及衡陽惟荆州上當天文自張十七度至軫十一度為鶉首於辰在已楚之分野有南郡夷陵竟陵沔陽沅陵清江襄陽舂陵漢東安陸永安義陽九江江夏諸郡自晉氏南遷之後南郡襄陽皆為重鎮九江襟帶所在江夏竟陵各置名州為藩鎮重寄按今襄陽既已歸周資以江陵空城復置防主統兵西域名曰助國外示助詧備禦内實防詧是鶉首之次襄陽南郡皆失之矣且夫天道迴旋生民預焉余烈祖於西晉始流播於東川洎余身而七葉又遭時而北遷言八世祖滔昔遭西晉永嘉之亂播遷江陵今已值梁承聖之年又自江陵北遷長安是天道之迴旋也北史云滔過江家南郡江陵縣禹貢南條荆山在東北漳水所出東至江陵故云東川傷已流寓不歸也提挈老幼闗河累年死生契濶不可問天滕王序云信擕老入闗烝烝色養子山謝趙王啟又云某息荀娘傷心賦云一女成人一長孫孩穉是子山老幼並入長安也潘岳西征賦曰擕老幼而入闗詩云死生契濶與子成說毛萇曰契濶勤苦也楚辭有天問况復零落將盡靈光巋然典略魏文帝與吳質書曰何圖數年之間零落略盡王延夀魯靈光殿賦曰遭漢中微盜賊奔突自西京未央建章之殿皆墮壞而靈光巋然獨存喻知交將盡惟已獨存若魯靈光矣日窮於紀嵗將復始逼迫一作切危慮端憂暮齒月令十二月日窮於次月窮於紀星周於天數將幾終嵗且更始謝莊月賦云端憂多暇言國破之後永滯異域故憂慮也踐長樂之神臯望宣平之貴里三輔黄圖曰長樂宫本秦之興樂宫也髙皇帝七年長樂宫成徙居長安城在長安中近東直杜門長安城東北頭第一門曰宣平門民間所謂東都門即二疏帳飲逢萌掛冠處也西京賦云實為天地之粤區神臯揚衒之洛陽伽藍記曰清陽門内有永和里里中太傅録尚書長孫穉等六宅皆髙門華屋當世名為貴里渭水貫於天門驪山迴於地市三輔黄圖曰始皇築咸陽宫引渭水灌都以象天漢桑欽水經曰渭水出隴西首陽縣渭北亭南鳥䑕山又東過長安縣北酈元注云秦始皇作離宫於渭水南北以象天宫辛氏三秦記曰驪山始皇陵作地市生死人交易市平不得欺死人云秦王地市有斷馬利後漢郡國志曰新豐有驪山杜預曰古驪戎國幕府大將軍之愛客丞相平津侯之待士本傳云世宗髙祖並雅好文學信特䝉恩禮至於滕趙諸王周旋欵至有若布衣之交世宗明帝也魏恭帝三年曽授大將軍髙祖武帝也孝閔踐祚時亦拜大將軍滕王逌天和末拜大將軍又滕王序云及晉國公䕶俱禮重信按䕶傳孝閔踐祚䕶拜大冡宰髙祖立百官總已以聴於䕶自太祖為丞相立左右十二軍總屬相府太祖崩後皆受䕶處分是䕶為丞相矣信追序二帝諸王寵遇之盛也漢書音義曰衛青征匈奴大克獲帝就拜大將軍於幕中因曰幕府西京雜記曰平津侯自以布衣為宰相乃開東閣營客舘以待國士其有徳任毗贊佐理隂陽者處欽賢之舘其有才堪九列將軍二千石者居翹材館其有一介之善一方之藝者居接士之舘而躬自菲薄所得俸禄以奉待之漢書曰武帝封公孫𢎞為平津侯𢎞乃起賔舘開東閣以延賢人與㕘謀議見鐘鼎於金張聞絃歌於許史漢書鄭昌上書訟葢寛饒曰上無許史之屬下無金張之託師古曰許氏史氏有外屬之恩金氏張氏自託在於近狎也左太沖詠史詩曰朝集金張舘暮宿許史廬言已仕周得與貴戚交游非其好也豈知灞陵夜獵猶是故時將軍咸陽布衣非獨思歸王子此子山鄉闗之思一篇之致意也史記云李廣家居數載與故潁隂侯孫屏野居藍田山中射獵常夜從一騎出從人田間飲還至灞陵亭灞陵尉醉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何故也止李廣宿亭下謂已猶是梁故右衞將軍也又史記云楚頃襄王使黄歇與太子完入質於秦秦留之數年楚頃王病太子不得歸而楚太子與秦相應侯善於是黄歇乃說應侯曰今楚王恐不起疾秦不如歸其太子太子得立其事秦必重而徳相國無窮若不歸則咸陽一布衣耳怨録云楚王之子質於秦不得歸作思歸歌曰洞庭兮木秋涔陽兮草衰去千乗之家國作咸陽之布衣按梁國子孫客長安者有汝南王大封晉熙王大圜並簡文帝子又宜都王圓肅武帝之孫武陵王紀之子其别支則有成安王秀之子永豐侯撝鄱陽王恢之子豐城侯世怡皆梁之令望與子山同時覊旅見於史傳者也集中蕭世怡誌銘云嗟南國之王子成東陵之故侯亦同此意此言思歸者不獨梁嗣也庾子山集巻二, SBCK: ''}
