  - {type: variant, offset: 0, length: 6625, content: 欽定四庫全書庾子山集巻七周庾信撰錢唐倪璠纂註表賀平鄴都表周書武帝紀云建徳六年正月乙亥齊王傳位於其太子恒改元承光自號為太上皇壬辰帝至鄴齊王先於城外掘塹豎栅癸已帝率諸軍圍之齊人拒守諸軍奮撃大破之遂平鄴隋書地志云魏郡鄴縣東魏都後周平齊置相州臣某言臣聞太山梁甫以來即有七十二代管子曰封太山禪梁甫者七十有二家史記封禪書曰七十二家夷吾所記者十有二焉司馬相如封禪文曰繼韶夏崇號諡略可道者七十二君漢書音義項岱曰梁甫者太山下小山也龍圖龜書之後又已三千餘年尚書中候曰黄帝東廵河過洛修壇沈璧受龍圖於河龜書於洛赤文緑地廣袤九丈負理平上有列星之分七政之度帝王録記興亡之數以授之堯帝又修壇河洛昧爽禮備榮光出河休氣四塞白雲起廻風揺又東沉璧於洛日稷赤光起𤣥龜負書背甲赤文成字遂禪於舜言黄堯虞夏至今有三千餘年也雖復制法樹司禮殊樂異周易曰制而用之謂之法左氏傳曰天生民而樹之君使司牧之漢書匡衡曰三王不同樂五帝各異尚至於文離武落剡木弦弧周易曰弦木為弧剡木為矢席巻天下之心包含八荒之志二語出過秦論其揆一矣春秋握誠圖曰諸侯冰散席巻各爭恣妄張晏曰括結囊也言其能包含天下師古曰八荒八方荒忽極遠之地也班彪王命論曰至於順天應人其揆一也伏惟皇帝陛下謂周武帝也握天樞秉地軸易通卦驗曰遂皇氏始出握機矩鄭康成曰遂皇遂人也但持斗機運轉之法春秋運斗樞曰北斗第一天樞博物志曰地有三千六百軸括地象曰崑崙之山横為地軸駕馭風雲驅馳龍虎易曰雲從龍風從虎沈雄内斷不勞謀於力牧帝王世紀曰黄帝夢人執千鈞之弩驅羊萬羣帝寤而嘆曰夫千鈞之弩異力者也驅羊數萬羣能牧民為善者也天下豈有姓力名牧者也於是依占求之得力牧於大澤進以為將黄帝因著占夢經十一巻藝文志有力牧兵法十五篇天策勇決無待問於容成列仙傳曰容成公者自稱黄帝師見於周穆王善補導之事博物記曰容成氏造歴黄帝臣也是以威風所振烈火之遇鴻毛旗鼔所臨衝風之巻秋葉陸賈典語云若衝風之摧枯枝烈焰之薰衰草竊聞伊洛戎夷幽幷僭偽謂齊王也時伊雒幽幷皆為齊地抱圖載籍已歸丞相之府銜玉繫綬並詣中軍之營漢書曰沛公西入咸陽還軍霸上蕭何盡收秦丞相府圖籍文書又曰沛公至霸上秦王子嬰素車白馬繫頸以組封皇帝符節降枳道旁師古曰此組謂綬也言齊主出降也百年逋誅遂窮巢窟三代敵怨俄然掃蕩竊聞至掃蕩言平齊攄祖宗之宿憤也百年逋誅者謂髙歡入洛魏武西遷齊神武本魏室罪臣至今始伏其辜也三代敵怨者魏分東西之後東魏靜帝遜位於神武之子齊文宣歴傳廢帝昭帝武成後主幼主而鄴乃亡西魏恭帝遜位於安定公之子周閔帝歴明帝武帝至建徳六年始平鄴也昔周王鮪水之師尚勞再駕呂氏春秋曰武王伐紂至鮪水紂使膠鬲候周問武王曰何日至武王曰將以甲子日至膠鬲行天大雨日夜不休武王疾行不輟軍吏諫之武王曰吾疾行以救膠鬲之死也軒轅上谷之戰猶須九伐史記曰黄帝姓公孫氏名曰軒轅蚩尤作亂不用帝命於是乃徴師諸侯與蚩尤戰於涿鹿之野遂擒殺蚩尤張宴曰涿鹿在上谷索隠曰上谷涿鹿縣是未有一朝指麾獨決神慮平定㝢内光宅天下淮南子曰拱揖指麾而四海賔服説文㝢籀文宇字二十八宿止餘吳越一星地理志曰吳地斗分野也越地牽牛婺女之分野也吳越春秋曰吳與越同音共律上合星宿下共一理晉書天文志云自南斗十二度至須女七度為星紀於辰在井吳越之分野屬揚州斗牛兩星皆星紀之次故云一星時江表未平吳越尚為陳有於天星缺斗牛之次也千二百國裁漏麟洲小水十洲記曰鳯麟洲在西海之中仙家煑鳳喙及麟角合作膏名之續弦膠是也言四海俱歸所遺漏者係海外之一洲耳若夫咸康之年四方始定建武之代諸侯並朝不得同年而語矣咸康疑咸陽又疑太康漢光武年號建武雖復八風並唱未足頌其英聲六樂俱陳無以歌其神武八風八方之風也六樂六代之樂也見左傳坐鈞臺而誓衆姒啓繼夏禹之功左氏傳曰夏啓有鈞臺之饗姒夏姓也史記曰帝禹為夏后而别氏姓姒氏入商郊而問罪姬發成周文之志牧誓曰時甲子昧爽王朝至於商郊牧野乃誓姬周姓發武王名無改之道大孝也與出論語當今鹿臺已散離宮已遣尚書曰散鹿臺之財離宮引秦時天子行幸之所如長楊宜春之屬西都賦曰離宮别館三十六所兵藏武庫馬入華山三輔黄圖曰武庫在未央宮蕭何造以藏兵器史記周本紀曰散馬華山之陽華山在華隂縣南立明堂之制奏大武之樂應劭曰明堂所以正四時出教化明堂上圜下方八牕四達布政之宮在國之陽上八牕法八風四達法四時九室法九州十二重法十二月三十六户法三十六旬七十二牖法七十二候孝經曰宗祀文王於明堂以配上帝謂五時帝太昊之屬黄帝曰合宮有虞曰總章殷曰陽館周曰明堂鄭司農周禮注曰大武武王樂也武王伐紂以除其害言其徳能成武功也盛矣哉上天降休未之有也政須東南一尉立於比景之南西北一候置於交河之北楊雄解嘲曰東南一尉西北一候向曰一候官名也銑曰候所以伺候遠國來朝之賔候亦官也地理志云龍勒玉門陽關有候也後漢郡國志云日南郡有比景縣水經注云自盧容縣至無戀越烽火至比景懸日中頭上影當身下與影為比如淳曰故以比影名縣闞駰曰比讀如䕃庇之庇影在已下言為身所庇也林邑記曰渡比景至朱吾縣浦今之封界也漢書曰車師前王治交河城有交河水分流城下言將定江南平突厥令天下一統也然後命東后詔蒼冥衢壇琬碑銀繩瓊檢告厥成功差無慙徳尚書曰肆覲東后封禪書曰東后者諸侯也漢書武帝紀曰上還登封泰山孟康曰王者功成治定告成功於天封崇也助天之髙也刻石紀號有金策石函金繩玉檢之封焉言天下一統之後將有封禪之事以報成功也臣忝竊榮幸莅政東藩不獲躬到闕庭預觀大慶不勝鳧藻踴躍之至漢書中山靖王曰位雖卑也得為東藩曹子建求自試表曰位竊東藩爵在上列呂向曰竊偷也謂無徳偷居其位也信時為洛州刺史在國東藩矣東京賦曰闕庭神麗毛詩曰踴躍用兵曹植上責躬應詔詩表曰僻處西館未奉闕庭踴躍之懐瞻望反側班彪冀州賦曰感鳧藻以進樂兮顔延年秋胡詩曰鳧藻馳目成呂延濟曰鳧鳥得水草歡躍而進也謹遣主簿陪臣曹敏奉表以聞蔡邕獨斷曰諸侯境内自相以下皆為諸侯稱臣於朝皆稱陪臣賀新樂表周書天和元年冬十月甲子初造山雲儛以備六代之樂建徳三年冬十月甲辰六代樂成帝御崇信殿集百官以觀之集中郊祀歌辭所以備六樂也臣等言臣聞天地順動則雷出為豫易豫卦彖傳曰豫順以動故天地如之象曰雷出地奮豫聖人成功則風行有節左氏傳曰夫舞所以節八音而行八風故六徳在咸池之宮山谷可調樂動聲儀曰黄帝樂曰咸池淮南子曰有虞氏其樂咸池吕氏春秋曰帝堯立命質為樂質乃效山林谿谷之音以歌八風入承雲之奏人神不雜八風八方之風服䖍曰八卦之風乾音石其風不周坎音革其風廣莫艮音匏其風融震音竹其風明庶巽音木其風清明離音絲其風景坤音土其風涼兑音金其風閶闔淮南子曰有虞氏承雲九韶竹書紀年曰顓頊樂曰承雲我太祖文皇帝周太祖宇文泰魏之安定公也體國經野設官分職二語周禮六官之辭變魏作周移風正雅魏姓拓跋氏周姓宇文氏孝經曰移風易俗莫善於樂世説曰荀公曾善解音聲調律吕以正雅樂衣裳而朝萬國珪璧而會諸侯周易曰垂衣裳而天下治左氏傳曰禹會諸侯於塗山執玉帛者萬國圭璧周禮典瑞云公執桓圭侯執信圭伯執躬圭子執榖璧男執蒲璧以朝覲宗遇會同於王也至於經綸圖籍校讐煙燼圖籍蕭何事注見前篇煙燼秦火也樂正無缺章秩宗無廢典尚書曰后夔為樂正伯夷作秩宗豈但商頌十篇得諸太師之室子夏詩序曰那祀成湯也㣲子至於戴公其間禮樂廢壞有正考甫者得商頌十二篇於周之太師以那為首虞書五禮取於恭王之宮漢書曰魯恭王好治宫室壞孔子舊宅聞鐘磬琴瑟之聲遂不敢壞於其壁中得古文經傳伏惟皇帝以下武嗣興中陽繼業皇帝周武帝也詩序曰下武嗣文也漢書髙祖中陽里人運日月之明動淵泉之慮禮記中庸篇云如日月之代明又云淵泉如淵律厯著㣲無煩於太史史記有律厯志易乾鑿度曰天氣三㣲而成一著周禮太史屬春官禮記曰太史謁之鄭注云太史禮官之屬掌正嵗年以序事也隂陽晷度躬定於天官釋名曰晷規也如規畫也説文曰晷日景也周禮鄭注云至日度景至不夏日至之景尺有五寸冬日至之景丈有三尺土猶度也建邦國以度其地而制其域天官書索隱注曰天文有五官官者星官也星座有尊卑若人之官曹列位故曰天官故得參考八音硏精六代漢書律厯志曰八音土曰塤匏曰笙皮曰鼓竹曰管絲曰絃石曰磬金曰鐘木曰柷周禮以六樂之會正舞位釋曰六樂即六代之樂雲門大巻大咸大㲈大夏大濩大武是也封晉魏為二王序殷周為三恪封晉魏謂司馬拓跋二氏也司馬裔碑云魏明帝時司馬楚之襲封瑯邪郡王命王承制如賔之儀後周之受魏禪如周客二王之後矣左氏傳曰昔虞閼父為周陶正武王頼其利器用與其神明之後也庸以元女太姬配胡公而封諸陳以備三恪言今封晉魏為二王猶昔之序殷周為三恪也雖復朱干玉戚尚識典刑素韍纁裳猶因雄據樂記曰比音而樂之及干戚羽毛謂之樂鄭注云干盾也戚斧也武舞所執禮記曰有虞氏服韍夏后氏山殷火周龍章鄭注云韍冕服之韠也韍或作黻周禮司服鄭注云凡冕服皆𤣥衣纁裳正義曰𤣥衣纁裳者見繫辭黃帝堯舜垂衣裳葢取諸乾坤乾為天其色𤣥坤為地其色黃但土無正位託於南方赤色赤與黄即是纁色故以纁為名也未若山雲特起八卦成形鳳凰于飛九州觀徳山雲謂山雲儛也八卦如服䖍所説乾音石坎音革艮音匏震音竹巽音木離音絲坤音土兑音金是也周易曰在地成形左氏傳曰鳳凰于飛其鳴鏘鏘爾雅釋九州云兩河間曰冀州河南曰豫州河西曰雝州漢南曰荆州江南曰揚州濟河間曰兗州濟東曰徐州燕曰幽州齊曰營州樂記曰樂行而民鄉方可以觀徳矣改金奏於八列合天元於六舞周禮鐘師掌金奏金奏擊金以為奏樂之節金謂鐘及鎛又鼓人云以晉鼔鼓金奏鄭注云金奏謂樂作擊編鐘疏云金則鐘也奏則擊也先擊鐘後擊鼓也左氏傳曰公問羽數於衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下杜預曰用八八八六十四人惟天子得盡物數故以八為列周禮大司樂有六舞舞雲門舞咸池舞大㲈舞大夏舞大濩舞大武也又云凡舞有帗舞有羽舞有皇舞有旄舞有干舞有人舞也聲含擊石更入登歌調起初鍾還參玉管尚書夔曰於予擊石拊石百獸率舞周禮大祭祀帥瞽登歌令奏擊拊鄭注云登歌歌者在堂也樂或當擊或當拊拊者擊石也初鍾黄鍾也禮樂器記管漆竹長一尺六孔尚書大傳曰西王母來獻白玉琯漢書音義曰古以玉作不但此也足以感天地而通神明康帝徳而光𤣥象漢書樂志曰夫樂者聖人所以感天地通鬼神安萬民𤣥象謂天象也易曰天𤣥而地黄以天色𤣥故云𤣥象昔者齋居𤣥扈為曲在於雲門山海經曰陽虛之山多金臨於𤣥扈之水郭璞注河圖曰蒼頡為帝南巡狩登陽虚之山臨於𤣥扈洛汭靈龜負書丹甲青文以授之出此水中師度盟津習舞歸於山立括地志曰盟津周武王伐紂與八百諸侯會處盟津亦曰孟津又曰富平津水經云小平津今云河陽津是也史記樂書曰夫樂者象成者也總干而山立武王之事也王肅曰總持干楯山立不動正義曰象武王伐紂持楯立以待諸侯至故曰武王之事也遂乃包括三名克諧一代太平經典曰形體有三名天地人尚書曰八音克諧作者之謂聖天之所唘乎豈惟路鼓靈鼗空桑孤竹周禮靁鼓靁鼗孤竹之管冬日至於地上之圜丘奏之靈鼔靈鼗空桑之琴瑟夏至於澤中之方丘奏之路鼔路鼗於宗廟之中奏之鄭康成注云雷鼔雷鼗八面靈鼔靈鼗六面路鼔路鼗四面孤竹竹特生者空桑山名廣矣大矣輪焉奐焉易繫辭曰夫易廣矣大矣禮記檀弓曰晉獻文子成室張老曰美哉輪焉美哉奐焉是知零陵孝廉空傳玉管漢書音義曰漢章帝時零陵文學奚景於泠道舜祠下得白玉琯始平太守虚稱銅尺世説曰荀勗善解音聲時論謂之闇解遂調律呂正雅樂每至正會殿庭作樂自謂宫商無不諧韻阮咸妙賞時謂神解每公會作樂而心謂之不調既無一言直勗意忌之遂出阮為始平太守後有一田父耕於野得周時玉尺便是天下正尺荀試以巳所治鐘鼔金石絲竹皆覺短一黍於是伏阮神識臣等並預鈞天同觀張樂張衡西京賦曰天帝悦秦繆公而覲之饗以鈞天廣樂莊子曰北門成問於黃帝曰帝張咸池之樂於洞庭之野臣始聞之懼繼聞之怠軒墀𢎞敞欄檻眺聽説文曰軒曲輈藩車墀涂地也闌門遮也檻櫳也崇牙業業猛簴趪趪毛詩曰崇牙樹羽東京賦曰崇牙張鏞鼓設薛綜曰崇牙栒簴上板作劒鎝者良曰崇牙猶簨簴以挂鐘鼓西京賦曰洪鐘萬鈞猛簴趪趪李善曰周禮鳬氏寫獸之形大聲有力者以為鐘簴薛綜曰趪趪張設貌翠鳳揚旌靈鼉樹鼓史記李斯諫逐客曰建翠鳳之旗樹靈鼉之鼓鄭康成曰月令云鼉皮可以冒鼔杳冥雲霧蕩薄丘陵東都賦云丘陵為之震揺醴泉與甘露同飛赤雁與斑麟俱下漢書曰甘露降醴泉生甘露元年詔曰乃者鳳凰至甘露降故以名元年武帝紀云上行幸東海獲赤雁作朱雁歌又曰上行幸雍獲白麟作白麟歌聘魯請觀理當見其盛徳左傳襄二十九年云吳公子札來聘請觀於周樂見舞韶箾者曰徳至矣哉大矣如天之無不幬也如地之無不載也雖甚盛徳其蔑以加於此矣適齊忘味定是知其盡美説苑曰孔子至齊郭門之外遇一嬰兒挈一壺相與俱行其視精其心正其行端孔子謂御曰趣驅之韶樂方作孔子至彼聞韶三月不知肉味故樂非獨以自樂也又以樂人非獨以自正也又以正人大矣於此樂不圖為樂至於此盡美見論語昔淵魚聽曲尚得聳鱗櫪馬聞絃猶能仰秣淮南子曰瓠巴鼓瑟而淫魚出聽伯牙鼓琴駟馬仰秣髙誘注曰瓠巴楚人善鼔瑟淫魚喜音出頭於水而聽之淫魚長頭身相半長丈餘鼻正白身正黒口在頷下似鬲獄魚而身無鱗出江中也江淹别賦云聳淵魚之出鱗仰秣仰馬吹吐謂馬笑也臣等誠愧知音敢忘悦豫若使詳其音律是所邈然但能記其鏗鏘於斯為幸不勝慶悦之誠謹詣明堂奉表以聞為閻大將軍乞致仕表周書曰閻慶字仁慶河南河隂人也孝閔踐祚拜大將軍建徳二年抗表致仕優詔許焉即此是也葢子山所作矣臣某言某閻慶也臣聞禮云大夫七十致仕於朝傳家於子膳則貳珍衣稱時制曲禮曰大夫七十而致仕若不得謝則必賜之几杖又云七十曰老而傳鄭注云傳家事在子孫是宗子之父王制曰七十貳膳八十常珍又云七十時制正義曰貳副也膳善食也恒令善食有儲副不使有闕也珍謂珍竒美食時制謂一時可辦是衣物之難得者是年轉老所須辦轉切也臣自出身奉國四十餘年遭遇風雲從㣲至著太祖文皇帝扶危濟難奄有闗河臣實無堪中涓從事漢書顔師古注曰中涓官名居中而涓潔也自洛食風塵河梁旗鼔華隂有白馬之兵河曲有黃沙之陣臣雖用命不能竒策功薄賞厚因人成事恩澤年表常以愧心周書閻慶傳云齊神武舉兵入洛魏孝武西遷慶謂所親曰髙歡跋扈將有簒弑之謀豈有茍安目前受其控制也遂以大統三年自宜陽歸闕太祖謂慶曰髙歡逆亂宇内分崩羣盜競興人皆徇已卿遂能盡忠貞之節重君臣之義背逆歸順捨危就安雖古人所稱何以加也即拜中堅將軍奉車都尉河橋之役有功及邙山之戰先登陷陣位至驃騎大將軍儀同三司雲中大中正加侍中賜姓大野氏洛食風塵謂髙歡入洛也尚書洛誥曰我乃卜澗水東瀍水西惟洛食河梁旗鼓謂河橋之役也華隂白馬之兵謂解華山圍也河曲黃沙之陣謂平沙苑陣也史記平原君傳毛遂曰公等録録所謂因人成事者也漢書有外戚恩澤侯表史記有功臣年表仰逢周朝以揖讓登庸謳歌受命主貴臣遷頻煩榮寵周書云孝閔帝踐阼就拜大將軍天和六年進位柱國三槐以鑄鼎象物知其神奸五等以桓珪飾瑞守其宮室臣以何徳兼而有之周禮曰三槐三公位焉左氏傳曰昔夏之方有徳也逺方圖物貢金九牧鑄鼎象物而為之備使民知神姦故民入川澤山林不逢不若魑魅罔兩莫能逢之周禮上公之禮執桓珪諸侯之禮執信珪伯執躬珪子執榖璧男執蒲璧注云雙植謂之桓桓宫室之象所以安其上也圭長九寸故玉人云圭長九寸公守之况復水土之職王梁以應讖受徴兵戈之王韓信以登壇獨拜語其連類臣又何人袁𢎞後漢紀曰建武元年王梁為大司空封武强侯初赤伏符曰王梁主衛作𤣥武上以野王衛徙也𤣥武水神也大司空水神之官也乃以梁為大司空梁字君嚴漁陽安陽人也史記曰蕭何聞韓信亡自追之謂漢王曰諸將易得耳至如信者國士無雙王必拜之擇良日齋戒設壇塲具禮乃可耳王許之諸將皆喜人人各自以為得大將至拜乃韓信也一軍皆驚方今四海未寜三方鼎峙三方謂周齊陳也陛下勞心之日羣公展効之秋而臣甲子既多耄年又及左氏傳曰老將至耄又及之禮記曰八十九十曰耄鄭注云耄惽忘也按慶抗表在建徳二年至隋開皇二年薨年七十七計此時巳六十六歳矣無參賔客之事謬逹諸侯之班尸禄素餐久紊彞典負乗致寇徒煩有司詩云不素餐兮素空也無徳而食其禄曰素餐韓詩曰何謂素餐素者質也人但有質樸而無治民之材易解卦六三負且乗致寇至貞吝虞翻曰負倍也二變時艮為背謂三以四艮倍五也五來寇三時坤為車三在坤上故負且乗小人而乗君子之器故象曰亦可醜也五之二滅坎坎為冦盜上位慢下位暴於二慢藏誨盜故致冦至貞吝象曰自我致戎又誰咎也加以寒暑乖違節宣失序風木交侵菁華巳竭韓詩外傳樹欲静而風不定廣雅菁華也雖復廉頗强飯馬援據鞍求欲報恩何能為役史記曰廉頗居梁久之魏不能信用趙以數困於秦兵思復得頗頗亦思復用於趙趙王使使者視廉頗尚可用否廉頗之讐郭開多與使者金令毁之趙使者既見廉頗頗為之一飯斗米肉十斤被甲上馬以示尚可用趙使還報王曰㢘將軍雖善飯然與臣坐頃之三遺矢矣趙王以為老遂不召後漢書曰武陵將軍劉尚撃五溪蠻夷深入軍沒援因復請行時年六十二帝愍其老未許之援自請曰臣尚能被甲上馬帝令試之據鞍顧盼以示可用帝笑曰矍鑠哉是翁也榮唘期之樂適足自貽説苑曰孔子見榮唘期衣鹿皮裘鼓瑟而歌孔子問曰先生何樂也對曰吾樂甚多天生萬物惟人為貴而吾得為人是一樂也男女之别男尊女卑故以男為貴吾既得為男矣是二樂也人生有不見日月不免襁褓者吾既行年九十矣是三樂也貧者士之常也死者人之, SBCK: ''}
