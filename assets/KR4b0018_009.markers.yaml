  - {type: variant, offset: 6620, length: 11702, content: 也處常得終吾何憂哉孔子曰善乎能自寛者也燭之武之言無能為也左傳僖三十年曰晉侯秦伯圍鄭佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退公從之辭曰臣之壯也猶不如人今老矣無能為也巳特乞解所居官言從初服事符骸骨之請非謀几杖之賜説苑曰晏子任東阿乞骸骨以避賢者之路曲禮曰大夫致仕若不得謝則必賜之几杖若臣北陵移病東臯歸老史記曰司馬相如既病免家居茂陵西都賦曰北眺五陵茂陵在北故云北陵歸去來辭曰登東臯以舒嘯秋興賦云耕東臯之沃壤山河茅社一反司勲公侯珪璧還封典瑞張宴曰王者以五色土為太社封四方諸侯各以其方色土與之苴以白茅歸以立社周禮云司勲屬夏官小司馬之職又云司勲掌六卿賞地之法以等其功公侯珪璧者周禮典瑞云公執桓珪侯執信珪伯執躬珪子執榖璧男執蒲璧是也春官宗伯有典瑞之職鄭云瑞節信也典瑞若今符璽郎釋曰案其職云掌玉瑞玉器之藏則朝無冒位之人臣免妨賢之責虞氏養老敢希東序之榮周朝如荼豈望西郊之禮禮記曰有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊鄭司農注云皆學名四代相變或上西或上東或貴在郊上庠右學大學也在西郊下庠左學小學也在國中王宫之東東序東膠亦大學在國中王宫之東西序虞庠亦小學也西序在西郊周立小學西郊膠之言糾也庠之言養也周之小學為有虞氏之庠制是以名庠云其立鄉學亦如之周禮曰望而視之欲其荼白也注云韋革逺眡之當如茅莠之色詩云有女如荼吳越春秋云軍皆白裳白髦素甲素羽之矰望之若荼是荼白色也此云周朝如荼者謂養老老人髪白如茅莠之色也但瞻仰天威方違咫尺徘徊城闕私增悽戀不任知止之情左氏傳曰天威不違顔咫尺代人乞致仕表臣遡言臣聞一葉將隕寜待於風露百川皆到自竭者潢汚尚書大傳曰百川赴東海左氏傳曰潢汚行潦之水服䖍曰畜小水謂之潢水不流謂之汚杜預曰停水也臣輒感之以悲以咽臣某中謝臣仲春之末舊患漸加雙足頗蹇四支不利扶步有邯鄲之失勉視無離婁之明莊子曰夀陵餘子學步於邯鄲失其故也直匍匐而歸耳又天地篇云黃帝逰於赤水之北登乎崑崙之山南望而歸遺其𤣥珠使知索之不得使離朱索之趙岐孟子注曰離朱即離婁也安可率此留務溷玆恒典陛下恩周曲成未忍捐棄㣲臣困至於亟轉不堪勝臣所以自咎自傷淚繼之血臣某中謝臣特承先緒進不因人陛下憫臣無用舉直而有戅史記云上曰甚矣汲黯之戅也索隱曰戅愚也音涉降反自奉圖太極宣綍中書易繫辭曰易有太極是生兩儀禮記曰王言如綸其出如綍鄭注云綍引棺索也綍音弗大索陛下收臣以一心任臣以獨掌九年冀登宰輔八歳載踐宗伯出擁干旄入叅衡鏡或雲臺之上徴臣預疇咨之㫖後漢書曰肅宗詔賈逵入講尚書南宮雲臺或日觀之下詔臣操刋勒之文漢官儀曰泰山東南日觀者雞一鳴時見日欲出長三丈所言日觀者望見長安其髙如視浮雲美而暢之臣實尤忝明憲不敢以纖負𤣥造竟㣲於滴助日月其媮冰炭交集誠懷伏以前陪政事親荷徳音謂臣等經侍軒墀子孫尚延保護臣荷螻蟻歘戴丘山臣宜生亦盡命死且陳力竊不知終而不知止朝列三數與臣同儕臣未六十推臣則幼獨臣彌當頓顇病不俟年盈量窮涯滿而招損逾時每乖於勿藥永日猶繫於苞桑周易曰勿藥有喜又曰其亡其亡繫於苞桑覽分必然貪榮所忌伏乞免臣見職退畢餘生察臣榮不可支矜臣分不能强乃臣之幸也豈悟仁夀之闥有此一時承明之廬無縁再謁陸機與弟雲書曰仁夀殿前有大方銅鏡仁夀殿名漢書武帝謂嚴助曰君厭承明之廬心神已弊晷刻增悲叨睿鑒則多士莫先違聖顔則小臣何逺惟冀三條唘道萬乘巡京西都賦曰披三條之廣路薛綜西京賦注曰萬乗天子也悦西怨之羣黎逮東封之從者危䰟倘駐枯骨如存是臣之愜非臣所望臣又聞驅奔効駕先輟於羸駘翔集賀成近遺於鎩翮羸駘駑馬也淮南子曰大厦成而燕雀相賀鎩翮殘羽也彼尚知慕而況臣哉聞未遑請臣之懇戀至於隳官臣合書罪無任戰慄戀結之至齊王進白兔表代齊煬王憲作也臣聞輿圖欲逺則玉虎晨鳴河圖括地象曰令訾野中有玉虎晨雷聖人感期而興轍迹方開則銀麞入貢銀麞白鹿也史記周本紀曰犬戎以其職貢來王王遂征之得四白狼四白鹿以歸自是荒服者不至伏惟陛下明明在上翼翼居尊毛詩曰明明在下陸士衡四言詩曰明明在上詩曰維此文王小心翼翼徳動天闗威移地軸荆州星占曰北辰一名天闗河圖括地象曰崑崙之山橫為地軸是以風煙照燭毛羽禎祥史不絶書府無虚日臣受服元戎用綏邊鄙轅門所届始次熊山前茅慮無乃獲白兔言齊王時方東討也劉熙釋名曰元戎車在軍前唘突敵陣周所制也左氏傳曰邊鄙不聳熊山熊耳山也漢書地理志曰𢎞農郡盧氏熊耳山在東伊水出東北入洛左傳宣十二年曰蔿敖為宰擇楚國之令典軍行右轅左追蓐前茅慮無杜云在車之右者挾轅為戰備慮無如今軍行前有斥候蹹伏皆持以絳及白為幡見騎賊舉絳幡見步賊舉白憣備慮有無也茅明也或曰時楚以茅以旌幟光鮮越雉色麗秦狐太公金匱曰武王伐殷四夷聞之各以來貢越裳獻白雉重譯而至史記孟嘗君有狐白裘直千金入秦獻之昭王月徳符徴金精表瑞傳𤣥擬天問曰月中何有白兔𢷬藥以月中有兔故云月徳西方白帝是為金徳白主金故云金精又月為金精獲白兔為金精之瑞也呈祥輿頌効異披圖左傳有輿人之頌圖瑞圖也尊敬之迹既明應事之機斯兆臣之龔行實從陜略尚書武王曰今予惟龔行天之罰陜略謂治陜州也時憲為雍州牧故云瑞以素質彌雄西氣西方為白帝之精在雍州陜路獲此白兔故曰彌雄西氣也庶重承廟算方事申威揜代偃齊分韓裂趙不勝鳧藻踴躍之情齊王進蒼烏表周書建徳三年雍州獲青烏臣某言某謂憲也臣聞飛南陽之雉尚開霸圖列異傳曰陳倉人得異物以獻之道遇二童子云此名為媪在地下食死人腦媪乃言彼二童子名陳寶得雄者王得雌者霸乃逐童子化為雉秦穆公大獵果獲其雌為立祠祭有光雷電之聲雄止南陽有赤光長十餘丈來入陳倉祠中所以代俗謂之寶夫人祠抑有由也下建章之鵠猶調和氣西京雜記曰始元元年黄鵠下太液池上為歌曰黄鵠飛兮下建章羽肅肅兮行蹌蹌金為衣兮菊為裳唼唼荷荇出入蒹葭自顧菲薄愧爾嘉祥况乃虞廷告瑞姬社呈祥抱樸子曰昔有虞氏至孝三足烏集其庭呂氏春秋曰文王之時天先見火赤烏銜丹書集於周社文王曰火氣勝故其色尚赤其事則火咸髙識哺之心實貴能知之性師曠禽經曰慈烏反哺伏惟皇帝陛下謂武帝也徳敎百姓孝刑四海二語出孝經攝提從紀天下文明爾雅曰太歳在寅曰攝提易曰見龍在田天下文明是以東海輸禽乍改黔質西山度羽或變蒼精博物志曰有鳥如烏文首白喙赤足曰精衛常取西山之木石以填東海史記曰秦更名民曰黔首按黔黑色也若蒼頭矣黔質亦謂蒼色也西山經云三危之山三青鳥居之郭璞注云三青鳥主為西王母取食别自棲息於此山也竹書曰穆王西征至於青鳥所解也臣去月三十日行到陜州獲大都督莫仁回樂列稱於州射堂内見一蒼烏林薄回翔循環不去駐乗木之精轉司風之翼東方木帝為蒼精烏蒼色故云乘木之精也三輔黃圖曰長安宮南靈臺有相風烏遇風乃動即召儀同某甲等同時觀見斯實禮敬所覃孝慈之感張茂先曰慈烏曰孝烏蔡中郎曰至孝之應也理宜歸瑞秘圖書祥帝冊用光至徳取効升平無令赤鳳留止偏為瘞玉之歌列仙傳曰蕭史者秦穆公時人也善吹簫穆公有女號㺯玉作鳳鳴居數十年吹似鳳凰鳳凰來止其屋為作鳳臺夫婦止其上不下數年一旦皆隨鳳凰飛去故秦氏作鳳女祠有簫聲𤣥鶴徘徊獨擅銜珠之舞玉符瑞圖曰晉平公鼓琴有𤣥鶴二八而下銜明珠舞於庭一鶴失珠覔得而去相鶴經曰鶴夀二百六十歳則色純黒齊王進赤雀表臣某言臣聞南陽雉飛尚論秦霸漢書地理志曰南陽郡雉縣師古曰太康地志云即陳倉人所逐二童子名寶雞者雄止陳倉為石雌止此縣故名雉縣建章鵠下猶明漢徳漢書昭帝紀曰始元元年春二月黃鵠下建章宮太液池中公卿上夀賜諸侯王列侯宗室金錢各有差當今天不愛寶地必呈祥自應長樂觀符文昌唘瑞三輔黄圖有長樂宫春秋文曜鈎曰魁戴匡六星曰文昌宮為六府魏都賦云造文昌之廣殿伏惟皇帝陛下周武帝也欽明文思惟以劬勞成務厯象日月允釐百工尚書曰欽明文思安安又曰乃命羲和欽若昊天厯象日月星辰敬授人時又曰允釐百工庶績咸熙海水無波天星不動海不揚波言四方之底定也天星不動言天無星隕之災也皆祥瑞之徴去四月十三日獲隴右符府叅軍李暉牒稱户屬秦川清水郡伯陽縣文谷林在家庭獲一赤雀光同朱鳳色類丹烏降火飛精似入公車之府史記封禪書曰周得火徳有赤烏之符索隱曰尚書中候及吕氏春秋皆云有火自天止於王屋流為赤烏五至以數俱來魚豢典畧云秦伯出獵至咸陽有火烏流下化為白雀啣綠丹書集於公車流金成製若上凌雲之臺王子年拾遺記曰魏明帝即位二年昆明國貢𠻳金鳥人云其地去燃州九千里出此鳥形如雀而色黄羽毛柔宻常翺翔海上羅者得之以為至祥聞大魏之徳被於遐逺故越山航海來獻大國帝得此鳥畜於靈禽之園飴以真珠飲以龜腦鳥常吐金屑如粟鑄之可以為器者漢武帝時有人獻神雀葢此類也此鳥畏霜雪乃起小屋處之名曰辟寒臺皆用水精為户牖使内外通光而常隔於風雨塵霧宮人争以鳥吐之金用飾釵佩謂之辟寒金故宮人相嘲曰不服辟寒金那得帝王心不服辟寒鈿那得君王憐於是媚惑者亂爭此寶以金為身飾及行臥皆懷挾以要寵幸也魏氏喪滅池臺鞠為煨燼嗽金之鳥亦自翺翔矣凌雲臺亦魏明帝所造拾遺記云魏明帝起凌雲臺躬自掘土羣臣負畚謹按赤雀銜書止於酆户周之受命興乎此祥尚書中候曰赤雀丹書入於豐止於昌前昌拜稽首受之即事所觀同符合契符如漢銅虎符竹使符之類半留京師半以與之是也契如左傳所云使王叔氏與伯輿合要王叔氏不能舉其契杜預云合要契之辭也言今獻赤雀與古銜書可合符契也實可圖形瑞譜書頌儒林事足成臺名堪紀號成臺如魏之辟寒臺是也注見上文紀漢如漢神爵五鳳吳赤烏之類以為年紀也豈直雲中太守見赤心之奉主水經注曰雲中故趙地虞氏記云趙侯自五原河曲築長城東至隂山一箱崩不就見羣鵠逰於雲中徘徊經日火光在其下即於其處築城今雲中城是陳留耆舊傳曰魏尚繫獄有萬頭雀集獄樹尚曰夫棘中心赤外有棘蒙雀者爵命之祥也果為雲中太守蓬萊童子知白環之報恩吳均續齊諧誌曰𢎞農楊寶性慈愛年九歳至華隂山見一黄雀為䲭梟所搏逐樹下傷瘢甚多宛轉復為螻蟻所困寶懷之以歸置諸梁上夜聞啼聲甚切親自照視為蚊所囓乃移置巾箱中啖以黃花逮十餘日毛羽成飛翔朝去暮來宿巾箱中如此積年忽與羣雀俱來哀鳴遶堂數夕乃去是夕寶三更讀書有黃衣童子曰我王母使者昔使蓬萊為䲭梟所搏蒙君之仁愛見救今當受賜南海别以四玉環與之曰令君子孫潔白且從登三公事如此環矣寶之孝大聞於天下名位日隆子震震子秉秉子彪四世名公及震𦵏時有大鳥降人謂真孝招也臣等預觀休徴情廹恒慶不任鳧藻之至為晉陽公進玉律秤尺斗升表晉陽公晉國公護也周書武帝保定元年五月晉國公獲玉斗以獻臣某言某護也臣聞三才既立君臣之道已陳六位時成禮樂之功斯正三才天地人也周易曰兼三才而兩之又曰六位時成故以叶和日月測度隂陽悦豫兆人儀刑萬國者也伏惟皇帝周髙祖武帝也應籙馭天披圖受命據太陽而懸象履文昌而建極東京賦曰髙祖膺籙受圖易繫辭曰懸象著明莫大乎日月星經曰文昌七星如半月形在北斗魁前天府主營計天下事其六星各有名文昌與三公攝提軒轅共為一體魏都賦曰造文昌之廣殿劉逵注云文昌正殿名也白環表讓徳之符𤣥珪告成功之瑞帝王世紀曰西王母慕舜之徳來獻白環禹貢曰禹錫𤣥圭告厥成功太階既平升中可習長楊賦曰玉衡正而太階平禮記曰升中於天鄭注云中成也燎柴祭天告以諸侯之成功必當水逮千年山稱萬歳王嘉拾遺記曰黄河千年一清漢書曰武帝元封元年登嵩髙吏卒咸聞呼萬歳者三荀悦曰萬嵗山神呼之也應劭曰嵩髙縣有上中下萬歳里伏見勅旨刋正音律平章厯象奏黄鍾而歌大呂變孤竹而舞雲門周禮云太師掌六律六同以合隂陽之聲陽聲黃鍾太蔟姑洗蕤賔夷則無射隂聲大吕應鍾南呂函鍾小吕夾鍾是也孤竹管也雲門古樂名亦見周禮莫不器取疎通聲從安樂四分既明三㣲且定易乾鑿度曰天氣三㣲而成一著三著而成一體鄭康成注云五日為一㣲十五日為一著故五日為一候十五日成一氣也冬至陽始生積十五日至小寒為一著至大寒為二著至立春為三著凡四十五日而成一節故曰三著而成體也是以聞鐘於洛浦即變聲乖國語曰周景王二十三年鑄無射而為之大林鐘成伶人告和王謂伶州鳩曰鐘果和矣對曰上作器民樂之則為和今民莫怨恨諺曰衆心成城衆口鑠金不知其和聽鐸於邯鄲先知響韻戰國策曰秦攻趙鼔鐸之音聞於北堂希卑曰夫秦之攻趙不必急如此此召兵也必有大臣欲衡者耳王欲知其人旦日贊羣臣而訪之先言橫者則其人也建信君果言橫邯鄲趙地也二分二至行於司厯之官左傳僖五年曰凡分至唘閉必書雲物杜預曰分春秋分也至冬夏至也正義曰一年分為四時時皆九十餘日春之半秋之半晝夜長短等晝夜中分一日刻故春秋之半稱春秋分也冬之半夏之半晝夜長短極極訓為至故冬夏之半稱冬夏至也云司厯之官者謂太史也周禮云太史掌正歳年以序事頒告朔於邦國是也九變九成被於中和之職周禮司樂之職云若樂六變則天神皆降可得而禮矣若樂八變則地祇皆出可得而禮矣若樂九變則人鬼可得而禮矣釋曰言六變八變九變者謂在天地及廟庭而立四表舞人從南表向第二表為一成一成則一變從第二至第三為二成從第三至北頭第四表為三成舞人右轉身向南於北表之北還從第一至第二為四成從第二至第三為五成從第三至南頭第一表為六成則天神皆降若八變者更從南頭北向第二為七成又從第二至第三為八成地祇皆出若九變者又從第三至北頭第一為九成人鬼可得禮焉此約周之大武象武王伐紂禮記曰樂者天地之命中和之紀也足以動天地感鬼神被風俗平寒暑豈直吟嘯谿谷回翔鸞鳳而巳哉是知零陵廟前徒尋舜管應劭風俗通曰詩云嘒嘒管聲簫管備舉禮樂記云管漆竹長一尺六孔十二月之音也物貫地而牙故謂之管尚書大傳曰舜之時西王母來獻其白玉琯昔章帝時零陵文學奚景於泠道舜祠下得生白玉琯知古以玉為琯後乃易之以竹耳夫以玉作音故神人和鳳凰儀也始平城下空論周尺晉書樂志曰阮咸常心譏荀勗新律聲髙以為髙近哀思不合中和每公會樂作咸謂之不調朂以為異巳乃出咸為始平相後有田父耕於野得周時玉尺勗以校巳所治鐘鼓金石絲竹皆短校一米於此伏咸之妙復徴咸歸勗既以新律造二舞次更修正鐘聲會勗薨未竟其業臣聞上制其禮下習其儀君定其法臣行其事謹造玉律一具并玉秤尺斗升合等始得成功至於分粟絫黍量絲數龠漢書律厯志曰度長短者不失毫釐量多少者不夫圭撮權輕重者不失黍絫應劭曰十黍為絫十絫為銖孟康曰絫者墨蠡反師古曰絫音來戈反此字讀亦音纍紲之纍律厯志又云度量出於黄鐘之律度者分寸尺丈引所以度長短也本起於黄鐘之管長以子榖秬黍中者以一黍之廣度之千二百黍為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣量謂龠合升斗斛所以量多少也本起於黃鐘之龠以子榖秬黍中者千有二百實為一龠十禽為一合十合為一升十升為斗十斗為斛而五量嘉矣權者銖兩斤鈞石所以稱物知輕重也本起於黄鐘之龠一龠容千二百黍重十二銖兩之為兩十六兩為斤三十斤為鈞四鈞為石而五權謹矣權衡一物衡平也權重也稱上謂之衡稱鎚謂之權所從言之異耳如彼志文是量度權衡本起於律也實以仰稟聖規詳參神思所冀節移隂管無勞河内之灰後漢書律厯志曰候氣之法為室三重户閉塗釁必周宻布緹縵室中以木為案每律各一内庳外髙從其方位加律其上以葭莩灰抑其内端案厯而候之氣至者其灰去其為氣所動者其灰散人及風所動者其灰聚章懷太子注葭莩出河内氣動陽鐘不待金門之竹晉書樂志楊泉記曰取𢎞農宜陽縣金門竹為管河内葭莩為灰後漢書郡國志𢎞農郡宜陽縣金門山出竹為律管而琬琰事輕般倕慮淺尚書曰𢎞璧琬琰在西序般魯般倕共工見嵇康琴賦注不足展采成均增輝度量漢書律厯志曰鈞者均也陽施其氣隂化其物皆得其成就平均也三十斤成鈞虞書曰乃同律度量衡釋云度如字丈尺也量力尚反斗斛也賫器奉表以聞進象經賦表周書武帝紀云天和三年帝制象經成集百僚講説隋書經籍志象經一巻周武帝撰有王褒注王裕注何妥注又有象經發題義又據小説周武帝象經有日月星辰之象或云以孤虛衝破寓於局間非俗象棊車馬之類也注詳第一巻象戲賦子山作賦進之故進表云臣某言臣伏讀聖製象經并觀象戲私心踴躍不勝忭舞伏以性與天道本絶尋求直以懸諸日月遂獲瞻仰論語曰夫子之言性與天道不可得而聞也揚雄答劉歆書曰是懸諸日月不刋之書也九州既奠近對河圖左傳虞人之箴曰芒芒禹迹畫為九州謂冀兖青徐揚荆豫梁雍也易曰河出圖四轍中繩全觀玉策穆天子傳曰天子至於羣玉之山四轍中繩先王之所謂策府未飛𤣥鶴先聞金石之聲尚書大傳曰虞舜歌樂曰和伯之樂舞𤣥鶴又韓子曰師曠奏清徴有𤣥鶴二八集廊門不上赤城獨見煙霞之氣孔靈符會稽記曰赤城山名皆赤狀似雲霞懸霤千仞謂之瀑布飛流洒散冬夏不竭支遁天台山銘曰往天台當由赤城山為道徑天台山圖曰赤城山天台之南門也置管而測光景愈髙沉玉而觀淵泉益逺東方朔客難曰以管窺天管子淵深不涸沈玉極矣寢不自涯課虛為賦辭非寥亮學無雕刻向秀思舊賦曰發聲寥亮雕刻揚子雲所謂雕蟲篆刻是也遂敢陳述誠為厚顔詩云顔之厚矣况復日之逺近本非童子所問列子曰孔子東逰見二小兒辨鬬問其故一小兒曰我以日始出時去人近而日中時逺也一小兒曰以日出時逺而日中時近一小兒曰日初出時大如車葢及日中時如盤盂此不為逺者小而近者大乎一小兒曰日初出滄滄涼涼及其中而探湯此不為近者熱而逺者涼乎孔子不能決兩小兒曰孰謂汝多知乎天之渾葢豈是書生所談後漢書曰張衡研覈隂陽妙盡璇璣之正作渾天儀著靈憲算罔論言甚詳明注云漢名臣奏曰蔡邕曰言天體者有三家一曰周髀一曰宣夜一曰渾天宣夜之學絶無師法周髀術數具存考驗天狀多所違失故史官不用惟渾天者近得其情今史官所用候臺銅儀則其法也晉書天文志曰古言天者有三家一曰蓋天二曰宣夜三曰渾天蔡邕所謂周髀者即葢天之説也其本庖犧氏立周天厯度其所傳則周公受於殷商周人志之故曰周髀髀者股也股者表也天圓如葢地方如棊局天旁轉如推磨而左行日月右行隨天左轉故日月實東行而天牽之以西沒譬之蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故不得不隨磨以左廻焉天形南髙而北下日出髙故見日入下故不見天之居如倚故極在人北是其證也極在天之中而今在人北所以知天之形如倚葢日朝出陽中暮入隂中隂氣暗㝠故沒不見也夏時陽氣多隂氣少陽氣充明與日同輝故日出即見無蔽之者故夏日長也冬天隂氣多陽氣少隂氣暗𡨕掩日之光雖出猶隱不見故冬曰短也渾天儀注云天如雞子地如雞子中黃孤居於天内天大而地小天表裏有水天地各乗氣而立載水而行周天三百六十五度四分度之一又中分中則半覆地上半繞地下故二十八宿半見半隱天轉如車轂之運也諸論天者雖多然精於隂陽者張平子陸公紀之徒咸以為推步七曜之道度厯象昏明之證候校以四八之氣考以漏刻之分占晷影之往來求驗於事情莫宻於渾象者也張平子既作銅渾天儀於宻室中以漏水轉之令伺之者閉户而唱之其伺之者以告靈臺之觀天者曰璇璣所加某星始見某星已中某星巳沒皆如合符也云天之渾葢者渾天葢天二家之學也冒用奏聞伏增流汗之至賀傳位於皇太子表周書宣帝紀云大成元年帝傳位於太子衍大赦天下改大成元年為大象元年帝於是自稱天元皇帝所居稱天臺冕有二十四旒車服旗鼓皆以二十四為節内史御史内正皆置上大夫皇帝衍稱正陽宮臣某言伏見二月十九日詔傳位於皇太子昔者降居弱水登庸有優劣之殊水經注曰黄帝長子昌意徳劣不足紹承大位降居弱水為諸侯焉娶蜀山氏女生顓頊於若水之野有聖徳二十登帝位承少昊金官之政以水徳寶厯矣來朝櫟陽繼體有君臣之異漢書曰髙帝歸櫟陽五日一朝太公太公家令説太公曰天亡二日土無二王皇帝雖子人主也太公雖父人臣也奈何令人主拜人臣如此則威重不行後上朝太公擁彗迎門卻行上大驚下扶太公太公曰帝人主奈何以我亂天下法於是上心善家令言賜黃金五百斤上尊太公曰太上皇參同契長子繼父體漢書平當曰今漢繼體承基三百餘年不得與夫天之兩日日之再中並耀聨輝重明雙照同年而語矣易離卦彖曰重明以麗乎正伏惟天元皇帝周宣帝也周書本紀云帝傳位太子自號天元皇帝又云每對臣下自稱為天惟聖作聖惟親尊親降意於與能鳴謙於神器易繫辭曰百姓與能謙卦二爻曰鳴謙貞吉欲令百二相和先聞揖讓之風天下無為早識吾君之子是以運獨見之明行非常之事先天不為後天而奉易乾卦文言之辭也皇太子身貞萬國道照四門周易曰首出庶物萬國咸寜虞書舜典曰賔于四門四門穆穆孔傳曰四門四方之門也夙膺再命之符實允基天之命非闗復子明辟異於遷虞事夏尚書曰周公拜手稽首曰朕復子明辟遷虞事夏謂禹受舜禪也言帝與太子乃是父子本當傳位既非周成之復還亦異虞夏之革命也既損既益尚或二天為離為火何妨兩日論語曰所損益可知也易離卦象曰明兩作離大人以繼明照四方説卦曰離為火為日言天元皇帝居天臺皇帝居正陽宮為二天兩日也且平陽蒲阪賢臣則二十五人史記注皇甫謐曰舜所都或言蒲阪或言平陽或言潘潘今上谷也正義曰括地志云平陽今晉州城是也潘今媯州城是也蒲阪今蒲州南二里河東縣界蒲阪故城是國也舜典帝曰咨汝二十有二人欽哉惟時亮天功孔安曰禹垂益伯夷䕫龍六人新命有識四岳十二牧凡二十二人特勅命之馬融曰稷契臯陶皆居官久有成功但述而美之無所復勅禹及垂已下皆初命凡六人與上十二牧四岳凡二十二人按書云二十二人此言二十五人其以二十二人之外加稷契臯陶三人為二十五人耶顓頊髙辛才子則一十六族左傳文十八年季文子云昔髙陽氏有才子八人蒼舒隤敳檮戭大臨尨降庭堅仲容叔逹齊聖廣淵明允篤誠天下之民謂之八愷髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍忠肅共懿宣慈惠和天下之民謂之八元此十六族也杜預云髙陽顓頊之號髙辛帝嚳之號與此計事何遽無成鼚乎鼓之軒乎舞之帝乃載歌鼚乎鼓之軒乎舞之鼚丑良切自當八風通慶雲聚五老同逰三星連曜五經通義曰八風者八卦之氣八風以時至則隂陽變化之道成萬物得以時育生也史記天官書曰若煙非煙若雲非雲郁郁紛紛是謂慶雲論語考比讖曰仲尼曰帝堯率舜等升首山觀河渚見五老入於河漢書天文志曰天腥而景星見孟康曰有赤方氣與青方氣相連赤方中有兩黄星青方中有一黄星凡三星共為景星也豈直雙龍再賜九雉重飛而巳哉山海經曰大樂之野夏后唘於此舞九代馬乗兩龍琴操曰越裳操周公所作也周公輔成王成文武之王道越裳重九譯而來獻白雉周公援琴而歌受之獻於文王之廟皇帝邈然姑射正當乗雲馭龍皇帝周宣帝也莊子曰藐姑射之山有神人居焉肌膚若氷雪綽約若處子不食五榖吸風飲露乗雲氣馭飛龍而逰於四海之外堯治天下之民平海内之政往見四子藐姑射之山汾水之陽窅然喪其天下焉問道崆峒豈復先秋木落莊子曰黃帝立為天子十九年令行天下聞廣成子在於崆峒之上故往見之廣成子曰而所欲問者物之質也而所欲官者物之殘也自而治天下雲氣不待族而雨草木不待黃而落日月之光益以荒矣而佞人之心翦翦者又奚足以語至道黃帝退捐天下築特室締白茅閒居三月復往邀之問治身奈何而可以長久廣成子語以至道言宣帝棄其天下傳位有如唐堯之逰姑射黃帝之訪崆峒臣生預堯年時逢舜日覩維新之慶實倍萬恒情為杞公讓宗師驃騎表代杞國公亮作也周書列傳云亮字乾徳襲杞烈公爵天和末拜宗師進位大將軍臣某言伏見詔書以臣為使持節驃騎大將軍開府儀同三司宗師中大夫伏奉綸言心䰟震讋之涉反失氣也臣聞堯分四岳是以望秩山川堯典帝曰咨四岳孔安國曰四岳即上羲和之四子分掌四岳之諸侯故稱焉舜典曰歳二月東巡至於岱宗柴望秩於山川舜命九官是以光華日月漢書劉向上疏曰舜命九官濟濟相讓應劭曰尚書曰禹作司空棄后稷契司徒咎繇作士師垂共工益朕虞伯秩宗䕫典樂龍納言凡九官必須儀刑以徳明試以功乃可協和萬邦咸熙庶績此皆尚書之辭臣幼無學植長闕裁成左氏傳曰學猶植也周易曰裁成天地之道鴻都之門不能定其章句後漢書曰靈帝光和三年始置鴻都門學生鴻都門名也蔡邕傳曰邕拜郎中校書東觀遷議郎熺平四年乃與堂谿典等奏求正定六經文字靈帝許之邕乃自書策於碑使工鐫刻立於太學門外於是後儒晚學咸取正焉及碑始立其觀視及摹寫者車乗日萬餘兩填塞街陌又云初帝好學自造皇羲篇五十章因引諸生能為文賦者本頗以經學相招後諸為尺牘及工書鳥篆者皆引名遂至數十人並侍制鴻都門下雞鹿之塞無以名其碑碣漢書曰甘露二年單于入朝歸國漢遣董忠等將騎將六千又發邊鄙郡士馬以千數送單于出朔方雞鹿塞師古曰在朔方窳渾縣西北憑天潢之泒水附若水之分枝言杞公亮姓宇文氏與帝同枝𣲖也漢書天文志曰西宮咸池曰天五潢五潢五帝車舍淮南子曰若木在建木西末有十日其華照地東岳則朝宿有名南宮則門闌有籍東岳泰山也朝宿朝宿之邑也若春秋鄭有泰山之祊衛取有閻之土皆近泰山者也左氏傳説諸侯有大功徳乃有朝宿湯沐之邑矣後漢書曰顯宗圖畫建武中名臣列將於雲臺注云雲臺在南宮也説文曰闌門遮也在臣庸劣久知滿盈武陽以功臣之重特拜宗師東平以母弟之尊超登上將臣有何徳能兼此榮漢書曰景帝二年制詔御史故相國蕭何髙皇帝大功臣所與為天下也今其祀絶朕甚憐之其以武陽縣户二千封何孫嘉為列侯後漢書曰光武皇帝十一子光烈皇后生顯宗及東平憲王蒼故云母弟蒼本傳云顯宗甚愛之及即位拜為驃騎將軍置長史掾史員四十人位在三公上臣早傾庭䕃曾未扶牆母氏慈訓哀矜苦勞甫及成人復垂捐棄几筵如在忍離鞠養之恩終天無報叩地難任欲草土丘陵終身塋域霜露申履時之感燕雀展廻翔之心不悟天澤沛然謬垂提拔當今玉燭調和既非金革之世爾雅曰四時調和謂之玉燭禮記曰衽金革疏云金革謂軍戎器械也璿璣齊正豈忘松檟之餘尚書曰璿璣玉衡以齊七政况復一枝踡曲終危九層之臺一股涔蹄必傷千里之駕言己不堪用也莊子曰吾有樹人謂之樗其小枝拳曲而不中規矩説苑曰晉靈公造九層之臺費用千金謂左右曰敢有諫者斬荀息聞之上書求見靈公張弩持矢見之曰臣不敢諫也臣能累十二博碁加九雞子其上公曰子為寡人作之荀息正顔色定志意以碁子置下加九雞子其上左右懼慴息靈公氣息不續公曰危哉危哉荀息曰不危也復有危於此者公曰願見之荀息曰九層之臺三年不成男不耕女不織國用空虚鄰國謀議將興社稷亡滅君欲何望靈公曰寡人之過也乃至於此即壞九層臺也皇帝欽明文思光宅區宇禮格四方無容奪臣之志孝治天下自當哀臣此情大宗為師更求同姓之國元戎參乗别選賢能之臣大宗句辭宗師也元戎句辭驃騎也晉書武帝紀云咸寜三年詔曰宗室戚屬國之枝葉欲令奉率徳義為天下式然處富貴而能慎行者寡召穆公糾合兄弟而賦棠棣之詩此姬氏本枝百世也今以衛將軍扶風王亮為宗師當施行皆諮之於宗師也詩云元戎十乗以先唘行伏願覽青蒲之奏曲允㣲誠漢書曰史丹直入卧内伏青蒲上應劭曰以青規地曰青蒲詔鳳凰之池特收嚴召晉書曰以荀朂為尚書令朂久在中書専管機事及失之甚罔罔悵悵曰奪我鳳凰池諸君賀我耶則天慈無涯私願獲從臣之容身便當有地不任荒悚戰懼之誠謹詣朝堂奉表以聞功臣不死王事請門襲封表一作請功臣襲封表臣聞以法施民必傳祀典以勞定國必有承家孫叔敖祭酹無聞有傷良相史記曰孫叔敖為楚相且死屬其子曰我死汝貧困往見優孟言孫叔敖子也居數年其子貧負薪逢優孟優孟言之於王封之寢丘四百户也女叔齊𦙍嗣絶沒實貶賢臣晉語曰叔向見司馬侯之子撫而泣曰自此其父之死吾蔑與比而事君矣此其父始之我終之我始之夫子終之韋昭曰司馬侯晉大夫女叔齊也謹案大統十六年格先有封爵死於王事絶嗣者聽以支子繼絶非死王事不許承封前牒五等功臣皆是勤勞王室身當患難扞禦災禍翼贊大猷一日遇疾身捐館舍不幸無𦙍享嗣便絶於禮則不足於義則有傷未求上林之獵已削其侯漢書蕭何為請曰長安地陿上林多空地棄願令民得入田毋收藁為獸食上大怒曰相國多受賈人財物為吾請苑乃下何廷尉械繫之數月因王衛言乃赦出何不服襜褕之衣先除其國漢書年表曰武安侯田蚡薨子恬嗣五年元朔三年坐衣襜褕入宮不敬免師古曰襜褕直裾裨衣也襜音昌占反褕音踰伏惟皇帝崇徳旌庸興亡繼絶聞鼔鼙而思將帥畫雲臺而念舊臣樂記曰鼓鼙之聲讙讙以立動動以進衆君子聽鼓鼙之聲則思將帥之臣後漢書曰永平中顯宗追感前功臣乃圖畫二十八將於南宮雲臺豈有功存社稷而無後可守事盡忠貞而無祠可祭周於藩屏為約事在世功左傳富辰曰封建親戚以藩屏周又衆仲曰官有世功則有官族漢以山河為誓義存長久漢書功臣年表封爵之誓曰使黃河如帶泰山若礪國以永存爰及苗裔於是申以丹書之信重以白馬之盟又作十八侯之位次臣聞存人之國大於救人之災立人之後重於封人之墓史記正義曰封謂益其土及畫疆界竊以殷朝繼及無廢小宗周室興亡貴存身後春秋正義曰禮有大宗小宗天子諸侯之庶子謂之别子及異姓受族為後世之始祖者世適承嗣百世不遷謂之大宗為父後者諸弟宗之五世則遷謂之小宗五世遷者謂髙祖以下喪服未絶其繼髙祖之嫡則緦服之内共宗之繼祖繼禰所宗及亦然故鄭𤣥喪服小記注云小宗有四或繼髙祖或繼曾祖或繼祖或繼禰皆至五世則遷以緦服既窮不相宗敬故疏即遞遷也繼及謂父死子繼兄終弟及也興亡所謂興滅繼絶是也言殷周以來皆有襲封之事也紹髙宻者累葉豈専鄧禹之正𦙍後漢書曰鄧禹字仲華南陽新野人也封髙宻侯永平元年年五十七薨諡曰元侯帝分禹封為三國長子震為髙宻侯襲為安昌侯珍為夷安侯少子鴻為小侯鄧氏自中興後累葉寵貴凡侯者二十九人嗣平陽者重世何必曹參之嫡孫漢書曰曹參沛人也封平陽侯子窋嗣傳國至曾孫襄襄子宗嗣有罪完為城旦至哀帝時乃封參𤣥孫之孫本始為平陽侯二千石王莽時薨子𢎞嗣建武中先降河北封平陽侯至今公侯愚謂生有其勞死非王事雖在支庶並聽承襲幸使伯有之䰟不能為厲左傳昭七年曰鄭人相驚以伯有曰伯有至矣則皆走不知所往鑄刑書之歳二月或夢伯有介而行曰壬子余將殺帶也明年壬寅余又將殺段也及壬子駟帶卒國人益懼齊燕平之月壬寅公孫段卒國人愈懼其明月子産立公孫洩及良止以撫之乃止子太叔問其故子産曰鬼有所歸乃不為厲吾為之歸也太叔曰公孫洩何為子産曰説也為身無義而圖説從政有所反之以取媚也不媚不信不信民不從也及子産適晉趙景子問焉曰伯有猶能為鬼乎子産曰能人生始化曰魄既生魄陽曰䰟用物精多則䰟魄强是以有精爽至於神明匹夫匹婦强死其魂魄猶能馮依於人以為淫厲况良霄我先君穆公之胄子良之孫子耳之子敝邑之卿從政三世矣鄭雖無腆抑諺曰蕞爾國而三世執其政柄其用物也𢎞矣其取精也多矣其族又大所馮厚矣而强死能為鬼不亦宜乎若敖之鬼其無餒而左傳宣四年曰初楚司馬子良生子越椒子文曰必殺之是子也熊虎之狀而豺狼之聲弗殺必滅若敖氏矣諺曰狼子野心是乃狼也其可畜乎子良不可子文以為大慼及將死聚其族曰椒也知政乃速行矣無及於難且泣曰鬼猶求食若敖氏之鬼不其餒而及臯滸之戰遂滅若敖氏王思子文之治楚國也曰子文無後何以勸善使復其所改命曰生幽顯對揚神人咫尺尚書曰神人以和左氏傳曰天威不違顔咫尺杜預云八寸曰咫庾子山集巻七, SBCK: ''}
