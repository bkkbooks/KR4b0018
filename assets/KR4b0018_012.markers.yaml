  - {type: variant, offset: 571, length: 6684, content: 璧於河白雲起廻風揺落言帝堯築壇洛水之涯臨河沈玉也丹圗馭馬緑甲乗龜鄭康成以為河圗洛書龜龍銜負而出如中候所說龍馬銜甲赤文緑色甲似龜背袤廣九尺上有列宿斗正之度帝王録紀興亡之數是也孔安國以為河圗即八卦是也榮光上幕休氣連帷尚書中候曰帝堯文明榮光出河休氣四塞鄭康成曰休美也四塞炫燿四方也雖存克讓於見文思堯典曰欽明文思安安舜舞干戚讚尚書禹拜昌言曰俞班師振旅乃誕敷文德舞干羽於兩階七旬有苗格平風變律擊石來儀杜預曰歌者吹律以詠八風周禮凡樂有一變至九變虞書曰於予擊石搏石百獸率舞又曰簫韶九成鳳凰來儀先齊七政更服三危虞書曰璿璣玉衡以齊七政孔安國曰七政日月五星各異政也書又曰竄三苗於三危孔安國曰三危西裔括地志云三危山有峰故曰三危俗亦名卑羽山在沙州墩煌縣東南三十里朱干獨舞玉戚空麾尚書正義曰釋言云干扞也孫炎曰干楯自蔽扞也以楯為人扞通以干為楯名故干為楯郭璞曰舞持以自蔽翳故明堂位云朱干玉戚以舞大武戚斧也是武舞執斧執楯也南風一曲恭已無為禮記曰昔者舜作五絃之琴以歌南風恭已無為見論語禹渡江讚吕氏春秋曰禹南省方濟於江黄龍負舟舟中之人五色無主禹仰視天而嘆曰吾受命於天竭力以養人生性也死命也奈何憂於龍焉龍俛首低尾而逝則禹達乎死生之命利害之經也三江初鑿九谷新成禹貢曰三江初入史記索隠注韋昭云謂吳松江錢塘江陽江地理志有南江中江北江是為三江其南江從㑹稽吳縣南東入海中江從丹陽蕪湖東北至㑹稽陽羨縣東入海北江從㑹稽毘陵縣北東入海故下文東為中江又東為北江孔安國曰有北有東南可知也吳地記云松江東北行七十里得三江口東北入海為婁江東南入海為東江幷松江為三江史記曰惟禹之功為大披九山按山之深處為谷故詩云高岸為谷是九山得稱九谷矣風飛鷁涌水起龍驚漢書音義曰鷁水鳥也畫其象於船首淮南子曰龍舟鷁首天子之乗也樂天知命無待憂生周易繫辭曰樂天知命故不憂即禹所謂受命於天生性死命之說也危舟遂静亂檝還平漢書師古曰檝所以刺船也湯解祝網讚吕氏春秋曰湯見祝網者置四面其祝曰從天墜者從地出者從四方來者皆離吾網湯曰嘻盡之矣非桀孰為此者湯收其三面置其一面更教祝者曰昔蛛螯作網罟今之人學紓欲左者左欲右者右欲高者高欲下者下吾取其犯命者漢南之國聞之曰湯之德及禽獸矣四十國歸之人置四面未必得鳥湯去其三面置其一面以網其國四十非徒網鳥也連珠兩起合玉雙沉穀為祥樹桑成樂林史記殷本紀云太戊立亳有祥桑榖生於朝一暮大拱太戊懼問伊陟伊陟曰帝之政其有闕與帝脩其德太戊從之而祥桑榖枯死殷復興諸侯歸之故稱中宗尚書孔安國傳曰祥妖怪也二木合生不恭之罰左氏傳曰宋公享晉侯於楚丘請以桑林杜預曰桑林天子之樂名皇甫謐云殷樂一名桑林以桑林為大濩别名也三方落網一面驅禽德矣聖政仁乎用心文王見吕尚讚史記曰吕尚以漁釣干周西伯西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲霸王之輔於是周西伯獵果遇太公於渭之陽與語大恱曰自吾先君太公曰當有聖人適周周以興子真是耶吾太公望子久矣故號之曰太公望載與俱歸立為師言歸養老語出孟子垂釣西川西川渭濵也岸止磻石溪惟小船酈元水經注曰磻溪中有泉謂之兹泉積水為陣即太公釣處今謂之凡谷有石壁深高幽邃人跡罕及東南隅有石室蓋太公所居水次盤石釣處即太公垂釣之所其投竿跪餌兩膝遺跡猶存是磻溪之稱也其水清泠神異北流十二里注於渭風雲未感意氣怡然易曰雲從龍風從虎言未遇文王之時釣此磻溪其意氣怡然樂也有此相望於茲㡬年望謂太公望也武丁迎傅說讚史記曰帝武丁即位思復殷而未得其佐三年不言政事決定扵冡宰以觀國風武丁夜夢得聖人名曰說以夢所見視羣臣百吏皆非也於是乃使百工營求之野得傅說於傳險中是時說為胥靡築於傅險見於武丁武丁曰是也得而與之語果聖人舉以為相殷國大治故遂以傅險姓之號曰傅說虞田路斷辭澗泉飛躬勞版築有弊韋衣賢臣入夢天賜無違千巖之下遂得同歸皇甫謐曰高宗夢天賜賢人胥靡之衣蒙之而來曰我徒也姓傅名說天下得我者豈徒也哉武丁悟而推之曰傅者相也說者懽恱也天下當有傅我而恱民者哉明以夢視百官百官皆非也乃使百工圗寫其形象求諸天下果見築者胥靡衣褐帶索執役於虞虢之間傅巖之野名說以其得說傅巖謂之傅說尸子云傅巖在北海之洲孔傳言虞虢之界也成王刻桐葉封虞讚吕氏春秋曰成王與唐叔虞燕居援梧葉以為珪而授唐叔曰余以此封汝虞喜以告周公周公以請曰天子其封虞耶成王曰余一人與虞戲也周公對曰臣聞之天子無戲言天子言則史書之工誦之士稱之於是遂封叔虞於晉虞叔百里居河之汾帝刻桐葉天書掌文左傳昭元年子産曰唐叔虞當武王邑姜方震大叔夢帝謂巳余命而子曰虞將與之唐屬諸參而蕃育其子孫及生而有文在其手曰虞遂以命之及成王滅唐而封大叔焉故參為晉星由是觀之則實沈參神也昔金天氏有裔子曰昧為𤣥冥師生臺駘能業其官宣汾洮障大澤以處太原帝用嘉之封諸汾川沈姒蓐黄實守其祀今晉主汾而滅之矣由是觀之則臺駘汾神也是晉之建國居河之汾也天書掌文謂參為晉星也禮以成德樂以歌薰天子無戲唐其有君漢高祖置酒沛宫讚漢書曰高祖姓劉氏諱邦字季沛豐邑中陽里人也項羽封為漢王後平羽立為天子高祖還過沛留置沛宫召故人父老子弟佐酒發沛中兒得百二十人教之歌酒酣上擊筑自歌大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方遊子思舊來歸沛宫還迎故老更召歌童雖欣入沛方念移豐漢書地理志云京兆新豐高祖七年置應劭曰太上皇思東歸於是高祖改築城市街里以象豐徙豐民以實之故號新豐酒酣自舞先歌大風漢武帝聚書讚後漢書翟酺上言曰武帝大合天下之書注云武帝詔曰其令禮官勸學舉遺興禮舉遺謂搜求遺逸是合天下之書也此讚聚書當謂是矣獻書路廣藏書柱開劉歆七畧曰漢武帝開獻書之路一年之間書積如丘山史記曰老子周守藏室之史也索隠曰藏室史乃周藏書室之史也又曰張蒼為御史主柱下方書索隠曰周秦皆有柱下史所掌及侍立恒在殿柱之下故老耼為柱下史秦儒出谷漢簡吹灰衛宏詔定古文官書序曰秦始皇改古文為篆𨽻國人多謗乃召諸生至者皆拜為郎凡七百人密令冬月種𤓰於驪山硎谷中温處𤓰實使往視之先為伏機諸生方相論辨發機填之以土皆終命顔師古漢書注曰今新豐温湯之處號愍儒鄉温湯西南三里有馬谷谷之西岸有阬古老相傳以為秦阬儒處也漢簡吹灰者謂求之於秦人灰燼之餘也芝泥印上玉匣封來言漢時得書皆金繩玉檢也坐觀風俗不出蘭臺續漢書曰蘭臺令史六人秩六百石掌書劾奏及印主文書袁盎諌文帝讚史記曰孝文帝出趙同驂乘袁盎伏車前曰臣聞天子所與共六尺輿者皆天下豪英今漢雖乏人陛下獨奈何與刀鋸餘人載於是大笑下趙同趙同泣下車文帝從霸陵上欲西馳下峻阪袁盎騎並車擥轡上曰將軍怯耶盎曰臣聞千金之子坐不垂堂百金之子不騎衡聖主不乗危而徼幸今陛下騁六騑馳下峻山如有馬驚車敗陛下縱自輕奈高廟太后何上乃止袁字或作爰千乘峻轍六轡危行東都賦曰千乘雷起萬騎紛紜濟曰千乘萬騎天子法駕也詩曰六轡在手峻轍危行謂下峻阪也跡廻松坂山叙疑作斜栁城松坂峻坂也水經注曰霸水西巡嶢闗北厯嶢栁城龍淵地狹華蓋風驚龍淵劒名吳越春秋曰楚王召風胡子而告之曰寡人聞吳有干將越有歐冶寡人欲因子請此二人作劒可乎曰可乃往見二人作劒一曰龍淵又三輔黄圗有龍淵廟在茂陵東華蓋天子之蓋也崔豹古今注云黄帝所作又西京雜記曰終南山有樹直上百丈無枝上結藂條如車蓋葉一青一赤望之斑駁如錦繡長安謂之丹青樹亦云華蓋樹賢臣攬轡可謂忠貞賢臣謂袁盎也朱雲折檻讚漢書曰朱雲字游魯人也成帝時丞相故安昌侯張禹以帝師位特晉甚尊重雲上書求見公卿在前雲曰今朝廷大臣上不能匡君下亡以益民皆尸位素餐孔子所謂鄙夫不可與事君茍患失之無所不至也臣願賜尚方斬馬劔斬佞臣頭一人以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲下雲攀檻檻折雲呼曰臣得下從龍逢比干遊於地下足矣未知聖朝何如耳於是左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之臣敢以死争慶忌叩頭流血上意解然後得巳及後當治檻上曰勿易因而輯之以旌直臣上書直諫有忤明君先求斬馬遂請魚文身摧欄檻義烈風雲應從御史翻賴將軍應從御史者謂上怒御史將雲下也翻賴將軍者謂左將軍辛慶忌以死爭乃得免也周公戒伯禽讚尚書大傳曰伯禽與康叔朝於成王見周公三見而三笞之康叔有駭色乃與伯禽問於商子商子曰南山之陽有木名橋北山之陰有木名梓二子盍往觀焉二子往觀之見橋木高而仰見梓木實而俯反以告商子商子曰橋者父道也梓者子道也二子明日復見入門而趨登堂而跪周公迎拂其首而勞之曰汝安見君子乎二子以實對公曰君子哉伯禽居魯鳴玉來朝周公政治為國風謡北山有梓南山有橋禮容雖備俯仰無驕五月披裘負薪讚皇甫謐高士傳曰披裘公者吳人也延陵季子出遊見道中有遺金顧披裘公曰取彼金投䥥公瞋目拂手而言曰何子處之高而視人之卑五月披裘而負薪豈取金者哉季子大驚既謝而問姓名公曰吾子皮相之士何足語姓名也披裘當夏俗外為心雖逢季子不拾遺金禽巢欲逺魚沈惟深清聲滅跡何必山林王祥扣冰魚躍讚晉書曰王祥字休徵瑯邪臨沂人性至孝後母朱氏常欲生魚時天寒冰凍祥解衣將剖冰求之冰忽自解雙魚躍出持之而歸王祥之母鮮鱗是求冰連釣浦凍塞寒流精誠有感無假沉鉤二老同膳雙魚共浮孫叔敖逢蛇讚賈誼新書曰孫叔敖為兒時出道上見兩頭蛇殺而埋之歸見其母泣問其故對曰夫見兩頭蛇者必死今出見之故爾母曰蛇今安在對曰恐後人見殺而埋之矣母曰夫有陰德必有陽報爾無憂也後遂興於楚朝及長為楚令尹叔敖朝出容悴歸家母氏顧訪知埋怪蛇爾有陰德陽報將加終為楚相卒享榮華高鳳好書不知流麥讚後漢書曰高鳳字文通南陽葉人也少為書生家以農畝為業而專精誦讀晝夜不息妻嘗之田曝麥於庭令鳳䕶雞時天暴雨而鳳持竿誦經不覺潦水流麥妻還怪問鳳方悟之其後遂為名儒乃教授業於西唐山中高鳳好學專心不廻流連經笥對翫書臺石門雲渡銅梁雨來麥流雖逺書巻猶開張良遇黄石公讚史記曰留侯張良者其先韓人也韓破悉以家財求客刺秦王為韓報讐以大父父五世相韓故秦皇帝東遊良與客徂擊秦皇於博浪沙中誤中副車秦求賊甚急乃更名姓亡匿下邳嘗間從容步遊下邳圯上有一老父衣褐至良所直墮其履圯下顧謂良曰孺子下取履良愕然欲毆之為其老強忍下取履父曰履我良業為取履因長跪履之父曰孺子可敎矣後五日明與我㑹此良因怪之跪曰諾五日平明良往父已先在怒曰與老人期後何也去曰後五日早會五日雞鳴良往父又先在怒曰後何也去曰後五日復早來五日良夜半往有頃父亦來喜曰當如是出一編書曰讀此則為王者師矣後十年興十三年孺子見我濟北穀城山下黄石即我矣遂去無他言不復見旦日視之書乃太公兵法也張良取履跪受無辭兵書一巻長者三期昔稱韓相今為漢師穀城餘石還歸舊祠史記曰留侯欲從赤松子遊乃學辟穀道引輕身始所見下邳圯上老父與太公兵書者後十三年從高帝過濟北果見穀城下黄石取而葆祠之留侯死並葬黄石冢每上冢伏臘祠黄石留侯師尚父授丹書讚竹書紀年曰紂四十二年周武王元年西伯發受丹書於吕尚又曰季秋之甲子赤爵銜書及豐置於昌户昌拜稽首受其文要曰姬昌蒼帝子亡殷者紂王將畋史編卜之曰將大獲非熊非羆天遣太師以佐昌臣太祖史疇為禹卜得臯陶其兆類此至於磻溪之水吕尚釣於涯王下趨拜曰望公七年乃見光景於斯尚立變名答曰望釣得玉璜其文要曰姬受命昌來提撰爾洛鈴報在齊尚出遊見赤人自授尚書命曰召佐昌者子文王夢月著其身又鸑鷟鳴於岐山孟春六旬五緯聚房後鳳凰銜書逰文王之都書又曰殷帝無道虐亂天下星命不移不得復久靈祗逺離百神吹去五星聚房昭理四海文王既沒太子發立是為武王尚父一遇周王是親赤雀既下丹書巳陳自論秉鉞長别垂綸獨有磻石留名渭濵榮啓期三樂讚列子曰孔子遊於泰山見榮啓期行乎郕之野鹿裘帶索鼔琴而歌孔子問曰先生所以樂何也對曰吾樂甚多天生萬物惟人為貴而吾得為人是一樂也男女之别男尊女卑故以男為貴吾得為男矣是二樂也人生有不見日月不免襁褓者吾既行年九十矣是三樂也貧者士之常也死者人之終也處常得終當何憂哉孔子曰善乎能自寛者也榮期三樂惟人與年夫子相遇即以為賢性靈造化風雲自然雅琴雖古獨有鳴絃夫子見程生讚子華子孔子贈篇曰子華子反自郯遭孔子於途傾蓋而顧相語終日甚相親也孔子命子路曰取束帛以贈先生子路屑然而對曰由閒之士不中間見女嫁無媒君子不以交禮也有間又顧謂子路子路又對如初孔子曰固哉由也詩不云乎有美一人清揚婉兮邂逅相遇適我願兮今程子天下之賢士也於斯不贈則終身弗能見也小子行之亦見韓詩外傳程生夫子一遇相知薄言傾蓋桑陰遂移清揚共美賢聖同羇陳詩難别贈絹傷離鉏麑見趙盾讚左氏傳曰晉靈公不君宣子驟諫公患之使鉏麑賊之晨往寢門闢矣盛服將朝尚早坐而假寐麑退嘆而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死趙盾將朝端衣整笏禮曰笏天子以球玉諸侯以象大夫以魚須文竹士竹又曰將適公所以書思對命鉏麑受命衝冠怒髮惆悵賢臣顧瞻城闕利劒不抽青槐先絶蔡澤就唐生相讚史記曰蔡澤者燕人也遊學于諸侯小大甚衆不遇而從唐舉相曰吾聞先生相李兌曰百日之内持國秉政有之乎曰有之曰若臣者何如唐舉孰視而笑曰先生曷鼻巨肩魋顔蹙齃膝攣吾聞聖人不相殆先生乎蔡澤知唐舉戲之乃曰富貴吾所自冇吾所不知者夀也願聞之唐舉曰先生之夀從今以往者四十三嵗蔡澤笑謝而去謂其御者曰吾持梁刺齒肥躍馬疾驅懐黄金之印結紫綬於腰揖讓人主之前食肉富貴足矣後西入秦說應侯秦昭王召見與語大恱拜為客卿蔡澤羇旅唐生決疑無勞神策不問靈龜富貴自取年夀須期雖云異相會待逢時李陵蘇武别讚漢書曰李陵字少卿天漢二年陵率步卒五千人出塞與匈奴戰力屈乃降匈奴中蘇武字子卿使匈奴二十年不降昭帝即位匈奴與漢和親漢求武等於是李陵置酒賀武曰今足下還歸揚名於匈奴功顯於漢室雖古竹帛所載丹青所畫何以過子卿陵雖駑怯令漢且貰陵罪全其老母使得奮大辱之積志庶㡬乎曹柯之盟此陵宿昔不忘之志也收族陵家為世大戮陵尚復何顧乎已矣令子卿知吾心耳異域之人一别長絶陵起舞歌曰徑萬里兮度沙漠為君將兮奮匈奴路窮絶兮矢刃摧士衆滅兮名已隤老母巳死雖欲報恩將安歸陵泣下數行因與武決李陵北去蘇武南旋歸驂欲動别馬將前河橋兩㟁臨路悽然故人此别知應㡬年樊噲見項王讚漢書鴻門之會樊噲聞事急乃持楯撞入項羽目之問之為誰張良曰沛公驂乗樊噲項羽曰壯士賜之巵酒彘肩噲飲酒拔劒切肉食之項羽曰復能飲乎曰臣死且不懼豈特巵酒乎且沛公先入定咸陽暴師霸上以待大王大王今日至聽小人之言與沛公有隙臣恐天下解心疑大王也項羽默然沛公如厠麾噲去既出沛公留車騎獨騎馬噲等四人步從從山下走歸霸上軍而使張良謝項羽羽亦因遂巳無誅沛公之心是日微樊噲奔入營譙讓項羽沛公㡬殆後數日項羽屠咸陽立沛公為漢王漢王賜樊噲為臨武侯樊噲將軍漢王車右不憚鋒刃何辭巵酒霸上屯軍鴻門固守應劭曰霸上地名在長安東三十里古曰滋水秦穆公更名霸上師古曰霸水上也即今所謂霸頭孟康曰鴻門在新豐東十七里舊大道北下阪口名持謝范増惟留玉斗漢書高帝紀云使張良獻璧項羽受之又獻玉斗范增范增怒撞其斗起曰吾屬今為沛公虜矣秦穆公飲盜駿馬讚吕氏春秋曰昔者秦穆公乗馬右服失之野人取之穆公自往求之見野人方將食之於岐山之陽繆公笑曰食駿馬之肉不飲酒余恐傷汝也徧飲而去韓原之戰晉人已環穆公之車矣晉梁靡已扣公左驂矣野人嘗食馬於岐山之陽者三百冇餘人畢力為穆公疾鬬於車下遂大剋晉乃獲恵公以歸駿馬遇盜秦王不嗔先傾美酒翻畏傷人鄰兵向國窮寇侵秦於時大盜還作功臣延陵季子遇徐君讚新序曰延陵季子將西聘晉帶寶劒以過徐君徐君不言而色欲之季子為有上國之事未獻也然心許之矣使於晉顧反則徐君死矣於是以劒掛徐君墓樹而去徐君有禮季子惟賢經過一遇如舊依然人非别後心許生前長松雖合寶劒猶懸鶴讚并序武成二年春三月雙白鶴飛集上林園大將鄭偉鄭偉字子直滎陽開封人也周書有傳注見墓誌銘布弋設罝並皆禽獲六翮已摧雙心俱怨相顧哀鳴孤雄先絶孀妻向影天子愍焉信奏事階墀立使為讚天子周明帝也時子山為司憲中大夫九臯遥集三山廻歸毛詩曰鶴鳴於九臯聲聞于天漢書郊祀志曰蓬萊方丈瀛洲此三神山在渤海中華亭别淚洛浦仙飛語林曰陸機為河北都督聞警角之聲謂孫丞曰聞此不如華亭鶴唳故臨刑而有此嘆見世說注列仙傳曰周靈王太子晉好吹笙作鳳鳴遊伊洛間道士浮丘公接上嵩山二十餘年後來山上告桓良曰告我家七月七日待我緱氏山頭果乗白鶴駐山巔望之不得舉手謝時人而去不妨離繳先遭見羈離平聲說文曰繳生絲縷也籠摧月羽弋碎霜衣月羽霜衣言鶴之白也塞傳餘號闗承舊名幽明録曰陶公在㝷陽西南一塞取魚自謂其池曰鶴門梁元帝表臣自擁旄鶴塞昭明答湘東書掩鶴闗而高卧南遊湘水東入遼城神仙傳曰蘇仙公者桂陽人也乗白鶴飛去自後有白鶴來止郡城東北樓上人或挾彈彈之鶴以爪攫樓板似漆書云城廓是人民非三百甲子一來歸吾是蘇公彈何為至今修道之人每至甲子日焚香禮於仙公之故第也捜神後記曰丁令威本遼東人學道於靈虛山後化鶴歸遼集城門華表柱歌曰有鳥有鳥丁令威去家千年今始歸城郭如故人民非何不學仙冢纍纍雲飛欲舞露落先鳴六翮摧折九門嚴閉戰國策莊辛曰奮其六翮而凌清風楚辭曰虎豹九闗言天有九門無可訴寃也相顧哀鳴肝心斷絶松上長悲琴中永别王韶之神境記曰滎陽郡有孤松千丈常有雙鶴晨必接翮夕輒偶影蔡邕琴操曰商陵牧子娶妻五年無子父兄欲為改娶牧子援琴鼔之歌别鶴以舒其憤懣故曰别鶴操庾子山集巻十, SBCK: ''}
