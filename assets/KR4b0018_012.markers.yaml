  - {type: line-break, offset: 0, content: '', id: KR4b0018_WYG_012-1a01}
  - {type: variant, offset: 0, length: 576, content: 欽定四庫全書庾子山集巻十周庾信撰錢唐倪璠纂註讚黄帝見廣成子讚莊子曰黄帝聞廣成子在崆峒之上故往見之廣成子南首而卧黄帝順下風膝行而進再拜稽首而問曰治身奈何而可以長久廣成子語以至道黄帝拜稽首曰廣成子之謂天矣治身紫府問政青丘抱樸子曰黄帝東到青丘見紫府先生受三皇内文以劾召萬神又曰項曼都言到天上先過紫府金牀玉几晃冕昱昱東方朔十洲記曰長洲一名青丘在南海辰已之地一洲之上專是林木故名青丘司馬相如烏有賦曰秋田乎青丘服䖍曰青丘國在東海東三百里郭璞云青丘山名有田亦有國出九尾狐在海外龍湖鼎没丹竈珠流史記曰黄帝採首山銅以鑄鼎鼎成有龍下迎地仙去小臣攀龍髯而上者七十二人魏地土記曰𢎞農湖縣有軒轅黄帝登仙處郊祀志曰少君言上祀竈皆可致物致物而丹砂可化為黄金黄金成以為飲食器則益夀益夀而海中蓬萊仙者廼可見之以封禪則不死者黄帝是也踈雲即雨落木先秋莊子廣成子曰自而治天下雲氣不待族而雨草木不待黄而落至道須極長生可求即莊子云黄帝問治身奈何而可以長久廣成子語以至道是也堯登壇受圗讚尚書中候曰帝堯即政七十載修壇河洛仲月辛日禮備至於日稷榮光出河休氣四塞龍馬銜甲赤文緑色登壇吐甲圗宋均曰稷側也論語考比讖仲尼曰吾聞帝堯率舜等升首山觀河渚見五老入於河一老曰河圗將來告帝期又一老曰山川魚鼈荷聖恩又一老曰河圗推龍銜玉繩歌訖五老飛於天入於昴登壇洛汭沈玉河湄許慎曰水涯曰汭釋名曰湄眉也臨水如眉臨目也尚書中侯曰堯, SBCK: ''}
