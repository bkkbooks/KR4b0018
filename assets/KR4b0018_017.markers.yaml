  - {type: variant, offset: 0, length: 42328, content: 欽定四庫全書庾子山集巻十五周庾信撰錢塘倪璠纂註誌銘周大將軍襄城公鄭偉墓誌銘公諱偉字子直滎陽開封人也周書有傳周宣母弟就封於鄭河洛之地卽有民人虢鄶之君非無郡邑詩譜曰周宣王封母弟友於宗周畿内咸林之地是為鄭桓公今京兆鄭縣是其都也桓公為幽王大司徒甚得周衆與東土之人問於史伯曰王室多故余懼及焉其何所可以逃死史伯曰其濟洛河潁之間乎是其子男之國虢鄶為大虢叔恃勢鄶仲恃險皆有驕侈怠慢之心而加之以貪冐君若以周難之故寄孥與賄是驕而貪必將背君君以成周之衆奉辭伐罪無不克矣桓公從之後其子武公與晉文侯定平王於東都王城卒取史伯所云十邑之地右洛左濟前莘後河食溱洧焉今河南新鄭是也事出國語其後蛇鬭於門黿嘗於鼎左傳莊十四年曰初内蛇與外蛇鬭於鄭南門中内蛇死六年而厲公入又宣四年傳曰楚人獻黿於鄭靈公公子宋與子家將見子公之食指動以示子家曰他日我如此必甞異味及入宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指於鼎甞之而出公怒欲殺子公子公與子家謀先弑靈公韓侵負黍晉滅陽城其祀忽諸以國為氏史記曰鄭繻公十六年鄭伐韓敗韓兵於負黍鄭君乙立二年鄭負黍反復歸韓十一年韓伐鄭取陽城二十一年韓哀侯滅鄭幷其國杜預左傳注曰陽城縣西南有負黍亭按鄭本韓滅而云晉者韓趙魏三分晉室謂之三晉故云晉滅也左氏傳曰臯陶庭堅不祀忽諸祖徹撫軍贈濟州刺史周書本傳云鄭偉魏將作大匠渾之十一世孫祖思明少勇悍仕魏至直閣將軍至濟州刺史父先護本傳云父先護亦以武勇聞魏孝莊帝在藩先護早自結託元顥入洛有扞禦之功驃騎大將軍儀同三司襄城郡公青州刺史魏孝武初贈永安中洛城畫掩黄河凌合魏莊帝永安三年帝殺爾朱榮爾朱仲遠擁兵入洛爾朱兆遷帝於晉陽帝遇弑於城内三級佛寺是其事也翟泉㑹盟之地蒼鳥忽飛晉書五行志曰洛陽歩廣里地䧟有蒼白鵞出蒼者飛翔冲天白者止焉陳留董飬嘆曰歩廣周之翟泉㑹盟地也白者國諱蒼者胡象自後有劉淵之亂武庫兵欄之中鱗魚遂上干寳捜神記曰太康中有鯉魚二枚現武庫屋上武庫兵府魚有鱗甲亦是兵之類也魚旣極隂屋上太陽魚現屋上象至隂以兵革之禍於太陽也及惠帝初誅皇后父楊駿矢交宫闕廢后為庶人死於幽宫元康之末而賈后專制謗殺太子尋亦誅廢十年之間母后之難再興是其應也自是禍亂搆矣京房易妖曰魚去水飛入道路兵且作三帥北絏五馬南浮本傳云爾朱榮死徐州刺史爾朱仲逺擁兵入洛詔先護率所部與行臺楊昱及都督賀拔勝同討之勝於陣降仲逺又聞京師不守衆遂潰先護奔梁尋自梁歸為仲逺所害左傳僖三十三年云晉敗秦師於殽獲百里孟明視西乞術白乙丙以歸文嬴請三帥孔安國論語注曰絏攣也所以拘罪人晉太安中謡曰五馬遊渡江一馬化為龍三帥比先護賀拔勝楊昱三人也南浮比先護奔梁也言北魏遭爾朱氏之亂先護兵敗入梁也梁武帝大造中原樹君伊洛公之憑軾棧車言歸舊壤起為通直散騎侍郎本傳云偉少倜儻有大志毎以功名自許善騎射膽力過人爾朱氏滅後自梁歸魏起家通直散騎侍郎天厭魏德政在强臣强臣謂齊神武髙歡也左氏傳曰天而旣厭周德矣公恥入亂階乃於陳留起義本傳云孝武西遷偉亦歸鄕里不求仕進大統三年河内公獨孤信旣復洛陽乃謂其親族曰今嗣主中興鼎業據有崤函河内公親董衆軍克復瀍洛率土之内孰不延首望風况吾等世荷朝恩家傳忠義誠以此時効臣子之節成富貴之資豈可碌碌為懦夫之事也於是與宗人榮業糾合州里建義於陳留信宿間衆有萬餘人遂攻拔梁州擒東魏刺史鹿永吉及鎮城令狐德幷陳留郡守趙季和乃率衆来附因是梁陳之間相次降欵太祖封函谷而待諸侯坐酆宫而朝羣后謂周太祖迎武帝都長安也西都賦曰左據函谷二崤之阻左氏傳曰康有酆宫之朝威懷是接席捲西飛本傳云偉馳入朝太祖與語嘆美之大統三年入朝蒙授武陽縣開國伯食邑六百戸尋除龍驤將軍北徐州刺史本傳同開河橋之陳解玉壁之圍本傳云從戰河橋及解玉壁圍偉常先鋒陷陣張旃於富平被練於伊闕隋書地理志曰富平縣後周改曰中華郡尋罷有荆山爾雅曰通帛曰旃水經注曰伊水北入伊闕昔大禹疏以通水兩山相對望之若闕伊水入其間北流故謂之伊闕矣左氏傳曰組甲八百被練三千探虎穴而揮戈上魚門而懸胄故巳策名司勳功髙舎爵言其先鋒陷陣有戰功也後漢書班超曰不入虎穴焉得虎子左傳升陘之戰云邾人獲公胄懸諸魚門又狐突曰策名委贄周禮曰司勳掌六卿賞地之法以等其功左氏傳曰舎爵策勳焉魏將侯景狼顧荆河天子命我偏師赴援垂餌虎口中途背盟事獲交綏公之力也本傳云侯景歸欵太祖命偉率所部應接之及景後叛偉亦全軍而還鹽鐵論曰以賢人為兵以聖人為守則中國無狗吠之警而邉境無鹿駭狼顧之憂也司馬遷曰李陵提卒不滿五千深踐戎馬之地足歴王庭垂餌虎口除中軍將軍散騎常侍大都督襲襄城郡公食邑二千戸仍除使持節車騎大將軍開府儀同三司餘如故遷驃騎大將軍開府加侍郎常伯位重霍去病之登朝上將官尊公孫敖之出塞以今方昔異代同榮尚書立政周公曰王左右常伯注謂三公環濟要畧曰侍中古官或曰風后為黄帝侍中周時號常伯應劭漢官儀曰侍中周官號曰常伯選於諸伯言其道德可常尊漢書曰霍去病侯三歲元狩三年春為驃騎將軍又曰置大司馬位大將軍驃騎將軍皆為大司馬定令驃騎將軍秩禄與大將軍等自是後青日衰而去病日益貴又曰公孫敖義渠人武帝時為車騎將軍出代後以校尉從大將軍封合騎侯又以中將軍從大將軍再出定襄以將軍出北地以校尉從大將軍以因杵將軍築受降城再出撃匈奴至余吾凡四為將軍矣天文志云文昌有上將言偉為驃騎車騎與霍去病公孫敖同榮也魏後二年授大將軍事江陵防主都督十五州諸軍事呉兵教士艫舳習流島嶼憑陵波瀾衝激左思吳都賦曰𢎞舸連舳巨艦接艫又曰島嶼綿邈劉淵林注曰舳船前也艫船後也島海中山也嶼海中山上有山石越絶書曰句踐伐吳發習流二千人公蹔臨江界已悉南越之兵裁汎樓船卽善昆彌之戰漢書南粤王傳曰元鼎五年路博德為伏波將軍出桂陽下湟水楊僕為樓船將軍出豫章下横浦故歸義侯二人為戈船下瀨將軍出零陵或下離水或抵蒼梧使馳義侯因巴蜀侯罪人發夜郎兵下牂柯江咸㑹番禺六年平南越三輔黄圗曰昆明國有溟池地方三百里天子欲伐之作昆明池以象之以習水戰中有戈船各數十樓船百艘西域傳曰烏孫國大昆彌治赤谷城去長安八千九百里遂得安歌澧浦弭節涔陽楚辭曰濯余佩兮澧浦鄭康成曰今長沙有澧陵縣豈以陵名為縣乎澧音禮又九歌云望涔陽兮極浦皆楚地也留魯侯而宴章臺對齊人而畋雲夢左氏傳曰楚子成章華之臺願與諸侯落之大宰薳啓疆来召公公如楚楚子享公於新臺使長鬛者相好以大屈旣而悔之薳啟疆見公乃反之子虚賦曰楚使子虚使於齊王悉發車騎與使者出畋畋罷子虚曰僕樂齊王之欲夸以車騎之衆而僕對以雲夢之事也周保定元年授使持節都督宜州諸軍事宜州刺史天和六年授都督華州諸軍事華州刺史餘如故崤函重嶂汧渭分流陽陵之溢既奔華隂之學還聚戰國䇿蘇秦曰秦東有崤函之固漢書地理志曰右扶風有渭城汧縣雍州弦蒲藪汧水出西北入渭按秦非子為周孝王飬馬於汧渭之間卽此二水矣蔡邕樊惠渠頌云陽陵縣東其地衍隩嘉榖不植京兆尹樊陵纍石積土疏水通瀆昔日鹵田化為甘壌後漢書張楷傳云華隂山南有公超市而消渇連年屢有相如之患至於大漸遂如范増之疾西京雜記曰長卿素有消渴疾及還成都悦文君之色遂以發痼疾乃作美人賦欲以自刺而終不能改卒以此疾至死文君為誄傳於世尚書云王曰嗚呼疾大漸惟幾漢書曰項羽聽陳平反間疑范増増怒乞骸骨歸行未至彭城疽發背死言偉亦以背疽之疾而死也桐君對藥分闕神明李柱侍醫更無方便王子年拾遺記曰道家云昔仙人桐君採石入穴數里得丹石雞舂碎為藥服之者令人有聲氣後天而死漢書藝文志曰侍醫李柱國校方技師古曰醫藥之書也以天和六年四月十七日薨年五十七詔贈本官加少傅都督司豫洛相冀五州諸軍事司州刺史諡曰肅公禮也天子輟朝彌深大臣之議羣公㑹𦵏咸得同盟之禮夫人李氏頓丘貴姓世系表李忠頓丘房始祖卿相之門賢才之室霜露先侵策封郊次以其年十一月六日合𦵏於咸陽之長安縣某原合𦵏非古旣異三王之前死則同穴還同六載之始鄭司農禮記注曰祔謂合𦵏合𦵏自周公以来雖復銜珠兩鶴同歸紫蓋之松出匣雙龍共沒延平之水玉符瑞圗曰晉平公鼓琴有𤣥鶴銜明珠舞於庭又述異記曰噲叅飬母至孝曽有𤣥鶴為戎人所射窮而歸叅叅収飬治瘡愈放之後夜到門外叅秉燭視鶴雌雄雙至各銜明珠以置叅家抱樸子曰千歲松樹四邊枝起上杪不長望而視之有如偃蓋晉書張華傳曰吳未滅時斗牛之間甞有紫氣雷煥曰寳劒之精上徹於天耳在豫章豐城華即補煥為豐城令煥到掘嶽室因得一石函中有雙劒一曰龍泉一曰太阿留一自佩送一與華華誅失劒所在煥卒其子持劒行經延平忽於腰間躍出墮水但見兩龍各長數文於是失劒也嗚呼哀哉乃薦銘曰國有巖邑朝多君子左氏傳曰制巖邑也朝多君子者左傳管仲曰鄭有叔詹堵叔師叔三良為政未可問也又傳稱子産博物君子言鄭國有巖邑朝多君子也武公莊公平王卿士左氏傳曰鄭武公莊公為平王卿士杜預曰卿士王卿之執政者言父子秉周之政溫麥渝盟祊田廢祀左傳隱三年曰鄭祭足帥師取温之麥傳又曰有渝此盟明神殛之又八年傳曰鄭伯請釋㤗山之祀而祀周公以㤗山之祊易許田三月鄭伯使宛来歸祊不祀㤗山也驂乗停輿来朝識履晉書曰武帝出祀南郊詔使鄭黙驂乗漢書曰哀帝擢鄭崇為尚書僕射數求見諌争上初納用之每見曳革履上笑曰我識鄭尚書履聲以上言鄭氏之先也惟祖惟考旣侯旣公樞機周密出納清通治繁政簡處亂心雄濟河遺惠一作德海岱餘封以上言祖徹考先䕶並有政績也濟河謂徹為濟州刺史海岱謂先護為青州刺史也世濟其美載誕其器左氏傳曰世濟其美不隕其名杜預曰濟成也忠無不為孝則不匱左傳曰公家之利知無不為忠也詩孝思不匱幽冀紛梗關河鼎沸言永安中之亂也普㤗元年幽州刺史劉靈助起兵於薊河北大使髙乾夜襲冀州刺史元嶷是幽冀之亂關河鼎沸言爾朱氏髙氏相繼為亂故有武帝遷都之事自北自南聲聞梁魏言先護父子因亂奔梁復自梁歸魏聲聞於南北也揚旌汝潁威震三川爾雅云注旄首曰旌漢書地理志有潁川汝南二郡應劭曰汝水出𢎞農入淮潁水出陽城韋昭曰三川河伊洛本序樹君伊洛言歸舊壤是也以上言自梁歸魏之事擁旄江漢席捲樓船擁旄江漢謂為江陵防主也左傳正義曰江經南郡江夏弋陽安豐漢經襄陽至江夏安陸縣入江李廵曰旄牛尾著竿首過秦論曰有席捲宇内包括四海之意漢書曰楊僕為樓􅊑將軍成臯塵起廣武烽然漢書髙帝紀曰漢王引兵入渡河取成臯廣武孟康曰於榮陽築兩城相對名為廣武城在敖倉西三室山上麋興麗箭雁落驚弦左氏傳曰麋興於前射麋麗龜國策曰更嬴虚發而落雁以上言為江陵防主善用兵也總衞蘭錡申威河外西京賦曰武庫禁兵設在蘭錡自此以下言都督華州諸軍事山類鼓樓樹如車蓋水經注曰冀北有石鼓山將有兵此山則鳴西京雜記曰終南山有離合樹如車蓋一名華蓋樹都尉兩道將軍獨拜漢書曰武帝元鼎二年置三輔都尉又曰周亞夫為將軍居細栁言授偉華州諸軍事華州刺史也梧桐茂苑楊栁倡家千金回雪百日流霞吳都賦曰佩長洲之茂苑漢書師古注曰倡樂人也洛神賦曰飄颻兮若流風之回雪抱樸子曰仙人與流霞一杯飲之輒不饑渴以上言華州為佳麗之地窈窕繁華之所棲宿也凋零倏忽悽愴榮華倏忽疾也河陽古樹金谷殘花晉書曰石崇有金谷園又思歸引序曰河陽别業栢木幾於萬株隴昏雲暝山深路晩風氣纔髙松聲卽遠疇昔親友懽愉交結不為平生應為此别左氏傳曰疇昔之羊子為政疇昔猶言平日也周驃騎大將軍開府侯莫陳道生墓誌銘君諱道生字某朔州武川人也按北史及周書侯莫陳崇傳云代武川人父興此下文父少興疑卽是人道生疑卽侯莫陳順與崇為兄弟然史内無道生之名所未詳矣本系隂山出自國族降及於魏在秦作劉侯莫陳崇傳曰其先魏之别部居庫斛真水祖元以良家子鎮武川因家焉周書云太祖賜劉道德名亮幷賜姓侯莫陳氏是其先本姓劉矣魏拓跋氏系出隂山漢書匈奴傳曰自代並隂山下至髙闕為塞而置雲中雁門代郡又云匈奴失隂山過之未甞不哭也父少興武川鎭將山河抗拒關塞被邊早擅威聲咸多雄烈言少興有威名也君子讀書馬上清談劒端獨運六竒專精三略君子以下序道生也漢書曰陳平六出竒䇿黄石公記序曰黄石公者神人也有上略中略下略雖復身叅末將而勇冠旌門位在支軍而謀叅幕府史記曰范増為末將周禮曰為帷宮設旌門鄭注云樹旌以表門也漢書李廣傳曰莫府省文書師古曰莫府者以軍幕為義軍旅無常居止故以帳幕言之魏正光五年任統軍𨽻天柱爾朱榮征北海王永安三年隨太師賀拔勝入關侯莫陳順傳云初從爾朱榮為統軍後從賀拔勝鎭武陘道生豈卽侯莫陳順耶尋轉别將滑源巻甲關城束馬並皆剋㨗君有力焉按侯莫陳順傳武㤗初討葛榮平邢杲征韓婁皆有功又從破元顥皆同疑卽是人矣永熈三年補都督太祖文皇帝奄有關河令行天下以君幹略委之爪牙又按侯莫陳順傳加大都督從魏孝武入關順與太祖同里閈素相友善且其弟崇先在關中太祖見之甚歡太祖周太祖宇文㤗也漢書武帝報李廣曰將軍者國之爪牙也名洽中涓功叅上造韋昭國語注曰涓人今之中涓漢書顔師古注曰中涓官名居中而涓潔也公卿表爵一級公士二上造兵臨河曲前登白馬之津寇發蒲城先戰黄沙之苑史記髙祖本紀曰劉賈將卒二萬人騎數百渡白馬津索隱曰卽黎陽津也南界東郡白馬縣蒲城蒲州也河橋曰蒲津橋黄沙之苑卽沙苑也魏大統元年東魏將司馬子如自蒲津寇三年東魏寇龍門屯軍蒲坂宇文㤗大破東魏軍於沙苑是也卽所謂河橋沙苑之戰矣臨晉横船旣擒趙將漢書韓信傳曰齊趙魏反信陳船欲渡臨晉而伏兵從夏陽襲安邑虜魏王豹益兵三萬撃趙代破代禽夏説破趙二十萬衆誅成安君馬陵削樹復下齊兵史記曰魏與趙攻韓韓告急於齊齊使田忌為將而孫子為師齊軍入魏為十萬竈明日為五萬竈又明日為三萬竈龎涓行三日大喜曰吾固知齊軍怯入吾地三日士卒死者過半矣乃棄其歩軍與其輕鋭倍日幷行逐之孫子度其行暮當至馬陵乃斫大樹白而書之曰龎涓死此樹之下於是令齊軍善射者萬弩夹道而伏涓果夜至見白書乃鑚火燭之讀其書未畢萬弩俱發魏軍大亂龎涓乃自頸班瑞司勳披圗疏爵授驃騎大將軍金紫光祿大夫鄠縣開國公食邑五百戸道生疑卽侯莫陳順按本序與正史雖爵邑或殊紀年各異然於義似無所礙趙儼之為驃騎正駕單車張湛之拜光祿長乗白馬以斯連類朝野榮之魏志曰趙儼字伯然潁川陽翟人正始四年徵為驃騎將軍魏略曰舊故四征有官厨財物遷轉之際無不因緣而儼叉手上車發到霸上忘持其常所服藥雍州聞之乃追送藥材數箱儼笑曰人言語殊不易我偶問所服藥耳何用是為遂不取後漢書曰張湛字子孝扶風平陵人拜光祿勳光武臨朝或有惰容湛輒陳諌其失常乗白馬帝毎見湛輒言白馬生且復諫矣大統九年更姓侯莫陳氏侯莫陳亮傳云大統九年太祖賜劉道德名亮幷賜姓侯莫陳氏十年出為東雍州刺史本序上文在秦作劉又云大統九年更姓皆與彼同侯莫陳得姓始於劉亮矣隨大將軍拓跋遠經始陽二水長鬬三川無市擐甲構病死於轘門魏大統十五年東魏將髙岳起堰引洧水以灌城自潁川以北皆為陂澤冬十一月遣長孫儉討之長孫儉卽拓跋儉也國語曰榖洛二水鬭史記秦武王曰寡人欲車通三川韋昭曰伊洛河也春秋五十一贈持節都督朔州刺史君在武川文皇帝同鄉里侯莫陳順傳云順與太祖同里閈素相友善周書本紀云太祖文皇帝姓宇文氏諱㤗字黒獺代武川人也覇功旣立王業克成謂宇文㤗相魏漸成帝業也不忘捨講猶論償博言其與周太祖素相友善也東觀漢紀曰初光武學長安時過朱祐宅祐留上待講竟乃談話及帝登位駕幸祐第問曰得無捨我講乎祐曰不敢尤過也漢書遊俠及傳曰陳遵祖父遂宣帝微時與有故相隨博奕數負進宣帝卽位用遂稍遷至太原太守乃賜遂璽書曰制詔太原太守官尊祿厚可以償博進矣妻君寜時在旁知狀遂於是辭謝因曰事在元平元年赦令前其見厚如此今嗣德維新功臣追遠謂孝閔踐阼周德惟新也按順以閔帝踐阼之年薨東都馬鳴不無見日之嘆北陵車過終憶平生之言博物志曰漢滕公薨求𦵏東都門外公卿送𦵏駟馬不行跼地悲鳴跑蹄下地得石室有銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室遂𦵏焉北陵車過霍去病事去病冢在茂陵東北西都賦云北眺五陵茂陵在長安之北故曰北陵史記曰天子為治第令去病視之對曰匈奴未滅無以家為也上益愛重之及卒天子悼之發屬國𤣥甲軍陳自長安至茂陵為冢像祁連山按匈奴未滅無以為家此去病平生之言言贈驃騎大將軍也有詔更贈使持節驃騎大將軍開府儀同三司都督宜敷綘三州諸軍事敷州刺史諡某公禮也夫人拓跋氏安邑郡夫人拓跋氏魏之宗室也庭有鐘鼓家承箴誡教容教德言告言歸天和五年六月薨卽以其年十月同𦵏於京兆某縣洪源鄉武子成寢請西階而合𦵏平陽下嫁卽廬山而共墳檀弓曰季武子成寢杜氏之喪在西階之下請合𦵏焉許之入宫而不敢哭武子曰合𦵏非古也自周公以来未之有改也吾許其大而不許其細何居命之哭漢書曰衞青尚平陽主與主合𦵏起冢象廬山師古曰衞青冢在茂陵東次霍去病冢之西相並者是也銘曰凝隂遠寂廣漠平寒沙窮瀚海地盡臯蘭言其系出隂山本西北絶逺苦寒之地也左氏傳曰狄之廣莫於晉為都杜預曰廣莫狄地之曠絶也漢書霍去病傳曰登瀚海又云鏖臯蘭下如淳曰瀚海北海名也師古曰臯蘭山名也蘇林曰匈奴中山關名也塞鴻秋去胡桑夏乾風土壯氣山河凜然漢書地理志有雁門郡又稱代郡有桑乾縣乾音干按朔州武川本趙代之地西北金行之氣也師一作兵旅上谷威雄武川地理志云上谷郡秦置屬幽州道生父少興為武川鎮將故云君則繼踵代不乏賢匣有忠劒庭流孝泉言其世以忠孝相傳魏室多故餘風未殄天保讓德當途廢典詩序曰天保下報上也後漢書曰許昌氣見於當途當道而髙大者魏也當途廢典言魏衰也天保讓德言周盛也魏祚廢於當途周家盛如天保矣上將指蹤中涓力展天文志曰文昌六星一曰上將中涓注見本序洛城夜㨗河梁朝剪洛城夜㨗謂破元顥等軍也河梁河橋也蓋言河橋之戰鐵劒金龜榮追玉鉉漢書儀曰列侯黄金龜易鼎卦爻辭曰鼎玉鉉言以勲封開國公也身胄漢祚門承魏緒並擅華宗俱稱當路本姓劉氏故云漢祚為魏國族故云魏緒陸機周處碑曰華宗往茂趙氏孟子注曰當路當仕路也言賜姓侯莫陳氏也伉儷云匹年齡並故趙瑟秦聲同為丘墓言與夫人李氏合𦵏也伉儷夫婦也左氏傳曰已不能庇其伉儷又曰秦晉匹也漢書曰楊惲報孫㑹宗書家本秦也能為秦聲婦趙女也雅善鼔瑟春秋説題辭曰丘者墓也小陵石槨洪源鄉墓廣雅曰小陵曰丘禮記曰桓魋自為石槨三年不成孔子曰若是其靡也死不如速朽洪原鄉墓謂同𦵏於京兆之洪源鄉也芻靈兩引池栁雙前禮記曰塗車芻靈自古有之也芻草也言束草為人馬也周禮縫人及喪大記註池栁飾棺帷荒也隧路仍合松城卽連左氏傳曰晉侯請隧杜預曰闕地通路曰隧仲長子古之𦵏者松栢梧桐以識其墳松城卽佳城也霜隨栁白月逐墳圓芝蘭幾代陵谷何年詩曰髙岸為谷深谷為陵周車騎大將軍贈小司空宇文顯和墓誌銘公諱顯和字某上黨武鄉人也周書顯和宇文神舉之父神舉有傳自大霧浮河長虹映渚承源於若一作别水纂系於蒼林宇文氏本炎帝神農之後與後周同姓是為國族竹書紀年云黄帝五十年秋七月庚申天霧三日三夜晝昏帝遊於洛水之上見大魚殺五牲以醮之天乃甚雨七日七夜魚流於海得圗書焉龍圗出河龜書出洛又曰帝顓頊高陽氏母曰女樞見瑤光之星如虹感巳於幽房之宫生顓頊於若水春秋元命苞曰大星如虹下流華渚女節夢意感生朱宣宋均曰朱宣少昊氏也史記曰黄帝子昌意降居若水漢書古今人表云嫫母生蒼林嫫母黄帝次妃也若水蒼林皆姬姓之祖言其與國同姓若姬宗矣上黨居韓之西常山在趙之北因地為氏可略而言焉言宇文氏得姓之由也周書帝紀曰有葛烏菟者其後曰普回得皇帝璽以為天授其俗謂天曰宇謂君曰文因號宇文國幷以氏焉漢書地理志曰秦置上黨郡屬幷州有上黨關髙帝置常山郡屬冀州張宴曰恒山在西避文帝諱故改曰常山言於韓趙之地得姓為宇文氏矣祖求南衞將軍冀州刺史周書宇文神舉傳云髙祖晉陵曽祖求男仕魏並顯逹神舉曽祖顯和祖矣父金殿鎭遠將軍兗州刺史周書云魏鎭遠將軍兗州刺史安吉縣侯並控鶴兵俱張戎樂聲榮之盛繼踵當年言求南金殿父子並有盛名也莊子曰君必無盛鶴列於麗譙之間按西戎樂曰沫離故云戎樂公稟山嶽之靈擅風雲之氣容止矜莊聲名籍甚彎弧挽強左右馳射故得名髙上谷威振樓煩襲爵安吉縣侯食邑五百戸周書曰顯和少而襲爵性矜嚴頗渉經史膂力絶人彎弓數百斤能左右馳射魏孝武之在藩也顯和早蒙眷遇時屬多難甞問計於顯和和具陳宜杜門晦迹相時而動武帝深納焉及卽位擢授冠軍將軍閣内都督封城陽縣公邑五百戸孝武以顯和藩邸之舊遇之甚厚時顯和所居宅隘陋乃撤殿省賜為寢室漢書地理志云上谷郡秦置又雁門郡有樓煩上谷樓煩故燕趙地也永興三年幽幷叛換有無君之心謂齊神武也魏本紀云孝武永熈元年改元永興以同明元時年號三年髙歡引軍東度入洛武帝西遷漢書注云叛換猶跋扈強恣貌詩皇矣云無然畔援帝顧謂公曰天下洶洶將若之何漢書髙帝曰天下匈匈勞苦數歲師古曰匈匈喧擾之意公曰擇善而從之乃誦詩云彼美人兮西方之人兮邶風簡兮卒章之詩也鄭箋曰彼美人謂碩人也思周室之賢者以其宜薦碩人與在王位周書云齊神武專政帝每不自安謂顯和曰天下洶洶將若之何對曰當今之計莫若擇善而從之因誦詩云帝曰是吾心也乃定入關之䇿武帝西遷長安以公母老家大令預為計公曰今日之事忠孝不並君不密則失臣臣不密則失身二語出易繫辭帝愴然改容曰卿是我王陵周書云帝以顯和母對老家累又令預為計曰今日之事忠孝不两立然臣不密則失身安敢預為私計帝愴然改容曰卿卽我之王陵也班彪王命論曰王陵為漢將而母獲於楚有漢使来陵母見之謂曰願告吾子漢王長者必得天下子謹事之無有二心遂對漢使伏劒而死以固勉陵其後果定於漢陵為漢宰相封侯顯和隨帝西遷母必見獲於髙歡故帝以為比遷朱衣直閣閣内大都督改封長廣縣公邑一千五百戸武帝初至潼關太祖親迎溱水魏本紀云武帝至稠桑潼關宇文㤗遣趙貴等奉迎帝過河㤗迎帝於東陽太祖素知公名而未之識也目於衆疑而不問直云令此人射水傍小鳥應手即著太祖喜云我知卿名矣周書曰從帝入關至溱水太祖素聞其善射而未之見也俄而水傍有一小鳥顯和射而中之太祖笑曰我知卿工矣即用為帳内都督滄州諸軍事滄州刺史増邑幷前二千五百戸黄公衡之決事魏后是以推心潘承明之忠壯吳王為之降禮異代同榮見之今日蜀志曰黄權字公衡巴西䦘中人也蜀記曰魏明帝即權天下鼎立當以何地為正權對曰當以天文為正往者熒惑守心而文帝崩吳蜀二主平安此其徵也吳志曰潘濬字承明武陵漢壽人也江表傳曰權克荆州將吏悉皆歸附而濬獨稱疾不見權遣人以牀就家輿致之濬伏而著牀席不起涕泣交横哀咽不能自勝權慰勞與語呼其字曰承明昔觀丁父鄀俘也武王以為軍師彭仲爽申俘也文王以為令尹此二人卿荆國之先賢也初雖見囚後皆擢用為楚名臣卿獨不然未肯降意將以孤異古人之量耶使親近以手巾拭其面濬起下地拜謝卽以為治中荆州東夏邊隅地連荒服井陘塞道飛狐路斷謂出為東夏刺史也禹貢曰五百里荒服漢書師古注曰又次要服外五百里此五服之最外者也荒言其荒忽各因本俗漢書曰髙帝三年韓信張耳東下井陘撃趙斬陳餘獲趙王歇置常山代郡又匈奴傳曰趙屯飛狐口師古曰險阨之處在代郡之南南衝燕趙之中乃以公為使持節衛將軍都督東夏州諸軍事東夏州刺史白波清犢之兵銅馬金繩之亂莫不交臂屈膝牽羊抱馬後漢書朱儁傳曰自黄巾賊後復有黒山黄龍白波等賊其後多為袁紹所定又光武紀曰别號諸賊銅馬及青犢等各領部曲章懐太子注曰銅馬賊帥東山荒秃上淮况等並見東觀記交臂屈膝牽羊抱馬者言皆降附也左傳曰楚圍鄭克之鄭伯肉袒牽羊以逆後漢書曰耿秉撃車師車師王抱馬足降在州遘疾解任還朝小馬留廐餘牀掛柱吏人攀戀刋石陘山雖非漢陽之城還似扶風之路言漢陽諸葛扶風王駿並刋碑石也見蜀志及晉書授使持節車騎大將軍儀同三司加散騎常侍以魏後元年周書云魏恭帝元年疾甚亡於同州春秋五十七天子輟樂羣公㑹喪太祖親臨弔祭哀慟左右本傳云太祖親臨之哀慟左右於時兵革交侵普斷贈諡卽以本官印綬權𦵏於同州之北山今建德二年二月二十三日遷𦵏於咸陽長安縣之洪瀆原時逢禮樂之遷代屬謳歌之變國雖異政人足追榮謂周革魏命和雖魏臣亦䝉追贈也乃贈使持節驃騎大將軍開府儀同三司小司空丹延綏三州諸軍事延州刺史本傳同諡某公禮也夫人髙氏渤海人也柔參晉政拒曹爽之異謀起在漢庭共王陵而俱對言髙氏之先也魏志曰髙柔字文惠陳留圉人也太傅司馬宣王奏免曹爽皇太后詔召柔假節行大將軍事據爽營太傅謂柔曰君為周勃矣爽誅進封萬歲鄕侯漢書曰髙帝五年置酒雒陽南宫上曰通侯諸將毋敢隐朕皆言其情吾所以有天下與項氏所以失天下者何髙起王陵對曰陛下慢而侮人項羽仁而敬人然陛下使人攻城略地所降下者因以與之與天下同利也項羽妬賢嫉能得地而不與人利此其所以失天下也孟康曰姓髙名起况乎箴訓有儀言容以德肅恭中興賢才内則豈直不聽雜樂以變齊國之風不食鮮禽以斷荆王之獵列女傳曰齊侯衛姬者衞侯之女齊桓公之夫人桓公好淫樂衞姬為不聽鄭衞之聲又曰樊姬者楚莊王之夫人莊王初卽位好狩獵畢弋樊姬諌不止乃不食禽獸之肉三年王改昔之命𦵏季武子之西寢今之同穴長平侯之北陵檀弓曰季武子成寢杜氏之葬在西階之下請合𦵏許之漢書曰衞青封長平侯與平陽公主合𦵏世子神舉兄弟周書有傳兄弟謂神舉與弟神慶也至性純孝善居喪禮有終有始於身無改是以宦成名立孝顯忠貞周書曰神舉偉風儀善辭令博渉經史性愛篇章尤工騎射臨戎對冦勇而有謀莅職當官毎著聲績兼好施愛士以雄豪自居故得兼任文武聲彰中外百僚無不仰其風則先輩舊齒至於今而稱之神慶少有壯志武藝絶倫位至柱國汝南郡公銘曰北岳二名蔥河兩本其峻惟極其源惟遠北岳恒山也一名常山故云二名漢書西域傳曰河有兩源一出蔥嶺山一出于闐于闐在南山下其河北流與蔥嶺河合東注菖蒲海禮記曰峻極于天言宇文氏起家在於西北之地也俗禀山川人資台袞義烈桓桓才雄悃悃言西北之地多産忠武之人也尚書曰桓桓如虎如貔如熊如羆按悃悃誠也説文曰悃悃誠志也乃祖乃父繼踵威雄摐金北陸鳴玉南宫謂祖求父金殿聲榮繼踵也北陸疑卽博陸薛瓉曰按漁陽有博陸城漢書曰博陸武帝封大司馬霍光為柱國文頴曰博大陸平取其嘉名而無其縣食邑北海河東又按爾雅云髙平曰陸北陸北方之總名也後漢書曰肅宗詔賈逵入講尚書南宫雲臺是雲臺在南宫也又縣名史記曰南宫公主注正義曰南宫冀州縣也和祖求為冀州刺史豈謂是耶隱若吳漢賢哉竇融負霜依德無雷向風後漢書曰吳漢字子顔南陽宛人帝嘆曰吳公差彊人意隐若一敵國矣竇融字周公扶風平陵人後漢書西域傳曰月氏為匈奴所滅遷於大夏分其國為五部貴霜翎侯自立為王國號貴霜王漢書西域傳曰無雷國王治盧城去長安九千九百五十里挺此含章生茲秉德孝實天性忠為人則謂誕生顯和有忠孝之性也周易曰含章可貞暢轂鏤膺燕南趙北若一作弱水將通九部可勒詩曰文茵暢轂又曰虎韔鏤膺後漢書曰燕南垂趙北際漢書曰西至沬若水張揖曰若水出旄牛徼外九部九州謂將勒勳於九州也帷幄參謀宫帷典職善擇忠言能防變色繁弱巳勁淇園乃直㦸中小支禽穿左翼謂從孝武入關周文帝令射水傍小鳥也繁弱弓名左氏傳曰封父之繁弱後漢書寇恂傳曰伐淇園之竹為矢百萬建旟赤谷揮戈武州長城萬里河水雙流謂和鎭東夏州也漢書西域傳曰烏孫國大昆彌治赤谷城武川恒州之武川縣也漢書嚴尤曰秦築長城之固延袤萬里又西域傳曰河有兩原一出蔥嶺一出于闐潁川多恙淮水未廖義重穿壁恩深置郵神仙劉根傳曰潁川太守髙府君病從根求消除病氣之術漢書汲黯多病居淮陽吳志曰呂䝉疾權穿壁窺之凌綂卒二子列封權内飬於宫令葛光教之讀書十日一令乗馬于谷之口于渭之陽丘山零落碑闕低昂草銜秋火樹抱春霜書劒俱沒人琴並亡謂顯和𦵏於咸陽也漢書地理志曰馮翊有谷口扶風有渭城故咸陽也曹子建詩云零落歸山丘月令曰腐草為螢世説曰王子猷子敬俱病篤子敬先亡奔喪都不哭徑入坐靈牀上取子敬琴彈弦既不調擲地云子敬子敬人琴俱亡因慟絶良乆月餘亦卒哀哀嗣子純心靡託孝水未枯悲松先落言神舉兄弟居喪以禮也西征賦曰澡孝水以濯纓悲松卽王褒攀栢樹枯事松栢通稱矣室進巢鵀門通弔鶴功臣身隕㑹圗麟閣魏志曰鉅鹿張臻養志不仕正始元年戴鵀之鳥巢臻門隂臻曰夫戴鵀陽鳥而巢門隂此凶祥也旬日而卒陶侃别傳曰侃丁母憂忽有二客来弔不哭而退羽儀鮮異知非常人遣隨視之但見雙鶴冲天而去漢書宣帝圗霍光等十一人於麒麟閣周大將軍瑯邪定公司馬裔墓誌銘公諱裔字遵𦙍河内溫人也南正司天北正司地是謂羲和之官卽嗣重黎之政楚語曰顓頊命南正重司天以屬神火正黎司地以屬民堯復育重黎之後不忘者使復典之以至於夏商故重黎氏世序天地在周為司馬氏程伯休父其後也卭之歸楚與章邯而並封豫之避秦共毛公而俱去司馬遷自序曰卭為武信君將而徇朝歌諸侯之相王王卭於殷漢書曰項羽三分關中立秦三將章邯為雍王趙將司馬卭為殷王是與章邯同時封也司馬豫未詳集中司馬裔碑文云東海避秦共毛公而俱隱此云豫之避秦知司馬名豫東海人也祖金龍仍居選部水鏡三臺北史本傳云金龍吏部尚書後漢書袁紹傳曰坐召三臺專制朝政注云晉書曰漢官尚書為中臺御史為憲臺謁者為外臺是為三臺父悦再牧荆河威風千里本傳云悦豫州刺史禹貢曰荆河惟豫州集中司馬裔碑文曰荆河刺舉是也而身遭禍機遂為季布所哭獲存遺嗣實賴程嬰之忠言悦為豫州叛人白皁生所殺也詳見司馬裔碑季布疑作欒布轉冩之誤也漢書曰彭越梟首洛陽下詔有收視者輒捕之布還奏事彭越頭下祠而哭之史記曰屠岸賈作難追論趙盾弑君之罪誅趙氏程嬰匿趙武於山中十五年因晉侯有疾韓厥請立武為趙氏後以喻悦遭禍機裔為遺嗣也國家追念功臣更撫叔敖之子言思官族還求女齊之𦙍言魏室念悦為嗣遂辟裔也列子曰孫叔敖疾將死戒其子曰王亟封我矣吾不受也為我死王必封汝汝必無受利地吳越之間有寢丘者此地不利而名甚惡楚人鬼而越人禨可長有者惟此也孫叔敖死王果以美地封其子子辭而不受請寢丘與之至今不失晉語曰叔向見司馬侯之子撫而泣之曰自此其父之死吾蔑與比而事君矣昔者此其父始之我終之我始之夫子終之無不可籍偃在側曰君子有比乎叔向曰君子比而不别比德以贊事比也引黨以封已利巳而忘君别也韋昭曰司馬侯晉大夫女叔齊也公始應辟為河内功曹除員外郎常侍汲郡治兵黄河浮馬摧鋒軹關之㨗逐北長城之陣授平東將軍北徐州刺史北史本傳云大統三年大軍復𢎞農乃於温城送欵歸西魏六年授北徐州刺史漢書地理志曰河内郡有汲縣有温縣軹縣晉志曰㤗始二年置汲郡司馬裔於温城起義是其地也栁泉風塵三城席巻北史本傳云十三年攻拔東魏平齊栁泉蓼塢三城棠隂鋒鏑千室入關本傳云十五年太祖令山東立義諸將有能率衆入關者並加重賞裔領戸千室先至遷車騎大將軍儀同三司開國龍門縣伯仍除巴州刺史本傳云周孝閔踐祚除此官也雖復巴水三迴夷歌數曲徒逢白竹之弩已濟青衣之功後漢書曰閬中有渝水其人多居水左右天性多勁勇初為漢前鋒數陷陣俗喜歌舞髙祖觀之曰此武王伐紂之歌也乃命樂人習之所謂巴渝舞也華陽國志曰秦昭襄王時有一白虎常從羣虎數遊秦蜀巴漢之境傷害千餘人昭王乃重募國中有能殺虎者賞邑萬家金百鎰時巴郡閬中夷人能作白竹之弩乃登樓射殺白虎昭王嘉之乃刻石盟要至髙祖為漢王發夷人還定三秦旣定乃遣還巴中號板遁蠻夷青衣地名漢書地理志曰蜀郡青衣縣禹貢蒙山谿大渡水東南至南安入城朝廷以漢之功臣須開上將之府晉之代胄宜紹瑯邪之國漢書霍去病傳曰定令驃騎將軍祿秩與大將軍等下云遷驃騎大將軍是也晉之代胄謂裔晉朝宗室司馬氏之後也宜紹瑯邪之國者謂曽祖楚之襲封瑯邪郡王世襲瑯邪下云封瑯邪公矣遷驃騎大將軍開府改封瑯邪公食邑一千五百戸宫闈近密實俟忠貞詔為大御伯仍除大御正職司常伯任總䕫龍王道旣平絲言惟允漢官儀曰侍中周官號曰常伯䕫龍帝舜時典樂納言之官尋除始州刺史都督始州諸軍事蠻夷恃險狼顧鴟張謂蠻酋冉令賢等反也髙山尋雲深谷無景淮南兵略訓曰山髙尋雲谿肆無景九地縱横三門起伏峰危馬束水險橋飛遂得谷静山空冰消霧散本傳云天和初信州蠻酋冉令賢反連結二千餘里裔從上庸公陸騰討之裔自開州道入先遣使宣示禍福羣蠻服孫子兵法曰善守者藏於九地之下善攻者動於九天之上後漢書注曰三門開門休門生門也仍為信州刺史都督信州諸軍事精兵守於白帝足懼巴州之城船柹下於荆州彌動西陵之戍本傳云五年遷潼州刺史六年徵拜大將除西寜州刺史郡國志曰公孫述號魚復為白帝城魚復漢屬巴郡晉書曰王濬造船於蜀其木柹蔽江而下卽授使持節大將軍都督西寜州諸軍事西寜州刺史將啓北戸之人向通雲南之國聞寵若驚奄從深夜本傳云未及之部卒於京師隋書地理志曰越巂郡改曰西寜州郡國志曰益州永昌郡有邪龍雲南老子曰寵辱若驚何謂寵辱寵為下得之若驚失之若驚是為寵辱若驚天和六年正月十八日亡春秋六十五詔贈本官加懷邵汾晉四州刺史諡定公本傳同一作莊禮也以建德元年七月十三日𦵏於武功郡之三畤原公愛敬純深有隱無犯忠貞亮直知無不為在戎四十二年身經六十九戰至於多竈唱籌並得成功飛沙擁石未甞乖律後漢書虞詡傳或曰孫臏減竈而君増之何也詡曰孫臏示弱吾今示彊勢有不同也晉書曰諸葛亮造八陣圗於魚復平沙上累石為八行相去二丈恂恂教義吳起西河之風閒閒旗鼓李牧長平之政史記曰魏文侯以吳起善用兵廉平盡得士心乃以為西河守以拒秦韓又曰李牧者趙之北邊良將也常居代雁門備匈奴厚遇戰士為約曰匈奴卽入盜急入收保有敢捕虜者斬匈奴以李牧為怯邊士日得賞賜而不用皆願一戰於是悉勒習戰大縱畜牧人民滿野單于聞之大率衆来入李牧多為竒陣大破之其後十餘歲匈奴不敢近趙邊城長平趙地名身死之日家無餘財山木所資一由詔𦵏有始有卒生榮死哀銘曰祝融是命重黎克舉公族乃建天官卽一作代序謂司馬氏本祝融重黎之後也左傳有公族大夫國語曰重黎氏世序天地司馬遷作史記有天官書避世於秦承家於楚謂司馬豫避秦司馬卭為楚項籍所封也論語云賢者避世周易曰開國承家金行失馭玉鏡淪輝我之烈祖識變乘機謂晉祚衰微劉裕誅司馬氏楚之逃匿濟江及宋受禪楚之歸魏也晉以金德王故云金行答賔戲曰王塗蕪穢因失其御尚書帝命期曰桀失其玉鏡而用其噬虎烈祖謂楚之也楚之為裔曽祖黄旗東没青蓋西飛落星置道長州出圍謂宋受晉禪楚之西歸得封郡王也吳志陳紀曰黄旗紫氣運在東南東沒言東晉之亡也後漢書輿服志曰王青葢車西飛言歸西魏封瑯邪王也吳都賦曰饗戎旅乎落星之樓劉逵注曰吳有落星樓樓在建鄴東北十里吳都賦又云佩長洲之茂苑按落星長洲皆吳地時宋都建鄴楚之自宋奔魏故云及我皇父荆河再撫謂楚之之後祖父世治荆州也皇父謂祖金龍也世遭喪亂身沒猾䜿謂父悦為豫州人白皁生所殺也嗟我遺嗣﨑嶇趙武寒覆鳥翼饑吞獸乳鳥翼史記大鳥覆棄事獸乳左傳謂鬭榖於菟是也獲歸河内更襲瑯邪謂裔始為河内功曹後封瑯邪郡公襲楚之之職也年方小馬怨結長蛇藏兵九地置劒千家雪山埋馬冰河陷車謂裔志在立功不為髙歡所屈領戸千室入關也小馬竹馬也言㓜有志節也長蛇指髙歡也左氏傳曰吳為封豕長蛇九地注見本序千家謂領戸千室也雪山埋馬冰河陷車言其身遭危難也旣乃班政超然榮守朱鷺頻飛金龜轉紐言裔受職刺史尋加遷轉也詩序曰振鷺二王之後来助祭也詩云振鷺于飛陸機疏云楚威王時有朱鷺合沓飛翔而来舞則復有赤者舊鼔吹朱鷺曲是也漢舊儀曰銀印背龜紐其文曰章謂刻曰某官之章也築塞長榆營軍髙栁玉案推食河橋勸酒漢書伍被曰廣長榆開朔方如淳曰長榆塞名地理志曰代郡髙栁西部都尉治楚漢春秋曰項王使武渉説淮隂侯信信曰臣事項王位不過中郎官不過執戟乃去楚歸漢漢王賜以玉案之食玉具之劒臣背叛之内愧於心晉書曰杜預以孟津渡險有覆沒之患請建河橋於富平津及橋成帝從百僚臨㑹舉觴屬預曰非君此橋不立也言徵拜大將時對揚休命也下文卒於京師矣石門冰釋金隄電散蘆水門關茅津成觀蜀都賦曰阻以石門劉逵曰曰石門在漢中之西褒中之北又蜀都賦曰西踰金隄劉曰金隄在岷山都安縣西隄有左右口當成都西也按裔為西寜州刺史西寜州故越巂郡石門金堤皆蜀地也冰釋電散言除西寜州未及之部而卒也魏略曰太祖拔漢中還到長安使屯池陽以備蘆水後漢郡國志曰河東郡大陽有茅津左氏傳曰秦伐晉遂自茅津濟杜預曰在縣西南有茅亭卽茅城蘆水門關茅津成觀者蘆水茅津皆秦地言其卒於京師也馭風逸翮脩途始半建武功臣先悲吳漢莊子曰列子馭風而行冷然善也脩途長途莊子所謂鵬飛九萬里是也建武光武帝年號後漢書曰吳漢字子顔南陽宛人建武二十年薨有詔悼愍賜諡曰忠貞言裔逸翮方若鵬程而半途摧折如建武時吳漢也沈寥揺落游揚浸微金城路㫁郿塢人稀地理志曰金城郡昭帝始元元年置臣瓚曰稱金取其堅固也師古曰以郡在京師之西故謂金城金西方之行魏志曰董卓築郿塢髙與長安城埓英雄記曰郿去長安三百六十里謂裔從信州刺史徵拜西寜州刺史未至西寜故云金城路㫁卒於長安故云郿塢人稀也風松雲葢白水山衣賢巳星隕人沒蘭衰晉陽秋曰張華將死中台星坼左氏傳曰鄭穆公刈蘭而卒周大將軍懷德公吳明徹墓誌銘公諱明徹字通昭南史作炤兗州陳書作南州秦郡人也西都列國長沙王功被山河東京貴臣大司馬名髙霄疑作江漢漢書曰吳芮秦時番陽令也甚得江湖心號曰番君項羽立芮為衡山王上徙為長沙王都臨湘髙祖賢之制詔御史長沙王忠其定著令後漢書曰光武即位拜吳漢為大司馬名髙江漢者言與征南大將軍岑彭等伐公孫述泝江而上也豈直西河有守智足抗秦建平有城威能動晉而巳也史記吳起傳曰魏文侯以吳起善用兵廉平盡得士心乃以為西河守以拒秦韓干寳晉紀曰王濬治船於蜀吾彦取其流柹以呈孫皓曰晉必有攻吳之計宜増建平兵建平不下終不敢渡江皓弗從按建平増兵乃吾彦之言此序吳姓豈謂吳彦耶或以故吳開國造自㤗伯故稱其疆域矣祖尚南譙太守父標南史作樹右軍將軍抗拒淮沂平夷濟㵕疑作漯代為名將見於斯矣漢書師古曰淮出大復山沂出㤗山禹貢兗州云浮於濟漯師古曰漯水出東郡東武陽公志氣縱横風情倜儻南史本傳云明徹㓜孤性至孝年十四墳塋未脩家貧無以取給乃勤力耕種時天下亢旱苗稼焦枯明徹哀憤每之田號哭仰天自訴居數日有自田中還者曰苗已更生明徹疑其紿已乃徃如言秋而大獲足充𦵏用時有伊氏者善占墓謂其兄曰君𦵏日必有乘白馬逐鹿者經墳此最小孝子大貴之徵至果有應明徹乃樹之小子也圯橋取履早見兵書竹林逢猿徧知劒術史記曰張良常從容歩遊下邳圯上有一老父衣褐至良所直墮其履圯下謂良曰孺子下取我履履我良因長跪履之父嘆曰孺子可教後五日雞鳴往出一編曰讀此則為王者師矣旦視其書乃太公兵法也吳越春秋曰袁公與處女試劒竹枝上袁公卽飛上樹變為白猿遂别去見越王王卽加女號曰越女乃命五板之隊長髙習之教軍士當世莫能勝越女之劒故得勇爵登朝材官入選起家東宫司直後除左軍葛瞻始嗣兵戈仍遭蜀滅陸機纔論功業卽値吳亡公之仕梁未為逹也謂明徹方仕於梁卽遭侯景之亂也蜀志曰諸葛亮子瞻字思逺景權四年為行都䕶衞將軍平尚書事六年鄧艾伐蜀遣書誘瞻曰若䧏者必表為瑯邪王瞻怒斬艾使遂戰大敗死衆皆離散艾長驅至成都晉書曰陸機以孫氏在吳而祖父世為將相有大勳於江表深慨孫皓舉而棄之乃論權所以得皓所以亡又欲述其功業遂作辨亡論二篇自梁受終齊卿得政禮樂征伐咸歸舜後陳氏本虞舜之後媯姓春秋時陳公子完奔齊其後世為齊卿終有齊國左傳云陳子得政言陳盛梁衰霸先得政擬於春秋陳常矣是以威加四海德教諸侯蕭索煙雲光華日月公以明略佐時雄圖贊務鱗翼更張風颷遂遠言陳武威德日盛明徹遂加匡贊也南史本傳云侯景寇都明徹有粟麥二千餘斛而鄰里饑餒乃白諸兄曰今人不圗乆柰何不與鄉里共此於是計口平分同其豐儉羣盗聞而避焉賴以存者甚衆陳武帝鎭京口深相要結明徹乃詣武帝帝為降階執手即席明徹亦微渉書史經傳就汝南周𢎞正學天文孤虛遁甲略通其術頗以英雄自許武帝亦深竒之冠軍侯之用兵未必師古武安君之飬士能得人心擬於其倫公之謂矣冠軍侯驃騎將軍霍去病也漢書霍去病傳曰上甞欲教之孫吳兵法對曰顧方略何如耳不至學古兵法戰國䇿曰秦將白起為武安君為左衞將軍尋遷鎭軍丹陽尹本傳云陳武受禪授安南將軍文帝時尋加右衞將軍至廢帝卽位遷丹陽尹北軍中候總政六師河南京尹冠冕百郡文武是寄公無愧焉本傳云詔以甲仗四十人出入殿省到仲舉之矯出宣帝也帝懼遣毛喜與明徹籌焉明徹曰嗣君諒闇萬機多闕殿下親實周召德冠伊霍願留中深計慎勿致疑漢書有北軍中候續漢志曰北軍中候一人六百石掌監五營尚書云張皇六師晉起居注曰武帝咸寜三年誥曰河南百郡之首風教宜為遐邇所模以王恂為河南尹時南朝都建業本漢丹陽郡徹為丹陽尹在京師矣蕭湘之役馮陵島嶼風船火艦周瑜有赤壁之兵葢舳襜艫魏疑作賀齊有横江之戰本傳云湘洲刺史華皎有異志詔授明徹都督湘州刺史與淳于量等討皎皎平左氏傳曰馮陵我城郭説文海中往往有山可依止曰島嶼島也吳志曰曹公入荆州權遂遣周瑜與備并力逆曹公遇於赤壁初一交戰曹公披退又曰瑜部將黄葢取蒙衝鬭艦數十艘實以薪草膏油灌其中同時發火時風甚猛悉延燒岸上營落煙燄張天曹公兵敗史記曰魏之諸公子曰魏齊范睢之讎也睢相秦魏齊奔趙復走信陵君聞信陵君之初難見之怒而自剄按魏齊無横江之戰事本文葢舳襜艫當是賀齊事賀訛魏轉寫之誤也吳志曰賀齊字公苗㑹稽山隂人拜安東將軍封山隂侯出鎭江上督扶州以上至皖黄武初魏使曹休来伐齊以道遠後至因往新市為拒㑹洞口諸軍遭風流溺所亡中分將士失色賴齊未濟偏軍獨全諸將倚以為勢齊性奢綺尤好軍事兵甲器械極為精好所乘船雕刻丹鏤青葢綘襜干櫓戈矛葩爪文畵弓弩矢箭咸取上材蒙衝鬭艦之屬望之若山休等憚之遂引軍還晉書華譚遺顧榮等書云飛橋越横江之津汎舟渉瓜歩之渚郡縣志曰横江浦在和州對江之采石往来濟渡處唐李白横江詞云横江舘前津吏迎此舘乃采石津官舎也仍為平南將軍開府儀同三司都督湘衡桂武四州刺史遂得左廣迴扃轔車反暢晉書地理志曰湘東郡吳置衡陽郡吳置桂陽郡漢置武昌郡吳置湘衡桂武四州是也左傳邲之戰云楚子為乘廣三十乘分為左右王乘左廣以逐趙旃又云其君之戎分為二廣杜元凱曰十五乘為一廣扃車上兵闌又左傳曰楚人惎之脱扃服子愼云扃横木挍輪一日車前横木詩秦風曰有車鄰鄰毛傳曰暢轂長轂暢長也長沙楚鐵更入兵欄洞浦藏犀還輸甲庫言其為湘衡桂武四州刺史饒於戰具也郡國志曰長沙郡秦置晉書地志曰武昌郡鄂縣有新興馬頭鐵官楚辭曰操吳戈兮被犀甲雖復戎歌屢凱軍幕猶張淮南望廷尉之囚合淝稱將軍之寇莫不失穴驚巢沈水陷火言明徹北征擒王琳也本傳云太建五年朝議北征公卿互有異同明徹決策請行總衆軍十餘萬發都督緣江城鎭相續降欵軍至秦郡齊大將軍尉破胡將兵為援秦郡降進剋仁州逼壽陽齊遣王琳拒守明徹乘夜攻之中宵而潰齊兵退據相國城及金城明徹令軍州益脩攻具又遏淝水灌城城中苦濕多腹疾手足皆腫死者十六七㑹齊將皮景和率兵數十萬来援去壽春三十里頓軍不進明徹曰兵貴神速而彼結營不進自挫其鋒吾知其不敢戰明矣於是躬擐甲胄四面疾攻城中震恐一鼓而禽王琳送建鄴周禮曰王師大獻則合奏愷樂三略軍讖曰軍幕未辦將言不倦晉書蘇峻傳曰晉使持節冠軍將軍歴陽内史峻不應命朝廷遣使諷諭之峻曰臺下云我欲反豈得活耶我能山頭望廷尉不能廷尉望山頭於是遣叅軍徐㑹結祖約為亂溫嶠陶侃唱義於武昌峻突陣墜馬為侃將所斬又陳敏傳曰東海王越起敏為右衞將軍假節前鋒都督敏因中國大亂遂請東歸收兵據歴陽教甘卓假稱皇太弟命拜敏為揚州刺史敏弟昶將兵數萬據烏江弟恢率錢端等南寇江州刺史應邈奔走弟斌東略遂據有吳越之地敏命寮佐以已為都督江東軍事大司馬楚公封十郡加九鍚列上尚書稱自江入河奉迎鑾駕敏無遠略一旦據有江東政刑無章不為英俊所服周玘顧榮甘卓遂背敏敏衆潰散敏單騎東奔至江乘為義兵所斬晉書地志曰歴陽合淝烏江皆屬揚州淮南郡淮南廷尉之囚蘇峻事合淝將軍之寇陳敏事二人皆晉反將以喻王琳之抗陳也王琳西攻岳陽東拒陳武實梁室之忠臣於陳為罪徹本陳將故云是矣為使持節侍中司空車騎大將軍都督南北兗青譙五州諸軍事南兗州刺史南平郡開國公食邑八千戸鼔吹一部本傳云詔遣蕭淳就壽陽授策明徹於城南設壇士卒二十萬陳旗鼔戈甲登壇拜受成禮而退六年自壽陽入朝輿駕幸其第賜鐘磬一部七年進攻彭城至吕梁又大破齊軍八年進位司空給大都督鈇鉞龍麾尋授都督南兗州刺史中台在𤣥武之宫上將列文昌之宿髙蟬臨鬢吟鷺陪軒平陽之邑萬家臨淄之馬千駟坐則玉案推食行則中分麾下生平若此功業是焉晉書天文志曰三台六星兩兩而居起文昌列抵太微一曰天柱三公之位也在人曰三公在天曰三台主開德宣符也西近文昌二星曰上台為司命主壽次二星曰中台為司中主宗室東二星曰下台為司祿主兵所以昭德塞違也𤣥武之宫謂北宫也北方曰𤣥武又天文志曰文昌六星在北斗魁前主集計天道一曰上將大將軍建威武後漢書輿服志曰侍中二常侍加黄金璫附蟬為文貂尾羽飾謂之趙惠文冠詩有振鷺之篇故云吟鷺漢書曰曹參食邑平陽萬六百三十戸號曰平陽侯論語曰齊景公有馬千駟臣瓚曰臨淄卽營丘也故晏子曰始爽鳩氏居之逢伯陵居之太公居之又曰先君太公築營之丘齊城中有丘卽營丘也楚漢春秋韓信曰臣去楚歸漢漢王賜以玉案之食後漢書曰光武拜鄧禹為前將軍持節中分麾下精兵二萬人遣西入關旣而金精氣壯師出有名石鼓聲髙兵交可遠此下皆序破齊之功也天官星占曰太白金之精大將之象也郭璞山海經注曰今鄴西北有鼔山下有石鼔象縣著山旁鳴則有軍事按鄴北齊所都言伐齊也故得艫舳所臨葢於淮泗旌旗所襲奄有龜蒙漢書武帝紀曰舳艫千里李斐曰舳船後持柁處也艫船前頭刺櫂處也禹貢曰道淮自桐栢東㑹於泗沂東入於海淮泗二水名也又曰正東曰青州川曰淮泗周禮曰析羽為旌熊虎為旗魯頌曰奄有龜蒙毛傳曰龜蒙二山名魏將已奔猶書馬陵之樹齊師其遁空望平隂之烏虞喜志林曰濮州甄城縣東北六十餘里有馬陵澗谷深可以置伏按龎涓敗卽此也左傳襄十八年平隂之戰云師曠告晉侯曰鳥烏之聲樂齊師其遁叔向曰城上有烏齊師其遁俄而南仲出車方叔涖止暢轂文茵鉤膺鞗革遂以天道在北南風不競此下序明徹之敗也小雅出車云王命南仲采芑云方叔涖止秦風小戎云文茵暢轂毛傳云文茵虎皮也暢轂長轂也采芑之詩云鉤膺鞗革毛傳曰鉤膺樊纓也鄭箋曰鞗革轡首垂也疏云言鉤膺樊纓者鉤是金路在膺之飾惟有樊纓故云鉤樊纓也巾車注云鉤婁頷之飾也金路無鍚有鉤亦以金為之是鉤用金在頷之飾也彼注又曰樊讀如鞶帶之鞶謂今大革纓今馬鞅金路其樊及纓以五采罽飾之而九成是帶鞅在膺也左氏傳曰晉人聞楚師師曠曰不害吾驟北風又歌南風南風不競多死聲楚必無功董叔曰天道多在西北南師不時必無功謂明徹敗於周師是天道在北南師無功也昔者裨將失律衞將軍於是待罪中軍爭濟荀桓子於焉受戮心之憂矣胡以事君本傳云及周滅齊宣帝將事徐兗太建九年詔明徹北侵令其子慧覺攝行州事軍至呂梁周徐州總管梁士彦率衆拒戰明徹頻破之仍迮清水以灌其城攻之甚急環列舟艦於城下周遣上大將軍王軌救之輕行自清水入灌口横流竪木以鐵鎻貫車輪遏㫁船路諸將聞之甚恐議欲破堰拔軍以舫載馬馬明戍裴子烈曰君若决堰下船船必傾倒豈可得乎不如前遣馬出適㑹明徹苦背疾甚篤知事不濟遂從之乃遣蕭摩訶帥馬軍數千前還明徹仍自決其堰以退軍及至清口水力微舟艦並不得度衆軍皆潰明徹窮蹙乃就執以憂遘疾卒史記曰右將軍蘇建前將軍信與匈奴並軍三千餘騎獨逢單于兵與戰一日餘漢兵且盡翕䧏單于建獨以身得亡去自歸大將軍大將軍問其罪周霸曰自大將軍出未甞斬裨將今建棄軍可斬以明將軍之威大將軍曰青幸得以肺腑待罪行間不患無威而霸説我以明威甚失臣意具報天子天子自裁之遂囚建詣行所在入塞罷去天子不誅左傳鄢陵之戰云荀林父將中軍先縠佐之及河鄭及楚平桓子欲還彘子不可曰以中軍佐濟晉師敗績桓子請死晉侯欲許之士貞子諌曰不可晉侯使復其位裨將失律中軍争濟以比馬明戍裴子烈之失計也漢書曰項籍為裨將師古曰裨助也相副助也又按裨小也若裨王裨海矣宣政元年届於東都之亭有詔釋其鸞鑣蠲其亹疑作釁社始𢎞就館之禮卽受登壇之策拜持節大將軍懷德郡開國公邑二千戸周書云宣政元年三月破陳師於呂梁擒其將吳明徹等俘斬三萬餘人南史本傳云周封懷德郡公位大將軍云釋其鸞鑣者謂釋去其兵車也詩曰輶車鸞鑣毛傳曰在軾曰和在鑣曰鸞左氏傳曰錫鸞和鈴杜注云鸞在鑣動有鳴聲爾雅曰鑣謂之钀郭注云馬勒旁鐵也云蠲其釁社者謂免其死也左傳孟明曰君之惠不以纍臣釁鼓杜云殺人以血塗鼔謂之釁計覲反漢書敘傳曰貳師秉鉞身釁胡社李竒曰李廣利胡殺之以血塗社也師古曰釁者以血祭耳非塗之血也歸平津之館時聞櫪馬之嘶舎廣成之傳裁見諸侯之客漢書公孫𢎞傳曰武帝封丞相𢎞為平津侯𢎞乃起賔館開東閣以延賢與參謀議史記藺相如傳曰趙使相如奉璧入秦秦王許齋五日舎相如廣成傳舎索隱曰廣成是傳舎之名言明徹在周待以客禮也廉頗眷戀寜聞更用之期李廣盤桓無復前驅之望言明徹不能復用於陳也史記曰趙孝王卒襄王立使樂乘代廉頗頗怒攻樂乗遂奔魏之大梁乆之魏不能信用趙以數困於秦兵趙王思復得廉頗頗亦思復用於趙趙王使使者視廉頗尚可用否亷頗之讎郭開多與使者金令毁之趙使者旣見廉頗頗為之一飯斗米肉十斤被甲上馬以示可用趙使者還報王曰廉將軍尚善飯與臣坐頃之三遺矢矣遂不召又李廣傳曰廣嘗與望氣王朔燕語曰自漢撃匈奴而廣未嘗不在其中諸將校尉以下才能不及中人然以撃匈奴功封侯者數十人然無尺寸之功以得封邑者何也豈吾相不當侯乎廣自請曰臣部為前將軍乃徙令臣出東道日臣結髮而與匈奴戰今乃一得當單于臣願居前先死單于大將軍亦隂受上誡以為李廣數竒無令當單于霸陵醉尉侵辱可知東陵故侯生平巳矣漢書李廣傳曰廣與趙潁隂侯屏居藍田南山中射獵嘗從一騎出從人田間飲還至亭霸陵尉醉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何故也止李廣宿亭下又蕭何傳曰召平者故秦東陵侯秦破為布衣貧種瓜長安城傷明徹困辱於周不能復為陳用也大象二年七月二十八日氣疾暴増奄然賔舘本傳云以憂遘疾卒於長安春秋七陳書作六十七卽以其年八月十九日寄瘞於京兆萬年縣之東郊詔贈某官諡某禮也江東八千子弟從項籍而不歸海島五百軍人為田横而俱死焉漢書曰項籍殺㑹稽太守遂舉吳中兵使人收下縣得精兵八千人及敗曰籍與江東子弟八千人渡而西今亡一人還縱江東父老憐而王我我何面目見之哉又田横傳曰漢王立為皇帝横懼誅而與其徒屬五百人入海居隖中髙帝聞而召之横自剄令客奉其頭從使者馳奏之髙帝帝流涕而拜其二客為都尉發卒二千人以王者禮𦵏横旣𦵏二客穿其冡旁皆自剄帝大驚以横之客皆賢者吾聞其餘尚五百人在海中使使召至聞横死亦皆自殺嗚呼哀哉毛脩之埋於塞表流落不存陸平原敗於河橋死生慚恨南史曰毛脩之字敬文滎陽陽武人也宋武帝欲引為外助頻加榮爵為安西司馬桂陽公義眞敗為赫連勃勃所擒及赫連昌滅入魏身遂死於魏晉書曰陸機為長沙王又敗於河橋孟玖譖於成都王潁潁殺之反公孫之柩方且未期歸連尹之尸竟知何日左傳哀十五年云夏楚子西子期伐吳及桐汭陳侯使公孫貞子弔焉及良而卒將以尸入吳人内之又宣十三年鄢陵之戰云知莊子射連尹襄老獲之遂載其尸成三年晉人歸連尹襄老之尸於楚服子愼云在牀曰尸在棺曰柩遊䰟羇旅足傷溫序之心𤣥夜思歸終有蘇韶之夢周易曰遊䰟為變左氏傳曰羇旅之臣後漢書曰溫序為隗囂所殺光武憐之命送喪到洛陽城傍地為塜長子壽夢序曰乆客思鄕里壽即上書乞骸骨歸𦵏傅𤣥七哀詩曰冥冥𤣥夜堂王隱晉書曰蘇韶字孝先安平人也仕至中牟令伯父承為南中郎軍師而亡諸子迎喪還到襄城第九子節夜夢見鹵簿行列甚肅見韶使呼節曰卿犯鹵簿罪應髠刑節俯受剃如是夢者五夕髮為之盡後畫日韶自外入謂節曰十日便速𦵏在軍師墓次買數畝地足矣遂使廣平之里永滯寃䰟汝南之亭長聞夜哭本傳曰後故吏盗其柩歸至德元年追封邵陵侯以其息慧覺嗣時寄𦵏長安故云漢書地理志廣平國屬冀州晉書曰廣平郡廣平邯鄲是廣平邯鄲接界故趙地也史記云樂毅去燕西降趙趙封曰望諸君樂毅卒於趙張華曰望諸君冡在邯鄲西數里疑言樂毅之客死於趙也風俗通曰汝南汝陽亭有鬼魅賔客宿止有死亡其厲厭者皆亡髮失精尋問其故云先時頗有怪物其後郡侍奉掾宜祿鄭竒来去亭六七里有一端正婦人乞得寄載竒初難之然後上車入亭時亦昏冥遂上樓與婦人棲宿未明發去亭卒上樓掃除見死婦大驚走白亭長撃鼓㑹諸廬吏診之乃亭西北八里死婦新亡臨殯火滅失之家卽持去竒發行數里腹痛到新頓利陽亭物故樓遂不敢上嗚呼哀哉乃為銘曰九河宅土三江貢職彼美中邦君之封殖言吳氏得姓之先本故吳國稱其地也禹貢曰九河旣道䧏丘宅土又云三江旣入左氏傳曰后稷封殖天下杜預曰后稷樹封疆殖五榖也負才矜智乘危恃力浮磬戢鱗孤桐垂翼言明徹征齊恃才乘危而與周戰卒致喪師也禹貢曰海岱及淮惟徐州下云泗濵浮磬嶧陽孤桐漢書師古注曰東至海北至岱南及淮嶧陽嶧山之陽也泗水出濟隂乘氏縣時宣帝將事徐兗詔明徹北侵故云五兵早竭一鼓前衰移營減竈空幕禽飛李尤曰聖人垂象五兵已陳髙誘吕氏眷秋注曰五戎五兵謂刀劒矛㦸矢也左傳曹劌曰一鼓作氣再而衰三而竭減竈孫臏敗龎涓事注見前左氏傳曰楚幕有烏言明徹之敗也羊皮詎􅢥畵馬何追荀罃永去隨㑹無歸言明徹見執於周不復歸也史記曰晉獻公旣虜百里奚以為秦繆公媵於秦百里奚亡秦走宛楚鄙人執之繆公聞百里奚請以五羖羊之皮贖之楚人許之又史記曰越石父賢在於縲絏中晏子出遭塗觧左驂贖之載歸弗謝入閨久之越石父請絶晏子攫然攝衣冠謝曰嬰雖不仁免子於厄子何求絶之速也越石父曰不然吾聞君子屈於不知已而信於知巳方吾在縲絏中彼不知我也夫子既已感悟而贖我是知巳知已而無禮固不如在縲絏中晏子於是延為上客左傳邲之戰云楚獲荀罃成三年晉求知罃楚人歸之又傳云隨㑹奔秦晉人患秦之用士㑹也使魏壽餘偽以魏叛者以誘士㑹執其孥於晉使夜逸請自歸於秦秦伯許之履士㑹之足於朝旣濟魏人噪而還詎贖何追謂見明徹被俘囚也永去無歸謂卒死於周也存沒俄頃光隂悽愴岳裂中台星空上將眷言妻子悠然亭障魂或可招喪何可望哀明徹死於異域不能歸𦵏也晉書曰張華將死中台星拆漢書天文志曰有流星出文昌貫紫宫西占曰文昌為上將貴相時王鳳為大將軍王商為丞相鳳妬商譖而罷之商自殺此云星空上將謂徹為上將徹死故星空也漢書曰秦法十里一亭又張湯傳曰居一鄣間師古曰鄣謂塞上要險之處别築為城因置吏士而為鄣蔽以扞寇鄣音之向反楚辭有招魂言魂氣無所不之故魂或可招喪何可望者言寄𦵏長安妻子不能遠望也壯志沈淪雄圖埋沒西隴足抵黄塵碎骨何處池臺誰家風月墳𡑞羇遠營魂流寓霸岸無封平林不樹杜預左傳注曰掘地曰𡑞羇寄也楚辭曰載營魂而升霞鍾㑹老子注曰經護為營張銑曰營心府間也霸岸霸陵岸也平陵漢屬右扶風檀弓曰不封不樹鄭云封謂聚土為墳周禮曰以爵等為丘封之度與其樹數則士以上皆有封樹言寄𦵏長安不封不樹也壯士之隴將軍之墓何代何年還成武庫三齊記曰田開疆公孫接古冶子三壯士塚在齊城東南三百歩蕩隂里中烈士傳曰羊角哀左伯桃二人為死友伯桃死楚平王愛角哀之賢以上卿禮𦵏伯桃角哀夢伯桃曰蒙子之恩而獲厚𦵏正苦荆將軍冢相近今月十五日當大戰以决勝負角哀至期陳兵馬至其冢作三桐人自殺下而從之史記曰樗里子𦵏於渭南章臺之東武庫正直其墓周大將軍上開府廣饒公鄭常墓誌銘公諱常字某周書列傳云鄭常字子元滎陽人也周宣王之弟初封其國鄭穆公之孫始成其姓左氏傳曰鄭有厲宣之親杜注云鄭始封之祖桓公友周厲王之子宣王之母弟又鄭有七穆皆穆公之後也後分為七姓矣祖思慶建威將軍山陽太守考頊儀同三司豫州刺史頊字寜伯注見鄭常碑文南陽坐嘯値此邦君西河建隼逄斯刺舉後漢書黨錮傳曰南陽太守成瑨委功曹岑晊謡曰南陽太守岑公孝𢎞農成瑨但坐嘯南陽太守値此邦君者謂思慶為山陽太守也西河建隼逢斯刺舉者謂頊為豫州刺史也按禹貢豫州河南之地其界西至雍州建隼建旟也周禮九旗之名云鳥隼曰旟應劭漢官儀曰刺舉州事公侯繼踵冠冕連鑣可得而言傳於史籍説文曰鑣馬勒旁鐵也公髫齔知禮早年馳譽劉熈釋名曰沒齒曰齔洗也毁洗於齒故齒更生新也就經黌舎略見書堂習武兵欄偏知劒術説文曰黌學也黌與横同史記索隱注天子門有兵欄曰司馬門也雖復年猶小學已為儒者所稱位在偏禆卽入將軍之賞本傳云常頗渉學有當官譽偏謂偏將軍裨謂裨將俱見漢書大統三年起義華陽授永安縣開國男文皇帝霸迹初基英雄輻輳公拔劒轅門潁川從我洛城逆戰壯於白馬之兵河橋解圍勇於烏林之策起義華陽注見鄭常碑文文皇帝魏相安定公周太祖宇文㤗也漢書鴻門之㑹云樊噲直撞入立帳下項羽賜之巵酒彘肩噲旣飲酒拔劒切肉盡之後漢書光武謂王霸曰潁川從我者皆逝而子獨留劉先主志曰袁紹征官渡遣梟將顔良攻東郡太守劉延於白馬公使闗侯為先鋒侯望見良麾葢策馬刺良於萬衆中斬其首還紹將莫敢敵遂解延圍吳志曰黄葢敗魏武於烏林烏林赤壁東下一百一十里常為周太祖帳内都督洛城河橋並有功言此時洛城之戰較白馬而更壯此日河橋之役比烏林而彌勇矣授平東將軍帥都督襲父封魏昌縣伯也魏後三年授持節車騎大將軍儀同三司車騎用郭淮之勲儀同取王沈之貴公之此授僉曰得人魏志曰郭淮字伯濟太原陽曲人也為車騎將軍儀同三司封陽曲侯晋書曰王沈字處道太原平陽人也位至驃騎將軍錄尚書事進爵博陵郡公按晉書王沈無授儀同之事疑云儀同取黄權之貴晉書職官志曰開府儀同三司漢官也殤帝延平元年鄧隲為車騎將軍儀同三司儀同之名始自此也及魏黄權以車騎將軍開府儀同三司開府之名始於此也鄭常為車騎大將軍儀同三司疑引黄權矣進爵廣饒縣公本傳賜爵饒陽侯邑千戸保定三年授使持節都督遷州諸軍事遷州刺史隋書地志曰後周於房陵郡置遷州卽總領金州兵馬括地志曰上庸今房州竹邑縣卽金州是也開拓北戎髙山尋雲深谷無景梯䋲乃上浮竹裁通閩越影嚮句吳聲勢漢書曰閩粤其先越王句踐之後秦幷天下以其地為閩中郡按左傳吳稱句吳地理志曰太伯初奔荆蠻號曰句吳師古曰句音鉤夷俗語之發聲也亦猶越為於越也言蠻獠與閩越為影嚮藉句吳為聲勢也公出戰短兵並皆奔北瓦解冰碎山空谷静鄭常碑文云應接上庸公於文谷路上庸公陸騰也注見第十四巻碑文授持節開府儀同大將軍柏梁髙宴有大將軍之詩幕府初開有平陵侯之國比之今日豈可同年而語哉漢武帝元封三年作柏梁臺詔羣臣二千石有能為七言詩乃得上坐大將軍衞青詩曰和撫四夷不易哉史記曰蘇建以都尉從車騎將軍青撃匈奴功封平陵侯自是使車被之繡服風謠是察刑政是觀漢書曰暴勝之為直指使者衣繡衣又曰侍御史有繡衣直指師古曰衣以繡者尊寵之也公露節東驅風奔羣盜埋輪當路威振中原漢書曰諸葛豐駐車止節語章曰下欲收之後漢書曰張綱為御史埋其車輪於洛陽都亭曰豺狼當路安問狐狸遂奏大將軍梁冀無君之心十五事書御京師震悚武皇帝有盟津之師以公為中權之勁外從决勝内侍軍謀及文軌旣同旃旌已偃司勳行賞軍吏舉功武皇帝周髙祖宇文邕也盟津之師謂伐齊也㤗誓曰惟十有三年大㑹於盟津左氏傳曰中權後勁杜預曰中軍制謀後以精兵為殿漢書髙祖曰决勝千里之外禮記曰車同軌書同文左氏傳曰績茷旃旌杜預曰通帛為旃析羽為旌周禮曰司勳屬夏官乃授使持節上開府増邑五百戸賜姓宇文與國同乗之榮周之宗盟非復異姓之後左氏傳曰周之宗盟異姓為後蕃屏是寄隆寵所歸公室無疎此之謂矣左氏傳曰封建親戚以藩屏周九州都督須得其才千里諸侯實俟其政乃為使持節都督東徐州諸軍事徐州刺史尋遷南兗州諸軍事南兗州刺史公頻總六條再勞十部俗變風移人懷吏畏漢書百官公卿表注曰刺史班宣周行郡國以六條問事漢官解詁曰京畿十有三牧分部督察滯穗遺秉有利疲人山桑野蠶足充貢賦詩云遺秉滯穗伊寡婦之利後漢書曰建武二年野蠶成繭被於山阜人收其利焉化被殊俗威行鄰境奏事京師四方第一謂眞刺史其在斯乎王隱晉書曰解修遷瑯邪太守考績天下第一魏志曰賈逵為豫州刺史二千石以下阿縱不如法者奏免之帝曰逵眞刺史矣春秋未髙奄然遘疾以大象元年薨於州鎭時年六十三嗚呼吏人攀慕飛走變色河濟輟舂淮沂罷市河濟謂兗州淮沂謂徐州也禹貢曰濟河惟兗州又曰海岱及淮惟徐州淮沂其乂史記趙良謂商鞅曰五羖大夫死秦國男女流涕男不歌謠舂者不相送杵也以今年歸𦵏於滎陽之山詔贈某官禮也嗟陵谷之貿遷懼徽猷之永遠地久天長敢鐫貞石銘曰荆河惟豫洛食之本水繞滎波山斜陸渾爾雅釋地云河南曰豫州疏云禹貢豫州云荆南自南河以南也洛誥曰我乃卜澗水東瀍水西惟洛食孔傳云今河南城也禹貢曰滎波旣豬顔師古曰卽今滎澤是也波亦水名言其水並已遏聚矣一説謂滎水之波漢書地理志曰𢎞農郡陸渾春秋遷陸渾戎於此有關後漢書郡國志曰陸渾西有虢略也言鄭氏之先本鄭國在於河南豫州後遂為滎陽人以國為姓也德星猶照祥風未遠代不乏賢文無闕袞言鄭氏得姓之後代有異人也異苑曰陳仲弓從諸子姪造荀朱子和父子於時德星聚太史奏五百里有賢人聚孔靈符㑹稽記曰漢太尉鄭𢎞嘗採薪得一遺箭箭有人覓𢎞還之問何所欲𢎞識其神人也曰嘗患若邪溪採薪為難願旦南風暮北風後果然故若邪溪風至今猶然呼為鄭公風詩曰惟袞有闕仲山甫補之公之生也實降英靈忠為德本孝稟天經言誕生鄭常有忠孝至性也孝經曰夫孝天之經也觀書虎館學劒龍亭雕弓偃月行馬流星虎館白虎觀龍亭疑延平之津劒化為龍孫卿子曰天子雕弓釋名曰弦月半之名也其形一旁曲一旁直若張弓弛弦也陳孔璋答東阿王牋曰譬猶飛兔流星超山越海李周翰曰飛兔流星神駿也置陣黎陽麾兵官渡平隂聽烏馬陵書樹言常立義之後累有戰功也史記髙祖本紀曰劉賈將卒二萬人騎數百渡白馬津索隱曰卽黎陽津也南界東郡白馬縣袁宏後漢紀曰獻帝建安五年二月袁紹遣沮授郭圗淳于瓊顔良等攻劉延於白馬紹引兵至黎陽四月曹操救延大戰斬顔良十一月甲子曹操與袁紹戰於官渡紹師大潰平隂馬陵注見前篇氣視迴津星占飛歩火斷羌營沙崩賊路言為金州兵馬有平羌之功也漢書藝文志曰漢津旁氣行占騐十三巻又曰天文者序二十八宿歩五星日月以紀吉凶之象聖王所以參政也羌賊卽蠻獠鐵山獠之類及驅犀節乃牧雄州吏不驚犬人無喘牛言為刺史歴任徐兗諸州有令名也後漢書劉寵傳山隂父老曰自明府下車以来狗不夜吠民不見吏漢書丙吉曰方今少陽用事未可大熱恐牛近行用暑故喘此時氣失節恐有傷害也三公典調和隂陽職所當憂是以問之西蠶得歲東作逢秋草爛獄戸星低市樓謂常有政績也尚書孔傳曰歲起於東而始就耕謂之東作獄戸如囹圄之屬星經曰市樓六星在市門中主闤闠之司今市曹官之職也五將星亡三台岳折哀哉天道遂常明哲悼常亡也天文志曰天狗主候兵討賊見則四方相射千里或曰五將鬬人相食所往之鄉有流血晉書曰張華死中台星拆棟梁崩壞風雲寂滅北郭長悲東都永别左傳子産曰棟折榱崩後漢書曰感㑹風雲風雲寂滅言其功臣之亡也古詩曰驅車上東門遙望北郭墓博物志曰滕公夏侯嬰薨公卿送𦵏至東都門外幽深此地宅兆斯憑山迴虎圈路上魚陵謂歸𦵏滎陽也虎圈虎牢也左氏傳曰鄭伯享王王與之武公之略自虎牢以東杜注云虎牢河南成臯縣後漢書郡國志曰豫州郡襄城縣有魚齒山左傳謂魚陵杜預曰魚齒山也在犨縣北按虎牢魚陵皆鄭地言滎陽之山本鄭地也悲風夜烈苦露晨凝蘭芳菊茂終古相承楚辭曰春蘭兮秋菊長無絶兮終古周大將軍聞嘉公柳遐墓誌君諱遐周書北史並作霞字子昇河東解縣人也秦始征晉之地漢開平越之鄉左傳曰秦始征晉河東又云秦伯納重耳濟河圍令狐入桑泉取臼衰杜元凱曰桑泉在河東解縣西解縣東南有臼城漢書曰武帝元鼎六年將幸緱氏至左邑桐鄕聞南越破以為聞喜縣師古曰左邑河東之縣二語序河東解縣地也解音蟹律中夷則星居鶉首漢書律歴志曰律有十二五曰夷則夷則則法也言陽氣正法度而使隂氣夷當傷之也位於申在七月漢書曰自井至柳謂之鶉首之次秦分也言河東近秦本西方秋金之氣卽秦之分野也况復莊謀於衞旣為社稷之臣喜對於齊無廢諸侯之職禮記曰衞有太史曰柳莊寢疾衞獻公再拜請於尸曰臣有柳莊者非寡人之臣社稷之臣左傳僖二十六年曰齊孝公伐我北鄙公使展喜犒使受命於展禽齊侯未入境展喜從之齊侯乃還柳氏之先本姓展氏魯孝公之後展禽食采於柳下謂之柳下惠遂姓栁氏言栁氏之先也祖叔珍宋員外散騎常侍義陽内史有徐邈之應對居於散騎之省有汲黯之正直理於淮陽之郡晉書曰徐邈東莞姑幕人也博渉多聞以慎密自居孝武帝始覽典籍招延儒學之士邈旣東州儒素太傅謝安舉以應選年十四始補中書舎人在西省侍帝雖不口傳章句然開釋文義標明指趣撰正五經音訓學者宗之遷散騎常侍猶處西省前後十年每被顧問輒有獻替多所匡益甚見寵待漢書曰汲黯字長孺濮陽人也數直諌上以為淮陽楚地之郊也召黯拜為淮陽太守父季遠臨川王本傳云梁臨川王諮議叅軍宜都太守蘭臺石室是所洽聞白馬飛狐逾髙詞氣後漢書曰班固除蘭臺令史與陳崇等共成世祖本紀漢官儀曰蘭臺令史六人秩六百石掌書劾奏後漢書黄瓊上疏曰陛下宜開石室按河洛注石室藏書之府也孔叢子曰趙人公孫龍云白馬非馬漢書酈食其曰距飛狐之口西都吳一作莫融擅名江表言談相㑹宛如舊焉君膺令德之靈稟冲和之氣齠齔髻髪夙智早成愛敬自天䖍恭得性含仁抱義履信居貞本傳云霞㓜而爽邁神彩嶷然髫歲便有成人之資篤好文學動合規矩世父儀同忠惠公特加器異本傳世父慶遠特器異之乃謂公曰吾昔逮事伯父太尉公見語云我昨夢汝登一髙樓樓盡峻麗吾以坐席乞汝汝或富貴恨吾不及見耳吾向聊復晝寢又夢將昔時坐席還復賜汝汝位官當復見及本傳云汝之官位當復及吾特宜勉勵以應嘉祥也餘同乞汝之乞音器與也王祥佩刀世為卿族鮑永驄馬家傳司隷以此連類差無慙德晉書曰呂䖍有佩刀工相之曰當為三公䖍以贈别駕王祥祥果為太傅列異傳曰鮑宣宣子永永子昱三世皆為司𨽻而乘一驄馬京師人歌之曰鮑氏驄三人司𨽻再入公馬雖瘦行歩工言夢中坐席之賜如佩刀驄馬矣輕車西昌侯作藩襄漢本傳云梁西昌侯深藻鎭雍州君時年十二以民禮脩謁進止端詳神情雅正侯目送之不輟本傳云霞時年十二以民禮謁風儀端肅進止詳雅深藻美之餘同試遣左右踐君衣裾欲視舉動君徐歩稍前曽無顧盼本傳同魏侯之見劉廙不覺歛容漢主之觀田鳳遂令題柱比之今日曽何足云魏志曰劉廙字恭嗣南陽安衆人也太祖辟為丞相掾魏國初建為黄門侍郎太祖在長安欲親征蜀廙上疏太使祖遂進前而報廙曰非但君當知臣臣亦當知君今欲吾坐行西伯之德恐非其人也魏諷反廙弟偉為諷所引當相坐誅太祖令曰叔向不坐弟虎古之制也特原不問三輔决録曰漢靈帝殿柱題堂堂乎張京兆田郎顔氏家訓曰用論語題京兆人田鳳也驃騎廬江周書作陵王帝子出藩懸衡髙選以君華望召為主簿本傳云廬陵王續為雍州刺史辟霞為主簿按續梁武帝之第五子也張坦直諫旣稱荀令之香鄒湛知言彌見羊公之德習鑿齒襄陽記曰劉季和性愛香謂張坦曰荀令君至人家坐幙三日香氣不歇謂我何如坦曰醜婦效顰見者必走也晉書曰羊祜樂山水每風景必造峴山置酒言詠終日不倦嘗慨然嘆息顧謂從事中郎鄒湛等曰自有宇宙便有此山由来賢逹勝士登山遠望如我與卿者多矣皆湮沒無聞使人悲傷如百歲後有知魂魄猶應登此湛曰公德冠四海道嗣前哲令聞令望必與此山俱傳至若湛軰乃當如公言耳諮議府君於都薨背君奔赴六日卽届京師本傳云霞有志行初為州主簿其父卒於揚州霞自襄陽奔赴六日而至下同形骸毁瘁不復可識靈柩泝江中川薄晩亂流乘選迴風反帆舟中之人相視失色抱棺號慟誓不求生俄爾之間風波卽静咸以君精誠所致成都孝子自赴江流桂陽先賢身鄣野火並存靈柩咸可傷嗟後漢書曰廉范字叔度京兆杜陵人父遭亂客死蜀漢范遂留寓西州西州平遂歸鄕里年十五辭母西迎父喪與客歩負喪歸葭萌載船觸石破沒范抱持棺柩遂俱沈溺衆傷其義鉤求得之療救僅免於死又曰長沙有孝子古初遭父喪未𦵏鄰人失火初匍匐柩上以身扞火火為之滅郅惲甄異之以為首舉太夫人乳間發瘡醫云惟得人吮癑血或望可差君方寸已亂應聲卽吮旬日之間遂得痊復本傳亦載其事君之事親可謂至矣從兄右衞擁旌嶺表苦相攜致昔馬游志氣為馬援所知班嗣才學為班彪見賞復聞於今日矣後漢書馬援曰吾從弟少游常哀吾慷慨多大志曰士生一世但取衣食裁足乘下澤車御欵段馬為郡掾吏守墳墓鄕里稱善人斯可矣求致盈餘但自苦耳當吾在浪泊西里間虜未滅之時下潦上霧毒氣重蒸仰視飛鳶跕跕墮水中臥念少游平生時語何可得也漢書敘傳曰彪字叔皮㓜與從兄嗣共遊學家有賜書内足於財好古之士自遠方至父黨楊子雲以下莫不造門乃除永化縣令静尋欹案或吟長岑之遠乍撫一作聽鳴琴不以河陽為陋日南金柱合浦珠泉莫肯一作曽莫經懷未嘗留目後漢書曰崔駰出為長岑長注云長岑屬樂浪郡其地在遼東晉書曰潘岳為河陽令應劭地理風俗記曰日南故秦象郡漢武帝元鼎六年開林邑記曰建武十九年馬援樹兩銅柱於象林南界與西屠國分漢之南疆也謝承後漢書曰孟嘗字伯周為合浦太守郡境舊採珠以易先時二千石貪穢使民采珠積以自入珠忽徙去合浦無珠餓死盈路孟嘗行化一年之間去珠復還解巾平西邵陵王法曹參軍仍轉外兵除尚書工部郎邵陵王綸武帝六子始入禮闈旣登蘭閣尚書僕射陳郡謝舉南史謝舉字揚言大通五年遷尚書僕射人望國華引君言論謂同坐曰江漢英靈見於此矣本傳云謝舉時為僕射引霞與語甚嘉之顧謂人曰江漢英靈見於此矣西中郎岳陽王以綠車之重臨西河之牧拔用君為本州治中尋遷别駕本傳云岳陽王蕭詧涖雍州選為治中尋遷别駕續漢書曰皇孫則綠車蔡邕獨㫁曰綠車名曰皇孫車天子孫乘之以從岳陽王梁昭明太子之子為武帝皇孫故云綠車之重岳陽王鎭襄陽為雍州牧故云西河之牧也王叔理以品物流名陳仲舉以題軒馳譽君之展驥兼而有之王叔理卽王叔治也魏志曰王脩字叔治北海營陵人也識髙柔於弱冠異王基於㓜童皆遠至世稱其知人世説曰陳仲舉言為士則行為世範登車攬轡有澄清天下之志蜀志曰魯肅遺先主書曰龎士元非百里才也使處治中别駕之任始當展其驥足耳及乎大盜移國王室騷然月動星搖雲平虹直謂侯景之亂也岳陽王承制陜左當璧漢南天網所頓英賢畢集謂岳陽王詧於襄陽承制後踐帝位於江陵也時襄陽屬雍州在陜之東左氏傳曰當璧而拜者神所立也老子曰天網恢恢授君散騎侍郎吏部員外郎散騎常侍本傳同兼太子侍讀言蕭詧為梁王授君此職也監儲甲觀事重史丹侍講桂宮名髙張禹漢書曰史丹字君仲魯國人也元帝以丹舊臣皇考外屬親信之詔丹䕶太子家酒是時傅昭儀子定陶共王有材藝母子愛幸太子頗有色之失上意不平丹犯顔色動寤萬乘轉移大謀卒成太子又曰張禹字子文河内軹人也初元中詔令禹授太子論語三輔黄圖曰太子宮有甲觀畵堂桂宮在未央北俄遷車騎大將軍大都督賜爵聞喜縣公侍中開府儀同三司餘如故方之驂乘霍去病為侍中譬彼將兵公孫敖為驃騎漢官儀曰侍中殿下稱制出則陪乘霍去病注見前史記曰將軍公孫敖義渠人以郎事武帝武帝立十二歲為驃騎將軍足以照曜六府謨明九德豈直允諧上將匡贊中軍而巳哉左氏傳曰九功之德皆可歌也謂之九歌六府三事謂之九功水火金木土榖謂之六府正德利用厚生謂之三事上將文昌中星名按左傳三軍有中軍上軍下軍旣而言從梁國服政酆都管仲有詞卽受下卿之禮臧孫見德還奉嘉賔之宴本傳云霞辭詧曰陛下中興鼎運龍飛舊楚臣昔因幸㑹早奉名節理當以身許國期之始終自晉氏南遷臣宗族葢寡從祖太尉世父儀同從父司空並以位望隆重遂家於金陵惟留先臣獨守墳栢常誡臣等使不違此志今襄陽旣入北朝臣若陪隨鑾蹕進則無益塵路退則有虧先㫖伏願曲垂照鑒亮臣此心詧重違其志遂許之因留鄕里以經籍自娛太祖世宗頻有徵命霞固辭以疾及詧殂霞舉哀行舊君之服保定中又徵之霞始入朝服政酆都言仕周也宇文氏國號曰周如西周之都酆鎬也左傳僖十二年曰齊侯使管夷吾平戎於王王以上卿之禮饗管仲辭曰臣賤有司也有天子之二守國髙在若節春秋来承王命何以禮焉陪臣敢辭受下卿之禮而還又僖二十三年曰齊國莊子来聘自郊勞至於贈賄禮成而加之以敏臧文仲言於公曰國子為政齊猶有禮君其朝焉臣聞之服於有禮社稷之衞也言霞之從梁入周如管仲平戎國莊来聘也有詔授使持節驃騎大將軍開府儀同三司霍州諸軍事霍州刺史隋志曰廬江郡霍山縣梁置霍州犀節去關衮衣馳傳迎郊則文學前驅賔衞則邦君負弩漢書文帝紀曰除關無用傳張宴曰傳信也若今過所也師古曰古者或用棨或用繒帛棨者刻木為合符也衮衣馳傳後漢郭賀事注别見魏文帝與吳質書曰文學託乘於後車劉良曰文學官名漢書曰霍去病為驃騎將軍過河東河東太守郊迎負弩先驅晉書何曽上疏曰郡守之權雖輕猶專任千里比之於古則列國之君也故太守稱邦君矣直以五溪遼遠馬伏波之思歸三湘卑濕賈長沙之不願後漢書曰馬援為伏波將軍援撃武陵五溪蠻夷時年六十二㑹暑盛中病卒漢書曰賈誼為長沙傅長沙卑濕誼自傷悼作鵩鳥賦五溪三湘注見紇干𢎞碑文是以宜城刺史直㑹鹿門白沙故地仍留龍種天厲弗戒奄然終極天和某年歸窆於襄陽白沙之舊塋按本傳霞辭詧曰從祖世父從父家於金陵惟留先臣獨守墳柏又云今襄陽旣入北朝知襄陵為霞桑梓之地舊塋在是矣後漢書曰龎公者南郡襄陽人也居峴山之南未嘗入城府夫妻相敬如賔荆州刺史劉表數延請不能屈乃就候之嘆息而去後遂攜其妻子登鹿門山因采藥不反郡國志襄陽宜城皆屬荆州南郡襄陽記曰鹿門山舊名蘇嶺山建武中襄陽侯習郁立神祠於山刻二石鹿夾神道口俗因謂之鹿門廟遂以廟名山也水經注曰襄陽城東有東白沙襄陽記曰龎德公子魯字世文晉太康中為牂牁太守去官歸鄉居白沙里鄉人宗敬之相語曰吾家池中龍種来里中化其德讓言霞歸窆襄陽得遂其志也君器宇祥正風鑒𢎞敏澡身浴德游藝依仁汝南令望扶風長者不言財利王夷甫之為德不談人物阮嗣宗之為人本傳云霞性溫裕略無喜慍之容𢎞奬名教未嘗論人之短尤好施與家無餘財禮記曰儒有澡身而浴德論語云依於仁游於藝後漢書曰陳蕃字仲舉汝南平輿人也又曰竇武字游平扶風平陵人也晉書曰王衍字夷甫妻郭氏賈后之親藉宮中之勢聚歛無厭衍疾郭之貪鄙故口未嘗言錢郭欲試之令婢以錢繞牀使不得行衍晨起見錢謂婢曰舉阿堵物却其措意如此晉陽秋曰夷甫善施舎父時假貸者皆與焚劵未嘗謀貨利之事世説曰晉文王稱阮嗣宗至慎每與之言言皆𤣥遠未嘗臧否人物從容亂離之機保此令名舒巻風雲之際無妨貴仕張衡渾儀之後卽賦歸田杜預沈碑已来遂停鄉里後漢書曰張衡研覈隂陽妙盡璇璣之正作渾天儀又衡有歸田賦襄陽記曰杜元凱好為身後名常自言百年後必髙岸為谷深谷為陵作二碑敘其平吳勲一沈萬山下一沈峴山下謂叅佐曰何知後代不在山頭乎元凱杜預字也王仲宣有讀書之樓諸葛亮有彈琴之宅盛𢎞之荆州記曰襄陽城西北八里方山山北際河水山下有王仲宣宅王韶南雍州記曰隆中諸葛亮故宅有舊井一今涸無水盛𢎞之記云井深五丈廣五尺堂前前三間屋地址極髙有孔明避暑臺宅西山臨水孔明嘗登之鼔琴以為梁父吟因名為樂山實欲因此謝病閑居終焉言霞辭歸之後因留鄕里本有終隱之志焉鳴琴在膝或對故人寶劒自隨時過穉子晉書曰陶潛性不解音而常畜素琴一張弦徽不具每朋酒之㑹則撫而和之曰但識琴中趣何勞弦上音漢書陸賈傳曰髙祖拜賈為大中大夫賈五男寶劒値百金謂其子曰過汝汝給酒食所死家得寶劒此稱其閑居之樂也百年俄頃嗚呼哀哉遂使君子之陵止埋銅劒賢臣之墓惟銘石函王隱晉書曰汲郡冢有銅劒一枚長三尺五寸博物志曰漢滕公死送𦵏至東都門外駟馬不行踞地悲鳴卽跼馬蹄下得石槨其銘云佳城鬱鬱三千年見白日吁嗟滕公居此室乃𦵏斯地銘曰有莊有惠居魯居衞義是隨時才堪濟世言柳氏之先衞有柳莊魯有柳下惠隨時濟世也北部尚書東京司𨽻必復其始侯君相繼言霞從祖太尉世父儀同從父司空也周禮冬官考工故司空曰北部尚書漢官儀曰司𨽻校尉部河南故謂東京司隷也左傳公侯之子孫必復其始華葢一岳文昌一星青衿辨志童子離經義勗非馬書勤映螢言霞禀星岳之靈髫年好學有成人之望也星經曰華葢十六星在五帝座上九星為華葢之柄上七星為庶子之官文昌七星其六星各名毛萇曰青衿學子所服禮記十年視離經辨志公孫龍曰白馬非馬晉書曰車𦙍字武子南平人𦙍就業恭勤博覽不倦家貧不常得油夏月則練囊盛數十螢火以繼日焉往年靈柩漂泊江沱以君哀慟川后停波謂靈父靈柩泝江幾覆得免是其孝感所致也詩曰江有沱鄭箋曰岷山道江東别為沱洛神賦曰川后静波李善注云川后河伯也揚名北海馳譽西河誰登九折不入朝歌北海齊地後漢郡國志曰青州有北海國西河謂雍州也岳陽王鎭襄陽稱雍州牧與魏接界平江陵後始盡歸於周本序亦云岳陽王臨西河之牧矣揚名馳譽言鄰國皆有名譽也誰登九折不入朝歌者言梁王詧不足仕故辭歸也時襄陽已入北朝惟資江陵一州之地言其危如九坂陋若朝歌也漢書曰王陽不登九折坂又鄒陽上書曰邑號朝歌墨子迴車蔚炳胥變攀陪遂遠白鹿隨軒丹暈附冕易革卦象曰大人虎變其文炳也君子豹變其文蔚也言方當革運辭詧歸里君臣之際攀陪遂遠也謝承後漢書曰鄭𢎞為淮隂太守白鹿方道挟轂而行𢎞怪問主簿黄國國賀曰聞公車轓畫鹿明府必為宰相丹暈疑卽赤帷葢也暈日旁氣也言帷葢似之後漢書曰舊典傳車驂駕垂赤帷裳又曰郭賀為荆州刺史賜黼黻冕旒勑行部去襜帷使百姓見其容服以章有德白鹿隨軒丹暈附冕似引是事然按本文上下非謂是也上云蔚炳胥變攀陪遂遠明是辭詧歸里下文位參上將至軍幕仍張始云入周筮仕此處不得引刺史郡守之事按神仙傳曰中山衞叔卿嘗乗雲車駕白鹿見漢武帝帝將臣之叔卿不言而去丹暈暈日旁氣也用左傳赤烏夾日事言辭詧之後詧遂殂也位參上將榮兼本選蛇盤綬結龜迴印轉来朝平樂歸政咸陽藩維卽啓軍幕仍張言霞事詧為車騎大將軍開府儀同及入周仍為驃騎大將軍開府儀同是位叅上將榮兼本選也董巴輿服志曰古者君臣佩玉尊卑有序及秦以采絲連結於襚謂之綬漢承秦制淮南子曰龜紐之璽賢者以為佩髙誘注曰龜紐之璽古印也紐繫佩服也平樂館名西京賦曰大駕幸乎平樂之館秦都咸陽後周所都也来朝平樂歸政咸陽者謂霞入周也藩維卽啓軍幕仍張者謂仕周為大將軍也起兹禮數峻此戎章長離宛宛刷羽凌江言其軍容之盛也張衡思𤣥賦曰前長離使拂羽兮注云長離卽鳳也潘岳為賈謐贈陸機詩曰宛宛長離凌江而翔世急奔流年催驚隼滅沒頓轡扶桑揺軫詩曰徂年如流孔融與盛孝章書曰歲月不居時節如流月令云季秋鷹撃雉年華驚隼亦言秋金殺氣也陸機赴洛道中詩曰頓轡倚松巖李善曰頓猶舎也山海經曰日浴溫源谷上於扶桑淮南子曰日出於暘谷浴於咸池拂於扶桑是謂晨明登於扶桑之上爰始將行是謂朏明顔師古曰軫車後横木也智士石坼賢人星殞西鄂芝枯南陽菊盡悼霞亡也後漢書方術任文公傳曰公孫術時蜀武擔石坼文公曰噫西州智士死我乃當之自是常聚㑹子孫設酒食後三月果卒故益部為之語曰任文公智無䨇異苑曰陳仲弓從諸姪造荀季和父子於時德星聚太史奏五百里内有賢人星聚此云星隕悼亡也後漢郡國志云西鄂屬南陽郡注云山海經曰有豐山神耕父處之常遊清冷之淵前志應劭曰江夏有鄂故加西云抱樸子曰南陽酈縣山中有甘谷水谷上皆生甘菊花墮其中居民食水無不老壽髙者百四十五嵗下者不失八九十無夭年人司空王暢太尉劉寛太傅袁隗為南陽太守每使酈縣月送甘谷水四十斛以為飲食此諸公多患風痺及眩冐皆得愈愴焉啓手生榮終極相杵輟舂鳴機罷織言生榮死哀也輟舂罷織言霞死民為之罷市史記趙良曰五羖大夫死秦國男女流涕舂者不相杵劉縚聖賢紀曰子産治鄭二十年卒國人哭於巷婦人哭於機煢煢𦙍子視隂餘息露露履之哀哉欒棘左氏傳曰余煢煢在疾又曰趙孟視隂曰朝夕不相及禮記曰霜露旣降君子履之必有悽愴之心非其寒之謂也詩云棘人欒欒兮龍巢北望鳳闕前觀松長風遠地厚泉寒隋志漢東郡上山梁曰龍巢後周改龍巢為左陽水經注廣漢郡鳳溪中有一石雙髙其形若闕漢世有鳳凰至故謂之鳳凰臺南注漢水按墳植松栢故云松風長遠地有九泉故云地厚寒泉書埋簡落琴覆絃寛贈行之册書而納棺劉歆讓太常博士書曰經或脱簡世説云子敬人琴俱亡左傳昭四年云叔孫卒杜洩將以路𦵏且盡卿禮季孫使杜洩舎路杜洩不可曰夫子受命於朝而聘於王王思舊勳而賜之路復命而致之君君不敢逆王命而復賜之使三官書之吾子為司徒實書名夫子為司馬與工正書服孟孫為司空以書勲今死而弗以是棄君命也書在公府而弗以是廢三官也若命服生弗敢服死又不以將焉用之乃使以𦵏周大將軍義興公蕭公墓誌銘昔司徒之敷五教當堯讓之初丞相之總萬機値秦亡之後序蕭氏之先也按蕭氏本蕭國子姓宋國之支庶也堯時契為司徒賜姓子氏其後有成湯武王克商封殷後於宋春秋左傳莊公十二年云蕭叔大心及戴武宣穆莊之族以曹師殺南宮牛及子游而立桓公宋人以蕭邑别封其人為附庸二十三年經書蕭叔朝公是也宣公十二年云楚伐蕭蕭潰蕭國從此遂滅漢書地理志曰蕭邑在沛國蕭縣漢興相國蕭何封酇侯云本沛人是其後也若殷人受氏乃承微子之封詩譜曰商德之衰武王伐紂乃以陶唐氏火正閼伯之墟封紂兄微子啓為宋公代武庚為商後地理志云梁國睢陽是也言蕭氏之先本宋國矣梁運應圖實啓延陵之國吳都賦曰且有吳之開國也造自泰伯宣於延陵梁都建業本吳地故云延陵之國梁運應圖謂梁武帝有天下也武帝紀云帝姓蕭氏與齊同承淮隂整之後公諱太字世怡周書云以名犯太祖稱字蘭陵人也太祖文皇帝之孫鄱陽忠烈王之子周書本傳云梁武帝弟鄱陽王恢之子也太祖文皇帝皇考順之也武帝本紀云整六世而生皇考諱順之於齊髙帝為始族弟少而欵狎齊髙每外討皇考為軍副及齊髙創建皇業摧鋒莫不垂拱仰成焉齊武卽位以參豫佐命封臨湘縣侯武帝卽位追尊太祖文皇帝梁宗室傳曰鄱陽忠烈王恢字𢎞逹文帝第十子也天監元年封鄱陽郡王普通七年薨諡曰忠烈有男女百人男封侯者三十九人女主三十八人泒别天潢支分若木直幹自高澄源已逺漢書天文志曰漢中四星曰天駟旁有八星絶漢曰天潢山海經曰灰野之山有赤樹青華名曰若木言為梁朝宗室與武帝同支泒也茂親眀德是稱毛畢之功宗子維城乃建邢茅之國言梁朝封建親戚太遂有國也左傳僖二十四年富辰曰管蔡郕霍魯衞毛耼郜雍曹滕畢原酆郇文之昭也又曰凡蔣邢茅胙祭周公之𦙍也杜元凱曰毛國伯爵諸侯為王卿士者畢國在長安縣西北邢國在廣平襄國縣髙平昌邑縣西有茅鄕大同元年年十六封豐城縣開國侯食邑五百戸山臨鶴塞非無陶侃之賔氣連牛斗卽有張華之劒謂豐城縣也晉書地志曰豐城縣屬豫章郡幽明録曰陶公在潯陽西南一塞取魚自謂其地曰鶴門晉陽秋曰侃父丹娶新涂湛氏女生侃湛䖍恭有智算以陶氏貧賤紡績以資給侃使交給勝已侃少為潯陽吏鄱陽孝亷范逵嘗過侃宿時大雪侃家無草湛徹所薦剉給隂截髮以供調逵聞之嘆息稱之於張夔顧榮羊晫諸人大獲美譽王子年拾遺記曰晉之中興夜有紫色衝斗牛張華使雷煥為豐城縣令掘而得之華與煥各寶其一拭以華隂之土光耀射人後華遇害失劒所在煥子佩其一劒過延平津劒飛鳴入水及入水尋之但見雙龍纒屈於潭下目光如電遂不敢取矣解褐給事中仍太子洗馬公子出身非郎官而同品中朝洗馬異式道而前驅以公居之誠為髙選晉書職官志曰給事中秦官也所加或大夫博士議郎掌顧問應對位次中常侍漢因之及漢東京省魏世復置至晉不改在散騎常侍下給事黄門侍郎上無員洗馬八人職如謁者秘書掌圖籍釋奠講經則掌其事出則直者前驅導威儀漢書曰太子屬官有洗馬如淳曰前驅也西京雜記漢朝輿駕式道候二人大同元年入直殿省其年轉太子中書舎人南宫宿衞職司蘭錡北閣從班榮叅顧問通籍兩宫得賢斯在晉書職官志曰中書舎人晉初置舎人通事各十人江左令舎人通事謂之通事舎人掌呈奏案後省而以中書侍郎一人直西省又掌詔命續漢書百官志曰太子舎人二百石無員更直宿衞如三署郎中後漢書馮魴傳曰中元十五年東巡郡國留魴宿衞南宫西都賦曰武庫禁兵設在蘭錡大同三年持節仁威將軍譙州刺史褰帷祥氣之境刺舉消憂之地晉書地理志曰魏武分沛立譙郡褰帷用賈琮事見後漢書魏志曰文帝生於沛國譙郡時有雲氣青色而圓如車葢當其上終日望氣者以為至貴之證應劭漢官儀曰刺舉州事王粲從軍詩曰朝入譙郡界曠然消人憂南陽風俗文學更多美稷相迎童兒逾遠後漢書曰崔瑗著南陽文學官志又曰郭伋始至行部到西河美稷有童兒數百各騎竹馬道次迎拜旣而亂離瘼矣王室騷然大夫有行役之悲君子有無期之怨本傳云侯景為亂路由城下襲而陷之世怡遂被執尋逃遁得免詩云亂離瘼矣鄭語云王室方騷韋昭注曰騷擾也詩序曰黍離閔宗周也周大夫行役至於宗周過故宗廟宫盡為禾黍閔周室之顛覆彷徨不忍去而作是詩也又曰君子于役刺平王也君子役役無期度大夫思其危難以風焉背關懐楚扁舟而行江漢奉當璧之君章華一作華夏歸中興之主謂太自譙州逃遁至江陵時元帝承制梁朝中興也漢書項籍傳贊曰及羽背關懐楚江漢楚地左氏傳曰楚共王無冢適有寵子五人乃遍以璧見於羣望曰當璧而拜者神所立也國語曰楚靈王為章華之臺與伍舉升焉韋昭曰章華地名又吳語曰乃築臺於章臺之上元帝討滅侯景成中興之業故云中興之主都於江陵本楚地故引楚事焉承聖元年拜侍中周書梁元帝承制授侍中承聖元帝年號無雙對問實踵武於丁鴻多識舊章足齊衡於王粲後漢書曰永平十年詔徵丁鴻拜侍中建初四年肅宗詔鴻與諸儒論定五經同異於北宫白虎觀帝親稱制臨決鴻以才髙論難最明諸儒稱之帝數嗟美焉時人嘆曰殿中無雙丁孝公魏志曰王粲字仲宣山陽髙平人也獻帝西遷粲徙長安左中郎將蔡邕見而竒之曰此王公孫也有異才吾不如也吾家書籍文章盡當與之魏國旣建拜侍中博物多識問無不對時舊儀廢弛典造制度粲恒典之二年除持節平西將軍臨川内史仍轉平南將軍桂陽内史本傳云旣以陸納據湘州道路擁塞改授漢書曰内史周官秦因之武帝建元六年置左右内史尚方鑄劒再轉金龜御史分符雙封銅虎漢書朱雲曰臣願賜尚方斬馬劒㫁佞臣頭一人以厲其餘師古曰尚方少府之屬官也作供御器物故有斬馬劒之利可以斬馬也又百官公卿表曰凡吏比二千石以上皆銀印青綬師古曰漢舊儀云銀印背龜紐其文曰章謂刻曰某官之章也公卿表又云監御史秦官掌監郡漢省丞相遣史分刺州武帝置部刺史掌奉詔條察州又文帝紀曰二年九月初與郡守為銅虎符竹使符應劭曰銅虎符第一至第五國家當發遣使者至郡合符符合乃聽受之竹使符皆以竹箭五枚長五寸鐫刻傳書第一至第五張宴曰符以代古之珪璋從簡易也師古曰與郡守為符者謂各分其半右留京師左以與之張宴曰銅取其同心也再轉雙封者言除平西將軍臨川内史復轉平南將軍桂陽内史也豈直鄧攸清白見稱五鼓之歌劉寵廉能名為一錢之郡晉書曰鄧攸元帝時為吳郡太守政刑清明百姓歡悦後稱疾去百姓數千人留牽攸船不得進攸乃少停夜中發去吳人歌云紞如打五鼔鷄鳴天欲曙鄧侯挽不留謝令推不去後漢書曰劉寵字祖榮東莱牟平人拜㑹稽太守簡除繁苛禁察非法郡中大化徵為將作大匠山隂縣有五六老叟尨眉皓髪自若邪山谷間出入齎百錢以送寵寵勞之曰父老何自苦對曰山谷鄙生未嘗識郡朝它時吏發求民間至夜不絶或狗吠竟夕民不自安自明府下車以来狗不夜吠民不見吏年老遭値聖明今聞當見棄去故自扶奉送寵曰吾政何能及公言邪勤苦父老為選一大錢受之遂以天保未定王途多梗還吳不可歸蜀無路臨淄負海翻然改途竄身清漳垂翅渤海周書本傳云未至桂陽屬于謹平江陵遂隨兄修在郢州及修卒卽以世怡為刺史湘州刺史王琳率舟師襲世怡世怡以州輸琳時陳武帝執政徵為侍中世怡疑而不就乃奔於齊詩曰天保定爾未定多梗言王室之亂也蜀志云黄權對魏文帝曰臣降吳不可歸蜀無路是以歸命臨淄負海翻然改圖謂不得已而奔北齊也臨淄齊地卽營丘也晁錯新書曰齊地僻逺負海水經曰清漳水出上黨沾縣西北少山大黽谷漢書地理志曰上黨長子縣鹿谷山濁漳水所出東至鄴入清漳按鄴北齊所都竄身清漳亦謂奔齊也渤海齊地漢置渤海郡屬幽州師古曰在渤海之濵因以為名蒙授車騎大將軍散騎常侍仍為持節都督永州刺史謂齊授此職也隋書地志曰豫州汝南郡城陽縣後齊曰永州而秦亭壓境邾柝聞城鼔角地鳴將軍天落雖復瓶缶聽聲無防於地道冠繩柴結不却於雲梯請命受降翻歸都護周書本傳云保定四年晉公護東伐大將軍權景宣略地河南世怡聞豫州刺史王良士已降遂来歸欵秦亭壓境謂周師見侵也周都長安本秦地故云秦亭漢書地理志曰秦之先伯益為附庸邑之於秦今隴西秦亭秦谷是也左傳曰魯撃柝聞於邾後漢書公孫瓚與子續書曰袁氏之攻狀若鬼神鼓角鳴於地中漢書曰諸侯聞之以為將軍從天而下也光武帝紀曰或為地道衝棚撞城淮南子曰工輸作為雲梯之械設以攻宋九攻而墨子九却之漢書鄭吉傳曰吉旣破車師降日逐威震西域遂并護車師以西北道故號都護都護之置自吉始焉師古曰並護南北二道故謂之都都猶大也總也言周師彊盛不能拒防故請命受降歸於都護也周朝以楚材晉用不停於平章趙璧秦求無論於羇遠左傳聲子對令尹子木曰惟楚有材實晉用之史記曰秦王欲以十五城易趙王和氏璧相如奉璧見秦王言太歸欵之後周朝納降復見用也以保定五年除使持節驃騎大將軍開府儀同三司義興郡開國公食邑一千三百戸隋志曰汝南城陽有義興縣天和二年授使持節都督蔡州諸軍事蔡州刺史本傳云授蔡州刺史不尚苛察深為吏民所安周書太祖紀云魏廢三年改南雍為蔡州楚頃襄之愛子旣布衣而戍谷魏安釐之母弟亦羇旅於邯鄲憂旣傷人降年不永史記曰楚頃襄王病使黄歇與太子完入質於秦秦留之數年楚頃襄王病太子不得歸而楚太子與秦相應侯善於是黄歇乃説應侯曰今楚王恐不起疾秦不如歸其太子太子得立其事秦必重而德相國無窮若不歸則咸陽一布衣耳韋昭曰函谷關史記曰魏公子無忌魏昭王少子而魏安釐王異母弟也封信陵君魏王怒公子之盜其兵符矯殺晉鄙公子亦自知也已却秦存趙趙使將將其軍歸魏而公子獨與客留趙邯鄲趙地漢書地理志云邯鄲屬趙國趙敬侯自中牟徙子山亦羇旅之人有同憂也春秋五十有一薨於蔡州之鎭本傳云三年卒於州送故入關空餘袞服歸軒在道還更垂帷言太為蔡州刺史卒於官其喪車猶尚袞服垂帷也嗚呼哀哉有詔贈官諡某本傳本官加并洛永三州刺史禮也五年十一月𦵏於長安北原樗里子之墳正臨武庫太史公之墓直對臯門史記曰樗里子且死曰𦵏我必於渭南章臺東後百年當有天子宫夾我墓及漢興長樂宫在其東未央宫在其西武庫正直其上也漢書司馬遷傳曰蘄孫昌昌生無懌無懌生喜喜為五大夫皆𦵏髙門喜生談為太史公銘曰𤣥鳥逺烈相土𢎞謨東封宋社西歛秦圖人承佐漢國紹開吳史記曰殷契母曰簡狄有娀氏之女為帝嚳次妃三人行浴見𤣥鳥遺卵簡狄吞之因孕生契及長為帝舜司徒賜姓子氏左傳襄九年曰陶唐氏之火正閼伯居商丘祀大火相土因之故商主大火史記曰武王封微子為宋公又云周德衰宋之社正義曰社主民也社以石為之宋社卽亳社也周武王伐紂乃立亳社以為監戒按左傳有鳥鳴於亳社曰詘詘嘻嘻葢宋社也漢書曰蕭何盡收秦丞相府圖籍文書言蕭氏之先本殷契之後在周為宋國至漢則有蕭何齊梁則成帝業佐漢謂蕭相國也開吳謂梁武帝都建業也有美令德茂親藩邸建國皇支承家帝弟謂太父鄱陽王恢為太祖之子武帝之弟以此建國也率由冥㑹亮直天啓轅固聞詩唐都習禮謂蕭太也後漢書曰前太尉陳蕃清忠直亮左傳叔詹曰臣聞天之所啓人弗及也史記曰清河王太傅轅固生者齊人也以治詩孝景時為博士史遷自序曰太史公學天官於唐都博望之苑金華之宫文林講德武帳參戎謂授太子洗馬中書及侍中將軍諸職也漢書曰武帝年二十九乃得太子甚喜太子冠為立博望苑使之通賔客從其所好三輔黄圖曰未央宫有金華殿成帝初張禹説尚書論語於金華殿中漢書曰上嘗坐武帳又曰太后盛服坐武帳武士陛㦸陳列殿下孟康曰今御武帳置兵䦨五兵於帳中也名書柱上策滿帷中上田鳳事下張良事託身淄右涖政淮東秦亭西逼楚澤南窮時驚獵火或懼秋風淄右臨淄之右謂于謹平江陵太奔齊也淮東淮水之東謂授永州刺史也秦亭西逼謂魏師之西逼也漢書地理志曰秦之先封為附庸邑之於秦今隴西秦亭是也楚澤南窮傷江陵之已亡也漢書司馬相如傳曰楚有七澤故云楚澤史記曰公子無忌與魏王博而北境舉烽言趙寇至且入界公子止王曰趙王田獵耳非為冦也晉書載紀云苻堅淝水之敗其走者聞風聲鶴唳皆以為晉兵屬期逺略逢茲應變陣横十里兵圍一面月暈孤城塵驚虚援春筍非糧秋蒿無箭垂翅臥龍夷衿輟戰言太歸齊之後晉公東代周師彊盛不能一戰遂至降附也史書天官書曰平城之圍月暈參畢七重周禮考工鄭注云援直刃也續晉安帝紀曰豫州刺史司馬尚之所攻倉儲稱竭是時蘆筍時也尚之指筍曰且噉此足解三日將士離心遂敗韓子曰張孟談曰董安于之治晉陽也公宮之垣皆以荻蒿楚廧之發而用之有餘箭矣臥龍伏龍城也周書云天和六年齊王憲平其伏龍等城後漢書光武璽書曰垂翅回溪夷衿輟戰未詳西京賦曰巖險周固衿帶易守此云夷衿明是衿帶失守也按輟戰二字對上臥龍未工疑誤時値懷来恩加始賞王爵愈峻戎章更上言周朝懷来太降得授驃騎大將軍義興公也朱鷺才飛虞歌卽嚮泣子留恨藏書長往言太仕周未乆而卒也詩序曰振鷺二王之後来助祭也詩曰振鷺于飛言太本梁朝宗室今入於周如周之杞宋矣毛傳曰鷺白鳥也爾雅曰鷺舂鉏陸機疏云鷺水鳥也白而好潔故謂之白鳥齊魯之間謂之舂鉏遼東樂浪吳揚人皆謂之白鷺楚威王時有朱鷺合沓飛翔而来舞則復有赤者舊鼓吹朱鷺曲是也然則鳥名白鷺赤者少耳左傳哀十一年曰公孫夏命其徒歌虞殯正義曰虞殯遣殯歌詩杜預云送𦵏歌曲並不解虞殯之名禮啓殯而𦵏𦵏卽下棺反日中而虞葢以啓殯日將虞之歌謂之虞歌歌者助也喪者哀也送𦵏得有歌者葢挽引之人為歌聲以助哀今之挽歌是也舊説挽歌漢初田横之臣為之按此挽歌之有久矣晉初荀愷制禮以吉凶不雜送𦵏不宜有歌去之摯虞駁之曰君子作歌惟以告哀𦵏之有歌不為害也復存之泣子留恨謂太之子寶也藏書卽晏子鑿楹納書事注見司馬裔碑炎涼迭運一作送零落山丘霜芬幕月松氣陵秋嗟南國之王子成東陵之故侯楚辭曰惟草木之零落王逸注云零落皆墮也草曰零木曰落曹植詩曰零落歸山丘怨錄曰楚王之子質於秦不得歸作思歸歌三輔黄圖曰長安青門外舊出佳瓜廣陵人邵平為秦東陵侯秦破為布衣種瓜青門外瓜美故時人謂之東陵瓜周大將軍趙公墓誌銘公諱廣字乾歸周書有傳邵惠公之元孫豳孝公之長子周書本傳云邵惠公顥太祖之長兄也顥次子導諡曰孝追封豳國公導生五子長曰廣是廣為邵惠公長孫元孫長孫也若木拂日長虵委天龍圖幕河之光神鼎連雲之氣六辯搆字五運徵祥言宇文氏有天下廣為周朝宗室也楚辭曰折若木以拂日左氏傳曰吳為封豖長虵尚書中候曰黄帝東廵河過洛脩壇沈璧受龍圖於河龜書於洛帝堯又脩壇河洛昧爽禮備榮光出河休氣四塞左氏傳曰昔夏之方有德也逺方圖物貢金九牧鑄鼎象物又曰武王克商遷九鼎於雒邑又曰成王定鼎於郟鄏杜預曰九鼎殷所受夏九鼎也鼎者帝王所重相傳以為寶器言宇文氏折若木之一枝為長虵於上國而其後遂膺圖定鼎也説文許沖上書曰古文時有六書鄒子曰五德從所不勝虞土夏木殷金周火秦水是以維嶽䧏神自天生德凝脂㸃漆日角珠庭言廣生而靈異也詩維嶽䧏神生甫及申論語曰天生德於予世説曰王右軍見杜𢎞治歎曰面如凝脂眼如點漆此神仙中人後漢書曰光武隆凖日角注云鄭康成尚書中候注曰日角謂庭中骨起狀如日洛書曰黑帝子長八尺一寸珠庭為子則名髙五都為臣則光照千里魏志注云文帝黄初二年正月改長安譙許昌鄴洛陽為五都淮南子曰宵明燭光在河州所照方千里華葢中天之峰未階其峻虞淵浴日之水不盡其源西京雜記曰終南山有樹直上百文無枝上結業條如車葢葉一青一赤望之斑駁如錦繡長安謂之丹青樹亦云華葢樹潘岳關中記曰終南山一名中南言在天中居都之南也淮南子曰日入虞淵之汜曙於䝉谷之浦行九州七舎有五億萬七千三百九里髙誘注曰自暘谷至虞淵凡十六所為九州七舎也歲在琱車年方竹馬月中桂樹切問能訓石上木生懸思卽悟杜氏幽求子謂皃年五歲有鳩車之樂七嵗有竹馬之歡世説曰徐孺子年九歲嘗月下戯人語之曰若令月中無物當極明耶徐曰不然譬如人眼中有瞳子無此必不明酉陽雜爼曰舊言月中有桂有蟾蜍石上木生卽所謂石上開松莫邪子赤比事也注見司馬裔碑文年十一孝公薨㷀㷀在疚孺慕過禮泉驚孝水竹動寒林三行克宣八翼斯舉左氏傳曰孔子卒公誄曰㷀㷀余在疚水經注云山海經曰平蓬山西十里廆山其陽多㻬琈之玉俞隨之水出於其隂北流注於穀世謂之孝水也潘岳西征賦澡孝水以濯纓是也楚國先賢傳曰孟宗至孝母好笋宗入林哀號方冬為之出因以供飬時人以為孝感所致三行疑卽周禮所謂三物司徒以鄕三物教萬民而賔興之晉書曰陶侃夢生八翼飛而登天見天門登其八惟一門不得入閽者撃之墜地折其左翼後都督八州大周建國宗子維城設壝封人分司典命開國天水郡公食邑二千戸本傳云少方嚴好文學封永昌郡公孝閔帝踐祚封天水郡公漢書地里志曰天水郡武帝元鼎三年置明帝改曰漢陽師古曰秦州地記云郡前湖水冬夏無増減因以名焉隋志天水郡舊秦州後周置總管府宗子維城詩詞也周禮鄭注云壝謂委土為墠壇所以祭也設壝封人謂主社稷也分司典命謂典瑞之司元年授使持節驃騎大將軍開府儀同三司其年四月授都督秦州刺史本傳同孝公久牧汧隴遺愛在人今兹見撫我君之子孝公導也本傳云導為隴右大都督秦南等十五州諸軍事秦州刺史性寛明善於撫御凡所引接人皆盡誠臨事敬愼常若弗及深為吏民所附朝廷以此重之魏恭帝元年薨朝議以導撫和西戎恩威顯著欲令世鎮隴右以彰厥德𦵏於上邽城華戎㑹𦵏萬餘人奠祭於路悲號滿野皆曰我君捨我乎大小相率負土成墳辭泣而去其遺愛如此漢書曰秦非子為周孝王養馬汧渭之間封為附庸邑之於秦今隴西秦亭秦谷是也史記正義曰汧音牽在隴州以東按秦州卽漢之隴西郡也豈獨司𨽻之臺鮑宣累葉丞相之府韋賢重代列異傳曰鮑宣宣子永永子昱三世皆為司𨽻而乗一驄馬京師人歌之曰鮑氏驄三人司𨽻再入公馬雖瘦行歩工漢書曰韋賢字長魯國鄒人也自孟至賢五世本始三年代蔡義為丞相封扶陽侯少子𤣥成復以明經厯位至丞相故鄒魯諺曰遺子黄金滿籯不如一經今孝公父子世鎮隴右若司𨽻丞相矣二年本傳武成初拜大將軍方衞青之張幕冊重元勳譬韓信之登壇榮髙獨拜東觀漢紀曰衞青大克匈奴武帝拜大將軍於幕中因號幕府漢書蕭何聞韓信亡自追之謂漢王曰諸將易得耳至如信者國士無雙王必欲拜之擇良日齋戒設壇塲具禮乃可耳王許之諸將皆喜人人各自以為得大將至拜大將乃信也一軍皆驚武成元年遷都督興梁等十九州諸軍事梁州刺史隋志云梁州順政郡西魏為興州嶓冡導漾乃濟漢之東流蔡蒙旅平實華陽之西極禹貢曰華陽黒水惟梁州岷嶓旣藝沱潛旣道蔡蒙旅平和夷底績又云嶓冢導漾東流為漢顔師古漢書注曰梁州東據華山之南西距黑水嶓嶓冢山也蔡蒙二山名旅陳也旅平言已平治而陳祭也漾水出隴西氏道東流過武闗山南為漢禹治漾水自嶓冢始也其年九月改封蔡國公食邑萬戸地接韓城關鄰楚鄣漢書地理志曰韓地東汝南汝南郡上蔡故蔡國周武王弟叔度所封度放成王封其子胡十八世蔡平侯徙新蔡皆在汝南是蔡國與韓接竟也春秋時蔡國屬楚後卒為楚所滅是楚國與蔡為鄰者也戸封八縣恩深寇恂之功邑啓萬家事極曹叅之賞後漢書曰寇恂字子翼上谷昌平人也恂同産弟及兄子姊子以軍功封侯者凡八人史記曰曹叅沛人也以髙祖六年封爵列侯與諸侯割符世世勿絶食邑平陽萬六百三十戸號曰平陽侯保定元年授少司寇犴戸苔生囹關籥動載酒屬車幸無寃氣觀囚軍府或聼鳴琴廣雅曰獄犴也夏曰夏臺殷曰羌里周曰囹圄説文曰囹獄也聲郎丁切圄守之也聲魚舉切述異記曰漢武帝幸甘泉長坂道中有蟲赤如肝頭目口齒悉具俱莫知也時東方朔曰此古獄地也積憂者得酒而解乃以蟲置酒中立消顔師古漢書注曰天子屬車常載酒食左氏傳曰晉侯觀於軍府見鍾儀問曰南冠而縶者誰也有司對曰鄭人所獻楚囚也問其旅曰伶人也與之琴操南音二年勑一作轉守蒲城都督潼關等六防諸軍事隋志云馮翊郡蒲城是本南北泉西魏所改也其年閏月遷都督秦渭等十二州諸軍事秦州刺史秦州卽天水郡注見上文隋志云隴西郡舊渭州公亟牧冀城頻藩隴坻豪傑歛手貪殘解印加以上谷精兵漁陽噪鼓北臨髙栁南望長榆隋志云天水郡冀城後周冀城縣漢書地理志應劭注曰隴西郡隴坻在其西又地理志曰上谷郡漁陽郡秦置代郡髙栁西部都尉治師古曰長榆在朔方卽衞青所云榆谿舊塞是也匈奴下馬之山貴相藏酒之谷莫不逺慕威聲遥承風化西河舊事曰白山冬夏有雪匈奴謂之天山過之皆下馬焉漢書西域傳曰大宛左右以蒲萄為酒富人藏酒至萬餘石久者至數十歲不敗俗耆酒二年奉詔向甘州迎皇后有文在手仲子之歸紀裂繻来卿為君逆自非名髙絶國威被和鄰豈得稱族而行尊君之命隋志云張掖郡西魏置西涼州尋改為甘州皇后阿史那氏突厥木扞可汗俟斤之女也注詳辛威碑事在保定五年此云三年誤周書武帝紀云保定五年二月詔陳國公純等如突厥逆女天和三年三月皇后阿史那氏至自突厥左氏傳曰宋武公生仲子仲子生而有文在其手曰為魯夫人故仲子歸於我又隱二年傳曰九月紀裂繻来逆女卿為君逆也四年授柱國大將軍昭陽以功髙見用項梁以名將當官以今方之彼有慙德史記陳軫見昭陽曰願聞楚國之法破軍殺將者何以貴之昭陽曰其官為上柱國封上爵執圭項羽本紀曰季父項梁為㑹稽守斬禆將徇下縣廣陵人召平於是為陳王徇廣陵未能下乃渡江矯陳王命拜梁為楚王上柱國又陳嬰曰項氏世世將家有名於楚應劭曰上柱國上卿官若今相國也二語謂授柱國也天和三年授都督陜虞等八州甘防諸軍事陜州刺史屈産垂棘旣有滅虢之兵王官羇馬非無絶秦之路周書明帝二年云河北置虞州𢎞農置陜州左氏傳曰晉侯以垂棘之璧與屈産之乗假道於虞以伐虢遂滅虢地理志曰𢎞農郡陜縣故虢國北虢在太陽東虢在滎陽西虢在雍州郡國志云河東郡北屈左傳曰二屈杜預曰二當為北傳曰屈産之乘有駿馬王官羇馬皆地名左傳成十一年晉侯使呂相絶秦曰康猶不悛入我河曲伐我洓水俘我王官翦我羇馬我是以有河曲之戰杜注云在文十二年秦本紀曰繆公二十六年將兵伐晉大敗晉人取王官及鎬康公六年秦伐晉取羇馬服䖍曰晉邑也公以正正鼓旗閑閑車軌服叛威邊算無遺策但以中外久勞積斯災疾山川則並走羣望賔客則諸侯在門左傳昭七年曰鄭子産聘於晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三月矣並走羣望有加而無瘳杜注曰晉所望祀山川皆走往祈禱又二十年傳曰齊侯疥遂痁諸侯之賔問疾者多在是以請謁承明言歸湯沐方詢夏郊之祀或辨桑林之祟漢書武帝謂嚴助曰君厭承明之廬三輔黄圖曰未央宮有承明殿著述之所也史記曰齊王獻城陽郡以為魯元公主湯沐邑言因疾請謁辭歸已邑也晉語曰平公有疾韓宣子贊授客館客問君疾對曰寡君之疾久矣上下神祗無不遍諭也而無除今夢黄能入於寢門不知人殺乎抑厲鬼邪子産曰昔者鯀違帝命殛之於羽山化為黄能以入於羽淵實為夏郊三代舉之晉實繼之其或者未舉夏郊邪宣子以告祀夏郊董伯為尸五月公見子産賜之莒鼎左傳襄十年曰宋公享晉侯於楚丘請以桑林舞師題以旌夏晉侯懼而退入於房去旌卒享而還及著雍疾卜桑林見杜注曰祟見於卜兆祟息遂反更除秦州刺史仍襲父爵豳國公本傳云及孝公追封豳國公詔廣襲爵分流之嶺未登晚塞之城空望言廣疾未瘳授秦州刺史未至其地而母死矣分流之嶺卽所謂隴頭流水分離四下也太夫人以公羸瘠悲泣相守胸氣交衝奄捐館舎公頓伏苫寢水漿不入雖王人勸奪創鉅愈増母死於子子死於母慈孝之道一朝總集本傳云廣母李氏以廣患彌年憂而成疾因此致沒廣旣居喪更加綿篤乃以毁薨世稱母為廣病廣為母亡慈孝之道極於一門大漸之辰春秋二十有九四關罷市三軍行哭言尋聽訟猶見寒棠還顧空营惟餘衰栁本傳廣薨髙祖素服親臨百僚畢集其故吏儀同李信允等上表伸其宿志庶存儉約後漢書光武贊曰四關重擾注云四關謂長安四塞之國也檀弓曰文伯之喪内人皆行哭失聲棠卽召伯甘棠也柳卽周亞夫細柳营也諡贈某官贈太保禮也六年六月歸𦵏於秦州之某原𤣥甲啓路追旌驃騎之功龍旂贈行深悼東平之遠漢書曰驃騎將軍霍去病卒天子悼之發屬國𤣥甲軍陳自長安至茂陵為冢像祁連山後漢書曰東平王蒼薨詔有司加賜鸞輅龍旂九旒虎賁百人奉送王行公亮直惟忠温恭惟孝居之仁義飾以禮樂風神機警聰睿精明有仞於宫牆無形於喜愠郭有道碑曰宫牆重仞王戒云嵇康未嘗見其喜愠之色金版玉策之記枕藉忘疲蘭葉芝花之圖膏映必舉莊子曰從説之則以金版六弢司馬崔云金版六弢周書或曰秘籖也抱樸子有玉策記淮南子曰黄帝逰於翠媯見大盧魚折漝而至汎白圖蘭采朱文以授黄帝帝舒受之故曰綠圖河圖曰舜與三公臨河觀黄龍五采負圖以紫芝為渥章曰天黄符璽碣石秋雲昭陽落月思風含臆言泉流吻碣石宫名史記曰騶衍如燕昭王築碣石宫身親往師之昭陽殿名漢書曰趙皇后弟絶幸居昭陽舎揚雄傳曰趙昭儀方大幸每上甘泉常法從在屬車間豹尾中雄言屏玉女郤䖍妃以微戒齊肅之事賦成奏之天子異焉陸機文賦曰思風發於胸臆言泉流於脣吻翩翩書記則阮瑀陳琳荏荏風流則王濛謝朓一作尚魏志曰陳留阮瑀字元瑜廣陵陳琳字孔璋太祖並以琳瑀為司空軍謀祭酒管記室軍國書檄多琳瑀所作也文帝書與元城令吳質曰孔璋表章殊健微為繁富元瑜書記翩翩致足樂也晉書曰王濛字仲祖哀靖皇后父也美姿容嘗覧鏡自照稱其父字曰王文開生如此兒耶居貧㡌敗自入市買之嫗悦其貌遺以新㡌時人以為逹與沛國劉惔齊名友善時人以惔方荀奉倩濛比袁曜卿凡稱風流者舉濛惔為宗簡文帝之為㑹稽王也甞與孫綽商略諸風流人綽曰王濛温潤恬和謝尚清易令達而濛性和暢能言理詞簡而有㑹及帝輔政益貴幸之號為入室之賔齊書曰謝朓字𤣥暉陳郡陽夏人也少好學有才名文章清麗善草𨽻長五言詩沈約常云二百年来無此詩也語其百發弓絶於猿吟論其百中劒當作箭深於雁陣上飬由基事下更嬴事注見前枚乘之望梁苑不憚棄官樂毅之求燕路無辭千里漢書曰枚乘字叔淮隂人也為吳王濞郎中吳王之初怨望能為逆也乘奏書諌吳王不用乘策卒見禽滅漢旣平七國乘由是知名景帝召拜乘為𢎞農都尉乘久為大國上賔與英俊並遊得其所好不樂郡吏以病去官復遊梁梁客皆善屬詞賦乘尤髙史記曰樂毅賢好兵趙人舉之及武靈王有沙丘之亂乃去趙適魏燕昭王屈身下士先禮郭隗以招賢者樂毅於是為魏昭王使於燕燕王以為亞卿至如應變將略雷電立成帷帳謀猷孫吳闇合漢書曰電撃雷震晉書曰山濤不學孫吳而闇與之合孫吳孫武子吳起也有品藻人倫之志有清平天下之心漢書揚雄傳曰尊卑之條稱述品藻師古曰品藻者定其差品及文質後漢書曰范滂攬轡登車有澄清天下之志鵬路忽催龍津遂壅鵬路卽莊子云鵬飛九萬里也龍津遂壅者三秦記曰龍門一名河津魚不得上則暴腮而返嗚呼哀哉大宰早茂三荆長辭萬始撫飬遺孤枝連同氣周景式孝子傳曰古有兄弟欲分異出門見三荆同株接葉連隂嘆曰木猶欣聚况我而殊哉馬援之誡兄子義存謹飭王沈集作況非之事世叔情深愛敬同德比義此之謂乎後漢書曰馬援兄子嚴敦並喜譏議而通輕侠客援在交趾還書誡之曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也好議論人長短妄是非正法此吾所大惡也寜死不願子孫有此行也汝曹知吾惡之甚矣晉書曰王沈字處道太原晉陽人也父機魏東郡太守沈少孤養於從叔司徒昶事昶如父奉繼母寡嫂以孝義稱乃為銘曰御乾從紀乘離作聖白環讓德𤣥圭受命言宇文氏受命為帝也御乾乘乾也周易乾卦云時乘六龍以御天從紀如龍紀鳥紀之屬易卦傳曰離也者明也萬物皆相見南方之卦也聖人南面而聼天下嚮明而治葢取諸此也帝王世紀曰西王母慕舜之德来獻白環禹貢曰禹鍚𤣥圭告厥成功平一地紐増輝天鏡傍䕃數國前臨七政謝莊明堂歌云地紐謐隋書經籍志有天鏡乾坤鏡各一巻又有梁天鏡一巻傍䕃數國若木也言與帝同枝泒也鄭𤣥曰七政日月五星地屬先登一作平隂時逢下武玊璜撥亂金縢光輔地謂隴西也孝公為秦州刺史登隴頭矣釋名曰軍行在前曰先登登之向敵陣也後漢書祭遵傳范升上疏追稱遵曰西拒隴蜀先登坻上一作平隂者左傳有平隂之役詩序曰下武嗣文也竹書紀年曰呂尚釣得玉璜其文要曰姬受命昌来提撰爾洛鈴報在齊周書曰武王有疾周公作金縢孔傳曰為請命之書藏之於匱緘之金不欲人開之遂以所藏為篇名宇文國號曰周言當下武之時佐周如周太公姬公也衞晉承家邢茅胙土波分建木𣲖流𤣥扈言周朝封建親戚廣乃受封是同枝𣲖也衞康叔之後晉唐叔虞之後邢茅周公之後左傳所云凡蔣邢茅胙祭是也山海經曰建木在窫窳西弱水上郭璞曰建木青葉紫莖黑花黄實其下聲無響立無影也山海經又云讙舉之山雒水出焉而東北流注於𤣥扈之水竹書紀年曰黄帝齋於中坐於𤣥扈洛水之上景命寅序徽猷淵塞忠有令圖孝為全德詩云景命有亳又曰其心塞淵山節涖政桓珪守國瀚海將臨燕山行勒論語包咸注曰節栭也刻鏤為山周禮曰上公之禮執桓圭史記曰驃騎將軍封於狼居胥禪姑衍臨瀚海而還如淳曰瀚海北海名正義曰按瀚海自天海名羣鳥解羽伏乳於此因名後漢書曰竇憲與北單于戰於稽落山破之刻石燕然山平樂髙宴金華説經論儒璧水親禮明庭西京賦曰大駕幸於平樂之館漢書曰成帝初方向學召鄭寛中張禹説尚書論語於金華殿中三輔黄圖曰璧廱如璧之圓雍之以水象教化流行也詩云於論鼔鐘於樂璧廱毛萇曰論思也水旋丘如璧廱以旋觀者史記封禪書曰黄帝接萬神明廷明廷者甘泉也相風待賦承露須銘乘舟相日策馬隨星三輔黄圖曰長安宫南靈臺上有相風銅烏遇風乃動一曰長安靈臺上有相風銅烏千里風至此烏乃動又曰建章宫神明臺武帝造祭仙人處上有承露盤竹書紀年曰伊挈將應湯命夢乘船過日月之傍天文志曰王良策馬車騎滿野德舉克明賢能允淑上將受脤元戎推轂左氏傳曰受脤歸脤杜注云受脤謂君祭以肉賜大夫詩曰元戎十乘以先啟行趙失東漁胡亡南牧箭下遼城泥封函谷言廣督諸州軍事威振殊俗也史記齊威王曰吾臣有肸子守髙唐趙人不敢東漁於河過秦論曰胡人不敢南下而牧馬遼城疑作聊城史記曰燕將攻聊城魯連子乃為書約之矢以射城中遺燕將燕將乃自殺後漢書曰隗囂將王元請以一丸泥封函谷關袞衣頻露丹襜亟巻約法情推繁辭理遣後漢書曰郭賀字喬卿拜荆州刺史顯宗廵狩至南陽特見嗟嘆賜以三公之服黼黻冕旒勅行部去襜帷使百姓見其容服以章有德又曰賈琮為冀州刺史舊典傳車驂駕垂赤帷裳迎於州界及琮之部升車言曰刺史當逺視廣聽糾察美惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風自然竦震其諸臧過者望風解印綬去漢書髙帝詔曰吾當與汝約法三章耳晉書衞玠曰人有不及可以情恕非義相干可以理遣盜烏懸察疑蛇立辨人共官園家同野繭後漢書曰王霸為頴川大守吏不敢舎郵亭食於道旁烏攫其肉霸迎勞曰甚苦食於道烏盜其肉吏大驚不敢有所隱風俗通曰汲令應彬請主簿杜宣飲酒時其上懸赤弩照杯中如蛇宣惡之因得疾彬延宣於舊處置酒指曰此弩影似耳疾遂瘳晉書樂廣事同注詩四巻臥疾東觀漢紀曰詔有司京師果園悉以假貧人崔豹古今注曰元帝永元四年東萊郡東平山有野蠶為繭繭生蛾蛾生卵卵著不收得萬餘石民以為蠶絮籋雲推景轉風落仞星裂中台山傾左鎭漢書樂志曰籋浮雲蘇材曰籋音躡言天馬上躡浮雲也晉書曰張華死中台星坼山傾左鎮謂㤗山頽也周禮曰鎮兖州其鎮曰岱山卽㤗岱四夏楹舎爵殷階奠殯縿幕躐行明旍當作旌庭引檀弓曰夏后氏殯於東階之則猶在胙也殷人殯於両楹之間則以賔主夾之也檀弓曰穆公之母卒曾申曰布幕衞也縿幕魯也鄭注云幕所以覆棺上縿縑也縿讀如綃衞諸侯禮魯天子禮兩言之者言僭巳久矣幕或為幦又檀弓曰銘明旌也以死者為不可别故以其旌識之秦川直望隴水分飛山河滿目容衞靈歸三秦記隴頭歌曰隴頭流水鳥聲幽咽遥望秦川肝腸㫁絶又曰隴頭流水分離四下念我行役飄然曠野世説曰過江諸人每至暮輒相邀新亭藉卉飲宴周侯中坐而嘆曰風景不殊舉目有山河之異皆相見流淚容衞疑若營魂入重陽閣詩云南宫容衞疎陵圖石馬車畵袞衣西京雜記曰張丞相墓前有石馬儀禮旣夕云道車載朝服鄭注云道車朝夕及燕出入之車朝服日視朝之服也𤣥衣素裳小山揺落長林變衰淮南王安招隱士序曰招隱士者淮南小山之所作也淮南子曰桑葉落而長年悲也楚辭曰草木揺落而變衰凄愴原隰荒凉宅兆爾雅曰髙平曰原下濕曰隰孝經曰卜其宅兆而安措之鄭注曰宅墓穴也兆塋域也𦵏事大故卜之樹密人稀山多路小十里松城千年華表夜臺尤寂窮泉無曉續捜神記曰遼東城門華表柱忽有白鶴來集空中空曰有鳥有鳥丁令威去家千年今來歸城郭如故人民非何不學仙冢纍纍又齊諧記曰燕昭王墓前華表已當千年阮瑀七哀詩曰冥冥九泉室漫漫長夜臺潘岳哀子逝文曰襲窮泉兮朽壌呂延濟曰窮泉墓中也庾子山集巻十五, SBCK: 欝}
