  - {type: variant, offset: 0, length: 4586, content: 欽定四庫全書庾子山集巻九周庾信撰錢唐倪璠纂註連珠擬連珠傅𤣥敘連珠曰所謂連珠者興於漢章之世班固賈逵傅毅三子受詔作之其文體辭麗而言約不指說事情必假喻以達其㫖而覽者㣲悟合於古詩諷興之義欲使厯厯如貫珠易看而可悅故謂之連珠陸機復引舊義以廣之謂之演連珠信復擬其體以喻梁朝之興廢焉觀其辭㫖悽切略同於江南之賦矣蓋聞經天緯地之才拔山超海之力左氏傳曰經天緯地曰文史記項羽歌曰力拔山兮氣蓋世孟子曰挾泰山以超北海戰陣勇於風飈謀謨出於胸臆揚雄曰風發飈拂師古曰飈廻風也斬長鯨之鱗截飛虎之翼左氏傳曰古者明王伐不敬取其鯨鯢而封之以為大戮於是乎冇京觀異物志雄鯨雌鯢長者數千里汲冢周書曰無虎傅翼將飛入宫擇人而食是以一怒而諸侯懼安居而天下熄二語出孟子肅此章喻梁武帝雄才大力異勇神謀行次熨斗坑王十萬之軍兵發襄陽授東昏一夫之首使魏敕莫敢爭鋒齊王於焉禪位是梁朝有天下之始也蓋聞蕭曹贊務雄略所資漢書曰蕭何曹參為相國以喻南康即位之時武帝進位相國也魯衛前驅威風所假左氏傳曰太姒之子周公康叔為相睦也論語云魯衛之政兄弟也以喻帝與齊俱姓蕭氏同承淮陰令整之後為兄弟也是以黄池之㑹可以争長諸侯左傳哀十三年曰夏公㑹單平公晉定公吳夫差於黄池秋七月辛丑盟吳晉争先吳人曰於周室我為長晉人曰於姬姓我為伯杜元凱云陳留封丘縣有黄亭及濟水吳與晉於周皆姬姓以喻帝與齊皆蕭姓故得進爵王公争長於諸侯也鴻溝之盟可以中分天下史記高祖本紀曰項羽與漢王約中分天下割鴻溝而西者為漢鴻溝而東者為楚以喻梁武帝成江表王業與魏氏中分南北若鴻溝矣公此章喻梁帝匡贊擬於蕭曹宗盟同於魯衛故得王備九錫之儀南北定中分之業江表之極盛者也蓋聞解封豕之結塞長蛇之源必須製裳千里喢血轅門左傳申包胥曰吳為封豕長蛇以薦食上國杜云言吳貪害如蛇豕喻侯景也左傳子産曰子有美錦不使人學製焉大官大邑身之所庇也釋名曰上衣下裳史記文帝紀曰啑血京師索隠曰漢書啑作牒音跕丁蹀反漢書陳湯傳曰杜業皆言喋血無盟歃事廣雅曰喋履也謂履涉之周禮曰設車宫轅門鄭注謂王行止宿險之處備非常次車以為藩則仰車以其轅表門言欲寧亂必千里命將盟喢以備非常也是以開百里之圍用陳平之一策史記曰高帝擊韓王信於代卒至平城為匈奴所圍七日不得食高帝川陳平竒計使單于閼氏圍以得開高帝既出其計秘世莫得聞桓譚新論曰或云陳平為高帝解平城之圍則言其事秘世莫得而聞也以工妙踔善故藏隠不傳焉子能權知斯事否吾應之曰此策乃反薄陋拙惡故隠而不泄高帝見圍七日而陳平往說閼氏閼氏言于單于而出之以是知其所用說之事矣彼陳平必言漢有好麗美女為道其容貌天下無有今困急已馳使歸迎取欲進與單于單于見此人必大好愛之愛之則閼氏日以逺疎不如及其未到令漢得脫去去亦不持女來矣閼氏婦女有妬媔之性必増惡而事去之此說簡而要及得其用則欲使神怪故隠匿不泄也劉子駿聞吾言乃立稱善焉盟千乘之國須季路之一言左傳哀十四年曰小邾射以句繹來奔曰使季路要我吾無盟矣使子路子路辭季康子使冉有謂之曰千乘之國不信其盟而信子之言子何辱焉對曰魯有事於小邾不敢問故死其城下可也彼不臣而濟其言是義之也由弗能以喻侯景内附當如季路之於邾射辭之為是不當納也此章喻梁武帝納侯景之非也景屬高歡潛圖反叛彼既封豕長蛇包藏毒害之志我須製裳㰱血得其駕馭之方而乃造次納降漫無區畫既無陳平之竒策又少季路之一言使平城之圍困卒成句繹之叛徒滋盛醸成國禍是以傷之蓋聞得賢斯在不藉揮鋒股肱良哉無論應變是以屈倪參乘諸侯解方城之圍屈倪屈完也左傳僖四年曰齊侯以諸侯之師侵蔡遂伐楚楚子使屈完如師師退次於召陵齊侯陳諸侯之師與屈完乘而觀之齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以德綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池雖衆無所用之屈完及諸侯盟杜預注云方城山在南陽葉縣干木為臣天下無西河之戰史記曰魏文侯客段干木過其閭未嘗不軾也秦嘗欲伐魏或曰魏君賢人是禮國人稱仁上下和合未可圗也文侯由此得譽於諸侯而此章喻梁武帝用朱异等輩委寄失才也引古賢臣寓意自見所謂使覽者微悟合於古詩諷興之義是也蓋聞邯鄲已危徒思馬服史記曰趙恵文王賜趙奢為馬服君與亷頗藺相如同位秦與趙兵相距長平時趙奢已死奢子趙括代亷頗為將括軍敗數十萬之衆遂降秦秦悉坑之趙前後所亡凡四十五萬明年秦兵遂圍邯鄲嵗餘㡬不得脫薊城去矣空用荆軻史記曰秦兵臨易水禍且至燕太子丹陰養壯士二十人使荆軻獻督亢地圗於秦因襲刺秦王秦王覺殺荆軻使將軍王翦擊燕十月而拔薊城燕王亡徙居遼東斬丹以獻秦秦拔遼東虜燕王喜卒滅燕是以竹杖扶危不能正武擔之石漢書曰張騫言使大夏時見蜀布卭竹杖蜀本紀曰武都有丈夫化為女子顔色美好蓋山精也蜀王娶以為妻不習水土疾病欲歸國蜀王留之無幾物故故蜀王發卒之成都擔土於成都廓中葬蓋地數畝高七丈號曰武擔也蜀志曰劉先主即帝位於成都武擔之南裝松之曰武擔山名在成都西北蘆灰縮水不能救宣房之河淮南子曰女媧聚蘆灰以止淫水高誘曰蘆葦也生於水故積聚其灰以止淫水地平出水為淫水漢書溝洫志曰上使塞瓠子決河歌曰宣房塞兮萬福求於是卒塞瓠子築宫其上名曰宣房而道河北行二渠復禹舊迹而梁楚之地復寧無水災此章喻臺城陷後雖名將烈士無所復用邯鄲薊城皆喻建康之敗也竹杖已下言亂勢已成力不能挽哀江南賦云敝箄不能救鹽池之鹹阿膠不能止黄河之濁即此意也蓋聞穴蟻衝泉未知逺慮易林曰蟻封穴户大雨將至𤣥禽巢幕何能支久左傳襄二十九年云吳公子札謂孫文子曰夫子之在此也猶燕之巢於幕上杜預曰言至危也按燕一名𤣥鳥詩云天命𤣥鳥故稱𤣥禽也是以大厦既焚不可灑之以淚長河一決不可障之以手西京賦曰大厦耽耽薛綜曰屋之四下者為厦江淹别賦云去復去兮長河湄如此章喻臺城陷後侯景入城武帝簡文為賊臣所制蟻在泉中悲長河之一決燕巢幕上觀大厦之既焚豈可手障淚灑言其不能救也蓋聞膏脣喋喋市井營營或以如簧自進或以狙詐相傾史記匈奴傳曰喋喋而佔佔冠固何當索隠注曰喋音諜利口也服䖍曰口舌為喋莊子云仲尼曰商賈旦於市井以求其贏司馬彪曰九夫為井井有市列子林𩔖曰吾又安知營營而求生之非惑乎鮑照行樂至城東橋詩曰擾擾遊宦子營營市井人詩云巧言如簧漢書秦據勢勝之地騁狙詐之兵是以子貢使乎五都交亂史記仲尼弟子傳曰子貢一出存魯亂齊破吳彊晉而霸越子貢一使使勢相破十年之中五國各有變張儀見用六國縱横史記索隠注曰張儀說六國使連衡而事秦山東地形從長蘇秦相六國令從親而賔秦闗西地形衡長張儀相六國令破其縱而連秦之衡故蘇為合從張為連衡也衡音横東西為横南北為從也肉此章喻諸王授兵之日讒潛者多以致兄弟猜嫌骨屠害張纘有起兵聚米之說遂爾䦧牆蕭綸有代景行師之言聞之掩泣哀江南賦云晉鄭靡依魯衛不睦是也蓋聞謀猷是習權變須長時増齊竈或卧燕牆史記曰孫臏使齊軍入魏地為十萬竈明日為五萬竈明日為二萬竈後漢書曰虞詡征朝歌賊令吏士各作兩竈日増倍之或問曰孫臏減竈而君増之何也詡曰孫臏見弱吾今示強勢有不同故也崔鴻十六國春秋曰建興十年慕容寶軍參合魏縱兵擊之燕軍敗走赴水死傷者四五萬人十一年慕容垂至參合見往年戰處積骸如山設祭弔之禮死者父兄子弟皆號哭六軍哀慟垂慚憤嘔血因而寢疾乗馬輿而進頓平城西北三十里積十日疾篤踰山結營築燕昌城以自固是以井陘之兵如鴻毛之遇火漢書曰韓信張耳欲東下井陘擊趙未至井陘口三十里止舍使一大赤幟戒曰趙見我走必空壁逐我若拔趙幟立漢幟趙人還歸壁見漢赤幟大驚以漢為破趙矣遂亂遁走於是漢軍夾擊破趙斬成安君擒趙王歇長平之卒若秋草之中霜史記曰秦與趙兵相拒長平趙括為將秦將白起縱奇兵徉敗走而絶其糧道分斷其軍為二士卒離心四十餘日軍餓趙括出銳卒自搏戰秦軍射殺趙括括軍敗數十萬之衆衆遂降秦秦悉坑之趙前後所亡凡四十五萬此章喻王僧辯等平景之師也蓋聞彼黍離離大夫有䘮亂之感詩序曰黍離閔宗周也周大夫行役過故宗廟宫室盡為禾黍故為黍離之詩麥秀漸漸君子有去國之悲史記曰武王封箕子於朝鮮而不臣也其後箕子朝周過故殷墟感宫室毁壊生禾黍箕子傷之欲哭則不可欲泣為其近婦人乃作麥秀之詩以歌詠之其詩曰麥秀漸漸兮禾黍油油兮彼狡童兮不與我好兮所謂狡童者紂也殷民聞之皆為流涕是以建章低昻不得猶瞻灞岸三輔黄圗曰武帝太初元年作建章宫度為千門萬户王粲七哀詩曰南登灞陵岸廻首望長安建章灞岸在西京以喻梁都在建業傷故宫之殘毁也德陽淪没非復能臨偃師三輔黄圗曰景帝廟號德陽宫後漢書曰光武出自景帝漢書地理志云河南郡有偃師縣在洛陽東三十里光武都洛是臨偃師以喻元帝都江陵之後傷中興之道銷也傷此章喻梁國之亡似感宗周如悲殷室建康一敗既故國之殘江陵三年無補中興之業此子山所以舊國舊都望之悵然者也蓋聞市朝遷貿山川悠逺古出夏北門行曰市朝易人穆王傳道里悠逺山川間之是以狐兔所處由來建始之宫潘岳西征賦曰狐兔窟穴於殿傍魏志曰建安二十五年正月曹公在洛陽起建始殿荆棘參天昔日長洲之苑雍門周曰墳墓生荆棘狐兔穴其中吳都賦云佩長洲之茂苑清此章喻克復之後遷都江陵朝市既移山川遂隔太罹亂之後既已陷没臺城裴横入獵之餘復令揚灰太極羽儀輦路莫有孑遺户口人民百遺一二而故宫於焉禾黍矣蓋聞天方薦瘥䘮亂𢎞多詩小雅節南山之辭毛傳云薦重瘥病𢎞大也空思說劔徒聞枕戈樂記曰裨冕搢笏而虎賁之士說劔也晉書劉琨與親故書吾枕戈待旦志梟逆虜常恐祖生先吾著鞭方言曰㦸吳揚之間謂之戈是以劉琨之英略莫知自免晉書曰劉琨字越石中山魏昌人愍帝即位三年拜為司空都督幷冀三州諸軍事幽州刺史鮮卑段匹磾數遣使要琨欲與同奬王室琨由是率衆赴之從飛狐入薊匹磾見之甚相崇重與琨結婚約為兄弟是時西都不守元帝稱制江左琨乃令温嶠勸進於是河朔征鎮夷夏一百八十人連名上表元帝轉琨為侍中太尉其餘如故并贈名刀琨答曰謹當躬自執佩馘截二􅒾匹磾奔其兄䘮琨遣其世子羣送之為末波所獲因共結盟而襲匹磾宻遣使齎羣書請琨為内應而為匹磾邏騎所得時琨别屯故征北府小城不之知也因來見匹磾匹磾以羣書示琨曰意亦不疑公是以白公耳琨曰與公同盟志奬王室仰憑威力庶雪國家之恥若兒書宻達亦終不以一子之故負公㤀義也匹磾雅重琨初無害琨志將聽還屯其中弟叔軍好學有知謀為匹磾所信謂匹磾曰吾外夷耳所以能服晉人者畏吾衆也今我骨肉構禍是其良圗之日若能奉琨以起吾族盡矣匹磾遂留琨匹磾所署代郡太守辟閭嵩與琨所署雁門太守王據後將軍韓據連謀合作攻具欲以襲匹磾而韓據女為匹磾兒妾聞其謀而告之匹磾於是執王據等悉誅之會王敦宻使匹磾殺琨匹磾遂縊之子姪四人俱被害按劉琨喻王僧辯也梁元帝承制江陵僧辯勸進猶晉元帝承制江左劉琨勸進也僧辯為陳霸先所縊猶劉琨為段匹磾所縊也兩人行跡相似故引用之且陳武無匹磾之忠而蹈處仲之迹遂致易梁為陳王公之不免也惜哉祖逖之慷慨裁能渡河晉書曰祖逖字士稚范陽遵人也輕財好俠慷慨有節京師大亂逖以社稷傾覆常懐振復之志元帝以逖為奮威將軍豫州刺史給千人廪布三千匹不給鎧仗使自招募仍將本流徙部曲百餘家渡江中流擊楫而誓曰祖逖不能清中原而復濟者有如大江辭色壯烈衆皆慨歎屯於江陰起鑄冶兵器得二千餘人而後進前後剋獲由是黄河以南盡為晉上詔進逖為鎮西將軍石勒不敢窺兵河南子山引此恨當時無此人陳霸先不足云也此章喻建業陽九江陵百六王僧辯有討平侯景之功而鮮保身之哲陳霸先懐覬覦梁鼎之意而無渡河之心此南風之所以不競也蓋聞穀林長送蒼梧不從吕氏春秋曰堯葬穀林皇甫謐曰穀林即陽城堯都平陽於詩為唐國禮記謂舜葬蒼梧三妃未從以喻元帝之死也惟桐惟葛無樹無封左傳哀二年云趙簡子誓曰若其有罪絞縊以戮桐棺三寸不設屬辟注桐棺三寸禮記夫子制於中都四寸之棺五寸之椁以斯知不欲速朽也鄭康成注云此庶人之制也棺用難朽之木桐木易壊不堪為棺故以為罰墨子尚儉有桐棺三寸漢書楊王孫曰昔帝堯之葬也窽木為匱葛藟為緘服䖍曰藟葛蔓也一曰藟亦草名葛之纈也緘束也音工咸反周易曰古之葬者, SBCK: ''}
