body:
  text: 庾子山集卷十一周庾信撰錢唐倪璠纂注教文序傳答移市教昔張楷碩儒尚移𢎞農之市後漢書曰張楷字公超除長陵令不至官隱居𢎞農山中學者隨之所居成市後華陰山南遂有公超市宜官妙篆猶致酒壚之客衛恆四體書序曰上谷王次仲善𨽻書始為楷法至靈帝好書世多能者而師宜官為最甚矜其能每書輒削焚其札梁鵠乃益為版而飲之酒候其醉而竊其札鵠卒以工書至選部尚書宜官後為袁術將今巨鹿宋子有耿球碑是術所立其書甚工云是宜官書也况復德總郇周聲高梁楚郇故國名左氏傳曰畢原酆郇文之昭也汲郡古文曰晉武公滅郇以賜大夫原點是為郇叔又云文公城郇臣瓚云在晉之境內河東有郇城即古郇國班彪北征賦曰息郇邠之邑鄉邠周地也貨殖傳曰洛陽東賈齊魯南賈梁楚希風慕義之士舉袂成帷卧轍反車之流摩肩相接戰國策蘇秦説齊宣王曰臨淄之途車轂擊人肩摩連衽成帷舉袂成幕遂使王充閲市之處逺出荒郊後漢書曰王充字仲任會稽上虞人也好博覽而不守章句家貧無書嘗遊洛陽市肆閲所賣書一見輒能誦憶遂博通衆流百家之言石苞販鐵之所翻臨崖岸晉書曰石苞字仲容渤海南皮人也被使到鄴事久不決乃販鐵於市市長沛國趙元儒名知人見苞異之因與結交嘆苞逺量當至公輔由是知名聖德謙虛未忘喧湫左氏傳曰湫隘嚻塵杜云湫下也子小反欲令吹簫舞鶴還反舊鄽史記稱伍子胥鼓腹吹箭乞食吳市吳越春秋曰吳王闔閭葬女於國西閶門乃舞白鶴於吳市中令萬民隨而觀之還使男女與鶴俱入羡門因發機以掩之殺生以送死賣卜屠羊請辭新闠漢書曰蜀有嚴君平卜筮于成都市一日裁數人得百錢足自養則閉肆下簾而授老子又三輔黃圗曰司馬季主卜於東市莊子曰楚昭王失國屠羊説走而從於王昭王反國將賞從亡者及屠羊説屠羊説曰大王失國説失屠羊大王反國説亦反屠羊臣之爵祿已復矣又何賞之有遂不受也崔豹古今注曰闤市垣闠市門也而交貿之黨好留豳岐之衆難遣廣雅曰貿易也史記周本紀曰公劉子慶節立國於豳古公亶父立薰育戎狄攻之古公去豳渡漆沮踰梁山止於岐下豳人舉國扶老攜弱盡復歸古公於岐下索隱曰豳即邠也徐廣曰岐山在扶風美陽西北其南有周原文移齊河陽執事文周書武帝紀曰天和四年夏四月乙已齊遣使來聘以正月辛卯朔推之當是四月二十二日來聘二十七日移文也下篇云大司馬齊國公知是齊王宇文憲所移也高氏受東魏禪國號曰齊時河陽為彼所屬故移周天和四年四月二十七使持節車騎大將軍儀同三司大都督陜西總管府移齊河陽執事陜西總管齊王憲也憲本傳及碑文云天和元年徵還雍州牧雍州陜西也自疆場卧鼓邊鄙收烽義讓之行未能期月孔城誨盜即值苞藏周書云天和四年齊將獨孤永業來寇盜殺孔城防主能奔達以城應之通典云河南府夀安縣有九曲城所謂九阿也高齊置孔城防以備周在縣東南左傳鄭行人子羽曰大國無乃苞藏禍心以圗之是以板載之師須時而動自安封域非求拒防詩云縮板以載博物志曰齊南有長城巨防陽關之險雖復風塵暫接旗鼓無侵五將即回雙崤已靜李陵答蘇武書云五將失道陵獨遇戰左氏傳曰秦穆公召孟明西乞白乙使出師襲鄭蹇叔之子與師哭而送之曰晉人禦師必于崤崤有二陵焉其南陵夏后臯之墓也其北陵文王之所避風雨也謝朓和王著作八公山詩曰雙崤望河澳以崤有二陵稱雙崤矣始奉朝旨獲彼移書令受叛城使回軍實左氏傳曰以數軍實想彼邊司已奉處分既有此還輒須領納未知何日可遣戍兵指附行人遲能速報盟且不渝鄰境相善顧瞻原野幸甚實多故移又移齊河陽執事文周天和四年十一月十日陜州總管長史梁昕移齊河陽執事周書云梁昕字元明安定烏氏人也天和初徵拜工部中大夫出為陜西總管府長史自拭玉繼書通關去傳儀禮曰賔朝立東西面賔人北面坐拭圭鄭注賔使者拭清之也漢書音義曰舊出入關皆用傳傳煩因裂襦帛分持後復出合之以為符信言周齊通好也周書天和四年四月齊遣使來聘是也實謂上方銷劒山陽息馬漢書顔師古注云尚方少府之屬官也使供御器物故有斬馬劍也尚書武成篇曰歸馬華山之陽孔傳曰欲使自生自死示天下不復乘用過兹禦客或慢重扃周易曰重門擊柝以禦暴客説文曰扃門之關也屬故司疆陰行善盜君一臣二上穆下乖司疆司疆場之官謂齊將獨孤永業也永業來寇盜殺孔城防主言君方修好而臣有二心上行和順而下獨乖戾蓋責之也國家以邊鄙心搖須固備守大司馬齊國公天子介弟中軍元帥謂齊煬王憲也武成二年封齊國公天和三年拜大司馬憲為太祖宇文泰之第五子武帝之弟也駕馭孫吳驅馳􅀈虎孫武吳起也述異記曰􅀈之為獸狀如虎豹而小舉因農隙義異城郎師巡我境曽非反鄆周書武帝紀云天和四年八月庚辰盜殺孔城防主以其地入齊九月辛卯遣柱國齊國公憲率衆於宜陽築崇德等城春秋隱元年夏四月費伯帥師城郎杜注魯邑高平方與縣東有郁郎亭九年傳曰夏城郎書不時也文十二年季孫行父帥師城鄆杜云城陽姑幕縣南有員亭即鄆也昭元年傳云季武子伐莒取鄆莒人告於會楚告於晉請戮其使趙孟曰莒魯爭鄆為日久矣縮載之畢前旗已回詩大雅綿云從繩則直縮板以載毛傳云乘謂之縮釋器云繩謂之縮孫炎曰繩束築版謂之縮郭璞云縳束之也彼國兵馬不防彼國謂齊也殿後餘塵遂至相接左氏傳曰猛也殿又曰孟之側後入以為殿殿丁練反後軍也建旌疊疑作壘上未及五申安鄴城防先驚七伏史記曰孫武子三令五申之左傳宣十二年邲之戰云士季使鞏朔韓穿帥七覆於敖前杜云為伏兵七處也當時鋒刃或膏原野漢書師古注曰鋒戈戟刃也又蘇武傳衛律曰空以身膏草野班固東都賦曰原野厭人之肉所獲彼將夏州刺史梁老首領今以相還尸鄉不逺無令久客漢書地理志河南郡偃師縣尸鄉殷湯所都後漢書曰溫序為隗囂所殺喪到洛陽賜城傍地為塜長子夀夢序曰久客思鄉里夀即上書乞骸骨歸葬馬驢甲兵具條相勒封人宜依領納宿無鬭志不獲交綏致此埃塵誰階其咎故移周禮封人掌為畿封而樹之鄭注畿上有封若今時界也左氏傳曰潁考叔為潁谷封人祭仲足為祭封人宋高哀為蕭封人論語有儀封人皆以地方封人蓋封人職典封疆居在邊邑潁谷儀祭皆是國之邊邑也左傳文十二年曰乃皆出戰交綏杜注云古名退軍為綏晉志未能堅戰短兵未至爭而兩退故曰交綏正義曰魏武引司馬法云將軍死綏舊説綏却也詩云誰生厲階移虜留使文周書建德五年二月辛酉遣皇太子斌巡撫西土仍討吐谷渾戎事節度並宜隨機專決按武帝母皇太后叱奴氏以建德三年三月癸酉崩至建德五年三月戊申祥文云入境以來國祥甫邇至遣使相隨永敦鄰睦知虜謂吐谷渾也吐谷渾遣使入境在建德五年二月發遣彼使在次年春初建德六年正月所移也年月朔日某官告配某州郡前本欲發遣彼使但某入境以來國祥甫邇自秋迄冬未申欵接周書云建德三年三月癸酉皇太后叱奴氏崩帝居倚廬朝夕共一溢米羣臣表請纍旬乃止詔皇太子斌總釐庶政五月庚寅葬文宣皇后於永固陵帝袒跣至陵所辛酉詔曰齊斬之情經籍彞訓近代沿革遂亡斯禮伏奉遺令既葬便除攀慕几筵情實未忍三年之喪達乎天子古今無易之道王者之所常行但時有未諧不得全制軍國務重庶自聽朝縗麻之節苫廬之禮率遵前典以申罔極百寮以下宜遵遺令公卿上表固請俯就權制過葬即吉帝不許引古禮答之羣臣乃止於是遂申三年之制五服之內皆令依禮建德五年二月辛酉皇太子斌巡撫西土討吐谷渾三月壬寅文宣皇后服再期戊申祥知是吐谷渾遣使入境在於建德五年二月至三月祥是入境以來國祥甫邇也又云自秋迄冬未申欵接知留彼使至次年方遣也且狼星表邦嚴霜巳戒史記天官書曰五宫東有大星曰狼狼角變色多盜賊正義曰狼一星參東南狼為野將主侵掠占非其處則人相食色黃白而明吉赤角兵起金火守亦如之楚辭曰秋既戒之白露冬又申之以嚴霜浮河亂濟長路苦寒禹貢曰濟河惟兖州又云浮於濟漯達於河又云入於渭亂於河孔安國曰正絶流曰亂史記索隱曰濟水出河東垣縣王屋山東其流至濟陰故應劭云濟水出平原陰縣東陸機詩云劇哉行役人慢慢恆苦寒言虜使入境以來初為國祥又以盜賊之警所以自春至冬未申欵接也時當獻嵗維新三元告慶楚辭曰獻嵗發春兮泊吾南征三元元日謂為嵗日月之元也亦稱三朝班固東都賦曰春王三朝圭贄盈庭華裔參軫周禮曰公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧以朝覲宗遇會同于王又曰以六禽作六贄鄭云贄之言至也所執以自致也封禪書曰百蠻執贄左氏傳曰庭實旅百左傳杜注云諸華中國又薑戎曰謂我諸戎四嶽之裔胄也杜云裔逺也昭九年傳云先王居檮杌於四裔以禦螭魅説文曰軫車後橫木也參軫言多也式觀盛禮洽此嘉歡陽和既動澤漸萬邦便當遣使相隨永敦鄰睦故移序趙國公集序周書列傳云趙王招字豆盧突幼聰穎博涉羣書好屬文學庾信體詞多輕豔武成初進封趙國公建德二年進爵為王所著文集十卷行於世竊聞平陽擊石山谷為之調皇甫謐曰舜都平陽虞典夔曰於于擊石拊石孔安國曰石磬也大禹吹筠風雲為之動説文曰筠竹皮也與夫含吐性靈抑揚詞氣曲變陽春光回白日豈得同年而語哉宋玉曰陽春白雪柱國趙國公發言為論下筆成章逸態橫生新情振起風雨爭飛魚龍各變樂動聲儀曰風雨動魚龍方之圭璧塗山之會萬重左傳哀十年大夫對孟孫曰禹會諸侯於塗山執玉帛者萬國譬以雲霞赤城之巖千丈孔靈符會稽記曰赤城山名皆赤狀似雲霞懸霤干仞謂之瀑布飛流灑散冬夏不竭文參厯象即入天官之書史記冇天官書索隱曰案天文有五官官者星官也星座有尊卑若人之官曹列位故曰天官韻涉絲桐咸歸總章之觀三輔皇圗曰明堂之制舜曰總章論其壯也則鵬起半天莊子曰鵬之背不知其幾千里也怒而飛其翼若垂天之雲語其細也則鷦巢蚉睫莊子曰鷦鷯巢林不過一枝此云鷦巢鷦疑作焦蓋謂焦螟蟲也列子曰江浦之間生麼蟲其名曰焦螟羣飛而集於蚊睫弗相觸也栖宿去來蚊弗覺也張湛曰麼亡果反細也字書云麼小也豈直熊熊旦上增城抱日月之光熊熊一作熊羆陸璣疏曰熊能攀緣上高樹見人則顛倒自投地而下冬多入穴而棲始春而出脂謂之熊白史記天官書説嵗星云熊熊有光按下文焰焰從熊熊為是楚詞增城九重焰焰宵飛南斗觸蛟龍之氣洛誥曰無若火始焰焰孔傳云焰焰尚微崔豹古今注曰螢火一名宵飛南斗句即豫章記所謂豐城劍氣光於牛斗者也劍卒化為龍矣昔者屈原宋玉始於哀怨之深史記曰屈原被放至於江濵乃作懷沙之賦懷石自投汨羅以死屈原既死之後楚有宋玉唐勒景差之徒皆好辭而以賦見稱皆祖屈原之從容詞令終莫敢直諫者蘇武李陵生於别離之世漢書曰蘇武字子卿京兆人武帝天漢二年以中郎將使胸奴十九年不屈節歸漢李陵字少卿天漢中將步卒五千擊胸奴轉鬭矢盡遂降單于以女妻之立為右校王在胸奴二十餘年卒詩品曰李陵詩其源出於楚辭文多悽愴怨者之流陵名家子有殊才生命不諧聲頺身喪使陵不遭辛苦其文亦何能至此自魏建安之末晉太康以來雕蟲篆刻其體三變宋書謝靈運傳論曰自漢至魏四百餘年辭人才子文體三變建安獻帝年號太康晉武帝年號也揚雄法言或問吾子少而好賦曰然童子雕蟲篆刻俄而曰壯夫不為也人人自謂握靈蛇之珠抱荆山之玉矣二語出曹子建與楊德祖書説苑曰昔隨侯行遇大蛇中斷疑其靈使人以藥封之蛇乃能去因號其處為斷蛇丘嵗餘蛇銜明珠徑寸絶白而有光因號隨珠卞和璧始皇以為傳國璽也韓子曰卞和抱其璞哭於荆山之下公斟酌雅頌諧和律吕若使言乖節目則曲臺不顧聲止操縵則成均無取漢書曰孟卿説禮數萬言號曰后氏曲臺記服虔曰在曲臺校書者記因以為名師古曰曲臺殿在未央宫學記曰不學操縵不能安絃周禮大司樂掌成均之法以治建國之學政而合國之子弟焉遂得棟梁文囿冠冕詞林大雅扶輪小山承蓋詩序曰詩有大雅焉有小雅焉羽獵賦曰齊桓公曽不足使扶輪又曰風詡詡其扶輪楚辭序曰招隱士者淮南小山之所作也傳周使持節大將軍廣化郡開國公丘乃敦崇傳崇恆州代郡鼓城縣廣義鄉孝讓里人也昔夀丘建國賜姓者十二人竹書紀年曰黃帝母曰附寶見大電繞北斗樞星光照郊野感而孕二十五月而生帝於夀丘史記正義曰夀丘在魯東門之北今在兖州曲阜縣東北六里皇甫謐云黃帝生於夀丘長於姬水因以為姓國語胥臣云黃帝之子二十五宗其得姓者十四人為十二姓姬酉祁已滕針任荀嬉姞嬛依是也平陽舉賢登朝者十六族皇甫謐帝王世紀堯都平陽於詩為唐國史記曰昔高陽氏有才子八人世得其利謂之八愷高辛氏有才子八人世謂之八元此十六族者世濟其美至於堯堯未能舉舜舉八愷使主后土舉八元使舉五教於四方事出左傳况復大電繞樞流星入昴大電繞樞黃帝之祥注見上文流星入昴帝堯之祥論語讖曰帝堯率舜遊首山觀河渚視五老飛為流星上入昴𣲖分源别幹其嗣興者乎魏道武皇帝以命世雄圗飲馬河洛北史曰魏之先出自黃帝子之少子受封北國其後世為君長魏平文皇帝生二子長曰沙漠雄次曰什翼犍道武帝祖帝拓中原國號曰魏兄弟十人分為十姓十姓謂後魏為拓跋氏道武以沙漠雄子嵩宗室之長為長孫氏至魏文帝以獻帝長兄為紇骨氏次兄普氏為周氏次兄為達奚氏次兄為伊婁氏改婁氏次兄敦丘氏改為丘氏次兄侯氏改為万侯氏叔父之後乙旃氏為叔孫氏疏俗車焜氏改為車氏是為十姓見魏書及北史辨風吹律丘氏即其一焉魏十姓敦丘氏為丘氏是也春秋孔演圗云孔子曰丘援律吹律有姓五代祖邈驃騎大將軍開府儀同三司營丘郡開國公於時天道西北既稟謀謨左傳董叔曰天道多在西北馬首東南實資匡贊左傳襄十四年荀偃令曰雞鳴而駕塞井夷竈惟余馬首是瞻欒黶曰晉國之命未是有也余馬首欲東乃歸此言進退皆從之也因以封名仍為賜氏謂邈封營丘郡賜姓丘氏也與夫南公伯即有連類宗則樂正非無準則以上與夫至凖則似有缺文兼疑訛字未敢以意增改今照原本録之曽祖雙軌使持節驃騎大將軍司徒青兖二州刺史范陽文昭公洛食之始上馬治國洛誥曰我乃卜澗水東瀍水西惟洛食孔傳曰今河南城也漢書陸賈曰馬上得之亦將以馬上治之乎登庸之初升槐論道尚書曰疇咨若時登庸孔傳曰庸用也誰能咸熙庶績順是者將登用之周禮曰三槐三公位焉尚書曰惟兹三公論道經邦生則絶席武宫死則配祠清室後漢張禹傳詔令禹舍宫中每朝見與三公絶席黃圃曰清涼殿亦曰延清室夫人太原王氏三世為將四代為公太原王氏出自王離次子威漢揚州刺史九世孫霸字仲儒居太原晉陽後漢連徵不至霸生咸咸十九世孫澤字季道雁門太守生昶字文舒魏司空京陵穆侯二子渾濟見晉書此太原氏族之盛也云三世為將者史記稱王翦子王賁王翦之孫王離又云今王離已三世將矣云四代為公者晉渾濟等是也社稷大宗鍾鼎貴族伉儷是歸秦晉匹也言太原本世胄之家夫人王氏來歸於我也禮有大宗小宗漢書曰擊鐘鼎食左氏傳曰已不能庇其伉儷而亡之杜預曰伉敵也儷偶也正義曰禮謂兩皮謂儷皮儷兩也故為耦伉者相當之言故為敵也伉儷者言是相敵之匹偶又左傳懷嬴曰秦晉匹也何以卑我杜注云匹敵也祖提使持節衛將軍駙馬都督河交二州刺史靈夀縣開國公公子公孫聲名籍甚增輝增耀弱冠升朝夫人清亷郡長公主孝文帝之第二女也王姬有行車服不繫詩序曰王姬下嫁於諸侯車服不繫其夫下王后一等故得衛青上將張耳賢夫漢書曰衛青尚平陽主天文志云文昌六星一曰上將青拜大將軍故云上將又漢書曰張耳大梁人也嘗亡命遊外黃外黃富人女甚美庸奴其夫亡邸父客曰必欲求賢夫從張耳父願使持節大都督徐州諸軍事徐州刺史平陽縣開國公食邑四千户少年習象多見兵書澆沙聚石之營却日橫雲之陳曹瞞傳曰公軍渡渭為馬超所衝突營不可立地又多沙不築時天寒乃多作縑囊以運水起沙為城以水灌之一夜而成比明城立由是公軍盡得渡渭晉書曰諸葛亮造八陳圗於魚復平沙上纍石為八行相去二丈淮南子曰魯陽公與韓戰戰酣日暮援戈而麾之日為之反三舍風后握竒經有風陳雲陳彎弧則戟破小支抽劍則泉飛枯井曹植白馬篇曰控弦破左的右發摧月支漢書曰二師將軍李廣利拔佩刀刺山飛泉湧出夫人宇文氏周文皇之第三妹也母儀令範女師賢哲德高隆慮義重河陽漢書王太后第三女曰隆慮公主續列女傳曰趙皇后屬河陽主家學歌舞魏受其終周新其命式墓封墳追旌盛德後漢書曰明帝遣使祠蕭何霍光帝謁園陵過式墓史記其命閎夭封比干之墓注云封謂益其土乃贈使持節大將軍廣化郡開國公食邑一千户夫人贈安德郡長公主遊魂寃結非無廣漢之城後漢書曰陳寵轉廣漢太守先是洛縣城南每陰而常有哭聲聞於府中積數十年寵使吏案行還言世衰亂時此下多死亡者而骸骨不得葬儻在于是寵盡收斂葬之自是哭聲遂絶久客思歸惟有東平之樹皇覽曰東平思王冢在無鹽人傳言王在國思歸京師後葬其冢上松柏皆西靡也自永安以來魏室大壞北史云魏莊帝諱子攸彭城王協之第三子也武泰元年明帝崩大都督爾朱榮謀廢立陰與帝通率衆來赴帝與兄弟夜北渡河會榮于河陽即皇帝位是年改元永安海水羣飛天星亂動揚雄劇秦美新曰海水羣飛漢書劉向封事諫曰夜中星隕如雨禮樂征伐不出於人主舉賢誅暴議在於強臣謂爾朱榮也北史云榮以兵權在己遂有異志乃害靈太后及幼主次害無上王等後復表請追諡無上王為皇帝餘俱有贈子孫聽立後授封爵舉賢如以前太尉江陽王繼為太師以下是也誅暴如討葛榮檻送京師斬於都市是也三年帝殺榮於明光殿帝卒為爾朱氏所弒爾朱世隆立廣陵惠王羽之子恭是為閔帝高丞相驅率風雲奄荒齊晉北史云高歡渤海蓚人也普泰元年廢帝即位於信都西改元中興以渤海王高歡為丞相二年為大丞相歡既敗爾朱氏廢帝自以疏逺遜位歡立武帝永興二年高歡大破爾朱氏山東平我舅氏文皇帝駕馭龍虎據有周秦南北渝盟東南敵怨謂周太祖宇文泰也北史魏武帝紀曰永興三年帝內圗高歡乃以斛斯椿為領軍使與王思政統之以為心膂軍謀朝政咸決於椿分置督將及河南關西諸刺史帝親總六軍十餘萬次河橋高歡引軍東渡帝出宇文泰遣李賢和等各領數百騎會帝於崤中高歡入洛遣婁昭等追帝不及宇文泰遣大都督趙貴等甲騎二千來赴乃奉迎過河泰迎帝於東陽帝勞之將士皆呼萬嵗遂入長安以雍州公廨為宮大赦是為西魏高歡東還洛陽歡推清河王亶子善見為主徙都鄴是為東魏魏於此始分為二周本紀云普回子莫那自山陰南徙始居遼西是曰獻侯為魏舅甥之國故曰舅氏既而各受圗書並當圭璧謂高氏宇文氏後俱受命為帝也河圗洛書帝王之符也左氏傳曰當璧而拜者神所立也北史云魏大統十六年東魏靜帝遜位於齊是為文宣皇帝諱洋神武第二子也魏恭帝三年遜位於周是為閔帝諱覺太祖第三子也高氏宇文氏並為帝矣百姓則父南子北兄東弟西事主則憂親求生則慮禍大周親戚遍鍾荼炭輸之城旦下之織室關河嚴隔三十餘年言周齊兩國爭疆東西否隔親戚流寓或致罪戾不得遣歸也史記秦始皇本紀云黥為城旦如淳曰律説論決為髠鍓輸邊築長城晝日伺寇虜夜暮築長城城旦四嵗也漢書刑法志曰諸當完者完為城旦舂又外戚傳曰漢使曹參等虜魏王豹而薄姬輸織室天厭喪亂人思反德彼之風塵既靜函谷此之冠蓋屢涉漳濵言周齊彼此和親干戈少息也按周本紀天和六年齊遣使來聘建德元年周遣司宗李祭小賔部賀遂禮於齊是也函谷本䅈函谷關周宇文氏所都漳濵鄴地齊高氏所都周武帝詔曰偽齊叛渙竊有漳濵是也中山寃枉之餘代郡凋殘之澤並遇革音咸蒙禮送中山二語言高氏廢帝自立魏之支屬皆留齊地會周齊和親乃許還其本國也下云崇等生還是魏周戚屬由是得歸矣漢書曰中山王衎入即位是為平帝後王莽即真遂廢帝又文帝紀曰周勃等奉天子法駕迎于代邸中山指靜帝為高氏所廢若漢平帝代郡指清河王子善見本高歡所立若漢代邸此二帝之後向被拘囚今蒙禮送也崇賔兄弟二人相看氣息親愛凋零方寸久亂恆山殺翮豈望同飛而安國徒中鬱為卿相班超絶域遂得生還爾雅曰北嶽恆山張宴漢書注云恆山在常山郡西郭璞山海經注云雁門山即北陵西隃雁之所出因以為名在高栁北地理志有雁門郡淮南子曰飛烏鍛羽許慎注云鍛殘羽也言雁之殘羽不能飛也史記曰韓安國者梁成安人也事梁孝王為中大夫其後坐法抵罪無何梁內史缺漢使使者拜安國為梁內史起徒中為二千石位至御史大夫行丞相事後漢書班超曰臣不敢望到酒泉但願生入玉門關天和四年武帝之八年也至於新邑以上序賔崇兄弟二人自齊來歸也朝廷以舅甥之國外內之親乃授賔使持節驃騎大將軍開府儀同三司大都督安樂縣開國公食邑一千户賔得免虎口仍上龍門莊子孔子曰丘幾不免虎口哉司馬遷書曰垂餌虎口辛氏三秦記曰河津一名龍門水險莫通魚鱉之屬莫能上江海大魚薄集龍門下數千不得上上則為龍也聲價已高風焱即逺方欲討論國恥申雪家寃橫尸原野是所甘心時不我與先從朝露春秋若干言賔先崇死也衛國興文子之慟長安有詔葬之悲衛國興文子之慟者疑引衛公叔文子公孫發卒也漢書曰霍去病薨上悼之發屬國玄甲軍陳自長安至茂陵為冢象祁連山乃贈本官加少傅蒲虞勳三州諸軍事蒲州刺史以天和六年平鄴都年某月日葬於長安之洪瀆原妻青州石氏長城郡君胤子孤煢生妻嫠室即能有節還成守義崇蒙授使持節大都督驃騎大將軍開府儀同三司廣化縣開國公食邑一千户昆季二人同年上將彤廷交映棨戟相臨西都賔曰玉階彤庭崔豹古今注曰棨戟殳之遺象也詩所謂伯也執殳為王前驅前驅之器也以木為之後世滋偽無復典刑以赤油韜之亦謂之油戟亦謂之棨戟王公以下通用之昔二馮同德繼踵當官漢書曰成帝時馮野王為上郡太守後弟立亦自五原太守徙西河上郡居職公亷百姓歌之曰大馮君小馮君兄弟繼踵相因循聰明賢知惠吏民政如魯衛德化均周公康叔猶二君兩杜齊名夾河為郡漢書杜周傳曰始周為廷史有一馬及久任事列三公而兩子夾河為郡守家訾纍巨萬矣比斯榮寵彼將慙色俄然賔疾奄捐館舍崇兄弟勝衣備罹禍酷同氣長養得及全人今者來歸更連凶閔每一悲慟行路傷心撫養愛子情深馬援之慈後漢書馬援傳曰兄况卒援行服期年不離墓所敬事寡嫂不冠不入廬援有誡兄子嚴書恭事寡嫂義甚顔含之孝晉書曰顔含字𢎞都琅琊莘人也兄畿咸寧中得疾就醫自療遂死於醫家家人迎喪旐每繞樹而不可解引喪者顛仆稱畿言曰我夀命未死但服藥太多傷我五臟今當復活慎無葬也其婦及家人夢之曰吾當復生可急開棺而父不聽含時尚少乃慨然曰非常之事自古有之今靈異至此開棺之痛孰與不開相負父母從之乃共發棺果有生驗以手刮棺指爪盡傷然氣息甚微存亡不分飲食所須託之以夢闔家營視頓廢生業雖在母妻不能無倦矣含棄絶人事躬親侍養不出户庭者十有三年畿竟不起含二親既終兩兄繼沒次嫂樊氏因疾失明含課勵家人盡心撫養每日自嘗省藥饌察問息耗必簪屨束帶醫人疏方應須蚺蛇膽而尋求備至無由得之含憂嘆纍時嘗晝獨坐忽有一青衣童子年可十三四持一青囊授含含開視乃蛇膽也童子化青鳥飛去得膽藥成嫂病即愈由是著名已上序賔卒崇克盡弟道也天和六年授大將軍餘如故龍庭賞出塞之功玉門勞旋師之寵異代同和見之今日後漢書班固燕然山銘曰焚老上之龍庭注云胸奴五月大會龍庭祭其天地鬼神今皆焚蕩之又耿恭傳曰恭引兵據疏勒胸奴攻恭恭厲士衆擊走之數月食盡困窮稍稍死亡餘數十人漢遣兵迎校尉遂相隨俱歸發疏勒時尚有二十六人隨路死沒三月至玉門惟餘士二人建德二年授使持節都督宜州諸軍事宜州刺史忽忽橫閣但有誦書曖曖重帷惟聞善政清不置水明非舉燭高士傳曰任棠字季卿隱身不仕龎參為漢陽太守到先就家俟焉棠不與言但以薤一本水一盂置户屏前身抱孫兒伏于户下主簿白以為倨傲參思其微意良久曰棠置一盂水欲諭太守清也投一本薤欲諭太守擊強宗也抱孫兒當户欲諭太守開門恤孤也韓子曰郢人有遺燕相國書者夜書火不明因謂持燭者舉燭云而過書舉燭舉燭非書意也燕相受書而説之曰舉燭者尚明也尚明也者舉賢而任之燕相白王大恱國以治治則治矣非書意也乃是入境移風非直停車待雨後漢書曰賈琮為冀州刺史升車命御者褰帷諸臧過者望風解印綬去又曰鄭𢎞行春隨車致雨有敕大將軍宜州刺史廣化郡公崇自夏季無雨以迄於今雖靡神不禱仍未降感知彼州內獨蒙滂澤諒由大將軍精誠所致憂念郡人豐稔可希良以為慰又敕廣化公崇知此存心政術治勤黎人受委稱職嘉尚無已古人有言非行之難念加勉朂以致盡善指令宣納抑操賜齊陳物如别宜諭朕懷昔陽平太守别降紅粟之恩荆州刺史偏蒙衮衣之賜治績尤異此之謂乎晉書武帝紀曰太康十年夏四月以陽平太守梁栁有政績賜穀千斛吳都賦曰海陵之倉則紅粟流衍益都耆舊傳曰郭賀拜荆州刺史明帝巡狩到南陽特賜以三公之服黼黻旒冕敕去襜露冤見此以彰其德崇清淨為政亷明為法人不忍背吏不忍欺性不飲酒無所嗜欲深沉牆仞喜愠不形文必正詞絃惟雅曲仁義禮節是所用心緹帙緗素愛玩無巳當今四郊多壘尚有公卿之辱禮記曰四郊多壘此卿大夫之辱也鼓鼙不息猶勞將帥之謀禮記曰君子聞鼓鼙之聲則思將帥之臣語其讎恥惟願橫行死地思其報國不吝身膏原野漢書上將軍樊噲曰臣願得十萬衆橫行胸奴中揚子法言曰秦將白起長平之戰四十萬人死原野厭人之肉川谷流人之血但令天假之年時綏之福忠貞之事公其取焉略書梗概陳之直史後漢書杜篤論都賦序曰故略其梗概不敢具陳注云梗概猶粗略也庾子山集卷十一
