body:
  text: 庾子山集巻五周庾信撰錢唐倪璠纂註樂府對酒歌文苑英華作范雲春水望桃花春洲藉芳杜韓詩傳云三月桃花水楚辭曰采芳洲兮杜若又云山中人兮芳杜若琴從一作隨綠珠借酒就文君取晉書曰石崇有妓曰綠珠美而艷長門賦序曰陳皇后奉黃金百斤為相如文君取酒牽馬一作牛就一作向渭橋日曝山頭脯三輔黃圖曰渭橋秦始皇造史記正義曰括地志云渭橋本名橫橋架渭水上在雍州咸陽縣東南二十二里淮南子曰日至於悲谷是謂餔時髙誘注云悲谷西南方之大壑也山簡接䍦倒王戎如意舞晉書曰山簡鎮襄陽優游卒歲惟酒是耽諸習氏荆土豪族有佳園池簡每出逰多之池上置酒輙醉名之曰髙陽池時有兒童歌曰山公出何許往至髙陽池日夕倒載歸酩酊無所知時時能騎馬倒着白接䍦舉鞭向葛疆何如并州兒語林曰王戎以如意指林公曰何柱汝憶揺櫓時否何柱林公小字也世說曰謝仁祖能作異舞王公熟視謂客曰使人思安豐箏鳴金谷園笛韻平陽塢晉書曰石崇有别舘在河陽之金谷水經注曰金谷水出河陽太白原東南流歴金谷謂之金谷水經石崇故居馬融長笛賦云融性好音律能鼓琴吹笛而為督郵無留事獨卧郿縣平陽塢中有雒客舎逆旅吹笛為氣出精列相和人生一百年歡笑惟三五莊子曰人上壽百歲中壽八十下壽六十除病瘐死憂患其中開口而笑者一月之中不過四五而已矣何處覓錢刀求為洛陽賈貨殖傳曰洛陽東賈齊魯南賈梁楚平準書虞夏之幣金為三品或黃或白或錢或布或刀如淳曰名錢為刀者以其利於民漢書曰桑𢎞羊洛陽賈人也以能心計為侍中昭玉臺作明君辭應詔石崇王明君辭序曰昔公主嫁烏孫令琵琶馬上作樂以慰其道路之思其送明君亦必爾也其造新曲多哀怨之聲歛眉光禄塞還望夫人城漢書曰單于朝天子於甘泉宫就邸留月餘遣歸國單于自請願留居光禄塞下又曰漢軍乗勝追北至范夫人城片片紅顏落雙雙淚眼生冰河牽馬渡雪路抱鞍行胡風入骨冷夜月照心明方調琴上曲變入一作作胡笳聲虞羲詠霍將軍北伐詩曰胡笳關下思𦍑笛隴頭鳴吕延濟曰笳簫也起於胡王昭君玉臺作昭君詞琴操曰王昭君者齊國王襄女也年十七獻元帝㑹單于遣使請一女子帝謂後宫欲至單于者起昭君喟然而歎越席而起乃賜單于拭啼辭戚里回顧望昭陽漢書曰萬石君奮徙家長安中戚里三輔黃圖曰武帝時後宫八區有昭陽殿成帝趙皇后居昭陽殿鏡失菱花影釵除却月梁西京雜記曰飛燕始加大號媫妤奏上三十六物有七尺菱花鏡一奩龍輔女紅餘志曰燕昭王賜旋娟以金梁却月之釵圍腰無一尺垂淚有千行綠衫一作衫身承馬汗紅袖拂秋霜别曲真多恨哀絃須更長出自薊北門行漢書曰薊故燕國也鮑照有出自薊北門行李周翰曰薊北門名叙征戰辛苦之意薊音計薊門還北望役役盡傷情關山連漢月隴水向秦城古樂府有關山月恨賦關山無極辛氏三秦記隴右西關欲上者七日乃越上有幾水四注下流俗歌曰隴頭流水鳴聲幽噎遥望秦川肝腸斷絶笳寒蘆葉脆弓凍紵絃鳴杜摯葭賦曰惟葭蘆之為物葭字或作笳笳寒弓凍言北地之苦寒也梅林能止渴複姓可防兵淮南子曰百梅足可以為百人酸世説曰魏武行役失道軍皆渴乃令曰前有大梅林饒子甘酸可以解渴士卒聞之口皆出水乗此得及前源複姓按代北之人隨後魏遷河南者獻帝為之定姓為複姓或二字或三字或四字其音多似西域𦍑書三合四合皆指一字之義又按隋經籍志兵法有黃帝複姓符二巻時後周賜姓如普屯紇干爾綿賀蘭歩六孤普六茹之屬盖當時武將皆用複姓為之也將軍朝挑戰都尉夜廵營漢書百官公卿表曰前後左右將軍皆周末官秦因之位上卿漢不常置或有前後或有左右皆掌兵及四彞應劭漢官儀曰都尉秦官也燕山猶有石須勒幾人名後漢書曰竇憲為車騎將軍與北單于戰于稽落山破之遂登燕然山刻石勒功紀漢威德結客少年塲行曹植結客篇云結客少年塲報怨洛北荒鮑照有結客少年塲行李善引范曄後漢書曰祭遵嘗為部吏所浸結客報之也李周翰曰言少年時結任俠之客為遊樂之塲終無所成故有斯作也結客少年塲春風滿路香歌撩一作嫌李都尉果擲潘河陽漢書曰李延年為協律都尉晉書曰潘岳美姿儀少時常挾彈出洛陽道婦人遇之者皆連手縈繞投之以果遂滿車而歸時張載甚醜每行小兒以瓦石擲之委頓而反隔一作折花遥勸酒就水更一作便移牀今年喜夫壻新拜羽林郎漢書曰佽飛射士羽林孤兒應劭曰天有羽林大將軍之星林諭若林木之盛羽羽翼鷙擊之意故以名武官焉如淳曰百官表取從軍死事者之子養羽林官教以五兵號曰羽林孤兒少壯令從軍漢儀注云羽林從官七百人後漢百官志云羽林郎比三百石定知劉碧玉偷嫁汝南王樂府有碧玉歌樂苑曰碧玉歌者宋汝南王之所作也碧玉汝南王妾名以寵愛之甚所以歌之道士步虛詞十首渾成空教立元始正圖一作塗開老子曰有物混成先天地生抱樸子道經有混成經二巻按不執著為空老子貴虛無為空教後漢書稱浮屠道家之流空有兼遺矣陶𢎞景真靈位業圖有玉清三元宫元始天尊為主赤玉靈文下朱陵真氣來列仙傳曰安期先生賣藥于東海秦始皇與語三日三夜去留書以赤玉舄一量為報曰後數年求我于蓬莱山神異經日東方朔云曽隨師主履行北至朱陵扶桑蜃海㝠夜之丘真誥曰朱陵北絶臺上嬪管妃又曰近得度名南宫定䇿朱陵藏精待時方列為仙中天九龍館倒景八風臺中天半天也列子曰周穆王築臺號曰中天之臺謝靈運㑹吟行曰層臺指中天張衡東京賦曰九龍之内實曰嘉徳薛綜曰九龍本周時殿名也門上有三銅柱柱有三龍相糺繞故曰九龍如淳漢書注曰倒景在日月之上日月反徙下照故其景倒八風淮南子云東北方條風東方明庶風東南方清明風南方景風西南方凉風西方閶闔風西北方不周風北方廣漠風此疑謂靈臺也雲度絃歌響星移宫殿廻青衣上少室童子向蓬莱後漢張安超有譏青衣賦此謂仙家𨽻豎青衣童也戴延之西征記曰嵩嶽也東謂大室西謂少室相去十七里嵩髙總名也漢武帝登仙臺在少室山下續齊諧記云有黃衣童子曰我王母使者昔使蓬莱逍遥聞四㑹倐忽度三灾莊子曰逍遥乎無事之業宋玉髙唐賦曰五變四㑹善曰四㑹四懸俱㑹也東都賦曰指顧倐忽李善注曰倐忽疾也真誥曰且方交兵日㑹三灾向臻神風驅除臭氣參天樓炭經曰天地有三灾變一者火灾變二者水灾變三者風灾變隋書經籍志道經所說天地淪壊劫數終盡略與佛經同而天尊之體常存不滅每至天地初開或在玉京之上或在窮桑之野授以秘道謂之開劫度人無名萬物始有道百靈初老子曰無名天地之始有名萬物之母東都賦曰懐百靈寂絶乗丹氣𤣥明上玉虛左思蜀都賦曰舒丹氣以為霞李善注引河圖曰崑崙山有五色水赤水之氣上蒸為霞而赫然也吕氏春秋曰冬至日行逺道周四極命之曰𤣥明外國放品經曰北方元洲地方三千里有玉虛紫館三元隨建節八景逐廻輿真靈位業圖有玉清三元宫有八景城真誥曰仙道有八景之輿以遊行上清赤鳳来銜璽青烏入獻書赤鳳銜璽疑即竹書紀年西伯吕尚時所謂赤雀銜書是也後鳳凰銜書遊于文王之都矣後漢書王景傳注云送𦵏造宅之法若黃帝青烏之書也壊機仍成機枯魚還作魚周易鄭注曰機弩牙也十洲記鳳麟洲仙家煮鳳喙及麟角合煎為膏名之為續絃膠或名連金泥此膠能續弓絃及刀劍斷折之金更以膠連續之使力士掣之他處乃斷所續之際終無斷也武帝天漢二年王使至獻此膠四兩武帝以付外庫武帝幸華林園射虎而弩絃斷使者時從駕上膠一分使口濡以續弩絃帝驚曰異物也乃使武士數人共對掣引之終日不脫如未續時也按機為弩牙絃斷膠續是仙家之術壊機成機也神仙傳曰葛𤣥見買魚魚者在水邊𤣥謂魚主曰欲煩此魚至河伯處可乎魚人曰魚已死矣何能為𤣥曰無苦也乃以魚與𤣥𤣥以丹書紙置魚腹擲魚水中俄頃魚躍上吐墨書青色如大葉而飛去栖心浴日館行樂止雲墟淮南子曰日浴咸池又云日行九州七舎有五億萬七千三百九里注云自陽谷至虞淵凡十六所為九州七舎也穆天子傳西王母為天子謡曰白雲在天山䧙自出道理悠逺山川間之將子無死尚能復来又莊子曰天下有道與物皆昌天下無道則厭俗上仙乗彼白雲至于帝鄉又按飛燕外傳成帝所謂武帝求白雲鄉也楊惲報孫㑹宗書曰人生行樂耳凝真天地表絶想一作相寂寥前老子曰寂兮寥兮獨立而不改王逸楚辭注曰寂寥空無人民之貌也有象猶虚豁忘形本自然老子曰無象之象是謂恍惚又曰人法地地法天天法道道法自然張衡曰𤣥者無形之類自然之根作於太和莫與為隣開經壬子世一作歲值道甲申年漢書藝文志曰古五子十八篇自甲子至壬子說易隂陽符在本經曰桐柏真人授道士許逺遊言至甲申乙亥癸已歲九月一日七月一日四月八日當有道士著七色法衣手持九曲策杖子若見之勤請其道必授子神虎上符此南嶽真人也廻雲隨舞曲流水逐歌筵列子曰秦靑撫節而歌響遏行雲韓詩外傳曰伯牙鼓琴鍾子期曰湯湯乎志在流水言廻雲流水皆成自然之音節也石髓香如飯芝房脆似蓮列仙傳曰卭疏者周封史也能行氣錬形煮石髓而服之謂之石鍾乳又神仙傳曰王烈之太行山中見山破石裂石中有青泥流出如髓烈取泥試丸之須臾成石如投熱蠟之狀隨手堅凝如粳米飯嚼之亦然漢武紀曰甘泉宫内產芝九莖連葉作芝房歌按蓮亦有房故芝似之魯靈光殿賦云綠房紫的謂蓮房也抱樸子曰木渠芝寄生大木上如蓮花九莖一叢其味甘而辛服之白日昇天也停鸞讌瑶水歸路上鴻天穆天子傳曰天子觴西王母於瑶池之上王融曲水詩序云穆滿八駿如舞瑶水之隂道生乃太乙守靜即𤣥根漢書曰天神之貴者太乙其佐皇帝抱樸子曰黃帝及老子奉事太乙元君以受要訣淮南子曰帝者體太乙王者法隂陽又曰體太乙者牢籠天地彈壓山川含吐隂陽申洩四時綱紀八極經緯六合覆露照導普紀而無私翾飛蠕動莫不仰徳而生老子曰致虛極守靜篤夫物芸芸各歸其根中和煉九氣甲子謝三元後漢書襄楷傳注太平經典曰元氣有三名為太陽太隂中和四真人降魏夫人歌有方諸青童曰七霞扇神曜九氣無常形漢書律厯志厯數三統天以甲子李竒曰夏正月朔日玉燭寶典曰正月一日為三元隋書經籍志云道經有延康赤明龍漢開皇年號居心受善水教學重香園老子曰上善若水水利萬物而不爭處衆人之所惡故幾於道居善地心善淵與善仁言善信正善治事善能動善時士推不爭故無尤香園未詳維摩經曰有國名衆香一切皆以香作樓閣經行香地苑園皆香其食香氣周流十方無量世界按佛經道書之流疑或通用也鳬留報關吏鶴去畫城門後漢書方術傳曰葉令王喬有神術每月朔望常自縣詣臺朝帝怪其来數而不見車騎密令太史伺望之言其臨至有雙鳬從東南飛来於是候鳬至舉羅張之但得一隻舄焉乃詔上方診視則四年中所賜尚書官屬履也神仙傳曰蘇仙公乗白鶴飛去自後有白鶴来止郡城東北樓上人或挟彈彈之鶴以爪攫樓板似漆書云城郭是人民非三百甲子一来歸吾是蘇公彈何為更以忻無迹還来寄絶言言王喬丁令威仙去還使鳬鶴来寄言也洞靈尊上徳虞石㑹明真老子曰上徳不徳是以有徳虞石未詳裴君傳云五帝曰君與裴君登明真之臺要妙思𤣥牝作絶作紀者非虚無養谷神老子曰雖智大迷是謂要妙谷神不死是謂𤣥牝𤣥牝之門是謂天地根注云谷養也神為五臟之神人能養其神炁則長生不死列仙傳曰容成公善補導之事取精於𤣥牝其要谷神不死守生養氣者也髪白更黑齒落更生與老子同亦云老子師也又按列子有谷神𤣥牝之言云黃帝書也丹丘乗翠鳳𤣥圃御斑麟一作驎楚辭曰仍羽人於丹丘注云丹丘晝夜常明之處也王子年拾遺記曰丹丘千年一燒按翠鳳翠鳳輦也李斯上書曰建翠鳳之旗知鳳得稱翠鳳言其色也十洲記曰崑崙山三角其一角正西名曰𤣥圃漢武内傳曰王母駕九色斑麟移棃付苑吏種杏乞山人神仙傳曰介象字元則㑹稽人也吳王從象學隐形之術後告言病帝以美梨一奩賜象象食之須臾便死帝埋葬之以日中晡時已至建業所賜梨付苑吏種之吏後以表聞先主即發棺視之惟一符耳述異記杏園洲在南海洲中多杏海上人云仙人種杏處漢時嘗有人舟行遇風泊此洲五六日食杏故免死云洲中别有冬杏神仙傳董奉者字君異侯官人也日為人治病亦不取錢重病愈者使栽杏五株輕者一株數年計得十萬餘株鬱然成林奉每年貨杏得穀以賑救貧乏自此逢何世從今復幾春海無三尺水山成數寸塵神仙傳曰王方平遣人召麻姑姑至自說云接侍已来已見東海三為桑田向到蓬莱又水淺於往日㑹時畧半耳豈將復為陸乎方平嘆曰聖人皆言海中行復揚塵也東明九芝盖北燭一作屬五雲車真誥曰夏啟為東明公領斗君師孫策為東明公賓友四明公有四賓友四公後並升仙階也四明主領四方鬼四明公及北斗君並有侍帝晨五人其向者八人是北斗大帝官隸耳選用亦同四明東西南北也張衡西京賦曰芝蓋九葩漢武帝内傳曰𤣥都阿母昔出配北燭仙人近又召還使領命禄真靈官也又曰漢武帝好仙道七月七日夜漏七刻王母乗雲車而至于殿飄颻入倒景出没上煙霞嵇叔夜琴賦云或飄颻以輕邁陵陽子明經曰倒景去地四千里其景皆倒在下列子曰能出能没列仙傳曰寗封子積火自燒而隨煙上下春泉下玉溜一作霤青鳥向金華嵇康琴賦云據神泉而吐溜李善曰溜亦流也楊雄太𤣥賦曰飲玉醴以解渴一作霤者禮記鄭註曰堂前有承霤漢武故事曰七月七日上于承華殿齋正中忽有一青鳥從西方来集殿前東方朔曰此王母欲来也有頃王母至按金華亦漢殿名三輔黃圖有金華殿又按山名神仙傳曰黃初平至金華山石室中抱樸子云道經有金華山經漢帝看桃核齊侯問棗花漢武帝内傳曰王母命侍女索桃果須臾以玉盤盛仙桃七顆大如鴨卵形圓青色以呈王母母四顆為帝三顆自食桃味甚甘美口有盈味帝食輒收其核王母問帝帝曰欲種之母曰此桃三千年一生實中夏地薄種之不生帝乃止晏子春秋齊侯謂晏子曰東海有水而赤其中有棗華而不實何也晏子曰昔者秦穆公乗舟理天下黃布褁蒸棗至海而掾其布破黃布故水赤蒸棗故華而不實公曰吾佯問子對曰嬰聞佯問者佯對也上元應送酒来向一作在蔡經家陕西石刻作應逐上元酒同来訪蔡家神仙傳曰王逺欲東入括蒼山過吳住胥門蔡經家蔡經者小民耳而骨相當仙逺知之遂住其家七月七日王君至因遣人召麻姑来麻姑手爪似鳥經見之心中念曰背大癢時得此爪以爬背當佳也逺知經心中所言即使人牽經鞭之謂曰麻姑神人也汝何忽謂其爪可爬背耶但見鞭着經背亦莫見有人持鞭者逺告經曰吾鞭不可妄得也歸心遊太極廻向入無名乾鑿度孔子曰易始于太極太極分而為二故生天地淮南子曰引類於太極之上高誘曰太極天地始形之時也維摩詰經曰志當安住方便廻向又云無名無相僧肇曰廻彼雜行向于一乗此廻向心也老子曰無名萬物之始五香芬紫府千燈照赤城抱樸子曰項曼都言到天上先過紫府金牀玉几晃晃昱昱三輔黃圖曰華山記及三輔舊事云昔有太元真人茅盈曽祖濛于華山白日昇天邑人謡曰神仙得者茅初成駕龍上昇入太清時下𤣥洲戲赤城繼世而往在我盈帝若得之臘嘉平鳳林採珠實龍一作舂山種玉榮莊子曰南方有鳥其名為鳳所居積石天為生食其樹名瓊枝高百仞以璆琳琅玕為實天又為生離珠一人三頭以伺琅玕尸子曰龍泉有玉英山山海經曰黃帝取峚山之玉榮而投之鍾山之陽郭璞云謂玉華也以為玉種一作舂山者穆天子傳曰舂山之澤是也云種玉者捜神記稱陽翁伯無終山種玉于玉田得白璧五雙以聘徐氏夏簧三舌響一作夏笛三山響春鍾九乳鳴神仙傳曰王遥入石室室中有二人遥既至取弟子所擔篋發之中有五舌竹簧三枚遥自鼓一枚與室中二人並坐鼔之樂叶圖徴曰黃鍾生一一生萬物故君子鑠金為鐘鐘有九乳宋均曰九乳法九州也綘河應逺别黃鵠来相迎武帝内傳曰上元夫人又遣一侍女荅問曰阿環再拜上問起居逺隔綘河擾以官事遂替顏色近五千年洞㝠記曰西域看火龍髙七尺光如聚炬有童子遥見黃鵠白首鼓翅于帝前即方朔着黃綾單衣頭巳斑白漢朝皆異其神化而不測其年矣北闕一作閣臨𤣥水南宫生一作坐綘雲淮南子曰盧敖遊乎北海經乎太隂入乎𤣥闕髙誘注云𤣥闕北方之山也杜預左傳注曰闕象魏也劉熈釋名云闕在門兩傍中央闕然為道也穆天子傳曰天子北徑東還乃循黑水至于羣玉之山郭璞曰山海經云羣玉山西王母所居者真誥曰大都將隂徳多恤窮厄例皆速詣南宫為仙按北方𤣥武主黑色故云𤣥水南方朱火故曰綘雲綘亦赤色也龍泥印玉策大一作天火煉真文白虎通云或曰封禪金泥銀繩或曰石泥金繩封以印璽風俗通曰封太山禪梁甫傳說岱宗上有金篋玉策知人年壽修短武帝探得十八因倒讀曰八十其後夀果如䇿山海經曰黄帝乃取密山之玉策而投之鍾山之陽穆天子傳曰天子于是得玉䇿枝斯之英本相經曰吾昔孝明元年與髙上大聖玉帝于此土中煉其真文以火瑩發字形爾時真文火漏餘處氣生化為七寶林是以枝葉成紫書金地銀鏤玉文上元風雨散中天歌吹分武帝内傳曰帝問王母不審上元何真也王母曰是三天上元之官統領十萬玉女名籙者也列子曰周穆王執化人之袪騰而上者中天廼止耳目所觀聴鼻口所納嘗皆非人間之有王實以為清都紫微鈞天廣樂帝之所居靈駕千尋上空香萬里聞武帝内傳曰王母與上元夫人同乗而去人馬龍虎道從音樂如初而時雲彩鬱勃盡為香氣極望西南良久乃絶地鏡堦基逺天牕影迹深地鏡圖云欲知寶所在地以大鏡夜照見影若光在鏡中者物在下也隋書經籍志有天鏡二巻乾坤鏡二巻梁天鏡地鏡日月鏡經各一巻地鏡圖六巻亡泰山記云五十餘盤經小天門大天門仰視天門如從穴中視天牕矣魯靈光殿賦曰天忩綺疎張載曰天牕髙牕碧玉成雙樹空青為一林楊雄甘泉賦曰翠玉樹之青葱師古曰玉樹者武帝所作集衆寶為之用供神也本草經曰空青生小谷久服輕身延年能化銅鉛作金生益州范子計然曰空青出巴郡白青曾青出𢎞農豫章白青出新淦青色者善博物志曰徐公時令人于西平青山採取空青鵠巢堪煉石蜂房得煮金真誥曰仙道有九轉神丹服之化為白鵠班固終南山頌曰蜜房溜其巔神仙傳曰隂長生事馬鳴生入青城山中煮黃土為金漢武多驕慢淮南不小心漢武帝内傳王母曰劉徹好道然形慢神穢雖語之以至道殆恐非仙才也又云得仙之下神仙傳曰淮南王安未得上天遇諸仙伯安少習尊貴稀為卑下之禮坐起不恭語聲髙亮或誤稱寡人於是仙伯主者奏安云不敬應斥遣去八公為之謝過乃見赦謫守都厠三年後為散仙人不得處職但得不死而巳蓬莱入海底何處可追尋山海經曰蓬莱山在海中郭璞注曰上有仙人宫室皆以金玉為之鳥獸盡白望之如雲在渤海中也言神仙可學漢武淮南終不能得也郭璞詩燕昭無靈氣漢武非仙才與此意同謂不能得仙者也麟洲一海濶𤣥圃半天髙東方朔十洲記鳳麟洲在地方一千五百里洲四面西海之中央有弱水繞之鴻毛不浮不可越也洲上多鳳麟數萬各為羣仙家煮鳳喙及麟角合煎為膏名之為續弦膠或名連金泥此膠能續弓弦及刀劔斷折之金異物也山海經曰帝之平圃郭注云即𤣥圃也穆天子傳曰乃為銘迹于𤣥圃之上浮丘迎子晉若士避盧敖列仙傳曰王子喬周靈王太子晉也好吹笙作鳳鳴遊于伊洛間道士浮丘公接上嵩山二十餘年神仙傳曰若士者仙人也燕人盧敖者秦時遊北海而見若士若士曰一舉而千里吾猶未之能今子始至于此乃語窮豈不陋哉經餐林慮李舊食綏山桃神仙傳曰林慮山一名隆慮其山髙連大行北接恒岳有仙人樓髙五十丈漢書地理志河内郡隆慮應劭曰隆慮山在北避殤帝名改曰林慮師古曰慮音廬隋書地理志云魏郡林慮縣有林慮谼仙人臺洹水其餐李之事未詳列仙傳曰葛由者羗人也周成王時好刻木羊賣之一日騎羊而入西蜀蜀中王侯貴人遣之上綏山隨之者不復皆得仙道故里諺曰綏山一桃雖不得仙亦足以豪成丹須竹節刻髓用蘆刀神仙傳曰沈文泰李文淵以竹根汁煮丹漢書郊祀志曰先䰞鶴師古曰䰞古煮字古髓字䰞取汁以漬穀子也此云刻髓疑刻鶴髓也無妨隠士去即是賢人逃神仙傳曰白石先生好禮拜事神讀幽經太素傳彭祖問之曰何不服昇天之藥荅曰天上多至尊相奉事更苦於人間故時人號白石先生為隠遁仙人以其不汲汲於昇天為仙官亦猶不求聞達者也烏夜啼唐書樂志云烏夜啼者宋臨江王義慶所作也元嘉中徙彭城王義康于豫章義慶時為江州至鎮相見而哭文帝聞而怪之徵還慶大懼伎妾夜聞烏夜啼聲扣齋閣云明日應有赦其年更為南兖州刺史因此作歌故其和云籠牕牕不開烏夜啼夜夜望即来今所傳歌似非慶本音辭曰歌舞諸少年娉婷無種跡菖蒲花可憐聞名不相識桂樹懸知逺風竿詎肯低古樂府曰烏生八九子端坐秦氏桂樹間三輔黃圖曰長安宫南有相風銅烏遇風乃動獨憐明月夜孤飛猶未棲魏武帝樂府曰月明星稀烏鵲南飛繞樹三匝何枝可依虎賁誰見惜御史詎相攜漢明帝起居注曰上東廵㤗山到滎陽有烏飛鳴来輿上虎賁王吉射之中而祝曰烏鳴啞啞引弓射之洞左腋陛下壽萬萬臣為二千石賜錢二萬漢書朱博傳曰御史府舎百餘區府中列栢樹常有野烏數千棲宿其上晨去暮来號曰朝夕烏烏去不来長老異之雖言入絃管終是曲中啼怨歌行怨歌行者自喻信本吳人羈旅長安同于女子傷嫁如烏孫馬上之曲明妃出塞之詞也家住金陵縣前嫁得長安少年吳錄曰張紘言于孫權曰秣陵楚武王所置名曰金陵謝眺鼓吹曲云江南佳麗地金陵帝王州真誥曰金陵古名伏龍句曲山生金漢靈帝時詔勑郡縣採句曲之金以充武庫逮孫權時又遣宿衛人採金常輸官兵帥百家遂屯居伏龍之地因改為金陵之墟時梁都建業即金陵之地長安西魏所都言已聘魏不歸也囬頭望鄉淚落不知何處天邊胡塵幾日應盡漢月何時更圓漢書鄒陽上書曰今胡數渉河北上覆飛鳥蘇林曰胡来人馬之盛揚塵上覆飛鳥也鮑照詩曰舉袖拂胡塵任昉宣徳皇后令曰胡塵罕嘗夕起漢月喻梁也時宇文拓拔擬于呼韓矣漢書匈奴傳曰匈奴舉事常隨月盛壯以攻戰月虧則退兵為君能歌此曲不覺心隨斷弦舞媚娘朝来户前照鏡含笑盈盈自看古詩曰盈盈樓上女眉心濃黛直㸃額角輕黃細安釋名曰黛代也滅去眉毛以此畫代其處也梁簡文帝詩云同安鬟裏撥異作額間黃後周天元帝令宫人黃眉墨妝其風流于後世秪疑落花謾去復道春風不還少年惟有歡樂飲酒那得留殘一作錢烏夜啼促柱繁絃非子夜歌聲舞態異前溪後漢侯瑾箏賦曰急絃促柱變調改曲顧野王箏賦曰調宫商于促柱轉妙音于繁絃蜀都賦曰起西音于促柱吕向云促柱急絃也宋書樂志曰子夜歌者有女子名子夜造此聲晉孝武太元中瑯琊王軻之家有鬼歌子夜殷允為豫章時豫章僑人庾僧䖍家亦有鬼歌子夜殷允為豫章亦是太元中則子夜是此時以前人也又按樂志曰子夜歌者晉曲也晉有女子名子夜造此聲聲過哀苦後人更為四時行樂之歌謂之子夜四時歌又有大子夜歌子夜警歌子夜變歌皆曲之變也宋書樂志曰前溪歌者晉車騎沈玩所制郗昻樂府題辭曰前溪舞曲也御史府中何處宿洛陽城頭那得棲御史注見前篇烏夜啼續漢書曰桓帝之初京都童謡曰城上烏尾畢哺後漢都洛陽故云洛陽城頭也彈琴蜀郡卓家女織錦秦川竇氏妻一作織錦城頭劉氏妻史記司馬相如傳曰臨卭富人卓王孫有女文君新寡好音故相如繆與臨卭令相重而以琴心挑之相如之臨卭從車騎雍容間雅甚都及飲卓氏弄琴文君竊從户窺之心悦而好之惟恐不得當也既罷相如使人重賜文君侍者通殷勤文君夜亡奔相如織錦廻文詩序曰竇韜秦州被徙沙漠其妻蘇氏秦州臨去别蘇誓不更娶至沙漠便娶婦蘇氏織錦端中作此廻文詩以贈之符國時人也詎不自驚長淚落一作渡洛到頭一作處又作道啼烏恒夜一作何處啼燕歌行歌錄曰燕地名猶楚苑之類起自魏文帝周書王裒傳云裒曽作燕歌行妙盡關塞苦寒之狀元帝及諸文士並和之而競為悽切之詞後元帝出降裒與衆方出至此方騐故信亦有此歌矣代北雲氣晝昏昏千里飛蓬無復根漢書地理志曰代郡秦置屬幽州應劭曰故代國燕地在趙代之北也商君書曰夫飛蓬遇飄風而行千里乗風之勢也王僧達和瑯琊王詠古詩云仲秋邊風起孤蓬巻霜根白日無精景黃沙千里昏寒雁邕邕一作丁丁又作一一渡遼水桑葉紛紛落薊門毛詩曰邕邕鳴雁楚辭曰雁嗈嗈而南遊王逸曰雌雄和樂羣戲行也鮑照鳴雁行邕邕鳴雁鳴始旦漢書地理志曰𤣥莵郡髙句驪遼山遼水所出西南至遼隊入大遼水大遼水出塞外南至安市入海曹子建詩曰出自薊北門遥望胡地桑漢書曰薊燕國也水經注曰薊則西北有薊丘因取名焉晉陽山頭無箭竹疎勒城中乏水源史記曰智伯率韓魏攻趙趙襄子奔保晉陽原過後至于王澤見三人自帶以上可見自帶以下不可見與原過竹二節莫通曰為我以是遺母䘏原過既至以告襄子襄子齋三日親自剖竹有朱書曰趙母䘏余霍泰山山陽侯天使也三月丙戌余將使女反滅智氏女亦立我百邑襄子再拜受三神之令三國攻晉陽引汾水灌其城城不浸者三版襄子懼乃夜使相張孟同私于韓魏韓魏合謀三國滅智氏共分其地遂祠三神于百邑使原過主霍泰山祠祀戰國策曰智伯將伐趙趙襄子召張孟談而告之談曰臣聞董安于之治晉陽也公宫之垣皆以荻蒿苫楚廧之其高至丈餘君發而試之其堅則箘簬之勁不能過也君曰矢足矣范曄後漢書曰耿㳟字伯宗為戊己校尉恭以疏勒城傍有澗水可固乃據之匈奴擁絶澗水恭于城中穿井十五丈不得水恭仰嘆曰昔貳師將軍取佩刀刺山飛泉湧出今漢徳神明豈有窮哉乃整衣服向井再拜為吏士禱有飛泉奔出衆皆稱萬歲乃令吏士揚水示虜虜以為神明引去漢書西域傳曰疏勒國王治疏勒城去長安九千三百五十里言趙氏遭晉陽之難耿恭被疏勒之圍此時天吏不来井泉尚竭究何能為以此見事由天定不可强求不如早歸也下文言離别勸歸之事屬國征戍久離居陽關音信絶能疎漢書昭帝紀曰移中監蘇武前使匈奴單于庭十九歲廼還奉使全節以武為典屬國如淳曰以其久在外國知邊事故令典主諸屬國師古曰典屬國本秦官漢因之掌歸義蠻彝屬官有九譯令後省并鴻臚地理志曰敦煌郡龍勒有陽關願得魯連飛一箭持寄思歸燕將書史記曰魯仲連齊人燕將攻下聊城聊城人或䜛之燕燕將懼因保守聊城不敢歸齊田單攻聊城歲餘士卒多死而聊城不下魯連乃為書約之矢以射城中遺燕將書燕將見魯連書泣三日猶豫不能自决欲歸燕已有隙恐誅欲降齊所殺虜于齊甚衆恐已降而後見辱喟然嘆曰與人刃我寧自刃乃自殺聊城亂田單遂屠聊城渡遼本自有將軍寒風蕭蕭生水紋漢書曰昭帝元鳳三年遼東烏桓反以中郎將范明友為度遼將軍應劭曰常度遼水往擊之故以度遼為官號漢官儀曰度遼將軍屯五原曼柏縣也楚辭曰秋風兮蕭蕭妾驚甘泉足𤇺火君訝漁陽少一作多陣雲漢書曰孝文時匈奴侵暴北邊候騎至雍甘泉京師大駭發三將軍屯細柳棘門霸上以備之數月乃罷又匈奴傳曰胡騎入代句注邊烽火通于甘泉長安漢書地理志漁陽郡秦置屬幽州京房易要占曰陣雲貫月自從將軍出細柳蕩子空牀難獨守漢書曰河内太守周亞夫為將軍次細柳張揖曰在昆明池南今有柳市是也師古曰匈奴傳云置三將軍軍長安西細柳渭北棘門霸上此則細柳不在渭北揖說是也古詩曰昔為倡家女今為蕩子婦蕩子行不歸空牀難獨守李善注云列子曰有人去鄉土遊於四方而不歸者世謂之為狂蕩之人也吕延濟曰婦人比夫為蕩子言夫從征役也盤龍明鏡餉秦嘉辟惡生香寄韓壽漢秦嘉字士㑹隴西人嘉為上郡掾其妻徐淑寢疾還不獲面别贈詩三章有寳釵好耀首明鑒可鑒形之句妻亦答詩見玉臺新詠晉書曰韓壽與賈充女私時西域貢竒香一着人經月不脫武帝以賜充充女盜以予壽充僚屬聞其芬馥稱于充充知與壽私也秘之以女妻壽春分燕来能幾日二月蠶眠不復久玉臺作不能食左傳昭十七年郯子曰𤣥鳥氏司分者也杜預曰𤣥鳥燕也以春分来秋分去郭璞曰詩云燕燕于飛一名𤣥鳥齊人呼鳦按蠶三俯三起俗稱蠶眠洛陽遊絲百丈連黃河春冰千片穿沈約三月三日詩曰遊絲映空轉禮云立春後十日魚上冰桃花顏色好如一作如好馬榆莢新開巧似一作似細錢爾雅釋畜曰黃白雜毛駓郭璞曰今桃花馬春秋元命苞云三月榆莢落漢書曰漢興以為秦錢重難用更令民鑄榆莢錢蒲桃一杯千日醉無事九轉學神仙博物志云西域有蒲萄酒積年不敗彼俗云可十年飲之醉彌月乃解所食愈少心開愈益所食愈多心愈塞年愈損焉又云中山有酒飲者千日醉劉𤣥石于酒家沽酒以千日酒飲之至家大醉以為死塟之後酒家千日後往視之開棺醉始醒也抱樸子云一轉之丹服之三年得仙二轉之丹服之二年得仙三轉之丹服之一年得仙四轉之丹服之半年得仙五轉之丹服之百日得仙六轉四十日得仙七轉二十日得仙八轉十日得仙九轉之丹服之三日得仙若取九轉之丹内神鼎中夏至之後爆之鼎熱翕然輝煌俱起神光五色即化為還丹取而服之一刀圭即白日昇天定取金丹作幾服能令華表得千年抱樸子曰昔左元放于天柱山中精鬼而神人授之金丹仙經夫金丹之為物燒之愈久變化愈妙黃金入火百煉不消埋之畢天不朽服此二藥煉人身體故能令人不老不死述異記曰廣州東界有文種之墓墓下有石華表柱搜神記云燕昭王墓前有千年華表樹楊柳歌河邊楊柳百丈枝别有長條踠一作宛地垂河水衝激根株危倐忽河中風浪吹可憐巢裡鳳凰兒無故當年生别離流槎一去上天池織女支機當一作將見隨荆楚歲時記曰漢武帝令張騫使大夏尋河源乗槎經月而至一處見一女織一丈夫牽牛飲河渚織女取支機石與騫而還後為東方朔所識天池猶言天河誰言從来䕃數國直用東南一小枝論衡曰日旦出扶桑暮入細柳扶桑東方之地細柳西方之地此歌楊柳以日有細柳之稱故云䕃數國者謂日也齊王憲碑云若木一枝旁䕃數國若木亦日也廬江焦仲卿詩云自掛東南枝此楊柳歌亦離别之語怨辭也昔日公子出南皮何處相尋𤣥武陂漢書渤海郡有南皮縣魏文帝與吳質書曰每念昔日南皮之遊誠不可忘魏都賦曰莞以𤣥武劉淵林注𤣥武菀在鄴西菀中魏文帝𤣥武陂詩兄弟共行遊驅車出西城柳垂重隂緑向我池邊生駿馬翩翩西北馳左右彎弧仰月支曹植白馬篇曰白馬飾金覊連翩西北馳又云控弦破左的右發摧月支李善注云邯鄲淳藝經曰馬射左邊為月支三枚馬蹄一枚連錢障泥渡水騎白玉手板落盤螭晉書曰王濟善解馬性嘗乗一馬着連乾障泥前有水終不肯渡濟云此必惜障泥使人解去便渡故杜預謂濟有馬癖樂府詩云鐵驄金面青連錢說文曰笏手板也玉藻云笏天子以球玉諸侯以象大夫魚須士飾象骨郡國志曰晉明帝為太子時嘗戲殿前以玉手板弄銅盤螭口中板溜入螭腹中不能出後見一白䑕出入螭口君言丈夫無意氣試問燕山那得碑古詩男兒重意氣何用錢刀為後漢書曰竇憲與北單于戰于稽落山破之刻石燕然山言志求立功者多燕山勒名幾人也鳳凰新管蕭史吹朱鳥春窗玉女窺列仙傳曰蕭史者秦穆公時人也善吹簫穆公有女號弄玉好之遂以妻焉遂教弄玉作鳳鳴居數十年吹似鳳凰鳳凰来止其屋為作鳳臺夫婦止其上不數年一旦隨鳳凰飛去故秦氏作鳳女詞有簫聲朱鳥朱雀南方神也景福殿賦曰朱鳥舒翼以峙衡魯靈光殿賦曰玉女窺牕而下視銜雲酒盃赤瑪瑙照日食螺紫琉璃王子年拾遺記曰有丹丘之國獻瑪瑙甕以盛甘露帝徳所洽被于殊方以露充厨也瑪瑙石類也南方者為之勝今善别馬者死則破其腦視之其色如血者則日行萬里能騰飛空虛今為器多用赤色若是人工所製多不成器成器亦樸拙其國人聴馬鳴則别其腦色丹丘之地有夜乂駒跋之鬼能以赤馬腦為瓶盂及樂器皆精妙輕麗中國人有用者魑魅不能逢之一說云馬腦者言是惡鬼之血凝成此物丹丘之野多鬼血化為丹石則瑪瑙也可鑄以為器當黃帝時瑪瑙甕至堯時猶存甘露謂之寳露至漢東方朔識之乃作寳甕銘曰寳雲生于露壇祥風起于月館是也今云銜雲酒盃者若漢承露盤矣世說新語曰武帝嘗降王武子供饌盤悉用琉璃器廣志曰琉璃出黃支斯調大秦日南諸國魏畧曰大秦國出赤白黑黃青綠紺縹紅紫十種琉璃南州異物志曰琉璃本質是石欲作器以自然灰治之自然灰狀如黃灰生南海濱百年霜露奄離披一旦功名不可為楚辭曰白露既下百草兮奄離披此梧楸定是懐王作計悞無事翻覆用張儀史記曰秦欲伐齊齊與楚從親惠王患之乃令張儀佯去秦厚幣委贄事楚曰誠能絶齊秦願獻商於之地六百里楚懐王貪而信張儀遂絶齊使使如秦受地張儀詐之曰儀與王約六里不聞六百里楚使怒去歸告懐王懐王怒大興師伐秦秦發兵擊之大破楚師取楚之漢中地而齊怒不救楚大困明年秦剖漢中地與楚以和楚王曰不願得地願得張儀而甘心焉張儀聞之乃請如楚復釋去張儀懐王竟死于秦不如飲酒髙陽池日暮歸時倒接䍦晉書曰山簡鎮襄陽優㳺卒歲惟酒是耽諸習氏荆土豪族有佳園池簡每出㳺之池上置酒輒醉名之曰高陽池時有兒童歌曰山公出何許往至髙陽池日夕倒載歸酩酊無所知時時能騎馬倒着白接䍦舉鞭向葛疆何如并州兒武昌城下誰見移官渡營前那可一作得知晉陽秋曰陶侃練核庶事勤務稼穡雖戍陳武士皆勸勵之性纎密好問頗類趙廣漢嘗課營種柳都尉夏施盜拔武昌郡西門所種侃後自出駐車施門問此是武昌西門柳何以盜之施惶怖首伏三軍稱其明察魏文帝柳賦序曰昔建安五年上與袁紹戰于官度時余從行始植斯柳自彼迄今十五載矣感物傷懐乃作斯賦又王粲亦有柳賦盖同作也獨憶飛絮鵝毛下非復青絲馬尾垂晉書謝道藴曰未若柳絮因風起羅敷行曰青絲繫馬尾言楊花吹落柳葉凋殘其色不復青也鵝毛馬尾取其相似也欲與梅花留一曲共將長笛管中吹笛中有落梅花曲鮑昭樂府有梅花落崔豹古今注稱李延年有折楊柳黃華子等八曲言曲有楊柳之名欲與笛裏梅花共吹之也庾子山集巻五
